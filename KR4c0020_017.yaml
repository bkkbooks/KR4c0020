body:
  text: 杜詩詳註巻十七翰林院編修仇兆鰲撰贈李八一作公秘書别三十韻鶴注當是大厯元年七月作往時中補右扈蹕上元初反氣凌行在妖星下去聲直廬六龍瞻漢殿一作闕萬騎去聲畧一作集姚一作媯墟𤣥朔廻一作還天步神都憶帝車一戎纔汗馬百姓免為魚通籍蟠螭印差此兹切肩列鳯輿事殊迎代邸喜異賞朱虚首憶秘書扈從之事秘反氣四句上皇西巡𤣥朔四句肅宗興復通籍以下書侍従也當時駕次馬嵬帝自陳倉而赴蜀路經漢中太子自彭原之朔方即位靈武所謂萬騎畧姚墟者指上皇也𤣥朔迴天步者指肅宗也通籍李得出入行宫差肩謂隨朝士而趨輦後肅宗以恢復入京非由繼統嗣位故與代邸迎立者有殊夢弼曰秘書宗室故比朱虚未能優擢故云賞異信洙曰扈扈從也蹕鳴蹕也天子出鳴蹕以清道庾賦遭東南之反氣天行在妖星注皆見前以陸機詩厭直承明廬六龍子之駕易時乗六龍御天嵇康詩乘雲駕六龍騎梁宣帝詩漢殿珊瑚支握蔡邕獨斷大駕備千乘萬帝王世紀瞽瞍之妻登生舜於姚墟故得姓姚氏漢書世本媯虛在漢中郡西城縣世紀安原謂之媯虛或謂之姚墟趙景真書植橘柚於𤣥朔朔方𤣥武之位故稱𤣥朔斗詩天步艱難中鮑照詩明方輝鑠神都史天官書為帝車運於央臨制四劉書一戎衣吾公孫𢎞傳臣愚駑無汗馬之勞但左傳子曰㣲禹其為魚乎光武紀赤睂在河東决水灌之可使為魚蔡前漢魏相傳通籍長信宫元帝紀宗室有屬籍者邕獨斷璽者印也印者信也天子璽以玉螭虎紐西京雜記燈髙七尺五寸作蟠螭漢王僧儒書抗首接膝履足差肩鳯輿見洗兵行書文帝自代邸来即位益封朱虛侯劉章二千戸黄金一千斤冦盜方歸順乾坤欲宴如不才同補衮奉詔許牽裾鴛鷺叨雲閣騏驎俗本作麒麟滯石渠一作玉除趙云石渠為正文園多病後中散舊交疎飄泊哀相見平生意有餘風煙巫峽逺臺榭楚宫虚一作除觸目非論平聲故新文尚起予此記前後聚散之迹同朝下八䕫州重晤上六往日補衮牽裾諌官之職叨雲閣公授拾遺滯石渠李遷秘書多病交疎指棄官以後飄泊二句喜逢故人風煙二句客䕫景物非論故道故者無人尚起予知音有秘書也有歸順注别見漢書諸侯王表四海宴如詩衮職闕仲山甫補之戸袁紹書奉詔之日裾魏志魏文帝欲徙冀州民十萬實河南辛毗引帝而誎古詩厠迹鴛鷺行未潘岳賦髙閣連雲秘三輔故事天禄閣石渠閣並在央宫大殿北以蔵書令司馬相如為文園令也嵇康為中散大夫作絶交書劉楚語先王之為臺榭世説觸目皆琳琅珠玉孺詩言贈賦新文論語起予者商也朱注韻㑹子本無余音刻謬正俗曰曲禮予一人鄭康成注余予古今字因鄭此説近代學者遂皆讀予為余此詩亦用平聲盖従後人讀耳清秋凋碧栁别浦落紅蕖消息多旗幟經過平聲歎里閭戰連脣齒國軍急羽毛書幕府籌頻問山家藥正鋤此秘書㕘幕府事凋巫峽楚宫上記相見之地栁蕖落此記相别之時并興起亂離凋敝之象注朱注戰連軍急謂崔旰與楊柏及張獻誠相攻原山劍元帥相公初屈幕府㕘籌畫相公朝謁今赴後期也又云秘書比卧青城山中梁簡文帝詩水照栁初碧烟含桃半紅謝莊詩凌别浦兮值泉躍幟簡文詩紅蕖間青鎖紫露濕丹楹漢髙紀益張旗於山上古詩思還故里閭乎左傳宫之竒曰輔車相依脣亡齒寒者其虞虢之謂魏武帝奏事若有急則挿羽於檄謂之羽檄陳子昂詩追宴入山家台星入朝音潮謁使去聲節有吹嘘西蜀黄作屬災長弭南翁憤始攄對敡揚同抏吾官切舊作抗非一作抗士卒乾音干没費倉儲勢藉兵須用功無禮忽諸御鞍金腰褭宫硯玉蟾蜍拜舞銀鈎合一作落恩波錦帕舒此秘書入朝後事朱注台星使節皆謂杜鴻漸秘書盖因鴻漸表薦入朝其奏對君前當以師老財匱為言盖全蜀之勢今方藉兵不得不用而諸將冐功無禮如所謂抏士卒費倉儲者其可忽之而不問乎是時崔盰雖歸朝而楊子琳未釋甲蜀中所在聚兵軍儲耗蠧故因秘書赴幕而及之言外亦暗規鴻漸也又云秘書將承恩賜馬有錦帕之舒且入直侍書見銀鈎之落也次公指杜相公於上下語勢不接逺注銀鈎承宫硯錦帕承御鞍拜舞之後落筆如銀鈎洙云詔書也禮台星注見十六巻後周禮地官掌邦國之使節周彌災兵彌即弭也漢冦榮疏以寧風旱以弭災兵二舊注南翁南楚老人如項羽傳所稱南公古人公翁字通用也蔡邕瞽師賦撫長笛以攄憤兮上書畢命對揚文武之光命陸機集對敡帝祉朱注林賦抏士卒之精費府庫之財而無徳厚之恩善曰抏損也音翫呉曽漫録抏挫也吾官切平凖書百姓抏弊以巧法索隠曰三蒼抏音五官切抏者耗也取此音以釋此詩於義甚當王褒講徳論驚邊抏士恐亦是抏士張湯傳始為小吏乾没正義謂無潤及之而取他人也如淳曰豫居物以待之得利為乾失利為没三國志傅嘏傳豈敢寄命洪流以徼乾没裴松之注有所徼射不許乾燥之與沉没而為之也藉兵乞食於西周趙充國傳遣使至匈奴藉兵周䇿左傳見無禮於君者誅之如鷹鸇之逐鳥雀焉待何氏語林王僧䖍曰亡兄之𦙍不宜忽諸淮南子腰褭飛而駕之則世莫乘車拳西京雜記廣川王發晉靈公冢得玉蟾蜍一枚大如光潤如新玉取以盛水滴硯呉越春秋羣臣拜舞天顔舒京王僧䖍論書索靖名其字書曰銀鈎蠆尾西雜記覆以錦帕此行非不濟良友昔相於去棹吳作㠶一作斾依顔色㳂流想疾徐沉綿疲井臼倚薄似樵漁乞許既切米煩佳客鈔楚交切詩聽小胥杜陵斜晚照潏水帶寒淤莫話清溪髪蕭蕭白映梳此自敘而致送别之情依秘書此行非不足以濟時特良友相濶覺臨去想耳沉綿四句自述客䕫近况杜陵四句囑其相答故人莫話者自慚衰老也此章前二段各十四句後二段各十二句中間八句相間文周語動無不濟梁簡詩悽悽隠去棹易林患解憂除良友相於隋孔徳紹詩沿流渡檝易逆浪取花難士梁簡文詩豈若茲川麗清流疾且徐客顔延之陶徴誄井臼弗任藜菽不給沈約詩佳信龍鑣潏小胥見周禮春官牧梁蕭鈞詩平川收晚照洙注水公故居盧注杜期遊樊川詩杜村連潏水曰鮑照詩照照寒洲爽方言水中可居者洲三輔謂之淤杜臆清溪髪語竒黄生曰時諸將連兵封崔旰勝負未决杜鴻漸以節度使讓旰而使諸將各罷兵公盖深憤此事故於詩中吐露之曰西蜀災長弭南翁憤始攄雖為稱頌之詞其實災未必弭憤未甞攄也曰對敡抏士卒乾没費倉儲言蜀中軍實耗損入告朝廷善為區處使緩急有備此大臣行邊善後之䇿也如是則西蜀災長弭矣曰勢藉兵須用功無禮忽諸此用季文子誅無禮於君之言如旰殺主將而叛此豈有禮於君者今反就加節使是功及無禮矣夫旰罪當誅勢必藉兵今乃與諸將同拜朝命功罪不明於文子之言無乃忽諸必殺崔旰憤始攄矣公於贈李詩中寓詞告杜盖深諷其處事之草草也中夜顧注詩有江山危樓亦䕫州西閣所作當在大厯元年司馬紹詩中夜不能寐中夜江山静危樓望北辰長為萬里客有愧百年身故國風雲氣髙堂戰伐塵胡雛負恩澤嗟爾太平人此客䕫而傷亂離也在四句分截望望北辰思長安也萬里一身危樓所感故國髙堂北之意風雲氣變易無常戰伐塵屢經殘破負恩澤追恨禄山盖自天寳初而禍綿不息致不能為太平之人也何遜詩暫有江山趣詩隂鏗詩接路上危樓年庾信詩髙榮據北辰多鮑照爭先萬里途各事百身顏延之詩故國喬木空城疑塞雲廬史記風雲天之客氣者也此夢弼以髙堂為杜陵屋今按曹植詩乃為髙㑹宴髙堂沈約詩青鳥去復還髙堂雲不歇劉孝綽詩長門隔青夜髙堂夢容色此皆槩言華屋或因前詩有髙堂天下無之句遂指為䕫州地名誤矣陽晉載記石勒上黨武鄉羯人年十四隨邑人行販洛倚嘯上東門王衍見而異之顧謂左右曰向者胡雛吾觀其聲視有竒志唐書張九齡見禄山入奏氣驕蹇曰亂幽州者此胡雛也舊注誤以吐藩為胡雛温前漢郊祀志亦施恩澤平書云嗟爾萬方有衆路舒傳囹圄空虚天下太垂白鶴注此亦䕫州西閣作故云江喧樓逈成後拈垂白二字為題非專詠垂白也詩漢書杜周傳老姊垂白注白髪下垂也垂白一云白首馮唐老清秋宋玉悲江喧長少睡樓逈獨移時多難去聲身何補無家病不辭甘從千日醉未許七哀詩此章乃老去悲秋之意下六申言其悲傷少睡移時憂在國家也醉千日付之不知未七哀心更多矣睡杜臆公年老為郎有似馮唐當秋而悲復如宋玊少無聊故起立移時時難身何補作憤語無家病不辭作苦語書趙注公妻孥在蜀而云無家盖以故鄉為家也漢馮唐以孝著為郎中署長文帝輦過唐曰父老何自為郎搜庾信詩髙花出逈樓造魏都賦醇酎中山沈湎千日神記狄希中山人能千日酒飲之一醉千日六七哀詩見十巻中宵鶴注當是大厯元年在西閣作潛中夜指長夜言中宵尚在黄昏以後陶詩中宵竚遙念西閣百尋餘中宵步綺疏飛星過平聲水白落月動去聲沙一作簷虚擇木知幽鳥潛波想巨魚親朋滿天地兵甲少来書中宵獨步領起通章星月屬賦中宵所見魚鳥屬比中宵所感末傷孤身漂泊不如物情之自適也一飛星過水而白下半因上落月動於沙虛上半因下下就迅疾中取象一従恍惚中描神黄生注五六即水深魚極樂林茂鳥知歸意此係夜景故以知想字面鈎畫之言外則以物之得所形人之失所而人之失所由親朋不相存濟也傳閣在山上故髙至百尋鏤西京賦巨獸百尋梁冀牕牖皆有綺疏注綺疏為綺文也陸機詩振風薄綺疏星過字動字白字虚字知字想字皆句中眼天文志自上而降曰流自下而升曰飛擇鳥庾信詩沙虚馬跡深郭璞詩潛波渙鱗起左傳鳥能擇木木豈能王褒頌沛乎若巨魚之縦大壑䇿晉書謝安傳親朋畢集韓國繕治兵甲以益其强不寐此亦西閣所作隠詩寤言不寐如有憂瞿唐夜水黑城内改更平聲籌翳翳月沉霧輝輝星近樓氣衰甘少寐心弱恨容黄氏作容吳作和陳作多一作知愁多壘陳作壘恨滿山谷桃源何一作無處求首聨不寐所聞次聨不寐所見三聨不寐之狀末聨不寐之由寐月沉在轉更之後星近又在月落之餘愁来更加少多壘故起愁心通章冩景言情逐層追緊顧注氣衰少寐理勢自然故曰甘心弱容愁時事使然故曰恨杜臆心力本弱而愁緒太多當他不過是可恨也滿山多壘歎寄身無處矣暉更籌見前曲歸去来辭景翳翳以將入虞騫詩暉光稍没禮四郊多壘谷蕭望之傳羣盜並起充滿山鶴注此指崔旰之亂未平送十五弟侍御使去聲蜀鶴注當是大厯元年作詩云豺狼鬬盖指崔旰軰相攻也喜弟文章進添余别興去聲牽數杯巫峽酒百丈内江船未息豺狼鬭空催犬馬年歸朝音潮多便道搏擊望秋天上四别送五六慨身世七八望侍御史顧注公恨不能身討豺狼囑弟歸朝而彈擊之北盧愷作露布帝讀大悦曰愷文章大進灘輿地廣記涪州内江即黔江也益州記内江至闗頭灘長百步懸崖倒水舟楫莫通朱注通鑑朱齡石伐蜀衆軍従外水取成都臧僖従中水取廣漢老弱乗髙艦從内水向黄虎史照釋文巴郡正對二水口右則涪内水左則蜀外水内水自渝上合州至綿州外水自渝上或瀘至蜀楊慎謂外水即岷江内水即涪江中水即沱江望陶氏敘侃臨終表曰猶冀犬馬之齒尚可少延蕭之傳便道之官舊唐書桓彦範舉楊嶠為御史不樂搏擊之任師氏曰御史搏擊奸回如秋鷹之搏撃鳥獸江月鶴注此大厯元年䕫州西閣作初杜臆詠江中月影也何遜詩江月三五江月光於一作如水髙樓思去聲殺人天邊長作唐韻則箇切又臧祚切客老去一霑巾玊露溥一作團清影銀河半没輪誰家挑錦字燭滅一作滅燭翠睂顰一作嚬之此章對月傷懐上四羇人感屬自敘下四離婦之情推開説殺江月漾光於水上髙樓一望頓覺身寂影孤真堪思盖天邊乆客至老不還恐逺死他鄉也因想清影之下玉露溥漙半輪之停天河奄没月色明皎如此此時繡字空閨者燭殘挑罷得無對之而顰睂乎當與樓上霑巾者同一愁思也徘曹植詩明月照髙樓流光正徘徊庾肩吾詩樓上徊月窗中愁思人詩何遜詩天邊看逺樹露曹植詩歔欷涕霑巾漙李嶠色帶銀河滿光含玉開詩零露漙兮注露多貌列曹植詩明月澄清影若張正見詩明月半輪空晉女傳竇滔妻蘇蕙字蘭織錦為迴文璇璣圖詩贈滔宛轉循環讀之詞甚悽惋凡三百四十字燭挑錦字挑錦線以刺字欲寄征夫也張九齡詩滅憐光滿暫梁元帝詩翠睂斂千重結黄生曰結在章法是推開一步在比興正是透深一層盖即男女之情以喻君臣之義則前半所云思殺人一霑巾者皆有着落矣公之攀屈宋而親風雅實在於此此豈玊臺香奩軰所能效顰哉月圓此亦西閣所作月謝靈運詩放舟候圓孤月當樓滿寒江動夜扉委波金不定照席綺逾依未缺空山静髙懸列宿稀故園松桂一作菊發萬里共清輝此章月下思鄉上六景下二情髙滿言月圓動言月影委波申動扉照席申當樓未缺懸申月圓之狀末想故園秋景也月杜臆江月倒影水摇而閣上之扉為動大是畫意注波中金光摇而不定月臨席上綺文依而愈妍將金波綺席拆開顛倒趙汸謂詩家用古語之法梁武帝詩慅慅孤月帷何遜詩寒江復寂寥祀庾肩吾詩髙樓開夜扉韜月賦委照而吳業昌酒郊歌月穆穆以金波六紂時以綺為席鄒陽賦綃綺為席平釋名月缺也滿則缺也月陶𢎞景詩空山霜滿髙烟淮南子髙懸大鏡賦列宿掩縟長河韜映張何遜詩獨守故園秋菊猶存正見詩松桂此真風杜臆松桂發猶言松傳𤣥詩皎皎濯清輝共月賦隔千里兮明月結聨本之胡應麟曰杜冇太巧類初唐者如委波金不定照席綺逾依有太纎近晚唐者如雨深荒院菊霜倒半池蓮本胡夏客曰未缺句不如摩詰空山月色深髙懸句孟徳月明星稀来今按三四出勝於對五六對勝於出夜詩云南菊再逢是合雲安䕫州為兩秋故知屬大厯元年西閣作又云新月猶懸盖元年九月初矣露下去聲天髙秋水一作氣清空山獨夜旅魂驚疎燈自照孤㠶宿新月猶懸雙杵鳴南菊一作國再逢人卧病北書不至一作到雁無情步簷一作蟾倚仗看平聲牛斗銀漢遙應平聲接鳯城此秋夜思家而作也上四言景下四言情魂天髙水清正可出峽而山閣孤悽忽覺旅驚起㠶宿水中杵鳴山上兩句分承燈㪚幾處故曰疎杵皆對敲故曰雙自南而望北故見銀漢遥接於鳯城月黄生注詩以次句作骨㠶宿杵鳴獨夜見聞疎燈新二字另讀懸指月本易懸象著明非謂杵聲空懸也泬江淹别賦露下地而騰文收楚辭悲哉秋之為氣也寥兮天髙而氣清寂寞兮潦而水清王粲七哀獨夜不成寐以崔融詩旅魂驚塞北歸望斷河西長門賦懸明月自照兮朱超道詩孤㠶漸逼天楊慎曰字林直舂曰搗古人搗衣兩女子對立執一杵如春米然今易作卧杵對坐搗之取其便也嘗見六朝人畫搗衣圖其制如此謝惠連詩楹長杵聲哀注陸厥詩鴈返無南書楊慎曰楚辭大招曲屋步櫩曲屋周閣也步櫩長砌也相如賦步櫩周流長途中宿櫩即古簷字陸陲鐘山寺詩步簷時中宿飛階或上征沈氏滿願詩步簷隨新月挑燈惜落花杜葢襲用之顧注古者六尺曰步今之廊檐大率廣六尺邵注牛斗二星在銀漢邊河圖括地象河精上為天漢亦曰銀漢簫戴暠詩黑龍過飲渭丹鳯俯臨城趙曰秦穆公女吹鳯降其城因號丹鳯城其後言京城曰鳯城黄生曰此與玉露凋傷不相上下一二五六工力悉敵三四寫景雖遜彼之髙壯七八含情此處却較深厚也楓此與雲安䕫州諸詩相合露下天髙即玊露凋傷樹林也獨夜魂驚即聽猿實下三聲淚也孤帆宿即孤舟一繫故園心也雙杵鳴即白帝城髙急暮砧也菊再逢即叢菊兩開他日涙也鴈無情即一聲何處送書雁也㸔牛斗即每依北斗望京華華詩中詞意大㮣相同竊意此詩在先故秋興得以詳敘耳范徳機曰善詩者就景中冩意不善詩者去意中尋景如杜詩無邊落葉蕭蕭下不盡長江滚滚来疎燈自照孤㠶宿新月猶懸雙杵鳴殊方日落𤣥猿哭舊國霜前白雁来即景物之中含蓄多少愁恨意若説出便短淺矣然亦有就意中言景而意思深逺者如苦遭白髪不相放羞見黄花無數新亦自雋永有致草閣朱氏編在大厯元年散杜臆公在䕫别構草閣故云草閣柴扉星居而沙上草閣詩又可證草閣臨無王作蕪非地柴扉永不闗魚龍迴夜水星月動秋山乆一作夕露晴一作清初濕髙雲薄未還泛舟慙小婦飄泊損紅顔首聨提草閣三四草閣夜景下則對景而感飄泊也閣臨水故下無地唯無地故扉不闗迴夜水秋蟄伏也動秋山光閃爍也露乆下而方濕晴則易乾也雲髙舉而未還薄則易散也公以旅泊損顔故對舟婦而懐慚末句用倒裝法臨杜臆雲薄未還借景寓意頭陀寺碑飛閣逶迤下無地范彦龍詩有客款柴扉所歸去来辭門雖設而常闗刺古樂府相逢行小婦無為邵氏注蜀中多是婦人船沈約詩共矜紅顔日俱忘白髪年宿江邊閣黄鶴編在大厯元年門杜臆江邊閣即草閣故云髙齋次水若西閣其名不易矣暝色延山徑髙齋次水門薄雲巖際宿孤月浪中翻鸛鶴追飛静一作盡豺狼得食喧不眠憂戰伐無力正乾坤延暝色將宿之時次水門西閣之地上二㸃題中四分承山水雲過山頭停巖似宿月浮水靣浪動若翻此初夜之景鸛鶴飛静水邊所見豺狼喧食山上所聞此夜深之景憂亂縈懐故竟夕不寐薄雲巖際出初月波中上何仲言詩尚在實處摹冩此用前人成句只換轉一二字間便覺㸃睛欲飛鶴注謂鸛鶴喻軍士豺狼喻盜賊起下戰伐時蜀有崔旰之亂徑此詩八句皆對謝靈運詩林壑斂暝色孟子山之蹊間襄沔記城内有髙齋梁昭明造文選處簡文為晉安王時引劉孝威等於此綜覈詩集因號為髙齋次乃次舍之次易旅即次潮漢循吏傳召信臣開通溝洫起水門塘梁簡文詩寒浸水門杜臆名勝志載闗耆孫瞿闗行記則髙齋即在闗上耆孫與客飲此誦少陵薄雲孤月詩歎此老具眼䕫江山麤惡唯少陵所紀處獨異左庾信詩雲宿鳯凰門願梁簡文帝詩夕波照孤月一軍傳鄭翩願為鸛其御為鵞抱朴子穆王南征盡化君子為猿為鶴小人為蟲為沙狼之逐羣羊後漢張綱傳豺狼當道秦國䇿譬如豺楚辭夜不眠以至曙世孔叢子處戰伐之務收英雄吹笛鶴注梁權道編在大厯元年按詩云胡騎中宵堪北走當指吐蕃而言通鑑永泰元年吐蕃與回紇入冦子儀免胄釋甲投鎗而進回紇酋長皆下馬羅拜再成和約吐蕃聞之夜引兵遁去即此事也吹笛秋山風月清誰家巧作斷腸聲風飄律吕相和切月傍去聲一作倚闗山㡬處明胡騎去聲中宵堪北走音奏武陵一曲想南征故園楊桞今搖落作落何得愁中却舊作曲王原叔得老杜詩藁作却盡生此聞笛而有感也上四摹景下四冩情細疏之三四分頂風月清五六引證斷腸聲末乃鄉闗之思從笛聲感觸者之顔廷榘曰律吕之調於風前聞之覺相和之切闗山曲於月下奏之似幾處皆明此聲之巧而感之深也曰五本借笳喻笛故北走曰堪六用笛中實事故南征想趙大綱曰笛曲有折揚栁故翻其意而結之謂故園楊栁至秋摇落今何得復生而可折乎盖設為怪歎之辭以深致思鄉之感此則公之斷膓者也為陸時雍曰結出故國闗情千條萬緒用巧而不見乃大家江總詩秋城韻晚笛危樹引淸風瀚曰首句本此山向秀思舊賦隣人有善吹笛者江淹詩金􅛸映秋南史褚彦回傳初秋凉夕風月甚美見曹植詩借問誰家子顔箋誰家羡其善吹也張正詩還聽嗚咽水併切斷腸聲吕唐注風月分作一聨従龍池篇得来悽漢厯律志律和矣長笛賦律吕既和切謂其音切樂府横吹曲有闗山月解題云闗山月傷離别也周王褒詩關山夜月明晉劉隗傳劉疇避亂塢壁賈胡百數欲害之疇援笳而吹之為出塞入塞之聲以動其逰客之思於是羣胡垂泣而去世説劉琨為并州刺史胡騎圍之數重琨夕乗月登樓清嘯賊聞之悽然長歎中夜奏胡笳賊皆流涕人有懐土之思向晚又吹之賊並棄圍奔走周𢎞讓長笛吐清氣詩胡騎爭北歸偏知别鄉苦楊慎曰字書疾趨曰走上聲驅之走曰走去聲北走闗山疾走之走也如漢書北走邯鄲道之走胡騎北走驅而走之也如漢書季布北走胡之走兩音不同古今注武溪深乃馬援南征之所作也援門生爰寄生善吹笛作歌以和之名曰武溪深武溪深詞嗟哉武溪一何深飛鳥不敢度走獸不敢臨嗟哉武溪多毒淫顔廷榘曰武陵曲即武溪深梁簡文帝詩但歌聊一曲有故園指杜陵詞宋書晉太康末京洛為折楊栁之歌兵革辛苦之演繁露笛亦有落梅楊桞二曲今其詞亡不可考矣舊唐書樂志梁樂府胡吹歌云上馬不捉鞭反拗揚桞枝下馬吹横笛愁殺行客見此歌詞元由北國之横笛顔箋笛有闗山月武溪深折揚桞及胡笛聲皆清商曲也郭濬曰此詩句句悽逺咏物絶調對蔣一梅曰絶大手筆聲律極細然有對意不對詞詞不對意者西閣雨望此下五章皆屬大厯元年樓雨霑雲幔山寒一作髙著直畧切水城逕添沙面出湍减石稜生菊蕊凄疎放松林駐逺情滂沱朱檻濕萬慮倚一作里傍簷楹首二西閣雨凉中四皆閣中望景三四言水五六言山末則對雨而寄慨也汲徑添長而出於沙面湍水减殺而石稜㣲露此時秋水方落細雨甚㣲故不至漲沙而激湍也湍减石稜生即冬深詩寒水各依痕也陸放翁詩水退出新灘亦本於此二菊逢雨打其疎放也凄然雨罩松青見逺情之遙駐句俱冩雨景逺情指松盖蒼翠可愛處宛然具有情致駐停駐也晉史劉惔稱桓温眼如紫石稜丁䕶督詩深心屬悲絃逺情逐流吹謝朓詩洞房凝逺情梁詩月離於畢俾滂沱矣劉孝先詩萬慮坐相攢元帝詩佳氣滿櫩楹西閣三度期大昌嚴明府同宿不到唐書大昌縣屬䕫州問子能来宿今疑索先則切故要平聲匣琴虚夜夜手板自朝朝金吼霜鐘徹花催蠟一作臘炬消早鳬江檻底雙影謾飄颻上四訝明府失期下則望其到閣也弗言我曽問子已許来宿今豈索我之故要而至耶匣琴夜夜欲待嚴至而彈手板朝朝明府别有迎謁矣兩句見三度意鐘起蠟殘候客將曉鳬舄飄飄冀其早至玊杜臆嚴為明府故末用王喬事王南齊髙逸傳褚伯居瀑布山三十餘年隔絶人物僧逹為吳郡苦禮致之伯玉不得已停郡信宿而退僧逹答丘珍孫書曰褚先生従白雲逰矣近故要其来此冀慰日夜韻㑹故與固古字通用刺晉輿服志八座執笏其餘卿士但執手板海録今名也顧注王子猷為桓温㕘軍以手扳拄頰晉書王坦之倒執手板流汗宋野史歐陽公與僚屬讌遊錢思公以冦菜公事諷之永叔取手板起立然則守令對上官必以手板嚴必羈身縣令故有此語蔡琰胡笳殺氣朝朝衝塞門胡風夜夜吹邊月梁元帝詩塵鏡朝朝掩寒衾夜夜空言山海經豐山有九鐘焉是知霜鳴注霜降則鐘鳴故知也宋之問詩禁静鐘初徹朱梁元帝詩爉燭凝花影簡文帝燭詩緑炬懐翠蠟含丹沈佺期詩雙影未嘗来西閣二首巫山小搖落碧色見一作是松林百鳥各相命孤雲無一作非自心層一作曾軒俯江壁要路亦髙深朱紱猶紗帽新詩近玉琴功名不早立衰疾一作病謝知音哀世非一作無王粲終然一作朝學楚吟首章乆留西閣而歎也况上四閣前之景中四閣居之乃訴所感之情各杜臆小搖落秋盡日也公有九月三十日詩可証鳥鳴羣而孤露飄泊言外有自悲意衆木皆凋故覺松林獨碧凴軒俯視故見徑路髙深猶紗㡌雖仕猶隠近玉琴聲清而悲也不早立前事己往謝知音後時無望矣王粲適荆而賦七哀公之哀世者不止此故曰非王粲即所謂未許七哀詩也莊舄仕楚而作越聲猶公在䕫而動鄉思故曰學楚吟即所謂吟同楚執珪也庾信詩春山百鳥啼夢弼曰周書時訓鵙始鳴通卦驗云鵙伯勞也鳴者相命繁陶潛曰孤雲獨無依又歸去来詞雲無心以出岫欽暑賦翕翕盛熱蒸我層軒書古詩先據要路津㡌謝朓詩曠望極髙深朱注唐隋貴臣多服烏紗後漸廢貴賤通服折上巾在唐時以為隠居之服吕一説近玊琴言曰事於詩惟與琴相伴耳非聲中律之謂江淹畫扇賦玊琴兮珠徽執昭明太子詩終然類管窺富史記越人莊舄仕楚為珪有頃而病楚王曰舄今貴矣亦思越不使人往聽之猶越聲也王粲登楼賦莊舄顯而越吟懶心似江水日夜向滄洲不道去聲含香賤其如鑷白休經過平聲凋一作調碧栁蕭瑟一作索倚朱樓畢娶何時竟消中得自由豪一作榮華看古往復食寄㝠搜詩盡人間興去聲一作意兼須入海求次章有不欲留閣之意如起句托景言情歎衰白休官不身赴滄洲也今但凴樓對栁亦何為者俟男婚巳畢消病可痊行當長往耳且㸔豪華易過何如服食引年入海求仙乎仍結到欲往滄洲意此各四句分截衰公嘗云到今有餘恨不得窮扶桑云云蓬莱如可到白問神仙其語諄諄似欲為長生之學者然實不得志於時而託言遯世耳猶孔子乗桴浮海之歎歟吕氏春秋水泉東流日夜不休舌神異經東海滄浪之洲祖漢官儀尚書郎握蘭含雞香奏事鑷白用齊髙事注見七巻四楚詞蕭瑟兮草木摇落而變衰畢馮衍賦伏朱樓而望後漢書向子平男女嫁娶敕斷家事弗復相闗華消渴有上中下三症故曰消中人庾信詩金穴盛豪古詩服食求神仙史記燕宋無忌羡門子髙之徒稱有仙道形解銷化之術齊威宣燕昭王皆信之使人入海求蓬萊方丈瀛州西閣夜恍惚寒江洪注從江别作山者犯重暮逶迤白霧昏山虚風落石樓静月侵門擊柝可憐子無衣何處村時危闗百慮盜賊爾猶存上四夜景下四感時上首聨初夜景色就江上言次聨夜中聞見就山言撃柝無衣皆離亂所致故有盜賊之慨一黄注夕陽漸隠故曰恍惚白霧横拖故曰逶迤有虚字方見落字之妙有一静字方見侵字之妙子杜臆爾猶存爾字新異是深憾語亦是喚醒語老恍兮惚兮梁元帝詩山虚和鐃管賀若弼詩更鼓卧聞風落石臣易重門撃柝而詩無衣無褐鮑照詩時危見節易一致百慮月梁氏編在大厯二年今按詩云殘夜水明樓當是元年西閣作四更平聲山吐月殘夜水明樓塵匣元開鏡風簾自上上聲鈎應平聲疑鶴髪蟾亦戀貂裘斟酌姮音恒一作嫦娥寡天寒柰一作耐九秋上四咏將盡之月下則對月自憐也水四更山吐月乃二十四五之夜月照而光映於樓故曰水明樓月魄留痕如匣邊露鏡此承吐月彎月掛簷如鈎上風簾此承明樓月色臨頭恐兔疑白髪月影隨身如蟾戀裘暖従月色下寫出衰老凄凉之况姮娥獨處而耐秋亦同於已之孤寂矣黄生注對鏡則見髪臨風則增寒五六句亦用分承寡婦孤臣情况如一故借以自比庾信詩四更天欲曙呉均詩疎岑時吐月聊鮑照擬古明鏡塵匣中寳琴生網絲庾信鏡詩玉匣開鏡輕灰暫拭塵枚乗月賦隠圓巖而似鈎西溪叢語沈雲卿月詩臺前疑掛鏡簾外自懸鈎塵匣二句本此又詩既能明似鏡何用曲如鈎獸後漢天文志注載靈憲之言曰月隂精之宗積而成象蛤劉孝綽詩攢柯半玉蟾叢葉映金趙典傳大儀鶴髪庾信竹杖賦鶴髪雞皮娥蘇武書子留斟酌斟酌代為思忖也庾肩吾詩姮隨月落楊慎曰月中嫦娥説始於淮南及張衡靈憲其實因常儀占月而誤也古者羲和占日常儀占月皆官名見於吕氏春秋左傳有常儀靡即常儀氏之後俗訛為嫦娥以儀娥音同耳周禮註儀娥二字古皆音俄易小象失其義也叶信如何也詩樂且有儀叶在彼中阿太𤣥各遵其儀叶不偏不頗漢碑蓼莪皆作蓼儀則嫦娥為常儀之誤無疑阮籍詩如何似九秋梁元帝纂要九秋以九十日言之黄生曰此詩冩景精切布格整宻運意又極玲瓏東坡但以殘夜水明樓五字稱為絶唱其比興之深逺従来未經人道也經又曰疊用鏡鈎蟾姮娥他人且入目生厭矣一公筆顧反耐思由其命意深而出語秀也宗武生日梁氏編在䕫州詩内得之黄鶴因首句何時見遂疑寳應元年公在梓州宗武在成都其實首句不如是解也前至徳二載公陷賊中有詩云驥子好男兒年學語時此時宗武約計五嵗矣其後自乾元二年至蜀及永泰元年去蜀中歴八年宗武約十四嵗左右矣此詩都邑乃指成都其云自從都邑語已伴老夫名則知作此詩又在成都之後矣小子何時見髙秋此日生自從都邑語巳伴一作律老夫名詩是吾家事人傳世上情熟精文選理休覔彩衣輕此以家學朂宗武之小子何時見其生乎此日正其墮地時也起作問答詞都邑語成都之人誇語也公祖審言善詩世情因而傳述故當精文選以紹家學何必為綵衣娯親乎此乃面命之語非遙寄宗武也宋子侯詩髙秋八九月整大戴禮百里而有都邑之顔氏家訓吾家風教素為密吕氏春秋精而熟鬼將告之詩梁昭明太子蕭統在東宫有書三萬巻集古人文詞賦為文選三十巻列女傳老萊子養二親行年七十著五色綵衣戲於親側凋瘵筵初秩欹斜坐不成流霞分一作飛片片一作幾片涓滴就徐傾此叙生日情事斜宗武侍庭故有筵秩凋瘵欹自述老病流霞涓滴思得仙漿以起疾也此章上八句下四句園海賦為凋為瘵詩賔之初筵左右秩秩庾信小賦行欹斜兮得路杯抱朴子項曼都自言到天上遇紫府仙人以流霞一飲之輒不飢渴庾信詩片片紅顔落沉鮑照詩銅溪畫森孔竇夜涓滴第五弟豐獨在江左近三四載上聲寂無消息覔使去聲寄此二首鶴注詩云十年朝夕淚自天寳十五載避亂與諸弟相别至大厯元年為十年當是其時作亂後嗟吾在羇棲見汝難草黄騏驥病沙晚一作曉一作暖鶺鴒寒楚設闗城險吴吞水府寛十年朝夕淚衣袖不曽音層乾音干後此章兄弟别離而致相思之意飄草黄句承亂自憐貧老沙晚句承羇棲傷弟零闗城險巳不能往水府寛弟不可知故乆别悲哀而涕淚常流也顧注詩云十年而題曰三四載盖相别者十年無消息者三四載耳馬䕫峽最險如設闗城三江震澤水府甚寛孔融論之駿者名曰騏驥枚乗傳深壁髙壘副以闗城史記蜀伐楚楚為扞闗以距之後漢郡國志巴郡魚復縣有扞闗海賦爾其水府之内極深之庭聞汝依山寺杭州定越州風塵淹别日江漢失一作共非清秋影著涉畧切啼猿樹魂飄結蜃樓明年下去聲春水東盡白雲求一作遊江次章念弟逺離而致欲訪之意想首聨弟在左次聨身在䕫州五六客䕫而江左七八去䕫而尋江左也杜邵注定越州言不在杭州定在越州風塵指兵戈臆失清秋謂淹别之乆又蹉過一秋矣以趙汸注盡宇正應定字惟傳聞莫定故須盡歴雲水求之顧注古人望白雲而思親公於手足之誼亦然杭唐書杭州餘杭郡越州㑹稽郡俱屬江南西道邵注州即今浙江省治越州今為紹興府在杭州東二百里樹何遜詩凄清江漢秋氣盧照隣巫山髙詩莫辨啼猿史天官書海旁蜃象樓臺廣野氣成宫闕陳蔵器本草車螯是大蛤一名蜃能吐氣為樓臺海中春夏間依約島漵常有此氣聽楊氏歌鶴注從舊次編在大厯元年詩云江城帶素月知在䕫州城中也佳人絶代歌獨立發皓齒滿堂慘不樂音洛響下去聲清虚一作浮雲裏先叙楊氏歌聲雲慘不樂引人悽切也響下清虚猶云響遏行李延年歌北方有佳人絶代而獨立漢楚詞朱唇皓齒阮籍詩時俗薄朱顔誰為發皓齒刑法志滿堂飲酒一人向隅而悲泣則一堂為之不樂於庾信象戲賦仰冲氣清虚江城帶素月况乃清夜起老夫悲暮年壯士淚如水玊杯乆寂寞金管迷宫徵音止勿云聽者疲愚智心盡死次従聽者心上摹冩歌聲獨絶若盧注老壯智愚即滿堂中人聽疲而心欲死所謂慘不樂也者素月清夜聞聲更覺慘悽玉杯停飲金管失諧言聽恍惚神怡矣謝莊月賦素月流天荆曹植詩中夜起長歎垂魏武樂府烈士暮年史記軻為變徴之聲士皆淚涕泣又歌曰風蕭蕭兮易水寒壯士一去兮不復還扣韓非子箕子曰象箸玊杯必不羮菽藿陸機文賦寂寞以求音徵沈約詩金管玉柱響洞房浦嵇康琴賦角羽俱起宫相證江淹詩淵魚猶伏聽者未云疲田子方曰哀莫哀於心死而人死次之古來傑出士一作事豈特一作待一知已吾聞昔秦青傾側一作倒天下耳推開作結以見世有知音也前以佳人起後以傑士收感慨無限此盖翻其語也盧注虞仲翔云得一知已可以不恨此章起結各四句中段八句實寫司馬遷傳士為知已者死女為悦己者容郊列子薛譚學謳於秦青未窮青之技遂辭歸青餞之衢撫節悲歌聲振林木響遏行雲李陵詩側耳逺聽秋風二首鶴注當是大厯元年作盖以廣徳永泰間吐蕃與黨項羌渾奴剌入冦故詩言戰自青羌連白蠻秋風淅淅吹巫山上牢下牢修水闗吳檣楚柂牽百丈暖向成一作神非都寒未還要路何日罷長㦸戰自青羌連白一作百非蠻中巴不得一作曾消息好暝傳戍鼓長雲間此對秋風而傷世亂也在下四句分截向修闗在秋候故託秋風以起興吳檣楚柂由水闗而成都秋寒未還阻於羌蠻之亂也中巴信急而戍鼓聲聞巫山非安處之地矣謝惠連詩淅淅振條風舊注上牢巫峽下牢夷陵十道志三峽口地曰峽州上牢下牢楚蜀分畛舟月令凉風至完隄防成都乃上水故用百丈以牽若神都則是下水矣射唐志光宅元年號東都曰神都晁錯傳勁弩長㦸疏及逺後出師表賨叟青羌散騎武騎一千餘人水經注青衣縣故青衣羌國也縣有䝉山青衣水所發考唐時嘉州本梁青州州有青衣水南唐㑹要東謝蠻在黔州之西數百里北至白蠻唐書蠻傳弄棟蠻白蠻種也其部夲居弄棟縣鄙地後散居磨些江側為方輿記勝華陽國志云劉璋為益州牧以墊江以上巴郡江州至臨江為永寧郡朐䏰至魚復為固陵郡巴遂分矣巴州居其中為中巴雲間言鼓聲之髙秋風淅淅吹我衣東流之外西日微天清一作晴小城擣練急石古細路行人稀不知明月為去聲誰好蚤晚孤㠶他一作也夜歸㑹將白髪倚庭樹故園池臺今是非此對秋風而動歸思也亦四句分截流上章末句已涉暝時故此章皆説暮景杜臆水東日西墮雖即景起咏亦歎年華逝波桑榆景迫鄉搗練急備征衣行人稀蜀道梗也月夜孤㠶方以歸為樂故園是非又以殘毁為憂日蔡琰詩悲風春夏起翩翩吹我衣而再中張正見詩烟崖憩古石呉都賦將轉西謝朓詩徘徊東陌上月出行人稀柯杜臆老倚庭樹若淵明之眄庭而撫孤松胡夏客曰秋風第二首似拗體律詩九日一作登髙諸人集于林此詩梁權道編在大厯元年與九日五首不同時按五首云獨酌此題云諸人集知為兩嵗重九矣鶴曰詩云九日明朝是則此題應云諸人約九日集于林今按集乃公㑹是他人相約而公先作詩以告之盖因老年難于早出故預道其意也若公為主人不應以難早出緩客至之期又末語漫㸔年少樂句亦非要客之詞世説謝安顧謂諸人曰今日可謂彦㑹時既不可留此集固亦難常九日明朝是相要平聲舊俗非老翁難早出賢客幸知歸舊采黄花賸新梳白髪微漫看平聲年少去聲樂忍淚已沾衣上四故鄉之思是對集林言下四衰老之感是對諸人言九日之期明朝猶是而相邀之地舊俗已非盖有懐于樊川故里也矣歸謂歸集林中採花多前有餘興梳髪稀今苦力衰漫看二句乃預言来日事或云九日登髙起於費長房以此日避災乃舊俗之非或云九日之㑹當不速而至必待相邀方集此舊俗之非後兩説與題相反今主王洙之説新梳句暗照孟嘉事秋興去聲八首黄鶴單復俱編在大厯元年詩云叢菊兩開藎自永泰元年秋至雲安大厯元年秋在䕫州是兩見菊開也少吳論秋興者遇秋而遣興也故八首冩秋字意興字意多玊露凋傷楓樹林巫山巫峽氣蕭森江間波浪兼天湧塞上風雲接地隂叢菊兩一作重開他日淚孤舟一繫音計故園心寒衣處處催刀尺白帝城髙急暮砧首章對秋而傷羇旅也峽上四因秋託興下四觸景傷情四王維楨曰江間承塞上承山菊開山際舟繫江中句錯綜相應顧注波浪在地而曰兼天風雲在天而曰接地極言隂晦蕭森之狀朱注公至䕫州經二秋時艤舟以俟出峽故再見菊開仍堕他日之淚而孤舟乍繫輙動故園之心他日言往時故園指樊川杜臆叢菊孤舟目所見刀尺暮砧耳所聞寒顧注催刀尺製新衣急暮砧搗舊衣曰催曰急見禦者有備客子無衣可勝悽絶孤范梈曰作詩實字多則健虚字多則弱如此詩叢菊舟一聨語亦何甞不健李宻感秋詩金風蕩佳節玊露凋晚林樹沈約詩暮節易凋傷巫阮籍詩湛湛長江水上有楓林梁元帝詩巫山峽長水經注江水歴峽東逕新崩灘其下十餘里有大巫山非惟三峽所無乃當抗峯岷峨偕嶺衡疑其間首尾一百六十里謂之巫峽盖因山為名也三峽七百里中兩岸連山畧無闕處自非亭午夜分不見曦月張協詩荒楚鬰蕭森塞虞炎詩三山波浪髙懐莊子道兼於天白陳澤州注上即指䕫州䕫府書詩絶塞烏蠻北帝城樓詩城髙絶塞樓可證蔡琰胡笳塞上黄蒿兮枝枯葉乾庾信詩秋氣風雲髙漢武帝諭淮南王書際天接地舟張協詩輕露棲叢菊虞炎詩方掩故園扉陶潛詞或命巾車或棹孤子夜歌寒衣尚未了王臺卿詩處處動春心信古詩為焦仲卿妻左手持刀尺庾詩秋砧調急節王嗣奭曰秋興八首以第一起興而後章俱發隠衷或起下或承上或互發或遙應總是一篇文字又云首章發興四句便影時事見喪亂凋殘景象後四句乃其悲秋心事此一首便包括後七首而故園心乃畫龍㸃睛處至四章故國思讀者當另着眼易家為國其意甚逺後面四章又包括於其中如人主之荒滛盛衰倚伏景物之繁華人情之佚豫皆能召亂平居思之已非一日今漂泊於此止有頭白低垂而已此中情事不忍明言不能盡言人當自得於言外也黄生曰杜公七律當以秋興為裘領乃公一生心神結聚之所作也八首之中難為軒輊長安一章乃文章之過渡䕫府孤城落日斜每依北一作南斗望京華聽猿實下去聲三聲淚奉使去聲虚隨八月槎楊慎云當作查畫省香爐違伏枕山樓粉堞隠悲笳請㸔平聲石上藤蘿月已映洲前蘆荻花二章言䕫州暮景也依斗在初夜之時㸔月在夜深之候此上下層次亦在四句分截京華不可見徒聽猿聲而悵隨槎曷勝悽楚以故伏枕聞笳卧不能寐起視月色於洲前耳陳澤州注杜詩白帝在東䕫府在西墮杜臆京華即故園所在望而不見奚能不悲聽猿淚身歴始覺其真故曰實下孤舟長繫有似乗槎不返故曰虛隨後香爐直省卧病逺違堞對山樓悲笳隠動皆冩日落情景蘿間之月忽映洲花不覺良宵又度矣貞聽猿悲笳俱言暮景八句蘆荻㸃還秋景舊唐書觀十四年䕫州為都督府督歸䕫忠萬涪渝南七州趙王褒詩秋色照孤城直梁元帝詩西山落日斜按蔡兩注俱云秦城上北斗長安在䕫州之北故瞻依北斗而望之或引長安城北為北斗形者非是陳澤州注唐人多用北斗如平臨北斗之類公詩多用北斗如秦城北斗邊之類知郭璞詩京華遊俠窟伏挺詩聽猿方忖岫聞瀨始川水經注每至晴初霜旦林寒澗肅常有髙猿長嘯屬引凄異空谷傳響哀轉乆絶故漁者歌曰巴東三峽巫峽長猿鳴三聲淚沾裳蕭銓詩别有三聲淚沾裳竟不窮徐增注本是聽猿三聲實下淚拘於聲律故為實下三聲淚李陵書丁年奉使皓首而歸失博物志近有人居海渚者年年八月有浮槎去来不期人有竒志乗槎而去十餘年至一處有城郭狀宫中有織婦見一丈夫牽牛渚次飲之因問此是何處答曰訪嚴君平則知之因還至蜀問君平曰某年某月有客星犯牽牛宿計其年月正是此人到天河時又荆楚嵗時記載漢武帝令張騫使大夏尋河源騫乗槎經月而至一處下文所云與博物志同今按嚴武為節度使公曾入幕㕘謀故有奉使虛隨句八月槎用嚴君平在蜀事奉使㕘用張騫出使事塗沈佺期詩累年同畫省漢官儀尚書省中皆以胡粉壁紫青界之畫古列士重行書贊尚書郎更直於建禮門内臺給青縑白綾被或錦被幃帳茵褥通中枕女侍史二人皆選端正執香爐燒薰従入臺中䕶衣服詩詩輾轉伏枕張璁曰山樓即所寓西閣也孔徳紹雲葉掩山樓江邵注城上女墻飾以堊土故曰粉堞梁簡文帝詩平含粉堞魏文帝與吳質書悲笳㣲吟顧注胡人巻蘆葉而吹之謂之笳簫似觱篥而無孔啼鮑博士聨句彷彿藤蘿月繽紛篁霧隂樂府烏夜巴陵三江口蘆荻齊如麻未徐渭以藤蘿蘆荻分夏秋合唐人七律多在四句分截杜詩於此法更嚴張性演義拈䕫府京華作主以聽猿山樓應䕫府以奉使畫省應京華逐層分頂説似整齊然未知杜律章法而𤨏𤨏配合全非作者本意後面長安蓬萊昆明昆吾四章舊注各従六句分段俱未合格今照四句截界方見章法也千家山郭静朝暉日日吕東萊選本作百處江樓坐翠微信宿漁人還汎汎清秋燕子故飛飛匡衡抗疏去聲功名薄劉向傳經心事違同學少去聲年多不賤五陵衣馬自輕肥三章言䕫州朝景樓上四咏景下四感懐燕秋髙氣清故朝暉冷静山遶前故坐對翠㣲漁人子即所見以况已之淹留愁杜臆舟泛燕飛此人情物性之常旅人視之偏覺增曰還曰故厭之也邵注公常論救房琯忤㫖幾被戮辱此功名不若衡也公嘗待制集賢院試後送隷有司此傳經不如向也逺注匡衡抗疏劉向傳經上四字一讀功名薄心事違屬公自慨末顧注同學少年不過志在輕肥見無闗於輕重也句五陵起下長安機拾遺記千家萬戸之書詩謝朓詩還望青山郭陸詩扶桑升朝暉庾信石岸似江樓爾雅疏山氣青縹色曰翠㣲凡山逺望則翠近之則翠漸㣲詩于汝信宿注再宿曰信徐訪詩漁人迷舊浦盡詩汎汎揚舟還殷仲文詩獨有清秋日能使髙興古詩秋去春雙燕子文昌雜録燕子至秋杜乃去仲春復来故謝靈運詩飛飛燕弄聲作以故對還是依舊之詞非意之謂或引子規詩故傍人低未合得匡衡傳元帝初即位有日食地震之變上問以政治失衡數上疏陳便宜上悦其言遷衡為光禄大夫太子少傅薄解嘲獨可抗疏時道是非詔陸機長歌行但恨功名前漢劉向傳成帝即位向領校中五經秘書河平中子歆受詔與父領校秘書哀帝時歆復領五經卒父前業劉歆責太常書考學官傳經周𢎞正詩既傷年緒促復嗟心事違謂黄生注衡向皆歴事兩朝故借以自比同學少年小時同學之軰列女傳孟宗少遊學與同學共處安鮑照詩憶昔少年時西都賦北眺五陵注云長陵陵陽陵茂陵平陵也顧注漢徙豪傑名家於諸陵故五陵為豪俠所聚所范雲詩儐従皆珠玳裘馬悉輕肥曰自輕肥見非已闗心朱鶴齡曰前三章俱主䕫州後五章乃及長安事五澤州陳冢宰廷敬曰前三章詳䕫州而畧長安後章詳長安而畧䕫州次第秩然聞道去聲長安似奕棋百年世事不勝平聲一作堪悲王侯第宅皆新主文武衣冠異昔時直北闗山金鼓震一作振征西車馬一作騎羽書馳一作遲非魚龍寂寞秋江冷故國平居有所思四章囘憶長安歎其洊經喪亂也國上四傷朝局之變遷下是憂邊境之侵逼故有思又起下四章負杜臆長安一破於禄山再䧟於吐蕃如奕棋迭為勝即此百年中而世事有不勝悲者百年謂開國至今官邵注王侯之家委棄奔竄第宅易為新主矣文武之僥倖濫進衣冠非復舊時矣北憂回紇西患吐蕃事在廣徳永泰間或指安史餘孽為北冦者非顧注有所思従寂寞来故國平居之事當秋江寂寞而歴厯堪思也秋江二字㸃秋興意國杜臆思故國平居并思其致亂之由易故園心為故思者見孤舟所繫之心為國非為家也其意加切矣乎左傳太叔文子曰今甯子視君不如奕棋其何以免金浚明曰自髙祖開國至大厯之初為百年左傳辛有曰不及百年其為戎乎李陵答蘇武書世事謬矣世説王戎悲不自勝郭古詩王侯多第宅中後漢書傳贊上方欲用文武泰傳衣冠諸儒唐宗授楊再思制衣冠舊齒衣冠指縉紳望族恩陳澤州注廣徳元年吐蕃入㓂陷長安二年僕固懐引回紇吐蕃入冦又吐蕃冦醴泉奉天党項羌冦同州渾奴剌冦盩厔是時西北多事故金鼔震而羽書馳或謂吐蕃入長安時徵天下兵莫至故曰羽書遲非也北陳又云公詩愁㸔直北是長安指䕫州之北此云直闗山金鼓震指長安之北封禪書因其直北立五帝壇亭樂府有度闗山曲鼔晉書劉琨傳金鼔振於河曲崔伯詩戎馬鳴兮金震後漢書馮異拜征西大將軍書韓非子車馬不疲弊於逺方楚漢春秋黥布反羽至前漢息夫躬傳軍書交馳而輻凑羽檄重跡而狎至以水經注魚龍以秋日為夜龍秋分而降蟄寢於淵故秋為夜也楚辭野寂寞其無人地吳筠詩風起秋江上時桑𢎞羊請田輪臺奏皆故國阮籍詩念我平居又登髙有所思黄生曰下四章皆故國事特詳言之以舒其悲感耳或謂寓譏明皇神仙游宴武功之事是猶其人方痛哭流涕而誣其嬉笑怒罵豈情也哉蓬萊髙舊作宫别作仙闕對南山承露金莖霄漢間西望瑤池降王母東来紫氣滿函闗雲移雉尾開宫扇日繞龍鱗識聖顔一卧滄江驚嵗晚幾回青𤨏㸃一作照非朝音潮班五章思長安宫闕歎朝宁之乆違也前上四記殿前之景下四溯入朝之事宫在龍首岡對南山西眺瑤池東瞰函闗極言氣象之巍峩軒敞而當時崇奉神仙之意則見於言外趙大綱曰雉扇數開望之如雲也龍顔日映就之如日也宗陳澤州注此詩前六句是明皇時事一卧滄江是代時事青𤨏朝班是肅宗時事前言天寳之盛陡然截住陡接末聨他人為此中間當有幾許繁絮矣卧滄江病䕫州驚嵗晚感秋深幾回青𤨏言立朝止㡬度也年此章用對結末兩章亦然望唐㑹要大明宫龍朔三號曰蓬萊宫北據髙原南爽塏每天晴日朗南望終南山如指掌京城坊市街陌如在檻内雍録自丹鳯門北則有舍无殿又北則有宣政殿又北則有紫宸殿三殿南北相㳫皆在山上至紫宸又北而為蓬萊則山勢盡矣豐存禮云宫闕舊本作仙闕為是與下文宫扇不犯重杜臆従之今按宫當作髙盖字近而訛耳陸機洛記髙闕十二間班婕妤賦登薄軀於宫闕兮銅班固西都賦抗仙掌以承露擢雙立之金莖注金莖柱也陳澤州注漢武承露銅柱在建章宫西建章宫在長安城外西北隅唐東内在京城東北不聞有承露盤事此盖言唐開寳宫闕之盛又以明皇好道故以蓬萊承露瑤池紫氣連類言之不必實有金莖劇談録含元殿國初建造仰觀玉座如在霄漢西陳注唐公主如金仙玉真之類多為道士築觀京師望瑤池盖言道觀之盛唐㑹要太清宫薦享聖祖𤣥元皇帝奏混成紫極之樂東来紫氣盖言太清之尊與上宫闕一類或以瑤池王母喻貴妃之冊為太真紫氣函闗譏𤣥元之降於永昌如此説是追數先皇之失非迴憶前朝之盛矣張衡四愁詩側身西望涕霑裳觴列子周穆王肆意逺遊升崑崙之丘遂賓於西王母於瑤池之上漢武内傳七月七日上齋居承華殿忽青鳥從西来集殿前上問東方朔朔曰此西王母欲来也闗尹内傳闗令尹喜常登樓望見東極有紫氣西邁曰應有聖人經過京邑乃齋戒其日果見老君乗青牛車来過隂鏗詩雲移蓮勢出儀衛志唐制有雉尾障扇崔豹古今注雉尾扇起於殷世髙宗時有雉雊之祥服章多用翟羽緝雉羽以為扇以障翳風塵朱注云唐㑹要開元中蕭嵩奏每月朔望皇帝受朝於宣政殿宸儀肅穆升降俯仰衆人不合得而見之請備羽扇上將出扇合坐定乃去扇唯宸儀不欲令人見故必俟扇開日繞始得望見聖顔雲移狀障扇之兩開龍鱗謂衮衣之龍章燿陳注史稱明皇儀範偉麗有非常之表子虚賦照龍鱗世説諸葛靚曰今日復覩聖顔此一卧滄江本謝安髙卧東山詩任昉詩滄江路窮鮑照詩沉吟芳嵗晚范雲幾回明月夜飛夢到江邊用青𤨏宫中門名注别見葩樓鑰曰㸃與玷同古詩多之束晳補亡詩鮮侔晨莫之㸃辱左思二唐兄弟贊二唐潔已乃㸃乃汚陸厥答内兄希叔詩既叨金馬署復㸃銅龍門沈約奏彈王源㸃世家聲將被比屋子美正承諸賢用字例也盖焦竑云王建詩殿前傳㸃各依班召對西来入詔蠻唐人屢用之亦可證杜詩之不音玷矣珪沈約奏弹孔稚珪文正臣稚歴奉朝班盧徳水疑上四用宫殿字太多五六似早朝詩語今按賦長安景事自當以宫殿為首所謂不覩皇居壯安知天子尊也公以布衣召見感荷主知故追憶入朝覲君之事没齒不忘若必全首俱説秋景則筆下有秋意中無興矣母此章下六句俱用一虛字二實字於句尾如降王滿函闗開宫扇識聖顔驚嵗晚㸃朝班句法相似未免犯上尾疊足之病矣瞿唐峽口曲江頭萬里風煙接素秋花萼夾城通御氣芙蓉小苑入邊愁珠簾繡柱圍黄鵠一作鶴錦纜牙檣起白鷗回首可憐歌舞地秦中自古帝王州六章思長安曲江歎當時之逰幸也懸上四敘致亂之由下四傷盛時難再之瞿峽曲江地萬里而風煙遙接同一蕭森矣長安亂起自明皇故追叙昔年遊幸始末召杜臆城通御氣前則敦倫勤政苑入邊愁後則耽樂憂見一人之身而理亂頓殊也因想邊愁未入之先江上離宮珠簾圍鵠江間畫舫錦纜驚鷗曲江歌舞之塲迴首失之豈不可憐然秦中自古建都之地王氣猶存安知今日之亂不轉為他日之治乎顧注宫殿宻而黄鵠之舉若圍舟楫多而白鷗之遊忽起此皆實景舊云柱帷繡作黄鵠文者非陳澤州注曲江與樂遊園杏園慈恩寺等相近地本秦漢遺跡唐開元中疏鑿更為勝境故有末二句帝王州又起下漢武帝方輿勝覽瞿塘峽在䕫州東一里舊名西陵峽乃三峽之門陸機辨亡論謹守峽江口劇談録曲江池塘開元中疏鑿為勝境花卉環周烟水明媚都人遊賞盛於中和上已節劉餗小説園本古曲江文帝惡其名曲改名芙蓉為其水盛而芙蓉富也方韋鼎詩萬里風烟異唐劉琨詩繁英落素秋注秋西白色故曰素秋舊書南内曰興慶宫宫西南隅有花蕚相輝勤政務本之樓開元二十六年六月遣范安及於長安廣花蕚樓築夾城至芙蓉苑長安志開元二十年築夾城入芙蓉園自大明宮夾羅城複道經通化門以達南内興慶宮次經明春延喜門至曲江芙蓉園而外人不之知也蓉張正見詩御氣響鈞天小苑指冝春苑一統志芙苑即秦冝春苑地漢書蕭望之傳署小苑東門候庾信詩停車小苑外昭漢蘇子卿詩故鄉夢中近邊愁酒上寛西京雜記陽殿織珠為簾黄裴子野詩流雲飄繡柱作西京雜記昭帝始元元年鵠下建章太液池中帝歌庾信詩錦纜迴砂磧如哀江南賦鐵軸牙檣古詩象牙作㠶檣埤蒼檣尾鋭牙也何遜詩可憐雙白鷗朝夕水上遊自王粲七哀詩南登灞陵岸回首望長安一庾信詩正古束歌舞地史記劉敬傳輕騎一日夜可至秦中曰謝朓詩江南佳麗地金陵帝王州秦紀衛鞅説孝公秦據河山之固東向以制諸侯此帝王之業也澤州陳廷敬曰此承上章先宫殿而後池苑也下繼昆明二章先内苑而及城外也上下四章皆前六句長安後二句䕫州此章在中間首句從瞿唐引端下六則專言長安事俱見章法變化昆明池水漢時功武帝旌旗在眼中織女機絲虚夜月一作月夜石鯨鱗甲動秋風波漂菰米沉雲黑露冷蓮房墜粉紅闗塞極天唯鳥道江湖滿地一漁翁七章思長安昆明池而歎景物之逺離也池織女二句記池景之壯麗承上眼中来波漂二句想景之蒼凉轉下闗塞去於四句分截方見曲折生動分舊説將中四句作傷感其衰杜臆作追遡其盛此獨出一盛一衰何也曰織女鯨魚亘古不移而菰米蓮房逢秋零落故以興已之漂流衰謝耳穿昆明以習水戰其跡起於武帝此云旌旗在眼是借漢言唐若逺談漢事豈可云在眼中乎公寄岳州賈司馬詩無復雲䑓仗虛修水戰船則知明皇曾置船於此矣之身阻鳥道而迹比漁翁以見還京無期不復覩王居盛也陳澤州注闗塞即塞上風雲江即江間波浪帶言湖者地勢接近將赴荆南也公詩天入滄浪一釣舟獨把釣竿終逺去皆以漁翁自比漢書元狩三年發謫吏穿昆明池臣瓚曰西南夷傳越巂昆明國有滇池方三百里漢使求通身毒國為昆明所閉欲伐之故作昆明池象之以習水戰在長安西南週迴四十里虞茂詩昆明池在長安縣西二十里虞荗詩昆明池水秋色明幟史記平凖書武帝大修昆明池治樓船髙十餘丈旗加其上甚壯西京雜記昆明池中有戈船樓船各數百艘樓船上建樓櫓戈船上建戈矛四角垂幡旄旌葆麾盖照灼涯涘家語旌旗繽紛徐陵詩宻意眼中来牽牛織女曹毗志怪昆明池作二石人東西相望象晉夏歌晝夜理機絲虚夜動秋静與動對首西京雜記昆明池刻玉石為鯨魚每至雷雨常鳴吼尾皆動劉孝威詩雷奔石鯨動水濶牽牛遙蔡邕漢律賦鱗甲育其萬物黑陳琳檄隨波漂流實本草圖經菰即茭白其䑓中有者謂之茭鬱後結彫菰米也庾府吾詩黑米生菰葑青花出稻苗也趙次公曰沉雲黑言菰米之多一望黯黯如雲之黑鮑照詩沉雲日夕昏蔡邕月令章句隂者宻雲也沉者雲之重也沉雲意本此王褒詩塞近邊雲黑陶潛詩昔為三春蕖今作秋蓮房鉛庾肩吾詩秋樹翻紅葉寒池墜黑蓮徐孝伯詩詎識粉紅邵注蓮初結子花蒂褪落故墜粉紅極庾肩吾詩輦道同闗塞道孔叢子世人言髙者必以天為稱南中八志鳥四百里以其險絶獸猶無蹊特上有飛鳥之道耳地列子身在江湖之中隋望江南曲遊子不歸生滿傅𤣥詩渭濱漁釣翁乃為周所諮楊慎曰隋任希古昆明池應制詩回跳牽牛渚激賞鏤鯨川便見太平宴樂氣象今一變云織女機絲虛夜月石鯨鱗甲動秋風讀之則荒烟野草之悲見於言外矣西京雜記太液池中有彫菰紫籜緑節鳬雛雁子唼喋其問三輔黄圖云宫人泛舟採蓮為巴人櫂歌便見人物遊戱宫沼富貴今一變云波漂菰米沉雲黑露冷蓮房墜粉紅讀之則兵戈亂離之狀俱見矣杜詩之妙在能翻古語千家注無有引此者因悟杜詩之妙如此米按王嗣奭云織女鯨魚鋪張偉麗壯千載之觀菰蓮房物産豐饒溥萬民之利此本追遡盛事也對范季隨陵陽室中語曰少陵七律詩卒章有時而然語意皆收結之詞今人學之於詩尾作一景聨一篇之意無所歸宿非詩法也昆吾御宿自逶迤一夲首句在漢陂之下紫閣峰隂入渼陂香稻草堂本作紅豆一作紅稻一作紅飯啄殘一作餘鸚鵡粒碧梧棲老鳯凰枝佳人拾翠春相問仙侣同舟晚更移綵筆昔曾音層一作遊干氣象白頭今張氏作今舊作吟望苦低垂八章思長安勝境遡舊遊而嘆衰老也之香稻二句記秋景之景連屬上文佳人二句憶尋春興引起下意仍在四句分截演義公自長安遊渼陂必道經昆吾御宿及至則見紫閣峯隂入於渼陂所謂半陂以南純浸山者是也唐解趙注以香稻一聨為倒裝法詩意本謂香稻則鸚鵡啄餘之粒碧梧乃鳯凰棲老之枝盖舉鸚鳯以形容二物之美非實事也若云鸚鵡啄餘香稻粒鳯凰棲老碧梧枝則實有鳯凰鸚鵡矣陳澤州注香稻碧梧屬昆吾御宿拾翠同舟屬渼陂公城西泛舟詩青蛾皓齒在樓船横笛短簫悲逺天所謂佳人拾翠春相問也又與岑參兄弟遊渼陂行船舷暝戛雲際寺水面月出闌田闗所謂仙侣同舟晚更移也春相問彼此問遺也晚更移移棹忘歸也山張綖注氣象指山水之氣象干者言綵筆所作氣凌水也即指渼陂行及城西泛舟等篇言朱注此句當與題鄭監胡亭賦詩分氣象參㸔今張逺注此詩末聨與上章末聨皆屬對結體昔曾對望意本明白舊作吟望乃字訛耳不陳注又云此望字與望京華相應既望而又低垂并能望矣筆干氣象昔何其壯頭白低垂今何其悲詩至此聲淚俱盡故遂終焉南杜臆此章所思不專在渼陂考名勝志御宿昆吾傍山而西皆武帝所開上林苑方三百里其故基跨今盩厔鄠藍田咸寧長安五縣之境而渼陂在鄠昆吾御宿皆在上林苑中曰逶迤則延袤廣矣羽獵賦序武帝廣開上林東南至宜春鼎湖御宿昆吾金注御宿以武帝宿此得名長安志昆吾亭在藍田縣境御宿川在萬年縣西南四十里四皓歌漠漠髙山深谷逶迤逶迤回逺貌通志紫閣峯在圭峰東旭日射之爛然而紫其形上聳若樓閣然張禮遊城南記圭峰紫閣在終南山寺之西一統志紫閣峯在鄠縣東南三十里句陳注公與鄠縣源大少府宴渼陂詩有飯抄雲子白註者謂雲子碎雲母以擬飯之白南都賦香稻鮮魚鴞徐彦伯詩巢君碧梧樹山海經黄山有鳥其狀如人舌能言名曰鸚鵡集鄭𤣥詩箋鳯凰之性非梧桐不棲説苑黄帝即位鳯東囿棲碧梧樹終身不去楚詞唯佳人之獨懐人曹植洛神賦或採明珠或拾翠羽費昶詩芳郊拾翠迴袖捲芳春夢弼注相問乃詩人雜珮以問之之意前漢婁敬傳數問遺顔注問遺謂餉饋之也遺去聲周王褒詩仙侣自招携後漢書李􅈾與郭泰同舟而濟衆賓望之以為神仙多南史江淹嘗宿冶亭夢郭璞謂曰吾有綵筆在卿處年可以見還乃探懐中得五色筆以授之嗣後有詩絶無美句時人謂之才盡馬江淹麗色賦非氣象之可譬漢古詩令我白頭司相如美人賦黼帳低垂吳渭潛齋曰詩有六義興居其一凢隂陽寒暑草木鳥獸山川風景得於適然之感而為詩者皆興也風雅多起興而楚騷多賦比漢魏至唐傑然如老杜秋興八首深詣詩人閫奥興之入律者宗焉張綖曰秋興八首皆雄渾豐麗沉着痛快其有感於長安者但極摹其盛而所感自寓於中徐而味之則凡懐鄉戀闕之情慨往傷今之意與夫外夷亂華小人病國風俗之非舊盛衰之相尋所謂不勝其悲者固已不出乎意言之表矣卓哉一家之言夐然百世之上此杜子所以為詩人之宗仰也陳繼儒曰雲霞滿空回翔萬狀天風吹海怒濤飛湧可喻老杜秋興諸篇郝敬曰秋興八首富麗之詞沉渾之氣力扛九鼎勇奪三軍真大方家如㭬之筆王元美謂其藻繡太過肌膚太肥造語牽率而情不接結響奏合而意未調如此諸篇往往有之由其材大而氣厚格髙而聲𢎞如萬石之鐘不能為喁喁細聲河流萬里那得不千里一曲子美之於詩兼綜條貫非單絲獨竹一戞一擊可以論宫商者也又曰八首聲韻雅暢詞采髙華氣象冠冕是真足虎視詞壇獨步一世不澤州陳冢宰廷敬曰秋興八首命意鍊句之妙自必言即以章法論分之如駭雞之犀四面皆見合之如常山之陣首尾互應前人皆云李如史記杜如漢書子獨謂不然杜合子長孟堅為一手者也詠懷古跡五首鶴注此當是大厯元年䕫州作句杜臆五首各一古跡首章前六是發已懐亦五章之總冒其古跡則庾信宅也宅在荆州公未到荆而將有江陵之行流寓等於庾信故詠懐而先及之然五詩皆借古跡以見已懐非專詠古跡也又云懐庾信宋玉以斯文為已任也懐先主武侯歎君臣際㑹之難逢也中間昭君一章盖入宫見妬與入朝見妬者千古有同感焉支離東北風塵際漂泊西南天地間三峽樓臺淹日月五溪衣服共雲山羯胡事主終無賴詞客哀時且未還庾信生平最蕭瑟暮年詩賦動江闗首章詠懐以庾信自方也上四漂泊景况下四漂泊感懐雲公避禄山之亂故自東北而西南淹日月乆留也共山雜處也五六賓主雙闗盖禄山叛唐猶侯景叛梁公思故國猶信哀江南末應詞客哀時後四章皆依年代為先後首章拈庾信従自敘帶言之耳或因信曽居江陵宋玉故宅遂通首指信按子山自梁使周被留不返三峽五溪踪跡未到不當傳㑹離莊子夫支離其形者猶足以養其身全其天年注支形體不全之貌此詩作流離之意蜀志許靖傳漂泊風波絶糧茹草邁顧注東北純是風塵西南尚留天地下字皆不茍吴逺詩西南窮天險東北畢地闗塘鶴曰峽程記三峽謂明月峽巫山峽廣澤峽其有瞿灔澦燕子屏風之類皆不在三峽之數此云三峽盖指巫山為第三峽非兼明月廣澤而言下章蜀主幸三峽亦同此義杜臆樓䑓指西閣言蕭懿詩樓䑓自相隠髙後漢南蠻傳武陵五溪蠻皆槃瓠之後槃瓠犬也得辛氏少女生六男六女織績衣皮好五色衣服敘州圖經五溪諸蠻遥接益州西郡故先主伐呉使馬良招五溪諸蠻授以官爵水經注武陵有五溪謂雄溪樠溪酉溪沅溪辰溪也在今湖廣辰州界路左傳飲食衣服不與華同蔡琰詩雲山萬里兮歸遐史記注江湖間謂小兒多狡猾為無賴江庾信詩信在周雖位望通顯常有鄉闗之思乃作哀南賦以致其意其辭曰信年始二毛即逢喪亂藐是亂離至於没齒燕歌遠别悲不自勝楚老相逢泣將何及又云將軍一去大樹飄零壯士不還寒風蕭瑟提挈老㓜闗河累年又傷心賦對玉闗而羇旅坐長河而暮年末二句即用其賦語漢庾信初在江南江闗正其地也後書岑彭破荆門長驅入江闗搖落深知宋玉一作為主悲風流儒雅亦吾師悵望千秋一灑淚蕭條異代不同時江山故宅空文藻雲雨荒臺豈夢思最是楚宫俱泯滅舟人指㸃到今疑此懐宋玉宅也亦四句分截言古人不可復作而文采終能傳世宅望而灑淚恨不同時也二句乃流對杜臆玉之故已亡而文傳後世其所賦陽臺之事本託夢思以諷君至今楚宫乆没而舟人過此尚有行雲行雨之疑總因文藻所留足以感動後人耳風流儒雅真足為師矣可一説宋宅雖亡其文藻猶存若楚宫泯滅指㸃一無慿矣然則富貴而名湮没者烏足與詞人爭千古哉此作言外感慨之詞亦見姿致黄生曰前半懐宋玉所以悼屈原悼屈原者所以自悼也後半抑楚王所以揚宋玉揚宋玉者亦所以自揚也是之謂詠懐古跡也此詩起二句失粘衰宋玉九辨悲哉秋之為氣也蕭瑟兮草木搖落而變廋信枯樹賦殷仲文風流儒雅海内知名邵注風流言其標格儒雅言其文學莊宋玉以屈原為師杜公又以宋玉為師故曰亦吾師子吾師乎謝朓詩寒烟悵望心亡曹植詩灑淚滿褘抱歎李陵書悲風蕭條蕭條歎人也太白懐張子房詩息此人去蕭條徐泗空朕謝靈運詩異代可同調如子虚賦曰獨不得與此人同時哉漢武帝讀相陶潛詩江山豈不險言楚辭爾何懐乎故宅趙曰歸州荆州皆有宋玉宅此歸州宅也曹植論眈思乎文藻之場圃宋玉髙唐賦昔先王嘗遊髙唐夢見一婦人王因幸之去而辭曰妾在巫山之陽髙丘之岨旦為行雲暮為行雨朝朝暮暮陽臺之下與謝朓詩歸夢相思夕王豈夢思言本無此夢俱泯滅故宅俱亡矣世説大將軍云最是臣少所知拔王寰宇記楚宫在巫山縣西二百步陽臺古城内即襄所遊之地陽雲臺髙一百二十丈南枕長江民張正見詩忽聽晨雞曙非復楚宫歌鍾㑹檄文生之命幾於泯滅抱朴子莫不指㸃之數宋玉釣賦歴載百到今不廢按漢書注宋玊作賦盖假設其事諷諫滛惑也張綖云賦稱先王夢神女盖以懐王之亡國警襄王也朱注云豈夢思明其為子虚亡是之説夢顧宸曰宋玉述懐王夢神女作髙唐賦又自述已作神女賦本託諷諫襄王耳國風以闗雎為思賢離騷比湘妃於無君玉玉之兩賦正合此㫖李義山詩云襄王枕上原夢莫枉陽臺一片雲是也後人皆云襄王夢神女只非矣文選刻本沿訛已乆王玉二字互混到底今改正數字文義自明使玉賦髙唐之事其夜玉寢夢與神女遇其狀甚麗玉異之明日以白王王曰其夢若何玉對云云王曰狀如何也玉曰茂矣美矣云云王曰若此甚矣試為寡人賦之今按必如修逺説於王曰甚矣句方有着落其賦中王覽其狀亦當改作玉覽其狀又尾末所云顛倒失據惆悵垂涕者亦屬自述語不似代王賦夢之詞羣山萬壑赴荆門生長子兩切明妃陳注明字犯重據負薪行作昭君村尚有村一去紫臺連朔漠獨留青塜向黄昏畫圖省蘇梗切識春風面環珮空歸夜月魂千載上聲一作嵗琵琶作胡語分明怨一作愁恨曲中論平聲遺此懐昭君村也詞上四記敘事下乃傷弔之生長名邦而殁身塞外此足該舉明妃始末五六承上作轉語言生前未經識靣則殁後魂歸亦徒然耳唯有琵琶冩意千載留恨而已處朱瀚曰起處見鍾靈毓秀而出佳人有幾許珍惜結言託身絶域而作胡語含許多悲憤曲中訢論正指昭君怨詩不作後人詞曲虞黄生曰怨恨者怨已之逺嫁恨漢之無恩也陶開曰此詩風流搖曵杜詩之極有韻致者滿羣山世説千巖競秀萬壑爭流鮑照舞鶴賦雪漢書注文穎曰昭君本蜀郡秭歸人也漢書王嬙字昭君石崇明君詞序明君本昭君觸晉文帝諱改焉一統志昭君村在荆州府歸州東北四十里紫薛道衡詩一去無消息王别賦明君去時仰天太息臺稍逺闗山無極望君兮何期終蕪絶兮異域李善注紫臺即紫宫也邵注漢宫名朱瀚曰此詩連字即無極意青塜句即蕪絶意謝惠連雪賦朔漠飛沙爾雅朔北方也説文漠北方流沙也歸州圖經邊地多白草昭君塚獨青鄉人思之為立廟香溪一統志昭君墓在古豐州西六十里父琴操昭君有子曰世違單于死世違繼立凢為胡者死妻母昭君問世違曰汝為漢也為胡也世違曰欲為胡耳昭君乃吞藥自殺淮南子日至虞淵是謂黄昏莊子宋元君將畫圖宫西京雜記元帝後宫既多使畫工圖形按圖召幸之人皆賂畫工昭君自恃其貌獨不與乃惡圖之遂不得見後匈奴來朝求美人為閼氏上以昭君行及去召見貌為後宫第一帝悔之窮按其事畫工毛延夀棄市江瀚曰省乃省約之省言但於畫圖中畧識其靣也總和東宮故妃詩猶憶窺牕處還如解佩時若今歸就月照見不須疑瀚曰環珮句乃總括其語史記南子環珮玉聲璆然漢章帝語想望歸魂於沙漠之表變庾信昭君詞胡風入骨冷夜月照心明方調琴上曲入胡笳聲瀚曰琵琶句乃融化其語琶釋名琵琶本邊人馬上所鼔也推於前曰琵引却曰石崇明君詞序昔公主嫁烏孫令琵琶馬上作樂以慰其道路之思其送明君亦必爾也其造新曲多哀怨之聲琴操昭君在外恨帝始不見遇乃作怨思之歌後人名為昭君怨桑昭君怨詩云秋木凄凄其葉萎黄有鳥處山集於苞養育毛羽形容生光既得升雲上遊曲房離宫絶曠身體摧蔵志念抑沉不得頡頏雖得委食心有徊徨我獨伊何来往變常翩翩之燕逺集西羌髙山峩峨河水泱泱父兮母兮道路悠長嗚呼哀哉憂心惻傷史記始皇紀貴賤分明前漢郊祀志天下怨恨曲庾信詩終是中啼韓子蒼昭君圖敘漢書竟寧元年呼韓邪来朝言願壻漢氏元帝以後宫良家子王昭君字嬙妃之生一子株累立復妻之生二女至范氏書始言入宫乆不見御積怨因掖庭令請行單于臨辭大㑹昭君豐容靚飾顧影裵徊竦動左右帝驚悔欲復留而重失信外夷然范不言呼韓邪願壻而言四五宫女又言字昭君生二子與前書皆不合其言不願妻其子而詔使從胡俗此自烏孫公主非昭君也西京雜記又言元帝使畫工圖宫人皆賂畫工而昭君獨不賂乃惡圖之既行遂按誅毛延壽琴操又言本齊國王穰女端正閑麗未嘗窺看門戸穰以其有異人求之不與年十七進之帝以地逺不幸欲賜單于美人嬙對使者越席請往後不願妻其子吞藥而卒盖其事雜出無所考證自信史尚不同况傳記乎要之琴操最牴牾矣按昭君南郡人今秭歸縣有昭君村村人生女必灼艾炙其靣慮以色選故也張綖曰代宗嘗以僕固懐恩之女號崇徽公主下嫁回紇歐陽公詠其手痕云故鄉飛鳥尚啁啾何况悲笳出塞愁青塚埋魂知不返翠崖遺跡為誰留玊顔自古為身累肉食何人與國謀行路至今空嘆息巖花野草自春秋朱文公謂玉顔肉食一聯以詩言之第一等詩以議論言之第一等議論文公盖亦感傷時事故有契於歐公之作耳敘錢塘瞿佑詩話詩人詠昭君者多矣大篇短章率其離别怨恨而已唯白樂天云漢使却回慿寄語黄金何日贖蛾睂君王若問妾顔色莫道不如宫裏時此不言怨恨而惓惓舊主之思過人逺甚蜀當作漢主窺顧少冶政作征呉幸三峽崩年亦在永安宫翠華想像空一作寒山裏玊殿虚無野寺中古廟杉松巢水鶴嵗時伏臘走村翁武侯祠屋長一作常隣近一體君臣祭祀同此懐先主廟也遡上四記永安遺跡下四敘廟中景事幸峽崩年廟祀之由君臣同祭見餘澤未泯秋盧注曰幸曰崩曰翠華曰玉殿尊昭烈為正統若春之筆首稱蜀主因舊號耳後篇又稱漢祚其帝蜀可見矣顧今按若論書法當云漢主征吳幸三峽尤見正大注巢水鶴見廟之乆走村翁見祭之勤又曰出師表宫中府中俱為一體言平日抱一體之誠千秋享一體之報朱瀚曰先主崩於白帝城其立廟宜也武侯祠自在沔陽而此處亦為立祠實以君臣一體之故陪享正合典禮見後主不允臣民之請為闕失矣寰宇記先主改魚復為永安仍於州之西七里别置永安宫梁簡文帝蜀道篇建平督郵道魚復永安宫楚辭思故舊以想像兮寂原注殿今為卧龍寺廟在宫東謝莊送神歌璇庭玉殿虚上林賦乗虚無與神俱子西京雜記髙松植巘應瑒靈河賦長杉峻檟終抱朴千嵗之鶴隨時而鳴能登於木其未千嵗者不能集於樹上春秋繁露白鶴知夜半注鶴水鳥也夜半水伍感其生氣則益喜而鳴楊惲報孫㑹宗書田家作苦嵗時伏臘烹羊炮羔斗酒自勞為内宫外殿君廟臣祠有次第王褒四子講徳論君元首臣為股肱明其一體相待而成諸葛大名垂宇宙宗臣遺像肅清髙三分割據紆籌䇿萬古雲霄一羽毛伯仲之間見伊吕指揮若定失蕭曹運一作福移漢祚終難復一作難恢復志决身殱軍務勞此懐武侯也分上四稱其大名之不朽下四惜其大功之不成浙三各據見時勢難為萬古雲霄見才品傑出俞曰孔明人品足上方伊吕使得盡其指揮以底定呉魏則蕭曹何足比論乎無如漢祚將移志雖决於恢復而身則殱於軍務此天也而非人也五六承萬古雲霄七八承三分割據澤州陳冢宰注武侯在軍嘗綸巾羽扇遺像清髙其氣象猶可想見也按俞氏云一羽毛如鸞鳯髙翔獨步雲霄無與為匹焦竑則云昔人以三分割據為孔明功業不知此乃其所輕為正如雲霄間一羽毛耳此説非是當年漢軍雜耕渭濱魏人畏蜀如虎孔明一死而漢事遂不可為此真天運之無可如何者志决身殱即出師表所謂鞠躬盡瘁死而後已者軍務勞即蜀志所云巨細咸决及南征北伐之類治紆屈也一獨也殱盡也一統志武侯廟在䕫州府八陣臺下外史記越世家范蠡以為大名之下難以乆居莊子不觀乎宇宙文子四方上下謂之宇往古來今謂之宙為漢書贊蕭何曹參位冠羣后聲為一代之宗臣注言後世之所尊仰蜀志武侯傳注張儼曰一國之宗臣伯主之賢佐髙夏侯湛東方朔畫贊序徘徊路寢見先主之遺像士傳鄭樸修道静黙世服其清髙論諸葛亮出師表今天下三分益州罷弊班陸機辨亡割據山川跨制荆吴是言偏霸一方又固漢髙帝贊割據河山保此懐民亦可言興王事業矣陸老子善計不用籌䇿史記髙帝曰運籌䇿帷幄中倕詩萬古信為儔毛晉書陶侃傳志凌雲霄神機獨斷孝蔣氏曰雲霄羽正與清髙相應梁簡文帝與劉儀令威鳯一毛廣絶交論競羽毛之輕中魏文帝典論傅毅之于班固伯仲之間耳彭羕獄與諸葛亮書足下乃當世伊吕吉陳平傳誠能去兩短集兩長天下指揮即定矣丙傳贊髙祖開基蕭曹為冠宋文帝詩運移矜物化漢蔡琰胡笳曲我生之後祚衰金郝居中題五丈原武侯廟詩籌筆無功事可哀長星飛墮蜀山摧三分豈是平生志十倍寧論蓋世才壊壁丹青仍白羽㫁碑文字只蒼苔夜深老木風聲惡猶想褒斜萬馬來按三分萬古以虚對實郝氏將十倍對三分全用實事乃倣公意而㕘酌者劉克莊曰卧龍没已千載而有志世道者皆以三代之佐許之此詩儕之伊吕伯仲間而以蕭曹為不足道此論皆自子美發之考亭南軒近代大儒不能廢也張綖曰見伊吕而失蕭曹稱之無乃過乎曰此少陵有見之言也蕭曹佐漢開基不能致主王道建萬世之長䇿使帝王以来之制度蕩然而不復見至今有遺憾焉孔明髙卧隆中三顧而起固耕莘釣渭之遺風也文中子稱其無死禮樂其有興乎然則指揮若定誠非蕭曹所能班矣夫豈過哉武黄生曰此詩先表其才之挺出後惜其志之不成侯平生出處直以五十六字論定前後諸人區區以成敗持評者皆可廢矣盧世㴶曰杜詩諸將五首詠懐古跡五首此乃七言律命脉根柢子美既竭心思以一身之全力為廟算運籌為古人冩照一腔血悃萬遍水磨不唯不可輕議抑且不可輕讀養氣滌腸方能領畧人知有秋興八首不知尚有此十首則杜詩之所以為杜詩行之不著習矣不察者其埋没亦不少矣寄韓諫議注鶴注依梁氏編在大厯元年之秋姑仍之杜臆詩言岳陽洞庭瀟湘南極韓盖楚人岳陽其家也今我不樂音洛思岳陽身欲奮飛病在牀美人娟娟隔秋水濯足洞庭望八荒鴻飛㝠㝠日月白青楓葉赤天雨去聲一作飛霜首敘懐思韓君之意陽楚詞以美人比君子此指韓諫議也岳洞庭韓居之地鴻飛㝠㝠韓已遯世青楓赤葉時屬深秋矣陽詩今我不樂師氏曰地理志岳州巴陵郡在岳之故曰岳陽有君山洞庭湖湘江之勝之詩不能奮飛詩又或偃息在牀又彼美人兮西方人兮鮑照娟娟似蛾睂此莊子秋水時至濯足用滄浪歌左思詩振衣千仭岡濯足萬里流揚雄傳陟西岳以望八荒法言鴻飛㝠㝠弋人何篡焉風謝靈運詩曉霜楓葉丹鮑照詩北驅雁天雨霜玉京羣帝集北斗或騎騏驎翳鳯凰芙蓉旌旗一作旄烟霧落一作樂影動倒景搖瀟湘星宫之君醉瓊漿羽人稀少不在旁唐汝詢曰此借仙官以喻朝貴也影北斗象君羣帝指王公麟鳯旌旗言騎從儀衛之盛動瀟湘謂聲勢傾動乎南楚星君比近侍之霑恩者羽人比逺臣之去國者無靈樞奎景内經下離塵境上界玉京元君注玉京者為之天也東西南北各有八天凢三十二天盖三十二帝之都玉京之下乃崑崙北都江淹詩羣帝共上下趙注羣帝如五方之帝三十二天之帝雖皆稱帝而於大帝為卑猶諸王三公之於天子也晉天文志北斗七星在太㣲北人君之象號令之主鶴集仙録羣仙畢集位髙者乗鸞次乗騏麟次乗龍鸞每翅各大丈餘杜臆翳語助辭舊解翳為蔽引甘泉賦登鳯凰兮翳芝恐非北齊蕭慤詩芙蓉露下落此處落字所本謂旌旗如落於烟霧之中若作烟霧樂謂樂音㣲細如奏於烟霧中也列子黄帝張樂於洞庭之野相如大人賦貫列缺之倒星注引凌陽子明經列缺气去地二千四百里倒景气去地四千里其景皆倒在下漢郊祀志登遐倒景注在日月之上反従下照故其景倒仍楚詞華酌既陳有瓊漿些真誥羽童捧瓊漿楚詞羽人於丹丘羽人飛仙也句羽人稀少韓已去位此起下似聞昨者一作夜赤松子恐是漢代韓張良昔隨劉氏定長安帷幄未改神慘傷國家成敗吾豈敢色難腥腐餐楓一作風香此申明諫議去官之故以張良方韓是嘗平定西京者帷幄未改言老謀仍在成敗豈敢言不忘憂國色難腥腐盖厭濁世而思潔身矣張良傳願去人間事従赤松子遊耳列仙傳赤松子神農時雨師能入火自燒漢書張良字子房其先韓人也陸機髙祖功臣傳太子少傳留文成侯韓張良髙祖紀運籌帷幄之中决勝千里之外吾不如子房功出師表至於成敗利鈍非臣之明所能逆覩也費前漢鄧通傳太子齰癰而色難之神仙傳壺公數試長房繼令啖溷臭惡非常房色難之謂鮑照升天行何時與爾曹啄腐共吞腥注啄腐吞腥酒肉之人爾雅注楓似白楊葉圓而岐有脂而香今之楓香是也山海經注宋山楓木即令楓香樹南史任昉營佛齋調楓香二石張逺注楓香道家以之和藥故云餐鶴林玉露引佛書凢諸所齅風與香等朱注引范成大詩懸知佛骨有青冥風香乆已滌羶腥其説皆迂曲鄭侯升曰杜詩又有獨歎風香林春時好顔色亦豈用佛書耶周南留滯古一作世所一作莫惜南極老人應壽昌美人胡為隔秋水焉於䖍切得置之貢玉堂未想其老成宿望再出而濟世匡君也杜臆南極老人非祝其多夀此星治平則見進此人於玉堂是即老人星見矣盖意在治平也此章前三段各六句末段四句收曰史記太史公留滯周南於晉書老人一星在弧南一南極常以秋分之旦見丙秋分之夕沒於丁見則治平主壽昌署焉得置之上四字畧讀宫前漢翼奉傳乆汚玉堂之顔師古曰玉殿在未央揚雄傳上玊堂朱鶴齡曰韓諫議不可考其人大似李鄴侯必肅宗收京時嘗與宻謀後屏居衡湘修神仙羽化之道公思之而作似聞以下美其功在帷幄翛然逺引周南以下惜其留滯秋水而不得大用也盧元昌曰韓官居諫議必直言忤時退老衡岳公傷諫臣不用勸其出而致君不欲終老於江湖徒託神仙以自全也首尾美人中間羽人及赤松子韓張良南極老人總一諫議影子呉江潘耒曰少陵平生交友無一不見於詩即張曲江王思禮未曾欵洽者亦形諸歌詠若李鄴侯則從無一字交涉盖杜於五月拜官李即於十月乞歸未嘗相往還也此詩題云寄韓諫議則所云美人當即指韓黄生曰錢氏謂此詩欲韓諫議貢李泌於玊堂其説近鑿韓時在岳陽其官之有無不可知何得以薦賢望之觀泌語肅宗云殺臣者乃五不可則其君臣之間正非諫議小臣所能與也予意韓張良當即指韓諫議亦在靈武従駕故曰昔隨劉氏定長安既而肅崩代立故曰帷幄未改神慘傷其人必見時事不佳故棄官逺遊公特㣲其辭曰國家成敗吾豈敢色難腥腐餐楓香也前段玉京羣帝云云指當時在朝之臣逺方流落者望之猶登仙也公盖與韓有舊故作此寄之而因以自寓所以結處深致慨惜言此人自冝在玊堂之上耳焉得置而不用耶朱注雖不徑指為李泌顧云其人必肅宗時嘗與宻謀後屏居衡山修神仙之道公思之而作則亦總為玉京羣帝等語所惑也予初疑公以子房比韓或張之先與韓同出因檢史記索隠注云王符皇甫諡皆言子房本韓之公族因秦索之急故變姓名益知本句不曰漢代張子房而曰漢代韓張良公之所指本明白人自不解耳解悶十二首鶴注詩云一辭故國十經秋當是大厯元年䕫州作杜臆公當悶時隨意所至吟為短章以自消遣耳草閣柴扉星散居浪翻江黑雨飛初山禽引子哺紅果溪女趙定作女一作友得錢畱白魚前二首即事興感此従䕫州風景敘起上二句山水對言山禽引子山間之景溪女留魚江邊之事我杜臆草閣公所居山禽句見與物俱適溪女句見人兩忘女庾信詩客園星㪚居女公雲安詩負鹽出井此溪又負薪行男當門戸出入則溪女賣魚可知商胡離别下去聲揚州憶上上聲西一作蘭陵故驛樓為去聲問淮南米貴賤老夫乗興去聲欲東逰一作流也此欲去䕫而遊呉朱注時有胡商下揚州来别因道其事西陵驛樓公少逰呉越時所登洛陽伽藍記商胡販客日奔塞下隋煬帝詩言族舊鎮下揚州既晉書王述年三十未知名人謂之痴導以門第辟之見唯問江東米價述張目不答指越絶書秦皇帝東逰之㑹稽㑹稽志晉宋人㑹稽剡中皆曰東如謝安傳海道還東是也一辭故國十經秋每見秋𤓰憶故丘一作侯非今日南一作東湖采薇蕨何人為去聲覓鄭𤓰一作袁非州已下五章皆感懐詩人此則懐鄭審也訪故丘有𤓰洲即鄭秘監所居今已謫居南湖無復有覓者矣盖傷其寥落也黄生曰此詩兩故字兩秋字兩𤓰字連環鈎撘亦絶句弄筆之法大家時一為之耳原注鄭秘監審水經注長安第二門本名霸城門又名青門門外舊出佳𤓰其南有下杜城鄭西京雜記杜子夏葬文何必故丘然後即化南湖監所在公䕫州詠懐詩云南湖日扣舷過張禮遊城南記濟潏水陟神禾原西望香積寺下原𤓰洲村注𤓰洲村在申店潏水之隂許渾集有和淮南相公重遊𤓰洲别業詩淮南相公杜佑也朱注𤓰州村與鄭莊相近鄭莊䖍郊居也審為䖍之姪其居必在𤓰州村故有末語與秋𤓰憶故丘𦂳相應或以大厯中鄭審嘗任袁州刺史改作袁州則生趣索然矣沈范早知何水部曹劉不待薛郎中獨當省署開文苑兼泛滄浪學釣翁此懐薛據也無何薛同為水部但何有知音而薛同調故為惜之當省署昔為部郎泛滄浪今客荆楚杜陳師道曰省署開文苑滄浪學釣翁即薛璩詩也臆此處稱薛孟之詩知公别崔潩云荆州遇薛孟為報欲論詩非漫語也大原注水部郎中薛據梁書何遜傳范雲見其對䇿相稱賞因結忘年交好一文一咏雲輙嗟賞沈約亦爱其文嘗謂遜曰吾每讀卿詩一日三復猶不能已鍾嶸詩品曹劉殆文章之聖陸謝為體貳之才曹植劉楨為建安才人之冠能推奬名士此云不待者猶言恨古人不及見耳公唐㑹要天寳六年風雅古調科薛據及第韓文公薛達墓誌據為尚書水部郎中贈給事中李陵蘇武是吾師孟子論平聲文更不疑一本第二句作首句一飯未曾音層留俗客數篇今見古人詩此懐孟雲卿也論蘇李吾師此述其詩今見古人此稱其作詩便知雲卿詩格獨能力追西漢原注校書郎孟雲卿僧皎然曰五言始於蘇李二子天與其性發言自髙未有作用如十九首則詞義炳婉而成章矣洪容齋隨筆曰文選編李陵蘇武詩凢七篇人多疑俯觀江漢流之語以為蘇武在長安所作何為乃及江漢東坡云皆後人所擬也子觀李詩云獨有盈觴酒與子結綢繆盈字係惠帝諱漢法觸諱者有罪不應陵敢用之益知東坡之言為可信矣耳蔡寛夫曰五言起於蘇李今所見唯文選中七篇世或疑武詩俯觀江漢流仰視浮雲翔以為不當有江漢之言遂疑其偽此但註者淺陋直指為使匈奴時作故人多惑之其實無據也安知武未嘗至江漢耶孟馮惟訥曰古詩云盈盈一水間又髙帝諱邦而韋詩云實絶我邦古人臨文或不諱也復扶又切憶襄陽孟浩然清詩句句盡堪傳即今耆舊無新語漫釣槎當作查頭縮頸一作項鯿此懐孟浩然也二上二憶其詩句下歎其人亡縮新句無聞而徒然把釣則耆舊為之一空矣槎頭頸鯿即用浩然句孟詩鳥泊隨陽雁魚蔵縮項鰝又試垂竹竿釣果得槎頭鯿清此獨記名以别於雲卿也傅咸詩人之好我贈我詩文心雕龍五言流調清麗為宗下漢陸賈作新語味趙曰習鑿齒襄陽耆舊傳云峴山漢水中出鯿魚極肥而美襄陽人採捕遂以槎斷水因謂之槎頭縮項鯿語楊慎曰説文查浮木也今作槎非槎音詫邪斫也國山不槎藥是也今多混用莫知其非畧證數條於此王子年拾遺記堯時巨查浮西海上十二年一周天名貫月查一曰挂星查道蔵歌詩扶桑不為查水經注臨海江邊有查浦字並作查唐王勃詩澁路擁崩查又送行序云夜查之客猶對仙家坐菊之賓尚臨清賞駱賓王有浮查詩皆用正字不従俗體杜工部詩查上覓張騫又滄海有靈查惟七言絶空釣槎頭縮頸鯿七言律奉使虚隨八月槎古體近體不應用字互異盖七言絶與律乃俗夫競玩遂肆筆妄改古體則俗目未擊幸存舊文耳陶冶性靈存一作在厎物新詩改罷自長吟熟知二謝將能事頗學一作覺隂何苦用心此自敘詩學復詩篇可養性靈故既改吟且取法諸家則句求盡善而日費推㪣矣吟韓子蒼曰東坡嘗語參寥曰老杜言新詩改罷自長乃知此老用心最苦後人不復見其剞劂但稱其渾厚耳白杜臆公嘗稱李白詩似隂鏗後人妄云公有不滿太之意試讀此詩豈其然乎顔鍾嶸詩評阮嗣宗咏懐之作可以陶性靈發幽思又之推家訓陶冶性情従容諷喻入其滋味亦樂事也二二謝謂謝靈運謝朓隂何謂隂鏗何遜世説王家見謝則傾筐倒庋此借用之將能事將近其能事易天下之能事畢矣不見髙人王右丞藍田丘壑蔓一作漫寒藤最傳秀句寰區滿未絶風流相去聲國能此懐王維也有右丞雖没而佳句猶傳况相國詩名則風流真可不墜矣及縉黨附元載人不足取特以一家詩學可稱故連類之或以縉能表章維集故云風流未絶詩中似無此意之原注右丞弟今相國縉乾抱朴子知名之髙人洽聞碩儒舊唐書王維傳元中轉尚書右丞晚年得宋之問藍田别墅墅在輞口水周於舍下竹洲花塢與裴迪浮舟往来嘯咏終日所賦詩號輞川集榮晉書謝安傳放情丘壑遒庾信詩寒藤抱樹踈鍾詩品竒章秀句往往警王洙曰伐宗時縉為宰相帝求維文縉集上之金壺記王維與弟縉名冠一時時議云論詩則王維崔顥論筆則王縉李邕祖詠張説不得與焉其盧氏雜記王縉好與人作碑銘有送潤毫者誤叩兄門維曰大作家在那邊李東陽曰唐詩李杜之外孟浩然王摩詰足稱大家王詩豐縟而不華靡孟却專心古澹而悠逺深厚自無寒儉枯瘠之病由此言之則孟為尤勝儲光羲有孟之古而深逺不及岑參有王之縟而又以華靡掩之故杜子美稱吾憐孟浩然稱髙人王右丞而不及儲岑有以也夫先帝貴妃今一作俱寂寞荔枝還復扶又切入長安炎方每續朱櫻獻玉座應平聲悲白露團杜臆已下四章皆為明皇徵貢荔枝而發此歎舊貢之未除也露帝妃皆亡而荔枝猶獻得無先帝神靈尚悽愴於白中乎盖微諷之也據李綽嵗時紀櫻桃薦寢取之内園不由蜀貢此特言其夏薦櫻桃而荔枝繼獻耳杜修可曰唐史遺事乾元初明皇幸蜀而回嶺南進荔枝上感念楊妃不覺悲慟憶昔蓬萊殿奔騰獻荔枝正言楊妃事也前病橘詩世説南州謂之炎方朱注獻自南海故曰炎方座禮記仲夏之月天子以含桃先薦寢廟謝朓詩玉猶寂寞詩白露為霜兮又零露漙憶過瀘戎摘荔枝青楓隠映石逶迤京華應平聲一作京中舊今従陳無已本見無顔色紅顆酸甜只自知此譏逺貢之失真也瀘戎之問親摘荔枝若京中所見應無此色味食者當自知耳過盧注公去秋宴戎州楊使君樓有輕紅劈荔枝句憶指此也或云荔枝原名離枝言其離枝則色味香氣俱變也杜臆涪州有荔枝園相傳謂充貢於貴妃者涪去京師尤逺今讀公詩知出瀘戍者是傳稱置驛傳送數千里色味未變此盖駁其無是理也方輿紀勝妃子園在涪州之西去城十五里當時以馬逓馳載七日七夜至京人馬斃於路者甚衆方輿勝覽蜀中荔枝瀘敘之品為上涪州次之合州又次之朱注敘州即戎州荔枝譜廣州及梓䕫間所生者大率早熟肌肉薄而味甘酸翠𤓰碧李沉玉甃音縐赤梨蒲萄寒露成可憐先不異枝蔓此物娟娟長逺生此譏異味之惑人也寒杜臆宫中食荔不過為其味甘可以消暑止渇因比之水晶絳雪然𤓰李沉之井中梨萄採之露枝下亦何減於荔只縁諸果枝蔓尋常初不以為異獨荔生自逺方故慕其色味而珍重之耳賦魏文帝書浮甘𤓰於清泉沉朱李於寒冰江逌井構玊甃之百節壊南史扶桑國有赤梨經年不娟娟言其質弱而色鮮側生野岸及江蒲一作浦不熟丹宫滿玉壺雲一作寒壑布衣鮐背死勞人一作生害一作重馬翠睂須一作疎致此結出當時亂之由此荔枝生於逺僻不植宫中而偏滿玉壺以其所好在不憚多方之致也豈知抱道布衣老丘壑而不徵獨於一荔乃勞人害馬以給翠睂之須噫逺徳而好色此所以成天寳之亂歟賈捐之疏後宫盛色則賢者隠處此詩後二句本之字蜀都賦旁挺龍目側生荔枝楊慎丹鉛録詩用側生盖為庾文隠語以避時忌即春秋定哀多㣲詞之意押趙曰自戎𤏡而下以畝為蒲今官私契約皆然用以韻師作江浦非是朱注或曰劉熈釋名草團屋曰蒲又謂之菴此詩江蒲似用此義言荔枝生於野岸江菴之側耳顔延之詩皓月鑒丹宫詩漢辛延年詩繩絲提玉壺文北山移文欺我雲壑黄髪鮐背注老人背有鮐荆公作勞人害馬今按勞人草草見詩經害馬之徒見莊子於文義明白呉氏作勞生害馬山谷謂善本是勞人重馬趙注武后嘗改人為生當時因而誤寫耳今按重字作去聲讀是引重致逺之意重字作平聲讀乃驛馬重逓之意呉論驛使奔騰另副一馬以防倒斃故云重馬盧注重馬出前漢劉屈氂傳師古注重謂懐孕者今按急逓之馬未必用孕馬此注未確睂古今注魏宫人好畫長睂今多作翠警鶴髻王嗣奭曰公因解悶而及荔枝不過一首足矣一首之中其正言止荔枝還復入長安一句正言不足又㣲言以諷之㣲言不足又深言以刺之盖傷明皇以貴妃召禍則子孫於其所釀禍者冝掃而更之以亟蘇民困公於病橘亦嘗及之此復娓娓不厭其煩可以見其憂國之苦心矣洞房鶴注明皇以廣徳二年三月塟泰陵詩云園陵白露中又曰仙遊終一閟女樂乆無香則去塟年逺矣梁權道編在大厯元年得之時杜臆八章皆追憶長安往事語兼諷刺以警當君臣圖善後之䇿也每首先成詩而撮首二字為篇名乃三百篇遺法趙曰此下八篇盖一時所作洞房環珮冷玉殿起秋風秦地應平聲新月龍池一作虵滿舊宫繫音計舟今夜逺清漏往時同萬里黄山北園陵白露中首章従秋夜感興有故國舊君之思夜上四長安秋夜之景所感在妃子下四䕫州秋之景所感在明皇感秦地二句舊注云月雖新而宫則舊有物是人非之滿指池水不指月色盖章内秋風秋月秋水秋露皆各舉時景言耳時趙汸注今夜應新往時應舊往時清漏公為拾遺宿省所聞者時上皇初還京也故下接以園陵句記長門賦徂清夜於洞房植史記南子環珮玉聲璆然行則有環珮之聲曹詩歡坐玉殿空漢武辭秋風起兮白雲飛華楊妃過温泉行云玉殿掩扉秋風動琪樹昔日繁事盡逐流水去唐國䇿張儀曰秦地半天下里鮑泉詩新扇如新月㑹要明皇在藩邸居興慶有龍池湧出日以浸廣至開元中為興慶宮鮑唐太宗詩丹陵幸舊宫灼薛道衡詩今夜寒車出照詩嘯歌清漏畢晉曰黄山宫名在槐里傳先帝園陵寢廟前漢叔孫通詩白露為霜天寳之亂禍由妃子故八章以此為首黄生更定次序以大厯開元居先未合作者之意又將洞房玉殿指陵土寢殿而以環珮為守陵宫人亦非是鼎湖銀海蓬萊羽林自在第七章也宿昔宿昔青門裏蓬萊仗數音朔移花嬌迎雜樹龍喜出平池落日一作月留王母微風倚少去聲兒宫中行樂音洛秘少有外人知此追敘明皇逸豫之事見上四敘遊幸下四敘女寵昔於青門城内仙㐲數移自蓬萊而往曲江南苑也花迎龍出景物亦若増新矣日將落而留連王母貴妃專寵也風㣲起而慿倚少兒秦虢得幸也當時恣意行樂不令人知今果安在哉提上章已説園陵此處復追敘生前故用宿昔二字另下二章俱䝉此鶴曹植詩宿昔秉良弓仗顧注青門長安城東門也注龍朔二年髙宗置朝㑹之仗三衛分上為五仗紫李翰林别集序開元中禁中初重木芍藥得四本紅淺紅通白者上因移植於興慶池東沉香亭前㑹花方繁開上乗照夜白太真妃以歩輦從宫鮑照詩雜樹茂寒峯天寳中興慶池小龍常出遊垣水溝中蜿蜒奇狀靡不瞻覩鑾輿西幸龍一夕乗雲雨望西南而去此見明皇十七事中龍池即興慶池盧注楊妃曾度為道士故唐人比為王母漢武内傳王母言語麄畢嘯命靈官駕龍嚴車欲去帝下席叩頭請留殷勤王母乃坐先衛青傳衛媪長女君孺次女少兒次女則子夫少兒與霍仲孺通生去病及衛皇后立少兒更為陳掌妻歌飛燕外傳帝令后所愛侍郎馮無方吹笙以倚后歌酣風起后揚袖曰仙乎仙乎去故而就新乎帝乃令無方持后履為朱注㣲風倚少兒盖合用少兒飛燕事漢書周仁郎中令慎重不泄以是得幸入卧内後宫秘戲仁嘗在旁終無所言於外外楊惲傳人生行樂耳杜臆行樂汚䙝必有不可使人聞者黄生曰此章畧見風刺然其詞㣲而婉如禄山宫裏虢國門前之句非唯失風人之意亦全無臣子之禮矣能畫能畫毛延壽投壺郭舍人每䝉天一笑復扶又切似一作以物皆一作初春政化平如水皇明晉作明一作恩斷丁亂切若神時時用抵戲亦未雜風塵此記當時優寵技巧也在四句分截舍人投壺足動天顔之笑延壽善畫能令物色生春此一時適意之事若使當年政平威斷即時用抵戯亦何至風塵雜起乎惜乎明皇之不然也㼐盧注𤣥宗時畫鷹畫馬有馮紹正韓幹軰其侏儒黄帝嘗呼為肉几此即毛郭之流故借漢事為比塵杜臆抵戯用以當戯劇舊引漢書角觝戱未合雜風指流離播遷既涉風塵則不平不斷可知言外見意此風人温厚之㫖也其西京雜記畫工有杜陵毛延夀寫人好醜老少必得真又云武帝時郭舍人善投壺以竹為矢不用棘古之投壺取中而不求還故入小豆惡矢躍而出也郭舍人則激矢令還一矢百餘反謂之驍言於軰中為驍傑也每投壺帝輙賜金帛投神異經東荒山中有大石室東王公居焉與一玉女壺設有入不出者天為之笑張華曰笑者開口流光今電是也隋辛徳源詩雲衘天笑明莊子與物為春班漢安帝詔達於政化以後漢第五訪傳政平化行矣固兩都賦天人合應發皇明魏都賦皇恩綽神晉史論畧獨斷洪容齋三筆云杜詩命意用事㫖趣深逺若隨口一讀往往不能解如能畫詩第三聯頗與前語不相貫穿然按其㫖本謂技藝倡優不應䝉人主顧盻賞接然使化如水恩若神為治大要既無所損則時或用此軰亦無害也折黄生曰政平明斷自指開元之治従半腰説起轉方不費力若將此意頓在前敘事必拖沓矣鬬雞鬬雞初賜錦舞馬既一作解胡買切登牀簾下宫人出樓前御曲一作栁長仙遊終一閟女樂乆無香寂寞驪山道清秋草木黄此章有樂極悲来之感致上四鋪張盛事見生前之樂下四追惟遺跡没後之悲逺注仙遊句反上御曲長女樂句反上宫人出播黄生曰第五句是通盤一大關節盖不以荒宴直接遷徑及崩駕之感則有傷痛而無刺譏是温柔敦厚之遺教也得季郈之雞鬬見左傳齊有鬬雞走犬見國䇿陳思王大宛紫騮馬教令習􅕥與皷節相應見魏志吐谷渾遣使獻舞馬謝莊為作舞馬賦見宋書是鬬雞舞馬其来乆矣此詩則專指明皇事耳鬬陳𢎞祖東城父老傳𤣥宗在藩邸時樂民間清明節雞戱及即位立雞坊於兩宫間索長安雄雞金毫鐵距髙冠昂尾千數養於雞坊選六軍小兒五百人使馴擾教飼之帝出遊見賈昌弄木雞於雲龍門道旁召入為五百小兒長天子甚愛幸之金帛之賜日至其家天下號為神雞童傳又云明皇以乙酉生而喜鬬雞是兆亂之象也黄庭堅曰觀風樓南起鬬雞殿明皇雜録上嘗令教舞馬四百匹各分左右部目為某家龍某家驕時塞外以善馬来貢者上俾之教習無不曲盡其妙因命衣以文繡絡以金鈴飾其鬃鬛間以珠玉其曲謂之傾盃樂者數十回奮首鼓尾縦横應節又施三層板牀乗馬於上抃轉如飛或令壯士舉榻舞於榻上樂工數十人環立皆衣淡黄衫文玉帶必求年少姿美者每千秋節命舞於勤政樓下明皇雜録上每宴賜酺則御勤政樓太常陳樂教坊大陳尋橦走索丸劍角觝鬬雞令宫人數百飾以珠翠衣以錦繡自幃中撃雷鼓為破陣樂御又云𤣥宗製新曲四十餘又新製樂譜每初年望夜勤政樓觀燈作樂貴臣戚里設看樓觀望夜闌太常樂府懸㪚樂畢即遣宫女於樓前縛架出眺歌舞以娱之開元傳信録明皇夢遊月宫諸仙子娛以上清之樂其曲凄楚動人明皇以玉笛尋得之曲名紫雲迴異聞録開元六年八月望上與申天師洪都客作術夜遊月宫見素娥十餘人笑舞於廣庭桂樹之下音樂清麗遂歸製霓裳羽衣之曲作盧注白樂天勤政樓前御栁詩中有開元栁一株别御栁亦有本趙曰仙遊言明皇上昇洙曰禄山亂後女樂流散也在南部新書驪山華清宫毁廢已乆惟存繚垣朝元閣山嶺之上最為嶄絶礎柱尚在山腹即長生殿殿東西盤石道自山麓而上道側有飲酒亭明皇吹笛樓宫人走馬樓故址猶存邵注驪山在今西安府臨潼縣東南二里因驪戎所居故名温泉在焉明皇建華清宫於其下秋風詞草木黄落兮雁南飛歴歴歴歴開元事分明在眼一作目前無端盜賊起忽已嵗時遷巫峽西江外秦城北斗邊為郎従白首卧病數所角切顧音先主切非秋天此章承前起後前三章説承平之世故以開元事括之後三章説亂離以後故以盜賊起包之亂上四乃追述往事下則自歎䕫江衰老也天寳之皆明皇失徳所致此云無端盜賊起盖諱言之耳靈張華詩昔事歴歴記漢庾信春賦分明入射堂謝運詩浮歡昧眼前樂府従軍行禍集非無端詩漢武帝書盜賊縦横文鮑照詩嵗時多阻折趙隂鏗江連巫峽長梁簡帝詩落日下西江曰蜀江従西来故謂之西江長安城謂之北斗城馮蔡夢弼曰公在蜀為尚書員外郎故云荀悦漢紀唐白首屈於郎署謂謝靈運詩卧病同淮陽追數秋天屢經秋日也顧注前後情事俱従卧病中數而見者其語太曲天庾信小園賦異秋而可悲洛陽洛陽昔陷没胡馬犯潼闗天子初愁思去聲都人慘别顔清笳去宫闕翠盖出闗山故老仍流涕龍髯幸再攀此歎西狩之事也相上四敘幸蜀之由下四記還京之事别顔流涕上下應禄山於天寳十四年十二月陷東京所謂洛陽没也次年六月七日靈寳敗績賊入潼闗所謂犯潼闗也是夕平安火不至明皇懼而謀幸蜀所謂初愁思也十三日帝出延秋門至咸陽驛而従官駭散所謂慘别顔也至徳二年九月郭子儀收復西京賊衆夜遁所謂去宫闕也十月肅宗入長安上皇發蜀郡所謂出闗山也十二月上皇至自蜀百姓舞抃路側曰不圖今日復見二聖所謂故老流涕龍髯再扳也此敘出狩還宫之事首尾詳明真可謂詩史矣杜臆初愁思盖向不知愁者流涕攀髯則開元美政去國仁言真足以繫人心者考唐史帝之出奔經過左蔵楊國忠請焚之上曰賊来無得必更斂百姓不如與之無重困赤子上既過便橋國忠使人焚橋上曰人各避賊求生奈何絶其路留髙力士撲滅之皆去國之仁言也西邵注洛陽屬河南府唐髙宗以此為東都潼闗在陜西安府華隂縣乃秦闗要地依前凉主實書忽聞北地陷没㓂逼長安古詩胡馬北風馬融與謝伯世書憤憤愁思宫杜摯笳賦操笳揚清謝朓詩寥戾清笳轉建梁鴻歌闕崔巍兮髙唐賦以翠羽為盖淮南子翠盖涕江淹恨賦闗山無極采晉書懐帝紀故老或歔欷流前漢郊祀志黄帝首山銅鑄鼎於荆山下鼎既成有龍垂胡􅐖下迎黄帝上騎羣臣後宫七十餘人従上龍乃去餘小臣不得上迺悉持龍􅐖龍􅐖拔墮墮黄帝之弓百姓乃抱其弓與龍􅐖號後世因名其處曰鼎湖弓曰烏號驪山驪山絶望幸花萼罷登臨地下無朝音潮燭人間有賜金鼎湖龍去逺銀海雁飛深萬嵗蓬萊日長懸舊羽林此重傷園陵而作也山上四升遐之感下四陵寢之悲人邵注明皇崩後驪花蕚不復幸臨地下乆無朝燭間徒有賜金自此鼎湖龍去銀海雁深唯留此蓬萊日色長照陵上羽林耳寂寞身後良可歎也杜臆蓬萊宫先帝所居羽林軍守䕶陵寢者前黄生曰此章即申首章園陵霜露之感而言更深切是孤臣獨泣此則率土同悲也造明皇在日每嵗十月必至驪山華清宫又友愛諸王花蕚相輝之樓趙曰朝燭當音朝覲之朝凢朝在早則秉燭而受朝今地下幽閟無朝見之燭也黄庭堅曰漢書髙后紀遺詔賜諸侯王各千金北史隋獻皇后山陵成賜楊素金鉢一實以金銀鉢一實以銀鼎湖注已見上章漢書秦始皇塟於驪山之阿下錮三泉上崇三墳水銀為江海黄金為鳬雁何遜經孫氏陵詩銀海終無浪金鳬㑹不飛黄注日者君象羽林上應星文故與日相貼軍羽林即萬騎軍後改為龍武軍明皇塟後用為䕶陵漢禮樂志芬樹羽林雲景杳㝠顔注言所樹羽葆其盛若林也提封提封漢天下萬國尚同心借問懸車一作軍守何如儉徳臨時徵俊乂入莫慮一作草竊犬羊侵願戒兵猶火恩加四海深此章總結直究當時致亂之由以垂為永戒也勿言當此一統天下萬國同心世事尚可為也但更尋前轍耳自明皇好邉功而尚奢侈故有懸車儉徳之語不聽張九齡而致禄山終叛故有俊乂犬羊之語使當時息兵愛民焉有天寳之禍哉故以戒兵加恩終之此詩反覆丁寧無非覽已往以告將来若云指諷代宗時事則當年吐蕃入㓂叛將不恭恐非罷兵可以止亂也三四即所謂在徳不在險五六即所謂汲黯在朝淮南寢謀折杜臆儉者不奪民心自懐此無形之險也俊乂在朝衝樽俎何憂於犬羊乎兵勿輕動則恩加四海矣公之謀國堂堂正正即孟子所告齊梁之君者自許稷契以此東方朔傳提封頃畝注謂提舉四封之内總計其數漢書刑法志一同百里提封萬井曰古史禹㑹諸侯於塗山執玊帛者萬國左傳吕相戮力同心官又懸車束馬以踰太行犬書慎乃儉徳又俊乂在晉愍帝檄石虎敢率羊渡河縦毒左傳兵猶火也不戢將自焚也魏志陳羣曰皇恩溥遍海岱顧宸曰八章皆詠開元之事與李白宫中行樂詞八章相為表裏但太白作於明皇之時故㣲婉其詞而諷之少陵作於明皇之後故雜敘其事而傷之不黄生曰八章專述開元以来之事借古喻今美惡掩風人之㫖盡於此矣他詩有連及者固無譏刺之意以為是非具在國史非臣子所得而私議至受恩先帝没齒不忘深思慨慕則時有之後人不能推公之志毛求影捕輙謂有所刺譏夫君子不非是邦之大夫况親委贄而為之臣者哉秋興及洞房諸詩摹情冩景有闗國家治亂興亡寄託㴱長秋興八首氣象髙華聲節悲壯讀之令人興㑹勃然洞房八首氣思沉鬱詞㫖凄凉讀之令人感傷欲絶此皆少陵聚精㑹神之作故能舌吐風雲筆參造化千載之下猶可歌而可涕也但七律才大氣雄固推賦騷逸調而五律韜鋒斂鍔直與經史並驅兩者當表裏㕘觀方足窺其底藴焉鸚鵡此下八章乃雜咏物類盖即所見以寓意也鶴注此詩句句含不遇之意盖託以自况梁權道編大厯元年䕫州詩内近之乆明皇雜録開元中嶺南獻白鸚鵡養之宫中嵗頗聰慧洞曉言詞上及貴妃皆呼為雪衣娘有鷹搏之而斃遂瘞苑中呼為鸚鵡塚今詳詩意乃泛咏鸚鵡與彼無涉鸚鵡含愁思去聲聰明憶别離翠衿渾平聲短盡紅嘴漫多知未有開籠日空殘舊宿枝世人憐復扶又切損何用羽毛竒咏鸚鵡有離鄉之感綱鸚鵡而含愁思者以聰明能憶别離也二句提翠衿短傷其貌悴紅嘴多惜其空言未開籠苦於拘束殘舊枝惘其逺離句句説别離句句說愁思句句皆聰明中所自曉者末又冩出所以别離之故感慨深矣覆顧注此詩拈出含愁思三字代為鸚鵡寫意八句反宛轉盖亦傷受制於人不能自展其竒也而朱鶴齡曰此詩似櫽括禰衡賦中語聰明則性慧辯能言才聰明以識機也别離則痛母子之永隔哀伉儷之生離也翠衿紅嘴則紺趾丹嘴緑衣翠衿也渾欲短則顧六翮之殘毁雖奮迅其焉如也漫多知則豈言論以階亂將不容以致危也未有開籠日則閉以雕籠剪其翅羽也空殘宿舊枝則想崑山之髙峻思鄧林之扶疎也末句羽毛竒則雖同俗於羽毛故殊志而異心也殘餘也顧宸曰此分明有才人失路託身異族之感如魏武之於楊修隋煬之於薛道衡皆所謂憐復損也孤雁鶴注此託孤雁以念兄弟也當是大厯初䕫州作孤雁不飲啄飛鳴聲一作聲聲非念羣誰憐一片影相失萬重平聲雲望盡一作斷似猶見哀多如更一作更復聞野鵶無意緒鳴噪亦一作自紛紛咏孤雁有流落之悲狀首二另提片影相失寫孤雁之望盡哀多寫念羣之意末聯借鵶形雁乃題之外象既不飲啄者為念羣故也誰憐指羣雁之已去者雁行逺望盡矣似猶有所見而飛追呼不及哀多矣如更有所聞而鳴二句申言飛鳴迫切之情見聞二字屬在孤雁王彦輔曰公值喪亂羇旅南土而見於詩者常在鄉井故託意於孤雁章末譏不知我而譊譊者師氏曰鮑照孤雁詩云更無聲接緒空有影相隨孤則孤矣豈若此詩飛鳴聲念羣一語孤之中仍有不孤之念乎魏文帝詩孤雁獨南翔羣何遜詩誓將收飲啄一詩載飛載鳴文江總誄詞念桑梓庾信詩澗底片雨梁簡帝詩花茂蝶争飛枝濃烏相失生吳均詩山上萬重雲王融詩絲中傳意緒何遜詩平無意緒拾遺記魯僖公十四年晉文公焚林以求介之推有白鵶遶烟而噪鷗鶴注當是大厯初䕫州作江浦指䕫江魚復浦也江浦寒鷗戲無他亦自饒却思翻玉羽隨意㸃青盧作青舊作春苖雪暗還須浴一作落風生一任飄幾羣滄海上清影日蕭蕭詠鷗憐其少自得之致也此在六句分截歎浦鷗之勞不如海鷗之逸羅大經曰浦鷗閒戲使無他事儘自寛饒却以謀食之故翻玉羽而弄青苖雖風雪凌厲亦不暇顧矣何似羣飛海上者清影翛然不為泥滓所染耶此興士當髙舉逺引歸潔其身不當逐逐於聲利之塲以自取賤辱也既云寒鷗不當言春苖矣以青對玉為工㸃如㸃水蜻蜓之㸃至南越志江鷗一名海鷗在漲海中頗知風雲若羣飛岸必風渡海者以此為候弄影振玉羽而臨霞玉羽白羽也舞鶴賊疊霜毛而盧注春苖當是青苖䕫有青苗陂公䕫州歌北有澗水通青苖晴浴狎鷗分處處云江暉詩雪暗馬行遲胡夏客曰因海上狎鷗事故滄海上氣象自逺大蕭蕭閒暇之意猿鶴注依梁氏編在大厯初䕫州作西閣曝日詩流離木杪猿又上後園詩瘴毒猿烏落以二詩證之良是攀爾雅猱一名􅀈善援樹枝裊裊啼虚壁蕭蕭挂冷枝艱難人不免一作見隠見音現爾如知慣習元従衆全生或用竒前林騰每及父子莫相離詠猿稱其有見幾之智尚中間隠見二字為通章之眼啼壁聲相近挂枝形逺此為隠見發端人不如猿取其用智以脱險也従衆能挂枝用竒能騰踔此為隠見指實父子不離取其用智以全身也杜臆人於亂世往往父子不保公嘗携子避亂而恐其不能兩全具見苦情裊裊聲之長也蕭蕭羣之寡也謝朓秋竹曲從風既裊裊難楚詞風颯颯兮木蕭蕭難隂鏗詩猿挂入櫩枝艱猶云險阻詩遇人之艱兮賈誼䇿習慣如自然按後詩有猿挂時相學故知慣習指挂枝也淮南子倍是従衆趙曰全生如搏矢避矢之類列子雖全生不可不有其身夫通鑑晉安帝紀沈田子曰兵貴用竒莊子獨不見騰猿乎騰及騰躍而相及也峽吳都賦猿父哀唫􅏈子長嘯崖盧注桓温入蜀至三部伍中有得猿子者其母攀哀號又齊武帝至景陽山見一猿悲號問丞此猿何意答曰猿子前墜崖死其母求之不見耳此父子相離之證也麂音几本作麕盜鶴注編在大厯元年䕫州作以詩有衣冠兼賊當指崔旰之亂也爾雅大麕旄毛狗尾多本草衍義麂麞類山㴱僻處頗其聲如撃破鈸永與清溪别䝉將玉饌俱無才逐仙隠不敢恨庖厨亂世輕全物微聲及禍樞衣冠兼盜賊饕音滔餮音鐵用斯須詠麂歎其不當鳴而鳴也味上四代麂寫意自悔不能見幾逺害下乃慨世之貪而殘生者一二作痛心語三作自責語四作自解語亂世歎其生不逢辰微聲推出致禍之本衣冠乃食肉者盜賊乃捕獸者徇口腹之欲而戕命於斯須則衣冠亦等於盜賊矣此罵世語亦是醒世語黄生曰此物頗難入詠前半寫得如許風致妙在以清溪字陪對玉饌以仙隱字陪對庖厨遂覺烟火之氣都盡後半慨世不離詠物而却不徒詠物此之謂大手筆玉舊注清溪山多麂羅左思吳都賦矜其宴居則珠服饌王筠詩玊饌駢瓊漿泛溢神仙傳葛仙翁於女凡山學道數十年登仙化為白麂二足時出山上謝靈運詩一老四五少仙隠不可别物説苑鹿生於山命懸於庖廚全亂世重殺物而輕全全乃全活之全莊子不敢以物與之阮籍詩髙榭隔㣲聲子漢書注衣冠有仕籍者貪左傳縉雲氏有不才謂之饕餮注貪財為饕食為餮顧宸曰自古文人才士生逢亂世出嬰禍患何一不従聲名中得之中郎之於董卓中散之於司馬及禍雖異其以㣲聲致累則同也此茍全性命於亂世不求聞逹於諸侯隆中所以獨髙千古二語感慨甚大雞鶴注此是大厯元年䕫州作故詩云巫峽漏司南紀徳名標五初鳴度必三殊方聽有異失次曉無慙問俗人情似充庖爾輩堪氣交亭育際巫峽漏司南詠雞歎其當鳴而不鳴也三上六敘事是案末二歸結是斷異徳常標五鳴必度此雞之職也今在殊方聽之則夜鳴失次矣比曉能無慙乎乃問之習俗人情皆云如是彼既不能司晨亦但堪充庖已耳當子半亭育之時而巫峽漏聲早有司南之報雞鳴果安在哉雞顧注將問俗二句作借雞警人言人情無徳無信與相似而充庖則獨用雞乎杜臆謂刺巫峽之人可殺皆非也勇韓詩外傳夫雞頭戴冠文也足傅距武也見敵而鬬也得食相呼義也鳴不失時信也雞有五徳君猶瀹而食之其所由来近也記雞初鳴史厯書雞三號卒明注夜至鷄三鳴始為正月一日以趙曰失次猶三國志言失旦之雞也蔡邕賦時牢落失次胡夏客曰楚國語有雞次之典此次字所本標左傳充君之庖留列子亭之毒之注化育之意劉孝啟一物之㣲遂亭育南韓非子先王立司南以端朝夕梁元帝詩刻漏銘司按司南有四説朱云䕫州在南雞司昏曉今失其司晨之職故曰巫峽漏司南顧注雞為火徳之精南方屬火故曰司南逺注指南車有南北定向如雞鳴有子午定候春秋説題詞雞為積陽南方之象陽出雞鳴以類感也已上數説皆指䕫雞漏失司晨與殊方失次犯重今従黄生注直指曉漏開説更有藴藉黄魚鶴注當是大厯元年䕫州作故詩云日見巴東峽日見巴東峽黄魚出浪新脂膏兼飼犬長大不容身筒桶音統一作筩相沿乆風雷肯為去聲伸一作神泥沙巻涎沫回首怪龍鱗詠黄魚歎長大而罹患也救上四言取之狼籍下致哀憫之意雖欲援而不能矣筒桶取魚世俗相沿已乆雖有風雷肯相伸救彼亦巻沫泥中徒望龍飛而驚怪見黄魚之大而不靈也盧注此即公鵰賦中所云鶬鴰之類莫益於物空生此身長大如人之意俱指庸流言杜臆䕫州上水四十里有黄草峽出黄魚大者數百觔爾雅注鱣魚體有甲無鱗肉黄大者長二三丈江東人呼為黄魚鹽鐵論江陵之人以魚飼犬竿筒竹器桶木器皆捕魚之具陸龜䝉漁具詩序緍而者總謂之筌筌之流曰筩曰車邵注三月浪暖鯉化為龍則風雷従之處劉峻金華山栖志魚潛淵下窟穴泥沙莊子泉涸魚於陸相煦以濕相濡以沫白小鶴注當是大厯元年䕫州作與前數首連類而詠物也舊注即今麵條魚白小羣分命天然二寸魚細㣲霑水族風俗當去聲園蔬入肆銀花亂傾筐一作箱雪片虚生成猶拾一作㭘卵盡取義何如咏白小嘆細㣲之不免也㣲杜臆此詩起結藹然有萬物一體之念物雖細同霑水族乃俗當園疏用之賤矣亂肆傾筐取之多也但此羣分之命亦屬造物生成今猶拾卵而盡取之有傷於義矣黄生注三四形容其小五六形容其白語甚鬆秀生成應上分命盡取則不仁而譏其非義者用物撙節之謂義也大盧注黄魚以長大不容白小以細㣲盡取不幸生䕫小俱盡以歎民俗之不仁也羣分命各分一命也易物以羣分之曹植橘賦體天然之素分其庾信小園賦一寸二寸魚賓退録靖州圖經載俗居喪不食酒肉鹽酪而以魚為蔬今湖北多然謂之魚菜䕫與湖北為隣故云陶潛詩園蔬有餘滋詩不盈傾筐蝝西京賦獲胎拾卵蚳盡取末二句用之黄生曰前後詠物諸詩合作一處讀始見杜公本領之大體物之精命意之逺説物理物情即従人事世法勘入故覺篇篇寓意含蓄無限題今按唐人詠物詩唯李巨山集中最多拈一字為用五律寫意其對仗亦頗工緻但有景無情全少生動之色閲此八首皆託物寓言情與景㑹身分便自不同矣哭王彭州掄鶴注當是大厯元年作酒公初到成都時有王侍御掄許携至草堂詩王盖先以御史罷官後在嚴武幕中又遷彭州刺史而卒也執友驚一作嗟淪没斯人已寂寥新文生沈謝異骨降松喬北部初髙選去聲東牀杜臆作牀舊作堂早見招蛟龍纒倚劍鸞鳳夾吹簫厯職漢庭乆中年胡馬驕兵戈闇一作聞兩觀去聲寵辱自一作事三朝音潮二此従殁後追溯生前句新文句稱其才品北部四記其婚宦厯職四句敘其内任簫北部髙選如劍躍蛟龍掄盖令尉起家東床見招如迎鸞鳯掄必締姻宗室也胡馬兵戈指禄山之亂寵辱三朝謂𤣥肅代宗此句該一生履歴曲禮執友稱其仁古歌倐忽淪没别無期可斯人指同軰約世説殷荆州語王恭曰適見新文甚觀沈謝沈謝靈運松喬赤松子王子喬也林列仙傳王君平謂茅盈曰子有異骨可學仙又李徳集風骨異人戰國䇿有松喬之壽魏志武帝年二十舉考亷為郎除洛陽北部尉遷頓丘令子通典吳時餘曹通為髙遷而吏部特一時之俊抱朴髙選忠能卿舊注晉郄詵遷還雍州刺史武帝於東堂㑹問詵曰自以為何如詵對曰臣舉賢良對䇿為天下第一杜臆東堂必東牀之誤見招是招王為婿故下有鸞鳯句今按坦腹東牀用王逸少事越絶書辭燭曰當造劍之時蛟龍奉爐天帝裝炭兩秦蕭史教弄玉吹簫而鳯凰降東京賦建象魏之觀老子寵辱皆驚蜀路江干一作干戈窄彭門一作闗地里一作理遙解龜生碧草諫獵阻青霄頃壯戎麾出叨陪幕府要平聲將軍臨氣候猛一作壯士塞先側切風颷井渫一作漏一作漏泉誰汲烽疎火不燒前籌自多一作多自暇一作假隠去聲几接終朝此申厯年寵辱之故初由髙選陞御史寵也繼則解龜而阻諫辱也其在蜀而就幕僚辱也後則作刺於彭州寵也公與掄同幕故詳敘陪接之情下戎麾出謂嚴武鎮蜀幕府要謂辟為㕘謀上佐軍機練士卒則智畧過人矣井泉不汲烽火不燒則邊境無事矣皆其籌畫所致草謝靈運詩解龜在景平注解去所佩龜甲也龜生碧猶云委之草莾杜諫獵用司馬相如事朱按黄希云唐人多言戎麾如佑制出總戎麾是也注引顔延之一麾出守即指掄出守彭州非也候晉書庾亮鎮武昌問戴洋氣候朱注氣候用兵之氣劉㰴七畧有風候孤虚二十巻猛士塞風颷即大風歌意井趙曰軍旅所在必瀹井泉邊有驚急必舉烽燧易渫不食注渫不停汚也淮南子軍井通然後敢飲之張良傳請借前箸以籌翠石俄雙表寒松竟後凋贈詩焉於䖍切敢墜染翰欲無聊再哭經過平聲罷離魂去住銷之官方玉折寄塟與萍漂曠望渥洼道霏㣲河漢橋夫人先即世令子各清標此敘殁後情事贈雙表謂墓表松凋惜人亡詩掄所作染翰公輓章玉趙曰昔嘗哭掄之死今櫬過䕫州而再哭也之官折是住而銷魂寄塟萍漂是去而銷魂是公詩得三百篇遺意賦中必兼興比此章蛟龍鸞鳯比渥洼河漢是興於排律中見之尤不易得潘岳懐舊賦巖巖雙表列列行楸梁北史魏毛鴻賓傳武帝曰寒松勁草所望於卿也簡文帝詩染翰獨踟蹰舒廣川惠王傳歌曰愁莫愁兮居無聊心重結兮意不漢書蕭望之便道之官顔延之祭屈原文蘭薰而摧玉縝則折俱萍漂注别見孺謝朓詩曠望極髙深渥洼河漢注别見王僧詩霏㣲商雲散左傳穆后及太子夀早夭即世注即世卒也標李陵書令子無恙常景嚴君平讃素向邁金貞清凌玉徹巫峽長雲雨秦城近斗杓馮唐毛髪白歸興去聲日蕭蕭末乃自傷留滯前公棲䕫峽而王返秦中故有歸興蕭然之感杜臆云異骨降松喬後云寒松竟後凋掄盖以夀考終者且有令子故公哭之而詩不甚悲直以執友云亡不能忘情耳此章前三段各十二句末段四句收一雲雨即用巫山雲雨事七春秋運斗樞北斗七星第至第四為魁第五至第為杓合而為斗説文杓斗柄朱注天官書魁枕參首杓自華以西南是秦城正上直斗杓也胡應麟曰杜警句衆所膾炙外排律中如逺山朝白帝深水謁夷陵蛟龍纒倚劍鸞鳯夾吹簫用字皆極工而不覺此類甚衆學者當細求之杜詩詳註巻十七
