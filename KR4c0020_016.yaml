body:
  text: 杜詩詳注卷十六翰林院編修仇兆鰲撰諸將去聲五首公自永泰元年夏去蜀至雲安次年春自雲安至䕫州據末章云巫峽清秋當是大歷元年秋在䕫州作其前二章乃追論去年事也漢朝音潮陵墓對南山胡鹵千秋尚入關昨日玉魚䝉葬地早時金碗出人間見音現愁汗馬西戎逼曽音層閃朱旗北斗殷音烟諸本作閒正異作殷多少材官守涇渭將軍且莫破愁顔首章為吐蕃內侵責諸將不能禦冦上四嘆往事下四慮將來顧注陵墓對南山見其近在內地而吐蕃入關發塜其禍烈矣不忍斥言故借漢為比廣德元年柳伉上疏謂犬戎犯關度隴不血刃而入京師劫宫闕焚陵寢即其事也此於祿山無涉䝉張逺注帝王曰陵公卿曰墓玉魚應陵金碗應墓是覆地對出字為工汗馬赤血對朱旗自稱冦顧注末句緊接上二言前日之愁現在目中豈可玩而遽破愁顔乎兩愁字丁寧致戒不嫌重復屯盧注永泰元年九月郭子儀請遣諸道節度各出兵要害諸將猶擊毬為樂故有末句西王濬表領亂漢朝多長安志終南山連亘藍田諸縣漢諸陵及大臣墓與之相對鼂錯書漢興以來胡鹵數入邊地布後漢赤眉發掘諸陵取其寶貨此西京事董卓使呂發諸帝陵及公卿以下冢墓收其珍寶此東京事詩言陵墓對南山指西京也若黃生曰三四敘陵墓發掘之慘本惡境而出以雅語張載七哀詩便房啓幽戶珠柙離玉體便覺出言直致矣突西京新記宣政門內曰宣政殿初成每見數十騎馳出髙宗使巫祝劉明奴問其所由鬼曰我漢楚王戊太子死葬於此奴曰漢書戊與七國反誅死無後焉得葬此鬼曰我當時入朝以道逺不從坐後病死天子於此葬我漢書自遺誤耳明奴因宣詔欲為改葬鬼曰出入誠不安改葬幸甚天子斂我玉魚一雙今猶未朽勿見奪也明奴以事奏聞及發掘玉魚宛然棺柩略盡漢武帝故事鄴縣有一人於市貨玉杯吏疑其御物欲捕之因忽不見縣送其器推問乃茂陵中物也霍光自呼吏問之說市人形貌如先帝表朱注南史沈炯為魏所虜嘗獨行經漢武通天臺為奏之其略曰甲帳珠簾一朝零落茂陵玉碗遂出人間即此事也少搜神記盧充家西有崔少府墓充一日入一府舍見府少府以小女與充為婚三日崔曰君可歸女生男當以相還居四年三月三日臨水戲忽見崔氏抱兒還充又與金碗并贈詩充取兒碗及詩女忽不見充詣市賣碗崔女姨母曰昔吾妹之女未嫁而亡贈一金碗著棺中杜詩博議戴叔倫贈徐山人詩漢陵帝子黃金碗晉代仙人白玉棺可見玉魚金碗皆用西京故事實與漢朝陵墓相應但漢後稗史自西京雜記風俗通拾遺記諸書外傳者絶少無從考據耳盧充幽婚恐尚非的證胡應麟曰早時金碗出人間說者謂用茂陵玉碗遂出人間語以上有玉魚字遂易作金碗或謂盧充幽婚自有金碗事杜不應竄易原文然單主盧充又落汗漫二說迄今分拿不知杜蓋以金碗字入玉碗語一句中事詞串用兩無痕跡如伯夷傳雜取經子鎔液成文正此老爐錘妙處而注家並失之淮陰侯云此自兵法顧諸君不省耳余於注杜者亦云對按趙次公曰閃朱旗於北斗城中聞暇自若此以閒逼似為工稱但汗馬西戎四字既屬連用則朱旗斗城不應凑用朱注指為旗上斗星則殷字正與閃字相應周必大曰漢書有朱旗綘天此云朱旗北斗殷見斗亦赤矣殷紅色也修書時避唐宣宗諱故改作閒耳考左傳三辰旗旗疏云畫北斗七星漢書招搖靈旗九夷賓將注畫招搖於旗以征伐招搖北斗第七星也東觀漢紀段熲徵還京師鼓吹曲蓋朱旗騎馬殷天蔽日左傳左輪朱殷吏杜臆唐志李林甫請停上下魚書自是徒有兵額官而戎器駝馬鍋幕糗糧俱廢矣時府人目番上宿衛者曰侍官而六軍宿衛皆市人矣今吐蕃為冦當拒之於疆場而第守涇渭已在畿輔之內况材官不知其多少大抵皆侍官輩耳通鑑永泰元年九月回紇吐蕃合兵圍涇陽及暮二虜退屯北原之越絶書多少為備應前漢書材官蹶張注材官武技臣又發巴蜀材官劭曰材官有材力者之王勃詩賴此釋愁顔宋問詩破顔看鵲喜韓公本意築三城擬絶天驕拔漢旌豈謂盡煩回紇馬翻然逺救朔方兵胡來不覺潼關隘龍起猶聞晉水清獨使至尊憂社稷諸君何以答升平次章為回紇入境責諸將不能分憂在四句分截至築城本以禦戎豈料國家多難反借之以平冦亂如德二載香積新店之捷以回紇復兩京永泰元年涇陽輕騎之盟以回紇退吐蕃子儀前後用兵皆藉其助討之力所謂盡煩回紇馬逺救朔方兵也曰豈謂見事出意外曰翻然見彼有悔心興當時潼關破後廣平出師是秋合關河清此真主龍之象也今雜鹵侵境憂在至尊諸將何不思奮身報國以致升平乎四句作抑揚詰問語其意自明按冊府元龜髙祖師次龍門縣代水清趙次公云至德二年七月嵐州合關河清三十里此龍起晉水清之一證也詩蓋以祖宗之起兵晉陽比廣平之興復京師廣平王即代宗故下文接以至尊博議解胡來句謂回紇自西北而來不由潼關果如其說何不云蕭關散關乎其解龍起句謂太宗龍興晉陽請兵突厥却輾轉牽合文氣不順矣世說山濤與諸尚書言孫吳用兵本意門舊唐書張仁願傳景龍二年拜左衛大將軍同中書下三品封韓國公神龍三年仁願於河北築三受降城先是朔方與突厥以河為界河北岸有拂雲祠突厥每入冦必禱祠候冰合而入時默啜西擊娑葛仁願乘虛奪漠南之北築三城首尾相應以拂雲祠為中城東西相去各四百里皆據津濟遙相接應北拓三百餘里於牛頭朝那山北置烽燧一千八百所自是突厥不得度山放牧朔方無復侵掠新書中城南直朔方西城南直靈武東城南直榆林史記淮陰侯傳馳入趙壁拔趙旗立漢赤幟按天驕拔漢旌五字連讀言回紇本欲拔去漢旌自三城一既築則絶其拔旌之路矣蜀志吕凱傳翻然改圖行并州起義堂頌我髙祖龍躍晉水鳯翔太原梅福傳升平可致洛陽宫殿化為烽休道去聲秦關百二重平聲滄海未全歸禹貢薊門何處盡一作覔堯封朝音潮廷衮職誰爭補一作雖多預天下軍儲不自供稍喜臨邊王相去聲國肯銷金甲事春農此章為亂後民困責諸將不行屯田在四句分截洛陽潼關憶安史陷京滄海薊門傷河北餘孽王顧注衮職誰補言相皆出將儲不自供言兵弗知農相國此相而出將者事春農則兵亦知農矣稍喜有二義諸鎮不知屯種而縉獨舉行之是為稍喜縉素黨附元載此事在所節取亦足稍喜也當時李抱真為潞澤節度使籍民免其租稅給弓矢使農隙習武既不廢朝廷廩給而府庫亦充實郭子儀以河中乏食自耕百畝將士效之皆不勸而耕此即軍儲之能自供者詩但舉王縉而不及李郭時縉為河南副元帥特就河北諸帥而較論之耳玩臨邊二字可見詩後漢董卓傳李㴶放火燒宫殿官府居人悉盡曹植洛陽何寂寞宫殿盡燒焚正指此也月通鑑天寶十四載十二月安祿山陷東京十五載六破潼關漢記秦得百二焉注秦地險固二萬人足當諸侯百萬人蒼滄海指禹貢青州之域十洲記滄海在北海中水皆色神仙謂之滄海恆庾信詩薊門還北望俗朱注盡堯封如王制北不盡山南不盡衡山之盡本作覔非史記周封堯後於薊故曰堯封王胄詩比屋降堯封就朱注此用衮職與毛詩不同後漢法真傳臣願聖朝加衮職衮職三公也賦焦竑傳唐府兵之制寓農於兵軍儲不自供西都儲不改供漢樂府蒼梧多腐粟無益諸軍儲光舊唐書廣德二年王縉拜同平章事其年八月代李弼都統河南淮西山南東道諸節度行營事兼領東京留守歲餘遷河南副元帥請減軍資錢四十萬貫修東都殿宇謝兆啓臨邊三事既謝張溫蔡文姬詩金甲耀日光興漢元帝詔方春農桑回首扶桑銅柱標冥冥氛祲未一作不全銷越裳翡翠無消息南海明珠久寂寥殊錫曽音層為大司馬總戎皆插侍中貂炎風朔雪天王地只在忠臣一作良翊聖朝音潮此章為貢賦不修責諸將不能懷逺在四句分截撫嶺南未靖貢獻久稀由諸將膺異寵擁髙官而不盡綏之道故思忠臣恤民以輔翼朝廷中黃生注前三首道兩京之事皆翹首北顧此則道南之事故以回首發端平顧注嶺南自明皇南詔之敗繼以中原多故其地未越裳國在交趾南南海郡即廣州府炎風朔雪以極南極北之地言銜杜臆殊錫而為大司馬則兵權在握總戎而兼侍中則事無中制何以不能收復舊疆耶國十洲記扶桑在碧海之卯地一面萬里真南史林邑漢日南郡象林縣古越裳界也北接九郡南界水步道二百餘里有西屠夷亦稱王馬援所植兩銅柱表漢界處也新唐書環王本林邑其南浦有五銅柱山形若倚蓋西重巖東涯海明皇令特進何履光以兵定南詔復立馬援銅柱乃還宋之問詩銅柱海南標王僧達詩逺山斂氛祲雉周外紀成王六年交趾南有越裳氏重譯來朝獻白唐書志歡州日南郡有越裳縣周書成王時蒼梧獻翡翠說文翡赤雀翠青雀也志虞羲詩君去無消息後漢書南海郡武帝時置唐嶺南道有南海縣自漢西域傳贊孝武之世睹犀布玳瑁則建朱崖七郡是之後明珠文甲通犀翠羽之珍盈於後宫嶺表録異亷州有大池謂之珠池每年刺史修貢子虛賦寂寥無聲傅亮進宋元帝詔敬授殊錫光啓疆宇與唐書門下省侍中二人正二品掌出納帝命相禮儀左右常侍中書令並金蟬珥貂管子南至委火炎風之野王張正見賦朔雪映夜舟陸記臨諸侯曰天王天用春秋例大一統也機豪士賦忠臣所為慷慨後左傳叔向語宣子曰文公之霸也翼戴天子漢馮衍書聖朝享堯舜之榮錦江春色逐人來巫峽清秋萬壑哀正憶往時嚴僕射從本音共迎中使去聲望鄉臺主恩前後三持節軍令分明數音朔舉杯西蜀地形天下險安危須仗出羣材此章為鎮蜀失人而思嚴武之將略通首逐句遞下此流水格也細玩文氣望鄉臺與錦江相應出羣材與軍令相應仍於四句作截流大歷元年公自雲安下䕫州其云錦江春色者從上而言正想到臺前迎使也觸景生哀傷及嚴公僕射乃卒後贈官迎使是幕僚同事三持節言朝廷倚重數舉杯言軍中整暇地險易亂故須異才出鎮惜乎繼起無人耳度舊唐書武初以御史中丞出為綿州刺史遷東川節使再拜成都尹仍為劍南節度使所謂先後三持節也韜顧注只軍令分明一句便見折衝樽俎中具有多少略頻數舉杯如嚴公㕔宴及秋晚摩訶池之類是也或因八哀詩有憂國只細傾句遂云但數次舉杯失其㫖矣細傾言飲不至醉耳非謂停止宴㑹也設三鎮蜀中只幾次舉酒反覺倉皇窘迫不似雅歌投壺氣象西蜀地險外則吐蕃見侵內則奸雄竊據也安危須仗所謂公來雪山重公去雪山輕也陰鏗詩上林春色滿殷仲文詩獨有清秋日又哀壑叩虛牝厄何日忘之後漢王常傳光武曰每念往時共更艱僕射秦官名漢官儀注師古曰射本如字讀古重射每官必有主射課督之故名今射音夜泥漢書田橫傳中使還報又宦者傳凡詔所徵求皆令西園騶密約敕號曰中使文選注天子私使曰中使褒成都記望鄉臺與升仙橋相去一里管華陽縣王四子講德論皇澤豐沛主恩滿溢寄漢書馮奉世傳輒持節將兵追擊管子作內政而軍令諸葛孔明劾廖立表部伍分明傳西蜀丹青不為采周明帝詩舉杯延故老險李斯李斯傳漢中地形實有固鎮蜀得人安則可以銷萌危則可以戡亂不必引荀子安國之危解世說殷中軍曰韓康伯居然是出羣器舊解謂此詩春秋就永泰元年說非也是秋公在雲安不當云巫峽且前章云南海明珠久寂寥亦不在永泰間也按公詩有云自平中官吕太一收珠南海千餘日近供生犀翡翠稀復恐征戍干戈密太一之叛在廣德元年十一月隨即削平自廣德二年永泰元年至大歷元年秋中經閏月約計千餘日矣彼云近供稀猶此言久寂寥也想南海既平而復梗又在是年深秋彼此互證斷知其作於大歷元年秋日矣郝敬曰此以詩當紀傳議論時事非吟風弄月登眺遊覽可任興漫作也必有子美憂時之真心又有其識學筆力乃能斟酌裁補合度如律其各首縱橫開合宛是一章奏議一篇酬誥與三百篇並存可也又曰五首慷慨藴藉反覆唱嘆憂君愛國綢繆之意殷勤篤至至末及蜀事深屬意於嚴武蓋已嘗與共事而勳業未竟特致惋惜亦有感於國士之遇耳感陸時雍曰諸將數首皆以議論行詩黃生曰有五首與諸將相為表裏大㫖在於忠君報國休兵恤民安邊而弭亂其老謀碩畫欵欵披陳純是至誠血性語之王嗣奭曰五章結語皆含蓄可思西戎見逼諸將罪第云且莫破愁顔社稷方憂諸將之罪第云何以答升平屯田不舉此當事者失䇿第稱王相以相形廣南未靖此撫綏者失宜第舉忠臣翊聖以相勸崔旴之亂杜鴻漸不能㑹討獨稱嚴武出羣以見繼起者之失人皆得詩人溫柔敦厚之㫖故言之者無罪而聞之者可以戒公澤州陳冡宰廷敬曰五首合而觀之漢朝陵墓韓三城洛陽宫殿扶桑銅柱錦江春色皆從地名敘起分而觀之一二章言吐蕃回紇其事對其詩章句法亦相似三四章言河北廣南其事對其詩章句法又相似末則收到蜀中另為一體杜詩無論其他即如此類亦可想見當日爐錘之法所謂晚節漸於詩律細也與秋興詩並觀愈見八哀詩鶴注八詩非一時所作如李光弼詩灑淚巴東峽嚴武詩帳望龍驤塋則二詩在䕫州作無疑如李雍詩君臣尚論兵將帥接燕薊則是史朝義未平正經營河北之日當在廣德之前蓋自寶應廣德至大歷初有此作也云今按詩序所云乃一時追思之作觀哀鄭䖍詩秋色餘魍魎當是大歷元年之秋其云君臣尚論兵將帥接燕薊因此時吐蕃未靖河北降將陽奉隂違故有此語非為史朝義而發也者葛常之曰曹子建王仲宣張孟陽有七哀詩釋謂病而哀義而哀感而哀悲而哀耳目聞見而哀口歎而哀鼻酸而哀也子建之哀在於獨棲而思婦仲宣之哀在於棄子之婦人張孟陽之哀在於已毁之園寢是皆一哀而七者具也老杜之八哀則所哀者八人也傷時盜賊未息興起王公李公嘆舊懷賢終於張相去聲國八公前後存殁遂不銓次焉杜臆此八公傳也而以韻記之乃公創格蓋法詩之頌而詩史非虛稱矣王李名將因盜賊未息故興起二公此為國家哀耳繼以嚴武汝陽李蘇鄭皆素交則嘆舊九齡名相則懷賢序簡而該亦非後人所及序朱注詩序末句言不以存歿之前後為次第也陶詩詞無銓次贈司空王公思禮八章之中題首言贈者四乃稱死後贈官也盧注哀司空者哀其功名未就而天促之也唐書王思禮髙麗人司空出東夷童稚刷徑翮追隨幽一作燕薊兒穎鋭一作脫物不隔首敘少年奮起之跡父徑翮比其勇力穎鋭比其英鋒唐書思禮䖍威為朔方軍將思禮少習戎旅入居營州正蔡雍袁滿來碑雖則童稚今聞芬芳劉楨詩徑翮敷張脫穎而出用毛遂語任昉表不隔微物服事哥舒翰意一作氣無流沙磧未甚拔行平聲間犬戎大充斥短小精悍姿屹然强冦敵貫穿去聲百萬衆出入由古與猶通咫尺馬鞍懸將去聲首甲外控鳴鏑洗劍青海水刻銘天山石九曲非外蕃其王轉深壁飛不近駕鷙鳥資逺擊此記隴右立功之事磧猶云談笑無河北逺注意無沙貫穿謂連絡部伍出入謂衝突賊營懸將首能戰勝控鳴鏑能禦虜所謂屹然强冦敵也自此九曲盡復則其地非外蕃而其王已遁迹矣飛兔二句言足以長驅逺馭頒流沙磧石青海天山皆在西極之地周禮大司徒職事十有二曰服事鄭司農注服事為公家服事也翰唐書思禮從王忠嗣至河西與哥舒翰同籍麾下及為隴右節度使思禮與中郎將周泌為翰押衙左衛青傳臣幸得待罪行間周語穆王將征犬戎傳敝邑以政刑不修冦盜充斥立前漢書嚴延年為人短小精悍囂靈光殿賦屹然特辨亡論强冦敗績後漢隗傳百萬之衆方至頭夢弼曰馬鞍懸將首暗用彭寵事蔡琰詩馬鞍懸其鮮于注甲外軍陳之外即遊騎掠軍離什伍者海曹植詩攬弓捷鳴鏑邵注鳴鏑髐箭也青海即西伊州西州並有天山刻銘猶竇憲勒功燕然之意龍哥舒翰傳翰築神威軍青海上吐蕃攻破之更築於駒島由是吐蕃不敢近青海唐景龍四年贊普請昏唐以左衛大將軍楊矩送金城公主使吐蕃因請河西九曲之地為公主湯沐邑矩奏與之吐蕃既得九曲自是復叛續舊唐書天寶十二載翰征九曲思禮後期欲引斬之命使釋之思禮徐言曰斬則斬却喚作何物諸將以是壯之濟十二載翰進封凉國公加河西節度使攻破吐蕃洪大漠門等城悉收九曲以其地置洮陽郡築神策宛秀二軍瑞枚乘傳深壁髙壘吕氏春秋飛騕裊古之駿馬應圖飛神馬行三萬里明君有德則至擊易通卦驗秋分鷙鳥擊張率詩雖憂鷙鳥長懷沸鼎虞曉達兵家流飽聞春秋癖胸襟日沈靜肅肅晉作蕭蕭自有適此乃重敘將略為下文張本功王公才識意度如此則知潼關之敗非其僨軍而武之師由其底定也漢藝文志兵家者蓋出於古司馬之職王官之武備也沈晉書杜預為征南將軍有春秋左傳癖杜臆胸襟靜二句夫子所云懼而好謀可於氣象得之劉伶論聞此消胸襟莊常景詩嚴君性沈靜立志明霜雪詩肅肅在廟子是適人之適而非自適之適也潼關初潰散萬乘去聲猶辟皮亦切易偏禆無所施元帥見手格太子入朔方至尊狩梁益胡馬纒伊洛中原氣甚逆肅宗登寶位塞所則切望勢敦迫一作逼公時徒步至請罪將厚責際㑹清河公間去聲道傳玉册天王拜跪畢讜音黨論一作議果冰釋此記潼關敗績之事辟易言出奔偏裨謂思禮元帥謂哥舒梁益謂蜀中伊洛謂河南至尊即明皇太子即肅宗當時靈武即位迫於羣臣勸進故勉從以塞衆望讜上皇傳位於太子房琯奉册至靈武受命以後因納言故思禮得釋放也唐書哥舒翰守潼關思禮充元帥府馬軍都將翰軍既敗至潼關收散卒復守關賊將崔乾祐進攻之於是火拔歸仁等紿翰出關執以降賊傳項羽傳人馬辟易謂辟開而移易其處漢馮奉世大將軍出必有偏禆張華凱歌元帥統方夏二東方朔傳手格熊羆史春秋天王狩於河陽梁益州即西蜀地後漢論兵纒魏闕樂記逆氣成象厚易聖人之大寶曰位以王褒四子講德論不足以塞望應明㫖羊祜表何塞天下之望世說昔安石在東山縉紳敦迫思范蔚宗論或起徒步步而仕執圭唐書翰敗潼關禮走行在肅宗責不堅守將斬之㑹房琯自蜀奉上皇册命至諫以為可收後效遂見赦山海經黃帝取密山之玉策而投鍾山之陽穆天子傳天子於是得玉策枝斯之英曰記天子曰天王古詩伸腰再拜跪前漢書成帝久不見班生今日復聞讜言左傳序渙然冰釋翠華卷飛雪一云飛雪中熊虎亘阡陌屯音純兵鳯凰山帳殿涇渭闢金城賊咽喉詔鎮雄所扼禁暴靖一作靜一作清無雙爽氣春淅瀝巷有從公歌野多青青麥此憶其守武功而興復也矣帝自靈武至鳯翔自鳯翔臨涇渭已漸逼京都翠華天子之旗時在二月故有飛雪熊虎將士之旗統率六軍故亘阡陌詔鎮謂奉詔以鎮武功所扼扼敵衝也無雙言勇略特出淅瀝言軍令肅清王師至故巷有歌冦不侵故野多麥上林賦建翠華之旗周禮春官司常熊虎為旗鳥隼為旟鳯圖經岐山一名天柱山文王時鳯鳴岐山人亦呼為凰堆在鳯翔府帳殿天子所在以帳為殿詳二卷內金城縣屬京兆府至德二年改為興平時思禮為關節度使鎮此黃鶴以為河西之金城誤矣思唐書思禮除關內節度使守武功賊將安守忠來戰禮退守扶風賊分兵略太和關去鳯翔五十里上命郭子儀擊之而退禁暴止邪養育羣生馬援傳扼其咽喉國漢武帝詔史記蕭何曰如信士無雙世說桓宣武素有雄情爽氣王彬别傳爽氣出儕類謝惠連賦霰淅瀝而先集詩無小無大從公於邁與後漢成帝時童謠小麥青青大麥枯誰當穫者婦姑丈夫何在西擊胡莊子青青之麥生於陵陂及夫音扶哭廟後復扶又切領太原役恐懼祿位髙悵望王土窄不得見清時嗚呼就窀穸永一作空繫音計五湖舟悲甚田橫客千秋汾晉間事與雲水白此惜其守太原而身沒也肅宗哭廟在至德二年思禮復鎮在乾元二年其卒軍中在上元二年祿位髙難報稱王土窄未恢復二句推原其心窀穸已歸公方繫舟不得赴哭故作歌以悲甚於田橫之客舊注引范蠡乘舟泛五湖謂思禮有功成身退之志非也與洙曰思禮兩鎮太原撫御功深故想見千秋之後當雲水長留舊唐書長安平思禮先入清宫遷兵部尚書封霍國公光弼徙河陽代為太原尹北京留守河東節度使尋加司空前漢刑法志制為祿位以勸其從秋詩莫非王土窀曹植詩清時難屢得長左傳惟是春窀穸之事注厚也穸夜也厚夜猶夜舊唐書上元二年四月以疾薨輟朝一日贈太尉諡武烈史記范蠡乘扁舟浮於五湖古今注薤露蒿里並喪歌也田橫自殺門人傷之為作悲歌水汾水出太原晉陽山上徐彥伯詩楚山雲白昔觀文苑傳去聲豈述亷頗績英華作頗跡別作藺績嗟嗟晉作喏喏音社鄧大夫士卒終倒㦸將客意作結歎繼起無人也身將略不須文藝故亷頗制勝而景山喪此章首尾中腰各四句前兩段各十六句後兩段各十句思後漢書有文苑傳楚辭增歔欷之嗟嗟兮唐書禮薨管崇嗣代為太原尹數月召鄧景山代崇嗣景山以文吏見稱至太原檢覆軍吏隱沒者軍衆憤怨遂殺景山靈韓非子聚士卒養從徒倒左傳趙宣子舍於翳桑見輒餓食之既而與公介㦸以禦公徒而免之故司徒李公光弼盧注哀司徒者哀其匡復大功受謗未明而沒也唐書光弼營州人功朱注司徒已封王贈大保止稱司徒者其名著於司徒時蓋從時人所稱耳司徒天寶末北收晉陽甲胡一作獷騎去聲攻吾城愁寂意不愜人安若泰山薊北斷音短右脅朔方氣乃一作多蘇黎首見帝業首記守太原之事明當時安史稱亂祿山從河北而向潼關思從山右以瞰秦隴自光弼西扼賊衝故朔方無虞而肅宗得起業靈武此至德元年事也城指太原意不愜賊失意也舊唐書太原漢晉陽縣天授元年置北都兼都督府也公羊傳晉趙鞅取晉陽之甲以逐荀寅君側之惡人枚乘傳安於太山易於反掌奴國語斷趙之右臂西域傳開玉門關通西域以斷胸右臂朱注太原在幽薊之西故曰右脅東舊書郭子儀為朔方節度薦光弼為雲中太守充河節度副使潼關失守授户部尚書兼太原尹北京留守至德二年史思明等四僞帥率衆十餘萬攻太原拒守五十餘日伺其怠出擊大破之斬首七萬餘級加校檢司徒尋遷司空漢高帝紀五年而成帝業二宫泣西郊九廟起頽壓未散河陽卒思明僞臣妾復扶又切自碣石來火焚乾坤獵髙視笑祿山公又大獻英華作獻大捷次記破思明之功兩京克復思明僞降既而賊勢復熾公又獻俘奏捷此至德二年事也二宫泣𤣥肅還京河陽卒子儀舊營碣石來思明再叛乾坤獵如縱火大獵笑祿山思明自矜其勇至沈約安陸昭王碑二宫升降令績斯俟西郊自蜀京之郊世周制后稷為太祖廟百世不遷左為文世室右為武室居三昭三穆之上共為九廟史記勾踐身稱為臣妻稱為妾縱詩叔于田章叔在藪火烈具舉前漢長沙定王以獵火坐罪此火獵所自出也盧思道集抵掌揚眉高視濶步捷左傳凡諸侯有四夷之事則獻捷於王又擊之必大焉唐書思明來援慶緒光弼拒戰尤力思明即僞位縱兵河南光弼代子儀為朔方節度天下兵馬副元帥與思明戰中潭西大破之又收懷州擒安大清獻俘太廟異王册崇勳小敵信所怯擁兵鎮汴河一作河汴千里初妥貼青蠅紛一作徒營營風雨秋一葉內省悉井切未入朝音潮死淚終映睫此傷其封王未久憂讒以卒也光弼出鎮臨淮在肅宗之末其封臨淮郡王在代宗初年越二嵗而竟憂憤隕身矣怯小敵雖指北邙之敗亦見其勇於大敵也不青蠅指中官之讒秋一葉李薨在七月也當日畏禍敢入朝內省慚恨故臨死而淚猶在睫漢書贊功臣異姓而王者八國吳舊書寶應元年五月光弼進封臨淮郡王杜篤誄漢勳業既崇光武紀劉將軍生平見小敵怯今見大敵勇甚可怪也道通鑑上元二年五月復以光弼為河南副元帥統八行營節度出鎮臨淮千王逸楚辭序事不妥貼張遜上隋文帝表幅員暫寧里妥貼詩營營青蠅止於樊豈弟君子無信讒言尤唐書北邙之敗魚朝恩羞其策謬深忌光弼程元振嫉之及來瑱為元振讒死光弼愈恐吐蕃冦京師代宗詔入援光弼畏禍遷延不敢行廣德二年七月薨於徐州年五十七贈太保諡武穆朱注談賓録光弼懼朝恩之害不敢入朝田神功等不受其制愧耻成疾薨淮南子一葉落而知秋王濬表內省慚懼論張率詩獨向長夜淚承睫桓談新孟嘗君喟然嘆息淚下承睫大屋去髙棟長城掃遺堞平生白羽扇零落蛟龍匣雅望與英姿悽愴一作惻槐里接三軍晦光彩烈士痛稠疊此志其身殁之後人心追悼也去棟掃堞朝無倚毗槐里相接死猶近君烈士增痛同懷忠憤也初光弼至河陽壁壘旌旗精彩皆變今則光彩已晦矣當時朔方軍士樂郭之寬畏李之嚴今則稠疊悲痛矣此皆實事也去髙棟即梁木其壞意史記孟軻傳髙門大屋曰朱超詩髙棟嚮行雷佺宋書檀道濟被收脫幘投地壞汝萬里長城沈期詩遺堞尚雲屯堞城上箭垜零裴啓語林諸葛武侯以白羽扇指麾三軍杜臆羽扇落惜不盡其用也西京雜記漢帝及諸王送死皆珠𥜗玉匣匣形為鎧甲連以金縷皆鏤為蛟龍鸞鳯龜麟之象世謂蛟龍玉匣朱注霍光傳賜璧珠璣玉衣梓宫則人臣亦可稱蛟龍匣也望世說崔琰代操見胸奴使曰魏主何如使曰魏王雅非常然床頭捉刀人乃英雄也愴後漢二十八將論英姿茂績委而不用曹植詩悽內傷心長安志槐里故城即犬戎城在興平縣東南一十里按漢武帝葬槐里之杜陵衛青霍去病墓皆在槐里近杜陵槐里接比光弼葬地與獻定諸陵近也朱注云舊書本傳光弼葬三原詔百官袒送延平門外又神道碑云窆公于富平縣唐書髙祖獻陵在三原中宗定陵在富平是光弼與相近也西京雜記開匣拔鞘光彩射人曹植詩光彩曅若神壯曹操樂府烈士暮年心不已直筆在史臣將來洗筐篋吾思哭孤冡南紀阻婦楫扶顛永蕭條未濟失利涉疲􅚿乃結切川作薾非竟何人灑淚巴東峽末為司徒表心而深致哀思也李公扶帝業奏大捷此功烈之昭著天壤者若其死淚承睫而烈士痛心將來直筆史臣必能為之洗雪特恨身滯峽中不能臨冢悲哭為可歎耳不此章五段各八句分截史晉紀總論長虞數直筆而能糾庾信詩唯當一臣史記甘茂傳文侯示之謗書一篋杜臆筐篋似用樂羊謗書盈篋事賈誼傳俗吏所務在於刀筆筐篋漢章帝賜東平王書可以持危扶顛疲易故受之以未濟終焉又利涉大川莊子􅚿然役而不知所歸曹植詩灑淚滿褘抱劉克莊曰此詩平生白羽扇零落蛟龍匣語極悲壯又云青蠅紛營營風雨秋一葉內省未入朝死淚終映睫其形容臨淮憂讒畏譏不敢入朝之意獨見分曉今按當時李郭功存社稷而被讒中官子儀聞命即赴不顧其身終以至誠感物光弼怵於禍患畏縮不行竟至悔恨而亡詩云直筆在史臣此微顯闡幽欲為純臣表心也一語有關大節唐書本傳史官力為暴白皆公詩有以發之矣贈左僕射鄭國公嚴公武盧注哀僕射者哀其功名未盡展而卒也新書武字季鷹華州華隂人挺之之子鄭公瑚璉器華去聲嶽金天晶昔在童子日已聞老成名嶷魚力切然大賢後復扶又切見秀骨清開口取將相並去聲小心事友生閲書百氏一作紙盡落筆四座驚厯職匪父任嫉邪嘗力爭首敘生質才品九上六言令器夙成七八言意度過人十言文學出衆匪父任見不藉門䕃嘗力爭能不負言責嶽任昉序希世之俊民瑚璉之𢎞器後漢楊賜傳華所挺九德純備年思𤣥賦顧金天而嘆息吾欲往乎西嬉𤣥宗先天二封華嶽神為金天王華嶽即西安府太華山上有少昊金天氏後世以為西方司秋之神邵注此言其鍾山嶽之精秀說文晶精光也蔡琰與周俊書吳平聖王之老成明時之俊乂江統傳嶷然稀言江應元詩注岐嶷峻茂之狀晉書大賢指嚴挺之趙注新史挺之傳姿質軒秀舊史武傳云神氣俊爽故有復見秀骨之句周穎文祭梁鴻文秀骨風霜史記魏公子傳公子誠一開口無劉向疏據將相之位心杜臆觀小心事友生句知武欲殺公事霍光傳小謹慎詩矧伊人兮不求友生談魏文帝與吳質書妙思六經逍遙百氏孔融詩髙滿四座後漢陳蕃傳前後厯職無他異能其前漢汲黯傳以父任為太子洗馬孟康注大臣任舉子弟舊書武弱冠以門䕃策名哥舒翰奏充判官遷殿中侍御史力漢趙一著嫉邪賦後漢公孫述傳不可爭漢儀尚整肅胡騎去聲忽縱平聲橫飛傳張戀切自河隴逢人問公卿不知萬乘去聲一作乘輿出雪涕風悲鳴受辭劍閣道謁帝蕭關城寂寞雲臺仗飄颻沙塞旌江山少使去聲者笳鼓凝去聲皇情北記扈從兩宫之事而河隴無恙故見飛傳而問信明皇幸蜀故追乘輿悲涕受辭承命上皇謁帝趨赴靈武寂寞江山劍閣音阻塞旌笳鼓蕭關起事也在新書武從𤣥宗入蜀擢諌議大夫至德初赴肅宗行房琯薦為給事中漢書盜賊縱橫光武紀不圖今日復見漢官威儀盧照鄰詩拂曙驅飛傳飛傳急遞也至河隴河西隴右也游通鑑天寶十五載秋七月太子平凉杜鴻漸魏少等迎至靈武謀發河隴徑騎南向以定中原長雪涕謂拭淚列子景公雪涕而顧晏子吳越春秋吟悲鳴前漢終軍傳受辭造命邵注劍閣在今四川保寧府蕭關城在今陜西平凉府鎮原縣顔延之詩謁帝蒼山蹊張載叙行賦嗟寂寞而愁豫帝庾信哀江南賦猶有雲臺之仗颻魏志注魏氏春秋下雲臺鎧仗授兵曹植詩飄周八極丘遲與陳伯之書掘强沙塞之間顔陶潛詩形迹滯江山世說桓𤣥西下笳鼓並作延之詩皇情爰眷眷又途窮凝聖情凝楊慎曰詩膚如凝脂顔延之詩空城寒雲俱音去聲壯士血相視一作見忠臣氣不一作未平密論平聲貞觀去聲體揮發岐陽征感激動四極聨翩收二京西郊牛酒再一作至原廟丹青明此述其協贊恢復宗血相視戰傷者衆氣不平敵愾者多論貞觀治倣太發岐陽師出鳯翔感激人戮力聨翩頻奏捷牛酒迎官軍丹青修祖廟也丘欣曰此天下壯士别賦刎血相視吳越春秋椒忠經君德聖明忠臣以榮子施及四極孫寶傳心內不平山易六爻發揮二荀曹植詩聨翩厯五唐太宗詔京之盛其來自昔甲易自我西郊內韓信傳廣武君曰當今之計不如按休兵百里之牛酒日至壺漿塞陌之漢書叔孫通請立原廟注原重也先有廟今更立晉陽秋武帝改營太廟填以丹青綴以珠玉匡汲俄寵辱衛霍竟哀榮四登㑹府地三掌華去聲陽兵京兆空柳色一作市尚書無履聲羣烏自朝夕白馬休橫去聲行此敘其厯任始終京俄寵辱除罷不常竟哀榮存歿可慨四登府屢居尹三掌兵頻授節度空柳色京尹身殂無履聲尚書迹杳烏自朝夕中丞虛位白馬休行諫諍不聞矣朱注武初為京兆少尹再為京兆尹兩鎮劍南皆兼成都尹故曰四登㑹府地初以御史中丞出為東川節度使後又兩充劍南節度使故曰三掌華陽兵久新書已收長安武拜京兆少尹坐琯事貶巴州刺史之遷東川節度使上皇合劍南為一道擢武成都尹劍南節度使還京拜京兆尹為二聖山陵橋道使封鄭國公遷黃門侍郎與元載厚相結求宰相不遂復節度劍南破吐蕃七萬衆於當狗城遂收鹽川加檢校吏部尚書匡衡傳建昭三年代韋𤣥成為丞相封樂安侯後有司奏衡專地盜土竟坐免太汲黯傳召為中大夫以數切諫不得久留內為東海守老子寵辱若驚將衛靑傳天子使使者持大將軍印即軍中拜青為大軍後尚平陽公主與主合葬起冡象廬山云年霍去病傳以功封驃騎將軍秩與大將軍等元狩六薨上悼之發屬國𤣥甲軍陳自長安至茂陵為冡象祁連山州傅亮表榮哀既備寵靈已黍府通鑑注唐時巡屬諸以節度使為大府亦謂之㑹禹貢華陽黑水惟梁州詩漢張敞傳敞為京兆尹時罷朝㑹走馬章臺街唐人有章臺柳漢哀帝時尚書鄭崇常曳革履諌諍帝曰我識鄭尚書履晨朱博傳御史府中列柏樹常有野烏數千棲集其上去暮來號曰朝夕烏曰後漢張湛為光祿大夫常乘白馬光武每有異政輒白馬生且復諌矣上林賦扈從橫行按朱注引侯景乘白馬渡江為證謂蜀中冦息也但下文自有四郊失壁壘句不應預侵諸葛蜀人愛文翁儒化成公來雪山重公去雪山輕記室得何遜韜鈐延子荆四郊失壁壘虛館開一作間逢迎堂上指圖畫胡化切軍中吹玉笙豈無成都酒憂國只細傾時觀錦水釣問俗終相并平聲文此因治蜀有功而追憶生前也係諸葛翁見功德在人雪山輕重言身安危何遜孫楚比參謀之士失壁壘邊境肅清開逢迎賢士交集指圖畫險要熟知吹玉笙軍政暇裕酒只細傾志在經國觀釣問俗留心民瘼也公蜀志諸葛亮傳梁益之民咨述亮者雖甘棠之咏召鄭人之歌子産未足為過也何文翁注見前記公三鎮蜀中故有去來之語梁書遜為建安王室王愛文學之士日與游宴女張說詩禮樂逢明主韜鈐用老臣注太公兵法有𤣥六韜及玉鈐篇晉書孫楚字子荆參石苞驃騎軍事溝璧壘記四郊多壘卿大夫之辱邴隨何說黥布深漢獻帝紀公孫度虛館候原漢章帝詔遣吏逢迎詩公有奉觀嚴鄭公㕔事岷山沱江畫圖詩劉孝威浮丘侍玉笙蕭子顯詩朝酤成都酒暝數河間錢觀劉向傳周堪信有憂國之心悽細傾與豪飲相反釣謂武過草堂公酬詩云幽真釣錦江魚入吳志陟璆使漢國而問俗意待犬戎滅人藏紅粟盈以茲報主願庶獲一作或禆世程炯炯一心在沈沈二豎嬰顔回竟短折賈誼徒忠貞飛旐出江漢孤舟轉荆衡虛橫諸本作無馬融笛悵望龍驤塋空餘老賓客身上愧簪纓此為籌邊未竟而痛傷死後也其蜀近吐蕃民苦饋餉故滅戎盈粟為當時大經畫惜早世而心未遂耳喪返華隂路經江漢荆衡也虛笛知音已亡望塋孤墳逺隔老賓客向為幕􅒼愧簪纓感其薦拔此章前兩段各十二句中兩段各八句後兩段各十四句可前漢賈捐之傳太倉之粟紅腐而不可食賈誼傳以為萬世法程寡婦賦目炯炯而不寐病商書永肩一心使庾信詩幽翳沈沈左傳晉侯獳求醫於秦秦伯醫緩為之未至公夢疾為二豎子曰彼良醫也懼傷我焉逃之其一曰居肓之上膏之下若我何醫至曰疾不可為也在肓之上膏之下攻之不可達之不及藥不至焉不可為也機晉孫和薦范粲表久嬰疾病皇甫謐疏久嬰篤疾陸詩世網嬰吾身正字通嬰繫也縈也折顔淵三十二嵗賈誼三十三嵗故舉以相方記短曰不祿左傳荀息曰繼之以忠貞四十贈尚書左僕射唐書永泰元年四月武卒時年潘嶽寡婦賦飛旐翩以啓路注旐喪車之旌核庾信竹杖賦是乃江漢英靈荆衡杞梓漢馬融精術數性好音律尤耽於笛及卒客有弔者詣靈橫笛六晉王濬傳武帝因謠言拜濬為龍驤將軍伐吳太康年卒葬柏谷山大營塋域葬垣周四十五里愧謝朓詩憮然簪纓考嚴武生平所為多不法其在蜀中用度無藝峻掊亟斂閭里為之一空唯破吐蕃收鹽川為當時第一功詩云公來雪山重公去雪山輕誠實録也至比之為諸葛文翁不免譽浮其實噫唐世人物如嚴武者何可勝數而後人至今傳述公之有功於武多矣贈太子太師汝陽郡王璡杜臆汝陽被寵善終本無可哀直以下交情厚傷舊而賦也寶鶴注汝陽王薨在天九載汝陽讓帝子眉宇真天人虬髯似太宗色映塞外一作寒夜春往者開元中主恩視遇頻出入獨非時禮異見音現羣臣愛其謹潔極倍此骨肉親此敘品貌不羣及平時恩遇杜臆贊王用謹潔極三字最得要領有唐書讓皇帝憲本名成器睿宗立為皇太子以𤣥宗討平韋氏功懇讓儲位封寧王薨諡讓皇帝辨七發陽氣見於眉宇之間陽魏略邯鄲淳見曹植才對其所知歎為天人西雜俎太宗虬髯常戲張弓掛矢之武陵王紀詩塞外無春色此翻用其語乃極狀器宇溫和也楚元王傳出入卧內傳語言骨非時即常常而見之意録謹潔言能謹身潔已特記肉之親無絶也羯鼓汝陽秀出藩邸𤣥宗鍾愛焉又以其聰悟敏慧妙達音㫖每出游幸頃刻不舍從音聰容聽一作退朝音潮後或在風雪晨忽思格猛獸苑囿騰清塵羽旗動若一萬馬肅侁侁詔王來射音石雁拜命已挺身下三段記當時射獵之事此言明皇詔獵也從容以和吳論動若一行列整肅侁侁號令嚴江書淮南子古者天子聽朝公卿正諌淹詩幸及風雪霽江漢書武五子傳厲王膂力扛鼎空手搏熊彘猛獸又都王力格猛獸淮南子射沼濱之髙鳥逐苑囿之走獸旞相如諌獵書犯屬車之清塵首洙曰三禮圖全羽為析羽為旌所謂注旄於旗干也多唐高賦駕駟馬建羽旗子詩侁侁征夫詩注侁侁衆疾行之貌蘇武傳天射上林中得雁左傳拜命之辱挺前漢劉屈氂傳屈氂挺身逃身奮身而起也箭出飛鞚內上又一作入回翠麟翻然紫塞翮下去聲拂明月輪從去聲人雖獲多天笑不為新王每中去聲一物手自與金銀此言汝陽陪獵也出飛鞚王飛馬以射回翠麟帝回馬而視紫塞之雁應手而落故下拂弓傍鮑照詩飛鞚越平陸鞚馬勒也翠麟良馬也揚雄河東賦乘翠龍而超河兮陟西嶽之嶢崝賦崔豹古今注秦所築長城土色皆紫故云紫塞蕪城紫塞雁門多庾信詩明月動弓梢自長楊賦序上將大誇胡人以禽獸令從人手搏之取其獲上親臨觀焉雲隋辛德源詩銜天笑明袖中諫獵書扣馬久上上聲陳竟無銜橛虞聖聰一作慈矧多仁官免供給費水有在藻鱗匪惟帝老大皆是王忠勤此言王能諌獵也不聖聰謂聽諌多仁謂民得休而物傷此皆王之忠勤所格非帝老而倦遊也已趙曰水有藻鱗非特不獵抑且不漁矣謹潔以行言忠勤以事君言江淹詩袖中有短書叩通鑑秦王符堅如鄴獵於西山旬餘忘返伶人王洛馬而諌相如諌獵書清道而行中路而馳猶時有銜橛之變人橛車之鈎心也馬銜或斷鈎心或出則致傾敗以傷詩魚在在藻有頒其首王在在鎬豈樂飲酒小序曰魚藻刺幽王也言萬物失其性王居鎬京將不能以自樂故君子思古之武王焉詔後漢劉翊傳書嘉其忠勤晚年務置醴門引申白賓道大容無能永懷侍芳茵好去聲學尚貞一作正烈義形必霑巾揮翰綺繡揚篇什若有神此記其虛懷善學生上文専言射獵事故此又槩舉其平置醴接今人義形慕古人揮翰工書法篇什長詩作也常漢書楚元王敬禮申公等穆生不嗜酒元王每置酒為設醴張正見詩鄒嚴恆接武申白日相趨與賀知章禇廷誨等善為詩酒之交朱注舊唐書璡道大出老子吕氏春秋無智無能蹈晉傅亮表感舊永懷甚崔日知詩窗前窺石鏡河畔芳茵世說羊忱性貞烈公羊傳仇牧義形於色史曹植詩歔欷涕霑巾之沈佺期詩揮翰初難擬北文苑傳序雅言麗則竒綺合繡聨之美禰鍾嶸詩品於時篇什理過其辭孔融薦衡表升堂睹奧思若有神川廣不可泝墓久狐免鄰宛彼漢中郡一作王文雅見天倫何以慰一作門我悲泛舟俱逺津溫溫昔風味少去聲壯已書紳舊游易音異磨滅衰謝增一作多酸辛末因汝陽而及漢中乃撫今思昔之感俱逺津公在䕫州漢中在歸州也昔風味憶從前易磨滅慮將來此章首尾各十句中間皆八句分段鮑照詩川廣每多懼嵗桓談新論雍門周以琴見孟嘗君曰臣竊悲千秋萬後墳墓生荆棘狐穴其中樵兒牧豎躑躅而歌其上曹漢中王瑀汝陽王弟也公昔與漢中王㑹於梓州植詩文雅縱橫飛穀梁傳兄弟天倫也企于寶晉論泛舟三峽江詩溫溫恭人書晉劉遺民書懷風味鏡心象迹淹詩感贈還紳何承天詩願言桑梓思舊遊可司馬遷書古者富貴而名磨滅不勝紀前贈汝陽王本排律也故敘次莊嚴此哀汝陽王乃古詩也故紀述錯綜前拈德升為全詩之綱於竒毛賜鷹只一語輕㸃此拈謹潔極為通篇之眼將詔王射雁用三段詳敘如史記淮隂侯傳多入蒯通語司馬相如傳備載文君事皆以旁出見竒方是善於寫生者贈祕書監江夏李公雍盧注哀祕書者哀其文章氣節遭讒而死為可傷也李唐書文苑傳李雍廣陵江都人少知名在長安嶠張廷圭並薦雍詞髙行貞堪為諫諍官張溍曰李蘇鄭三人皆書地長嘯宇宙間髙才日陵一作淪朁古人不可見前輩復扶又切誰繼首嘆才人凋謝詩長嘯激清風古人槩言前輩指李無左思劉峻辨命論髙才而貴仕以左傳上陵下朁抱朴子陵朁之端所多有孔融書今之少年喜謗前輩憶昔李公存詞林有根柢聲華當健筆灑落富清製風流散金石追琢山嶽鋭情窮造化理學貫天人際憶昔一提至竟掩宣尼袂痛其抱才不遇也言此敘李公文字二根柢謂學有本源健筆足副聲名書法起下金石句制作恆多灑落言文章起下造化二句包散謂刋布追琢謂鐫勒窮造化所見者精貫天人所者大陸倕感知巳賦學窮書府文究辭林宇漢書鄒陽傳蟠木根柢郭劉峻書聲華無寂功庾信文順集序章表健筆象莊子序灑落之未加春晉書樂廣傳天下言風流者以王樂為首稱表吕氏秋功績銘乎金石秦始皇紀刻於金石以為經炎詩詩追琢其章金玉其相化山嶽鋭狀碑勢之巍峩酈功名重山嶽莊子造之所始司馬遷傳究天人之際通古今之變成一家之言干謁走其門碑版照四裔各滿深望還森然起凡例蕭蕭白楊路洞徹晉作涸轍寶珠惠龍宫塔廟湧一作踴浩劫浮雲一作空衛宗儒俎豆事故吏去思計眄睞已皆虛跋涉曽音層不泥去聲向來映當時豈獨一作特勸後世此述其聲價之重製于謁滿望言有求必應森然起例謂碑文體白楊墓道碑也龍宫寺觀碑也宗儒學宫碑也故吏遺愛碑也眄睞皆虛前之看碑者已往跋涉不泥後之摩碑者復至故下接云映當時而勸後世若以眄睞跋涉為索文之人於上干謁句為重復矣趙曰泉路昏暗得雍之文如明珠洞徹故以為惠塔廟之文神靈呵護雖亘經浩劫而浮雲常衛謝靈運詩圖牒復磨滅碑版誰傳聞碑乃石碑版是金版臣東都賦瞰四裔而抗稜凡史記陳餘曰不意君之望深也杜預左傳序發以言例古詩白楊何蕭蕭松柏夾廣路曰宣室志馮翊嚴生家漢南峴山得一珠如彈丸胡人此西國清水珠至濁水泠然洞徹矣說苑寶珠不飾鷲仙傳昆明池龍宫有仙方三十六首徐陵寺碑朝驚嶺夜動龍宫金剛經如佛塔廟從洛陽伽藍記永熙三年永寧寺浮圖為火所燒有人東萊來云見浮圖於海中光明照耀儼然如新部此言塔廟如龍宫也浩度人經惟有元始浩劫之家制我界統成𤣥都也劫無窮之劫史記孔子布衣傳十餘世學者宗之劉向傳仲舒學為儒宗前論語俎豆之事霍光傳問所親故吏何武傳生無赫赫名去後常令人思傳古詩眄睞以適意詩大夫跋涉沈約謝靈運論標能擅美獨映當時豐屋珊瑚鉤麒麟織成罽居例切紫騮隨劍几義取無虛嵗分宅脫驂間感激懷未濟衆歸賙給美擺落多藏晉作贓穢此述其好施之情而珊鉤麟罽騮馬劍几皆富家饋以求文者人多感激心如未濟見其急於為人衆美賙給而志厭多藏見其胸懷髙曠詮易豐其屋天際翔也晉書今之百姓競豐其屋蕭詩珠簾半上珊瑚鈎天中記漢武帝時日本國貢麒麟錦金花眩人眼目漢書注罽織毛若今毼及氍毹之類以織成罽對珊瑚鈎織成乃罽名也公集中有織成詩題梁簡文詩風吹鳯凰袖日映織成衣周王褒詩銀鏤光明帶金地織成靴可證馬南史梁武帝幸樂遊苑羊侃預宴賜以河南國紫騮宋之問詩劍几傳好事論語義然後取冠舊唐書雍早擅才名尤長碑頌雖貶職在外中朝衣及天下寺觀多齎持金帛往求其文前後所製幾數百首又云雍受納饋遺多至巨萬時議以為鬻文獲財未有如雍者孔叢子郈成子聘晉過衛右宰轂臣觴之酬畢而送以璧成子行聞衛亂轂臣死之於是迎其妻子還其璧隔宅而居之廣絶交論寧慕郈成分宅之德吳志周瑜推道南大宅以舍孫策有無通共之史記越石父賢在縲絏中晏子出遭之途解左驂贈延為上客普趙岐孟子章指千載聞之猶有感激談劉劭人物志博周給𢎞在覆裕陶潛詩擺落悠悠老子多藏必厚亡顔氏家訓山巨源以蓄積取譏皆多藏厚亡之文也唐書讐人告雍贓貨枉法許昌人孔璋上書救之曰斯人所能者拯孤恤窮救乏賑惠積而便散家無私聚獨步四十年風聽九臯唳嗚呼江夏姿竟掩宣尼袂此傷其遭逢不偶獨步名振文壇風聽聲徹帝庭宣尼掩袂道窮可憫矣此句結前起後曹植詩仲宣獨步於漢南詩鶴鳴于九臯聲聞于天唐書𤣥宗束封回雍獻詞賦稱㫖後因上計偕中使臨索其文故以九臯鶴唳比之漢書天下無雙江夏黃童李世系表後漢㑹稽太守髙陽侯徙居江夏遂為江夏氏其後元哲徙居廣陵元哲生善善生雍故題曰江夏李公詩又云江夏姿也琨公羊傳西狩獲麟孔子反袂拭面涕泣沾袍劉詩宣尼悲獲麟往者武后朝音潮引用多寵嬖否臧太常議面折二一作三張勢衰俗凜生風排蕩秋旻霽忠貞負寃一作怨恨宫闕湥旒綴往者再提至易力何湥嚌痛其直節受枉也其此記其立朝風節周注當時振頽俗霽天顔忠貞若此而為小人所陷亦以天子深居九重耳目易於壅蔽耳左傳齊侯好內多內寵內嬖西京賦彈射臧否搜神記乞陛下聖造親試否臧再舊書韋巨源傳太常博士李處直議巨源諡曰昭雍駁之文士推重左史記絳侯謂王陵面折廷爭臣不如君后唐書雍拜拾遺中丞宋璟劾張昌宗兄弟反狀武不應雍在階下大言曰璟所陳社稷大計陛下當聽后色解即可璟奏淮南子衰世之俗以其智巧詐僞趙廣漢傳見事風生無所回避傅𤣥傳𤣥除郎中貴游懾服臺閣生風邵注秋旻霽美其皎潔也爾雅秋曰旻天左傳荀息曰臣竭其股肱之力繼之以忠貞旄前漢五行志君若綴旒不得舉手應劭曰旒旌旗之隨風動搖也或曰旒黈所以蔽耳目言朝廷之聰明蔽塞放逐早聯翩低垂困炎癘一作厲日斜鵩鳥入魂斷蒼梧帝榮一作策枯走不暇星駕無安稅幾分漢庭竹夙擁文侯篲終悲洛陽獄事近小臣斃一作敝禍階初負謗易音異力何深嚌才詣切謫致死此記其被聯翩屢謫貶炎厲瘴熱地雍貶多在南方故用長沙蒼梧事歷趙曰榮枯無常故奔走不暇而無祱駕之處盧注任迭為刺史故云幾分竹所在必親賢士故云夙擁篲且周甸注雍名位不為卑賤而其死也競與小臣無異其禍起負謗非有實事擠之亦易為力何必湥噬至此乎史記屈原放逐著離騷司馬相如賦黼帳低垂舍宋之問詩自可乘炎癘斷鵩鳥賦庚子日斜鵩集豫宋之問詩百越去魂吳均詩依依望九疑欲謁蒼梧帝未魏都賦英辨榮枯駕詩星言夙駕唐史記李斯傳吾知所稅駕也注稅猶言解駕書雍纍貶雷州司户崖州舍城丞又貶欽州遵化尉庾漢書文帝三年初與郡守為銅虎符竹使宇文逌信集序寄深分竹雍阮籍奏記子夏處西河之上而文侯擁篲舊唐書為陳州刺史歷括淄滑三州刺史天寶初為汲郡北海太守上計京師皆以雍重義愛士古信陵之流後漢蔡雍傳雍上書自陳下洛陽獄詔減死一等與家屬髠鉗徙朔方禍左傳與犬犬斃與小臣小臣亦斃周語其無乃階乎賈誼傳適足以負謗於天下耳小前漢書摧枯朽者易為力宋玉言賦㑹九族而同嚌伊昔臨淄亭酒酣託末契重平聲敘東都别朝隂改軒砌初計切鵩伊昔三提至鯤噴迢遞追遡交情始末也求此言其投契甚久淄公與雍初遇於東都所云李雍識面也再遇於臨亭有陪宴歷下亭詩公為後輩故云求契久敘濶思故日隂改移也謝靈運詩伊昔家臨淄臨淄亭在今山東濟南府逰左思詩酒酣氣益震尚書孔傳樂酒曰酣景陸機歎賦託末契於後生潘嶽楊仲武誄日仄西望子朝隂扣廣雅砌戺也西都賦𤣥墀砌戺音啓扣音口論平聲文到一作推崔蘇指一作推盡流水逝近伏盈川雄未甘特進麗是非張相國相扼一危脆爭名古豈然關鍵從英華他本作楗或作揵其獻切歘不閉例一作倒及吾家詩曠懷掃氛翳慷慨嗣真作咨嗟玉山桂鐘律儼髙懸鯤鯨噴迢遰此記其評論詩文例論文以下槩論當世之文及以下專論一家之詩皆崔蘇楊李同時文名最著屈指而到崔蘇凡已逝者如流水矣於楊炯則服其雄於李嶠則嫌其麗此篤論也獨於張相國不無是非之隙遂至相扼而幾危亦由雍之不能忘名而善閉耳例及因類而及也曠懷一句此雍通論審言之詩咨嗟三句又特美所和嗣真一作趙注山桂比詞之秀拔鐘律比聲之和雅鯤鯨比勢之强壯李味道九歲能屬詞與李嶠俱以文翰顯朝野僉載嶠崔融蘇味道杜審言為文章四友世號崔李蘇杜故公詩稱之炯指盡屈指數盡也劉楨詩逝者如流水唐書楊傳炯為梓州司法參軍遷盈川令卒品李嶠傳神龍三年封趙國公加特進同中書門下三嶠富才思前與王勃楊盈川接中與崔融蘇味道齊名良張說云楊盈川文如懸河注水酌之不竭李嶠文如金美玉無施不可莊子彼亦一是非此亦一是非封張說傳𤣥宗誅蕭至忠召說為中書今封燕國公東還為尚書左丞相舊書雍素輕張說說甚惡之蚍史記兩賢豈相扼哉脆梁簡文書危脆之質有險蜉庾信崔說碑百齡危國䇿張儀曰爭名者於朝鍵魏文帝典論文人相輕自古而然老子善閉無關而不可開注橫木為關竪木為楗漢石崇思歸引歘復見牽羈公鮑照詩安知曠士懷高帝紀慷慨傷懷朱注祖審言集有和李大夫嗣真奉使存撫河東詩非指歷下倡和之作千家本載公自注云甫有和李太守詩此僞託者善本俱無良世說范宣看畢咨嗟桂晉書郤詵對武帝曰臣舉賢對策為天下第一猶林一枝崑山片玉史記鐘律調自上古顧野王虎丘山亭序成文暢於鐘律如景福殿賦華鐘機其髙懸王嘉拾遺記鯤魚千尺鯨遞吳都賦曠瞻迢注迢遞逺貌坡陀青州血蕪沒汶陽瘞哀贈竟一作晚蕭條恩波延揭巨列切厲子孫存一作在如線舊客舟凝滯君臣尚論平聲兵將去聲帥接燕平聲薊朗詠六公篇憂來豁䝉蔽末傷其身後荒涼撫時而增歎也之血漬青州骨藁汶陽其哀贈恩典尚待將來揭厲今子孫微弱舊交逺遊亦誰為謀其昭雪乎最可傷者國有外侮而朝無直臣今日之痛李公猶李公之惜六公也結語無任悲愴降揭厲謂髙揭而揚厲論兵以吐蕃屢侵將帥指河北將通論此章是五段文字細分之則四句者三段八句者三段十四句者兩段十句十二句者各一段十段之中多寡仍相遙應司馬相如哀二世賦登陂陀之長坂海任昉墓銘蕪沒鄭鄉寂寥楊冡唐書武德二年北郡置汶陽縣舊書天寶五載左驍衛兵曹參軍栁績有罪下獄雍嘗遺績馬吉溫使引雍嘗以休咎相語隂賂遺宰相李林甫素忌雍因傅以罪詔刑部員外郎祁順之監察御史羅希奭就郡杖殺之年七十客葬於此唐書代宗時贈雍祕書監引丘遲詩肅穆恩波被厲劇秦美新論侯衛厲揭周甸詩深厲淺揭以解揭未合今從朱注越絶書中國不絶如線水舊客公自謂左傳禁舊客勿出於富後别賦舟凝於濱吳越春秋孫子與吳王論兵漢吳漢傳往來燕薊之間六天台賦朗詠長川柬原注公有張桓等五王泊狄相公詩朱注五王張之桓彥範敬暉崔𤣥暐袁恕巳狄相則仁傑也趙明誠金石録唐六公詩李雍撰胡履靈書初讀八哀詩恨不見其詩晚得石本其文詞髙古真一代佳作也六公者五王各為一章狄丞相别為一章抱朴子訓誨所以移䝉蔽王嗣奭曰李才名甚盛而其死甚慘公痛之極故云竟掩宣尼袂又云魂斷蒼梧帝又曰事近小臣斃末又曰坡陀青州血不覺言之復也葉石林以為纍句論詩則是而非所以論子美其起語豪宕亦兼自寓各章以序事成文部署森嚴純似班史唯此章感慨激昻排蕩變化直追龍門之筆細按其前後段落又未嘗不脈絡整齊也陵郝敬曰李江夏之文藻鄭司戶之博綜必有少之雋筆乃能曲盡其妙故祕書少去聲監武功蘇公源明盧注哀祕書者哀其忠孝文章始終為可惜也武唐書蘇源明京兆功人武功少去聲也孤徒步客一作㝢徐兖讀書東嶽中十載上聲考墳典時下去聲萊蕪郭忍饑浮雲巘負米晚為去聲身每食臉力減切必泫叶上聲夜字照爇薪垢衣生一作帶碧蘚庶以勤苦志報兹劬勞願叶上聲吳作顯衣此敘其少而好學忍饑垢貧能苦志臉必泫傷親殁報劬勞念親恩俱應少孤羲唐書源明初名預少孤寓居徐兖孔安國書序伏神農黃帝之書謂之三墳少昊顓頊髙辛唐虞之書謂之五典又曰孔子討論墳典斷自唐虞以下舊書萊蕪漢縣後廢長安四年於廢嬴縣置萊蕪縣屬兖州朝饑最難忍陟則在巘巘山頂也薛君章句云家語子路為親負米百里之外以楚辭橫垂涕兮泫流家侯瑾家貧傭賃暮輒燒柴薪讀尚書孔傳范汪貧好學燃薪寫書既畢誦讀亦竟勤碧蘚猶今人言衣服斑母韓詩外傳子路曰不能苦馬得行此詩哀哀父生我劬勞學蔚醇儒姿文包舊史善灑落一作淚辭幽人歸來潛京輦射音石君東堂策一作射策君東堂宗匠集精選制可題一作題墨未乾居寒切乙科一作休聲已大闡文章日自負掾吏一作吏祿亦纍上聲踐晨趨閶闔內足踏宿昔趼古典切出此敘其壯而仕蔚醇儒其學不雜包舊史其文甚博京輦輦轂之下東堂試策之地宗匠指衡文者掾吏屢踐自卑官屢遷也足蹈昔趼依然徒步而入也為易其文蔚也蔚文深貌漢書賈山涉獵書記不能醇儒漢書左傳序舊史遺文略不盡舉詩易幽人貞吉升袁紹書公族子弟生長京輦吳薛瑩遷入京輦遂樞機山謙之丹陽記太極殿周路寢也東西堂魏制周小寢也晉書摯虞舉賢良武帝詔諸賢良方正直言㑹東堂策問袁宏三國名臣贊序莫不宗匠陶鈞惠逺詩時無悟宗匠誰將握𤣥契蔡雍獨斷羣臣有所奏請尚書令奏下之有制詔天子答之曰可諸儒林傳房鳯字子元以射策乙科為太史掌故唐書進士試時務策五條帖一大經經䇿全得為甲第策得四帖過四以上為乙第又云源明工文詞有名天寶間及進士第更試集賢院纍遷太子諭德有大人賦排閶闔而入帝宫韋昭注閶闔天門也天上閶闔殿故人間帝殿亦名閶闔莊子百舍重趼增韻足胝曰趼一麾出守去聲還黃屋朔風卷不暇陪八駿虜庭悲所遣平生滿樽酒斷此朋知展憂憤病二秋有恨石一作不可轉肅宗復社稷得無順逆一作逆順辨范曄顧其兒李斯憶黃犬祕書茂松色一作意再扈王仲正本作再從一作屢侍祠壇墠此叙其陷賊不汚致黃屋風卷上皇幸蜀矣源明失於陪從為賊驅遣而悲憤也朋知斷故情不展石可轉見心不變如吳論肅宗復位順逆既辨一時受僞命者悉加刑戮范曅有顧兒之痛李斯含黃犬之悲而祕書獨寒松不改得與郊祀盛典顔延之咏阮咸詩屢薦不入官一麾乃出守唐書源明出為東平太守召還為國子司業祿山陷京師以病不受僞署八駿用周穆王巡遊事陳琳檄文並集鹵庭三謝靈運詩再與朋知辭以詩我心匪石不可轉也都賦序既以著逆順且為鑒戒宋書范曅臨刑其子靄取地土及果皮擲曅曅問曰汝嗔我耶靄曰今日何緣嗔但父子同死不能不悲史記二世具李斯五刑論腰斬咸陽市顧謂其中子曰吾欲與若復牽黃犬俱出上蔡東門逐狡豈可得乎世說張伯威歲寒之茂松幽夜之逸光書唐書肅宗復兩京擢源明考功郎中知制誥後為祕少監卒扈祠扈從祠祭也墠書為三壇同前後百卷文枕去聲藉皆禁臠盧演切篆刻一作制作揚雄流溟張本末一作未淺青熒芙蓉劍犀兕豈獨剸止兖切反為後輩䙝豫實苦懷緬煌煌齊房芝事絶一作終萬手搴音蹇垂之俟來者正始徵勸勉不要一作惡懸黃金胡為投乳一作亂贙音畎之此敘其文才直節雖禁臠比文豐美才大如楊雄溟漲猶為淺末鋒利如寶劍雖犀兕亦可剸截有文如此而人乃䙝視公所以懷思而歎息也當時齊房瀆祀蘇能苦口力諍於萬手欲搴者竟阻絶而不行足為將來勸勉矣且其意不欲求取金印何為觸犯忌諱如投乳贙乎此皆發於忠愛之誠耳纍唐書源明又有前集三十卷隋辛德源少有重名官考功郎中劉逖薦之曰枕藉六經漁獵百氏臠謝混傳元帝始鎮建業每得二豚以為珍膳項下一尤美輒以薦帝呼為禁臠法言或問吾子好賦曰然童子雕蟲篆刻壯夫不為末謝靈運詩溟漲無端倪後漢書范升以為左氏淺不宜立曹植責躬表詞㫖淺未不足採覽此未淺二字所出若作未淺則海深何待言乎羽獵賦炫耀青熒青熒劍有光澤貌俠越絶書寶劍篇揚其華如芙蓉始出盧照鄰詩相邀客芙蓉劍李尤劍銘陸剸犀兕水截鯨鯢興蔡雍傳後輩被遣生文選注緬思貌鑑漢書武帝大祠祀元封中齊房芝而作歌通乾元二年六月上從王璵請立太乙壇於南郊之東自漢武帝祠太乙至唐復祠之舊唐書肅宗紀上元二年七月延英殿御座梁上生玉芝一莖三花上製玉靈芝詩唐書本傳肅宗時禁中禱祀窮日夜中官用事給養繁靡源明數陳政治得失及思明陷洛陽帝將親征上疏極諌帝嘉其切直子夏詩序周南召南正始之道王化之基晉書衛玠傳不意永嘉之未復聞正始之音李陵書來相勸勉晉書周顗傳取金印如斗大繫肘惡爾雅贙有力注出西海大秦國有養者似狗多力獷炙轂子載贙銘曰爰有獷獸厥形似犬饑則馴服飽則反眼出於西海名之曰畎結交三十載上聲吾與誰游衍滎陽復扶又切冥寞罪罟已橫去聲罥吉畎切嗚呼子逝日始泰則一作即終蹇長安米萬錢凋喪去聲盡餘喘戰伐何當解歸帆阻清沔尚纒漳水疾永負蒿里餞末歎蘇公身殁不及哀奠也滎陽罹罪而亡武功凶年而卒則遊衍無人矣歸始泰遭遇中興終蹇身殁荒歲戰伐吐蕃未靖清沔路所經胡夏客曰武功少孤忍饑為官又以饑終讀此不禁三歎昉此章前後三段各十二句中間二段各十四句任詩結歡三十載不詩及爾游衍罹新史源明雅善鄭䖍杜甫詩罪罟收橫罥橫法網也劉孝威詩菱芒乍罥絲李善選注罥結也舊泰蹇用易卦名秋漢高帝紀關中大饑米斛萬錢書廣德二年自及冬斗米千文一斛則萬錢矣蘇鄭皆卒於是年故他詩曰穀貴殁潛夫又曰凶問一年俱山海經注漢水至江夏安陸縣入江即沔水致劉楨詩余嬰沈痼疾竄身清漳濱杜臆蒿里餞謂奠也古今注蒿里喪歌也人死精魂歸於蒿里使挽者歌以送之蒿里山名邵注田橫死門人作挽歌二章今分為二薤露歌送王公大人蒿里歌送士大夫庶人之喪八哀詩苦心力索未免人勝於天就諸章而論前五篇精悍蒼古後三首却繁密不疏尚須分别而觀故著作郎貶台州司户滎陽鄭公䖍盧注哀滎陽者哀其生不逢時至被汚貶死為可悼也鄭䖍滎陽人鶢居至魯門不識鐘鼓饗孔翠望赤霄愁思去聲一作入雕籠養滎陽冠去聲衆儒早聞名公賞地崇士大夫況乃氣精英華作氣精一作精氣一作氣清爽首言其人品孤髙而兼得名位上四比下四賦原注昔者海鳥止於魯郊魯侯御而觴之於廟奏九韶以為樂具太牢以為膳鳥乃眩視悲憂三日而死江淹擬古詩成池饗爰居鐘鼓或愁辛之張華鷦鷯賦序孔雀翡翠或陵赤霄之際或託絶垠外然皆負矰嬰繳羽毛入貢疾禰衡鸚鵡賦閉以雕籠剪其翅羽才原注往者公在蘇公頲位尊望重素未相識早愛名躬自撫問臨以忘年之契逺邇嘉之公後漢張奮傳衆儒不達議多駁異蜀志注鍾㑹名之子地崇指著作郎後漢來歙傳士大夫皆信重之魄前漢五行志心之精爽是謂魂天然生知資學立游夏上神農或闕漏黃石愧師長丁文切藥纂西極一作域名兵流指諸掌貫穿去聲無遺恨薈烏外切蕞在最切何技癢此記其長於著述謂生知多學領下兩段神農起藥纂黃石起兵流貫穿聞見博薈蕞謂雜撰多陳琳書此乃天然異稟非鑽仰者所庶幾也庾肩吾書品鍾天然第一生知見禮記後漢李固傳通游夏之藝顔閔之仁人神農著本草黃石父授張良兵法此言䖍所著之書古不逮也楚辭橘頌年歲雖少可師長兮上林賦左蒼梧右西極唐顔氏家訓吾見世文學之士品藻古今若指諸掌書䖍學長於地理山川險易方隅物産兵戈衆寡無不詳審嘗為天寶軍防録言典事該諸儒服其善著書司馬遷傳贊貫穿經傳馳騁古今又文賦恆遺恨以終篇之原注公著薈蕞等諸書之外撰胡本草七卷高元茶甘録薈草多貌蕞小也䖍自謂著書雖多皆碎小之事唐史目其書為㑹稡亦承襲之誤爾雅序㑹稡稡音最聚也薈蕞與㑹稡二說不同趙次公云當以公詩為正欲射雉賦徒心煩而技懩徐爰注有技藝逞曰技懩圭臬星經奧蟲篆丹青廣子雲窺未遍方朔諧太枉神翰顧不一體變鍾兼兩文傳天下口大字猶在榜昔獻書畫圖新詩亦俱往滄洲動玉陛一作階寡英華作宫鶴誤一作設一響三絶自御題四方尤所仰此稱其才勢絶人工土圭善地理星經識天文蟲篆書法丹青能繪畫朔朱注䖍之學識過於子雲之博覽䖍之談論勝於方之詼諧顧野王竒字皆通有䖍而顧不止一矣鍾繇鍾㑹父子善書有䖍而鍾可兼兩矣文傳二句見名重當時獻書以下見才動人主陸倕石闕銘陳圭置臬氏注圭以測日景臬以度廣狹也雅天官家有甘石二星經魚豢魏略邯鄲淳善蒼蟲篆傅咸賦圖像於丹青多揚雄傳雄少好學博覽無所不見東方朔贊詼達端應諧似優陳書顧野王傳蟲篆竒字無所不通鍾太枉太迂曲也隸宋書謝靈運傳體變曹王金壺記繇工三色書草八分最優兼兩本易繫辭傳圖南史劉穆之謂宋武帝曰公但織筆為大字三輔黃玉堂殿階陛皆玉為之朱注玉陛之上展其滄州圖畫而寡鶴誤為發響形容繪事之逼真也張協詩寡鶴空悲鳴唐書䖍善圖山水嘗自寫其詩并畫以獻帝大署其尾曰鄭䖍三絶為宋書謝瞻作喜霽詩靈運寫之混詠之王𢎞在坐以三絶吕總云䖍書如風送雲收霞催月上嗜酒益疏放彈琴視天壤形骸實土木親近惟几杖未曽音層寄魯作記官曹突兀倚書幌晚就藝香閣胡塵昏坱莽反覆音福歸聖朝音潮㸃染無滌蕩老䝉台州掾遐泛從英華一作泛泛浙江漿履穿四明雪饑拾楢以周切溪橡此敘其平生履歷致疏放二句動時之興土木一句靜中之未寄官曹初設廣文館也晚就藝閣後為著作郎也突兀端坐之貌坱莽空曠之地䖍本心歸王室但一受僞命無從洗滌是以有台州之貶履穿拾橡貧困不能自給矣時晉書阮籍傳嗜酒能嘯善彈琴當其得意忽忘形骸人多謂之癡太尉有世說袁尹疏放好酒以杜臆彈琴視天壤寫得疏放神壺子曰吾示之天壤見吾善者機也國䇿魯仲連曰名與天壤俱敝文嵇唐傳土木形骸不自藻飾唐語林云𤣥宗置廣館以䖍為博士䖍聞命不知廣文曹司何在訴宰相宰相曰上增國學置廣文館以居賢者令後世言廣文博士自君始不亦美乎䖍乃就職新書云久之雨壞廡舍有司不復修完寓治國子館自是遂廢非實録也陳子昻集祖斂仁檢校祕書郎持三筆終入藝香閣之野藝香辟紙蠧故藏書稱藝臺上林賦過於埉莽顔氏家訓武烈太子坐上賓客隨宜㸃染即成數人台抱朴子外物棄智滌蕩機變謝靈運山居賦注天四明相接連四眀方石四面自然開窗山天台賦濟楢溪而直進顧愷之啓䝉記注曰之天台去天不逺路經楢溪水深險清泠前有平橋路徑不盈尺長數十丈下臨絶澗唯忘其身然後能濟寰宇記楢溪在臨海縣東三十五里四明在今寧波府楢溪在今台州府俱屬浙東路履莊子衣弊履穿貧也非憊也考史記東郭先生貧困行雪中有上無下足盡蹈地人皆笑之又莊子古者晝拾橡栗暮栖木上命之曰有巢氏之民徐無鬼居山林食芧栗芧栗即椽栗也水唐書䖍遷著作郎安祿山反劫百官置東都僞授䖍部郎中因稱風緩求攝市令潛以密章達靈武賊平免死貶台州司户參軍事後數年卒空聞紫芝歌不見杏壇丈天長眺東南秋色餘魍魎别離慘至今斑白徒懷曩此憶台州之别台紫芝歌埋迹深山杏壇丈久離博士東南魍魎俱指州懷曩起下紫芝歌用四皓事莊子孔子游乎緇帷之林坐杏壇之上隂記席間函丈天老子天長地久宋王微詠賦秋色兮白露商台賦始經魍魎之塗昨斑白見孟子盧諶詩借曰如忽焉疇曩春深秦一作泰山秀葉墜清渭朗劇談王侯門野稅林下鞅操紙終夕酣時物集遐想此憶長安之事咏劇談二句言隨意宴遊操紙二句言醉後吟揚雄傳口吃不能劇談鮑照詩無由稅歸鞅邵注稅止也鞅馬頸組易惟其時物也袁宏三國名臣序贊遐想管樂逺明風流詞場竟疏濶平昔濫推從趙本一作吹晉作咨奬百年見存殁牢落吾安放一作倣蕭條阮咸在出處上聲同世網他日訪江樓含悽述飄蕩上聲不此結出歿後哀思安疏濶承台州公見鄭也推奬承長鄭嘗奬公也百年存殁又總承二句鄭審在江陵哀死而因念生與前哀汝陽王同意張逺注此即昌黎所云思元賓而不見見元賓之所友者而如見賓也六此章起結三段各八句中二段各十四句後二段各句顔延之詩存歿竟何人將蔡雍瞽師賦時牢落以失次鄭檀弓哲人其萎則吾安放原注著作與今祕監君審篇翰齊價謫江陵故有阮咸江樓之句黃鶴曰審當與䖍為兄弟故比之阮咸如杜位乃公從弟而云呵咸也桓張協詩出處雖殊途我陸機詩世網嬰吾身𤣥登江陵城南樓云今欲為王孝伯作誄世說謝靈運詩含悽泛廣川回鮑泉詩飄蕩逐風劉克莊曰八哀詩中如鄭蘇二首非無可說但每篇多蕪辭纍句或為韻所拘殊缺條鬯不如飲中八仙之警䇿蓋八仙歌每人只三四句八哀詩或纍押二三十韻以此知繁不如簡雖大手筆亦然今按飲歌只說一事八哀則概列平生未可以槩論盧德水云八哀詩未免傷煩傷泛中有數十光潔語堪與日月並垂者自不為浮雲所掩大槩詩家之元氣在焉杜詩之體統存焉不可遺亦不容選也故右僕射相去聲國曲江張公九齡盧注哀相國者哀其志存王室明皇始終不能信用為可惜也九齡韶州曲江人相去聲國生南紀金璞無留礦古猛切與礦同仙鶴下去聲人間獨立霜毛整矯然江海一作漢思去聲復扶又切與雲路永寂寞想土階未遑一作嘗等箕潁首稱其品格不凡下金無留礦比才堪用世鶴人間比生質超羣既而飛騰雲路則想致君唐虞而不遑等於髙隱矣漢書百官表相國丞相皆秦官髙帝初置一丞相十一年更名相國循唐書自上洛南逾江漢擕武當荆山至於衡陽乃東嶺徼達東甌至閩中是謂南紀舊注江漢之南皆謂之南紀紀綱紀也謂經帶包絡之也郭璞賦其下則金礦丹礫說文礦銅鐵璞石也唐紀太宗謂魏徵曰金在礦何足貴耶冶鍛而為器人乃寶之九齡幼聰敏善屬文年十三以書干廣州刺史王方慶大嗟賞之曰此子必能致逺可見其不留於礦也鮑照舞鶴賦偉胎化之仙禽又疊霜毛而弄影宋之問詩粉壁圖仙鶴北史劉歊矯然出塵如雲中白鶴鮑照詩空守江海思江總為徐陵墓思鬱轉雲路階司馬遷傳墨者亦上堯舜言其堂髙三尺土三等抱朴子堯舜在上箕潁有巢棲之客上上聲君白玉堂倚君金華省碣石一作竭力歲崢嶸天池一作地日蛙黽退食吟大庭何心記一作託榛梗骨驚畏曩哲鬒音真一作鬚變負人境雖䝉換蟬冠右地恧女六切多幸敢忘一作志二疏歸痛迫蘇耽井紫綬一作紫紱英華作金紫映暮年荆州謝所領庾公興去聲不淺黃霸鎮每靜此敘其仕進履歷君玉堂金華切近於碣石崢嶸祿山勢張也天池蛙黽林甫恣讒也退食二句承蛙黽言不計私忿骨驚二句承碣石言憂在國事換蟬冠為尚書右丞相恧多幸言罷政雖慚而逺害猶幸也二疏比其歸養蘇耽比其奪情紫綬出為荆州長史庾亮黃霸稱其在任政績碧江淹金燈草賦植君玉臺生君椒室徐彥伯詩巢君梧樹舞君青瑣闈君字皆指君王漢書鄭寬中張禹朝夕入說尚書論語於金華殿中黃圖玉堂殿有十二門唐書九齡擢進士第拜校書郎歷中書舍人祕書少監集賢院學士中書侍郎此由玉堂金華省出入也碣石范陽地崢嶸髙大貌祿山所據黽東方朔七諫蛙黽游乎華池注喻讒佞弄口也爾雅形似青蛙而腹大其鳴甚壯詩退食自公大上古有大庭氏公詩大庭終返朴或引韓非子議於庭而後言作庭宇解者非郭璞遊仙詩戢翼棲榛梗榛小栗條如荆梗病也海本事詩曲江與李林甫同列林甫疾之若仇曲江為燕詩以致意曰無心與物競鷹隼莫相猜亦終退斥圭别賦心折骨驚京通鑑安祿山討奚契丹敗績張守奏請斬之執送師上惜其才赦之張九齡曰失律喪師不可不誅且其貌有反相不殺必為後患上曰卿勿以王夷甫識石勒枉害忠良竟赦之此詩畏曩哲指夷甫負人境恐為後患也謝朓詩誰能鬒不變陶潛詩結廬在人境舊書侍中中書令加貂蟬佩紫綬漢官儀武帝大冠加金璫附蟬為文貂尾為飾謂之貂蟬本傳開元二十二年九齡為中書令二十四年遷尚書右丞相罷政事所謂換蟬冠也沈約詩長驅入右地明皇雜録張九齡裴耀卿詔為左右僕射罷參知政事林甫怒曰猶為左右丞相耶二人趣就本班林甫目送之公卿不覺股栗兄左傳羊舌氏曰民之多幸骨漢書疏廣為太子太傅子受為少傅俱上疏乞骸上以其年篤老皆許之應神仙傳蘇耽郴縣人少孤養母至孝忽辭母云受性仙當違供養母曰汝去使我如何存活曰明年天下疫疾庭中井水簷邊橘樹可以代養至時病者食橘葉欽井水而愈唐書九齡遷工部侍郎乞歸養詔不許及母喪解職毁不勝哀有紫芝産坐側白鳩白雀巢冡樹是歲奪哀拜中書侍郎同平章事固辭不許朱注唐制大都督府長史從三品應紫綬荆州為上都督故時服紫綬也中山王文木賦青緺紫綬九齡嘗薦周子諒為御史子諒劾奏牛仙客語援讖書帝怒杖於朝堂流瀼州道死九齡坐舉非其人貶荆州長史長史之上有都督是其統領諸晉書庾亮鎮武昌諸佐吏乘月共登南樓俄而亮至人將起避之亮徐曰諸君且住老子於此興復不淺謝曹參傳嚴延年之治動黃次公之治靜晉書安傳每鎮以和靜賓客引調去聲同諷詠在務屏音丙詩罷地有餘一云詩地能有餘篇終語清省悉井切一陽發隂管淑氣含公鼎乃知君子心用才文章境韻重或作炳散帙起翠螭倚薄巫廬並綺麗𤣥暉擁箋誄任平聲昉騁自我一作成一家則未闕隻字警千秋滄海南名繫朱鳥影此敘其詩才文學也延客詠詩見風韻事地有餘力厚語清省詞爽也謂趙注一陽發管謂其詩可聽如黃鐘之律淑氣含鼎其詩可味如太羹之和君子二句惜其抱濟世之才退而用心於文章也起翠螭言文瀾激蕩並巫廬言才氣髙褰𤣥暉任昉謂詩文兼擅其勝趙注韶州在滄海之濱朱鳥即南方之宿當時謂九齡為滄海遺珠則才名久著南方矣舊書孟浩然還襄陽九齡時鎮荆州署為從事與之倡和廷又云九齡雖以直道黜不戚戚嬰望惟文史自娛朝許其勝流顔氏家訓諷詠辭賦子謝朓詩民淳紛務屏文陳沈炯詩丁翼陳詩罷莊其游刃必有餘地心雕龍士龍思劣而雅好清省待庾信玉律表節移隂管無勞河內之灰氣動陽鐘不金門之竹陸機詩蕙草饒淑氣陳子昻詩如何負公鼎文西都賦序大漢之文章炳焉與三代同風潘嶽誄披軼散書屢覩遺文楚辭乘玉輿兮駟蒼螭廣雅龍無角曰螭風江賦巫廬嵬崫而比嶠詩品小謝工為綺麗歌謡人第一南史謝𤣥暉善為詩任彥升工於筆言史記自序以拾遺補闕成一家之言陸機謝表片隻字不關其間又文賦一篇之警策赤天官書南宫朱鳥索隱曰南宫帝其精為朱鳥也歸老一作歟守故林戀關悄一作嘗延頸波濤良史筆蕪一作無非絶大庾嶺向時禮數隔制作難上上聲請再讀徐孺碑猶思理煙艇此敘其家居存殁而終之以哀弔殁而蕪絶於嶺外趙曰張公有良史之筆惜乎其人向時禮數隔絶巳之制作不能面質於生前今讀其徐孺之碑猶思理艇而往瞻拜於墓前焉此章首尾各八句中二段各十六句漢書邴漢以清行徴為京兆尹遂歸老於鄉里猶王粲詩飛鳥翔故林崔湜詩丹心恆懲闕西征賦犬馬之戀主竊託慕於闕庭如蕭望之傳天下之士延頸企踵沈班固答賓戲馳辨波濤左傳董狐古之良史也約郊居賦不載於良史之筆典朱注舊書九齡遷中書令嘗監修國史唐㑹要云六開元二十八年九齡所上路恨賦終蕪絶於異域齡新書韶州始興有大庾嶺新開元十七年詔張九開鶴注南康記漢兵擊吕嘉衆潰有神將戍是嶺以其姓庾因謂之大庾又以其上多梅而先發亦曰梅嶺唐書九齡封始興縣伯請還展墓病卒年六十八諡文獻後公於曲江無交故有向時禮隔之語或云九齡謝官朝廷禮隔制作不得上陳非也張公歿後尚賜諡遣祭何云禮數隔耶作任昉哭范僕射詩平生禮數絶漢禮制志稍稍制後漢書徐稚字孺子豫章南昌人稱南州髙士曲江見祿山有反相欲因失律誅之明皇不聽至幸蜀以後追思其言遣使祭贈此事乃一生大節關於國家治亂興亡篇中尚略而未詳其歷敘官階詳記文翰頗失輕重之體劉須溪嘗議及之楊升菴因補作一篇云相國生南紀蔚為曲江彥山接韶音峯秀鍾重華甸風雅既葳蕤聲名鬱䓤倩登庸伊吕科敷奏姚宋羡珠澤隨侯雙玉林郤詵片九重集神仙咫尺生顧盻陸謝擅緣情沈范采餘絢九遷帝獨竒三臺師錫薦補衮綴宗彝用藥必瞑眩防乎貴未然介焉斷幾見狐媚蕩主心狼子紆皇眷金鏡倐垢塵玉奴驚睲䁂萋斐偃月堂棄捐秋風扇鼉動漁陽鼙虻飛太極箭朱鸞奔咸京青騾乘蜀傳棧閣雨淋鈴宛洛飈回縣蜚㕍愁仰霄昆蹄怯升獻噬臍漫天泣回腸嶺南奠精巳箕尾騎魂猶螭頭戀絶線國步危規瑱忠言踐青史篆崢嶸翠珉藤镺蔓誰珍徐孺碑雕蟲但黃絹按此詩格整辭茂力摹少陵玉奴楊妃小名睲䁂目睛大也東坡詩潞州别駕眼如電次公注明皇初為此官據此則睲䁂當指明皇驚者不欲令帝見此書也别傳謂九齡進金鏡録為貴妃所毁睲音性翳音限镺音襖左思吳都賦卉木镺蔓劉克莊後村曰杜公八哀詩崔德符謂可以表裏雅頌中古作者莫及韓子蒼謂其筆力變化當與太史公諸贊方駕惟葉石林謂長篇最難晉魏以前無過十韻常使人以意逆志初不以敘事傾倒為工此八篇本非集中髙作而世多尊稱不敢置議其病蓋傷於多如李雍蘇源明篇中多纍句刪去其半方為盡善余謂韓比此詩於太史公紀傳固不易之論至於石林之評纍句為長篇者亦不可不知郝敬仲輿曰八哀詩雄富是傳紀文字之用韻者文史為詩自子美始䕫府書懷四十韻鶴注當是大厯元年秋作昔罷河西尉初興薊北師不才名位晚敢恨省郎遲扈聖崆峒日端居灔澦時萍流仍汲引樗散上聲尚恩慈遂阻雲一作靈臺宿一作仗常懷湛露詩翠華森逺矣白首颯淒其拙被林泉滯生逢酒賦欺文園終寂寞漢閣自磷緇病隔君臣議一作識慚紆德澤私揚鑣驚主辱拔劍撥年衰所追切綱首敘遭遇偃蹇乃書懷之故晚上四為通節之身受郎官須驚主辱名位巳故撥年衰扈聖端居又作一提萍流六句為郎而思扈聖也拙被六句辭官而居灔澦也主辱年衰承上起下天寶十四年公授河西尉不拜值祿山叛扈從肅宗於鳯翔未幾入蜀以嚴武薦除工部員外郎又辭幕府至䕫州首尾凡十二年至公未嘗至崆峒而云扈聖崆峒者以肅宗自平凉而崆峒在其地也汲引指嚴武恩慈謂朝命宿雲臺宴湛露望翠華皆想為拾遺事卧杜臆放迹林泉而云酒賦所欺此公省愆語也病文園慚居漢閣以蜀中馬揚自方主杜臆揚鑣拔劍憤激悲壯之情形於詞色矣朱注辱謂車駕幸陜鮑照詩出自薊北門蔡吳越春秋札雖不才臺鼂錯傳名位不失施於後世質漢儀尚書郎入直中牛𢎞詩端居留眷想出海賦萍流而浮轉被劉向傳轉相汲引見樗樹散木莊子蕭淵明書此恩慈雲臺仗八哀詩之葳蕤詩序湛露天子燕諸侯也北南都賦望翠華謝靈運詩懷賢亦悽其史韋敻淡於榮利所居之宅枕帶林泉漢西京雜記梁孝王集諸遊士於園鄒陽作酒賦書司馬相如拜為文園令後病免家居茂陵德揚雄校書漢閣此特借比西閣磷緇猶云磨礪慚紆澤自愧退居枉沐君恩耳或解璘緇為名玷朝班不合龍謝靈運詩磷緇謝清曠鑣忠經沐浴德澤舞鶴賦驤橫舉揚鑣飛沫善曰馬勒旁鐡劍史記主辱則臣死淮漢書叔孫通傳拔擊柱撥奮起也南子年衰志憫社稷經綸地風雲際㑹期血流紛在眼涕灑一作泗非亂交頤四瀆樓船泛中原鼓角悲賊壕連白翟戰瓦落丹墀先帝嚴靈一作虛寢宗臣切受遺恆山猶突騎去聲遼海競張旗田父嗟膠漆行人避蒺藜總戎存大體降音杭將去聲飾卑詞楚貢何年絶堯封舊俗疑長吁翻北冦一望卷西夷此憶長安時事承上揚鑣驚主辱戎上八句先敘肅宗之亂先帝以下詳記代宗之亂總二句乃追原病根社稷風雲靈武起事血流數語安史猖獗自肅宗晏駕子儀受遺代宗當有一番振刷乃亂離如故則以總戎失策誤信降將之卑詞耳在楚薊則鎮將不恭在西北則外夷交訌皆因總戎失䇿所致四瀆中原言遍地皆兵白翟丹墀言京輔旋破張朱注恆山遼海皆河北地漆杜臆猶突騎如故也競旗轉甚也吕祖謙曰膠所以為弓誅求之多則田父歎焉鐵蒺藜所以禦馬所在布地故行人避之朱注通鑑史朝義死賊將田承嗣薛嵩等降副元帥僕固懷恩恐賊平寵哀奏留承嗣等分帥河北自為黨援由是諸鎮桀驁遂不可制公詩總戎存大體降將飾卑詞正紀其事曰存大體為朝廷隱也天郭知達注總戎元帥也代宗討史朝義以雍王適為下兵馬元帥夷楚貢如嶺南小梗堯封謂燕薊疑二北冦指回紇西指吐蕃廣德元年相繼入冦杜臆昔今逆故曰翻傾國而來故曰卷深經綸風雲注别見書血流漂杵東方朔傳俯而惟仰而泣下交頤將記四瀆視諸侯四水獨流江淮河濟也戎漢有樓船軍鼓角别見漢胸奴傳晉文公攘狄居西河圁洛之間號曰赤翟白翟部圁洛今上郡寧川地朱注史記索隱故西河郡有白胡唐鄜延二州即春秋白翟地祿山反京畿鄜坊皆附之故云連白翟大破莽兵於昆陽城西㑹大雷風屋瓦皆飛光武紀前漢梅福傳登文屏之陛涉赤墀之塗注以丹掩泥塗殿上也梁宗廟登歌神宫肅肅靈寢微微唐書寶應元年建卯月上不豫召子儀入卧內曰河東之事一以委卿所謂切受遺也公孫𢎞傳受遺則霍光金日碑周禮并州其鎮曰恆山公眺錯傳輕車突騎師古曰言其驍鋭可衝突敵也孫瓚傳通遼海叔孫通傳設兵張旗幟奉潘嶽籍田賦邑老田父寞孫武子膠漆之材車甲之日費千金栁惲詩寂行人稀六韜狹路微徑張鐵蒺藜眺錯傳具藺石布渠答蘇林曰渠答鐵蒺藜也魏志詔大將軍親總六戎薛道衡詩朝端去總戎求漢明帝詔明於國家之大體曰淮南子約身卑辭以救於諸侯左傳管仲責楚爾貢包茅不入鮑史記周紀封堯之後於薊所詩序懷其舊俗者也照詩邊城屢翻覆此翻字本語林王導曰北冦遊魂伺我隙所陳後主詩春江聊一望以過秦論席卷天下此卷字本難蜀父老文接之西夷不必陪𤣥圃超然待具茨凶一作休兵鑄農器講殿闢書帷廟算髙難測天憂實在兹形容真潦倒答效莫支持此陳救時籌䇿承上拔劍撥年衰務鑄農器望息兵端闢書帷望開言路二句皆當時急自廟算無聞恐前亂未靖而後患復生矣此段乃上下文關捩處之朱注代宗嘗幸陜州故用周穆黃帝事言當此多事秋我豈必陪車駕於𤣥圃乎但望求賢問道如黃帝之下訪具茨則凶兵可銷講殿可御治平不難致矣孰知廟算不然杞人憂天實在於此惜衰老無補為足歎耳次公解都支離𤣥圃周穆王西遊事陸機豪士賦超然自引髙拆而熙聖莊子黃帝將見大隗於具茨之山至於襄城之野七皆迷遇牧馬童子問塗焉唐書許州陽翟縣有具茨山傳老子兵者凶器為家語鑄劍㦸以為農器東方朔文帝集上書囊殿帷岑文本詩書帷通竹徑資杜詩博議通鑑永泰元年九月庚寅朔置百髙座於聖西明兩寺講仁王經甲辰吐蕃十萬衆至奉天京城戒嚴丙午罷百髙座講十月巳未復講經於資聖寺時羌人外訌藩鎮內叛而帝與宰相元載等俱好佛息於政事講殿闢書帷蓋以諷也杞孫子兵未戰而廟算勝者得算多也天憂用列子人憂天崩事光嵇康書潦倒粗疏室魯靈殿賦支持以保漢使去聲者分王命羣公各典司恐乖均賦斂去聲不似問瘡痍萬里煩供給孤城最怨思緑林寧小患雲夢欲難追即事須嘗膽蒼生可察眉議一作義堂猶集鳯貞觀去聲是元龜處處喧飛檄家家急競錐蕭車安不定蜀使去聲下去聲何之此傷䕫州民困承上天憂實在兹使者八句歎凶兵未息而軍賦日煩孤城最怨思見民窮可慮即事八句歎講帷不開而舊章難復貞觀是元龜乃起敝之方也使者索餉之官典司牧民之吏瘡痍蜀有崔旰之亂緑林雲夢民將為盜矣嘗膽痛懲前失察眉深悉民情求朱注朝議多人奈何不法貞觀之治致盜賊羣起誅益急雖然防守之猶恐不定彼蜀使頻下又何為乎出吳越春秋王命見符司劉安諫兵書緩刑罰薄賦斂東都賦各有典史記季布傳創痍未瘳恭魏志衛顗傳若有歸民以供給之悲謝承後漢書耿以甲兵守孤城於絶域淮南子則感怨思之氣命張詠曰緑林雲夢言荆楚將亂林後漢劉元傳諸亡共攻離鄉聚藏於緑林中緑山在荆州當陽縣東北雲盧注左傳楚昭王涉睢濟江入雲中盜攻之注雲中夢澤中也時代宗幸陜猶昭王出國故引往事為鑒欲難追追悔無及矣子吳越春秋越王欲報吳怨懸膽於户出入嘗之列晉有郤雍者能視盜察眉睫之問而得其情杜臆察眉恐其蹙額也奉梅福書廟堂之議非草茅所當言後漢書鄧隲等並朝請有大議詣朝堂與公卿參謀進賀循詩集鳯動春枝書今我即命於元龜劉琨勸表前事之不忘後代之元龜也元龜大龜卜龜以大者為靈京何遜詩處處皆城市左思詩邊城苦鳴鏑羽檄飛都魏志王粲曰家家欲為帝王賊江淹書競刀錐之利耆前漢蕭育傳南郡江中多盜拜育為太守上以育舊名臣乃以三公使車載育入殿中受策注使車三公奉使之車司馬相如為郎使蜀諭巴蜀父老釣瀨疏墳籍耕巖進奕棋地蒸餘破扇冬暖更纖絺豺遘一作搆哀登楚一作粲麟傷泣象尼衣冠迷適越藻繪憶遊睢音雖賞月延秋桂傾陽逐露葵大庭終反朴京觀古玩切且僵尸髙枕虛眠晝哀歌欲和去聲誰南宫載勳業凡百慎交綏朱注末敘客䕫情景而以除亂立功望之在位者釣瀨八句久客無聊之況應上形容真􅕙倒賞月八句深期濟世之人應上答效莫支持前曰總戎存大體惜其遺患於諸鎮此曰凡百慎交綏冀其敵愾於外夷遊耕釣資身蒸暖隨地哀粲傷世亂泣尼悲道窮適越睢復想東行也延桂對景逐葵念君因思大庭之治以銷京觀奈伏枕䕫江惟哀歌獨歎而巳南宫事業望之當事大臣勿謂交綏而退可也當時吐蕃陷京諸將袖手坐觀故有交綏之歎作此章前兩段各二十句後兩段各十六句中間八句上下過峽釣瀨用嚴子陵事耕巖用鄭子真事陵南史劉穆之傳尋覽篇章校定墳籍西京雜記杜杜夫子善奕棋為天下第一豺秋興賦屏輕箑釋纎絺荆王粲七哀詩西京亂無象虎方遘患登楚指粲登州城樓作賦麟傷用西狩獲麟頂孔子世家叔梁紇禱尼丘生孔子孔子生而首上墟故名丘字仲尼趙曰傳記又載孔子之首象尼山身無所用之莊子宋人資章甫而適越越人斷髮文陳琳為曹洪與魏文帝書遊睢渙者學藻繢之彩陳留風俗傳襄邑縣南有睢水渙水睢渙之水出文章故有黼黻藻錦日月華蟲以奉天子宗廟御服焉約公少時常遊吳越梁宋表李德林詩月桂近將攀沈詩秋風生桂枝曹植若葵藿之傾太陽又七啓霜蓄露葵於大庭古至德之世注見前敬淮南子巳雕巳琢還返朴左傳古者明王伐不取其鯨鯢而封之以為大戮於是乎有京觀注積尸封土其上謂之京觀前漢伍被傳僵尸滿野流血千里左思詩哀歌和漸離杜臆欲和誰言欲和者誰人乎詩後漢書永平中圖畫中興二十八將於南宫雲臺凡百君子應瑒詩凡百警爾位曰左傳晉人秦人出戰交綏注古名退軍為綏李衛公綏六轡總也謂軍不戰但交綏而退猶云交馬而還杜詩長篇鑄格整嚴如金科玉律用思精細若繭絲牛毛此章分枝分節相生相應之法必寧心靜氣從容玩味方有端緒可尋但止流目泛觀涉獵大概亦何由窺見作者深意哉往在鶴注此當是大厯元年作往在西京日一作時胡來滿彤一作丹宫中宵焚九廟雲漢為之紅解瓦飛十里繐須兌切帷紛一作粉曽同層空疚心惜木主一一灰悲風合昏排鐵騎去聲清曉一作旭散錦幪吳作􅐒正異定作幪賊臣表逆節晉作帥相賀以成功是時妃嬪戮連為糞土叢當寧陷玉座白間剝畫胡化切蟲不知二聖處私泣百歲翁此詩歷敘三朝治亂也首紀天寶未祿山陷京之事上八言長安陷沒毁及宗廟次八言賊徒肆虐傷及宫禁下二言𤣥肅出奔父老悲涕也賊徒肆行逆節則上表祿山以稱賀如下文殺妃主毁御座是也子張協詩昔在西京時舊書王徂彤宫攸居古制天七廟王莽增為九廟唐書中宗已祔太廟開元四年出置别廟至十年置九廟而中宗神主復祔太廟詩倬彼雲漢昭回于天漢徐樂上書臣聞天下之患在於土崩不在瓦解解字本此飛光武紀大破莽兵于昆陽城西㑹大雷風屋瓦皆飛字本此疚謝朓詩繐帷飄井幹此言廟中神帷也天詩憂心孔史記武王伐紂載木主而行舊唐書寶末兩都傾陷神主亡失肅宗既復舊物建主作廟於上都其東都神主大厯中始於人間得之孔叢子衛出公曰寡人之任臣無大小一一自觀察之名曹植詩悲風來入懷合昏本是草名一名合歡一夜合至夜則合陸倕銘合昏夜捲蓂莢朝開是也此處借用作黃昏字用沈佺期詩合昏𤣥菟郡中夜白登圍魏志注曹公列鐵騎五千為十里障徐江賦氛祲於清旭音隸視也廣韻驢子曰􅐒陵詩金鞍覆錦幪幪鞍帕也公詩屢用錦幪字當以幪為正師將危賊臣未梟國語逆節萌生魏志張超曰王幸蜀記天寶十五年七月祿山令張通儒害霍國公主永王妃侯莫陳氏駙馬楊朏等八十餘人又害皇孫郡縣主諸妃等三十六人匣干寶晉紀后嬪妃主虜辱於戎卒而王昭君辭昔為中玉今為糞土英記天子當寧立謝朓詩玊座猶寂寞皎師氏注白間黼衣也畫蟲畫雉以飾之景福殿賦皎白間離離列錢李善曰白間青刻之側以白塗之今猶謂之白間堪吳越春秋蟲鏤之刻畫又二聖兩君世說殷仲曰百歲老翁攀枯枝車駕既云還楹桷歘穹崇故老復扶又切涕泗祠官樹椅桐宏壯不如初巳見帝力雄前春禮郊廟祀事親聖躬微軀忝近臣景讀為影從去聲陪羣公登階捧玉冊峩冕聆一作耿非金鐘侍祠恧女六切先路舊作露一作霑掖垣邇濯龍天子惟孝孫五雲起九重平聲鏡奩換粉黛翠羽猶䓗朧一作曨次記至德初肅宗收京之事乃上八記新廟之祭微軀六句記陪祀之事天子四句陪祀所見景物此敘廟祀特詳者萃渙莫大於享帝立廟也史車駕初還故父老流涕楹桷重新故廟樹椅桐唐肅宗還京在至德二年十月其親享九廟及祀圜丘在乾元元年四月鶴注謂前春疑誤玉冊冊文也峩冕法服也金鐘駕至鳴鐘也恧先路慚列輦輅之傍邇濯龍密邇宫禁之地孝孫指肅宗五雲謂瑞氣鏡奩后廟神御之物翠羽廟中神御之飾並光武紀車駕入洛陽滂左傳丹楹刻桷長門賦鬱起而穹詩涕泗沱史記武帝紀令祠官領之如其方莊詩樹之榛栗椅桐椊漆前西征賦豁爽塏以𢎞壯子帝力於我何有哉漢禮樂志薦之郊廟則鬼神享賦詩祀事孔明玉曹植敘愁賦委微軀於帝室東都天官景從冊注别見左張華詩軒冕峩峩冠蓋習習右韓詩外傳古者天子右五鐘將出則撞黃鐘之鐘五鐘皆應入則撞蕤賓之鐘左五鐘皆應爾漢禮樂志百官侍祠者數百人封禪文羣臣恧焉雅恧小慙也南齊何從事聯句藝黃先露早與此先露不合此當是先路之訛記郊特牲大路繁纓一就先路三就注大路祭天車先路祭廟車東京賦奉引既畢先輅乃發則先輅為君車矣又公詩有起草鳴先路句楚辭來吾道兮先路舞鶴賦翔翥先路則先路乃前導也王洙謂齊廊未備猶恧霑露朱注謂新進侍祠先䝉恩露張注謂春日侍祠因動先人雨露之感語皆迂曲於劉植詩隔此西掖垣濯杜田注後漢桓帝紀祠老子濯龍宫馬后紀帝幸龍中續漢志濯龍園名濯龍宫百官志有濯龍監一人東京賦濯龍芳林九谷八溪薛綜注洛陽圖經曰濯龍池名赭白馬賦處以濯龍之奧注濯龍內廄名盧植集詔給濯龍廄馬三百匹諸書稱濯龍不同大抵以宫得名而置監園廄皆因之也平詩工祝致告徂賚孝孫五沈約宋書慶雲五色者太之應董仲舒雨雹對雲色而為慶三色而為矞后楚辭天子之門以九重后後漢陰后紀帝率百官上陵從席前伏御床視太鏡奩中物感動悲泣今易脂澤妝具潛樂府粉黛不假飾曹植賦或拾翠羽郭璞江賦薈葸朧注青盛貌前者厭羯胡後來遭犬戎俎豆腐一作臠羶肉罘罳行角弓安得自西極申命空山束盡驅詣闕下士庶塞先則切關中此記廣德初吐蕃陷京之事句洙注前者指祿山後來指吐蕃夢弼注俎豆謂汚漫祭器罘罳句謂狼籍宫廟命盧注時蕃鎮不能赴援故言安得自西徂東布昭王使主將率民入關以敵愾乎杜臆安得二字直貫下節乃臣子期望之詞西極指京師之西與山東相對或指吐蕃者非薛蒼舒曰漢文帝紀七年夏六月未央宫東闕罘罳災崔豹古今注罘罳屏也罘者復也罳者思也臣朝君至屏外復思所奏之事於其下顔師古注罘罳謂連闕曲閣也以覆重刻垣墉之處其形如罘罳然一曰屏也又禮記疏屏天子之廟飾也鄭注屏謂之樹今浮思也唐蘇鶚演義稱罘罳織絲為之輕疏浮虛象羅網交文之狀蓋宫殿簷户之間也段成式酉陽雜俎稱上林間多呼殿榱桷護雀網為罘罳余謂二說皆通以罘罳為網則結繩為之施於宫殿簷楹之間如蘇鶚之說是也以罘罳為屏則刻木為之施於城隅門闕之上如成式之言是也然就二說之中段氏之說為長巽韓安國傳注師古曰以木曰弧以角曰弓易重以申命曹植詩盤桓北闕下主將去聲曉逆順元元歸始終一朝自罪已一云罪已巳萬里車書通鋒鏑供鋤犁征戍一作伐聽所從冗官各復業土著直略切還力農君臣節儉足朝音潮野歡呼一作娛同中去聲興似一作比國初繼體如太宗端拱納誎諍和風日沖融赤墀櫻桃枝隱映銀絲籠千春薦靈寢永永垂無窮此論永泰後代宗還京之事六主將四句言靖亂之由鋒鏑四句言初治之象君臣句望其力致太平赤墀四句願其無忘孝享大通鑑廣德元年十月郭子儀使王延昌撫諭諸將皆喜聽命所謂主將曉順逆也鶴注永泰元年正月下制勞還罪巳之念所謂一朝自罪已也喫杜臆主將脅民向來叛服不常當令其改心易慮而緊在罪已一語此轉亂為治之機也鋒鏑二句言復府兵之制則兵農可以合一藩鎮多表授官僚朝廷雖設官而無事故欲冗官之復業各鎮選丁壯為兵民皆棄本業而好亂故欲土著者力農聽言納諌又罪巳後改過自新之法櫻桃薦寢與上禮郊廟相應皆回鑾後最急之事故反覆言之黃石公素書主將之法魏志傅巽曰逆順有大體强弱有定勢馬漢文帝紀以全天下元元之民顔注元元善意也融疏陛下深惟禹湯罪已之義鏑漢光武紀車書共道把鋒鏑刀鋒箭鏑也晉史論鋒如雲曹植詩相隨鋤犁顔延之詩憔悴征戍勤官申屠嘉傳冗官居其中師古曰冗散輩也如今之散食貨志安民之道土著為本淮南子稷辟土墾草以為百姓力農帝漢宣帝紀躬行節儉張載詩朝野多歡娛漢明詔先帝受命中興文章帝詔繼體守文諫梁簡文書履璇璣而端拱風漢帝詔益建官師為諍顔延之詩昧旦濡和海賦沖融滉漾廟丹墀注見上章巨月令仲夏之月羞以含桃先薦寢注櫻桃也丘源詩隱映含歌人陌上桑青絲為籠繫景謝朓酬德賦度于春之可並靈寢注見上章漢帝詔祖宗之功德施於萬世永永無窮京都不再火涇渭開愁容歸號平聲故松柏老去苦飄蓬末以思鄉之意作結官杜臆涇渭乃吐蕃入冦之路諸將詩云多少材守涇渭將軍且莫破愁顔故必吐蕃逺去而愁容始開無盧注往在西京既遭喪亂老去飄蓬終逺長安首尾限悲酸此詩前後三段各十八句中八句作腰末四句作結古左思詩羽檄飛京都鮑照詩發藻慰愁容古詩墓犁為田松柏摧為薪倦劉孝綽詩逰子飄蓬盧元昌曰此章歷敘肅代兩朝經祿山吐蕃之亂以見幸蜀之轍不鑒於前奔陜之駕相尋於後故於肅宗收復處略其治具於代宗收復處詳陳保安圖治之道正見肅宗不能自振沿至代宗再有吐蕃之禍乃代宗收京後又不思省躬罪巳節儉裕民聽言納諫且冗官失職兵不歸農朝政之闕失多矣致治無具禍亂相因未幾德宗又有奉天之幸內冦外夷竟與唐相終始矣至篇中血脈以孝治為重故詳言宗廟廢興之由於肅宗曰天子唯孝孫於代宗曰繼體如太宗因以歸號故松柏自述巳意終焉昔遊鶴注此當是大厯元年䕫州作詩云楚山䕫屬楚地也昔者與髙李原注髙適李白晚一作同登單仕衍切父音甫臺寒蕪際碣石萬里風雲來桑柘葉如雨飛藿去一作共徘徊清霜大澤凍禽獸有餘哀首敘昔日東遊之事寒公遇髙李於齊兖在天寶四載蕪二句秋日逺景桑柘四句秋日近景此皆登臺所見者賤舊唐書單父古邑貞觀十七年屬宋州考寰宇記子琴臺在縣北一里髙三丈本顔延之詩寢興日已寒白露生庭蕪此寒蕪二字所齊地記渤海東有碣石謝朓詩切切隂風暮桑柘起寒烟草阮籍詩秋風吹飛藿零落從此始廣韻藿大豆葉又名湛方生弔鶴文負清霜而夜鳴哀陸機詩言有餘是時倉廩實洞達寰區一作瀛開猛士思滅胡將去聲帥望三台君王無所惜駕馭英雄材此記當時寵任邊將因東遊而并及之通將望三台祿山恃功君無所惜明皇濫賞也風俗漢文帝即位十餘年百姓足倉廩實寰東都賦平夷洞達萬方輻凑民傳論自致區之外寰區開言道路無梗後漢逸夢弼曰望三台祿山領范陽節度求平章事也帝王史記黃帝以風后配上台天老配中台五聖配下台史記天官書魁下六星兩相比者名曰三台孟康注泰階三台也台星凡六幽燕平聲盛用武供給亦勞哉吳門轉粟帛泛海陵蓬萊肉食三一作四十萬獵射起黃吳作黃一作塵埃上言將之雄此見軍之盛皆寓諷刺於稱揚泛海輸粟則民日疲射獵練軍則兵日橫欲不亂得乎司馬承傳用武之國也江淹詩幽燕非我國供晉書漢郊祀志使者存問給相屬於道作吳門即蘇州蓬萊在山東流魏志獻帝䇿命穡人昏粟帛滯積鄒陽傳轉輸粟千里不絶海賦泛海陵川博議云唐運江淮租稅以給幽燕此天寶間海運也左傳肉食者鄙賈山至言日日獵射擊伐狐惟蕪城賦直視千里外見起黃埃隔河憶長眺青歲巳摧頽不及少去聲年日無復扶又切故人杯賦詩獨流涕亂世想賢才有一作君一作若能市去聲駿骨莫恨少龍媒此撫舊交而有感也登臺故人不可復見矣欲須賢共濟當以駿骨引龍媒乃自負之語潘嶽西征賦褰微罟以長眺青歲猶云青年陳子昻春臺引遲美人兮不見恐青歲之遂遒駿骨龍媒注皆别見啇山議得失蜀主脫嫌猜吕尚封國邑一作內國傅說音悅巳鹽梅景晏楚山深水鶴去低回龎公任本性携子卧蒼苔此援古人以寄慨也前人勳業本可追踪但遭際非時亦止為龎公之遁世而巳結意無限悲涼此章前後三段各八句中間二假各六句蘆元昌謂商山四句因高李而並憶中興往事商山議得失指李泌周旋太子事蜀主脫猜嫌指泌易表章請上皇還京吕尚封國邑指靈武功臣叨封爵邑者傅說巳鹽梅指扈從大臣晉階宰相者引證亦似有據但於駿骨龍媒意不相接續耳吕朱注漢書上欲使太子將兵擊黥布四人說建成侯澤夜見吕氏止其行故云議得失之蜀志先主與亮情好日密關張不悅先主解之曰孤有孔明猶魚之有水史記太公封於營丘之說命若作和羮爾唯鹽梅本史記孔子世家低回留不能去陳琳詩松柏有性淮南子窮谷之汚生以蒼苔公䕫州後詩間有傷於繁絮者此則長短適中濃淡合節整散兼行而摹情寫景巳覺興㑹淋漓此五古之最可法者壯遊鶴曰當是大厯元年秋作詩云殊方指䕫州也上章昔者與高李晚登單父臺故拈昔逰為題此章往者十四五出遊翰墨場當拈往遊為誤題若作壯年之遊何以首尾兼及老少事耶壯字疑往者一作昔十四五出遊翰墨場斯文崔魏原注崔鄭州尚魏豫州啓心徒以我似一作比班揚七齡思即壯開口詠鳳皇九齡書大有字作成一囊性豪業嗜酒嫉惡懷剛腸脫落一作略小時輩結交皆老蒼飲酣視八極俗物多茫茫先敘少年之逰十公生而頴異豪邁不羈於自敘見之場阮籍詩昔年崔四五志尚好詩書古詩粲粲翰墨唐科名記尚擢久視二年進士㑹要神龍三年才膺管樂科魏啓心及第班揚謂班固揚雄王僧逹祭顔光祿文文蔽班楊自南史鄭灼夢遇皇侃侃曰鄭郎開口侃因吐灼口中後義理益進又劉穆之謂宋武帝曰公但縱筆為大字輕肆出言趙一詩不如有囊錢脫絶交書剛腸疾惡語林周尚崇尚老莊落名教孔融薦禰衡表脫略公卿跌宕文史結晉書周顗傳時輩親狎莫能䙝也樂毅書論行而交者立名之士陸機嘆逝詩鴉髮成老蒼見列子揮斥八極俗物九卷東下去聲姑蘇臺巳具浮海航到今有遺恨不得窮扶桑王謝風流遠闔閭丘墓荒劍池石壁仄長洲芰荷香嵯峨閶門北清廟映回一作池塘每趨吳太伯撫事淚浪浪蒸魚聞七首除道哂要說文腰本作要章二句舊在奏皇之下枕去聲戈憶勾踐渡浙想秦皇越女天下白鑑湖五月涼剡溪藴秀異欲罷不能忘此敘吳越之遊要章以上吳門古蹟枕戈以下越中勝境百越絶書闔閭起姑蘇臺三年聚材五年乃成高見三里後漢王當傳至死無遺恨東山海經大荒之中暘谷上有扶桑閭王戎謝安輩乃晉名族越絶書闔閭冡在吳縣門外葬以盤郢魚腸之劍葬三日白虎踞其上號曰虎丘吳越春秋遂保丘墓一統志虎丘山一名海湧峰上有劍池千人石生公說法臺長劍池在虎丘池上有石壁高數丈吳越春秋走犬洲吳郡圖經長洲苑在縣西南七十里人字林楚名菱曰芰國語屈到嗜芰是也爾雅釋河東呼荷為芙蓉北方人便以藕為荷在張載詩嵯峨似荆巫天吳越春秋闔閭欲西破楚楚西北故立閶門以通氣復名破楚門陸機吳越行閶門何峩峩飛閣跨通波糜詩於穆清廟外吳郡志太伯廟東漢永興二年太守豹建於閶門史記注太伯冡在吳縣北梅里聚去城十里其廟在閶門外正與冡相近舊注指孫皓父和之廟謬甚越絶書洋中塘去縣二十六里謝朓哀文回塘寂其巳暮兮杜臆泰伯讓而世好爭故撫往事而墮淚傅季友表撫事永念僚楚辭沽余襟之浪浪中刺客傳吳公子光具酒請王使專諸置七首魚腹進之以刺王僚僚死光自立是為闔閭妻朱買臣傳㑹稽聞太守至發民除道入吳界見其故妻夫治道買臣呼到太守舍置園中給食之章要章謂太守章印西京雜記朱買臣為㑹稽太守懷綬還至舍亭崔湜詩郡邸忽腰章朱注枕戈待旦此劉焜語乃借用之前秦王永􅊾文枕戈待旦志雪大恥鶴曰九域志蘇州㑹稽俱有勾踐廟秦本紀始皇浮江下觀藉柯渡海渚過丹陽至錢塘臨浙江水波惡乃西百二十里從狹中渡宋之問詩越女顔如花李白越女詩玉靣邪溪女青蛾紅粉粧一雙金齒履兩足白如霜任昉述異記鏡湖世傳軒轅氏鑄鏡河因得名今軒轅磨鏡石尚存石畔常潔不生蔓草㑹稽記漢順帝永和間立鏡湖在㑹稽山陰兩縣界九域志越州東南二百八十里有剡縣縣有剡溪一統志剡溪在嵊縣縣治南古今注蓮花之最秀異者陳琳詩載歡載笑欲罷不能歸帆拂天姥中歲貢舊鄉氣劘音摩屈九勿切賈壘目一作日短曹劉墻忤下去聲考功第獨辭京尹堂放蕩齊趙間裘馬頗清狂春歌叢臺上冬獵青丘旁呼鷹皂一作紫櫪一作林逐獸雲雪岡射音石飛曾音層縱鞚引一云跋臂落􅒗鶬蘇侯原注監門胃曹據鞍喜忽如携葛彊此敘齊趙之逰貢歸帆自吳越而返河南放蕩自長安而往齊趙矣歲上京在開元二十三年時公年二十四矣故云中舊鄉指河南公居河南鞏縣也溪氣摩壘欲相敵目短墻欲俯視謝靈運詩暝投剡宿明登天姥岑吳越郡國志天姥峯與括蒼山相連白居易沃州山記東南山水趙為首剡為靣沃州天姥為眉目屈原賈誼曹植劉禎漢魏才人還漢書贊賈山自下劘上左傳致師者御靡旌摩壘而杜臆短墻猶云及肩之墻試不中式者曰下第選唐書每歲仲冬州縣館監舉其成者送之尚書省舉不由館學者謂之鄉貢皆懷牒自列於州縣既至省由户部集閲而關於考功員外郎試之唐托言俊秀登科比皆考功主之開元二十四年廷議省郎位輕不足以臨多士乃詔禮部侍郎專之帝張名衡西京賦封畿千里統以京尹漢書內史周官武更京兆尹吳高士傳劉伶肆意放蕩以宇宙為狹黨新書甫客遊越齊趙間舉進士不第魏都賦僕清狂叢漢高后傳趙王宫叢臺災顔師古曰連延非一故名臺本六國時趙王故臺在邯鄲城中子虛賦秋田乎青丘寰宇記青丘在青州千乘縣齊景公田于此者夢弼曰皂櫪林雲雪岡皆齊地列子孔子曰爭呼濡逐獸者趨放轡疾馳也北史侯景好乘小馬彈射飛鳥援縱鞚南都賦仰落雙鶬後漢書馬據鞍顧盻以示可用如晉山簡傳舉鞭問葛彊何并州兒快意八九年西歸到咸陽許與必詞伯賞一作貴遊實賢王曵裾置醴地奏賦入明光天子廢食召羣公㑹軒裳脫身無所愛一作受痛飲信行藏黑貂寧一作不免弊斑鬢兀稱觴杜曲晚一作挽一作換耆舊四郊多白楊坐深鄉黨敬日一作自覺死生忙朱門任一作務傾奪赤族迭罹殃國馬竭粟豆官雞輸稻梁舉隅見煩費引古惜興亡此敘長安之逰再公遊齊趙在開元二十五年其赴咸京在天寶五載時相去九年矣詞伯指岑參鄭䖍輩賢王置醴指汝陽王璡也公獻三大禮賦在天寶十載帝竒之使待詔集賢院命宰相試文章擢河西尉不拜此見天子羣公時也脫身言不與仕籍信行藏謂得失任之於命黑貂六句自歎窮老朱門六句有慨朝事也傾奪罹殃如林甫之誅逐貴臣國忠之搆陷王鉷是夢弼曰舞馬衣文采飼以豆粟五坊有鬬雞民輸稻梁以供養此皆明皇侈心自恣也舉此一隅則當時煩費可知故嘗引古傷今而有興亡之慮焉年曹植與吳質書貴且快意建安初荆州童謠八九間始欲衰詩誰將西歸之任昉為王儉集序𢎞奬風流許與氣類元論衡文詞伯鄒陽傳何王之門不可曵裾楚王敬穆生置醴以代酒逰漢太初四年起明光殿身陶潛詩驅役無停息軒裳東崖史記項羽紀脫獨騎孔世說王孝伯曰但得常無事痛飲讀離騷隨時以行藏蘇季子黑貂裘敝注别見西征賦秋興賦斑鬢彪以承辨綺杜臆斑鬢稱觴知古人亦慶夀矣張正見詩稱觴溢筵杜曲公故里耆舊漸巳喪亡則巳之坐居上列者日覺生死路迫矣從外視內位上者坐湥陳師道詩坐下漸多人不如杜句藴藉耆舊名臣見漢蕭育傳門解嘲客欲朱丹其轂不知一跌赤吾之族王績詩朱雖足悅赤族亦可傷嵇康詩權智相傾奪謂北征賦我獨罹此百殃鶩考工記國馬之輈注國馬種馬江淹翡翠賦雞以稻粱致憂二都賦序聊舉其一隅與趙充國傳轉運煩費同新序叔孫通稱說引古書治同道罔不興與亂道罔不亡河朔風塵起岷山行幸長兩宫各警蹕萬里遙相望叶平聲崆峒殺氣黑少去聲海旌旗黃禹功亦命子涿鹿親戎行音杭翠華擁吳一作英嶽貙春俱切舊作螭虎噉豺狼爪牙一不中去聲胡兵更陸梁大一作天軍載草草凋瘵滿膏肓備員竊補衮憂憤心飛揚上感九廟焚一作毁下憫萬民一作蒼生瘡斯時伏青蒲廷諍守御牀君辱敢愛死赫怒幸無傷聖哲體仁恕宇縣復扶又切小康哭廟灰燼中鼻酸朝音潮未央此敘奔赴鳯翔及扈從還京事望河朔謂祿山起兵岷山謂明皇幸蜀兩宫相肅父子異地也太朱注崆峒在西少海在東言東西皆用兵也舊注以子屬少海星指廣平叙為元帥恐非命子上皇禪位戎行肅宗親征翠華天子葆羽螭虎靈武諸將盧注一不中指陳濤斜之敗載草草指清而之潰凋瘵民力困疲也備員以下自述拾遺始末公疏救房琯帝怒不測賴張鎬營解故云赫怒幸無傷哭廟痛國遭亂酸鼻畏已罹罪時河朔河北地周書我卜河朔黎水前漢終軍傳邊境有風塵之警家語江始於岷山入三輔黃圖漢修飾長楊宫以備行幸揚雄酒賦出兩宫史三王傳出稱警入稱蹕注警戒肅也蹕止行人也曰古詩微隂盛殺氣東淮南子九州之外有八殥東方太渚曰少海唐書彛傳流源直黑水東北少海之北三面皆阻海明旌旗黃僭用天子旗幟也左傳劉子曰美哉禹功德逺矣命子即傳子也行帝王世紀黃帝與蚩尤戰於涿鹿之野詩以啓戎張衡西京賦吳嶽為之陀堵正異吳嶽在扶風卞圜云在隴州論史記周武王誓衆曰如虎如羆如豺如螭後漢杜篤都賦虓怒之旅如虎如螭何晏刀銘用造斯器螭虎是斬此螭虎二字所自出杜預左傳注以螭為山神獸也今按蛟螭固不能食豺狼即螭魅亦豈能吞噬猛獸據列子黃帝與炎帝戰於阪泉之野帥熊羆豺豹貙虎為前驅陸佃曰虎五指為貙當作貙虎為是陳詩祈父豫王之爪牙陳琳檄鷹犬之才爪牙可任子昻詩胡兵屯塞下甘泉賦飛䝉茸而走陸梁西京賦怪獸陸梁秦詩勞人草草七凋瘵注别見膏盲注見八哀詩本紀博士雖十人特備員弗用伏漢書史丹傳元帝欲易太子丹聞上獨寢直入卧內青蒲上泣誎應劭曰以青規地曰青蒲非皇后不得至此服䖍曰以青緣蒲席也蒲青為席用蔽地也洙曰王陵面折廷諍洙曰以晉書衛瓘託辭坐帝牀前武國語主辱臣死無檀弓申生不敢愛其死西京賦士赫怒孟子傷也左傳並建聖哲順王命論寬明而仁恕之中承聖意詩迄可小康秦之罘山石銘宇縣曹冏六代論宗廟俱為灰燼為後漢公孫述傳光武曰聞之可酸鼻漢有未央宫小臣議論絶老病客殊方鬱鬱苦不展羽翮困低昻秋風動哀壑碧蕙捐一作損微芳之推避賞從去聲漁父濯滄浪榮華敵勳業歲暮有嚴霜吾觀鴟夷子才格出尋常羣凶逆未定側佇英俊翔此敘貶官以後久客巴蜀之故二議論絶不復獻言矣老客殊方領起全段鬱鬱句客居之況秋風二句客居之景之推以下傷巳而兼以慨世乃客居之感託身世外等於之推漁父彼瞥眼榮華何足羡乎必得范蠡其人始可救亂而濟時也五盧注謂鴟夷子乃思李泌時泌歸衡山猶范蠡之適湖此篇短長夾行起十四句即以二十句間之次十六句即以二十二句間之後二十六句又以十四句收之參錯之中自成部署翮枚乘桞賦小臣莫效於鴻毛陸毌丘儉詩但當養羽宋子侯詩花葉正低昻機詩江蘺生幽渚微芳不足宣淑氣與時隕餘芳隨風捐之介之推注别見屈原傳漁父鼓枻而去歌曰滄浪水云云固杜臆榮華勝於勳業鮮能令終如嚴霜之殺草雖班答賔戲朝為榮華夕為憔悴潘嶽誄文名器光勳業未融皮蘇武詩晨起踐嚴霜鴟貨殖傳范蠡適齊為鴟夷子師古曰言若盛酒之夷多所容受而可卷懷凶破殄才格謂才能品格裕孔融上書王師電掣羣前漢王褒頌開寬之路以延天下之英俊劉克莊曰此詩押五十六韻在五言古風中尤多悲壯語雖荆卿之歌雍門之琴髙漸離之筑音調節奏不如是之跌宕豪放也然王嗣奭曰此乃公自為傳其行徑大都似李太白李一味豪放公却豪中有細又云觀其吳越齊趙之遊壯歲詩文遺逸多矣豈晚歲詩律轉細自棄前魚耶篇中揚字浪字韻腳重拈但字同義異不妨互見若字異義同却不可用矣杜集中敘天寶亂離事凡十數見而語無重復其才思能善於變化遣懷鶴注當是大厯元年作蓋李白以寶應元年卒髙適以永泰元年卒詩云存殁再嗚呼又云繫舟卧荆巫故知其為大厯初䕫州作也昔我遊宋中惟梁孝王都名今陳留亞劇則貝魏俱邑中九萬家髙棟照通衢舟車半天下主客多歡娛白刃讐不義黃金傾有無殺人紅塵裏報答在斯須自敘梁宋之遊俠上四都㑹之雄壯中四人物之殷盛下四風俗之任杜臆名與劇對名謂名邦劇乃頰劇邑中以下見其名白刃以下見其劇陽趙曰主則土著人客則寄遊者漢書梁孝王城睢北界太山西至髙陽四十餘城多大縣元年更名唐書宋州睢陽郡屬河南道本梁郡天寶前漢功臣表大臣名都史酈生傳陳留天下之衝四通五達之郊也唐書汴州陳留郡屬河南道史文帝紀以齊劇郡唐書貝州清河郡魏州武陽郡俱屬河北道貝州今東昌府恩縣魏州今大名府地東征賦尊通衢之大道古詩度阡越陌互為主客洛漢書郭解河內人也隂賊感概以軀藉友報仇劇孟陽人也以俠顯及死家無十金之財白刃黃金二句暗用二人事於梁宋相合也賦後漢魏朗傳白日操刃報讐於縣中東都紅塵四合憶與髙李輩論平聲交入酒壚兩公壯藻思去聲得我色敷腴氣酣登吹去聲臺懷古視平蕪芒碭雲一去雁鶩空相呼此敘髙李同遊之興尋三人相得成千古文章知巳芒碭雲去漢髙遺迹難也杜臆云此可見其曠懷世說王濬沖經黃公酒壚顧謂後車客曰吾昔與嵇阮共酣飲於此壚古樂府好婦出迎客顔色正敷腴敷腴喜悅之色人唐書本傳甫從髙適李白過汴州登吹臺慷慨懷古莫測也水經注陳留風俗傳曰縣有蒼頡師曠城上有列仙之吹臺梁王增築以為吹臺城隍夷滅略存故址其臺方一百許步楊慎曰吹臺即繁臺本師曠吹臺梁孝王增築班史稱平臺唐稱吹臺又因謝惠連嘗為雪賦又名雪臺東都賦慨長思而懷古江淹詩青滿平地蕪又平蕪帶天曰漢書高祖隱於芒碭山所居上常有雲氣應劭芒屬沛國碭屬梁國先帝正好去聲武寰海未凋枯猛將去聲收西域長㦸破林胡百萬攻一城獻捷不云輸組練去如泥尺土負一作勝百夫此敘明皇開邊之事圭收西域如王忠嗣哥舒翰輩破林胡如安祿山張守輩趙曰攻取豈無勝負唯獻捷而掩敗故不云輸命驅百萬之衆以攻一城是一尺之土不足償百夫之矣故曰負百夫通鑑𤣥宗紀宋璟以天子好武功恐好事者競生心徼幸凋江淹詩竊值寰海闢仄見圭緯昌虞茂詩原澤潤枯抱朴子猛將難禦長前漢鄭吉傳卒伍從軍數出西域國又朝錯傳徑弩㦸射疏及逺通鑑注契丹即戰林胡地也唐㑹要開元二十六年張守圭大破契丹林胡遣使獻捷唐韻俗謂負為輸左傳組甲三百被練三百注組甲漆甲成組文被練練袍皆精兵也諸葛武侯新書此百夫之將拓境功未已元和辭大罏亂離朋友盡合沓嵗月徂吾衰將焉於䖍切一作安託存歿再嗚呼蕭條益堪愧一云病益甚獨在一云愧獨天一隅乘黃已去矣凡馬徒區區不復扶又切見顏鮑繫音計舟卧荆巫臨餐吐要食常恐違撫孤未敘亂離死生而湥痛髙李之亡上六歎亂後朋亡下八以衰老自危馬辭大罏元氣損傷再嗚呼髙李俱逝乘黃比二子凡公自喻末恐客死於䕫不見兩家子孫也碑此章首段十二句中間各八句末段十四句庾信文天子拓境百越來庭元和即太和郭璞江賦禀元氣之靈和大莊子以天地為大罏以造化為大冶揚雄解難陶冶罏洞蕭賦薄索合沓合㳫相繼貌云古詩各在天一隅騂洙曰乘黃駿馬也鶴云詩正義黃騂曰黃謂黃而色抱朴子凡馬野鷹本實一類張古詩一心抱區區嵯顏延之鮑照以比髙李詩才載詩西瞻岷山嶺峨似荆巫自巫山而下為荆州也零何胥哭陳昭詩撫孤空對此淚欲何言奉漢中王手札報韋侍御蕭尊師亡鶴注編在大厯元年秋日蕭韋逝淮王報峽中少上聲一作小年疑柱史多術怪仙公不但時人惜秪應平聲吾道窮此聞報而深痛韋蕭柱下史得長年侍御以少年而亡故疑之蕭史乘鶴升仙尊師以多術而卒故怪之兩引古人一切官一切姓存亡關於吾道見其人足重也曰公羊傳西狩獲麟孔子吾道窮矣一哀侵疾病相識一作見自兒童處處鄰家笛飄飄客子蓬强區兩切吟懷舊賦已作白頭翁此悼友而自傷衰老巳哀之切為交久也鄰家笛觸耳生悲客子蓬憐流落白頭懷舊恐將繼蕭韋而逝也惟杜臆一哀侵疾病相見自兒童信筆寫去不對之對杜有之此章上下各六句向秀思舊賦為嵇康呂安而作其序曰於時日薄虞淵寒冰淒然鄰人有吹笛者發聲寥亮追想曩昔遊宴之好感音而嘆故作賦云逺曹植詩轉蓬離本根飄飄隨長風類此遊客子捐軀從戎潘嶽懷舊賦為楊暨楊潭而作老魏文帝曰巳成翁但未白頭耳存殁口號二首鶴注據鄭䖍死於廣德二年則梁氏編在大厯元年為是席謙不見近彈棊一作碁畢耀一作曜仍傳舊小詩玉局他年無限事一作笑白楊今日幾人悲原注道士席謙吳人詩善彈棊畢耀善為小此謂席存而畢歿也近不見言人存地隔舊仍傳言詩在人亡席尚存故望其玉局降仙畢巳歿故傷其白楊拱墓兩句分頂下章亦然不畢曜僅傳小詩而前此稱為才大今詩伯杜臆譏其相䝉良是大約贈人之詞不無過譽歿後乃用直筆耳注西京雜記劉向作彈棋以獻梁冀傳冀善彈棋格五藝經舊彈棊兩人對局白黑碁各六枚先列棊相當下呼上更相彈也其局以石為之古今詩話彈棊有譜一卷唐賢所為其局方五尺中心髙如蓋其顛為小壺四角微起李義山詩莫近彈碁局中心最不平謂其中尊也白樂天詩彈碁局上事最妙是長斜謂持角長斜一發過半局譜中具有此法柳子厚亦用二十四棊者即此戲也今人罕為之矣歿乾元間畢曜除監察御史未幾以酷毒流貶黔中其當在此時姜宸英曰酷吏敬羽傳羽與毛若虛裴升畢曜同時皆暴忍時稱毛敬䙝畢未幾升曜流黔中曜正肅宗時人又喬林傳曜曾為郭子儀書記黃希曰張道陵修道既成老子降於成都地湧出一玉局髙丈餘老君升座授道畢老君已回玉局消散古詩蕭蕭白楊樹松柏夾廣路陶潛挽歌荒草何茫茫白楊亦蕭蕭吳論據不見仍傳四字遂云席歿畢存今按梓州詩云髙門薊子過是與席相見時此云不見近彈棊公獨往䕫州矣向在長安贈畢曜詩云流傳江鮑體是平日作詩此云仍傳舊小詩是死後詩傳也若云畢尚存則當云新詩不當云舊矣非或據搜神記南谷山中有白玉碁局引以證彈碁也若依此則下句白楊何獨不承小詩乎又盧注引隋書白楊何妥以證畢曜未亡使事隱僻蕭蕭白楊樹自當以古詩為據耳鄭公粉繪隨長夜曹霸丹青已白頭天下何曽音層有山水人間不解重驊騮原注髙士榮陽鄭䖍善畫山水曹霸善畫馬此謂鄭殁而曹存也鄭䖍既亡世更無山水之竒曹霸雖存人誰識驊騮之價乎一傷之一惜之也或云得䖍之圖幾令天下山水無色得霸之馬能使人間驊騮減價乃極贊其筆墨之神妙亦通又一說何曽有謂世不收藏不解重謂人弗珍惜意義似淺去抱朴子粉繪表形著圖青李陵詩嚴父辭長夜慈母中堂左思吳都賦丹圖其珍瑋容齊續筆子美存歿絶句每篇一存一歿蓋席謙曹霸存畢耀鄭䖍歿也魯直荆江亭即事二首其一云閉門覔句陳無巳對客揮毫秦少游正字不知溫飽味西風吹淚古藤州乃用此體時少游歿而無巳存也速錢塘瞿估歸田詩話云山谷此詩喻二人才思遲之異也後山詩如瓖墻得雨蝸成字古屋無人燕作家寥落之狀可想淮海詩如翡翠側身窺緑酒醒蜓偷眼避紅粧艷冶之情可見二人他作亦多類此後山為祕書正字宿齊宫驟寒或送綿半臂卻之不服競感疾而終淮海謫藤州以玉盂汲水笑視而卒二人於臨終屯泰不同又如此信乎各有造物也杜詩詳注卷十六
