body:
  text: 杜詩詳注卷四翰林院編修仇兆鰲撰天育驃匹妙切圖英華作圖别本作騎去聲歌鶴注此當是天寶末年作洙曰天育馬廄名據唐志總十二門者為二廄一曰祥麟一曰鳯苑其後但增八坊八監亦無以天育為廄者當是云天子所育之馬而已難今按驃疾走也驃騎猶云飛騎東方朔傳驃騎諸漢有驃騎將軍之號又唐貞觀間骨利幹所貢馬十匹尤駿太宗各為製名其六曰飛霞驃吾聞天子之馬艇齊詩話作天馬之子走千里今之畫圖無乃是是何意態雄且傑騣從趙作騣别作駿尾蕭梢朔風起毛為緑縹普沼切英華作驃兩耳黃眼有紫熖雙瞳方矯矯一作矯然龍性一云矯龍性逸含蔡云東坡書作含英華同一作合變化卓立天骨森開張前記畫中之馬意首提天子之馬此圖為天育設也騣尾以下皆寫其態之雄傑穆天子傳天子之馬走千里勝猛獸圖天馬子見西域傳得莊子齊景公好馬命使善畫者之訪似者期年不慕容廆傳雄傑有大度年騣馬鬛也劉恢詩絡首纒騣尾養以甘露芻雖顔延赭白馬賦垂梢植髮蕭梢鬛尾搖動之貌遇朔風而能豎起也陳師道曰馬之良者不怕寒嘶風踏雪愈有精神夏侯湛笳賦胡馬懷夫朔風尚書中侯龍馬赤文緑色鄭𤣥曰赤文而緑蛇也白說文縹青白色穆天子傳注魏時鮮卑獻千里馬色兩耳黃名曰黃耳賈誼賦驥垂兩耳得端光睛欲得如懸鈴紫熖相馬經眼欲得高眶欲赭白馬賦雙瞳夾鏡兩􅀈協月性詩四牡矯矯介之推龍蛇歌有龍矯矯庾五君詠龍誰能馴劉琬龍賦變化屈伸蔡雍侯碑英風發於天骨袁宏傳天骨秀朗肘開張二字見出師表馬援銅馬相法膝本欲起腋欲開伊昔太僕張景順監平聲一作考牧攻一作收一作神駒閲清峻遂令平聲大奴字胡仔云東坡作字英華作守天育别養驥子憐神駿一作俊當時四十萬匹馬張公歎其材盡下故獨寫真傳世人見之座右久更新次叙畫馬之由朱再提太僕監牧蓋圖起於張公也注簡閲唯取清峻惡凡馬之多肉耳羣字於天育者羣馬也别養驥子者驃騎也四十萬指馬獨寫真指驃騎揚子雲針伊昔唐虞太趙曰唐兵志監牧之制其官領以太僕今公詩所謂僕張景順乃開元時人舊注作張萬歲是貞觀時人誤四又曰張說隴右監牧頌德碑序開元元年牧馬二十萬匹十三年乃有四十三萬匹上顧謂太僕少卿監牧使張景順曰吾馬繁育君之力也對曰帝之力也仲之令也臣何力之有周禮夏官廋人掌教駣攻駒注攻駒乘其蹄齧者間之二歲曰駒三歲曰駣車魏志常林節操清峻前漢昌邑王傳使大奴以衣載女子注大奴奴之尤長大者也胡震亨曰大奴張景順之牧馬奴耳趙注指王毛仲毛仲父坐亦雖嘗沒為官奴然是時正以霍國公領內外間廄景順乃其屬也豈得稱為大奴令之守天育乎杜詩博議郤昂馬坊頌碑云唐初得馬於赤岸澤令張萬歲傍隴右馴字之作字天育亦通列子字孕常時唐六典諸牧監掌羣牧孳課之事凡馬有左右監以别其粗良細馬之監稱左粗馬之監稱右據此則别養驥子乃另為一處與字天育不為重復矣支梁元帝答齊國驤馬書價匹龍媒聲齊驥子世說遁好養馬或問之曰貧道重其神駿誰梁簡文咏美人看畫詩可憐俱是畫能辨寫真後漢崔瑗有座右銘年多物化空形影嗚呼健步無由騁如今豈無腰于皎切裊奴了切與驊騮時無王良伯樂音洛死即休末乃撫圖興歎蓋傷知馬者難逄而自慨不遇也曰多年物化知作詩時去開元間逺矣化此章前二段各八句末段四句收莊子其死也物曹植詩形影忽不見飛樂府申舞歌健步哺誰當吾赤瑞應圖腰裊神馬與同明君有德則至應劭曰喙黑身一日行萬里國水經注桃林多野馬造父於此得驊騮之王洙曰魯黃伯仁龍馬頌踰腰裊之體勢逸飛高蹤兼驥騄之美質逮驊騮之足雙人歐陽氏曰王良善御伯樂善相馬王良趙簡子時天文有王良星蓋因人以取名耳取史伯樂名孫陽嘗過虞阪見駕鹽車馬曰此良馬也而試之果然又有鬻馬者三日不售伯樂去而視之回而睨之明日其價三倍後漢書章懷太子注伯樂秦穆公時人善相馬趙曰韓退之文世有伯樂然後有千里馬千里馬常有而伯樂不常有意本於若驄馬行原注太常梁卿敕賜馬也李鄧公愛而有之命甫製詩黃鶴編在天寶十四載鄧公馬癖人共知初得花驄大宛于爰切種上聲夙昔傳聞思一見牽來左右神皆竦雄姿逸態何􅍶自由切崒昨沒切顧影驕嘶自矜寵隅目青熒夾鏡懸肉騣荆公改作騣舊作駿碨烏罪切礧力罪切連錢動此言質相之不凡就初見時寫驄馬盧注顧影驕嘶其逸態也夾鏡連錢其雄姿也唐晉書王濟解相馬又甚愛之杜預常稱濟有馬癖太宗常所乘馬有名玉花驄者眀皇雜録上所乘馬有玉花驄照夜白五漢西域傳大宛國多善馬嘺山上有馬不可得因取色牝馬置其下與集生駒號天馬子顔古詩夙昔夢見之奉南史蕭訶曰千聞不如一見延年賦弭雄姿以引梁景王七要逸態之赤駿足之驪龍影􅍶崒聳然出羣也西都賦巖峻􅍶崒束晳賦退顧以自憐相馬經有盻影而視者京陳何處士詩别處馬新驕吳均詩天曙馬爭嘶西賦猛毅䯱髵隅目高匡注隅目目有角也年西都賦琳珉青熒青熒言色青而有光熒也滑顔延賦雙瞳夾鏡舊唐書開元二十九年三月州刺史李雍獻馬肉騣麟臆項杜田補遺東坡云豫在岐下見秦州進一馬騣如牛下垂胡側立傾倒毛生肉端蕃人云此肉騣馬也乃知驄馬行肉騣碨礧當作騣夢弼曰碨礧謂肉騣突起連錢謂馬文㸃綴海賦碨礧山壟何遜詩碨礧衝波白楊爾雅注馬色有深淺斑駁如魚鱗今連錢驄也北史休之傳有觸籓之羝羊乘連錢之驄馬錢梁武帝詩金絡飾連朝來少草堂作少一作久試華軒下未覺千金滿高價赤汗微生白雪毛銀鞍却覆香羅帕卿家舊賜公取之一作能取一作有之天廄真龍此其亞晝洗須騰涇渭深夕荊作家一作朝一作晨趨可刷幽并平聲夜此言才力之特殊就初試時寫驄馬見流朱汗而被銀鞍此見其高價晝涇渭而夜幽并此其真龍陶潛詩華軒盈道路軒軒車也大韓子馬似鹿者值千金西域傳武帝遣使持千金請宛善馬未滿價言不止千金國語一旦而馬價十倍經東觀漢記武帝歌天馬霑赤汗今親見其然王相鶴茸毛生色雪白周𢎞正詩銀鞍耀紫韁容歌香羅鳴珮龍卿家指梁氏天廄言御賜赭周禮凡馬八尺以上為莊子葉公非好真龍也白馬賦旦刷幽燕畫秣荆越張說隴右監牧頌朝刷閬風夕洗天泉吾聞良驥老始成此馬數年人更驚豈有四蹄疾於鳥不與八駿俱先鳴時俗造七到切次那得致雲霧晦冥方降精近聞下去聲詔喧都邑肯使一作知有騏驎地上行末言竒材當得大用乃借馬以頌李老更驚大器晚成八駿鳴可充君馭雲霧降其生不偶詔都邑見知於朝也遇此章三段各八句轉韻應瑒愍驥賦愍良驥之不兮而曹孟德詩老驥伏櫪晉書慕容皓有駿馬四十九歲俊逸不虧皓曰此馬見異先朝金石録唐太宗有白蹄馬純黑四蹄俱白騮穆天子傳八駿曰赤驥盜驪白羲踰輪山子渠黃驊騄耳何承天詩賈勇尚先鳴兮曹植詩時俗多所拘震造次見論語蛇楚辭雲霧㑹日冥晦班彪王命論電晦暝有龍之怪杜修可曰瑞應圖龍馬者河水之精春秋考異記地生月精為馬月數十二故馬十二月而生前漢田叔傳漢下詔王潘嶽詩總總都邑人字朱注戰國策世無騏驎騄駬之駟已備矣鮑彪注書不載騏驎玉篇云騏驎馬黑脊亦不言良馬爾雅翼麒麟善走故良馬亦名為騏驎易牝馬地類行地無疆魏將軍歌朱注此詩言魏將軍先立功西陲後統禁軍宿衛絶不及喪亂事蓋祿山未反時作也草堂本編在天寶末年今從之將軍昔著陟略切從事衫鐵馬馳突重平聲兩銜被音披堅執鋭略西極崑崙月窟東嶄作咸切巖首叙其立功西陲官從事衫初為幕府職也兩重銜戰馬欲其牢固也在吳子良曰將軍略地至西方之極回視崑崙月窟反東矣從事衫乃戎衣姜氏杜箋魏孝肅詔百司悉依舊章不得以務衫從事即從事衫也說文驪馬深黑色鐵馬赤黑色先儒云取其馬色如鐵亦取其堅壯如鐵魏書曹公列鐵騎五千為十重障孔稚圭詩漢家嫖姚將馳突丐奴庭堅說文銜馬口勒也兵戰國䇿吾被堅執鋭漢書注被謂甲胄執鋭謂利爾雅西至於邠國謂之西極列子西極之國服郭璞崑崙贊崑崙月精水之靈府長楊賦西壓月􅒸䖍曰􅒸音窟月所出也上林賦嶄巖參差嶄巖山石高峻貌君門羽林萬猛士惡若哮呼爻切虎子所監平聲五年起家列霜㦸一日過海收風帆次記其歸領禁軍五年起家驟躋顯貴也一日過海歸自青海也王漢天文志北宫𤣥武虛危其南有衆星曰羽林天軍者象之應劭漢紀注林喻林木羽若羽翼洙曰漢有羽林軍蓋禁旅也漢高帝大風歌安得猛士兮守四方越絶書吳王許勾踐行成子胥大怒目若夜光聲若哮虎詩噉如虓虎言其勇也監領也魏其傳薦人或起家至二千石品虞世南詩𦦨𦦨霜㦸動耿耿劍虹浮邵注官階三然後門列棨㦸陸雲詩安得風帆深濯佛波平生流輩徒蠢蠢長安少去聲年氣欲盡魏侯骨聳精爽緊華去聲嶽峯尖見秋隼此言其英氣過人比氣欲盡讓其富貴功名也華峯其骨聳秋隼比其精爽蠢沈約奏彈玷辱流輩莫斯為甚之左傳今王室實蠢焉注蠢蠢動貌又樂祁曰心精爽是謂魂魄子産曰用物精多則魂魄强是以有精爽至於神明岣嶁山碑華嶽太衡春秋感精符季秋霜始降鷹隼擊星纒寶校當作鉸絞教二音金盤陀夜騎天駟超天河欃槍熒惑不敢動翠㽔雲旓所交切相蕩摩此言其威能弭患星纒喻馬飾天駟喻御廄天河喻御河欃槍熒惑比戎寇翠㽔雲旓言儀仗此皆狀其宿衛軍容也杜詩博議舊注引鮑照詩金銅飾盤陀日照光蹀躞而未詳其義唐書食貨志云先是諸爐鑄錢窳薄鎔破錢及佛像謂之盤陀語頗相合蓋雕飾鞍勒以銅雜金為之故有日照星纒之麗而鎔破錢及佛像者取其金銅相和亦名盤陀也絶史天官書漢中四星曰天駟旁一星曰王良旁八星漢曰天漢河東賦乘翠龍而超河兮漢天文志欃槍妖星熒惑火星東子虛賦錯翡翠之葳㽔旓西京賦棲鳴鳶曳雲旓吕萊注翠㽔雲旓皆旗也旌旗旒也相蕩摩舒閒也吾為去聲子起歌都護酒䦨插劍肝膽露鈎陳蒼蒼𤣥武暮舊作風𤣥武今從荆公萬歲千秋奉明主臨江節士安足數色主切之末稱其忠勇可以大用武趙曰當酒䦨拔劍時以鈎陳則蒼蒼以𤣥則暮萬歲千秋言宜長為天子宿衛非特臨江王節士而已護此章前四段各四句後段五句收宋書樂志丁都歌者彭城內史徐逵之為魯軌所殺高祖使督護丁旿收殯之逵之妻高祖長女也呼旿至閣下自問殮送之事每問輒呼丁都護其聲哀切後人因廣其曲焉宋武帝丁都護歌都護北征去前鋒無不平漢書注酒䦨言希也謂飲酒者半罷半在謂之䦨六漢書郎顗疏披露肝膽書不擇言洙曰晉書鈎陳星在紫宫中故天子殿前亦有鈎陳所以法天也𤣥王安石曰三輔舊事未央宫北有𤣥武闕舊本作風武誤以武字為韻却無義理𤣥漢書北宫𤣥武虛危其南有衆星曰羽林天軍鈎陳武因天上有羽林星而類及之古樂府上之回千秋萬歲樂無極愁大戴禮可謂明主之道與漢藝文志有臨江王及思節士歌詩四篇宋陸厥臨江王節士歌節士慷慨髮上衝冠彎弓掛若木長劍竦雲端朱注漢書景帝廢太子為臨江王後坐侵廟堧為宫徴入自殺時人悲之故為作歌愁思節士無考本是二人纍言之故曰及陸厥合之為一甚誤庾信哀江南賦臨江王有愁思之歌又因此而相沿耳此歌前用八句轉韻中間各四句轉末則三句兩句叠韻蓋歌中音調取其繁聲促節也白水明府舅宅喜雨得過字天按公往來於白水奉先在寶十四載是冬又探家於奉先次年之夏則携家赴白水矣翁邵注白水在今陜西西安府公舅是崔十九吾舅政如此古人誰復扶又切過平聲碧山晴又濕白水雨偏多精禱既不昧歡娛將謂何湯年旱頗甚今日醉絃歌首聨頌明府三四雨中之景下四喜雨之意隅精禱致雨此即政比古人處何遜詩遊豫碧山潘嶽懷縣詩白水過庭激殷漢明帝詔煩勞羣司積精禱求老子其下不昧本記湯時大旱禱於桑林曹植喜霽賦湯感旱於殷時謝靈運詩絃歌愧言子九日楊奉先㑹白水崔明府鶴注此當是天寶十四載作橋陵詩呈縣內諸公有云王劉美竹潤王與楊同韻當有一誤時公在奉先蓋楊設席而㑹崔也長安志奉先縣西南至京兆府二百四十里唐書白水縣屬左馮翊同州前漢循吏傳議曹王生謂龔遂曰明府且止願有所白明府本謂太守唐直屬縣令矣今日潘懷縣同時陸浚儀坐開桑落酒來把菊花枝天宇清霜淨公堂宿霧披晚酣留客舞鳬舄共差此兹切池此以潘陸稱楊崔也桑酒菊枝九日之事霜淨霧披九日之景晚酣留飲而醉舞差池其愛客之情至矣本是楊主崔賓故潘比楊陸比崔坐屬楊來屬崔霜露一聨雖云即景亦見二君之外肅清而中洞逹晉書潘嶽傳嶽棲遲十年出為河陽令轉懷令令陸雲傳雲以公府掾為太子舍人出補浚儀令月廣義晉宣帝時羌人獻桑落酒九日以賜百官飲水經注河東郡民劉白墮采挹河流醖成芳酎熟於桑落之辰故名世說陶潛九日無酒宅邊摘菊盈把望見白衣人至乃王𢎞送酒便飲醉而歸庾信蒲州乞酒詩蒲城桑落酒灞岸菊花枝又云忽逢桑葉落正值菊花開鳴陶潛詩昭昭天宇濶湛方生弔鶴文負清霜而夜詩躋彼公堂覩陶詩朝霞開宿霧世說衛瓘見樂廣曰若披雲霧而青天後漢書王喬為葉令入朝數帝令太史侯望言有雙鳬飛來乃舉網張之但得雙舄詔上方診視則四年中所賜尚書官屬履也詩燕燕于飛差池其羽自京赴奉先縣詠懷五百字朱注舊書𤣥宗紀天寶十四載冬十月上幸華清宫十一月丙寅祿山反公赴奉先時𤣥宗正在華清宫所以詩中言驪山事特詳十一月九日祿山反書至長安𤣥宗猶未信故詩中但言歡娛聚斂亂在旦夕而不及祿山反狀杜陵有布衣老大意轉拙許身一何愚樊作過竊比稷與契與卨同音屑居然成濩落白首甘一作苦契音挈濶蓋棺事則已此志常覬音記豁前三段從詠懷叙起功此自述生平大志公不欲隨世立而必期聖賢事業所謂意拙者在比稷契也甘契濶安於意拙常覬豁冀成稷契杜臆人多疑自許稷契之語不知稷契無他竒惟此已溺已飢之念而已伊得之而納溝為恥孔得之而立逹與飢聖賢皆同此心篇中憂民治國等語已和盤托出東坡引舜舉十六相秦時用商鞅詩為證何舍近而求逺耶漢地理志杜陵注古杜伯國漢宣帝葬此因曰杜陵在長安南五十里杜臆長安城東有霸陵文帝所葬霸南五里即樂遊原宣帝築以為陵曰杜陵杜陵東南十餘里又有一陵差小許后所葬謂之少陵其東即杜曲陵西即子美舊宅自稱少陵野老以此傳布衣老大注别見古書作訛心勞日拙何史記聶政身未敢以許人詩陌上桑使君一愚竊比見論語莊上林賦家家自以為稷契瓠上林賦居然未肯歸子瓠落無所容司馬注云布濩落零落張綖注濩落廓落也傅嵇含賦序白首無聞懈詩死生契濶注契濶勤苦也毅詩契濶夙夜庶不忒韓詩外傳孔子曰學而不已闔棺乃定宋書劉毅曰大丈夫蓋棺事乃定矣潘嶽詩此志難其紀荀悅漢論衆庶覬其名迹覬希幸也庾信詩有情何可豁窮年憂黎元歎息腸一作腹內熱取笑同學翁浩歌彌激烈非無江海志蕭灑送一作迭日月生逢堯舜一作為君不忍便永訣當今廊廟具構厦豈云缺葵藿傾太陽物性固難一作莫奪此志在得君濟民欲為稷契則當下救黎元而上輔堯舜此通節大㫖尸江海之士遺世公則切於慕君而不忍忘廊廟之臣位公則根於至性而不敢欺此作兩形以解同學之疑浩歌激烈正言詠懷之故明皇初政幾作貞觀逮晚年失德而遂生亂階曰生逢堯舜君望其改悟自新復為令主惓惓忠愛之誠與孟子望齊王同意謝靈運詩窮年迫憂患谷永傳天下黎元咸安家樂業藿莊子我其內熱與陸機詩無以肉食資取笑葵與列女傳孟宗同學共處天楚辭浩歌恍兮激烈也莊子江海之士山谷之人輕地細萬物而獨往者宗炳詩志氣洞蕭灑今南史武帝謂蜀士李膺曰今李膺何如昔李膺對曰勝昔問其故對曰昔事桓靈之主今逢堯舜之君薛孝通聨句既逢堯舜君願上萬年壽傳别賦誰能摹暫離之狀寫永訣之情者乎叔孫通贊廊廟之材非一木之枝葵潘尼詩廣厦構衆材為葵藿自比致君之念曹植表藿之傾葉太陽雖不回光然終向之者誠也害韓詩外傳不物性顧惟螻蟻輩但自求其穴胡為慕大鯨輒擬偃溟渤以兹悟一作誤生理獨恥事干謁兀兀遂至今忍為塵埃沒終愧巢與由未能易其節沈飲聊自遣一作適放歌破杜臆作破舊作頗愁絶此自傷抱志莫伸得既不能出圖堯舜又不退作巢由亦空負稷契初願矣若居廊廟者如螻蟻擬鯨公深恥而不屑干遊江海者巢由隱身公雖愧而不肯易仍用雙關以申上文之意放歌破愁欲藉詠懷以遣意作長篇古詩布勢須要寬展此二條各四句轉意撫時慨已或比或興迭開迭闔備極排蕩頓挫之妙橫顧念也尸子螻蟻之穴無不滿焉海賦其魚則海之鯨突杌孤遊戛巖㟼偃高濤渤嵇康養生論悟生理之易失鮑照詩穿池類溟兀兀即契濶之意巢班固傳令塵埃之中永無荆山汨羅之恨號高士傳父堯時人也山居以樹為巢而寢其上故曰巢父許由槐里人也堯讓天下於由不受而逃由告巢父巢父曰何不隱汝形藏汝光非吾友也擊其膺而下之阮籍詩巢由抗高節有顔延之五君詠韜精日沉飲誰知非荒宴古樂府放歌行公詩愁破崖寺古又愁破是今朝又益破旅愁凝杜臆作破愁為是若云頗愁絶語反稚矣歲暮百草零疾風高岡裂天衢隂崢嶸客子中夜發霜嚴衣帶斷指直不能一作得結凌晨過驪山御榻在嵽徒結切嵲音涅赴中四段自京奉先記中途所見之事發此則過驪山而有慨也將涉仲冬矣夜晨過去京止六十里也歲暮隂風詩歲聿云暮于楚辭百草育而不長于長門賦天飄飄而疾風嶸詩彼高岡西京賦思天衢三都賦南北崢公詩常用崢嶸旅食歲崢嶸年高也崢嶸赤雲西雲高也天衢隂崢嶸隂盛也史記范睢傳謁君得毋與客子俱來乎霜切我肌鮑照詩行子中夜飯發啓行也結古詩嚴又詩衣帶日已緩左傳衣有梁簡文帝詩凌晨光景麗溫寰宇記驪山在昭應縣東南二里即藍田山也雍録泉在驪山秦漢隋唐皆常遊幸惟𤣥宗特侈蓋即山建立百司庶府各有寓止於十月往至歲盡乃還宫又緣楊妃之故其奢蕩益著大抵宫殿包裹驪山而繚墻周遍其外觀風樓下又有夾城可通禁中北齊趙彥深位司徒每引見或升御榻西京賦託喬基於山岡直嵽霓以高居霓讀魚列切集韻嵲亦作􅒈通作霓嵽嵲山高貌蚩尤塞先則切寒空蹴踏崖谷滑瑶池氣鬱律羽林相摩戛君臣一作聖君留歡娛樂動殷音隱膠葛舊作樛嵑荆公歐公定為膠葛正異作嶱嵑賜浴皆長纓與去聲宴非短一作裋褐此記驪山遊幸之迹譏上四見不恤苦寒下四恣情荒樂氣塞寒空旌旗蔽天也崖谷滑冰雪在地也鬱律溫泉升摩戛衛士衆多君臣歡娛不恤國事賜浴與宴從官邀寵也在韓子黃帝駕象車異方並轂蚩尤居前皇覽蚩尤冢東郡壽張縣闞鄉城中高七丈民常十月祀之有赤氣出如匹練帛民名為蚩尤旗相唐太宗詩寒空碧霧凝頭陀寺碑崖谷共清風泉渙氣張平子南都賦蹴踏咸陽烟瑶池注見二卷元江賦滃渤以霧杳時鬱律其如唐㑹要垂拱年置羽林軍膠江淹詩太平多歡娛然上林賦張樂乎膠葛之㝢注葛廣大貌郭璞注曠深貌也南都賦其山則崆嶢嶱嵑注山石高峻貌曽曰膠葛亂貌揚雄解難撠膠葛騰九閎顔師古注膠葛上清之氣也明皇雜録上嘗於華清宫中置長湯數十賜從臣浴津陽門詩注宫內除供奉兩湯外更有湯十六所長湯每賜諸嬪御其修廣與諸湯不侔見江淹詩長纓皆俊人短褐注一卷彤庭所分帛本自寒女出鞭撻一作箠其夫家聚斂去聲貢城闕聖人筐篚恩實願一作欲邦國活臣如忽至理君豈棄此物多士盈朝音潮廷仁者宜戰慓此譏當時賜豫之濫其上四叙事下六託諷筐篚賜豫欲活國今諸臣皆玩忽不知則此物豈虛擲者乎戰慓當思報稱也大羅大經曰此段所云即爾俸爾祿民脂民膏之意士夫誦此亦可以悚然懼矣郭西京賦玉階彤庭絲宋之問詩賜金分帛奉恩輝泰機詩皎皎白素織為寒女衣者魏收檄文鞭撻疲民其周禮載師之職凡民無職事出夫家之征以時徴賦大學不畜聚斂之臣天詩在城闕兮京師有闕得稱城闕以通鑑注唐人稱子皆曰聖人詩序實幣帛筐篚將其厚意周禮以佐王均邦國孫楚與孫皓書愛民活國道家所尚王康琚詩矯性失至理此不敢斥言君故託臣以諷能古詩此物何足貴濟李長祥云多士無人心矣仁者無戰慓乎詩濟多士漢元帝詔夙夜戰慓况聞內金盤盡在衛霍室中堂有一作舞神仙烟霧䝉一作散玉質暖客一作䝉貂鼠裘悲管逐清瑟勸客駝蹄羮霜橙壓香橘朱門酒肉一作䏑臭路有凍死骨榮枯咫尺異惆悵難再述此刺當時后戚之奢前八叙事後四託諷朱注衛霍皆漢內戚以比楊國忠神仙玉質指貴妃諸姨盤勳戚奢侈而不念民窮其致亂蓋有由矣分帛金二條即指驪山宴賞杜臆則概指平日謂天寶八年帝引百官觀左藏以國用豐衍賞賜貴妃之家無有限極十載帝為祿山起第窮極壯麗既成幄帟器皿充牣其中雖禁中不及祿山生日帝及貴妃賜衣服寶器酒饌甚厚故彤庭分帛衛霍金盤朱門酒肉等語皆道其實真詩史也吳內金盤尚方器用辛延年詩金盤鱠鯉魚曹植與質書衛霍不足侔也詩劉楨詩萬舞在中堂烟又意氣凌神仙香朱注江淹畫作秦王女乘鸞向霧烟霧指堂上烟楚辭金相玉質黑洙曰鮮卑有貂鼠子皮毛柔軟趙國策李兑送蘇子貂之裘潘嶽詩簫管清且悲徐伯彥淮亭吟倚清瑟兮橫涼琴而洙曰橙出穰縣者勝蜀中有給客橙似橘而非若柚香郭璞詩朱門何足榮宋王粲詩酒肉踰川坻而黃山谷曰孫子新書楚莊攻厨有臭肉尊有敗酒三軍有飢色衛志袁術傳後宫數百皆服綺縠餘粱肉而士卒凍餒江淮間盡空者西京雜記元封二年大寒雪深五尺三輔人民凍死十冇二三咫曹植詩榮枯立可須自徐幹詩雖路在尺魏明帝詩惆悵憐北轅就涇渭官渡又改轍羣水一作冰從西下去聲極目高崒兀疑是崆峒來恐觸天柱折河梁幸未拆枝撐聲窸音悉窣音率行李一作旅相攀援川廣不一作且可越下三段至奉先而傷已憂人仍是詠懷本意此憶途次倉皇情狀猶上六言水勢下四言行人為羣水西來其洶湧如此幸河梁未拆耳攀援爭渡川廣不能飛越也橋朱注祿山反書至帝雖未信一時人情恇擾議斷河為奔竄地所以行李攀援而急渡也觀河梁幸未拆句可見十自京赴奉先從萬年縣渡滻水東至昭應縣去京六里又從昭應渡涇渭北至奉先縣去京二百四十里驪山在昭應東南二里溫泉出焉又涇渭二水交㑹於昭應之北故云北轅就涇渭其官渡改轍在唐時亦遷徙無常大抵在昭應之間為奉先便道耳朱注則指涇陽縣涇水之渡路又隔逺至舊注引魏志官渡不切唐之萬年即今咸寧唐之昭應即今臨潼唐之奉先即今蒲城後漢馬融傳北轅反斾涇梁簡文帝罷雍州恩教植柳官渡尚或依然長安志陽縣有涇水渡九正直西京之北曹植詩改轍登高岡諸羣水或作羣冰非此時正冬冰凌未解也朱注涇渭水皆從隴西而下故疑來自崆峒梁元帝𤣥覽賦試極目乎千里張地志涇水發源安定郡开頭山即崆峒山水經注華叙東方朔神異經曰崑崙有銅柱焉其高入天所謂天柱也列子共工氏怒而觸不周之山折天柱絶地維今按山陽縣有天柱山屬長安境內杜臆天柱折乃隱語憂國家將覆也寺江總詩秦川心斷絶何悟是河梁枝撐注見慈恩塔詩枝撐河梁交柱窸窣橋動有聲也李賀神絃曲海神山鬼來座中紙錢窸窣鳴飈風窸窣蓋唐人方言也西溪叢語唐李濟翁資暇録云古使字作李左傳所言行李乃是行使後人誤為李字傳曰行李之往來供其困乏杜預注李使人也又曰亦不使一介行李告於寡君注行李行人也又曰行理之命無月不至注行理使人通聘問者或言李或言理皆謂行使也但文其詞則謂之行李亦作理耳知非改古文為李也濟翁不言李出何書劉孝威結客少年場詩少年李六郡遨遊遍五都李字作使音亦一證也袁山松山川記行者攀援牽蘿帶索每鮑照詩川廣多懼老妻寄荆作既異縣十口隔風雪誰能久不顧庶往共飢渴入門聞號平聲咷幼子餓一作飢已卒即律切吾寧捨一哀里巷亦一作猶嗚咽音一所愧為人父無食致夭折音哲豈知秋禾誤未登貧窶有倉卒音猝窮此述家人困境况上四在途而歎下八至家而悲雖杜臆叙父子夫婦之情極其悲慘寄跡他鄉故秋禾登而無救於貧吳越春秋越王令壯者無娶老妻詩古樂府他鄉各異縣展轉不相見異縣指奉先古前日風雪中詩不顧其後號張望詩六時疲飢渴子孔融詩入門望愛子易先咷而後笑禮記幼常視毋誑又孔子之衛遇舊館人之喪入而哭之遇於一哀而出涕至蔡琰詩行路亦嗚咽大學為人父庾信傷心賦於繼體多從夭折左傳子産曰札瘥夭昏是夭為少死也漢書五行志父喪子曰折月令孟秋之月農乃登穀倉詩終窶且貧卒曹植詩卒骨肉情倉謂夭折生常陳作當免租稅名不𨽻征伐撫跡猶一作獨酸辛平人固騷屑默思失業徒一作途因念逺戍卒憂端齊一作際終南澒胡孔切洞徒總切不可掇末以憫亂作結身世之患深矣且天寶季年邊帥窮兵故民苦租稅征伐公在事外尚酸辛况窮民之失業逺戍者乎念及此而憂積如山不能掇去又回應憂黎元意此章分十段八句者四段十二句者四段十句者兩段錯綜而自見整齊將漢文帝詔今勤身從事而有租稅之賦漢光武詔兵征伐張悛置守塜人表今為平民傳劉向九歎風騷屑以搖木兮騷屑紛擾之貌谷永百姓失業流散過秦論陳涉以戍卒散亂之衆數百洞謝靈運詩顧已識憂端溫淮南子未有天地鴻濛澒許慎注澒讀作項周伯曰氣澒洞未分之貌獨孤及觀海詩澒洞吞百谷周流無四垠則澒洞乃水聲洶湧之貌此承憂端來是憂思煩悶之意趙注謂比世亂者未然從曹操樂府明明如月何時可掇憂中來不可斷絶胡夏客曰詩凡五百字而篇中叙發京師過驪山就涇渭抵奉先不過數十字耳餘皆議論感慨成文此最得變雅之法而成章者也又曰赴奉先詠懷全篇議論雜以叙事北征則全篇叙事雜以議論蓋曰詠懷自應以議論為主曰北征自應以叙事為主也奉先劉少去聲府新畫山水障歌草堂詩箋編在自京赴奉先之後以詩中有蒲城風雨句也山英華注奉先尉劉單宅作山水障畫水於屏障也堂上一作中不合生楓樹怪底江山一作山川起烟霧聞君掃却赤縣圖乘興去聲遣畫滄洲趣首叙屏障山水之乍見而怪甚言作勢異赤縣圖别是一幅滄洲趣指屏中山水樹楊誠齊曰詩有驚人句如山水障云堂上不合生楓怪底江山起烟霧是也方禮記堂上不趨解楚辭湛湛長江兮上有楓樹唐言底字作何字顔氏家訓師古正謬云何物為底此本言何等物其後遂省何言直云等物耳謂謝靈運詩江山共開曠鮑照詩徘徊烟霧裏掃揮灑筆下也有史記鄒衍謂中國名赤縣神州趙曰京邑屬縣有赤畿其浩禳者為赤謝朓詩復信滄洲趣畫師亦無數好手不可遇對此融心神知君重去聲毫素豈但祁嶽與鄭䖍筆跡逺過楊契乞結切丹此贊其筆意超絶薛道衡詩不䝉女史進更失畫師情復庾肩吾傳張士簡之賦周升逸之辨亦成佳手難可遇左思詩聊可瑩心神畫毫素揮毫於素絹也五君詠深心託毫素李嗣真録空有其名不見踪跡二十五人祁嶽在李國恆之下其唐書鄭䖍善圖山水嘗自寫其詩并畫以獻帝大署尾曰三絶宋羊欣論書筆跡精熟沙門彥琮後畫録隋參軍楊契丹六法頗該殊豐骨氣山東體製允屬斯人得非𤣥圃裂一作坼無乃瀟湘翻悄然坐我天姥下耳邊已似聞清猿反思前夜風雨急乃一作恐是蒲黃作滿城鬼神入元氣淋漓障猶濕真宰上時掌切訴天應平聲泣此形容山水之神竒𤣥圃瀟湘舉逺景以相擬言其迹侔仙界風雨蒲城舉近景以相擬言其巧奪化工穆天子傳乃為銘迹於𤣥圃之上以詔後世合圖經湘水自陽海發源至零陵北而營水㑹之二水流謂之瀟湘瀟者水清深之名王徴君詩窈靄瀟湘空賢杜詩用虛字亦有所本何氏語林袁粲曰豈得非名左傳云無乃不可乎吳越郡國志天姥山與括蒼相連春月樵者聞簫鼓笳吹之聲聒耳寰宇記天姥山在剡縣南八十里謝靈運詩暝投剡中山明登天姥岑即此開張說詩清猿坐見傷雄寰宇記蒲城縣本漢重泉縣元中改為奉先揚上林賦大者含元氣纎者入無倫行楚辭劍淋漓而縱橫鳴老子有真宰以制萬物五志中和三年浙西天聲如轉磨是謂天泣趙曰錢希白洞微志無雲而雨謂之天泣昔倉頡作字天雨粟鬼夜哭此暗用其意野亭春還雜花逺漁翁暝踏孤舟立滄浪水深青溟濶英華作滄浪之水清且濶欹岸側島英華作欹峰側岸秋毫末不見湘妃鼓瑟時至今斑竹臨江活此備寫山水中景物臨亭花岸島屬山漁舟滄溟屬水湘竹江又兼映山水謂上二段應前滄洲趣書庾信詩野亭高被馬渭春還春氣回還丘希範雜花生樹傅𤣥詩濱漁釣翁離陶潛詩渺渺孤舟逝慎子朱之明察秋毫之末滄浪在楚青溟指海豈古詩嘗用不見猶云不見啼楚辭使湘靈鼓瑟兮博物志舜崩於蒼梧二妃以淚揮竹竹盡斑張載詩臨江釣春魚劉侯天機精愛畫入骨髓自有兩兒郎揮灑亦莫比大兒聰明到能添老樹巔崖裏小兒心孔開貌音莫得山僧及童子此因少府而并及其子應前畫師一段書何遜詩劉侯務屬書文賦方天機之峻利漢鄒陽傳厚德長君入於骨髓開禰衡傳大兒孔文舉小兒楊德祖魏略孫權書心目明貌描繪工肖也庾信詩山僧或見尋知左傳童子何若耶溪雲門寺吾獨胡一作何為在泥滓青鞋布襪從此始此見畫而思託身世外應前天姥兩句此章起結四句中間八句者兩段六句者兩段甚水經注若耶溪水上承嶕峴麻溪溪下孤潭周數畝清深有孤石臨潭垂崖俯視猿狖驚心寒木被潭森沈駭觀溪水至清照衆山倒影窺之如畫又云山隂縣南有玉笥竹林雲門天柱精舍並疏山創基架林裁宇割潤延流盡泉石之好胡夏客曰若耶溪長數十里凡有六寺皆以雲門冠之王十朋曰南史何𦙍以㑹稽多靈異往遊焉居若耶山雲門寺西征賦奮迅泥滓赤城謝省曰此詩一篇之中微則竹樹花草變則烟霧風雨仙境則滄洲𤣥圃州邑則赤縣蒲城山則天姥水則瀟湘人則漁翁釋子物則猿猱舟船妙則鬼神怪則湘靈無所不備而縱橫出沒幾莫測其端倪之王嗣奭曰畫有六法氣韻生動第一骨法用筆次杜以畫法為詩法通篇字字跳躍天機盎然此其氣韻也如堂上不合生楓樹突然而起已而忽入蒲城風雨已而忽入兩兒揮灑飛騰頓挫不知所自來此其骨法也至末因貌得山僧忽轉到若耶雲門青鞋布襪闋然而止總得畫法經營之妙而篇中最得畫家三昧尤在元氣淋漓障猶濕一語試一想像此畫至今在目詩中有畫信然黃生曰此篇寫畫與贊賞分作數層說反覆濃至奉同郭給事湯東靈湫作安祿山反在天寶十四載十一月此詩當是其年十月作此時反信未至而逆迹已萌觀篇中蝦蟇長虬可見依梁編為是同和也靈湫水池名叙杜臆題主湯東之靈湫非咏湯泉也故篇中詳湫之改移與龍之靈怪而湯泉只隂火數語以引起靈湫東山氣濛鴻一作鴻濛宫殿居上頭君來必十月樹羽臨九州隂火煮玉泉噴薄漲巖幽有時浴赤日光抱空中樓首叙駕幸驪山隂火以下志湯泉勝景祭龍有期故來必十月山勢最高故下臨九州隂火言泉之溫噴薄言泉之湧天子所浴故比之赤日也淮東山即驪山述征記長安東則驪山西則白虎源南子未有天地之時濛鴻澒洞莫知其門趙注氣濛鴻山形如䝉雲霧也唐書驪山宫貞觀十八年置咸亨二年始名溫泉宫天寶十載改曰華清宫治湯井為池環山列宫室安後漢順帝紀修飾宫殿古樂府夫壻居上頭長志開元後帝每嵗十月幸溫湯歲盡而歸州詩設業設虡崇牙樹羽樹羽立羽葆蓋也禹貢九攸同海賦陽冰不治隂火潛然博物志凡水源有硫黃其泉則溫故云隂火若煮楊慎曰易澤中有火素問澤有陽𦦨注陽焰如火烟騰騰而起於水面者是也蓋澤有陽𦦨乃山氣通澤山有隂靄乃澤氣通山唐顧況使新羅詩隂火暝潛燒是也出陸機詩玉泉涌微瀾黃吳都賦噴薄沸騰山海經於𤾉谷浴於咸池希曰開元十四年十二月乙巳日色赤如赭何遜詩赤日下城闉陶潛詩蕩蕩空中景長安志驪山有觀風樓羯鼓樓閬風入轍跡曠一作廣原一作野非延冥搜沸正異作拂天萬乘去聲動觀水百丈湫幽靈一作靈湫斯一作新可怪一作佳王命官屬休初聞龍用壯擘石摧林丘中夜窟宅改移因風雨秋倒懸瑶池影屈注滄一作蒼江流味如甘露漿揮弄滑且柔此記駐蹕靈湫初聞以下志湫龍神異及湫水之潔清閬風曠原借諷荒遊屈萬乘之尊而往祀靈湫事近矯誣故曰可怪風倒影謂宫殿下映屈注謂衆水奔赴大人賦登閬而遙集十洲記崑崙三角其一角正北曰閬風巔其一角正西名曰𤣥武堂其一角正東名曰崑崙宫顔延之詩周御窮轍跡趙曰周穆王欲車轍馬跡遍天下里穆天子傳自羣玉之山以西至於西王母之邦三千自西王母之邦北至於曠原之野飛鳥之所解羽千有九百里宗周至於大曠原萬四千里冥搜見慈恩寺詩東征賦旌旗拂天蕪城賦歌吹沸天萬乘動則轟然有聲當作沸天孟子注兵車萬乘謂天子也孟子觀水有術趙岐長安志泠水一曰零水在臨潼縣東三十五里亦曰百丈水趙曰水經注泠水南出浮胏山浮胏山乃驪山之麓也沈約詩百丈注懸淙祭揚雄蜀都賦火井龍湫轂杜臆官屬休謂休沐以致漢書鄭當時傳其推士及官屬丞吏穆天子傳天子以寒之故命王屬休落初聞追叙昔聞也易大壯小人用壯謝惠連詩雪灑林丘賦曹植詩中夜指星辰道江賦塊竒之所窟宅回天台或倒影於重溟廬山人遊石門詩序流光照則衆山倒影瞰瑶池見慈恩寺詩志水經注屈而北注謝朓詩回滄江流晉五行御路楊歌汝非皇太子那得甘露漿㫖江賦揮弄灑珠內則甘柔滑翠旗淡俗作淡偃蹇雲車紛少留簫鼓蕩四溟異香泱烏朗切漭浮鮫一作蛟人獻微一作徴綃音宵曽祝沈豪牛百祥奔盛明古先莫能儔坡陀金蝦蟆出見形甸切蓋有由至尊顧之笑王母不遣一作肯收復歸虛無底化作長黃一作龍與虬此記親祀靈湫百祥以下借蝦蟆咎徴而患長虬之不測典吳論翠旗雲車羽衛遲留也簫鼓異香貢綃沈牛祀豐潔也夢弼曰楊國忠言祿山必反曰陛下試召之必不來祿山聞命即至見上於華清宫此祿山謁見之由故曰坡陀金蝦蟆出見蓋有由上由是益親信祿山國忠之言不能入太子亦知祿山必反言之不聽雖國忠欲收祿山貴妃必不肯故曰至尊顧之笑王母不肯收續遣歸范陽祿山遂反豈非復歸虛無底化作長黃虬乎朱注虛無底即湫水也歸虛無而化黃虬言祿山之勢已成猶猪龍而僭擬真龍也其憂亂之意情見乎詞矣上林賦建翠華之旗注翠羽為旗上葆也旌長門賦淡偃蹇而待曙兮李竒注淡猶動也又七發旗偃蹇廣雅偃蹇夭嬌也楚辭乘回風兮載雲車張北征賦曽不得乎少留武顔延之詩笳鼓震溟州協詩雨足灑四溟梁帝懴序宫內聞異香馥郁也上林賦過乎泱漭之野紗任昉述異記鮫人即泉先又名泉客南海出鮫綃泉先潛織一名龍紗其價百餘金以為服入水不濡吳都賦泉室潛織而卷綃注云鮫人織輕綃於泉室以賣之夢弼曰獻綃以為幣沈牛以為牲也之穆天子傳天子大朝於燕然之山奉璧南面曽祝佐祝沈牛馬豕羊注曽猶重也祝謂祝史漢書郊祀志祝謂主祭祀之贊詞者之穆天子傳文山之人歸遺乃獻良馬十四駟天子與豪馬豪牛龎狗豪羊以三十祭文山注豪猶髭也賦書作善降之百祥揚雄解嘲遭盛明之世吳都古先帝代衡坡陀注見三卷之埤雅蝦蟆一名蟾蜍或作詹諸張靈憲羿請不死藥於西王母嫦娥竊之奔月是謂蟾蜍陸倕漏刻銘靈虬承注隂蟲吐􅀈李翰曰隂蟲蝦蟆也潘鴻曰按五行志神龍中渭水有蝦蟆大如鼎里人聚觀數日而失此韋后時事坡陀金蝦蟆蓋其類也祿山濁亂宫闈故有此應可與翟泉鵝出同類並觀故曰出見蓋有由又載蝦蟆色如金或云驪山上有古碑載之蔡曰酉陽雜爼長慶中有人見月光屬於林中如匹布尋視之見一金背蝦蟆疑自月中者秦北史源師傳真龍出見陸機詩於今知有由過論履至尊而制六合詩詩顧我則笑玉詩此宜無罪汝反收之注收拘也此收字所本篇虯無角龍俗作虬頭祿山事跡帝嘗夜宴祿山祿山醉卧化為一猪而龍左右遽言之帝曰渠猪龍耳無能為也天寶十四載𤣥宗遣中使賫璽書召祿山曰與卿修得一湯沐故令召卿至十月朕於華清宫待卿十一月祿山起兵反飄飄一作颻青瑣郎文采珊瑚鈎浩歌渌水曲清絶聽者愁末贊郭詩結出相和之意二聽歌生愁有感時事也此章八句起四句收中段各十四句邵注飄飄俊逸貌崔駰詩飄飄神舉逞所欲暮宫闕簿青瑣門在南宫漢舊儀給事黃門侍郎每日向青瑣門拜謂之夕郎出曹植與吳質書得所來記文采委曲酒趙注珊瑚鈎纂典記載嵩嶽嫁女事云周穆王把請王母歌以珊瑚鈎擊杯而歌師氏曰珊瑚鈎言文章之可貴楚辭臨風恍兮浩歌淮南子手㑹渌水之趨馬融長笛賦取度於白雪淥水注云二曲名嵇康琴賦初涉渌水中奏清徴洛陽伽藍記魏高陽王雍有姬修容能為渌水歌逺注此用渌水亦暗貼靈湫如岑參和雪後早朝詩用仙郎歌白雪亦然陸雲與兄書昔日讀楚辭意不大愛頃日祝之實自清絶盧元昌曰十月譏非時浴日諷䙝尊閬風廣漠刺荒遊改移窟宅志變異獻幣沈牛明矯誣蝦蟆出指祿山也至尊笑寵蝦蟆也王母不收縱蝦蟆也考月中冇金蝦蟆乃蝕月者月為隂精貴妃似之祿山通宵禁中是為蝦蟆蝕月𤣥宗以蝦蟆忽之竟為長虬難制靈湫一篇其曲突之諷歟王嗣奭曰祿山當如隂蟲伏處今一旦憑藉寵靈窺竊神器妄自意為夭矯飛天之物豈非蝦蟆而黃虬上下失位者乎蓋始終以蝦蟆事為比也後出塞五首鮑欽止曰天寶十四載三月壬午安祿山及奚契丹戰於潢水敗之故有後出塞五首為出兵赴漁陽也寶今按末章是說祿山舉兵犯順後事當是天十四載冬作男兒生世間及壯當封侯戰伐有功業焉於䖍切能守舊丘召趙作古募赴薊門軍動不可留千金買馬鞭一作鞍百金裝刀頭閭里送我行親戚擁道周斑白居上列酒酣進庶羞少去聲年别有贈含笑看吳鈎首章記應募之事上八從軍者喜於立功下六送别者壯其行色賞杜臆召赴薊門者祿山也勢已盛而逆未露且以重要士故壯士喜功者樂於從之其裝飾之盛餞送之勤與前出塞大不同矣而老者慈愛唯贈飲食少年英鋭故贈吳鈎含笑者受㑹意也問魏文帝樂府男兒居世各當努力李陵詩人生一世論語及其壯也後漢班超嘗投筆嘆曰當效傳介子張騫立功異域封侯於史記龜冊傳可以戰伐攻擊又鄒陽傳功業復就天下鮑照詩去鄉三十載復得還舊丘廣雅丘居也今吳志孫策傳召募得數百人一統志古薊門關在順天府薊州水經注武王封堯後於薊城內西南隅有薊丘因名薊門後漢光武紀時不可留西京雜記武帝時身毒國獻連環羈皆以白玉作之瑪瑙石為勒白光琉璃為鞍鞍在暗室中常照十餘丈如晝日自是長安始盛飾鞍馬競皆雕鏤或一馬之飾直百金樂府木蘭詩東市買駿馬西市買鞍韀又西市買馬鞭南市買轡頭史記陸賈傳寶劍值百金為古絶句何當大刀頭家國䇿監門閭里大司徒五家比五比為閭遂人五為鄰五鄰為里閭里皆二十五家鄉謂之閭遂謂之里二十五家共有巷巷首有門陶潛詩慷慨送我行史記穰苴傳莊賈謝曰不佞大夫親戚送之故留白詩有枤之杜生於道周毛萇曰周曲也古樂府斑居上頭韓非子酒酣靈公起名儀禮上大夫庶羞二十品垂史記季布傳少年藉其以行通鑑王猛謂慕容曰今當逺别何以贈我垂解佩刀贈之金世說王公含笑看之吳越春秋闔閭命於國中作鈎令曰能為善鈎者賞百金有人殺其二子以血釁金成二鈎獻之王曰何以異於衆鈎乎鈎師呼二子名吳鴻扈稽我在此王不知汝之神也聲絶於口兩鈎俱飛著父之胸吳王大驚賞之百金吳都賦吳鈎越棘純鈎湛盧朝進東門營一作營門暮上上聲河陽橋落日照大旗馬鳴風蕭蕭平沙列萬幕部伍各見招中天懸明月令嚴夜寂寥悲笳音佳數聲動壯士慘不驕借問大將去聲誰恐是霍嫖姚二章記在途之事上六薄暮景事下六夜中情景上言軍容之整肅下言軍令之森嚴張綖注將似霍嫖姚蓋武皇開邊而去病勤逺故託言之於杜臆言前篇唾手封侯何等氣魄至此慘不驕矣束軍法故也兵盧注祿山反范陽封常清議斷河陽橋則知前此募赴軍前必由河陽橋去春秋天王狩於河陽鄭曰河陽洛邑也通典河陽縣古孟津後亦曰富平津跨河有浮橋即杜預所建元和郡國志河陽浮橋駕黃河為之以船為腳竹􅦜亘之一統志河陽橋在閿鄉縣西門外河水濱王粲詩朝發鄴都橋暮濟白馬津謝惠連詩落日隱櫩楹蕭漢書顔注麾大將之旗蕭詩蕭蕭馬鳴荆軻歌風蕭兮易水寒杜臆毛詩蕭原非馬鳴聲此加一風字更為爽豁軍范雲詩平沙斷還續漢書注幕府者以軍幕為義旅無常居止故以帳幕言之有史記李廣傳廣行無部伍行陳趙曰士卒多則將各一幕故一部伍之人各相招認以居幕也自梁武帝邊秋詩秋月出中天相如長門賦懸明月以照兮楚辭􅓦􅢏兮收潦而水清朱子注􅓦􅢏與寂寥同笳樂書胡笳似觱篥而無孔王融詩夜夜聞悲笳杜摯賦序笳者李伯陽入西戎所作也王褒碑文壯士志驕時觀投石㫖漢高帝紀王問魏大將誰也唐書祿山入朝奏對稱進驃騎大將軍史記霍去病善騎射為剽姚校尉顔注票姚徑疾之貌胡仔曰漢書嫖姚服䖍音飄颻師古音嫖頻妙切姚羊召切荀悅漢紀又作票颻杜詩每作平聲用蓋取服音耳朱注梁蕭子顯日出東南隅行押霄字韻而云漢馬三萬匹夫壻仕飄姚周庾信畫屏風詩押飄字韻末云寒衣須及早將寄霍嫖姚則二字作平聲用在公前已然矣許彥周曰詩有力量如弓之鬬力未挽時不知其難也及其挽之力不極處分寸不可强若出塞曲云落日照大旗馬鳴風蕭蕭悲笳數聲動壯士慘不驕又八哀詩汝陽讓帝子睂宇真天人虬髯似太宗色映塞外春此等力量不容他人到古人重去聲守邊今人一作日重高勳豈知英雄主出師亘居鄧切一作直長雲六合已一家四夷且孤軍遂使貔樊作螭虎一作武士奮身勇所聞拔劍擊大荒日收胡馬羣誓開𤣥冥北持以奉吾君三章譏邊將生事也各四句轉意當時朝廷好大以致邊將邀功曰豈知曰遂使正見上行下效也末言闢土奉君蓋逢君之惡禍及生民矣杜臆今人重高勳此效尤霍嫖姚者其奮身賈勇蓋聞主上意㫖而起也將史記䝉恬曰臣將三十萬衆以守邊後漢二十八論寇鄧之高勳耿賈之鴻烈似左傳出師於東門之外為鮑照蕪城賦崒若斷岸矗長雲過秦論以六合家記聖人耐以天下為一家孤漢書春秋有道守在四夷桓唐太宗問答昔光武以軍當王莽百萬之衆書桓如虎如貔貔豹屬出貉國一名執夷傳史記李陵長思奮不顧身以殉國家之急叔孫通羣臣拔劍擊柱吳都賦出乎大荒之中鬭安祿山事蹟祿山包藏禍心畜單于護真大馬習戰者數萬匹已八九年矣漢書胡馬不窺於長城其楚辭歷𤣥冥以邪征淮南子北方水也其帝顓頊佐𤣥冥左傳我亦能事吾君獻凱日繼踵兩蕃靜無虞漁陽豪俠地擊鼓吹笙竽雲帆轉遼海粳稻來東吳越羅與楚練照耀輿臺驅主將去聲位益崇氣驕凌上都邊人不敢議議者死路衢四章刺將驕欲叛也在八句一斷衆當邊庭無警恣意歡娛濫賞以給軍心而嚴刑以箝口祿山叛逆之勢成矣杜臆獻凱日繼踵承上奉吾君來氣凌上都明有無君之心特帝未之知耳周禮大司樂王師大捷則令奏凱樂劉庭芝詩獻凱歸京師兩史記范睢傳繼踵取卿相據朱注舊唐書奚與契丹國常遞為表裏號曰兩蕃新書安祿山傳天寶四載奚契丹殺公主以叛祿山八月祿山紿契丹諸酋大置酒毒焉既酣悉斬其首獻馘闕下通鑑十三載祿山奏擊破奚契丹獲其王李日越十四載奏破奚契丹此所謂靜無虞也詩無二無虞漢書地理志漁陽郡秦置屬幽州朱叔元書奈何以區區漁陽結怨天子前漢萬君章傳街里各有豪俠左太冲詩北里擊鐘鼓南里吹笙竽桓廣成頌張雲帆施霓幬遼東南臨渤海故曰遼海溫表管寧之默遼海役朱注海運當始於隋大業中北史來護兒傳遼東之護兒率樓船指滄海入自浿水時護兒從江都進兵則當出成山大洋轉登萊向遼海也唐太宗屢討高麗舟師皆出萊州其餽運當從隋故道駱賓王討武曌檄云海陵紅粟倉儲之積靡窮蓋隋唐時於揚州置倉以備海運餽東北邊祿山鎮范陽番漢士馬居天下之半江淮挽輸千里不絶所云雲帆轉遼海者自遼西轉餽北平也左思蜀都賦粳稻莫莫又詩志若無東吳組唐書越州土貢花文寶花等羅甲左傳楚使鄧廖帥甲三百被練三千以侵吳注組漆甲為組文被練練袍沈約詩朱光浮楚練臣又詩緑幘文照耀左傳士臣皂皂臣輿輿臣𨽻𨽻僚僚臣僕僕臣臺唐書天寶十三載祿山奏前後立功將士請超三資告身於是超授將軍五百餘人中郎將三千餘人所謂照曜輿臺也唐書天寶七載祿山賜鐵劵封柳城郡公九載進爵東平郡王所謂主將益崇也凌上都指長安西都賦作我上都迎祿山事蹟祿山自歸范陽逆節漸露使者至稱疾不成備而後見之無復臣禮或言祿山反者帝必縛送之道路相目無敢言者為曹植詩豺狼當路衢爾雅一逹為道路四逹衢黃生曰前三章諷明皇黷武無厭後二章諷明皇養虎貽患皆借征戍之辭以逹之剴切悲痛深得風人之㫖我本良家子出師亦多門將去聲驕益愁思去聲身貴不足論平聲躍馬二十年恐孤俗作辜非明主恩坐見幽州騎去聲長驅河洛昏中夜間去聲道歸故里但空村惡名幸脫免窮老無兒孫末章褒軍士之不從逆者此在六句分截負良家子則頗知忠義矣故不圖身貴唯恐國至於逃籍而歸妻孥被戮真能不孤主恩矣之杜臆末章與首章相關前之冀封侯者志在立功此脫惡名者志在立節當時附賊者衆而獨有此一人在其間此綱常所以不墜公特表而出之以為萬世訓東坡志林曰將校有此一人而不知其姓名可恨也王李廣傳廣以良家子從軍薛道衡詩我本良家子莽傳自古出師之盛未嘗有也敗左傳晉政多門難史記宋義曰戰勝而將驕卒惰者秦嘉詩愁思為數蔡澤傳躍馬疾驅四十三年足矣陳李陵書陵雖孤恩漢亦負德江淹詩青紫明主恩子昂詩坐見秦兵壘十唐范陽屬幽州陳祿山事蹟祿山起兵反馬步相兼萬鼓行而西琳書長驅山河朝至暮捷唐書天寶十四載安祿山陷河北諸郡十二月陷東京傳河南洛陽即東都之地南都賦據彼河洛藺相如使人奉璧間道而馳歸注間空也投空隙而行也商鮑照詩去國還故里沈炯詩空村餘古木史記君傳論卒受惡名於秦前漢馮參傳今被惡名而死梁漢書游俠傳樓護曰吕公以故舊窮老託身於我人折楊柳歌阿婆不嫁女那得兒孫抱張綖曰左傳兵猶火也不戢自焚前四章著明皇黷武不戢過寵邊將啓其驕恣輕上之心末章直著祿山之叛以見明皇自焚之禍也言又曰前出塞言哥舒翰西征之役其辭悲後出塞安祿山北伐之師其辭樂悲則猶有苦兵畏亂之患樂則至於喜亂而佳兵矣祿山將叛濫賞士卒人趨於利上破國而下覆宗不祥莫大焉於朱鶴齡曰前是哥舒貪功於吐蕃後是祿山構禍契丹劉後村克莊曰前後出塞十四篇筆力高古可與古詩十九首並傳自黃生曰兩蕃雖靜祿山繼反但備陳其事而諷刺見雖不及十九首之婉篤要皆自成氣候不受去取也蘇端薛復筵簡薛華醉歌鶴注此詩是天寶十五載正月初旬作是時方討祿山故云惡聞戰鼓悲若京師已陷身在城中不應詩中無一語及之豈能快意於酒復簡薛華乎之薛華同在座中此乃醉後記叙席上情事而簡杜臆古人重名諱端復薛華李白詩中直稱其名此今人所無者端朱注舊唐書楊琯諡文正比部郎中蘇端持兩卞園曰端時白衣唐科名記端來春始及第獨孤及燕集詩序右金吾倉曹薛華㑹某某於署之公堂薛復未詳文章有神交有道端復得之名譽蚤愛客滿堂盡豪傑英華同一作翰開筵上日一作月思芳草安得健步移逺梅亂插繁花向晴昊首叙端復筵宴言上三該主賓下三㸃時景有神有道兩人契合非偶孔融薦禰衡表思若有神取友以行交游以道孔叢子孔子高天下之高士也蜀志許靖夙有名譽曹植詩公子敬愛客賞前漢書陳孟公每大飲賓客滿堂書晉書車𦙍善於㑹謝安游集之日輒開筵待之正月上日注上日朔日也健楚辭何所獨無芳草兮樂府巾舞歌步哺誰當吾千里猶殘舊冰雪百壺且試開懷抱垂老惡烏故切聞戰鼓悲急一作羽觴為緩憂心搗少去聲年努力縱談笑看我形容已枯稿次則當筵有感少春帶餘寒固當借酒書懷生逢世亂又當藉酒寬憂易成老不如縱酒歡笑作三層寫意騷殘餘也情王粲詩冰雪截肌膚字詩清酒百壺風離懷質抱獨無匹兮此懷抱二所本古詩臨送懷抱靈蔡雍房楨碑享年垂老我庾信詩雷轅驚戰鼓謝運詩急觴蕩幽默詩心憂傷惄焉如搗古樂府少年不努力老大徒傷悲形漢書趙李諸侍中皆談笑大噱屈原傳容枯稿座中薛華善一作能醉歌歌辭一作醉歌自作風格老近來海內為英華作無長句汝與山東英華同揚作東山李白好何劉沈謝力未工才兼鮑照愁絶倒此乃致簡薛華擅計東曰長句謂七言出歌行太白所最長者太白長句其源於鮑照故言何劉沈謝但能五言於七言則力有未工必若鮑照七言樂府如行路難之類方為絶妙耳公嘗以俊逸鮑參軍稱太白詩正稱其長句也山抱朴子風格端嚴顔氏家訓體度風格去今實逺東李白有辨在後世梁書何遜文章與劉孝綽並見重於世世謂之何劉祖著編論之云詩多而能者沈約少而能者謝朓何遜何氏語林永明末盛為文章吳興沈休文陳郡謝𤣥暉琅琊王元長以氣類相推轂宋書鮑照文辭贍逸嘗為古樂府文甚遒麗平愁絶倒詩家愁為不及也世說衛玠談道子絶倒諸生頗盡新知樂音洛萬事終傷不自保氣酣日落西風來願吹野水添英華作注金杯如澠之酒常快意亦荆作不知一作如窮愁英華作未知窮逹安在哉忽憶雨時秋井塌古人白骨生青苔如何不飲令平聲心哀末結醉歌之意亂新知樂謂主賓相得不自保謂離可憂氣酣四句承新知樂忽憶三句承不自保此處憂樂與前悲笑相應逺注白骨青苔人生不免亦可以自遣矣此章前二假各六句末段九句收班漢書翟方進傳努力為諸生學問東觀漢記相者謂超曰祭酒布衣諸生耳身楚辭樂莫樂於新相知便書萬事隳哉總阮籍詩一不自保見風吹水動想添杯作酒是欲多飲以寬懷耳布梁武帝詩碧玉捧金杯也左傳有酒如澠前漢欒傳富貴不能快意非賢張綖云井是貴者之墓猶今言金井也楚人皆謂楚王墳為井上塌傾頽也鮑照挽歌枯髏依青苔杜詩格局整嚴脉絡流貫不特律體為然即歌行布置各有條理如此篇首提端復是主再提薛華是賓又指少年諸生則兼及一時座客其云悲笑憂樂腰尾又互相照應熟此可悟作法矣楊慎曰此詩本是東山李白俗本改作山東樂史序李白集云白客遊天下以聲妓自隨效謝安石風流自號東山時人遂以東山李白稱之子美詩句正因其自號而稱之耳流俗不知而妄改近世作一統志遂以李白入山東人物而反引杜詩為證幾於郢書燕說矣李東陽麓堂詩話唐士大夫舉世為詩而傳者可數其不能者弗論雖能者亦未必盡傳高適嚴武韋迢郭受之詩附諸杜集皆有可觀子美所稱與殆非溢美惟高詩在選者略見於世餘則未之見也至蘇薛乃謂其文章有神薛華與李白並稱而無一字可傳豈非有幸不幸耶晦日尋崔戢李封虞注此詩諸家編入乾元元年春公方在諫垣此時兩京復祿山亡詩中不得作長鯨吞地軸翻等語范氏編至德二載春此時身陷賊中豈能為令節之飲且朝官降賊豈得以公侯目之斷是天寶十五載與蘇端薛復筵為一時作是年正月祿山遣其將寇潼關正鶴注唐以正月晦日為令節至德宗貞元五年月敕自今以後以二月一日為中和節代晦日朝光入甕牖尸一作方一作宴寢驚敝裘起行視天宇春氣漸和柔興去聲來一作得興一作乘興不暇懶今晨梳我頭出門無所待徒一作徙步覺自由首叙晦日出遊蓽何遜詩忩户映朝光記儒行門圭竇蓬户甕牖也尸寢反用論語寢不尸阮驚敝裘朝光入而驚起陶潛詩昭昭天宇濶籍詩春氣感我心王羲之蘭亭集序欣兹莫春和氣載柔來嵇康書性復疏懶頭面常一月十五日不洗逺注興二句反用此語庾信詩梳頭百遍撩也陸機詩出門無通路之夢弼曰無所待謂不待車從淮南子布衣徒步人焦仲卿詩汝豈得自由杖藜復扶又切恣意免值公與侯晚定崔李交㑹心真罕儔每過平聲得酒傾一作喫二宅可淹留喜結仁里歡况因令節求此往尋崔李二家莊公侯皆非知已故有免值之歎子原憲華冠而縰履杖藜而應門交魏文帝樂府何不恣意遨遊從君所喜易傳定其而後求世說簡文謂左右曰㑹心處不必在逺因思𤣥賦匪仁里其焉宅令節求晦日而邀留也李生園欲荒舊一作有竹頗修修引客看平聲掃去聲除隨時成獻酬崔侯初筵色已畏空樽愁未知天下士至一作志性有此不音方鳩切此見兩人好客之誼陳庾信詩舊竹侵行徑不漢古詩樹木何修修後漢蕃傳同郡薛勤曰何灑掃以待賓客中詩獻酬交錯坐又賓之初筵中張璠漢記孔融拜大大夫每歎曰上客常滿樽酒不空吾無憂矣史記新垣衍謂魯仲連曰今日知先生為天下之士也嵇康書阮嗣宗至性過人崔本為客却畏酒空略形迹而見真性矣草芽既青出蜂聲亦暖遊思見農器陳何當甲兵休上古葛天民一作氏不貽黃屋一作綺憂至今阮籍等熟醉為去聲身謀此對春而慨時事而朱注上古之世黃屋無憂今何時乎阮籍之流止沈飲以謀身嘆已與崔李輩無能為天子分憂也塞草發青芽杜臆蜂以暖遊帶聲字更趣沈約詩家語鑄劍㦸以為農器庭國䇿張儀說楚曰秦下甲兵據宜陽帝王世紀大氏至葛天氏皆號炎帝陶潛五柳先生傳葛天氏之民與黃漢書李斐音義黃屋車上蓋天子之儀以黃繒為裏希曰漢制副車黃屋作左纛亦如金根之制行則從後少阮籍傳籍本有濟世志屬魏晉之際天下多故名士有全者籍由是不與世事遂酣飲為常鍾㑹數以時事問之欲因其可否而致之罪以酣醉獲免虞世南詩非是為身謀威鳳高其一作自高翔長鯨吞九州地軸為之翻百川皆亂流當歌欲一放淚下去聲恐莫收濁醪有妙理庶用一作與慰沈浮此傷亂而借酒遣憂也九威鳳高翔以致長鯨吞噬蓋賢人去而盜賊熾如張齡之罷相是也地翻川亂應上甲兵濁醪用慰應上熟醉八杜臆末段紆回吞吐有無窮之悲此章五段段各句漢孝景紀南郡獲白虎威鳳為寶晉灼曰鳯之有威儀者也面梁湘東王書淮海長鯨雖云授首襄陽短狐未全革海賦又似地軸挺拔而爭回杯詩百川沸騰靈曹操詩對酒當歌嵇康書濁醪一江淹詩精歸妙理游俠傳放意自恣浮沈俗間白水崔少去聲府十九翁高齊三十韻鶴注天寶十五載夏公自奉先來依舅氏崔十九故首曰客從南縣來况當朱炎赫客從南縣來浩蕩無與適旅食白日長况當朱炎赫首叙來踪兼記時候方杜臆公方避亂故有浩蕩旅食之語古詩客從逺來黃希曰白水在同州西北一百二十里同州又在京兆東北二百五十里炎謝朓詩浩蕩别親知梁元帝纂要夏曰朱夏夏高齊坐林杪信宿游衍閴清晨陪躋攀傲睨俯峭壁崇岡相枕帶曠野回一作逈一作懷咫尺始知賢主人贈此遣愁寂此叙高齊逺景也時公寄寓高齊故得朝夕覽勝曰贈此遣愁喜託居魏收詩瀉溜高齊響添池曲岸平詩于汝信宿左傳再宿曰信人宗炳詩清晨陟阻崖詩及爾游衍浪易閴其無江賦馮夷倚以傲睨水經注嶮峭壁立陳後主詩峭壁聳春風斾崇岡北史韋敻所居之宅枕帶林泉傅亮詩總古歌率彼曠野賴徐幹詩雖路在咫尺組古辭得賢主人覽取為吾危階根青冥曽音層冰生淅瀝上有無心雲下有欲落石泉聲聞復扶又切息一作急動靜隨所激一作擊鳥呼藏其身有似懼彈射音石齊此摹高近景隂上四記所見下四記所聞慘青冥言樹色層冰比樹泉聲寫得幽細烏呼說得悽雪賦霰淅瀝而先集欲歸去來辭雲無心以出岫山張載叙行賦岌􅐑隗其落水經注吳山崩巒傾仄頂相捍望之恆有落勢紀宋之問詩石上泉聲帶雨秋漢宣帝毋得春夏摘巢探卵彈射飛鳥吏隱適一作通一作道情性兹焉其窟宅白水見舅氏諸翁乃仙伯杖藜長松下一作隂作尉窮谷僻為去聲我炊雕胡逍遙展良覿此述舅氏欵待之厚賢崔翁作尉諸舅在焉避亂相逢故喜良覿汝南先傳鄭欽吏隱於蟻陂之陽沈約詩情性猶未充曰天台賦靈仙之所窟宅如洙曰左傳晉文公謂子犯所不與舅氏同心者有白水此借用其語知集仙傳大茅君傳有紫陽左公太極仙伯又神仙王逺謂弟子曰吾漸遊洞府仙曹除吾為少室仙伯朱注梅福為南昌尉人傳以為仙崔是白水尉故以仙伯稱之杖藜注見前宗炳詩長松列竦肅左傳深山窮谷固隂沍寒獨宋玉風賦主人之女為臣炊雕胡之飯晉書袁粲步園林杖䇿逍遙謝靈運詩引領冀良覿坐久風頗怒一作愁晚來山更碧相對十丈蛟歘許勿切翻盤渦坼何得空裏雷殷殷音隱尋地脉烟氛一作氣靄一作藹􅍶一作􅀢崒魍魎森慘戚崑崙崆峒巔回首如一作知不隔此述山中變幻之狀杜風狂水激故蛟坼盤渦雷動烟迷故魍魎慘戚臆謂寫景而兼影時事語含比賦是也號雲峯矗峙如崑崙崆峒回首恍見焉賦莊子萬竅怒海賦盤渦谷轉詩殷其雷長門雷隱隱而響起上華山志嶽東北有雲臺峯其山兩峯崢嶸四靣懸絶冠景雲下通地脈巍然獨秀左傳魑魅魍魎注魍魎川澤之神也淮南子狀如三歲小兒赤黑色赤目長耳美髮朱注崑崙崆峒在白水西北文相如封禪回首面內前軒頽一作摧反照巉絶華去聲嶽赤兵氣漲林巒川光雜鋒鏑知是相去聲公軍鐵馬雲一作烟霧積玉觴淡無味胡羯豈强敵長歌激屋梁淚下去聲流衽席此望華山而慨時事閫華嶽屯兵哥舒守關也玉觴無味天子旰食也但専有人則祿山不足敵矣又恐勝負難測故有淚下衽席之語景陶潛詩擁褐曝前軒象爾雅落光反照於東謂之反丘遲詩詭怪石異巉絶峯殊狀兵朱注華嶽在白水東南故見於前軒朱江總詩長城氣寒北山移文望林巒而有失注時哥舒翰統兵二十萬守潼關潼關屬華州與白水近故見兵氣之盛如此陸機五等諸侯論鋒鏑流於絳闕公謝靈運詩相公實勤王顧炎武曰前代拜相者必封故稱之曰相公若封王則稱相王魏王粲從軍行相公征關右赫怒震天威羽獵賦相公乃乘輕軒駕四駱相公二字似始見此唐書祿山反以哥舒翰為太子先鋒兵馬元帥明年正月進位尚書左僕射同中書門下平章事陸機論義兵雲合又辨亡論熊羆之士霧集玉黃香天子頌獻萬年之玉觴傳毅舞賦溢金罍而列觴內景經淡然無味天人糧後梁主祚令胡羯氐羌咸懷竊璽唐書顔杲卿罵祿山曰汝本營州牧羊羯奴賈誼傳與强敵為鄰蘇武詩長歌正激烈神列子韓娥過雍門鬻歌假食既去而餘音繞梁宋玊女賦日朝出照屋梁謝朓箋如其簪履或存衽席無恙注衽席單席也人生半哀樂音洛天地有順逆慨彼萬國夫休明備征狄一作敵猛將去聲紛填委廟謀蓄長䇿東郊何時開帶甲且未一作來釋此冀將相協謀以靖亂關向日丁夫備以征伐今逆賊犯宿將猶可禦寇然必廟謀得宜始能恢復東京曰填委見當兼倚李郭曰長䇿惟恐國忠失計也孔稚圭歌人祗分哀樂半知國䇿張儀說秦以逆攻順者亡後漢書竇融上書猶利害之際順逆之分左傳王孫滿曰德之休明雨孟子南面而征北狄怨臣如劉楨詩職事相填委李陵書猛將如雲謀後漢光武贊明明廟謀糾糾雄斷為過秦論始皇振長䇿而御宇內漢書注長䇿以乘馬喻也䇿所以撾馬郭欽徙戎疏先王荒服之制萬世之長䇿也國書序淮夷徐戎並興東郊不開戰䇿帶甲百萬欲告清宴罷一作疲難拒幽明迫三歎酒食傍何由似平昔末結少府席上有倉卒倣徨之意中暝色向幽故清宴告罷不曰晝夜而曰幽明亦愁慘語宴終三歎飲不盡興也此章起結各四句中間八句者四段十句者兩段限陳子昻詩清宴奉良籌鮑照詩一為天地别豈直幽明左傳魏子曰惟食忘憂吾子置食之間三歎何也盧元昌曰高齊旅食時哥舒正守潼關李郭皆請固關而守國忠恐翰圖已促之出戰將相不和潼關危矣詩云知是相公軍鐵馬雲霧積謂守關猶足恃也猛將紛填委廟謀蓄長䇿謂當將相協和也東郊何時開帶甲且未釋謂宜枕戈衽甲勿懈於防也終曰三歎酒食旁何由似平昔又知閫任不專廟謀失䇿潼關必潰也三川觀水漲二十韻黃鶴注公天寶十五載夏自奉先之同州白水賦高齊詩已是五月又自白水之鄜州道出華原乃赴靈武所經也同州在華原東百八十里華原北至坊州百八十里坊北至鄜百四十五里豈非公自白水西北至華原又自華原北至坊復自坊北至鄜乎是年史不書大水而詩言水患為甚可以補史之闕舊唐書三川縣屬鄜州以華池水黑水及洛水三川同㑹得名也元和郡國志三川縣本漢狄道縣地開皇三年屬鄜州我經華去聲原來不復扶又切見平陸北上時掌切惟土山連天走窮一作穹谷火雲出無時一作無時出飛電常在目首叙山行景事此水漲之由皇連天連日也為長安志華原縣本漢祋祤縣地隋開六年改泥陽華原縣貞觀十七年屬雍州大足元年𨽻京兆府縣盧湛詩平陸漲長流元和郡國志土門山在華原東南四里鍾繇表深山窮谷暗盧思道納涼賦火雲赫而四舉長何遜詩密雲窮浦飛電逺洲明宋之問詩故園在目自多窮岫雨行潦相豗音灰蹙蓊烏孔切匌口答切川氣黃羣流㑹空曲清晨望高浪忽謂隂崖踣蒲北切恐泥去聲竄蛟龍登危聚麋鹿枯查槎同卷拔樹礧洛罪切磈口罪切共充塞先則切聲吹去聲鬼神下去聲勢閲人代速不有萬穴歸何以尊四瀆此記山水之漲恐水流山內故川氣帶黃浪浸山根故隂崖如踣蛟龍泥麋鹿登高畏水故也枯槎浮水與拔樹俱卷礧磈沙石忽填塞水口極言其簸蕩也水聲衝激如泣鬼神水勢變遷忽移人世惟有奔歸四瀆可以一泄下流耳二句起下行魏都賦窮岫泄雲鮑照詩窮岫閟長靈左傳潢汙潦之水豗水相擊蹙水相迫蓊匌水氣蓊鬱而匌匝也氣海賦磊匌而相豗注云匌重疊也潘嶽詩川冒山嶺驚湍激巖阿之抱朴子南溟浩漾實須羣流之赴寥陶𢎞景傳句容句曲山中周圍一百五十里空曲曠郭璞詩高浪駕蓬萊語西征賦眺華嶽之隂崖也陷也論致逺恐泥此借用其字朱注廣韻泥滯江賦狐玃登危而雍容魏夢弼曰查與槎同水中浮木庾信詩卧樹擁槎來文帝怨歌行拔樹偃秋稼天威不可干何遜詩磈礧衝波白礧磈沙石也聲漢書劉寵傳充塞道路莊子白波若山海水震蕩侔鬼神燀赫千里梁武帝詔人代徂遷陸機歎逝賦人閲人而為世濟海賦江河既道萬穴俱流封禪書四瀆者江河淮也及觀泉源漲反懼江海覆方伏切漂匹妙切沙圻魚斤切選注音祁恐誤岸去一云去岸潄壑松柏禿乘陵陳作凌破山門回斡烏活切裂一作倒地軸交洛赴洪河及關豈信宿應平聲沈數州沒如聽萬室哭穢濁殊未清風濤怒猶蓄一作畜何時通舟車隂氣不一作亦黲朱云當作墋楚錦切黷此記川水之漲漂江海覆有似倒流也沙言其突衝潄壑言其橫撼破山言其高湧裂地言其深入赴河及關言其勢急數州沈沒言其害大穢濁四句憂水漲未平亦以起下應璩詩江海倘不逆水經注泉源沸湧浩氣雲浮圻海賦漂沙礐石謝靈運詩岸屢崩奔玉篇圻與垠同岸也界也水經注垠岸重沙江賦潄壑生浦歐陽建詩松拍隆冬瘁風賦乘淩高城南朱注山門即土門山名謝惠連詩傾河易回斡淮子地有三千六百軸山大川孔穴相連海賦似地軸挺拔而爭回水舊唐書洛交縣屬鄜州洛水之交故名寰宇記洛交在縣南一里潘嶽詩登城望洪河洪河黃河也本朱注及關謂潼關也關在華山之東杜氏通典潼關名衝關言河流所衝也劉峻詩空軫及關歎水詩于汝信宿縣朱注洛水發源鄜州白於山合漆沮至同州朝邑入河其勢最大而疾故有數州沈沒之懼焉荀鄒陽傳萬室不相救顔蔡雍琴歌滌穢濁兮存正靈悅赦論蕩滌穢流延之詩春江壯風濤江賦乃鼓怒而作濤蔡琰悲憤詩隂氣凝兮雪夏零陶潛詩舟車靡從陸機高祖功臣贊芒芒宇宙上黲下黷鄭曰黲黷垢黑也浮生有蕩汨音聿水傍從日與汩沒之汩不同吾道正羈束人寰難容身石壁滑側足雲雷屯一作此不已艱險路更局此傷避亂而遭水患也艱蕩汩承上羈束難容後逼兵戈側足路前沮水潦也莊子其生也若浮詩南都賦漻淚淢汩上林賦滭弗宓汩注皆音聿北征作蕩潏義可通用楚辭邅吾道兮洞庭之魏彥深鷹賦運橫羅以羈束世鮑照舞鶴賦歸人寰喧卑淮南子聖人不遇其僅足以容身曰江淹詩洞林帶晨霞石壁映初晰子東觀漢紀馬援隗囂側足無新立易雲雷屯君以經綸顔延之詩首路局險艱魏徴詩豈不憚艱險詩不敢不局普天無川梁欲濟願水縮因悲中林士未脫衆胡夏客云衆當作泉唐避淵為泉魚腹舉頭向蒼天安得騎鴻鵠末復有舉世淪胥之慨士流離奔走中欲濟無由因歎林居之不免為魚此即飢溺一體之心也前赴奉先詩云默思失業徒因念逺戍卒亦是此意此章前後三段各六句中間二段各十四句河詩普天之下書鮑照詩川梁日以廣河曹植詩欲濟無梁後魏爾朱兆襲京邑人夢神為縮水脉及兆至有行人言水淺處導焉遂䇿馬涉渡直叩宫門梁簡文箏賦望交河之水縮王康琚詩今雖盛明世能無中林士曲詩衆維魚矣空太𤣥賦屈子慕清葬魚腹兮蔡琰舉頭仰望兮雲烟詩悠悠蒼天歸陸機詩思駕鴻羽盧元昌曰時祿山作亂神州有板蕩之象篇中云聲吹鬼神下隂長陽消也勢閲人代速世事滄桑也何以尊四瀆無復朝宗也反懼江海覆中原陸沈也雲雷屯未已建侯不寧也普天無川梁拯挽無人也語意顯然句王嗣奭曰此詩之佳在摹寫刻深如聲吹勢閲二無人能道然終與唐人分道而馳比之畫馬他人皆畫肉而公則畫骨此其超出唐人者肉易識骨不易識也月夜鶴注天寶十五載八月公自鄜州赴行在為賊所得時身在長安家在鄜州故作此詩今夜鄜音夫州月閨中只獨看平聲遙憐小兒女未解憶長安香霧雲鬟濕清輝玉臂寒何時一作當倚虛幌雙照淚痕乾音干末公對月而懷室人也前說今夜月為獨看寫意說來時月以雙照慰心杜臆公本思家偏想家人思已已進一層至念及兒女不能思又進一層鬟濕臂寒看月之久也月愈好而苦愈增語麗情悲末又想到聚首時對月舒愁之狀詞旨婉切見此老鍾情之至唐書鄜州交洛郡屬關內道楚辭閨中既以邃逺兮之鮑照詩兒女皆嬰孩和楊慎謂雨未嘗有香而元微詩云雨香雲淡覺微雲未嘗有香而盧象詩云雲氣香流水今按霧本無香香從鬟中膏沐生耳如薛能詩和花香雪九重城則以香雪借形柳花也籍梁章隱詠素馨花詩細花穿弱縷盤向緑雲鬟詩明月耀清暉江淹詩煉藥照虛幌幌帷也阮隋宫詩淚痕猶尚在劉後村詩話故人陳伯霆讀北征詩戲云子美善謔如粉黛忽解包狼籍畫睂濶雖妻女亦不恕余云公知其一耳如月夜詩云香霧雲鬟濕清暉玉臂寒則閨中之髮膚雲濃玉潔可見又云何時倚虛幌雙照淚痕乾其篤於伉儷如此哀王孫按明皇西狩在天寶十五載六月十二日肅宗即位改元至德在七月甲子是月丁卯祿山使人殺霍國長公主及王妃駙馬等已巳又殺王孫及郡縣主二十餘人詩云已經百日竄荆棘蓋在九月間也詩必此時所作唐史記淮隂侯傳漂母曰吾哀王孫而進食舊書十五載六月九日潼關不守十二日凌晨上自延秋門出親王妃主王孫以下多從之不及唐鑑楊國忠首倡幸蜀之策帝然之甲午既夕命陳𤣥禮整比六軍選廄馬九百餘外人皆莫知也乙未黎明帝獨與貴妃姊妹王子妃主皇孫楊國忠韋見素陳𤣥禮及親近宦官宫人出延秋門妃主王孫之在外者皆委之而去三通鑑是日百官猶有入朝者至宫門猶聞漏聲衛立仗儼然門既啓則宫人亂出中外擾攘王公士民四出逃竄長安城頭頭樊作多一作頸白烏夜飛延秋門上呼又向一作來人家啄大屋屋底逹官走避胡此見王孫顛沛而作也首段憶禍亂之徴趙曰頭白烏不祥之物初號門上故明皇出延秋門又啄大屋故朝官一時逃散班固詩就逮長安城漢五行志成帝時童謠曰城上烏尾畢逋位通俗文白頭烏謂之鶷􅗾楊慎曰三國典略侯景篡令飾朱雀門其日有白頭烏萬計集於門樓童謠曰白頭烏拂朱雀還與吳此蓋用其事以侯景比祿山也雍録𤣥宗幸蜀自苑西門出在唐為苑之延秋門在漢為都城直門也既出即由便橋渡渭自咸陽望馬嵬而西漢高帝紀道路人家之史記孟軻傳高門大屋尊寵之謂記公之喪諸逹官長杖注受命於君者名逹於上之逹官金鞭折斷九胡夏客作廄馬死骨肉不得一作待同馳驅腰下寶玦青珊瑚可憐王孫泣路隅問之不肯道去聲下同姓名但道困苦乞為奴已經百日竄荆棘身上無有完肌膚高帝子孫盡隆一作高準音拙龍種上聲自與常人殊豺狼在邑龍在野王孫善保千金軀次段叙事記當時避亂匿身之迹金鞭四句言上皇急於出奔致委王孫而去問之四句備寫痛苦之詞并狼狽之狀高帝四句恐其相貌特殊而為賊所得曰慎保軀危之也詩夾道躍金鞭沈約詩陳王裝瑙勒晉后鑄金鞭又西京雜記文帝自代來有良馬九匹曰浮雲曰赤電曰絶羣曰逸驃曰紫燕騮曰緑螭驄曰龍子曰驎駒曰絶塵號為九逸伍子胥傳疏骨肉之親有詩載馳載驅西漢書陳平傳船人疑其亡將腰下當寶器金玉京雜記飛燕女弟昭儀遺飛燕珊瑚玦瑪瑙彄漢阮籍詩楊朱泣路岐張衡西京賦尸僵路隅東觀記第五倫變易姓名史記李斯傳困苦之地乞于令升晉紀論劉淵王彌之亂將相侯王交頭受戮為奴僕而猶不獲南史宣城王遣典籖柯令孫殺建安王子真子真走入牀下叩頭乞為奴不許而死左傳被苫蓋䝉荆棘司馬遷書其次毁肌膚斷支體受辱感漢高祖記帝隆準龍顔李斐曰準鼻也文潁曰高帝龍而生故其顔貌似龍顔長頸高鼻後漢書光武皇帝高祖九世之孫也隆準日角曰漢書外戚傳高帝召幸薄姬曰昨夢蒼龍據吾胸帝貴徴也遂為汝成之生文帝聞隋書房陵王勇生子儼雲定興女昭訓所生也文帝之曰此乃皇太孫何乃生不得地定興奏曰天上龍種所以因雲而出綱史記扁鵲傳長桑君亦知扁鵲非常人也後漢張傳豺狼當道安問狐狸雲易龍戰於野光武紀四七之際龍鬬野又䜟曰四炎集龍鬬野豺狼指祿山龍指𤣥宗陶潛詩客養千金軀不敢長直亮切語臨交衢且為去聲王孫立斯須昨夜東一作春風吹血腥東來槖一作駱駝滿舊都朔方健兒好身手昔何勇鋭今何愚竊聞天一作大子已傳位聖德北服南單于花門𠢐面請雪恥慎勿出口他人狙一作徂哀哉王孫慎勿疏五陵佳氣無時無末段叙言陳國家亂極將治之機且立斯須欲屏迹而密語也昨夜四句祿山猖獗而恨哥舒之失計竊聞四句太子龍興而喜回紇之助順末二又反覆以致其丁寧曰慎勿疏戒之也起下兩段各十二句一頭兩腳局法整嚴此章四句嵇康詩楊氏嘆交衢注交衢謂路相交錯要衝之所南李陵詩長當從此别且復立斯須鮑照詩昨夜宿陵爾雅東風曰谷風傳山海經禺殺相柳其血腥不可以樹五穀史思明祿山陷兩京以槖駝運御府珍寶於范陽不知紀極顔師古曰槖駝言能負囊槖而䭾物也史記其竒畜則槖駝長安時為祿山所陷故曰舊都班彪北征賦紛吾去此舊都績時哥舒翰將河隴朔方兵及蕃兵共二十萬拒賊敗於潼關唐六典開元二十五年敇天下諸軍置兵防健兒於諸邑征行人內唐書天寶十四載京師召募十萬號大武健兒顔氏家訓頃世亂離衣冠之士雖無身手或聚徒衆違棄素業徼幸成功六韜將不勇則三軍不鋭陌上桑使君一何愚西傳位肅宗即位靈武也必盧注明皇臨行諭太子曰北諸胡我撫之素厚汝得其用所謂聖德北服單于也十光武紀胸奴薁鞬日逐王比自立為南單于建武二五年南單于遣使詣闕貢獻奉藩稱臣後漢李固傳四海欣然歸服聖德劇秦美新論北懷單于廣德也唐書甘州有花門山堡東北千里至回鶻衙帳國𠢐面謂披其面皮示誠悃也後漢書耿秉卒胸奴舉號哭或至梨面流血梨即𠢐割也舊唐書肅宗即位九月南幸彭原遣使與回紇和親二載二月其首領入朝回紇姓藥羅葛氏樂毅書先王報怨雪恥良蘇秦傳願君慎勿出於口之史記留侯傳秦皇東遊與客狙索隱狙伺伏也狙伺物必伏而候之西都賦北眺五陵洙曰漢高帝葬長陵惠帝葬安陵景帝葬陽陵武帝葬茂陵昭帝葬平陵謂之五陵唐注此借漢以比唐也唐紀高祖葬獻陵太宗葬昭陵高宗葬乾陵中宗葬定陵睿宗葬橋陵是為五陵佳氣言有興隆之象光武紀蘇伯阿為王莽使至南陽遙望舂陵郭階曰氣佳哉鬱鬱葱葱然悲陳陶唐書至德元載十月房琯自請討賊分軍為三楊希文將南軍自宜壽入劉哲將中軍自武功入李光進將北軍自奉天入琯自將中軍為前鋒辛丑中軍北軍遇賊於陳陶斜接戰敗績癸卯琯自以南軍戰又敗通鑑注陳陶斜在咸陽縣東斜者山澤之名故又曰陳陶澤孟冬十郡良家子賈昌朝字音辨子可讀去聲血作陳陶澤中水吳才老古韻叶耆野曠一作廣天清一作晴無戰聲四萬義軍同日死古韻叶四羣胡歸來雪趙作血洗箭仍唱一云撚箭夷歌飲都市叶去聲都人回面向北啼日夜更望官軍至一云前後官軍苦如此陳濤傷主帥之輕敵也賊勢方張而驅民猝鬬致四萬義軍沒於一戰所謂將不知兵以卒與敵也幸而唐德在人傾都繫望此國祚終賴之以恢復歟郡曰野無戰聲見不戰而自潰也漢書趙充國傳六良家子選給羽林期門浩茫茫謝靈運詩野曠沙岸靜縱皇娥歌天清地曠晉書桓𤣥傳義軍乘風火盡鋭爭先國語夜聞戰鼓之聲用同日死乃十月二十一日辛丑也唐書時琯效古法車戰賊順風縱火焚之人畜大亂官軍死傷者四萬餘人劉琨表羣胡數萬周匝四山洗雪洗雪拭也趙注謂洗箭上之血杜臆謂用血水以箭不如依舊本作雪洗箭語較平順都蜀都賦夷歌成章桓談新論布之都市西都賦人士女鄒陽傳回面汙行以事諂諛之人多大茅君傳一切向北大通鑑祿山聞嚮日百姓乘亂盜庫物既得長安命索三日并其私財盡掠之民間騷然益思唐室相傳太子北收兵來取長安日夜望之或時相驚曰太子大軍至矣則皆走市里為空賊望見北方塵起輒驚欲走土漢高帝紀日夜望將軍到豈敢反耶晉安帝紀東遭亂企望官軍之至盧元昌曰當時乘輿未定大兵未集倉卒舉事原非勝算至德二載春上曰大衆已集庸調已至當乘兵鋒搗其腹心李泌尚以兩京未可取當先取范陽琯於此時遂欲恢復兩京亦志大慮疏矣葛常之詩話陳陶詩志房琯之敗也張無盡孤憤吟云房琯未相日所談皆臯夔一朝陳陶下覆沒十萬師中原已紛潰老杜尚嗟咨蓋為琯罷相時杜上疏力救而發也悲青坂鶴注此唐紀所謂癸卯又以南軍戰敗績南軍楊希文所將乃十月二十三日也史云琯敗陳陶殘卒數千不能軍帝使裒夷散復圖進取青坂東門駐軍之地也我軍青坂在東門天寒飲馬太白窟黃頭奚兒日向西數騎去聲彎弓敢馳突山雪河冰晚樊作晚樂府作已一作野蕭瑟一作飋一作揚一作颯青是烽一作人烟白是骨焉於䖍切得附書與我軍忍待明年莫倉卒音猝餘青坂傷中官之促戰也大敗之正宜練兵休息自中使促師隔朝再戰而白骨委於荒郊則喪師辱國之罪有分其責者矣公深識兵機而欲堅待明年其後香積寺之捷果在至德二載曰數騎馳突見彼壯而我怯也東莊子天寒既至古樂府飲馬長城窟唐書室韋方之北邊黃頭奚部也奚亦東夷種東北契丹西突厥南白狼河北霫安祿山事跡祿山反發同羅奚契丹室韋曳落河之衆號父子軍信漢書士力能彎弓盡為甲騎馳突見本卷前庾詩蕭瑟風聲慘陳琳書我軍過之若駭鯨之觸細網時公陷城中故欲附書我軍忍待堅忍以待也陳琳書中材處之殆難倉卒王濬自理書兵人定見不可倉卒朱鶴齡曰考史琯欲持重有所伺中人邢延恩等促戰倉皇遂及於敗詩云忍待明年莫倉卒即琯持重意也噫陳陶之敗與潼關之敗其失皆以中人促戰不當專為琯罪也故子美深悲之避地顧注當是至德元載冬作蓋避地白水鄜州間竄歸鳳翔時也此詩見趙次公本但注云至德二載丁酉作非也今從顧氏避地歲時晚竄身筋骨勞詩書遂嚴滄浪詩話作逐一作遂墻壁奴僕且旌旄行在僅聞信此生隨所遭神堯舊天下㑹見出腥臊上四避亂傷時下思遭逢新主而光復舊物也能寫出皇皇奔赴之情汲汲匡時之志張協七命違世陸沈避地獨竄詩劉楨詩竄身清漳濱帝王充論衡筋骨之力陶潛詩書塞座外漢獻紀帝還洛陽百官披荆棘倚墻壁間旌前漢書贊衛青奮於奴僕司馬相如報蜀守臣書旄所指舊注謂至德二載五月朝廷自清渠之敗以官爵收散卒凡應募入官者皆衣金紫所謂奴僕旌旄也今按此詩作於元年之冬尚未見此事盧注云公陷賊時方冀朝廷將士反正不暇豈得以奴僕旌旄輒為譏彈當是指賊黨如田乾真蔡希德崔乾祐之徒各擁旌旄耳唐天子所至曰行在指肅宗也陶詩聊復得此生高祖禪位太宗故稱神堯皇帝曰焦氏易林汙臭腥臊禮記注犬曰腥羊臊此指祿山也對雪至德元載十月房琯大敗於陳陶斜詩正為是而作鮑照詩對雪滿空枝洪仲云若今人命題對雪下必云懷某事今人詩味之短以鑄題長古人詩味之長以鑄題短也戰哭多新鬼愁吟獨老翁亂雲低薄暮急雪舞回風瓢棄樽無緑爐存火似紅數州消息斷愁坐正書空此詩中間詠雪而前後俱歎時事正是有感而賦雪耳傷亂雲急雪對雪之景樽空火冷對雪之况前曰愁吟官軍之新敗末云愁坐傷賊勢之方張陶生注他詩前景後情此獨外虛中實變格也琯陳之敗殷浩山桑之敗皆以宿望僨軍故用書空事而後漢書陳寵為太守洛陽城每隂雨常有哭聲寵聞疑其故使吏按問還言世亂時此地多死亡者而骸骨不得葬寵盡收葬之自是哭聲遂絶新鬼用左傳魏文帝書已成老翁王筠詩連山卷亂雲墮曹操詩薄暮無棲宿詩隋煬帝江南曲湖上雪風急還多沈佺期玩雪颯㳫舞回風說沈約詩憂來命緑樽作數州指近賊之境世殷浩坐廢終日書空咄咄怪事四字元日寄韋氏妹鶴注詩云京華舊國移謂肅宗行宫在靈武也此是至德二載元日所作韋氏妹妹嫁韋氏也即同谷詩所云有妹有妹在鍾離者近聞韋氏妹迎在漢鍾離郎伯殊方鎮京華舊國移秦一作春城回北斗郢樹發南枝不見朝音潮正平聲使去聲啼痕滿面垂此公在亂而思妹也鍾離無恙京國已非有世事滄桑之感秦城公所居郢樹妹所在斗回枝發此元日春景朝使路梗傷音信莫通也書郎伯作鎮蓋仕於鍾離故慨朝正使而并及之漢地理志鍾離縣屬九江郡邵注今為鳯陽府臨淮縣曰子夜歌故使儂見郎詩自伯之東婦人稱其夫曰郎伯西都賦殊方異類李郭璞詩京華遊俠窟北莊子舊國舊都望之悵然爽詩城形類北斗回斗即斗柄東而天下皆春意顧希曰楚辭哀郢望長楸而太息兮涕淫淫其若霰注望楚都見其大道長樹悲而太息此郢樹所自來也按鍾離春秋時屬楚地故云郢樹為古詩越鳥巢南枝左傳諸侯朝正於王王宴樂之之賦湛露唐㑹要天寶六載敕中書門下省自今以後諸道應賀正使並取元日隨京官例序立便見春望鶴注此當是至德二載三月陷賊營時所作三月者指季春三月趙氏謂祿山反於天寶十四載之十一月至次年正月為三月失於不考耳顧宸云十五年正月明皇在長安六月始幸蜀安得謂之破是時公移家在奉先五月方入鄜州道路未嘗隔絶安得云家書抵萬金當從鶴說為正國破山河在城春一作荒草木深感時花濺淚恨别鳥驚心烽火連三月家書抵萬金白頭搔更短渾平聲欲不勝平聲簪此憂亂傷春而作也上四春望之景覩物傷懷下四春望之情遭亂思家趙汸曰烽火句應感時家書句應恨别但下句又因上句而生髮白更短愁亂思家所致齊國䇿王蠋曰國破君亡吾不能存庾信詩山河不復論辭余感時兮悽愴吕氏春秋春氣至則草木生后楚拾遺記漢獻帝為李傕所敗以淚濺帝衣奪秦嘉詩一别懷萬恨射聞人舊詩林有驚心鳥園多目花燕國䇿習騎謹烽火史記項羽燒秦宫室火三月不滅王勃詩物色連三月首魏文帝書價越萬金古樂府白頭不相離詩搔踟蹰零鮑照詩白髮落不勝簪司馬溫公曰古人為詩貴於意在言外使人思而得之故言之者無罪聞之者足以戒近世惟杜子美最得詩人之體如春望詩國破山河在明無餘物矣城春草木深明無人跡矣花鳥平時可娛之物見之而泣聞之而悲則時可知矣他皆類此得舍弟消息二首鶴注詩云兩京三十口又云烽舉新酣戰當是天寶十五年作近有平隂信遙憐舍弟存側身千里道寄食一家村烽舉新酣戰啼垂舊血痕不知臨老日招得幾時一作人魂首章初得消息憐弟而復自傷也不趙汸注次句有吾以汝為死矣之意側身言避寇敢正行一家村指平隂荒僻之鄉二句正述所傳之信見殺伐未休血痕曰舊見亂離已久趙注酣戰曰新招得幾時魂恐死期將至不復相㑹也參春秋昭二十三年晉師在平隂史記陳平降漢王使乘監諸將南渡平隂津至洛陽平隂乃古津濟處也唐書平隂縣隋屬濟州天寶十三載州廢縣屬鄆州楚辭欲側身而無所孫楚詩餞我千里道使史記韓信寄食於漂母戰國䇿馮暖貧乏不能自存人屬孟嘗君寄食門下江淹書俯首求衣斂眉寄食日喻巴蜀文烽舉燧燔子淮南子魯陽公與韓戰戰酣暮援戈而麾之韓非酣戰之時楚辭有招魂篇汝懦歸無計吾衰往未期浪傳烏鵲喜深負鶺鴒詩生理何顔面憂端且歲時兩京三十口雖在命如絲次章叙兄弟逺離而歎資生無計也見弟不能歸空傳烏鵲之喜公不能往深負鶺鴒之詩雖有消息而彼此懸隔也何顔面窮困而慙且歲時銷憂無日家口危如絲髮不但兄弟兩人難保矣西京雜記乾鵲噪而行人至詩鶺鴒在原兄弟急難運陸機詩生理各萬端逺柳惲詩獨枕悵憂端謝靈詩兩京愧佳麗張注兩京公在西京弟在東京也三十口合公與弟家屬而言公赴奉先詩老妻寄異縣十口隔風雪止言十口可明徴矣賊後漢劉茂傳孫福為所圍命如絲髮憶幼子鶴注此至德二載春公在長安作公幼子宗武小名驥子驥子春猶隔鶯歌暖正繁别離驚節換聰慧晉作惠與誰論平聲澗水空山道柴門老樹村憶渠愁只荆作即一作正睡炙背俯晴軒此章情景閒叙鶯歌節換言景子隔誰論言情澗水柴門家在鄜州之景愁睡晴軒長安思子之情鶯春猶隔自去夏離家至春猶隔也恨趙汸注本是聽歌而憶幼子起用倒叙法即所云别鳥驚心也為北史裴宣明二子景鸞景鴻並有逸才河東呼景鸞驥子景鴻為龍文黃生注鶯歌暗比學語之兒樂府古詞花笑鶯歌詠盧照鄰詩鶯啼知歲隔諸蘇武詩良友逺别離鮑照詩何言淹留節回換葛武侯與兄瑾書瞻今八歲聰慧可愛山尚書孔安國傳通道所經有澗水壞道魏徴詩空啼夜猿曹植詩柴門何蕭條人抱朴子午日稱仙人者老樹也俯嵇康與山濤書野有快炙背而美芹子者生注字善畫炙背之態氣何遜詩晴軒連瑞一百五日夜對月此至德二載寒食時公在長安作也杜臆詩題不云寒食對月而云一百五日蓋公以去年冬至棄妻出門今計其日見離家已久也荆楚歲時記去冬至一百五日即有疾風甚雨謂之寒食注據厯合在清明前二日無家對寒食有淚如金波斫却顧陶本作折盡月中桂清光應平聲更多仳普米切離放紅蘂想像顰舊作嚬非青蛾晉作娥非牛女漫愁思去聲秋期猶渡河此章對月思家而作無黃生注前半寫思家之意然家二字已暗埋五六後半寫家人之情然牛女二字又彼此雙綰此詩人驚其出語之竒不知其布局之整又曰仳離照無家放蘂照寒食顰蛾照有淚牛女又照青蛾即月下所見者斫桂光多欲借此以豁愁懷牛女渡河豫言聚首有期是年克復西京果在深秋之候禁詩樂子之無家丹鉛録季春火將王又已屬火故火而使寒食俗傳為子推而然非也又見周禮司烜氏郊月映波中如金光閃爍故云金波此借波字說淚漢祀歌月穆穆以金波詩申涵光曰斫却月中桂清光應更多似俗傳汪神童虞喜安天論俗傳月中仙人桂樹今視其初生仙人之足漸已成形桂樹後生酉陽雜爼月桂高五百丈下有一人常斫之樹創隨合人姓吳名剛西河人學仙有過謫令伐樹中何氏語林徐稚年七歲嘗月下戲人語之曰若使月無物當極明耶梁簡文帝詩明月吐清光言詩有女仳離啜其泣矣仳離别離也仳離二字略讀當此仳離而紅蘂自放也指對蘂顰睂猶云感時花濺淚朱注却以蘂指月桂蛾嫦娥不切陸機詩軟顔收紅蘂楚辭思故舊以想像施顰蹙睂也公詩燭滅睂顰可證張伯英與朱寬書西心疼捧心顰睂詩螓首蛾睂注蠶蛾之睂細而長曲宋南平王詩佳人舉袖耀青蛾記世說牛女二星隔河而居每七夕則渡河而㑹齊諧桂陽城武丁有仙道謂其弟曰七月七日織女當渡河諸仙悉還宫弟問何事渡河曰織女暫詣牽牛秦嘉詩愁思難為數為詩秋以期夢溪筆談此詩次聨不拘對偶疑非律體然起二句明係對舉謂之偷春格如梅花偷春色而先開也羅大經曰太白詩剗却君山好平鋪湘水流子美詩斫却月中桂清光應更多二公所以為詩人冠冕者胸襟濶大故也此皆自然流出不假安排此楊誠齊云東坡詩我持此石歸袖中有東海亦類也遣興去聲時此亦陷賊所作驥子好男兒前年學語時問知人客姓誦得老夫詩世亂憐渠小家貧仰去聲母慈鹿門擕不遂雁足繫音計難期一云鹿門擕有處鳥道去無期天地軍麾滿山河戰角悲儻一作東歸免相失見日一作爾敢辭遲此詩遙憶幼子也上四憶從前中四歎現在末四想將來知客誦詩承學語來鹿門句傷妻子相隔雁足句慨音信不通杜臆世亂二句愛隔情深儻歸一結語寬心急弱晉書張后傳老物不足惜慮困我好兒耳子戲我側學語未成音國語宜為人客陶潛詩洙曰嵇叔夜母凡鞠育有慈無威鹿後漢書龎德公擕妻子登鹿門山採藥不返襄陽記門山舊名蘇嶺山習郁立神祠於山刻二石鹿夾道口俗因以名廟并名其山知蘇武傳漢使者言天子射上林中得雁足有繫帛書武所在審漢高帝紀諸侯罷戲下顔師古注戲謂軍之旌麾杜言詩軍麾動洛城晉書蚩尤氏帥師魑魅與黃帝戰於涿鹿帝乃命吹角為龍吟以禦之塞朱音先側切蘆子此詩屬至德間陷賊中作塞屯兵以塞此關也五城何迢迢迢迢隔河水邊兵盡東征城內空荆杞思明割懷衛秀巖西未已回一作迥略大荒來一作東崤函蓋虛爾此詩為籌邊而作也關首言撒兵東征邊方單弱恐寇來西突不由近也五城指定逺豐安及三受降城庾信詩五城鄰北極五城在黃河之北故曰隔河水漢書陳豨監趙代邊兵通鑑祿山反邊兵精鋭皆徴發入援謂之行營留兵殘弱胸奴蠶食之書詩周公東征四國是皇阮籍詩堂上生荆杞唐史思明胡人也本名窣于𤣥宗改為思明高秀巖本哥舒翰將降賊僞為河東節度使朱注懷州河內郡衛州汲郡俱屬河北道野山海經大荒之中有大荒山日月所入是謂大荒之過秦論孝公據崤函之固漢書注崤山今陜縣二崤是也函谷今桃林縣南洪溜澗是也師氏曰虛言其無備禦杜臆雍州山從西北來地勢西高東下故關中視中原其勢俯視羌戎其勢仰函關之險特對中原而言若賊從蘆關來則函關不足恃矣故云回略大荒來函關蓋虛爾延州秦北户關防猶可倚焉於䖍切得一萬人疾驅塞先側切蘆子岐一作頃有薛大夫旁制山賊起近聞昆戎徒為去聲退三百里此言延州要地亟宜防守所幸景仙犄角得遏敵衝也三舊唐書延州中都督府屬關內道在京師東北六百十一里扶風即古岐周地通鑑至德元載七月以陳倉令薛景仙為扶風太守兼防禦使賊遣兵寇扶風景仙擊却之京畿豪傑往往殺賊官吏遙應官軍賊兵所及者南不出武關北不過雲陽西不過武功江淮奏請之蜀之靈武者皆自襄陽取上津路抵扶風道路無壅皆景仙之力也此前漢楊惲傳昆戎舊壤昆夷犬戎近境賊徒蘆關扼兩寇深意實在此誰能一作敢叫帝閽陳作門胡行速如鬼此結防寇本意欲緊扼蘆關之險也兩寇指思明秀巖巫此章前二段各八句後段四句收揚雄甘泉賦選咸兮叫帝閽不左傳其行速遇險而整詩如鬼如蜮朱鶴齡曰唐書方鎮表朔方節度領定逺豐安二軍及東中西三受降城五城當以此為據張說為朔方節度大使往巡五城措置兵馬元載請城原州云北帶靈武五城為之羽翼皆即此詩所指也地理志載夏州朔方縣有烏延宥州臨塞隂河陶子等城在蘆子關北乃長慶四年節度使李祐築鮑欽止引之以證此詩誤矣夢溪筆談以宋時延州五城為杜詩五城尤誤又曰此詩首以五城為言蓋憂朔方之無備也高史二寇合力攻太原克太原才渡河而西即延州界北出即朔方五城朔方節度治靈州靈距延才六百里爾靈武為興復根本公恐二寇乘虛入之故欲以萬人守蘆關牽制二寇使不得北塞字作壅塞解時太原幾不守幸祿山死思明走歸范陽勢甚岌岌公故深以為慮也誰能叫帝閽即悲青坂所云安得附書與我軍也此本陷賊時詩諸本多誤解故次在收京之後王嗣奭曰此篇直作籌時條議剴切敷陳灼見情勢真可運籌決勝若徒以詩詞目之則又文人之見也哀江頭鶴注此至德二載春日公陷賊中作此長安朱雀街東有流水屈曲謂之曲江地在秦為宜春苑在漢為樂遊園開元疏鑿遂為勝為境其南有紫雲樓芙蓉苑其西有杏園慈恩寺江寺側菰蒲葱翠柳隂四合碧波紅蕖依映可愛幸黃生曰詩意本哀貴妃不敢斥言故借江頭行處標為題目耳少去聲陵野老吞聲哭春日潛行曲江曲江頭宫殿鎖千門細柳新蒲為去聲誰緑此見曲江蕭條而作也首段有故宫離黍之感曰吞聲曰潛行恐賊知也曰鎖門曰誰緑無人跡矣行恨賦莫不飲恨而吞聲韓非子張孟談曰臣試潛而出隋煬帝詩三月三日向江頭筠詩千門皆閉夜何央後漢順帝紀修飾宫殿靈王枚乘賦吁嗟細柳謝運詩新蒲含紫茸憶昔霓旌下去聲南苑苑中萬物生顔色昭陽殿裏第一人同輦隨君侍君側輦前才一作詞人帶弓箭白馬嚼一作噍齧黃金勒翻身向天一作空仰射音石雲一笑正異作笑别本作箭蔡君謨作發正墜雙飛翼此憶貴妃遊苑事極言盛時之樂苑中生色佳麗多也昭陽第一寵特専也同輦侍君愛之篤也射禽供笑宫人獻媚也高唐賦霓為旌翠為蓋西都賦虹旃霓旌宋雍録曲江在都城東南其南即芙蓉苑故名南苑之問詩苑中落花掃還合古樂府萬物生光輝女陸機詩灼灼美顔色陽漢書飛燕立為皇后寵少衰弟絶幸為昭儀居昭殿唐注李白詩宫中誰第一飛燕在昭陽亦指楊妃也吾漢書成帝遊於後庭欲與班媫妤同輦莊子謦咳君之側一句中曰同曰隨曰侍似乎重復楊慎曰古人文辭有不厭鄭重者詩云昭明有融高朗令終易曰明辨晰也左傳曰逺哉遙遙宋玉賦旦為朝雲古樂府暮不夜歸邯鄲淳碑丘墓起墳後漢書食不充糧在今人則以為復矣舊唐書百官志內官才人七人正四品曹植七啓亦將有才人妙妓搜神記李楚賓帶弓箭游獵何遜詩柘彈隋珠丸白馬黃金勒明皇雜録上幸華清宫貴妃姊妹各購名馬以黃金為銜勒阮籍亢父賦被害嚼齧矣曹植詩翻身上京文杜臆上云仰射則一箭不待言一笑指貴妃下明眸皓齒就笑容言宋玉好色賦嫣然一笑孫潘嶽射雉賦昔賈氏之如臯始解顔於一箭隋書長晟射雕一發雙貫潘尼詩舉弋落雙飛張九齡詩欲寄雙飛翼明眸皓齒今何在血汚烏故切遊魂歸不得清渭東流劍閣深去住彼此無消息人生有情淚沾臆江草一作水江花豈終極黃昏胡騎去聲塵滿城欲往城南望城一作忘城一作忘南北此慨馬嵬西狩事深致亂後之悲妃子遊魂明皇幸劍死别生離極矣江草江花觸目增愁城南城北心亂目迷也朗此章四句起下二段各八句曹植洛神賦丹唇外皓齒內鮮明眸善睞靨輔承權祿吳均詩血汚秦王衣及易游魂為變唐后妃傳安山反以誅國忠為名西幸過馬嵬陳𤣥禮等以天下討誅國忠已死軍不解帝遣力士問故曰禍本尚在帝不得已與妃訣引而去縊路祠下唐國史補𤣥宗幸蜀至馬嵬驛縊貴妃於佛堂梨樹之前太真外傳妃死葬於西郭之外一里許道北坎下時年三十八歲縣西都賦北有清渭濁涇山海經注渭水出隴西首陽鳥鼠同穴山左思蜀都賦緣以劍閣注劍閣谷名自蜀通漢中道息蔡琰笳曲去住兩情兮難具陳虞羲詩君去無消陶潛詩人生似幻化頭謝眺詩有情知望鄉長樂府拾得楊花淚霑臆江花草豈終極乎蓋望安之興復也梁簡文帝詩江花玉面兩相似淮南子薄於虞泉是謂黃昏曹植詩天地無終極平前漢周勃傳擊胡騎城下北原注甫家居城南記朱注陸游筆記欲往城南忘城言迷惑避死不能其南北也荆公集句兩篇皆作望城北蓋傳本偶異耳北人謂向為望欲往城南乃向北亦不能記南北之意曹植吁嗟篇當南而更北謂東而反西古樂府戰城南死北郭箭補注謝氏詩源更羸善射能仰射入雲中以一囊繫頭而射名曰鎖雲王嗣奭曰曲江頭乃帝與貴妃平日遊幸之所故有宫殿公追遡亂根自貴妃始故此詩直述其寵幸宴遊而終之以血汚遊魂深刺之以為後鑒也之清渭東流劍閣深唐注謂託諷𤣥肅二宗朱注闢云肅宗由彭原至靈武與渭水無涉朱又云渭水杜公陷賊所見劍閣𤣥宗適蜀所經去住彼此言身在長安不知蜀道消息也今按此說亦非上文方言馬嵬賜死事不應下句突接長安考馬嵬驛在京兆府興平縣渭水自隴西而來經過興平蓋楊妃槀葬渭濱上皇巡行劍閣是去住西東兩無消息也唯單復注合於此㫖蘇轍曰杜陷賊時有哀江頭詩豫愛其詞氣若百金戰馬注坡驀澗如履平地得詩人之遺法如白樂天詩詞甚工然拙於紀事寸步不遺猶恐失之所以望老杜之藩垣而不及也潘氏杜詩博議云趙次公注引蘇黃門嘗謂其姪在進云哀江頭即長恨歌也長恨歌費數百言而後成杜言太真被寵只昭陽殿裏第一人足矣言從幸只白馬嚼齧黃金勒足矣言馬嵬之死只血汚遊魂歸不得足矣按黃門此論止言詩法繁簡不同耳但長恨歌本因長恨傳而作公安得預知其事而為之興哀北征詩不聞夏殷衰中自誅褒妲公方以貴妃之死卜國家中興豈應於此詩為天長地久之恨乎迂叟詩話唐曲江開元天寶間旁有殿宇安史亂後其地盡廢文宗覽杜甫詩云江頭宫殿鎖千門細柳新蒲為誰緑因建紫雲樓落霞亭歲時賜宴又詔百司於兩岸建亭館焉大雲寺贊公房四首此詩黃鶴編在至德二載陷賊時以詩中有泥汚人塵沙黃國多狗等語也其連章次序今依朱本先後秩然他本不免顛錯長安志大雲經寺在京城朱雀街南懷逺坊之東南隅本名光明寺武后初幸此寺沙門宣政進大雲經經中有女主之符因改名焉令天下諸州置大雲經寺拂鍾惺曰詩有一片幽潤靈妙之氣浮動筆端拂撩人此排律化境也不宜列在古詩心在水精晶通域衣霑春雨時洞門盡徐步深院果幽期到一作倒扉一作屣非開復閉撞鐘齊及兹醍醐長發性飲一作飯食過扶衰所追切把臂有多日開懷無愧辭黃鸝一作鶯度結構紫鴿下去聲罘音浮罳音思一云芳菲愚一作芳意㑹所適花邊行自遲湯休起我病微笑索所則切題詩此初過寺中而記其勝槩到扉六句叙事言情黃鸝六句叙景言情醍水精域地清也春雨時氣和也扉開復閉正值齊時醐二句䝉此也吳論開懷享此絶無愧詞以對方外人不用世法語黃鸝紫鴿深院春禽杜臆意適行遲詩興動矣微笑索題知已㑹心也管江總大莊嚴寺碑影徹琉璃之道光遍水精之域子五政順時春雨乃來漢書董賢傳重殿洞門注言門門相當也寂靜徐步沈佺期詩自憐深院得回翔雜積寶經謝靈運撰征賦果歸期於願言又詩平生協幽期果果如所期也記善待問者如撞鐘僧家設齊每撞鐘而㑹食潘鴻曰涅槃譬云從熟酥出醍醐譬般若波羅蜜出大涅槃唐本草醍醐酥之精液洙曰釋經言聞正法如食醍醐然發潘鴻曰止觀輔行云見是慧性發必依觀禪是定性必依止此發性二字所本前漢食貨志扶衰養疾百禮之㑹非酒不行左絶交論把臂之英神潘嶽誄茍莫開懷於何不至傳祝史昭信於鬼無愧辭宋登樂府歌禮無爽物信靡愧辭碑何晏景福殿賦其結構則修梁彩制王褒善行寺四禪災起鴿影傳輝潘曰紫鴿暗用釋氏鴿入佛影心不驚怖之語其雍録罘罳鏤木為之其中疏通或為方空或為連瑣狀扶疏故曰罘罳又有網户者刻為連文遞相綴屬其形如網後世遂有直織絲網張之簷窗以護禽雀又詳見十六卷揚南史沙門惠休善屬文孝武帝命還俗本姓湯位至州從事詩借湯休以比贊公七發太子能强起聽之乎太子曰僕病未能也杜臆病謂詩癖此另一說傳燈録釋迦拈起一花迦葉微笑遂授以正法眼藏詩洛陽伽藍記題花圃細軟青絲履光明白㲲音疊巾深藏供老宿取用及吾身自顧轉無趣交情何尚新道林才不世惠逺德過平聲人雨瀉一作滴暮簷竹風吹春一作青非井芹天隂對圖畫最覺潤龍鱗此留齊之後而記其贈物自顧四句感贊公交情雨瀉四句咏薄暮雨景老宿謂高僧無趣遭亂失意也道林惠逺借比贊公龍鱗指壁上圖畫吳論以圖畫喻山龍鱗喻松非是隋煬帝設齊願疏色香細軟遍滿十方轉爾雅綸似綸注綸紏青絲也音關張華云綸草如宛繩涅盤經遇佛光明後漢書注外國傳曰諸薄國女子織作白㲲花布南史高昌國有草其實如繭繭中絲如細纊名曰白㲲子國人織以為布甚軟白交市用焉大藏一覽後漢明帝遣將士往西域迎佛法至月氏國遇二梵僧帶白㲲畫釋迦像洙曰以白㲲布為手巾王昌齡詩手巾花㲲淨生細軟光明用釋氏語雙關法也傳燈録老宿有語踈處常令熟熱熟熱處放令生踈氏孫綽詩交情逺市約至高僧傳支遁字道林本姓關陳留人聰明秀徹每講肆善標宗㑹一代名流皆著塵外之狎惠逺本姓賈氏雁門樓煩人性度𢎞偉風鑒朗拔居廬阜三十餘年化兼道俗輔風俗通汝南應融曰祝休伯不世英才當為國家幹張彥逺名畫記大雲寺東浮圖有三寶塔馮楞伽畫車馬并帳幕人物已剝落東壁北壁鄭法輪畫西壁田僧亮畫外邊四壁楊契丹畫畫斷吳道子嘗畫殿內五龍鱗甲飛動每欲大雨即生雲霧子庾信詩龍來隨畫壁偏注姜曰白㲲白㲲子即棉花也唐時未入中國元朝始傳其種燈影照無睡心清聞妙香夜深殿突兀風動金琅璫一作銀鐺漢書作琅當天黑閉春院地清棲暗芳玉繩迥一作回斷絶鐵鳯森翺翔梵放時出寺鐘殘仍殷音隱牀明朝在沃野苦見塵沙黃此記夜間見聞之景上六自初寢至夜深下六自夜起而將曉逺注此首以聞見二字作骨燈影見也妙香聞也殿突兀見也金琅璫聞也天黑二句聞見俱寂也玉繩二句仰而見也梵放二句側而聞也有此見聞之清淨因以慨沃野之塵沙矣五更將曉故玉繩隱跡而鐵鳯露形崔融詩九陌連燈影千門照月華維維摩經譬如一燈燃千百燈冥者皆明杜修可曰摩經有國名衆香佛號香積其界皆以香作樓閣其國如來無文字說但以衆香令諸天人得入律行菩薩各坐香樹下聞斯妙香即獲一切得藏三昧希曰增一經有妙香三種謂多聞香戒香施香此三香逆風順風無不聞之最勝無等均詩空香清人心皆海賦突兀孤遊懸漢西域傳注琅璫長鎖也今殿塔有之一曰殿角鈴其聲琅璫希曰琅璫二字見漢書王莽傳西域傳皆以為長鎖後漢囚司徒崔烈以琅璫鎖此詩所用當指鈴鐸蘇子瞻風動琅璫月向低洪龜父琅璫鳴佛屋皆本此詩而春秋元命苞玉衡南兩星為玉繩張融海賦連瑶光交彩接玉繩以通華鐵西京賦鳯鶱翥於甍標咸遡風而欲翔薛綜注謂作鳯凰令張兩翼舉頭敷尾以函屋上當棟中央下有轉樞常向風如將飛者沙詩將翺將翔崔融詩北風捲塵黃生曰夜景無月最難寫惟杜能入妙夜深殿突兀摹寫逼真亦在暗中始覺其然耳此下句句是暗中景象童兒汲井華慣捷海録作健瓶上上聲一作在手霑灑不濡地掃去聲除似無帚明一作晨霞爛復閣霽霧搴高牖側塞先側切被徑花飄颻委墀一作階柳艱難世事迫隱遁佳期後晤語契深心那能總鉗口奉辭還杖䇿暫别終回首泱泱于黨切一作浹浹泥汚去聲人㹞㹞與狺通音銀舊作聽國多狗既未免羈絆一作寓時來憩奔走近公如白雪執熱煩何有此記早晨惜别之意童兒四句朝起之事明霞四句曉時之景艱難六句言賓主相投欲别不忍泱泱六句言世亂難容還期後㑹井汲井以供灑掃易汲井幾至無本草平旦第一汲為華水金俊明曰不濡地似帚言灑掃之輕且潔耳夢周禮凡寢中之事掃除阿陸機詩蔚若明霞爛薛符曰廣韻復重也古詩閣三重階王勃詩復閣重樓向浦開開也側塞花多貌梁元帝詩能令雲霧搴選注搴九辨臯蘭被徑兮斯路漸非郭璞詩山川隱遁棲以佳期後謂遁迹已遲謝靈運詩佳期緬無像詩可晤語宋武帝詩深心屬悲絃夫那鉗口每談及時事也賈誼過秦論鉗口而不言潛論此智士所以鉗口結舌括囊共默者也北魏楊衒之洛陽伽藍記青州刺史臨去奉辭辨陸機詩杖䇿將逺尋詩維水泱泱注深廣貌九猛犬狺狺而迎吠兮夫左傳國狗之瘈無不噬也顧炎武曰韓非子外儲說國亦有狗有道之士陳其術而欲以明萬乘之主大臣為猛狗迎而齕之者鮑昻曰是時賊將張通儒收録衣冠汚以僞命不從殺之故云泥汚人國多狗作晉載記馬能千里不免羈絆地逺注公詩用執熱俱熱不可解言一對贊公則心自涼覺煩囂盡釋矣雨過平聲蘇端原注端置酒孥此至德二載春陷賊中詩末云妻隔軍壘可見鶴注舊書至德二載三月癸亥大雨至甲戌方止州新書楊綰傳謂端憸人也論綰醜險不實貶巴員外司馬雞鳴風雨一云雲交久旱雨對後章晴亦佳當作雨吳氏作雲恐非亦好杖藜入春泥無食起我早首言冒雨訪蘇句久旱得雨何云亦好此照下而言蓋訪友須晴但旱後得雨雖雨亦好也無食起我早猶陶詩言飢來驅我去師氏注雞鳴思君子之詩故寓言乘雨訪友詩風雨如晦雞鳴不已風雨交謂交作諸家憶所歷一飯一作飽跡便一云更掃蘇侯得數音朔過平聲歡喜每傾倒也去聲復扶又切一作復也可憐人呼兒具梨棗濁醪必在眼盡醉攄懷抱次記蘇君欵待之情又杜臆一飯掃迹世情類然蘇獨數過傾倒意良厚矣且呼兒具果延賓取醉非食而弗愛敬者比此即所稱文章有神交有道也然抱朴子諸家不急之書高士傳先幾掃跡虛室依跡便掃絶足不再往也亦世說庾公謂孫公曰衛君長雖不及卿諸人傾倒處不近庾信詩也復何足言可憐人言蘇之情誼令人可憐非謂蘇侯憐公梨世說孔君平詣梁國楊氏呼兒出為設果淮南子橘棗栗不同味而皆調於口醪恨賦濁夕引紅稠屋角花碧秀一作委牆隅草親賓縱一作絶談謔喧閙慰一作畏衰老况䝉霈澤垂糧粒或自保妻孥隔軍壘撥棄不擬道義從去聲讀從上聲妍末述雨後遣懷之意花草增糧粒有望流離窮困中作對景舒愁語亦無可如何而安之耳字此章四句起下兩段各八句北史斛律金不識文初名敦苦其難署改名為金神武指屋角令識之雲傅𤣥詩湍深激牆隅月令養哀老授几杖陸機賦甘澤雱霈爾顔延之陶徴士誄織絇緯蕭以充糧粒之費詩樂妻孥時寄家鄜州故云隔軍壘趙曰陶潛詩撥置自莫念末句本此喜晴鶴注以前篇雨過蘇端考之當是至德二載三月甲戌雨止之後作今按前篇云久旱雨亦好此篇云既雨晴亦佳兩章為同時作明矣皇天久不雨既雨晴亦佳出郭眺西一作四郊肅肅一作蕭蕭春增華青熒陵陂麥窈烏了切窕徒了切桃李一作杏花春夏各有實我飢豈無涯首言雨後初晴麥果有望以見晴之可喜魏文帝愁霖賦仰皇天而太息壘易密雲不雨自我西郊肅又既雨既處春記四郊多陶潛詩肅肅其風肅整齊貌春華光華美也肅西都賦琳珉青熒容莊子青青之麥生於陵陂王詩注善心曰窈善曰窕此借形花意也曹植詩容華若桃李吾實謂穀實果實有實則可以充飢矣莊子生也有涯而知也無涯干戈雖橫去聲放慘淡鬬龍蛇甘澤不猶愈且耕今未賖丈夫則帶甲婦女終在家力難及黍稷得種菜與麻次言亂時得雨耕種可資尤見晴之可喜鋤干戈龍蛇指祿山之亂猶愈言猶勝旱乾未賖言耕未遲夫征婦種遭亂而農事多荒也漢左傳日尋干戈以相征討恆世說今先集其慘淡五行志皇極之不建厥罰隂時則有龍蛇之孽田陸機雲賦甘澤雱霈荆楚歲時記夏必有三時雨家謂之甘澤國䇿帶甲百萬詩黍稷翼翼千載上聲商山芝往者東門瓜其人骨已朽一作滅此道誰疵瑕英賢遇轗軻逺引蟠泥沙顧慚昧所適回首白日斜漢隂有鹿門滄海有靈一作雲查槎同焉於䖍切能學衆口咄咄空一作同咨嗟末乃自叙已懷傷亂而欲逺遁也二前引商山東門思古人之高蹈英賢句乃結上後引鹿門海槎愧避世之已遲顧慚二句乃起下雖疊用四事而意非重復欲決意逺去故不作空嗟避此章前兩段各八句後段十二句收療高士傳四皓秦入商雒山作歌曰曄曄紫芝可以飢蕭何傳邵平故秦東陵侯秦破為布衣貧種瓜長安城東甚美世謂東陵瓜史記老聃曰子所言者其人與骨已朽矣楚左傳不汝疵瑕朱注龜策傳黃金有疵白玉有瑕辭轗軻不遇孔融與曹操書高翔逺引揚子法言龍蟠於泥蚖其肆矣郭璞江賦混淪乎泥沙白陶潛詩顧慚華鬢負影隻立顧念也張駿詩感此日傾晉苕華詩日斜思鼓缶陽盛𢎞之荆州記龎德公居漢之隂司馬德操居洲之望衡對宇歡情自接希曰鹿門在漢水之隂地屬襄陽非指漢隂郡漢隂郡乃闕也海上查出博物志見十七卷秋興詩注甄皇后詩衆口鑠黃金語咄咄用殷浩事見本卷通鑑注咄咄咨嗟也阮籍傳咨嗟良久赴奉先詠懷補注庚溪詩話士人程文窮日力作一論不限聲律不拘詩句尚罕得反復折難使其理判然者觀赴奉先詠懷五百言乃聲律中老杜一篇心迹論也自杜陵有布衣老大意轉拙許身一何愚竊比稷與契其心術祈嚮自是稷契等人窮年憂黎元歎息腸內熱與飢渴由已者何異然嘗為不知者所病故曰取笑同學翁世不我知而所守不變故曰浩歌彌激烈又云非無江海志瀟灑送日月當今廊廟具構厦豈云缺葵藿傾太陽物性固莫奪亦非不知隱遁為高亦非以國無其人也特廢義亂倫有所不忍以兹誤生理獨恥事干謁言志大術踈未始阿附以借勢也為下士所笑而浩歌自若皇皇慕君而雅志棲遁既不合時而又不少低屈皆設疑互答屢致意焉非巨刃有餘孰能之乎中間鋪叙間關酸辛宜不勝其戚戚而默思失業徒因念逺戍卒所為憂在天下而不為一已失得也禹稷顔子不害為同道少陵之迹江湖而心稷契豈為過哉孟子曰窮則獨善其身逹則兼善天下其窮也未嘗無志於國與民其逹也未嘗不抗其易退之節蚤謀先定出處一致矣是詩先後周復正合乎此昔人目元和賀雨詩為諫書余特目此詩為心迹論也君䂬溪詩話孟子七篇論君與民者居半其餘欲得蓋以安民也觀杜陵窮年憂黎元歎息腸內熱胡為將暮年憂世心力弱宿花石戍云誰能扣君門下令減征賦寄柏學士云幾時高議排金門各使蒼生有環堵寧令吾廬獨破受凍死亦足而志在大庇天下寒士其仁心廣大異夫求穴之螻蟻輩真得孟子所存矣東坡先生問老杜何如人或言似司馬遷但能名其詩爾愚謂老杜似孟子蓋原其心也上葛常之韻語陽秋曰子美高自稱許有乃祖之風書明皇云臣之述作沈鬱頓挫揚雄枚臯可跂及壯遊詩則自比於崔魏班揚又云氣劘屈賈壘目短曹劉墻贈韋左丞則曰賦料揚雄敵詩看子建親甫以詩雄於時自比諸人誠未為過至竊比稷與契則過矣唐史氏稱甫好論天下大事高而不切豈自比稷契而然耶至云上感九廟焚下憫萬民瘡斯時伏青蒲廷爭守御牀其忠藎固自可嘉也盧世㴶曰赴奉先及北征肝腸如火涕淚橫流讀此而不感動者其人必不忠今按北征詩尚帶率語如見耶背面啼垢膩腳不襪老夫情懷惡嘔泄卧數日瘦妻面復光癡女頭自櫛將真情實事信筆寫來黃徹謂如轉石於千仞之山勢也學者尤之過甚亦未窺其逺大者耳若此詩悲愁激切而語皆雅飭更無疵句可議矣哀江頭補注黃生曰此詩半露半含若悲若諷天寶之亂實楊氏為禍階杜公身事明皇既不可直陳又不敢曲諱如此用筆淺深極為合宜自又曰善述事者但舉一事而衆端可以包括使人得之於言外若纎悉備記文愈繁而味愈短矣長恨歌今古膾炙而哀江頭無稱焉雅音之不諧俗耳如此杜詩詳注卷四
