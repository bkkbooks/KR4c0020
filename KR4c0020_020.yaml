body:
  text: 杜詩詳注卷二十翰林院編修仇兆鰲撰秋日寄題鄭監湖上亭三首此當是大厯二年秋作首章云高唐寒浪減髣佛識昭丘時蓋將去䕫矣寄鶴注鄭監即鄭審湖在峽州而公在䕫州故云題邵注峽州即今湖廣夷陵州碧草違一作逢春意沅湘萬里秋池要平聲山簡馬月淨一作靜庾公樓磨滅餘篇翰平生一釣舟高唐寒浪減一作滅非髣佛識昭丘首章想秋日湖亭之勝故題詩而神往也上四景下四情草非春意則楚地皆秋矣山池切湖庾樓切亭用事工貼篇翰猶存能寄題也釣舟素具將往遊也黃生注首句見時次句見地因其謫官故託秋草以起興發端之妙可比西掖梧桐樹一起矣吳論亭在荆州沅湘山簡庾公高唐昭丘皆引荆州事出別賦春草碧色在邵注沅水在辰州府西南五里源四川播州湘水長沙府西環城而下至沅州與沅水合㑹衆流以達洞庭十晉山簡傳時時能騎馬倒著白接䍦庾公樓注見六卷書序其餘錯亂磨滅此詩磨滅猶云歲月銷磨遊劉孝綽詩釣舟畫彩鷁髙唐賦序楚襄王與宋玉於雲夢之臺望高唐之觀漢書注高唐在雲夢華容縣朱注後人因巫山神女遂傳在巫峽此詩高唐寒浪減髣佛識昭丘及䕫州歌中有高唐天下無皆指在巫峽者言之髣長楊賦從者倣佛骫屬注倣佛讀曰髣佛謝靈運詩佛丹丘徒東登樓賦北彌陶牧西接昭丘李善曰荆州圗記當陽南七十里有楚昭王基登樓則見所謂昭丘新作湖邊宅還聞賔客過平聲自須開竹徑誰道去聲避雲蘿官序潘生拙才名賈傅一作誼多捨舟應平聲卜一作轉地鄰接意如何次章從湖亭說入鄭監欲往與之居也豈作宅之後過客來遊應開竹徑以迎賔託雲蘿以避俗曰還聞曰自須曰誰道俱屬寄題語官拙才多言能淡榮名而尚風雅故賔客喜過而已願為鄰意何如問之也置黃生注此章結聨申首章六句之意鄭當時傳嘗驛馬長安諸郊請謝賔客夜以繼日此暗使其事詩蘿徑若披雲三輔決録蔣詡竹下開三徑知王融潘嶽閒居賦序自弱冠達於命之年八徙官而一進階再免一除名一不拜職遷者三而已雖通塞有遇抑亦拙者之效也舊注以潘生自喻顧氏已辨其非稱江淹傳夙曜才名公賈誼傳年十八以能誦書屬文於郡中河南守吳聞其秀材召置門下甚愛幸後出為長沙王太傳謝靈運詩捨舟眺回渚暫阻一作住蓬萊閣終為江海人揮金應平聲物理拖玉豈吾身羮煮秋蓴滑一作弱杯凝一作迎露菊新賦詩分氣象佳句莫頻一作辭頻三章從鄭監說歸湖亭欲重題其勝也昔蓬閣而今江海可見鄭之達識揮金乃物理應然則江海正可行樂拖玉於吾身無預則蓬閣不必久居矣蓴菊想湖亭食品賦詩懝到後題詩不朱注分氣象分咏湖亭之氣象句趙注莫頻頻言莫頻頻有佳句乎杜臆云鄭之佳莫頻頻先出使我不能追和蓋戲之也從前說為順懷黃生注此章結聫申首章五句之意公有夔府詠寄鄭審詩云蓬萊漢閣連趙次公注鄭乃祕書少監故用蓬萊閣事與此可互證華嶠後漢書學者稱東觀為老氏藏室道家蓬萊桓帝時始置祕書監魚豢魏略蘭臺為外臺祕書為內閣莊子就藪澤處閒曠此江海之士避俗之人也幾漢書疏廣為太傅歸鄉里數問其家所賜金餘尚有趣賣以具酒食請族人故舊與妓娛樂張協詠二疏詩揮金樂當年歲暮不留儲顧謂四座賔多財為纍愚王羲之帖天下物理豈可以意求西征賦飛翠緌拖鳴玉以出入禁門者衆矣吳均詩拖玉人含輝老子人之大患以吾有身晉齊王回辟張翰為大司馬東曹掾因秋風起思吳中菰萊蓴羮鱸魚膾曰人生貴適意何能要名爵乎命駕歸俄而回敗人謂見幾壺陶潛詩秋菊有佳色裛露掇其英一觴雖獨進杯盡復傾劉楨詩賦詩連篇章江淹麗色賦非氣象之可譬杜詩三章疊詠有首章為主後二首分應者如羌村如領妻子赴蜀及湖亭詩於草蛇灰線中見其章法之妙秋野五首鶴注當是大厯二年瀼西作秋野日疏舊作蔬非一作荒蕪寒江動碧虛繫音計舟蠻井絡一作路黃生作落卜宅楚村墟棗熟從一作行人打葵荒欲自一作且鋤盤飱老夫食分音問減及溪一作樵魚首章記秋野景事繫舟承江卜宅承野棗熟葵荒卜居之事減食飼魚繫舟之興此下數章多以首二句為主疏蕪收穫巳畢野色蕭疏也碧虛波光相蕩水天一色也杜臆繫舟卜宅去住尚難自決也棗從人打則人巳一視葵欲自鋤則貴賤一視食及溪魚則物我一視此皆見道語均蕭子範詩雲升秋野平謝朓詩邑里向疏蕪吳詩飄飄上碧虛揚雄蜀都賦稽乾度則井絡儲精左思蜀都賦岷山之精上為井絡注岷山之地上為東井絡維也䕫州屬楚即荆蠻地自庾信賦搖落小村墟華公詩堂前撲棗任西鄰又詩鋤新菜甲周靖曰嚴經十布施內有分減布施易去聲識浮生理難教平聲一物違水深魚極樂音洛林茂鳥知歸衰一作吾老甘貧病榮華有是非秋風吹几杖不厭北一作此山薇次章言秋野可以避世藏欲識浮生之理即觀物情可見如魚鳥身此物情之近理者今亦惟託迹山林以順浮生之理而已三四承次句五六承首句脉絡固然須知三四仍是借物興已語氣方見融貫趙汸謂以達生處已以遂性待物將兩句開說不合語意視此生若浮則貧病可安而榮華不足羡矣淹杜臆几杖言老山薇言貧淮莊子其生也若浮江詩一物之微有足悲者南子水深則魚聚水茂則鳥樂詩趙汸注甘貧病者為避是非也下句申上句謝朓敢忘恤貧病管子萬物榮華莊子此亦一是非於月令養衰老授几杖璣北山北崦也史記夷齊隱首陽山採薇而食陸曰薇山菜也葬葉似小豆蔓生味如豆藿亦可食禮樂攻吾短山林引興去聲長掉頭紗帽側曝背竹書光風落收松子天寒割蜜房稀疏小紅翠駐屐近去聲微香三章見秋野可以自娛承上北山薇來謂首聨總提短長二字另讀掉頭二句言檢身之疏所短於禮樂也風落四句言野居之適所謂山林興長也或將山林領下六句則起句無照應矣紗帽側指帽影斜側竹書光謂書映日光兩句例看自明性莊子禮樂之士敬容攻治也莊子入山林觀天黃生注三四與吟詩坐回首隨意葛巾低正可參看隋莊子在宥篇雀躍掉頭紗帽見管寧紗帽靜注書獨孤信舉止風流曾風吹帽簷側觀者塞路得秦國䇿暴背而耨簡晉書荀朂領祕書監汲郡冢中竹書趙注竹書竹之書受列仙傳偓佺好食松實以松子遺堯堯不暇服也時服者皆至二三百歲洙曰蜜房蜂房也班固終南頌蜜房溜其巔左思蜀都賦蜜房郁育被其阜逺岸秋沙白連山晚照紅潛鱗輸駭浪歸翼㑹高風砧響家家發樵聲箇箇同飛霜任青女賜被隔南宫四章見秋野無羡於榮祿承上山林興來每首句秋景次句晚景三四俯仰所見五六逺近所聞句各兼秋晚兩意末歎寒色凄凉山林與廊廟判隔矣而輸如輸送之輸是逐浪而去㑹如際㑹之㑹是順風回杜臆南宫之賜被已隔則飛霜聽之青女而巳去南都賦川瀆則箭馳風疾長輸逺逝注輸瀉也是瀉之義江賦駭浪暴灑驚波飛薄與張翰曰如歸翼得高風翺翔投林中淮魏文帝詩適飄風㑹謝惠連詩櫊高砧響發南子秋三月青女出以降霜綾高誘注青女天神主霜雪漢舊儀郎官給青縑白被或錦被後漢書藥嵩家貧為郎常獨直臺上無被枕杫帝聞而嘉之詔給帷被皂袍身許麒麟畫年衰鴛鷺羣大江秋易音異盛空峽夜多聞徑隱千重平聲石帆留一片雲兒童解侯買切蠻語不必作參軍末章身在秋野而自傷留滯也承上隔南宫來負上二客䕫之故下皆對景述情老别鴛班徒許身初志唯有臥病江峽而已秋易盛浪高水漲夜多聞風怒獸號徑隱石避地已深帆片雲歸航在望五六分頂峽江而意却注下參杜臆末歎客巴日久語帶謔詞世說郝隆為蠻府軍上已日作詩曰娵隅躍青池桓溫問何物答曰蠻名魚為娵隅溫曰何為作蠻語隆曰千里投公始得蠻府參軍那得不蠻語也前三章敘日間景事第四章則自日而晚末一章則自晚而夜矣凡杜詩連敘數首必有層次安頓其細于詩律如此課小豎鋤斫舍北果林枝蔓荒穢淨訖移牀三首一云秋日閒居三首荒鶴注當是大厯二年瀼西作陶潛詩晨興理穢杜臆牀藜牀也公視園詩衰年動覓藜牀坐可證病枕依茅棟荒鉏淨果林背音悖堂資僻逺在野興去聲清深山雉防求敵江猿應獨吟泄雲高不去隱去聲几亦無心首章敘舍北果林之事情與景㑹下黃生注題雖長只是鋤荒移牀二事上四寫題面四發題意牀向北取其僻逺穢盡除興覺清深矣看雉聽猿憑几對雲總見靜寂幽閒之趣雉性善鬬見求敵則防猿本羣嘯聞獨吟則應一杜臆泄雲不去此無心出岫者公之隱几而視亦同無心也詩言樹之背注背北堂也雜射雉賦伊義鳥之應敵徐爰注雉見敵必戰不容他獨吟指猿張載敘行賦聽古猿之夜吟左思賦窮岫泄雲歸莊子東郭子棊隱几嗒然似喪其耦去來辭雲無心以出岫衆壑生寒早長林卷霧齊青蟲懸就日朱果落封一作成泥薄俗防人一作狸面全身學馬蹄吟詩重義從平聲讀用去聲一作坐回首隨意葛巾低次章言舍北朝景有絶人避世之意壑當秋故寒早曉將晴故霧捲蟲懸果落俱從穢淨後見之行杜臆防人面恐招尤也學馬蹄唯率真也葛巾低謂吟自適無所係纍蟲之懸樹者向就日光果之隕落者封埋泥土以封對就俱係活字或以封泥為高土或謂接樹者用泥封俱誤簡沈佺期詩羣峰回衆壑李江逌詩長林悲素秋得梁文帝詩珠槩雜青蟲白詩于焉摘朱果兼養𤣥牝此古史就之如日此就字所本西京雜記用紫泥封印封字所本廣絶交論馳騖之倫澆薄之俗身盧思道集居家則人面獸心不孝下義毛詩序思全逺害莊子馬蹄篇馬蹄可以踐霜雪可以禦風寒齕草飲水翹足而陸此馬之真性也及受制於人則死者過半矣葛巾用陶潛事邵經邦曰暗牖懸蛛網空梁落燕泥古今以為佳句余恨其慘淡凄凉類鬼仙語宜乎其罹害也不若青蟲懸就日朱果落封泥穠麗閒雅景象自别云黃生曰楊子法言云貌則人心則獸莊子馬蹄篇至德之世同與禽獸居族與萬物並惡乎知君子小人哉此言薄俗人心叵測惟以渾同之道處之庶可全身逺害上句以人面影獸心下句以篇題括篇意如此用事真出神入化矣又曰觀此二詩則知此地人情之薄不及浣花鄰曲多矣故遣悶詩有云異俗吁可怪斯人難並居籬弱門何向沙虛岸只一作自摧日斜魚更食客散鳥還來寒水光難定秋山響易音異哀天涯稍曛黑倚杖獨一作更徘徊三章言舍北晚景有隨遇而安之意不三四薄暮近景五六深秋逺景杜臆籬門整沙岸任頽魚鳥忘機山水成趣故樂之而不知倦定更食魚飢再食也還來日夕鳥歸也日漾水故光難風落木故響易哀倚黃生注籬弱門何向以沙虛岸只摧也上句因下句杖之際晚色可人故徘徊而不忍舍倚杖應籬門曛黑應日斜運詩魚更食即分減及池魚意謝靈朝遊窮曛黑顧宸曰一章言野僻雲高二章言霧收日霽三章言光寒日黑此敘景章法也一章言無心二章言隨意三章言徘徊此敘情章法也一章言隱几而望二章言吟詩而行三章言倚杖而立此敘事章法也三詩漸入漸深絶不叠床架屋意黃生曰前二詩題詩已訖此詩又野興清深之餘也掃除既畢倚杖閒行作者起居性情至今如見詩歸不顧本題而専取末章於作者之意何存返照此是大厯二年瀼西作反照開巫峽寒空半有無巳低魚復暗不盡白鹽孤荻岸如秋水松門似畫圗牛羊識僮僕既夕應傳呼趙汸注寒空半有無此返照之景首句出題次句懾下魚復卑而全暗是半無白鹽高而孤露是半有荻岸茫如秋水是半無松門映若畫圗是半有此時牛羊下山各識僮僕之聲而傳呼則應此又夕照將暝之候也巫山將暮得返照而景色重開起語卓然之杜臆中四寫影各分有無之半末二摹神想入有無間工緻如此真詩中有盡矣盡逸周書圛圛升雲半有半無黃已低謂地勢低下不謂山尖猶見未盡暗沒也注荻岸如秋水狀其拜風之勢兼像色白也之十道志松門峽在夔州易得童僕貞傳呼牧人驅叱牛羊之聲漢樂府病婦行傳呼丈人前一言一說曰暗曰孤曰如曰似皆半無半有景色此宜合看以㑹其意不當分析以求其狀向夕此是大厯二年冬瀼西作斂梁昭明太子詩寒色向夕畎畝孤城外江村亂水中深山催短景同影喬木易音異高風鶴下去聲雲汀一作河近雞棲草屋同琴書散明燭長夜始去聲堪終黃生曰此詩傷客居寥落情寓景中三四衰疾之悲五六離索之感藉琴書以消長夜拈一始字方露本意惹杜臆冬日苦短深山蔽之其晷更促歲寒多風喬木之其聲益悲黃注曰近曰同即麋鹿共為羣意燭光散射於琴書句用倒裝有嘯賦青飈振乎喬木詩雞棲于塒束晳貧家賦陋狹之草屋無蔽覆之受塵朱注蘭膏明燭天池鶴注此當是大厯二年秋瀼西作全蜀總志天池在䕫州府治東巫山縣治亦有之天池山頂上有池也天池字亦見莊子天池馬不到嵐壁鳥才通百頃青雲杪曾同層波白石中鬱紆騰秀氣蕭瑟浸寒空直對巫山峽一作出兼疑夏禹功此記天池氣象在首二言高百頃言濶層波言清騰氣在晴時浸寒隂時對峽指其地禹功歎其竒楚辭眇視目層波序詩白石磷磷氣陸士衡詩鬱紆遊子情王融曲水冠五行之秀唐太宗詩寒空碧霧輕魚龍開闢有菱芡一作芰古今同一作豐聞道去聲奔雷黑初看平聲浴日紅飄零神女雨斷續楚王風欲問支機石如臨獻寶宫此記天池景物前魚龍菱芡池中所蓄奔雷四句言池變態支機二句稱池間神境宋郭璞詩迅駕乘奔雷甘泉玉髙唐賦暮為行雨山海經羲和浴日於又楚襄王遊於雲臺之宫有風颯然而至月荆楚歲時記漢武帝令張騫使大夏尋河源乘槎經而至一處見一女織一丈夫牽牛飲河織女取搘機石與騫而還搘機石為為東方朔所識獻寶宫見前獻寶朝河宗九秋驚雁序萬里狎漁翁一作樵童更是無人處誅茅一作勞任薄躬此遊池而有感也歎久客夔州雁序漁翁皆池邊所見者誅茅而居自此章前二段各八句末段四句收南都賦結九秋之增傷曹植詩丹唇含九秋復愁十二首鶴注此當是大厯二年秋瀼西作時吐蕃寇邠靈州京師戒嚴故有萬國尚防寇之句而盧注復愁者前愁未巳後愁復至非謂愁已釋復生公之愁懷固未嘗得放也人煙生處僻盧本作僻處一作逺處虎跡過新蹄野鶻一作鶴又作鷂晉作雉翻窺草村船逆上上聲溪首章記瀼峽愁景患煙僻則居人少跡新則慮多鶻窺草見求食之難船上溪見行舟之險就水經注兩岸石上有虎跡甚多或深或淺皆悉成自然之勢釣艇收緡盡昏鴉一作鷗接翅稀一作歸月生初學扇雲細不成衣次章記薄暮愁景初盧注收緡盡無魚可釣接翅稀孤飛少伴月生不能普照雲猶細不能及物此寫出無聊之况義吳論上二章皆言景扇詩其釣維何維緡伊絲李府堂堂詞鏤月成歌裁雲作舞衣萬國尚戎馬一作防寇故園今若何昔歸相識少早已戰場多三章懷思故鄉而愁人戎馬謂吐蕃侵境故園指東都舊居昔年暫歸而少地殘則今日更覺荒凉矣朱杜臆次句作問詞下二乃答語注乾元初公自華州曾歸東都身覺省郎在家須農事歸年深荒草徑老恐失柴扉四章無家可歸而愁居承上章言棄官則須歸農乃草荒而田日蕪扉失而日廢不復有鄉土之可依矣吳論上二章皆言情金絲鏤一作縷箭鏃皂尾製一作掣旗竿一自風塵起猶嗟行路難五章洊經世亂而愁塵箭飾金絲旗裝皂尾賊恃利器以作逆者風十載而歸路猶難則愁緒真不能歇矣而吳論此一章因亂後作胡鹵何曾音層盛干戈不肯休閭閻聽小子談笑一作話覓封侯六章人心好亂而愁以杜臆定外寇易定人心難人競尚武此干戈所不息也盧注僕固懷恩恐賊平寵衰奏留薛嵩等分帥河北自為黨援此正干戈不肯休息貞宋本避諱作正觀去聲銅牙弩開元錦獸張花門小箭一作前好此物棄沙場七章借兵外蕃而愁器國家兵仗雖精而收功反在花門慨利不足恃而鹵性終難測也發朱注唐史收東京時郭子儀戰不利回紇於黃埃中十餘矢賊驚顧曰回紇至矣遂潰花門小箭好此一證也安史之亂皆藉回紇兵以收復中國徑弩反失其長技公所以歎之唐六典注釋名弩怒也有怒勢也其柄曰臂似人臂也鈎弦曰牙似牙齒牙外曰郭為牙之規郭也合名之曰機南越志龍川有營澗常有銅弩牙流出氷皆以銀黃雕鏤取之者祀而後得父老云越王弩營處也師氏曰錦獸張設射侯也今按侯畫熊羆當時或以錦為之耳舊注引漢書材官蹶張又云以手開者曰臂張以足踏者曰蹶張或又引尚書虞機張於張字不得其解并錦繡亦少著落矣師氏之說當從此物即指弩張言今日翔麟馬先宜駕鼓車音差無勞問河北諸將去聲角樊作擢一作覺榮華八章諸將留鎮而愁間郭子儀將略威名足以懾服降將今置之散猶翔麟之馬不用於戰陳而先駕鼓車矣彼河北諸將競相角勝榮華誰復起而問之乎秦州詩云仍殘老驌驦此云今日翔麟馬皆惜子儀之不用有感詩云大君先息戰不當息而息也此云無勞問河北當問而不問也俱屬諷詞唐回鶻傳貞觀二十一年骨利幹獻良馬百匹帝取其異者號十驥皆為美名九曰翔麟紫漢書文帝以千里馬駕鼓車朱鶴齡曰河北諸將方以爵上競相雄長朝廷雖有戰馬安所用之時降將羈縻代宗専事姑息公度非兵力所制故云然耳薛蒼舒謂公欲息兵休戰失其㫖矣羅大經曰此詩言雖翔麟之馬亦必先使之駕鼓車由賤而後可以致貴今諸將驟登貴顯如馬之未駕鼓車而遽駕玉輅安於安華志得意滿無復驅攘之志河北叛亂决難計除無勞問也又云雜虜橫戈數功臣甲第高亦此意任轉江淮粟休添苑囿兵由來貔虎士不滿鳳凰城九章衛士糜餉而愁天朱注言禁兵不必添設但當轉運以實京師末二即子有道守在四夷意代宗寵任朝恩由是宦官典兵卒以亡唐公此詩所諷豈徒為冗兵慮哉貔虎注見前鳳凰城指長安盧元昌曰當時漕運取給江淮故史有唐得江淮濟中興之語劉晏均節賦役歲運江淮米數十萬石以給關中若宿衛冗軍不裁立見其匱也此獨孤及有傾天下之財給不用之兵等語至唐制府兵有為兵之利無飬兵之害田不井而兵藏于民最為近古自張說建議請召募壯士充宿衛更番上下兵農遂分乃神策軍尤為非古時魚朝恩以神䇿軍屯禁中分為左右廂居北軍右公曰由來貔虎士不滿鳳凰城隱述祖制以諷時事江上亦秋色火雲終不移巫山猶錦樹南國且黃鸝十章氣候失平而愁且杜臆江上秋色正於錦樹見之乃火雲猶在而黃鸝鳴宜凉反熱其堪耐乎吳論此下三章仍說現前景事每恨陶彭澤無錢對菊花如今九日至自覺酒須賒十一章窮居寂寞而愁酒對菊無錢九日賒酒公與淵明同一貧况但陶則送有人而公則獨酌杯中耳意更寥落矣盈檀道鸞續晉陽秋陶潛九月九日無酒於宅邊摘菊把久之望見白衣人乃王𢎞送酒便就酌而歸病減詩仍拙吟多意有餘莫看平聲江總老猶被疑作佩賞時魚末章總結藉吟詩以遣愁也朱杜臆吟多意有餘所以寫其愁者猶未盡矣注末言已年雖老猶有江總銀魚之賜則流落亦未足為恨也公嘗檢校員外郎賜緋魚袋故云盧注十二章收結於此蓋以望治之意迫為趨朝之想也九玉海蘇氏記云永徽以來正員官始佩魚開元八年月中書令張嘉貞奏致仕及內外官五品以上檢校試判及內俱奉官准正員例佩魚自是恩制賞緋紫必兼魚袋謂之章服齊書謝朓傳蕭子隆在荆州好辭賦朓尤被賞盧世㴶曰此詩中五首所諭時事詞氣淵然黯然偏有雅人深致自瀼西荆扉且移居東屯茅屋四首鶴注公以大厯二年移居東屯當是其時作平于東屯少陵故居記峽中多高山峻谷地少曠東屯距白帝五里而近稻田水畦延袤百頃前帶清溪後枕高岡樹林葱蒨氣象深秀稱高人逸士之居陸游記東屯李氏居已數世上距少陵才三易主大厯初故劵猶在何宇度談資工部草堂在城東十餘里尚有遺址可尋止有一碑存數字題重修東屯草堂記似是元物白鹽危嶠北赤甲古城東平地一川穩高山四面同煙霜凄野日粳稻熟天風人事傷蓬轉吾將守桂叢首章敘移居之事有上四東屯地勢五六東屯秋景末㸃居屯之意後寄裴施州詩云幾度附書白鹽北可見東屯在白鹽之北赤甲之東矣粳稻熟天風上半句因下霜煙凄野日下半句因上顧注公自冬寓夔之西閣再遷赤甲三遷瀼西今又遷東屯一歲四遷不啻如飄蓬之轉故欲守此而不移也邵注山峻而高曰嶠粳稻粳米也昏謝靈運詩序石門新營所住四面高山周王褒詩庭野日黃劉安招隱士桂樹叢生兮山之幽曰桂叢時蓋八月矣東屯復扶又切瀼西一種上聲住清溪來往皆一作兼茅屋淹留為去聲稻畦市喧宜近去聲利林僻此無蹊若訪衰翁語須令平聲賸客迷次章寫居屯之故為東西兩舍總在清溪今特移屯者一穫稻而來一為避喧而至也過客易迷言地僻不減桃源市喧指瀼西公詩市暨瀼西頭可證一種一樣也易㢲為近利市三倍庾信賦晏嬰近市不求朝夕之利其曹植詩欲還絶無蹊陸機詩遊賞愧賸客賸言多也道北馮都使去聲高齊見一川子能渠細石吾亦沼清泉枕帶一作席還相似柴荆即有焉斫畬音餘應平聲費日解纜不知年三章敘東屯鄰居之勝故彼渠此沼共在一川都使高齊隔川望見朱注林泉枕帶兩家相似故柴門之外即可兼而有之道斫畬種植應費時目則解纜而去正未有期也北謂東屯之北陸游少陵髙齊記少陵居夔三徙居皆名高齊其詩曰次水門者白帝城之高齊也曰依藥餌者瀼西之高齊也曰見一川者東屯之高齊也故又曰高齊非一處今按高齊見一川緊接道北馮都使則高齊當屬馮氏之居大約集中高齊有就他人言者如高齊坐林杪是白水崔少府之齊有就自已言者如高齊常見野是梓州所寓之居此皆可證泉趙汸云渠之沼之實字作活字用逺注細石通渠清作沼兩句用倒裝法北史韋敻淡於營利所居之宅枕帶林泉對玩琴書蕭然自逺多申涵光曰柴荆即有焉不成句法薛夢符曰荆楚畬田先縱火燒爐候經雨下種蓋田厯三歲土脉已竭不可復樹藝故須燒榛以肥其土爾雅田三歲曰畬劉夢得竹枝歌長刀短笠去燒畬纜揚雄太𤣥經徒費日也謝靈運詩解候前侣牢落西江外參初簪切差此兹切北户間久遊巴子國吳作宅臥病楚人山幽獨移佳境清深隔逺關寒空見鴛鷺回首憶一作想朝音潮班末章見東屯不可久居以杜臆牢落參差終非娛老之地但臥病旅中取其幽獨清深以自休息耳及見鴛鷺翔空則又想朝班行列公於用世之志終未忘歟牢落寥落也顧注公之北户與馮都使居參差相對瞿巴子國夔州也謝靈運詩幽獨賴鳴琴入蜀記唐關西門正對灔澦堆自關而東即少陵東屯故居不黃生曰鴛鷺不列於朝忽從寒空見之堪回首社日兩篇鶴注編在大厯二年夔州作以詩有絶塞峽中句也顧注社有春秋二社詩言北雁秋風知為秋社作也祀左傳共工氏有子曰勾龍能平水土故以為社九農一作秋豐成德業百祀發光輝報效神如在馨香舊不違南翁巴曲醉北雁塞聲微尚想東方朔詼諧割肉歸首章見社祭而思家品農事告成故社祀皆舉報效言致祭之誠馨香言祭之潔南翁北雁對社時而懷故鄉東方割肉因社事而念頒賜也其顧注扈水鳥也扈有九種以九扈為九農之號各隨事以教民事百祀即社祭穀非土不生故報祭於社神光輝言祭之盛也左傳少皥氏以九扈為九農史記秦紀山川百祀之禮將江總碑文思曷深於報效非謝朓送神歌敬如在禮周書至治馨香又黍稷馨明德惟馨不違祭不失時翁南翁指老人之與祭者因醉而歌巴渝之曲顧注南即南公項籍傳注南方之老人也秋時北雁南來曰塞聲微者憐其逺飛而力竭矣或云借言音書斷絶即所謂北書不至雁無情東方朔傳伏日詔賜從官肉朔拔劍割肉謂同官曰伏日當早歸請受賜即懷肉去大官奏之詔朔自責朔曰拔劍割肉一何壯也割之不多又何廉也歸遺細君又何仁也為西溪叢語此詩詼諧割肉社日用伏日事蘇黃皆以誤按史記諸侯年表古者只有春社秦德公二年始用伏日為秋社磔狗四門以禦災蟲社乃同日至漢方有春秋二社與伏分也漢敘東方贍辭詼諧倡優陳平亦分肉太史竟論平聲功今日江南老他時渭北一作水童歡娛看平聲絶塞涕淚落秋風鴛鷺回金闕誰憐病峽中次章引社事以志感此杜臆言當此社日如陳平分肉一事太史竟以論功今日江南之老即當時渭北之童乃功業無成不如曲逆所以看歡娛而不覺灑涕也此時金闕諸臣分肉而迥又誰憐峽中病客耶俎首句亦字承上文來杜臆太史公論陳平云當割肉上時意已宏逺矣又謂以功名稱賢相此即所謂太史論功也舊注引陸機語社之日至太史占事於此不合江南峽江之南金闕天子象魏也張正見詩金闕銀臺相向來東方之遇漢武曲逆之逢高祖遭際盛時名傳千古公以三朝遺老流落江濵因社日而追論前賢慨古傷情其自負原不淺也司杜詩有首尾聫絡兩章如一章者如散愁詩前以徒收結後以尚書接起社日詩前以方朔收結後以陳平接起皆章法之最巧者也八月十五夜月二首鶴注當屬大厯二年瀼而作與玩月對月兩章蓋一時所作也滿目飛明鏡歸心折大刀轉蓬行地逺攀桂仰天高水路疑霜雪林棲見羽毛此時瞻白兔直欲數所主切秋毫此咏中秋之月云明鏡喻月刀環思歸三四承歸心下四承明鏡顧歸心如大刀之折恨不能還也蓬桂皆秋時物行地逺在夔州仰天髙望長安霜雪羽毛皆寫月色之明秋毫即指兔毫蓋因月中之兔想見地下之兔也飛古樂府藁砧今何在山上復有山何當大刀頭破鏡在天吳競解題藁砧砆也重山出也大刀頭刀頭有環問夫何時當還也破鏡飛上天言月半缺當還也趙汸注以環為還猶言放臣待命境上賜環則返月李德林詩月桂近將攀棗璩詩仰攀桂樹杪天問中何冇玉兔搗藥胡夏客曰毫毛同押微覺有礙稍下去聲巫山峽猶銜白帝城氣沈全浦暗輪仄半樓明刁斗皆催曉蟾蜍且自傾一作清張弓倚殘魄不獨漢家營此咏將曉之月上四月下之景下四月下感時城月傍山頭光氣沈而全浦皆暗浦在山下也月射西輪影側而半樓尚明樓居城上也時將達旦軍士猶張弓而仰殘月蓋竟夜防警矣末見軍旅非一處也全浦魚復浦也持刁十以銅為之軍中警夜者孟康曰晝炊飯食夜擊行五經通義曰月中有兔與蟾蜍何也月隂也蟾蜍陽也而與兔並明隂繫於陽也天老子天之道其猶張弓乎朱注此倚字即長劍倚外之倚日記月者三成魄十六夜玩月舊挹金波爽皆傳玉露秋關山隨地濶河漢近去聲人流谷口樵歸唱孤城笛起愁巴童渾平聲不寐半夜有行舟首從十五形起舊指昨霄秋指中秋三四月下所見五六月下所聞末見行舟而思出峽也月光普照故與關山俱濶天河秋皎儼若傍人而流上句承月下句承秋或云河漢得月而倍明者非月明則天河先掩矣樵歸而唱笛起含愁上四字一讀下一字另讀關黃希曰公於詠月詩多用關山字如曰關山空自寒山同一照蓋因古樂府有關山月也隂秦曰夔州地高去河漢為近月色明故見舟行鏗詩行舟逗逺林胡應麟曰咏物起自六朝唐初沿襲雖風華競爽而獨造未聞唯杜公諸作自開堂奧盡削前規如題咏月則關山隨地濶河漢近人流咏雨則野徑雲俱黑江船火獨明咏雪則暗度南樓月寒深北渚雲咏夜則重露成涓滴稀星乍有無皆精深竒邃前無古人後無來者然格則瘦徑太過意則寄寓太深他鳥獸花木等多雜議論尤不易法十七夜對月鶴注編在大厯二年瀼西作以詩內有茅齊句也秋月仍圓夜江村獨老身捲簾還照客倚杖更隨人光射音石潛虬一作蚪動明翻宿鳥頻茅齊依橘柚清切露華新秋月仍圓喜其未缺江村獨老不覺凄然矣下六句自近而逺自逺而近皆寫出江村月下之景皆寫出老身對月之情字盧云照客隨人正映獨老之身清逺注仍字還字更俱照十七夜言黃生注結以切字綰題以茅齊字見捲簾倚杖所在作法周密龍朱超詩惟餘故樓月逺近必隨人邵注潛虬無角也蜀都賦下高鵠出潛蚪謝靈運詩潛蚪媚幽姿洙曰宿鳥出文選曉望鶴注當是大厯二年東屯作白帝更平聲聲盡陽臺曙色分高峰寒上上聲一作初上杜臆作上寒日疊嶺宿霾一作未收雲地坼江帆隱天清木葉聞荆扉對麋鹿應平聲共爾為羣上二將曉之候中四曉望之景末乃對景感懷也高峰寒上日猶東屯詩言霜煙凄野日寒作活字用與宿字相稱張溍謂高峰寒氣直逼初上之日是也黃生注地坼岸高故江帆隱伏風靜天清故葉落聞聲二語寫景精妙末有超然物外之意宋玉神女賦陽臺之下梁簡文詩曙色始成霞傳又蜜房寒日晚慎謝靈運詩巖峭嶺稠疊魯仲連天崩地坼陽詩江帆得分行吳筠詩天清明月亮子楚辭洞庭波兮木葉下處沈約詩荆扉新且故莊神農之世民與麋鹿共廣絶交論耿介之士歡與麋鹿同羣胡應麟曰盛唐句法渾涵如兩漢之詩不可以一字求至老杜而後句中冇竒字為眼才有此句法便不渾涵昔人謂石之有眼為研之一病余亦謂句中有眼為詩之一病如地坼江帆隱天清木葉聞故不如地卑荒野大天逺暮江遲也如返照入江翻石壁歸雲擁樹失山村故不如藍水逺從千澗落玉山高並兩峰寒也此最詩家三昧具眼自能辨之日暮鶴注當是大厯二年瀼西作牛羊下去聲來久或作夕各已閉柴門風月自清夜江山非故園石泉流暗壁草露滴一作滿秋根一作原頭白燈明裏何須花燼繁上二日暮之事三四思故鄉也五六日暮之景末二感衰年也本是暗泉流石壁秋露滴草根却用顛倒出之覺聲諧而句警時杜臆風月一聫意極悲凉結意尤為悽惋公志在濟而傷於頭白反怪燈燼繁開與待爾嗔烏鵲同意風詩日之夕矣羊牛下來南史褚彥回傳初秋凉夕月甚美楚辭飲石泉兮䕃松柏北山移文石泉咽而下愴有王粲詩草露沾我衣沈約詩草根滴露霜世俗謂喜事則燈結花黃生曰五六抽換可得四聫此轆轤句也公意中以歸朝為喜今頭白如此而歸朝無日何用燈花虛兆為末聫工於鍊句若云自顧頭如雪燈花不用繁便直而少致矣劉連曰五言律詩在盧駱王楊多失粘者後惟陳拾遺晚次樂鄉李翰林登新平樓而巳盛唐諸家無失一焉若拗句則時或有之起聫如二月湖水清家家春鳥啼如人事有代謝往來成古今如暮聲雜初雁夜色涵早秋中聫如風月自清夜江山非故園如江山有巴蜀棟宇自齊梁如離堂思琴瑟如還家劍鋒盡如漸與骨肉逺轉於僮僕親結聫如明朝有封事如還逢赤松子又如子美送逺如摩詰送源長史如孟襄陽裴司士見尋皆有拗句然諧和鏗鏘殊不聱牙後學所宜留心者暝當是大厯二年東屯作日下去聲四山隂山暝嵐氣侵牛羊歸徑險鳥雀聚枝深正枕當星劍收書動玉琴半扉開燭影欲掩見清砧牛羊鳥雀是山暝屬外景當劍動琴是庭暝屬內景末二則寫全暝之候矣四山東屯四面皆山也險字深字俱從暝字想出既逺注正枕而誤當劍收書而誤動琴以室暝故耳夕應傳呼於無形處想出有聲欲掩見清砧於無聲處描出冇影摹夜景入細如此貴妃誄山庭侵日謝靈運詩夕曛嵐氣隂謝莊宣越絶書寶劍篇觀其䤨爛如列星之堂觀其光如水溢於塘吳越春秋此吾前君之劍中有七星江淹畫扇賦玉琴兮珠徽琴賦徽以荆山之玉桓劉庭芝搗衣篇盼青砧兮悵盤黃生曰前景後事終篇不露已意此即景遣興之作也又曰公筆能巨能細巨則函蓋乾坤細乃析分絲理如五六敘瑣事極其精工晚唐人自宜拱手而服以其鍊字大方故也晚當是大厯二年東屯作故有耕稼之句杖藜尋巷晚一作晚巷炙背近去聲牆暄人見幽居僻吾知拙養尊朝音潮廷問府主耕稼學山村歸翼飛棲定寒燈亦閉門首記薄晚之事末記薄晚之景中乃自敘已情山僻則與世無關尊則自得其趣朝問府主耕學農見野人不知國事矣末言與物偕息寫出優游自在之意黃生注初貪暴背傍晚始歸起二用倒裝幽居承上拙養起下末句燈字應巷晚寒字應牆暄詩律之細宜公自道也莊子原憲杖藜而應門邵注府主太守也晉書孫楚傳參軍不敬府主寒曹植詩歸鳥赴喬林翩翩厲羽翼庾信詩鳥棲不定夜鶴注當是大厯二年作絶岸風威動寒房燭影微嶺猿霜外宿江鳥夜深飛獨坐親雄劍哀歌歎短衣煙塵繞閶闔白首壯心違猿宿鳥飛承風威此夜中景獨坐哀歌承燭影此夜中事末承三聫傷暮年不能靖亂也杜臆嶺猿不啼畏風而宿江鳥不宿畏風而飛皆夜景之可悲者親雄劍尚思救世歎短衣不能庇身矣鶴注大厯二年九月吐蕃寇靈州邠州郭子儀屯涇陽京師戒嚴故有末二語蘆木華海賦絶岸萬丈蕪城賦蔌蔌風威江總詩花霜外白楚史記孟子傳惠王屏左右獨坐而再見之歌列士傳王命鏌邪鑄雙劍一雌一雄左思詩哀和漸離白淮南子寧戚飯牛車下擊牛角而為商歌曰南山粲日爛短布單衣適至骭長夜漫漫何時旦史記叔孫通服短衣法蔡琰胡笳烟塵蔽野兮胡鹵盛崇水經注魏明帝上太極在洛陽南起太極殿於漢德殿故處改雉門為閶闔門巳樂府詞烈士暮年壯心不九月一日過孟十二倉曹十四主簿兄弟鶴注此大厯二年寒露日作倉孟居與公舍相近不在城市中三通典兩漢冇曹吏主倉庫唐京兆河南太原府置倉曹參軍各二人餘各一人藜杖侵寒露蓬門起舊作啓曙煙力稀經樹歇老困撥書眠秋覺追隨盡來因孝友偏清談見滋味爾輩可忘年上四敘事言過訪之誠下四敘情言訪孟之故讀黃注寒露雖㸃曙色亦見此日正交此節也前詩言書秋樹根故知經樹撥書皆指孟園中公因其孝友故偏與追隨不覺將盡二句乃倒裝清談見滋味有德且有言也起作蓬門啓是門啓作起曙煙是起煙以上句例之作為當何遜詩厯稔共追隨詩張仲孝友黃注地一隅曰偏人一意亦曰偏言不他往也公詩好用偏字東漢書孔公緒清談高論噓枯吹生文心雕龍滋味流於字句與後漢書衡始弱冠孔融年四十為忘年交孟倉曹步趾領新酒醬二物滿器見遺去聲老夫鶴注當是大厯二年秋作且黃生注製題即見手法二物係新成兼又滿器自領而來皆深荷來客之意趾劉楨詩步慰我身楚岸通秋屐胡牀面夕畦籍一作藉糟分汁滓甕醬落提攜飯糲音辣添香味朋來有醉泥理生那免俗方法報山妻通屐而來面畦遙見敘出步趾親領志其意之誠酒可醉朋醬多流落又敘滿器見遺言其情之厚末則兼美製法之精也嫌黃注起聫賔主對敘州洪注此詩前新後趣中四不朴拙魏裴潛為兖太守嘗作一胡牀及其去留以挂柱具枕麯籍糟出劉伶酒德頌此對甕醬言籍乃漉酒之嵇康哀樂論篩酒之囊笮具不同楊慎曰古書中笮具僅見此笮或作醡俗字也或以分汁滓為分惠非也竹牀笮酒分出汁滓其清汁為酒濁滓則糟也周禮醴齊注云醴猶體也成而汁滓相將邵注即今之甜酒周禮醬用一百二十甕此甕醬所本司凡新醬入甕有時浮溢故提攜而來常有旁落者馬遷傳堯舜糲粱之食漢書孔顗之傳一日不齊醉如泥謂醉後頽倒如泥舊注謂泥乃東海蟲名得水則活失水則醉恐屬臆說公詩有云組練去如泥亦可云海蟲乎聊抱朴子退則參陶白之理生世說阮咸曰未能免俗復爾耳髙士傳陳仲子贊楚相敦求山妻了算送孟十二倉曹赴東京選去聲作鶴注當是大厯二年唐志太宗時以歲旱榖貴東人選者集於洛州謂之東選洛即東京也殆自此為例故至大厯年間猶然公大厯元年至夔常與孟倉曹兄弟往還賦孟氏好兄弟是也君行别老親此去苦家貧藻鏡留連客江山憔悴人秋風楚竹冷夜雪鞏梅春朝夕高堂念應平聲宜綵服新親老家貧而赴選上四寫孝子之心春秋朝夕之繫念下四說慈親之意只現前尋常語而關於至性讀之悱惻入情之銓部鑒别人材故曰藻鏡楚竹去夔之時鞏梅到京日末聫十字成句韓詩外傳曾子曰吾初為吏祿不及釡尚欣欣而喜者非以為多也樂其逮親也既沒之後吾嘗南遊於楚得尊官焉堂高九尺傳車百乘然猶北面而涕泣者非為賤也悲不逮親也故家貧親老不擇祿而仕晉書太康四年制曰藻鏡銓衡易林貴貨賤身久留連客竹後漢逸民傳憔悴江海之上周𢎞正詩齊紈將楚從來本相逺何遜與范雲連句詩洛陽城東西却作經年別昔去雪如花今來花似雪夜雪鞏梅本此唐書鞏縣屬東都河南府憑孟倉曹將書覓土婁舊莊鶴注公以乾元戊戌冬往洛陽次年春歸華州至大厯二年丁未為十載曹土婁河南地名公昔居偃師舊莊在焉時孟倉赴東都故託以訪問舊莊平居喪去聲亂後不到洛陽岑為去聲厯雲山問無辭荆棘深北風黃葉下去聲南浦白頭吟十載上聲江湖客茫茫遲暮心首二舊莊三四憑孟五六别時景七八將書意平杜臆末云遲暮心蓋有丘首之思詩喪亂既棘蔡琰曲雲山萬重兮歸路遐送道德經師之所處荆生焉楚辭交余手兮東行美人兮南浦别賦送君南浦傷如之何時在魚復浦也上吕氏春秋中牟子身在江湖之簡吳郎司法鶴注大厯二年公移居東屯以瀼西草堂借吳寓居而簡之也杜臆此即用詩當簡注顧注吳必公之姻婭故稱為郎親之也朱唐書府州各有司法參軍事有客乘舸自忠州遣騎去聲安置瀼西頭古堂本買藉疏豁借汝遷居停宴遊雲石熒熒高葉曙一作曉風江颯颯亂帆秋却為姻婭過逢地許坐曾同層軒數所角切散愁此章為吳郎借居而作也乘舸而至遣騎往迎見賔主之情昔藉疏豁今停宴遊以借居故也五六疏豁之景七八遷居後事間逺注次聫上四字連讀下三字另讀氣顧注雲石之光彩閃動以髙葉當曙也風江之上象肅森以亂帆逢秋也也此本公堂欲坐軒而散愁反問吳見許此相謔之詞忠州古本巴地今屬四川重慶府燭湛茂之詩離離插天樹磊磊間雲石婭秦嘉詩熒熒華栁暉詩颯颯避霜葉詩瑣瑣姻爾雅婦之父母壻之父母相謂為昏姻兩壻相謂曰婭層繁欽酷暑賦蒸我層軒杜臆堂為吳之內室故坐軒又呈吳郎鶴注此與前篇一時作堂前撲棗任西鄰無食無兒一婦人不為去聲困窮寧有此祗緣恐懼轉須親即防一作知逺客雖多事便一作使插疏籬却任一作甚真已訴徴求貧到骨正思戎馬淚盈巾此章告以恤憐之道也上四憫鄰婦下四諭吳郎於無食無兒一婦人句中含四層哀矜意通章皆包攝此三言宜見諒其心四言當曲全其體婦防客時懷恐懼吳插籬不憐困窮矣訴徴求述鄰婦平日之詞思戎馬念亂離失所者衆也陸陶潛詩桃李羅堂前撲詩八月剝棗毛注云剝擊也德明音普卜切正是也容齊隨筆王安石作詩新經解剝棗云剝者剝其皮而進之所以養老也後從蔣山郊步至民家問其翁安在曰去撲棗始悟前非甚矣注書之難也棗漢書王吉居長安東家有大棗樹垂吉庭中吉婦取以噉吉吉知之乃去婦庾肩吾啓池通西舍之流忩映東鄰之棗弗西鄰見易既濟賈誼新書大禹曰民無食也則我能使也人晉書皇天無知鄧伯道無兒懼宋玉神女賦見一婦潛夫論懷憂憒憒皆易恐楚辭去鄉離家兮徠逺客甚晉書鄭冲傳任真自守海老子其精真應璉詩徴求傾四此詩是直寫真情至性唐人無此格調然語淡而意厚藹然仁者痌瘝一體之心真得三百篇神理者盧世㴶曰杜詩溫柔敦厚其慈祥愷悌之衷往往溢於言表如此章極煦育鄰婦又出脫鄰婦欲開示吳郎又回護吳郎八句中百種千層莫非仁音所謂仁義之人其言藹如也朱翰曰通篇借一婦人發明誅求之慘當與哀哀寡婦誅求盡參看真此章流逸純是生機前章枯拙全無風韻杜詩之假得失可見矣晚晴吳郎見過平聲北舍吳郎借居瀼西草堂當在大厯二年之秋其見過北舍即在此時詩曰明日重陽酒相迎自醱醅而九日詩又云重陽獨酌杯中酒蓋訂吳不至而自飲歟圃畦新一作佳雨潤愧子廢鉏來竹杖交頭拄柴扉掃一作隔徑開欲棲羣鳥亂未去小童催明日重平聲陽酒相迎自醱醅醱音潑醅鋪杯切初喜其過既惜其去而又望其來此直敘情事有朴質自然之致黃注吳取捷徑而來叩其後扉故詩言掃徑而題曰舍北即所謂鉏斫舍北果林枝蔓者也莊子漢隂丈人方將為圃畦黃庾信春賦石榴聊泛葡萄醱醅李白詩葡萄自醱醅生注醱與潑同旋入水也自醱醅以親酌為敬也鍾談注杜好從冷處著眼多涉纎詭然詩中刻畫傳神標舉自足醒目如竹杖交頭柱寫兩人對立之狀胡牀面夕畦寫主人逺望之情白益毛髮古儼見髙人道貌風神蕩江湖可想雅人深致詩中有畫寫生絶妙九日五首鶴注此當是大厯二年䕫州作舊史是年九月吐蕃寇邠州靈州京師戒嚴故云佳辰對羣盜未吳若本云缺一首趙次公以登髙一首足之固嘗缺顧注五章皆一時之作隨興所至體各不同重平聲陽獨酌一作少飲杯中酒抱病起一作獨一作豈登江上臺竹葉於人既無分音問菊花從此不須開殊方日落𤣥猿哭舊國霜前白雁來弟妹蕭條各何在一作往干戈衰謝兩相催首章思弟妹也上四敘事傷情下四對景有感想本是登臺酌酒起用倒敘法耳曰獨酌意中便及弟妹矣曰人無分恨弗飲也曰不須開恨弗同看也顧注殊方猿哭益增獨處之悲故國雁來適動雁行之念兩句緊注末聫干戈既侵衰謝又迫恐兩相催逼終無聚首時也結意十分慘切魏文帝論九為陽數日月並應名曰重陽酒荆楚歲時記九日登髙飲菊花酒江總詩獨酌一樽江張衡七辨𤣥酒白醴萄萄竹葉張華輕薄篇蒼梧竹葉靑宜城九醖酒洙曰竹葉酒名也吳越春秋分州殊方蜀志秦宓曰聽𤣥猿之悲鳴霜莊子梁君出獵見白雁羣鮑云白雁似雁而小來則降北人謂之霜信顧注干戈指吐蕃入寇左傳日尋干戈衰劉孝標書容髮謝黃生曰岑參詩云見雁思鄉信間猿積淚痕與五六意同而十四字之融㑹蘊藉更過彼十字也舊日重平聲陽日傳杯不放杯即今蓬鬢改但愧菊花開北闕心長戀西江首獨回茱萸一作萸房賜朝音潮士難得一枝來次章思朝士也上四傷老下四懷君傳首聫亦承前章來因今日之不飲而思舊日之杯也菊花茱萸㸃九日事飲杜臆傳杯不放杯見古人只用一杯諸客傳唐制九日賜宴及茱茰劉禹錫曰茱萸二字經三詩人皆已道亦有能否焉杜公言醉把茱茰子細看王右丞遍插茱萸少一人朱倣學他年少插茱茰杜公為最優也今按杜公五律亦屢用茱萸此云茱茰賜朝士難得一枝來亦見韻致舊與蘇司業兼隨鄭廣文采花香泛泛一作簇簇一云漠漠坐客醉紛紛野樹欹一作歌還倚秋砧醒却聞歡娛兩冥漠一作寞西北有孤雲三章思故交也上四敘往日歡娛下四歎今此寂寞客醉承前傳杯冥漠謂蘇鄭俱亡歡司業蘇源明也廣文鄭䖍也冥哀江南賦於時朝野娛陸機弔魏武悼繐帳之漠長安在䕫州之西北雲魏文帝詩西北有浮雲陶潛詩有停章言思念親友也故里樊川菊登高素滻所簡切源他時一笑一作醉後今日幾人存巫峽蟠江路終南對國門繫音計舟身萬里伏枕淚雙痕為客裁烏帽從兒具緑樽佳辰對一作帶羣盜愁絶更堪一作誰論平聲䕫四章思故里也上四樊川九日下四州九日中四則在䕫思樊幾人存承上蘇鄭萬里在巫峽淚痕憶終南裁烏帽見獨居兒具尊見無客對羣盜欲歸不得矣長安志樊川一名後寬川在萬年縣南三十五里鶴注十道志其地即杜陵之樊鄉漢髙祖以賜將軍樊噲食邑於此故曰樊川公之父為奉天令因家焉北西征賦南有𤣥灞素滻長安志少陵原南接終南山直滻水烏帽暗用孟嘉事亦兼用管寧皂帽家居事登高鶴注舊編成都詩內按詩有猿嘯哀之句定為䕫州作風急天高猿嘯哀渚清沙白鳥飛回無邊落木蕭蕭下去聲不盡長江滚滚一作衮衮來萬里悲秋常作客百年多病獨登臺艱難苦恨繁霜鬢潦倒新亭停通濁酒杯此章總結上四登高聞見之景下四登高感觸之情登臺二字明與首章相應猿嘯鳥飛落木長江各就一山一水對言是登臺遙望所得者而上聫多用實字寫景下聫多用虛字摹神羅大經曰萬里地遼逺也秋時慘悽也作客羇旅也常作客久旅也百年暮齒也多病衰疾也臺高回處也獨登臺無親朋也十四字之間含有八意而對偶又極精確彌唐解久客則艱苦備嘗病多則潦倒日甚是以白髮添酒杯難舉此詩八句皆對黃生謂結調須放鬆庾梁簡文帝詩風急旌旗斷詩陶潛詩天高風景微信詩猿嘯風還急王褒對岸流沙白兮楚辭鳥飛還故鄉颯江賦尋之無邊籍楚辭洞庭波木葉下又風颯兮木蕭蕭阮詩湛湛長江水里說文滚滚相繼不絶也時魏文帝樂府逺從軍旅萬客楚辭皇天平分四兮竊獨悲此凛秋養生論中夀百年險史記留侯性多病臺以娛情左傳阻艱難備嘗之矣曹植賦聊登詩正月繁霜子夜歌霜鬢不可視杯絶交論潦倒粗疏斷魏文帝樂府嘉肴不嘗㫖酒停朱注時公以肺疾酒曰新停濁絶交論酒一杯胡應麟曰此章五十六字如海底珊瑚瘦徑難移沉深莫測而精光萬丈力量萬鈞通章章法句法字法前無昔人後無來學此當為古今七言律第一不必為唐人七言律第一也元人評云一篇之內句句皆竒一句之中字字皆竒二又曰黃鶴樓鬱金堂皆順流直下故世共推之然作興㑹誠超而體裁未密丰神故美而結撰非艱若風急天高則一篇之中句句皆律一句之中字字皆律而實一意貫串一氣呵成驟讀之首尾若未嘗有對者胸腹若無意於對者細繹之則錙銖鈞兩毫髮不差而建瓴走坂之勢如百川東注於尾閭之窟至用句用字又皆古今人必不敢道決不能道者真曠代之作也又曰此篇結句似微弱者第前六句既極飛揚震動復作峭快恐未合張弛之宜或轉入别調反更為全首之纍只如此軟冷收之而無限悲凉之意溢於言外未為不稱也昆明池水雖極精工然前六句力量微減一結竒甚竟似有意凑砌而成益見此超絶云張綖曰少陵詩有二𣲖一𣲖立論宏濶如此篇萬里悲秋常作客百年多病獨登臺及二儀清濁還高下三伏炎蒸定有無等作其流為宋詩本朝莊定山諸公祖之一𣲖造語富麗如珠簾繡柱圍黃鵠錦纜牙檣起白鷗魚吹細浪搖歌扇燕蹴飛花落舞筵等作其流為元詩本朝楊孟載諸公祖之覃山人隱居鶴注公詩有云南極青山衆乃指䕫州而言今此詩亦云南極知覃山人在䕫州也居顧注覃山人必老而就徴者公過其隱之所而傷其隱之不終也南極老人自有星北山移文誰勒銘徴君巳去獨松菊哀壑無光留户庭豫見亂離不得已子知出處上聲必須經高車駟馬帶范濂本作常傾覆音福悵望秋天虛翠屏上四譏徴君之輕出下責其不能審時見幾也雖吳論老人在山誰得移文誚之無如一去之後松菊存而山川少色矣因歎亂離以來豫不已而奔走今出處之途子必經厯而始知耳每見榮寵所在傾覆隨之何若隱居自得乎祗令我悵望秋山而傷翠屏之虛設也人黃生注結句深秀足救前路之朴素此詩舊作山已卒公過其故居而稱美之以出處必須經謂山人能守經也今依朱注語含諷刺趙次公曰老人星一名南極在井栁之間乃南方之星山人隱居此地可當此星孔選注周顒先隱都北鍾山後出為海鹽令欲過北山稚圭乃假山靈意作文移之中云馳文驛路勒移山庭朱注齊書元徽中顒出為剡令建元中為山隂令未嘗令海鹽選注誤一統志因而誤又曰徴君二句即移文誘我松桂欺我雲壑也演義漢魏以來隱士名之曰徴君後漢韓康傳亭長以韓徴君當到方修道橋虛歸去來辭三徑就荒松菊猶存殷仲文詩哀壑叩牝易不出户庭隨詩亂離瘼矣兮道德經吾見其不得巳歌傳咸鳳賦時宜以行藏諒出處之有經四皓駟馬高蓋其憂甚大天台賦搏壁立之翠屏盧世㴶曰詩言徴君巳去獨松菊哀壑無光留户庭其人尚在而詩乃有矢盡弦絶之意蓋有為而作不止憑弔其居止也東屯月夜此亦二年秋東屯作抱病漂萍老防邊舊穀屯音豚春農親異俗歲月在衡門從東屯敘起兵杜臆據困學記聞東屯之田公孫述所開以積穀養者故云防邊舊榖屯自春至秋故云歲月之詩衡門下青女霜楓重黃牛峽水喧泥留虎鬭跡月掛客愁村喬木澄稀影輕雲倚細根中記月夜之景靜秋深故霜落重夜故水聲喧虎留迹見地險月掛村見身孤稀影木梢葉脫細根雲起石邊青女注見本卷杜臆黃牛峽在夷陵而此云黃牛峽水喧又寄弟詩云青春不假報黃牛意䕫州亦有此峽但今不可考耳吳均詩挂月青山下臆張協詩雲根臨八極杜石為雲根拆用自新數所角切驚聞雀噪暫睡想猿蹲日轉東方白風來北斗昏天寒不成寐一作寢無夢寄一作有歸魂末乃夜卧感懷夢倐驚倐睡思及長安故瞻北斗而寢不成此章四句起下二段各六句必薛道衡詩猴猿或蹲跂昏杜臆猴性動猿性靜靜善睡故睡時想之北斗喻京師尚亂也黃生曰此因月夜不寢而作首尾見羇旅之意妙在先安首五字覺全篇字字寫景字字寫情雞聲茅店月人跡板橋霜此晚唐人佳句歐陽送張祕書歸莊云鳥聲梅店雨栁色野橋春可謂善於摹擬若杜詩泥留虎跡月掛客愁村巳先有此刻畫語矣東屯北崦鶴注當是大厯二年秋作是年有栁靈州之寇故云戰地北崦東屯之北山阿也盜賊浮生困誅求異俗貧空村唯見鳥落日未一作不逢人步壑風吹面看平聲松露滴身逺山回白首戰地有黃塵此經北崦而有感也當時崔旴之亂兵興賦重故逃亡衆而居人少壑風松露言秋景荒凉回首戰地傷吐蕃寇邊也只顧注謂山起黃塵如見古戰場之色非是玩起二語言崦人之貧困耳其地未嘗經戰伐也無王粲登樓賦白日忽其西匿鳥相鳴而舉翼原野閴其人征夫行而未息逺山指北崦回首回望北邊也從驛次草堂復至東屯茅屋二首一本無茅屋二字鶴注當是大厯二年冬作而此從驛借馬暫次瀼西之草堂復至東屯也峽陳作山內一作裏歸田客一作舍江邊借馬騎非尋戴安道似向習家池山一作地一作峽險風煙僻陳作合天寒橘柚垂築場看平聲斂平聲積音志一學楚人為此章從驛次至東屯下四敘其景事公騎馬不乘船故非訪戴而似向習假恨賦罷歸田里戴詩九月築場圃申涵光曰道池對句法亦竒安道見二十一卷習家池見四卷短景同影難高卧衰年强去聲此身山家蒸栗暖野飯音反射音石麋新世路知交薄門庭畏客頻牧童斯一作須在眼田父實為鄰次章檢稻而嘗時食下四有避世意重短景秋冬日影也若作老景說與衰年犯泛交無益願與田牧為伍惟農務可以養身也麋謝朓詩高卧猶在兹王逸玉論黃侔蒸栗左傳興於前射麋麗龜世王粲詩悠悠路暫往一作住白帝復還東屯鶴注此大厯二年秋作復扶乂切作歸田去猶殘穫稻功築場憐穴蟻拾穗許村童落杵光輝白除一作殊芒子粒紅加餐可扶老倉廪一作庾慰飄蓬上四東屯收稻下言旅食可資注歸田復還屯上也猶殘刈穫未完也邵三四見仁民愛物之意秉詩十月穫稻古詩九月築場圃又彼有遺此有滯穗詩努力加餐飯茅堂檢校收稻二首此是大厯二年東屯作田盧注瀼西有果園而無稻公以課園責之竪子以稻畦責之行官前詩自明鶴注作瀼西茅屋誤矣香稻三秋末平田一作疇百頃間喜無多屋宇幸不礙雲山御夾夾同侵寒氣嘗新破旅顔紅鮮終日有玉粒未吾慳此章敘東屯收稻之事收上四喜茅堂地曠下四喜檢校多穫杜臆絡繹回故云終日有寫出貧家暴富光景有百頃也詩如三秋兮蒻百頃通計屯內之田非公秋興賦藉莞御夾衣吕氏春秋孟秋之月農乃升穀天子嘗新日逺注稻有紅白二種粒紅鮮紅稻種名李百藥詩落照紅鮮沈約詩玉晨炊稻米炊能白秋葵煮復扶又切新誰云滑易音異飽老藉軟俱勻種上聲幸房州熟苗同伊闕春無勞映渠碗自有色如銀次章嘗稻而嘉其色味美上四以秋葵形稻米五六以故鄉嘉種比東屯稻皆借客意相形滑指葵軟指飯俱勻言二物配食如銀言其白可愛喜自秦隴赴蜀十載流離今見秋成刈穫故慶有年而旅食次年適荆南又有朝夕不給之憂矣竹唐書房州房陵郡屬山南東道武德元年析遷州之山上庸置顧注伊闕縣屬河南府公有莊墅在焉西魏文帝車渠碗賦序車渠玉屬也多纖理縟文生於國其俗寶之陸倕蠡杯銘用邁羽杯珍逾渠碗渠碗以渠石為碗老晉白紵歌質如輕雲色如銀顧云此與莫笑田家瓦盆傾銀注玉驚人眼同意黃生曰此詩極贊稻米之白而溪上詩又言山田飯有沙何耶蓋溪上就瀼西言惟此處田不佳故復置田於東屯公嘗往來兩地瀼西其本居菜園在焉東屯則因收穫而往居耳黃鶴以此詩為自東屯反瀼西作非也刈稻了詠懷鶴注此大厯二年冬作故黃生注此感歸期無日終年旅食因穫稻以起興稻穫空雲水川平對石門寒風疏草一作落木旭一作曉日散雞豚一作㹠野哭初聞戰樵歌稍出村無家問消息作客信乾坤上四刈稻後野曠冬寒之景下則傷亂思歸所謂詠懷也黃注三四承上五六起下此兩截正格始散雞豚田有餘粒也初聞戰因哭而知稍出村農畢樵杜臆兵戈定而歸家此公之素志今已無家可問消息則彼此均之作客一任乾坤之位置而已意欲藉此地以偷安也黃生注東渚耗稻詩豎苗亦已穊雲水漲方塘此苗在水中之景今穫稻則雲水為之空廓矣石門水中對立如門水落而後石出故曰平川對石門石趙曰石門即所謂雙崖壯此門也舊引蜀都賦阻以門注云石門在溪中之西於此無預前詩旭日始旦聞束晳勸農賦雞豚爭下壺榼橫至初詩野哭千家戰伐指崔旴之亂是年無事而云聞戰者意蜀兵逺戍戰沒而信歸也當指吐蕃寇靈州事季秋蘇五弟纓江樓夜宴崔十三評事韋少府姪三首鶴注編在大厯二年峽險江驚急樓高月迥明一時今夕㑹萬里故鄉情星落黃姑渚秋辭白帝城老人因酒病堅坐看君傾黃注一二江樓五六季秋三四兼敘賔主七八専述已意此虛實相間格也一時今夕㑹萬里故鄉情能將同㑹賔主括在兩句之中夜將盡故星落秋將謝故云辭荆顧注已不能飲而待人飲老人戀戀故鄉之情也楚歲時記黃姑即河鼓方以智通雅黃姑當為河鼓見天官書說文引河鼓是荷負也故俗名擔鼓星古樂府東飛伯勞歌黃姑織女時相見杜詩用星落黃姑渚蓋因河鼓音近而訛為黃姑耳爾稚河鼓謂之牽牛博議遂以黃姑為牛宿之異名恐非杜臆黃姑渚即天河季秋昏定天河沒而星亦俱落矣僞蘇注所引忠州黃惠女事本屬妄撰近㑹粹又託為十道志更謬黃生曰五六綴入天文輿地又拈出星秋二字特見工巧與水落魚龍夜山空鳥雀秋地濶峩睂晚天高峴首春皆名對也人又曰漫看年少樂忍淚已霑衣令人刻不可耐老因酒病堅坐看君傾令人戀不容捨匡說詩解人頥豫於杜公亦云對月那無酒登樓况有江聽平聲歌驚白鬢笑舞拓秋窗樽蟻添相續沙鷗並一雙盡憐君醉倒更覺片一作我心降户江切發此承上堅坐看君傾君江月既可尋歡歌舞又堪興此時添酒對鷗諸正宜取醉也公以病酒斷飲故曰心降酒舊編誤在末今移作次章為當那無酒言何嘗無笑舞見舞而笑拓秋窗觀月色也鼎曹植七啓盛以翠樽酌以雕觴浮蟻沸酷烈馨香詩我心則降明月生長好浮雲薄漸一作暫遮悠悠照逺一作邊塞悄悄憶京華清動杯中物高隨海上槎宜作查不眠瞻白兔百過落烏鴉一作紗遮此承上萬里故鄉情賦明月初生忽被雲如關塞之隔京華此而兼比清動見月光之近高隨想月照之逺不眠而瞻兔鴉其意仍在京華也白兔指月烏鴉百過月下久坐也杜臆疑此章泛咏秋月無關江樓之宴今按前二章巳盡同宴情事末章則専述已意耳生乃哉生明之生謝莊月賦升清質之悠悠詩陶潛詩天運苟如此且盡杯中物海上槎見秋興劉孝綽詩植叢映玉兔别本作百過落烏紗言月移百度照於紗帽其說終曲戲寄崔評事表姪蘇五表弟韋大少府諸姪此與三章乃同時先後之作隱豹深愁雨潛龍故起雲泥多仍徑曲心醉沮賢羣忍對東觀餘論作對他本作待江山麗還披鮑謝文髙樓憶疏豁一作濶秋興去聲坐氤氲上四沮雨有懷下約晴時往晤語杜臆此以豹自方以龍比崔蘇輩起涉於戲詞江江山麗謂秋日晴光鮑謝文指三人所作憶疏豁思樓之宴坐氤氲言意興之濃列女傳陶答子妻諫其夫曰南山有𤣥豹霧雨七日不下食者欲以澤其衣毛而成其文章也易潛龍勿用又雲從龍梁元帝詩斜峰繞徑曲醉晉書太原郭奕髙爽為衆所推見阮咸而心鮑謝鮑照謝靈運也季秋江村鶴注當是大厯二年作喬木村墟古疏籬野蔓懸素一作清琴將暇日白首望霜天登俎黃甘重支牀錦石圎逺遊雖寂寞難見此山川上四秋村之景下四秋村之情錦撫素琴則清音入耳望霜天則丹楓寓日且對黃甘石雖貧亦可以自樂矣非顧注公方圗出峽而曰難見此山川則知出峽之故為山水不可居也峽中覽物詩嘗言之矣形勝有餘風土惡於墟大丘庾信賦搖落小村墟薛顧注將送也毛詩逺將之此言藉琴以遣暇日道衡詩霜天斷雁聲龜胡夏客曰重字圓字最善狀物牀左傳不登于俎策傳南越老人用龜支牀足支用襯牀足也石庾肩吾詩錦鎮浮橋小園鶴注當是大厯二年秋瀼西作庾信有小園賦由來巫峽水本是楚人家客病留因藥春深買為去聲花秋庭風落果瀼岸雨頽沙問俗營寒事將詩待物華上四置園之故五六園前景七八園中事花巫峽之水本楚人所居今置園於此者總為蒔藥種計耳留買指園華黃生注此詩秋時所作春深而買追憶前事寒事物又豫計冬春也杜臆園中寒事如秋藥冬菁皆是素不習慣故問俗而營在又云以詩敘事為難在律詩尤難此章該括四時妙錯綜見意陸倕詩江關寒事早寒事禦寒之事寒雨朝行視園樹鶴注此當作於大厯二年之秋柴門擁一作雜樹向千株丹橘黃甘此一作北地無江上今朝寒雨歇籬中秀一作邊新色畫屏舒一作紆鮑首記視園樹照與妹書吾自發寒雨彥陸機詩秀色若可餐徐伯詩畫屏繞金膝桃蹊李徑年雖古一作故梔子紅椒艷復扶又切一作色殊鎖石藤梢元自落倚一作到天松骨見音現來枯林香出實垂將盡葉蒂辭一作離枝一作柯不重義從平聲讀用去聲蘇愛日恩光䝉借貸清霜殺氣得憂虞次申籬中秀色枝桃李椒梔藤梢松骨所謂擁樹也林香出實葉蒂辭所謂甘橘也愛日清霜寒天朝景借貸憂虞代為園樹計也徑漢書李廣傳贊桃李不言下自成蹊顔師古注蹊為道重蘇猶云復生左傳注冬日可愛趙江淹上建平王書惠以恩光顧以顔色次公曰仲秋之月殺氣浸盛衰顔動一作覓藜牀坐緩步仍須竹杖扶散騎去聲未知雲閣處啼猿僻在楚山隅末乃朝行感懷於言不能如散騎之身登雲閣徒聽猿聲山峽耳此七言排律也中間八句首尾各四句記管寧家貧坐藜牀欲穿好學不倦又北堂書抄英雄向詡常坐藜牀上國策緩步以當車寓費長房投竹杖於葛陂雲秋興賦序潘安以太尉掾直於散騎文省髙閣連陽景罕曜夙興晏寢匪遑底寧於是慨然而作秋興賦公瀼西詩有果園有甘林果園四十畝他日所舉以贈人者甘林為治生計所云客居暫封植者杜臆謂朝行所視之園樹専指果園於甘林無豫故云丹橘黃甘此地無今按此地無正言柑橘之獨盛篇中林香出實二語明說丹橘矣豈可云甘林又在果園之外乎大抵分而言之則甘林另為一區合而言之甘林包在果園之內蓋四十畝中自兼有諸果也洪容齊隨筆曰唐人詩文或於一句中自成對偶謂之當句對蓋起於楚辭蕙蒸蘭藉桂酒椒漿桂櫂蘭枻斫冰積雪自齊梁以來江文通庾子山諸人亦如此如王勃宴滕王閣序一篇皆然謂若襟三江帶五湖控蠻荆引甌越龍光牛斗徐孺陳蕃騰蛟起鳳紫電青霜鶴汀島渚桂殿蘭宫鐘鳴鼎食之家青雀黃龍之軸落霞孤鶩秋水長天天高地逈興盡悲來宇宙盈虛丘墟巳矣之辭是也杜詩小院回廊春寂寂浴鳬飛鷺晚悠悠清江錦石傷心麗嫩蕊濃花滿目斑書籖藥裹封蛛網野店山橋送馬蹄戎馬不如歸馬逸千家今有百家存蛟龍引子過荷芰逐花低干戈况復塵隨眼鬢髮還應雪滿頭百萬傳深入寰區望匪他象牀玉手萬草千花落絮遊絲隨風照日青袍白馬金谷銅駝竹寒沙碧橘刺藤梢長年三老捩拖開頭門巷荆棘底君臣豺虎邊飬拙干戈全生麋鹿捨舟䇿馬拖玉腰金髙江急峽翠木蒼藤古廟杉松歲時伏臘三分割據萬古雲霄伯仲之間指揮若定桃蹊李徑梔子紅椒庾信羅含春來秋去楓林橘樹復道重樓之類不可勝舉李義山一詩其題曰當句有對云密邇平陽接上蘭秦樓鴛瓦漢宫盤池光不定花光亂日氣初涵露氣乾但覺游蜂饒舞蝶豈知孤鳳憶離鸞三星自轉三山逺紫府程遙碧落寬是全用當句對也杜詩句法後人用之而工拙不同如映階碧草自春色隔葉黃鸝空好音張子野題和靖隱居云湖山隱後家空在煙雨詞亡草自青語稍直而尚有逸致如鎖石藤梢元自落倚天松骨見來枯子瞻則云面頰照人元自白眉毛覆眼見來烏全涉俚俗風韻何存如峽束滄江起巖排古樹圎蘇子美云峽束滄淵深貯月巖排紅樹巧裝秋只增移數字而語却冗贅又如山市戎戎暗江雲淰淰寒明李獻吉云層崖客到蕭蕭雨絶頂人居淰淰寒張助父云肅肅哀鴻參斷吹戎戎寒霧挾飛濤用杜字而語並工張又云楮葉熒熒遙入宋楊花冉冉獨遊梁亦本杜字而句皆新穎傷秋鶴注此當是大厯二年秋作是年九月吐蕃寇邠靈州故詩有汗馬戎衣之句村一作林僻來人少山長去鳥微高秋收畫一作藏羽扇久客掩柴一作荆扉懶慢頭時櫛艱難帶減圍此從客䕫敘起乃傷秋之景收扇興下掩扉夏過則扇捐猶久客則人厭而柴門常掩也頭時櫛不冠也帶減圍身瘦也范彥龍詩有客欵柴扉體嵇康書懶與慢相成減梁昭明太子傳素壯腰帶十圍至是削過半將軍思一作猶汗馬天子尚戎衣白蔣風飈脆殷烏間切柳且成切曉夜稀何年滅一作減豺虎似有故園歸此感長安時事乃傷秋之故汗馬戎衣吐蕃侵境也蔣脆柳稀重入秋景是借草木零落以比兵亂凋殘賦中有比思歸而曰似未可必之詞也此章上下各六句黑白蔣茭草也蜀都賦攢蔣叢蒲注蔣菰名也殷赤色爾雅柳河栁注今河旁赤莖小楊陸璣詩疏皮赤如綘枝葉如松一名雨師張載詩季葉喪亂起盜賊如豺虎即事鶴注此亦大厯二年秋作也天畔羣山孤草亭江中風浪雨冥冥一雙白魚不受釣三寸黃甘猶自青多病馬一作長卿無日起窮途阮籍幾時醒未聞細栁散金甲腸斷秦川一作州非流濁涇朱瀚曰此即孤亭風雨而發長鋏之歎上四景物下四感懷言起聫言客居之蕭瑟白魚承江黃甘承山不釣猶青食味艱難也多病窮途而當秦地用兵則歸京無日所以腸斷耳黃生注羇旅貧病公嘗頻言此又借古人以自况瀚曰天畔秦川首尾照應所顧注草亭瀼西草堂也西京雜記隨船風浪莫知之楚辭雷填填兮雨冥冥嘉一雙白魚暗用古詩遺我雙鯉魚秋張純曰峽中有魚長身細鱗肉白如玉春社前出社即歸時已九月故云不受釣黃徐􅎾曰凡柑皆圎獨成都産者形如鴨卵故云三寸柑言其長也大柑三寸注見十九卷葛朱注葛亮馬卿截用始自六朝庾信碑文渡瀘五月亮有深入之兵薛道衡碑文尚寢馬卿之書未允梁松之奏有吐蕃之警也周亞夫細栁營在長安昆明池南時蔡琰詩金甲耀日光杜臆三秦記隴山俗歌云遙望秦川肝腸斷絶此用其語流濁涇難見澄清也耳聾鶴注當是大厯二年秋晚作秦國策舌敝耳聾不見成功生年鶡冠子歎世鹿皮翁眼復扶又切幾時暗耳從前月聾猿鳴秋淚缺雀噪晚愁空黃落驚山樹呼兒問朔風此傷老年遁世欲付之不見不聞也下四寫耳聾之狀但五六屬無聞七八說有見仍與眼耳相關杜臆眼復幾時暗乎耳幸前日聾矣語含感憤鶡劉向七略鶡冠子常居深山以鶡為冠袁淑真隱傳冠子或曰楚人衣敝履穿因服成號著書言道家事神列仙傳鹿皮翁菑川人衣鹿皮居峚山上食芝草飲泉百餘年下賣藥於市三沈炯樂府淚盡眼方暗髀傷耳自聾傅巴東記猿鳴聲淚沾裳淚缺愁空以不聞故也毅七激仰歸雲訴朔風獨坐鶴注當是大厯二年東屯作竟日雨冥冥雙崖洗更青一作清水花寒落岸山鳥暮過平聲庭暖老思一作須燕平聲玉充饑憶楚萍胡笳在樓上哀怨不堪聽平聲下詩以獨坐命題傷村居寥落也上四景物四感懷杜臆雨洗雙崖無人來往但見花落鳥過而已暖老須被充饑須食若燕玉楚萍乃世間必不可得之物而思及於此蓋甚言衣食之艱難耳樓上哀笳耳不忍聽怨從心生非關笳也看公詩翠柏苦猶食明霞髙可餐正當與燕玊楚萍參朱注雙崖瞿唐兩崖正黃生曰水花二句抽換可得八聫此轆轤句也張見詩楫渡岸花沈逺注水花乃岸間所落之花非荷也玉禽經山鳥巖栖十舊注古詩燕趙多佳人美者顔如須燕玉所謂八非人不暖也而家語楚童謠云楚王渡江得萍實大如斗赤如日剖食之甜如蜜晉劉疇避亂為賈人欲害疇援笳而吹之作出塞聲以動其歸思皆啼哭而走樓上指城樓白狗斜臨北黃牛更在東峽雲常照夜江日一作月㑹兼風曬藥安垂老應平聲門試小童亦知行不逮苦恨耳多聾此亦對景而歎寂寥格同上章雲白狗臨北黃牛在東而身坐兩峽之間唯見夜中映日下風生常伴旅人耳有曬藥應門旅居差堪自給乃足行不逮而此身無復為耳聽多聾而世事并且不聞平生壯志雄心至此銷歇言之不勝悲悵矣扶末聫另作轉語方有曲折杜臆謂行不逮故待藥以衰耳多聾故藉童以將命四句作倒插未免直致矣杜臆白狗峽在歸州黃牛峽在夷陵又在歸州之東水經注秭歸白狗峽蜀江中流兩面如削絶壁之際隱出白石如狗形狀具足故以名焉又曰黃牛灘前有重嶺叠起其最外髙崖間有石色如人負刀牽牛人黑牛黃成就分明夜杜臆以雲照夜為返照非也後章云終年常起峽每必通林可見照夜指雲光之掩映童試小童試其能否也李密陳情表應門無五尺之黃注行不逮本論語恥躬不逮公以濟世自命而瞶如此是行不逮其言矣今按公詩言容易收病腳作足行不逮為平順雲鶴注此是大厯二年東屯作龍以一作似一作自瞿唐㑹江依白帝深終年常起峽每夜必通林收穫辭霜渚分明在夕岑髙齊非一處秀氣豁煩襟此詩咏雲有水雲山雲之別江為龍窟水氣上升而布於林峽此水雲也及秋盡收成則龍蟄水落矣故江渚雲辭而夕岑獨掛此山雲也山雲淡微故云秀氣豁襟易雲從龍龍以江為窟也收穫句即刈稻咏懷詩稻穫空雲水漢章帝詔車駕行秋稼觀收穫大厯二年九月三十日黃生注題作特書之體記為客之歲月便自具文見意為客無時了悲秋向夕終瘴餘夔子國霜薄楚王宫草敵虛嵐翠花禁平聲冷葉一作蘂紅年年小搖落不與故園同為客悲秋是全首大意中言地氣暖而物色解是秋盡之景末對搖落而思故園是作客之情年年見為客已久落客無盡期而秋向夕終歎節序屢移也以花草起搖後四斷續相生禁耐也言不畏輕霜也搖落見楚辭小搖落未盡凋也隂鏗詩秦川風物異不與故園同黃生曰杜詩有題事有心事因不能悉以心事為題故借諸題以常見心事而巧生於規矩之中則有單拋雙綰之法如此詩首句心事也次句題事也中二聫止承次句則首句是單拋至尾聫則題事心事雙綰詩中多用此法即此可例十月一日與上章先後作沿黃生注秦建亥以此日為歲首豈蜀秦俗故以節物相餽耶故有南國舊俗之語有瘴非全歇為冬亦不一作不亦難夜郎溪日暖白帝峽風寒蒸裹如千室焦俗作燋糖一作糟幸一柈同盤兹辰南國重舊俗自相歡上四記風土下四記民俗猶瘴未全消而忽焉交冬記節候也溪暖帶瘴峽寒則涉冬矣二句申上意以杜臆蒸衷焦糖夔俗如此蓋以是日為佳節幸一盤滿盤贈遺為幸自相歡言與客居無與也初或云冬而有瘴不亦難乎為冬乃怪歎之詞或曰冬有瘴則過冬不見苦難乃欣幸之詞兩說俱不如前注水經注溫水出牂牁夜郎縣縣故夜郎侯國也朱唐黔中道黔施珍思等州皆古夜郎地與巴夔接境溪即五溪芹齊民要術蒸裹方七寸准鼓汁煮秫米生薑橘皮胡小蒜鹽細切熬糝膏油塗箬十字裹之糝在上復以糝屈牖纂之術陸機詩千室非良鄰方言云餳謂之糖齊民要云煮白餳宜緩火火急則焦氣餳音呈雜又四民月令云十月先冰凍作京餳煮暴飴西京記曹元禮曰厨中荔枝一柈古月柈字杜集中凡詩題記日月者皆志節氣也上章云悲秋向夕終是夜秋盡也此章云為冬亦不難是日立冬也如露從今夜白晨朝有白露亦然杜詩不特善於記事抑且長於紀厯孟冬梁氏編在大厯二年殊俗還多事方冬變所為破甘一作瓜霜落爪嘗稻雪翻匙巫峽一作岫寒都薄黔溪一作烏蠻瘴逺隨終然減灘瀨暫喜息蛟螭上四冬日人事下四冬日風景所在殊俗而猶多事前此課督田園也冬變為則喜於無事惟破甘嘗稻而已霜落言其鮮雪翻形其白寒薄瘴隨地氣尚暖浪減蛟藏水患方免也䕫子國楚王宮夜郎溪白帝峽與巫峽黔溪連章叠用地名而句法各有變化雷姑依蔡編屬在大厯二年之冬巫峽中宵動滄江十月雷龍蛇不成蟄天地劃正字通霍國反又呼麥切爭回却碾空山過深蟠絶壁來何須妬雲雨霹靂楚王臺十月動雷記異也不成蟄氣候暖劃爭回雷復起其聲前而復後如却碾空山之中其勢盤旋不巳似深蟠絶壁之上久雨雷鳴則雲散雨收今當十月之候何須妬巫山雲雨而霹靂陽臺耶真可駭矣張綖注末比號令乖張失其威也盧陸機詩迅雷中宵激易傳龍蛇之蟄以存身也注天地不安閉塞而劃然爭回轉行夏令也陽趙曰高唐賦言神女朝為行雲暮為行雨朝朝暮暮臺之下今雷鳴不時若妬神女而霹靂以震之盧元昌曰詩十月辛卯記及震電刺皇甫之亂也當時元載亦即皇甫末聫意蓋有指黃生曰十月雷記異也結處必寓比興方非徒作從來詩人少詠雷者此詩出千古詩人竟閣筆矣悶姑依舊次列在大厯二年瘴癘浮三蜀風雲暗百蠻卷簾唯白水隱去聲几亦青山猿捷長難見鷗輕故不還無錢從滯客有鏡巧催顔此詩為滯客無聊而作白水青山本堪適興因處蠻瘴之地故對此祗足增悶耳山猿水鷗何以成悶見其輕捷自如遂傷客身之留滯也三四承上五六起下末方結出致悶之由無錢歎貧催顔嗟老陶開虞曰鏡亦何嘗催顔却歸巧於鏡此際韻絶與熟食示子詩汝輩催我老同一機杼趙次公曰夔在三蜀之下百蠻之北淮南子置猿檻中非不巧捷從隨也謂錢不隨旅客夜二首此當是大厯二年秋作向海鹽劉氏作向舊作白夜月休弦燈花半委一作委半眠號平聲山無定鹿落樹有驚蟬暫憶江東鱠兼懷雪下船蠻歌犯星起空一作重覺在天邊此章先景後情從夜月敘起落無心看月故云休弦待燈花半身方就眠却聞號鹿驚蟬雖眠不寐矣故思及鱸鱠雪船如身遊吳越之間忽聽蠻歌四起方覺身在天邊孤棲如故也飄盧注不宜然而然曰犯公用犯字都有謂將曉詩曰飄犯百蠻言老還入蠻也對雪詩曰北雪犯長沙言北却侵南也此曰蠻歌犯星起言夜終冒曉也杜臆佛家以前半月為白夜詩云蟬驚當是秋夜訪上弦初七八之月䕫張翰思江東鱸膾王子猷雪夜戴逵事已别見本蠻地故云蠻歌當星而起即指歌者邵云公聽歌而起非是城郭悲笳暮村墟過翼稀甲兵年數久賦斂去聲夜深歸暗樹依巖落明河繞塞微斗斜人更望月細鵲休飛次章景情夾敘將月細作結七一二將夜之景三四傷䕫人之重困五六夜盡之景八傷一己之孤棲此亦虛實相間格休過翼稀見村野荒凉公欲北歸而嫌鵲南飛故囑其飛也杜臆兩首非一時之作前首夜中猶眠此首徹夜不寢矣注人更望屬自已對鵲言故曰人黃生末句翻魏武樂府朝二首依蔡編入在大厯二年清旭楚宫南霜空萬嶺含野人時獨往雲木曉相參俊鶻無聲過饑烏下去聲食貪病身終不動搖落任江潭首章對朝景而興久客之悲在四句分截杪葉落霜空故萬嶺皆含日色既而獨往山上又見木停雲參在眼前矣木杜臆日出之際雖禽鳥各有所營而病身不動如草之任其搖落耳時獨往間步田間也終不動未能出峽也萬郭璞江賦視氛祲於清旭疾謝靈運詩千圻邈不同嶺狀皆異無聲過飛之也庾信枯樹賦昔年楊柳依依漢南今看搖落悽愴江潭起聫本以下句抱上句黃生云若用直敘只是萬嶺楚宫南霜空清旭含三聫烏鶻並列黃生云饑烏貪而下食不知俊鶻之在其上此傷懷祿而被讒者故暫借江潭以息機耳浦帆音泛晨初發郊扉冷未開林一作村疏黃葉墜野靜白鷗來礎潤休全濕雲晴欲半回巫山終可怪昨夜有奔雷此章敘朝景而歎氣候之殊亦四句分截趣帆初發而扉未開病身畏寒也林疏野靜朝來清可觀無如礎潤雲回尚含雨意恐昨夜輕雷隂晴還未定耳飄郊扉即公柴門前詩郊扉及我私可證林巳疏矣猶黃葉此正孟冬之候閏可怪志異也水朱注韓退之寄李夫人詩云不枉故人書無因帆江朱文公定作去聲引杜此句為證考左傳注拔旗投衡上使不帆風差輕原讀去聲淮南子山雲蒸而柱礎潤周書趙師曰蜀絃躁急若激浪奔雷戲作俳音排諧體遣悶二首詩有治生且耕鑿句知是大厯二年作鶴注俳諧謂如俳優詼諧異俗吁可怪斯人難並居家家養去聲烏鬼頓頓食黃魚舊識能一作難為態新知已暗疏治平聲生且耕鑿只有不關一作開渠此詩厭居夔州而作也異俗難居二句領起三四言俗之可怪五六言人難並居末欲付之不問聊以遣悶也頓盧注烏鬼可異家家供養則以異為常黃魚本常頓皆食則雖常亦異矣舊識而多倦態新知亦唯貌親總見交情之薄文黃注陸雲詩百城各異俗千室非良鄰起語本此心雕龍銘發幽石吁可怪也龜蔡寬夫詩話元微之江陵詩病賽烏稱鬼巫占瓦代自注云南人染病競賽烏鬼楚巫列肆悉賣龜卜烏鬼之名見於此巴楚間常有殺人祭鬼者曰烏野七神頭則烏鬼乃所事神名耳或云養字乃賽字之誤理或然也邵伯溫聞見録䕫峽之人歲正月十百為曹設牲酒於田間已而衆操兵大噪謂之養烏鬼長老言地近烏蠻戰場多與人為厲用以禳之藝苑雌黃謂烏蠻鬼按烏鬼别有三說漫叟詩話以猪為烏鬼夢溪筆談以鸕鷀為烏鬼山谷别集以烏鴉獻神為烏鬼今以蔡邵二說為正前黃魚詩脂膏兼飼犬䕫州此魚之多可知一吳曾漫録晉謝僕射陶太常詣吳領軍日中客比得頓食楊愼曰俗語飯曰一頓賈充傳不頓駕而自留矣隋煬帝紀每之一所輒數道置頓元微之元昌宫詞驅令供頓不敢藏文字解話續食曰頓晉書襄陽羅友少時常伺人祠欲乞食曰欲得一頓食耳沈炯詩舊識既巳盡新知皆異名漢食貨志天下言治生者祖白圭西厯青羌坂一作板南留白帝城於音烏莵同都切一作榖於侵客恨粔音巨籹音女作人情瓦卜傳神語畬田費火耕一作聲是非何處定髙枕笑浮生次章亦歎䕫俗之可怪也首二敘客䕫之由中四記土俗之異末言此地是非不必與論但當以一笑置之耳所謂遣悶也於莵驚客險而可怪粔籹贈人陋而可怪瓦代龜卜怪其矯誣火當水耕怪其創見涉隴從同谷縣去遊蜀留滯於巫山原注頃歲自秦竹書紀年梁惠成王十年瑕陽人自秦道岷山青衣水來歸縣有䝉山青衣所發華陽國志天漢四年罷沉黎置兩部都尉一治旄牛主外羌一治青衣主漢民朱注云唐嘉州本古青衣羌坂黃生注於莵侵客恨即所謂撑突䕫人屋壁者左傳鬭伯比淫於䢵子之女生子文焉䢵夫人使棄之夢中虎乳之楚人謂乳為榖虎為於莵故命之曰鬬穀於莵之招魂粔籹蜜餌有餦餭些注粔籹以蜜和米麯煎作齊民要術膏環一名粔籹用秫稻米屑水蜜溲之强澤如湯餅麵手搦圎可長八寸許屈兩頭相就膏油煮之王洙曰巫俗擊瓦觀其文理分析以卜吉凶嶽陽風土記荆湖民俗疾病不事醫藥惟灼龜打瓦或以雞子卜求祟所在使俚巫治之貨殖傅楚越之地地廣人稀或火耕而水耨楚俗燒榛種田謂之火耕昔遊此詩舊編在乾元二年秦州范元實編在大厯二年䕫州按秦州與衡嶽絶逺豈得云清秋入衡霍當是客䕫州時作舊因關塞二字遂誤屬秦州公詩關塞極天惟鳥道明是說䕫州也昔謁華蓋君深求洞宫腳陳作緑袍崑玉腳玉陳作人棺巳上上聲天白日亦寂一作冥寞暮升艮岑一作峯頂巾几猶未却弟子四五人入來淚俱落余時遊名山發軔在逺壑良覿違夙願含悽一作凄向寥廓此初訪華蓋君而傷其逝世是遊梁宋時事各四句轉意猶未却覽物尚存也向寥廓招魂無定矣君神仙傳昔周王子喬養道於華蓋山後升仙號華蓋此詩乃借古仙以比道士之修真者葛仙翁傳崑崙山一曰華蓋天柱仙人所居洞天福地記華蓋山周回四十里名曰容成太玉之天在溫州永嘉縣仙人修羊公治之洞真誥厚載之中有洞天三十六所八海中諸山亦有宫五嶽名山皆有洞宫仙傳燕昭王得洞光之珠以飾宫王母三降其地名曰洞宫神仙傳天降玉棺於堂上王子喬遂休浴臥其中由是尸解後漢王喬傳天降玉棺於堂前吏人推排終不搖動喬曰天帝獨召我耶乃沐浴服飾寢其中蓋便立覆發逺注艮岑東北之岑巾几華蓋君生前物離騷朝軔於蒼梧兮注軔搘車木川謝靈運詩引領冀良覿以又含悽泛廣傅咸儀鳳賦翔寥廓輕舉兮林昏罷幽磬竟夜伏石閣王喬下去聲天壇微月映皓鶴晨溪響一作嚮虛駃音快一作駛歸徑行已昨豈辭青鞋胝悵望一作惆悵金七藥東䝉赴舊隱尚憶同志樂音洛伏一作休事董先生於今獨蕭索華蓋君已歿而轉尋董鍊師是遊齊魯時事嵇林昏六句宿山而去青鞋六句往赴東䝉康琴賦王喬披雲而下墜氏地志王屋山絶頂曰天壇寰宇記王子喬天壇在緱縣東南六里王喬傳或云即古仙人王子喬也列仙傳王子喬周靈王太子晉也好吹笙作鳳鳴遊伊洛閭道士浮丘公接上山三十餘年後來於山下告桓良曰告我家七月七日待我緱氏山頭果乘白鶴駐山頭望之不得到舉手謝時人而去如響虛駃水聲急瀉也駃苦拜切尸子黃河龍門駃流竹箭酉陽雜爼河水色渾駃流元好問詩駃雨東南來自注與快同趙松雪有駃雪帖字從夬與從史從央者冇別行已昨循舊徑而歸也趙注青鞋山行之具胝足病也莊子手足胼胝傳鮑照樂府金鼎玉匕合神丹䝉山在沂州髙士老萊子隱居於䝉山之陽禹貢䝉羽其藝是也瀕東海故曰東䝉陸機詩誰謂伏事淺契濶踰三年胡為客關塞道意久衰薄妻子亦何人丹砂負前諾雖悲髮鬒音軫變吳本作髮變鬒一云鬢髮變未憂筋力弱杖一作扶藜望清秋有興去聲入廬霍董鍊師久濶欲再訪於廬霍時將有荆楚之遊矣妻子亦何人即公詩笑為妻子纍丹砂負前諾即公詩未就丹砂愧葛洪十此章前二段記往日之遊後一段待將來之遊前各二句後段八句收漢武帝曰吾得如黃帝棄妻子如脫屣耳又費長房棄妻子從壺公詩鬒髮如雲鬒黑髮也變則白矣謝朓詩誰能鬒不變廬沈慶之詩朽老筋力盡之孫放盧山賦潯陽郡南有山九江之鎮也臨平廬澤接平敞之原行爾雅霍山為南嶽注在廬江西謝靈運詩遊當羅浮息必廬霍期江淹詩杏與廬霍絶希曰廬山在九江霍山在衡陽朱鶴齡曰昔遊詩當與七古憶昔行互證昔遊者紀遊王屋山與東䝉山之事華蓋君猶太白集之丹丘子蓋開元天寶問道士隱於王屋者不必求華蓋所在以實之也詩云深求洞宫腳洞宫即憶昔行所云北尋小有洞也腳山足也洞在王屋艮岑即王屋山東北之岑也天壇亦在王屋地志王屋山絶頂曰天壇濟水發源處是也王屋在大河之北故憶昔行曰洪河怒濤過輕舸也公至王屋時值其人已羽化故憶昔行曰辛勤不見華蓋君也此云弟子四五人入來淚俱落憶昔行曰弟子誰依白茅屋盧老獨啓青銅銷盧老正四五人之一也華蓋君既不得見於是含悽天壇悵望匕藥而復為東䝉之遊焉東䝉舊隱即𤣥都壇歌故人昔隱東䝉峯者也公客東䝉與太白諸人同遊好所謂同志樂也其時之伏事者則董先生即衡陽董鍊師也漢武移南嶽於霍山故衡霍之稱相亂杖藜望清秋有興入廬霍即憶昔行更討衡陽董鍊師南浮早鼓瀟湘䑨也王嗣奭曰髙明之人狹小塵世多慕仙佛不知仙佛無修修唯將自已心神收斂歸根打成一片耳忠臣孝子尚巳次則文章下之技藝併力一向以全副精神注之皆可成仙老杜千載往矣今讀其詩奕奕生動言喜令人歌舞言悲令人拭淚此精神不死而流行於天地之間者不謂之仙吾不信也生平遭厯萬苦千愁天蓋注意此老鍊之以成仙而不自知也試問董先生安在當時企羡以為真仙是家有荆璧而羡他人之燕石九京之下當必失笑雨四首鶴注當是大厯二年冬瀼西作微雨不滑道斷雲疏復扶又切行紫崖奔處黑白鳥去邊明秋日新霑黃生作霑新影寒江舊落黃作落舊聲柴扉臨野碓半濕一作得搗香粳古衡切雲首章記倐晴倐雨之象承上二雨對起三四承斷雲下四微雨上崖奔之處雲行而見其黑鳥去之邊雲疏而見其明四字各另讀詩意本順杜臆秋來半晴半雨雨不大而亦不晴南方謂之秋霖去顧注謂雲奔之處紫崖便黑雲去之邊白鳥還明奔指雲作倒裝句按公入宅詩奔峭背赤甲傷秋詩山長去烏微則奔就崖言去就鳥言皆可證矣黃生曰前半不煩繩削後半極力經營又曰自起句外止霑濕二字著雨其餘俱是襯說此文家避實擊虛法也五六與河漢不改色關山空自寒並於題外取神結出半濕字與暗滿字亦同一綰法又曰雪詩中偏寫月雨詩中偏寫日皆以反攻逆擊見竒筆端不可方物葛常之曰紫崖奔處黑白鳥去邊明而江碧鳥逾白山青花欲燃之句似之贈王侍御云曉鶯工迸淚秋月解傷神而感時花濺淚恨別鳥驚心之句似之殆同是一機軸陳師道曰余登多景樓南望丹徒有大白鳥飛近青山而得句云白鳥過林分外明謝朓亦云黃鳥度青枝語巧而弱老杜云白鳥去邊明語少而意廣余每還里而自覺老復得句云坐下漸多人杜云坐深鄉黨敬句穩而語益工乃知杜詩無不有也江雨舊無時天晴忽散絲暮秋霑物冷今日過雲遲上上聲馬回休出看平聲鷗杜臆作鴉坐不移一作辭高一作層軒當灧澦潤色靜書帷次章記雨中候晴之景雨斷雲俗謂之過雲雨朱彝尊曰微舊無時不時常雨過雲遲雲中帶雨也回馬看鷗避雨之事潤色入帷觀雨之趣上二首咏雨尚在怡情處下二章咏雨却在傷心處矣如梁簡文雨後詩散絲與山氣忽合復俄晴古詩密雨散絲杜臆鷗一作鴉埤雅云俗候烏飛翅重知其將雨看鴉卜其晴也物色歲時晏天隅人未歸朔風鳴淅淅寒雨下去聲霏霏多病久加飯衰容新授衣時危覺凋喪去聲一作喪亂故舊短書稀三章敘雨中客况下四應天隅未歸首二總提三四應物色將晏淅淅風細聲霏霏雨微貌加飯授衣旅人自慰故舊書稀又覺自傷矣至杜臆病雖稍安念及時危便覺凋喪乃故交之書稀則世亦以廢人待我矣又云近者短書逺者長書短書猶稀况長書乎近者且然况逺者乎西京雜記棟宇物色惟舊條邵注天隅䕫州在天之西南隅古謝惠連詩淅淅振風楚辭江雲霏霏而承宇詩努力加餐飯詩九月授衣寄江淹詩袖中有短書願雙飛燕楚雨石苔滋京華消息遲山寒青兕呌江晚白鷗飢神女花鈿落鮫人織杼悲繁憂不自整終日灑如絲四章敘雨中憂緒不此詩結構人但知首尾相關二與七應一與八應而知中間即景寓意俱是雙關杜臆云中四比凶人得志清士失所寡婦窮民苦於兵賦憂多不能自理故對雨絲而興愴雨沮消息承上親故書稀兕呌雨中所聞鷗飢雨中所見神女鈿落應山雨鮫人杼悲應江雨黃生注憂不自整則心亂故接以雨灑如絲詩律工細如此飾巫山有神女廟遵薛夢符注唐志命婦之服兩博鬢以寶鈿金花劉詩鬢轉匝地鈿江賦鮫人構館於懸流吳都賦泉客潛織而卷綃沈約庭雨應詔詩非烟復非雲如絲復如霧洪仲曰接句不測與羣盜尚縱橫句同杜詩接句有寫景不測者秋風落日斜是也有用句不測者京華消息遲是也意景雖殊而法則一故曰杜詩慣法二必開七必闔大覺高僧蘭若原注和尚去冬往湖南大大覺當楚高僧名梁氏編在厯間䕫州詩內淨釋氏要覽梵言阿蘭若唐言無諍四分律云空處鶴注唐志武宗即位廢浮圗法天下毁寺四千六百招提蘭若四萬則蘭若殆小於寺矣巫山不見廬山逺松林一作間蘭若爾者切秋風晚一老猶鳴日暮鐘諸僧但一作尚乞去氣切齊時飯香爐峰色隱晴湖種杏仙家近白榆飛錫去年啼邑子獻花何日許門徒此高僧已往湖南而題詩於寺也上四言巫山事下四言廬山事一老諸僧守寺遺規香爐杏林廬山勝迹啼邑子前惜其去許門徒今望其回國廬山逺逺公也李白詩笑別廬山逺吳越春秋委於一老逺法師廬山記山東南有香爐山孤峯秀起游氣籠其上即焚煴若香烟其南嶺臨宫亭湖下有神廟以宫亭為號又曰衆嶺中第三嶺極高峻嶺下半里許有重巖上有懸崖古仙之所居漢董奉館於巖下常為人治病病愈者令栽杏五株數年之間蔚然成林計奉在人間近三百年容狀常如三十時俄而升仙絶迹於杏林神仙傳董奉居廬山治病重者種杏五株輕者一株號董仙杏林古詩天上何所有歷歷種白榆朱注春秋運斗樞玉衡星散為榆近白榆言其髙近乎天注又曰二句皆用廬山事則隱晴湖乃彭蠡湖題下所湖南謂蠡湖之南也峯洙曰髙僧傳有飛錫而赴齊者要覽云昔有髙僧隱遊五臺出淮西擲錫飛空而往西天漢尹翁歸傳于定國欲屬託邑子兩人注邑子同邑人之子因果經善慧仙人持花七莖欲以獻佛時燈照王出城迎佛王臣禮敬獻名花花悉墜地善慧即散五花皆住空中化成花臺後散二莖亦止於空即釋迦牟尼佛也門謝靈運逺法師誄今子徒實同斯艱謁真諦寺禪師此詩年次難考今依舊編列在䕫州內蘭若爾者切山髙處煙霞嶂一作障幾重平聲凍一作冷泉依細石晴雪落長松問法看平聲詩妄一作忘觀身向酒慵未能割妻子卜宅近前峰黃生注前半到寺之景後半進謁之意又曰首句言髙次句言深結用前峰字應轉亦又曰身妄故一切俱妄平日所最耽者莫如詩酒今索然無味此作悟後語杜臆妻子難割甚於詩酒故自歎未能末聫十字為句鍾天台賦䕃落落之長松趙注宋周顒長於佛理於山西丘隱舍終日長蔬雖有妻子獨處山谷此卜宅近寺之一證也黃生曰三四景中見時與王右丞泉聲咽危石日色冷青松同一句法然彼工在咽字冷字此工在凍字晴字上時掌切卿翁請修武侯廟遺像缺落時崔卿權夔州杜公頻題武侯廟遺廟丹青落與無首對江濆當是一處遺像肅清高與松柏參天長恐又是一處也大賢為政即多聞刺史真符不必分尚有西郊諸葛廟卧龍無首對江濆上二崔權州事下二請修遺像首無首神像缺落也易羣龍無王十朋祠堂記略曰武侯故祠在州之南門沿城而西三十六步無斷碑遺刻以考其歲月之始見於圗經者略焉在隋唐時治白帝史載少陵詩曰西郊諸葛廟者其地於兹乎門之東去祠一百八十五步城有臺下臨八陳圗登臺而望則常山之蛇四頭八尾之勢宛其在目北直郡倉倉故永安宫也據爽塏狀如屏宫之北有水曰清瀼瀉出乎兩山之間東入於江又東過灧澦入於峽峽口有山卓然立乎羣峰之外者白鹽也可謂江山之勝矣侯昔經營天下於平沙之上輸忠盡誠受遺立孤於是宫之中江流淘而石如故宫闕廢而地猶存陵谷雖變而精神不亡宜於兩者之間祠之亦侯之志也書史傳於壁之左而削其不公之論書少陵詩於壁之右以諸作者詩文次之詞曰白鹽峙天兮灧澦屹江風雲慘淡兮翺翔臥龍龍千秋兮何之新廟貌兮江之湄前八陳兮後故宫龍兮龍兮神其中望昭烈兮隔清瀼遺廟存兮交精神於惚恍駕虛空兮雲為馭臣東朝兮主西顧魚得水而相忘兮事無今古儼關張於左右兮一龍二虎祠有新故兮侯無重輕舍其故而新是卜兮邦人之情祠合於圗兮自今始祀事不絶兮有如此水龎卧龍之龍叶音在江韻奉送卿二翁統節度鎮軍還江陵鶴注當是大厯二年作卿二翁姓崔乃公舅氏江陵即湖廣荆州府火旗還錦纜白馬出江城嘹唳吟一作鳴笳發蕭條别浦清寒空巫峽曙落日渭陽情一作明留滯嗟衰疾何時見息兵上四崔還之事下四送别之情啓朱旗錦纜軍士列舟以待也白馬出城統軍將行矣於時笳聲悲慘不覺别浦蕭條自曙而夕惜别情深何時息兵有感世亂也朱旗紅旗也諸侯所建考工記龍旗九旒以象火火鳥旟七旒以象鶉火注大火蒼龍宿之心鶉火朱雀宿之柳吳甘寧以錦維舟龎德好騎白馬號白馬將軍浦謝朓詩寥戾清笳轉蕭條邊馬煩留别浦用送别南語舅稱渭陽本詩秦風漢章帝馬光詔有司勿復請以慰朕渭陽之情太白詩浮雲遊子意落日故人情對景懷人意味深永少陵云寒空巫峽曙落日渭陽情亦是寫景贈别而語意短淺杜詩佳處固多此等句法却不如李久雨期王將軍不至鄭曰大厯二年九十月吐蕃寇靈邠京師戒嚴當是其年冬作天一作山雨蕭蕭滯一作帶茅屋空山無以慰幽獨鋭頭將軍來何遲令平聲我心中苦不足敘雨中期王不至辭幽獨處乎山中楚鋭頭將軍如白起之頭小而鋭漢武帝歌何珊珊其來遲耶數所角切看平聲黃霧亂𤣥雲時聽嚴風折喬木泉源泠泠雜猿狖泥濘一作滓漠漠飢鴻鵠歲暮窮隂耿未巳人生㑹面難再得叶音篤思申久雨王之意合庾肩吾詩山沈黃霧裏地盡黑雲中㑹蔡琰詩𤣥雲兮翳月星說苑泉源潰潰古詩面安可知人李延年歌佳難再得憶爾腰下鐵絲箭射音石殺林中雪色鹿前者坐皮因問毛知子厯險人馬勞異獸如飛星宿落應弦不礙蒼山髙追述將軍射獵事問杜臆坐皮問毛見毛如雪色異而之始知其善射所得此用倒插法物周禮大司徒辨五地之物生一曰山林其動物宜毛注毛物狐貉之屬漢白狼王唐菆逺夷慕德歌涉危厯險不逺萬里張華詩機發應弦倒一縱連雙肩安得突騎去聲只五千崒昨沒切然睂骨皆爾曹走平亂世相催促一豁明主正鬱陶恨一作憶昔范增碎玉斗末一作來使吳兵著同著白袍昏昏閶闔閉氛祲十月荆南雷怒號平聲靖末思猛士以亂惜將軍之不用也相催促急於救亂豁鬱陶能寬主憂范增比老謀不用白袍言軍功未立閶闔氛祲言吐蕃入寇十月荆雷言災變未弭玩此段之意王蓋昔為將軍而退居䕫州者黃鶴指為王承俊誤矣承俊在成都於荆南無與常此章四句起八句結中二段各六句之後漢吳漢傳將突騎五千為軍鋒前漢書鴻門㑹張良以玉斗獻范增增拔劍撞而破之曰南史陳慶之麾下悉著白袍所向披靡先是洛中謠名軍大將莫自牢千兵萬馬避白袍舊注引侯景㑹東吳兵盡著白袍謂指崔旴入朝若依其說則未使當作來使矣又一說吳兵白袍是用吕䝉白衣搖櫓事郝敬曰此詩竒突豪邁直可追風掣電氛盧元昌曰時杜鴻漸薦崔旴旴方入朝故有閶闔祲之句王將軍在蜀杜鴻漸不用之以平亂詩意在此篇中黃霧亂雲殺氣蔽天之象嚴風折木大將失律之象猿狖雜處小人鼠竊之象鴻鵠苦飢民生失所之象皆借雨以歎時事也虎牙行洙曰原注蕭銑僭號江陵日屯兵於此後常為屯戍之地黃鶴編在大厯二年謝省曰因篇內有虎牙二字摘以為題非正賦虎牙也下錦樹行亦然秋一作北風歘吸晉作歘歘吹南國天地慘慘無顔色洞庭揚波江漢回虎牙銅柱皆傾側巫峽隂岑朔漠氣峰巒窈窕溪谷黑杜䳌不來猿狖寒一作啼山鬼幽隂霜雪一作雪霜逼此詩在秋塞而傷亂也首寫秋隂肅殺之氣翕上四洞庭逺景下四巫峽近景文選注歘吸猶忽也謝朓髙松賦卷風飈之歘吸之江漢回即倒流意合水經注江水又東厯荆門虎牙間注荆門在南上下開狀如門虎牙在北石壁色紅間有白文類牙形二山楚西塞也水勢急峻後漢書注在今峽州夷陵縣東南百水經注江水又束徑漢平二百餘里左自涪陵東出餘里而届於積石東為銅柱灘一統志銅柱灘在重慶府涪陵江口楚老長嗟憶炎瘴三尺角弓兩斛力壁立石一作古城橫塞起金錯旌竿滿雲直漁陽突騎去聲獵青丘犬戎鎖甲圍一作閒丹極八荒十年防盜賊征戍誅求寡妻哭恐當叶克遠客中宵淚霑臆此見關塞屯兵而有感日上四指目前事下五憶往事上舊時秋猶炎瘴今忽風寒弓徑此即兵象也城橫塞而旌竿直立時方備寇也漁陽指安史犬戎指吐蕃楚老謂䕫人逺客公自謂漏歌行結尾每用叠韻若哭字用叶不必疑丹極下有句矣鶴注未然此章上段八句下段九句愆謝靈運詩楚老惜蘭芳膚鶴云炎方地脉疏而氣泄陽不收人為常燠所暵理不密又為山水草莽之氣所侵故成瘴詩南史齊魚復侯子響勇絶人開弓四斛力傅𤣥蜀賊阻石城錦樹行鶴注當是大厯二年東屯作駮西京雜記終南山有樹葉一青一丹斑如錦繡長安謂之丹青樹釋智元詩樹錦無機織猿鳴詎假弦錦樹本此今日苦短昨日休歲云暮矣增離憂霜凋碧樹作一作行一作待錦樹萬壑東逝無停留此歲終寥落而有感也首段傷時光之易度昨日休言又過一日矣詩盧諶詩忽忽歲云暮江淹碧樹先秋落荒戍之城石色古東郭老人住青丘飛書白帝營斗粟琴瑟几杖柴門幽青一作春草萋萋盡枯死天馬一作與驥跛一作跂足隨氂陵之切牛自古聖賢多薄命姦雄惡少去聲皆封一作封公侯次敘客居凄凉之况天馬犛毛喻聖賢惡少在朱注東郭公所居觀阻雨詩佇立東城隅可見瀼西䕫州東郭也史記有齊人東郭先生於青丘恐是清溪荆趙曰草枯無以充腹故天馬無異犛牛山海經山其中多氂牛注旄牛屬也出西南徼外黑色少盧思道詩從軍多惡故國三年一消息終南渭水寒悠悠五陵豪貴反顛倒鄉里小兒狐白裘生男墮地要膂力一生一作生女富貴傾邦國莫愁父母少黃金天下風塵兒亦得末慨長安少年之驟貴者君朱注貴妃時民間語曰生男勿喜女勿悲看生女作門楮詩末正翻此語言風塵之時男兒亦好豈必生女能致富貴乎世變之感愈深愈痛顚倒謂富貴不常風塵謂兵戈擾攘錦此章四句起下二段各八句里記玊藻君衣狐白裘衣以裼之士不衣狐白鄉句言服飾之奢僭地傅𤣥樂府男兒墮地稱妹又豫章行男兒當門戶墜自生神周國語四軍之帥膂力方剛王嗣奭曰此等詩皆有避忌故朦朧顛倒其辭大抵有武夫惡少乘亂得官而豪橫無忌觀膂力風塵語可見自平鶴注當是大厯二年作太一反於廣德元年平之必在二年至大厯二年為三年故曰千餘日自平中官舊作宫中一作中宮東坡定作中官呂太乙收珠南海千餘日近供生犀翡翠稀復扶又切恐征戍一作戎干戈密蠻溪豪族小一作山動搖世封刺史非時一作常朝音潮蓬萊殿前一作裏諸主將去聲才如伏波不得驕上四憂南海之亂下四言柔逺之道朱注太一平後蠻豪復小梗公恐出鎮者遽興兵生事故援羈縻之義以戒之杜臆伏波親履其地不敢輕視征五溪故事可證也鑑舊唐書代宗紀廣南節度使張休縱兵大掠廣州通張休棄城走端州太一縱兵焚掠官軍討平之去舊書大厯二年九月桂州山獠陷州城刺史李良遁故曰小動搖唐書太宗時溪洞蠻酋歸順者皆世授刺史寄裴施州朱注代宗紀寶應元年九月右僕射山陵使裴冕貶施州刺史廣德二年二月以灃州刺史裴冕為左僕射兼御史大夫考廣德元年三月葬𤣥宗肅宗則冕為山陵使必在廣德元年以前而不在永泰元年明矣冕自灃州徴還至永泰元年三月方待制集賢本傳誤以集賢待制在山陵使之前又誤以貶施州為在永泰元年耳考公到䕫州冕已久居朝廷不應有此寄且詩云幾度寄書白鹽北苦寒贈我青羔裘公以大厯二年秋移居東屯東屯正在白鹽之北公移東屯詩白鹽危嶠北可證則知是詩乃大厯二年冬所作也史載二年二月左僕射裴冕置宴於子儀之第是年何得在施州乎公遇裴施州在去蜀之年其人名不可考矣黃鶴以為裴冕斷誤鶴注九域志䕫州北至施州蓋三百餘里唐書施州清江郡屬黔中道廊廟之具裴施州宿昔一逢無比一作此流金鐘大鏞在東序冰壺玉衡英華作珩懸清秋首敘往日逢裴玊杜臆廊廟之具正於金鐘衡見之鐘鏞狀其器宇恢𢎞冰玉狀其識鑒清朗許靖夙有名譽蔣濟以為有廊廟之器蜀志許靖傳詩賁鼓維鏞鏞大鐘也之書天球河圗在東序任昉序並東序之祕寶實瑚璉茂器選詩清如玉壺冰書在璿璣玉衡自從相遇減一作感多病三歲為客寬邊一作旅愁堯有四嶽明至理漢二千石真分憂次敘近年再遇歲杜臆相遇病減蓋三中邊方安而客心亦安政績可追唐漢則廊廟之具巳見諸施行矣書注四嶽主四方諸侯者漢百官公卿表郡守秦官秩二千石宣帝紀與我共理者唯良二千石乎幾度寄書白鹽北苦寒贈我青羔一作絲一作縑裘霜雪回光避錦袖龍蛇一作蛟龍動篋蟠銀鈎此敘裴寄贈之情京衣裘暖故霜雪回寒書法美如龍蛇動篋西雜記劉向作彈棊獻成帝以代鞠蹴帝大悅賜青羔裘紫絲履僧書藪歐陽率更書飛白冠絶有龍蛇戰鬬之象王䖍論書索靖甚矜其書名其字書曰銀鈎蠆尾紫衣使去聲者辭一作辟復命再拜故人謝佳政將老已失子孫憂後來况接才華盛英華此句下有遙憶書樓碧池映句被此寄書達謝之意更杜臆裴有此佳政子孫猶將與其澤况文章華圗可為後世法程乎後二語收盡前兩節在此章前韻分三段換韻作結語曹植與吳質書足下彼自有佳政子孫憂出論陶潛詩才華不隱世鄭典設自施州歸此當是大厯二年作太唐志東宫官典設郎四人掌子湯沐泛掃鋪陳事而杜臆施州舊屬䕫州路明改為施州衛屬湖廣䕫之建始縣舊𨽻施州在䕫州府南五百里志云民雜夷獠頗有華風吾憐滎陽秀冒暑初有適名賢慎出處上聲一作所出不肯妄行役旅兹殊俗逺一作還竟以屢音慮空去聲迫首敘往施之故見冒暑而行為迫於空乏耳豫滎陽鄭氏郡名見陸機詩出處鮮為諧詩季行役屢空論語南謁裴施州氣合無險僻攀援懸根木登頓入天草堂陳浩然並作矢石青山自一川城郭洗憂戚一作戚投次敘往施景事援意氣相忘乎險僻矣攀二句中途厯險青山二句到時覽勝懸梁武帝詩攀援傍玉澗江總賦岸木懸根杜臆根木蓋榕也根生枝上纍纍下垂未見者以為竒南荒山水粗惡青山一川便足賞心矣謝靈運詩山行窮登頓入矢石當作入天石鮑照詩青冥搖烟樹穹跨負天石公瞿唐詩入天猶石色足證矢字之訛憂戚與遠戚字同意異作不犯重聽子話此邦令平聲我心恱懌其俗則一作甚淳朴不知有主客溫溫諸侯門禮亦如古昔敕廚倍常羞杯盤頗狼籍時雖屬音竹喪去聲亂事貴當一作賞匹敵中宵愜良㑹裴鄭非逺戚羣書一萬卷博涉供務隙他日辱銀鈎森疏見矛㦸次述典設之言交上四見施州風俗之美中八見裴公情之厚下四兼志典設文學之優尊不知主客皆能親厚諸侯門指裴刺史杜臆往事貴適當匹敵之人也一說時雖值乎喪亂而事則貴與匹敵者相賞貴字與雖字相應皆屬活字不如前解裴向曾寄書於公故有龍蛇動篋蟠銀鈎之句此云銀鈎矛㦸正引證其善書耳若云贈書於鄭恐辱字說不去詩悅懌汝美元希聲詩粵在古昔叔滑稽傳履舄交錯杯盤狼籍敵左傳賔媚人曰蕭同子非他寡君之母也若以匹則亦晋君之母也傳言齊晋相匹詩引之以見裴鄭之相匹耳贊劉向楊雄博極羣書南史顔協博涉羣書漢書傳傅亮感物賦夜清務隙游目藝苑於薛道衡詩布字改銀鈎書苑歐陽詢真行之書出大令森然如武庫矛㦸倒屣喜旋歸畫去聲地求一作來所厯乃聞風土質又重平聲田疇闢刺史似寇恂列郡宜競借咨昔切一作惜結此敘歸來情事乃上起下應畫地所厯應上山川風土田疇應上俗淳寇恂宜借上諸侯崔駰傳駰見竇憲倒屣迎注倒屣不上踵也安詩薄言旋歸别任昉表畫地成圗抵掌可述注謂張世借寇注見朱注競借從草堂本為正謝靈運山居賦怨浮齡之如借叶入聲音迹北風吹瘴癘羸老思散䇿渚拂蒹葭寒一作塞嶠穿蘿蔦羃此身仗兒僕髙興去聲潛有激孟冬方首去聲路强飯取崖壁歎爾疲駑駘汗溝血不赤終然備外飾駕馭何所益我有平肩輿前途猶凖的翩翩入鳥道庶脫蹉跌厄此自敘欲往施州之意散上八擬行期下八商行計䇿杖䇿而行渚拂水行也嶠穿山行也方首路謂孟冬方啓行逺注厯險非駑馬所堪必肩輿可免蹉跌將自巳陪結文情逸宕實杜臆後數句乃對面商量之語輒以入詩此是真情事此章六句者三段十六句者兩段羃詩蒹葭蒼蒼亮鶴曰詩注蔦一名女蘿羃如伍子胥面之羃傅詩斾旌首路顔延之詩首路局險難汗李陵書春風多厲强飯為佳昭赭白馬賦膺門沫赭溝走血注汗溝馬中脊也明太子詩終然類管窺子晉書王獻之乘平肩輿入顧辟疆園溫升表實當年之凖的乃一世之權衡觀公孫大娘弟子舞劒器行并序大厯二年十月十九日䕫州别駕元持一作特宅見臨潁李十二娘舞劒器壯其蔚跂問其所師一本此下有答字曰余公孫大娘弟子也開元三載上聲余尚童稚記於郾城觀公孫氏舞劒器渾脫瀏灕頓挫獨出冠去聲時自髙頭宜春梨園二伎一作教坊內人洎外供奉舞女從英華他本無舞女二字曉是舞者聖文神武皇帝初公孫一人而已玉貌錦一作繡衣况余白首今兹弟子亦匪盛顔既辨其由來知波瀾莫二撫事慷慨聊為劒器行昔一作往者吳人張旭善草書書帖數音朔嘗於鄴一作葉縣見公孫大娘舞西河劒器自此草書長丁丈切進豪蕩感激即公孫可知矣唐書臨潁郾城二縣俱屬許州旋段安節樂府雜録健舞曲有稜大阿連柘枝劒器胡胡騰等軟舞曲有凉州緑腰蘇合香屈柘團圓旋甘州等張爾公正字通云劒器古武舞之曲名其舞用女妓雄籹空手而舞見文獻通考舞部此詩正指武舞言或以劒器為刀劒誤也通鑑中宗宴近臣令各效伎藝為樂將作大匠宗晉卿舞渾脫胡三省注唐五行志長孫無忌以烏羊毛為渾脫氊帽人多效之謂之趙公渾脫因演以為舞崔令欽教坊記右教坊在光宅坊左教坊在延政坊右多善歌左多工舞妓女入宜春院謂之內人亦曰前頭人以常在上前也曲雍録開元二年正月置教坊於蓬萊宫側上自教法謂之梨園弟子天寶初即東宫置宜春北院令宫女數百人為梨園弟子梨園在光化門北光化門者禁苑南面西頭第一門明皇雜録上素曉音律安祿山獻白玉簫管數百事陳於梨園自是音響不類人間諸公主及虢國以下競為貴妃弟子每授曲之終皆廣有進奉時公孫大娘能為鄰里曲及裴將軍滿堂勢西河劒器渾脫舞妍妙皆冠絶於時黃生曰此序與石崇思歸引波瀾不異首申涵光曰詩序太剝落玉貌錦衣下如何接况余白末引張顚事却有致李肇國史補張旭草書得筆法後傅崔邈顔真卿旭嘗言始吾見公主擔夫爭路而得筆法之意後見公孫氏舞劒器而得其神正此注腳忽補注况余當是恍余言恍已老也昔有佳人公孫氏一舞劒器動四方觀者如山色阻喪去聲天地為之久低昂㸌户沃切如羿射音石九日落矯如羣帝驂龍翔來一作末如雷霆收震怒罷如江海凝清光從公孫善舞敘起日沮喪謂神竒可駭低昻言髙卑易位㸌然下垂如九並落矯然上騰如駕龍翔空其來忽然如雷霆過而響尚留其罷陡然如江海澄而波乍息皆細摹舞態也黃生注考教坊記劒器乃健舞也故序云壯其蔚跂而詩以四如形容之下一句尤妙方見不是雄裝健兒曹植詩南國有佳人書四方風動記觀者如堵傳莊子嗒焉阻喪昻前漢楊惲傳奮袖低昻頓足起舞𤣥詩北斗忽低㸌灼也梁元帝賦睹㸌火之迢遙墜淮南子堯時十日並出堯令羿射中九日日烏皆死其羽翼夏侯𤣥賦又如東方羣帝兮騰龍駕而翺翔詩詩如雷如霆徐方震驚王奮厥武如震如怒應璩江海倘不逆江淹詩秋日懸清光綘脣珠袖兩寂寞晚陳作脫一作况有弟子傳芬芳臨潁美人在白帝妙舞此曲神揚揚與余問答既有以感時撫事增惋傷此見李舞而感懷城寂寞傷公孫巳逝芬芳喜李氏猶存蕪賦玉貌綘脣曹植詩閒房何寂寞縣神女賦吐芬芳其若蘭巴唐地理志潁川郡有臨潁梁簡文帝詩妙舞有渝劉琨詩此曲悲且長有史記晏子傳意氣揚揚甚自得也亮詩何其處也必以也楚辭余感時兮悽愴傳為宋公修張良廟教撫事彌深先帝一作皇侍女八千人公孫劒器初第一五十年間似反掌風塵澒洞一作傾動昏王室梨園弟子散如煙女樂餘姿映寒日此先朝盛衷之感臨風塵指祿山陷京餘姿即潁舞態掌史記公孫𢎞傳天子擢𢎞對為第一未文中子如反耳陸雲詩飄飄冒風塵淮南子有天地之時鴻濛澒洞莫知其門流神光傾亞有餘姿詩王室如燬寒傅𤣥詩回目陶潛詩慘慘日肅肅其風金粟堆南木已拱瞿唐石城草一作暮蕭瑟玳筵急管曲復扶又切終樂音洛極哀來月東出老夫不知其所往足繭荒山轉愁疾一作寂白此當席聚散之感來金粟承先帝瞿唐承帝樂極承妙舞哀承撫事足繭行遲反愁太疾臨去而不忍其去也蒲此章八句起後三段各六句長安志明皇泰陵在城東北之金粟山詩左傳爾墓之木拱矣玳漢食貨志石城十仞催江淹松柏轉蕭瑟又詩筵歡趣密鮑照詩筵急管為君舞兮司馬相如傳曲終而奏雅哀漢武帝秋風辭歡樂極哀情多魏文帝樂府樂往來摧肺肝而詩日居月諸東方自出胝戰國䇿蘇子足重繭日百後舍注繭足胝也唐韻皮厚也陶潛詩鬱鬱荒山裏劉克莊後村曰此篇與琵琶行一如壯士軒昻赴敵場一如兒女恩怨相爾汝杜有建安黃初氣白未脫長慶體耳也王嗣奭曰此詩見劒器而傷往事所謂撫事慷慨故詠李氏却思公孫詠公孫却思先帝全是為開元天寶五十年治亂興衰而發不然一舞女耳何足搖其筆端哉寫懷二首鶴注此是大厯二年冬作詩云巫峽三歲公以永泰元年赴雲安至大厯二年為三歲矣又云歲暮日月疾故知為冬日也魏文帝詩賦詩以寫懷勞生共乾坤何處異風俗冉冉自趨競行行見羈束無貴賤不悲無富貧亦足萬古一骸骨鄰家遞歌哭此章自敘從慨世說起一言乾坤之內共趨名利茍能達觀則窮達生死皆可視何必多此哀樂乎莊子大塊載我以形勞我以生趨古樂府冉冉府中趨詩古詩行行重行行人競奔則受羈束矣張協羈束戎旅間爭阮籍大人先生傳無貴則賤者不怨無富則貧者不各安於身而無所求史記張儀傳且賜骸骨辟魏人博物志雍門至今善歌哭鄙夫到巫峽三歲如轉燭全命甘留滯忘情任榮辱朝音潮班及暮齒日給還脫粟編蓬石城東采藥山北一作林谷用心霜雪間不必條蔓緑非關故安排曾音層是順幽獨次敘客䕫之况言全命志情言隨寓而安朝班四句居食粗給用心四句即指采藥事排吳論尋根霜雪之間不必條蔓之緑此亦無意於安但順其幽居之性而巳崔瑗座右銘行行鄙夫志人詩三歲食貧賦庾肩吾詩聊持轉風燭亢倉子至忘情歸田茍縱心於域外安知榮辱之所加班沈約彈文希聃幸齒朝班十朝班及暮齒謂昔玷朝而今已暮年矣時公年五有六張綖注云朝班故人念及暮齒供以日給之資似無所指升謝靈運詩頽年追暮齒晏子春秋晏子相齊衣十之布脫粟之飯户東方朔非有先生論居深山之中積土為室編蓬為石城即䕫州城洙曰許徴君詩采藥白雲隈略以肆所養今按龎公采藥注已别見王洙所引許畋隱居採藥北山未知何據莊子仲尼謂顔淵曰安排而去化乃入於寥天一是謝靈運詩安排徒空言幽獨賴鳴琴詩曾在位達士如弦直小人似鈎曲曲直吾不知負暄候樵牧末有任運自然之意起不與人情競曲直仍與起處逹生相應左此章八句中段十二末段四句達士出越國語思詩可為達士模鈎後漢順帝末童謠云直如弦死道邊曲如封公侯列子宋田夫負日之暄夜深坐南軒明月照我膝驚風翻河漢梁棟日巳出一作巳出日羣生各一宿飛動自儔匹吾亦驅其兒營營為私實一作室生次章慨世從自敘說起之述旦暮景事即前章勞共乾坤意廣韻檐宇末曰軒長廊之有窗者非曹植詩驚風飄白日南莊子官隂陽以遂羣生韓子一宿而習之淮子蠉飛蠕動古樂府辭悲聲命儔匹聚鮑照詩營營市井人楚語蓄衆實注實財也天寒行旅稀歲暮日月疾榮名忽一作惑中平聲人世亂如蟣蝨古者三皇前滿腹志願畢胡為有結繩陷此膠與漆禍首燧人氏厲階董狐筆君看平聲燈燭張轉使飛蛾密次歎人情之迫於名利者榮名中於人心此爭趨所以長亂若三皇以前本渾沌無為自結繩以後不免智巧日生矣飲食起而貪夫殉利故燧人為禍之首名教立而烈士殉名故董狐為亂之階飛蛾赴燭譏其滅身而不顧也選詩榮名以為寶璣楚辭薄寒中人者史記項羽紀搏牛之虻不可以破蝨蟣蝨言所爭小通鑑外紀上古有天皇地皇人皇氏人莊子鼴鼠飲河不過滿腹政帝王外紀燧人氏始教火食又云始作結繩之立傳教之臺莊子待繩約膠漆而固者是侵其德也膠漆言不可解左傳職為厲階又云董狐古之良史也張協詩飛蛾拂明燭放神八極外俯仰俱蕭瑟終然契真如蔡趙皆作真如一作終契如往還得一作歸匪金一作合仙術末有達觀齊化之意自言名利不足關心唯神遊物外俯仰皆空能契真如本性庶金仙之術可致也此詩格局亦同上章王康琚詩放神靑雲外也淮南子天地之間九州八極注八方荒忽極逺之地莊子其疾俯仰之問楞嚴經逺契如來又云常住妙明不動周圎妙真如性又云發真如妙覺圓性釋典佛號大覺金仙宋之問詩雙樹謁金仙李太白詩集注金仙佛也因緣九十一劫身皆金光死朱注舊云終契如往還即吳越春秋所云生往還張綖曰前篇處困而亨是聖賢大道此篇絶聖棄智是老莊𤣥談前篇說得平實是身厯之詞此篇說得放曠是憤俗之語觀者勿以辭害意可也杜詩詳注卷二十
