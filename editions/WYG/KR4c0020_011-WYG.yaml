body:
  text: 杜詩詳註巻十一翰林院編修仇兆鰲撰嚴中丞枉駕見過平聲從盧氏編在奉酬嚴公之後今之趙曰公自注云嚴自東川除西川勅令都節制則是未合為一道時故稱為中丞當是寳應元年權令兩川都節制時作若廣徳二年武再尹成都時公已入幕府不應有張翰管寧之語盧注至徳二載上皇還京分劍南東西兩川各置節度是兩川始分也寶應元年嚴武為東川節度更除西川權攝東川此詩所謂川合東西也是年公説旱云請管内東西各遣一使其時尚分而未合故各遣耳六月嚴武被召還朝西川節度高適代之東川節度虛懸以章彞為留後至廣徳二年正月東西兩川始合為一道以黄門侍郎嚴武為節度趙注應為可據元戎小隊出郊坰問柳尋花到野亭川合東西瞻使去聲節地分南北任流一作孤萍扁舟不獨如張翰皂一作白帽還應平聲一作應兼似管寧寂寞一云今日江天雲霧裏何人道去聲有少去聲微星上四叙嚴公見過下四感見過之意翰兩川使節承元戎南北流萍承野亭張管寧比流萍之迹江天星隱喜使節之過下截仍屬分承而末用反結意更深長杜臆翰棄官而寜避世故有不獨應兼之别少微星公自比騎詩元戎十乗注元大也謂戎車也生注小隊簡於從足見其風趣邵注野外謂郊郊外謂林林外謂坰害公自長安至蜀乃自北而南鄭𤣥戒子書黄巾為萍浮南北復歸邦鄉翰晉書張翰字李鷹賀循入洛經呉閶門於船中彈琴就循言談相欽悦曰吾亦有事北京便同載而去袴魏志管寧字㓜安徴命不就居海上常著皂㡌布襦布裙隨時單複謝莊詩霧罷江天分少微星見史記天官書隋志少微四星在太微西士大夫之位也一名處士星明黄則處士舉庾信哀江南賦少微真人天山逸民階庭空谷門巷蒲輪遭田父泥去聲飲美嚴中丞柔言索物曰泥飲謂强留使飲即詩所云欲起時被肘也此杜臆美中丞指田父之言非公美之也鶴曰當是寶應元年春社作詩云拾遺能住否是未為參謀時也若在廣徳二年當奏為參謀矣又曰舊史嚴武傳既改長安以武為京兆少尹兼御史中丞以史思明阻兵不之官出為綿州刺史兼劍南東西節度使兼御史中丞東川節度治梓州上皇詔合西川為一道拜成都尹兼御史大夫今曰嚴中丞則是未為大夫時所作集中有與嚴中丞嚴大夫嚴侍御嚴鄭公諸題先後可辯也歩屧悉協切隨春風村村自花柳田翁逼社日邀我嘗春酒記田父邀飲之由白王禹偁曰屧草屨也宋書袁粲為丹陽尹嘗歩屧楊郊野遇士大夫便呼與酣飲祀何遜聨句復看花柳枝春月令擇元日命民社鄭注社以祈農祥元日謂近分前後戊日元吉也詩為此春酒以介睂夀酒酣誇新尹畜眼未見有迴頭指大男渠是弓弩手名在飛騎去聲籍長番歲時乆前日放營農辛苦救衰朽差科死則已誓不舉家走此田父頌美嚴公叙事而兼述言放農救親上以仁逮下差科不避下以義報上也畨曹植白馬篇名編壯士籍唐書兵志擇材勇者為頭習弩射又有羽林軍飛騎亦習弩長逺注舊兵一萬五千分為六番以次更代今曰長畨在籍無更代也放營農放回務農也外雜色差科在長番之者今年大作社拾遺能住否叫婦開大瓶盆中為去聲吾取此茍切感此氣揚揚須知風化首語多雖雜亂説尹終在口此田父欵留公飲述言而兼叙事感其意氣之慇而推本風化之自仍歸美於新尹也氣左傳子産為火故大為社祓禳於四方晏嬰傳意揚揚甚自得也後漢劉愷議刺史一州之表二千石千里之師職在辯章百姓宣美風化王洙曰郡守縣令風化之首陶潛詩父老雜亂言觴酌失行次朝來偶然出自卯將及酉乆客惜人情如何拒隣叟高聲索先側切果栗欲起時被去聲肘指揮過無禮未覺村野醜月出遮我留仍嗔問升斗此詳叙泥飲始末見田父真率情貺樸杜臆公詩田父邀皆去此章可證其寫出村人口角野氣象儼然如畫張逺注乆客惜人情言客乆而人情之厚更為可惜魏此章起段四句中間八句次末二段各十句史記桓子肘韓康子於車上陸王洙曰田父舉止無度不可責以禮法可黄希曰晉納謂桓温曰明公近云飲酒三升納正三升今有一斗以備杯酌餘瀝盧元昌曰蜀自上皇還京後分劍南為兩節度百姓罷於調遣西山三城又列戍焉蜀民籍為軍者無寜歲矣上元三年段子璋反將士大掠蜀民既苦寇又苦兵讀公枯椶等詩曰傷時苦軍乏一物官盡取嗟爾江漢人生成亦何有蜀民長番不已差科不息安得營農而作社乎嚴武鎮蜀兩川兼攝蜀民始稍甦息公是年説旱云自中丞下車軍郡之政罷弊之俗已下手開濟矣合之此詩嚴吏治精能蜀民休息大畧可見又本傳載公住浣花里好與田畯野老相狎蕩此詩既曰邀我嘗春酒再曰拾遺能住否又曰盆中為吾取欲起時被肘狎蕩之態又可想見矣被劉㑹孟曰杜詩問事競挽鬚誰能即嗔喝欲起時肘仍嗔問升斗此等語併聲音笑貌彷彿盡之傳郝敬仲輿曰此詩情景意象妙解入神口所不能者宛轉筆端如虛谷答響字字停匀野老留客與田家樸直之致無不生活昔人稱其為詩史正使班馬記事未必如此親切千百世下讀者無不絶倒奉和去聲嚴中丞西城晚眺十韻鶴注史謂上元二年建丑月以武為成都尹而此詩作於寶應元年之春汲黯匡君切亷頗出將去聲頻直詞才不世雄畧動一作用如神政簡移風速詩清立意新從中丞叙起官汲黯匡君嚴昔為諫亷頗出將今再為節度直詞故能匡君雄畧故堪出將節鎮本係府尹故其政簡武將而具文才故其詩清漢書汲黯字長孺武帝召為大中大夫數切諫上史記亷頗者趙之良將也伐齊大破之取晉陽拜為卿以勇氣聞於諸侯公漢書杜周傳朱博忠信勇猛材畧不世出俗孫權曰瑾雄畧過人史記太公至國修政因其簡其禮詩漢王章傳贊韓延壽厲善所居移風循吕氏童䝉訓清立意新此是作詩用力處盖不可習陳言只規摹舊作也南史徐陵多變舊體有新意層城臨暇一作媚景絶域望餘春旂尾蛟龍㑹樓頭燕雀馴地平江動蜀天濶樹浮秦此西城晚眺城暇景餘春城西晚景旂尾樓頭城上近景地平天濶外逺景杜臆地平天濶一聨乃詩家著神處黄生注動字寫洶湧之狀浮字寫縹緲之意雅蛟龍燕雀虚實借對與早朝詩龍蛇燕雀相同爾有鈴曰旂注懸鈴於竿頭畫蛟龍於旂書地平天成帝念深分閫軍須逺去聲算緡花羅封蛺蝶瑞錦送麒麟辭第輸高義觀圖憶古人征南多興去聲緒事業闇相親此叙主眷而望立功也羅分閫二句見朝廷所倚封二句見恩賜特隆辭第言不顧身家觀圖言留心邊事征南事業欲其安攘以報國此章前二段各六句末段八句收閫書帝其念哉之前漢馮唐傳古者命將跪而推轂曰以外將軍制通鑑石虎制征士五人出車一乗牛二頭米十五斛絹十疋民至鬻子以供軍須漢書元狩四年初算緡錢李斐曰緡絲也以貫錢一貫千錢出税二十逺注逺算緡謂不事科斂也物蛺蝶麒麟羅錦所繡者承上帝念來故知為所賜之舊注謂嚴公以此入貢非也者宋書王方慶遷廣州都督議者謂治廣未有如方慶號第一詔賜瑞錦雜彩以著善政宜唐書代宗詔曰所織盤龍對鳯麒麟獅子等錦綺並禁霍去病傳上為治第令視之對曰匈奴未滅何以家為蜀晉裴秀禹貢九州地域圖序文皇帝乃命有司撰呉地圖蜀土既定六軍所經地域逺近山川險易征路迂直校驗圖記罔有或差此所謂憶古人也朱注公有同嚴公詠蜀道畫圖詩又八哀詩云堂上指畫圖所謂觀圖憶古人者盖實事也舊引雲臺畫圖事不切杜征南係公始祖故用以贈嚴胡應麟曰杜詩用事門目甚多姑舉人名一類如清新庾開府俊逸鮑參軍正用者也聰明過管輅尺牘倒陳遵反用者也謝氏登山屐陶公漉酒巾明用者也伏柱聞周史乗槎似漢臣暗用者也舉天悲富駱近代惜盧王並用者也高岑殊緩歩沈鮑得同行單用者也汲黯匡君切亷頗出將頻分用者也共傳收庾信不比得陳琳串用者也至對碁陪謝傅把劍覔徐君侍臣雙宋玉戰䇿兩穰苴飄零神女雨斷續楚王風晉室丹陽尹公孫白帝城煆煉精竒含蓄深逺逈出前代矣杜詩佳句如地卑荒野大天逺暮江遲與地濶峩睂晚天高峴首春工力相敵若地平江動蜀天濶樹浮秦更足函盖乾坤王介甫地蟠三楚大天入五湖低雄渾何減少陵中丞嚴公雨中垂寄見憶一絶奉答二絶鶴注此寶應元年建巳月得雨時作雨映行宫一作官一作雲非是辱贈詩元戎肯赴野人期一云欲動野人知江邊老病雖無力强區兩切擬晴天理釣絲首章從雨中説起據來詩而答之宫晴理釣絲畜魚待赴也書通鑑𤣥宗離蜀以所居行為道士觀杜詩博議舊崔寧傳初天寶中鮮于仲通常建一使院甚華麗𤣥宗幸蜀常居之因為道觀寫帝御容置之正室郭英乂奏請舊院為軍營乃移去御容自居之朱云此即𤣥宗行宮當在成都城内有謂近萬里橋者非也謝瞻詩揚鑾戾行宫詩其釣維何維絲伊緡何日雨晴雲出溪白沙青石洗一作先無泥只須伐竹開荒徑倚一作拄杖穿花聽馬嘶一作鳥啼公次章承晴天説入望嚴枉過也路不沮泥見馬蹄可至謝嚴中丞送青城山道士乳酒一瓶黄鶴編在寶應元年山瓶乳酒下去聲青雲氣味濃香幸見分鳴鞭走送憐漁父洗盞開嘗對馬軍此為送酒而致申謝原漁父公自謂馬軍即走送者注軍州謂驅使騎為馬軍似楊慎曰孝經緯酒者乳也張率對酒詩如花良可貴乳更堪珍此詩乳酒本之謝靈運詩鳴鞭適大阿句憐漁父用楚詞人醉我醒意盧注末暗用羊祜飲陸抗酒事三絶句鶴注此是寶應元年作盖笋生無數必是斷手寶應之歲也楸一作春樹馨香倚釣磯斬新花蘂未應平聲飛不如醉裏風吹一云春風盡何一作可忍醒時雨打稀此詠楸花也一見花開旋憂花落有莊子方生方死意知盧注宋無名氏鷓鴣天詞不如飲待奴先睡圖得不郎去時語意藍本於此爾雅椅梓郭璞注即楸也陸璣詩疏楸之疏理白色而生子者為梓本草圖經梓木似桐而葉小花紫傳燈録洛浦在夾山做典座三年吃百頓棒後來大悟曰斬新日月特地乾坤門外鸕鷀去一作乆不來沙頭忽見眼相猜自今已後知人意一日須來一百迴此詠鸕鷀也物本異類視若同羣有列子海翁狎鷗意周𢎞正鬬雞詩少壯摧雄敵眄視生猜忌此猜字所本無數春笋滿林生柴門宻掩斷人行㑹須上番毛晃増韻讀甫患切看平聲成竹客至從嗔不出迎此詠春笋也杜門謝人䕶笋成竹有聖人對時育物意取杜臆種竹家初番出者壯大養以成竹後出漸小則食之胡夏客曰因王子猷看竹不問主遂翻為主不迎客用意亦巧猗看看守也從嗔任其嗔怒也趙注上番乃川語覺寮雜記杜詩㑹須上畨看成竹元詩飛舞先春雪因依上番梅俱用上番字則上番不獨為竹也韓退之笋詩且嘆高無數庸知上㡬畨又作平聲押朱注斬新上畨皆唐人方言獨孤及詩舊日霜毛一畨新亦讀去聲楊慎丹鉛録番作筤引易蒼筤竹為證筤去聲楊慎曰楸樹三絶句格調既高風致又韻真可一空唐人戲為六絶句此為後生譏誚前賢而作語多跌宕諷刺故云戲也姑依梁氏編在上元二年庾信文章老更成凌雲健筆意縱平聲横今人嗤㸃流傳賦不覺前賢畏後生首章推美庾信也開府文章老愈成格其筆勢則凌雲超俗其才思則縱横出竒後人取其流傳之賦嗤笑而指㸃之豈知前賢自有品格未見其當畏後生也當時庾信詩賦與徐陵並稱盖齊梁間特出者前賢指庾公後生指嗤㸃者王洙曰庾信字子山有盛才文章綺麗為世人所尚謂之庾體集漢書相如奏大人賦飄飄有凌雲氣宗庾信宇文順序章表健筆一付陳琳南史范蔚傳諸序論筆勢縱横真天下竒作氏干寶晉紀論盖其嗤㸃以為灰塵而相詬病矣顔家訓先儒尚得臨文從意何况書寫流傳耶麗庾信傳贊揚子雲有言詩人之賦麗以則詞人之賦以淫若以庾氏方之斯又詞賦之罪人也後陸機豪士賦仰邈前賢生見論語楊慎曰庾信之詩為梁之冠絶啟唐之先鞭史評其詩曰綺艶杜子美稱之曰清新又曰老成綺艶清新人皆知之而其老成獨子美能發其妙予嘗合而衍之曰綺多傷質艶多無骨清易近薄新易近尖子山之詩綺而有質艶而有骨清而不薄新而不尖所以為老成也若元人之詩非不綺艶非不清新而乏老成宋人詩則强作老成態度而綺艶清新槩未之有若子山者可謂兼之矣不然則子美何以服之如此楊王一云王楊盧駱當時體輕薄為文哂未休爾曹身與名俱滅不廢江河萬古流此表章楊王四子也四公之文當時傑出今乃輕薄其為文而哂笑之豈知爾輩不乆銷亡前人則萬古長垂如江河不廢乎洙曰楊炯王勃盧照隣駱賓王以文詞齊名武后初海内呼為四傑臆盧注謂後生自為輕薄之文而反譏哂前輩今從杜容齋續筆身名俱滅以責輕薄子萬古不廢謂四子之文姓玉泉子王楊盧駱有文名人議其疵曰楊好用古人名謂之㸃鬼簿駱好用數目作對謂之算博士弟顔氏家訓自古文人多陷輕薄世説殷仲堪語子曰爾曹其存之史記日月以明江河以流縱使盧王操翰墨劣於漢魏近風騷龍文虎脊皆君馭厯塊過平聲都見爾曹承上章言縱使盧王操筆不如漢魏近古但似此龍文虎脊皆足供王者之用若爾曹薄劣之材試之長途當自蹶耳奈何輕議古人耶縱使二字𦂳注下句劣於二字另讀漢魏近風騷連讀此本盧注文漢魏本於離騷離騷本於國風此先後原委也龍虎脊比四子才具過人厯塊過都比今人未諳此道君龍虎之駿皆見重於漢庭故曰君馭杜臆指後生為非是下文另有爾曹在也至魏文帝典論寄身於翰墨騷宋書謝靈運傳論自漢魏文體三變莫不同祖風續晉陽秋自司馬相如王褒揚雄諸賢代尚詩賦皆體則風騷天漢西域傳贊蒲梢龍文魚目汗血之馬充於黄門馬歌虎脊兩化若鬼注馬毛血如虎脊者有兩也王褒頌過都越國蹶若厯塊才力應平聲難跨或作誇數公凡今誰是出羣雄或看平聲翡翠蘭苕上未掣鯨魚碧海中此兼承上三章才如庾楊數公應難跨出其上今人亦誰是出羣者據其小巧適觀如戲翡翠於蘭苕豈能鉅力驚人若掣鯨魚於碧海乎世説殷中軍道韓太常曰康伯少自標置居然是出羣器華郭璞詩翡翠戲蘭苕容色更相鮮蘭苕蘭秀也木海賦魚則横海之鯨拾遺記鯤魚千尺如鯨常飛徃南海十洲記扶桑東萬里有碧海水不鹹苦正作碧色不薄今人愛古人清詞麗句必為隣竊攀屈音厥宋宜方駕恐與齊梁作後塵此戒其好高而騖逺也言今人愛慕古人取其清詞麗句而必與為隣我亦豈敢薄之但恐志大才庸揣其意竊思仰攀屈宋論其文終作齊梁後塵耳知古人未易摹倣則知數公未可蔑視矣承杜臆不薄二字另讀今人愛古人連讀清詞麗句𦂳愛古人今人指後生輕薄者古人指屈原宋玉輩庾信四傑乃齊梁嫡𣲖也清陳琳答東阿王牋清詞妙句焱絶煥炳宋謝靈運傳詞麗句時發乎篇文心雕龍五言流調清麗居宗茂先凝其清景陽振其麗又曰麗句與深采並流又曰相如好師範屈宋王劉孝標廣絶交論遒文麗藻方駕曹崔駰曰幸得充下館叙後塵未及前賢更勿疑遞相祖述復扶又切先誰别必列切裁偽體親風雅轉益多師是汝師末勉其虚心以取益也杜臆今人才力未及前賢以其遞相祖述愈趨愈下無能為之先者必也别裁其偽體而上親於風雅始知淵源所自前賢皆可為師是轉益多師而汝師即在是矣以又云此亦公之自道也公詩祖述三百而旁搜諸家集其成如楚騷漢魏詩樂府鐃歌齊梁以來甚多倣傚而公獨無之然讀其詩皆三百之嫡𣲖古人之雁行也其所師可知矣如孔子識大識小無不學而賢不賢皆師矣不如是何以謂之集大成哉别裁謂區别而裁去之謝靈運傳論王褒劉向揚班崔蔡之徒異軌同奔遞相師祖顔氏家訓傳相祖述尋問莫知源由鍾嶸詩品洋洋乎㑹於風雅陶潛詩在昔余多師少陵絶句多縱横跌宕能以議論攄其朐臆氣格才情逈異常調不徒以風韻姿致見長矣野人送朱櫻此當是上元寶應間成都作西蜀櫻桃也去聲自紅野人相贈滿筠籠數回細寫洗野切愁仍破萬顆匀圓訝許同憶昨賜霑門下省退朝音潮擎出大明宫金盤玉筯無消息此日嘗新任轉蓬此見蜀櫻而憶朝賜也上四記事下四感懷熟首句也字預照賜櫻見今昔相似也朱瀚曰紅言其起細寫仍破滿言其多起萬顆許同愁訝極言其珍惜之門下省在宣政殿東乃左拾遺所𨽻大明宫在禁苑東即㑹朝所經之地無消息長安遥隔仕轉蓬蜀地漂流也結語迴應首句此詩作於肅宗晏駕之後故云金盤玉筯無消息張逺誤指為代宗避吐蕃時按代宗幸陜在廣徳元年冬月與四月櫻桃不合筠籠竹器也曲禮器之溉者不寫其餘皆寫注謂傳之器中時訝許言驚訝如許庾信詩訝許能含笑唐李綽歲記四月一日内園薦櫻桃寢廟薦訖班賜各有差視顧注漢明帝宴羣臣大官進櫻桃盛以赤瑛盤月下之同色皆笑云空盤此即金盤意曹梁簡文帝詩已麗金釵瓜仍美玉盤橘植詩吁嗟此轉蓬居世何獨然范温潛溪詩眼云老杜櫻桃詩上四句如禪家所謂信手拈來頭頭是道者直書目前所見平易委曲得人心所同然但他人艱難不能發耳下四句其感興皆出於自然故終篇語皆遒麗韓退之有謝賜櫻桃詩盖學杜作然搜求事迹排比對偶其言出於勉强所以相去逺甚胡應麟曰退之謝櫻桃詩五六句頗與摩詰相似然王詩渾然終勝退之鍾惺曰王詩典而致在三四句尤見本事唐汝詢曰五六對耦工用事妥别生議論作結亦是巧思寢王維詩芙蓉闕下㑹千官紫禁朱櫻出上欄纔是園春薦後非關御苑鳥啣殘歸鞍競帶青絲籠中使頻傾赤玉盤飽食不須愁内熱大官還有蔗漿寒韓愈詩漢家舊種明光殿炎帝還書本草經豈似滿朝承雨露共看傳賜出青㝠香隨翠籠擎偏重色照銀盤寫未停食罷自知無補報空然慚汗仰皇扄嚴公仲夏枉駕草堂兼擕酒饌得寒字駕一本作鄭公枉擕饌訪水亭元黄鶴注此寳應元年嚴武未赴召時作也舊史年四月十八日丁卯肅宗崩於長生殿是月二十八日已巳代宗即位史云代宗即位召武者非即位之日也武至秋始還朝故五月猶過草堂也竹裏行厨洗玉盤花邊立馬簇金鞍非關使去聲者徵求急自識將軍禮數寬百年地僻舊作闢柴門逈五月江深草閣寒看平聲弄漁舟移白日老農何有罄交歡上四記嚴公交情下四述草堂景事用首句擕饌次句枉駕此叙事也三四跌宕其辭以見意之殷勤五切草堂六切仲夏此叙景也末作自謙之語與起處賓主相應此虚實相間格何遜詩竹裏見螢飛庾信詩行厨半路待神仙傳麻姑降蔡經家坐定各進行厨皆金盤玉杯而莊子顔闔守陋閭魯君之使者至闔對曰恐聽者謬貽使者罪楊慎曰使者徵求乃徵聘之義漢書宦者傳凡詔書所徵求世説郭淮作關中都督使者徵攝甚急任昉詩生平禮數絶將亷頗傳不知將軍寛之至此也生注此暗用漢書大軍有揖客事又云仲夏得寒字殊難押意中必先成此句次以上句凑之三聨失粘想亦由此耳西京賦白日未及移晷老農見論語公自謂也單復云嚴公何有於老農而盡歡若是於交歡二字未合家語曾子曰君子之狎足以交歡其莊足以成禮王嗣奭曰使者徴求向無明注余謂此時嚴必有表薦之意故云然使者猶言使君謂中丞也公自卜居浣花有長徃之志而嚴公堅欲其仕參觀唱酬諸詩可見今再枉駕必為徵之入幕而來故詩謂非關徴求之急實見禮數之寛不然豈一野人而敢屈中丞之駕哉黄生曰極喧閙事寫得極幽適非止筆妙亦由襟曠劉連曰律詩自有定體不可失粘然盛唐諸家出竒變化徃徃不縛於律非但杜詩為然如李頎題璿公山池前二聨俱失粘如崔顥黄鶴樓前三聨俱失粘如李白别中都明府與鳯凰臺領聨失粘如王維積雨輞川莊高適送李宷少府頸聨失粘如王維和温泉寓目岑參送李司馬歸扶風後二聨失粘如王維賈至早朝起結俱失粘如杜審言春日京中有懷王維訪吕逸人四聨俱失粘如李白題東溪隱居王維酌酒與裴廸岑參送嚴河南雖失粘而不害為好詩後學竭力避之則拘有心必效之亦過矣劉氏作失粘謂上下二句平仄不相粘合陶開虞作失嚴謂聲調平仄失其謹嚴也嚴公㕔宴同詠蜀道畫圖得空字年鶴注此寳應元成都作日臨公館靜畫胡化切滿一作列地圖雄劍閣星橋北松州雪嶺東華夷山不斷呉蜀水相通興去聲與烟霞㑹清樽幸不空首句嚴公㕔次句蜀道圖中四圖畫之景烟霞亦圖中所見者乗興而酌末㸃宴字劍閣在星橋之北松州則雪嶺居東山自西南而來水從東方而去全蜀地形如在指掌記公館復私館不復史記蘇秦傳以天下之地圖案之安華陽國志李冰沿水造橋上應七宿世祖謂呉漢曰軍宜在七星連橋間元唐書松州交川郡屬劍南道取界内甘松嶺為名也和郡國志雪山在松州嘉城縣東八十里即西山滅西征賦華夷士女駢田逼側夫魏志陳羣疏呉蜀未張璠漢紀孔融拜大中大毎歎曰座上客常滿樽中酒不空吾無憂矣且古樂府清樽發朱顔四座樂康當時四傑之詩盛傳於世杜亦毎用其句法如盧照隣地道巴陵北天山弱水東駱賓王紫塞流沙北黄圖灞水東此劍閣星橋北松州雪嶺東所自來也又駱詩百年三萬日一别㡬千秋則百年雙白髩一别五秋螢所自出也戲贈友二首此寳應元年四月成都作觀兩章首句可見元年建巳月郎有焦校書自誇足膂力能騎生馬駒一朝被馬踏脣裂板齒無壯心不肯已欲得東擒胡墮馬傷齒誌為好勇者之戒末二諷之也月肅宗紀上元二年以十二月建子為歲首月至建巳帝寢疾詔皇太子監國改元年為寳應元年復以正月為歲首公詩作於未改元之時故仍前稱為建巳月唐書崇文館有校書郎二人年魏武樂府烈士暮壯心不已元年建巳月官有王司直馬驚折左臂骨折面如墨駑駘漫一作慢深陳浩然作染泥何不避雨色勸君休嘆恨未必不為福馬陷損臂誌為冒險者之戒末二慰之也書東宫官司直一人又大理寺司直六人唐面深墨出孟子數淮南子塞上翁馬亡入邊人皆弔之曰何知非福居月其子引邊駿馬而歸人皆賀之曰何知非禍及家富馬良其子好騎墮而折髀人又弔之曰何知非福居一年邊人大入丁壯戰死者十九其子獨以跛故父子得相保胡夏客曰焦校書王司直一為乗生駒而墮一為乗駑駘而墮天下事之難料如此公於此有深感焉非僅戲筆而已也大雨鶴注此寳應元年在成都作是年公上嚴武説旱云蜀自十月不雨抵建卯非雩之時奈乆旱何此詩西蜀冬不雪春農為嗷嗷正是其時又云朱夏雲鬱陶盖入夏方雨也西蜀冬不雪春農尚嗷嗷上天回哀眷朱一作清夏雲鬱陶執熱乃沸鼎纖絺成縕袍風雷颯萬里霈澤施去聲蓬蒿首叙乆旱而兩􅓉搜神記萬物焦枯百姓嗷嗷出詩上天同雲江詩茂草思朱夏趙曰鬱陶尚書盖陶窰之氣鬱結此形容夏雲也袍秋興賦屏輕箑釋纖絺注纖絺細葛也縕見論語敢辭茅葦漏已喜黍豆高三日無行人二一作大江聲怒號平聲流惡邑里清矧兹逺江臯荒庭歩觀鶴隱去聲几望波濤此誌雨後之景郡蜀都賦帶二江之雙流水經注成都縣有二江雙流下故揚子雲蜀都賦曰兩江珥其前宋史初李冰開二渠一由永康過新繁入成都謂之外江一由永康過郫入成都謂之内江左傳有汾澮以流其惡趙曰大雨所蕩流出穢惡也具晁錯傳邑里相救捧演繁露凡與案自是兩物几坐也曲木附身以自也沉疴聚藥餌頓忘所進勞則知潤物功可以貸不毛陰色靜壠畆勸耕自官曹四隣耒耜出一云出耒耜何必吾家操此記喜雨之情知向以肺病聚藥今雨涼神爽不煩進飲之勞因造化潤物施及不毛者各有生意也勸耕操耒結出同慶甘霖意序此章三段各八句沈約蕭愐碑因遇沉疴綿留氣謝靈運詩藥餌情所止衰疾忽在斯栗江淹詩則知耳目驚句法本此貸施也左傳竭其而貸之出師表深入不毛之地逺注不毛草木不生也桑老子猶兮若畏四隣趙國䇿席隴畆而䕃庇易斵木為耜揉木為耒溪漲黄鶴編在寶應元年成都詩内當時浣花橋溪水纔尺餘白石一作日明可把水中有行車此阻於溪水不得歸寓而作也首叙平時溪水風萬里橋近浣花溪艶歌行水清石自見華陽俗録浣花亭在州之西南江流至清其淺可渉故中有行車秋夏忽泛溢豈惟一作伊入吾廬蛟龍亦狼狽况是鼈與魚兹晨已半落歸路跬歩疎馬嘶未敢動前有深填淤此記漲後景事魚逺注蛟龍二句即前詩鼈為人得蛟龍不自謀意獸跬歩疎人跡稀也深填淤馬行滯也趙曰狼狽二名半其體相附茍失其一則無據矣故倉皇失據者謂之狼狽千里注一足曰跬兩足曰歩荀子不積跬歩無以致漢溝洫志有填淤反壤之害注填淤謂壅泥也黄希曰溝洫志淤音於庶反此作平聲用青青屋東麻散亂床上書不知一作意逺山雨夜來復扶又切何如我遊都市間或作所晚憩必村墟乃知乆行客終日思其居此遥望村居而有感也客若山雨夜至則更阻歸途矣因思向者朝遊夕返行思居不能自已今如咫尺暌隔何杜臆云末四只説平日歸家而沮雨思家自見於言外更有藴藉句一説久客思家槩言旅人之情意却稍寛此章四起下二段俱八句墟村墟即指草堂庾信詩摇落小村詩職思其居大麥行鶴注此當是寶應元年成都作大麥乾音干枯小麥黄婦女一作人行泣夫走藏東至集壁西梁洋問誰腰䥥胡與羌豈無蜀兵三千人一云千人去簿一作部領辛苦江山長安得如鳥有羽翅託身白雲歸故鄉大麥行憂邊寇而作也腰䥥刈麥出自胡羌徒齎盜糧耳蜀兵三千鞭長不及故思東歸以避之蔡曰漢書桓帝時童謡曰小麥青青大麥枯誰當穫者婦與姑丈夫何在西撃胡毎句中函問答之辭公詩句法盖原於此州舊唐書梁州都督督梁洋集壁四州屬山南西道集析梁州之難江巴州之符陽長池白石置壁州析巴州之始寧置洋州析梁州之西鄉黄金興勢置一統志今為保寧漢中二府地鮑照詩腰䥥刈葵藿委梁簡文帝書簿領殷凑李德林集軍國多務朝夕填簿領紛紜羽書交錯西王母謡乗彼白雲至於帝鄉貴史記項羽傳富不歸故鄉朱鶴齡曰舊書肅宗紀寶應元年建辰月党項奴刺寇梁州觀察使李勉棄城走新書党項傳上元二年党項羌與渾奴刺連和寇鳯州明年又攻梁州進寇奉天此詩戎與羌正指奴刺党項也大麥枯小麥黄亦是夏初事又按代宗紀寶應元年吐蕃陷秦成渭等州成州與集壁梁洋接壤疑吐蕃是年入宼亦在春夏之交史不詳書故無考耳古又云蜀兵三千應是蜀兵調發䇿應山南者師氏造為杜鴻漸遏賊之説考鴻漸鎮蜀在永泰元年其時為亂者非羌戎也舊注妄撰故實後人多為所誤故正之奉送嚴公入朝音潮十韻鶴注此寶應元年夏在成都作鼎湖瞻望逺象闕憲章新四海猶多難去聲中原憶舊臣此叙嚴公入朝之由臣鼎湖肅宗晏駕象闕代宗即位多難朝義未平憶舊言詔書特召而中原共憶也前漢郊祀志黄帝採首山銅鑄鼎於荆山下鼎既成龍有垂胡髯下迎後世因名其處曰鼎湖黄圖鼎湖宫在湖城縣界晉灼曰在藍田故云鼎湖詩瞻望弗及二聖山陵召武為橋道使南史何𦙍傳闕謂之象魏象者法也魏者當塗而高大也陸倕石闕銘象闕之制其來已逺記憲章文武謝靈運詩中原昔喪臣後漢孔融傳聖上哀矜舊臣與時安反側自昔有經綸感激張天歩從音聰容靜塞塵南圖迴羽翮北極捧星辰漏鼓還思晝宫鶯罷囀春此記平日之功及歸朝之事謂經綸能安反側指靈武扈從時張天歩復京靜塞塵謂鎮蜀迴羽翮自蜀而還捧星辰舊京在望漏鼓思􅀞侍朝之乆宫鶯罷囀夏時入覲光武紀令反側子自安相求易君子以經綸莊劉琨詩鄧生何感激千里來詩天歩艱難子夫鵬九萬里而圖南北極句用論語北辰星拱意沈佺期詩宫鶯囀不疎空留玉帳術愁殺錦城人閣道通丹地江潭隱白蘋此生那老蜀不死㑹歸秦公若登台輔臨危莫愛身結出送别情緒愁兵威尚在留玉帳也都尹逺去蜀人矣丹地嚴將赴朝江潭公尚在蜀此生二句見江潭不堪乆居台輔二句見丹地宜思報稱數句賓主兼收此章四句起下二段各八句志抱樸子外篇兵在太乙玉帳之中不可攻也唐藝文兵家有玉帳經一巻張淏雲谷雜記按顔之推觀我生賦守金城之湯池轉絳宫之玉帳又袁卓遁甲専征賦或倚直使之遊宫或居貴神之玉帳盖玉帳乃兵家厭勝之方位主將於其方置軍帳堅不可犯如玉帳然其法出黄帝遁甲玉帳以月建前三位取之如月建寅則已為玉帳也李太白司馬將軍歌身居玉帳臨河魁戍為河魁則玉帳在戍也張正見艶歌執㦸趨丹地漢官儀省中皆胡粉塗壁以丹塗地謂之丹墀謝朓詩江潭復為客後漢張奮傳累世台輔盧世㴶曰此詩十韻氣象規模與題雅稱末復囑之曰公若登台輔臨危莫愛身法言忠告令人肅然夫奉送府主誰敢作此語亦誰肯作此語子美真古人也酬别杜二附嚴武詩行此當是在綿州途中作盖杜公送至此而酬詩以答也獨逢堯典日再覩漢官儀未効風霜勁空慙雨露私首段自叙入朝不堯典指受終之日漢官指朝㑹之儀此答鼎湖二句能靖亂故云未効獨䝉召見故曰空慙此答多難二句宗光武紀不意今日復覩漢官威儀唐太詩疾風知勁草板蕩識忠臣夜鐘清萬户曙漏拂千旗並向殊一作斜庭謁俱承别館追斗城憐舊路涪舊作渦水惜歸期峰樹還相伴江雲更對誰一作垂非中中誌臨别情景謁鐘聲旗影夜起早行也殊庭别館途止宿之所並俱追謂逺送者斗城涪水綿州經過之地舊路歸期謂還京也峰樹江雲言身去而境寂矣此答南圖回翮四句史記武帝紀冀至殊庭馬上林賦離宫别館彌山跨谷雲沈佺期詩移住斗城隈宋之問詩江欲變霞試回滄海棹莫一作更妬敬亭詩祗是書應平聲寄無忘酒共持但令平聲心事在未肯鬢毛衰最悵巴山裏清猿惱夢思末叙别後情事試回二句勸杜留蜀答此生那老蜀意寄書二句乃别後望杜之情但令二句自述已志答臨危莫愛身意最悵二句乃别時悽慘之狀情杜公嘗有吾道在滄洲之句故以回棹留之謝朓放山水有遊敬亭山詩今且隨意行樂勿以不至敬亭為妬也亭此與上章同格十滄海棹用乗桴浮海意圖經敬山在宣城縣北里盡李嶠詩高鳥行應清猿坐見傷送嚴侍郎到綿州同登杜使去聲君江樓宴得心字黄鶴曰嚴武時赴召未為黄門侍郎其再以黄門侍郎尹成都又薨於官此云嚴侍郎似誤或後來所題也朱注據通鑑寶應元年六月壬戌以兵部侍郎嚴武為西川節度使今據公詩盖以侍郎召也又新書于封鄭國公時云遷黄門侍郎舊書于罷兼御史大夫時云改兼吏部侍郎尋遷黄門侍郎皆不云為兵部與通鑑不合送黄生曰從水路至綿州故云重船其奉濟驛重則舎舟登陸故分手於此野興去聲毎難盡江樓延賞心歸朝音潮送使去聲節落景影同惜登臨首段叙題城上二江樓宴下二送嚴公賞杜審言詩野興中發延賞心謂引人心謝靈運詩賞心不可忘隂謝朓詩落景皎晚稍稍烟集渚微微風動襟重船依淺瀬輕鳥度曾同層隂檻峻背音悖幽谷牕虚交茂林燈光一作花散一作徹逺近月彩靜高深此記登臨晚景船烟集樓外風動樓中依樓下鳥度樓上四句薄暮之景谷遮檻後林壅牕前日暝燈起更深月出四句初夜之景生注燈光散逺近與城擁朝來客見幕府駐節傾城奔奉之狀月詩出自幽谷漢書古文月彩篇三日為朏師古注彩説月之光彩其書則亡城擁朝來客天横醉後參窮途衰謝意苦調去聲短長吟此㑹共能幾諸孫賢至今不勞朱户閉自待白河沉此述宴時情事故客指嚴公騎從多故見其擁參星在蜀江樓高見其横窮途二句自嘆流落此㑹二句稱美杜君未言宴畢而天將曙矣篇中叙次自暮至曉厯厯分明此格亦同上章春秋元命苞參伐流為益州古樂府月没參横北斗䦨干史淳于髠傳飲可八斗而醉二參樂府有長歌行短歌行逺注杜使君于公為孫行朱户閉暗用閉門投轄事白河天河也奉濟驛重平聲送嚴公四韻年次同前州郭知逹本注驛在綿三十里逺送從此别青山空復扶又切情幾時盃重義從平聲讀從去聲把昨夜月同行列郡謳歌惜三朝音潮出入榮江村獨歸處一作去寂寞養殘生黄生曰上半叙送别已覺聲嘶喉哽下半説到别後情事彼此懸絶真欲放聲大哭送别詩至此使人不忍再讀徃青山空復傷情悵别易生悲也三四言後㑹無期而事難再語用倒挽方見曲折若提昨夜句在前便直而少致矣宗列郡指東西兩川謳歌蜀人思慕也三朝指明肅代出入迭為將相也野方虛谷云首句極酸楚結尤徬徨無依詩逺送于謝朓詩嬋娟空復情漢朱浮書列郡㡬城送梓州李使去聲君之任原注故陳拾遺射洪人也篇末有云鶴注李梓州赴任在寳應元年之夏故詩云火雲揮汗日山驛醒心泉爾時公在綿卅也廣徳元年有陪李梓州泛江陪李梓州使君登恵義寺詩乃次年事川唐書梓州梓潼郡屬劍南道乾元後蜀分東西梓州􅁪為東川節度使治所按梓州今四川潼川州是也地在綿州之南籍甚黄丞相去聲能名自潁川近看平聲除刺史還喜得吾賢首以循良望使君門陸賈傳聲名籍甚孟康注狼籍之甚古樂府雁太守行夙夜勤勞治有能名漢書黄霸拜潁川太守咸稱神明後徵入為丞相漢景帝紀注凡言除者除舊官拜新官也五馬何時到雙魚㑹早傳老思笻竹杖一云杖拄冬要錦衾眠此想别後交情客古陌上羅敷行使君從南來五馬立踟躇節古樂府從逺方來遺我雙鯉魚蜀都賦笻杖傳於大夏之邑顧凱之竹譜笻竹高節實中狀若人剖為杖出南廣卭都縣竹記云卭州多生竹俗謂之扶老竹以杖對眠猶禮言杖鄉杖國作活字用不必改作笻杖拄詩錦衾爛兮蜀中有錦故公及之古詩錦衾遺洛浦同袍與我違不作臨岐恨惟聽平聲舉最先火雲揮汗日山驛醒心泉此叙送别情景化陰鏗詩背飛傷客念臨岐憫聖情京房傳行縣中舉最當遷注以課最被舉四舉盧思道詩火雲赫而史記臨淄揮汗如雨遇害陳公殞于今蜀道憐君行射洪縣為去聲我一澘然末囑其留心耆舊也到杜臆送人赴梓州遂想彼中名賢真好賢如渴者為我澘然造語尤竒唐此章四段各四句王逸九思愍貞良兮遇害舊書子昻父在鄉為縣令段簡所辱子昻聞之遽還鄉里簡乃因事收繫獄中憂憤而卒唐書射洪縣屬梓州九域志在梓州東南六十里句中涵光曰陶詩路若經商山為我少躊蹰此意所本詩澘焉出涕觀打魚歌鶴注此寶應元年至綿州作綿州江水之一作水東津魴魚鱍音撥鱍色勝銀漁人漾舟沉大網截江一擁數百鱗衆魚常才盡却棄赤鯉騰出如有神潛龍無聲老蛟怒迴晉作西風颯颯吹沙塵此叙打魚事説魴魚味美故漁人取之衆魚赤鯉潛龍老蛟俱屬伴龍潛知㡬之神蛟怒惡傷其類也綿州屬川西道水經注綿水西出綿竹縣又與湔水合亦謂之郫江又言是涪水爾雅注江東呼魴魚為鯿一名魾陸璣疏魴魚廣而薄肌肥甜而少肉細鱗之美者也詩魴魚赬尾又鱣鮪發發釋文魚著網尾發發然韓詩外傳發作鱍庖晉白紵舞歌質如輕雲色如銀主鮑照詩池中赤鯉所捐陶𢎞景本草鯉為魚中之形可愛又能神變乃至飛越山湖玉海景龍二年明皇至襄垣漳水有赤鯉騰躍酉陽雜爼國朝律取得鯉魚即宜放不得吃號赤鯉公兮易潛龍勿用楚辭風颯颯木蕭蕭饔子左右揮霜刀鱠飛金盤白雪高徐州秃尾不足憶一作惜漢陰槎頭逺遁逃魴魚肥美知第一既飽驩娛亦蕭瑟君不見朝來割素鬐咫尺波濤永相失此復記魚鱠高鱠飛言其薄金盤言其華白雪言其潔且多一句􅅤數義禿尾槎頭亦屬伴説逺遁逃聽其遁去也剖盧注一飽之後仍歸蕭瑟亦何苦殘生且此魚一經割永與波濤相失漁人能不見之而傷心乎西鍾云數語可當一篇戒殺文此章兩段各八句征賦饔人縷切鑾刀若飛陽辛延年詩金盤鱠鯉魚肥張協命素膚雪落襄耆舊傳漢水中出鯿魚美常禁人採捕遂以槎斷水因謂之槎頭縮項鯿張敬兒為刺史齊高帝取此魚敬兒作書進曰奉槎頭縮項鯿一千八百頭峴潭有云試垂竹竿釣果得槎頭玉孫炎釋爾雅積柴木水中養魚曰槮襄陽俗謂魚槮謂槎頭言所積柴木槎枒然也鬐西征賦華魴躍鱗素鱮揚注䰇脊也又觀打魚依舊次與前歌同編詩黄生曰詩中主人必綿州杜使君因語風切故題諱其人蒼江漁子清晨集設網提綱取一作萬魚急能者操舟疾若風撑突波濤挺乂入小魚脱漏不可記一作紀半死半生猶戢戢大魚傷損皆垂頭屈與倔通渠勿切强其兩切泥沙一云沙頭有時立此再至東津觀取魚也愛從竭澤而漁處寫出慘酷可憐之狀具見物仁心鍾云設網提綱萬魚急急字盡情令人有斷罟之意冰杜臆操舟若風二句儼然畫景劉孝綽詩魚子服紈列子津人操舟若神武西征賦垂餌出入挺乂來徃注乂取魚乂也蜀志陽小魚大如針一斤千頭蜀人以為醬戾七發其根半生半死志陸賈傳屈强如此注屈梗也劉峻金華山栖魚潛淵下窟穴泥沙東津觀魚已再來主人罷鱠還傾盃日暮蛟龍改窟穴山根鱣張連切鮪隨雲雷干戈格鬬尚未已一云干戈兵革鬬未止鳯凰麒麟安在哉吾徒胡為縱此樂音洛暴殄天物聖所哀此觀魚而有感也兵大魚小魚既遭急捕故蛟龍鱣鮪亦避殺機且當此戈之後麟鳯潛踪奈何暴殄以損天和哉盖深痛之耳注鶴曰干戈未已盖指吐蕃朝義之亂尚未息也朱即家語覆巢破卵則鳯凰不翔剖胎刳孕則麒麟不至意而杜臆作詩本意全在後四句盖盈城盈野見者傷心暴殄天物俱可悲痛一視同仁初無二理一此與上章同格鱣左傳公觀魚於棠庾信詩山根片雨爾雅注大魚似鱏而鼻短口在頷下甲無鱗肉黄大者長二三丈江東呼為黄魚詩注鱣大鯉疏鮪魚形似鱣而青黒頭小而尖似鐵兠鍪口亦在頷下大者為黄鮪小者為鮇鮪肉白張衡賦王鮪岫居舊注鮪岫居而能變化故有山根雲雷之句露援神契徳至鳥獸則鳯凰翔殄春秋繁恩及蟲魚則麒麟至書暴天物黄生曰二詩體物既精命意復逺前詩寓感此詩寓規前詩為富貴人下砭此詩為貪饞人示警也越王樓歌鶴注此當是寶應元年初至綿州時作綿州圖經越王臺在州城外西北有臺高百尺上有樓下瞰州城唐高宗顯慶中太宗子越王貞為綿州刺史作鶴曰舊新史越王貞太宗第八子嘗始封漢王漢與綿為鄰朱注本傳不載刺綿州盖史畧之耳綿州州府何磊落顯慶年中越王作孤城西北起高樓碧瓦朱甍莫庚切照城郭樓下長江百丈清山頭落日半輪明君王舊跡今人賞轉見千秋萬古情此詩上下轉韻上半咏越王樓下則登樓而弔古也此越王刺綿州故先作府而後建樓杜臆照映城郭樓助州府之氣象長江落日山水又増高樓之景色真屬竒觀勝覽然前王不能長享此樓而留為今人玩賞則知千秋萬古其情盡然即所云萬歲更相送者璞州府府之州治也世説州府文武勸郭淮舉兵郭江賦衡霍磊落以連鎮呉志吕䝉曰孤城之守詩古詩云西北有高樓屋神仙傳碧瓦鱗差沈佺期紅日照朱甍選注甍簷也鮑照詩城郭宿寒烟曰石崇詩登城隅兮臨長江詩沈約詩百丈注懸淙落日明知樓是面西庾信日落山頭晡復其舊跡江總詩月半輪明萬漢明帝詔劉庭芝公子行千秋古北邙塵此章體格倣王子安滕王閣而風致稍遜衛萬呉宫怨亦本滕王閣而姿韻自勝今附録參觀滕王高閣臨江渚珮玉鳴鑾罷歌舞畫棟朝飛南浦雲朱簾暮捲西山雨閒雲淡影日悠悠物換星移㡬度秋閣中帝子今何在檻外長江空自流晴君不見呉王宫閣臨江起不捲珠簾見江水曉氣來雙闕間潮聲夜落千門裏勾踐城中非舊春姑蘇臺下起黄塵祗今惟有西江月曾照呉王宫裏人末二句與李白相同不知孰為先後也海棕行鶴注棕在綿州乃寶應元年至綿州時作棕子冬切趙曰海棠記載李贊皇云花木以海名者悉從海上來葉宋祁益部方物贊海㯶大扺椶類然不皮而幹叢於杪至秋乃實似棟子今城中有四株理緻幹堅風雨不能撼劉恂嶺表録廣中有一種波斯棗木無旁枝直聳三四丈至顛四向共生十餘枝葉如㯶櫚彼土人呼為海㯶木三五年一著子類北方青棗但少爾舶商亦有擕至中國者色類沙糖味極甘陶九成輟耕録成都有金果樹頂上葉如㯶櫚皮如龍鱗實如棗而大畨人名為苦魯麻棗一名萬年棗李時珍曰雖有棗名别是一物南番諸國多有之即杜甫所賦海㯶也見鶴曰唐子西遊治平院詩江邊勝事畧尋遍不海棕高入雲注云即杜老所謂東津者據此則館與棕皆在涪江之東津也左綿公館清江濆海棕一株高入雲龍鱗犀甲相錯落蒼稜白皮十抱文自一作但是衆木亂紛紛海棕焉於䖍切知身出羣移栽北辰一作地不可得時有西域胡僧識上四咏海棕下乃撫棕有感無一株入雲逺望也鱗甲蒼白近視也惜乎混跡羣木從自見其竒孰能移之以植禁苑乎然抱此異質終當遇識者之鑒賞矣蜀杜臆公抱經濟而不得識自負自歎非咏海棕也都賦于東則左綿巴東百濮所充舊注綿州涪水所經涪居其右綿居其左故曰左綿龍鱗粗犀甲細蒼稜白皮其文理似之王揚雄甘泉賦嵌巖巖其龍鱗移考工記犀甲七屬融古意木葉亂紛紛杜臆栽北辰從天上種白榆脱來可漢武帝穿昆明池池底皆黒灰問東方朔朔曰不知問西域僧法蘭法蘭蓋博物者也姜楚公畫角鷹歌鶴注此寳應元年至綿州時作姜皎以誅竇懷貞功進殿中監楚國公其子慶初亦襲封楚國公至名畫記姜皎上邽人善畫鷹鳥𤣥宗即位累官太常卿封楚國公夏埤雅鷹鷂頂有角毛微起通謂之角鷹胡客曰曾見角鷹頭上有羽直豎如角楚公畫鷹鷹戴角殺氣森森一作如到幽朔觀者貪愁一作徒驚掣臂一作壁飛畫師不是無心學此鷹寫真在左綿却嗟真骨遂虚傳梁間燕雀休驚怕亦未趙作未必摶空上上聲九天上四贊畫之神妙下四借鷹以寄慨愁鷹生漠北故云幽朔貪愁有二義貪其能飛又其飛去後之畫師不是無心學但不能學耳人見畫鷹神似反覺真鷹少色究竟畫中假影豈能騰空直上世人奈何好畫鷹而不好真鷹乎感慨無限幽記仲秋之月殺氣浸盛師氏曰書宅朔方曰幽都陰也朔北也掣臂飛謂掣臂鞲而欲飛去天戰國䇿燕雀處堂楚辭指九以為正王嗣奭曰形容佳畫止於奪真而窮工極變如高堂見生鶻颯奭動秋骨竒矣却嗟真骨遂虚傳更竒東津送韋諷攝閬州録事梁權道編在寳應元年鶴注東津在綿州江水之東津聞説江山好憐君吏隱兼寵行舟逺泛惜别酒頻添推薦非承乏操持必去上聲嫌他時如按縣不得慢陶潛上四送韋諷下四攝閬州去吏而兼隱得領江山佳勝矣非承乏以賢攝官也必嫌以廉盡職也顧注末句囑其毋慢屬員郵左傳攝官承乏帶晉書陶潛傳潛為彭澤令郡遣督至縣吏白應束見之潛解印去縣乃賦歸去來郡白帖録事參軍即古督郵之職光禄坂行蔡夢弼曰光祿坂在梓州銅山縣寧鶴注此是寶應元年在梓州作考崔傳云寶應初蜀亂道路不通與此詩相合山行落日下去聲絶壁南望千山萬山一作水赤樹枝有鳥亂鳴正異定作棲時暝色無人獨歸客馬驚不憂深谷墜草動只怕長弓射音石安得更似開元中道路即今多一作何擁隔光禄坂傷亂離奔走也前四坂上暮景後四度坂情事馬驚草動中途恐懼之狀因擁隔而念開元乃傷今思昔也實杜臆五六憂盜而不憂墜馬可謂巧於形容是真情景謝靈運詩晨䇿尋絶壁馬驚見國䇿其南史宋明帝以王景文外戚貴盛張永屢經軍旅疑將來難信乃自謂謡言曰一士不可親弓長射殺人者𤣥宗本紀開元間海内富安行雖萬里不持寸刃苦戰行鶴注上元二年段子璋反陷遂州綿州遂在涪江之南今詩云去年江南討狂賊當是寶應元年作苦駱賓王詩龍庭但戰苦戰身死馬將軍自云伏波之子孫干戈未定失壯士使我嘆恨傷精魂去年南行從英華一作江南討狂賊臨江把臂難再得别時孤雲今不飛時獨看平聲雲淚横臆苦戰行為將領死事而作也上四痛其陣没下四憶其生前波後漢馬援傳援撃交趾女子徴側徴貳璽書拜援伏將軍所阮瑀詩身盡氣力索精魂靡迴江淹詩孤雲出北山盧元昌曰黄鶴以馬將軍為馬巴州考公奉别馬巴州詩原注甫除京兆功曹此在廣徳間與子璋反時無渉去秋行鶴注當是寶應元年作與上首宜合看去秋涪扶鳩切江木落時臂槍一作蒼走馬誰家兒到今不知白骨處部曲有去皆無歸遂州城中漢節在遂州城外巴人稀戰場寃魂毎夜哭空令平聲野營猛士悲去秋行為戰士喪敗而作也來自涪水故白骨無歸没於遂州故寃魂夜哭元和郡國志涪江水西自郪縣界流入在射洪縣東一百歩有梓潼水與涪江合流按涪江在今重慶府合州鮑欽止曰段子璋反遂州刺史嗣虢王巨修屬郡禮出迎之被殺故曰遂州城中漢節在盖傷之也唐書遂州遂寧郡屬劍南東道所領按遂州今為遂寧縣屬潼川州潼川即唐之東川也守漢節暗用蘇武節漢高帝大風歌安得猛士兮四方朱鶴齡曰段子璋以上元二年四月反五月伏誅而此詩云去秋涪江木落時則非子璋反時事鮑注既未可據黄鶴以前詩為馬將軍㑹討子璋而死其説亦豈足深信耶次公謂其事在廣徳元年之秋亦無所證明大扺杜詩無考者皆當闕疑不必强為之説今按唐史出於傳聞未可盡信杜詩出於目撃不必致疑史謂子璋平於五月而詩云去秋涪江木落時盖至秋末而寇始削平也且子璋反束川陷遂州地與詩合其時月不符者必屬史傳之誤此時舎子璋之外别無叛東川者黄鮑二注恐未可盡非也廣州段功曹到得楊五長子兩切史譚書功曹却歸聊寄此詩鮑曰前有寄楊五桂州詩楊盖自桂而徙廣也鶴注寰宇記方輿記皆云梓州有銅梁山當是寶應元年在梓州得書而作中唐書京尹及諸都督府兼有功曹參軍廣州為都督府故置衛青開幕府楊僕將去聲樓船漢節梅花外春城海水邊銅梁書逺及珠浦使去聲將旋貧病他鄉老煩君萬里傳此答楊長史而作也末帶託段之意梅黄生注楊為長史乃幕府之職首句切官次句切姓嶺之外南海之邊楊駐軍於此也銅梁公所在珠浦段所徃採輿地佳名以助詩色杜臆本説書及銅梁特倒言之耳既貧且病而又在他鄉公之近狀五字盡之號東觀漢記衛青大克匈奴武帝拜大將軍於幕中因幕府庾信碑文方衛青之張幕册重元勲浦漢南越傳主爵都尉楊僕為樓船將軍出豫章下横寰字記銅梁山有二屬合州梓州益州者舊傳楚襄王滅巴子封庶子於濮江之南曰銅梁侯十道志銅梁在涪江之南唐書亷州有合浦縣出珠方輿記合浦水去浦八十里有潿州其地産珠後漢孟嘗為合浦太守郡不産榖實而海出珠忘謝朓詩敢恤貧病送段功曹歸廣州黄鶴編在寶應元年成都詩内以詩有寄錦官城句也今按功曹相㑹於梓州故云銅梁書逺及梓州僻逺惟成都為都㑹之地便於寄書故以錦官城囑之錦官收書公有弟在草堂也自廣至蜀程途數千餘里豈能兩歲之間功曹連作徃返耶當從蔡編列在梓州内南海春一作青天外功曹幾月程一作行峽雲籠樹小湖日蕩正異作蕩他本作落船明交趾丹砂重韶州白葛輕幸君因旅一作估客時寄錦官城上四段歸廣州下四望其寄贈峽南海所歸之地春天啟行之時雲湖日經過之景丹砂白葛廣州所産者藉以延年而却暑也杜臆送行在春而數月之程不能春到故云春天外船而明三峽山高故雲籠樹而小洞庭湖濶故日蕩胡夏客曰砂重葛輕遊客是物相索自古然矣未岀峽以後必經洞庭而後至廣舊指蜀中東湖西湖然交趾國近嶺南唐書韶州始興郡屬嶺南道旅杜審言詩客三秋至申涵光曰此詩上六句句尾皆拈單字亦犯疊足之病題𤣥武禪師屋壁鶴注此當是寶應元年梓州作唐書𤣥武縣屬梓州本𨽻益州武徳三年來屬何年顧虎頭滿壁一作座畫滄一作灜洲赤日石林氣青天江海一作水流錫飛常近鶴杯渡不驚鷗似得廬山路真隨惠逺遊上四記畫壁下四贊禪師錫石林江海就畫中形容山水足上滄洲意飛杯渡從山水想見人物起下惠逺意中間四句雖皆言景而意各有屬錫飛常近鶴全用高僧傳事杯渡不驚鷗參用傳燈録及列子海鷗事本不相䝉大槩壁畫上山前有鶴水際有鷗因此想出錫飛杯渡以㸃綴之此詩家無中生有之法不然强用驚鷗為襯韻矣小生注起語本借形説得突然驚怪杜修可曰顧愷之字虎頭晉陵無錫人多才氣尤工丹青傳寫形勢莫不絶妙曾於瓦棺寺北殿畫維摩詰畫訖光耀月餘楚辭上有石林天台賦應真飛錫以躡虚注應真得道人執錫杖行於虛空故曰飛也高僧傳舒州潛山最竒絶而山麓尤勝誌公與白鶴道人欲之同白武帝帝俾各以物識其地得者居之道人以鶴誌公以錫已而鶴先飛去至麓將止忽聞空中錫飛聲誌公之錫遂卓於山麓道人不懌然以前言不可食遂各於所識築室焉舊注劉宋時杯渡者不知姓名常乗木杯渡水止宿一家有金像求之弗得因竊以去主人追之至孟津浮木杯渡河無假風棹輕疾如飛庾信麥積崖佛龕銘飛錫遥來度杯逺至恵逺住廬山一時名人如劉遺民雷次宗輩並棄世遺榮依逺遊止沈氏曰陶淵明與惠逺遊從結白蓮社公盖以陶自比也黄生曰此詩一邊贊畫一邊贊禪師凡題有主人必須照顧此唐人不易之法也又曰三四本極竒極險語人多作尋常看過以竒在立意而句法渾融故耳胡應麟曰荒庭垂橘柚古屋畫龍蛇錫飛常近鶴杯渡不驚鷗杜用事入化處然不作用事看則古廟之荒涼畫壁之飛動亦更無人可著語此杜老千古絶技未易追也悲秋鶴注此當是寶應元年秋在梓州未迎家時作是時史朝義與吐蕃未平而蜀又有徐知道之亂故云羣盜尚縱横又云家逺傳書日楚辭悲哉秋之為氣也涼風動萬里羣盜尚縱平聲横家逺傳一作待書日秋來為客情愁窺高鳥過老逐衆人行始欲投三峽何由見兩京首句悲秋之景次句悲秋之意三承羣盜思家而悲四承涼風作客而悲下截皆承客情説黄生注三四與老妻書數紙應悉未歸情同意此則其初寄者後半亦屬書中語時蜀有徐知道之亂思下峽而不果後乃擕家赴梓州耳引秦紀羣盜䑕竊狗偷漢武帝書盜賊縱横高鳥句興下句陶潛詩望雲慚高鳥謝靈運詩兩京愧佳麗客夜鶴注寶應元年秋自綿至梓時家在成都秋晚方迎家再至梓因秋夜而賦此客睡何曾音層著渉畧切秋天不肯明入一作巻簾殘月影高枕逺一作送江聲計拙無衣食途窮仗友生老妻書數紙應平聲悉未歸情此秋夜有感而作也上四客夜之景下四客夜之情杜臆何曾不肯四字愁懷畢露所謂愁人知夜長也五六正寫作客未歸之故趙汸注惟夜乆見月殘惟夜靜聞江逺洪仲注高枕對入簾謂江聲高於枕上此以實字作活字用今按夔州詩高峯寒上日疊嶺宿霾雲寒字亦同此例衣食仗友生舊謂依東蜀高適者非嚴武入朝後適移鎮西川公已擕家入梓矣在梓州時最善章彞仗友或指此耶肯鳴庾信小園賦異秋天而可悲房陶潛詩晨雞不呉曾漫録張説深渡驛詩洞懸月影高枕聽江流此用其意不何遜詩簾中看月影裁杜審言詩江聲連驟雨詩求友生沈佺期詩縫憶老妻書乃寄妻之書葛常之韻語陽秋曰少陵客夜詩客睡何曾著秋天不肯明又泛江詩山豁何時斷江平不肯流不肯二字含蓄甚佳與淵明所云日月不肯遲四時相催逼同意客亭此與前章乃同時所作秋牕猶曙色落木一作木落更高一作天風日出寒山外江流宿霧中聖朝音潮無棄物衰一作老一作多病已成一云衰翁多少殘生事飄零任轉蓬此從夜説至旦上四客亭之景下四客亭之情杜臆曙色高風即諺語日高風也三四寫客途曉景如畫無顧注孟浩然詩不才明主棄多病故人疎此云聖朝棄物老病已成翁語相似而意更含蓄也老病餘生尚有多少事在即昌黎所謂奔走於衣食老子聖人常善救人故無棄物楊慎曰謝靈運詩曉聞夕飈急夜風逹旦也晚見朝日暾倒景反照也二語甚有變互乍讀似乎費解杜詩深山催短景喬木易高風言風從夕起也又云秋牕猶曙色落木更高風言至曉猶風也孟郊詩云南山塞天地日月石上生高峰駐夕景深谷夜光明言落日迴照也此皆從謝詩翻出劉攽貢父曰人多取佳句為句圖特小巧美麗可喜皆指詠風景影似百物者耳不得見雄才逺思之人也梅聖俞愛嚴維詩曰柳塘春水漫花塢夕陽遲固美矣細較之夕陽遲則係花春水漫何須柳耶工部詩云深山催短景喬木易高風此可無瑕纇又曰蕭條九州内人少豺虎多人少慎莫投多虎信所過饑有易子食獸猶畏虞羅此等句其含蓄深逺不可模傚九日登梓州城鶴注寶應元年及廣徳元年公皆在梓州據後詩云去年登高郪縣北知此詩乃寶應元年所作天一統志唐梓州領縣五又分置遂州改靜戎軍寶初改梓州為梓潼郡至徳中置東川節度使屬劍南道治梓州綿州在其直北今為潼川州伊昔黄花酒如今白髮翁追歡筋力異望逺歲時同弟妹悲歌裏乾坤一作朝廷醉眼中兵戈與關塞此日意無窮上四九日登城下四逺望有感忍黄花言景白髪叙情筋力承髪歲時承花悲歌家不言醉眼國不忍見兵戈阻於關塞此家國所以兩愁也昔朱注兵戈關塞是時徐知道兵守劍閣江淹詩伊值世亂史記悲歌慷慨帝庾信詩花鬟醉眼纈隋煬詩醉眼暗相看九日奉寄嚴大夫趙曰嚴武歸朝以御史中丞進為大夫邵注時嚴武還朝尚在蜀棧道中九日應平聲愁思去聲經時冒險艱不眠持漢節何路出巴山小驛香醪嫩重平聲巖細菊草堂作雨斑遙知簇鞍馬回首白雲間此梓州寄候嚴公也上四九日時事代嚴寫憂下四九日時景謂嚴見憶不眠句承愁思何路句承險艱小驛重巖即巴西之地回首則駐馬而騎從皆停故云簇鞍馬杜臆通篇不説憶嚴只寫其客行之景與思已之情正是深於憶者淹陌上桑不知天路險艱陶潛詩不眠知夕永江詩辛苦持漢節師古曰節以毛為之上下相重取象竹節將命者持之以為信地理志大巴山在保寜府南江大巴之險過於連雲棧下通漢中佺期詩園花瑇瑁斑張正見詩重巖標虎據雲沈顧注停雲思友故曰白間巴嶺答杜二見憶附嚴武詩卧向巴山落月時兩鄉千里夢相思可但歩兵偏愛酒也去聲知光禄最能詩江頭赤葉楓愁客籬外黄花菊對誰䟦馬望君非一度冷猿秋雁不勝平聲悲此嚴武在巴山而答詩也梓在東巴在西故曰兩鄉三四言情稱杜逸興五六言景憐杜寂寞末則遥望生悲應上相思意江頭梓州流寓籬外草堂舊居愁客對誰下兩字另讀相謝朓詩何况隔兩鄉晉書嵇康與吕安友善毎一思千里命駕有謝朓詩歸夢相思夕兵晉書阮籍聞歩兵厨營善釀貯酒三百斛求為歩校尉宋書顔延之傳世祖踐祚以為金紫光禄大夫領湘東王師楓似白楊甚高大葉圓而岐霜後丹色可愛爾雅翼南史郭世通傳採笋置籬外之庾肩吾詩籬下黄花菊蔡邕月令章句黄花者土氣所成也續晉陽秋陶潛嘗九日無酒出菊花叢中摘盈把坐其側善跋草行也則梁元帝詩寒夜猿聲徹爾雅翼猿雄者啼啼數聲衆猿呌嘯騰擲如相和焉其音凄入肝脾韻音含宫商故也淮南鴻烈仲秋鴻雁來季秋候雁來集中所載嚴武酬答諸詩皆逐句相答杜云何路出巴山故有卧向巴山句杜云九日應愁思故有千里夢思句杜云小驛香醪嫩故有愛酒能詩句杜云重巖細菊斑故有赤葉黄花句杜云簇馬回首故有跋馬望君句此可作唱和法也可王嗣奭曰讀二詩見兩公交情形骸不隔知欲殺之誣秋盡張綖注寶應元年七月嚴武召還公送至綿州未幾蜀有徐知道之亂因入梓州杜臆此詩在未迎家之前其迎妻子不見於詩不知果在何時且九日有寄嚴大夫詩去秋盡無幾何得復有迎妻子之日耶東行未回謂到梓未還成都也秋盡東行且未迴茅齋寄在少去聲城隈籬邊老却陶潛菊江上徒逢袁紹杯雪嶺獨看平聲西日落一云暮劍門猶阻一作斷北人來不辭萬里長為客懷抱何時好一開一云得好開也此秋盡思家而作上四秋日景事下則感時而自歎梓屬東川齋在成都籬邊菊指草堂之花江上杯盖李梓州為主也看西日家室逺離阻北人寇兵斷閣此客愁所以未解三承二四承一七八承五六此見章法之連絡張徐陵詩茅齋本自空州邵注少城在成都大城之西儀所築洪容齋云益刺史治大城蜀郡太守治少城於西都賦商洛縁其隈説文隈水回也世説顔延之籬邊聞張演與客語陶潛菊見前九日登梓州城詩註州謝朓詩蕭條江上來𤣥楊慎曰鄭𤣥傳袁紹總兵冀遣使要𤣥大㑹賓客最後至乃延升上座身長八尺飲酒一斛秀眉明目容儀温偉舊指河朔之飲非是朱瀚曰客行向束故居轉西梓州北望正直劍門隅全大鏞曰草堂詩云羣小起異圖又云北斷劍閣此劍門猶阻之證也戲題寄上上聲漢中王三首原注時王在梓州斷酒不飲篇中戲述此寶應元年徃梓州時作西舊書瑀讓皇帝第六子早有才望偉儀表封隴郡公從明皇幸蜀至漢中封漢中王仍加銀青光禄大夫漢中郡太守持新書本傳肅宗詔收羣臣馬助戰瑀與魏少遊不可帝怒貶蓬州長史鶴曰據此詩云不能隨皂盖又奉漢中王手札詩云剖符來蜀道皆是太守事且少遊以衛尉卿貶渠州長史而瑀以親王不應亦貶長史當是刺史而新史誤為長史耳漢中即今興元府瑀乃汝陽王璡之弟西漢親王子成都老客星百年雙白鬢一别五秋一作飛螢忍斷音短杯中物秖一作眠看平聲座右銘不能隨皂盖自醉逐流萍首章因王斷飲而諷之後四乃戲詞心各當裏白之年而乆别方聚正可借酒談今王復斷酒看銘將不得與之同飲矣唯有旅中獨醉而已首聨賓主分提次聨賓主合叙後四賓主對收蔡邕獨斷漢制皇帝子封王其實諸侯也漢天子稱皇帝故以王號加之總名諸侯王封徳􅂜曰漢所封惟帝子若親昆弟其屬逺非大功不立年嚴光與光武同宿史占客星犯帝座公自喻也公方踰五十漢中王當亦在五十之時合兩人計之故曰百年雙白鬢為鶴曰公自乾元元年出華州時與王别至寶應元年五年進駱賓王挽歌百年三萬日一别㡬千秋後陶潛詩且杯中物偽蘇注引呉衎事乃妄撰者漢崔瑗銘其座右舉所當戒謹者以自警漢二千石朱旛皂盖䇿杖時能出王門異昔遊已知嗟不起未許醉相留蜀酒濃無敵江魚美可求終思一酩酊淨掃雁池頭此勸王無忘燕好下四屬􅃧詞述䇿杖而出已興猶存王門異昔不復燕客也嗟不起王自歎之詞未許留惜王斷酒之禁蜀酒江魚儘堪適口何不淨掃池頭以博一醉乃冀王欵留也不起用七發語醉留用陳孟公事酩酊用山簡事雁池用梁孝王事虎慈水姜氏曰杖䇿者䇿杖而行蕭琛少時見王儉著皮靴䇿桃枝杖直造王儉坐則古人於杖雖少年皆用之矣巴曹植詩䇿杖從我遊水經注巴鄉村人善釀俗稱鄉出美酒又嘉魚出於丙穴池西京雜記梁孝王築園有雁池間有鶴洲鳬渚王病不起舊注引謝安傳語安寢疾曰吾昔夢雞今歲在酉吾殆不起乎但謝公所云不起乃病亡之兆豈可引比漢中乎盧元昌曰不起者謂王病酒不能起本枚乗七發篇中連用起字于音曰太子能强起聽之乎于味曰太子能强起嘗之乎于馬曰太子能强起乗之乎太子連曰子病未能此以楚太子比漢中王也博議又引殷浩傳深源不起謂王嗟杜公不復起用細玩三章只是諷王斷酒並無自述潦倒意恐亦未合羣盜無歸路衰顔㑹逺方尚憐詩警䇿猶記一作憶酒顛狂魯衛彌尊重徐陳畧喪去聲亡空餘枚一作故􅅱在應平聲念早升堂此望王親厚故交三四亦戲詞史羣盜蜀有徐知道兩京有党項羌東都有朝義無歸路公不能歸鄉㑹逺方遇王於梓州王既憐愛詩才亦須記憶酒興意盖索飲也魯衛比王兄弟俱貴徐陳比王賓客已衰枚叟公自謂舊已登堂今不得謝絶也居三首俱帶索飲意故曰戲題陸機文賦立片言以要為一篇之警䇿尊傅亮封諸皇弟皇子奏地均魯衛徳兼庸賢中庸其位重其禄徐陳謂徐幹陳琳也魏文帝與呉質書昔年疾疫親故多罹其災徐陳應劉一時俱逝雪賦召鄒生延枚叟漢書枚乗為𢎞農都尉去官遊梁梁客皆善屬詞賦乗尤高詩品公幹升堂思王入室翫月呈漢中王依蔡氏編在寳應元年梓州詩内夜深露氣清江月滿江城浮一作游客轉危坐歸舟應平聲獨行關山同一照海綠作㸃烏鵲自多驚欲得淮王術風吹暈音運已生此詩自叙呈王皆於玩月中寫出為露清月滿夜景殊勝乃浮客轉為危坐者别王而獨行耳關山同照王亦逺謫也烏鵲多驚自歎羇孤也二句詠月下情景既而風吹暈生月光微靄故欲得淮王術以破之此句屬謔詞連黄生注五六即萬象皆春氣孤槎自客星意謝恵詩眷眷浮客心後漢書茅容避雨樹下危坐愈恭本記云日月無私照崔日用詩萬里照關山此同照所楊用修作一㸃引東坡洞仙歌云繡簾開一㸃明月窺人用其語也赤壁賦云山高月小用其意也此説涉於新巧曹孟徳詩月明星稀烏鵲南飛月淮南子畫蘆灰而月暈闕許慎注有軍士相圍守則暈以蘆灰環月闕其一面則月暈亦闕於上庾肩吾詩圓隨漢東蚌暈逐淮王灰廣韻暈日月旁氣月暈則多風王褒關山月天寒光轉白風多暈欲生從事行杜臆舊作相從行無謂當作從事行贈嚴二别駕一云嚴别駕相逢歌梓鶴曰魯師二注及梁氏編次皆以為永泰元年州避亂時作考崔旰之亂在是年閏十月公已次雲安矣當是寶應元年避徐知道入梓州時作故詩云成都亂罷氣蕭索浣花草堂亦何有若在永泰元年則決意下忠渝矣豈復十歩一首回於草堂乎諸本題下並註云時方經崔旰之亂此皆注家妄添而後人不察以為公自注耳我行入東川十歩一迴首成都亂罷氣蕭索趙作瑟一作颯浣花草堂亦何有從東川回想草堂恐遭亂焚毁也治元和郡國志梓州今為東川節度使所知通鑑寶應元年秋七月劍南兵馬使徐知道反八月道為其將李忠厚所殺於是劍南悉平何遜詩蕭索高秋暮梓中一作州豪俊一作貴大者誰本州從事知名乆把臂開樽飲去聲我酒酒酣撃劍蛟龍吼烏帽拂塵青騾一作螺粟紫衣將炙音借緋衣走此記别駕待客之情劍蛟龍吼指舞劍言用晉書躍延津化為二龍事烏帽則拂其塵青騾則飼以粟紫衣者進肉緋衣者奔走皆席中實事史記山東豪俊師氏曰梓州屬東川嚴二為梓州别駕如今之通判乃梓州人為本州從事鶴曰于定國條州大小為設吏員治中别駕諸郡從事秩六百石又續通典云唐以堂吏朱儉為華州别駕給事郎蕭傚駁曰别駕古為治中從事與刺史别乗則别駕稱從事其來尚矣光盧諶詩豈謂鄉曲譽謬充本州役晉白紵歌袍以軀巾拂麈奴朱注趙云青螺粟帽之紋也此説非是盖即公詩與白飯馬青芻意當依卞氏本作青騾炙膾炙也銅盤燒蠟光卞作炎吐日夜如何其音箕初促膝黄昏始扣主人門誰謂俄頃晉作我傾膠在漆萬事盡付形骸外百年未見英華作及歡娛畢神傾意豁真佳士乆客多憂今愈疾此叙夜來豪飲之興領膠投漆中喻賓主相得此時萬事俱忘百年不計但此一番傾倒開豁不覺乆病頓瘳矣銅古詩請説銅爐器崔巍象南山上枝似松柏下根據盤銅盤燭臺也詩夜如何其夜未央梁朱异歌促膝兮道故乆要兮不忘是謂黄昏古詩來到主人門淮南子日薄於虞泉劉孝威詩循江俄頃回如後漢書陳重與雷義為友鄉里語曰膠漆自謂堅不雷與陳莊子索我於形骸之外晉書司馬承傳王敦曰大王雅素佳士高視乾坤又可一作何愁一體一作軀交態同一作真悠悠垂老遇君未恨晚似君須向古人求末感歎别駕交誼悠杜臆高視二句起伏頓挫言乾坤之大而交態同屬悠唯嚴君意氣能不媿於古人耳此章首尾各四句第三段六句第四段八句夫翟方進傳一貴一賤乃見交態漢書武安侯傳灌與魏其相得歡甚無厭恨相知晚也説魏志劉先主曰若元龍文武膽志當求之於古耳世晉武帝問王戎曰夷甫當世誰比戎云未見其比當從古人中求耳贈韋贊善别黄鶴單復俱編在寶應元年梓州詩内唐志東宫官左贊善大夫五人掌傳令諷過失贊禮儀扶病送君發自憐猶不歸祗應平聲盡客淚復扶又切作掩荆扉江漢故人少音書從此稀徃還二十載上聲歲晚寸心違上四送别之意下四别後之懷通首皆屬叙情婉寸心違不得遂聚首之樂也杜臆此詩語多轉無限感傷真堪一字一淚寄高適按代宗即位在寶應元年四月此時公在成都高在蜀川不得云乾坤隔逺自嚴武還京高適代尹成都公則自綿入梓故有隔逺之語此詩寄適當在是年之秋舊編俱未當楚隔乾坤逺難招病客魂詩名惟我共世事與誰論平聲北闕更平聲新主南星落故園定知相見日爛漫倒芳樽此在梓州而寄詩於適也一二從高説至已三四從已説向高此叙出相隔苦衷新主初立則故園可歸從此相見傾樽得以談詩論事此豫道還京之樂也傳杜臆招魂乃宋玉所賦玉本楚人故起句用之適本五十工詩好事者輙傳布又具王霸大畧慷慨善談論三四正道其實以南星對北闕是借喻語公與適將自南而回故曰落故園公詩南極一星朝北斗意正相似南按史記天官書東井之西曲星曰鉞鉞北北河鉞南河正義曰鉞乃秦之分野南河三星北河三星分夾東井南北置而為戒南星不見則南道不通北亦如之此云南星落照故園是南星見而南北道通矣且於長安分野亦有取義爛漫醉貌此詩諸家聚訟多疑贋本顧注疑高適還京在廣徳二年不得稱新主不知送高還朝别有一詩此則喜代宗初立而作不必牽合同時朱注疑成都為蜀地不得言楚考七國時蜀本屬楚前送李校書詩亦云已見楚山碧則高在成都亦何不可言楚乎杜臆疑適家滄州不得言故園按公本杜陵人故以長安為故園原未嘗専指適也諸説紛紛今並正之野望鶴注此詩寶應元年十一月在射洪縣作程氏曰射洪縣在梓州東六十里金華山北一作南涪音浮水西仲冬風日始去聲凄凄山連越嶲音水蟠三蜀水散巴渝下五谿獨鶴不知何事舞饑烏似欲向人啼射洪春酒寒仍緑極目一作目極傷神誰為去聲擕此在射洪而野望也望山北水西野望之地仲冬風日野望之時次聨逺承上山水三聨近望起下傷神仍在上下四句分截蟠山發南荒水通楚界數千里脉絡包在二句曰連曰山形長而曲也曰散曰下水勢分而合也獨鶴有似羇棲故見舞而訝饑烏有感旅食故聞啼而憐觸目傷情因思擕酒銷愁耳顧注酒煖則緑射洪寒輕故冬酒仍緑應上始凄凄極目二字明㸃望字金華山在射洪縣北縣又在涪水之西方輿勝覽金華山在梓州射洪縣一統志在潼川州射洪縣北二里漢書越嶲郡本益州西南外夷武帝初開置唐書嶲州越嶲郡屬劍南道御覽永昌郡傳云越嶲郡在建寧西北千七百里自建寜高山相連至川中平地東西南北八百餘里一統志今為四川行都司􅛳常璩蜀志秦置蜀郡漢高祖置廣漢郡武帝又分置為郡後人謂之三蜀三蜀蜀郡漢郡犍為郡也渠寰宇記巴州北水一名巴嶺水一名渝州水一名宕水渝州今𨽻巴縣三巴記云閬白二水東南流曲折三回如巴字故稱三巴水經注武陵有五溪謂雄溪樠溪力溪潕溪酉溪也辰溪其一焉夾溪悉是蠻左右所居故謂五溪蠻也郭棐酉陽正爼云五溪皆槃瓠子孫所居其後為巴春秋時楚子滅巴巴子兄弟五人流入五溪各為一溪之長秦昭王伐楚取其地因謂之五溪蠻寰宇記黔州涪陵水西北注涪州入蜀江黔州今辰州地即五溪水也涪水至渝州與岷江合至忠涪以下五溪水來入焉此云下五溪盖約畧大勢言之箭謝朓詩獨鶴方朝唳饑鼯此夜啼張正見詩饑烏落鋒元和郡國志㳯潼水與涪江合流急如箭奔射涪江口蜀人謂水口為洪因名射洪豳風十月穫稻而云為此春酒盖冬釀而春成也此詩春酒寒仍縁亦言冬酒朱極目傷神四字對舉據成都野望詩用出郊極目從本為是冬到金華山觀去聲因得故拾遺陳公學堂遺跡鶴曰寶應元年秋公自梓歸成都迎家再至梓州十一月徃射洪乃是時作廣徳元年雖亦在梓而冬已徃閬州矣厯輿地紀勝陳拾遺書堂在射洪縣北金華山大中東川節度使李叔明為立旌徳碑於金華山讀書堂今在玉京觀之後本地志金華山上拂雲霄下瞰涪江有玉京觀在山上東晉陳勲學道山中白日仙去梁天監中建觀唐書陳子昻字伯玉梓州射洪人常讀書於金華山涪右衆山内金華紫崔嵬上有蔚藍天垂光抱瓊臺首記金華山觀南上二山之高下二觀之麗注黄希曰水經云涪水東合射江故梓州云涪右朱涪右在涪江之右也陟謝靈運詩衆山亦當空映爾雅石戴土謂之崔嵬詩彼崔嵬吳論山色上若天光下垂而迴抱於丹臺瓊赤玉也與上紫字相應度師氏曰蔚藍乃洞天之名金華山有觀故云杜田曰人經三十二天三十二帝諸天皆有隱名第一太黄皇曾天鬱繿玉明繿音藍蔚藍即鬱繿也趙曰蔚藍謂茂蔚之藍天之青色如此若如杜説鬱作蔚繿作藍豈有兩字俱改易之理今詩人言水曰挼藍水則天之青曰蔚藍陸放翁曰蔚藍乃隱語天名非可以義理解也杜詩用之猶未有害韓子蒼乃云水色天光共蔚藍直謂天水之色俱如藍耳恐又因杜而失之者也臺天台賦瓊臺中天而懸居金根經天闕上有瓊樓玉主衆仙出入之所也太平經太空瓊臺洞門列真之殿金華之内侍女衆真之所處繫音計舟接絶壑一作壁杖䇿窮縈回四顧俯層巔淡然川谷開雪嶺日色一作光死霜鴻有餘哀焚香玉女跪霧裏仙人來此記登山瞻眺乃觀中冬景從水而來故繫舟陟山之上故杖䇿層巔川谷遍覽山水也玉女謂燒香者仙人謂訪道者駱賓王詩薄烟横絶壑厲陸士衡詩杖䇿將逺尋巔應瑒馳射賦爾乃縈回盤謝靈運詩築臺基層曹植詩仙人翔其隅玉女戲其阿陳公讀書堂石柱仄青苔悲風為去聲我起激烈傷雄才此嘆學堂遺跡也矣柱仄苔青見其荒涼臨風激烈弔古情湥此章中間八句前後各四句古江淹詩青苔日夜黄詩長歌正激烈陳拾遺故宅楊徳周曰陳拾遺故宅在射洪縣東武山下去縣北里許本集云子昂四世祖陳方慶好道隱於此有唐朝道觀址而真諦寺在其左碑目云陳拾遺故宅有趙彦昭郭元振題壁拾遺平昔居大屋一作宅尚修椽悠揚一作悠悠荒山日慘澹英華作崔崒故園一作國烟首記拾遺故宅遜易林大屋之下朝多君子何詩獨守故園扉位下曷足傷所貴者聖賢有才繼騷雅哲匠不比肩公生揚馬後名與日月懸此贊其才名過人足上追騷雅下踵揚馬六朝不道矣子昻為麟臺正字其位卑下初變盖本乎離騷二雅也趙曰江左之詩至子昂而殷仲文詩哲匠感蕭辰盧藏用子昂别傳經史百家罔不該覽尤善屬文雅有相如子雲風骨按揚馬皆蜀人故比之陳公易懸象著明莫大乎日月同遊英俊人多秉輔佐權彦昭超吳作趙玉價郭震晉作震一作振起通泉到今素壁滑灑翰銀鈎連此誌其交遊遺迹玉公見壁上題筆因知趙郭同遊也胡震亨曰趙有美故比彦昭郭為縣尉起自通泉鶴注彦昭與元振同業太學故宜同遊唐書先天二年元振以兵部尚書同中書門下三品與彦昭相同故云多秉輔佐權也草湛方生云素壁流光驚索靖書狀婉若銀鈎飄若鴻盛事㑹一時此堂豈千年終古立一作占忠義感遇有遺篇一作編盛末從故宅感慨言事已徃堂宇終湮但詩留忠義自足傳之不朽耳遇此章起結各四句中二段各六句皎然曰子昂感其源出於阮公詠懷寓朱注感遇詩多感歎武后革命時㫖神仙故公以忠義稱之王嗣奭曰拾遺感遇詩著名已乆然閲其本傳及集中所上書疏多侃侃忠直語此詩前提聖賢後結忠義盖能立忠義乃是聖賢之徒而終古不朽矣公特闡其幽見其文章有本領也謁文公上方黄鶴編在寶應元年梓州内􅁪維摩經汝徃上方界分度四十二河沙佛土前漢翼奉傳云上方之情樂也野寺隱喬木山僧高下居石門日色異絳氣横扶疎窈音作窅窕入風磴丁鄧切長蘿紛巻舒庭前猛虎卧遂得文公廬首記上方景象二野寺二句遥望寺前石門二句近至山門風磴句入寺之路庭前二句直造寺中矣巻高下居僧房層疊絳氣横日映霞光風磴石梯凌風舒風動藤蘿也猛虎卧庭比其法力神通江淹詩絳氣下縈薄注絳氣赤霞氣也以扶疎歸去來辭既窈窕以尋壑洞簫賦標敷紛史記不避猛虎之害之高僧傳惠永住廬山西林寺屋中常有一虎人或畏輙驅出令上山人去後還復馴伏又潭州善覺禪師以二虎為侍者俯視萬家邑烟塵對階除吾師雨花外不下去聲十年餘長子兩切者自布金禪龕只宴如大一作火珠脱玷翳白月一作日當空虛此贊文公道法公登堂俯視烟塵即在目前文説法之外乆不下接塵世矣施金者至而禪心不動外忘物也中無所翳而虛明常在定生慧也杜臆俯視二句便知上方所由名樓國䇿韓康子使使者致萬家之邑於智伯王粲登賦循堦除而下降兮續高僧傳法雲講法華經忽感天花狀如飛雪滿空而下延於堂内升空不墜又勝光寺道宗講大論天雨衆花旋繞講堂飛流户内俱一説以不下為不減十年恐於上文外字本句餘字未安耳西域記昔善施長者拯乏濟貧哀孤惜老時號給孤獨願建精舎請佛降臨惟太子逝多園地爽塏具以情告太子戲言金遍乃賣善施即出藏金隨言布地建立精舎室陳何處士詩禪龕八想淨義窟四塵輕廣韻龕墖下嵇康詩與世無營神氣晏如佛唐書天竺國王月羅逸多獻火珠鬱金菩提樹洙曰書有牟尼珠及水月之説言其性之圓明也楞嚴經白月則光黒月則暗法苑珠林西方一月分為黒白初月一日至十五日名為白月十六日已去至於月盡名為黒月甫也南北人蕪蔓少耘鋤乆遭詩酒汚去聲何事沗簪裾王侯與螻蟻同盡隨丘墟願聞第一義迴向心地初金箆刮眼膜價重百車渠無生有汲引兹理儻吹嘘末叙來謁之意此上六作悔語下六作悟語於詩酒為障簪裾繫情則中蕪蔓矣既知貴賤同歸盡須向心地用功刮膜去外來之蔽汲引開本性之覺各詠僧家詩全用釋典乃杜公獨歩處此章前二段八句末段十二句收詩詩酒間長筵檀弓丘也東西南北之人也詩王勃孔魚詩吾子盛簪裾鮑照同盡無貴賤槃李斯傳國為邱墟第楞嚴經所説自然成第一義湼經出世人所知名一義諦世人所知名為世諦𢎞明集昭明太子答問二諦一真諦曰第一義諦二俗諦亦曰世諦華嚴經菩薩摩訶薩有十種迴向詣華嚴論有心地法門金湼槃經如盲目人為治日造良醫是時良醫即以箆抉其眼膜法華經或有行施金銀珊瑚珍珠􅟴璖瑪瑙廣雅車渠石次玉廣志車渠出大秦及西域諸國楞嚴經是人即獲無生法忍疏云真如實相名無生法無漏真智為忍江總棲霞寺碑汲引之常老子嘘之吹之東坡志林云子美詩知名未足稱局促商山芝又王侯與螻蟻同盡隨丘墟願聞第一義回向心地初知子美詩外别有事在也語王嗣奭曰王侯與螻蟻同盡隨丘墟不過襲莊列願聞第一義回向心地初亦禪門恒談東坡以此四句許公得道此窺公之淺者余讀公詩見道語未易屈指而公亦不自知也非以學佛得之平生饑餓窮愁無所不有天若有意煆煉之而動心忍性天機自露如鐵以百煉成鋼所存者鐵之筋也千古不磨矣西銘云富貴福澤以厚生生無不死貧賤憂戚以玊成成者不壞君子不以此易彼也宋張表臣曰予讀江漢思歸客乾坤一腐儒功業頻看鏡行藏獨倚樓嘆其含蓄如此及云虎氣必騰上龍身寧乆藏蛟龍得雲雨鵰鶚在秋天則又駭其奮迅也草深迷市井地僻懶衣裳經心石鏡月到面雪山風愛其清曠如此及云退朝花底散歸院柳邊迷君隨丞相後我住日華東則又怪其華艶也乆客得無淚故妻難及晨囊空恐羞澀留得一錢看嗟其窮愁如此及云香霧雲鬟濕清輝玉臂寒笑時花近靨舞罷錦纒頭則又疑其侈麗也至讀䜟歸龍鳯質威定虎狼都風塵三尺劍社稷一戎衣則又見其發揚而蹈厲矣五聖聨龍衮千官列雁行聖圖天廣大宗祀日光輝則又得其雄深而雅健矣許身一何愚竊比稷與契雖乏諫諍姿恐君有遺失則又知其許國而愛君也對食不能飡我心殊未諧人生無家别何以為蒸黎則知其傷時而憂民也不聞夏殷衷中自誅褒妲煌煌太宗業樹立甚宏達斯則隱惡揚善而春秋之義耳廵非瑶水逺迹是雕墻後天王守太白竚立更搔首斯則憂深思逺乃詩人之㫖耳至於上有蔚藍天垂光抱瓊臺風帆倚翠盖暮把東王衣乃神仙之致耶惟有摩尼珠可照濁水源願聞第一義回向心地初乃佛乗之義耶嗚呼有能窺其一二者便可名家况深造而具體者乎此予所以稚齒服膺華顛未至也奉贈射洪李四丈明甫内黄氏編在寶應元年梓州詩又注後魏置射洪縣唐屬梓州縣東有射江縣在梓州東南六十里丈人屋上烏人好烏亦好人生意氣豁不在相逢早此叙李交誼人劉向説苑太史謂武王曰愛其人兼屋上之烏憎其者惡其儲胥孔叢子亦云愛屋及烏北史李延壽序傳載閻信謂其祖李曉之言曰古人相知未必在早南京亂初定所向色一作邑正異定作色枯槁遊子無根株茅齋付秋草東征下去聲月峽挂席窮海島萬里須十金妻孥未相保此自叙行踪上四歎成都亂後草堂不可復居下四傷出峽無資室家未有歸處南杜臆十金不可得而至妻孥莫保窮途之困可知京注見十巻槁亂定徐知道已平枯槁謂景色蕭條記楚辭顔色枯謝朓詩根株乆離别李膺益州廣陽州東七里水南有遮要三槌石谷東二里至明月峽峽首南岸壁高四十丈其壁有圓孔形若滿月因以為名十道志渝州有明月峽三峽之始寰宇記明月峽在渝州巴縣東八十里海賦維長綃挂帆席揚雄傳家産不過十金舊注古者一兩金直十千今曰十金則為百千蒼茫風塵際蹭蹬騏驎老志士懷感傷心胸已傾倒末仍稱其意氣此騏驎自喻志士謂李章中段八句首尾各四句早發射洪縣南途中作鶴注此是寶應元年十一月南之通泉時作將老憂貧窶筋力豈能及征途乃呉作後一作復侵星得使諸病入從早行叙起有貧病交侵之感窶蔡邕古歌不獲已人將老詩終窶且貧詩傳者貧不能為禮也盡沈慶之詩朽老筋力鮑照詩侵星赴早路鄙人寡道氣在困無獨立俶裝逐徒旅逹曙一作曉凌險澀寒日出霧遲清江轉山急僕夫行不進駑馬若郭作苦維縶此記早行景事此窮難自立逐隊依人早行之故日䝉霧承逹曙江流急承凌險僕倦馬疲言征途况瘁在困無獨立説出饑餒依人英雄氣短真是無可如何耳山杜臆寒日清江二句寫途間早景入妙衆徐陵天台舘碑蕭然道氣卓矣仙才庾敳云處人中居然獨立飾思𤣥賦簡元辰而俶裝注俶始也方顔延之詩改服徒旅潘尼詩世故尚未夷崤函險澀寒宋龔芥隱筆記隂鏗詩野日燒中昏山路入江窮此日清江二句所本黄希曰清江指射洪水唐曰江為山所激也也楚辭僕夫悲余馬懷兮騏列子駑馬稜車可得而乗潘尼詩翔鳯嬰籠檻驥見維縶汀洲稍疎散風景開怏一作悁悒空慰所尚懷終非曩遊集衰顔偶一破勝事難屢一云皆空挹茫然阮籍途更灑楊朱泣此述途中情緒曩霧釋路平乃見疎散風景此處差堪慰懷惜非時遊興耳且衰顔暫破前徃恐無勝境窮途之哭岐路之悲終不免矣仍應年老困窮意此章四句起後兩段各八句楚辭搴汀洲兮杜若籍所尚懷謂意所好尚子梁景陵王傳善立勝事其阮途窮注别見淮南楊朱見岐路而泣之謂可以南可以北申涵光曰少時謀生頗易然正爾負氣豈屑及此至老方憂已無可奈何矣起語悵然鄙人寡道氣在困無獨立他人不肯自言然正是高處通泉驛南去通泉縣十五里山水作此自射洪之通泉而作也去魯訔曰地理志通泉縣在梓州東南百三十里縣十五里有佳山水俗號沈家坑公至此眺覽山水而作山舊唐書通泉漢廣漢縣地隋縣也寰宇記通泉在縣西北二十里東臨涪江絶壁二十餘丈水從山頂湧出下注涪江新書大厯二年屬遂州一月按唐通泉縣今併入射洪縣溪行衣自濕亭午氣始散冬温蚊蚋集一作在人逺鳬鴨亂登頓生一作坐曾層同陰欹傾出高岸此記山行之迹方曉行霑霧至午收蚊蚋集見地煖鳬鴨亂見境幽登頓欹傾來路﨑嶇也劉孝威詩溪行暗難開庾信詩山深雲濕衣天台賦羲和亭午游氣高褰行劉伶詩蚊蚋歸豐草陰登頓登而且頓謝靈運詩山窮登頓江淹詩曾萬里生谷詩高岸為驛樓衰柳側縣郭輕烟畔一川何綺麗盡日一作目窮壯觀讀去聲山色逺寂寞江光夕滋漫此記驛前之景逺從驛望郭通泉已近也川自山而注江故見其綺麗寂寞遥望悠然夕滋漫晚照増輝謝朓詩衰柳尚沉沉劉何遜詩輕烟淡柳色楨詩綺麗不可忘傷一作知時愧孔父去國同王粲我生苦飄零所厯有嗟嘆末叙已情見山水不足以舒憂也此章前二段各六句末段四句收漢杜修可曰孔子嘆鳯泣麟皆傷時之意趙次公曰獻帝西遷王粲之荆州依劉表其七哀詩云西京亂無象豺虎方搆患復棄中國去逺身適荆蠻過郭代公故宅鶴注郭公魏州貴鄉人宅在京師宣陽里今云故宅當是尉通泉時所居此自射洪之通泉時作豪俊一作雋初未遇其迹或脱畧代公尉通泉一作通泉尉放意何自若及夫音扶登衮冕直氣森噴薄磊落見異人豈伊常情度徒角切朝此言其才品不凡知疎於作尉而長於立正見大受不可小漢武帝制䇿廣延天下之豪俊字江淹賦脱畧公卿跌宕文史使唐書郭元振傳郭震元振以字顯授通泉尉任俠氣撥去小節則陶潛詩放意樂餘年衮通典注三公八命復加一命服衮龍周禮諸公自冕而下如王之服品唐書先天二年元振以兵部尚書同中書門下三呉都賦噴薄沸騰崔瑗張衡碑文磊落煥炳與神合契定䇿神龍後宫中翕清廓俄頃辯尊親指揮存顧託羣公有一作見慙色王室無削弱逈出名臣上丹青照臺閣此言其功在社稷神趙次公曰代公定䇿在睿宗先天二年去中宗龍改元凡八年今詩云定䇿神龍後盖太平擅寵始中宗朝則禍胎在神龍而下也俄頃二句謂太平既誅則尊位有歸親傳不失所以成睿宗付託之意同前漢宣帝紀論定䇿功益封霍光等任昉表寄深氣遂荷顧託通鑑晉紀司馬國璠曰劉裕削弱王室仲唐㑹要元振配饗𤣥宗廟古詩為焦卿妻仕宦於臺閣我行得遺跡一作址池館皆疏鑿壯公臨事斷丁亂切顧歩涕横落精魄凜如在所厯終蕭索二句他本在噴薄下草堂本在此處高詠寶劍篇神交付㝠漠此經過故宅以弔古意收而吳論前作先故宅而後拾遺此作先代公後故宅各見作法謝此章三段各八句兮楊泉五湖賦有大禹之遺跡朓後園賦清陰起池館涼江賦夏后疏鑿禮記師乙曰臨事而屢斷勇也蕭陸機詩顧歩咸可懽曹植詩精魄飛散庾信詩索無真氣王儉褚淵碑仰南風之高詠連潘岳夏侯湛誄心照神交唯我與子謝惠祭古塚文號為㝠漠君俄頃辯尊親推其決機之明壯公臨事斷服其應變之敏二語能寫出英雄手段荀彧之失身誤於不能辯陳竇之僨事失於不能斷杜詩論人必具特識推此可見元振寶劍歌君不見昆吾鐵冶飛炎烟紅光紫氣俱赫然良工鍜鍊凡㡬年鑄作寶劍名龍泉龍泉顔色如霜雪良工咨嗟歎竒絶琉璃玉匣吐蓮花錯鏤金環生明月正逢天下無風塵幸得相逢君子身精光黯黯青蛇色文章片片緑龜鱗非直結交遊俠子亦曾親近英雄人何言中路遭棄捐零落飄淪古獄邊雖復沈埋無所用猶能夜夜氣衝天觀薛稷少去聲保書畫壁鶴注此亦在通泉作從王洙曰稷字嗣通収之子好古博雅貞觀永徽間虞世南禇遂良以書顓家後莫能繼外祖魏徴家多藏虞褚舊跡稷鋭精模倣結體遒麗遂以書名天下畫又絶品睿宗在藩留意文學嘗喜之及即位遷黄門侍郎厯太子少保㑹竇懷貞以附太平公主伏誅稷坐知謀賜死萬年獄少去聲保有古風得之陜郊篇惜哉功名忤一作誤但見書畫傳我遊梓州東遺跡涪水邊畫胡化切藏青蓮界書入金牓懸首將詩篇引起書畫集古風謂詩體陜郊篇稷所作翻譯名義優鉢羅此云青蓮花仰看平聲垂露姿不崩亦不騫鬱鬱三大字蛟龍岌相纒又揮西方變發地扶屋椽慘澹壁飛動到今色未填此記書畫遺跡小垂露四句言書西方四句言畫遒王愔文字志懸針篆體也垂露書如懸針而勢不勁阿那如濃露之垂故名三詩不騫不崩注騫虧也慶輿地紀勝薛稷書慧普寺字徑三尺許在通泉縣善寺聚古堂趙曰稷書慧普寺三字乃真書傍有贔屭纒捧此其蛟龍岌相纒也稷所畫西方變相則亡法書要錄至於蛟龍駭獸奔騰拏攫之勢心手隨變不知所如是謂逹節西方變言所畫西方諸佛變相酉陽雜爼唐人謂畫亦曰變屋沈約詩發地多竒嶺干雲非一狀椽逺注發地扶椽謂西方之像起自地面直至屋此行疊壯觀郭薛俱才賢不知百載上聲後誰復扶又切來通泉從題外推開作結事郭薛題留皆成壯觀矣將來誰復到此而繼其韻乎語含自負意此章前二段各八句末段四句収薛西都賦娯遊之壯觀稷蔡曰趙彦昭傳云與郭元振稷善元振傳云與薛趙彦昭同遊太學盖郭與薛舊為同舎後又㑹於通泉也稷有秋日還京陜西十里作驅車越陜郊北顧臨大河此行見鄉邑秋風水增波西望咸陽途日暮憂思多傅巖既紆鬱首山亦嵯峨操築無昔老采􅅔有遺歌客遊節向換人生知㡬何通泉縣署壁後薛少去聲保畫鶴薛公十一鶴皆寫青田真畫色乆欲盡蒼然猶出塵首提薛公畫鶴年晉永嘉郡記沐溪野去青田九里此中有雙白鶴年生子長大便去只餘父母一雙在耳精白可愛多云神仙所養梁元帝鴛鴦賦青田之鶴晝夜俱飛北山移文瀟灑出塵之想北史劉歊矯然出塵如雲中白鶴低昻各有意磊落如長人佳此志氣逺豈惟粉墨新萬里不以力羣遊森㑹神威遲白鳯態非是倉鶊隣此詳寫畫筆神妙伏低昻二句摹其形體萬里二句想其精神低昻飛之致磊落英竒之狀勢可萬里正見志氣之逺森然㑹神不在粉墨之迹矣白鳯倉鶊乃借外象以相形摯虞鵁鶄賦一低一昻乍浮乍没黄瓊疏朱紫共色粉墨雜糅聚崔豹古今注雉朝飛操雌雄羣遊於山阿王褒頌精㑹神相得益彰顔延之詩威遲良馬煩庚揚雄甘泉賦吐白鳯禽經白鳯謂之鷫詩有鳴倉爾雅疏黄鸝留一名倉庚一名商庚高堂未傾覆音福常一作幸得慰嘉賓曝露墻壁外終嗟風雨頻赤霄有真骨恥飲洿池津𡨕𡨕任所徃脱畧誰能馴此從畫壁生慨真壁經風雨在畫鶴終當滅迹然看赤霄㝠舉即鶴有時遁形凡物皆當曠觀矣咏朱云本咏畫鶴以真鶴結之猶之咏畫鷹而及真鷹畫鶻而及真鶻咏畫馬而及真馬也公詩格徃徃如是晝此章四句起下二段各八句暴詩我有嘉賓濕暴露則暴日夜則露濕也左傳其露之則恐燥之不時賦七命挂歸翮於赤霄之表支詩品真骨凌霜冲江淹夕飲玉池津洙曰有遺遁鶴者遁曰爾天之物寜為耳目之玩遂放之任所徃顔延之詩龍性誰能馴陪王侍御宴通泉東山野亭鶴注此寶應元年十一月徃通泉時作全蜀總志野亭在射洪縣治東北杜詩亭景臨山水即此地江水東流去清樽日復扶又切斜異方同宴賞何處是京華亭景臨山水村烟對浦沙狂歌遇一作過形舊作于善本作形勝得醉即為家上四寫景言情乃感傷語下四逐句分應作自解語亭臨山水承江流烟對浦沙承日斜遇此形勝則異地相忘醉即為家故舊京莫問耳謝朓詩春夜别清樽江潭復為客歎息東流水何如故鄉陌别北齊盧詢詩别人心已怨愁空日復斜曹植詩離各異方劉孝威詩為貪止山水鮑照詩漠漠村烟起歌李百藥詩前堦枕浦沙徐幹中論被髪而狂徐悱詩表裏窮形勝陪王侍御同登東山最高頂宴姚通泉晚擕酒泛江一統志東山在潼川州東四里隔涪江層巖修阜勢若長城杜甫有詩姚公美政誰與儔不減昔時陳太丘邑中上客有柱史多暇日陪驄馬遊首叙設宴之由遊東山之宴侍御為主而曰姚日陪者盖前此已迭為賓主矣陳豫章王嶷牋庾亮以來荆州無復此美政姓後漢書實補聞喜長再遷除太邱長修徳清靜百以安地理志太邱屬沛國遊曲禮上客起而史記老子為柱下史呉論多暇方見不以躭酒廢政夏侯湛傳政清務閒優游多暇桓典為驄馬御史注别見東山高頂羅珍羞下顧城郭銷我憂清江白日落欲盡復扶又切擕美人登綵舟笛聲憤怨一作怒哀中流妙舞逶迤夜未休燈前徃徃大魚出聽曲低昻如有求自登山而泛江曲盡主人豪興韻一韻分為兩段故一句五句連拈脚粲張衡酃酒賦錯時膳之珍饈南都賦珍羞琅玕登樓賦聊假日以銷憂何遜詩分手清江上王楚辭白日晼晚其將入流美人官妓也漢武帝秋風詞擕美人兮不能忘横中兮揚素波梁簡文帝詩澄江騖綵舟奏妙舞漢書叙傳戰士憤怨注梁武陵王紀詩燕姬楚辭載雲旗之逶迤逶迤長貌庾信對燭賦燈前桁衣疑不亮聽曹植詩大魚若曲陵荀子昔者瓠巴鼓瑟而遊魚出蔡邕彈琴賦感激弦歌一低一昻弗記如有求而得三更平聲風起寒浪湧取樂音洛喧呼覺船重滿空星河光破碎四座賓客色不動請公臨深一作江莫相違迴船罷酒上上聲馬歸人生歡㑹豈有極無使霜露一作過霑人衣從樂極悲生結出規諷之意動船重浪湧不行破碎星河影蕩色不斂容知懼莫相違毋忘警戒也請公指在座賓主更此章四句起下二段各八句晉樂府子夜變歌三開門去晉書謝安嘗泛海風起浪湧諸人皆懼安吟嘯自若呼張衡西京賦取樂今日遑恤我後尉繚子焉有喧酖酒以敗善類乎碎沈約詩惟星河猶可識史賈誼旱雲賦相撃衝而破古詩四座且莫喧記信陵君傳賓客皆驚世記孝子不登高不臨深亷王濬書迥船過軍留侯家上起去罷酒史記頗傳披甲上馬魏曹植詩歡㑹難再遇風秋風詞歡樂極兮哀情多文帝樂府谿谷多悲霜露沾人衣謝莊月賦佳期可以還微霜霑人衣漁陽此當是寶應元年冬晚在梓州作諷趙傁曰公在梓州聞雍王授鉞作此詩以諸將也漁陽突騎去聲猶精鋭赫赫雍去聲王都一作前節制猛將去聲翻一作飄然恐後時本朝音潮不入非高計禄山北築雄武城舊防敗走歸其營繫音計書請問燕平聲耆舊今日何須十萬兵上四諷賊黨之歸順下四慰燕人之向化猶官軍精鋭節制得人彼河北諸將翻然而來恐後時若不入本朝真失計矣又為慰諭燕人之詞曰當時禄山猖獗尚築壘以防退走今王師破竹思明旦夕奔竄諸耆老當亦知之否耶天後漢書呉漢亡命在漁陽説太守彭寵曰漁陽突騎下所聞也晁錯傳輕車突騎師古注言其驍鋭可用衝突敵陳也王詩赫赫厥靈唐書寳應元年九月魯王适改封雍冬十月以雍王為天下兵馬元帥統河北朔方及諸道行營回紇等兵十餘萬進討史朝義㑹軍於陜州王即徳宗也荀子桓文之節制州猛將指河北降將時薛嵩以四州來降張志忠以五來降舊書禄山反時築壘范陽北號雄武城峙兵聚糧城繫書用魯仲連約矢射聊事花底鶴注花柳兩章當是廣徳元年春梓州作宜在遣憂之前紫萼扶千蘂黄鬚照萬花忽疑行暮雨何事入朝霞恐是潘安縣堪留衛玠車深知好顔色莫作廣韻入去聲委泥沙此詩咏花有妍華易謝之感蘂上四句對花驚喜下則意在惜花也紫萼包乎外黄鬚映自花中花之内外俱麗矣行暮雨見花潤入朝霞見花鮮潘安縣見花多留衛玠見花美莫委泥沙不忍覩其零落耳此咏梅花也在下章㸃明晩出左掖詩亦言花底乃指桃花有春色醉仙桃可證顧注萼花蒂也蘂鬚頭之㸃也花鬚多是黄色河周𢎞正詩帶啼疑暮雨含笑似朝霞晉潘安仁為陽令縣皆樹花衛玠風神秀異乗羊車入市見者以為玉人柳邊只道去聲梅花發那一作誰知柳亦新枝枝總到地葉葉一作蘂蘂自開春紫燕時翻翼黄鸝不露身漢南應平聲老盡灞上逺愁人顧注此詩咏柳有時光迅速之感暮首二初春之柳枝嫩葉青正見其新五六春之柳漢南灞上借柳寄慨淹枝動故翻燕葉密故藏鸝漢南之柳應且老盡自况留灞上之柳逺亦愁人遥憶長安也葉顧注兩句用柳事調穩而味長盡古詩枝枝相覆盖葉相交連苕溪漁隱句云話春愁雙紫燕喚回午夢一黄鸝用燕鸝而語更逸安枯樹賦昔年楊柳依依漢南三輔黄圖灞橋在長東漢人送客至此手折柳贈别名曰銷魂橋聞官軍收河南河北一云收兩河春在梓州作此廣徳元年唐書寶應元年冬十月僕固懷恩等屢破史朝義兵進克東京其將薛嵩以相衛等州降張志忠以􅁪趙等州降次年春正月朝義走至廣陽自縊其將田承嗣以莫州降李懷仙以幽州降劍外忽傳收薊北初聞涕淚滿衣裳却看平聲妻子愁何在漫巻詩書喜欲狂白首一作日放歌須縱酒青春作伴好還鄉即從巴峽穿巫峽便下去聲襄陽向洛陽原注余田園在東京憶上四聞収復而喜下思急還故鄉也狂初聞而涕痛亂離破愁而喜歸家有日也縱酒承喜還鄉承妻子末乃還鄉所經之路抛顧注忽傳二字驚喜欲絶愁何在不復愁矣漫巻者書而起也黄生注此通首叙事之體劍外見地青春見時曰作伴者風和景明能助行色也舊注巴縣有巴峽巫山縣有巫峽襄陽屬楚洛陽屬河南顧注公先世為襄陽人祖依藝為鞏令徙河南父閑為奉天令徙杜陵而田園尚在洛陽顧宸曰杜詩之妙有以命意勝者有以篇法勝者有以俚質勝者有以倉卒造狀勝者此詩之忽傳初聞却看漫巻即從便下於倉卒間寫出欲歌欲哭之狀使人千載如見王嗣奭曰此詩句句有喜躍意一氣流注而曲折盡情絶無粧㸃愈樸愈真他人決不能道朱瀚曰涕淚為収河北狂喜為収河南此通章關鍵也而河北則先㸃後發河南則先發後㸃詳畧頓挫筆如游龍又地名凡六見主賓虚實纍纍如貫珠真善於將多者此黄生曰杜詩强半言愁其言喜者惟寄弟數首及作而已言愁者使人對之欲哭言喜者使人對之欲笑盖能以其性情逹之紙墨而後人之性情類為之感動故也使舎此而徒討論其格調剽擬其字句抑末矣逺遊此詩乃廣徳元年春作寶應元年史朝義戰敗北渡河帥衛兵來戰又敗走所謂冦騎走者也賤子何人記迷方一作芳著涉畧切處家竹風連野色江沫莫葛切擁春沙種藥扶衰病吟詩解嘆嗟似聞邊騎去聲走失喜問京華首聨逺遊之迹三四言景五六逺遊之事末二言情何人記言舊交已疎著處家謂行踪無定風竹江沙自况飄摇流蕩即景寓情善於變化傳言未確故云似聞不覺失喜猶云失聲失笑種顧注著一失字從前之揣摩憂慮當日之驚疑踊躍種如畫鮑照詩南國有儒生迷方獨淪誤杜臆迷方本論語遊必有方意江沫流水之浡莊子流沫四十里宋之問詩失喜先臨鏡春日梓州登樓二首黄鶴編在廣徳元年春在梓州時作詩云隨春入故園戰塲今始定盖是年春史朝義初滅也行路難如此登樓望欲迷身無却少去聲壯跡有但舊作但有羇栖江水流城郭春風入鼔鼙鞞同雙雙新燕子依舊已銜泥此章登樓而興羇旅之感臆首聨情景並提次聨承行路下四承登樓杜行路之難不一故用如此二字該之起語無限悲涼倒衰年流落此身却無少壯而浪迹但有羇棲兩句各轉一字便語新而聲協矣而水流城下登樓所見風送鼓聲登樓所聞新燕巢樓旅人無定對景傷情語意雙關數句中有梓有春有樓寫景言情相融入化為古樂府題有行路難王粲有登樓賦古詩思雙飛燕銜泥巢君室杜律首句有語似承上却是突起者如杖錫何來此秋風已颯然故人亦流落高義動乾坤行路難如此登樓望欲迷既飄忽又陡健此皆化境語也天畔登樓眼隨春一作風入故園戰場今始定移晉作栘柳更一作豈能存厭蜀交遊冷思吳勝事繁應平聲須理舟楫長嘯下去聲荆門次章登樓而動去蜀之懷北上四遥望故園下四追思吳㑹盖恐歸未能轉作東遊之想也遥杜臆心之所至目亦隨之故登樓一望而天畔之眼入故園朝義既平戰場定矣洛陽園柳能復存乎必取道荆門也公少遊呉越故思勝事自蜀江至吳蘇武詩行役在戰場哀江南賦釣臺移柳非玉關之可望名袁山松宜都山川記南崖有山名荆門北岸有山虎牙二山相對有象門然趙汸曰五言近體句中用一虛字斡旋詩家以為難若一句中用兩虛字抑揚見意惟老杜能之而陳後山妙得其法有感五首鶴注此廣徳元年逐時有感而作非止成於一時盧注五章乃収京後追述當年時事盖痛其前又勉其後也將去聲帥䝉恩澤兵戈有歲年至今勞聖主何以報皇天白骨新交戰雲趙汸作輪臺舊拓邊乗槎斷消息無處覔張騫首章歎節鎮不能禦寇敕當時將帥負恩不知盡心報國以致邊土爭戰而使不歸後四句乃戰和兩意邊勞聖主承兵戈報皇天承恩澤新戰之地即舊拓之傷今思昔也時李之芳使吐蕃被留經年故用張騫乗槎為喻呉前漢黄霸傳左右之官皆將帥也辭又數下恩澤質書念䝉聖主恩皇天比君楚皇天無私阿兮曰北史高琳為後周名將周文帝宴羣公仍賦詩琳詩寄言竇車騎多謝霍將軍何以報天子沙漠淨妖氛何以報天句本此謝魏許昌碑表白骨既交於曠野温子昇為高敖曹表羣龍交戰曰雲臺思開國功臣也渠通鑑漢武帝曰輪臺西於車師千餘里杜佑曰輪臺犂地今在交河北庭界中其地相連傳温子昇答齊神武勅開拓邊境為國立功餘漢張騫騫以郎應募使月氐經匈奴匈奴留騫十載後亡歸漢朱注張騫窮河源無乗槎之説張華博物志海上有人毎年八月乗槎到天河未嘗指言張騫宗懔歲時記乃云武帝令張騫尋河源乗槎而去趙蔡俱疑懔為訛或云張騫乗槎出東方朔内傳今此書失傳庾肩吾奉使江州詩漢使俱為客星槎共逐流正用此事也洪容齋續筆云前輩謂少陵當流離顛沛之際一飯不忘君故詩有云萬方頻送喜無乃聖躬勞至今勞聖主何以報皇天獨使至尊憂社稷諸君何以答昇平天子亦憂厭奔走諸公固合思昇平皆是心也幽薊餘蛇樊作封豕乾坤尚虎狼諸侯春不貢使去聲者日相望平聲慎勿吞青海無勞問越裳大君先息戰歸馬華去聲山陽此章歎鎮將之擁兵結上二分提三四承首句五六承次句末二總蛇豕指河北降將虎狼指吐蕃羌夷諸侯不修職貢致煩朝使諭㫖近在内地尚有隱憂况青海越裳能勤逺畧乎盖由人君急於息戰以致國威不振也羆左傳呉為封豕長蛇薦食上國賈山至言秦以熊之力虎狼之心董仲舒傳使者冠盖相望指朱注天寶後南詔叛唐歸吐蕃屢為邊患此詩青海吐蕃越裳指南詔也南史林邑國本漢日南郡象林縣古越裳界也杜氏通典交阯之南有越裳國周公居攝六年越裳重譯而獻白雉易師上爻大君有命篇宋之問詩漢皇未息戰書武成歸馬於華山之陽此詩末二句向有三説舊注謂戒當時生事外夷者其説迂而不切觀吐蕃入寇郭子儀僅以二千騎從事亦何暇生事乎杜臆謂推原禍本因𤣥宗大開邊釁致貽患至今若早能息戰歸馬焉有此禍乎玩詩語意亦不相合按廣徳元年史朝義既誅河北諸將皆降僕固懷恩奏留降將分帥河北唐世藩鎮之楇實自此始詩言息戰歸馬盖欲収鎮兵以實關内時子儀在京可為統領一以銷北顧之憂一以備西侵之患此最當時大計惟此計不行而後有吐蕃之陷京懷恩之犯闕不勝紛紛多事矣考大厯八年子儀入對謂河南等鎮殫屈禀給未始蒐擇請追赴關中勒歩隊示金皷則攻必破守必全乆長之䇿也公之熟籌時事正與汾陽意同洛下舟車入天中貢賦均日聞紅粟腐寒待翠華春莫取金湯固長令平聲宇宙新不過平聲行儉徳盜賊本王臣此章歎都洛之非計舟上四述時議下四諷時事多議者謂帝幸東都其地車咸集貢賦道均且傳倉積粟春待駕臨此特進言者之侈談耳豈知國家欲固金湯而新宇宙實不係乎此若能行儉徳以愛人則盜賊本吾王臣耳何必為此遷都之役耶王臣即撫我則后虐我則讐之謂也單復注盜賊本顧注是年天興聖節諸道節度使獻金飾器用珍玩駿馬共值緡錢二十四萬常衮上言請却之不聽代宗漸有奢侈之志故以儉徳規之洛世説晉元帝問洛下消息貢史記成王使召公復營邑曰此天下之中四方入道里均焉林漢食貨志太倉之粟陳陳相因腐敗而不可食之上賦建翠華之旗賈誼曰金城湯池帝王萬世業曰書慎乃儉徳駕詩莫非王臣楊徳周盜賊本王臣馭撫綏俱在其中朱鶴齡曰唐江淮之粟皆輸洛陽轉運京師時劉晏主漕疏浚汴渠故言洛下舟車無阻貢賦大集當急布春和散儲粟以贍窮民東王道俊博議曰傷春詩有近傳王在雒及滄海欲廵之句則此詩為傳聞代宗將幸東都而作也史稱喪亂以來汴水湮廢漕運自江漢抵梁洋迂險勞費廣徳二年二月以劉晏為河南江淮轉運使時兵火之後中外艱食晏乃疏汴水歲運米數十萬石以給關中公之意唐建東都本備廵幸今汴洛之間貢賦道均且漕渠已通倉粟不乏只待翠華之臨耳勿謂洛陽陿阸無金湯可守乗此時而赫然東廵號令天下則宇宙長新矣盖能行㳟儉之徳則率土皆臣盜賊豈足慮哉王導論遷都云能𢎞衞文大帛之冠無往不可若不績其麻則樂土為墟公意正此意也按此二説亦無據丹桂風霜急青梧日夜凋由來强幹地未有不臣朝音潮授鉞親賢徃卑宫制詔遥終依古封建豈獨聽簫韶此章諷朝廷建宗藩以懾叛臣意上二即景託興引起强幹下文親賢封建即申明此桂比王室梧比宗藩曰急曰凋見其侵陵削弱矣惟國家本幹强固則節鎮自然臣服昔上皇在蜀一命親賢徃鎮而制詔遂至遥傳此當時已行之成騐也今若依古封建之制可以坐銷亂萌何待聽簫韶而始見太平哉黄生注卑宫承前儉徳來桂漢五行志成帝時童謡桂樹華不實黄雀巢其顛注赤色漢家象張正見詩丹桂有藂香鮑照詩青梧葉方稀以後漢丁㳟議古者封建諸侯不過百里强幹弱枝所為治也宋意疏春秋之義諸父昆弟無所不臣親六韜凡國有難君召將授以斧鉞益左傳分茅列土賢並建注親賢同姓也晉武帝詔州素號難治宜以重鎮親賢撫之兵按天寶十五載七月丁卯上皇制以太子亨充天下馬元帥朔方河東河北平盧節度使南取長安洛陽此即親賢授鉞之制詔也時上皇初幸蜀中行宫草創故曰卑宫魏都賦察卑宫於夏禹曰劉勰曰古者王言同稱為命秦并天下改命曰制令詔肅宗乾元二年以趙王係為兵馬元帥詔曰靖難平兇必資於金革總戎授律實仗於親賢寶應元年代宗即位以雍王适為元帥詔曰國之大事兵馬為先朝有舊章親賢是屬此肅代兩朝授鉞親賢相沿為定制矣虞書簫韶九成盧元昌曰公是年為閬州進論巴蜀安危表一則曰願陛下度長計大速以親賢出鎮再則曰必以親賢委之節鉞此古維城磐石之義終曰臣特望以親賢為總戎者意在根固流長國家萬代之利與此詩相表裏冦一作盜滅人還亂兵殘將去聲自疑登壇名絶假報主一作執玉爾何遲領郡輙無色之官皆有詞願聞哀痛詔端拱問瘡痍此章慨當時重節鎮而輕郡守寇上四責諸將之跋扈下四傷州郡之誅求滅而人還亂者由兵少而將自疑也在諸將實封爵土絶非假攝者比何以不思報主而反懷貳心耶且節鎮權重則徴歛日繁郡守不得自主故領郡常無氣色而之官毎有怨詞代宗端拱方新何不下哀痛之詔以恤窮民乎知恤民疾苦則當重司牧之任以免節鎮之牽制也此杜臆僕固懷恩恐賊平寵衰奏留薛嵩等分帥河北兵殘將自疑也田承嗣舉管内户口壯者皆籍為兵又選驍騎萬人自衛謂之牙兵此冦滅人還亂也殘乃殘少之殘非殘害之殘疑後漢公孫述傳光武下詔曰勿以來歙岑彭受害自邵注漢高帝築壇拜韓信為大將也顧注廣徳元年諸道節度使並加實封所謂名絶假漢書韓信傳信使人言曰齊邊楚不為假王以鎮之其勢不定帝曰大丈夫定諸侯即為真王耳何以假為趙注名絶假言真拜之非特假節而已宋玉神女賦比之無色痛漢書蕭望之便道之官下左傳我有詞也盧注哀詔即是年柳伉疏中天其許朕自新之意邵注漢武帝末年下哀痛之詔以自悔過同隋焬帝詩端拱朝萬國季布傳創痍未瘳創瘡王嗣奭杜臆曰詩人尚風其弊也烟雲花草凑砌成篇核其歸存恍無定處杜詩宗雅頌比興少而賦多如此五首皆賦也即用比興意有所主總歸於賦故情景不一而變化無窮一時感觸而千載長新又曰讀此五詩皆救時之碩畫報主之赤心自許稷契真非虛語耳食者謂公志大才踈良可悲矣黄生曰七律之諸將責人臣也五律之有感諷人君也然此雖諷人君未嘗不責其臣以疆圉國事敗壞至此皆人臣之罪也公平日諄諄論社稷憂時事者大指盡此五首又曰此五首在公生平為大抱負即全集之大本領從來讀杜詩者並未拈出仁又曰末首通結數章之意而歸本於主徳所謂君莫不仁君正莫不正而惟務格君之心者具於此見之讀此五章猶以詩人目少陵者非惟不知人兼亦不知言矣春日戲題惱郝使去聲君兄一本無兄字月鶴注寶應元年十一公至通泉時郝招飲出二姬以侑樽次年春公在梓州因作此詩以戲之此廣徳元年作使去聲君意一作俊氣凌青霄憶昨歡娛常見招細馬時鳴金騕褭佳人屢出董嬌饒此追叙通泉之宴佳郝常見招即其意氣馬乃人所乗者故下文有再騁之句别北山移文干青霄而直上右唐書凡馬有左右監以其麄良細馬稱左麄馬稱詩黄希曰馬謂之金騕褭因漢武帝鑄金為麟趾褭蹄人遂用之盧照隣詩漢家金騕褭玉臺新咏宋子侯曾有董嬌饒詩東流江水西飛燕可惜春光不相見願擕王趙兩紅顔再騁肌膚如素呉作雪練此望郝擕妓而來公自通回梓郝在東在西故借水流燕飛以起興不相見指佳人而言王趙乃使君家妓江水即射洪江古樂府東飛伯勞西飛燕黄姑織女時相見不沈約詩遙裔發海鴻連翩出簷燕春秋更去來參差相見又恩倖傳論素練丹魄至皆兼兩通泉百里近梓州請一作諸公一來開我愁舞處重平聲看平聲花滿面樽前還有錦纒頭末再致盼望之詞百里擕妓勢所不能亦空想花容而已故曰戲曰惱也十此章三段各四句九域志通泉在梓州東南百三里兹云百里舉成數言耳製酉陽雜爼今婦人面飾用花子起自昭容上官氏所以掩㸃跡杜田曰唐明皇宴於清元小殿自打羯鼓曲終戲謂八姨曰樂籍今日有幸約供奉夫人請一纒頭王洙曰唐王元寶富而無學識嘗㑹賓客親友謂之曰昨日必多佳談元寶視屋良乆曰但費錦纒頭耳杜詩詳註巻十一
