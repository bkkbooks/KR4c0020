body:
  text: 杜詩詳註巻一翰林院編修仇兆鰲撰遊龍門奉先寺黄鶴注此當是開元二十四年後遊東都時作朱鶴齡注龍門即伊闕元和郡縣志伊闕山在河南府伊闕縣北四十五里舊注誤引禹貢河東之龍門今削之兩京新記煬帝登北邙觀伊闕曰此龍門也自古何不建都於此一統志闕塞山在河南府城西南三十里左傳趙鞅使女寛守闕塞即此一名伊闕俗名龍門山又名闕口已從招提遊更宿招提境隂壑生虛一作靈籟月林散清影天闕正異作闚姜氏作開象緯逼雲卧衣裳冷欲覺古效切聞晨鐘令平聲人發深省悉井切中公遊奉先寺夜宿而作也中四寺夜景末二宿寺之情張綖注三四狀風月之佳五六見髙寒之極聞鐘發省乃境曠心清倐然而有所警悟歟王洙注僧史魏太武始光元年剏造伽藍立招提之名朱鶴齡注唐㑹要官賜額為寺私造者為招提蘭若僧輝記招提者梵言拓鬬提奢唐言四方僧佛但傳筆者訛拓為招去鬬奢留提字即今十方住持寺院耳沈佺期記隂壑以冰閉籟山北曰隂師謝莊月賦聲林虛籟莊子齊物篇有天地籟人籟氏曰風聲為天籟水聲為地籟笙竽為人籟韋梁昭明太子詩月落林餘影曹植詩明月澄清影述東都記龍門號雙闕與大内對峙若天闕然陸倕石闕銘假天闕於牛頭朱注丹陽記載王茂𢎞指牛頭山兩峯為天闕見文選注禹疏伊水北流兩山相對望之若闕見水經注皆確據也况此本古體詩何必象拘拘偶對耶晉王子年拾遺記師延精述陰陽曉明緯象緯星象經緯也一鮑照記雲卧恣天行寺庾信詩山深雲濕衣列子覺一寐庾信詩山響晨鐘縁梅子真書願深省臣言庵蜀人師氏曰釋氏有聲聞覺如香巖和尚一日掃瓦礫擊竹作聲忽然大悟又如道吾聞巫吹角瞥地大省此得乎聲聞而有所覺者也詩言發深省其亦得於聲聞縁覺者耶附考杜詩各本流傳多有字句舛訛昔蔡伯世作正異而未盡其詳朱子欲作考異而未果成書今遇彼此互異處酌其當者書於本文叅見者分注句下較流傳各本多所辯証矣如此詩天闕諸家聚訟約有八說蔡興宗正異依古本作天闚有莊子以管闚天及鮑照詩天闚茍平圓可証楊慎云天闚雲卧乃倒字法言闚天則星辰垂地卧雲則空翠濕衣見山寺高寒殊於人境也蔡絛及庚溪詩話皆作天闕引韋述東都記龍門若天闕為証言天闕逈而象緯逼近雲卧山而衣裳涼泠也朱鶴齡從之姜氏疑天闕既用實地不應雲卧又作虛對欲改作天開引天官書天開書雲物為証則屬對既工而聲韻不失張綖謂天闕乃寺門觀雲卧猶言雲室杜臆解天闕為帝座以宋志角二星十二度謂之天闕也王介甫改作天閲舊千家本或作天濶或改天門俱未安據文翔鳳藥溪談伊陽之北山即鳴臯之派長殆百里如雲卧然龍門南直卧雲故云然耶四明王嗣奭杜臆曰人在塵溷中真性淪隠若身離塵表其情趣自别而又宿於其境對風月則耳目清曠近星雲則心神悚惕此六句一步緊一步逼到夢將覺而觸於鐘聲道心之㣲忽然呈露猶之剥復交而天心見勿淺視此深省語也不盧世㴶紫房餘論曰公少遊吴越時必有著作今少槩見斷自龍門奉先始或其後自裁定汰去前詩耶唐庚子西文録云五經已後有一司馬子長三百五篇之後有一杜子美此天生二人以翼斯文之統也故作文當學龍門作詩當學少陵以二書為根本朝夕誦讀則趨向正而可以進退百家矣蘇軾子瞻曰子美之詩退之之文魯公之書皆集大成者也學詩當以子美為師有規矩法度故可學退之於詩本無解處以才高而見長耳淵明不為詩自寫其胸中之趣耳學杜不成不失為工無韓之才與陶之妙而學其詩終為樂天耳至嚴羽滄浪詩話少陵詩憲章漢魏而取材於六朝其自得之妙則前輩所謂集大成者也曰又曰詩之法有五曰體製曰格力曰氣象曰興趣音節詩之品有九曰高曰古曰深曰逺曰長曰雄渾曰飄逸曰悲壯曰凄婉其用工有三曰起結曰句法曰字眼其大槩有二曰優㳺不廹曰沉著痛快詩之極致有一曰入神詩而入神至矣盡矣蔑以加矣惟李杜得之他人得之蓋寡也又曰李杜韓三公詩如金鳷摩海香象渡河龍吼虎哮濤翻鯨躍長鎗大劔君王親征氣象自别望嶽鶴注公壯遊詩云忤下考功第放蕩齊趙間乃在開元二十四年後當是其時作元和郡縣志㤗山一曰岱宗在兗州乾封縣西北三十里岱宗夫音扶如何齊魯青未了造化鍾神秀陰陽割昏曉盪胸生曾集韻通作層雲决眥墻細切入歸鳥㑹當凌絶頂一覽衆山小此望東嶽而作也詩用四層寫意首聨逺望之色次聯近望之勢三聯細望之景末聨極望之情上六實叙下二虛摹之岱宗如何意中遥想之詞自齊至魯其青未了言嶽高逺拔地而起神秀之所特鍾矗天而峙昏曉於此判割二語奇峭界王嗣奭杜臆云盪胸句狀襟懐之浩蕩决眥句狀眼之空濶公身在岳麓而神遊岳頂所云一覽衆山小者已㝠捜而得之矣非必再登絶頂也杜句有上因下因之法盪胸由於曽雲之生上二字因下决眥而見歸鳥入處下三字因上上因下者倒句也下因上者順句也末即登泰山而小天下之意昻虞書東巡狩至於岱宗前漢郊祀志岱宗泰山也鄭曰王者升中告代必於此山又是山為五嶽之長故曰岱宗衣史記貨殖傳泰山之陽則魯其陰則齊子夜歌寒尚未了莊子造化之所始陰陽之所變孫左傳天鍾美於是鍾聚也老子大制不割割分也綽天台賦序天台者山嶽之神秀日曹輔佐對大人達觀任化昏曉先徐增云山後為陰光不到故易昏山前為陽日光臨故易曉朱注封禪記泰山東隅有日觀峰雞鳴時見日出長三丈即割昏曉之義張衡南都賦淯水盪其胸馬融廣成頌動盪胸臆山公羊傳觸石而出膚寸而合不崇朝而徧天下者泰之雲也雲氣瀰漫飄蕩如疊浪層波對之心胸若揺開庾肩吾詩層雲霾峻嶺歸曹植冬獵篇張目决眥决也眥目眶也曹植詩鳥赴喬林王周王褒詩絶頂日猶晴沈約詩絶頂復孤圓言世說珣曰若使阡陌條暢則一覽而盡楊子法登東嶽者然後知衆山之峛崺也盧世㴶曰公初登東嶽似稍緊窄然而曠甚後望南嶽似稍錯雜然而肅甚固不必登峯造極而兩嶽真形已落其眼底及觀又登後園山脚云昔我遊山東憶戲東嶽陽窮秋立日觀矯首望八荒則是業升岱宗之巔而流覽無際矣乃絶不另設專題以鋪張遊槩亦以望嶽一首已領其要故不必再拈也試思他人千萬語有加於齊魯青未了者乎八少陵以前題咏泰山者有謝靈運李白之詩謝詩句上半古秀而下却平淺李詩六章中有佳句而意多重複此詩道勁峭刻可以俯視兩家矣龍門及此章格似五律但句中平仄未諧蓋古詩之對偶者而其氣骨崢嶸體勢雄渾能直駕齊梁以上登兗州城樓邵注兖州魯所都漢以封共王餘唐書兖州魯郡屬河南道顧宸注兖州隋改為魯郡唐武德間復曰兖州天寶元年又改魯郡此云兖州當是開元二十五年公下第後遊齊趙時所作蔡鰲按唐之兖州治瑕丘縣即今之嵫陽縣也夢弼曰公父閑嘗為兖州司馬公時省侍故有趨庭句東郡趨庭日南樓縱目初浮雲連海岱一作嶽平野入青徐孤嶂秦碑在荒城魯殿餘從來多古意臨眺獨躊躇公至兖州省侍而詠南樓也通首皆登樓所見海岱青徐屬逺景故以縱目二字起之秦碑魯殿屬近景故以臨眺二字結之仍在上下四句分截從趙汸云三四宏濶俯仰千里五六微婉上下千年曰來則平昔懐抱可知曰獨則登樓者未必皆知義前漢志東郡秦置屬兖州隋孫萬壽詩趨庭尊教晉書庾亮傳乗秋夜往共登南樓此借用其字蔽張鏡觀象賦爾乃縱目逺覽傍通四維古詩浮雲白日海岱青徐與兖州接壤薄禹貢海岱惟青州海鮑照詩平野起秋塵河海賦西青徐唐書青州北郡徐州彭城郡俱屬南道十唐太宗小山賦寸中孤嶂連還斷秦秦本紀始皇二八年東行郡縣上鄒嶧山刻石頌德謝𤣥暉詩荒城逈易陰子徐摛詩列楹登魯殿王延壽魯靈光殿賦殿本景帝魯共王所立後漢書注殿在兖州曲阜縣城中悵然懐古意史記龜策傳所從來久矣子隋李宻詩沈約詩臨晀殊復奇莊聖人躊躇以興事薛君曰躊躇躑躅也玉篇猶豫也黄生曰前半登樓之景後半懷古之情其驅使名勝古跡能作第一種語此與岳陽樓詩並足凌轢千古趙汸曰公祖審言登襄陽城詩云旅客三秋至層城四望開楚山横地出漢水接天廻冠蓋非新里章華只舊臺習池風景異歸路滿塵埃公此詩實本於其祖張綖注凡詩體欲其宏而思欲其宻廣大精微此詩兼之矣考公作此詩時年甫十五而所作已如此其得之天者良不偶也胡應麟曰五言律體肇自齊梁而極盛於唐要其大端亦有二格陳杜沈宋典麗精工王孟儲韋清空閒逺此其概也然右丞贈送諸作往往闌入高岑鹿門蘇州雖自成趣終非大手太白風華逸宕特過諸人而後之學者才非天仙多流率易唯工部諸作氣象嵬峩規模宏逺當其神來境詣錯綜幻化不可端倪千古以還一人而已慨又曰宏大則昔聞洞庭水富麗則花隱掖垣暮感則東郡趨庭日幽野則林風纎月落餞送則冠冕通南極投贈則斧鉞下青㝠追憶則洞房環珮泠弔哭則他鄉復行役等皆神化所至不似人間來者中又曰作詩不過情景二端如五言律體前起後結四句二言景二言情此通例也唐初多以首二句言景對起上結二句言情雖豐碩往往失之繁雜唐晚則第三四句多作一串雖流動往往失之輕儇俱非正體惟沈宋李王諸子格調莊嚴氣象閎麗最為可法第中四句大率言景不善學者凑砌堆疊多無足觀老杜諸篇雖中聨言景不少大率以情間之故習杜者句語或有枯燥之嫌而體裁絶無靡冗之病此初學入門第一義不可不知若老手大筆則情景混融錯綜惟意又不可專泥此論詩李夢陽曰疊景者意必二濶大者半必細此最律三昧如浮雲連海岱平野入青徐孤嶂秦碑在荒城魯殿餘前景寓目後景感懷也如詔從三殿去碑到百蠻開野館濃花發春㠶細雨來前半濶大後半工細也唐法律甚嚴惟杜變化莫測亦惟杜事楊士𢎞曰律詩破題或對景興起或比物起或引起或就題起要突兀高逺如狂風捲浪勢欲滔天頷聯或寫意或寫景或叙事或引證此聯要接破題如驪龍之珠抱而不脫頸聨或寫意或寫景或叙事或引證與前聨之意相應相避此聨要有變化如疾雷破山觀者驚愕結句或就題結或開一步或繳前聨之意或用事必放一步作散場如剡溪之棹自去自囘言有盡而意無窮行周珽曰古雄而渾律精而微四傑律詩多以古脉之故才氣雖高風華未爛陳杜沈宋起而吞吐含芳安詳合度亭亭整整喁喁吁吁覺其句自能言字自能語品之所以為美漸至開元天寶李杜群賢迭興國脉既昌文運正盛洋洋乎一朝聲律頓成盡善自大厯諸家以及貞元學者雖多合作不無少變元和以後風氣漸衰聲格浸降要亦世運使然耳周弼曰五言律有四寶謂中四句皆景物而實開元大厯多此體華麗典重之間有雍容寛厚之態此其妙也稍變然後入於虛間以情思故此體當為衆體之首昧者則堆積窒塞寡於意味矣四虛者謂中四句皆情思而虛也不以虛為虛以實為虛自首至尾如行雲流水此其難也元和以後用此體者骨格雖存氣象頓殊向後則偏於枯瘠流於輕餒不足采矣又前聨情而虛後聨景而實實則氣勢雄健虛則態度諧婉輕前重後酌量適均無窒塞輕餒之患若前聨景而實後聨情而虛前重後輕多流於弱蓋發興盡則難於繼矣題張氏隱居二首鶴注舊唐書李白傳云少與魯中諸生張叔明等隱於徂徠山號為竹溪六逸又子美雜述云魯有張叔卿意叔明叔卿止是一人卿與明有一誤耳不然亦兄弟也是詩張氏隠居豈其人歟此當是開元二十四年後與高李遊齊趙時作春山無伴獨相求伐木丁丁音爭山更幽澗道餘寒歴冰去聲雪石門斜日到林丘不貪夜識金銀氣逺去聲害朝看平聲麋鹿遊乗興去聲杳然迷出處昌據切對君疑是泛虛舟此首初訪張君而作也上四言景下四言情此大槩分段處若細分之首句張氏次句隠居三四切隠居言路之僻逺五六切張氏言人之廉靜末二說得賓主兩忘情與境俱化上海朱瀚曰看此詩脉理次第曰斜日曰夜曰朝曰到曰出曰求曰對分明如畫相庾信詩春山百鳥啼劉琨詩獨坐無伴易同氣求詩伐木丁丁鳥鳴嚶嚶嚶其鳴矣求其友聲小序伐木燕朋友故舊也注丁丁伐木聲王籍詩鳥鳴山更幽王臺卿詩飛梁通澗道冰朱記室詩疊夜抱餘寒冰世說范逵投陶侃宿於時雪積目冰雪猶言凍雪讀去聲春秋齊鄭㑹於石門鄭車僨濟即此地邵注謂在兖州府平隂縣今按石門不必確指地名公橋陵詩云石門霜露白亦只泛言謝靈運詩披雲卧石門傳陰鏗詩翠栁將斜日謝惠連詩落雪灑林丘左子罕曰我以不貪為寶中朱注南史載梁隱士孔祐至行通神嘗見四明山谷有錢數百斛視之如瓦石樵人競取入手即成沙礫金銀氣殆是類耶地鏡圖凡觀金玉寶劔之氣皆以辛日雨霽之旦及黄昏夜半伺之黄金之氣赤黄千萬斤以上光大如鏡有史天官書敗軍之場破國之墟下有積錢金寶之上皆氣不可不察晏子春秋可謂能逺害矣鹿史記李斯傳麋鹿遊於朝闗中記辛孟年七十與麋同羣世謂鹿仙世說王徽之曰我本乗興而行中莊子窅然難言之矣注窅然杳深貌沈佺期詩此迷出處盧照隣詩桃源迷處所庾信詩對君俗人眼之莊子方舟而濟於河有繫虚船來觸舟雖􅄶心人不怒虚舟謂空無所唐律多在四句分截而上下四句自具起承轉闔如崔顥行經華陰詩上半華陰之景下半行經有感武帝祠前二句乃承上河山北枕二句乃轉下也崔曙九日登仙臺詩上半九日登仙臺下半呈寄劉明府三晉雲山二句乃承上闗門令尹二句乃轉下也杜詩格法類皆如此首句春山二字一讀次句伐木丁丁四字一讀下靣澗道餘寒石門斜日皆四字一讀不貪逺害乘興對君皆二字一讀知得句中有讀則意義自易明矣攸高棅曰七言律詩又五言之變也在唐以前沈君七言儷句已肇律體唐初始專此體沈宋輩精巧相尚開元初蘇張之流盛矣盛唐作者不多而聲調最逺品格最高若崔灝賈至王維岑參當時各極其妙至於李頎高適當與並驅未論先後也少陵七言律法獨異諸家而篇什亦盛如秋興諸作前輩謂其大體渾雄富麗小家數不可髣髴誠然楊士奇曰律詩始盛於開元天寶之際若渾雄深厚有行雲流水之勢冠裳佩玉之風流出胸次從容自然而皆由夫性情之正不拘於法律而亦不越乎法律之外所謂從心所欲不踰矩為詩之聖者其杜少陵乎胡應麟曰近體莫難於七言律五十六字之中意若貫珠言若合璧其貫珠也如夜光走盤而不失廻旋曲折之妙其合璧也如玉匣有蓋而絶無參差扭揑之㾗綦組錦繡相鮮以為色宮商角徵互合以成聲思欲深厚有餘而不可失之晦情欲纒綿不迫而不可失之流肉不可使勝骨而骨又不可太露辭不可使勝氣而氣又不可太揚莊嚴則清廟明堂沈著則萬鈞九鼎高華則朗月繁星大則泰山喬嶽圓則流水行雲變幻則凄風急雨一篇之中必數者兼備乃稱全美迄唐高岑明淨整齊所乏逺韻王李精華秀朗時覺小疵學者步高岑之格調合王李之風神加以工部之雄深變幻七律能事畢矣又曰近體盛唐至矣充實輝光種種備美所少者曰大曰化耳故能事必老杜而後極杜公諸作正所謂正中有變變而能化者今其體調之正規模之大人所共知惟變化二端勘覈未徹不知變主格化主境格易見境難窺變則標奇越險不主故常化則神動天隨從心所欲七言近體諸作所謂變也如錦江春色來天地玉壘浮雲變古今織女機絲虛夜月石鯨鱗甲動秋風香稻啄餘鸚鵡粒碧梧棲老鳯凰枝聽猿實下三聲淚奉使虛隨八月槎字中化境也無邊落木蕭蕭下不盡長江滚滚來二儀清濁還高下三伏炎蒸定有無永夜角聲悲自語中天月色好誰看絶璧過雲開錦繡踈松隔水奏笙簧句中化境也昆明池水風急天高老去悲秋霜黄碧梧篇中化境也挽又曰大槩杜有三難極盛難繼首創難工遘衰難子建以至太白詩家能事都盡杜後起集其大成一也排律近體前人未備伐山道源為百世模二也開元既往大厯繼興砥柱其間唐以復振三也王世貞曰正允寜生平所推伏者獨少陵其所好談以為獨解者七言律大要貴有照應有開闔有闗鍵有頓挫其意主比主興其法有正挿有倒挿發又曰七言律不難於中二聨難於發端及結句耳端盛唐人無不佳者結頗有之然亦無轉入他調及收頓不住之病篇法有起有束有放有斂有喚有應大抵一開則一闔一揚則一抑一象則一意無偏用者句法有直下者有倒挿者倒挿最難非老杜不能也字法有虛有實有沈有響虚響易工沈實難至五十六字如魏明帝凌雲臺材木銖兩悉配乃可耳篇法之妙有不見句法者句法之妙有不見字法者此是法極無迹人猶能之至境與天㑹未易求也有俱屬象而妙者有俱屬意而妙者有俱作高調而妙者有直下不偶對而妙者皆興詣而神合氣完使之然楊士𢎞曰七言律難於五言律七言下字較粗實五言下字較細嫩七言若可截作五言便不成詩須字字去不得方是所以句要藏字字要藏意如連珠不斷方妙陸時雍曰工部七律藴藉最深有餘地有餘情情中有景景外含情一咏三諷味之不盡具周敬曰少陵七言律如八音並奏清濁高下種種陳真有唐獨步也然其間半入大厯後聲調實開中晚濫觴之竇之子時相見邀人晚興去聲留霽王洙作霽一作濟潭鱣發發音撥春草鹿呦呦杜酒偏勞勸張梨不外求前邨山路險歸醉每無愁此記張氏留飲之興也曰時相見則往來非一度矣邀人句起中四魚躍鹿鳴晚時之景酌酒削梨留客之具醉歸忘險極盡主人之興矣勞杜臆杜酒張梨暗用賓主二姓酒本出於杜故云偏勸梨自出於張故云不外求尾之子指張公詩彼其之子漢成帝時童謠曰燕燕涎涎張公子時相見杜審言詩聖情留晚興路别本作濟潭是指濟水言按前章云林丘本章云山則知不在濟水傍矣以霽對春正切時景按詩齊風碩人篇鱣鮪發發正義以鱣為江東黄魚今霽潭中恐無此大魚當依毛傳作鯉為是發發盛貎思謝靈運詩萋萋春草繁就詩呦呦鹿鳴蘇武詩鹿鳴野草可以喻嘉賓急篇注古者儀狄作酒醪杜康又作秫酒魏武帝樂府云何以解憂惟有杜康潘岳閒居賦張公大谷之棃謝靈運詩得性非外求鏞沈炯詩火炬前邨發得楊炯詩山路遶羊腸全大注莊子醉者之墜車全於酒末句暗用其意公夔州詩醉於馬上往來輕是忘憂良法詩醉言歸張綖曰前詩但述隱居孤寂以美張氏未言相留欵曲之情故次詩盡之可見古人作二首者不徒然也可鰲按此兩詩非一時之作玩首句時字末句每字見黄常明詩話曰杜詩多用經語如車轔轔馬蕭蕭鱣發發鹿呦呦皆渾然嚴重如入天陛赤墀植璧鳴玉法度森嚴然後人不敢用者豈非造語膚淺不類耶劉九法曹鄭瑕丘石門宴集鶴注此當是開元二十四年已後作兖與齊為隣至兖則至齊也置朱注唐書府州各有法曹參軍事海録碎事魏理曹掾法曹也邵注唐志瑕丘山東兖州府治也石門山名在兖州府平陰縣與瑕丘相隣境鄭是官於瑕丘者秋水清無底蕭然淨客心掾曹乗逸興去聲鞍馬到荒林一作去相尋能吏逢聨璧華筵直一金晚來横吹去聲好泓下亦龍吟首聨㸃石門次聨㸃劉九三聨㸃宴集横吹龍吟極言開筵張樂之盛亦應秋水清句潘岳秋興賦藻秋水之涓涓兮無盧思道詩秋水見底清首句翻用之棗據詩深谷下底王彪之詩散懷山水蕭然忘覊洙顧宸云公為客鄭乃主人謝惠連詩眷眷浮客心曰漢制以曹官為掾如屋之有椽言其有所負荷也西京雜記京兆有古生者為都掾史至今稱古掾曹堪方生風賦轉濠梁之逸興阮籍詩鞍馬去行遊時謝靈運詩荒林紛沃若不後漢書曹騰字季興桓帝封費亭侯种暠劾騰騰為纖介嘗稱暠能吏接聨璧兼稱劉鄭晉書潘岳夏侯湛美丰容行止同輿茵人謂之聨璧南史韋孝寛從荆州刺史源子恭鎮襄城時獨孤信為新野郡守與孝寛情好甚宻政術俱美荆部吏人號為聨璧楊慎曰華筵直一金有典則可無典則俗張率白紵歌列坐華筵紛羽爵一班彪王命論所願不過一金史記平凖書一金黄金斤漢食貨志黄金一斤直錢萬淮南子秦以一鎰為一金而重一斤漢以一斤為一金李百藥詩晚來風景麗晉書横吹有雙角張騫自西域傳其法於長安唯得摩訶兠勒一曲李延年因之更造新聲二十八解古今樂府横吹羌樂也樂纂曰横笛小箎也鼔江淹横吹賦樹嵓㠋水泓澄説文泓水深處晉書角横吹曲蚩尤氏率魑魅與黄帝戰於涿鹿帝乃命鼔角為龍吟以禦之馬融長笛賦龍吟水中不見已伐竹吹之聲相似與任平聲城許主簿遊南池鶴注唐志任城為兖州𦂳縣此詩公遊齊趙乃至兖州時所作在唐書任城漢縣隋屬兖州一統志南池濟寧城東南隅今淤塞秋水通溝洫城隅進一作集小船晚涼草堂本作來看平聲洗馬森木亂鳴蟬菱熟經時一作旬雨蒲荒八月天晨朝降白露遙憶舊青氊上四遊池之景下四悲秋之意日公詩善記節候此詩晨朝降白露明白露節也秦州詩露從今夜白今日白露節也川遙憶舊氊蓋當秋而動鄉思矣莊子秋水時至百灌河周禮考工記匠人為溝洫廣深四尺謂之溝廣深八尺謂之洫詩鄭風俟我於城隅庾信詩小船行釣鯉沈佺期詩高樹晚涼歸河左思魏都賦刷馬江州刷即洗馬也劉劭七華潄馬源潄乃飲馬也左思蜀都賦彈言鳥於森木曰潘岳詩鳴蟬厲寒音炕武陵記三角四角曰芰兩角菱其花紫色晝合宵隨月轉移猶葵之隨日也之吕氏春秋甘露時雨不私一物蔡邕述行賦遘滛雨經時蒲有二種陳風彼澤之陂有蒲與荷蒲乃水草其質柔弱故至中秋而荒殘也王風不流束蒲乃蒲栁屬木本與此不同詩八月萑葦夏侯湛詩冒晨朝兮入大谷齋月令孟秋之月白露降寒蟬鳴世説王獻之夜卧中有盜入室獻之語曰青氊我家舊物可特置之對雨書懷走邀許主簿鶴注許即任城許主簿當是開元二十五年至兖州與許遊南池時相先後今詩云東嶽雲峯起則是在兖州甚明魯訔年譜引公酹文云二十九年在洛之首陽祭逺祖則至兖在二十九年之前梁權道編在天寶十三載非蓋是年公在長安矣走邀遣人持詩往邀也東嶽雲峯起溶溶滿太虚震雷翻幕燕驟雨落河一作溪魚座對賢人酒門聽平聲長丁丈切者車相邀愧泥濘騎馬到堦除單復注上四對雨五六書懷七八走邀主簿寸東嶽二句即公羊傳泰山之雲觸石而出膚而合不崇朝而雨天下意天説苑泰山東嶽也謝道韞詩峩峩東嶽高秀極冲青庾肩吾詩雨足飛春殿雲峯入夏池雷楚辭雲溶溶兮雨溟溟聘内經太虛寥廓國語震出滯左傳吴公子札於上國宿於戚聞孫林父擊鐘曰夫子之在此猶燕之巢於幕上嚴有翼曰幕非巢燕之所此言其至危潘岳西征賦危素卵之累殻甚立燕之幕巢丘希範書將軍魚游沸鼎之中燕巢飛幕之上蓋用此意邢劭春宴詩簷喧巢幕燕池躍戲蓮魚謝瞻九日詩巢幕無留燕遵渚有來鴻却是誤用其文杜詩震雷翻幕燕則仍合本意矣老子驟雨不終日杜始皇本紀八年河魚大上注謂河水溢魚大上平地詩博議汝南先賢傳葛𤣥書符著水中大雨淹注復書符投水中須臾落大魚數百頭暗使此事全大鏞注明萬厯丁酉楚墩子湖忽龍起是日雨如傾魚從雲中散落百里家家得魚慈水姜氏曰驟雨落河魚與細雨魚兒出照看自明雨細則魚浮而上淰雨驟則魚落而潛伏也賢魏畧太祖時禁酒而人竊飲之故難言酒以白酒為人清酒為聖人陳平傳平家負郭窮巷以席為門然門外多長者車時能吴都賦流汗霡霂而中逵泥濘襄陽兒童詩時騎馬景福殿賦堦除連延已上人茅齋鶴注梁氏編在天寶十二載遊山東時作然舊次與洛兖所作詩先後當是開元二十九年間阿摩訶般若經云何名上人佛言若菩薩一心行􅘥菩提心不散亂是名上人休胡應麟曰已上人歐公作齊已非也已與貫同出晚唐乃鄭谷輩同時何縁與杜相值已公茅屋下可以賦新詩枕簟入林僻茶瓜留客遲江蓮搖白羽天棘蔓徐鉉家本作蔓舊作夢非青絲空忝許詢輩難酬支遁詞首聨領起中四枕簟茶𤓰茅齋之事江蓮天棘茅齋之景此足以發詩興者末以許詢自比以支遁比已公蓋賦詩而作謙詞也許搖白羽狀江蓮之飄動蔓青絲狀天棘之䝉茸漢皇后傳幸得免離茅屋之下自陶潛詩乃賦新詩謂荀子枕簟之上朱注簟竹席也闗以西謂之簟或之籧篨晉書陸納為吴興太守謝安詣納所設唯茶果而已鮑神仙傳葛𤣥為客設生𤓰杜臆遲謂留客之久照詩留我一白羽注白羽扇也朱注華嚴㑹𤣥記青松為麈尾白蓮為羽扇董斯張云白羽如值其鷺羽之羽狀蓮之迎風而舞舊解作扇非以鄭侯升秕言曰泠齋詩話以天棘為楊栁蔡夢弼注天棘為天門冬羅大經鶴林玉露則引佛書云終南長老入定夢天帝賜以青棘之絲故云天棘夢青絲其說牽合難從考鄭漁仲通志栁名天棘南人謂之楊栁庾信詩岸栁被青絲亦一證也楊慎升菴曰鄭樵之說無據栁可言絲祗在初春若茶𤓰留客之日江蓮白羽之辰必是深夏栁已老葉陰濃不可言絲矣若夫蔓云者可言兎絲王𤓰不可言栁天棘非栁明矣按本草索隠云天門冬在東嶽名淫羊藿在南嶽名百部在西嶽名管松在北嶽名顛棘顛與天聲相近而互名也此解近之朱注杜田正謬夢當作蔓抱朴子及博物志皆云天門冬一名顛棘以其刺故也然不載天棘之名疑是方言本草圖經天門冬生奉高山而谷今處處有之春生藤蔓大如釵股高至丈餘亦有澀無刺者其葉如絲而細散以此考之天棘為天冬明矣世説支遁許詢共在㑹稽王齋支為法師許為都講高僧傳支遁講維摩經遁通一義詢無以厝難詢設一難遁亦不能復通陸罩詩信解愧難酬房兵曹胡馬鶴注房兵曹未詳何人以舊次先後當在開元二十八九年間朱注唐書諸衛府州各有兵曹叅軍事胡馬大宛於爰切名鋒稜痩骨成竹批雙耳峻風入四蹄輕所向無空濶真堪託死生驍騰有如此萬里可横行黄生曰上半寫馬之狀下半贊馬之才結歸房君此作者詩法張耒曰馬以神氣清勁為佳不在多肉故云鋒稜瘦骨成是無空濶能越澗注坡託死生可臨危脫險下句䝉上走馬對法張綖曰此四十字中其種其相其才其德無所不備而形容痛快凢筆望一字不可得李陵書胡馬奔走史記初天子得烏孫馬號曰天馬及得大宛汗血馬益壯更名烏孫馬曰西極馬宛馬曰天馬馬援鑄銅馬奏曰臣既備數家骨法賈勰齊民要術馬耳欲小而銳狀如斬竹筒黄註批竹即馬經削筒批削也盧注太宗叙十驥耳根尖銳杉竹難方竹批雙耳峻本此拾遺記曹洪乗白馬耳中生風足不踐地風入四蹄輕本此楚辭九懷驥垂兩耳片劉義㳟白馬賦竦身輕足沈佺期驄馬詩四蹄碧玉雙眼黄金瞳何晏韓白論白起為將所向無前張九齡詩轉逢空濶處馬孫子死生之地孫東觀漢記吴漢伐蜀戰敗墮水縁尾得出江表傳權征合肥馬上津橋橋見徹丈餘無板權躍馬超之得免蜀志劉先主的盧一躍三丈過檀溪免劉表之追晉書劉牢之馬躍五丈澗脫慕容垂之逼此皆能越空濶而託死生者赭白馬賦料武藝品驍騰言驍勇飛騰也莊子穆王駕八馬之乗一日行萬里楊素詩横行萬里外趙汸曰前輩言咏物詩戒粘皮著骨公此詩前言胡馬骨相之異後言其驍騰無比而詞語矯健豪縱飛行萬里之勢如在目中所謂索之於驪黄牝牡之外者區區模寫體貼以為詠物者何足語此畫鷹鶴注此詩未詳何年何地所作舊次在與李白同尋范十隠居則不得云在天寶十三載矣梁編非是素練風一作如霜起蒼鷹畫作殊􅑷荀勇切身思狡側目似愁胡絛他刀切同縧鏇徐釧切光堪摘軒楹勢可呼何當擊凡鳥毛血灑平蕪次句㸃題起下四句曰􅑷曰側摹鷹之狀曰摘曰呼繪鷹之神末又從畫鷹想出真鷹幾於寫生欲活靈毎咏一物必以全副精神入之故老筆蒼勁中時見氣飛舞張孝祥曰首聨倒挿言鷹之威猛如挾風霜而起也朱注此即畫馬詩縞素漠漠開風沙意趙汸注末聨兼有疾惡意素練畫絹也沈約恩倖傳論素練丹魄至皆兼兩厲西京雜記淮南子自云字挾風霜孫楚鷹賦風霜激國策唐雎謂秦王曰要離刺慶忌蒼鷹擊於殿上􅋏畫作謂畫中作勢丘巨源詩畫作景山樹􅑷當作前刑法志􅋏之以行晉灼曰􅋏古竦字抱朴子徒聞振翅竦身不能凌厲九霄孫楚鷹賦擒狡兔於平原兔性善狡也視傅𤣥鷹賦左看若側右視如傾漢書酷吏傳側目而號曰蒼鷹孫楚鷹賦深目蛾眉狀如愁胡魏彦深鷹賦立如植木望似愁胡劉云以其碧眼相似也淮南子絛可以為繶廣韻絛編絲繩王褒四子講德論走箭飛鏇玉篇鏇轉軸鷹賦結璇璣之金環環即鏇也朱注以絛繫鷹足而繫之於鏇也摘解去也獵孫楚鷹賦麾則應機招則易呼野勢可呼謂呼之使何當言何時當擊世説禇季問孫盛卿國史何當成吴均詩何當見天子都朱浮書褻之者以為園囿之凡鳥外廐之下乗西賦風毛雨血灑野蔽天禮郊特牲毛血告幽全之物也見幽㝠録楚文王獵於雲夢之澤雲際鳥翺翔飄颺鷹之竦翮而升矗若飛電須臾羽墮如雪血灑如雨兩翅墮地廣數十里江淹賦平蕪際海平蕪平原荒草也律詩八句須分起承轉闔若中間平鋪四語則堆垜而不靈此詩三四承上固也五六仍是轉下語欲摘去絛鏇而呼之使擊語氣却緊注末聨知此可以類推矣過宋員外之問舊莊唐書宋之問字延清景龍中遷考功員外郎公故居在偃師故過之問舊莊逺朱注本集開元二十九年公築室首陽之下祭祖當陽君其過之問莊或在是時宋公舊池館零落首去聲一作守非陽阿枉道秪與祗同從入吟詩許更過平聲淹留問耆老一作舊寂寞向山河更識將軍樹悲風日暮多上四過宋舊莊下則對莊而有感也意枉道入莊題詩誌勝有留連不盡之故云吟詩許更過問耆老訪其子孫家世也向山河傷其迹在人亡也末乃觸物增悲情見乎詞鶴注宋之問虢州𢎞農人首陽山在河南府虢與河南為隣故宋有别墅在焉謝朓遊後園賦清陰起兮池館涼曹植詩零落歸山邱洛一統志首陽山在河南偃師縣西北二十五里陸機陽記首陽山在洛陽東北去洛二十里阮籍詩步出上東門北望首陽岑夷齊所隠首陽别在蒲州魏文帝與吴質書故使枉道相過秪適也詩祗攪我心司馬遷傳祗取辱耳鄒陽傳祗恐怨結而不見德楊守阯曰言宋詩尚矣亦許我更過而題詠乎須溪謂是尊慕前輩之詞寄他方漢武帝詔詢問耆老魏文帝詩何為淹留司馬長卿美人賦上宫閒館寂寞雲虛論曹植王仲宣誄經歴山河大後漢馮異傳諸將並坐功異獨屏樹下軍中呼為樹將軍庾信哀江南賦將軍一去大樹飄零壯士不還寒風蕭瑟古詩蕭蕭白楊樹日暮多悲風鶴注舊史之問弟之悌有勇力開元中自右羽林將軍出為益州長史劍南節度使兼採訪使尋遷太原尹故云將軍初不曾為金吾官原注疑誤趙汸曰之問與公祖審言及陳子昻沈佺期四人為唐律之祖實公詩法淵源也武后時之問審言俱為修文館學士世交亦厚然之問為人實不足道詩無譏詞以其契家前輩也但曰零落寂寞悲風則感慨係之矣夜宴左氏莊鶴注公未得鄉貢之前遊吴越下第之後遊齊趙此詩云詩罷聞吴詠扁舟意不忘則是遊齊趙時作未詳左氏莊在何郡舊次在過宋之問舊莊後則左氏莊亦當在河南林風晉作林風舊作風林纖月落衣露靜一作淨琴張暗水流花徑春星帶草堂檢書燒燭短看一作說劔一作煎茗引杯長詩罷聞吴詠扁舟意不忘月落露濃靜琴始張入夜方飲也水暗星低夜宴之景檢書看劔夜宴之事公弱冠曾遊吴越故聞吴詠而追思其處也吴江周篆云檢書以考証看劔而吟哦此時正賦詩末句詩罷乃倒挿法風吴均詩林疎風至少謝朓詩疏蕪散風林杜臆謂林與衣露相偶鰲按林風則微風林則大只顛倒一字而輕重不同孺古詩兩頭纎纎月初生張綽詩雲表掛纎月説苑子操彈於後園露霑其衣或以衣為琴衣非是藥謝朓詩静琴愴復傷詩琴瑟在御莫不靜好李百詩暗水急還流庾肩吾詩向嶺分花徑帶梁簡文帝神山寺碑照影春星便張伯復詩話春星草堂古今傳為佳句只一帶字㸃出空中景象如玉繩低建章低字亦然帶拖帶也山移文草堂之靈江淹傷友人賦共檢兮雒書北吴詠謂詩客作吴音五史記范蠡乗扁舟游湖趙汸曰此詩寄興閒遊狀景纎悉寫情濃至而開闔參錯不見其冗乃詩之入妙處顧宸曰一章之中鼓琴看劍檢書賦詩樂事皆具而林風初月夜露春星及暗水花徑草堂扁舟時地景物重疊鋪敘却渾然不見痕迹而其逐聨逓接八句總如一句俱從夜宴二字摹寫盡情黄生曰夜景有月易佳無月難佳三四就無月時寫景語更精切上句妙在一暗字覺水聲之入耳下句妙在一帶字見星光之遙映胡應麟曰五律仄起高古者唯杜為勝如嚴警當寒夜前軍落大星不識南塘路今知第五橋今夜鄜州月閨中只獨看帶甲滿天地胡為君逺行吾宗老孫子質朴古人風韋曲花無賴家家惱殺人皆雄深渾樸意味無窮然律以盛唐則氣骨有餘風韻稍乏唯風林纎月落衣露靜琴張花隠掖垣暮啾啾棲鳥過尤為工絶此則盛唐所無也臨邑舍弟書至苦雨黄河泛溢隄防之患簿領所憂因寄此詩用寛其意鶴注唐五行志開元二十九年秋河南河北二十四郡水齊其一也當是其年作編唐書臨邑漢縣屬齊州張綖注此詩諸家皆在開元二十九年公是時年甫三十而詩中有吾衰同泛梗之句是豈其少作耶徒以唐史此年有伊洛及支川皆溢河南北二十四郡水遂為編附然黄河水溢常常有之豈獨是年哉集中如此類者甚多不能徧舉二儀積風雨百谷漏波濤聞道去聲洪河坼遙連滄海高從苦雨泛河敘起此聞道二字據來書所言儀排律詩須見段落分明看篇逐段還題之法二天地也抱朴子彌綸二儀升為雲雨降成百川忠老子江海能為百谷王魏志波濤洶湧通鑑漢陳曰淫雨漏河漏字本此也潘岳詩登城望洪河注洪河黄河抱朴子滄海之滉􅃞職司一作思憂悄悄郡國訴嗷嗷舍弟卑棲邑防川領簿曹尺書前日至版築不時操難假黿鼉力空瞻烏鵲毛此言隄防之患簿領所憂職司治水之官郡國被災之民領簿曹頴為臨邑主簿操版築監督治河之事黿鼉烏鵲言不能借此以作橋梁潘岳詩恪居處職司反前漢成帝紀御史大夫尹忠以河決不憂職自殺此用之詩憂心悄悄漢文帝紀令郡國無來獻枳曹植詩衆人徒嗷嗷國韋孟詩修翼無卑棲此暗用棘非鸞鳳所棲意語甚於防川前漢五行志不防川不竇澤以吴越春秋采葛婦歌吴王歡兮飛尺書洙曰版築版夾土而築也齊國策田單身操版牐史記黥布傳項王身負版築以為士卒先竹書紀年周穆王大起九師東至於九江叱黿鼉以為梁梁爾雅翼涉秋七日鵲首無故皆秃相傳是日烏鵲為渡織女故毛皆脱去淮南子烏鵲填河成橋渡織女燕平聲南吹􅅵畝濟上聲上没蓬蒿螺力戈切蚌步項切滿蕭氏云滿讀平聲近郭蛟螭乗一作横九臯徐闗深水府碣石小秋毫白屋留孤樹青天一作雲失以失對留一作矢非萬艘此言傍河州郡皆被泛溢淹徐闗近濟碣石近燕深成水府小若秋毫皆為水所也孤樹僅存萬艘失道甚言水勢之横决廬朱注新舊史開元二十九年七月伊洛水溢損居人舍秋稼無遺壞東都天津橋及東西漕河南北諸州皆漂没此詩黿鼉二句誌橋毁也燕南濟上徐闗碣石誌諸州漂没也吹畎畝失萬艘誌害稼并壞漕也一統志燕南今順天保安州等地上漢章帝詔或起畎畝漢趙過為代田一畝三畎濟今山東濟南兖州等地在莊子翺翔蓬蒿之間蠃東方朔詩螺蚌非有心沈迹泥沙易傳為蠃為蚌與螺通蕭雲從曰莊子天地篇子貢瞞然俯慚而不對與漢書佞幸傳石顯􅡣滿不食字體聲音微分而義則一杜詩多壘滿山谷亦作平聲用曰揚雄羽獵賦薄索蛟螭詩傳深澤臯釋文九臯九折之臯詩鶴鳴于九臯左傳鞌之戰齊侯自徐闗入師古曰徐闗齊地公送弟頴赴齊州詩徐闗東海西海賦爾其水府之内極深之庭禹貢夾右碣石山海經注碣石山在右北平驪城縣海邊唐書平州石城縣有碣石山公昔遊詩追遊齊兖之作亦云昔與高李輩晚登單父臺寒蕪際碣石萬里悲風來淮南子秋毫之末視之可察漢書吾丘壽王傳有司或由窮巷白屋漢書顔師古注白屋茅屋也論莊子絶雲氣負青天湛方注詩青天瑩如鏡杜篤都賦大船萬艘轉漕相過吾衰同泛梗利涉想蟠桃却一作賴倚一作倚賴天涯釣猶能掣巨鼇末乃寄詩以寛其意東朱注言我雖泛梗無成猶思垂釣海以施掣鼇之力水患豈足憂耶蓋戲為大言以慰之耳臨邑近海故用蟠桃巨鼇事此詩前起後結各四句中間二段各八句今依朱子詩傳例凡長篇之作皆分勒章句使眉目易醒也吾衰見論語劉向説苑土偶謂桃梗曰子東園之桃也刻子以為梗遇天大雨水􅕙並至必浮子泛泛乎不知所止駱賔王詩旅行勞泛梗易利涉大川名中洲記東海有山名度索山有大桃樹屈盤三千里曰蟠桃賴倚作却倚為是即長劍倚天外之倚或解作公為臨邑弟所賴非而曹植詩布日蓋天涯列子龍伯之國有夫人一釣連六鼇海賦崇鳥巨鼇楊慎曰文心雕龍聲律篇云異音相從謂之和同音相應謂之韻韻氣一定故餘聲易遣和體抑揚故遺響難契宋詞元曲皆於仄韻用和音以叶韻蓋以平聲為一類而上去入三聲附之如東凍董是和東中風是韻也鰲按杜詩排律如螺蚌滿近郭滿可讀平聲如人頻墜塗炭塗可讀上聲此生任春草任可讀平春可讀上心微傍魚鳥傍可讀平魚可讀上知杜句失嚴處仍是謹嚴也高棅曰排律之作其源自顔謝諸人古詩之變首尾排句聨對精宻梁陳以還儷句尤切唐興始專此體與古詩差别貞觀初作者猶未備永徽以下王楊盧駱倡之於前陳杜沈宋繼之於後蘇頲二張又從而申之其文辭之美篇什之盛葢由四海宴安萬幾多暇君臣游豫賡歌而得之者故其文體精麗風容色澤以詞氣相高而止矣開元後作者之盛聲律之備獨王右丞李翰林諸家皆不及諸家得其一槩少陵獨得其兼善者如上韋左相贈哥舒翰謁先主廟等篇其出入始終排比聲韻發斂抑揚疾徐縱横無施而不可也臺胡應麟曰陰鏗安樂宫詩新宫實壯哉雲裏望樓迢逓翔鵾仰聨翩賀燕來重簷寒霧宿丹井夏蓮開砌石披新錦雕梁畫早梅欲知安樂盛歌管雜塵埃此十句律詩氣象莊嚴格調鴻整平頭上尾八病咸除切響浮聲五音並協實百代近體之祖考之陳後主張正見庾信江總輩雖五言八句時合唐規皆出此後則近體之有陰生猶五言之始蘇李矣又曰讀盛唐排律延清摩詰等作真如入萬花春谷光景爛熳令人應接不暇賞玩忘歸太白輕爽雄麗如明堂黼黻冠葢輝煌武庫甲兵旌旗飛動少陵變幻閎深如陟昆侖泛溟渤千峯羅列萬彚汪洋益王潢南曰五言排律與五言律詩其句法雖同篇法實異律詩描寫情景止盡於四十字耳故貴寛閒醖籍之中又有嚴宻𦂳凑之妙若排律或數十韻或百餘韻其篇法豈五言律法可同故作排律其要有四一貴鋪敘得體先後不亂二貴隊仗整肅情景分明三貴過渡明白不令人沈思囘顧四貴氣象寛大從容不迫斯為得體其修辭煉句繁冗混雜險怪艱深令人三讀不知翻不如五言律矣昔白樂天作小詞尚令老婢得解况於長律乎哉徐用吾曰排律之體所貴反覆議論井井有條意興迭出一氣呵成賦景入事皆須各當其可切忌散緩錯亂屋上架屋意興索然則深可厭矣假山鶴注此當題曰假山舊題乃詩之序序云天寶初指元年也故吕伋公魯訔俱編此詩在元年天寶初南曹小司冦舅於我太夫人堂下壘一作累土為山一匱一作簣盈尺以代彼朽木承諸焚香瓷甌甌甚安矣旁植慈竹蓋兹數峯嶔岑嬋娟宛有塵外一有數字一有格字致乃不知興去聲之所至而作是詩舊唐書吏部員外郎二員一人主判南曹注以在選曹之南故曰南曹壁朱注唐制未聞以司冦判南曹權德輿吏部南曹㕔記云高宗上元初請外郎一人顓南曹之任其後或詔他曹郎權居之此云南曹小司冦當是以秋官權職者太夫人盧氏公祖審言繼室天寶三載五月卒於陳留郡之私第公作墓誌嶔岑謂山嬋娟謂竹申涵光曰序不易解杜文長至數語便期期不能達意如夔人屋璧平章鄭氏女子公孫大娘等篇世人附㑹以為古其實不明詩小序莫妙於元次山杜短語多有佳者一匱功盈尺三峯意出羣望中疑在野幽處欲生雲慈竹春陰覆香爐曉勢分惟南將獻壽佳氣日氤一作氛氲詩序錯綜須看此詩布置次第先提土山次出數峯在野生雲申明塵外之致慈竹香爐傍景㸃綴南山獻壽又就舅氏為山歸到太夫人堂下歲書為山九仭功虧一匱沈約詩一匱望成峯陸雲暮賦盼盈尺其若遺記諸葛孔明黄陵廟記崔嵬巑屼列作三峯趙曰華山有云其三峯直上晴霽可觀世説殷中軍曰韓康伯居然是出羣器帝潘岳詩卉木在野虎雪賦河海生雲述異記漢章三年子母竹生白殿前羣臣作竹頌鶴注竹紀云慈竹吴蜀皆有之其竹叢生毎年笋出不離叢内隋侯夫人詩春陰正無際獨步意何如從劉斌詩香爐烟氣多勢曉勢分謂曉烟分布舊注謂廬山香爐峯分其曉太迂詩如南山之壽李適詩山翠遙添獻壽杯朱張正見詩香浮佳氣裏陸雲詩靈爽氤氲異詩山澤共氛氲龍門鶴注龍門一山連跨數郡此詩葢指東京而言天寶元年公在東京為姑萬年縣君制服又為墓誌四載又為皇甫妃范陽太君盧氏作墓誌當是其時作鰲按此再至龍門也故曰往來時屢改其云佛寺葢近驛之寺元人龍門記謂舊有八寺固不但奉先一寺也洪覺範指奉先者未然龍門横野斷驛樹出城來氣色皇居近金銀佛寺開往來時屢音慮改川陸一作水日悠哉相閱征途上生涯盡幾囘此說再遊龍門而作也上四寫景下四感懷所斷山之上佛寺𢎞開洛城之中皇居壯麗此登高見者時屢改而川陸長存見前遊已過閱征途而生涯無幾歎後遊難必也水經注禹疏伊水北流兩山相對望之若闕即所謂横野斷也横野字見晉劉琨表鄭杜臆驛樹自都城而出直接龍門便見繁華氣象注河南志龍門驛在河南縣十八里曽鞏曰驛樹驛道兩畔之樹庾信詩半城斜出樹唐書東都皇城名曰太微城宫城在皇城北名曰紫微城都城前值伊闕後據北邙何遜詩山中氣色滿顔延之詩皇居體環極覺範曰佛地有金色世界銀色世界梁元帝梁安寺碑銀闕金宫出􅘵洲之下抱朴子遊戲佛寺韋應物龍門詩精舍繞層阿千龕隣陗壁杜臆地志龍門石壁鑿石龕石佛數千中有極大三龕魏王泰為長孫皇后所造其偉麗可知故有金銀之語朓左傳行李之往來陸陸機豫章行川陸殊塗軌謝詩懷古信悠哉機歎逝賦人閱人而成世問徐陵詩征途愁轉斾莊子吾生也有涯宋之詩伊闕天泉復幾囘李監宅二首一作李鹽鐡寶鶴注據梁氏編在東都作當屬天初年顧注靈怪録李令問開元中為秘書監好美服珍饌以奢聞有炙驢罌鵝之屬慘毒取味今詩中有異味重之句豈即令問乎草朱注後一首見吴若本逸詩堂本入正集尚覺王孫貴豪家意頗濃屏開金孔雀褥隠去聲繡芙蓉且食雙魚美誰看平聲異味重平聲門闌多喜色女壻近乘龍首章美李監得壻兼敘席上事孔李係宗室故曰王孫豪家意濃領起中四細分之雀芙蓉是招壻雙魚異味是燕客末則稱其得佳壻也王韓信傳吾哀王孫而進食史記索隠秦末多失國言孫公子尊之也唐梁武帝詔豪家富室毅徐彦伯詩金縷畫屏開婚舊書高祖皇后竇氏父於門屏畫二孔雀有求輒與兩箭潛約中目者許之高祖後至兩發各中一目遂歸於帝王僧孺詩以親芙蓉褥方開合歡被崔顥盧姬篇水精簾箔繡芙蓉楊慎丹鉛録云集韻縫衣曰䌥今俗云䌥線杜詩褥隠繡芙蓉字作隠而意同今按賈山至言隠於金錐注隠於靳切家古詩遺我雙鯉魚傳左傳鄭子公之食指動以示子曰必嘗異味朱博食不重味品續漢志伍伯鈴下侍閤門闌部署街里走卒皆有程庾信詩詰旦啟門闌禮記乃有喜色晉書衛玠傳婦公冰清女壻玉潤謂楚國先賢傳孫嶲與李元禮俱娶太尉桓焉女時人桓叔元兩女俱乗龍言得壻如龍也王嗣奭曰起語與五六俱含諷意挾貴好華此是王孫習氣曰尚覺頗濃猶未盡言之也下文又申之云美魚可食只此已足而乃異味重疊誰復看此耶蓋以儉樸之意箴其奢華耳食魚句乃翻孟子舍魚取熊掌語華館黄作落葉春風起高城烟霧開雜花分户映嬌燕入簾一作簷囘一見能傾座虚懷只愛才鹽車一作官雖絆驥名是漢庭來次章稱李監好客從宅景敘入李風起霧開春晴曉色花映燕廻春時景物能傾倒座客以其有愛才虚懷也大顧注驥困鹽車比官之閒冷然天馬來自漢庭終當用葢李為宗室之臣也正與前首王孫相應兮劉楨詩華館寄流波豁逹來風凉青曹植詩春風起蕭條何遜詩日夕望高城眇眇雲外亂飛鮑照詩徘徊烟霧裏魏澹詩映户落殘花丘遲書雜花生樹羣鸎北周王褒詩初春麗景鶯欲嬌道梁簡文帝新燕詩入簾驚釧響鄒吴邁逺詩一見願意司馬相如傳一座盡傾潤甫為諸葛穆答晉王命曰雖曰博納虛懷下開及語林孔北海居家賓客日滿其門愛才樂士常恐不戰國策騏驥駕鹽車上吴坂􅁶延負轅而不能進淮南子絆騏驥而求千里庾信詩絆驥猶千里垂鵬更九飛漢書贊賓於漢庭史記傳論垂名漢庭漢有鹽鐵使故曰漢庭來此切李鹽鐵魏澹詩出簾飛小燕映户落殘花杜云雜花分户映嬌燕入簾囘句法互換而意趣更佳陸放翁云楊花穿户入燕子避簾低本於杜句而姿致不減贈李白朱注年譜天寶三載公在東都太白以力士之譖亦放還遊東都此贈詩當在其時故有脫身金閨之句二年客東都所歴厭機巧野人對腥羶一作羶腥蔬食音嗣常不飽豈無青精一作籸一作䭀飯使我顔色好苦乏大一作買藥資山林跡如掃上段自敘厭都市而羡山林也青機巧則習俗難居腥羶則臭味弗投精不如大藥歎避世引年之無術矣慶唐書東都隋置武德四年廢貞觀二年號洛陽宫顯二年詔改東都莊子功利機巧必忘夫人之心道潘岳秋興賦序僕野人也野人公自謂抱朴子為者必入山林欲逺腥膻而即清淨也周禮注犬腥羊羶張綖注草食曰羶牛羊之屬水族曰腥魚鼈之屬魏志毛玠布衣蔬食三洞珠囊王褒字子登漢王陵七世孫服青精䭀飯趨步峻峰如飛鳥陶隠居登真隠訣太極真人青精乾石䭀飯法用南燭草木葉雜莖皮煑取汁浸米蒸之令飯作青色高格曝乾當三蒸曝毎蒸輒以葉汁溲令浥浥日可服二升勿服血食塡胃補髓消滅三蟲䭀音信亦作􅀈參同契薰蒸入五内顔色悅澤好梁書陶𢎞景既得神符秘訣而苦無藥物帝賜黄金硃砂雄黄等物丹書抱陽山人大藥証曰夫大藥者須煉砂中汞能取鉛裏金黄芽為根蒂水火煉功深士抱朴子作神藥必入名山郭璞詩隠士托山林高傳先幾掃迹王僧孺詩沙岸淨如掃李侯金閨彦一作深脫身事幽討亦一作未有梁宋遊方期拾瑤草下段贈李欲遂偕隠初志也思梁宋之遊近於東都大藥無資故瑤草耳賜盧注天寶三載詔李白供奉翰林旋被高力士譖帝金放還白託鸚鵡以賦曰落羽辭金殿是脱身也是年白從高天師授籙是事幽討也同時事華葢君隠王屋山艮岑梁宋之遊必訪此君杜集有昔遊詩可証閨此章上八句下四句門謝朓詩既通金閨籍别賦金之諸彦注金閨金馬也史記高帝紀脱身獨去謂幽討謂尋討幽隠臆顔延之詩塗出梁宋郊趙注梁汴州宋謂宋州杜東都在今河南府梁宋在今開封府丹山海經姑瑤之山帝女死焉化為瑤草仙家用以合藥服餌江淹登廬山詩瑤草正翕赩李善注云玉芝也顧宸曰公與白相從賦詩始於天寶三四載間前此未聞相善也白生於武后聖厯二年公生於睿宗先天元年白長公十三歲公於開元十九年遊剡溪而白與吴筠同隠剡溪則在天寶三年相去十三載斷未相值也後公下第遊齊趙在開元二十三年考白譜時又不在齊趙及白因賀知章薦召入金鑾則在天寶三載正月時公在東都塟范陽太君未嘗晤白於長安也是載八月白被放客遊梁宋始見公於東都遂相從如兄弟耳觀公後寄白二十韻有云乞歸優詔許遇我宿心親是知乞歸後始遇也黄蔡諸注俱謬重平聲題鄭氏東亭原注在新安界當鶴注唐書新安縣屬河南府是天寶三載在東都作即朱注鄭氏無考鮑欽止云駙馬鄭潛曜華亭入翠微秋日亂清暉一作輝崩石欹山樹清一作晴漣曵水衣紫鱗衝岸躍蒼隼䕶巢歸向晚尋征路殘雲傍去聲馬飛上六亭前佳景末言遊罷晚歸也故亭華山翠映於秋日故見清暉搖亂亭枕山有崩石亭瞰水故有清漣紫鱗承水蒼隼承樹巉顧宸云此詩得力全在詩腰數實字著一欹字如見巖參錯著一曳字宛然藻荇交横曰衝岸則跳突排湧惟恐墮岸曰䕶巢則疾飛急赴唯恐失巢并魚鳥精神俱為寫出此詩家鍊字法也未華亭見陸機傳乃郊外别墅此借用其字爾雅山及上曰翠㣲疏云山未及頂上在旁坡陀之處名翠微左思蜀都賦鬱葐蒀以翠微注云翠微山氣之輕縹也楊慎曰凡山逺望則翠近之則翠漸微孟郊詩山明翠微淺又詩山近漸無青可以發詩人及爾雅之詮矣詩秋日烈烈謝靈運詩山水含清暉蒼江淹兔園賦崩石梧岸崱屴藏陰曰曹植詩山樹鬱蒼詩河水清且漣猗注水成紋漣張協詩堂上水衣生注水苔也夕日欲頺沈鱗競躍蜀都賦鮮以紫鱗上陶𢎞景書説苑蒼隼擊於臺説文隼鷙鳥陸佃云鷂屬帝陳子昻詩征路入雲烟隋煬詩殘雲尚作雷陪李北海宴歴下亭鶴注歴下在齊州以有歴山故得名歴山即舜耕之山也李北海即李邕按新舊史邕廣陵人開元二十三年為括州刺史後歴淄滑二州刺史天寶初為汲郡北海二太守五載奸贓事發又嘗與劉勣馬勣下獄吉温吏引邕李林甫素忌邕因傅以罪詔祁順之羅希奭就郡杖殺之乃六年正月辛已此詩當是天寶四年作梁權道編在天寶十一年者非是時邕死已六年矣置朱注舊唐書地理志青州屬河南道武德四年青州總管府天寶元年改為北海郡乾元元年復為青州山于欽齊乗歴下亭在府城驛邸内歴山臺上靣背湖實為勝絶東藩駐皂蓋北渚凌清河一作青荷一作清菏海右一作内此亭古濟上聲南名士多原注時邑人塞處士輩在坐切首敘李公至亭皂葢切太守北渚北海清河切歴下海右句見亭為勝跡濟南句見宴有嘉賓藩趙曰青州在京師之東故稱東藩上林賦齊列為東守曹冏六代論今之州牧郡守古之方伯諸侯李屬太故得稱藩後漢書太守秩二千石中二千石二千石皆皂葢朱兩轓南陸機詩永歎遵北渚流凌歴也之杜氏通典東平濟淄川北海界中有水入海謂清河實荷澤汶水合流亦曰濟河海江淹恨賦巡海右以送日趙曰海在東州在西故云右舊唐書齊州屬河南道貞觀七年置齊州都督府天寶七年改為臨淄郡五載改濟南郡前漢儒林傳濟南伏生傳尚書其時張生歐陽生林尊皆傳其學皆濟南人也此亦名士多之一証李尋災異對博延名士雲山已發興去聲玉珮仍當歌修竹不受暑交流空湧波次記宴亭景事則此段句腰各用虛字抑揚法張綖注修竹既不受暑交流空自湧波此十字句曹毗文招儀鳯於雲山明鮑照詩臨歌不知調發興誰與歡當王容歌寶髻耀璫香羅鳴玉珮玉珮指侑酒者歌當筵而歌也楊慎曰此是對當之當非合當之當與魏武樂府對酒當歌不同阮籍詩修竹隠山陰江淹竹賦亦中暑而増肅競東征賦望河濟之交流三齊記歴水出歴祠下衆源發與濼水同入鵲山湖所謂交流也魏文帝浮淮賦驚風泛湧波駭藴真愜所遇落日將如何貴賤俱物役從公難重義從平聲讀依去聲過末則陪宴而惜别也落藴真亭含真趣物役各役於事日此席將散重過後㑹無期為此章三段各四句真謝靈運詩表靈物莫賞藴真誰傳江淹詩悠悠藴趣師氏曰貴指李賤自謂杜臆貴賤俱物役可作醒世名言易貴賤位矣任昉竟陵王行狀牽以物役詩從公于邁同李太守去聲登歴下古城員外新亭原注時李之芳自尚書郎出齊州製此亭史鶴注以歴下亭考之當是天寶四載作新舊李之芳開元末為駕部員外郎天寶十三載禄山奏為范陽司馬及禄山起逆自拔歸西京未嘗為齊州司馬齊乗池上有亭即渚池今名五龍潭客亭當為歴下古亭故曰海右此亭古水經注又云湖水北流逕歴城東又北引水為流杯池州僚賓燕公私多在其上疑此即員外新亭之地曰新亭所以别於古亭也同和詩也新亭結構罷隠見形旬切清湖陰原注亭對鵲山湖跡籍韻㑹古籍字與藉通臺觀去聲舊氣㝠一作溟海嶽深圓荷想自昔遺堞感至今此記新亭景物觀亭南有湖故水光隠映嶽朱注亭之基迹憑藉臺之舊亭之氣象𡨕接海之遙此正和邕詩形制開古跡及泰山巨壑二句意舊注籍字作圖籍解㝠字作溟濛解義遂難通荷種湖中本當言今堞在古城本當言昔今昔互換尤見曲折梁晉謝安傳將發新亭何晏景福殿賦其結搆則修彩制趙曰或隠或見言昏明異候謝惠連詩行雲星隠見師氏曰清湖鵲湖地理志歴下亭居鵲湖之北一統志鵲山湖在濟南府城北二十里上謝惠連詩分袂澄湖陰注水南曰陰列子岱輿山臺觀皆金玉鮑照詩平灑周海嶽立祖孫登詩圓荷承日暉堞沈佺期詩故基乃嶽遺堞尚雲屯朱注堞雉也芳宴此時具一作俱哀絲一作紘千古心主稱壽尊客筵秩宴北一作密林一作隣非不阻蓬蓽興去聲得兼一作兼得梁甫吟此敘登亭情事宴絲音哀切能寫千古琴心見宴逄絶調也上宴指設下宴指宴飲主指員外客指太守蓬蓽興公自謂梁甫吟在歴下也亷謝朓詩嘉樂具兮芳宴在斯植禮記絲聲哀哀以立亷以立志稱舉觴也曹詩主稱千金壽北曲禮尊客之前窬詩賔之初筵左右秩秩又鬱彼林記蓽門圭蓬户甕牖注蓬戸編蓬為戸蓽門以荆竹織門也沈約郊居賦歸閒蓬蓽東史記注梁甫太山下小山諸葛武侯梁甫吟步出齊門遙望蕩陰里里中有三墳纍纍正相似問是誰家墓田疆古冶子力能排南山文能絶地紀一朝被讒言二桃殺三士誰能為此謀相國齊晏子西谿叢語諸葛亮梁甫吟不知何義張衡四愁詩欲往從之梁甫艱注言人君有德則封太山太山喻人君梁甫喻小人也諸葛好為梁甫吟恐取此意此與上章皆用六韻依初唐排律詞尚簡要耳但此篇多平仄不諧葢古詩之對耦者倣六朝體也登歴下古城員外孫新亭附李邕詩本孫謂從孫行也一無孫字吾宗固神秀體物寫謀長形制開古迹曾同層冰延樂音洛方太山雄地理一作里巨壑𦕈雲莊此咏員外新亭切首聨言結搆巧思員外次聨言落成宴㑹切新亭三聨言亭臨山水切歴下左傳晉吾宗也謝朓詩華宗誕吾秀陳書虎丘者吴之神秀此借用其字舊孫綽樽銘大匠體物妙思入神潘岳西征賦摹寫豐書汝不謀長漢書酈食其傳示諸侯形制之勢層張九齡詩想像終古迹開古迹謂開拓舊基楚辭氷峩峩曹植詩衆賔延樂方傅毅舞賦亢音高歌為樂之方此言夏時置氷乃引樂之方也易大傳俯以察於地理鮑照詩負海横地理吴越春秋土地里數雲江總鐘銘舟移巨壑巨壑即鵲湖顔延之詩都莊動馬懐素詩仙塔儼雲莊此謂逺望莊舍渺在雲間也高興去聲泊陳作汨煩促永懐清典常含𢎞知四大出入見三光負郭喜稉與秔同稻安時歌吉祥此登亭而美員外也舉泊煩促言塵思頓蠲清典常言清靜可法含𢎞以下亭前景象以形容徳化四大三光見其上下同流郭外農祥稱其萬物得所詩此章兩段各六句殷仲文詩能使高興盡張華煩促每有餘指顔延之詩永懐交在昔常法言易含𢎞光大書其爾典常作之師典常老子曰域中有四大道大天大地大王亦大入枚乗奏書上不絶三光之明班固典引經緯乾坤出三光史記索隠三光日月五星國策蘇秦曰使我有洛陽負郭田二頃左思詩陳平無産業歸來翳負郭亭在古城之下故云負郭史記淳于髠傳祭以稉稻蜀都賦稉稻漠漠莊子安時而處順乂吉祥止止北海此詩拙朴平淺未見所長昔人有議之者少陵特推六公篇必有大過人處惜其詩今不可見耳暫如臨邑至㟙音宅山湖亭奉懐李員外率爾成興去聲泛盧元昌注暫如臨邑者公弟簿領此邑前以河書至故暫如臨邑先至湖亭别李員外之芳李適往青州因而奉懐是鶴注此當是天寶四載作在邕五載事發之前年公西歸咸陽臨邑唐屬齊州公和李太守登歴下新亭詩自注亭對鵲湖今題云㟙山湖即鵲湖也按今地志齊州治歴城縣歴城東門外有歴水入鵲山湖宋曾鞏有鵲山亭詩濼水飛綃來野岸鵲山浮黛入晴天此亦可証矣野亭逼湖水歇馬高林間鼉吼呼候切風奔浪魚跳平聲日映山暫遊阻詞伯却望懐青闗靄靄生雲霧惟應平聲促駕還上四湖亭之景下四懐李員外此鼉吼乘風故激波生浪魚跳水動故日光映山登亭而見湖中之勝也詞伯指李員外李在青闗故阻而懐思闗近臨邑故望其早還後漢書郭伋止野亭庾信詩野亭高被馬詩曹植詩湖水何洶洶疏庾信詩樹陰逄歇馬長陶潛微風洗高林草木云鼉形似蜥蝪四足丈餘首尾皆有鱗甲續博物志鼉一名土龍其聲如鼓杜臆風奔浪奔字奇妙魚跳句偶然觸目所云率爾成興也還論衡文詞之伯闗逺注却望退望也張正見詩揚鞭却望朱注青或云即徐州穆陵闗未知是否晦吴均詩靄靄隠青林趣楚辭雲霧㑹兮日㝠前漢朱博傳告外駕注趣讀曰促贈李白鶴注公與白相别當在天寶四載之秋故云秋來相顧尚飄蓬李集有魯郡石門别公詩亦當在秋時秋來相顧尚飄蓬未就丹砂愧葛洪痛飲狂歌空度日飛揚跋扈侯古切為去聲誰雄此詩自歎失意浪遊而惜白之興豪不遇也下二贈語含諷見朋友相規之義焉蓬庾信詩秋來南向飛别兩相顧曹植詩轉離本根飄飄隨長風又離晉書葛洪見天下已亂欲避地南土乃參廣州刺史嵇含軍事含遇害遂停南土多年後以年老聞交趾出丹砂求為勾漏令帝以洪資高不許洪曰非欲為榮以有丹砂帝從之後詩李白斗酒詩百篇即痛飲狂歌也世説王孝伯曰但常得無事痛飲讀離騷可稱名士朱徐幹中論或被髪而狂歌吴均詩離離堪度日注唐史謂白好縱横術喜擊劍為任俠動北史侯景傳專制河内常有飛揚跋扈之意飛揚浮之貌跋扈强梁之意朱注西京賦睢盱跋扈梁冀傳此跋扈將軍也考説文扈尾也跋扈猶大魚之跳跋其尾也選注及後漢書注俱未明白陳子昻詩可憐驄馬使首為誰雄此章乃截律詩首尾葢上下皆用散體也下截似對而非對痛飲對狂歌飛揚對跋扈此句中自對法也空度日對為誰雄此兩句又互相對也語平意側方見流動之致范梈曰絶句者截句也或前對或後對或前後皆對或前後皆不對總是截律之四句是雖正變不齊而首尾布置亦由四句為起承轉合未嘗不同條而共貫也敖英曰少陵絶句古意黯然風格矯然其用事奇崛樸健亦與盛唐諸家不同意楊載曰絶句之法要婉曲囘環刪蕪就簡句絶而不絶多以第三句為主四句發之有實接有虛接承接之間開與合相闗反與正相依順與逆相應一呼一吸宫商自諧大抵起承二句固難不過平直敘起為佳從容承之為是至如宛轉變化工夫全在第三句若於此轉變得好則第四句如使順流舟矣中王世貞曰七言絶句盛唐主氣氣完而意不甚工晚主意意工而氣不甚完然各有至者未可以時代優劣也而胡應麟曰四言變而離騷離騷變而五言五言變七言七言變而律詩律詩變而絶句詩之體以代變也三百篇降而騷騷降而漢漢降而魏魏降而六朝六朝降而三唐詩之格以代降也風雅之規典則居要離騷之致深永為宗古詩之妙專求意象歌行之暢必由才氣近體之攻務先法律絶句之構獨主風神此結撰之殊塗也兼裒總挈集厥大成詣絶窮微超乎彼岸軌筏具存在人而已五又曰五七言絶句葢五言短古七言短歌之變也言短古雜見漢魏詩中不可勝數唐人絶體實所從來七言短歌始於垓下梁陳以降作者坌然第四句之中二韻互叶轉換既迫音調未舒至唐諸子一變而律吕鏗鏘句格穏順語半於近體而意味深長過之節促於歌行而咏嘆悠永倍之遂為百代不易之體聨又曰絶句之義迄無定説謂截近體首尾或中二者恐不足憑五言絶起兩京其時未有五言律七言絶起四傑其時未有七言律也但六朝短古槩目歌行至唐方曰絶句又五言律在七言絶前故先律後絶耳險又曰杜陵太白七言律絶獨步詞場然少陵律多拗太白絶間率露大家故宜有此若神韻干雲絶無烟火深𠂻隠厚妙協簫韶李頎王昌齡故是千秋絶調又曰古人作詩各成已調未嘗互相師襲以太白之才就聲律即不能為杜何至遽減嘉州以少陵之才攻絶句即不能為李詎謂不若摩詰彼自有不可磨滅者無事更屑屑也又曰五言絶尚真切質多勝文七言絶尚高華文多勝質五言絶昉於兩漢七言絶起自六朝源流逈别體製自殊至意當含蓄語務舂容則二者一律也句又曰自少陵絶句對結詩家率以半律譏之然絶自有此體特杜非當行耳如岑參凱歌丈夫鵲印搖邊月大將龍旗掣海雲洗兵魚海雲迎陣秣馬龍堆月照營等句皆雄渾高華後世咸所取法即半律何傷若杜審言紅粉樓中應計日燕支山下莫經年獨憐京國人南竄不似湘江水北流則詞竭意盡雖對猶不對也水又曰少陵不甚攻絶句遍閱其集得二首東逾遼北滹沱星象風雲喜色和紫氣闗臨天地濶黄金臺貯俊賢多中巴之東巴東山江水開闢流其間白帝高為三峽鎮夔州險過百重闗頗與太白明皇幸蜀歌相類如又曰杜之律李之絶皆天授神詣然杜以律為絶窗含西嶺千秋雪門泊東吴萬里船等句本七律壯語而以為絶句則斷錦裂繒類也李以絶為律如十月吴山曉梅花落敬亭等句本五言絶境而以為律詩則駢胟枝指類也又曰杜少年行馬上誰家白靣郎臨階下馬坐人床不通姓氏粗豪甚指㸃銀鉼索酒嘗殊有古意然自是少陵絶句與樂府無干惟錦城絲管一首則近於太白七又曰盛唐長五言絶不長七言絶者孟浩然也長言絶不長五言絶者高達夫也五七言各極其工者太白五七言俱無所解者少陵也與李十二白同尋范十隠居顧注天寶三載三月白自翰林放歸四載白在齊州公與同遊歴下所云余亦東䝉客憐君如弟兄是也李侯有佳句往往似陰鏗余亦東蒙客憐君如弟兄醉眠秋共被擕手日一作月同行首敘待白交情也共被同行所謂如弟兄宋書謝靈運云每對惠連輒得佳句歲漢書吴王傳往往而有南史武威陰鏗字子堅五能誦賦日千言及長博涉史傳尤善五言詩為當時所重蒙論語疏顓㬰主祭䝉山山在東故曰東䝉鶴注唐志山在沂州新泰縣沂與兖州為隣公在兖故云東蒙客思韓詩外傳使兩國相親如弟兄世説朱百年就孔逺宿飲酒醉眠情漢姜肱兄弟同被而寢晉祖逖劉琨好綢繆共被同寢詩擕手同行更想幽期處還尋北郭生入門高興去聲發侍立小童清落景影同聞寒杵屯音諄雲對古城次叙同尋隠居居更想還尋敘途中也入門侍立造范也落景屯雲則留連至晚矣士丁督䕶詩幽期濟河梁謝靈運詩平生協幽期高傳楚聘北郭先生婦曰結駟連騎所安不過容膝遂辭聘後漢書汝南廖扶絶志世外不應辟召時號北郭先生沈箋太白集尋魯城北范居士失道落蒼耳中詩云忽憶范野人閒園養幽姿酸棗垂北郭寒𤓰蔓東籬此云來尋北郭生即其人也鶴注范居任城北郭非兖州北郭升曲禮客入門而左帝殷仲文詩能使高興盡家語堂侍立莊子黄遇牧馬童子問塗焉黄帝曰異哉小童杜臆見小童之清俊便知主人不俗梁元帝纂要晚照謂之落景盧思道詩落景照長亭葛列子望之若屯雲焉可袁孝若諸孔明論古城荒毁難修復向來吟橘頌誰與誰劉作惟與一作欲討蓴羮不願論平聲簪笏悠悠滄海情末對隠居而思物外之遊也橘蓴秋時物品滄海近齊有神仙在焉受此章前二叚各六句後二叚四句收杜臆橘頌以命不遷行比伯夷頌云后皇嘉樹橘徠服兮受命不遷生南國兮晉書張翰在洛見秋風起思吴中菰菜蓴羮鱸魚鱠曰人生貴適志何能羇宦數千里以要名爵乎遂命駕而歸江總詩簪笏奉周行邵注冠簪手笏貴者之服夀李陵詩悠悠清川水吾丘王論東越滄海鄭駙馬宅宴洞中朱注此詩乃天寶四五載歸長安後作黄鶴以駙馬洞中與鄭氏東亭為一處誤矣曜鶴注唐史臨晉公主皇甫淑妃所生下嫁鄭潛公所撰皇甫淑妃碑鄭潛曜尚臨晉公主乃代國長公主之子官曰光禄卿爵曰駙馬都尉又云甫忝鄭莊之賔客遊竇主之山林開元二十三年塟於河南縣公主戚然謂左右曰自我之西歲陽再紀乃以詩文見託則是碑作於天寶四載矣主家陰洞細烟霧留客夏簟青一作清琅玕春酒盃濃琥珀薄冰漿椀碧瑪瑙寒悮疑茅堂一作屋過江麓一作底已入風磴丁鄧切霾雲端自是秦樓壓鄭谷時聞雜佩聲珊珊首句切洞次句切宴三四承留客五六承陰洞俱屬夏時景事七八駙馬公主並收細烟霧狀洞口之幽陰青琅玕比竹簟之蒼翠琥珀盃瑪瑙椀言主家器物之瑰麗若三字連用易近於俗將盃椀倒拈在上而以濃薄碧寒四字互映生姿得化腐為新之法江麓雲端其清凉迥出塵境又見高樓下臨鄭谷空中雜佩聲聞恍如置身仙界矣結語風韻嫣然賢朱瀚曰末句暗用毛詩雜佩以問之亦見公主有好之意漢書東方朔傳董偃出入主家注公主之家也四拾遺記洞穴陰源下通地脉陶開虞曰主家陰洞字若今人為之近於諧謔矣别鮑照詩重拾烟霧迹留客坐江淹賦夏簟清兮晝不暮戴暠詩揮金書厥貢惟球琳琅玕本草蘇業注琅玕有五色青者入藥為勝靈異兼圖載琅玕青色生海底以網掛得之初出水紅色久而青黒擊之有金石之聲與珊瑚相類趙曰詩家多以琅玕比竹朱瀚曰李德林詩壺盛仙客酒缾貯帝臺漿頷聨本此佩詩為此春酒器蕭子範詩握中清酒瑪瑙鐘裾邊雜琥珀紅陳藏本草琥珀出罽賔國陶隠居曰松脂入地千年化為琥珀玉陸機樂府渴飲堅冰漿魏文帝瑪瑙賦序曰瑪瑙屬也出自西域文理交錯有似馬腦因以名之楊􅃷之洛陽伽藍記元琛酒器有水晶鉢瑪瑙琉璃椀赤玉巵數十枚謝莊詩訪德茅堂陰壁服䖍曰麓大林也風鮑照詩既類風門磴復象天井風磴登陟之路凌而上也陸機詩飛升躡雲端鳳列仙傳秦穆公以女弄玉妻蕭史日於樓上吹簫作鳴鳳止其屋一旦夫妻皆隨鳳去殷謀詩秦樓出佳麗鄭揚子法言谷口鄭子真耕於巖石之下名震京師樸字子真漢成帝時人宋玉神女賦動霧縠以徐步兮拂墀聲之珊珊律詩中二聨須用虚實相生方見變化此詩頷聨敘事濃麗腹聨寫景蕭疎前實後虚乃安頓章法也毛詩如兔罝魚麗等篇皆隔句用韻韓昌黎作張徹墓銘上下韻脚仄平迭用亦效此體如此詩三五七句末疊用薄麓谷三字古韻屋陌相通豈亦效隔句韻耶但律詩從無此格他本江麓作江底中換一音則薄谷便不礙矣考公詩多用江渚底宜作渚如李天生曰少陵七律百六十首惟四首疊用仄字江邨詩連用局物二字考他本多病所須惟藥物作幸有故人分禄米於局字不疊矣江上值水詩連用興釣二字考黄鶴本老去詩篇渾漫興作老去詩篇渾漫與於釣字不疊矣秋興詩連用月黒二字考黄鶴本織女機絲虛夜月作織女機絲虛月夜於黒字不疊矣可見晚節漸於詩律細凡上尾仄聲原不相犯也沈約標律詩八病有平頭上尾蜂腰鶴膝等名不可不知若大韻小韻正紐旁紐尚非所重所謂平頭者前句上二字與後句上二字同聲如古詩今日良宴㑹歡樂難具陳今歡同聲日樂同聲是平頭也又如朝雲晦初景丹池晚飛雪飄披聚還散吹揚凝其威四句上二字皆平聲是平頭也又如周王褒詩髙箱照雲母壯馬飾當顱單衣火浣布利劍水精珠四句疊用四物而每物各用一虚一實字靣亦平頭也又如杜摯詩伊摯為媵臣吕望身操竿夷吾困商販甯戚對牛歎食其處監門淮陰饑不餐疊引古人皆在句首是亦平頭也所謂上尾者上句尾字與下句尾字俱用平聲雖韻異而聲則同是犯上尾如古詩西北有髙樓上與浮雲齊樓與齊皆平聲又如庭􅑍有若榴緑葉含丹榮榴與榮亦平聲也又一句尾字與三句尾字連用同聲是亦上尾如古詩客從逺方來遺我一書札上言長相思下言久離別來思皆平聲又如新製齊紈素皎㓗如霜雪裁為合歡扇團圓似秋月素扇皆去聲亦犯上尾矣其在七律如杜詩春酒杯濃琥珀薄與誤疑茅堂入江麓同係入聲王維詩新豐樹裏行人度與聞道甘泉能獻賦去聲同韻皆犯上尾也又如杜秋興詩西望瑤池降王母東來紫氣滿函闗雲移雉尾開宫扇日繞龍鱗識聖顔王母函闗宫扇聖顔俱在句尾未免疊足亦犯上尾若林花著雨臙脂落水荇牽風翠帶長龍虎新軍深駐輦芙蓉别殿漫焚香前聨拈落長二字於句尾後聨移深漫二字於上靣便不犯同矣蔡寛夫詩話云蜂腰鶴膝葢出於雙聲之變若五字首尾皆濁音中一字獨清則兩頭大而中間小即為蜂腰若五字首尾皆清音中一字獨濁則兩頭細而中間粗即為鶴膝矣今按張衡詩邂逅承際㑹是以濁夾清為蜂腰也如傅𤣥詩徽音冠青雲是以清夾濁為鶴膝也舊注以客從逺方來上言長相思為鶴膝意不分明所謂大韻者如微暉同韻上句第一字不得與下句第五字相犯阮籍詩微風照羅袂明月耀清暉是也所謂小韻者如清明同韻上句第四字不得與下句第一字相犯詩云薄帷鑒明月清風吹我襟是也所謂正紐者如溪起憩三字為一紐上句有溪字下句再用憩字庾闡詩朝濟清溪岸夕憩五龍泉是正紐也所謂旁紐者如長梁同韻長上聲為丈上句首用丈字下句首用梁字是亦相犯詩云丈夫且安坐梁塵將欲起此旁紐也在七律如杜詩逺開山嶽散江湖山散為正紐如丈人才力猶强健丈强為旁紐矣此外又有雙聲疊韻之法南史王元謨問謝莊曰何者為雙聲何者為疊韻答曰互䕶為雙聲磝碻為疊韻學林新編曰雙聲者同音而不同韻疊韻者同音而又同韻也如李羣玉詩方穿詰曲﨑嶇路又聽鈎輈格磔聲詰曲﨑嶇乃雙聲鈎輈格磔乃疊韻也蔡寛夫曰如杜詩卑枝低結子接葉暗巢鶯即疊韻也僧皎然詩評曰沈休文酷裁八病碎用四聲故風雅殆盡後人天機不高多為沈法所縛懵然隨流溺而不返矣冬日有懐李白顧宸注此詩在天寶四載冬作諸家謂白未官時誤鰲按曾鞏李白集序李白至齊魯凢兩次初去雲夢之齊魯居徂徠山竹溪而入吴此在天寶三年前明皇未召見時後至洛陽遊梁宋復之齊魯南游淮泗而再入吴此在天寶三年後翰林既放歸時杜之懐李當在四年之冬此時李復有東吴之遊後春日懐李詩云江東日暮雲當屬五年之春其送孔巢父詩題云遊江東兼呈李白亦即五年之春也寂寞書齋裏終朝獨爾思更尋嘉樹傳去聲不忘去聲角弓詩短或作裋褐風霜入還丹日月遲未因乗興去聲去空有鹿門期上四懐李下四自叙嘉朱注公不忘太白猶季武之不忘韓宣故有樹角弓語短褐二句自傷流落蹉跎空有鹿門期即前詩相期拾瑤草意也曹植詩閒房何寂寞王勃詩書齋望曉開詩終朝采緑宣逸詩豈不爾思韓庾信詩更尋終不見季左傳晉韓子來聘公享之子賦角弓既享燕於氏有嘉樹焉宣子譽之武曰宿敢不封殖此樹以無忘角弓遂賦甘棠顧注此將一事翻成兩句杜臆短褐二句言貧難錬藥即前詩苦乏大藥資山林迹如掃也司朱注戰國策鄰有短褐一作裋褐史記上不得短褐馬貞曰短亦作裋裋襦也貢禹傳裋褐不完王命論裋褐之䙝裋皆音豎魏文帝令衣或短褐不完唐人兩用之若少陵短褐風霜入還丹日月遲與江湖漂短褐霜雪滿飛蓬以屬對言不當作裋陸倕詩行止避風霜遲神仙傳藥之上者有九轉還丹雪陶潛詩日月不肯世説戴安道居剡溪王子猷夜命棹未至遽反曰乗興而來興盡而返何必見戴剡張逺注舊唐書李白天寶初客游㑹稽與吴筠隠於下故有乗興句後漢書龎德公擕妻子登鹿門山采藥不返李集有堯祠贈杜補闕詩我覺秋風逸誰言秋氣悲山將落日去水與晴相宜烟歸碧海少雁度青天遲相失各萬里茫然空爾思段成式酉陽雜俎謂杜補闕即杜子美公此詩用李詩遲字以和之其説非也公遇李時尚為布衣其授拾遺在至德乾元間且補闕拾遺官銜不同豈可强作傅㑹耶春日憶李白顧注天寶五載春公歸長安白被放浪遊再入吴詩必此時所作白也詩無敵一作數飄然思去聲一作意不羣清新庾開府俊逸一作豪邁鮑參軍渭北春天樹江東日暮雲何時一樽酒重平聲與細論平聲一作話斯文上四稱白詩才下乃春日有懐才兼庾鮑則思不羣而當世無敵矣杯酒論文望其竿頭更進也懐公居渭北白在江東春樹暮雲即景寓情不言懐而在其中王嗣輔杜臆曰公懐太白欲與論文也公與白同行同卧論文舊矣然於别後另有悟入因憶向所與言猶粗而未精思重與論之此公之篤於交誼也敵檀弓則為白也母句法本此史記項羽紀所向無晉曹毗黄帝讚飄然跨騰鱗靡詩品曹思王超逸今古卓爾不羣鮑黄生曰六朝綺庾鮑獨存氣骨今按庾新主五言逸主長句士晉文士傳張翰善屬文造次立成辭義清新任昉薦表詞賦清新周書庾信留長安遷驃騎大將軍開府儀同三司墓世説邊文禮才辯俊逸孔北海薦於曹公沈約任昉銘天才俊逸文雅𢎞備宋書臨海王子瑱在荆州以鮑照文辭贍逸為前軍參軍江淹詩渭北雨聲過陳子昻詩郊園春樹平語林王充著論衡中土未有傳者蔡中郎至江東得之此指浙江之東充葢㑹稽上虞人也朱注江東即㑹稽太白懐賀監詩欲向江東去定將誰舉杯稽山無賀老却棹酒船囘葢亦以㑹稽為江東江淹詩日暮碧雲合逺蘇武詩我有一樽酒欲以贈人庾信詩論文報潘岳朱鶴齡曰公與太白之詩皆學六朝前詩以李侯佳句比之陰鏗此又比之庾鮑葢舉生平所最慕者以相方也王荆公謂少陵於太白僅比以鮑庾陰鏗則又下矣或遂以細論文譏其才疎也此真瞽説公詩云頗學陰何苦用心又云庾信文章老更成又云流傳江鮑體相顧免無兒公之推服諸家甚至則其推服太白為何如哉荆公所云必是俗子偽託耳云遯齋閒覽云王荆公編杜歐韓李四家詩或問公子編四詩以杜為第一李為第四豈白之才格詞致不逮子美耶公曰太白歌詩豪放飄逸人固莫及然其格止於此而已不知變也至於子美則悲懽窮泰發歛抑揚疾徐縱横無施不可故其詩有平淡簡易者有綺麗精確者有嚴重威武若三軍之帥者有奮迅馳驟若泛駕之馬者有淡泊閒靜若山谷隠士者有風流醖藉若貴介公子者葢公詩緒宻而思深觀者茍不能臻其閫奥未易識其妙處夫豈淺近者所能窺哉此子美所以光掩前人而後來無繼也元稹謂兼人所獨專斯言信矣楊萬里誠齋曰太白之詩列子之御風也少陵之詩靈均之乗桂舟駕玉車也無待者神於詩者歟有待而未嘗有待者聖於詩者歟塵徐仲車曰太白之詩飢鷹瞥漢少陵之詩駿馬絶嚴滄浪曰少陵之詩法如孫吴太白之詩法如李廣恍敖器之曰太白如淮安雞犬遺響白雲覈其歸存無定處獨少陵如周公制作後世莫能擬議騷楊慎升菴曰太白詩仙翁劍客之語少陵詩雅士人之詞比之於文太白則史記少陵則漢書也矣王世貞曰五言律七言歌行子美神矣七言律聖五七言絶太白神矣七言歌行聖矣五言次之太白之七言律子美之七言絶皆變體為之可耳厭又曰十首以前少陵較難入百首以後青蓮較易揚之則髙華抑之則沈實有色有聲有氣有骨有味有態濃淡淺深奇正開闔各極其則吾不能不服膺少陵如胡應麟曰才超一代者李也體兼一代者杜也李星懸曰揭照曜太虚杜若地負海涵包羅萬彚李唯超出一代故髙華莫並色相難求杜唯兼綜一代故利鈍雜陳巨細咸蓄又曰李才高氣逸而調雄杜體大思精而格渾超出唐人而不離也唐人者李也不盡唐調而兼得唐調者杜送孔巢父謝病歸游江東兼呈李白朱注此詩乃天寶中在京師作孔唐注時蔡侯餞别巢父公在筵上賦此凖唐書巢父字弱翁冀州人早勤文史少與韓李白裴政張叔明陶沔隠居徂徠山時號竹溪六逸朱注江東乃浙江以東晉書謝安被召歴年不至遂栖遲東上王羲之既去官徧游東中諸郡皆謂㑹稽也又云考史巢父以辭永王璘辟署知名廣德中始授右衛兵曹參軍意巢父在天寶間嘗游長安辭官歸隠史不及載耳舊注云巢父察永王必敗謝病而歸公作此送之大謬巢父音甫掉頭不肯住東將入海隨烟霧詩巻長留天地間釣竿欲拂珊瑚樹此叙巢父往江東中孔之東游志在遯世引年故篇多言神仙事愛莊子鴻濛拊髀雀躍掉頭曰吾弗知方陶潛詩彭祖永年欲留不得住史記秦始皇紀士徐市等入海求神藥世江淹詩乗鸞向烟霧徠集行於古詩人生天地間本集注巢父有徂東遊近海故引珊瑚樹郡魏文帝詩遙望大海涯釣竿何珊珊色述異記鬱林有珊瑚市海客市珊瑚處也珊瑚碧生海底一樹數枝枝間無葉大者高五六尺西京雜記積草池中有珊瑚樹高一丈二尺一本三柯上有四百六十二條是南越王趙陀所獻號為烽火樹至夜光景常欲然趙曰珊瑚樹生海底石上故以拂言之也深山大澤龍蛇逺春寒野陰風景暮蓬萊織女囘雲車指㸃虛無是征路此寫東游景事其龍蛇山澤况其歸隠之迹春寒野陰紀别去之時蓬萊征路言當有同志契合也月左傳深山大澤實生龍蛇野漢成帝紀陽朔元年二春寒顔延之詩庭昏見陰宋武帝詩粤值風景和仙蓬萊在東海之中織女為吴越分野故用之别本作人玉女稍泛漢郊祀志蓬萊方丈瀛洲為三神山闔織女見二巻贈張垍詩註俱歸司馬相如大人賦排閭而入帝宫載玉女而與之後漢桓君山仙賦乗凌虛無洞達幽明諸物皆見玉女在傍傅𤣥詩雲為車兮風為馬陶隠居真誥朱闗内真以雲車虛轅相適大抱朴子莫不指㸃之子所貴道虛無因應人賦乗虛無而上假史記老陳子昻詩離亭暗風雨征路入雲烟自是君身有仙骨世人那得知其故惜君只欲苦死留富貴何如草頭露此稱其隠志已决人愛惜而苦留此世不知巢父者富貴如草露此巢父獨有仙骨也又葛洪神仙傳劉根傳神人曰汝有仙骨故得見吾耳嚴青居貧忽有人以一巻素書與青曰汝有仙骨應得長生鮑照詩旁人那得知詩惜不知其故苦死留雖用方言然亦有所本莊子苦死者世説羊孚食畢便退遂苦相留李嶠詩富貴榮華能㡬時述征記八月一日作五明嚢盛草頭露洗眼眼明商君傳君之危若朝露蔡侯靜者意有餘清夜置酒臨前除罷琴惆悵月照一作㸃席㡬歲寄我空中書南尋禹穴見李白一作若逢李白騎鯨魚非道去聲甫問訊一作信今何如結出送孔呈李之意齊置酒者蔡也惆悵者公也寄書道訊者孔也賔主一收拾矣此章前三段各四句末段六句收還夢弼謂蔡侯為人恬靜而意氣有餘今按謝靈運詩得靜者便公三用之如貽阮隠居詩云貧知靜者性寄張彪詩云靜者心多妙師氏以靜為蔡侯名誤矣魏文帝詩清夜延賔客陸機詩置酒髙堂惆前除庭前堦除也惆沈佺期詩罷琴明月夜仙楚辭悵兮而私自憐注悵悲哀也陶𢎞景左公蕭公碑有人漂海隨風𦕈漭無垠忽值神島見人授書一函題曰寄葛公令歸吴達之上云神仙事朱注梁高僧傳蓬萊道人寄書小兒至廣陵白兔埭令其捉杖飄然而往足下時聞波濤或云有商人海行見一沙門求寄書史宗同侣欲看書書著船不脱及至白埭書飛起就宗宗接而將去宗後憩上虞龍山寺㑹稽謝邵魏邁之等皆師焉空列子夫天地空中之一細物南史禇翔少有孝行聞中彈指史記自序上㑹稽探禹穴周􅓨注禹穴有兩處蜀之石泉禹生之地古碑刻有太白書禹穴二字今紹興㑹稽亦有禹穴乃窆所也天寶初白居㑹稽故云俗南尋句一作若逢李白騎鯨魚按騎鯨魚出羽獵賦傳太白醉騎鯨魚溺死潯陽皆縁此句而附㑹之耳詩古詩幸可廣問訊補注王勃傾影赴前除王洙曰一本云巢父掉頭不肯住東將入海隨烟霧書巻長擕天地間釣竿欲拂三珠樹我擬把袂苦留君富貴何如草頭露深山大澤龍蛇逺花繁草青春日暮仙人玉女囘雲車指㸃虛無引歸路若逢李白騎鯨魚道甫問訊今何如按别本止十二句語雖簡淨然少宕逸風神還依諸家本為正劉勰曰七言成章必優柔和平長短措詞貴抑揚頓挫范梈曰七言古詩要鋪叙要開合要風度要迢逓險怪雄峻鏗鏘忌庸俗軟腐須是波瀾開合如江海之波一波未平一波復起又如兵家之陣方以為正又復為奇方以為奇忽復是正竒正出入變化不可紀極備此法者唯李杜也開合燦然音韻鏗然法度森然學問充然議論超然讚又曰七言長古篇法有八曰分段過段突兀字貫歎再起歸題送尾分段如五言過段亦如之稍有異者突兀萬仞則不用過句陡頓便説他事杜詩大多如此岑參專尚此法為一家數字貫前後重三疊四用兩三字貫串極精神好誦岑參所長讚歎如五言再起且如一篇三段説了前事再提起從頭説去謂反覆有情如魏將軍歌松子障歌是也歸題乃本末一二句繳上起句又謂之顧首如蜀道難古别離洗兵馬行是也送尾則生一段餘意結末或反用或比喻用如墜馬歌曰君不見嵇康養生被殺戮又曰如何不飲令人哀長篇有此便不迫促甚有從容意思王世貞曰歌行有三難起調一也轉節二也收結三也惟收為尤難如作平調舒徐綿麗者結須為雅詞勿使不足奔騰洶湧驅突而來者須一截便住勿留有餘中作竒語峻奪人魄者須令上下脉相顧一起一伏一頓一挫有力無跡方成篇法仙又曰李杜歌行之妙冠於盛唐咏之使人飄揚欲者太白也使人慷慨激烈歔欷欲絶者子美也拙謝榛曰七言長古之法如波濤初作一層緊一層句不失大體巧句不害正氣鋪叙意不可盡力不可竭貴有變化之妙履胡應麟曰五言古至兩漢無論中才即大匠國工冰袖手七言古茍天才雄贍而刻意前規則縱横排蕩滔滔莽莽千言不窮㸃筆立就無不可者然五古才力不足可勉而能七古非才力有餘斷不至此也辦又曰七言長歌非博大雄渾横逸浩瀚之才鮮克此葢歌行不難於師匠而難於賦授不難於揮灑而難於藴藉不難於氣槩而難於神情不難於音節而難於步驟不難於胸腹而難於首尾學者須尋其本色即千言鉅什亦不使有一字離去乃為善耳又曰七言歌行垂拱四子詞極藻艶然未脱梁陳也張李沈宋稍汏浮華漸趨平實唐體肇矣然而未暢也髙岑王李音節鮮明情致委折濃纎修短得衷合度暢矣然而未大也太白少陵大而化矣能事畢矣降而錢劉神情未逺氣骨頓衰元相白傅起而振之敷演冇餘步驟不足昌黎而下門戸競開盧仝之拙樸馬異之庸猥李賀之幽竒劉乂之狂譎雖淺深高下材局懸殊要皆曲逕旁蹊無取大雅張籍王建稍為真淡體益卑卑庭筠之流更事綺繪漸入詩餘古意盡矣以又曰初唐七言古以才藻勝盛唐以風神勝李杜氣槩勝而才藻風神稱之加以變化靈異遂為大家非又曰李杜歌行雖沈鬱逸宕不同然皆才大氣雄子建淵明判不相入者比短又曰古詩窘於格調近體束於聲律唯歌行大小長錯綜闔闢素無定體故極能發人才思李杜之才不盡於古詩而盡於歌行今夕行鶴注詩言咸陽客舍一事無當是天寶五年自齊趙西歸至長安時作今夕何夕歲云徂更平聲長燭明不可孤咸陽客舍一事無相與博塞蘇代切一作賭博為歡娱馮音慿陵大呌呼去聲五白袒跣不肯成梟盧一作牟英雄有時亦如此邂逅豈即非良圖君莫笑劉毅從來布衣願家無儋都檻切石輸百萬此詩見少年豪放之意除夕博戲呼白而不成梟因作自解之詞末引劉毅輸錢以見英雄得失不係乎此也燭庚溪詩話澄江朱正民曰今夕歲徂值除夜也更長明夜守歲也客舍無事而博塞旅中借以遣興也在他時則不暇為此矣足不可孤言不負此夕馮陵意氣發揚貌袒跣袒臂跣也杜臆邂逅良圖謂失意中偶然遭遇便成良縁此貧人意想之詞蘭詩今夕何夕韋孟詩歲月其徂年其逮老楚辭膏明燭華燈錯些書三輔黄圖秦都咸陽山水俱在其南故名咸陽唐武徳元年析經陽始平置咸陽縣屬京兆府潘岳議客舍灑掃以待征旅以遊蘇武詩歡娱在今夕莊子問榖何事則博塞左傳馮陵我城郭英雄記公孫瓚傳揚塵大呌直前衝突漢招魂成梟而牟呼五白些吴越春秋肉袒徒跣後杜篤論都賦莫不袒跣稽顙文應劭人物志草之秀者為英獸之特者為雄故人之武茂異取名於此聰明秀出謂之英胆力過人謂之雄陸機詩英雄有屯邅毅詩邂逅相遇蒱陸機詩行矣勉良圖晉書劉毅傳於東堂聚樗大擲一判應至數百萬餘人並黒犢以還惟劉裕及毅在後毅次擲得雉大喜繞床呌謂同坐曰非不能盧不事此耳裕惡之因桵五木久之曰老兄試為卿答既而得子俱黒一子轉躍未定裕厲聲喝之即成盧又慕容寶傳寶與韓黄李根等樗蒱誓之曰世云樗蒱有神若富貴可期頻得三盧於是三擲盡盧寶拜而受賜前漢蒯通傳守儋石之禄受雄傳家無儋石之儲應劭漢書注齊人名甖為儋石米二斛南史劉毅家無儋石儲樗蒱一擲百萬附考王逸楚辭注投六箸行六棊故云六博許慎説文博局戲六箸十二棊也鮑宏博經用十二棊六白六黒所擲投謂之瓊瓊有五采不潘鴻曰古大博則六棊小博則十二棊故王許説同説文簺行棊相塞謂之塞得鮑宏塞經塞有四采塞四乗五是也至五即格不行故謂之格五招魂王逸注倍勝為牟五白博齒也言已箸已棊當成牟勝射張食棊下逃於窟故呼五白以助投也師氏曰五白即今之骰子李白云連呼五白行六博握戰國策王不見夫博之用梟耶欲食則食欲握則補注正義云博頭有刻為梟鳥形者擲得梟者合食其子食者行棊握不行也晉張重華傳謝艾曰梟者邀也六博得梟者勝為邵注梟盧以五木為采有梟盧雉犢之形盧多者勝盧犬名唐國史補崔師本好為古樗蒱其法三分其子三百六十限以二闗人執六馬其骰五枚上黒下白黒者刻二為犢白者刻二為雉擲之全黒為盧二雉三黒為雉二犢三白為犢全白為白四者貴采也開塞塔秃撅梟六者雜采也貴采得連擲得打馬得過闗餘則否齒程大昌演繁露盧在樗蒱為最高之采梟固為善而殺梟者又當得雋則梟之采品非盧比也杜概言梟盧亦恐未詳以宋注不肯成梟盧正用劉毅事兼舉六博之梟者樗蒱本博類也昌黎詩六博在一擲梟盧叱廻旋語與此同贈特進汝陽王二十韻鶴注舊史天寶初璡終父䘮加特進九載卒考寧王憲以開元二十九年十一月薨天寶三載璡䘮服方終必其年二月封璡以嗣寧王并加特進也公於開元二十四年下考功第去遊齊趙八九年其歸長安當在天寶四五載間壯遊詩云賞遊實賢王曵裾置醴地正其時也梁權道編在十一載非唐書文散階正二品曰特進特進羣公表天人夙德升霜蹄千里駿風翮九霄鵬首從特進叙起上二言位以德升下二言德以位顯夙德句領下兩段漢官儀諸侯功德優盛朝廷所敬異者賜位特進在三公下植書羣公既皆聽命為表表帥也漢魏畧邯鄲淳見曹才辯對其所知嘆天人後齊武王傳名儒宿德莫不造門應璩書王肅以宿德顯授夙德早成之德也莊子馬蹄可以踐霜雪漢書武帝謂劉德為千里駒之陸機詩茍無凌風翮萬莊子鵬怒而飛其翼若垂天雲搏扶搖而上者九里支遁詩九霄落芳津服禮求毫髪惟一作推土囘切忠忘去聲寢興聖情常有眷朝音潮退若無慿仙醴一作醖來一作求浮蟻奇毛或賜鷹清闗塵不雜中使去聲日相乗此言其尊君謙己之德惟忠故帝常眷注服禮故勢不敢慿醴鷹遣使申言聖眷門闗不雜正見無慿忠經被服禮樂鍾繇表不差毫髪賈子新書十毫曰髪十髪曰釐詩庾信詩惟忠復惟孝齊江淹詩寢興何時平孔燾聖情想區外沈約安陸昭王碑文皇情眷眷手按鄭繼之善夫云若無慿猶漢高失蕭何若失左右意此説非也詩主汝陽不主明皇還依王洙作不挾貴為是盧注如漢吴王濞梁孝王皆以有所慿而致禍敗河間獻王東平王蒼皆以無所慿而得令名只若無慿三字可為千古藩王法矣置戴暠詩安平醖仙酒漢書楚元王敬禮申公穆生毎酒嘗為穆生設醴香釋名酒有汍齊浮蟻曹子建七啟浮蟻鼎沸酷烈馨陶潛詩毛色竒可憐㑹稽典録丁寛門無雜賔陶潛詩户庭無塵雜食前漢田横傳中使還報吴志朱然傳中使醫藥口之物相望於道晚節嬉遊簡平居孝義稱自多親棣蕚誰敢問山陵學業醇儒富辭一作才華哲匠能筆飛鸞聳立章罷鳳鶱一作鶱非騰精理通談笑忘形向友朋寸長一作腸堪繾綣一諾豈驕矜此詳􅄒生平善蹟皆夙徳所致也四晚節四句稱其孝友學業四句稱其文翰精理句稱其交誼也棣蕚承義山陵承孝鸞鳳言其書法初舉筆後成章談笑而有精理此得之於學問者寸長一諾能好善而無德色矣嬉張景陽詩晚節悲年促居曹植銅雀臺賦從明后而遊兮嵇康詩念我平時髙士傳漢姜岐少修孝義鄉曲歸仁友詩常棣之華蕚不韡韡明皇嘗造華蕚相輝之樓以愛諸王此言汝陽能善於兄弟也漢中王瑀即汝陽之弟薨光武詔無為山陵陂池裁令流水而已舊唐書寧王諡曰讓皇帝塟橋陵號惠陵璡上表懇辭朱注此所謂不敢問山陵也獵南齊杜栖傳學業清標後來之秀賈山傳所言涉書記不能為醇儒晨齊書盧詢有術學文辭華美龍殷仲文詩哲匠感蕭吴質答太子箋摛藻下筆鸞之文奮矣張懐瓘書録許圉師見太宗書曰鳳翥鸞廻實古今書聖王僧逹詩精理亦道心顔氏家訓韓蘭英甚有名篇又善談笑范莊子養志者忘形詩友朋集光輝沈約與述曾書微表寸長阮瑀左傳繾綣從公傅咸詩繾綣情所希邵注繾綣反覆固結之意史記季布傳曹丘生謂布曰得黄金百斤不若得季布一諾周魏國策公子意驕矜而有自功之色庾信齊憲王碑不自驕矜謙光下物已忝歸曹植何如黄作如他本作知對李膺招要平聲恩屢至崇重力難勝平聲披霧初歡夕高秋爽氣澄樽罍臨極浦鳬雁宿張燈花月窮遊宴炎天避鬱蒸硯寒金井水簷動玉壺冰此感王接遇之厚宻以曹植比汝陽自謙不如王粲輩故曰已忝又以杜自比見汝陽可方李膺故云何如初宴在秋故見鳬宿燈張後宴在夏故見井水壺冰中間花月之遊當屬春時所謂招要崇重也魏志曹植封陳王諡曰思俱詩無忝爾所生注云忝辱也稱後漢書杜宻與李膺坐黨錮而名行相次時人亦李杜焉謝瞻詩輟策共駢筵並坐相招要人晉書山濤傳禮秩崇重世説衛瓘見樂廣曰見此若披雲霧而覩青天北史李繪儀容端偉邢晏曰若披雲霧如對珠玉手何遜詩蕭索高秋暮世説王徽之為桓冲參軍以扳拄頰云西山朝來致有爽氣其周禮司尊彛再獻用兩象尊皆有罍注罍所以副貳尊也禮圖六彛為上受三斗六尊為中受五斗六罍為下受一斛囿楚辭望涔陽兮極浦西京雜記梁孝王好宫室苑之樂築園園有雁池池間有鶴洲鳬渚陸機詩飛鳴亂鳬雁漢書外戚傳張燈燭設幃帷陰鏗詩花月分窗進苔草共堦生宴何劭詩遊宴綢繆梁書建安王愛文學之士日與遊顔延之詩炎天方埃鬱子夜歌鬱蒸仲暑月鮑西征記太極殿前有金井照詩清如玉壺冰瓢飲惟三徑巖棲在百層陳作巖居異一塍謬一作且持蠡音離測海况挹酒如澠石靈切鴻寶寧全秘丹梯庶可凌杜臆作凌他本作陵淮王門有一作下客終不愧孫登末段自叙喜見知於王也酒瓢飲巖棲言身本隠逸蠡測海王德之深如澠王恩之渥非杜臆公自居淮王門客而云不愧於孫登葢嵇康所遇時公所與遊則賢王而當盛世也末乃賔主兼收各見品格勻此章四句起中後十二句者兩段八句者兩段章法稱逸士傳許由手捧水飲人遺一瓢飲訖掛木上風吹瀝瀝有聲由以為煩去之移嵇康高士傳蔣詡杜陵人詡為兖州王莽居宰衡詡疾歸杜陵荆棘塞門舍中三徑終身不出京嵇康書堯舜之君世許由之巖棲百層高山也西賦井幹疊而百層東方朔傳以管窺天以蠡測海注蠡瓠勺也韻㑹螺亦作蠡詩不可以挹酒漿左傳有酒如澠劉向傳淮南王有枕中鴻寶苑秘書神仙傳淮南王安作内書二十二篇又中篇八章言神仙黄白之事名為鴻寶萬畢三巻論變化之道凡十萬言此朱注謝靈運詩躧步陵丹梯注丹梯陛階也又詩即陵丹梯注謂山也二註不同邵注以丹梯為山上升仙之路當從前説皆神仙傳淮南王安好方術養士數千人有八公詣門鬚眉皓白王薄其老八公俄變為童子從晉隠逸傳孫登居汲郡北山好讀易撫一絃琴嵇康之遊三年問其所圖終不答將别乃曰子才多識寡難免於今之世矣康不能用果遭非命乃作幽憤詩曰昔慙栁下今愧孫登王嗣奭杜臆云用十蒸韻頗難此篇二十二韻收取殆盡須看其落韻之句陵字作凌可免重複凌超越也碎胡應麟曰杜排律五十百韻者極意鋪陳頗傷蕪葢大篇冗長不得不爾惟贈汝陽哥舒李白見素諸作格調精嚴體骨匀稱每讀一篇無論其人履歴咸若指掌且形神意氣踴躍毫楮如周昉寫生太史序傳逼奪化工而杜從容聲律間尤為難事真古今絶詣也又曰凡排律起句極宜冠冕雄渾不得作小家語唐人可法者盧照隣地道巴陵北天山弱水東駱賔王二廷歸望斷萬里客心愁杜審言六位乾坤動三微厯數遷沈佺期閶闔連雲起巖廊拂霧開𤣥宗鐘鼓嚴更曙山河野望通張説禮樂逢明主韜鈐用老臣李白獨坐清天下専征四海隅髙適雲紀軒皇代星髙太白年此類最為得體贈比音皮部蕭郎中十兄原注甫從姑之子員唐書比部屬刑部郎中外各一人載詩云漂蕩沈埋又云歸老任乾坤此必天寶六應詔退下後所作黄氏謂在未獻賦之前是也有美生人傑由來積德門漢朝音潮丞相去聲系梁日帝王孫藴藉為郎久魁梧秉哲尊詞華傾後輩風雅靄一作藹孤鶱一作鶱非世此從蕭公叙起品首句推本從姑三四稱其家五六記官職人七八記文章才望開詩冇美一人隋桓𤣥傳劉裕風骨不恒葢人傑也酒皇神告録曰開皇末有老翁詣唐高祖從容置語及時事曰公積德之門負至貴之表蕭唐書世系表蕭氏出自姬姓漢有丞相酇文終侯何氏定著二房一曰皇舅房一曰齊梁房齊梁房即梁武帝之後醖漢書薛廣德傳為人温雅有藴藉顔師古注藴言如釀藉有所薦藉又曰道其寛博厚重也音漢書馮唐白首為郎周勃傳魁梧奇偉前漢注梧忤後漢注梧音吾今從後音傳書經德秉哲王儉傳儉體道秉哲風宇淵贍蔡邕後輩被遣鍾嶸云文約意廣取效風雅本正韻注靄雲集貌他作藹字誤藹多也靄孤鶱如鳥之飛鶱雲際也朱注騫鶱音義各異騫去乾切馬腹熱鶱虛言切鳥飛貌宅相去聲榮姻戚兒童惠討論平聲見知真自幼謀拙愧一作醜諸昆次叙親誼交情乃上下闗紐蕭見知指蕭謀拙自謂諸昆謂氏兄弟者晉魏舒傳舒少孤為外家寗氏所養甯氏起宅相宅云當出貴甥舒曰當為外氏成此宅相後果為公趙曰蕭係杜家外甥故比之魏舒討潘岳閒居賦昆弟斑白兒童稚齒潘徽詩篇章極論任昉贈王僧孺詩唯子見知唯余知子與隋孫萬壽詩粤余非巧宦少小拙謀身洙曰公蕭為姑舅之昆仲漂蕩雲天濶沈埋日月奔致君時已晚懐古意空存中散山陽鍜丁亂切愚公野谷邨寧紆長丁丈切者轍歸老任乾坤末承謀拙意自嘆不過隠言漂泊沈淪無復遭際矣唯有學中散愚公玩世身而已從此歸老舊鄉不煩蕭之枉駕也莊此章前後各八句中間四句運古詩溧蕩水無根子黄帝得之以游雲天謝靈詩豈若登雲天奔吴越春秋伍尚曰其遂沈埋亦吾所喜唐黄庭經高日月吾上道應璩與弟書思致君於虞傳傅亮修張良廟教抒懐古之情存不刋之烈而嵇康康與魏宗室婚拜中散大夫居山陽性絶巧善鍜宅中有一栁樹甚茂每夏月居其下以鍜朱注急就篇注凡金鐡之屬椎打而成器者謂之鍜説苑齊桓公逐鹿入谷中見一老公問為何谷對曰為愚公之谷以臣名之臣故畜牸牛生子大賣之而買馬少年曰牛不能生馬遂持駒去隣人以臣為愚故名愚公谷水經注時水又北逕杜山北有愚公谷陶淵明曰王公紆轍注紆轍猶言枉駕坤漢書邴漢以清行徵為京兆尹遂歸老於鄉里乾本易卦名孔子易傳以此為天地之稱奉寄河南韋尹丈人原注甫故廬在偃師承韋公頻有訪問故有下句鶴注舊唐書韋濟傳天寶七載為河南尹遷尚書左丞唐地理志河南府偃師注云天寶七載尹韋濟以北坡道迂自縣東山下開新道通孝義橋則詩當作於是年詩云章甫尚西東又云江湖溧短褐周流道術空可知是時公又去京師而他矣意在近畿故云奉寄是年韋方拜丞相公又有兩詩贈之謂之贈則歸京師後投贈也有客傳河尹逢人問孔融青囊仍隠逸章甫尚西東鼎食分一作為門户詞場繼國風尊榮瞻地絶疎放憶途窮首段賔主並叙融上四述存問之語下四感垂注之情李膺比韋孔自喻隠逸西東傷公之困窮􅕙倒鼎食稱韋家世詞場稱韋文翰尊榮屬韋瞻者在公疎放屬公憶者在韋也重遊何氏詩先提將軍有報書而接以倒衣二句即報書語也此提逄人問孔融而接以青囊二句即所問意也詩有客有客後漢孔融傳河南尹李膺不妄接士融年十歲造門與交洞晉書郭璞傳璞嘗受業於鄭公得青囊書九巻遂開五行抱朴子褒隠逸之士北記儒行孔子居宋冠章甫之冠檀弓丘也東西南之人也家語子路仕衛列鼎而食兩夏侯湛抵疑承門户之業受過庭之訓韋氏有大小逍遙房故云分門户舊唐書濟以詞翰聞製宣德詩四章辭致高雅杜審言詩巖谷卧詞場毛詩也鍾嶸詩品子建詩原出國風卓爾不羣國風尊榮二字出孟子賦任昉齊景陵行狀地尊禮絶親賢莫貳向秀思舊序嵇志逺而疎吕心曠而放阮籍詩途窮能無慟濁酒尋陶令丹砂訪葛洪江湖漂短一作裋褐霜雪滿飛蓬牢落乾坤大周流一作旋道術空謬慙知薊子真怯笑揚雄此自叙途窮以答所問之意西濁酒二句言隠逸之狀江湖二句言東之迹牢落周流對章甫言不敢以孔子自方也慚薊怯雄對青囊言不欲居郭璞而以子雲自命也知指韋丈笑指他人湖陶潛詩濁酒且自陶喻葛洪丹砂見前見陶潛詩江多貧賤朱注霜雪頭白也張正詩􅁂似雪飄蓬詩自伯之東首如飛蓬云司馬相如上林賦牢落陸離郭璞曰羣奔走也李善猶遼落也曹植詩牢落㝠㝠方説苑孔子周流應聘之莊子人相㤀乎道術下後漢術傳薊子訓有神異道既到京師公卿以候之者坐上常數百人徒揚雄傳雄草太𤣥或嘲雄以𤣥尚白雄作解嘲曰子笑我𤣥之尚白我亦笑子之病甚不遭㬰跗扁鵲後盧注公秋述云揚子雲草𤣥寂寞多為輩所䙝意正相同盤錯神明懼謳歌徳義豐尸鄉餘土室誰話正異作誰話一作難説祝一作咒一作喌雞翁末稱頌河尹仍歸結見問之意舊盤錯言才甚經世謳歌言化能及人尸鄉係公居誰話雞翁唯韋獨見問耳此杜臆杜公贈人諸詩大概前半頌所贈後截乃自陳獨參錯轉接承頂呼應脉理極細此章前二段各八句後段四句收利後漢虞詡傳詡為朝歌長曰不遇盤根錯節何以别器治政咸稱神明神明懼猶言鬼神畏其精鋭奉陸雲贈汲郡太守詩之子于行民固謳歌左傳敬徳義淮南子徳義足以懐天下之民盤朱注唐書稱濟文雅能修飾政事所至以治稱之詩錯二語乃是實録詩正義河南偃師縣西二十里有尸鄉亭水經注陽渠水又東流經漢廣野君酈食其廟南廟在北山上成公綏所謂偃師西山即陸士衡㑹王輔嗣處也此山即祝雞翁之故居室後漢袁閎傳閎四周築土於庭以為房室王續詩土映山斜鶴注土室謂依土山以為室如宿贊公土室詩云土室延白光松門耿疎影是也諸杜廬與墓多在河南偃師故慿孟倉曹覔土婁舊莊詩平居䘮亂後不到洛陽岑則䘮亂之前公屢到矣自開元二十九年酹逺祖於洛之首陽及天寶元年為姑萬年縣君制服作銘三年為皇甫妃范陽太君盧氏作誌皆在河南也所以公殁又歸祔於偃師年列仙傳祝雞翁者洛陽人也居尸鄉北山下養雞百餘雞至千頭皆有名字欲取呼則種别而至賣雞及子得千餘萬輒置錢去之説文解字喌喌二口為讙州其聲也讀若祝祝者誘致禽畜和順之意喌與朱音相似耳贈韋左丞丈濟鶴注此詩當是天寶七載冬作左轄頻虛位今年得舊儒相去聲門韋氏在經術漢臣一作官須時議歸前烈一作列古列與烈同天倫恨莫俱鴒原荒宿草鳳沼接亨衢首從左丞之職叙出韋公門第宿舊儒指韋濟相門前烈指其祖父天倫草記其兄亡鳳沼謂拜左丞朝趙曰魏晉以來左丞得彈奏八座故傅咸云斯乃皇之司直天臺之管轄唐六典左右丞掌管轄省事紏察憲章唐書天寶中濟遷尚書左丞三代並為省轄衣冠榮之盧照隣詩左轄去南臺任昉表臺階虚位傳後漢樊凖疏公卿各舉明經及舊儒子孫孟嘗君相門必有相漢書韋賢兼通禮尚書以詩教授號稱鄒魯大儒七十餘為相少子𤣥成復以明經歴位至丞相鄒魯諺曰遺子黄金滿籯不如一經立舊唐書韋思謙武后時同鸞臺鳳閣三品子承慶嗣長壽中嗣立代承慶為鳳閣舍人長安三年承慶代嗣立為天官侍郎頃之又代知政事及承慶卒嗣嗣立又代為黄門侍郎前後四職相代又父子三人皆至至宰相有唐以來莫與為比賦史記滑稽傳褚先生曰臣幸得以經術為郎幽通懿前烈之純淑舊書濟製先德詩四章詞致高雅詩榖梁傳兄弟天倫也何休注兄先弟後天之倫次脊令在原兄弟急難箋雝渠水鳥今在原失其常處則飛鳴求其類年記朋友之墓有宿草而不哭焉注宿草陳根也謂期陶潛悲從弟詩流塵集虛位宿草旅前庭郎舊書嗣立三子孚恒濟皆知名孚累遷至左司員外恒開元初為碣山令宇文融宻薦恒有經濟才擢拜殿中侍御史為隴右道河西黜陟使出為陳留太守未行而卒朱注濟遷左丞時其兄恒必已先歿故有恨莫俱荒宿草之句我晉中興書荀朂從中書監遷尚書令有賀之者曰奪鳳凰池諸君何賀耶謝莊讓中書表璧門天䆳鳳沼神深典易何天之衢亨靈光殿賦何天衢以元亨朱注通光宅元年中書省改曰鳳閣濟父祖皆官鳳閣故以接亨衢期之千家本有公自注濟之兄恒亦為給事中此出黄鶴補注他本無之其實誤也有客雖安命衰容豈壯夫家人憂几杖甲子混泥塗不謂矜餘力還來謁大巫歲寒仍顧遇日暮且踟蹰此言窮老而受知於韋憂應詔退囘命之窮也衰容漸改老將至矣几杖承衰困泥塗承命今猶乗餘力而求謁者以韋有接遇之情也因此遂起躊蹰盼望之意矣詩有客戾止莊子云知不可奈何而安之若命鮑照園葵賦盪然任心樂道安命謝朓詩開鏡眄衰容揚子雲曰雕蟲之技壯夫不為臣月令仲秋之月養衰老授几杖十左傳絳縣老人曰生之歲正月甲子朔四百有四五甲子矣趙孟謝曰使吾子辱在泥塗久矣武之罪也卦名配支干梁武帝詩不謂當過時家人甲子以隋藝文傳筆有餘力詞無竭源少吴志注張紘見陳琳武庫賦歎美之琳答曰河北率文章易為雄伯今足下在彼所謂小巫見大巫神氣盡矣徐陵詩漳川仰大巫答歲寒日暮寓言窮老亦時值歲暮而云然耳髙允宗欽詩雖曰不敏請事金蘭爾其勵之無忘歲寒曹王父偃傳日暮途逺故倒行逆施之詩搔首踟蹰植詩攬㘘正踟蹰老驥思千里饑鷹待一呼君能微感激亦足慰榛蕪一云折骨效區區已末有望於韋之汲引也蹰老驥况已之衰饑鷹况之窮曰思曰待承上踟言韋能感動激發則已不淪於荆榛蕪草矣伏此章前二段各八句末段四句收魏武樂府老驥櫪志在千里烈士暮年壯心未已則魏志陳登謂吕布曰曹公言待將軍譬如養鷹然饑為用飽則颺去孫楚鷹賦饑則易呼聞張儀傳蘇秦使人微感張儀趙岐孟子章指千載之猶有感激傅亮表伊洛榛蕪津塗久廢奉贈杜臆作呈韋左丞丈二十二韻按黄鶴注公以天寶六載應詔赴轂下為李林甫見阻由是退下詩云主上頃見徵青㝠却垂翅當是七載所作篇内皆係陳情語當在贈韋左丞丈詩後末云况懐辭大臣明年果又有東都之遊矣杜臆前詩有頌韋丞語此篇全屬陳情題曰贈似誤恐當作呈紈袴不餓死儒冠多誤身丈人試靜聽賤子請具陳首用議論總提書杜臆儒冠誤身乃通篇之主紈袴句特伴語耳漢班伯在綺襦紈袴之間非其所好也注綺細綾紈素也並貴戚子弟服沛漢書鄧通相當餓死酈食其傳諸客冠儒冠來者公輒解其冠溺之吴越春秋伍子胥謂漁父曰性命屬天今屬丈人又王弼易注丈人嚴莊之稱鮑照書静聽無聞鮑照樂府主人且勿喧賤子歌一言陳蔡琰胡笳去住兩情兮難具甫昔少去聲一作妙年日早充觀國賔讀書破萬巻下去聲筆如有神賦料義從平聲讀用去聲揚雄敵詩看平聲摭言作將子建親李邕求識靣王翰願為陳作為一作卜隣自謂頗挺出一作生立登要路津致君堯舜上再使風俗摭言作化淳此叙少年自負申言儒冠之事今甫昔八句言學優才敏足以馳騁古自謂四句欲正君善俗不但文辭見長也此乃備陳學問本領言大而非夸杜臆公以韋丞為知己故通篇作衷語如讀書破萬巻等句大胆説出絶無謙遜也忤沈約詩生平少年日鶴注壯遊詩云中歲貢舊鄉下考功第開元二十四年改用禮部侍郎主考公預舉在二十四年之前故主試屬考功郎其時年方二十餘歲宜自謂少年也而易觀國之光利用賔於王絶胸羅萬巻故左右逢源下筆有神書破猶韋編三之意葢熟讀則巻易磨也張逺謂識破萬巻之理另是一解今梁元帝紀兵敗焚圖書十四萬巻曰讀書萬巻猶有日北史李永和曰丈夫擁書萬巻何假南靣百城與魏文帝典論傅武仲下筆不能自休孔文舉表性道合思若有神雄漢揚雄嘗作甘泉等賦魏曹子建七步成詩公謂揚之賦與已敵體子建之詩於己相近也唐書本傳甫少貧不自振客齊趙間李邕竒其才先往見之考字書物料之料從去聲料度之料從平聲左傳臣料虞君日北齊書神武自太原來朝見宋游道曰嘗聞其名今始識其靣趙曰公哀李邕詩伊昔臨淄亭酒酣託末契重叙東都别朝陰改軒砌追言洛陽相見事豈非公與邕先識靣於洛陽乎新史葢誤以再見為始識面矣説唐書文苑傳王翰字子羽并州晉陽人及進士第張輔政召為秘書正字終道州司馬左傳二三子先卜隣矣陶潛詩思與爾為隣注朱注邕翰皆公同時前輩識面卜隣乃當時實事舊引杜華母使華與王翰卜隣出偽書杜撰英劉峻辯命論孔墨之挺生蜀志吕凱傳諸葛丞相才挺出古詩何不策高足先據要路津斯應璩與弟書伊尹輟耕郅惲牧羊思致君於唐虞濟民於塗炭孟子伊尹使是君為堯舜之君歎詩序美教化移風俗返何氏語林阮孝緒明賔山曰足使還淳朴此意竟蕭條摭言作索行歌非隠淪騎驢十三載上聲諸本作三十載盧注作十三載載作年旅食京華春朝扣富兒門暮隨肥馬塵殘杯與冷炙到處潛悲辛主上頃見徵歘許勿切然欲求伸青㝠却垂翅蹭蹬無縱鱗此慨歴年不遇申明誤身之故後蕭條八句前因貢舉不第見徵四句以應詔退下抱黄生曰騎驢六句極言困厄之狀畧不自諱隠然見負如彼而阨窮乃如此俗眼無一知己矣李陵書但聞悲風蕭條之聲人列子林類年且百歲拾穗行歌桓譚新論天下神五一曰神仙二曰隠淪嵇康詩尋山洽隠淪朱注言以窮困行歌非隠淪肥遯之流也漢靈帝時執政皆騎驢後漢獨行傳向相或騎驢入市乞丐於人應公兩至長安初自開元二十三年赴京兆之貢後以詔到京在天寶六載為十三載也他本作三十載斷誤許儀禮尊士旅食於門鄭注作衆食解魏鍾繇表旅食下作旅寓之食解矣魏文帝與吴質書旅食南館兒郭璞詩京華游俠窟曰鮑照詩結友多貴門出入富隣世説司馬徳操坐則華屋行則肥馬之况爾曹乎顔氏家訓殘杯冷炙之辱戴安道猶遭潛悲辛含悲不忍言也鮑照野鶴賦對鐘鼔而悲辛書年譜天寶六載詔天下有一藝詣轂下李林甫命尚省皆下之公應詔退下淮南子主上出令以漢雜事宣帝時蔣蒲與子方召見徵㝠易尺蠖之屈求伸也楚辭據青㝠而攄虹注青雲也後漢馮異傳始雖垂翅囘谿終能奮翼澠池王通東征賦道之不行兮垂翅東歸海賦蹭蹬窮波王褒聖主得賢臣頌沛乎若巨魚之縱大壑甚愧丈人厚甚知丈人真每於百僚上猥誦佳句新竊效貢公喜難甘原憲貧焉於䖍切能心怏怏秪是走踆踆今欲東入海摭言作洛即將西去秦尚憐終南山囘首一作望清渭濵常擬報一飯一作餐况懐辭大臣白鷗没一作波浩蕩萬里誰能馴末段感懐韋丈而致臨别繾綣之情甚愧四句藉韋公為知已竊效四句不得志而思去矣今欲四句欲去而不忍徑去常擬四句欲留而不能復留也正詩到尾梢他人㡬於力竭公獨滔滔滚滚意思不窮所謂篇終接混茫也然須玩其轉折層次不可増減非汗漫敷陳者比趙此章首段四句中二段各十二句末段十六句收曰厚言其相待之厚如世説范逵深愧其厚意真言其懐抱之真如莊子云其為人也真書百僚師師史記相國位諸侯王百僚之上前漢朱雲傳嘉猥稱雲後漢孔融傳猥惠書教曹植責躬表猥垂齒召注猥曲也又解作遝范滂傳所劾猥多此詩言頻誦佳句也云世説孫興公作天台賦成以示范榮期每至佳句輒應是我輩語前漢王吉傳吉字子陽與貢禹為友書稱王陽在位貢公彈冠言其取舍同也劉孝標廣絶交論王陽登則貢公喜仲尼弟子傳原憲攝敝衣冠見子貢子貢恥之曰夫子豈病乎憲曰吾聞之無財者謂之貧學道而不能行謂之病若憲貧也非病也子貢慙而去平吴越春秋公子光心氣怏怏常有愧恨之色怏怏不貌西京賦大雀踆踆注踆踆行走貌口莊子石戸之農擕子入於海終身不返易林東入海裴讓之詩申胥欲去秦李斯上始皇書天下之士退而不西向裹足不入秦南詩終南何有元和郡縣志終南山在京兆府萬年縣五十里渭水在萬年縣北五十里償西征賦北有清渭濁涇一史記范雎傳一飯之恩必後漢李固傳竊感古人飯之報注謂靈輒也望杜臆白鷗承入海來用海客事屬在自已説以東海秦川則相去萬里矣鮑照詩翻波揚白鷗取趙曰浩蕩或取流放之貌如離騷怨靈修之浩蕩或曠逺之貌如楚辭志浩蕩而傷懐東坡志林子美白鷗沒浩蕩言滅沒於烟波間耳宋敏求謂鷗不解沒改作波字便覺神氣索然今按易林鳬遊江海沒行千里此沒字所本詠阮籍詩雙翮凌長風須㬰萬里逝顔延之五君龍性誰能馴馴馴服也范元實詩眼曰山谷謂文章必謹布置每見後學多告以原道命意曲折後予以此㮣考古人法度如子美贈韋左丞詩云紈袴不餓死儒冠多誤身此一篇立意也故使人静聽而具陳之耳自甫昔少年日至再使風俗淳皆言儒冠事業也自此意竟蕭條至蹭蹬無縱鱗言誤身如此也則意舉而文已備矣然必言其所以見韋者於是有厚愧真知之語而所以真知者謂傳誦其詩也然宰相職在薦賢不當徒愛人而已故曰竊效貢公喜難甘原憲貧果不能薦賢則去之可也故將東入海而西去秦然其去也必有遲遲不忍之意故曰尚憐終南山囘首清渭濵然所知不可以不别故曰常擬報一飯况懐辭大臣夫如是可以相忘於江湖之外雖韋亦不得而見矣故以白鷗沒浩蕩萬里誰能馴終焉此詩前賢録為壓巻其布置最得正體如官府甲第㕔堂房舍各有定處不可亂也韓文公原道與書之堯典葢如此其他皆謂之變體可也又曰詩有一篇命意有句中命意如此詩前後布置是一篇命意也至其道不忍决去之意則曰尚憐終南山囘首清渭濵其道欲與韋别之意則曰常擬報一飯况懐辭大臣此句中命意也葢如此然後可謂頓挫高雅矣之董養性曰篇中皆陳情告訴之語而無千望請謁私詞氣磊落傲睨宇宙可見公雖困躓之中英鋒俊彩未嘗少挫也體王嗣奭曰此篇本古詩而頗帶排句以呈左丞故近莊雅耳通首直抒隠衷如寫尺牘而縱横轉折感憤悲壯之氣溢於行間繾綣躊蹰曲盡其妙東臯雜録或問荆公杜詩何故妙絶古今公曰老杜固嘗言之讀書破萬巻下筆如有神嚴羽曰五言始於李陵以興在漢故云古詩騷茅一相曰獨孤及云五言之源生於國風廣於離著於蘇李盛於曹劉當漢魏之間雖已樸散為器作者猶質有餘而文不足以今揆昔則有朱絃疏越大羮遺味之嘆意徐用吾曰五言古詩或引興起或賦比起須要用深逺託詞温厚反覆優游雍容不迫或感古懐今或懐人傷已或瀟灑閒適寫景要雅淡推人心之至情摹感慨之微意悲歡含蓄而不傷美刺婉曲而不露要有三百篇遺意歎范梈曰五言長篇法有四要曰分段過脉囘照讚先分為㡬段㡬節每節句數多少要畧均齊首段是叙子一篇之意皆含在其中結段要照應起段且選詩分段節數要均三句則皆三句四句六句八句則皆不參差惟工部夔州後詩間有錯綜然亦不太長太短也次要過句名為血脉此處用兩句一結上一生下也囘照謂十步一囘頭以照題目又五步作一消息語以讚歎之方不甚迫促長篇怕雜亂一意為一段以上四法備於北征詩舉一隅之道也胡應麟曰四言簡質句短而調未舒七言浮靡文繁而聲易雜折繁簡之衷居文質之要葢莫尚於五言故兩漢以還文人藝士平生精力咸萃斯道於又曰統論五言之變則質漓於魏體排於晉調流宋格䘮於齊又曰兩漢之詩所以冠古絶今率以得之無意不唯里巷歌謡匠心信口即枚李張蔡未嘗鍜鍊求合而神氣工巧備出天造支又曰古詩浩繁作者至衆雖風格體裁人以代異流原委譜系具存炎劉之製逺紹國風曹魏之聲近沿枚李陳思而下諸體畢備門户漸開阮籍左思尚存其質陸機潘岳首播其華靈運之詞淵源潘陸明遠之步馳驟太冲有唐一代拾遺草創實阮前踪太白綜横亦鮑近矱少陵才具無施不可而憲章漢魏祖述六朝所謂風雅之大宗藝林之正朔也厚又曰古詩軌轍殊多大要不過二格有以和平渾悲愴婉麗為宗者即前所列諸家有以高閒曠逸清逺𤣥妙為宗者六朝則陶唐則王孟常儲韋栁但其格本一偏體靡兼備宜短章不宜鉅什宜古選不宜歌行宜五言律不宜七言律歴考前人遺集靡不然者中唯右丞才高時能旁及至於本調反劣諸子餘雖深造自得然皆株守一隅才之所趨力故難强又曰備諸體於建安者陳王也集大成於開元者工部也青蓮才之逸並駕陳王氣之雄齊驅工部可謂撮勝二家第古風既乏温淳律體微􅆾整栗故令評者不無軒輊王世貞曰盧駱王楊號稱四傑詞㫖華靡固沿陳隋之遺而骨氣翩翩意象老境則超然勝之陳正字陶洗六朝鉛華都盡寄託大阮微加斷裁而天韻不及李杜光􅆋千古人人知之滄浪並極推尊而不能致辯元微之獨重子美宋人以為談柄楊用修為李左袒輕俊之士往往耳傳大約五言選體太白以氣為主以自然為宗以俊逸高暢為貴子美以意為主以獨造為宗以竒拔沈雄為貴然太白多露語率語子美多穉語累語置之陶謝間便覺不倫乃欲使之奪曹氏父子耶杜詩詳註巻一
