body:
  text: 杜詩詳註巻六翰林院編修仇兆鰲撰宣政殿退朝音潮晚岀左掖唐㑹要宣政殿在含元殿後即正衙殿也唐六典在宣政門内殿東有東上閤門殿西有西上省閤門東上閤門門下省在焉西上閤門中書在焉公時為左拾遺屬門下故出左掖漢書注掖門在兩旁若人之臂掖天門日射音石黄金牓春殿晴曛一作薫赤羽旗宫草霏霏一作微微承委珮鑪煙細細駐游絲雲近蓬萊常五一作好色雪殘鳷鵲亦多時侍臣緩步歸青瑣退食從倉紅切容出每遲上四詠宣政殿景之自外而内者下四退出掖時之自早而晚也日光射牓在殿外晴氣薫旗在殿前草承委珮在殿下烟駐游絲在殿中雲氣雪殘此又遙瞻殿上者亦見在朝之久歸青瑣退朝回院也出每遲出掖還邸也佩顧注日射牓則金益黄晴曛旗則羽更赤身俯則下委故草相承無風則烟不動故如絲駐方盧注天門天子之門楚辭廣開兮天門天神異經西有宫白石為牆門以金牓而銀鏤題曰地少女之宫梁元帝詩金牓燭神光邵注牓門扁也由隋煬帝江南曲春殿晚仙艷奉杯盤家語子路曰願得白羽若月赤羽若日陸機詩羽旗棲瓊鑾舊注旗畫赤羽鳥所謂朱雀也西京賦芳草甘木楚辭芳霏霏兮滿堂鳯記主佩倚則臣佩垂主佩垂則臣佩委細蕭放詩金起爐烟晉羊球登西樓賦畫棟浮細之輕雲改沈約詩游絲映空轉為唐㑹要貞觀間營永安宫後為蓬萊宫咸亨初改含元殿又改為大明宫解董仲舒傳雲五色而為慶注杜詩用殘字多作餘字上林賦過鳷鵲望露寒皆觀名在雲陽甘泉宫外青曹植詩侍臣省文奏退列子縞衣乗軒緩步濶視瑣謂省門詩自公食天台賦任緩步之從容補注此詩後半失粘紫宸殿退朝音潮口號平聲殿唐六典紫宸殿即内朝正也雍録含元之北為宣政宣政之北為紫宸杜楊慎曰唐之朝制宣政前殿也謂之衙衙有仗詩所謂春旗簇仗齊是也紫宸便殿也謂之閣朔望不御前殿而御紫宸謂之入閣杜詩所謂還家初散紫宸朝是也歐陽公去唐不逺入閣之制已未明問於劉貢父而後知之然其大畧不過如此户外昭容紫袖垂雙瞻御座引朝音潮儀香飄合殿春風轉花覆千官淑景與影同移晝漏稀舊作聲于家本定作稀聞高閣黄作閤報天顔有喜近臣知宫中每出歸東省㑹送䕫龍集一作到鳳池張綖注此内殿也故所詠皆宫中之景上六詠紫宸末二言退朝顧注袖垂為傴僂雙瞻為分行瞻御座為内向引朝儀為却行此寫昭容導駕之制甚詳吴論香随風轉言殿宇之寛花下影移言奏對之久退禁庭深邃故晝漏罕聞待高閣之報單復謂晝漏在朝後者非是諫官侍班故天顔有喜而近臣先知張性謂拾遺不見天顔者非是令雍録政事堂在東省屬門下至中宗時裴炎以中書執政事筆故徙政事堂於中書省則堂在右省也公為拾遺時政事堂已在中書其自宫中退朝而歸東省者以本省言也㑹送夔龍於鳯池者又自東省而集於西省就政事堂見宰相也綖注夔龍舜二臣名龍在納言實中書之始晉人以中書比天上鳳凰故唐人遂用鳳池稱中書省莊子户外之屨滿矣唐制昭容正二品係九嬪酉陽雜俎今閤門有宫人垂帛引百僚或云自則天或言因後魏據開元禮疏曰晉康獻褚后臨朝不坐則宫人傳百僚拜周隋相沿國家因之不改擅唐㑹要天祐二年只令小黄門祗候引從宫人不得出内葢昭宗時始罷也朝漢書馮婕妤曰妾恐熊至御座孫周禮地官司士正儀之位辯其貴賤之等史記叔通起朝儀荀庾肩吾詩合殿生光彩百蕭子雲詩春風蕩羅帳子古者天子千官諸侯官謝朓賦嗟斯靈之淑景長顧注古刻漏晝有朝禺中晡夕夜有甲乙丙丁戊安志含元殿東南有翔鸞閤西南有棲鳯閣黄生注高閣在禁中宫女司漏逓相傳報秋興賦高閣連雲采葛婦歌羣臣拜舞天顔舒記今日安世子乃有喜色臣唐制諫官隨宰相而入得近御前公為拾遺故稱近國語近臣盡規國策宫中虛無人鷺上官儀表接武夔龍簉羽鵷范彦龍詩遙望鳳凰池王嗣奭曰宣政殿在含元殿北乃前殿也紫宸殿為日御古之燕朝也故二詩所詠氣象大小莊媟稍異黄生曰此詩首尾並具典故疑借此二事託諷也宫人引駕雖屬舊制然大廷臨御萬國觀瞻豈容此軰接迹而時主因循不改於朝儀為已褻矣至如宰相雖尊實與羣臣比肩而事主退朝㑹送此何禮乎此詩所以志諷人但取其濃麗工整不知具文見意春秋之法在焉徒云詩史淺之乎窺公矣春宿左省鶴注公為左拾遺屬門下省在東故曰左省亦曰左掖花隠掖垣暮啾啾棲鳥過平聲星臨萬户動月傍去聲九霄多不寢英華作寐聽平聲金鑰英華作鏁因風想玉珂明朝有封事數音朔問夜如何上四宿省之景下四宿省之情宿花隠鳥棲日已暮矣星臨月近夜而矣聽鑰想珂宿而起矣問夜未央起而待旦矣自暮至夜自夜至朝叙述詳明而忠勤為國之意即在其中杜臆有風則鈴鐸皆鳴故因而想及玉珂在省中不得聞珂聲也劉楨詩隔此西掖垣掖垣禁牆也古樂府鳳凰鳴啾啾後何遜詩日夕棲鳥喧之生注春星帶草堂在月落之星臨萬户動在月出前漢書武帝起建章宫有千門萬户汸庾闡詩翔虬凌九霄以九霄對萬户指九重之地言注比廊廟之上生注本言不寐用寢字方響張黄庭經玉匙金鑰常堅完本楊方詩因風吐徽音華詩乗馬鳴玉珂夢弼曰草珂貝類可為馬飾是也蔡又引舊書輿服志五品以上有珂繖凡車之制三品以上珂九子四品七子五品三子六品以下去㦥及珂師氏因以為導者所鳴之珂其説不同阮籍詩置此明朝事光武紀詔百僚俱上封事無有隠諱漢儀宻奏皂囊封版故曰封事唐書補闕拾遺掌供奉諷諫大事廷諍小則上封事晉傅𤣥傳每有奏劾竦踊不寐坐而待旦於是貴遊懾伏臺閣生風陰鏗詩愁人數問更詩夜如何其夜未央庭燎之光君子至止鸞聲鏘鏘此詩下半截全用其意趙汸曰唐人五言工在一字謂之句眼如此二詩三四動字多字五六濕字低字之類乃眼之在句底者何將軍山林詩卑枝低結子接葉暗巢鶯低與暗乃眼之在第三字者雨抛金鎖甲苔卧緑沈槍抛與卧乃眼之在第二字者剩水滄江破殘山碣石開緑垂風折笋紅綻雨肥梅皆一句中具二字眼剩破殘開垂折綻肥是也山谷云拾遺句中有眼篇篇有之推此可見楊仲𢎞曰詩要鍊字字者眼也如杜詩飛星過水白落月動沙虚鍊中間一字地坼江帆隠天清木葉聞鍊末後一字紅入桃花嫩青歸栁葉新鍊第二字非鍊歸入字則是學堂對耦矣又如暝色赴春愁無人覺來往非鍊覺赴字便是俗詩有何意味耶數胡應麟曰杜詩五律結句之妙者如明朝有封事問夜如何經過自愛惜取次莫論兵親朋滿天地兵甲少來書安危大臣在不必淚長流無由覩雄畧大樹日蕭蕭語皆矯健振勁絶非錚錚細響也晚出左掖公朝宁諸詩皆乾元元年春作後竝同晝刻傳呼淺春旗簇仗齊退朝音潮花底散歸院栁邊迷樓雪融城濕宫雲去殿低避人焚諫草騎馬欲雞棲首二朝班之景三四退朝歸院五六院中之景七八出院歸舍晝刻記日春旗記時中四皆言春景唐時殿廷多植花栁故初退朝班從花底而分散各歸院舍至栁邊而遮迷樓在城上故雪融而濕殿高逼雲故去殿若低及焚草而出時值雞棲見日已晚矣杜鍾惺云避人句是大臣之體數問句是諫臣之心臆杜詩妙在氣象此於退食時能寫出委蛇氣象分陸倕新漏刻銘衞宏載傳呼之節五經折疑曰春秋晝夜各五十刻洙曰漏刻銘注衞宏著漢儀使夜漏起宫衞傳呼以為備趙曰傳呼淺謂傳呼在晝不若夜之逺也庾信文楊栁共春旗一色在雍録宣政殿下有東西兩省别有中書門下外省又承天門外兩省官亦分左右各為廨舍杜詩曰散曰歸東西分班而出各歸其廨也溪文昌雜録唐殿庭多種花栁本朝唯樹槐楸劉須曰焚諫草不欲人知也避人而焚并掩其迹矣於晉羊祐傳嘉謀讜議皆焚其草故世莫聞詩雞棲塒日之夕矣故用雞栖以㸃晚出顧炎武引後漢朱震為州從事三府語曰車如雞栖馬如狗疾惡如風朱伯厚言車小也此説本於吴若陳輔之詩話明朝有封事數問夜如何此幸而得之坐以待旦之意避人焚諫草騎馬欲雞棲即所謂爾有嘉謀嘉猷則入告爾后于内爾乃順之于外曰斯謀斯猷惟我后之徳也黄生曰二詩皆于結語見身分若泛叙朝省雖工亦何益哉題省中壁掖垣竹埤音皮梧十尋洞門對霤舊作雪正異定作霤常陰陰落花遊絲白日靜鳴鳩乳燕青春深腐儒衰晚謬通籍退食遲廻違寸心衮職曾音層無一字補許身愧比雙南金上四省中之景下乃自述其懐白顧注垣覆梧桐門皆對霤宜其氣象陰森張綖注日静慨素餐也青春深惜時邁也二句景中有情故下接云謬通籍違寸心言公年四十六始拜拾遺時已晚矣乃遲回一官未盡責徒違素心耳職無補而身有愧乃題於院壁以自警曰蔡夢弼注掖乃省中左右掖垣埤皆牆也高曰垣低埤志舊注垣之竹埤之梧皆長十丈無此句法或引南越宋昌縣有棘竹長十丈於長安何涉顧注公送賈閣老詩西掖梧桐樹空留一院陰則知十尋止言梧非言竹矣澤州陳冢宰廷敬曰埤字解者各異今更有説埤與卑同此言竹卑梧高也晉語松柏不生埤荀子埤汚庸俗漢書劉向傳增埤為高五行志寒埤擁下子虚賦其埤濕則生藏莨蒹葭射雉賦如􅀈如軒不高不埤皆可互証張綖注竹埤謂掖垣之上以竹編為儲胥若城埤然朱注引王褒山家詩衆林積為籟圍竹茂成埤此是竹埤二字所本當從此説東方朔諫起上林苑疏謂其地有桑麻竹箭之饒則長安舊有竹矣玉杜定功曰對霤作對雪此傳寫之誤耳左思吴都賦堂對霤石室相距是詩有落花遊絲鳴鳩乳燕此時不宜有雪禮記注堂前有承霤説文霤屋水流也偽蘇注引山谷云唐省中青壁畫雪此不足信詩後漢董賢傳重殿洞門注洞門謂門門相當謝朓紫殿肅陰陰受梁簡文帝詩落花隨燕入游絲帶蝶驚拂楚辭青春謝白日照只夏小正季春之月鳴鳩其羽鮑照詩乳燕逐草蟲也史記高帝曰為天下安用腐儒注腐者敗壊無堪任漢書詔令從官給事宫中者得為大父母父母兄弟通籍應劭曰籍者為二尺竹牒記其年紀名字物色懸之宫門案省相應然後乃得入也孟康曰通籍謂禁門之中皆有名籍不禁出入寸後漢東海王傳光武遲囘者數歲謝朓詩孰為勞心詩衮職有闕唯仲山甫補之身范甯榖梁傳序一字之褒史記聶政曰老母在政未敢以許人唐汝詢曰君不能納諫臣無以效忠雖抱南金亦無所用張載擬四愁詩美人贈我緑綺琴何以報之雙南金生注本詩序衡以天下漸敝鬱鬱不得志思以道德報君而懼阻讒邪結語暗包序意韓非子荆南麗水中生金杜公夔州七律有間用拗體者王右仲謂皆失意遣懐之作今觀題壁一章亦用此體在將去諫院之前知王説良是王世懋云七律之有拗體即詩中之變風變雅也説正相合葉夢得石林詩話禪宗論雲間有三種語其一為隨波逐浪句謂隨物應機不主故常其二為截斷衆流句謂超出言外非情識所到其三為函葢乾坤句謂泯然皆契無間可伺其淺深以是為序予嘗戲為學子言老杜詩亦有此三種語但先後不同如波漂菰米沈雲黒露冷蓮房墜粉紅當為函葢乾坤句落花游絲白日静鳴鳩乳燕青春深當為隨波逐浪句百年地僻柴門逺五月江深草閣寒當為截斷衆流句若有解此當與同參送賈閣老出汝州據此詩賈出汝州在乾元元年之春考肅宗本紀九節度師潰刺史賈至奔於襄鄧在次年三月與此詩前後相合本傳以為出蒲州史氏誤書耳舊唐書舍人年深者謂之閣老更唐志汝州臨汝郡屬河南道本伊州貞觀八年名汝州今屬河南南陽府西掖梧桐樹空留一院陰艱難歸故里去住損春心宫殿青門隔雲山紫邏郎佐切深人生五馬貴莫受二毛侵上四賈出汝州下言别後交情此掖梧空留賈已出院矣艱難言中途跋涉去住謂彼蹤跡青門隔去者不見長安紫邏深住者不見汝州也憤張逺注人生得為刺史亦不賤矣莫以一麾出守感而生二毛此作慰詞杜初學記中書省在右因謂中書為右曹又稱西掖臆起語從召公甘棠脱來起得俊拔詩于彼梧桐賈楚辭懐恨兮艱難州淮南王篇還故鄉入故里黄曰至河南洛陽人汝與河南為隣故曰故里楚辭目極千里兮傷春心謂後漢順帝紀修飾宫殿山前漢書注霸城門民間所青門也蔡琰胡笳雲萬重兮歸路遐六九域志汝州梁縣有紫邏山騑潘子真詩話禮天子馬左右驂三公九卿駟馬右漢制九卿則中二千石亦右驂太守駟馬而已其有加秩中二千石乃右驂故以五馬為太守美稱漢官儀太守四馬行部加一馬故稱五馬宋人五色線集北齊栁元伯五子同時領郡時五馬參差於庭故時人呼太守為五馬見二毛注五巻黄生曰起語醇深雅健興體之妙無出其右三唐之絶唱也又曰起處用巻阿詩意而無其迹送翰林張司馬一云學士南海勒碑鶴注唐志翰林無司馬𤣥宗置翰林院延文章之士下至藝能伎術之流皆待詔於此今曰勒碑或是鐫工之精者姜氏曰新唐書吕向傳向進左補闕帝自為文勒石西嶽詔向為鐫勒使此雖權設亦以士人為之鶴謂或待詔鐫刻之流若是雜流公不須作詩推重矣唐書廣州南海郡屬嶺南道冠冕通南極文章落上台詔從三殿一云天上去碑到百蠻開野舘穠一作濃花發春㠶細雨來不知滄海使去聲英華作使諸本作上天遣幾時廻上四張赴南海下四送張之意上寫氣象巍峩下摹情景婉至冠冕指翰林文章指碑詞三殿去承上台百蠻開承南極詔是遣官之命開是勒文於石穠花細雨去時春景滄海使回來日程期順杜臆出使本有程限但滄海易阻風濤須俟天時之天遣二字非公不能下風俗通黄帝始製冠冕垂衣裳王融詩迹殊冠冕客文江賦竭南極窮東荒原注相國製文魏文帝云章經國之大業次晉天文志三台六星西近文昌二星曰上台為司命二星曰中台為司中東二星曰下台為司禄兩京新記大明宫有麟德殿在仙居殿西北此殿三面故故以三殿為名白樂天詩三殿角頭宵直入是也詩因時百蠻漢書陳湯傳威振百蠻武暢四海記南方曰蠻謝惠連詩飲餞野亭館詩何彼穠矣棠棣之華毛萇曰穠猶戎戎也清風細雨雜香來拾遺記魏文帝迎薛靈芸行者歌黄生注結語暗用張騫事既同姓又出使且往海上用事精切舊無注及者此詩前四説得莊重下半自須出之風秀先輩有譏野舘濃花發謂似題酒舘春㠶細雨來謂似贈賈客此後人自以俗見談詩未許妄評作者凉王嗣奭曰野舘穠花極堪玩賞春㠶細雨又覺凄長途情景在處有之妙在描寫深細曲江陪鄭八丈南史飲雀啄江頭黄栁花鵁音交鶄音精鸂音溪鶒音勅滿晴沙自知白髪非春事且盡芳樽戀物華近侍即今難浪跡此身那得更無家丈人才卞本作文力猶强健豈傍去聲青門學種𤓰首二叙景三四陪鄭五六自叙七八勉鄭對春事物華即指江頭花鳥白髪自憐清樽聊遣公葢境而興闌矣見官居近侍既難浮沈浪迹回念此身更無家計可資尸位不可去官不能進退兩難也鄭丈必冇歸隠之語故稱其才力猶强不當學邵平之種𤓰用杜臆此詩起最有力一氣轉下勢若連環若他人必為實聨矣志朱注那得更無家即笑為妻子累意時已冇去官之二句仍屬慨歎語顧注栁始生嫩蘂其色黄故曰黄栁未葉而先花故雀啄之中通鑑𤣥宗初年遣宦者詣江南取鵷鶄鸂鶒等置苑申涵光曰兩句三用鳥名頓挫有致詩陶潛詩白髪被兩鬚杜王勃詩春事一朝歸歐陽公青春固非老者事本晉先逸傳劉畢芳樽之友朝陽縉詩青門小苑物華新浪許善心詩夕拜參近侍恩濫𢎞奬戴逵栖林賦跡頴濱棲景箕岑示詩樂子之無家三王充論衡才力不相如陸雲書曜素自强健輔黄圖長安霸城門其色青故曰青門秦東陵侯邵平隠居於此種𤓰五色曲江二首張綖注二詩以仕不得志有感於暮春而作一片花飛減却春風鄭氏作花飄萬㸃正愁人且看平聲欲盡花經一作驚眼莫厭傷多酒入脣江上小堂川本作棠巢翡翠苑一作花正異定作苑邊高塚卧麒麟細推物理須行樂音洛何用一作事浮名一作榮絆此身首章有及時行樂之意上四曲江景事下四曲江感懐一片花飛至於萬㸃欲盡此觸目之堪愁者故思借酒以遣之且見堂空無主任飛鳥之棲巢塚廢不修致石麟之偃卧物理變遷如此尤須借花酒以行樂何必戀戀於浮名哉公殆將解職而有慨歟杜臆飛一片而春色減語竒而意深欲盡傷多一聨句法亦新竒傷何遜詩花飛落枕前楚辭羌愈思兮愁人傷多於酒也巢梁元帝詩燕姬戲小堂曲庾信詩翡翠本微物知愛髙堂苑指芙蓉苑在江西南漢書外戚傳丁姬塚髙張説詩鄴傍髙塚多貴臣石西京雜記五柞宫西青梧觀前有三梧桐樹足下有麒麟二枚云是始皇墓物庾信碑文刺史賈逵之碑既生金粟將軍衞青之墓方留石麟淮南子耳目之察不足以分物理楊惲書人生行樂耳須富貴何時遺謝靈運詩拙訥謝浮名杜臆名乃名位之名官居拾而不能盡職特浮名耳謂落句乃慨歎無聊語申氏似村學究聲口過矣朝音潮回日日典春衣每日江頭盡醉歸酒債尋常行處有人生七十古來稀穿花蛺蝶深深見音現一作舞㸃水蜻蜓欵欵一作緩緩飛傳語風光共流轉暫時相賞莫相違次章乃乗春翫物之意上四曲江酒興下四曲江春景稀典衣醉酒官貧而興豪酒債多有故至典衣七十者故須盡醉二句分應花蝶水蜓景物堪戀併欲暫借風光以助一時之翫賞葢風光和暢則可賞一遭陰雨則相違矣共字對花蝶等言益朝回典衣貧也典現在春衣貧甚矣且日日典衣貧甚矣北齊解斯豐樂歌日日飲酒醉債王融詩思涙㸃春衣孫詩醉言歸嗜孔融詩歸家酒多門客粲成行舊注權之叔濟酒不治産業嘗曰尋常行坐處欠人酒債欲質此緼袍償之考吴志初無此事韓非子布帛尋常庸人不釋鑠金百鎰盗跖不搏淮南子尋常之谿灌千頃之澤賈誼傳彼尋常之汙瀆兮皆與數目相對鶴注應劭曰八尺曰尋倍尋曰常故對七十然江南逄李龜年詩岐王宅裏尋常見崔九堂前幾度聞又未嘗拘以數對矣逺注人生百歲七十者稀本古諺語夫梁簡文詩花留蛺蝶粉竹翳蜻蜓珠新序獨不見青蛉乎六足四翼蜚翔乎天地之間顧注㸃水乃生子也子邵注深深摹其翩翻隠見欵欵狀其上下往來莊其息深深楚辭寧悃悃欵欵司馬遷云效其欵欵之愚後漢書欵段馬注欵緩也韻畧欵徐也史記庶人傳語王洙謂是傳語同舍郎言風光難得而易失欲其暫時相賞也此另一説陰鏗詩風光今旦動王洙引馮少憐春日詩傳語春光道先歸何處邊今無考費昶詩紅顔本暫時春花欲謝急須行樂而行樂須尋醉鄉但恐現在風光瞥眼易過故又作留春之詞此兩首中相承相應之意也即就演義作寄語於風光從無情中看出有情自見生趣葉夢得曰深深字若無穿字欵欵字若無㸃字亦無以見其精微然讀之渾然全似未嘗用力所以不碍氣格超勝使晚唐人為之便涉魚躍練川抛玉尺鶯穿絲栁織金梭矣王嗣奭曰初不滿此詩國方多事身為諫官豈人臣行樂之時然讀其沈醉聊自遣一語恍然悟此二詩葢憂憤而託之行樂者公雖授一官而志不得展直浮名耳何用以此絆身哉不如典衣沽酒日遊醉鄉以送此有限之年時已暮春至六月遂出為華州掾其詩云移官豈至尊知此時已有譖之者二詩乃憂讒畏譏之作也公祖必簡詩綰霧青條弱牽風紫蔓長此即水荇牽風二句所自出也又詩寄語洛城風日道明年春色倍還人此即傳語春光二句所自出也公嘗云詩是吾家事又云法自儒家有信乎祖孫繼起詩學乃其家學也曲江對酒苑外江頭坐不歸水精宫一作春殿轉霏微桃花細逐棃一作楊花落蔡云老杜墨跡初作欲共楊花語自以淡筆改三字黄鳥時一作仍兼白鳥飛縱飲久判普官切正作􅂸人共棄懶朝音潮真與世相違吏一作含情更覺滄洲逺老大徒傷一作徒悲一作悲傷未拂衣朱瀚曰前半曲江以江頭二字提起後半對酒以縱飲二字提起久坐不歸尋春玩物也遥望苑中則宫殿霏微流覽江上則花落鳥飛此皆坐時所見者日縱飲懶朝參見入世不能滄洲逺未拂衣又見出世不能公葢不得已而匏繫一官歟國漢書田叔傳魯王好獵相常暴坐苑外魏志大秦城中有五宫相去各五十里宫皆以水精為柱述異記闔閭構水精宫生注借言宫殿近水也霏微春光掩映之貌沈約詩霏微不能注桃花楊花開不同時當依梨花為是已桃對楊黄對白謂之自對體樂府讀曲歌桃花落盡蕭子顯詩洛陽梨花落如雪翯古詞楊花飄蕩落南家謂詩黄鳥于飛又白鳥翯方言楚人凢揮棄物之判俗作􅂸曰莊子與世違而心不屑與之俱是陸沈者也復黄生懶朝疑即漢之移病謝朓詩既歡懐禄情協滄洲趣下樂府長歌行老大徒傷悲横後漢楊彪傳曹操收彪獄孔融聞之往見操曰公殺無辜孔融魯國男子明日便當拂衣而去謝靈運詩拂衣五湖裏南史王僧䖍傳我立身有素豈能曲意此輩彼如見惡當拂衣去耳黄生曰前半即景後半述懐起云坐不歸已暗與後半為針線花落鳥飛宦途升沈之喻也又暗與五六為針線流丹鉛録梅聖俞南隴鳥過北隴叫高田水入低田黄山谷野水自添田水滿晴鳩却喚雨鳩來李若水近邨得雨逺邨同上圳波流下圳通其句法皆自杜來曲江對晉作值雨城上春雲覆苑牆江亭晚色靜年一作天芳林花著涉畧切雨燕支一作脂濕一作落水荇牽風翠帶長龍武新軍深一作經駐輦芙蓉别殿漫焚香何時詔一作重此金錢㑹暫一作爛醉佳人錦瑟傍上四曲江雨景下四對雨興感乃年芳晚靜雨際寂寥也林花水荇雨中所見者駐輦焚香乃雨中所思者末二因遊幸難逄而歎金錢勝㑹亦不可復見矣魏文忠詩别殿春雲上以江亭曲江之亭麗謝朓詩瑤池曖晚色斯年有四時春為芳沈約詩日屬止已年芳俱在吴均詩林花合復分燕古今注燕支葉似薊花似蒲公出西方土人以染名支中國謂之紅藍以染粉為面色梁簡文帝詩臙脂逐臉生赤詩注荇接余也根生水底莖如釵股上青下白葉紫圓徑寸餘浮在水面公祖審言詩綰霧青條弱牽風紫蔓長梁簡文帝詩翠帶留餘結王洙曰荇水草相連生故如翠帶新唐書龍武軍皆用功臣子弟制若宿衞兵雍録左右龍虎軍即太宗時飛騎衣五色袍乗六閑駁馬虎皮韉唐諱虎故曰龍武言其才質服飾有似龍虎也唐書兵志高宗龍朔二年置左右羽林軍𤣥宗改為左右龍武軍肅宗至徳二載置左右神武軍賜名天騎此即新軍也城漢書注駕人以行曰輦唐書地理志興慶宫在皇東南謂之南内築夾城入芙蓉園按芙蓉園與曲江相接駕常遊幸其中芙蓉曲江各有殿故曰别殿哀江頭詩宫殿鎖千門是也香顔延之曲水詩序離宫設衞别殿周徼皆顧注漫焚謂空焚香以待漢紀注諸賜黄金者與之金不言黄者一金與萬錢令顧注舊唐書開元元年九月宴王公百竂於承天門左右於樓下撒金錢許中書以上五品官及諸司三品以上官爭拾之賜劇談録開元中上已節賜宴臣僚㑹於曲江山亭恩教坊聲樂唯宰相三使北省官與翰林學士登焉樂舊注曲江賜宴時賜太常教坊樂故有佳人周禮器圖雅瑟二十三絃頌瑟二十五絃飾以寶玉者曰寶瑟繪文如錦曰錦瑟朱瀚曰上半寫雨景之荒凉長安新經喪亂也下半傷南内之寂寥向曾受知上皇也林花著雨見苑中車馬閴然水荇牽風見江上綵舟絶迹此所謂靜年芳也上皇用萬騎軍平韋氏改為龍武軍親近宿衞今曰深駐輦則不自臨閲矣又常從夾城達芙蓉園登興慶南樓置酒眺望今曰漫焚香則無復遊幸矣於掉尾拈一詔字露出思君本意含無限低徊傷感黄生曰公感𤣥宗知遇詩中每每見意五六指南内之事葢隠之也叙時事處不露痕迹憶上皇處不犯忌諱本詩人之忠厚法宣聖之微辭豈古今抽黄嫓白之士所敢望哉輔雨景則寂寥詩語偏濃麗俯視中晚以此王彦曰此詩題於院壁濕字為蝸蜒所蝕蘇長公黄山谷秦少游偕僧佛印因見缺字各拈一字補之蘇云潤黄云老秦云嫩佛印云落覔集騐之乃濕字也出於自然而四人遂分生老病苦之説詩言志信矣奉答岑參補闕見贈參初試大理評事攝監察御史趙汸注杜公為拾遺薦參識度清逺議論雅正時輩所仰宜充近侍當是薦後除補闕官也窈窕清禁闥一作闕罷朝音潮歸不同君隨丞相去聲後我往一作住日華東冉冉栁枝碧娟娟花蕊紅故人得佳句獨一作猶贈白頭翁岑詩有聨步分曹之語前四就其意而答之岑又有白髪落花之語後四反其意而答之古人答詩但和意而不和韻左朱注參為補闕屬中書居右署公為拾遺屬門下居署雍録唐六典宣政殿前有兩廡兩廡各有門其東曰日華日華之東則門下省也居殿廡之左故曰左省西廡有門曰月華月華之西即中書省也凡兩省官繫銜以左右者皆分屬焉罷朝歸不同言分東西班各歸本省也君隨丞相後宰相罷朝由月華門出而入中書凢西省官亦隨丞相出西也若左省官仍自東出故云我往日華東也也詩正義解窈窕云所居之宫形狀窈窕幽深而閒静班婕妤自悼賦應門閉兮禁闥扄謝朓詩新葉初冉冉似鮑照詩娟娟蛾眉寄左省杜拾遺附岑參詩聨步趨丹陛分曹限紫微曉隨天仗入暮惹御香歸白髪悲花落青雲羨鳥飛聖朝音潮無闕事自覺諫書稀上四叙同朝情事下則喜而兼諷也左岑為補闕屬中書省居右署杜為拾遺屬門下省居署故曰分曹限紫微語白髪自謂青雲指杜諫書稀少豈果朝無闕事乎諷得體記連步以上杜預表珥筆丹陛沈佺期詩分曹直禮闈紫晉書天文志紫微天帝之座初學記唐改中書省曰微省花木譜紫微花俗名怕痒唐省中植此取其花久也微當作薇廊唐書儀衞志朝㑹之仗有五皆帶刀捉仗列於東西下沈佺期詩九日陪天仗三秋幸禁林崔融詩天仗分旄節朝容間羽衣何遜詩晴軒連瑞氣同惹御香芬陶潛詩白髪被兩鬢詩江淹詩花落豈留英飛解嘲當途者升青雲誤陸機仰瞻凌霄鳥羨爾歸翼漢書師丹傳詿聖朝廢詩衮職有闕使漢書儒林傳王式為昌邑王師王式繫獄治事者責問曰師何以亡諫書奉贈王中允維此當是乾元元年作扈舊唐書天寶末維歴官給事中從不及為賊所得服藥取痢詐稱瘖病禄山素憐之遣人迎至洛陽拘於普施寺廹以偽署賊平䧟賊官六等定罪維以凝碧詩聞於行在肅宗特宥之責授太子中允中允聲名久如今契音挈濶深共傳收庾信不比得陳琳一病縁明主三年獨此心窮愁應平聲有作試誦白頭吟維負才名而身遭困苦故深惜之共傳二句辯陷賊之事一病二句原戴主之心皆申明契濶也維經患難必多悲憤之作故復索詩以見其苦情收維初繫洛陽而肅宗復用與庾信之奔竄江陵元帝用者相似維作凝碧詩能不忘故主與陳琳之為紹草檄後事魏武者不同一病指詐瘖事三年自天寶末至乾元初也杜臆此詩直是王維辯寃疏勤曹植詩追舉逐聲名博詩死生契濶毛傳解契濶為苦詩意本之韋宏嗣奕論勞神苦體契濶勤思正從古注以梁書侯景之亂簡文帝使庾信營於朱雀航景至信衆奔江陵元帝承制除信御史中丞祖魏志陳琳避難冀州袁紹使典文章袁氏敗琳歸太太祖謂曰卿昔為本初移書但可罪狀孤而已何乃上及父祖耶琳謝罪太祖愛其才不之責史記虞卿非窮愁不能著書西京雜記相如將聘茂陵女子為妾文君作白頭吟以自絶相如乃止卓文君白頭吟凄凄自凄凄嫁女不須啼願得一心人白頭不相離借按文君願一心不二故此喻維黄生曰三四用古人影掠故叙事無痕凡詩寫景易而叙事難叙事直致而拖沓縁無少陵萬巻書如神筆耳送許八拾遺歸江寧覲省甫昔時嘗客遊此縣於許生處乞瓦棺寺維摩圖様志諸篇末此當是乾元元年春作此唐書昇州江寧郡屬江南東道公開元未嘗遊夢弼曰瓦棺寺即薦福寺朱注瓦官寺碑文寺本晉武帝時建以陶官故地在秦淮北故名瓦官訛作棺耳六朝事跡載有僧好誦法華經塟以瓦棺青蓮生其舌根因名則好異者之説也詔許當作有詔辭中禁慈顔當作承慈赴樊作拜北堂一云天語辭中禁家榮赴北堂聖朝音潮新孝理祖席倍輝光一云行子倍恩光内一作贈帛擎偏重宫衣著陟畧切更香從送許叙起别奉詔省親開首提明同僚餞朝廷恩賜皆所以榮其親也拜次句本言為慈顔而赴北堂但出語稍拙樊作慈顔北堂句意稍明别作天語辭中禁家榮到北堂語亦未安當云冇詔辭中禁承慈赴北堂輝後漢薛包傳有詔賜告歸也沈佺期詩中禁有光梁簡文帝詩紫幄承慈草閒居賦夀觴舉慈顔和北記婦洗在北堂詩焉得諼言樹之背注背北堂也堂母氏也故去年十一月迎上皇至京是年正月又加上皇尊號云新孝理祖席光輝時當錫類也後漢班昭疏陛下以至孝理天下祖沈佺期詩天人開祖席朝寀候征麾席飲餞也淮陰清一作新夜驛京口渡江航竹引趨庭曙山添扇義主平聲讀從去聲枕凉一云春隔雞人晝秋期燕子凉十年過平聲一作賜書誇父老幾日一作夀酒賽一作樂城隍次言歸家之事言淮陰京口江寧近境庭曙枕凉晨省昬定也下睦隣之誼報神之禮他本作春隔雞人晝秋期燕子凉是言春啟行而秋至家不如前説切省覲而兼包時景其云賜書夀酒語亦繁重亦不如十年幾日之輕逸也年唐書楚州淮陰郡屬江南東道郡縣志建安十四孫權自吴治丹徒號曰京城十六年遷都建業於此為京口鎮姜宸英曰唐書齊澣傳潤州北距𤓰步沙尾紆滙六十里舟多敗溺澣從漕路由京口埭治伊婁渠以達楊子歲無覆舟此開元二十二年事送許在天寶後故得云京口渡江航又曰京口渡自晉宋間已有之至齊始定渡京口隋孫萬夀詩方春渡京口從竹裏趨庭似竹引其曙在山間扇枕覺山助其凉記王臺卿詩竹引帶山風枕趨庭用孔鯉事東觀漢黄香性至孝夏月則扇後漢書班彪幼與從兄嗣伯共游太學家有賜書庾信賦門有通徳家承賜書古樂府前有一樽酒主人行夀今日合來者皆令富且貴欲令主人三萬歲隍顧炎武曰北齊書慕容儼鎮郢州城中有神祠號城神儼率衆禱之此城隍始見史傳者謂史記封禪書冬賽禱祀索隠曰賽報神福看畫曾音層飢渴追蹤恨一作限淼弭沼切茫虎頭金粟影神妙獨難忘末及維摩圖様不忘江寧舊迹也江此章前二段各六句後段四句收詩載飢載渴賦狀滔天以淼茫唐瓦棺寺維摩詰畫像碑瓦棺寺變相乃晉虎頭將軍顧愷之所畫蔡夢弼曰張彦逺歴代名畫記顧愷之字長康小字虎頭晉陵無錫人多才氣尤工丹青傳寫形像莫不妙絶曾於瓦棺殿畫維摩詰畫訖光耀月餘吴曾漫録顧愷之為虎頭將軍非小字也朱注晉職官無虎頭將軍本傳亦不載此語漫録未知何據蔡注發跡經淨名大士是往古金粟如來阿含經曰金沙地下便是金粟如來今云金粟影即維摩圖也孔臧楊柳賦固神妙之不如因許八奉寄江寧旻上人不見旻公三十年封書寄與淚潺湲舊來好事今能否老去新詩誰與一作為傳棋局動隨幽一作尋澗竹袈裟本作毠㲚葛洪字苑改從衣憶上上聲泛湖船問舊作聞張逺作慿杜臆作問君話我為官在頭白昬昬只醉眠前六懐旻上人末二自叙近况舊事尚能新詩孰傳是思其現在棋局隨澗袈裟泛湖是憶其從前四句包盡三十年來前後情景末則因許寄旻囑以書中未盡之意弱鶴注公進大禮賦表云浪跡於陛下豐草長林實自冠之年其客遊吴越在開元十九年公方二十歲至乾元元年相距止二十七年曰三十年者亦約畧之詞朱瀚注旻居幽澗公擕棋局以相隨公在湖船旻著袈裟而同泛此叙交誼之親切封詩自我不見潛詩一去三十年齊國策齊王書謝孟嘗君陶楚辭横流涕兮潺湲於周禮天官内小臣后有好事於四方則使往有好令卿大夫則亦如之好讀本音揚雄傳好事者載酒肴從游好讀去聲誄陶潛詩乃賦新詩誰傳謂誰傳於我曹植王仲宣棋局逞巧博奕惟賢經江賦幽澗積岨三法苑珠林袈裟為福田之服華嚴著袈裟者捨離毒也陀羅尼經袈裟者秦言染衣也許杜臆作問君謂旻公問而話也此見因許之意黄生曰旻善吟善奕而喜與文士遊其好事可知七通是旻喜杜之得官八是杜答旻以潦倒舊作聞君亦題李尊師松樹障子歌黄鶴載在乾元元年葢詩言𤣥都道士乃長安人也又云時危慘淡知安史尚未平也若至德元年身陷賊中何心題咏若在二年則冬日至京亦恐不暇及此老夫清晨梳白頭𤣥都道士來相訪握髪一作手呼兒延入户手提新畫青松障首叙李師見訪畫握髪呼兒急於迎客手提新索公題句也通長安志崇業坊𤣥都觀隋開皇二年自長安故城徙道觀於此改名𤣥都與善慶寺相比唐㑹要京城朱雀街有𤣥都觀握説苑周公一沐三髪障子松林靜杳㝠慿軒忽若無丹青陰崖却承一作成霜雪一作露一作霧幹偃葢反走虬龍形次記畫松神妙故無丹青言不異真松崖在松下故云却承松勢逆盤云反走却俯也楚辭深林杳以㝠㝠續晉陽秋戴逵善圖畫窮巧丹青之馬融長笛賦生於終南之陰崖抱朴子天陵偃葢松又曰松樹三千歲者其皮中有聚脂狀如龍形老夫生平好去聲奇古對此興去聲與精靈聚已知仙客意相親更覺良工心獨苦此與李師賞畫也霜雪虬龍此即竒古精靈指畫仙客指李良工指畫者亮江淹詩精靈歸妙理蕭若静詩已數逄仙客傅感物賦嘉美手於良工松下丈人巾屨同偶坐似一作自是商一作南山翁悵望一作惆悵聊歌紫芝曲時危慘澹來悲風此對畫而冇感也因松下老人忽動商山之興葢世亂而思高隱也慘淡悲風畫景亦若增愁矣此章四段各四句偶坐並坐也顔延之詩獨静闕偶坐療晉書袁喬傳此又似是之非四皓歌曅曅紫芝可以飢應璩書悲風起於閨闥得舍弟消息此當是乾元元年季春作詩言春庭暮可見蔡琰詩迎問其消息風吹紫荆樹色與春庭暮花落辭故枝風廻返一作反無處骨肉恩書重漂泊難相遇猶有淚成河經天復去聲東注此章對景言情上比下賦有古詩遺意在荆花吹落喻兄弟分張風廻不返喻漂泊難遇公西京弟在河南故云淚東注恩書二字㸃題枝周景式孝子傳古有兄弟欲分異出門見三荆同株葉連陰嘆曰木猶欣聚况我而殊哉續齊諧記田廣田真田慶兄弟三人欲分財其夜庭前三荆便枮兄弟嘆之却合樹還榮茂朓蕭懿詩春庭聊縱望繪宋子侯詩花落何飄颺顧謝詩新筍雜故枝劉詩漂泊終難測世説長康哭桓宣武聲如震雷破山淚如傾河注海歸陸機詩逝矣經天日何遜詩復如東注水未有西日天河春夜向東故曰經天東注劉㑹孟曰苦心怨調使人凄然鮮終之痛憯於脊令死喪之喻送李校書二十六韻鶴注此是乾元元年春在諫省作朱注唐書宗室世系表舟字公受䖍州刺史隴西縣男父岑水部郎中眉州刺史舊書梁崇義逆命命金部員外郎李舟諭㫖以安栁宗元石表先友記李舟隴州人有文學俊辯高志氣以尚書郎使危疑反側者再不辱命被讒妬出為刺史廢痼卒代北有豪鷹生子毛盡赤渥洼騏驥兒一作種尤異是虎一作龍脊李舟名父子清峻流樊作時輩伯人間好少去聲一作妙年不必須白晳十五富文史十八足賔客十九授校書二十聲輝一作燀一作烜赫衆中每一見使我潛動魄自恐二男兒辛勤養無益首叙校書才望出衆從父説到其子盧注李舟於德宗朝奉使詣劉文喜陳以禍福帳下殺文喜以降又奉使詣梁崇義諭㫖安之勸崇義入朝言頗切直觀公此詩知少年時便已傑出矣二男公子宗文宗武也州國策代三十六縣漢書雁門代郡皆晉地也今為代魏彦深鷹賦白如散花赤如㸃血千史記田光謂燕太子丹曰臣聞騏驥壯盛之時一日里天馬歌虎脊兩化若鬼漢蕭育傳王鳳以育名父子除為功曹言育為名父之子也魏志常林傳林節操清峻沈約奏彈玷辱流軰府陌上桑為人潔白晳大蕭琛詩文史更區分專古樂十五府小吏二十朝夫三十侍中郎四十城居此四語所本又後漢人為焦仲卿妻詩十三能織綺十四學裁衣十五彈箜篌十六誦詩書亦四語叠叙洛陽伽藍記炎光輝赫獨絶世表懐鍾嶸詩品陸機所校十四首驚心動魄抱朴子損命之辛勤乾元元一作二年春萬姓始安宅舟也衣去聲綵衣告我欲逺適倚門固有望斂衽就行役南登吟白華已見楚山碧藹藹咸陽都冠葢日雲一作已如積何時太夫人堂上㑹親戚汝翁草明光天子正前席歸期豈爛漫一作熳别意終感激此送别而記其孝思從母説及其父其舟父向為眉州刺史天寶之亂必寓家於此故母倚門而望楚山母在之處咸陽迎母還京豈爛漫歸時不逺終感激不忍離父也肅宗紀乾元元年二月丁未大赦免陷賊諸州三歲税天下非租庸無輒役使親詩其究安宅列士傳老萊子行年七十作嬰兒娱著五采斒爛衣困學紀聞曹植靈芝篇伯瑜年七十彩衣以娱親慈母笞不痛欷歔淚沾巾今人但知老萊子而不知伯瑜耳包後漢書薛包事母孝出入有時至期母必闕門望之必至矣畧與王孫賈同魏都賦斂衽魏􅀝必出行皆謂之行役如公還成都自云他鄉復行役不奉使者稱行役也詩予季行役劉庭芝詩南登漢月孤於詩序白華孝子之潔白也束晳補亡詩白華朱萼被幽薄粲粲門子如磨如錯終晨三省匪惰其恪漢史記秦紀楚自漢中南有巴黔惠文王十三年攻楚中取地六百里置漢中郡據此則蜀漢本屬楚地故云楚山碧宋武帝詩楚山帶舊苑都左思傳藹藹東都門羣公餞二疏咸陽乃長安所孝文帝紀冠葢相望結轍於道三漢書列侯妻稱夫人列侯子復為列侯稱太夫人秦記未央宫漸臺西有桂宫内有明光殿皆金玉珠璣為簾箔金戺玉堦晝夜光明漢官儀尚書直宿建禮門奏事光明殿下下筆為詔策出言為誥令漫賈誼傳上坐宣室至夜半文帝前席悽莊子性命爛矣琴賦留連瀾漫孫萬夀詩别意無已顧我一作已蓬屋資謬通金閨一作門籍小來習性懶晚節一作歲慵常中切轉劇每愁悔吝作如覺天地窄羨君齒髮新行已音紀能夕惕臨岐意頗切對酒不能喫此臨别而自傷衰老李通籍時為拾遺也悔吝抗疏䝉譴也前云意感激指言此云意頗切公自言顧念也抱朴子竄繩樞之蓬屋甚梁吴均詩小來重意氣虞書習與性成地慵懶也劇也易大傳悔吝者憂之象也天窄猶詩言高厚跼蹐日繆襲詩齒髪行當墮詩論語行已有恥易君子終乾乾夕惕若陰鏗臨岐憫聖情悲李陵别蘇武詩逺望風至對酒不能酬廻身視緑野慘澹如荒澤老雁春忍陳作忍春飢哀號平聲待枯麥時哉高飛燕絢練新羽翮長雲濕褒斜漢水饒巨石無令平聲軒車遲衰疾悲宿昔此惜别而兼叙情景歎回身李去而回顧也長安亂後故野如荒澤雁飢自其貧燕飛李行之肚褒斜漢中所經之地末二囑其早還以慰已也廻此章前二段各十六句後二段各十句蕭子範詩身隠日扇謝靈運詩春晚緑野秀子世説道壹道人曰先集其慘澹八澤八荒見淮南詩鴻雁于飛集于中澤鴻雁于飛哀鳴嗷嗷赭漢桓帝時童謡大麥青青小麥枯練詩有鳥高飛白馬賦别輩超羣絢練夐絶注絢疾也岸何遜詩相顧無羽翮何由總奮飛道蕪城賦崪若斷矗似長雲後漢順帝紀罷子午通褒斜路注褒斜漢中谷名南谷曰褒北谷曰斜首尾七百里漢水亦在漢中何仲黙三秦志自秦入蜀有三谷西南曰褒谷南曰駱谷從洋入東南曰斜谷從郿入其所從皆殊興元府為漢中郡漢水出嘉州江賦巨石硉矹以前却疾古詩思君令人老軒車來何遲張華詩哀近殆辱徐榦詩宿昔當離别王嗣奭曰此明是一篇送人序韻而為詩語皆工錬而氣獨流暢黄常明詩話數物以箇謂食為喫字近鄙俗獨杜屢用如峽口驚猿聞一箇兩箇黄鸝鳴翠栁却遶井欄添箇箇又如樓頭喫酒樓下卧但使殘年飽喫飯梅實許同朱老喫送李校書云臨岐意頗切對酒不能喫葢篇中大㮣竒特不妨映帶也偪側吴作仄行贈畢四一本無四字曜鶴注此當是乾元元年春在諫院作故詩中有朝天語以偪側貫全詩也因章首偪側二字以為題非上林賦偪側沁瀄司馬彪曰偪側相偪也一作傯傯行詩中亦作傯傯偪側何偪側我居巷南子巷北可憐隣里間十日不一見顔色首歎比隣不得相見隣偪側謂所居宻邇離周禮遂入五家為隣五為里江淹古别詩願一見顔色不異瓊樹枝自從官馬送還官行路難行澁如棘我貧無乗去聲非無足昔者相過平聲一作遇今不得不是一作未敢愛微軀一作慵相訪非闗足無力諸本不是上有實字非闗上有又字黄希從梁莊肅公家本無實又二字徒步翻愁官長丁丈切怒此心炯炯君應平聲識此言以無馬之故不能見畢月炯炯應識言欲見之心畢當知我也至德二載二上幸鳳翔議大舉收復兩京盡括公私馬以助軍給事中李廙云無馬大夫崔光逺劾之貶廙江華太守古樂府有行路難語林王安期東渡江道路梗澁無梁簡文帝詩微軀多徼幸本樂府古詞含情出戸脚力杜句用虚字亦有所宋之問詩非闗憐翠幙不是厭朱櫻衆逺注徒步句即大夫不可徒行意魏志夏侯𤣥議職之屬各有官長潘岳寡婦賦目炯炯而不寢曉來急雨春風顛睡美不聞鐘鼓傳東家蹇驢許借我泥滑不敢騎朝音潮天已令平聲請急㑹通籍一云已令把牒還請假男兒性一作信命絶可憐此言以請告在籍不敢見畢性命可憐乃告籍之故恐泥滑跌傷也類逺注公喜用顛字如狂風大放顛及急雨春風顛之楚辭騰駕罷牛驂蹇驢兮急請急請假通籍註籍也謝靈運傳既無表聞又不請黄庭堅曰書記所稱取急請急皆謂假也車武子早急出詣子敬盡急而還是也吴均從軍行男兒亦可憐焉音烟能終日心拳拳憶君誦詩神凜然辛夷始花亦一作又已落况我與子非壯年街頭酒價常苦貴方外酒徒稀醉眠速宜一作徑須相就飲一斗恰有三百青銅錢末欲邀畢過飲以慰願見之思心拳拳言安能終日懸想乎起下就飲之意興此章起首四句腰間六句前後兩段各八句王景與許靖書拳拳飢渴誠無已也開韓詩辯證云辛夷花江南地暖正月開北地寒二月初發如筆北人呼為木筆其花最早南人呼為迎春徒淮南子真人馳於方外得史記酈食其傳吾高陽酒也鮑照行路難且願志數相就牀頭恒有沽酒錢萬逺注唐人以現錢為青錢按張鷟文如選青錢則又非現之謂矣黄生曰杜五言力追漢魏可謂毫髪無憾波瀾老成矣七言間有頽然自放工拙互陳宋儒自以才識所及專取此種為詩派終覺入眼塵氣真王嗣奭曰信筆寫意俗語皆詩他人所不能到葢情實事不嫌其俗也謂趙次公曰真宗問近臣唐酒價幾何衆莫能對丁奏曰每斗三百文帝問何以知之丁引此詩以對帝大喜曰子美真可謂一代之史酒黄鶴曰按唐食貨志唐初無酒禁乾元二年京師貴肅宗以廩食方缺乃禁京城酤酒建中三年置肆釀酒斛收直三千貞元二年斗錢百五十真宗問唐時酒價丁晉公引此詩以對丁葢知詩而未知史也酒杜臆北齊盧思道嘗云長安酒錢斗價三百此詩價苦貴乃實語三百青錢不過襲用成語耳舊注不引盧説而引丁説何也又有引李白金陵美酒斗十千之句疑李杜同時酒價頓異豈知李亦襲用曹子建詩成語也酒有美惡錢有貴賤豈可為準贈畢四曜鶴注乾元二年公在秦州有賀畢曜除監察御史詩今云宦卑是尚未遷官時作當在乾元元年才大今詩伯家貧苦宦卑飢寒奴僕賤顔狀老翁為同調去聲嗟誰惜論平聲文笑自知流傳江鮑體相顧免無兒三四承次句言貧而且老五六承首句言詩乏知音末喜有子以傳家學所以慰之也申涵光曰奴僕賤主奴僕自賤與奴僕為人所賤三説俱通代王延夀王孫賦顔狀似乎老翁洙曰謝靈運詩異可同調此言已與畢才調相同也就鍾嶸詩品江文通詩體總雜善於摹擬筋力於王微成於謝朓鮑參軍詩其源出於二張善製形狀寫物之詞中杜臆江鮑有詩傳後必定無兒故有下句唐書宗曰蘇瓌有子李嶠無兒題鄭十八著作丈一作文故居杜臆玩詩意是憶其故居而題之舊本丈下疑脱故居二字乾此詩乃鄭䖍既往台州後作在元元年季春台州地濶一作僻海㝠㝠雲水長和島嶼青亂後一作繾綣故人雙别淚春深一作飄颻逐客一浮萍酒酣懶舞誰相拽詩罷能吟不復去聲聽第五橋東一作邊流恨水皇陂岸北結愁亭此叙别後凄凉之况悲亂後故人聚而倐散逐客浮萍杳不可知二語楚欲絶酒酣詩罷憶同飲之興即醉時歌所云沽酒不復疑高歌有鬼神也橋東岸北憶同遊之地即何氏山林詩所云今知第五橋天清皇子陂也天朱瀚曰懶舞誰拽恨水愁亭語近腐俗蔡琰胡笳高地濶兮見汝無期吴都賦島嶼綿邈曹庾信詩别淚轉無從風史記李斯傳請一切逐客植詩浮萍寄清水隨東西流吕氏春秋召客者酒酣橋世説謝尚起舞神意自若地杜臆鄭莊與陂相近舊注以為㑹别之非也賈生對鵩傷王傅蘇武看平聲羊陷賊庭可念此翁一作心一作公懷一作常直道也卞音夜霑新國用輕刑禰衡實恐遭江夏方朔虚傳是歲星窮巷悄然或作一朝車馬絶案頭乾音干死讀書螢傷鄭逺竄而故居閴寂也苦賈生比前曾謫官蘇武比後不附賊直道輕刑惜其心䝉譴遭江夏恐卒貶所也虚歲星上不見知也窮巷悄然人迹杳而聲音歇矣賈生禰衡句首叠用四古人類四平頭末言乾死讀書螢出語不韻劉長卿詩云窮巷無人鳥雀閒空庭新雨莓苔緑結語何等韻致此章似七排上下各八句隅賈誼傳誼為長沙王傅三年有鵩飛入誼舍止於坐鵩似鴞不祥鳥也誼傷謫居長沙卑濕為賦以自廣蘇夢弼曰鄭䖍初有告其私撰國史坐謫十年得漢書武傳匈奴徙武北海上無人處使牧羝乳乃歸晉孝愍帝詔晏駕賊庭後朱注漢書公翁通用尚周傲𢎞讓詩平生懐直道漢禰衡有才辯而氣剛好矯時慢物後為江夏太守黄祖所殺精漢武帝内傳西王母使者至朔死使者曰朔是木帝為歲星下游人中以觀天下非陛下臣也東方朔别傳朔卒後武帝問太皇公曰爾知東方朔乎對曰不知公何所能曰頗善星厯帝問諸星具在否曰其在獨不見歲星十八年今復見耳帝嘆曰東方朔在朕旁十八年而不知是歲星哉書陶潛詩窮巷隔深轍窮巷鄭故居晉車𦙍貧不得油夏月囊螢讀書痩英華作老詩同馬行此是乾元元年謫官華州後追述其事按黄鶴以為至德二載為房琯罷相而作則詩中所謂去年者指至德元載也蔡興宗以為乾元元年公自傷貶官而作則詩中所謂去年者指至德二載也今考至徳元載陳陶青坂王師盡喪區區病馬又何足云及二載牧復長安人情安堵故道旁瘠馬亦足感傷况詩云去年奔波逐餘寇明是追言二載事當從蔡說東郊痩一作老馬使我傷骨骼音格一作骸硉郎兀切兀如堵牆絆之欲動轉欹側此豈有意仍騰驤細看平聲六一作火非印帶官字衆道去聲三一作官軍遺路旁皮乾音干剥落雜一作盡泥滓毛暗蕭條連雪霜此記瘦馬憔悴之狀年東郊指長安之東即至徳二冬追賊之處瘦馬猶帶官印歎其昔用而今棄也劉傳𤣥乘輿馬賦下廐有的顱馬委棄莫視痩瘁骨立備撫而取之仍江賦巨石硉兀以前却良記觀者如堵牆典西京賦奮翅而騰驤成公綏傳馬騰驤唐六諸牧監凢在牧之馬皆印印右髆以小官字右髀以年辰尾側以監名皆依左右廂若形容端正擬送尚乗不用監名二歲始春則量其力又以飛字印印其左髀髆細馬次馬以龍形印印其項左送尚乗者尾側依左右閑印以三花其餘雜馬送尚乗者以風字印印左髆以飛字印印左髀官馬賜人者以賜字印配諸軍及充傳送驛者以出字印竝印左右頰也萬古樂府黄金絡馬頭觀者滿路旁漢五行志剥落物抱朴子守汙泥滓頭李實曰凢馬病毛生塵故曰毛暗去歲奔波逐餘寇驊騮不慣不得將士卒多騎内廐馬惆悵恐是病乘黄當時歴塊誤一蹶委棄非汝能一作難周防見人慘澹若哀訴失主錯莫無晶英華作晴光天寒逺放雁為伴一作侣日暮不一作未收烏啄瘡一云不衣烏作瘡誰家且養願終惠更試明年春草長此叙痩馬悲楚之情昔貴而今賤也以内廐乗黄而至逺放不收又歎其公疏救房琯至於一跌不起故曰歴塊誤一蹶非汝能周防落職之後從此不復見君故曰見人若哀訴失主無晶光身經廢棄欲展後效而不可得故曰誰家願終惠更試春草長寓意顯然詩作於乾元元年之春而云明年春草長從去年説至今春為明年矣此追叙語也奔此章兩段各八句毎段四句轉意梁武帝孝思賦波兼行逺注不慣不將未調習者不得用故用内廐馬耳得唐六典諸閑廐上細馬若欲調習惟得廐内乗騎不輒出山海經白民之國有乗黄其狀如狐背上有兩角乗之夀二千歲注即飛黄也唐六典乗黄署令一人王洙曰乘黄古之神馬亦名飛黄背有角日行萬里淮南子天下有道飛黄㐲皂一云神黄獸名龍翼馬身黄帝乘而登仙王褒頌過都越國蹶如歴塊静鮑照行路難今日見我顔色好眼花錯莫與先異苑妻沈氏詩風彌葉落未離索神往形返情錯莫錯莫猶云落寞赭白馬賦願終惠養蔭本支義鶻胡骨切行鶴注當是乾元元年在長安作詩云近經潏水湄可見王彦輔曰此感禽鳥能見義而動也賦周甸注埤雅舊言鶻有義性有擒有縱李邕鶻所謂營全鳩以自煖乃詰朝而見釋者也陰崖二蒼從英華一作有蒼一作有二鷹養子黑柏顛白虵登其巢吞噬一作之恣一作資朝餐此惡物之殘害者賦李陵詩熠熠似蒼鷹魏彦深千日成蒼黒杜篤論都賦斬白蛇屯雲楚辭屑瓊以朝餐雄飛逺求食雌者鳴辛酸力强不可制黄口無英華作寧半存其父從西歸一作來翻身入長煙斯須領健鶻痛憤一作憤懣一作寃憤寄所宣鷹能訴寃於鶻其事甚竒雄雌鳴雄憤寫兩鷹情狀如生臨爾雅翼鷹鳥之摰者大雌小一名爽鳩嵇康詩文情辛酸家語孔子見羅者所羅皆黄口小雀元鶻稱父子語亦有本吴都賦猿父哀吟􅏈子長嘯譚春云其父二字語帶滑稽飄詩誰將西歸所曹植詩翻身上京於梁高允生詩飄乗長烟寄宣謂痛憤之心寄宣訴之語陶潛詩弱毫多所宣斗上上聲捩練結切孤影嗷古弔切哮許交切一作無聲來九天修鱗脫逺枝巨顙拆老拳高空得蹭蹬短一作茂草辭蜿蜒折尾能一掉一作擺飽英華作飢腸皆一作今已一作以一云已皆穿鶻能為鷹報讐其事更竒然鶻一奮擊蛇遂伏辜見其義勇特絶斗上陡飛上也捩影張翅廻旋也嗷哮厲聲長鳴也修鱗蛇身巨顙蛇首老拳鶻翼下勁骨蹭蹬困頓貌蜿蜒巻舒貌史記封禪書成山斗入海蜀志譙周傳險阻斗絶庾信詩山梁乍斗廻按舊解北斗之上大謬陶潛詩揮杯勸孤影楚辭指九天以為正兮注九天中央八方也鶻晉東海越王檄文激浪之心未遂遽骨修鱗周注拳堅處大如彈丸鳩鴿中其拳隨空中墮即側身自下承之捷於鷹隼晉載記石勒引李陽臂笑曰孤往日厭卿老拳卿亦飽孤毒手穿海賦蹭蹬窮波皮張衡七辯螭虹蜿蜒意吴論折尾腸即公詩君看寢處無復晴閃爍之鬐江賦揚掉尾生雖滅衆雛死亦垂千年物情有報復快意貴目前兹實鷙鳥最急難去聲心炯一作皎然功成失所往一作在用舍上聲何其賢鶻能報復輒去益見其竒之蛇死垂鑒此目前快意之舉鶻有功不居其義俠尤出尋常矣承鸚鵡賦憫衆雛之無知遂江淹詩物情棄疵賤何天安邊論報復之役將無己當晉書周顗曰人生幾何但當快意鳥王右軍帖足下為逺慮不可計目前鄒陽書鷙累百不如一鶚徳詩兄弟急難道經功成身退近經潏水湄此事樵夫一作人傳飄蕭覺素髪凜欲英華作烈一作若衝儒冠人生許與一作計有分去聲只在一云亦有顧盻間聊為義鶻行用一作永激壯士肝末記所聞以激人心安此章四句起下四段各八句經漢書音義潏水在長杜陵自南山皇子陂西北流昆明池入渭如潘岳賦班􅁂彪以承弁素髮颯以垂領者史記藺相髪上衝冠又酈食其傳諸客冠儒冠來任昉集𢎞長風流許與氣類怒分謂分誼壯曹植詩顧盻遺光彩漫叟詩話肝主故云永激士肝漢高帝紀壯士行何畏吴山民曰子美平生要借竒事以警世故每每說得精透如此詩說老鶻仁慈義勇所以感動人情而其慷慨激昻正欲使毒心人斂威奪魄而王嗣奭曰此明是太史公一篇義俠傳筆力相敵叙鳥尢難斗上一段摹神寫照千載猶生功成失所往用舍何其賢分明是仲連逃賞人生許與分只在顧盻間又分明是季札掛劍借端發議時露作者品格性情畫鶻行此詩年月未詳姑從舊編附在乾元之初玩章末云我今亦何傷顧步獨紆鬱豈公在朝時不得志而云然耶高堂見生一作老鶻颯爽動秋骨初驚無拘攣一作巻何得立突兀乃知畫師妙巧一作功刮造化窟寫此一作作神俊姿充君眼中物從生鶻突起轉到畫鶻頓挫生姿及此鶻無縧鏇拘攣何以兀立不去乎細觀之方知畫師巧奪化工也人楚辭招魂翡翠帷幬飾髙堂些潘岳西征賦陋吾之拘攣列子造化者其巧妙而功深功趙曰李賀云筆補造化天無葢出於此烏鵲滿樛枝軒然恐其出側腦看青霄寧為去聲衆禽没長翮如刀劍人寰可超越乾坤空崢嶸粉墨且蕭瑟此寫畫鶻神妙酷似生鶻抑揚盡致烏鵲恐其出擊疑於真鶻矣乃仰天而不肯沒去則畫鶻也長翮可任超越又疑真鶻矣乃墨痕似帶蕭瑟亦畫鶻也語意層層跌宕角詩南冇樛木傳木下曲曰樛二句與畫鷹詩梁間燕鵲休驚怕相同逺注烏鵲舞鶴賦歸人寰之喧卑即盧思道詩寥廓鸞山右超越鳳城西書逺注乾坤句天空任鳥飛意崢嶸髙曠也漢黄瓊疏朱紫共色粉墨雜糅緬思一作想雲沙際自有煙霧質吾今意何傷顧步獨紆鬱末又借生鶻寄慨奮鶻能騰舉雲沙已則顧步而不能飛未免鬱鬱傷情耳自逺注因畫鶻而思真鶻亦猶咏畫馬而思真馬意若負還以自悲此章前二段各八句末段四句收撲陳子昻詩緬想出松遊凝緬思貌質劉希夷詩雲沙地起舞鶴賦煙交霧若無毛顧步行步自顧也紆鬱紆廻鬱結也步西京雜記路喬如鶴賦宛修頸而顧步阮德如詩顧懐想像楚辭憂紆兮鬱鬱陸士衡詩紆鬱游子情端午日賜衣此乾元元年五月在拾遺時作五月建午故曰端午端正也宫衣亦有名端午被去聲恩榮細葛含風軟香羅疊雪輕自天題處濕當暑著陟畧切來清意内稱去聲一作恰稱身長短終身荷去聲聖情首二叙題葛羅承宫衣自天承有名當暑承端午荷聖情承被恩榮杜臆亦有名見出於望外時公將謝官矣宫鍾惺曰此詩是近臣謝表語風趣而典邵注宫衣人所製之衣賀凱詩恩榮雨露濡細邵注含風形其軟疊雪形其輕羅漢高帝紀顔注絺葛也吴越春秋采葛歌弱於兮輕霏霏言謝莊詩疊雪翻瓊藻稚生注細葛二句每句三層濕其新清言其凉孔圭表斷自天筆論語當暑袗絺綌平稱長短言恰好稱意杜詩第七句中第三字有不拘仄者如多壘滿山谷意内稱長短是也洪仲欲讀作平聲謂長短合意若經稱量者如枚乘傳所云石稱丈量酬孟雲卿鶴注當是乾元元年六月出為華州司功將行時作唐詩紀事孟雲卿河南人與杜工部元次山善樂音洛極傷頭白更平聲長一作深愛燭紅相逢難俗本作雖衮衮告别莫悤悤但恐天河落寧辭酒盞空明朝牽世務揮淚各西東此詩乃席上惜别語五六應首聨是夜飲之情七八應次聨是别離之感上下自相照應公詩常有此格匆隋王胄詩更深夜轉長讀燭紅燭光也衮衮繼續貌匆急遽貌舊注張華書衮衮可聽定語林宋江夏王鋒置酒告别河何遜詩匆匆昨不白帖天津絳河明河俱謂天張正見詩耿耿天河曙有陸機詩曷為牽世務中心若違又揮淚歎流離至德二載上聲甫自京金光門出間去聲一作問道歸鳳翔乾元初從左拾遺移華去聲州掾與親故别因出此門有悲往事鶴注此詩當作於乾元元年六月胡夏客曰至德二載公拜左拾遺即疏救房琯時琯罷相猶在朝故公仍為拾遺至乾元元年五月琯貶六月公即出為華州司功參軍矣逐師氏曰是時賀蘭進明譖琯於帝并及甫故被長安志唐京師外郭城西面三門北曰開逺門中曰金光門西出趨昆明池南曰延平門唐書華州華陰縣屬闗内道在京師東一百八十里此道昔歸順西郊胡正一作騎繁至今猶一作殘破膽應平聲一作猶有未招魂近侍一作得歸京邑移官豈一作逺至尊無才日衰老駐馬望千門此公再出國門而有感也上四憶往時奔竄下四傷今日左遷撫今思昔無非惓惓忠愛之心而留别親故意亦在言表杜臆近侍歸京邑去拾遺而赴華州也華陰為京師傍縣故云京邑舊云侍從還京者非是衰趙汸云公雖遭讒黜而終不忘君則所謂悲往事日老者豈為一身計耶道至吾軍此道指金光門之路翔史記項羽紀從此逺注歸順肅宗在鳳而公歸之也晉書蘇峻傳歸順之後志在立功歡易自我西郊辭胡指禄山之兵北魏書李穆曰高破膽矣楚招魂魂兮歸來入修門些京沈約安陸昭王碑還居近侍孔蔡邕為袁逢碑乃尹邑王制不貳事不移官融表天子至尊賦師氏曰駐馬回望葢戀君不忍去也魏文帝臨渦序駐馬書鞭千門萬戸見前顧宸曰公疏救房琯詔三司推問以張鎬力救敇放就列至次年與房琯嚴武俱貶坐琯黨也此公事君交友生平出處之大節曰移官豈至尊不敢歸怨於君也當時讒毁不言自見又以無才自解更見深厚王維詩云執政方持法明君無此心與此詩同意而老杜尤為渾成此詩有介子從龍之感而詞意歸於厚所謂詩可以怨也寄高三十五詹事鶴注據新舊史高適傳云至德二載適除揚州大都督府長史淮南節度使永王璘敗李輔國數短於上前左授太子少詹事此詩云兵戈久索居則是為詹事已久當是乾元元年作宫又曰太子詹事正四品上詹事秦官掌皇太子詹事掌東宫三寺十率府之政令少詹為之貳安穏高詹事兵戈久索居時來知一作如宦逹歲晚莫情疎天上多鴻雁池一作河中足鯉魚相看平聲過平聲半百不寄一行音杭書首聨從寄候叙起下則望高之答書也半宦達以將來言高從節度左遷也年過百應歲晚雁魚不寄應情疎安參同契序各相乗負安穏長生世説顧長康牋行人穏布颿無恙吴越春秋欲興兵戈以誅暴楚荀記子夏離羣而索居詩時來茍㝠㑹晉書朂傳亦當宦逹人間陶潛鮑照詩沈吟芳歲晚使記君子不以色親人情疎貌親使蘇武傳漢宣帝遣求武等匈奴詭言武己死後漢復至常惠教使者言天子射上林中得雁足冇繫帛書言武等在某澤中使者如惠語以讓單于單于謝漢使曰武等真在此雁書本屬託辭也元史郝經使南宋留七年不遣經題詩繫帛於雁足云霜落風高恣所如歸期回首是春初上林天子援弓繳窮海累臣有帛書經將還之歲汴民射雁金明池得詩以聞此雁書實事在後世也事楊慎曰古樂府尺素如殘雪結成雙鯉魚要知心裏看取腹中書據此古人尺素結為鯉魚形即緘也非如今人用蠟選詩客從逺方來遺我雙鯉魚即此事也下云烹魚得書亦譬况之言耳五臣及劉履謂古人多於魚腹寄書引陳涉罩魚倡禍為証何異癡人說夢耶楚辭七諫年既過半百兮何遜詩欲寄一行書何解三秋意贈高式顔此詩黄鶴編在天寶十五載單復編在夔州詩内今按詩云削迹共艱虞當是乾元初出為華州司功時其相逄應在華州東都之間昔别是一作人何處相逄皆老夫故人還寂寞削跡共艱虞自失論平聲文友空知賣酒壚平生飛動意見爾不能無上四傷彼此淪落下四感知交聚散通首俱屬言情起句本言離别之久而語意却深婉有致故人指式顔削迹兼言已失友適在揚州酒壚追憶前事見式而意仍飛動文酒之興勃然也吴筠詩昔别曾何道楚辭伯强何處自詩老夫灌灌孔古詩故人從兹去東漢謠惟寂寞投閣莊子子伐樹於宋削跡於衞潘岳李宻招徐鴻客書代屬艱虞論庾信詩論文報朱注公遣懐詩昔與高李輩文入酒壚今適不在故慨及之阮世説晉王戎過黄公壚謂後車客曰吾昔與嵇叔夜嗣宗酣飲於此壚自嵇阮既云亡以來便為時所羈紲今視此雖近邈若山河裴榮作語林載王公酒壚下賦甚有才情蘇武詩叙此平生親沈佺期祭李侍御文思含飛動才冠卿雲申涵光曰昔别是何處相逄皆老夫誦之如聞其聲乍見翻疑夢相悲各問年語意本此而真樸自然不逮矣題鄭縣亭子鶴注當是乾元元年赴華州時作宗陸游筆記華之鄭縣有西溪唐昭避兵嘗幸之其地在官道旁七八十步澄深可愛亭曰西溪亭即鄭縣亭子黄注玩七句知此詩即題竹者鄭縣亭子澗之濵戸牖慿高發興去聲新雲斷岳蓮臨大路一作道天晴一作清宫一作官栁暗長春巢邊野雀一作鵲羣欺燕花底山蜂逺趂人更欲題詩滿青竹晚來幽獨恐傷神黄生注上半登亭發興乃叙景下半臨去傷神乃感懐三四承上五六起下鄭縣亭子入律頗拗得次句方見生動中四言景先逺後近先賦後比雲斷天晴兩字一讀雀欺蜂趂喻衆謗交侵而一身孤立故自傷幽獨耳鮑唐書華州倚郭為鄭縣杜臆周時鄭桓公封於此照詩發興誰與歡岳蓮西岳蓮花峰也華山記山頂有池生千葉蓮花因名道朱注晉檀道濟伐後秦至潼闗秦遣姚鸞屯大路絶濟糧道通鑑注自澠池西入闗冇兩路南路由回谿陂自漢以前皆由之曹公惡路險更開北路遂以北路為大路魏都賦西闢延秋東啟長春唐書同州朝邑縣有長春宫寰宇記周宇文䕶所築舊書高祖起義大軍濟河舍於長春宫巢梁簡文詩霧暗窗前栁安無滿青竹刻詩於竹上漢樂府猛虎行野雀楚辭幽獨處乎山中寞别賦感寂而傷神望岳此往華州時中途所歴者岳西岳華山也唐書華州華陰縣有華山西岳崚嶒一云危稜竦處黄音上聲尊諸峯羅立一作列似一作如兒孫安得仙人九節杖拄到玉女洗頭盆車箱入谷無歸一作回路箭栝朱作柏晉作閣一作闕一作括韻㑹筈與栝括通用通天有一門稍待秋一作西風凉冷後高尋白帝問真源黄注上四寫望字意五六承上起下末欲遂其登嶽之興也有又曰五六乃形容語路徑險仄車不能廻狹而且長似箭筈不必泥於地名山綖注髙山多仙跡故欲尋問真源與三四相應竒是四方髙五千仞傍連少華山何遜詩懸崖抱崛絶壁駕崚嶒閉劉根外傳漢武登少室見一女子以九節杖仰指日左目東方朔曰此食日精者真誥楊羲夢蓬萊仙翁拄赤九節杖而視白龍五集仙録明星玉女居華山服王漿白日升天祠前有石臼號玉女洗頭盆其水碧緑澄徹雨不加溢旱不減耗祠有玉女馬一匹寰宇記車箱谷一名車水渦在華陰縣西南二十五里深不可測祈雨者以石投之中有一鳥飛出應時獲雨朱注舊注引箭筈峯姚寛云箭筈嶺自在岐山按地志諸書並不云華山有箭栝韓非子秦昭王令工施鈎梯而上華山以松柏之心為博箭長八尺棊長八寸而勒之曰王與天神博於此水經注自下廟歴列柏南行十一里東廻三里至中祠又西南出五里至南祠從北南入谷七里又届一祠出一里至天井井纔容人行迂廻頓曲而上可高六丈餘山上有微涓細水流入井中上者皆所由涉更無别路出井望空視明如在室窺窗矣此與通天一門語甚合所云列柏豈即箭柏耶初學記事類亦以蓮峯對柏箭則箭栝乃柏字之訛李攀龍華山記自昭王施鈎梯處西南上三里許得一峽如栝曰天門豈後人因杜詩附㑹乎高仇池記石角外向如雉堞唯一門可通陳子昻詩尋白雲逸洞天記華山名太極總仙之天即少昊為白帝治西岳梁劉孝儀詩降道訪真源黄生曰玉女洗頭盆五字本俗先用仙人九節杖引起能化俗為妍而句法更覺森挺真有擲米丹砂之巧早秋苦熱堆案相仍此乾元元年初秋在華州時作何遜詩有苦熱行絶交書人間多事堆案盈几七月六日苦炎蒸一作熱對食暫餐還不能常一作每非愁夜來一作中皆是從趙注舊本作自足蝎况一作仍乃秋後轉一作復多蠅束帶發狂欲大叫簿書何急來相仍南望青松架短一作絶壑安得一作能赤脚踏層冰上四早秋苦熱五六堆案相仍末欲棄官避暑杜臆公以天子侍臣因直言左遷且負重名長官自宜破格相視公以六月到州至七月六日而急以簿書是以常掾畜之殊失大體故借早秋之熱蠅蝎之苦以發鬱伊愁悶之懐於簿書何急微露意焉趙大綱曰北多戎馬故思南適松壑不足又思踏冰此歎苦熱亦見狂態也庾信詩五月炎蒸氣蔡琰笳曲飢當食兮不能餐其苦杜臆皆是蝎謂已皆是蝎又加以多蠅此極狀趙注蝎螫虫中原有之南方所無邵注蝎全蝎陰夜毒人通鑑蜹蟻蜂蠆皆能害人蠆即蝎也酉陽雜俎蝎前謂之螫後謂之蠆顧注韓退之詩照壁喜見蝎退之謫官回家故以為喜少陵貶官他適故以為愁物亦係乎人情哉詩營營青蠅止於棘詩傳青蠅比小人也神陶潛詩束帶候雞鳴趙老子馳騁田獵令人心發狂仙傳劉根狀若發狂大綱曰昌黎云人各有能不能抑而行之必發狂疾即此詩意也襟唐書切於簿書期㑹張衡四愁詩側身南望涕沾潘尼詩青松蔭修嶺架江淹詩風散松架險注松横生曰楚辭層冰峩峩王嗣奭曰州牧姓郭公初至即代為試進士策問與進滅絶寇狀不過挾長官而委以筆札之役非重其才也公厚於情誼雖邂逅一飯必賦詩以致感佩之私俾垂名後世郭與周旋幾一載公無隻字及之其人可知矣可朱瀚曰此必贋作也命題既蠢而全詩亦無一句取縱云發狂大叫時戲作俳諧恐萬不至此風雅果安在乎觀安西兵過赴闗中待命二首鶴注此當是乾元元年秋在華州時作循又曰至德元載安西節度更名鎮西此曰安西舊稱也通鑑乾元元年六月李嗣業為懐州刺史充鎮西北庭行營節度使八月同郭子儀等將步騎二十萬討安慶緒長安謂之闗中西以隴西闗為限東以函谷闗為界四一作西鎮富精銳摧鋒皆絶倫還聞獻一作就士卒足以静風塵老馬夜知道蒼鷹飢一作秋著涉畧切人臨危經久戰用急一作意始去聲一作使如黄作知神首章見安西兵過而歸美李公在四句分截掃四鎮之兵皆嗣業所統曰獻志在報國也曰静力能賊也老馬喻主將之慣戰蒼鷹喻軍士之敢入臨危久戰見其用兵奇勇䕶舊唐書龜兹畋沙疏勒焉耆四鎮都督府皆安西都所綂長夀二年收復四鎮於前龜兹國置安西都䕶府至德後河西隴右戍兵皆徵集收復西京潘岳詩皇赫斯怒爰整精銳秦本紀三百摧鋒爭死以報食馬之德可韓非子齊桓公伐孤竹還迷失道管仲曰老馬之智用也乃放老馬而隨之魏飢鷹著人注見二巻用晉劉𢎞表孝篤著於臨危志荀彧謂曹操曰公兵如神唐史嗣業討小勃律執一旗引陌刀縁險先登力戰大破之及收西京時官軍幾敗嗣業執長刀陷陣賊遂潰公故以臨危久戰稱之竒兵不在衆萬馬救中原談笑無河北心肝奉至尊孤雲隨殺氣飛鳥避轅門竟日留歡一作觀樂音洛城池未覺喧此章稱李公忠勇而誌其紀律亦四句分截氣竒兵制敵此其智勇披肝奉主此其忠義雲隨殺見兵威振肅鳥避轅門見號令森嚴末言師行有紀民情安堵杜臆乾元二年九節度之兵六十萬潰于相州竒兵不在衆一語公之預識兵機如此披顧注河北一帶久已陷沒可以談笑而取之由其能瀝忠肝而奉至尊故也用史記竒兵入燒回中通鑑晉安帝時沈田子曰兵貴竒不必在衆左思詩吾慕魯仲連談笑却秦軍安唐書河北道領孟懐魏博相衞貝澶等二十九州時慶緒據相衞嵇康詩感激切心肝陶潛詩孤雲獨無依能蔡琰胡笳殺氣朝朝衝塞門談管子冇飛鳥之舉故不險山河矣趙國策張孟遇智果於轅門之外葛常之韻語陽秋杜詩談笑無河北心肝奉至尊葢用左太冲詠史詩長嘯激清風志若無東吴也東坡詩云似聞指揮築上郡已覺談笑無西戎意本於杜王維云虜騎千里只似無句則拙矣九日藍田崔氏莊鶴注此是乾元元年為華州司功時至藍田而作華至藍田八十里舊編在至徳元年是時身陷賊中不能逺至藍田何況兩宫奔竄四海驚擾豈有興來盡歡之理乎老去悲秋强上聲自寛興去聲來今一作終日盡君歡羞將短髪還吹帽笑倩傍人為去聲正冠藍水逺從千澗落玉山高竝步浪切兩峯寒明年此㑹知誰健一作在醉芥隠作再把茱茰仔細看平聲之上四九日飲莊五六莊前之景七八九日感趙大綱曰羞將短髪未免老去傷情笑倩傍人仍見興來雅致二句分承却取孟嘉事而翻用之千澗滙流兩峯遙峙此壯觀之足以發興者但思山水無恙而人事難知故又細看茱茰仍與老去悲秋相應朱瀚曰通篇不離悲秋歎老盡歡至醉特寄託耳公曾授率府參軍用孟嘉事恰好也陸機詩但恨老去年遒楚辭九辯悲哉秋之為氣列子孔子見榮啟期鼓琴而歌曰善乎能自寛也之晉書王㣲之夜雪訪戴安道曰本乗興而來又徽至吴中逕造竹下留坐盡歡而去漢書李陵為蘇武置酒設樂武曰請畢今日之歡朱龔芥隠得王仲言本此詩次句作今朝醉裏為君歡今按首二乃對起若依龔説語近於俗陳後主詩羞將别後面漢樂府長歌行髪短耳何長時王隠晉書孟嘉為桓温參軍九日遊龍山參僚畢集風至吹嘉帽墮落温命孫盛為文嘲之魏志曹植善屬文太祖嘗視其文謂曰汝倩人耶府但恐傍人聞淮南子坐而正冠起而更衣古樂三秦記藍田有水方三十里其水北流出玉石合溪谷之水為藍水鮑照詩千澗無别源晏氏曰武徳三年嘗析藍田置玉山縣貞觀三年省則玉山在藍田也景華山志岳東北有雲臺山兩峯崢嶸四面懸絶上冠雲下通地脉朱注兩峯指雲臺山舊云華山泰山者非記漢書注竝字作傍字解左傳在此㑹也西京雜漢武宫人賈佩蘭九日佩茱茰飲菊花酒令人長壽醉看茱茰明是傷老顧注謂手把茱茰眼看山水非是北史源思禮傳為政當舉大綱何必太仔細也黄生曰亦暗反九日事皆善推新楊萬里曰唐七言律句句字字皆竒如杜九日詩絶少首聨對起方説悲忽説歡頃刻變化頷聨將一事翻騰作二句嘉以落帽為風流此以不落為風流最得翻案妙法人至頸聨筆力多衰復能雄傑挺拔喚起一篇精神結聨意味深長悠然無窮矣陳後山云頷聨文雅曠逹不減昔人故謂詩非力學可致正須胸中度世耳崔氏東山草堂顧注王維晚年得宋之問藍田别墅在張通儒囚禁之後肅宗還京維為太子中允復拜給事中此當是乾元元年作邵注東山即藍田山又名玉山在長安藍田縣東南草杜臆王維輞川莊在藍田必與崔莊東西相近堂在東山可稱東莊則輞川固可稱為西莊矣愛汝玉山草堂静高秋爽氣相一作多鮮新有時自發鐘磬響落日更見漁樵人盤剥白鴉谷口栗飯煑青泥坊音防與防通底芹一云當作蓴何為西莊王給事柴門空閉鎖一作好松筠此借崔氏草堂以諷王給事也首句記草堂次句記秋候三四堂外聞見之景仍含静意五六堂中食物之佳仍含秋意末慨西莊以見仕者之不如隠也朱瀚曰草堂之静延秋氣之爽故曰相鮮新㳄聨即衡門之下可以棲遲也三聨即泌之洋洋可以樂飢也朱鶴齡注公贈王維詩窮愁應有作試誦白頭吟維之再仕必非得意故以柴門空鎖諷其歸老藍田歟梁釋惠令詩泬寥秋氣爽綖注杜牧詩南山與秋色氣勢兩相高即秋氣相鮮之意鮮蜀都賦庭和鐘磬堂撫琴瑟郭璞詩容色更相江淹詩石室有幽響磬王維輞川詩有云谷口疎鐘動漁樵稍欲稀則知鐘漁樵即藍田山中景物宋武帝紀樵漁山澤孔魚詩蘭澤侣漁樵田朱注白鴉谷青泥坊皆地名青長安志白鴉谷在藍縣東南二十里其地宜栗又泥城在藍田縣南七里水經注泥水歴嶢栁城南魏置青泥軍於城内俗亦謂之青泥城考晉中興書桓温伐存健遣京兆太守薛珍擊青芹城破之即其處説邵注飯煑芹雜米為飯也記坊以畜水亦以障水文防即隄也張綖注維輞川别業詩云積雨空林烟火遲蒸梨炊黍餉東菑漠漠水田飛白鷺陰陰夏木囀黄鸝山中習静觀朝槿松下清齋折露葵野老與人爭席罷海鷗何事更相疑此即給事咏西莊者前六句之意葢亦識此趣矣末乃謂海鷗何事相疑尚似機心未忘無怪乎公之怪歎給事也王嗣奭曰藍田詩悲壯東山詩則渾成不煩繩削自有蕭散之致各見其妙然前詩人猶可學此詩人不能到遣興去聲三首此當是乾元元年罷諫官後作我今日夜憂諸弟各異方不知死與生何况道路長避冦一分散飢寒永相望平聲豈無柴門歸一作掃欲出畏虎狼仰看平聲雲中雁禽鳥亦有行音杭彼首章思兄弟也因此各天歸途中梗而歎不如雁行之同羣莊子屠羊説畏難而避冦三章各在上四句分截謝史記秦虎狼之國也靈運詩嗷嗷雲中雁蓬生非無根漂蕩隨高風天寒落萬里不復歸本叢客子念故宅三年門巷空悵望但烽火戎車滿闗東生涯能幾何常在羇旅中次章念故居也羇飄蓬逺去如遊子行蹤葢不勝旅寂寥之悲矣説苑秋蓬惡其本根美其枝葉秋風一起根本拔矣曹植詩轉蓬離本根飄颻隨長風何意回飈舉吹我入雲中高高上無極天路安可窮顧此遊客子捐軀逺從戎又詩高風吹我軀水經注祠即故宅也梁戴暠詩門巷無車轍勝謝朓詩悵望心已極子詩戎車既飭劉向新序陳奮臂於闗東韓非羇旅僑士重帑在外昔在洛陽時親友相追攀送客東郊道遨遊宿南山煙塵阻長河樹羽成臯間回首載酒地豈無一日還丈夫貴壯健慘戚非朱顔三章懐舊交也雖往日遨遊之地今成戎馬之場或還鄉有日但恨不如少年時耳詩張協詩昔在西京時遨王粲詩朋友相追攀曹植鬬雞東郊道詩以以遊曹植詩長驅上南山黄希謂東郊指洛陽之東則南山當指伊闕山葢在東都之南也孫楚書煙塵俱起震天駭地羽長河即黄河也洛應瑒詩浩浩長河水成詩崇牙樹羽旗也陸機陽記洛陽四闗東有臯闗在氾水縣東南二里時王師討安慶緒於河北壯陶潛傳親朋好事或載酒肴而往史記匈奴傳貴健賤老弱王陸機冢墓賦鮮塗慘戚康琚詩凝霜周朱顔獨立此詩託物興感有憂讒畏譏之意必乾元元年在華州時作空外一鷙鳥河間雙白鷗飄颻搏撃便容易去聲往來遊草露亦多濕蛛絲仍未收天機近人事獨立萬端憂上六獨立所觸之景末二獨立所感之情者趙汸注鷙鳥比小人之媢嫉者白鷗比君子之幽放三四分承首二露鷙鳥方恣行搏擊白鷗可輕易往來乎危之也且夜已經沾惹而蛛絲猶張宻網重傷之也上是顯行排擊者下是潛為布置者虫鳥天機同於人事是以對此而萬憂并集也顧注公詩浦鷗防碎首霜鶻不空拳即次聨之意白劉須溪云此必有幽人受禍而羅織仍未已者如李鄭䖍輩是也空外虚空之外宋之問詩空外有飛烟可淮南子鷙鳥不雙上陸厥詩河間栁巳把何遜詩憐雙白鷗朝夕水遊曹植詩飄颻隨長風運翟方進傳搏擊豪强之東方朔傳談何容易謝靈詩往來無蹤跡宋問詩草露濕人衣王僧孺詩泣望蛛蜘絲陸淮南子内有以通乎天機阮籍詩人事多盈冲士衡詩世道多故萬端憂慮紛錯交顔至日遣興去聲奉寄北省舊閣老兩院故人二首此乾元二年十一月在華州作乾顧注公以至德二載十月扈從還京此詩作於元元年之至日而廻思去歲也門通典唐人謂門下中書為北省亦謂下為左省或通謂之兩省去歲兹晨捧御牀五更平聲三㸃入一作出鵷行音杭欲知趨走傷心地正想氤氲滿眼香無路從音聰容陪語笑有時顛倒著音灼衣裳何人却一作錯憶一作認窮愁日日一作愁日愁隨一線長此公為華州司功逢至日而有感也上四憶去年下四慨今日御牀至日視朝也鵷行同省故人也滿眼陪笑同列朝班趨走顛倒參謁郡主五句應四六句應三中二聨互為廻環愁隨日長因謫官而傷歎也未曰欲知曰何人皆對同朝諸公言杜臆得意之人必憶及窮愁故曰錯憶今按錯憶語帶尖酸不如却憶為含蓄也漢陶潛詩去歲家萬里蘇味道詩兹晨對兩闈後陰后紀從席前伏御牀世説王丞相披撥傳詔直至御牀前決疑要注殿堂之上惟天子居牀其餘皆席捧仰承也鶴注公祖審言詩季冬除夜接新年帝子王臣捧御筵亦顔氏家訓漢魏以來謂為甲夜乙夜丙夜丁夜戊夜云一更二更三更四更五更皆以五為節行説文鴛鷺立有行列故以喻朝班北齊樂曲鴛鷺成按公官定後詩老夫怕趨走率府且逍遙是以河西尉為趨走也可証趨走傷心為司功事矣近注謂趨走殿陛者非列子趨走作役漢孔融詩俯仰内傷心侯王逸楚辭注氤氲盛貌後馬武傳帝與功臣諸燕語從容詩笑語卒獲之又東方未明顛倒衣裳卿演義以冬至陽長陰消謂愁盡日此説無據按虞傳非窮愁不能著書此窮愁二字所本公夔州詩云年年至日長為客忽忽窮愁泥殺人以此証之則演義斷誤歲時記魏晉間宫中以紅線量日影冬至後日影添長一線之唐雜録唐宫中以女工揆日之長短比常日増一線工前代王道思郭青螺諸家狠駁杜詩疵句近年朱瀚又力辯杜之真贋以此題第一首為贋作云凢一題再賦者必具次第又須照應去歲兹辰全犯去年今日捧御牀在前入鵷行在後豈不顛倒五更三㸃語近俗視五夜漏聲催曉箭相去多少第三突出無來路第四惡罵五六冗腐七八句字攪亂皆非少陵本色憶昨逍遙供奉班去年今日胡云英華作冬至侍龍顔麒麟不動爐煙上上聲詩眼作轉孔雀徐開扇影還玉几一作座由來天北極朱衣只在殿中間孤城此日腸堪斷愁對寒雲雪黄生曰唐本作白滿山非是滿山次章想至日早朝而歎山城寥落也在四句分截身方跼蹐故想去歲逍遙爐煙扇影班次所見之儀玉几朱衣侍殿所對之人孤城雲雪氣象慘悽無復朝賀時景色矣趙大綱曰玩由來只在四字有許多悵望意天上之玉几猶是也欲侍龍顔得乎殿中之朱衣猶在也欲與朝班得乎語意𦂳注下文書沈佺期詩憶昨經過處注唐拾遺掌供奉諷諫漢高祖隆準而龍顔瀚麒麟即香爐孔雀即羽扇一事分兩層鍊句細潤合朱注宰臣兩省官對班於香案前百官班於殿庭扇皇帝升御座内謁者承㫖喚仗儀晉禮儀大朝㑹即填宫皆以金鍍九尺麒麟香爐唐衛志朝日殿上設黼扆躡席熏爐香案環左右矣初升御座則合扇既升則羽扇兩開而影唐六典尚輦局掌輿輦繖扇大朝㑹則孔雀扇一百五十有六分居左右舊翟羽扇開元初改為繡孔雀西京雜記天子玉几冬則加錦其上謂之綈几衣唐儀衛志朝日御史大夫領屬官至殿西廡從官未傳呼促百官就班唐㑹要開元二十五年李適之奏冬至大禮朝參并六品清官服朱衣以下通服袴褶惠連雪賦先言寒風愁雲後及微霰密雪此雲雪所本陶潛詩向夕長風起寒雲沒西山鮑照舞鶴賦雪滿羣山路逢襄陽楊少去聲府入城戲呈一作戲題四韻附呈楊四員外綰原注甫赴華州日許寄員外茯苓傳此詩當是乾元元年作鶴曰舊書楊綰綰字公權華陰人肅宗即位自賊中冒難赴行在除起居舍人知制誥歴司勛員外郎職方郎中寄語楊員外山寒少茯苓歸來稍暄一云候和暖當為去聲斸音祝青㝠翻動一作倒龍蛇一作神仙窟封題鳥獸形兼將老藤杖扶汝醉初醒全首皆屬寄語以律詩代短札質而有文暄暖取苓之候青㝠松林之色龍窟結根之深鳥獸成形之異藤杖亦華州所産者楊必嗜酒故結用戲辭鮑照詩寄語後生子又山寒野風急書易日以暄之記暖之以日月此暄暖二字所本唐華州上輔土貢茯苓茯神朱注圖經本草生大松下二月八月采陰乾屬師氏曰以刀刺地也説文斸斫也郭璞爾雅注鋤抱朴子謂地産茯苓上有清靈之氣近日吴沅云偃葢老松下有茯苓天色晴霽時松下有青氣一股斜注地邊掘之可得茯苓此即斸青㝠之説也柟張衡南都賦青𡨕芊眠公苦竹詩青㝠亦自守又高詩柟樹色㝠㝠江邊一葢青故知青㝠為樹色蛇海賦翻動成雷桃拾遺記崿谷陰生之樹其木有龍百獸之形傅𤣥賦根龍蛇而雲結兮王勃山亭序徴石髓於龍蛇之窟據王洙則云華山乃神仙所居今按龍蛇對鳥獸為工天台賦靈仙之所窟宅班婕妤𢷬素賦書既封而重題世説桓𤣥發厨取之封題如初史記龜策傳茯苓在菟絲之下狀如飛鳥形陶隠居本草茯苓皮黒而皺内堅白形如鳥獸龜鼈者良黄生曰此亦往東都時作八句一氣叙來酷似途次中逢止寄口信之語黄徹䂬溪詩話曰杜詩當為斸青㝠藥許隣人斸王路川云肯顧北山如慧約與公新崦斸莓苔韓退之云詩翁憔悴斸荒棘栁子厚云戒徒斸雲根雖一字之法亦有所本冬末以事之東都一本無此句湖城東遇孟雲卿復歸劉顥宅宿宴飲散因為醉歌鶴注當是乾元元年冬自華州遊東都作明年春方歸華書夢弼曰湖城縣地有鼎湖即黄帝鑄鼎之處唐湖城縣屬虢州漢湖縣後改湖城善唐詩紀事孟雲卿河南人與杜子美元次山最元次山送孟校書往南海云雲卿與次山同州里以詞學相友少次山六七歲疾風吹塵暗河縣行子隔手不相見湖城城東英華作東一作北一作南一開眼駐馬偶識雲卿面向一作况非劉顥為地主嬾回鞭轡成高一作城南宴首叙湖城遇孟復返於劉乎公飲畢而去又拉孟而回忘賔主形迹下二反言以見劉之賢大水經注河水又北逕湖縣東故曰河縣霍去病傳風起砂礫擊面兩軍不相見左鮑照詩行子心腸斷傳地主致餼劉侯歡一作歎我擕客來置酒張燈促華饌且將欵曲終今夕一云經今冬休語一作話艱難尚酣戰照室紅爐簇曙花從英華一作促曙光縈窗素月垂秋英華作秋注云集作文非練此叙顥宅留飲記其情景欵曲二句兼述劉侯勸客詞意之殷勤秦嘉詩念當久離别因念叙欵曲之淮南子魯陽公與韓戰戰酣日暮援戈而麾之日為返三舍宋武本紀神光照室盡明窗早花簇發其色鮮麗故比紅爐莊沈約郊居賦或縈而窺牖月賦素月流天謝詩秋月明如練東晳餅賦弱似春綿白若秋練天開地裂長安陌一作春寒盡春生一云紫陌春寒洛陽殿豈知驅車復扶又切同軌可惜刻漏隨更平聲箭人生㑹合不可常庭樹雞鳴淚如霰英華作霰一作綫末喜亂後逢孟不忍别離也中天開地裂傷長安昔陷寒盡春生此洛陽今復驅車途得遇同軌王路已平更箭夜深雞鳴天曙矣有此章三段各六句之京房易占天開陽不足地裂陰餘皆兵起下害上象唐史是年九月九節度兵伐安慶緒於鄴惠連詩春生鳷鵲樓夢弼曰長安有九衢三陌固謝阮籍詩驅車出門去班賦仰天路而同軌鳴陸倕漏刻銘銅史司刻金徒抱箭相張衡古别離雞庭樹枝客子振衣起别淚落如綫顧不能止盧世㴶紫房餘論云子美已起身出城矣于疾風暗塵中忽見雲卿喜出意外遂擕手復造當是時劉侯歡甚張燈促饌從殘局中翻出新興賔主友朋相視而笑此段光景至今使人廻環詩欲不佳得乎閿鄉姜七少去聲府設鱠戲贈長歌鶴注此乾元元年冬自華州至東都作故有東歸貪路之語賊邵注唐制縣主簿之下設尉一人專主水火盜之事即少府也姜侯設鱠當嚴冬昨日今日皆天風河凍味魚一作黄河美魚一作未漁一作冰魚一作取魚潘淳詩話作味魚朱注作鮇魚不易去聲得鑿冰恐侵河伯宫首言冬鱠難得魚邵注牛羊與魚之腥乾曰脯濕曰膾鱠即今之生肉生鮑照詩幸值嚴冬薄易蔡邕詩桑枯知天風也胡夏客曰北方河凍未漁不得此南方人所未知水經注鞏縣北有山臨城謂之崟㟶丘其下有穴謂之鞏穴言潛通浦北逹於河直穴有渚謂之鮪渚成公綏天河賦鱣鯉王鮪莫來遊周禮春薦鮪然非時及他處則無又潘淳詩話韓玉汝云河中府三面是黄河惟有味魚似鯽而肥短味亦美杜詩味魚謂此朱注本草有鮇魚出黄河口為詩二之日鑿冰冲冲抱朴子馮夷渡河死天帝署河伯饔人受魚鮫人手洗魚磨刀魚眼紅無聲細下去聲飛碎一作素雪有骨已刴都唾切觜胡氏作胔春葱落碪砧同何曾音層白紙濕放筯未覺金盤空二句舊在老翁之下今依杜臆改正偏勸腹腴愧年少去聲軟炊香飯一作粳縁老翁此記鱠精而味美魚饔人治庖者鮫人捕者冬日魚鮮其眼多紅飛碎雪比其色白觜春䓤形其質脆紙何濕言其乾潔盤未空言有留餘碪几砧也放停筯也老杜臆設鱠之時特留腹腴一臠以享尊客公傷己之故愧於年少香飯合席共飡老人則宜於軟似乎獨縁老翁者細切鑾刀若飛周禮天官有内饔外饔西征賦饔人述異記南海有鮫人室水居如魚楚辭貫魚眼與珠璣韻七啟纍如疊縠散若飛雪輕隨風飛刃不轉切廣刴剉也杜臆觜春葱啄鱠如葱之脆觜音追啄也胡夏客作胔胔肉也言去骨留肉而雜以春葱内則鱠春用葱夏用芥鱠在嚴冬而云春䓤用成語耳切邵注凢作鱠以灰去血水用紙以隔之齊民要術鱠不得洗洗則鱠濕辛延年詩金盤鱠鯉魚腴黄希曰記羞魚冬右腴説者謂冬時陽氣在魚腹故炊香飯即記五十異粻之意維摩經香積如來以一鉢香飯恒飽衆生庾信詩石髓香如飯新歡便飽姜侯德清觴異味情屢極東歸貪一作貧路自覺難欲别上上聲馬身無力可憐為人好心事於我見子真顔色不恨我衰子貴時悵望且為去聲今相憶末叙贈姜之意服上四感姜情重而欲别不忍下四姜意真而别後相思往姜葢初見而欵留者故云新歡不杜臆貪路本宜急今反覺難行而上馬無力者以忍相别故也此有戲意為人好心事以俗語入詩乃對姜少府言耳心在中而色見於外曰於我真見其鍾情而非泛愛他時我衰子貴不足為恨但回憶今日之交歡難再終不能不悵望耳此極感恩之語玩此詩拈韻知古人東冬通用也魏此章首段四句下兩段各八句以德北童謠黄花勢欲落清觴滿杯酌詩既飽異味見前甄鮑照詩東歸難再度世潘岳客含議行者貪路不魏后詩想見君顔色詩喬𤣥謂曹公吾老矣見君富貴當以子孫相累戲贈閿鄉秦少去聲府吴若作少公一作翁短歌與上首同時之作朱注少公即少府國吏補張旭為常熟尉有老父過狀判去不數日復至乃怒責之老父曰實非論事覩少公筆跡竒妙貴為篋笥之珍耳可証唐人稱尉為少公也太白集有秋日餞陽曲王贊公賈少公赴上都序去年行宫當一作守太白朝音潮回君是同舍客同心不減骨肉親每語見許文章伯今日時清兩京道相逢苦覺人情好昨夜邀歡樂音洛更無多才依舊能潦一作傾倒四句轉韻上憶往日交情下喜中途歡聚舊樂更無謂更無如此之樂秦抱才而為下吏故曰依潦倒杜臆末句有戲意如邵注天子在外之居曰行宫易史記司馬相如傳相遊梁孝王今與諸生同舍二人同心少吴志注張紘見陳琳武庫賦嘆美之琳答曰河北率文章易為雄伯王充論衡文詞之伯孫逖詩海内文章伯張苦覺好乃當時方言文多才多藝出尚書金縢語林華謂陸機曰人之為患其才少而子患才多廢嵇康書知吾潦倒不切事情抱朴子潦倒疎緩而致弛此乃波頽瀾倒之意據北史崔瞻傳魏天保以後重吏事謂容止藴藉者為潦倒而瞻終不改焉李鄠侯古切縣丈人胡馬行鶴注此乾元元年冬往東都時作觀洛陽再清句可見長朱注鄠縣屬安丈人駿馬名胡騮前年避賊一作胡過金牛廻鞭却走見天子朝飲漢水暮靈州首言馬行迅捷説起便有竒氣從亂離顛沛過金牛扈從明皇也見天子趨謁肅宗也却走退走也金揚雄蜀土記秦欲伐蜀而無路遣人告蜀王曰秦有牛其糞成金使蜀迎之蜀王使五丁力士開山路通秦遂伐蜀取其國因號其國曰金牛舊唐書梁州金牛縣漢葭萌地武德三年分綿谷縣置屬褒州後州廢屬梁州郡國志漢水出嶓冢山在金牛縣東二十八里元和舊唐書靈州大都督府屬闗内道天寶元年改為靈武郡乾元元年復為靈州天寶十五載七月肅宗即位靈武故廻鞭見之自矜胡騮竒絶代乘出千人萬人愛一聞説盡急難去聲才轉益愁向駑駘輩此見其濟難之功躍趙注急難才如劉備的顱過檀溪以免劉表之追劉牢之馬跳五丈澗以脱慕容之逼此處指避胡一事言愁向駑駘自歎所乗者皆疲馬也楚辭策駑駘而取路頭上鋭耳批秋竹脚下高蹄削寒玉始知神龍别有種上聲不比俗一作凢馬空多肉此寫其神駿之姿耳鋭蹄堅筋勝於肉此良馬之相也小黄柏仁龍馬頌耳如剡筒目象明星齊民要術耳欲而鋭如削筒太宗十驥頌耳根纎細杉竹難方高相馬經相馬之法先三羸五駑大蹄緩耳一駑也蹄注見二巻削寒玉言其堅可以削玉也民北史隋煬帝紀置馬牧於青海渚中以求龍種齊要術望之大就之小筋馬也望之小就之大肉馬也洛陽大道時再清累上聲日喜得俱東行鳳臆龍鬐英華作鬚一作鱗一作麟鬐未易去聲識側身注目長風生末言同行見馬結歸李丈果鳳臆龍鬐一時未易測識但見側身注目足下風生是絶塵之驥矣杜臆馬不易識以况相士之難此章四段各四句宛吴越春秋山川重秀天地再清膺晉載記苻堅時大獻千里駒皆汗血朱鬛五色鳳麟身顧雲韓幹馬障歌麟鬐鳳臆直相似觀兵此乃乾元元年冬在東都觀兵也炅是年九月命朔方節度使郭子儀淮西魯鎮西北庭李嗣業等七節度將步騎二十萬討安慶緒李光弼王思禮助之號九節度十一月圍鄴城次年正月嗣業卒於軍中三月史思明救鄴官軍大敗通鑑至德二載二月安西北庭及拔汗那大食諸國兵至凉鄯北庭送壯士貔虎數尤多精鋭舊無敵邊隅今若何妖氛擁白馬元帥待琱一作彫戈莫守鄴城下斬鯨遼海波上四觀北庭之兵下四畫攘邊之策兵顧注北庭謂鎮西北庭節度使李嗣業時綂四鎮之故貔虎尤多郭子儀前為副元帥收復東京今望朝廷以元帥授子儀故曰待琱戈其時頓兵鄴城兵無綂制葢早知其有覆軍之患矣徒鄴城即相州遼海與范陽相近即思明巢穴公詩司急為下幽燕與此詩同意後漢袁安傳今朔漠既定宜令南單于反其北庭唐書地理志北庭大都䕶府長安二年置屬隴右道梁武帝淨業賦壯士貔虎器甲精鋭赴朱注邊隅謂鄴城凢臨敵境即為邊如新婚别守邊河陽是也晉書史臣曰舒元出莅邊隅欽其明德事曹植魏德論神戈退指則妖氛順制白馬用侯景比安史諸寇也國語穆公横琱戈出見使者漢書古鼎銘賜爾鸞旂黼黻琱戈注琱戈鏤刻之戈孫綽賦斬鯨鯢於滄波桓溫表管寜之黜遼海遼東南臨渤海故曰遼海朱鶴齡曰是時李光弼與諸將議思明得魏州而按兵不動此欲以精鋭掩吾不備也請與朔方兵同逼思明於魏州彼懲嘉山之敗必不敢輕出曠日引久則鄴城必拔矣魚朝恩不可而止安禄山事跡云汾陽以諸將謀議不協乃與季光琛同謀灌城公詩斬鯨遼海波正與光弼意合言當直搗幽燕傾思明之巢穴不當老師鄴城之下也憶弟二首原注時歸在河南陸渾莊陸唐書陸渾縣屬河南府又伊闕縣有渾山顧注公乾元元年六月自左拾遺出為華州司功冬晚間至東都時安慶緒棄東都而走河南已復故公得暫往洛陽故居此詩乃二年春作也喪去聲亂聞吾弟飢寒傍去聲濟上聲州人稀書一作吾不到兵在見何由憶昨狂催走無時病去憂即今千種上聲恨惟共水東流公至東都而憶弟也上四歎亂後分離下四傷亂初奔散輾轉相憶故憂結而成恨憶昨二句乃十字句法謂自昔奔走以來憂弟而病無能解去也洛陽在西濟州在東故愁恨與水而俱東後漢書飢寒道路縣唐書濟州屬河南道天寶十三載廢濟州以所管五入鄆州邵注濟州即今山東濟寧州南漢書韓信傳然則何由氏易林狂走蹶足楚辭狂顧行王逸注狂猶遽也吕春秋水泉東流日夜不休且喜河南定不問鄴城圍百戰今誰在三年望汝歸故園花自發春日鳥還飛斷絶人煙久東西消息稀此申上章所憶之意上四望弟歸鄉承前兵在見何由下四望弟音書承前人稀書不到洛陽初定故轉憂為喜花鳥空存則喜處仍憂矣幸鄴城之戰闗於河北存亡曰不問者以初見家鄉為故不暇計及耳花發鳥飛即濺淚傷心意故梁戴暠詩將軍一百戰人何遜詩獨守園秋曹植詩千里無烟葛常之韻語陽秋老杜寄身於干戈騷屑之中感時對物則悲傷係之如感時花濺淚是也故其作詩多用自字田父泥飲云步履隨春風村村自花栁遣懐云愁眼看霜露寒城菊自花憶弟云故園花自發春日鳥還飛日暮云風月自清夜江山非故園滕王亭子云古牆猶竹色虚閣自松聲宿白沙驛云萬象皆春氣孤槎自客星古人對景言情各有悲喜而自不能累無情之物也得舍弟消息此與前二首葢先後同時之作亂後誰歸得他鄉勝故鄉直一作若為心厄苦久念一作得與刋作汝存亡汝書猶在壁汝妾一作室已辭房舊犬知愁恨垂頭傍去聲我牀此叙始終憶弟之情未得消息直欲同與存亡患弟身難保也既得消息又欲藉犬傳書恨已情莫逹也語杜臆他鄉亂而故鄉尤甚故曰他鄉勝故鄉總是苦存亡乃厄苦之故上句因下辭房即書中之語下句因上各汝書汝妾並提律中帶古此杜公縱筆古詩他鄉異縣楚辭去故鄉而就逺兮苦前秦録慕容冲逼長安苻堅登城責之冲曰既厄奴欲取爾相代蔡琰詩存亡永乖隔機潘岳詩遺挂猶在壁犬顧注陸機有駿犬名曰黄耳在洛久無家問笑語曰汝能齎書取消息否犬尋路至家得報還洛公時在洛故用陸事入世説乃反顧翅垂頭視之如有懊喪意詩豳風我牀下不歸天寶十四載冬禄山陷河北諸郡公之從弟必死於十五載至乾元二年為三年是春公在東都作離顔延之秋胡詩生為久别死為長不歸河間尚戰一作征伐汝骨在空城從去聲弟人皆有終身恨不平數所主切金憐俊邁總角愛聰明面上三年土春一作秋風草一作吹又生通首俱是叙事言情獨於結尾寫景收題各兩句轉意喪亂之感死生之戚生前之念身後之悲備盡一詩之中語意悽切謀唐書瀛洲河間郡屬河北道孫綽庾亮碑戰伐之仁所恥聞蔡皆有用論語人皆有兄弟錢楚辭失時而志不平夢弼曰數金謂幼時識數也公偶然憶此一事憐而愛之胡夏客曰數金用河間姹女數錢語以應河間蕭子顯詩暝數河間錢申涵光謂數金當是數齡却與總角意重倫世説袁躭俊邁多能北周書庾信幼而俊邁聰明絶詩總角丱兮注總角聚兩髦也晉書謝安傳及總角神識沈敏不面土墳土之土記朋友之墓有宿草而哭焉贈衛八處上聲士鶴注處士隠者之號以有處士星故名唐有隠逸衛大經居蒲州衛八亦稱處士或其族于蒲至華止一百四十里恐是乾元二年春在華州時至其家作山岳指華岳言偽朱注衛處士未詳師氏引唐史拾遺作衛賓乃書杜撰今削之東方朔設難今世之處士時雖不用魁然無徒廓然獨居人生不相見動如參與商今一作此夕復扶又切何夕共此燈燭光一云共宿此燈光滑首叙今昔聚散之情交史記人生一世間稽傳淳于髠曰朋友遊久不相見此陸機詩形影參商乖音息曠不達帳詩今夕何夕見邂逅漢書外戚傳張燈燭設幃史記甘茂傳貧人女曰子之燭光幸有餘少去聲壯能幾時鬢髪各已蒼訪舊魯作問半為鬼驚胡云一作嗚呼熱中膓焉音烟知二十載上聲重平聲上上聲君子堂昔别君未婚男一作兒女忽成行音杭怡然敬父執問我來何方次言别後老少之狀鬢秋風辭少壯幾時老奈何陶潛詩髪各已白魏文帝與吴質書親故姓名半為鬼録驚近世胡儼曰嘗於内閣見子美親書此詩字甚怪偉呼熱中膓作嗚呼熱中膓列子内熱生病魏文帝詩斷絶我中膓九江淹詩去鄉二十載王粲詩高㑹我子堂王沈賦賓穆以成行也記見父之執注父之執同志之友吴筠詩問我來何遲問答未及已從陳本一作乃未已驅兒一作兒女羅酒漿夜雨剪春韮新一作晨炊間宋景文手抄本作聞黄粱主稱㑹面難一舉累上聲一作䝉十觴十一作百觴亦不醉一作辭感子故意長明日隔山岳世事兩茫茫末感處士欵情因而惜别也此漫齋詩話云怡然敬父執問我來何方若他人説到下須更有數句此便接云問答未及已驅兒羅酒漿直有抔土障黄流氣象黄此章首段四句下二段各十句陶潛桃花源詩序髮垂􅁂竝怡然自樂見漁人乃大驚問所從來具答之便邀還家設酒殺雞作食逺注此段純用其意詩維北有斗不可以挹酒漿晚南史文惠太子問周顒菜食味顒曰春初早韭秋末菘蔡邕獨斷春薦韭卵胡夏客曰北人炊飯雜米菽故用間字長曹植詩主稱千金夀客奉萬年醻古詩道路阻且㑹面安可知吴都賦夤縁山岳之岊四晉書阮籍遺落世事古詩顧何茫茫周甸注前曰人生後曰世事前曰如參商後曰隔山嶽總見人生聚散不常别易㑹難耳洗兵行杜臆作行舊作馬潰鶴注當是乾元二年仲春作按相州兵在三月壬申乃初三日其作詩時兵尚未敗也原注收京後作淇朱注公華州試進士策問云山東之諸將雲合上之捷書日至詩葢作於其時也中興諸將去聲收山東捷書夜一作夕一作日報清晝同河廣傳聞一葦過胡危命在破竹中祗殘鄴城不日得獨任朔方無限功京師皆騎汗血馬回紇餧弩委切肉蒲萄宫已喜皇威清海岱常思仙仗過崆峒三年笛裏闗山月萬國兵前草木風此聞河北捷音而料王師之必克以鄴城之師漫無統制故欲獨任子儀收戰功又恐肅宗還京漸生逸豫故欲其念起事艱難而思將士之勤苦下四句有規諷意杜臆軍士從征已經三載曰三年笛裏悲之也㑹兵鄴城如風捲葉曰萬國兵前喜之也後漢明帝紀先帝受命中興東觀漢記上㑹諸將已趙注山東河北也安禄山反先陷河北諸郡至二京收慶緒奔於河北梁武帝集竒謀間出捷書日至續博物志露布捷書之别名以帛書揭竿夜與晝同見捷音可信詩誰謂河廣一葦杭之杜預傳今兵威已振譬如破竹數節之後迎刃而解渡祗殘但餘也通鑑乾元元年十月郭子儀自杏園河東至獲嘉破安太清太清走保衛州子儀進圍之遣使告捷魯炅自陽武濟李光琛崔光逺自酸棗濟與李嗣業皆㑹子儀於衛州慶緒悉舉鄴中之衆七萬來救子儀復大破之獲其弟慶和殺之遂拔衛州舊唐書相州屬河北道武德元年以魏郡置相州天寶元年改為鄴郡乾元二年改為鄴城通鑑慶緒走子儀等追之至鄴許叔冀董秦王思禮及河東兵馬使薛兼訓皆引兵繼至慶緒收餘兵拒戰於愁思岡又敗慶緒慶緒乃入城固守子儀等圍之郭邠志邠州始鎮靈州謂之朔方軍舊唐書禄山反以子儀為靈武太守充朔方節度使自陳濤斜之敗帝惟倚朔方軍為根本居公羊傳京師者天子之居也京大也師衆也天子之必以衆大稱之霑漢章帝詔宛馬血從前髆上小孔中出武帝天馬歌赤汗今親見其然漢張耳傳如以肉餧虎何益宫匈奴傳元帝元夀二年單于來朝舍之上林苑蒲萄通鑑是年八月回紇遣其臣骨啜特勒及帝德將驍騎三千助討安慶緒上命朔方左武鋒使僕固懐恩領之汗血馬葡萄宫當指此事魏志陳琳曰將軍總皇威握兵要西征賦耀皇威而講武事舉禹貢海岱惟青州海岱與燕薊接壤沈約詩遊汾仙仗括地志笄頭山一名崆峒山在原州平凉縣西百里朱注肅宗自馬嵬經彭原平凉至靈武合兵興復道必由崆峒及南回也亦自原州入則崆峒乃鑾輿往來之地闗樂府解題闗山月傷離别也周王褒詩無復漢地山月惟有漢北冀城雲士晉載記苻堅與苻融登城而望王師見部陣齊整將精鋭又北望八公山草木皆類人形風聲鶴唳疑以為兵成王功大心轉小郭相去聲謀深一作謀猷一作深謀古來少司徒清鑒懸明鏡尚書氣與秋天杳二三豪俊為去聲時出整頓乾坤濟時了東走無復扶又切憶鱸魚南飛覺有安巢一作枝鳥青春復隨冠冕入紫禁吴本作駕正耐煙花繞鶴駕通宵鳳輦備雞鳴問寢龍樓一作蛇曉此言命將得人而喜王業之方興王成王廣平王俶也郭相子儀也司徒李光弼也尚書思禮也東走句見士慶彈冠南飛句見民䝉安宅青春紫禁朝儀如故鶴駕雞鳴帝修子職也唐書至徳二載十二月廣平王俶進爵楚王乾元元年二月徙封成王憂劉晝慎言篇楚莊王功立而心懼晉文公戰勝而色非憎榮而惡勝乃功大而心小居安而念危也域魏志賈詡傳策謀深長抱朴子運清鑒於𤣥漠之乂隋書薛道衡每稱高構有清鑒秋世説何㸃嘗目陸慧曉心如明鏡書鹽鐵論義高於天公哀思禮詩爽氣春淅瀝與尚氣爽語合公鶡冠子徳萬人者謂之俊德千人者謂之豪史記沛時時問邑中豪俊史記蒯通曰今范陽令宜整頓其士卒以守戰者也酈易乾坤定矣兵晉武帝告上帝文撥亂濟時史記生傳齊王引東走世説張翰見秋風起乃思吴中蓴羮鱸魚遂命駕東歸楚魏武帝詩月明星稀烏鵲南飛古詩越鳥巢南枝辭青春受謝謂風俗通黄帝始製冠冕禁天子之宫紫微故謂宫中紫禁謝莊哀誄收華紫王融詩烟花雜如霧通赤城謝省曰鶴駕東宫所乘鳳輦天子所御言鶴駕宵備鳳輦以迎上皇雞鳴報曉趨龍樓以伸問寢也鶴漢宫闕疏白鶴宫太子所居藝文類聚太子晉乗白仙去故後世稱太子之駕曰鶴駕禁曰鶴禁通典隋太子左右監門率唐垂拱中改為鶴禁衛鳳唐書儀衛志輦有七一曰大鳳輦隋煬帝詩翠霞承輦日文王世子雞初鳴至於寢門外問内豎之御者曰今安否如何漢書成帝為太子初居桂宫嘗急召太子出龍樓門不敢絶馳道張晏曰門樓上有銅龍若白鶴飛㢘之為名也雍録桂宫南面有龍樓門博議史肅宗即位下制曰復宗廟於函雒迎上皇於巴蜀導鑾輿而反正朝寢門以問安朕願畢矣公詩正用詔中語攀龍附鳳勢一作世莫當天下盡化為侯王汝等豈知蒙一作象帝力時來不得誇身强闗中既留蕭丞相去聲幕下復扶又切用張子房張公一生江海客身長九尺鬚眉蒼徵起適遇風雲㑹扶顛始知籌策良青袍白馬更何有後漢今周喜再昌此嘆扈從者濫恩望宰相得人以致太平杜臆當時封爵太濫甚至以官賞功給空名告身凢應募者一切皆金紫公故傷之其稱張鎬有扶顛籌策語人或疑之考史至德二年四月罷房琯而相鎬至次年二月因論史思明不可假威權又論許叔冀臨難必變上不喜且不事中要故罷相已而思明果反叔冀果降賊其料事之審如此至兩京收復俱在鎬相時孰非宰相之功耶夢弼注青袍白馬言思明慶緒可平後漢今周以漢光周宣比肅宗也漢書傳贊攀龍附鳳竝乗天衢雲起龍驤化為侯王吴志魯肅傳是烈士攀龍附鳳馳騖之秋毫晉書荀朂傳汝等亦當宦達人間前漢張耳傳秋皆帝力也者陶潛詩時來茍㝠合漢漢書蕭何發闗中老弱未傳悉詣軍史記蕭何傳王引兵東定三秦何以丞相留收巴蜀使給軍食宗朱注蕭丞相未知何指蔡夢弼謂杜鴻漸考唐書肅按軍平凉鴻漸建朔方興復之謀且録軍資器械儲廥上之肅宗喜曰靈武吾之闗中卿乃吾蕭何也舊注云京師既平以蕭華留守故比之蕭何勝戰國策樂羊坐於幕下注漢高帝紀運籌帷幄中决千里外子房功也朱張子房謂張鎬至德二載五月琯罷相以鎬代之自舊唐書張鎬風儀魁岸廓落有大志好談王伯大畧褐衣拜左拾遺𤣥宗幸蜀徒步扈從𤣥宗遣赴行在至鳳翔奏議多有𢎞益拜諫議大夫尋代房琯為相隠逸傳放情江海説苑孔子猶江海也八後漢文苑傳趙壹身長九尺美鬚豪眉雲臺二十將論咸能感㑹風雲王粲詩遭遇風雲㑹托身鸞鳳間侯徐陵詩力弱不扶顛謠老子善計不用籌策南史景傳先是大同中童曰青絲白馬夀陽來景渦陽之敗求錦朝廷給以青布悉用為袍采色尚青景乗白馬青絲為轡欲以應謠庾子山哀江南賦桀黠構扇慿陵畿甸青袍如草白馬如練寸地尺天皆入貢竒祥異瑞爭來送不知何國致白環復扶又切道去聲諸山得銀甕隠士休歌紫芝曲詞人解下戒切西漢叢語善本作角撰清河一云河清頌田家望望惜雨乾音干布糓處處催春種淇上健兒歸莫嬾城南思婦愁多夢安得壯士挽天河淨洗甲兵長不用末記禎符迭見欲及時收功以慰民心也段張逺注前六頌其己然後六禱其將然此章四各十二句地鶴注寸地尺天用黄庭經寸田尺宅語顔延之詩亘稱皇罄天作主班固典引窮祥極瑞者皆來坰牧應竹書紀年帝舜九年西王母來朝獻白環玉玦神瑞圖王者宴不及醉刑罰中則銀甕出焉孝經援契神靈滋液有銀甕不汲自滿序莊子古之所謂隠士者紫芝見本巻昭明文選詞人才子趙注是歲七月嵐州合闗河黄河三十里清如冰葢收京之祥此實事也南史宋元嘉中河濟俱清當時以為瑞鮑照作河清頌其序甚工有楊惲報孫㑹宗書田家作苦按史乾元二年春旱故田家望雨之句王僧孺詩思君不得見望望獨長嗟經爾雅鳴鳩鴶鵴注今之布糓也江東人呼為獲糓禽鳴鳩戴勝布糓也農事方起此鳥飛於桑間云五榖可布種也生吴越春秋計􅒍曰春種八谷鍾憲詩處處春雲朱注淇水在衛地衛州與相州相隣淇上健皃指圍鄴之兵城南謂長安城南詩送我乎淇之上矣古樂府健兒須快馬杜臆健兒莫嬾速其成功也思婦愁夢從東山詩婦嘆於室來以思家之至情動之也曹植詩借問女何居乃在城南端六王徽詩思婦臨高臺重李尤歌安得壯士翻日車韜武王問太公雨輕至軫何也曰洗甲兵也説苑武王伐紂風霽而乗以大雨散宜生曰此非妖與王曰非也天洗兵也朱鶴齡曰中興大業全在將相得人前曰獨任朔方無限功中曰幕下復用張子房此是一詩眼日使當時能專任子儀終用張鎬則洗兵不用旦夕可期而惜乎肅宗非其人也王荆公選杜工部詩以此詩壓巻其大指不過如此若𤣥肅父子之間公爾時不應遂加譏切也沈夀民曰兩京克復上皇還宫臣子爾時當若何歡忭乃逆探移仗之舉遽出誹刺之詞子美胸中不應峭刻若此王嗣奭曰此詩四轉韻一韻十二句句兼排律自成一體而筆力矯健詞氣老蒼喜躍之意浮動筆墨間唐汝詢曰洗兵馬一篇有典有則雄渾濶大足稱唐雅識者詳味當不在老將行下蔡絛曰作詩者陶冶物情體㑹光景必貴乎自得葢格有高下才有分限不可强致也譬之秦武陽氣葢全燕見秦王則戰慄失色淮南王安好為神仙謁帝猶輕其舉止此豈由素習哉予謂少陵太白當險阻艱難流離困躓意欲卑而語未嘗不高至於羅隠貫休輩得意偏霸誇雄逞竒語欲高而意未嘗不卑乃知天稟自然有不能易也吴江潘耒曰洗兵馬一詩乃初聞恢復之報不勝欣喜而作寜有暗含譏刺之理上皇初歸肅宗未失子道豈得預探後事以責之詩人以忠厚為本少陵一飯不忘君即貶謫後終其身無一言怨懟而錢氏乃謂其立朝之時即多隠刺之語何浮薄至是噫此其所以為牧齊歟又曰天子之孝在乎安國家保宗社明皇既失天下肅宗起兵朔方收復兩京再造唐室其孝亦大矣晚節牽於婦寺省覲濶疎子道誠有未盡若謂其猜忌上皇并忌其父之臣有意剪鋤則深文矣移宫倉卒上皇不樂容或有之幾為兵鬼之言出自力士傳稗官片語乃据以實肅宗之罪至比之商臣楊廣論人當若是耶房琯雖負重名而鮮實效喪師辱國門客受賕罷相亦不為過子美論救固是為國惜賢雖蒙推問旋即放免踰年乃謫官不知坐何事今言其坐琯黨亦臆度之辭耳子美大節在自拔賊中歸行在不在救房琯也錢氏直欲以此為杜一生氣節欲推高杜則極贊房因極贊房遂痛貶帝明末黨人多依傍一二大老脱失路輒言坐某人故牽連貶謫怨誹其君無所不至此自門戸習氣杜公心事如青天白日安有是哉以此推之牧齋而秉史筆三百年人物枉抑必多絳雲一炬有自來矣杜詩詳註巻六
