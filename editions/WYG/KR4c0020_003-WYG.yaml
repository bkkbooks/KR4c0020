body:
  text: 杜詩詳註巻三翰林院編修仇兆鰲撰奉陪鄭駙馬韋曲二首杜臆韋曲在京城三十里貴家園亭侯王别墅多在於此乃行樂之勝地然此遊必在天寶之季禄山未亂之先故花蕃盛如此編者誤置在乾元初耳韋曲花無賴家家惱殺人緑與醁同樽須一作雖盡日白髪好禁平聲一作傷春石角鈎衣破藤梢一作枝刺七亦切眼新何時占叢竹頭戴小烏巾首章對韋曲春景而動歸隠之懐上四惜花之情反言以誌勝下四尋幽之意託言以寄慨時葢獻賦不遇有感而發歟趙汸注起用俗語豪縱跌宕杜臆此詩全是反言以形容其佳勝曰無賴正見其有趣曰惱殺人正見其愛殺人曰好禁春正是無柰春何曰鈎衣刺眼本可憎而轉覺可喜説得抑揚頓挫極生動之致多漢髙帝為紀始大人常以臣亡賴注江淮之間謂小兒詐狡獪亡賴注沈約詩憂來命緑樽蕩揚雄河東賦盡日盛酒趙謂白髮禁春老不流也然禁春須用樽酒意中實不能禁矣朱注云禁是禁當之禁竹仇池記石角外向占據也齊顧則心詩蕭蕭叢映南史劉巖隠逸不仕常著緇衣小烏巾野寺垂楊裏春畦亂水間美花多映竹好鳥不歸山城郭終何事風塵豈駐顔誰能與公子薄暮欲俱還次章記韋曲諸勝有超然世外之意上四寫景羡村居幽事下四敘情慨城市塵縁公久住長安而未得一官故曰城郭終何事風塵豈駐顔趙氏以為拾遺時所作誤矣中公子指駙馬輩俱還反照陪遊三輔黄圖長楊宫有垂楊數畝好鮑照詩春畦及耘藝朝又云懸裝亂水區謝朓詩鳥葉間鳴曹植詩雲不歸山杜臆好鳥不歸山言鳥猶知戀引起下截意先陸機詩京洛多風塵神仙傳淮南王初見八公曰生年老似無駐顔之術注淮南子薄暮而求之薄廹也王嗣奭曰大抵髙人貴介所好不無濃淡喧寂之殊如陶學士以取雪烹茶為清事而党太尉以銷金帳下淺斟低唱為樂事然不知其為伐性之斧斤也風塵豈駐顔所以箴之者至矣重過俱平聲何氏五首鶴曰前云千章夏木清初遊在夏此云春風啜茗時重遊在春矣前屬天寶十二載則此當是天寶十三載詩又云何日沾微禄乃是未授官時也若十四載則已授河西尉又改率府胄曹矣問訊東橋竹將軍有報書倒衣還命駕髙枕乃吾廬花妥吴氏音墮鶯捎所交切蝶溪喧獺趂魚重平聲來休沐地真作野人居此章為重過而作又是總起上四重過之由下四重過之景洪仲注去夏之笋隔年成竹故云問竹句倒衣命駕望公朝至髙枕吾廬要公夜宿杜臆將二作報書中語是也舊云公視何園為吾廬㡬於冐認已有矣獺花妥溪喧林中見聞二句倒裝本言鶯捎蝶而花墮趂魚而溪喧耳黄生曰野人居承休沐地皆就將軍言與長孫正隠詩歌鍾雖戚里林藪是山家同意舊以野人居屬公自言者非按後章有眈野趣之句知黄説不易矣訊曰還曰重俱㸃重遊橋古詩為焦仲卿妻幸可廣問顧注東橋即第五問訊云竹此暗翻看竹何須問主人事司陳琳樂府報書往邊地詩東方未明顛倒衣裳馬相如美人賦命駕而東晉書吕安與嵇康友每一相思千里命駕希國策未得髙枕而卧也陶潛詩吾亦愛吾廬黄曰曲禮正義云妥下也蘇氏云闗中人謂落為妥三山老人曰花妥即花墮也捎取也掠也月令獺祭魚沐漢書張安世傳休沐未嘗出漢制内臣五日一出休注言休息沐浴也庾信小園賦名為野人之家盧元昌曰天寶間五家競開第舍一堂之費動踰千萬至且撤韋氏宅為虢國居又於親仁坊起禄山第莫不窮極壯麗公於將軍特表曰野人居取其儉僕以風世也山雨樽仍在沙沈榻未移犬迎曾音層宿客顧陶本作犬憎閒宿客鴉䕶落巢兒雲薄翠微寺天清雍録作寒皇舊作黄趙定作皇子陂向來幽興去聲極步屧一作屣一作屐向從吴本舊作到邵作過東籬次章備寫重來景事樽榻依然言主人能置酒而留賔犬迎客去年習見也鴉䕶兒今春乳子也四句皆重遊意寺前雲薄陂上天清方喜雨後初晴故幽興勃然遂向東籬而覧勝末句起下平臺之遊雨中對酒故言樽在塵封榻上故云沙沈落巢謂新雛生落巢中或云鴉兒落地或云新巢落成俱非此章幽興與前遊首章相應王融詩潺湲石溜㵼綿蠻山雨聞太尹式詩雲薄鱗逾細朱注唐書長安縣南五十里和谷有太和宫武德八年置貞觀十年廢二十一年復置曰翠微宫籠山為苑元和中以為寺長安志翠微宫在萬年縣外終南山之上公詩已云翠微寺恐非元和間所改也於晉曹毗詩天清月暉澄水經注潏水上承皇子陂樊川其地即杜之樊鄉也十道志秦𦵏皇子起冡陂北原上故名皇子陂隋改永安唐復舊杜臆名勝志杜曲在西安府之東子美舊居韋曲在城南韋曲之東有鄭莊即鄭䖍所居西有墖坡何將軍之山林也皇子陂在韋曲之西此以皇對翠乃借對法岑參早朝詩紫陌皇州作對亦法也宋書袁粲為丹陽尹嘗步屧白楊郊野間説文屧履中薦也陶潛詩采菊東籬下此章後四句顧宸謂翠寺皇陂公幽興所注故過東籬而往遊於此其説非也若果遊其地不應輕㸃陂寺况翠寺在南皇陂在西又不當向東籬而迂道周篆謂翠寺皇陂前遊之幽興已極故過東籬而别尋佳勝此説亦非若果屬前遊何不於前十章敘入且昆池栁渚俱經旁記何獨遺此勝地耶原來翠寺皇陂只言遙望之景詩意主在雲薄天清晴光可愛以逗起末句耳按顧注此章云向來幽興極是追憶從前下章云自今幽興熟是預期後日兩章𦂳相照應杜臆疑幽興叠見欲改作遊興極反失作者之㫖落日平臺上春風啜茗時石欄斜㸃一作照非筆桐葉坐題詩翡翠鳴衣桁下浪切蜻蜓立釣絲自今幽興去聲熟一云自逢今日興來往亦無期三章叙平臺之遊平臺記地春風記時㸃筆題詩平臺之趣寫得蕭散翡翠蜻蜓春時之景寫得工細六句皆今日幽興來往無期欲常覧此勝也曰極曰熱又㸃重遊張率詩平臺寒月色池水愴風威春趙汸疑後遊在夏因改春風作薰風今依鶴注直是遊趙云置硯於石欄而題詩於桐葉杜臆硯在石欄而身坐臺上故須斜㸃筆㸃筆以筆濡墨也説文翡赤羽雀翠青羽雀張正見詩竹竿鳴翡翠懸韻㑹桁竹竿也顧云晒衣之桁古樂府還視桁上無衣楚國策蜻蜓六足四翼飛翔乎天地之間深詩其釣維何維絲伊緡共陳子昻詩山興轉幽陶潛詩披草來往始而雨既而晴漸至日落盡一日之興矣故下章不復言遊而惟稱美將軍布置次第俱秩然有條頗怪朝平聲參懶應平聲耽野趣長雨抛金鎻甲苔卧緑沈槍手自移蒲栁家纔足稻粱看平聲君用幽意白日到羲皇四章美將軍逸興將軍懶於朝參者因躭野趣之長也抛甲卧槍見朝參之懶移栁足粱見野趣之長末引淵明事以方其髙致見抛甲於雨卧槍於苔即前遊不好武意杜臆自移不耽驕貴纔足見甘於淡泊白日羲皇言可神遊千古不須髙卧也乃翻用陶語朝此章幽意與前遊末章相應王右軍帖吾怪足下參少晚使謝惠連詩蕭疎野趣生綫薛蒼舒曰車頻秦書符堅熊邈造金銀細鎧金為以縲之今謂甲之精細者為鎻子甲言相銜之宻也唐六書甲之制十有三今明光光要細鱗山文鳥鎚鎻子皆鐡甲也崔顥詩錯落金鎻甲深武庫賦緑沈之槍西溪叢話緑沈以調緑漆之其色沈如漆調雌黄之類楊慎丹鉛録鄴中記石虎造象牙桃枝扇或緑沈色或紫紺色王羲之筆經云有人以緑沈漆管見遺虞世南詩緑沈明月絃劉劭趙都賦弩有黄間緑沈梁簡文詩吴戈夏服箭驥馬緑沈弓楊巨源詩吟詩白羽扇校獵緑沈槍皆謂以緑沈色為漆餙鎗柄耳朱注吴曾漫録古樂府緑沈明月絃此弓亦號緑沈也宋元嘉起居注廣州刺史韋朗作緑沈屏風六典鼓吹工人之服亦有緑沈此以緑沈飾器服也南史任彦升卒武帝方食西苑緑沈𤓰皮日休新竹詩一架三百本緑沈森㝠㝠皆言其色也日爾雅疏楊一名蒲栁生澤中可為箭笴陶潛傳夏虛閒髙卧北窗之下清風颯至自謂羲皇上人到此應平聲常邵作常舊作嘗宿相留可判年蹉跎暮容色一作􅁂悵望好林泉何日霑微禄歸山買薄田斯遊恐不遂把酒意茫然此首叙臨别之意又是總結上四深羨林泉之勝下則欲謀歸老於此地也考是年公方四十而云暮容色者蹉跎不遇因有慨於暮景耳舊盧注時雖參列選序而尚未定官故歎微禄難霑注禮記注云判半也朱注古音多四聲互用唐人猶知此法如判字本去聲亦讀平聲吴越春秋一士判死兮而當百夫王筠行路難含情蓄怨判不死是也音義與􅂸同杜詩􅂸字多作判此詩可判年猶云可􅂸却一年耳又孫勔唐韻拚字收入二十三阮玉篇􅂸一音伴則􅂸字正可從仄聲叶非半年之解世説周處曰年已蹉跎終無所成韋顔氏家訓憔悴容色宅謝朓詩悵望一途阻北史敻淡於榮利所居之枕帶林泉時對琴書蕭然自逺狀欲以微禄奉養後漢獨行傳趙苞謂母曰為子無世説深公答支遁曰未聞巢由買山而隠隋書王通教授河汾間曰通有先人之敝廬足以蔽風雨薄田足以具饘粥初云樽在末云把酒見始終好客周𢎞讓詩把酒念浮生陪諸貴公子丈八溝擕妓納涼晚際遇雨二首此詩年月難考大抵在天寶間未亂時作厯鶴注丈八溝天寶元年韋堅所通漕渠舊史大元年九月京兆尹奏開漕渠入苑濶八尺深一丈渠成上御安福門以觀之豈素有是渠其後又開歟通志下杜城西有第五橋丈八溝落日放船好輕風生浪遲竹深留客處荷淨納涼時公子調冰水佳人雪藕絲片雲頭上黑應平聲是雨催詩此章為同遊記勝也首聨泛舟入溝次聨納涼之景三聨公子擕妓結聨晚際遇雨輕遲深淨四字詩眼甚工胡夏客曰公子作詩催之亦未必速就應是雨催詩調笑中却有含蓄何承天鼓吹曲輕風起紅塵梁簡文帝詩荷淨月應來詩徐陵詩納涼髙樹下詩應瑒詩公子愛賔客庾信開冰帶井水曹植南國有佳人拖家語黍以雪桃注雪拭也可朱超道詩摘除蓮上葉出藕中絲梁簡文帝詩憐片雲生暫重還復輕白趙曰東坡詩颯颯催詩雨來句本於杜雨來霑席上風急一作惡打船頭越女紅裙濕燕平聲姬翠黛愁纜侵堤栁繫幔巻一作宛浪花浮歸路翻蕭颯陂塘五月秋承上章傷風雨驟至也雨來風急領起全意三四就席上言五六就船頭言陂塘蕭颯五月成秋以見樂不可極萬事皆然不杜臆妓兼南北見諸公子各尚豪華趙汸注北人慣乗舟故遇風雨而愁詩朱超詩浮梁帶雨來通記儒有席上之珍之沈君攸風急細流翻風俗船頭謂之舳尾謂艫庾信詩五兩開船頭陵吴越春秋右抱越女態結紅裙武王紀詩燕姬奏妙舞陳後主詩轉後漢書明帝宫人拂青黛蛾眉庾信詩眉心濃黛直㸃幔以蔽日侵迫近也庾詩幰拂縁堤栁纜以維舟梁元帝詩朝浮兮浪華栁􅙒詩浹叠浪花生主陶潛詩行行循歸路楚辭風颯颯兮水蕭蕭陳後詩寒氣尚蕭颯應璩與從弟書逍遙陂塘之上涼記仲夏行秋令是即五月秋也黄生注結應納意五字亦警王嗣奭曰二首相為首尾以雲雨為過脉而歸路蕭以颯與放船好相照故下翻字杜公賦詩有二首三首至數首其氣脉大都聨絡照應偶發於此醉時歌原注贈廣文館博士鄭䖍語舊唐書天寳九載國子監置廣文館唐林天寳中國學增置廣文館以領詞藻之士鄭䖍久被貶謫是歲始還京師參選除廣文館博士鶴注舊書天寳十二載秋令出太倉米詩言日糴太倉五升米正其時也當是十三載春作杜臆此詩多自道苦情故以醉歌命題諸公衮衮登臺一作華省廣文先生官獨冷甲第紛紛厭粱肉廣文先生飯不足先生有道出羲皇先生有才一作文過平聲屈九勿切宋德尊一代常坎軻一作壈名垂萬古知何用首歎鄭公抱負不遇華前漢韓安國傳諸公莫不稱晉書王濟云張説漢史衮衮可聽師氏曰唐制御史臺其屬有三院一曰臺院二曰殿院三曰察院掌糾正百官之罪惡省有三一曰中書省二曰尚書省三曰門下省臺省清要之職謝混詩總轡出臺省舊書天寶九載七月國子監置廣文館新書鄭䖍傳明皇愛䖍才欲置左右以不事事更置廣文館以䖍為博士在官貧約甚淡如也王彦輔曰北齊書王晞曰非不愛作熱官但思之爛熟耳黄希曰世以宗正卿為冷卿是亦冷官之意漢髙祖詔列侯居邑皆賜大第室注有甲乙次第故曰第張衡西京賦北闕甲第當道直啟孟甞君傳今君僕妾厭餘粱肉而士不厭糟糠宋後漢鄭太有田四百頃而食常不足逸步莫之能追桓𤣥書一代大事文心雕龍屈楚辭七諫年既過半百兮愁轗軻而留滯王逸云坎軻不遇也古詩坎軻長苦辛張綖注轗軻車失利貌坎一作轗車不平也軻車折軸也詩史記伍子胥贊名垂後世李宻萬古傳名諡杜陵野客人更一作見嗤被去聲褐短窄一作穴􅁂如絲日糴太倉五升米時赴鄭老同襟英華同一作衾期得錢即相覓沽酒不復扶又切疑忘形到爾汝痛飲真一作直吾師此敘同飲情事鄭時赴公過鄭也相覓公要也痛飲吾師正見襟懐相契陵漢書元康元年以杜東原上為初陵更名杜縣為杜老子被褐懐玉盧照隣詩安知倦遊客兩􅁂漸如絲十舊唐書天寶十八載八月京城霖雨米貴出太倉米萬石減價糶與貧人顔氏家訓齊吏部侍郎房文烈霖雨絶糧遣婢糴米錢梁髙澄書繾綣襟期綢繆素分滑稽傳王先生懐沽酒括異志道士張酒酒得錢即沽酒郭象莊子序有忘形自得之懐陶詩逝將不復疑文士傳禰衡有逸才與孔融為爾汝交時衡年二十融年已四十王孝伯云但常得無事痛飲讀離騷可稱名士世説齊書李元忠曰阮步兵吾師也孔少府豈欺我哉清夜沈沈動春酌燈一作簷前細雨簷一作燈花落但覺高歌有一作感鬼神焉於䖍切知餓死填溝壑相如逸才親滌器子雲識字終投閣此痛飲以盡歡承上杜陵一段人春夜燈前飲之候髙歌動神飲之興相如子雲借古以解慰也曹植詩清夜遊西園何遜詩沈沈夜看流賦應璩書酌彼春酒承春庾信燭燈前桁衣疑不亮燈前承夜簷花梁簡文詩細雨堦前入簷江淹詩共取落簷花劉邈詩簷花初照月公詩白花外朶皆實指簷前之花杜臆云簷水落而燈光映之如落銀花此另一説鬼石崇思歸引高歌凌雲兮樂餘年列子動天地感神師氏曰言歌聲幽怨也思前漢朱買臣傳妻恚怒曰如公等終餓死溝中耳左詩當其未遇時憂在填溝壑漢書司馬相如令文君當壚身著犢鼻褌滌器於市中禄魏志曹丕八歲能屬文有逸才揚雄傳雄校書天閣上治獄使者來收雄雄從閣上自投下㡬死莽問其故乃劉棻嘗從雄學作竒字雄不知情詔勿問京師為之語曰惟寂寞自投閣先生早賦歸去來石田茅屋荒蒼苔儒術於我何有哉孔丘當作尼父盜跖俱塵埃不須聞此意慘愴生前相遇且銜杯此痛飲以遣意應上廣文一段無鄭欲歸去以轗軻之故孔跖塵埃見名垂用相遇銜杯欲其及時行樂也配此章前二段各八句後二段各六句劃然四段賔主講到底格律整齊陶潛傳為彭澤宰解印綬去職賦歸去來辭茅史記子胥曰譬猶石田無所用之韓非子不食於屋之下淮南子窮谷之汚生以蒼苔何漢書蕭望之傳宣帝不甚從儒術莊子帝力於我有哉孔跖對舉見莊子俞文豹曰孔子萬世之師敢名呼而儕之盜跖有傷名教李白韓愈詩皆直書聖諱均失言也左傳哀公誄孔子稱曰尼父句庾信傷心賦一朝風燭萬古塵埃翰聞此指上塵埃陸機詩慘愴恒鮮歡晉書張曰使我有身後名不如生前一杯酒劉伶傳銜杯潄醪此詩次聨失粘王嗣奭曰此篇總屬不平之鳴無可柰何之詞非真謂垂名無用非真謂儒術可廢亦非真欲孔跖齊觀又非真欲同尋醉鄉也公詠懐詩云沈醉聊自遣放歌破愁絶即可移作此詩之解盧世㴶曰醉時歌純是天縱不知其然而然允矣高歌有鬼神也隨按聖人至誠無息與天合德其浩然之正氣必不死俱冺豈可云聖狂同盡乎詩云孔跖俱塵埃此襲䝉莊之放言以洩醉後之牢騷耳其詞未可以為訓也歐陽公作顔跖詩説生前死後胸懐品格懸隔霄壤方是有功名教之文城西陂泛舟此與後章當是同時先後之作青蛾一作娥非皓齒在樓船横笛短簫悲逺天春風自信牙檣動遲日徐看平聲錦纜牽魚吹細浪摇歌扇燕蹴飛花落舞筵不有小舟能蕩槳百壺那送酒如泉此泛陂而誌聲妓之盛也三四承樓船五六承青蛾歌舞奏而酒興酣故須百壺迭進下四自相聨絡朱瀚曰樓船鼔吹響傳空際故曰悲逺天舞牙檣錦纜舟極華矣春風遲日又若助以韶光歌扇筵宴胥樂矣吹浪蹴花又倍增其景色中二聨寫得工麗絶倫宋張性演義動曰自信牽曰徐看見中流容與之象南平王白紵曲佳人舞袖曜青蛾河宋玉笛賦摛朱唇耀皓齒咽秋風辭泛樓船兮濟汾江總詩横笛短簫吹復朱鷺曲度曲清且悲天宋樂府戰城南東隣歌管入青天謝朓詩巉巖帶逺信任也任其自動也如㝠搜信客旌鞍馬信清秋皆如是解信哀江南賦鐡軸牙檣檣㠶柱也堤詩春日遲遲庾詩錦纜廻砂磧又張正見詩金分錦䌫䌫顔廷榘意箋象牙作㠶檣此樂府之侈詞錦綵為舟此甘寧之侈事皆屬借形語瓠巴鼔琴而鳥舞魚躍出於列子魚吹燕蹴暗用其意舞唐太宗詩船移分細浪陰鏗詩鶯呼歌扇後花落衫前歌扇歌者以扇障面也摇指水中扇影依梁簡文帝筝賦翫飛花之度窗陳後主詩上舞復筵樓船容與故須小舟送酒有晉歌詞一船使兩槳有詩清酒百壺酒前漢地理志酒泉郡注俗傳城内金泉之味如裴秀詩有肉如丘有酒如泉張性曰中間摹情寫景艶而不滛所謂麗以則者也顧宸曰天寶間景物盛麗士女遊觀極盡飲燕歌舞之樂此咏泛舟實事不是譏刺明皇亦非空為艶曲盛唐七律尚有寛而未嚴處此詩横笛短簫悲逺天次聨宜用仄承下云春風自信牙檣動仍用平接矣如太白登鳯凰臺詩上四句亦平仄未諧此才人之不縳於律者在中晚則聲調謹嚴無此疎放處但氣體稍平却不能如此雄壯典麗耳渼陂行鶴註此天寶十三載未授官時作渼陂因水味美故配水以為名朱注長安志渼陂在鄠縣西五里出終南山諸谷合胡公泉為陂説文渼陂在京兆鄠縣其周一十四里北流入滎水杜臆胡松遊記云渼陂上為紫閣峯峯下陂水澄湛環抱山麓方廣可數里中有芙蕖鳬雁之屬岑參兄弟皆好去聲竒擕我逺來遊渼陂天地黤乙減切慘忽異色波濤萬頃堆琉璃此遙望渼陂在未開舟時湧邵注黤慘天色昬黒琉璃波清徹也朋繁欽與魏文帝牋竊惟聖體兼愛好竒陸機詩友自逺來王粲登樓賦天慘慘而無色江總詩丹水波濤汎帝世説郭林宗曰叔度汪汪若萬頃之波梁簡文詩雲開瑪瑙葉水淨琉璃波琉璃汗漫泛舟入事殊興去聲極憂思集鼉作鯨吞不復扶又切知惡風白浪何嗟及此放舟入陂陡遇風波險阻也淮南子徙倚於汗漫之宇張衡賦布濩汗漫水國語秦汎舟於河難任説文鼉蟲似蜥蝪而長大王粲詩憂思壯吴都賦長鯨吞航詩西京雜記昔人有遊東海者既而風惡矣何遜江暗雨欲來浪白風初起詩何嗟及主人錦㠶相為開舟子喜甚無氛埃鳬鷖散亂棹謳發絲管啁陟交切通作嘲啾空翠來此泛舟佳景時已風恬浪静矣句棹謳齊發故鳬鷖驚飛此倒裝也絲管方鳴值雲淨天空言晴霽景象而陰鏗詩平湖錦㠶張詩招招舟子楚辭氛埃辟清涼詩鳬鷖在涇詩注毛萇曰鳬水鳬鷖鳬屬蒼頡解詁鷖鷗也列子始驚駭散亂矣何遜詩中川聞棹謳前漢志絲曰絃竹曰管鮑照詩絲管感暮情陳記小者至於燕雀猶有啁噍之頃焉注噍與啾同後主詩歇霧含空翠沈竿續縵一作蔓深莫測菱山谷作芡葉荷花淨一作静如拭宛在中流渤澥胡解切清下歸無極一云下臨無地終南黑此從水邊泛入中央也澥渤清言水色空曠下無極言山峯倒映縵絲絃王粲海賦其深不測古樂府採蓮曲汎舟採菱葉雍詩隰有荷華淨謝朓詩澄江淨如練山谷注雜記人拭羊拭也詩宛在水中央應漢武帝曲横中流兮揚素波朓相如子虚賦浮渤澥劭注渤澥海之别枝也謝詩漢廣流無極詩終南何有毛萇曰終南周之名山雍録渼陂源出終南山半陂以南純浸山動影裊窕冲融間船舷暝戛古恒切雲際寺水面月出藍田闗此從中流移近南岸藍裊窕山影動摇冲融水波平定日色將瞑船歴寺前田月出光照水出此記黄昬之景也船海賦冲融滉瀁詩郭璞江賦詠採菱以扣舷廣韻舷邊也謝靈運暝還雲際宿長安志雲際山大定寺在鄠縣東南六十里藍正韻戛轢也此謂船舷經過之聲詩月出皎兮田闗在藍田縣東南六十八里即秦嶢闗也雍録嶢闗在渼陂東南此時驪龍亦吐珠馮音平夷擊鼓羣龍趨湘妃漢女出歌舞金支翠旗光有無此寫月下見聞之狀移燈火遙映如驪龍吐珠音樂逺聞如馮夷擊鼓晚舟棹如羣龍争趨美人在舟依稀湘妃漢女服飾鮮麗彷彿金支翠旗張綖謂月出而樂作恍若神遊異境是也莊子千金之珠必在九重之淵驪龍頷下能得珠者必遭其睡夷海賦冰夷倚浪以傲睨注冰夷水仙人也郭璞云冰馮夷也楚辭令海若舞馮夷洛神賦馮夷擊鼔女媧清歌搜神記馮夷潼鄉隄首人以八月上庚日渡河死上帝署為河伯易見羣龍无首張衡西京賦萬騎龍趨間俗謂之湘君列女傳舜崩蒼梧二妃死於江湘之列仙傳鄭交甫遊漢江見二女解佩與之洛神賦從南湘之二妃擕漢濵之遊女秀後漢劉盆子傳共擊鼓歌舞前漢志房中歌金支華注樂上衆飾有流翅羽葆以黄為支其首敷散若草木之秀華也夏侯湛褉賦擢翠旗垂繁纓子虚賦覽於有無咫尺但愁雷雨至蒼茫不曉神靈意少去聲壯幾時柰老何向來哀樂音洛何其多末乃觸景生情有哀樂無常之感見雷雨變幻因知自少至老俱當如是觀此推開作結章吴論哀頂鯨鼉雷雨等句樂頂錦㠶絲管等句此七段各四句分截詩左傳天威不違顔咫尺東易雷雨之動滿盈漢沈約出漲海之蒼茫九歌風飄兮神靈雨武帝秋風辭歡樂極兮哀情多少壯㡬時柰老何列子哀樂不能移張綖曰好竒二句乃全篇之眼岑生人竒渼陂景竒故詩語亦竒驪龍四句設想更竒初學若以實理泥之㡬於難解熟讀楚辭方知寓言佳處舟朱鶴齡曰始而天地變色風浪堪憂既而開霽放冲融裊窕終而仙靈㝠接雷雨蒼茫只一遊陂時情景迭變已如此况自少壯至老哀樂之感何可勝窮此孔子所以歎逝水莊生所以悲藏舟也語盧世㴶曰此歌變眩百怪乍陰乍陽讀至收巻數肅肅恍恍蕭蕭悠悠屈大夫九歌耶漢武皇秋風耶云此篇第六段託假象以寫真景本於漢艶歌其辭今日樂上樂相從步雲衢天公出美酒河伯出鯉魚青龍前鋪席白虎持榼壺南斗工鼔瑟北斗吹笙竽姮娥垂明璫織女奉瑛琚蒼霞揚東謳清風流西歈垂露成帷幄奔星扶輪輿少陵葢善於摹古矣渼陂西南臺此臺前遊所未至者故重遊而記其勝髙臺靣蒼陂六月風日泠蒹葭離披去天水相與永懐新目似擊接要心已領仿像識鮫人空濛黄作䝉辯魚艇錯磨終南翠顛倒白閣影崷慈由切崒昨律切增光輝一作陰乗陵惜俄頃首叙登臺望陂之景見臺髙水濶故覺風日生涼臺曠無翳故天水相連杜臆冷者風也而兼言日永者水也而兼言天下語之妙真筆端有畫目擊心領束上起下鮫人意擬故曰仿像魚艇遙瞻故曰空濛水漾山光故曰錯磨山影水面故曰顛倒似此山水交輝但惜俄頃登臨耳謝惠連詩髙臺驟登踐萑西京雜記每好風日幡旄光彩葭詩蒹葭蒼蒼鶴曰之未秀者曰蒹葦之未秀者曰至秋成謂之萑葦色離披見二巻天張逺注天水相永即秋水共長天一意王粲海賦與水際莊子仲尼曰夫人者目擊而道存矣記魏志武帝纂兵書曰接要廢海賦仿像其色捜神南海有鮫人水居如魚不績紡時從水中出寄人家賣綃也謝朓詩空濛如薄霧趙曰言若無而空若有而濛濛唐趙冬㬢詩漁艇散灣曲邵注小而長曰艇山束晢補亡詩粲粲門子如磨如錯潘岳闗中記其一名中南言在天之中都之南東詩顛之倒之之通志紫閣白閣黄閣三峯具在圭峯紫閣旭日射爛然而紫白閣陰森積雪不融黄閣不知所謂三峯不甚逺齊西京賦嵓峻􅍶崒鄭曰􅍶崒山峻貌曹植登臺賦日月之光輝風賦乗陵髙城入於深宫俄江賦倐忽數百千里頃勞生愧嚴鄭外物慕張邴世復扶又切輕驊騮吾甘雜鼃蛙同黽知歸俗所忌一作可忽取適一作足事莫竝身退豈待官老來苦便平聲静况資菱芡巨險切足庶結茅茨逈從此具扁舟彌年逐清景此有棲身物外之思身退豈待官結上勞生六句老來苦便静起下菱芡四句杜詩每段各有闗鍵如此末句情景包括上段所云此章兩段各十二句上段蕭疎下段沈鬱閒莊子大塊勞我以生嵇康幽憤詩仰暮嚴鄭樂道居漢書谷口有鄭子真蜀有嚴君平皆修身自保三輔決録子真名樸君平名遵莊子吾又守之七日而後能外物傅亮詩張邴結晨軌邵注張邴俱漢人張仲蔚所居蓬蒿没人邴曼容免官養志自修驊騮不遇知己甘與蛙黽雜居蛙黽即水邊所聞者萬驊騮良馬周穆王八駿之一傳云驊騮騄耳日馳三周禮蟈氏掌去鼃黽國語鼃黽之與同渚説文鼃即蛙黽大於鼃者即青蛙也老子功成名遂身退天之道也任昉為王儉集序窮崖而返盈量知歸以史秦紀秦俗多忌便便静二字本謝詩而反用之謝便静為安閒此以静為閴寂故覺其苦而欲行樂陂間也薢周禮加籩之實菱芡栗脯説文菱楚謂之芰秦謂之茩武陵記三角四角曰芰兩角曰菱芡雞頭也方言南楚謂之雞頭舟羅含别傳廨宇喧擾乃立茅茨之室朱超道詩扁已入浪能蔡邕王子喬碑歴載彌年莫之紀曹植詩明月澄清景朱鶴齡曰此詩俱本謝康樂懷新目似擊即謝詩懐新道轉迥也乘陵惜俄頃即謝詩恒充俄頃用也外物慕張邴即謝詩外物徒龍蠖又詩偶與張邴合久欲還東山也知歸俗可忽即謝詩適已物可忽也取適事莫竝即謝山居賦隨時取適又詩萬事難竝歡也身退豈待官即謝詩辭滿豈多秩謝病不待年也老來苦便静即謝詩拙疾相倚薄還得静者便也公云熟精文選理真不誣耳與鄠縣源大少去聲府宴渼陂得寒字四梁氏編在天寶十載此亦無據今依類入西陂詩内縣鶴注鄠縣即夏之有扈國唐書鄠屬京兆府應平聲為去聲西陂好金錢罄一餐飯抄雲子白𤓰嚼水精寒無計廻船下去聲空愁避酒難主人情爛熳持答翠琅玕上四叙宴陂品物下則感少府而答之以詩也耳杜臆罄錢設粲酒肴必盛獨言飯𤓰稱其尤異者方囘云無計廻船有投轄意孝西陂即渼陂餐前漢淮南王安傳多予金錢又梁王傳為帝一北人稱七為抄乃抄轉也昌廣雅水晶石英也山海經水玉即水晶本草信州武有水晶梁簡文帝詩那得久廻船四班彪海賦煥爛熳以成章上林賦爛熳逺遷植張衡愁詩美人贈我青琅玕何以報之雙玉盤曹詩腰佩翠琅玕翠琅玕比主人之情重故持詩以答之邵云以詩比美玉非也贈田九判官梁丘澤州陳冢宰廷敬曰考王思禮傳天寶十三載吐谷渾蘇毗王欵塞明皇詔翰應接舊注以此當降王欵朝是也其謂翰報命而入朝此意料之詞不見確據考帝紀及翰傳天寶十三年無翰入朝事是年翰遘風疾因入京廢疾於家田葢以使事入奏當在翰未疾之先非隨翰入朝也公所投翰詩當是一時作或即因田而投贈於翰也舊唐書哥舒翰討禄山以田梁丘為御史中丞克行軍司馬兼于邵田司馬梁丘傳司馬京兆茂陵人哥舒翰統五原雅知其才得之甚喜表滑勝府别將改永平府果毅長松府折衝潼闗失守詔御史中丞郭英乂專制隴右未及下車表渭州隴西縣令崆峒使去聲節上上聲青霄河隴降平聲王欵聖朝音潮宛于爰切馬總肥秦一作春苜蓿將軍只數色主切漢一作霍嫖姚音飄颻陳留阮瑀誰争長丁丈切京兆田郎早見招麾下賴君才竝美他本並作入獨能無意向漁樵上四叙哥舒受降之事下四美田九薦賢之功蓿使節西往而降王入欵見翰能威名逺服也馬肥苜承降王將數嫖姚承使節阮瑀指髙適適本封丘尉與陳留相近他章云好在阮元瑜可証髙之入幕必由田君所薦故云早見招而幕下賴之留意漁樵公仍望其汲引也陳周禮地官掌邦國之使節指蜀都賦干青霄而秀出注上青霄謂崆峒地髙非朝宁之地帝河隴謂河西隴右注西征賦作降王於路左從漢宣紀欵塞來享應劭欵叩也皆叩塞門來服也唐書哥舒翰傳天寶十二載秋翰領河西節度擊吐蕃悉收九曲部落王思禮傳十三載有吐谷渾蘇毗王欵塞詔翰至磨環川應接之法朱瀚曰苜蓿從草頭嫖姚從女傍又皆叠韻亦屬對漢書大宛馬嗜苜蓿上遣使者持千金請宛馬采苜蓿種之離宫廐陳注新書百官志駕部郎中員外郎各一人掌傳驛牧之事凡驛馬給地四頃蒔以苜蓿降王欵朝驛傳騷然故云宛馬總肥春苜蓿漢書霍去病再從大將出塞為嫖姚校尉荀悦漢記嫖姚作票鷂鳥名因以名官取其輕㨗也杜臆嫖姚讀平聲有服䖍可據六朝人嘗用之不始於杜室魏志陳留阮瑀字元瑜太祖辟為軍謀祭酒管記左傳滕侯與薛侯來朝爭長三輔决録田鳯為郎容儀端正入奏事靈帝目送之因題柱曰堂堂乎張京兆田郎左思詩馮公豈不偉白首不見招漢高帝紀攻破函谷闗遂至戲下顔注戲大將之旗戲與麾同何遜贈范雲詩髙門盛遊侣誰肯進漁樵投贈哥舒開府翰二十韻按唐書翰三入朝一在天寶六載一在十一載後以廢疾還京當在十三載之末據本傳於還京之後再提十四載禄山反則知歸京在去年冬矣其加河西節度使封西平郡王乃十三載事詩言茅土山河即是年所作以寄贈者舊唐書翰突騎施首領哥舒部落之後因以為氏新書翰加開府儀同三司在天寶十一載今代麒麟諸本多作騏驎誤閣何人第一功君王自神武駕馭必英雄首從朝廷任將説起立言有體露漢武帝獲麟作麒麟閣以畫功臣漢宣帝甘三年上思股肱之美乃圖畫大將軍霍光等十二人於麒麟閣内史記漢王定天下論功行封羣臣爭功歲餘不决闗侯鄂君進曰蕭何常全闗中以待陛下此萬世之功也蕭何第一曹參次之漢刑法志髙祖躬神武之才㧾攬英雄能吴志張昭傳夫人君者謂駕馭英雄驅使羣賢開府當朝音潮傑論平聲兵邁古風先鋒百戰一作勝在畧地一作妙畧兩隅空青海無英華作飛傳箭天山早挂弓亷頗仍走音奏敵魏綘已和戎此記隴右戰功兩先鋒百戰初在王倕部下又為王忠嗣將校也畧地隅起下天山青海兼引亷魏者言戰與和俱善也唐制開府儀同三司從一品官漢通典漢文帝元年用宋昌為衛將軍位亞三司東觀記章帝建初三年使車騎將軍馬防班同三司書晉書庾衮傳陳凖曰君若當朝則社稷之臣舊唐翰好讀左氏春秋傳及漢書通大義言吴越春秋子胥與吴王論兵七薦孫子馬援傳帝常伏波論兵與我意合干寶晉紀皇太子有醇古之風遼世説阮裕曰志大宇宙勇邁終古吾魏志太祖使張為先鋒孫子百戰百勝左傳將畧地焉漢書蒯通傳母戰而畧地代兩隅即下文所云青海天山也舊書天寶六載翰王忠嗣為隴右節度使築神威軍於青海上吐蕃至攻破之又築城於青海中龍駒島吐蕃屏跡趙曰外冦起兵則傳箭為號無傳箭息兵也或曰守城之法更夜傳箭以守其睡今按公贈張垍詩靈虬傳夕箭則箭即更籌也吐蕃傳吐蕃䧟石堡城為神武軍本傳以朔方河東羣牧十萬衆委翰總統攻石堡城翰使麾下將髙秀巖張守瑜進攻不旬日而拔之封阮籍詩彎弓掛扶桑魏史記亷頗趙良將破齊攻魏為信平君左傳晉綘説悼公和戎有五利公悦使綘盟諸戎賜之女樂二八歌鐘一肆每惜河湟棄新兼節制通智謀垂睿英華作眷想出入冠去聲諸公日月低秦樹乾坤繞漢宫胡人愁逐北宛平聲馬又從東此記河西恢復事國新蕪節制進封凉公加河西節度使也獨趙曰翰收復河西故為帝所繫想出建節而入歸朝冠於諸公日月句喻帝業之光昌乾坤句比皇輿之廣大逐北從東言其威名逺服朱注舊書吐蕃傳湟水出蒙谷抵龍泉與河合河之上流由洪濟梁西南行二千里世舉謂西戎地曰河湟郡國志湟水出青海東亂山中東南流至蘭州西南入黄河新書睿宗時楊矩為鄯州都督奏請九曲地為公主湯沐九曲水甘草良宜畜牧近與唐接自是易入冦蕃朱注十二載翰進封凉國公加河西節度使攻破吐洪濟大漠門等城悉收九曲地以其地置洮陽郡築神策宛秀二軍睿荀子桓文之節制不足當湯武之仁義趙注舊解想句引王忠嗣被罪詔翰入朝帝虛心待之為証此在復河湟以前不合士有智謀隋徐儀詩夜深留睿想史記藺相如勇夫丘遲讓光禄大表飛翠鳴玉出入禁闈宫曹植七啟同量乾坤等曜日月陳後主詩圖形漢裏南部新書哥舒翰為安西節度使控地數千里甚著威令西鄙人歌曰北斗七星高哥舒夜帶刀吐蕃總殺盡更築兩重壕田單傳齊人追亡逐北無漢伐大宛得天馬乃作歌曰天馬來歴草經千里循東道受命邊沙一作軍麾逺歸來御席同軒墀曾音層寵鶴畋獵舊非熊茅土加名數山河誓始終策行遺英華作宜戰伐契合動昭融勲業青㝠上交親氣槩中此記入朝封王事指邊沙言逺鎮御席謂賜宴寵鶴禄山思順非熊專稱哥舒也茅土河山謂封王食邑攘邊策行無事於戰伐君臣契合獨見其昭明勲業承上交親起下儀禮使者受命於朝軒沈佺期詩御席瑤觥落敞左傳衛懿公好鶴鶴有乗者庾信新樂表軒墀𢎞邵氏聞見録鶴乘軒指軒車言非軒墀之軒或以為疑朱注云韻㑹簷宇之末曰軒取車象也借用無害張表臣珊瑚詩話若改墀字為車則無弊矣墀乃傳寫之訛羆史記齊世家文王將獵卜曰所獲非龍非彲非虎非乃霸王之輔果遇太公於渭陽載與俱歸朱注爾雅翼熊之雌者為羆則熊羆可互用書傳王者建諸侯各割其方色土與之使立社燾以黄土苴以白茅茅取其潔黄土取王者覆四方李陵書當茅土之薦漢書高帝紀民前或相保聚山澤不書名數顔師古注名數謂户籍又髙祖封功臣誓曰使黄河如帶泰山若礪國以永存爰及苖裔進舊書天寶十二載九月隴右節度使凉國公哥舒翰封西平郡王食實封五百户孔叢子處戰伐之世既沈佺期詩風雲神契合道詩昭明有融注融長也天光大汝成王以昭明之甚有長也青或以昭融指君與上睿想犯重或以昭融指天與下㝠犯重詩意言翰以戰功得君自覺駿偉光明無他詭道也動乃發動之動親杜篤吴漢誄勲業既崇鮑照詩交篤離愛未為珠履客已見音現一作是白頭翁壯節初題柱生涯獨轉蓬㡬年春草歇今日暮途窮軍事留孫楚行户郎切間識吕䝉一作鄉曲輕周處將軍拔吕䝉防身一一作腰間有長劍將一作聊欲倚崆峒末段自叙結出投贈之意景未為二句歎身老不遇題柱憶初志轉蓬以下傷暮孫楚吕䝉謂幕府英才倚劍崆峒欲參翰軍謀也春此章四句起前二段各八句後二段各十句秋史記申君客三千餘人其上客皆躡珠履田千傳千秋訟太子寃曰臣夢白頭翁教臣言西後漢戴就傳薛安奇其壯節成都記司馬相如初去題昇仙橋柱曰不乘駟馬車不復過此橋後果乗傳至其處春曹操詩田中有轉蓬隨風逺飄揚梁元帝詩既看草歇還見雁南飛盡途窮則已耳主父􅅯曰日暮途逺嵇康書曰若道晉書孫楚為石苞參軍楚負其才氣頗侮易苞初至長揖曰天子命我參卿軍事聰吴志吴使都尉趙咨使魏對曰納魯肅於凡品是其也拔吕䝉於行陣是其明也前漢吴王濞傳周丘曰臣以無能不得待罪行間抱朴子却惡防身者有數千法如舍景藏形等不可勝計舍景劍也溢宋玉大言賦長劍耿耿倚天外舊書隴右道岷州樂縣有崆峒山山在縣西二十里王嗣奭曰是時李林甫陳希烈當國忌才斥士無路可通翰獨能甄用才俊不得已而欲依以進身耳但稱頌之詞不無過當其攻伐吐蕃明是殺人邀功逢君之惡乃王忠嗣所不肯為者兵車行所以作也此極稱之豈衷語哉至顧宸曰公投贈排律推崇如此後來潼闗一戰竟䘮師失地不幾昧於知人乎然觀翰固守潼闗不輕出戰賊勢窮蹙已幾敗亡當崔乾祐羸兵誘戰時翰上奏曰禄山久習用兵今始為逆是必羸師以誘我若往正墮計中况殘虐失衆兵勢日蹙將有内變因而乗之可一戰擒也此與李郭北取范陽覆其巢穴潼闗大兵惟應固守之計正相脗合惜國忠懼禍遣使趨戰其慟哭而出已預知必敗矣厥後慶緒推刃竟如内變之説則翰固能知兵料敵者假使固守之策得行與張許李郭相為犄角賊指日可滅此即周亞夫堅壁以困吴楚之勝算也此詩稱美未為太過矣胡應麟曰排律沈宋二氏藻贍精工太白右丞明秀高爽然皆不過十韻且體在䋲墨之中調非畦逕之外惟杜陵大篇鉅什雄偉神竒如謁先主廟贈哥舒等作闔闢馳驟如飛龍行雲鱗鬛𤓰甲自中矩度又如淮陰用兵百萬掌握變化無方雖時有險樸無害大家近選者僅取沱水臨中坐以為他皆不及塗聽耳食哀哉寄高三十五書記此詩黄鶴以為十三載所寄姑從之適既為書記而又被朱紱應在十二載之後也歎息高生老新詩日又多美名人不及佳句法如何主將去聲收才子崆峒足凱歌聞君已朱紱且得慰蹉跎上四稱適詩才下喜其為書記也詩才子凱歌仍應能詩老年知遇差慰蹉跎耳虞炎思君一歎息舊唐書適年過五十始留意篇什數年之間體格漸變以氣質自髙每吟一篇為好事者傳誦張華詩良朋始新詩孫檀弓又多乎哉成荀子知好士之為美名也輒世説興公作天台賦以示范榮期每至佳句皆云應是我輩語翰六韜後漢注主將龍韜偏禆虎韜趙曰主將指哥舒虞通之詩才子傾洛陽周禮樂師凡軍大㨗教凱歌司馬法曰得意則愷樂所以示喜也紱陸機詩聞君在京城易朱紱方來韋賢傳黼衣朱師古曰朱裳畫為亞文也亞古弗字故因謂之紱議鶴曰明皇嘉適陳潼闗敗亡之勢至成都賜緋除諫大夫此在至徳二載詩云聞君已朱紱豈前此已服緋耶阮籍詩白日忽蹉跎髙達夫五十始作詩為少陵所推蘇老泉三十始讀書為廬陵所許羅景綸謂功深力到學無早晚是也然杜歐二公負當世盛名而能虚懐樂善奬勵人才如此真足為千古則矣詩有六義三百篇為詩法之祖嗣後作者繼起文以代新而諸體各出莫不有法存焉徐楨卿曰刺美風化緩而不迫謂之風采摭事物摛華布體謂之賦推明政治莊語得失謂之雅形容盛徳揚厲休功謂之頌幽憂憤悱寓之比興謂之騷感觸事物託於文章謂之辭程事較功考實定名謂之銘援古刺今箴戒得失謂之箴猗迂抑揚永言謂之歌非鼔非鐘徒歌謂之謡步驟馳騁斐然成章謂之行品秩先後叙而推之謂之引聲音雜比髙下短長謂之曲吁嗟慨嘆悲憂深思謂之吟吟詠情性總而言志謂之詩蘇李而上髙簡古澹謂之古沈宋而下法律精切謂之律此詩之衆體也今按各體中皆有法度長篇則有段落勻稱之法連章則有次第分明之法首尾有照應之法全局有開闔之法逐層有承頂之法且章有章法句有句法字有字法謹嚴於法而又能神明變化於法方稱宗工巨匠此云佳句法如何葢欲與之互證心得耳送張十二參軍赴蜀州因呈楊五侍御鶴注楊侍御使蜀而張參軍往依之故作此詩以舊次考之恐在十三載作唐書都督諸州俱有參軍事掌出使贊導道蜀州唐安郡屬劍南垂拱二年析益州置好去張公子通家别恨添兩行音杭秦樹直萬㸃蜀山尖御史新驄馬參軍舊紫髯皇華吾善處于汝定無嫌上四送張赴蜀下四呈楊侍御乃兩截還題格薦黄生注楊必為蜀中諸道使而張參其軍此四十字書也五六用事頗熟以新舊二字㸃化之好去作慰詞與無嫌相照杜臆秦樹言所經之途蜀山言所至之境吕祖謙曰凡詩人於張姓者稱為張公子葢因漢成帝時童謡曰張公子時相見故公贈張垍曰天上張公子杜牧贈張佑亦曰誰人得似張公子家世説孔融十歲見李膺門下不為通融曰我是公通子弟膺問何親曰先君孔子與老君有師資之道正月令兩京道路竝種果樹唐㑹要開元二十八年庾信碑文寒闗樹直陳子昻送友序蜀山有雲巴水可涉侍江淹江上之馬山賦嶤嶷河尖出後漢書桓典拜御史常乗驄語曰行行且止避驄馬御史帝晉書郄超為桓温參軍超有髯府中號曰髯參軍獻春秋張遼問吴降人有紫髯將軍是誰曰是孫㑹稽得皇華指楊詩序皇華勞使臣之詩陳平傳金多者善處金少者得惡處詩于汝信宿贈陳二補闕鶴注此當是天寶十三載長安作各朱注唐六典垂拱中置左右補闕一員天授初左右各加三員世儒多汩没夫子獨聲名獻納開東觀去聲君王問長丁丈切卿皂鵰寒始音試急天馬老能行自到青㝠裏休看平聲白髪生上四頌語下四勉辭喻獻納之官君王顧問正其聲名顯赫處皂鵰摶撃不避天馬喻老健不哀葢既置身青㝠不當以頭白自嫌也老儒宿學故以夫子稱之末言白髪可見顧注陳必單復注此詩首尾俱對律度整嚴兮揚雄曰世儒懐庸庸之知董京答孫楚詩周道斁頌聲没夏政衰兮五常汩曹植詩追舉逐聲名納兩都賦序侍從之臣朝夕論思日月獻納謝朓詩獻雲臺表後漢書永光十三年帝幸東觀覽書林閲篇籍博選藝術之士以克其官華矯謝秘書監表馬融博通三入東觀齊國策君王無羞亟問哉漢書上讀子虛賦而善之曰朕獨不得與此人同時狗監楊得意侍上曰臣邑人司馬相如自言為此賦上驚召問相如臺埤雅鷹似鵰而大黒色俗呼皂鵰唐書王志愔除左御史時人呼為皂鵰言其顧瞻人吏如皂鵰之視燕雀也出劉貢父曰杜詩皂鵰寒始急白樂天詩千呼萬喚始來皆讀去聲事之始終音上聲有所宿留今始然者音去聲也天馬大宛善馬也漢有天馬歌管子老馬之智可用楚辭據青㝠而攄虹兮言青雲杳㝠也鬢左思白髪賦星星白髪生於垂病後過一作遇王倚飲贈歌鶴注梁氏編在至德二年觀詩云但使殘年飽喫飯畧不及䘮亂之意據公秋􅄒云秋杜子卧病長安旅况多雨當時車馬之客今雨不來又云四十無位當是天寶十三年與素知賤子甘貧賤酷見凍綏不足恥之句合耳朱注詩有長安金城語必京師作也麟角鳳觜世莫辯一作識煎膠續弦竒自見形甸切尚看王生抱此懐在於甫也何由羨從王倚交情冐起全意世王生為人如麟角鳳觜莫能知於其敦篤交情乃見特異如煎膠續弦始騐其竒也何由羨言不能及其髙懐盧注此以煎膠喻交情即所謂膠漆雖堅不如雷與陳也羣十洲記鳳麟洲在西海中央洲上專多鳳麟數百合仙家煮鳳喙及麟角合煮作膠名為集弦膠或云連金泥此膠能屬連弓弩斷弦折劍亦以膠連之潘岳詩王生和鼎實詩無然歆羨且過盧作過諸本作遇王生慰疇昔素知賤子甘貧賤酷見凍餒不足恥多病沈年苦無健王生怪我顔色惡答云伏枕艱難遍瘧癘三秋孰可忍寒熱百日相交戰頭白眼暗坐有胝音支肉黄皮皺命如綫此病後過王而叙問答之詞上四於初過時自揣貧病之態下六於相見時備述多病之狀慰疇昔慰己宿願也記檀弓疇昔之夜注疇發語辭老凍餒酷見猶云慘逢世説陶侃家酷貧也左傳三庾信詩茂陵忽多病沈年終年顔色惡謂病容枯槁世説郭璞意色甚惡矣魏文帝燕歌行耿耿伏枕不能眠詩遇人之艱難周禮疾醫皆有癘疾又云秋時有瘧寒疾内經注時疫忽行受其虐厲故瘧從虐癘從厲詩如三秋兮内經陽維為病苦寒熱又云陰陽上下交爭勝王獻之書端坐將百日王粲神女賦心交戰而貞廣韻胝皮厚也經又云三陽為病發寒熱其傳為索澤即張仲景所謂皮膚甲錯也命如綫言性命幾絶越絶書中國不絶如綫惟生哀我未平復為去聲我力致美肴膳遣人向市賒香粳一作秔喚婦出房親自饌長安冬葅酸且緑金城土酥淨如練兼求畜一作富豪一作豕且割鮮宻沽斗酒諧終宴故人情義一作味晚誰似令平聲我手足輕欲旋直戀切一作漩見此王生留飲而記欵待之情而乍見而怪久視而哀疾痛相闗手足輕旋享美膳沈疴頓去也韋𤣥成傳嘉氣日興疾病平復秔漢古歌東厨具肴膳椎牛烹猪羊南都賦滍臯香顔氏家訓婦主中饋周禮七葅注全物若䐑為葅細切為虀崔寔四民月令九月作葵葅其歲温即待十月邵注葅醃菜也唐書金城縣屬京兆府至德二載改名興平長安志京兆府歲貢興平酥咸陽梨不列方物趙曰土酥者土産之酥夢弼曰酥牛羊乳所為色白如練也謝朓詩澄江淨如練山海經豪彘狀如豚而白毛畜豪即豪猪西京賦割鮮野食猶楊惲書斗酒自勞情曹植詩終宴不知疲任昉詩我故人情世説義隨篤朱注旋謂手足旋轉唐書安禄山作胡旋舞其㨗如風老馬為駒信一作驄不虛當去聲時得意况深眷但使殘年飽喫飯只願無事長相見末感王生交誼應前煎膠續弦但老馬二句申上情義誰似言衆皆輕已况能深眷乎使二句申上手足輕旋言此後健飯庶得常見也不此章起結各四句中二段各十句詩老馬反為駒顧其後按老馬為駒兩説不同詩箋云此喻幽王見老成之人反侮慢之視如幼稚不自顧念年老人之遇已亦將然也朱子集傳云但知讒害人以取爵位而不知其不勝任如老馬憊矣而反自以為駒不顧其後將有不勝任之患也此詩若主前説乃時輩輕侮之喻正與情義誰似相闗若主後説乃老年力疾之喻又與手足輕旋相合前説黃伯思用之後説劉㑹孟用之朱注則主前説而駁後説深杜臆近世人情當時得意過則忘之况肯如王生之眷乎一説平時意氣相得况今日又深加眷注此王生情義之過人也前説當字讀去聲後説當字讀平聲謝安與支遁書得意之事殆為都盡南史陳暄書寂寥當世朽病殘年左傳張趯曰子其無事矣杜詩長篇起局或比或賦多是攝起全篇此章麟角二句舊注謂比王生抱負竒才必用世乃見於篇中不相闗涉唯盧元昌之説獨得其㫖葢公過王倚時本尫羸病軀及與之談情愫留歡宴不覺手足輕旋沈疴為之頓起真有似乎煎膠續弦者通篇脉絡照應確不可移此章贈王倚後有贈姜七少府詩皆用方言諺語葢王姜二子本非詩流故就世俗常談發出懇至真情令其曉然易見文章淺深隨人而施此其所以有益也送裴二虬尉永嘉鶴注天寶十一載公獻三大禮賦委官試文但送有司參選其贈集賢學士詩云故山多藥物勝槩憶桃源葢有南遊之志矣與此詩扁舟之説相合梁氏編在十三載或相近裴又曰裴虬大厯四年為道州刺史公有暮秋枉道州手札詩憶子初尉永嘉去考世系表虬終於諫議大夫乃洗馬裴之後蔡曰虬字深原韓愈裴復墓誌父虬有氣畧敢諫諍官諫議大夫有寵代宗朝屢辭不拜卒贈工部尚書唐書永嘉縣屬温州孤嶼亭何處天涯水氣中故人官就此絶境興一作與誰同隠吏逢梅福遊山憶謝公扁舟吾已僦即又切舊作就王作具一作買把釣一作只是待秋風尉本微員無事功可見故就永嘉山水寫出登臨韻事隠吏承官切縣尉遊山承興切永嘉末乃不忘故交兼有失志逺遊之意寰宇記孤嶼在温州南四里永嘉江中嶼有二峯謝靈運登江中孤嶼詩云孤嶼媚中川後人建亭其上梁簡文帝詩荻陰連水氣陶潛桃花源記序來此絶境不復出焉去漢書梅福九江人補南昌尉王莽専政一朝棄妻子隠於㑹稽至今傳以為仙汝南先賢傳稱鄭欽為吏隠郡有名山水肆意遨遊宋書謝靈運出為永嘉太守僦雇舟也前漢食貨志天下職輸或不償其僦費淮南子有就車黄生曰上半送裴下半自叙東道有知交遊踪有前哲故起扁舟之興與第四相應秋風把釣句法倒裝耳絶杜詩傳刻有音近而訛者如異花來絶域誤作開域遂與開拆犯重有形近而訛者如扁舟吾已僦誤作吾已就遂與就此犯重又如巫覡綴蛛絲誤綴為醉亦音近而訛况復傳宗匠誤匠為近亦形近而訛也贈獻納使去聲一本無使字起居田舍人澄鶴注蔡興宗謂獻封西岳賦在天寶十三載冬玩詩末二句當是其年未進賦時所投贈演義獻納使掌封匭起居舍人掌起居注田必起居而兼獻納也朱注田以起居舍人知匭事獻納使其兼官耳舊注謂中書舍人知匭此制始於寶應元年誤矣唐書垂拱二年置匭以受四方之書以諫議大夫補闕拾遺一人充使知匭事天寶九載以匭聲近鬼改為獻納使唐志每仗下議政事起居郎一人執筆記録於前史官隨之後復置起居舍人分侍左右秉筆隨丞相後獻納司存雨露邊一作偏地分清切任才賢舍人退食收封事宫女開函捧一作近御筵曉漏追趨一作飛青𤨏闥晴窗㸃檢白雲篇揚雄更有河東賦唯待吹嘘送上上聲天獻納舍人上四竝提下四分頂清獻納本在外而曰司存雨露邊以獻納屬於舍人也切承雨露舍人本在内而曰退食收封事以舍人兼管獻納也開函承封事追趨禁闥㸃檢雲篇申明舍人之事河東有賦吹嘘上呈申明獻納之職雙提分頂局法整齊翫結語知公久懐獻賦之意矣沈約恩倖論堦闥之任各有司存詩注雨露者天所潤萬物喻王者恩澤也分韓王嘉詩地分丹鷲嶺劉楨詩拘限清切禁地分處其地也清切淸要切近也至袁淑詩八方凑才賢以詩退食自公後漢書冬夏八能士書版言事封皂囊唐書内官有掌書三人掌傳宣啟奏審唐制便殿奏事宫女開匭函以所投封事奏御杜言詩帝子王臣捧御筵𤨏又詩風清曉漏聞塗范雲詩攝官青𤨏闥漢書注青刻為連𤨏文以青之宫闕簿青𤨏門在南宫白漢武帝秋風詞秋風起兮白雲飛薛夢符引此以証雲篇周穆王白雲謡乗彼白雲至於帝鄉張綖引此以比清切地據新史舍人本紀言之職惟編詔書檢㸃白白雲篇指所編詔書是也演義以檢㸃屬獻納司所謂雲篇者草茅之言必檢㸃而後收之此以在下詩文為白雲篇朱注引陶淵明和郭主簿詩遙遙望白雲懐古意何深故郎士元馮翊西樓詩有陶令好文常對酒相招一和白雲篇言在野文章舍人皆得上達故下接以賦待吹嘘楚中張希良力辨其差謬風揚雄傳上陟西嶽以望八荒迹殷周之墟思唐虞之雄上河東賦以獻後公詩賦料揚雄敵葢素以子雲自方也註姜宸英曰漢鄭泰傳孔公緒清談髙論嘘枯吹生枯者嘘之使生生者吹之使枯又淮南子嘔之而生吹之而死二字義正相反今竿牘家動云吹嘘其誤已久抱朴子二至之氣吹嘘不能增北史盧思道剪拂吹嘘長其光價庾信詩疇昔濫吹嘘則諸公並沿襲之矣漢樂歌飛龍遊送上天朱瀚曰末句似巫覡燒紙錢狀殊堪捧腹黄鶴曰天寶九載正月庚戌羣臣請封西岳從之三月西嶽廟災時久旱制停封西嶽故十三載公又奏賦以請未幾兵戈四起卒不果行崔駙馬山亭宴集鶴注梁氏編在天寶十四載是年禄山反狀已明七月遣蕃將獻馬此時上下皆憂公豈容終日困香醪或是十三年秋作𤣥宗女晉國公主下嫁崔恵童咸宜公主下嫁崔嵩此駙馬乃惠童惠童京城東有山池蕭史幽棲地林間踏鳳毛洑流何處入亂石閉門高客醉揮金椀詩成得繡袍清秋多宴㑹一云賞樂終日困香醪上四山亭之景下四宴集之事矣蕭史比崔駙馬鳳毛謂林間遺迹時公主葢已逝世流泉洄曲石勢嶔岑此正寫其幽勝賔主豪興則於下截寫出地鮑照詩蕭史愛長年詳見首巻江總詩獨於幽棲鳯毛見首巻記何遜詩洑流自洄糾洑洄流也詩諸葛武侯黄陵廟亂石排空驚濤拍岸宋之問客醉山月静孔禮記執玉爵者勿揮注不可振去餘瀝恐失墜也氏志怪漢盧充家西有崔少府墓充與崔女為幽婚生子臨别贈以金椀并詩云何以贈余親金椀可頤兒此切崔而用之并見公主已故唐㑹要天授二年内出繡袍賜新除都督刺史比刺繡作山形繞山勒囘文又延載元年内出繡袍賜文武從官三品以上宰相飾以鳳池尚書飾以對雁舒襟皆各為囘文舊唐書則天幸洛陽龍門令從官賦詩先成者以錦袍賜之晉書山簡傳燕㑹之日酌美酒枮蚌藉蘭肴庾信詩香醪易困於酒食示從去聲孫濟鶴注詩言權門多噂㳫且復尋諸孫則濟所居在長安矣當是天寶十三載作征朱注唐書宰相世系表公為征南十三代濟為南十四代今詩云諸孫則公與濟當隔二代非姪行矣恐表未可據平明跨驢出未知一作委適誰門權門多噂尊上聲沓且復扶又切尋諸孫從訪濟叙起潦倒中仍存氣骨斯陶詩飢來驅我去不知竟何之行行至里叩門拙言辭此詩起語本之走楚辭平明發兮蒼梧箋前漢息夫躬傳交遊貴戚趨權門詩噂沓背憎噂噂沓沓相對語背則相憎逐諸孫貧無事宅一作客舍如荒村堂前自生竹堂後自生萱萱草秋已死竹枝霜不蕃吴作繁郭作翻此見宅舍之景而傷本支零落賦而比也牀何氏語林王泰年數歲時祖母集諸孫姪散棗栗於劉峻詩修竹堂陰植疏詩焉得䕶草言樹之背注萱草令人忘憂背北堂也房堂所居之地總謂之堂左傳其生不蕃淘米少汲水汲多井水渾刈葵莫放手放手傷葵根此見朝饔之事諷其加意根源比而興也源趙次公云族之有宗猶水之有源葵之有根也水有勿渾之而已葵有根勿傷之而已族有宗則勿疎逺之而已漢易正義汲水以至井上鮑照詩腰鎌刈葵藿後永平詔殘吏放手古吴越春秋食其實者不傷其枝飲其水者不濁其流詩採葵莫傷根傷根葵不生結交莫羞貧羞貧交不成阿翁懶惰久覺兒行步奔所來一作求為去聲下同宗族亦不為盤飱音孫小人利口實一云實利口薄俗難具論平聲勿受外嫌猜同姓古所敦末述過訪之意朂其敦厚同姓詳玩詩詞似為濟有嫌疑而發在行步奔承上淘米汲水利口實起下外人猜嫌文氣四句分截此章起首中間各四句前段六句末段八句懶世説張憑對其祖曰阿翁詎宜以子戲父陶潛詩惰故無匹世説王右軍曰恒恐兒輩覺損欣樂之趣跨盧注謂公欲警覺兒輩故奔走而來此説未合公本驢而出非步行而至者行步當就濟言也神仙傳王烈行步如飛焉坊記聚其宗族以教民睦左傳乃饋盤飱置璧邵注盤盛飯器飱水澆飯也自按口實有二義若承上盤飱是口腹貪饕當以頤卦求口實為証若照下外嫌是口舌讒間當據尚書以台為口實作証宜從後説為確嫌徐衆三國評情義足以勵薄俗邵清外嫌猜外人疑而生猜忌鮑照詩不受外嫌猜肉孔叢子同姓為宗合族為屬在曹植求通親親表骨之恩爽而不離親親之義實敦固此敦字所本葵補注隋李宻詩荒村藿深盧元昌曰大厯七年元載黨徐浩屬杜濟以知驛奏優貶杭州刺史據此濟交必多比匪宜此詩有權門噂沓小人利口等語葢公之先見也九日寄岑參此當是天寶十三載九月作解通考岑參南陽人天寶三載進士褐為衛率府兵曹參軍出門復入門雨一作兩脚但如一作仍舊所向泥活活音括一作浩浩思君令平聲人痩沈吟坐西一作秋軒一作吟卧軒窗下飲一作飯食錯昬晝寸步曲江頭難為一相就首叙沮雨思岑坐出門欲訪岑也軒不能往矣錯昬晝陰雨晦䝉曲江頭岑參所在流齊民要術種麻截雨脚即種者地濕麻生痩詩北活活謝靈運詩活活夕流駛趙曰活活泥水深多行有聲也古詩思君令人老軒車來何遲謝靈運詩沈吟為爾感兮晉劉妙容歌西軒琴復清願盧照隣詩寸步千里不相聞鮑照行路難且得志數相就吁嗟乎一作呼非蒼生稼穡不可救安得誅雲師疇能補天漏大明韜日月曠野號平聲禽獸君子强區兩切逶迤小人困馳驟次寫淫雨之害常呼蒼生憂天漏極悲天憫人之詞趙曰書夜雨故日月韜晦飛走路窮故禽獸哀號君子有車馬亦强逶迤而已小人徒步故困於馳驟也詩吁嗟乎騶虞尚書海隅蒼生又稼穡作甘雅張衡思𤣥賦雲師􅞝以交雜兮洙曰雲師名屏翳廣雲師謂之豐隆列子女媧氏鍊五色石補天生梁益州記雅州西北有大漏天小漏天彼禮器大明於東廣稚日曰大明詩匪兕匪虎率曠野楚辭鳥獸鳴以號羣兮而江淹詩君子未獲宴小人亦自營登樓賦路逶迤修逈兮莊子馳之驟之韓非子馳驟周旋維南有崇山恐一作漭與川浸溜是節一作旹東籬菊紛披為去聲誰秀岑生多新詩一作語性亦嗜醇酎直又切采采黄金花何由滿一作灑衣袖末傷九日時景披髙山幾沒故籬菊空岑生興在詩酒不能一采黄花此又代為悵怏正應上思君意此章三段各八句惟南二句當連下籬菊葢用陶詩也流西都賦崇山隠天一統志崇山屬澧州漢周禮注水而趨海者曰川深積而成淵者曰浸前枚乗傳泰山之溜穿石今按溜水流漂急也東梁簡文帝九日詩是節協陽數陶潛九日詩采菊籬下悠然見南山雜中山王文木賦華葉分披庾信賦紛披草樹西京記正月旦造酒八月成名曰九醖一名醇酎張載酒賦中山夏啟醇酎秋發鄒陽酒賦凝醳醇酎千日一醒詩采采巻耳左貴嬪菊頌春茂翠葉秋耀金花張翰聲詩黄花似散金江淹詩風至衣袖泠張綖曰此詩憂國家危亂將至而氣象愁慘􅆁之北風其涼雨雪其雱恵而好我擕手同行意正相似今按通鑑天寶十三載秋八月闗中大饑上憂雨傷稼國忠取禾之善者獻之曰雨雖多不害稼也扶風太守房琯言所部水災國忠使御史推之是歲天下無敢言災者高力士侍側上曰滛雨不已卿可盡言對曰自陛下以權假宰相賞罰無章陰陽失度臣何敢言詩中蒼生稼穡一段確有所指雨師惡宰相之失職天漏譏人君之闕德韜日月國忠䝉蔽也號禽獸禄山恣横也君子小人貴賤俱不得所也嘆庭前甘菊花鶴注此當是天寶十三載在長安時作葢獻西岳賦之後庭一作堦一作簷前甘菊移時晚青蕋重平聲陽不堪摘明日蕭條醉盡醒一作盡醉醒殘花爛熳開何益籬邊野外多衆芳采擷細𤨏升中堂念兹空長丁丈切大枝葉結根失所纒一作埋風霜此詩借庭菊以寄慨甘菊喻君子衆芳喻小人傷君子晚猶不遇而小人雜進在位也杜臆菊有甘苦二種甘者可入藥苦者似菊而非其名曰薏所云衆芳細𤨏者薏之屬也移時晚言移植後時根失所謂失其故處枯鮑令輝詩庭前華紫蘭帝晉清商曲甘菊吐黄花樹賦九畹移根魏文書九為陽數日月竝應名曰重陽辭梁元帝詩時蔽摘花人陶潛詩風聲自蕭條楚衆人皆醉我獨醒庾信詩殘花爛熳舒之世説顔延之於籬邊聞張演與客語爾雅野外謂林楚辭哀衆芳之蕪穢謝朓詩遇君時採擷兹抱朴子臭鼠之細𤨏夜劉楨詩萬舞在中堂書念在兹古詩枝葉日寒陸機詩結根奥且堅繁欽詩蕙草生山北托身失所依南史劉俣詩城上植草根非不高所恨風霜早承沈八丈東美除膳部員外郎阻雨未遂馳賀奉寄此詩鶴注此是天寶十三載作葢是年九月淫雨不止詩云清秋霖潦正其時也題首承字乃謙己尊人之詞後承聞故相房公詩題亦然唐書膳部屬禮部郎中員外各一人太平廣記紀聞唐沈東美為員外郎太子詹事佺期之子朱注唐書佺期以起居郎兼修文館直學士與公祖審言同事武后故詩中有舊史通家等語而比東美為諸父又律體盛於佺期故云詩律羣公問也舊説沈丈俱作沈既濟之胄大謬既濟德宗時人唐書可考今日西京掾多除南省郎原注府掾四人同日拜郎通家惟沈氏謁帝似馮唐詩律羣公問儒門舊史長清秋便平聲寓直列宿頓輝光首叙沈除員外家掾多除郎四人同拜也沈為世交故云通晚得郎官故比馮唐詩律二句稱其家學清秋二句新授員外也法黄希曰掾謂京兆府掾如司録功曹倉曹户曹兵曹曹士曹之類唐志竝正七品府掾拜郎葢自七品而升六品也又曰西京掾明掾起於漢西京也兩漢有决曹掾賊曹掾又張湯以兒寛為奏讞掾九通家見本巻後曹植詩謁帝承明廬漢書馮唐年十餘為郎漢鍾皓傳以詩律教授同郡陳寔本謂詩與律法此詩則指詩之律體希曰宋之問傳魏建安後迄江左詩律屢變至沈約庾信以音韻相婉附屬對精宻及之問佺期又加靡麗又沈約亦修宋史顔延之詩國尚師位家崇儒門張衡西京賦雅好博古學乎舊史氏掾殷仲文詩獨有凊秋日潘岳秋興賦序余以太尉兼虎賁中郎將寓直於散騎之省寓寄也五後漢書郎官上應列宿出宰百里史記正義郎位十星在太微中帝座東北杜佑曰近代皆以郎官上應列宿為尚書郎故事按天文有虎賁郎位等星皆在太微帝座後為翊衛之象應劭楊秉所言三署郎是也世人謂之尚書郎則誤矣其失葢自梁陶藻職官要録以漢三署郎故事通為尚書郎循名失實疑誤後代也曹植詩列宿正參差焦竑曰星宿之宿韻畧音秀誤宿是日月五星之次舍以止宿為義隂符經天發殺機移星易宿地發殺機龍蛇起陸又古詩知星宿衣不覆亦作入聲讀曹植登臺賦齊日月之輝光未暇申安吴作宴慰含情空激揚司存何所比膳部黙悽傷原注甫大父昔任此官貧賤人事讀平聲畧經過平聲霖􅕙妨禮同諸父長丁丈切恩豈布衣忘次言阻雨失賀司安慰謂往賀之詞存二句承前南省自念其祖也霖潦為淫雨所阻禮同二句應前通家自述交情也續漢書趙岐為太僕持節安慰天下古詩焦仲卿妻時時為安慰氣王粲詩含情欲待誰激揚喜躍之意潘岳恨賦神激揚蔡中郎詞事字叶讀時帝曰休哉命公三事乃耀柔嘉式是百司陶潛詩野外罕人事蕭賁詩經過狹斜里曹攄詩霖潦淹庭除綰傳待客如布衣交詩以速諸父衣漢書盧諸父謂沈布自謂天路牽騏驥雲臺引棟梁徒懐貢公喜颯颯􅁂毛蒼末乃頌沈而自慨天路雲臺沈仕於朝騏驥棟梁言能致逺而任重無此章前二段各八句後段四句收枚乘傳天路隔期髙曹植表騏驥長鳴伯樂昭其能史淮南子雲臺之髙注臺髙際於雲故曰雲臺南袁粲見王儉曰栝柏豫章雖小已有棟梁器矣詩貢公喜見首巻栁惲詩颯颯似霜葉謝朓寧傷蓬􅁂颯苦雨奉寄隴西公兼呈王徵士鶴注此亦夭寶十三載秋作原注隴西公即漢中王瑀徴士瑯琊王徹舊唐書瑀讓皇帝第六子早有才望偉儀表初封隴西郡公天寶十五載從𤣥宗幸蜀至漢中因封漢中王左傳秋無苦雨今秋乃淫雨仲月來寒風羣木水光下萬家一作象非雲氣中所思礙行􅕙九里信不通悄悄素滻音産路迢迢天漢東願騰六尺馬一作駒背若孤征鴻劃忽黙切見公一作君子面超然懽笑同此秋苦淫雨而思隴西公也難羣木二句雨中逺景悄悄二句阻水行曰騰馬欲陸行以見隴西也齊爾雅久雨謂之淫雨殊陶潛詩寒風拂枯樹南史武帝紀青翠扶疎有羣木高鮑照詩水光溢兮松霧動漲秦國策効萬家之都唐賦其上獨有雲氣水故映木積雨故雲多阮籍詩登髙晀所思指詩泂酌彼行潦疏云行道也潦雨水也趙曰九里隴西所居謝惠連詩九里樂同潤北詩憂心悄悄悄悄憂貌征長安志滻水在萬年縣東流四十里入渭潘岳西賦𤣥灞素滻陸機詩迢迢造天庭迢迢逺貌天趙曰天漢乃中渭橋之所三輔黄圖渭水貫都以象漢横橋南渡以法牽牛是也西征賦儀景星於天漢劉周禮馬八尺以上為龍七尺以上為騋六尺為馬孝綽詩持此連樹枝暫作背飛鴻曹植詩孤鴻飛南遊孤此言身跨馬背若飛鴻孤征也趙曰鴻羣飛猶詳緩飛則逐伴而急疾隋書文帝謂李德林曰昨宵恨夜長不得早見公面曹植詩翩翩我公子李宗室故稱公子王筠詩超然獨長往歡曹植詩笑盡娱奮飛既胡越局促傷樊籠一飯四五起慿軒心力窮嘉蔬没溷濁時菊碎榛叢鷹隼亦屈猛烏鳶何所蒙式瞻北隣居取適南巷翁挂席釣川漲焉於䖍切知清興去聲終此不見隴西而思王徵士也曰奮飛四句承上起下嘉蔬四句雨中近景挂席欲水行以見徵士也隔此章上下二段各十二句異詩不能奮飛趙曰相如胡越猶王粲所云胡越區也仲長統述志詩人事可遣何為局促賦莊子澤雉不蘄畜乎樊中注樊所以籠雉也齊高帝傷樊籠之或累古史周公一飯三吐哺曰劉楨詩起坐失次第一日三四遷吴志潘濬謂孫權樊佃昔嘗為州人設饌比至日中十餘自起稻江淹詩慿軒詠堯老自胡廣傳心力克壯朱注記曰嘉蔬郭璞江賦挺然之嘉蔬又公園官送菜詩并序皆以嘉蔬為菜義可兼用耳菊溷濁泥水也郭璞風賦駭溷濁揚腐餘潘岳詩時耀巖阿鷹春秋感精符季秋霜始降鷹隼撃春張華鷦鷯賦蒼鷙而受緤屈猛志以服養吴越秋歌仰飛鳥兮鳥鳶型晉劉頌疏不識所䝉更生之恩如式瞻儀式用也潘尼詩𤓰牙司北隣世説不謝靈運山居賦隨時取適子瞻北隣則南翁為之適意盧注偪側行云我居巷南巷北故知公為南巷翁也海賦揚徴綃掛㠶席謝靈運詩掛席拾海月無王勃詩清興殊未闌末謂同遊漲水則興終盡秋雨嘆三首盧注唐書天寶十三載秋霖雨害稼六旬不止帝憂之楊國忠取禾之善者以獻曰雨雖多不害稼公有感而作是詩雨中百草秋爛死階下决明顔色鮮著陟畧切葉滿枝翠羽葢開花無數黄金錢涼風蕭蕭吹汝急恐汝後時難獨立堂上書生空白頭臨風三嗅馨香泣首章嘆久雨害物上四喜决明耐雨下則憂其孤立而摧風也賦中有比信申涵光曰凉風吹汝二句説君子處亂世甚危庾詩爛草變初螢黄本草圖經决明子夏初生苖葉似苜蓿而大七月開花結角其子作穗似青菉豆而鋭杜定公曰神農本草决明子生龍門川澤間與石决明同皆主明目故有决明之號説苑鄂君乗青翰之舟張翠羽之葢涼楊方詩黄花如沓金白花如散銀之月風至荆卿歌風蕭蕭兮易水寒月令孟秋詩籜兮籜兮風其吹汝何南史宋江湛之謂沈慶之曰與白面書生輩謀之事由濟論語三嗅而作宋之侯詩安得久馨香闌一作蘭風伏英華作長去聲荆公作㐲雨一作東風細雨秋紛紛四海一云萬里八荒同一雲去馬來牛不復扶又切辯濁涇清渭何當分禾一作木漫叟詩話定作禾頭生耳黍穗黑農夫田父一作婦無消息城中斗一作㪷米換一作抱非衾音欽裯音儔相許寧論平聲兩相直次章歎久雨害人上四皆積雨之象下慨傷稼而阻饑也吴論闌風伏雨無日不雨四海八荒無處不雨田野城中則又無人不受其患矣珊盧注換米不計直療饑急救寒緩也趙子擽曰闌之風沈伏之雨言其風雨之不已也闌如謝靈運闌暑之闌伏如左傳夏無伏陰之伏舊引楚辭光風泛崇蘭以伏為三伏非是朱注謝靈運詩􅄒職期闌暑又張協苦雨詩堦下伏泉湧用字皆出文選闌風伏雨大抵是風過雨來之狀秋深時往往有之胡仔謂長雨如長物之長亦未安荆公本作仗雨當即伏字之訛耳淮南子八埏之外曰八荒而詩上天同雲而左傳風馬牛不相及疏云馬逐上風去牛逐下風來莊子秋雨時至百川灌河兩涘渚涯之間不辯牛馬三西征賦其北則有清渭濁涇闗中記涇水入渭合流百里清濁不相雜朝野僉載俚諺曰春雨甲子赤地千里夏雨甲子乘船入市秋雨甲子禾頭生耳朱注禾生耳謂牙蘖絭巻如耳之形潘岳秋興賦談話不過農夫田父之客注蔡琰詩迎問其消息詩抱衾與裯裯單被也盧是秋帝令出太倉粟減價糶與貧人但上雖減價而下不論直葢霑實惠者少矣長安布衣誰比數所主切反鎻衡門守環堵老夫不出長丁丈切蓬蒿稚子無憂走讀作奏風雨雨聲颼颼疎鳩切催早寒胡雁翅濕高飛難秋來未曾陳浩然本作省見白日泥汚去聲后一作厚土何時乾音干寥末章自嘆久雨之困上四言雨中落下則觸景而増愁也農夫田父槩指長安之人老夫稚子自述旅居情事日者君象土者臣象日暗土汚君臣俱失其道矣前漢鄒陽傳布衣窮居之士賦司馬遷答任安書刑餘之人無所比數杜篤論都懼闗門之反拒庾信詩驚妻倒閉門即所謂反鎻也之詩衡門之下可以棲遲注横木為門記儒有環堵室注環周圍也方丈為堵詩老夫灌灌仲莊子庚桑篇鑿垣墻而植蓬蒿趙岐三輔决録注張蔚隠身不仕所居蓬蒿没人歸去來詞稚子候門照盧僎詩風雨暗颼颼詩顔延之詩秋至恒早寒鮑詩胡雁已矯翼庾信雁濕㫁行來古詩奮翅起高飛溢魏文帝秋霖賦悲白日之不暘九辯皇天淫而秋霖兮后土何時而得乾此感秋雨而賦詩三章各有諷刺房綰上言水災國忠使御史按之故曰恐汝後時難獨立國忠惡言災異而四方匿不以聞故曰農夫田父無消息帝以國事付宰相而國忠毎事務為䝉蔽故曰秋來未嘗見白日語雖微婉而寓意深切非泛然作也奉贈太常張卿垍舊作均黄鶴定作垍二十韻張垍為太常卿在天寶十三載當是其年作貶朱注舊書天寶十三載三月張均由憲部尚書建安太守還為大理卿不言均嘗為太常卿也此詩乃是與垍考舊書均傳云九載遷刑部尚書自以才名當為宰輔楊國忠用事罷陳希烈引韋見素代之仍以均為大理卿均大失望垍傳云十三載盡逐張垍兄弟出均為建安太守垍為盧溪司馬歲中召還再遷為太常卿新書均還授大理卿垍授太常卿與舊書合通鑑亦云至德元年五月太常卿張垍薦虢王巨有勇畧此詩是贈垍甚明舊本作均乃刀筆之訛耳前漢百官表奉常秦官掌宗廟禮儀有丞景帝中六年更名太常方丈三韓外崑崙萬國西建標天地濶詣絶古今迷氣得神仙迥恩承雨露低相去聲門清議衆儒術大名齊先引古託諷言方丈崑崙其東西異標在天地遼濶之鄉欲往詣絶域乃古今共迷之處張垍於寶仙洞中求得真符其感神仙而膺主眷豈若前世之渺茫乎又繼之曰宰相之門實清議所屬儒術相繼宜父子齊名豈可求仙以結主知乎言外隠含譏刺𤣥張逺注通鑑天寶九載十月太白山人王元翼言見元皇帝云寶仙洞有妙寶真符命刑部尚書張均等往求得之此必與垍同行也史記秦紀齊人徐市等上書言海中有三神山名曰蓬萊方丈瀛洲仙人居之於是遣徐市入海求仙人十洲記方丈洲在東海中央東西南北岸相去正等方丈方五千里四魏志韓在帶方之南東西以海為限南與倭接方可千里有三種一曰馬韓二曰辰韓三曰弁韓辰韓者古之辰國也馬韓在西萬周穆王升崑崙出列子水經崑崙墟在西北去嵩五里易先王以建萬國之天台山賦赤城霞起而建標所晉書嵇康傳神仙禀自然詩蓼蕭注雨露者天潤萬物喻王者恩澤𤣥相門見贈韋左丞詩垍乃説之子故曰相門晉傅士風論先王之御天下教化隆於上清議行於下清議即月旦評意先史記招致儒術之士孔叢子莫不服生之大名也軒冕羅天一作髙闕琳瑯識介珪伶官詩必誦夔樂典猶稽健筆凌鸚鵡銛音纎鋒瑩縈定切鷿音匹鵜音題友于皆挺拔公望各端倪通籍踰青𤨏亨衢照紫泥靈虬傳夕箭歸馬散霜蹄能事聞重平聲譯嘉謨及逺黎弼諧方一展班序更何躋此稱美張卿律軒冕多人而介圭特重言清卿之貴伶官誦詩而樂待稽言太常之職筆能作賦而詞鋒如劍兄弟挺出而公卿可期此言文章品望身居青𤨏而文映紫泥漏深傳箭而騎馬出朝此言出入恩寵制作遙傳而謀猷及逺弼諧得展而班次莫加此言勲名爵位闕七命軒冕蕩蕩左傳服冕乘軒袁豸詩連吹入天人楚辭璆鏘鳴兮琳瑯世説有人見王太尉諸公還諸曰今日之行觸目見琳瑯珠玉琳瑯佩玉之飾言於琳瑯中識介圭也序詩錫爾介圭箋介圭長尺有二寸洙曰􅆁詩簡兮仕於伶官注伶氏世掌樂官故後世號樂官為伶官命女典樂教胄子漢禮樂志誦六詩習六舞筆書夔庾信宇文順集序章表健一付陳琳㸃後漢書禰衡在黄祖座作鸚鵡賦筆不停綴文不加西京賦胸突銛鋒爾雅注鷿鵜似鳬而小膏中瑩刀劍載嵩詩劍瑩鷿鵜膏下黄徹䂬溪詩話書言惟孝友于兄弟後漢史弼傳陛信於友于不忍恩絶而淵明詩遂云再喜見友于詩言貽厥孫謀南史到溉之孫藎從宋武帝登北固樓賦詩帝稱為才子後溉和上詩上輒手詔戲之曰得無貽厥之力乎而王儉碑文又云貽厥之寄允屬時望杜詩友于皆挺拔昌黎詩誰謂貽厥無基址二事正可作對愉文心雕龍景純仙篇挺拔而為俊矣晉虞􅔎傳孔有公才而無公望丁潭有公望而無公才南史謝舉傳人倫儀表久著公望莊子終始反覆不知端倪端緒也倪畔也漢文帝紀令從官給事官司馬中者得為大父母父母兄弟通籍應劭曰籍者為二尺竹牒記其年紀名字物色懸之宫門按騐相應乃得入也易應劭曰黄門侍郎毎日暮向青鎻門拜謂之夕郎何天之衢亨紫泥注見二巻此言掌綸翰之事也抱陸倕新漏刻銘靈虬承注陰蟲吐噏銅史司刻金徒箭莊子馬蹄可以踐霜雪曹植詩俯身散馬蹄蘇伯王妻詩何惜馬蹄歸不數袁淑詩畢能事之效前西域傳越裳重譯獻白雉師古曰譯謂傳言也道路絶逺風俗殆隔故累譯而後乃通朱注時垍自貶所召還故有重譯逺黎之句揚子法言忠言嘉謨謂沈佺期詩宸慈恤逺黎有書謨明弼諧朱注班序班爵之序更何躋言莫躋其上者左傳朝以正班爵之義帥長㓜之序適越空顛躓遊梁竟慘悽謬知終畫虎微分音問是醯雞萍泛一作跡無休日桃陰想舊蹊吹嘘人所羨騰躍事仍暌碧海真難涉青雲不可梯顧深慙一作㤀鍜鍊才小辱提擕檻束哀猿呌一作巧枝驚夜鵲棲幾時陪羽獵應平聲指釣璜溪末乃自叙淪落也知適越遊梁浪遊之迹同􅀞虎謂召試不遇分等醯雞謂抱道不行萍踪無託而囘想舊居以張公吹嘘之後騰躍終沮也從此碧海無涯青雲難上矣雖蒙顧遇提擕亦自愧才疎未鋉耳哀猿驚鵲困窮莫訴陪獵釣溪終望張之見引也此章八句起下兩段各十六句又趙注公初落魄時嘗適越矣傳所謂客吴越是也公嘗遊梁矣贈李白詩所謂亦有梁宋遊是也抱莊子宋人章甫而適越越人斷髪文身無所用之樸子闇於自量者忘中道之顛躓史記相如因病免客遊梁也楚辭心閔憐之慘悽兮馬援傳畫虎不成反類狗莊子孔子見老聃出語顔囘曰丘之道其猶醯雞乎注甕中蠛蠓也詩蘋萍泛沈深古詩泛泛江漢萍漂蕩水無根謝靈運李廣傳贊桃李不言下自成蹊乖吹嘘見前洲莊子我騰躍而上不過數仞而下暌離也十記東海之東復有碧海水不鹽苦正作碧色梯注仙者因雲而升謂之雲梯謝靈運詩共登青雲顧眷顧也張協七命楚之陽劍歐冶所營乃鍜乃鍊萬辟千灌注鍜鍊刻苦成材之義曲禮長者與之提擕朱注垍必嘗薦公而不逹故有吹嘘提擕等句府淮南子置猿檻中非不巧㨗無所肆其能魏武樂月明星稀烏鵲南飛繞樹三匝無枝可依獵揚雄傳雄上河東賦其年十二月羽獵雄從因作羽賦以諷尚書大傳文王至磻溪見吕望拜之答曰望釣得玉璜刻曰姬受命吕佐檢上韋左相去聲二十韻見素初入相在天寶十三載之秋詩云四十春葢天寶十四載初春作且壽域洪釣廟堂風俗等句絶不及憂亂之詞後為左相在至徳二載題中左相二字黄鶴謂是後來追書是也射舊書職官志開元元年十二月改尚書左右僕為左右丞相天寶元年二月侍中改為左相中書令改為右相至德三載復舊𤣥宗紀天寶十三載秋八月文部侍郎韋見素為武部尚書同中書門下平章事代陳希烈鳳厯軒轅紀龍飛四十春八荒開壽域一氣轉洪鈞從朝宁昇平叙起故歲正紀厯已四十餘春御世久故八荒同壽春和至一氣鈞陶張綖謂歲初所作是也左傳郯子曰我髙祖少皥摯之立也鳳鳥適至故紀於鳥為鳥師而鳥名鳳鳥氏厯正也注少皥黄帝子鳳鳥知天時故以名厯正之官史記注黄帝居軒轅之丘因以為號北齊享廟歌龍圖革命鳳厯歸昌後漢李固疏陛下撥亂龍飛初登大位注時𤣥宗在位四十二年曰四十春舉成數也八荒見前前漢王吉傳毆一世之民躋之仁壽之域陶一氣見二巻張華詩洪鈞萬類霖雨思賢佐丹青憶舊樊作舊一作老一作直臣應圖求駿馬驚代今當作世得騏驎一作麒麟沙汰江河英華作湖濁調和鼎鼐新韋賢初相去聲漢范叔已歸秦盛業今如此傳經固絶倫豫樟深出地滄海濶無津此叙其入相之事任帝思良佐而韋以舊臣登用駿馬騏驎比其克勝大也沙汰舊相已罷調和新參初拜盛業承范傳經承韋深出地謂學有根柢濶無津謂度之汪洋唐書時雨潦六旬上嫌宰相非人楊國忠舉見素入白帝以相王府屬有舊恩遂用之所謂思賢佐憶舊臣也原注以老臣為相公之先人誤矣書説命若大旱用汝作霖雨前黄瓊傳賢佐為力舊鹽鐵論公卿者神化之丹青漢張安世傳朝無臣白用安世疏廣傳聖主所以惠養老臣形曹植獻文帝馬表臣於先帝世得大宛紫騂馬一匹法應圖秦國策吕不韋説陽泉君曰君之駿馬盈外廐求梅福傳欲以三代之法取當世之士猶以伯樂之圖騏驎於市蜀志周毖為吏部尚書與許靖共議進退天下之士沙汰穢濁顯拔幽滯法言江河以滌之時左相陳希烈以太子太師罷政事故曰沙汰江河濁乎莊子陰陽調和漢官儀三公助鼎和味楚國策夕調鼎鼐漢韋賢傳本始三年代蔡義為丞相封扶陽侯姜史記范雎字叔王稽載入秦昭王拜為客卿封應侯宸英曰豕韋與范同出故用范叔作對復盧僎詩盛業繼前修鄒韋賢兼通禮尚書少子𤣥成以明經仕至丞相故魯諺曰遺子黄金滿籯不如一經於匡衡傳材智有餘經學絶倫高士傳豫章之木生髙山史記注豫章二木名生七年乃可分别漾抱樸子滄海之滉北斗司喉舌東方領搢一作縉紳持衡留藻鑑聽履上上聲星辰獨步才超古餘波德照隣一云餘陰照北隣聰明過平聲管輅尺牘倒陳遵豈是池中物由來席上珍廟堂知至理風俗盡還淳此記其平時品望斗向為尚書故云北又兼兵部故云東方持衡吏部典選也聽履尚書登殿也獨步謂才藝出人照隣謂韋杜世交過管謂精於天文倒陳謂工於書翰下言乗時居位能正君而善俗後漢李固傳北斗為天之喉舌尚書亦為陛下喉舌書康王之誥畢公率東方諸侯入應門右顧命注司馬第四畢公領之郊祀志搢紳者弗道顔注縉本作搢挿笏於大帶與革之間耳非挿於大帶也或作薦縉者亦謂薦笏於紳帶之間耳時見素以兵部尚書為相率百官故曰東方領搢紳也為晉書太康四年制曰藻鏡銓衡唐書天寶五載見素吏部侍郎銓叙平允人士稱之我漢鄭崇傳哀帝時為尚書僕射每見曵革履上笑曰識鄭尚書履聲天子像帝座故云上星辰魏文帝與吴質書王仲宣獨步於漢南語書餘波入於流沙左傳波及晉國者君之餘也論德必有隣傅亮修張良廟教道亞黄中照隣庶幾號魏志管輅喜仰視星辰能明天文地理變化之數人神童又自言天與我才明壓前漢陳遵傳善書與人尺牘主者藏弆以為榮倒倒也吴周瑜傳晉劉元海傳竝云蛟龍得雲雨終非池中物廟記儒行儒有席上之珍以待聘前漢書贊議事於堂之上列子均天下之至理賔東方朔論美風俗何氏語林阮孝緒歎明山曰此言足使還淳返樸激薄停澆矣才傑俱登用愚蒙但隠淪長丁丈切卿多病久子夏索居頻黄作貧囘首驅流俗生涯似衆人巫咸不可問鄒魯莫容身感激時將晚蒼茫興去聲有神為去聲公英華作君歌此曲涕淚在衣巾末乃自叙困窮而有望於韋相也生登用承上隠淪起下多病索居寥落已甚且驅逐涯資身無策至此則天意難問而吾道莫容矣故不禁感懷賦詩而聲淚交流此條一步敲𦂳一步乃陳情之最悲切者張綖曰公雖時邁急於求進然必吾道契合者然後望其汲引故獨與韋公歌此曲此章四句起下三段各十二句用也沈約詩吏部信才傑蒙書疇咨若時登庸注庸楊惲傳足下哀其愚西京雜記相如素有消渴疾長檀弓子夏曰吾離羣而索居久矣俗王粲詩回首望安晉書謝尚脱畧細故不為流之事列子鄭有神巫自齊來曰季咸知人生死存亡禍福壽夭期以歲月莊子孔子再逐於魯削跡於衞窮於齊厄於陳蔡不容身於天下詩杜臆蒼茫興冇神起下歌此曲而此曲即所上韋相蒼茫意興勃發之貌庾信詩君能歌此曲拭曹植詩歔欷涕霑巾巾以淚者沙苑行盧注唐有四十八監以牧馬設苑總監天寶十三載以安禄山知總事公作沙苑行以諷之志水經注洛水東經沙阜北俗名沙苑元和郡縣沙苑在同州馮翊縣南十二里東西八十里南北三十里其處宜六畜置沙苑監寰宇記沙苑古城在朝邑縣南十七里君不見左輔白沙如白水一作白如水繚以周牆百餘里龍媒昔是渥洼生汗血今稱獻於此苑中騋牝三千匹豐草青青寒不死食音嗣之豪健西域無一云勝西域每歲攻一作收一作牧駒冠去聲邊鄙首叙苑中水草見良馬所由產風夢弼曰漢書京兆尹左馮翊右扶謂之三輔同州漢屬馮翊郡故曰左輔又曰白沙即沙苑也同州西北有白水縣以水白故名其境東南谷多白土自沙苑至白水有百餘里鶴曰西魏文帝大統三年周太祖為相國與髙歡戰於沙苑以其戰處宜六畜因置沙苑漢西都賦西郊則有上囿禁苑繚以周牆四百餘里禮樂志天馬徠龍之媒武帝紀元鼎四年秋馬生渥洼水中作寶鼎天馬之歌牝神異經西域大宛馬日行千里至日中汗血詩騋三千説文馬七尺為騋明馬匹見前短衣匹馬注又據風俗通或云馬夜行目照前四丈故曰一匹或云春秋左氏説諸侯相贈乘馬束帛帛為匹與馬相匹耳又布帛四丈為匹六書正譌云馬影四丈亦借用為匹三説紛紛不如文心雕龍為當駒詩茀厥豐草傳古詩青青河畔草攻注别見左邊鄙不聳王有虎臣司苑門入門天廐皆雲屯徒昆切驌驦一骨獨當御春秋二時歸一作朝至尊内外馬數將盈億一作至尊内外馬盈億伏􅇫在坰空大存逸羣絶足信殊傑倜它歴切儻它朗切權竒難具論平聲西次從廐中多馬形驌驦之特異雲詩矯矯虎臣都賦控飛亷入苑門劉表傳屯冀馬左傳唐成公如楚有兩驌驦焉馬融疏肅霜雁也其羽如練高首修頸馬似之故名江淹詩序楚謡漢風既非一骨相馬經良馬可以筯骨相也唯西京賦奉命當御趙曰虎臣所掌之馬雖多其中驌驦一種骨相堪充御用故每年春秋兩次進之廐蔡邕獨斷天子至尊朱注唐書尚乗局掌内外閑之馬總十二閑凡外牧歲進良馬印以三花飛鳳之字盈鶴曰王毛仲初監馬二十四萬後至四十三萬此云億概舉大數也野魏武詩老驥伏櫪志在千里其詩駉駉牝馬在坰之趙曰空大存言􅇫中坰外數空存不如苑馬之神駿也書曹毗馳馬射賦何逸羣之竒駿有魏文帝與孫權馬中國雖饒馬其知名絶足亦時之耳漢禮樂志志倜儻精權竒倜儻卓異也纍纍塠都回切阜藏奔突往往坡陀縱超越角壯翻騰英華作騰一作同麋鹿遊浮深簸蕩黿鼉窟此極狀在苑飛揚之態沙夢弼曰塠阜苑中山塢可以藏馬之奔突坡陀苑中汀可以縱馬之超越角壯猛而翻騰能與麋鹿同遊浮深淵而簸蕩直探黿鼉之窟前漢石顯傳印何纍纍潘岳懐舊賦墳纍纍以接隴頭陀寺碑溝池湘漢堆阜衡霍梁武帝詩黄落散堆阜西京賦窮虎奔突前漢吴王傳往往而有相如子虚賦罷池坡陀下屬江河又哀二世賦登坡陀之長坡匡俗正謬坡陀者猶言靡迤盧思道詩寥廓鸞山右超越鳳洲西龍赭白馬賦紛馳迥塲角壯永埒譚新論任均篇蛇有翻騰之質故能乗雲依霧桓曇瑗詩麋鹿自騰倚南都賦馬鹿超而龍驤公海賦戲廣浮深河東賦簸丘蕩巒後漢書龎德曰鴻雁巢於髙林暮而得所棲黿鼉穴於深淵夕而得所宿泉唐諱淵故改泉一作海非出巨魚長比人丹砂作尾黄金鱗豈知異物同精氣雖未成龍亦有神末段借魚形馬與上龍媒相應其杜臆泉出巨魚感龍精氣亦成神物而馬之簸蕩中者可知已趙次公曰龍或魚所化或馬所為故異物而同精氣門此章前二段各八句後二段各四句朱注公留花詩云沙苑臨清渭泉香草豐潔則泉即沙苑之泉也賢前漢眭𢎞傳海效鉅魚京房易傳海出巨魚邪人進人疎為賈誼鵩鳥賦化為異物成易精氣物西京賦海鱗變而龍王嗣奭曰此詩首言沙苑之寛濶繼言養馬之繁盛而苑中塠阜可藏奔突陂陁可縱超越此皆紀實事至角壯以下變幻神竒不可方物矣范盧元昌曰自禄山知總監事選健馬堪戰者驅歸陽得以助其叛勢篇中曰王有虎臣司苑門以見不須禄山也曰春秋二時歸至尊以見非禄山所得私畜也篇末巨魚正指禄山是時尾大已見巨魚雖不成龍而砂尾金鱗似有神彩患豬龍之僭擬真龍也靈湫詩云復歸虚無底化作長黄虬兩篇結語皆有寓意橋陵詩三十韻因呈縣内諸官鶴注詩云廨宇客秋螢又云荒歲兒女痩當是天寶十三載物價暴貴人多乏食時往見諸官而作又篇内不言禄山之事知非十四載所作矣開師氏曰天子之陵曰山陵取高大之意舊唐書元四年十月𦵏睿宗於橋陵奉先縣本同州蒲城縣以管橋陵改屬京兆府仍改為奉先開元十七年制官員同赤縣新書橋陵在奉先縣西北三十里豐山先帝昔晏駕兹山朝音潮百靈崇岡擁象設沃野開天庭即事壯重平聲險論平聲功超五丁坡陀因一作用厚地一作力郤畧羅峻屏前四段歴叙橋陵始末首記山陵之濶大也百靈言諸神拱䕶象設石馬之類天庭壇宇之高即事起陵之事五丁開鑿之功陂陀言山勢迢逓却畧狀山背後擁蕭望之傳先帝聖德漢書宫車晏駕注王者初崩臣子之心猶謂宫車晚出嵇宋之問詩兹山棲靈異東都賦禮神祇懐百靈康賦記峻嶽之崇岡宇招魂象設居室静安間些注象法也言為君造設屋法象舊廬國策蘇秦説惠王曰秦地沃野千里欣揚雄甘泉賦開天庭兮回羣神險陶潛詩即事多所易習坎重險也天台賦履重而踰阪力史記甘茂傳樂羊返而論功輒華陽國志蜀有五丁士能移山舉萬鈞每一王死為立大石長三丈重千鈞為墓志已坡陀注見上章畧東京賦豈徒跼髙天蹐厚地而哉古樂府却再拜跪雲闕虛冉冉松風肅泠泠石門霜露一作霧白玉殿莓苔青宫女晚一作曉知曙祠官一作臣朝見星空梁簇畫㦸陰井敲銅瓶此記寢殿而及守陵之事門雲闕凌虚言高大也松風肅然言陰寒也石泠故霜露常凝玉殿空故莓苔常緑祠官早入故梁間簇㦸宫女奉盥故銅瓶汲井漢祭祀志雲氣成宫闕陶潛詩冉冉星氣流海顔延之詩松風遵路急門離騷下泠泠而來風山經積石之山其下有石此石門指墓門言記霜露既降君子履之必有悽愴之心郎曹植詩歡坐玉殿孫綽賦踐莓苔之滑石後漢顗疏簡出宫女夕前漢郊祀志祠官各以歲時祠如故聞江斆讓㛰表不見晚魄朝不見曙星謝靈運詩曉夕飈急晚見朝日暾此詩晚知曙朝見星所自出絲薛道衡詩空梁落燕泥庾丹詩銅瓶素綆中使去聲日相繼從正異作日相繼一作日夜繼一作日繼夜惟王心不寧豈徒䘏備享尚謂求無形孝理敦國政神凝推道經瑞芝産廟柱好鳥鳴一作巢一作宿巖扄此記聖孝而及感應之符享遣使守陵而君心未安葢不徒備為儀直欲視於無形矣敦國政開元致治也推道經御注老子也瑞芝好鳥言陵上正祥朱注舊書天寶十載正月太廟置内官供灑掃諸陵廟備晉武帝紀中使相繼奉問起居詩王心載寧記物之享唐六典凡朔望元正冬至寒食皆修享於諸陵若橋陵則日獻羞焉曲禮視於無形聽於無聲沈炯陳情表刑於四海𢎞此孝理頒孟子行乎國政經莊子其神凝下舊書天寶十四載御註老子道德并義疏於天杜詩博議舊唐書天寶七載三月大同殿柱産玉芝八載六月又産玉芝此云産廟柱葢橋陵亦有之也曹植詩好鳥鳴高枝高嶽前嵂音律崒音萃洪河左瀅胡坰切濴烏營切一作瀠金城蓄峻趾沙苑交廻汀永與奧區固川原紛眇㝠居然赤縣立臺榭爭岧亭此記山川形勝而并敘改縣之由氣拱嶽帶河抱城環苑見此陵為王所鍾永與二句申言地脉之悠長居然二句稱其規模之𢎞逺嵂崒聳峙貌瀅瀠廻旋貌眇㝠謂川流卑伏岧亭謂臺形高秀下四乃隔句對法都高嶽指華山詩崧高維嶽子虚賦隆崇嵂崒西賦帶以洪河涇渭之川水經注河水又南經蒲城東闞駰曰蒲城在西北江賦漩澴滎瀯魏都賦藐藐標危亭亭峻趾注趾基也禦沙苑注見前之陳子昻詩被宴坐廻汀多西都賦防之阻則天地奥區焉曇瑗詩川原舊跡榭張翰詩能否居然别岧韓詩外傳臺不如丘山江淹詩亭南樓期官屬果稱去聲是聲華真一作宜可聽平聲王劉美竹潤裴李春蘭馨鄭氏才振古啖侯筆不停遣詞必中去聲律利物常發硎綺繡相展轉琳瑯愈一作逾青熒側聞魯恭化秉德崔瑗銘太史候鳬影王喬隨鶴翎此贊美縣内諸公詞王劉六人皆稱職而有聲者遣四句稱其丈章側聞四句敘其政事稱漢宣帝詔二千石各察官屬此指縣内諸官稱是職也梁孝王傳他財物稱是書劉峻書聲華無寂子吴志虞翻以所注易示孔融答曰延陵之知樂吾之治易乃知江南之美者非徒㑹稽之竹箭馥如幽蘭馨楚辭春蘭兮秋􅕦阮籍詩二子贈嘉詩吴陸景書高風振古朱注啖侯疑即啖助唐書啖助字叔佐趙州人淹該經術善為春秋之三家短長號集傳鸚鵡賦序筆不停綴文賦序夫其放言遣詞良多變矣硎王襃四子講德論轉運中律莊子刀刃若新發於淮南子養之以芻豢衣之以綺繡青詩輾轉反側色抱樸子琳瑯墮於筆端西都賦琳珉熒顔師古註青而有光熒也司馬遷書側聞長者之風楚後漢書魯恭為中牟令専以德化為理不任刑罰辭秉德無私漢文帝詔秉德以陪朕日後漢書崔瑗舉茂才為汲令作座右銘子鳬影見九楊奉先詩列仙傳王子喬周靈王太晉也七月七日乗白鶴於緱氏山頭舉手謝時人數日而去朝音潮儀限霄漢客思去聲廻林坰轗軻辭下杜飄颻凌一作陵濁涇諸生舊短一作裋褐旅泛一浮萍荒歲兒女痩暮途涕泗零主人念老馬廨署一作宇容或作寄一作客秋螢流寓理豈愜窮愁醉不一作未醒何當擺俗累浩蕩乘滄溟末敘客况凄凉也自公未受官故有朝儀二句來長安故有下杜二句諸生四句飄零窮老之感主人四句秋日旅居之事末乃不得志而思遯迹矣此章前四段各八句後二段各十四句武漢書叔孫通起朝儀謝謝靈運詩結念屬霄漢宋帝詩客思空已繁靈運詩相送越林坰漢長安志下杜城在長安縣南一十五里其城周三里宣帝紀尤樂杜鄠之間率常在下杜應劭曰下杜城故杜陵之下聚落也多曹植詩羅衣何飄颻鶴曰涇水本濁而後人襲舛以為涇清詩云涇以渭濁猶謂涇以渭而見其濁也涇水在長安之北公自杜陵往奉先故渡此水任昉表臣本自諸生家承素業三傅𤣥歌浮萍本無根非水將何依兒荒歲謂天寶十載秋霖闗中大饑陶潛詩固為女憂漢主父偃曰日暮途逺詩涕泗滂沱説文自鼻曰涕自目曰泗主人指奉先令韓詩外傳田子方出見老馬於道喟然歎曰少盡其力老棄其身仁者不為也束帛贖之左思吴都賦廨署棊布江淹畫扇賦秋螢兮初飛傷謝靈運擬王粲詩序家本秦川貴公子遭亂流寓自情多也謝靈運詩意愜理無違史記虞卿非窮愁不能著書以自見於後世牋凌敬詩心灰俗累忘楚辭志浩蕩而傷懐謝朓滄溟未運波臣自蕩注滄溟海月補注宋之問詩待詠巖胡夏客曰此詩前半篇但詠橋陵畧不及諸官後但詠諸官畧不及橋陵結則陵與官皆不及但自作感慨此少陵自成章法也門王洙談録云唐鄭顥自言夢為詩十許韻有云石霜露白玉殿蕪苔青意甚惡之後遇宣宗山陵因復緝成此杜公橋陵詩也顥以為園陵之祥不亦可鄙乎送蔡希魯一作曾都尉還隴右因寄高三十五書記原注時哥舒入奏勒蔡子先歸遂朱注通鑑天寶十四載春哥舒入朝道得風疾留京師故蔡都尉先歸而公送之若十一載入朝乃在冬日與春城赴上都不合夢弼之説非是唐書諸府折衝都尉各一人左右果毅都尉各一人毎歲季冬折衝都尉率五校之屬以教其軍陣戰鬭之法蔡子勇成癖彎弓西射音石胡健一作男兒寧鬭死壯士恥為儒官是先鋒得才縁挑徒了切戰須身輕一鳥過槍急萬人呼從蔡敘起言其志雄氣猛見寧鬭死時方右武恥為儒世漸輕文一鳥過其勢疾萬人呼畏其鋒鋭西韓詩外傳彎弓而射之多漢桓帝時童謡丈夫何在擊胡陳琳樂府邊城健兒曹植詩名在壯士籍京希曰健兒壯士乃軍士之名天寶十四載十一月於師召募十萬衆號曰文武健兒先鋒注見二巻挑陳琳樂府男兒寧當格鬭死韋漢書項羽傳願與王戰注挑戰擿嬈敵求戰也鼎詩一鳥忽相驚張景陽詩忽如鳥過目宗開元十三年四月􅎁四軍槍矟有緋緑紅碧之辯𤣥實録吐蕃冦邊翰用半段槍當其鋒擊之敵項羽傳學萬人敵本杜牧詩射鵰都尉萬人黒弰將軍一鳥輕此雲幕隨開府春城赴一作入上都馬頭金匼加答切一作帢匝駞背錦糢糊咫尺雪荆作雪一作雲山路歸飛青一作西海隅上公猶荆作獨寵錫突將去聲且前驅次叙送蔡記其入朝歸隴翰開府上公俱指哥舒翰寵錫謂尚留前驅謂蔡獨往泉王洙曰軍中以幕為府西京雜記成帝設雲幕於甘沈約詩春城麗白日鶴曰古時國都通稱上都至寶應元年方以京兆府為上都班固西都賦作我上都古詩驄馬金絡頭西京雜記羊勝屏賦屏風鞈匝蔽我君王鮑照詩彫屏匼匝組帳紆江淹江上之山賦黿鼉兮匼匝韻㑹匼匝周繞貌此言金絡馬頭其狀宻匝也五唐書哥舒翰在隴右毎遣使入奏常乗白槖駝日馳百里趙曰駞背䝉以錦帕故云糢糊匼匝糢糊皆方言義詩歸飛提提宰青海注見本巻翟方進傳春秋之尊上公謂之晉書職官志太傅太保皆為上公曰易傳在師中吉承天寵也後出師表突將無前鶴突將猶驍將飛將謂能馳突亦突騎之義詩為王前驅漢使去聲一作水黄河逺凉州白麥枯因君問消息好在阮元瑜末致寄高之意此河逺麥枯邊地秋寒也高適在故欲問其消息漢使指蔡元瑜指高武此章前二段各八句後段四句收荆楚歲時記漢帝令張騫使大夏尋河源穆天子傳黄河自積石西南流又東廻入塞燉煌酒泉張掖郡南與洮河合今按唐隴右道即漢之隴西張掖酒泉等郡黄河之流經於其地矣漢水雖出隴西不應一句中用雨水故當從漢使為是唐志凉州為武威郡乃夢弼曰隴西記諸州深秋採白麥釀酒將朱注好在存問之辭通鑑高力士宣上皇誥曰諸士各好在白居易詩好在李使君司魏志王粲傳阮瑀字元瑜少受學於蔡邕太祖以為空軍謀祭酒記室軍國書檄陳琳阮瑀所作歐公詩話陳舍人從易偶得杜集舊本文多脱誤送蔡都尉詩身輕一鳥其下脱一字陳公與數客各用一字補之或云疾或云落或云下莫能定後得一善本乃是過字陳歎服以為雖一字諸君亦不能到也醉歌行原注别從姪勤落第歸月勤郭本作勸試鶴注據史十三載秋八上御勤政樓四科制舉人前此十二載秋七月詔天下舉人不得鄉貢須補國子學生然後貢舉詩云春光淡蕩秦東亭當是天寶十四載春在長安作陸機二十作文賦汝更少去聲年能綴文總角草書又神速世上兒子徒紛紛驊騮作駒已汗血鷙鳥舉翮連青雲詞源一作賦倒流一作傾三峽水筆陣獨掃千人軍先贊勤才美三上二稱文章次二稱書法驊騮鷙翮言少負竒氣倒峽謂文勢浩瀚掃千軍謂草字縱横臧榮緒晉書陸機少襲父兵為牙門將軍年二十而吴滅退臨舊里與弟雲勤學機妙解情理心識文體故作文賦漢書贊自孔子之後綴文之士衆矣芝詩總角丱兮三十國春秋封秀總角知名後漢張好草書見二巻趙曰草書以遲為功所謂匆匆不及草書是也以速為神所謂一筆變化書是也莊子兒子動不知所為鮑照詩紛紛徒滿目薦驊騮周穆王八駿之一駒小馬汗血見二巻孔融禰衡表得凡鳥百不如得鷙鳥一源楚辭冠青雲之崔嵬倒隋藝文傳筆有餘力詞無竭海賦吹澇則百川流梁元帝檄侯景按劍而叱江水為之倒流羲益州記明月峽巫山峽廣濟峽謂之三峽法書王之題衞夫人筆陣圖紙者陣也筆者刀矟也墨者鍪甲也硯者城池也本領者將軍也心意者副將也只今年浩然本作生纔十六七射策君門期第一舊穿楊葉真自知暫蹶霜蹄未為失偶然擢秀非難取㑹是排風有毛質汝身己一作即見唾成珠汝伯何由髪如漆次慰勤下第臨上是叙平日此乃敘其試穿楊言命中之技蹶蹄應驊騮惜其不遇也擢秀言識拔有時排風應鷙鳥望其終逹也唾成珠矢口成章髪如漆青年莫返矣者姜宸英曰西漢歲課士有對策射策顔師古注射策為難問疑義書之于策量其大小署為甲乙之科列而置之不使彰顯有欲射者取而擇之以知優劣對策者顯問以經義令各對之而觀其文詞定高下也按董仲舒以對策為江都相蕭望之以射策甲科為郎是矣後漢劉淑五府辟不就帝令輿詣京師不得已而對策第一中戰國策楚有養由基者去栁葉百步而射之百發百聖主得賢臣頌過都越國蹶如歴塊浴霜蹄見前澇晉書文苑傳擢秀士林凝鮑照與妹書雨排風吹弄翮舞鶴賦烟交霧若無毛質成莊子子見夫唾者乎噴則大者如珠趙壹詩咳唾自珠陳書張麗華髪長七尺鬒黒如漆光澤可鑿春光潭一作淡沲徒可切秦東亭渚蒲牙韻㑹芽通作牙白水荇青風吹客衣日杲杲樹攪離思花㝠㝠酒盡沙頭雙玉瓶衆賔皆一作已醉我獨醒乃知貧賤别更苦吞聲躑躅涕淚零末敘别時景事情溢言表獨東亭餞别蒲荇方新客衣離思勤將去矣皆醉醒公不忍别也此章三段各八句江富嘉謀明水篇陽春二月朝始暾春光潭沲度千門賦隨風猗萎與波潭沲何氏曰潭沲即淡蕩也選注潭沲逐波動貌今從何説帝何氏曰秦東亭京城門外送别多於此處梁簡文詩渚蒲變新節出詩參差荇菜花庾信賦山月沒客衣單杳詩杲杲日陳子高詩片攪春心楚辭深林以㝠㝠注㝠㝠草木茂盛也書潘岳詩何以敘離思滿庾信春賦沙頭渡水人晉徐邈傳衆賔沈湎引屈原漁父篇衆人皆醉我獨醒泣鮑照詩心非木石豈無感吞聲躑躅不敢言古詩涕零如雨何氏曰在鼻曰涕在眼曰淚吞聲聲哽咽也躑躅行不進貌補注射策之射音石見文心雕龍註詳二十五巻陪李金吾花下飲鶴注詩云醉歸應犯夜可怕執金吾當在長安作李金吾李嗣業也時嗣業為左金吾大將軍禄山反兩京䧟上在靈武詔嗣業赴行在以時論之知金吾為嗣業此天寶十四年春作勝地初相引徐一作余行得自娱見輕吹鳥毳昌瑞切隨意數所主切花鬚細草偏稱義從去聲讀用平聲坐一作稱偏坐非香醪懶再沽醉歸應平聲犯夜可怕執張逺作執諸本作李金吾上四花下之遊五六花下之飲末乃醉後謔詞口始則陪李同行故曰相引既則從容獨覽故曰自娱吹輕颺之鳥毳意數吐蕚之花鬚細寫閒中翫物之趣所謂自娱也稱坐謂與坐相宜懶沽謂醉不須沽江總詩名山極歴覽勝地殊留連世説王衞軍云酒正引人著勝地也列子徐行而去之莊子鼔琴足以自娱毳鳥細毛韓詩外傳背上毛腹下之毳張九齡詩簷風落鳥毳窗葉掛蟲絲詩鬚花心鬚也潘岳安石榴賦細的㸃乎細鬚鮑照北園有細草偏醒偏秣趙注偏稱言偏宜公詩常用偏字如偏勸香醪注别見詩無酒酤我前漢書陳孟公日醉歸京世説王安期作東海郡吏録一犯夜人來韋述西記京城街衢有金吾曉暝傳呼以禁夜行唯正月十五夜􅎁許金吾弛禁前後各一日前漢百官志漢武帝更中衞尉名為執金吾顔師古注金吾鳥名也主辟不祥天子出行職主先導以備非常故執此鳥之象因以名官後漢志應劭注執金革以禦非常吾猶禦也在徐陵詩云非但執金吾孔奐詩云無勝執金吾皆用結句此詩句法似之若作李金吾反直致矣張表臣珊瑚鈎詩話王臨川詩云細數落花因坐久緩尋芳草得歸遲此與杜詩見輕吹鳥毳隨意數花鬚命意何異予詩云雲移鳥滅沒風霽蝶飛翻此與東坡飛鴻羣往白鳥孤没作語何異兹可與智者道不可與愚者説也官定後戲贈原注時免河西尉為右衞率府兵曹鶴注十三載冬公進西岳賦表云長安一匹夫則其時尚未得官也其改衞率府參軍乃在十四載夔府詠懐詩所云昔罷河西尉初興薊北師是也貽杜臆戲贈公自贈也晚唐人自自贈等題本此不作河西尉凄凉為去聲折腰老夫怕趨走率音帥府且逍遙耽酒須微禄狂歌託聖朝音潮故山歸興去聲盡回首向風飈公辭尉而就率府葢取逍遙自在得以飲酒狂歌耳然亦不得已而為此故有回首故山之慨按趙注云方官未定時公贈崔學士詩云故山多藥物欲整還鄉斾今官已定無復歸山之興唯有臨風廻首耳郵庾信詩凄凉多怨情潛晉書陶潛為彭澤令郡遣督至吏白應束帶見之歎曰吾不能為五斗米折腰拳拳事鄉里小兒即解印賦歸去來詞咸列子趨走作役無不為也詩于焉逍遙晉書阮耽酒浮虚徐幹中論或披髪而狂歌飈應瑒詩日暮歸故山班彪北征賦風發以飄颻去矣行鮑欽止曰天寳十四載公在率府因欲辭職作去矣行劉琨詩去矣若浮雲君不見鞲上鷹一飽即飛掣焉音烟能作堂上燕銜泥附炎熱野人曠蕩無靦音腆顔豈可久在王侯間未試囊中餐玉法明朝且入藍田山此詩欲去官而作也上四屬比下四屬賦寧為鷹之颺不為燕之附以野性曠蕩不屑靦顔侯門也餐玉藍田葢將託之以遯世矣杜臆曠蕩無靦顔具見浩然之氣左東方朔傳董君緑幘傅鞲韋昭曰鞲形如射鞲以縳右手鮑照詩昔如鞲上鷹今似檻中猿史記滑嵇傳註鞲捍臂也適胡夏客曰鞲鷹飽飛此或一時偶激之言但公送高詩云饑鷹未飽肉側翅隨人飛又云老驥思千里饑鷹待一呼自喻喻人皆用此婕古詩思為雙飛燕銜泥巢君室又翩翩堂前燕班妤歌凉飈奪炎熱靦陸機嘆逝賦雖䝉曠蕩臣獨何顔府沈約奏彈明目顔曾無愧畏洙曰周禮天官玉玉齊則供食玉注玉是陽精之純者食之以禦水氣鄭司農云玉齊當食玉屑後魏書李預居長安羨古人餐玉之法乃採訪藍田掘得若環璧雜器者大小百餘皆光潤可玩預乃椎七十枚為屑食之長安志藍田山在長安縣東南三十里一名覆車山其山産玉亦名玉山三秦記玉之美者曰球其次曰藍以地出美玉故名夜聽許十一一作許十損一作許十誦詩愛而有作鶴注當是天寶十四載長安作又曰許十一當是居五臺學佛許生五臺賔業白出石壁余亦師粲可身猶縳禪寂何階子方便謬引為匹敵離索晚相逢包蒙欣有擊首敘許精禪理門許業已白而已猶縛於禪今何所階梯得子方便之而謬引我匹敵乎包䝉有擊待其啟發也水經注五臺山五巒巍然故謂之五臺此山名為紫府仙人居之其北臺之山即文殊師利常鎮毒龍之所寶積經若純黒業得純黒報若純白業得純白報朱注翻譯名義集十使十惡此屬乎罪名為黒業五戒十善四禪四定此屬于善名為白業出續高僧傳曇鸞雁門人家近五臺山年未志學便往家大通中遊江南還魏移住汾州北山石壁𤣥中寺今號鸞公巖傳舊唐書達磨傳慧可慧可嘗斷其左臂以求法慧可璨璨傳道信道信傳𢎞忍可朱注維摩經一心禪寂攝諸亂意慧應璩詩良遇不值伸眉路何階經又云有方便解無方便慧縛夏左傳賔媚人曰若以匹敵九離羣索居見禮記子語易蒙卦九二包蒙上擊蒙誦詩渾上聲一作混遊衍四座皆一作俱辟音劈易應手看捶鈎清心聽鳴鏑精微穿溟涬飛動摧霹靂陶謝不枝梧風騷共推激次言聽許誦詩易許生自誦其詩渾渾然流出遊衍從容貌辟驚避貌捶鈎喻功之純熟鳴鏑喻機之迅㨗穿溟涬謂思通造化摧霹靂謂勢壓雷霆下凌陶謝上繼風騷言其才大而氣古枝梧猶云抵當推激謂推尊而激揚之座詩乃爾遊衍遊衍優遊寛衍也孔融詩高談滿四項羽傳人馬俱驚辟易數里注分張而易其處捶莊子輪扁斵輪得之於心應之於手又曰大馬之鈎者年八十矣而不失豪芒朱注司馬云拈捶鈎之輕重不失豪芒或云江東三魏之間人皆謂鍜為捶諸葛武侯表清心寡欲史記冐頓作鳴鏑注髐箭也天吴邁逺詩精微貫穹旻引淮南子四海溟涬帝系譜地初起溟涬濛鴻舊注莊子大同乎涬溟非杜公不肯倒用也甚沈佺期祭李侍郎文思含飛動公羊傳注雷疾而者為震震與霆皆謂霹靂也靈鍾嶸詩品陶潛詩其源出於應璩又協左思風力謝運詩其源出於陳思雜有景陽之體項羽傳諸將讋懾莫敢枝梧注小柱為枝大柱為梧文湘東王書既殊比興正背風騷謝靈運詩自漢至魏體三變莫不同祖風騷紫燕舊作鸞歐公家本作鷰正異同自超詣翠駮伯各切誰剪剔君意人莫知人間夜寥閴末贊許生歸結夜聽之意自超詣獨能超出也誰剪剔無待改削也詩意之妙如此使不遇知已幾於清夜寂寥公葢自託為知音也騰逸曰超逺造曰詣剪謂薙其鬃剔謂刷其毛自此章前二段各八句後段四句收西京雜記文帝代來有良馬九匹其一曰紫燕騮赭白馬賦紫燕駢衡唐六典昭陵六馬贊紫燕超躍司馬遷封禪文招翠黄即紫黄也揚雄河東賦顔注翠龍穆天子所乗馬也此云翠駮即翠黄翠龍之意爾雅翼六駮如馬白身黒尾一角鋸牙虎𤓰其音如鼓喜食虎豹葢駮毛物既可觀又似馬故馬之色相類者以駮名之子虚賦楚王乃駕馴駁之駟徐鉉曰晉侯乗駁乳虎見之而服則象駁之文理或然也子世説諸葛公所談便已超詣莊子燒之剔之蕭範直坊賦何坊境之寥閴王嗣奭曰公自謂語不驚人死不休又云沈鬱頓挫隨時㨗給揚枚可企平日自負如此定應俯視一切今聽許詩實心推服不啻口出其稱他人詩類此尚多生平好善懐賢誠求樂取從來詞人所少葢休休大臣之度也詩人乎哉戲簡鄭廣文䖍兼呈蘇司業源明以鶴注唐史蘇源明太子諭德出為東平太守時濟陽太守李陵請增領二縣詔河南採訪使與五太守議不能决卒廢濟陽志云天寶十三載廢召源明為國子司業禄山陷京師源明不受偽署肅宗復兩京擢考功郎則為司業在禄山未亂之前今詩題云蘇司業當是十四載作廣文到官舍繫音計一作置馬堂階下醉則一作即騎馬歸頗遭官長丁丈切罵才名三英華作四唐書亦作四十年坐客寒無氊賴一作近有蘇司業時時乞丘既切一作與酒錢四句轉韻上戲簡鄭摹其狂態下兼呈蘇美其交情下晉書杜預擅飾城門官舍馬劉琨扶風歌繫馬高堂襄陽兒童歌時時能騎道徳經聖人用之以為官長魏志夏侯尚傳衆職之屬各有官長禰衡傳荆州士大夫先服其才名孔融傳坐上客長滿屏風坐無氊席晉書吴隠之為度支尚書以竹篷為陶潛詩鄰曲時時來朱買臣傳吏卒更乞匄之顔師古曰乞讀作氣與也廣韻乞與人也四明林時對曰古文用字隨義定音如上下之下乃上聲而禮賢下士之下則去聲也杜詩廣文到官舍繫馬堂堦下又朝來少試華軒下未覺千金滿高價是借上聲為去聲矣王維詩公子為嬴停駟馬執轡愈恭意愈下是借去聲為上聲矣此類頗多不可無辯夏日李公一云李家令見訪鶴注詩云村塢城南則是在長安城南作矣别本作李家令考宗室世系表唯蔡王房有炎為太子家令又讓皇帝房有平亦為太子家令然平去讓皇五世不與公同時疑是李炎當屬天寶末年作逺林暑氣薄公子過我遊貧居類村塢僻近城南樓傍舍頗淳樸所須一作願亦易音異求隔屋喚西家借問有酒不妨鳩切墻頭過濁醪展席俯長流首聨㸃題貧居以下承逺林此敘所居景事而兼述留飲之情宛申涵光曰隔屋喚西家墻頭過濁醪畫出村家情事然語不嫌質沈約詩逺林響咆獸潛閔鴻羽扇賦暑氣雲消詩應瑒詩公子敬愛客陶詩貧居乏人工庾信依稀映村塢城南即公所居城南韋杜也原傳以僕為西家愚夫耶王粲七釋渾沌淳樸曹植詩借問誰家子邴詩有酒湑我陵陶潛詩當復如此不水嵇康書濁醪一盃趙曰杜之樊鄉有樊川而潏則自樊川西北流經下杜城詩云展席俯長流豈其居當此地耶盧諶詩平陸引長流清風左右至客意已驚秋巢多衆鳥鬭一作喧葉宻鳴蟬稠苦遭一作道此物聒孰謂陳作語吾廬幽水花晚色靜樊作淨庶足充淹留預恐樽中盡更起為去聲君謀清風以下承暑氣薄飲此敘夏時景物而并及勸之意語杜臆此物聒承蟬鳥反言以見其幽晚色靜又作轉文有頓挫之致此章兩段各十句詩穆如清風客江淹詩晨飈自逺至左右芙蓉披詩江總詩絲傳園意江淹詩春意秋方驚陶潛衆鳥相與飛孫綽詩湛露灑庭林宻葉辭榮條璞潘岳詩鳴蟬厲寒音湯僧濟詩此物今空傳郭江賦千類萬聲自相諠聒芙陶潛詩吾亦愛吾廬杜何遜詩水花披末落古今注蓉名荷華一名水花臆水花言靜猶詩言靜女形容有致謝朓詩瑤池曖晚色燥楚辭蹇淹留而無成陶詩罇中酒不杜詩詳註巻三
