body:
  text: 杜詩詳註巻十翰林院編修仇兆鰲撰漫成二首黄鶴從舊編在上元二年成杜臆二詩格調疎散非經營結構而故云漫成野日一作月荒荒一作茫茫白春一作江流泯泯清渚蒲隨地有邨徑逐門成只作披衣慣常從漉酒生眼邊無俗物多病也去聲身輕首章對景怡情有超然避俗之想地洪注荒荒不甚白泯泯不甚清蒲隨生意可觀徑逐門徃來自如披衣習慣言疎放已乆漉酒為生見醉鄉可樂眼無俗物得以獨適已性矣江淹詩野日燒中昬朱莊子日月之光益以荒矣字何遜詩共見春流瀰注張有復古編云湣古活泯泯是活活之誤不知泯泯活活意象各不侔陶梁昭明太子詩渚蒲變新節披衣出莊子漉酒本潛據陶詩云相思則披衣言笑無已時此兼舉之蓋欲與淵明同調不屑與俗客為伍也世説嵇阮山濤竹林酣飲王戎後徃阮曰俗物已復來敗人意申㴠光曰杜詩善用疊字如野日荒荒白宿鷺娟娟淨江市戎戎暗山雲淰淰寒之類皆非意想所及江臯已仲春花下復扶又切清晨仰面貪看平聲鳥回頭錯應人讀書難字過對酒滿壺頻近識峨嵋老原注東山隱者知余懶是真次章隨時適興申前章未盡之意草前章上四句説花溪外景此章上四句説堂内景前章披衣漉酒樂在身閒此章讀書對酒樂在心得末云懶是真總不欲與俗物為縁楚辭秣余馬兮江臯師氏曰臯緩也江岸土性緩故曰江臯意劉琨詩回頭已百萬看鳥錯應寫出應接不暇之朱子或問引謂心不在焉之證亦斷章取義耳里水經注益州記云峨嵋山在南安縣界去成都南千然秋日清澄望見兩山相峙如峨嵋焉峨列仙傳陸通者楚狂接輿也好養生遊諸名山在蜀嵋山上世世見之庾信詩知余是執珪讀書難於字過老年眼鈍也對酒不覺頻傾借酒怡情也舊注謂難識之字任其讀過不復考索視讀破萬巻者竟作粗心渉獵之人豈不枉屈少陵胡夏客又謂經眼之字難於輕過正是從容探討善讀書處然於本章大意亦不相符春夜喜雨黄鶴編在上元二年春在成都作好雨知時節當春乃一作及發生隨風潛入夜潤物細無聲野徑雲俱黒江船火獨明曉看紅濕處花重錦官城潛入細潤正狀好雨發生雲黒火明雨中夜景紅濕花重雨後曉景應時而雨如知時節者雨驟風狂亦足損物曰潛曰細寫得脉脉綿綿於造化發生之機最為宻切三四屬聞五六屬見申㴠光曰好雨知時節此毛詩所謂靈雨也子周王褒詩時節無春冬隨抱樸子藏華於當春莊春氣發而百草生易風㢲鹽鐵論周公太平之時旬而一雨雨必以夜鐵呉志臧均曰繼之以雲雨因以潤物細無聲即鹽論所謂雨不破塊也文沈約詩野徑既盤紆經何遜詩澄江照逺火梁簡帝詩漬花枝覺重言雨紅濕花枝若重也杜臆重字無人能下春水同上年水江淹别賦春緑波三月桃花浪一作水江流復舊㾗朝來没沙尾一作岸碧色動柴門接縷垂芳餌連筒灌小園已添無數鳥爭浴故相喧英華作不知無數鳥何意更相喧故上四春江水漲下四春江景事水深則線短釣須接縷水高則近岸故車可連筒鳥浴聲喧得水為樂也桃漢溝洫志來春桃花水盛注月令仲春之月始雨水始華蓋桃方華時既有雨水川谷冰泮衆流猥集波瀾盛長故謂之桃花水桃花水又見杜欽傳趙曰韓詩於溱與洧方渙渙兮注云謂三月桃花水下時也尾王粲詩率彼江流爰逝靡期曹毗賦飛鷺下乎沙别賦春草碧色如黄石公記芳餌之下必有懸魚以李實曰川中水車紡車以細竹為之車骨之末縳竹筒旋轉時低則舀水高則瀉水故曰連筒灌小園若夔州府修水筒則引山泉者舀以沼切挹水也杜臆昔在蜀見水車連綴竹筒於轉輪上以灌田園其來乆矣㑹庾信有小園賦朱超獨棲鳥詩寄語故林無數鳥入羣裏比毛衣江亭從舊次編在上元二年坦腹江亭暖長吟野望時水流心不競雲在胡夏客云在疑作住意俱遲寂寂春將晚欣欣物自私故林歸未得排悶强區兩切裁詩草堂本云江東猶苦戰回首一顰睂滯上四江亭之景下乃對景感懷水流不心亦從此無競閒雲自在意亦與之俱遲二句有淡然物外優游觀化意春暮之時物各得所獨羇旅無歸故裁詩以排悶末句應上長吟腹字應瑒詩永思長吟坦腹借用王羲之東床坦陰鏗詩王城野望通易水流而不盈出左傳心則不競暮西王母白雲謡白雲在天山林自何遜詩沙汀寂寂歸去來辭木欣欣以向榮思黄生謂結語宜從草堂本當此春光和煦物各得所及人猶苦戰不禁傷心蹙額矣今按此時惟河北未平耳江東却無所指張九成子韶曰陶淵明云雲無心以出岫鳥倦飛而知還杜子美云水流心不競雲在意俱遲若淵明與于美相易其語則識者必謂子美不及淵明矣觀雲無心鳥倦飛則可知其本意至於水流而心不競雲在而意俱遲則與物初無間斷氣更渾淪難輕議也王嗣奭曰中四居然有道之言公性稟高明當閒適時道機自露故寫得通透如此覺雲淡風輕無此深趣按此章云欣欣物自私有物各得所之意前詩云花栁更無私有與物同春之意分明是沂水春風氣象早起依舊次在上元二年内經早卧早起春來常早起幽事頗相關帖石防隤徒回切岸開林出逺山一邱藏曲折緩歩有躋攀童僕來城市瓶中得酒還惟幽事關心故春常早起次聨幽事之在外者三聯幽事之在内者童僕携酒可以遂此幽興矣呉論江岸將隤故貼石以防之逺山䝉翳故薙林以出之班隤下墜也隋煬帝詩雲散逺山空一邱指草堂固書嚴子棲遲一邱之中不易其樂張纘啟至於一邱一壑自謂出處無辯王褒四子講德論曲折不失節戰國䇿緩歩以當車方虚谷曰杜此等詩乃晚唐之祖千鍛百鍊似此者極多尾句别換意亦晚唐所必然者落日此及下章大抵皆上寳間作姑依蔡氏附在據上元二年之春黄鶴編在寶應元年亦無確落日在簾鈎溪邊春事幽芳菲縁㟁圃樵㸑倚灘舟啅雀爭枝墜飛蟲滿院遊濁醪誰造汝一酌一云酌罷散千愁一云一酌罷人憂事此詠春日暮景春事幽領起中四芳菲樵㸑溪前幽啅雀飛蟲堂前幽事皆承落日言公趙汸注首句天然晚景得句在此故以命題歸杜臆見此幽事情與景㑹不自知其樂之所自而功於酒曰是誰造汝一酌而千憂俱散乎然亦由胸無宿物故能對景忘憂耳庾信詩簾鈎銀蒜條楚辭芳菲滿堂庾信詩園苑足芳菲朔史記樵蘇後㸑趙曰樵㸑之舟倚灘而泊東方曰積憂者得酒而解謝茂秦曰五律首句用韻宜突然而起如落日在簾鈎是也趙汸曰唐詩鬬雀翻簷散驚蟬出樹飛宋梅聖俞詩懸蟲低復上鬬雀墮還飛俱本此詩可惜花飛有底急老去願春遲可惜歡娛地都非少去聲壯時寛心應平聲是酒遣興去聲莫過平聲詩此意陶潛解吾生後汝期年老逢春上四自惜寄情詩酒下四自遣老起二已領全意言花有何事而急飛去乎我衰之人願春色少留也時杜臆三四正發願春遲到此歡娛之地惜非少壯之不復能有為矣今惟借詩酒以寛心遣興此意惟陶潛能解而恨予生之晚也蓋陶雖隱約於柴桑粟里間觀其美三良之殉主羡荆軻之報仇慕田疇之節義知其非忘世者但不逢時耳公亦有志濟世而厄於窮愁故託之以自况歟通首逐句流對似古詩却是律體清灑逸宕申㴠光曰可惜歡娛地都非少壯時是歡娯恨白頭註脚下云寛心應是酒遣興莫過詩語近淺率矣如定官後詩老夫怕趨走率府且逍遙詞亦近俚此皆開長慶一派非盛唐氣象也獨酌黄鶴編在上元二年作周王褒詩獨酌止輕瓢歩屧一作歩履一作倚杖深林晚開樽獨酌遲仰蜂粘落絮趙作蘂行户郎切一作倒蟻上上聲枯梨薄劣慙真隱幽偏得自怡本無軒冕意不是傲當時上四獨酌之景下四獨酌之情物歩林向晚獨酌從容故得詳玩情此時逸興自娯可以忘情榮禄矣説行行列也或作倒蟻便與仰蜂同意下四句輾轉來有自憐自慰意言才劣見棄非同真隱但對此幽勝聊以自怡耳才薄劣故無軒冕之志非真隱又何敢笑傲當時乎淮南子深林叢薄致謝靈運詩彼美邱園道喟然傷薄劣南史何尚之仕方山著退居賦以明所守後還攝職袁淑録古隱士有踪無名者為真隱傳以嗤焉堪陶𢎞景詩山中何所有嶺上多白雲只可自怡悦不持贈君謂莊子今之所謂得志者軒冕之也謝朓詩志狹輕軒冕徐歩黄鶴從舊次在上元二年春作曇瑗詩徐歩寡逢迎整履一作屐一作屣歩青蕪荒庭日欲晡芹泥隨燕觜蘂粉龔芥隱筆記作蘂粉一作花蘂上上聲蜂鬚把酒從衣濕吟詩信杖扶敢論平聲才見忌實有醉如愚上四徐歩景物下四徐歩情事此庭内徐歩也燕衘泥而至蜂採蘂而回皆在日晡以後歩而把酒故至傾衣歩而吟詩故猶擕杖才見忌承詩醉如愚承酒曰從曰信猶云憑他任他須整履而起杜臆公閒暇疎懶卧時多而行時少故張協詩荒庭寂以間列子日至於悲谷是謂晡時鬚論語不違如愚詩補註埤雅云蜂蝶醜皆以鬚嗅蓋其鼻也故杜云花蘂上蜂鬚懶真子曰古人吟詩絶不草草至於命題各有深意老杜獨酌詩云歩屧深林晚開樽獨酌遲仰蜂粘落絮行蟻上枯梨徐歩詩云整履歩青蕪荒庭日欲晡芹泥隨燕觜花蘂上蜂鬚且獨酌則無獻酬也徐歩則非奔走也以故蜂蟻之類細微之物皆能見之若與客對談或急趨而過則何暇致詳至是嘗以此問諸舅氏舅氏曰東山之詩蓋嘗言之伊咸在室蠨蛸在户町疃鹿場熠熠宵行此物尋常亦有之但人獨居閒處時乃見得親切耳杜詩之原出於此寒食黄鶴從舊編在上元二年浣花溪作之歲時記去冬至一百五日有疾風甚雨謂寒食據厯在清明前二日寒食江邨路一作樹風花高下飛汀烟輕冉冉竹日淨暉暉田父一作舎要平聲皆去隣家問一作閙不違地偏相識一作失盡雞犬亦忘歸一作機接上四寒食所見之景下四寒食所之人招要則赴饋問不辭人情既相親狎至於雞犬忘歸物性亦與之相忘矣江總詩風花拂舞衣陶潛詩冉冉星氣流何遜詩暉暉視落日隣家未為通計陶詩田父有好懷問劉向新序出訟詩雜佩以問之注遺也漢書高帝作新豐一如豐沛道路人家雞犬放之皆識其家逺注江邨止八九家故盡相識石鏡石鏡琴臺二詩黄鶴編在上元二年成都内顧注公詩有云石鏡通幽魄琴臺㸃綘唇乃後來復遊者山華陽國志武都有一丈夫化為女子美而艶蓋精也蜀王納為妃無㡬物故蜀王遣五丁之武都擔土作冡蓋地數畆高七丈上有石鏡表其門今成都北角武擔是也後王悲悼作曵邪之歌龍歸之曲寰宇記冡上有一石厚五寸徑五尺瑩徹號曰石鏡楊德周曰路史開明妃墓今武擔山也有二石闕武陵王蕭紀掘之得玉石棺棺中美女顔色如生體如冰掩之而寺其上鏡周三丈五尺蜀王將此鏡送死置空山𡨕寞憐香骨提擕近玉顔衆妃無復扶又切嘆千騎去聲亦虛還獨有傷心石埋輪月黄作玉宇間上四叙石鏡之由下則覩鏡而生感也及當時留石表墓為憐香骨故擕鏡以對玉顔送葬之後衆妃既去千騎亦歸獨有山留片石長映月光而已傷心石謂哀思寄於此石嘆謂送葬哀聲他注謂衆妃妬寵美人亡而無復歎恨語意太曲𡨕易林悲哀哭泣送死離鄉謝惠連祭古冡文號為寞君張華詩死聞俠骨香都神女賦苞温潤之玉顔詩輪指圓鏡後漢張綱埋輪亭此借用其字江總月宇照方疏宋之問詩賓至星槎落仙來月宇空兩詩譏古人之好色也一則死後猶憐一則病中尚愛當時眷戀若此豈知美人黄土鏡前無色臺畔無聲則痴情皆屬幻相矣琴臺寰宇記益部耆舊傳相如宅在州西笮橋北百許歩有琴臺在焉成都記琴臺院以相如琴臺得名而非其舊舊臺在城外浣花溪之海安寺南今為金花寺元魏伐蜀下營於此掘塹得大甕二十餘口蓋所以響琴也隋蜀王秀更增五臺并舊為六茂陵多病後尚愛卓文君酒肆人間世琴臺日暮雲野花留寶靨益渉切蔓草見音現羅裙歸鳯求凰意寥寥不復扶又切聞上四遡琴臺遺事下則登臺而弔古也前病後猶愛言鍾情獨至酒肆二句寫茂陵生之事是昔日琴臺野花二句想文君殁後之容是今日琴臺歸鳯求凰乃當時琴心所託末故用此作結史記司馬相如蜀郡成都人字長卿以貲為郎因病免歸而家貧時卓王孫有女新寡好音相如以琴心挑之文君夜亡奔相如與俱之臨卭盡賣其車騎買一酒舎酤酒而令文君當壚相如自滌器於市中又曰相如常有消渴病既病免家居茂陵庾信詩茂陵怱多病淹漢書韋昭注壚酒肆也莊子内篇有人間世江詩日暮碧雲合佳人殊未來鈿江總詩野花不識采籹説文靨頰輔也趙曰寶靨花也酉陽雜爼近代尚靨如射月曰黄星靨靨鈿之名蓋自孫和鄧夫人始朱注唐時婦女多貼花鈿於面謂之靨飾李賀詩花合靨朱紅是也妻詩野有蔓草過班婕妤擣素賦曵羅裙之綺靡江總賦庭草詩雨草芊芊連雲鎻南陌門前君試看似妾羅裙色宇左思詩寥寥空内按趙汸注云玩人世於酒肆之中思暮雲於琴臺之上狀其不羈而多情此説得之他家謂酒肆徒傳人世琴臺空映暮雲與下截混同故不必從道黄生曰作此題者有二種語輕薄之士慕其風流學之儒譏其􅁋佚慕者徒騁艷詞譏者動多腐句均去風雅逺矣此詩􅊠徊想像若美之不容口者其實譏世俗之好德不如好色耳清辭麗句攀屈宋而軼齊梁豈後世文士老儒所能望其後塵哉玉臺新咏相如琴歌曰鳯兮鳯兮歸故鄉遨遊四海求其凰時未遇兮無所將何悟今日登斯堂有艶淑女在閨房室邇人遐愁我腸何縁交頸為鴛鴦又歌曰凰兮凰兮從我棲得托孽尾永為妃交情通體心相怡中夜相從知者誰雙羽俱起翻高飛無感我心使予悲春水生二絶鶴注此當是上元二年春作詩云小難渾欲平則在浣花溪矣二月六夜春水生門前小灘一云籬渾平聲欲平鸕鷀鸂􅈃莫漫喜吾與汝曹俱眼明此章見春水而喜與趙曰玩末二句意公可謂物委蛇而同其波矣鸂呉志孫權傳春水方生淮賦􅈃尋邪而逐害一夜水高二尺杜臆作文强數日不可更禁平聲當南市津頭有船賣無錢即買繫音計籬旁此章見水至而憂錢强多也禁當禁止也無買船誠恐水没草堂耳害羅大經曰少陵詩有全篇用常俗語而不其為超脱如此章是也江上值一作置水如海𫝑聊短述此當是上元二年作呉論江上值水勢如海公見此竒景偶無竒句故不能長吟聊為短述耳題意在下三字故通篇皆作自謙之詞檻詩云春來花鳥又言新􅄈水蓋草堂成後又逢春水也為人性僻耽佳句語不驚人死不休老去詩篇渾漫與從黄鶴本别作興春來花鳥莫深愁新􅄈水檻供垂釣故著渉畧切浮槎朁入舟焉於䖍切得思去聲如陶謝手令平聲渠述作與同遊此一時拙於詩思而作也少年刻意求工老則詩境漸熟但隨意付與不須對花鳥而苦吟愁思矣檻外浮槎代作釣舟此水勢之盛也才非陶謝無此述作聊為短述而已杜臆玩末二句公蓋以陶謝詩為驚人語也此惟深於詩者知之人雖死不休甚言求工趙注將愁字屬花鳥説蓋詩形容刻露花鳥亦應愁怕猶崔日用詩朝來花鳥若有情也桴説文檻櫳也軒􅆤之下為􅎉曰欄以板曰檻槎木也楊師道詩卧柳礙浮槎連渾皆也漫徒也朁代也作陶謝謂淵明恵抱樸子徒疲勞於述吕氏童䝉訓曰陸士衡文賦立片言以居要乃一篇之警䇿此要論也文章無警䇿則不足以傳世盖不能竦動世人如杜子美及唐人諸詩無不如此但晉宋間人専致力於此故失於綺靡而無高古氣味杜詩云語不驚人死不休所謂驚人語即警䇿也擱朱瀚曰少陵對錦江水而袖手青蓮對黄鶴樓而筆其警悟後學不淺然玩頷聨亦有漸老漸熟之意故字用借對法今按作詩機神偶有敏鈍忽然機到則曰詩應有神助忽然機澀則曰老去詩篇渾漫與若云公自五十後年衰才盡何以又曰晚節漸於詩律細乎今考䕫詩如秋興八首諸將五首詠懷古跡諸作皆極精彩未可謂皆率意漫與也黄鶴本及趙次公註皆作漫與韻府羣玉引此詩亦作漫與王介甫詩粉墨空多真漫與蘇子瞻詩袖手焚筆硯清篇真漫與皆可相証諸家因前題漫興九首遂并此亦作漫興按上聨有句字次聨又用興字不宜疊見去聲水檻遣心一作興二首邵注草堂水亭之檻言憑檻眺望以遣心也去郭軒楹敞無邨草堂本作林眺望賖澄江平少㟁幽樹晚多花細雨魚兒出微風燕子斜城中十萬户此地兩三家此章詠雨後晚景情在景中居中四皆水檻前所眺望者末聨遙應郭邨以見郊之清曠八句排對各含遣心九梁簡文帝詩細而堦前入雖黄希曰成都户十六萬百五十此云城中十萬户未必及其數亦夸其盛耳葉石林曰詩語忌過巧然縁情體物自有天然之妙如老杜細雨魚兒出微風燕子斜此十字殆無一字虛設細雨著水面為漚魚常上浮而淰若大雨則伏而不出矣燕體輕弱風猛則不勝惟微風乃受以為勢故又有輕燕受風斜之句蜀天常夜雨江檻已朝晴葉潤林塘宻衣乾音干枕席清不堪秪音支老病何得尚一作向浮名淺把涓涓酒深憑送此生次章説初晴晚景下四言情景葉潤承雨衣乾頂晴老病忘名酒送餘生此對而遣懷也蜀中雅州常多隂雨號曰漏天逺陶潛詩夜中枕席冷送杜臆曰淺把見無奢願也注公詩喜用送字如老送此生之類然亦有本謝朓詩逺近送春日沈約詩送日隱高閣亦曾用之矣補注王勃詩林塘花月下别是一番春江漲梁氏編在上元二年起杜臆時必蜀中有兵亂感江漲而興故有末句江發蠻夷漲山添雨雪流大聲吹地轉高浪蹴天浮魚鼈為人得蛟龍不自謀輕帆好去便吾道付滄洲雨降雪融江漲之由地轉天浮江漲之勢魚龍失所江漲所驅輕帆浮海江漲有感也次聨句意警拔全在吹蹴兩字下得竒雋近岸故為人得窟移故不自謀雪洙曰蜀水之源皆出夷地鶴曰蜀山高而陰經年不消今惟水勢之盛衝之而流也字海賦似地軸抜挺而爭迴又浮天無岸地轉天浮四本此郭璞詩高浪駕蓬萊家新序魚鼈之居也厭深而之淺故得遜史記孔下子世蛟龍不合隂陽滄洲神仙境也何詩獨宿滄洲朝雨當是上元二年秋作涼氣曉一作晚非蕭蕭江雲亂眼飄風鳶一作鴛藏近渚雨燕集深條黄綺終辭一作投漢巢由不見堯草堂樽酒在幸得過清朝一作宵雲上四朝雨之景下四對雨感懷也涼氣江雨勢驟來鳶藏燕集禽鳥避雨又以古人自况盖將託草堂於世外歟光庾肩吾詩北園涼氣高庾信詩驚花亂眼飄又雲偏亂眼四皓避秦入商洛山漢高帝召之不至夏黄公綺里季四皓之二人也庾闡閒居賦黄綺結其雲樓漢書王莽以安車迎薛方方辭謝曰堯舜在上下有巢由逸士傳巢父聞許由之為堯所讓也曰汝何不隱汝形藏汝光由悵然不自得乃過清冷之水洗其耳陶潛詩清朝起南颸晚晴杜臆朝雨而晚晴乃同日所作何遜詩褰裳對晚晴邨晚驚風度庭幽過雨霑夕陽薫細草江色映踈簾書亂誰能帙杯乾音干自可添時聞有餘論未怪老夫潛薰草映簾晚晴之景整書酌酒晚晴之事末有與俗相安之意言時聞蜀人之論未嘗怪此一潛夫也本傳謂公在成都與田夫野老相狎蕩盖能親厚於人而人共悦之故有後二句洪注老夫潛只是説老潛夫特倒拈以協韻耳舊注因後漢王符有潛夫論遂將論字屬自已其説難通曹植詩驚風飄白日怱然歸西山陸瓊詩庭幽花似雪詩北園有細草詩度其夕陽映别賦陌上草薫鮑照黄生注江色簾夕陽返照故也梁元帝詩疎簾度晚光子虛賦願聞先生之餘論孔融書乃使餘論逺聞宋書江夏王傳如聞外論不以為非高柟從舊次在上元二年有爾雅梅柟注似杏實酸俗作楠鶴曰公柟樹為風雨所拔歌云倚天柟樹草堂前此云接葉製茅亭歌云浦上童童一盖青此云江邊一盖青故知即此柟樹也柟樹色𡨕𡨕江邊一盖青近根開藥圃接葉製茅亭落景音影陰猶合微風韻可聽平聲尋常絶醉困卧此片時醒中四皆屬叙景但近根接葉連上柟樹落景微風起下醉卧仍在上下四句分截開墾土也謝朓詩落景皎晚陰微風逺蕭子範詩試逐醉困即酒困也惡樹黄鶴編在上元二年獨遶虛齋徑常持小斧柯幽陰成頗雜惡木剪還多枸杞因一作固吾有雞棲奈汝一作爾何方知不材者一云木生長丁丈切漫婆娑上四厭惡木難除下嘆其徒生無益若惡木剪還多起下四句言枸杞延年因吾而有者雞棲賤樹奈何其復叢􅁘可見不材漫生物類亦有然者古銘毫末不斬將尋斧柯何遜詩惡木寜無幹子道書千年枸杞其形似犬故以枸名高隱外書朱孺居大若巖食枸杞根身輕朱注急就篇注皂筴樹一名雞棲魏志劉放孫資乆典樞要夏侯獻曹肇心不平殿有雞棲樹二人相謂此亦乆矣其能復㡬殷莊子此木以不材得終天年曰詩注婆娑舞貌世説仲文與衆在聽視槐良乆嘆此樹婆娑無復生意江畔一作上獨歩尋花七絶句鶴曰詩云東望少城花滿烟當是在浣花溪作本舊編在寶應元年朱編在上元二年江上被花惱不徹無處告訴只顛狂走覔南隣愛酒伴原注斛斯融吾酒徒經旬出飲獨空床首章乃㝷花獨歩之由之杜臆顛狂二字乃七絶綱盡不逢酒伴故獨步花前耳訴徹也晉陽秋謝尚収涕告稠花亂蘂裹舊作畏正異定作裹江濱行歩欹危實一云獨怕春詩酒尚堪驅使在未須料理白頭人逺注此初至江邊而作行歩欹危老年之狀詩酒堪使不須慮死也前二自悲後二自慰頭杜臆前云花惱此云怕春皆用反語詩酒曰驅使白曰料理出語皆竒兩淮南子包裹於天地之間此裹字所本趙曰裹江濱岸俱有花也司空圖詩千英萬蕚裹枝紅即此意語王粲詩率彼江濱當世説韓康伯母聞二呉哭母哀子曰汝若為選官先料理此人又王子猷作桓車騎叅軍桓謂王曰卿在府乆比當相料理江深竹靜兩三家多事紅花映白花報答春光知有處應平聲須美酒送生涯呉論此過臨江數家而作曰兩三家家之少紅白花花之繁多事亦有惱花意酒送餘生不孤春色便是報答處花多事就花開言逺注謂種花者多事非李白詩桃能紅李能白曹梁元帝詩徒望春光新植詩美酒斗十千東望少去聲城花滿烟百花高樓更可憐誰能載酒開金盞一作鎻喚取佳人舞繡筵呉論此回望城中而作飲少城居宻故烟氣䝉花招無人所以望樓興歎以杜臆變烟花為花滿烟化腐為新左思蜀都賦亞少城接乎其西市㕓所舎賈商之淵注少城小城也在城西市在其中元和郡國志少城在成都縣西南一里黄生以百花樓為少城酒樓希謂在百花潭上未合黄師墖前江水東春光懶困倚微風桃花一簇開無主可愛深紅愛晉作映一作愛一作與淺紅呉論此至黄師墖前而作春時懶倦故倚風少憩師亡無主則深淺紅花亦任人自賞而已接朱注疊用愛字言愛深紅乎抑愛淺紅乎有令人應不暇意此陸游老學菴記余以事至犀浦過松林甚茂問馭卒何處答曰師墖也蜀人呼僧為師葬所為墖乃悟少陵黄師墖前之句蘭庾信詩深紅蓮子艶朱超道詩心帶淺紅黄四娘家花滿蹊千朶萬朶壓枝低留連戲蝶時時舞自在嬌鶯恰恰啼呉論此至黄四娘家而作度師墖黄家殁存雖異但看春光易同歸零落耳故復有花盡老催之感此三章聨絡意也飲梁元帝詩戲蝶時飄粉風花乍落香古樂府澤雉啄常自在王陳後主詩嬌鶯含響偶駱賓詩分念嬌鶯一種啼不是愛花即欲一作肯死一作看花即索死只恐花盡老相催繁枝容易去聲紛紛落嫩蘂一作葉商量平聲細細開逺注末章總結乃惜花之詞過愛花欲死少年之情花盡老催暮年之感繁枝易落時者將謝嫩蘂細開方來者有待亦寓悲老惜少之意徃鍾惺云前二語即惱花怕春意商量細開不欲其一而盡也逺注毎首㝷花章法各能變化進艇鶴注詩云南京乆客當是上元二年作南京乆客耕南畆北望傷神坐一作卧北牕晝引老妻乗小艇晴看平聲稚子浴清江俱飛蛺蝶元相逐並蒂芙蓉本自雙茗飲蔗漿擕所有瓷甖無謝玉為缸此公卜居後乗舟以遣興也中四喜妻子相聚賦而兼比末則隨寓而安聊以自慰耳南京謂成都北望指長安花蝶舟中所見者茗漿舟中所擕者相逐比子並蒂比妻我杜臆讀起語知非真快心之作所謂駕言出遊以寫憂者公艱難入蜀得擕妻子此不幸中之幸也故形之於詠歌無明皇幸蜀號成都為南京置尹比兩都易林乆客林而詩俶載南畆而庾信詩薊門還北望北别賦造手分銜涕感寂寞傷神陶潛傳高卧牕淮南子越舲蜀艇庾信詩小艇釣蓮溪船小而長者為艇蛺牟子深不絶涓流稚子浴其淵梁武帝詩飛飛雙蝶低低兩差池花初學記宋有天淵池華林池池有雙蓮同幹芙蓉異並蒂爾雅荷芙蕖注别名芙蓉江東呼為荷漿洛陽伽藍記北魏侍中楊元慎曰菰稗為飯茗飲作招魂濡鼈炮羔有柘漿些注柘謂蔗也取諸蔗之汁以為漿飲齊鄒陽酒賦醪釀既成緑瓷既啟瓷不讓玉言貴賤視也抱樸子日月無謝於精明鮑照詩無謝堯為君何用知柏皇無謝皆作不讓解葛常之曰北征詩云經年至茅屋妻子衣百結慟哭松聲迴悲泉共幽咽是時方脱身於萬死一生以得見妻兒為幸至秦州則有曬藥能無婦應門亦有兒之句已非北征時矣及成都卜居後江邨詩云老妻畫紙為棋局稚子敲針作釣鈎進艇詩云晝引老妻乗小艇晴看稚子浴清江其優游愉悦之情見於嬉戲之際則又異於客秦時矣北申㴠光曰南京乆客耕南畆北望傷神坐北牕南字疊用對映杜詩每戲為之如舊日重陽日傳杯不放杯桃花細逐楊花落即從巴峽穿巫峽之類後人效之易入惡道一室一室即草堂此當是上元二年作若在元年方構草堂豈遂欲舎蜀而去荆蠻乎舊編非是當後漢陳蕃曰大丈夫處世掃除天下安事一室乎一室他鄉逺一作老空林暮景懸正愁聞塞笛獨立見江船巴蜀來多病荆蠻去幾年一作千應平聲同王粲宅留井峴山前公在蜀而懷楚也正愁二句承上暮景亦起下意聞笛而愁以留蜀多病故也獨立見船適荆將在何年乎襄陽本公祖居故欲留跡其地舊注謂留井於蜀者非峴山遺井在荆不在蜀也逺注巴蜀來荆蠻去各三字一讀記張載詩鳴鶴聒空林曰秦國䇿西有巴蜀洙注成都其西即隴之南首故隴蜀以與巴接復曰巴蜀襄荆蠻楚地詩蠢爾蠻荆王粲七哀詩遠身適荆蠻沔記王粲宅在襄陽縣西二十里峴山坡下宅前有井人呼為仲宣井趙汸曰此詩三四景在情中客寓無聊之感也句法與鈎簾宿鷺起丸藥流鶯囀同如巻簾黄葉落鎻印子規啼又其苖裔也但此猶出闈見二字為稍異耳所思鶴注編在上元二年也蔡夢弼曰崔漪盖自吏部而謫荆州司馬唐書杜鴻漸傳禄山亂肅宗至平涼鴻漸與節度判官崔漪定議興復謝朓詩開襟望所思苦憶荆州醉司馬原注崔吏部漪謫官一作居樽酒一作爼定常開九江日落醒何處一柱觀去聲頭眠㡬回可憐懷抱向人盡欲問平安無使去聲來故憑錦水將雙淚好過瞿唐灔澦堆上四懷崔司馬下傷音書濶絶也苦憶二字直貫通章杜臆官雖謫酒常開便見司馬胸次或醒或眠顛狂落拓真得酒中趣者此為醉司馬傳神而相憶已在其中五六彼此互言更見兩情遙企在已則有懷欲罄在彼則信使莫通此所以苦憶淚零而欲憑江水以達之也此詩備寫苦衷語語足泣鬼神朱瀚曰九江一柱荆州謫居之地崔顧注懷抱懷崔之意向人逢人問訊也舊以懷抱屬者非易樽酒簋貳禹貢九江孔殷蔡傳九江即今之洞庭也沅水漸水元水辰水叙水酉水灃水資水湘水皆合於洞庭是名九江楊德周曰此九江斷主蔡傳若潯陽之九江乃揚州境與一柱觀不合矣渚宫故事宋臨川王義慶鎮江陵於羅公洲立觀甚大而惟一柱一統志在松滋縣東邱家湖中劉孝綽詩經過一柱觀出入三休臺古詩臨風送懷抱州古樂府問客平安不下烏鳶歌淚泫泫兮雙懸荆記灔澦如馬瞿唐莫灧澦如象瞿唐莫上瞿唐峽在夔州峽口有灧澦石王嗣奭曰此詩觀頭借對日落五六接上失嚴此不縛於律所謂不繩削而自合也不知者以為隤然自放矣句洪邁容齋隨筆云七言律大抵多引韻起若以側入尤峻如杜幽棲地僻經過少是也然猶是對偶若以㪚句起又佳如苦憶荆州醉司馬是也葉晦叔昔贈予詩此地相從驚歲晚登臨况是客歸時却將襟抱向誰可正爾艱難惟子知情到中年工作惡别於生處易為悲梅花盡落清江上黯淡西風凍雨垂正用此體聞斛斯六官未歸舊次在上元二年成都作愛斛斯複姓名融公所謂南隣酒伴者故人南郡去去索蘇則切作碑錢本賣文為活翻令平聲室倒懸荆扉深蔓草土銼粗卧切冷疎烟老罷休無頼歸來省醉眠此為斛斯耽酒而諷之也賣文得金李北海亦嘗為之若索錢則不雅矣得錢即飲飲醉即眠少年有此亦近無頼况老尋醉鄉不顧其家故囑其早歸以為善後之計朋友相規之義也鶴曰南郡江陵府也呉志南郡在荆州南野王隱君歌前度相逢正賣文左傳室如懸磬詩有蔓草御覽説文云銼􅟋鍑也纂文云鍑音副釡大者曰鍑困學記聞土銼乃黔蜀人語黄鶴云銼瓦鍋也陶潛詩窺竈不見烟老罷言老則百事皆罷矣南史蔡興宗傳太尉沈慶之曰加老罷私門兵力頓闕無頼無所倚頼而為不肖也詳見三巻按晉書阮籍傳籍方據醉眠赴青城縣出成都寄陶王二少去聲尹朱注依草堂草本編在上元二年此盖出郭後寄二尹者廢唐書青城縣屬蜀州因山為名全蜀統志青城縣在灌縣南四十里元和郡國志青城縣垂拱二年改為蜀州開元十八年仍為青城今按唐書青城乃蜀州之屬邑據元和志青城與蜀州是一地而兩名也杜詩既有青城又有寄高蜀州詩當如唐書之説鶴注青城乃蜀州外邑在成都之西事唐書京兆河南等府有少府二人掌貳府州之時成都稱南京故置少尹老被樊籠役一作老恥妻孥笑貧嗟出入勞客情投異縣詩態憶吾一作君曹東郭滄江一作浪合西山白雪高文章差楚懈切底病回首興去聲滔滔首聨徃青城之故異縣指青城吾曹指二尹五六申投異縣七八申憶吾曹入鳥在樊籠不能奮飛嘆已之羈旅跼蹐也樊籠與出相闗别本作妻孥笑語稍直率下截大意言江山跋渉如此則文章何救於貧乎惟回首故人詩興猶覺滔滔耳趙次公註差病除也言雖有文章差得何病乎正與章首相應朱注云差是差錯之差病如聲病之病言文章之不利差在何病乎回首二子興自滔滔盖以詩道自信之詞二句不同今從趙注王陶潛詩久在樊籠裏蔡邕詩他鄉各異縣晉書衍曰吾曹雖不如古人今括地志李冰穿郫江撿江來自西北合於郡之東南有合江亭洙曰蜀城之東二水合流而南下土人謂之合水西山近接維松上有積雪經夏不銷寰宇志傍便山在縣西與青城山連接谿谷深䆳夏積冰雪俗世説殷顗曰我病自當差正憂汝患耳匡謬正俗謂何物為底此本言何等物其後遂省何但直云等物耳底音丁兒反淮南子日滔滔以自新野望因過常少去聲仙草堂本編在上元二年青城詩内洪容齋隨筆杜詩過常少仙蜀本注云應是言縣尉也縣尉謂之少府昔梅福為尉有神仙之稱少仙者猶今俗呼為仙尉朱注詩末幽人指常少仙也黄鶴云少仙當是常徵君公後有寄常徵君詩徵君晚節傍風塵野橋齊渡馬秋望轉悠哉竹覆青城合江從灌口來入邨樵徑引嘗果栗皺一作圓開落盡高天日幽人未遣回上四野望之景下四過常情事未青城灌口野望所見入邨訪常也常果留公也日盡遣見其欵洽多情方云野外之橋可連騎者少齊渡馬三字寫景特佳望杜臆少府稱幽人知非在任者沈佺期詩野橋疑日國鶴曰蜀州青城縣有青城山州内又有灌口元和郡志灌口山在彭州導江縣西北二十六里蜀州東北至彭州一百二十里漢文翁穿湔江灌漑故以灌口名洙曰秦守李冰疏鑿離堆以灌蜀土因得名范成大呉船録將至青城當再渡繩橋橋長百二十丈分為五架橋之廣十二繩排連之元和郡國志大江經青城縣北去縣二里栗宋祁益部方物贊天師栗生青城山中他處無有似味美以獨房為貴乆食已風攣西溪叢語集韻皺側尤切革文蹙也漢上題襟周繇詩開栗弋之紫皺貫休云新蟬避栗皺又云栗不和皺落即栗蓬也蔡曰皺當作皴皮裂也易利幽人之貞丈人山御覽王匱經云黄帝遍厯五嶽封青城山為五嶽丈人一名赤城一名青城都一名天國山為第五大洞寳仙九室之天對郡西北在岷山南連峯掩映互相連接靈仙所宅神異甚多寰宇記山在青城縣西北三十二里自為青城客不唾青城地為去聲愛丈人山丹梯近幽意首記登山覽勝寺魏文帝雜詩千里不唾井况乃昔所奉智度論若入時當歌唄讚嘆不唾僧地青城山記寗封先生棲於北巖之上黄帝築壇拜為五嶽丈人晉代置觀謝朓敬亭山詩即此凌丹梯注丹梯山也丈人祠西佳氣濃縁雲擬住最高峰掃除白髮黄精在君看他時冰雪容此欲託迹幽棲也結逺注山屬仙境故以遊仙之意作此章五七言各半盖唐人七古長短參用如李頎送劉昱詩亦然上陶潛詩山氣日夕佳魯靈光殿賦飛陛揭孽縁雲征髮謝靈運詩迢遞瞰高峰精釋寳月詩倩人為我除白敬元子詩我欲將黄流丹在眼前莊子藐姑射之山有神人馬肌膚若冰雪綽約若處子寄杜位朱注位為李林甫壻天寶十一載十一月林甫卒位之貶官必在十二載自十二載癸巳至上元二年辛丑為九年詩舉成數故云十年流也邵注公有送柏别駕赴江陵詩題知位以行軍司馬移在江陵矣一統志玉壘在灌縣西北二十九里灌縣乃唐之導江青城二縣地盖其山自導江而接青城界也詩云玉壘題書心緒亂又知在青城所作草堂本與青城諸詩同編入上元二年得之近聞寛法離去聲一作别新州想見歸懷尚百憂逐客雖皆萬里去悲君已是十年流干戈况復扶又切塵一云行隨眼鬢髮還應平聲雪一云白滿頭玉壘題書心緒亂何時更得曲江遊此為杜位移州而作也離新州叙事尚百憂推心逐客二句承新州言流竄之乆干戈二句承百憂言離亂堪傷末述寄詩之意猶恐後㑹難必也輕顧注同是貶竄於鄭䖍曰嚴譴於杜位曰寛法以見重失宜此老杜春秋之筆澤州陳冡宰曰鄭初貶官故用嚴譴位離貶所故用寛法非欲以此翻兩人罪案也叚位從新州移江陵尚未還家故云懷歸時有史朝義子璋之亂故曰塵隨眼唐書新州新昌郡屬嶺南道至京師五千五十二里宇詩豈不懷歸名又離此百憂蜀都賦包玉壘而為劉注玉壘山湔水出焉在成都西北左峴曰玉壘有二一在威州一在灌縣此指灌縣之玉壘孫萬壽詩心緒亂如絲原注位京中宅近西曲江顧宸曰是一紙家書率直攄寫不待致飾曰近聞曰想見曰雖皆曰已是曰况復曰還應曰何時更得只此數虚字中情文厯亂俱寫出心亂之故骨肉真情溢於言表矣盧世㴶曰字字排空却字字蹠實妙不可名狀送裴五赴東川鶴注此當是上元二年在成都作時史朝義未平故云何日通燕塞蜀東川屬潼川故人亦流落高義動乾坤何日通燕平聲塞相看平聲老蜀門東行應平聲暫别北望苦銷魂凛凜悲秋意非君誰與論平聲之從在蜀説向東川四句分截匡時志者故以高義動乾坤稱之顧注裴必負何日得通燕塞乎無使同老蜀門也東行承蜀北望承燕重張逺注悲秋之意非君莫可與論今復從此而去盖傷之也高宋孔欣詩流落尚風波淚孔叢子羈旅之臣慕君之義張衡詩側身北望霑巾别賦黯然銷魂者惟别而已凛楚辭竊獨悲此秋送韓十四江東省覲鶴從舊次編在上元二年成都詩内江淮呉㑹皆稱江東也兵戈不見老萊衣嘆息人間萬事非我已無家尋弟妹君今何處訪庭闈黄牛峽靜灘聲轉一作急白馬江寒樹影稀此别應平聲須各努力故鄉猶恐未同一作能一作堪歸此送别韓君而作也上四江東省覲有喪亂之感下四蜀江送别有故鄉之思張綖注韓盖公同鄉人必其父母避亂江東而徃省之玩次聨及結可見此亂後不能養親則萬事之失所可知矣骨肉飄零彼同憾正嘆兵戈之害黄牛白馬出峽所經兼寫冬日之景各努力謂句俱訪天倫未同歸謂猶阻兵革朱瀚曰灘聲樹影二在韓是一片歸思在杜是一片離情氣韻淋漓滿紙猶濕杜臆故鄉指洛陽蔡琰胡笳兩國交歡兮罷兵戈之列女傳老萊子老奉二親行年七十身著五色斑斕衣作嬰兒戲於親側欲親之喜束晢補亡詩眷戀庭闈心不遑安注庭闌親之所居岸水經江水又東逕黄牛山注下有灘名曰黄牛灘南重嶺疊起最外高崖間有石如人負刀牽牛人黒牛黄成就分明行者謡曰朝發黄牛暮宿黄牛言水路紆深迴望如一矣一統志黄牛山在夷陵州西九十里白馬在崇慶州東北十里朱云唐蜀州今為崇慶州他注引九域志江陵白馬洲者非作薛道衡詩征途非白馬水勢類黄牛亦以白馬黄牛對梁元帝詩灘聲下濺石陳後主詩樹影帶江沈故魏文帝樂府男女居世各當努力交蘇武詩遊子戀鄉補注王勃詩堰絶灘聲隱峰樹影深亦連用作對謝榛曰凡七言八句起承轉合具有四聲歌則揚之抑之靡不盡其妙如此詩首聨以平聲揚之也次聨以上聲抑之也三聨以去聲揚之也四聨以入聲抑之也平仄以成句抑揚以合調揚多抑少則調匀抑多揚少則調促柟一作高樹為風雨所拔歎朱注考草堂本此與茅屋歌俱編入上元二年成都詩内今從之黄鶴據史永泰元年三月大風拔木謂此詩作於其時太泥倚江柟樹草堂前古一作故老相傳二百年誅茅卜居總為去聲此五月髣髴聞寒蟬堂依柟樹此卜居之由蟬五月寒蟬是咏樹不是咏樹高則響細陰多則氣涼故髣髴如聽寒蟬首二似七律起語鮑照詩哀哀古老容申㴠光曰哀江南賦誅茅宋玉之宅以楚辭卜居者屈原之所作也號長門賦時髣髴物類兮江逌詩寒蟬向夕東南飄風動地至江翻石走流雲氣幹晉作斡排雷雨猶力爭根斷泉源豈天意風雲雷雨一時並作乃樹所由拔也杜臆天意二字宜玩恐草堂終非吾有也盖以柟樹卜之族詩飄風自南莊子雲氣不待而雨滄波一作蒼茫老樹性所愛浦上童童一作亭亭一青一作車蓋野客頻留懼雪霜行人不過聽平聲竽籟追叙未拔之先佳景堪玩雪樹映江波尤為可愛且垂䕃足避霜迎風如聽竽籟故客行至此頻留而不過賦劉删詩孤石滄波裏陶潛詩事勝感行人高唐纖條悲鳴聲似竽籟虎倒龍顛委榛一作荆棘淚㾗血㸃垂胸臆我有新詩何處吟草堂自此無顔色柟樹既拔倍增旅况淒涼矣正與首叚誅茅卜居相應虎倒龍顛言仆踣之狀即病柏詩偃蹙龍虎姿意帝此章四叚各四句王粲詩城郭生榛棘梁簡文詩淚㾗未燥詎終朝潛呉質書憤積於胸臆陶詩貽爾新詩茅屋為秋風所破歌八月秋高風怒號平聲巻我屋上三重平聲茅茅飛渡江灑一作滿江郊高者挂罥古犬切長林梢下者飄轉沈塘一作堂坳於交切萬此記風狂而屋破也兮楚辭秋高而氣清莊子竅怒號楚辭鳥次屋上李善選注罥結也水塘坳水塘作坳垤形也莊子覆杯於坳堂之上則芥為之舟南邨羣童欺我老無力忍能對面為盜賊公然抱茅入竹去脣焦口燥呼不得歸來倚杖自歎息此歎惡少陵侮之狀祭王勃詩對面即飛花後漢彤傳盜賊公行日淮南子唇焦肝沸有今無儲曹操樂府來大難口燥喉乾此盖叅用之也俄頃風定雲墨色秋天漠漠向昏黒布衾多年冷似一作象鐵嬌兒惡如字蔡讀烏卧切卧踏裏裂牀頭從郭知達一作牀牀屋漏無乾音干處雨脚如麻未斷絶自經喪去聲亂少睡眠長夜沾濕何由徹此傷夜雨侵廹之苦術在第三句換韻脚庾信詩書巻滿牀頭齊民要方言種麻截雨新序原憲蓬户甕牖上漏下濕即秦嘉詩長夜不能眠徹乃徹曉逹旦意安得廣厦千萬間大庇天下寒士俱歡顔風雨不動安如山嗚呼何時眼前突兀見此屋吾廬獨破一作壞受凍死一作意亦足末從安居推及人情大有民胞物與之意章前後三叚各五句中叚八句此亦兩韻轉換其此列子北宫子庇蓬室若廣厦之蔭見嚴助傳天下之安猶太山而四維之也朱注突兀此屋即廣厦千萬間也白樂天詩安得布裘長萬丈與君都盖洛陽城即祖此意石笋行趙注謂詩作於上元元年今按此下三首詞格相同恐俱是上元二年所作鶴注通鑑上元元年七月李輔國矯稱上語迎上皇於西内此詩云好䝉蔽媚至尊其事隱而彰終云安得壯士擲天外使人不疑見本根盖恨去輔國輩之不速也華陽國志蜀五丁力士能移山舉萬鈞每王薨輙立大石長三丈重千鈞為墓誌今石笋是也號曰笋里杜田曰石笋在西門外二株雙蹲一南一北北笋長一丈六尺圍九尺五寸南笋長一丈三尺圍一丈二尺南笋盖公孫述時折故長不逮北笋君不見益州城西門陌一作街上石笋雙高蹲古來一作老又作逺相傳是海眼苔蘚蝕英華作蝕舊作食盡波濤㾗雨多一作來徃徃得一作有瑟瑟此事恍惚難明論平聲恐是昔時卿相去聲冡一作墓立石為表今仍存石笋行諷奸臣之壅蔽也首叚斥世俗之傳訛世以石笋為海眼遂云雨後有珠此語恍惚不足憑也墓前石表乃公之獨斷水經注地里風俗記漢武帝元朔二年改梁州曰益州以新啟犍為牂牁巂州之疆壤益廣故稱益云成都記距石笋二三尺毎夏六月大雨徃徃䧟作土穴泓水湛然以竹測之深不可及以繩繫石而投其下愈投而愈無窮凡三五日忽然不見嘉祐春牛車碾地忽䧟亦測而不能逹父老甚異故有海眼之説又風俗記蜀人曰我州之西有石笋焉天地之堆以鎮海眼動則洪濤大濫薄博雅瑟瑟碧珠也杜陽雜編有瑟瑟幕其色輕明虚無與比成都記石笋之地雨過必有小珠或青黄如粟亦有細孔可以貫絲高彪詩恍愡中有物希微無端形惜哉俗態好去聲䝉蔽亦如小臣媚至尊政化錯迕失大體坐看傾危受厚恩嗟爾石笋擅虚名後來未識猶駿奔安得壯士擲天外使人不疑見本根此惡其惑人而當去説俗好神竒造為不經之以䝉蔽人聽猶小臣蠱惑君心以致政舛國危此痛言附㑹之誤人也擲去此石使根底立見則人心不疑矣此破前恍惚䝉蔽之意奔此章二叚各八句謂張衡温泉賦殊方跋渉駿來臻莊子此之本根趙彦材曰上元元年李輔國離間兩宫擅權䝉蔽故賦石笋以譏之盧元昌曰輔國本飛龍廐小兒官判元帥朝廷呼尚父如石笋擅虚名忘本根也決事銀臺關白承㫖可謂乖迕失政體矣宰相率子弟禮節度皆門下士可謂後生皆駿奔矣與張良姊表裏禁中其媚至尊直侍帷幄專事䝉蔽也自靈武給事銀璫疊膺寵秩其受厚恩適足摇動東宫傾危社稷耳石犀行鶴注李冰作石犀以厭水災上元二年秋八月灌口損户口故作是詩然意亦有所寓也溪華陽國志李冰作石犀五頭以厭水精穿石犀於江南命曰犀牛里後轉置犀牛二頭一在府中市橋門一在淵中陸游筆記石犀在李太守廟内東階下亦麄似一犀正如陜之鐵牛一足不備以他石續之氣象甚古全蜀總志李冰五石犀在成都府城南三十五里今一在府治西南聖壽寺佛殿前寺有龍淵以此鎮之一在府城中衛金花橋即古市橋也君不見秦時蜀太守去聲刻石立作五舊本作三蔡云當作五後同犀牛自古雖有厭乙甲切勝法天生江水向一作須東流蜀人矜誇一千載上聲泛溢不近張儀樓今日灌口一作注損户口此事或恐為神羞石犀行諷廟堂無匡救之人也首叚譏厭勝之謬江水東流非關厭勝目撃灌口衝決則知神不能為力矣蜀人向誇此犀盡誕妄耳華陽國志秦孝文王以李冰為蜀郡太守稽漢高帝紀蕭何立未央宫以厭勝之術郭璞傳贊雖象或通而厭勝難恃莫愁歌河中之水向東流旋華陽國志張儀築成都城屢頽不立忽有大龜周行走巫言依龜行處築之遂得堅立城西南樓百有餘尺名張儀樓臨山瞰江成都志李冰為蜀郡守化為牛形入水戮蛟故冬春設鬭牛之戲祠南數千家邊江低圯雖甚秋潦亦不移和李膺益州記清水路西七里灌口古所謂天彭關元郡國志灌口山在彭州導江縣西北二十六里文翁穿湔江灌溉故以灌口名山舊書上元二年七月霖雨至八月方止灌口損户口或是此時軍書無作神羞上范成大呉船録崇德廟在永康城西門外山秦太守李冰父子廟食處也修築呉作終藉隄防出衆力高擁木石當清秋先王作法皆正道詭怪何得參人謀嗟爾五犀不經濟缺訛只與長川逝但見元氣常一作相調和自免洪一作波濤恣凋瘵側界切叶音祭安得壯士一云作者提天綱再平水土犀奔一作蒼茫此欲扶正道以杜神怪水築堤乃正道厭勝乃詭怪朝有良相以調元氣自然不為災彼缺訛之物非關經濟何不提去以滅其迹乎修築在官而調和在朝此推本之論也以此章亦八句分叚月令季秋之月完隄防謹壅塞備水潦譚左傳作法於涼其弊猶貪以通鑑光武信用䜟文桓諫曰觀先王之所記述咸仁義正道為本非有竒怪虚誕之事注邱遲詩詭怪石異象水易人謀鬼謀百姓與能朱蜀王本紀華陽國志經注成都記皆云李冰作犀牛五頭後來止二犀可見其三頭已不存所謂缺訛只與長川逝缺損其數訛易其處也祖孫登詩長川照落日代論衡天稟元氣人受元精瀾海賦昔在帝媯巨唐之天綱浡潏為凋為瘵洪濤汗萬里無際傳志清天綱沈約詩安得壯士駐奔羲國後漢陳蕃杜臆壯士謂才相天綱謂柄舜典咨汝禹平水土乾元元年九月置道塲於三殿以宫人為佛菩薩北門武士為金剛神王召大臣膜拜圍繞當時黷禮不經甚矣故有厭勝詭怪等語且自李峴貶斥朝無正人故有調和元氣之説此詩寓言亦確有所指矣杜鵑行李輔國刼遷上皇乃上元元年七月事此詩借物傷感當屬上元二年作鶴曰觀其詩意乃感明皇失位而作君不見昔日蜀天子化為一云作杜鵑似老烏寄巢生子不自啄羣鳥至今為去聲一作與哺雛杜鵑行傷舊主之孤危也起含寓意蜀天子化杜鵑憐之也寄子代哺蜀帝之分猶存焉子華陽風俗録杜鵑大如鵲而羽烏博物志杜鵑生寄之他巢羣鳥為飼之雖同君臣有舊禮骨肉滿眼身羇孤業工竄伏深樹裏英華作頭四月五月偏號平聲呼其聲哀痛口流血所訴何事常區區爾豈郭作惟摧殘始去聲晉作如發憤羞帶羽翮傷形愚此憫其形聲之哀慘也君臣舊禮承哺雛伏樹號呼自傷孤立哀聲流血承號呼含憤包羞備言失所也骨杜臆傷形愚哀其有情而不能自逹曹植詩倉卒肉情陶潛祭妹文遺孤滿眼棲謝莊月賦羇孤遞進阮瑀詩深樹猶霑裳曹植白鶴賦恒竄伏以窮吕氏春秋號呼而走之風俗録杜鵑聲哀而吻有血母辛延年詩一心抱區區西京賦樸叢為之摧殘邱儉詩但當養羽翮蒼天變化誰料平聲得萬事反覆芳服切下同何所無萬事反覆何所無一本無此重句豈憶當殿羣臣趨末致感慨悲痛之意當殿羣趨遥應蜀天子思此章中間八句首尾各四句顧朱注鮑照行路難愁忽而至跨馬出國門舉頭四望但見松柏荆棘鬱蹲蹲中有一鳥名杜鵑言是古時蜀帝魂聲音哀苦鳴不息羽毛憔悴似人髠飛走樹間逐蟲蟻豈憶徃日天子尊念此死生變化非常理中心惻愴不能言此詩意所本也洪邁隨筆云明皇為輔國刼遷西内肅宗不復定省子美作杜鵑行以傷之黄鶴曰上元元年七月李輔國遷上皇高力士及舊宫人皆不得留尋置如仙媛於歸州出玉真公主居玉真觀上皇不懌成疾詩曰雖同君臣有舊禮骨肉滿眼身羇孤盖謂此也位盧元昌曰蜀天子雖指望帝實言明皇幸蜀也禪以後身等寄巢矣刼遷之時輔國執鞚將士拜呼雖存君臣舊禮而如仙玉真一時並斥滿眼骨肉俱㪚矣移居西内父子暌離羇孤深樹也罷元禮流力士徹衛兵此摧殘羽翮也上皇不茹葷致辟穀成疾即哀痛發憤也當殿羣趨至此不復可見矣此詩託諷顯然鶴注援事証詩確乎有據張綖疑羞帶羽翮傷形愚句謂非所以喻君父亦太泥矣盖託物寓言正在隱躍離合間所謂言之者無罪也或疑刼遷西内宫禁秘宻于美逺遊西蜀何從遽知之曰蜀有節鎮國家大事豈有不知者故曰朝廷問府主其以杜鵑比君本縁望帝而寓言非擅喻禽鳥也逢唐興劉主簿弟鶴注唐莫州台州道州遂州四州皆有唐興此云劍外宫人冷是指遂州自天寳元年八月二十四日已改為蓬溪而公於上元二年為邑宰王潛作唐興縣客館記及此詩題俱云唐興乃因舊名耳當是上元二年作分手開元末連年絶尺書江山且相見戎馬未安居劍外官人冷關中驛騎去聲疎輕舟下去聲吳㑹音桂主簿意何如上四叙知交離合之情下則自嘆羇旅飄零也騎暫逢而又值戎馬含無限悲傷官冷則無可憑藉疎則遥隔音書所以有輕舟東下之慨詩何遜詩分手清江上裴子野詩連年被甲兵古中有尺素書莊子道逺而險又有江山外司馬遷報任少卿書深踐戎馬之地沈佺期詩劍懸銷骨左傳官人肅給杜詩博議官人乃隋唐間語北史梁彦光傳初齊亡後人情險詖妄起風謡訴訟官人千變萬化舊唐書高祖紀高祖即位官人百姓賜爵一級武宗紀中書奏赴選官人多京債到任填還致其貪求則官人者乃州縣令佐之稱也北項羽傳關中阻山河四塞歸東凾谷南武關西散關蕭關崔湜詩邊書驛騎阮藉詩乗流泛輕舟魏文帝詩吹我東南行行行至呉㑹指呉門㑹稽也陳書高祖謂蔡凝曰卿意何如末問主簿之意謂我何如也敬簡王明府鶴注上元二年公嘗為唐興縣宰王潛作客館記當即其人此殆因詩而簡之詩云鷹秋怕苦籠必是年秋作葉音爕縣郎官宰周南太史公神仙才有數流落意無窮驥病思偏秣鷹秋一作愁怕苦籠看君用高義恥與萬人同此章賓主疊叙致簡之意在末聨窮葉縣仙才稱明府周南流落公自謂病驥饑鷹歎途流落秣芻脱籠望高義一援也高大抵慷慨仗義者見漢視交情之人深以為恥恥從義推出後漢書湖陽公主為子求郎明帝曰郎官上應列宿出宰百里不司馬遷傳天子始建漢家之封而太史公留滯周南得與從事張晏曰自陜以東皆周南之地也後漢方術傳王喬為葉令有神術即古仙人王子喬漢武内傳西王母曰形慢神穢雖當語之以至道殆恐非仙才也法阮瑀詩流落恒苦心思偏秣猶言偏思秣乃倒字夏侯湛獵免賦息徒門關秣驥華田幸秋鷹思撃故怕在籠王融詩高義知遊重平聲簡王明府鶴注詩云冬來只薄寒當是上元二年冬作甲子西南異冬來只薄寒江雲何夜盡一作靜蜀雨㡬時乾音干行李須相問窮愁豈有一作自寛君聽平聲鴻雁響恐致稻梁難此章重簡以望王猶前章驥病思秣之意寛冬而雲雨蜀候異也王今問我行李豈有解窮愁之法乎鴻雁哀鳴各求稻梁君聽其音得無憐謀食之艱難耶甲子謂歲序晉程曉詩龍集甲子四時成歲巻楚辭泥汚后土兮何時乾著行李注見四司馬遷曰非窮愁不能書葛常之曰子美避亂秦蜀衣食不足不免求給於人如贈高彭州客夜狂夫簡王明府簡韋十諸篇亦見其艱窘中有望於朋友故舊也然當時能賙之者㡬人哉百憂集行鶴注詩云只今焂忽已五十當是上元二年辛丑作公生於壬子至是年恰五十為又云公於乾元二年十二月至成都是時裴冕尹上元元年三月以京兆尹李若幽尹成都若幽後賜名國禎二年三月以崔光逺尹成都與高適共討叚子璋時花敬定大掠東蜀天子怒以高適代光逺是年十一月光逺卒十二月除嚴武成都尹則適代光逺在成都才一二月耳意止是攝尹也公素與適善豈强供笑語者主人當指光逺史云光逺無學任氣宜與公不相合也王筠行路難百憂俱集斷人腸憶年一作昔十五心尚孩健如黄犢走復來庭前八月梨棗熟一日上上聲樹能千迴首叙少年得意之狀有左傳魯昭公年十九而猶童心晉寗戚飯牛歌黄犢上坂且休息樹書王澄見樹上鵲巢便脱衣上即今倐忽已五十一作即今年纔五六十坐卧只多少行立强區兩切將笑語供主人悲見生涯百憂集此歎身老拙於逢世苦笑語供主人説窮途作客之態最蔡琰胡笳人生倐忽兮如白駒之過隙語劉孝綽詩坐卧猶懷想詩燕笑兮入門依舊四壁空老妻覩我顔色同癡兒不知父子禮呌怒索先則切飯啼門東此歎貧窶不能顧家韻索飯啼門東説饑不擇食之情最慘此章三分三叚司馬相如傳家徒四壁立門顔色同各帶憂色也强漫叟詩話記庖厨之在東故曰啼門東非趁韻也徐卿二子歌鶴注舊編在上元二年時徐知道為西川兵馬使徐卿或即其人猶荆南兵馬使太常趙卿之類也君不見徐卿二子生絶竒感應吉夢相追隨孔子釋氏親抱送並是天上麒麟兒首叙生子竒兆釋相追隨連有吉夢也孔子氏正述其夢色詩吉夢維何維熊維羆而陳書徐陵母臧氏常夢五雲化為鳯集左肩上已誕陵焉年數歲家人擕候寳誌上人寳誌摩其頂曰天上石麒麟也大兒九齡色清徹秋水為神玉為骨小兒五歲氣食牛滿堂賓客皆回頭此記生相之竒禰衡傳大兒孔文舉小兒楊德祖雖揚子吾家之童九歲而與我元文尸子虎豹之駒未成文已有食牛之氣謝莊月賦滿堂賓客迴遑如失吾知徐公百不憂積善衮衮生公侯丈夫生兒有如此二雛者異時一無異時名位豈肯卑微休末乃歸羙徐卿也韻此章畫然三叚第七八句本與五六相應却另一轉直連至末杜詩歌行有韻換而意不換者如中四句是也有意換而韻不換者如末四句是也易積善之家必有餘慶庾信詩謂言君積善還得嗣前賢文衮衮多貌釋愁眩惑名位左傳公侯子孫必復其始離曹植王充論衡位雖卑微行茍俗必與之友申涵光曰此等題雖老杜亦不能佳今人刻詩集生子祝夀套數滿紙豈不可厭戲作花卿歌鶴注此當是上元二年作戲盧注公為此歌本稱述花卿題曰作有諷意焉璋舊唐書肅宗紀上元二年四月梓州刺史叚子反襲東川節度使李奐於綿州自稱梁王改元黄龍以綿州為黄龍府置百官五月成都尹崔光逺率將花敬定攻拔綿州斬子璋高適傳西川牙將花敬定恃勇既誅子璋大掠東蜀天子怒光逺不能戢軍乃罷之成都猛將去聲有花卿學語小兒知姓名用如快鶻風火生見賊惟多身始去聲輕綿州副使去聲著陟畧切柘趙曰當作赭黄我卿掃去聲除即日平此言勇猛剽悍所以平賊有功抱樸子猛將難禦而可以折衝拓境過南史齊桓康王隨武帝起兵摧堅䧟陣膂力絶人所村邑恣行暴害江南人畏之以其名怖小兒弦世説曹景宗謂所親曰君在鄉里騎快馬如龍拓弓作霹􅋬聲箭如餓鴟呌平澤中逐麞數肋射之覺耳後風生鼻頭火出此樂使人忘死史朱注子璋新書作節度兵馬使舊書通鑑作梓州刺此詩又云綿州副使益以梓州刺史領副使時據綿州反遂稱綿州副使耳唐書綿州巴西郡屬劍南東道本金山郡天寳元年更名一唐六典諸軍各置節度使一人五千人以上置副使人又隋文帝著柘黄袍巾帶聽朝漢陳蕃曰大丈夫處世當掃除天下子璋一作章髑髏血糢糊手提擲還崔大夫李侯重平聲有此節度人道去聲我卿絶世一作代無既稱絶世無天子何不喚取守東都此見平賊之後不當留蜀滋亂梓州作亂者叚子璋也綿州奔竄者李奐也成都舉兵者崔光逺也斬叚授崔而安李者花敬定也一事而三善備故曰絶世無獨居此詩兩韻分截謂曹植髑髏説顧見髑髏塊然王洙曰崔大夫光逺手提擲還謂歸功於主將度朱注李奐初出奔成都後復鎮東川故曰重有此節晉白石郎曲郎艶獨絶世無上元二年史思明方據東都補注前叚庚陽通協本於古韻據崔光逺傳花敬定將士肆其剽掠婦女有金銀釧者多斷腕以取之蜀人之受毒甚矣詩云何不喚取守東都此馭將之善術也盖以東都之命見召則敬定既不疑懼而蜀中可免其患且東方諸鎮屯聚花卿必不敢專行跋扈朱注謂刺其一將之雄不能掃除大宼此語猶覺未盡子璋髑髏血糢糊手提擲還崔大夫寫得壯氣勃勃明人沈明臣詩狹巷短兵相接處殺人如草不聞聲可與此詩並樹旗鼓唐詩紀事有病瘧者子美曰吾詩可以療之夜闌更秉燭相對如夢寐其人誦之未愈曰更誦吾詩子璋髑髏血糢糊手提擲還崔大夫誦之果愈謝率羽花卿冡行云濕雲糢糊秋草空雨青沙白丹陵東莓苔隂隂草茸茸云是花卿古來冡花卿舊事人所知花卿古冡知者誰精靈未歸白日西廟鴉啄肉枝上啼綿州柘黄魂正飛按杜詩以柘黄為衣色謝詩以柘黄為樹色意各有所指英黄山谷詩話花卿冡在丹陵縣之東館鎮至今有氣血食其鄉贈花卿單復編在上元二年成都詩内也舊注公有戲作花卿歌此花卿即敬定朱注唐曲水調歌後六疊入破第二即此詩見郭茂倩樂府詩集錦城絲管日樂府作曉紛紛半入江風半入雲此曲秪應平聲天上有樂府作去人間能得㡬回聞江風言音之清入雲言聲之高天上形容歌舞之妙歌杜臆胡元瑞因李羣玊有贈歌妓相同因以花卿為妓竊謂此詩非歌妓所能當其為花敬定無疑其人恃功驕恣故語含諷刺能得㡬回聞言其必不能乆也漢靈帝歌清絲流管歌玉鳬曹植詩齊謳楚舞紛紛入梁元帝詩江風當夏清風悲歌雲古詩誰能為此曲曹植七啟長裾隨宣室志𤣥宗夢仙子十輩御雲而下列於庭各執樂器而奏之其度曲清越殆非人世也及樂闋有一仙子前曰此神仙紫雲之曲也耳樂府隴西行天上何所有列子目所觀聽皆非人間之有焦竑曰花卿恃功驕恣杜公譏之而含蓄不露有風人言之無罪聞者足戒之㫖公之絶句百餘首此為之冠而楊慎曰花卿在蜀頗用天子禮樂子美作此諷之意在言外最得詩人之㫖當時錦城妓女獨以此詩入歌亦有見哉此詩風華流麗頓挫抑揚雖太白少伯無以過之其首句㸃題而下作承轉乃絶句正法也李白蘇臺覧古云舊苑荒臺楊柳新菱歌清唱不勝春只今惟有西江月曾照呉王宫裏人亦首句㸃題也有在次句㸃題者如杜常華清宫云行盡江南數十程曉風殘月入華清朝元閣上西風急都入長楊作雨聲是也有在三句㸃題者如儲光羲寄孫山人云新林二月孤舟還水滿清江花滿山借問故園隱君子時時來徃住人問是也有在四句㸃題者如韓愈楚昭王廟云邱墳滿目衣冠盡城闕連雲草樹荒猶有國人懷舊德一間茅屋祭昭王是也有一句二句㸃題者如李白秋下荆門云霜落荆門江樹空布帆無恙掛秋風此行不為鱸魚鱠自愛名山入剡中是也有一句三句㸃題者如李白與史欽聽黄鶴樓吹笛云一為遷客去長沙西望長安不見家黄鶴樓中吹玉笛江城五月落梅花是也有一句四句㸃題者如皇甫冉送魏十六還蘇州云秋夜沈沈此送君陰蟲切切不堪聞歸舟明日毘陵道回首姑蘇是白雲是也有二句三句㸃題者如常建三日尋李九庄云雨歇楊林東渡頭永和三日盪輕舟故人家在桃花岸直到門前溪水流是也有二句四句㸃題者如孟浩然濟江問舟子云潮落江平未有風輕舠共濟與君同時時引領望天末何處青山是越中是也有三句四句㸃題者如王維送元二使安西云渭城朝雨浥輕塵客舎青青柳色新勸君更盡一杯酒西出陽闗無故人是也又有兩扇立格對起分承者如少陵存殁口號云席謙不見近彈棋畢曜仍傳舊小詩玉局他年無限事白楊今日㡬人悲是也少去聲年行二首鶴注此上元二年夏在成都作莫笑田家老瓦盆自從盛平聲酒長子兩切一作養兒孫傾銀注玉英華作玉舊作瓦驚人眼共醉終同卧竹根首章有逹觀齊物意乃曉悟少年之詞彼盧注瓦盆與金玉雖異若論盛酒而飲及其醉時則此共卧於竹根又何貴賤之别乎後漢逢萌傳首戴瓦盆玉阮籍傳不復用杯觴斟酌以大盆盛酒呉越春秋杯銀樽公詩只想竹林眠即卧竹根之意又詩鳥下竹根行亦㮣言竹傍也按杜田補遺酒譜云老杜共醉終同卧竹根盖以竹根為飲器也庾信謝趙王賜酒詩野爐然樹葉山杯捧竹根趙次公曰卧竹根謂同醉卧竹根之傍選詩徘徊孤竹根可證若如杜田説飲器豈可謂之卧乎漢高帝紀時飲醉卧羅大經曰瓦盆金玉同博一醉尚何分别之有由是推之蹇驢布韉與駿馬金鞍同一遊也松床筦席與繡幃玉枕同一寢也知此則貧富貴賤皆可以一視矣巢燕引西溪叢語作引一作飬雛英華作兒渾平聲去盡江花結子也去聲一作已無多黄衫年少去聲來宜叢語作宜來數先角切杜臆音所主切不見堂前東逝波次章有及時行樂意乃鼓舞少年之詞春光已去時不可返故宜頻數來遊黄北史麥鐡杖傳將度遼呼其三子曰阿奴當備淺色衫我得被殺爾當富貴唐書禮樂志樂工少年姿秀者十數人衣黄衫文玉帶立左右毎千秋節舞於勤政樓下贈虞十五司馬鶴注梁氏編在大厯三年時公年是五十七歲矣當如暮歸詩年過半百不稱意不應云百年嗟已半當是上元寳應間在成都作故云沙岸風吹葉雲江月上軒若在公安則公未嘗舎舟不應有此語也逺師虞秘監今喜識𤣥孫形象丹青逼家聲器宇存淒涼憐筆勢浩蕩問詞源爽氣金天豁清談玉露繁佇鳴南嶽鳯欲化北溟鯤上叙虞氏淵源齡盧注師秘監師其書法也公九作大字平日能書可知勢形象逼丹青以孫比祖家聲存器宇自祖及孫也筆詞源追懷秘監爽氣以下稱美司馬金天玉露借秋景為喻南鳯北鯤言能變化飛騰唐書虞世南餘姚人太宗踐阼遷太子右庶子固辭改為秘書監封永興縣子世南殁太宗勅圖其像於凌烟閣論唐書時稱世南五絶四曰文詞五曰書翰王僧䖍書崔瑗筆勢甚快而結字小疎衡浩蕩曠逺也天隋藝文傳筆有餘力詞無竭源張思𤣥賦顧金而歎息兮露周祗箴清談輟響集江淹賦玉露曖天董仲舒有繁篇劉楨詩鳯凰南嶽徘徊孤竹根莊子北海有魚名曰鯤化為大鵬交態知浮俗儒流不異門過平聲逢連客位日夜倒芳樽沙㟁風吹葉雲江月上上聲一作在軒百年嗟已半四座敢辭喧書籍終相與青山隔故園下叙彼此交情儒門不異虞杜皆舊家過逢連客位虞為主人也㟁風江月乃成都晚景四座敢辭喧同飲興豪也贈書於故園言兩人相期北歸與或特過或偶逢皆與諸客連位而飲正見司馬好客俗交有别杜臆謂虞杜作客而飲他人者非是之此章兩叚各十句約前漢藝文志儒家者流顔延詩家崇儒門沈詩客位紫苔生晉史論劉畢芳樽之交府鮑照詩野曠沙㟁靜蔡别賦月上軒而飛光古樂四座樂且康魏志邕聞王粲在門倒屣迎之謂座客曰此王公孫也有異才吾家書籍文章盡當與之病柏此下四章梁權道及黄鶴俱編在上元二年之秋今並依舊次有柏生崇岡童童狀車一作青蓋偃蹇一作蹙龍虎姿主邵本作正當風雲㑹神明依正直故老多再拜豈知千年根中路顔色壞病柏傷直節之見摧者此從盛時叙起雲崇岡勢尊嚴車蓋狀聳翠龍虎幹竒古風氣陰森神依樹故人致敬根内撥故色外枯舎琴賦惟椅梧之所生兮託峻嶽之崇岡蜀志先主東南角籬上有桑樹高五丈遥望見童童如小車蓋耿司馬相如大人賦綢繆偃蹇偃蹇夭矯也後漢純傳純説李軼曰大王以龍虎之姿遭風雲之㑹生左傳史囂曰神聰明正直而一者也莊子松柏其也正宋書魯郡孔子廟柏舊有二十四株其二株先折倒土人崇敬江夏王義㳟悉遣伐取父老莫不歎息長楊賦中路而後馳出非不得地蟠據亦高大歲寒忽無憑一作用日夜柯葉改去聲一作碎丹鳯領九雛哀鳴翔其外鴟號志意滿養子穿穴一作窟内此形容衰時之柏顔得地盤據承千年根歲寒改柯承色壞鳯去鴟巢則神人失所憑依矣忽無憑翻論語歲寒後凋柯葉改翻禮記不改柯易葉歐陽建詩松柏隆冬瘁然後知歲寒改古詩枝葉日夜零凰記如松柏之有心貫四時而不柯易葉樂府鳯鳴啾啾一母將九雛詩鴟鴞鴟鴞既取我子無毁我室後漢北海靖王傳志意衰惰客從何鄉來佇立乆吁怪靜求元精一云無根理浩蕩難倚頼末以感慨之意作結觀盛衰倐異知造化為難憑矣孔此章前二叚各八句末叚四句収書詩佇立以泣安國尚書傳吁疑怪之詞後漢元精所生王之佐臣論衡天稟元氣人受元精浩蕩猶言𣺌茫王嗣奭曰此章有託而發神明依正直故老多再拜一木之微崇重至此丹鳯鴟鴞喻正人摧折則善類傷心而小人快意結語尤悲如范滂語子云使汝為惡則惡不可為使汝為善則我不為惡意正相似師氏謂此詩為郭英乂而作英乂鎮成都為人端直蜀人重之永泰元年崔旰反英乂為韓澄所殺諸孤哀苦莫訴故有鳯雛哀鳴之句崔旰竊據成都故有鴟鴞穿穴之句盖隱其詞以託諷也今按崔郭事在去成都後時地未合匡黄生曰此喻宗社欹傾之時君子廢斥在外無從救而宵小根據於内恣為姦私此真天理之不可問者病橘鶴注唐十道志蜀有橘柚之園羣一作伊橘少生意雖多亦奚為惜哉結實小一作少酸澀如棠梨剖一作割之盡蠧蝕一作蟲采掇爽所一作其宜紛然不適口豈只一作止存其皮蕭蕭半死葉未忍一作怱怱别故枝𤣥冬霜雪積况乃迴風吹病橘傷貢獻之勞民也首叙橘病堪憐少生意故其實酸澀而蠧其葉半死易凋殷杜臆未忍别故枝偏於無知之物寫得有情晉書仲文傳無復生意爾雅注棠今之杜梨陸曰其子有赤白美惡白色為甘棠赤色者澀而酢詩薄言采之薄言掇之莊子柦梨橘柚皆可於口梁元帝書適口充腸無索弗獲詩七發其根半生半死劉楨詩自夏渉𤣥冬庾信迴風即送師嘗聞蓬萊殿羅列瀟湘姿此物歲不稔玉食失一作少光輝寇盜尚憑陵當君減膳時汝病是天意吾愁舊作諗趙定作愁荆作敢罪有司憶昔南一作聞海使去聲奔騰獻荔支一作枝百馬死山谷到今耆舊悲此借橘以慨時事時病橘不供適當減膳之疑是天意使然但恐責有司而疲民力故引獻荔事為證節節推開意多曲折此章兩叚各十二句鮑照詩橘生瀟湘側真山海經洞庭之山其木多橘唐書潭州有橘洲太外傳開元末江陵進乳柑橘上以十枝種於蓬萊宫天寶十載秋結實於是宣命賜及宰臣故古詩此物何須用朱注橘結實一年多必一年少曰歲不稔國語不稔於歲玉尚書惟辟玉食漢陳咸傳泰侈玉食注玉食美食如也左傳憑陵我城郭漢書國有大災則減膳撤樂示自責也海又息夫躬傳民心悦而天意得矣後漢和帝紀南獻龍眼荔支十里一置五里一候奔騰險阻死者繼路唐羗為臨武長上書言狀和帝罷之唐國史補貴妃生於蜀好食荔支南海所生尤勝蜀者毎歲飛馳以進唐書楊貴妃嗜荔支必欲生致之乃置馳傳送走數千里其味未變已至於京師杜修可曰唐所貢乃涪州荔支由子午道而徃非南海也此特借漢事以譏之魏明帝詩百馬齊轡舊曹植詩但見者老不覩新少年枯㯶鶴曰上元二年蜀有叚子璋之變故詩云傷時苦軍乏廣志㯶一名栟櫚狀如蒲葵有葉無枝陳藏器本草其皮作繩入水千年不爛蜀門多㯶一作栟櫚高者十八九其皮割剥甚雖衆亦易音異朽徒布一作有如雲葉青青歲寒後交横集斧斤凋喪去聲先蒲柳枯㯶傷民困於重歛也首叙㯶枯之故零㯶本耐寒但為斧斤所剥故先蒲柳而凋耳割南都賦其木則栟櫚結根竦本垂條嬋媛抱陳琳檄剥元元盧諶云葉不雲布華不星燭樸子揚青於歲寒之後曰韓安國几賦荷斧斤援葛虆梧北史韋世康與子書耄雖未及壯年已謝霜早楸風先蒲柳世説顧悦之髪早白帝問其故對曰松柏之姿經霜猶茂蒲柳之質望秋先零説文楊柳即蒲傷時苦軍乏一物官盡取此茍切嗟爾江漢人生成復扶又切何有有同枯㯶木使我沈嘆乆死者即已休生者何一作能自守此見枯㯶而念生民指軍興賦重剝民等於剥㯶此嗟嘆本意江漢巴蜀生成謂物生死比人闕齊高帝紀時軍容寡乃編㯶皮為馬具啾啾黄雀啄一作啅側見寒蓬走念爾形影乾音干一作枯形影摧殘没藜莠一結語多感慨蓬雀啄㯶毛飄如走究竟形銷影滅埋没藜莠耳捕此章前二叚各八句末叚四句収呉越春秋螳螂蟬不知黄雀之在其後弔何遜詩嚴野㪚寒蓬生李宻陳情表形影相前漢郊祀志嘉禾不而蓬蒿藜莠茂焉盧元昌曰公為王閬州進論一表其中云勅天下徵収赦文減省軍用外諸色雜賦名目損之又損劍南諸州困而復振矣枯㯶一章即是此意借詩中咏物之作有就本題作結者如此章是也有客意作結者如病橘枯柟是也可悟詩家擒縱之法枯柟楩柟枯崢嶸鄉黨皆莫記不知幾百歲慘慘無生意枯柟傷大材之見棄也首叙老幹孤立陶蜀都賦楩楠幽藹於谷底子虚賦刻削崢嶸潛詩慘慘寒日上枝摩蒼一作皇天下根蟠厚地巨圍雷霆拆一作坼萬孔蟲蟻萃涷朱注音東雨落流膠衝風奪佳一作嘉氣白鵠遂不來天雞為去聲愁思去聲乆此言其憔悴失所蟲枝根雖具生意亡故造物日侵而鳥見傷魏文帝詩修幹摩蒼天湅楚辭使涑雨兮灑塵落爾雅注江東呼夏月暴雨為雨庾信詩枯楓乍膠朱注流膠樹中膠液流出也修楚辭衝風至兮水揚波注衝風隧風也宋江夏王鋒柏賦衝風不能摧其枝呉邁逺詩可憐雙白鵠也謝靈運詩天雞弄和風爾雅鶾一名天雞赤羽之鳥注逸周書文鶾若彩雞成王時蜀人獻之按汲冢周書王㑹篇云蜀人以文鶾文鶾者若翬雉猶含棟梁具無復扶又切霄漢一作雲霄志良工古昔少識者出涕淚種榆水中央成長子兩切何容易音異截承金露盤裊裊不自畏末用比喻作結慨用舎之失宜句棟梁傷大才莫用種榆比力小任重此章首叚四下兩叚各八句王命論粢棁之材不荷棟梁之任賦仲長統樂志論可以凌霄漢出宇宙之外矣東都眇古昔而論功蔡琰笳曲涕淚交垂者詩東門之枌毛氏注枌白榆也爾雅釋榆之皮色白名枌齊民要術榆性軟弱乆無不曲例非佳好之木仙詩宛在水中央立西都賦抗掌以承露擢雙之金莖葉石林曰此詩猶含棟梁具無復霄漢志當是為房次律而作自漢魏以來詩人用意深逺不失古風惟此公為然不特語言之工也皆黄生曰病橘一章賦也病柏枯柟二章比也三詩得漢魏之髓不在皮毛上論不見原注近無李白消息後鶴注詩云世人皆欲殺當是白流夜郎之蓋上元二年也梁氏編在寳應元年梓州作不知是年白已卒矣至曾鞏序乾元元年長流夜郎遂汎洞庭上峽江巫山以赦得釋憩岳陽江夏乆之復如潯陽過金陵徘徊於厯陽宣城二郡間其族人陽冰為當塗令白過之以病卒年六十有四是時寳應元年也詩愛而不見不見李生乆佯狂真可哀世人皆欲殺吾意獨憐才敏㨗詩千首飄零酒一杯匡山讀書處頭白好一云始歸來此懷李白而作也敏㨗千篇見才可憐飄零縱酒見狂可哀歸老匡山蓋憫其放逐而望其生還始終是哀憐意書箕子被髪佯狂白之縱酒豪放亦不得已而然人漢儒林傳魯榮廣高材敏㨗劉向新序聰明敏㨗之美材人雪賦從風飄零云薛道衡詩陶然寄一杯縣太白蜀而公亦在蜀故歸來丹鉛録謂指彰明南之匡山若以為匡廬太白非九江人何得言歸來乎楚辭王孫兮歸來顧宸曰公與白同遊齊魯在天寳四載白有魯郡石門之懷詩自此以後公屢形懷憶竟不得再見冬日春日之懷及夢白二首白在夜郎公在秦州此云不見李生乆白在浪遊公在成都公與白最稱交好考其相從歲月僅在遊齊魯時前乎此後乎此俱未相見也附考洪容齋三筆曰杜詩匡山讀書處頭白好歸來説者以為即廬山也呉曾能改齋漫録辯誤一巻正辯是事引杜田杜詩補遺云范傳正李白新墓碑云白本宗室子厥先避仇客蜀居蜀之彰明太白生焉彰明綿州之屬邑有大小匡山白讀書於大匡山有讀書堂尚存其宅在清廉鄉後廢為僧房稱隴西院盖以太白得名院有太白像呉君以是證杜句知匡山在蜀非廬山也予按當塗所刋太白集其首載新墓碑宣歙池等州觀察使范傳正撰凡千五百餘字但云自國朝以來編於屬籍神龍初潛還廣漢因僑為郡人初無補遺所紀七十餘言豈非好事者偽為此書如開元遺事之類以附㑹杜詩耶歐陽志輿地廣記云彰明有李白碑白生於此縣盖亦傳説之誤當以范碑為正朱注杜田之説本於楊天恵彰明逸事杜臆太白系出隴西後遂誤傳為隴西成紀人所云清亷鄉亦必青蓮之訛黄鶴曰李集有望廬山五老詩云九江秀色可攬結吾將此地巢雲松又望廬山瀑布云而我遊名山對之心益閒且諧宿所好永願辭人間又南康軍圖經云白性喜名山飄然有物外志以廬阜水石佳處遂徃遊焉至五老峰愛其險峭竒勝曰天下之壯觀也卜築於此吾將老焉今峯下有書堂舊基自後北歸猶不忍去乃指廬山曰與君再㑹不敢寒盟丹崕緑壑神其鑒之又白送姪嵩遊廬山序慚未歸於名山然則匡山斷指潯陽匡廬山西今按全蜀總志龍安府江油縣有大匡山在縣治三十里山勢高聳狀如匡字唐李白讀書處豈修志者亦因彰明逸事而附㑹歟又考水經注逺法師廬山志曰殷周之際匡俗先生遊此山時人謂其所止為神仙之廬因以名山然則廬山亦稱匡山盖以姓得名耶草堂即事詩云建子月是上元二年十一月在草堂作荒邨建子月獨樹老夫家雪一作霧裏江船渡風前竹徑斜寒魚依宻藻宿雁聚從杜臆作雁聚舊作鷺起誤圓沙蜀酒禁平聲愁得無錢何處賖首叙冬日草堂中四寫景末二述情合之皆所謂即事也荒邨獨樹淒涼之况建子老夫用假對法寒魚宿雁兼自喻窮冬旅泊故落句有賖酒銷愁之慨杜臆春秋變古則書詩云建子月盖史法也肅宗紀上元二年九月詔去上元號稱元年以十一月為歲首建子月壬午朔上受朝賀如正旦儀馬融曰周正建子為天統詩陶潛詩獨樹衆乃竒庾信詩俱來雪裏看劉憲風前雪裏覔芳菲昉梁元帝詩竹逕露初圓王庾信詩寒魚抱凍沈臆薛詩細藻欲藏魚駱賓詩宿雁下廬洲杜宿鷺當作宿雁冬寒但有雁耳鷺畏露白露降便飛去矣物類志人養鷺於池塘馴若家禽毎至白露即飛騰而去徐九少去聲尹見過平聲冬作鶴注此當是上元二年又曰少尹與行軍自不同西都東都北都鳯翔成都河中江陵興元興德府尹各一人少尹二人初不言以少尹為行軍長史但云永徽中改尹為長史又云天下兵馬元帥府有行軍長史行軍司馬今題云少尹而詩云行軍徐當是成都尹兼節制兵馬以時亂故少尹兼稱行軍也晚景孤邨僻行軍數騎去聲來交新徒有喜禮厚愧無才賞靜憐雲竹忘歸歩月臺何當看平聲花蘂欲發照江梅上四叙事見自謙意下四叙景見喜客意晚景謂日暮之時少尹何時當再來乎梅將發而照江矣期之也張正見詩翠竹梢雲而結叢繞謝靈運詩游目倦忘歸梁武帝秋笛曲紅梁流月臺范二員外邈吳十侍御郁特枉駕闕展待聊寄此作鶴注當是上元二年浣花時作還過江卜宅時郁尚謫楚中是年盖放矣暫徃比音皮隣去晉作至空聞二妙歸幽棲誠簡略衰白已光輝野外貧家逺邨中好客稀論平聲文或不媿重平聲肯欵柴扉簡畧承比隣句闕展待也光輝承二妙句特枉駕也下四因失欵而冀其重來曹植詩天涯若比隣為晉書尚書令衛瓘與尚書郎索靖俱善草書時人號一臺二妙陶潛詩野外罕人事范雲詩還聞稚子説有客欵柴扉趙汸曰前後詩中毎以無俗物絶交游門徑榛塞為喜獨於范呉之來闕於展待委曲盡情如此則平日稱懶者果真懶乎於王嗣與曰公素以文自負如文章千古事則内信心斯文憂患餘則竊比於聖故亦不輕與人論文重與細論文則須李白佳句法如何則詢高適二人皆高品也如呉侍御辯釋無辜寧拂上官而甘遷斥者乃公心契論文不愧豈泛言者哉羅大經鶴林玉露曰范員外呉侍御訪少陵於草堂杜偶出不及接見因謝之以詩陳後山在京師張文潛晁無咎為舘職聨騎過之後山偶出蕭寺二君題壁而去後山亦謝之以詩云白社雙林去高軒二妙來排門衝鳥雀揮壁帶塵埃不憚升堂費深愁載酒回功名付公等歸路在蓬萊杜陳一時之事相類二詩藴藉風流未易優劣王十七侍御掄許擕酒至草堂奉寄此詩便請邀高三十五使去聲君同到鶴注編在上元二年冬成都作是時高適刺蜀以攝尹事至成都也考舊書高適傳崔光逺不能攝軍天子罷之以適代為成都尹西川節度然此詩不曰高尹而仍謂高使君且是年十一月光逺卒十二月旋以嚴武為成都尹則適實未嘗代光逺也及嚴武於寳應元年召歸後却不聞成都别除尹史云代宗即位吐蕃䧟松維保諸州節度使高適不能救以嚴武代還必寳應元年七月至廣德元年十二月乃適尹成都也但此時公無一詩與高盖適為尹時公同在東川及嚴武再鎮蜀方歸草堂也王掄終於彭州刺史後有哭王彭州掄詩老夫卧穩朝慵起白屋寒多暖始開江鸛一作鶴巧當幽徑浴隣雞還過短墻來繡衣屢許擕家醖皂蓋能忘拆音節野梅戲假霜威促山簡須成一醉一作醉裏習池迴上四草堂閴寂之景下欲王擕酒邀高同至也皂鸛浴雞飛晴暖景象即開門所見者繡衣霜威指王盖山簡指高習池借比草堂堂有野梅故以折梅招之鳥抱樸子公旦執贄於白屋白屋白茅覆屋也鸛水形似鶴庾信詩幽徑忽春臨二洙曰漢侍御有繡衣直指出討奸猾治大獄績漢志千石皂盖朱兩幡陸凱詩折梅逢驛使寄與隴頭人始趙曰霜威御史有風霜之任也崔篆御史箴今鷹隼擊以成嚴霜之威諸葛潁詩葉落霜威重嬉晉書習氏荆土豪族有佳園池山簡毎出遊多之池上名之曰高陽池朱瀚曰作詩代書促侍御踐約并邀高來同飲真率如話而矩度謹嚴仍有惜墨如金之意今按隣雞過墻語近淺易繡衣皂盖又近拙鈍恐非少陵匠意之作也王竟擕酒高亦同過共用寒字卧病荒郊逺通行小徑難故人能領客擕酒重義從平聲讀用去聲相看平聲自愧無鮭音骸一作蝦菜空煩卸馬鞍移樽一作時勸山簡頭白恐風寒亦從草堂叙起王果擕酒而至喜之也勸高醉飲禦寒戲之也原注高毎云汝年㡬小且不必小於我故此句戲之下謝靈運詩卧病同淮陽前漢書陳恢見沛公曰足通行無所累有集韻鮭呉人魚菜總稱齊書庾杲之清貧自業食惟韭葅瀹韭生韭雜菜任昉戲之曰誰謂庾郎貧食鮭嘗有二十七種二十七言三九也顔延之詩嚴駕越風寒陪李七司馬皂江上觀造竹橋即日成徃來之人免冬寒入水聊題短作簡李公鶴注此當上元二年冬在蜀州作元和郡國志鄩江一名皂江經蜀州唐興縣東三里任慥渠堰志九昇口堰其源出於皂江至郫之柵頭别流為温江口曰九昇口者實兩江之􅚈也晏公類要鄩江一名皂里水今在新津昇音躬伐竹黄作伐木朱瀚作代木為橋結構同褰裳不渉徃來通天寒白鶴歸華表日落青龍見音現水中顧我老非題柱客知君才是濟川功合歡正異作觀却笑千年事驅石何時到海東上四觀竹橋下四簡李公可結構同等於木橋徃來通駕竹而渡鶴歸華表柱棲鶴龍見水中橋影若龍也題柱客公自謙濟川功頌司馬勞趙次公曰合歡橋落成而聚客歡飲笑者笑前人之而無成雷次宗豫章記伐竹為筏任魯靈光殿賦觀其結構叔詩褰裳渉洧褰裳渉溱昉詩江湖忽徃來劉敬異苑晉太康二年冬大雪南洲人見二白鶴語於橋下曰今兹寒不減堯崩年也於是飛去白鶴事當主異苑舊引丁令威化鶴歸集城門華表柱者誤此華表指橋柱李義山詩㶚水橋邊倚華表亦可證又梁昭明太子啟虹入漢而藏形鶴臨橋而送語澗朝野僉載趙州石橋甚工望之如初月出雲長虹飲天后時黙啜欲南過橋馬跪地不進但見青龍卧橋上奮迅而怒賊乃遁去今按青龍用費長房竹杖事切竹橋也楚辭麾蛟龍以津梁知橋可稱龍觀顧念也如華陽國志蜀城北八十里有昇仙橋送客司馬相初入長安題其柱曰大丈夫不乗赤車駟馬不過汝下歡説命若濟巨川用汝作舟楫樂記酒食者所以合也淮南詮言今有美酒合歡以相饗卑禮婉辭以接之驅齊地記秦始皇作石橋欲過海觀日出處有神人能石下海石去不速神輙鞭之石皆流血觀作橋成月夜舟中有述還呈李司馬草堂本有此題諸本通上章為二首中連日觀橋舟皆設酒觀詩屢字可見把燭橋成一作成橋夜迴舟客坐一作坐客時天高雲去盡江迥月來遲衰謝多扶病招邀屢有期異方成此興去聲樂音洛罷不無悲上章題橋成此章述已意夜把燭橋成言刻日完功雲去月來記舟前景悲有三意衰年多病而又在異方故悲不自勝梁武帝紀把燭看事李司馬橋成一作了承一無承字高使去聲君自成都回王洙曰時高適守蜀州而攝成都故題云自成都回九域志蜀州東至成都一百里故詩云橋東待使君又知是詩在蜀中作向來江上手紛紛三日功成事出羣已傳童子騎青竹一作馬總擬橋東待使去聲君上二司馬橋成下二使君回蜀手紛紛經營者衆也後漢書郭伋為并州牧始至行部到河西美稷有童兒數百騎竹馬迎之曰聞使君到喜故來迎入奏行贈西山檢察使去聲竇侍御黄鶴編在寳應元年夢弼曰時吐蕃分三道入寇欲取成都為東府竇公以御史出檢校諸州軍儲器械得以便宜入奏公作是詩以贈之觀鶴曰考新舊史㑹要諸書無檢察使唯有巡察察按察之名然歐陽詹集有送韋檢察詩又似史失書云朱注㑹要有西山運糧使檢校户部員外郎詩運糧繩橋壯士喜疑即此官竇盖以侍御出耳又曰詩云八州刺史思一戰三城守邊却可圖是西山未沒吐蕃時作竇侍御驥之子鳯之雛年未三十忠義俱骨鯁絶代無炯如一叚清冰出萬壑置在迎風露寒一作寒露之玉壺蔗漿歸厨金盌凍洗滌煩熱足以寧君軀政一作整用疎通合典則戚聨豪貴躭文儒此叙竇之履厯四首四記其美質忠心清冰句喻其亷操清望政用二句稱其法古崇儒理杜臆起叚如雷轟電閃風雨驟至長短錯綜似無條而所注意在骨鯁絶代無足以寧君軀至襯語則極形容其清冷盖必清心冷面人方能直言時事足以制强寇而釋主憂玉壺清冰金盌蔗漿欲滌君王之煩熱竇行盖在夏時故借喻及此竇侍御為一句驥子鳯雛為一句北齊書裴景鸞景鴻並有逸才河東呼景鸞為驥子景鴻為龍文蜀志龎統徳公之從子德公謂統為鳯雛晉書陸雲幼時呉尚書閔鴻竒之曰此兒若非龍駒當是鳯雛華陽國志漢旌表忠義荀子君有忠臣謂之骨鯁寒鮑照詩清如玉壺冰書西京賦既新作於迎風増露與儲胥注皆舘名漢武帝元封二年因秦林光宫復增通天迎風儲胥露寒趙曰露寒舊本作寒露盖傳寫之誤公槐葉冷陶詩萬里露寒殿開冰清玉壺則用字初未嘗倒以前漢禮樂志景星歌秦尊柘漿析朝酲注取柘漿汁為飲可解酲也禮經解疎通知逺書教也進書有典有則之後漢輿服志賢冠文儒者服兵革英華作甲兵未息人未蘇天子亦念西南隅吐蕃憑陵氣頗麤竇氏檢察應時須樊作才能俱運糧繩橋壯士喜斬木火井窮英華作寒猿呼八州刺史思一戰三城守邊却可圖此行入奏計未小宻奉聖㫖恩宜一作應殊此送侍御入覲運西山宻邇吐蕃竇公檢察其地糧斬木則軍儲足而運道通故乗此可議戰守今回京入奏必能上合帝心也盧注檢校責在輸糧糧足始可戰守故公上嚴武兩川説云頃者三城失守非兵之過也糧不足也陸機思歸賦兵革未息宿願有違初學記自劍閣西南為益州可依故猿呼斬木於火井之地言除道以通運無木鶴曰寰宇記水涸時以火投井中即熖出移時方滅今在蓬州此詩指蓬州火井言蜀都賦注火井欲出其火先以家火投之須㬰熖出通天以竹筒盛之接其光而無炭取井火還煮井水一斛得四五斗鹽家火煮之不過二三斗鹽耳晉書李充為記室叅軍家貧求補外楚裒問之曰窮猿投林何暇擇木結舊書地理志劍南節度使西抗吐蕃南撫蠻獠統圍營及松維㳟蓬雅黎姚悉八州兵馬公東西兩川説八州素歸心於其世襲刺史朱注高適傳自卭關黎雅以抵南蠻由茂而西經羗中平戎等城界吐蕃瀕邊諸城皆仰給劍南唐書彭州有羊灌田朋笮繩橋三守捉城又有七盤安逺龍溪三城皆界茂州汶山三朱又云公西山詩有繩橋戰勝遲之句則此三城乃城捉手也蔡注指姚維松三州非上晉羣臣立廟奏聖㫖𢎞深逺跡世繡衣春當一作飄飄霄漢立綵服日向一作粲粲庭闈趨樊本此下有開濟人所仰飛騰時正須二句省郎京尹必俯拾一作相付江花未落還成都此言侍御省親庭霄漢立得近君闈趨得侍親省郎京尹冀其增秩江花未落仲夏去而初秋回也繡衣御史之服漢有繡衣直指使老萊子綵服以娛親經庭闈注見本巻如前漢書夏侯勝曰士病不明經術術茍明取青紫俯地拾芥耳江花指荷後到村詩蛟龍引子過荷芰逐花低可證江花未落還成都吳本重出此句肯訪浣花老翁無一云公來肯訪浣花老為去聲君酤呉作酣酒滿眼酤二句英華作擕酒肯訪浣花老為君著衫捋髭鬚與奴白飯馬青芻英華無此句此望侍御還蜀韻杜臆末叚承上須有疊句而通篇一韻到底毎用疊妙協音節極起伏頓挫之妙此章前二叚各十句後二叚各四句注滿眼酤謂滿前皆酒酤也即公詩濁醪必在眼意舊謂蜀人以竹筒沽酒酒滿筒眼似近於俚上酤字買酒也小雅無酒酤我下酤字一宿酒也商頌既載清酤世説鮑照答顔延之曰君詩若舒錦列繡亦雕績滿眼酒林時對曰傳𤣥盤中詩何惜馬蹄歸不數羊肉千斤百斛令君馬肥麥與菽此詩結句所祖王建詩云人客少能留我屋客有新漿馬有粟句法與杜相合朱鶴齡曰是西吐蕃窺西山三城西川八州刺史合兵禦之故竇侍御以戰守機宜入奏朝廷申㴠光曰入奏行是集中變體長短縱横太白所長正爾不必效之失其故歩得廣州張判官叔卿書使去聲還以詩代意詩云蜀城當是在成都時作黄鶴編在梓州誤李朱注張叔卿魯人見公雜述及舊唐書白傳鄉闗胡騎去聲滿一作逺宇宙蜀城偏忽得炎州信遥從月峽傳雲深驃騎音票忌幕夜隔孝亷船却寄雙愁眼相思一作望淚㸃懸上四得叔卿書下四以詩代意月杜臆胡騎滿言居蜀之故炎州來信從峽遙傳正見蜀城之偏也雲深夜濶總傷其逺隔驃騎幕判官所居孝亷船因張憑同姓而借用之公所寄者詩而云却寄雙眼出語甚竒盖寫詩時淚㸃沾紙則淚眼與詩同去矣此十字句法隋孫萬夀詩鄉闗不再見悵望窮此晨之楚辭嘉南州之炎德霍十道志渝州有明月峽三峽始漢書元狩二年去病為驃騎將軍世説張憑嘗謁丹陽尹劉惔惔留宿明日乃還船須􅁷惔遣傳教覔張孝亷船召與同載時人榮之呉越春秋王夫人歌淚泫泫兮雙懸魏十四侍御就敝廬相别鶴注詩云江邊問草堂當是寳應元年在草堂時作有客騎驄馬江邊問草堂逺尋留藥價惜别倒或作到文塲入幕旌旗動歸軒錦繡香時應平聲念衰疾書疏去聲一作迹及滄浪上四侍御就别下四送别侍御草倒文塲意氣傾倒於文塲若作到字與問堂重複矣行幕軒車魏之行色滄浪即指浣溪所謂百花潭北即滄浪也驄馬用漢桓典事高士傳韓康常遊名山採藥賣於長安市中口不二價號為武庫東都賦旌旗拂天杜預傳贊元凱文塲劉繪詩交錯錦繡陳呵王羲之帖不得君家書疏晉那灘詩書疏數知聞莫令信使斷贈别何邕鶴注寶應元年公送嚴武至綿州其别何邕當在此時詩云綿谷元通漢何盖為綿谷尉也又云傳語故鄉春何盖京兆人而赴長安也邕即前所云何十一少府耶生死論平聲交地何由見一人悲君隨燕雀薄宦走風塵綿谷元通漢沱江不向秦五陵花滿眼傳與故鄉春上四送别何邕下四别後情緒寂生死交情既難多得何又隨燕雀而走風塵更覺孤矣綿谷通漢邕可至京沱江背秦已猶滯蜀也長安不見而欲傳語春光公思鄉之意切矣悲君二字貫下此十字為句翟方進傳一死一生乃見交情東公孫𢎞傳贊以鴻漸之翼困於燕雀任昉表薄宦朝唐書綿谷縣屬利州利與劍為隣劍州至綿不逺三百里禹貢注漢出為潛史記正義潛水出利州綿谷縣東龍門山大石穴下朱注綿谷即蜀漢之漢壽今保寧府廣元縣是綿谷元通漢謂綿谷潛水本上合於沔陽之漢水也漢中北直長安故云汶漢書地理志沱水在蜀郡郫縣西東入大江其一在江縣西南東入江郭璞爾雅注沱水自蜀郡都安縣湔山與江别而更流金履祥曰江至永康軍導江縣諸源既盛遂分為沱東至眉州彭山縣復合於江朱注沱江蜀志謂一在灌縣一在新繁灌縣之沱一名郫江即郭注所云别江於湔山者溝洫志謂李冰所穿恐亦因禹故跡而疏之耳五陵見秋興詩注絶句趙次公謂江邊踏青乃成都事盖因前詩有草見踏青心句也是年西山有吐蕃之警故云旌旗鼓角成依趙氏編在寳應元年春都詩内江邊踏青罷回首見旌旗風起春城暮高樓鼓角悲此春日傷亂之作旌旗日所見鼓角夕所聞盧杜氏壺中贅録蜀中風俗舊以二月二日為踏青節公範饋餉儀三月三日上踏青鞋隋煬帝詩踏青鬬草事青春李綽歲時紀上已賜宴曲江都人於江頭禊飲踐踏青草曰踏青劉禹錫竹枝詞昭君坊中多女伴永安宮外踏青來高棟曰五言絶句作自古也漢魏樂府古詞則有白頭吟出塞曲桃葉歌歡問歌長干曲團扇郎等篇下及六代述作漸繁唐初工之者衆四傑尤多宋之問韋承慶之流相與繼出可謂盛矣開元後獨李白王維尤勝諸人次則崔國輔孟浩然可以並駕若儲光羲王昌齡裴廸崔顥高適等數篇辭簡而意長與前數公實相羽翼中唐雖聲律稍變而作者接迹之盛過於天寳元和以後不可得矣嚴羽曰絶句難於律詩五言絶句難於七言促周敬曰五言絶難於七言絶者以語短而氣苦於字少而意忌於露格似拙而辭易流於俗也衆唐人一様宋人又是一様當以摩詰青蓮為法茅一相曰絶句固難五言尤難離首即尾離尾即首而腹亦不可少妙在愈小而愈大愈促而愈緩顧璘曰五言絶句以調古為上以情真為得體贈别鄭鍊赴襄陽鶴注此寳應元年在浣花溪作故云柴門老病身其年史朝義䧟營州羗渾奴剌䧟梁州且河東河中軍皆亂故首言戎馬交馳際戎馬交馳際柴門老病身把君詩過日俗本作目念此别驚神一云念别意驚神地濶峨睂晚一作曉或作逺天高峴首春為去聲於耆舊内試覔姓龎人上四惜鄭之别下四贈赴襄陽門杜臆當戎馬交馳之際有此柴老病之身無可銷愁惟把君詩以過日耳今又逺去能不念此别而神驚乎自兹一别我在峨睂君在峴首地濶天高何由㑹面所以驚神也倘耆舊中有如龎德公覔以相報吾亦將與之偕隱襄陽矣把君詩念此别各三字另讀二臨别躊蹰故日色將晚歸覽景物適春意已生晚春字俱不空下呉質書羽檄交馳陳書隋文帝使後主節飲既而曰任其性不爾何以過日庾信詩眷然惟此别蔡琰笳曲山高地濶兮見汝無期郡記天高地下襄陳後主歸魂賦映峴首之沈碑元和國志峴山在陽縣東南九里東臨漢水古今大路陽襄陽耆舊傳晉習鑿齒作逺龎德公隱鹿門山在襄補生注地濶天高即水山長意變詞以避熟濶貼睂高貼首各見匠心公詩狼籍畫睂濶重平聲贈鄭鍊絶句與上章先後同時作鄭子將行罷使去聲臣囊無一物獻尊親江山路逺羇離日裘馬誰為感激人上章叙惜别之情此章憐其清况也師氏曰鄭鍊出為使臣其罷歸也囊無一物亷潔如此彼乗肥衣輕之人誰感動激發而周旋之耶楚辭厯吉日兮吾將行詩小序皇皇者華君遣使臣也拜後漢范式傳式謂元伯曰後二年當尊親見孺子馬江頭五咏鶴注江頭即前江畔獨步尋花處五詩據所見入咏皆有寓意舊次編在寳應元年丁香圖經本草丁香木類桂高丈餘葉似櫟凌冬不凋花圓細黄色齊民要術雞舌香世以其似丁子故一名丁子香即今丁香是也日華子云丁香治口氣所以郎官含之碎録丁香一名百結子出枝葉上如釘長三四分有粗大如山茱萸者名母丁香丁香體柔弱亂結枝猶墊都念切細葉帶浮毛疎花披素艶深栽小齋後庶使一作近幽人占去聲晚墮蘭麝中休懷粉身念盧注此喻柔弱者當知自守幽丁香體弱而枝墜其花葉植於小齋止堪與人作縁若使墮入蘭麝將粉身而不保矣身名墮於晚節大槩如此詩朱注陳藏器云丁香撃之則順理而解為兩向義山本是丁香樹春條結始生其合則為結也數説文墊下也凡物之下墮皆可云墊石崇傳婢妾十人皆藴蘭麝被羅􅂖抱撲子耳疲乎鄭衛鼻饜乎蘭麝麗春圖經本草麗春草一名仙女蒿格物論麗春一云長春花百草競春華麗春應平聲最勝少須一作頃顔色好一作好顔色多漫枝條賸俗作剰紛紛桃李姿舊作枝疑誤處處總能移如何此貴重正異作如何貴此種晉作稀如此貴重却怕有人知盧注此比人以知希者為貴彼花少則顔色鮮好花多則枝頭餘剩此麗春之勝也桃李凡姿隨移隨活獨麗舂性異移之即槁却似怕人知者所以可貴也云少字多字畧讀句意自明須應須也漫徒然也顧羣芳譜麗春罌粟别種也根苖一類而數色咸具此其顔色之好也寧陶潛詩枝條始欲茂北史賈思伯傳客曰公合貴重能不驕梔子圖經本草梔子南方及西蜀州郡皆有之木高七八尺二三月生白花花皆六出甚芬香夏秋結實如訶子狀生青熟黄中仁深紅梔子比衆木人間誠未多於身色有用與道氣相一作傷和紅取風霜實青看平聲雨露柯無情移得汝貴在映江波逺注此有孤芳自賞之意堪此章全屬自寓人間未多種特異矣色有用比才濟時氣相和比性不戾俗青紅㸃景自嘆厯經霜露色映江波故鍾情在此舎汝之外别無可移情矣顧注酉陽雜爼諸花少六出者惟梔子花六出此正衆木中未有也陶貞白云梔子剪花六出剖房七道其花甚香即西域薝蔔花也名山志樓石山多梔子色可染帛即所云色有用也其性極冷即所云氣傷和也其實經霜則紅即所云紅取風霜實也葉似耳厚而深緑春榮秋瘁即所云青看雨露柯也趙注本草稱梔子治五内邪氣胃中熱氣其能理氣明矣此頌梔子之功也作氣相和亦是照謝朓牆北梔子樹詩有美當階樹霜露未能移還思緑水君家無曲池末二句本此遺黄鶴云公自喻飽經風霜而獨見於物外也鸂鶒陳藏器本草鸂鶒水鳥形小如鴨毛有五采故使籠寛織須知動損毛看平聲雲猶一作莫悵望失水任呼號平聲六翮曾音層經剪孤飛卒一作只未高且無鷹隼慮留滯莫辭勞盧注此章意在安於義命剪鳥在籠中不􅇠悵望呼號上四憐之也翮難飛留此可免摶撃下四慰之也鸂竹籠寛織者恐其損羽毛也下句申明上句逺注鶒本水鳥而受樊籠故有看雲失水之狀呼謝惠連鸂鶒賦宛羈畜於樊籠片前漢游俠傳晝夜號顧注凡鳥之勁羽止於六韓宣外傳鴻飛千里特六翮耳陶潛詩望雲慚高鳥花鴨花鴨無泥滓堦前一作中庭毎緩行羽毛知獨立黒白太分明不覺羣心妬休牽衆眼驚稻粱霑一作知汝在作意莫先鳴盧注此章即漁父獨醒之意羣獨立分明是花鴨之皭然自異處然惟獨立故心妬惟分明故衆眼驚且既霑足稻粱又何須先鳴以取忌乎上四作稱羡之詞下四作警戒之詞羽毛知獨立謂羣羽之中知其獨立羣心衆眼指諸鴨言花鴨當食必鳴但戒其毋先耳鶴云公自喻以直言受妬出居於外雖有一飽之適猶以先鳴為戒賦抱樸子虛談則口吐冰霜行已則守汚泥滓鸚鵡雖同族於羽毛固殊智而異心典朱超詩獨立不成羣曰漢書薛宣傳黑白分明㑹稽録張温死諸葛武侯其人於清濁太明善惡太分鷄尸子戰如鬬勝者先鳴顧宸曰丁香立晚節也麗春守堅操也梔子適幽性耳也鸂鶒遣留滯也花鴨戒多言也此雖咏物實自詠野望鶴注此當是寳應元年成都作西山白雪三城一作竒一作年戍南浦清江萬里橋海内風塵諸弟隔天涯涕淚一身遥惟將遲暮供多病未有涓埃一作涘誤答聖朝音潮跨馬出郊時極目不堪人事日一作自蕭條此因野望而寄慨也上四野望感懷思家之念下四野望撫時憂國之情臨橋而望三城近慮吐蕃天涯而望海内逺愁河北也五六屬自慨末句乃慨世出郊極目㸃醒本題朱瀚曰國歩多艱皆由人事所致結句感慨深長堡唐氏注西山在成都府西一名雪嶺三城戍即松維三城唐志注唐興有羊灌田朋笮繩橋三城大困學記聞唐地理志彭州導江縣有三竒戍韋臯傳將陳垍等出三竒西南備邊録所謂三竒營也志謝朓詩悵望南浦時和楚辭隱玫山以清江境一統萬里橋在成都府中門外漢終軍傳邊時有風塵之警涯漢宗室傳王睦悉推財物與諸弟安古詩各在天一蔡琰胡笳涕淚交垂孔融詩能苦一身者楚辭恐美人之遲暮忘史記留侯性多病出漢書使謂龔勝曰聖朝未嘗君鮑照詩跨馬北門進世説王東亭嘗春月乗馬出郊時彦同遊者連鑣俱王景興書想亦極目而迴望嵇康詩何為人事間自令心不夷楚辭山蕭條而無獸朱鶴齡曰按史是時分劍南為兩節度而西山三城列戍百姓疲於調役高適嘗上疏論之不納公詩當為此作故有人事蕭條之歎畏人詩成後拈畏人二字為題非專用畏人也蔡氏編在寳應元年曹植詩客子常畏人早花隨處發一作發處春鳥異方啼萬里清江上三年一作峯落日低畏人成小築褊性合幽棲門逕一作逕没從榛草趙汸作塞無心待一作走馬蹄此詩歎羇旅寂寥也上四言景有故鄉故國之思下四叙情有避世避人之意棲杜臆離家萬里寄迹三年身世孤危所以畏人而幽也胡夏客曰萬里二語十字只如一句橋孔稚圭詩孤征越清江都三年舊作三峯謂登萬里而望三峯此説非也成無山安有三峯趙注公自乾元二年入成都至寳應元年春為三年矣屏跡三首依蔡氏梁氏編在寳應元年詩按詩中景物乃是春夏之候黄鶴因有年荒酒價乏句遂引永泰元年京師斗未千錢為證又引廣德二年定京城上下酤户以収月税為證顧氏謂史書所記乃長安事不渉成都黄氏次在永泰元年者非是鮑照詩屏跡勤躬稼衰年一作顔甘屏音丙跡幽事供高卧鳥下去聲竹根行龜開萍葉過年荒酒價乏日併園蔬課獨一作猶酌甘泉歌一云獨酌酣且歌一云獨酌飲甘泉歌長撃樽破首章言屏跡景事在四句分截鳥下竹根龜開萍葉偶然所見皆屬幽事日併賣蔬課錢以充沽酒之價然猶苦不繼故止酌飲甘泉耳顧云酌而歌歌而長長而至於撃樽撃樽而至於破公之狂態俱見無聊之態亦見矣選詩徘徊孤竹根薛道衡詩勝龜蓮葉開空記儒有併日而食酒後庾信詩拂雪就園蔬皇趙曰撃樽暗使王大將軍撃缺唾壺事秦始作驪山陵諸民怨之作甘泉之歌此詩則言酌甘泉而歌也此以屏跡領起自屬首章他本編在末者非顧云此首雖屬古體而無一句失拈無一字失對自是仄韻之律用拙存一作誠吾道幽居近物情桑麻深雨露燕雀半生成邨鼓時時急漁舟箇箇輕杖藜從白首心跡喜雙清次章申言屏跡之志下六分應一二動拙者心靜故能存道幽居身暇故近物情桑麻燕雀植對言村鼓漁舟耕漁對言皆物情之相近者對此而心迹兩清吾道得以常存矣趙汸注雨露生成句中自對語意深厚老成識得生物氣象迹杜臆半生成謂生者已成成者又生半字最佳心二字乃三首之眼公在草堂地僻可以屏迹而性懶亦宜於屏迹也靈江淹詩物情棄疵賤莊子原憲杖藜而應門謝運詩心迹雙寂寞清楊守阯曰心迹雙言無塵俗氣也羅大經曰杜詩桑麻深雨露燕雀半生成陳後山詩輟耕扶日月起廢極吹嘘或疑虚實不類不知生為造成為化吹為陰嘘為陽氣勢力量與雨露日月正相配也晚起家何事無營地轉幽竹光團一作圍野色舎一作山影漾江流失學從兒懶長貧任婦愁百年渾平聲得醉一月不梳頭三章又申用拙幽居意下六分應次句拙洪仲注首聨乃一問一答杜臆無營根用地幽根幽居竹光二句申地幽以補幽居佳景失學四句申無營以發用拙餘意洪注謂末聨以放逹寓悲涼是也不然百年常醉懶不梳頭成何人品乎詞上有年荒之酒價句則知百年渾得醉尚屬期望之謝朓詩月陰洞野色五絶交書頭面常一月十日不洗少去聲年行鶴依舊編在寳應元年馬上龔芥隱作騎馬誰家白面一作薄媚非郎臨階英華作軒下去聲馬坐一作踏人牀不通姓氏麤豪龔作疎甚指㸃銀瓶索先側切酒嘗一云酒味嘗旁此摹少年意氣色色逼真下馬坐牀指瓶索酒有若無人之狀其寫生之妙尤在不通姓氏一句玉南史童謡云不見馬上郎但見黄塵起南楚辭厭白之面兮懷琬琰以為心牀胡牀也史袁粲率爾歩徃亦不通主人此呉志孫皎傳孫權曰卿與甘興霸飲因酒發作侵陵人雖麤豪有不如人意時然其較畧大丈夫也輙南史顔延之好騎馬邀遊里巷遇知舊據鞍索酒胡夏客曰此盖貴介子弟恃其家世而恣情放蕩者既非才流又非俠士徒供少陵詩料留千古一噱耳酒此説少年意態神情躍躍欲動王維詩云新豐美斗十千咸陽遊俠多少年相逢意氣為君飲繫馬高樓垂柳邊呉象之云承恩借獵小平津使氣常遊中貴人一擲千金渾是膽家無四壁不知貧皆善於寫生者即事黄鶴依舊次編在寳應元年盧注此為舞妓作百寶裝腰帶真珠絡臂鞲同韝笑時花近眼舞罷錦纒頭百寶真珠舞者之飾花近眼比笑容可掬錦纒頭舞畢而贈綵也淳于髠傳帣鞲鞠􅎽通鑑注鞲臂捍也漢書馬后傳蒼頭衣緑韝注臂衣以縛左右手於事便也通鑑注舊俗賞歌舞人以錦綵置之頭上謂之錦纒頭寄題杜二錦江野亭附嚴武詩漫向江頭把釣竿懶眠沙草愛風湍莫倚善去聲題鸚鵡賦何須不著陟畧切鵕音峻䴊音儀冠腹中書籍幽時曬肘後醫方靜處看平聲興去聲發㑹能馳駿一云五馬終當一作須直一作重到使去聲君灘上二題杜公草堂三四諷其躭詩而不仕五六憐其好學而多病末致欲過草堂之意為杜臆以結語為招公徃見盖泥在使君二字耳此詩寄題草堂而作自應聞合草堂堂在江干故借用使君灘耳運此詩第三句失拈鸚漫徒也禰説文湍急瀬也謝景詩枕底失風湍鵡賦以衡之才比少陵非刺其恃才傲物舊注誤解守曹操送禰衡於江夏太守黄祖祖長子射為章陵太大㑹賓客人有獻鸚鵡者衡攬筆而作詞采甚麗羽漢書孝惠時郎侍中皆冠鵕䴊音義鵕䴊鳥名以其飾冠南越志鵕䴊山鷄也其色鮮明五采炫燿中世説郝隆七月七日日中仰卧人問其故曰我曬腹書也葛洪傳洪抄金匱藥方一百巻肘後急要方四巻為荆州刺史時人為之歌曰復能乗駿馬世説山簡盛𢎞之荆州記魚復縣界有羊腸虎臂灘楊亮為益州至此舟覆至今名為使君灘九域志使君灘在萬州沈佺期過巫峽詩使君灘上草神女廟前雲亦指此洪容齋續筆新唐書嚴武傳云房琯以故宰相為廵内刺史武慢倨不為禮最厚杜甫然欲殺甫數矣李白蜀道難為房杜危之也甫傳云甫嘗醉登武牀瞪視曰嚴挺之乃有此兒武銜之一日欲殺甫冠鈎於簾者三左右白其母奔救得止舊史但云甫性褊躁嘗憑醉登武牀斥其父名武不以為忤初無欲殺之説盖唐小説所載而新書信以為然按太白蜀道難本譏章仇兼瓊前人嘗論之矣子美集中詩凡為武者幾三十篇送還朝曰江邨獨歸處寂寞養殘生喜再鎮曰得歸茅屋赴成都真為文翁再剖符此猶武在時語至哭歸櫬云一哀三峽暮遺後見君情八哀詩云空餘老賓客身上愧簪纓若果有欲殺之怨不應眷眷如此好事者但以武詩有莫倚善題鸚鵡賦之句故用證前説引黄祖殺禰衡為喻是殆痴人面前不得説夢也武肯以黄祖自比乎奉酬嚴公寄題野亭之作鶴注此當是寳應元年作拾遺曾音層奏數行音杭書懶性從來水竹居奉引濫騎沙苑馬幽棲真釣錦江魚謝安不倦登臨費一作賞阮籍焉於䖍切知禮法疎枉沐一作何日旌旗出城府草茅無一作蕪一作荒徑欲教平聲鋤上四答嚴詩前四句下四答嚴詩後四句嚴曰何須不著鵕䴊冠盖勸之仕也公答曰拾遺奏書奉引騎馬見斥官之後無復此興矣嚴曰漫把釣竿懶眠沙草謂不當隱也公答曰懶性從來幽棲真釣見托跡此堂習而安之矣嚴曰興發公答曰登臨不倦嚴曰馳馬公答曰枉沐旌旄皆喜之也禮法疎先致謙詞徑欲鋤急待其至矣在嚴詩固欵曲而殷勤在公詩亦和平而委婉解者指嚴為語多刺譏指公為始終傲岸兩失作者之意須孔毅父續世説武過草堂公有時不冠故嚴詩云何不著鵕䴊冠而公答曰阮籍馬知禮法疎以解嘲也杜臆此因後人誤讀杜句遂有不冠之誣而欲殺之誣亦從此起矣逺注拾遺貶官從此水竹居矣松趙注拾遺掌供奉則騎馬以奉引後漢劉聖公傳李奉引馬驚唐於沙苑置坊監養馬集謝安傳安於東山營墅樓館林竹甚盛子姪徃來遊肴膳亦屢費百金阮籍傳籍性疎懶禮法之士疾之如讐力卜居寧誅鋤草茅以耕乎杜詩詳註巻十
