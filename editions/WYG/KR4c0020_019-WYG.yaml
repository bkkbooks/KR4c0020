body:
  text: 杜詩詳註巻十九翰林院編修仇兆鰲撰過客相尋詩云江山定居當從黄鶴編在瀼西詩中窮老真無事江山已定居地幽忘盥櫛客至罷琴書掛壁移筐一作留果呼兒間去聲蔡作間一作問煮魚時聞繫音計舟楫及此問吾廬卜居無事可以見客三四客至之事下言待客之情忘盥櫛不期客至罷琴書喜而岀迎移果供客間雜魚傍杜率之中不失殷勤也漢游俠傳呂公故舊窮老沈君攸詩地幽吟不斷唐書虞世南十年精思不懈至累旬不盥櫛掛世説謝太傅徃看戴安道但與論琴書薛道衡詩壁屢移鈎下北齊書邢子才脱畧簡易果餌之屬置之梁上客至而共食世説孔君平詣楊氏呼兒出為設果古樂府呼童烹鯉魚黄生注移筐果亦呼兒為之以下句綰上句與次第尋書札呼兒覓贈詩一例解問煮魚者家偶烹鮮客至即以同享因呼兒問其熟否耳此即盤飱市逺無兼味之意今按張九成詩疏果間溪魚可悟杜詩筐果間煮魚之語前有題郭明府茅屋詩問字亦兩見彼是天人兼問此乃主賓各問耳豎子至鶴注當是大厯二年作子豎子猶今言小奚即阿段也史記孔世家一豎子樝莊加切或作楂通作查梨纔一作且綴碧梅杏半𫝊黄小子幽園至輕籠熟柰香山風猶滿把野露及新嘗欹枕一作欲寄江湖客提擕日月長此為豎子供柰而作也首二借形喜柰之先熟五六實寫喜柰之鮮美末聨乃奬勵之詞杜乗風擕至尚覺清涼滿把帶露摘來尤喜滋潤新嘗臆謂其語帶仙靈氣欹枕客公自謂夏風土記樝梨屬肉堅而香柰蜀都賦朱櫻春熟素柰成本草今名頻婆黄希曰有二種潘岳賦柰曜丹白之色此提擕謂豎子勤於供事黄生謂公素提擕子故能善㑹人意與前説不同園此是大厯二年夏瀼西所作别瀼西草屋公所居也園隔瀼西之溪有茅舍仲夏流多水清晨向小園碧溪揺艇濶朱果爛枝繁始為去聲江山静終防市井喧畦蔬繞茅屋自足媚盤飱上四赴園之景下四赴園之故求碧溪承水朱果承園乃渡溪而入也始置此園本以静今厭市喧故避於此盤餐自足無求於外也舟爛謂燦爛媚可愛也注何遜詩碧溪水色濶摇艇煩子左傳盤餐置壁熟食曰飱即雲安詩椒盤媚逺天此詩媚盤餐意歸杜臆此詩與前章相繼而作前是徃園此是園中歸也束帶還騎馬東西却渡船林中才一作纔有地峽外絶無天虚白高人静喧卑俗累牽他鄉閲一作悦遲暮不敢廢詩篇上四歸村之景下四歸村有感渡園中無事可以袒衣及歸則束帶騎馬又卸馬船自瀼西而東兩句中包許多曲折且林峽之中地平天寛儘堪自適乃不能學高人之静而仍為俗累所喧故欲藉詩以遣意静喧承上章來虚峽外更無天見瀼土獨露天光與上句一意莊子室生白注人能虚心遊世則純白備於内江總詩山宇生虚白刈顧注瀼西詩有市喧宜近利句知喧亦不免俗累如稻等事吳越春秋有高世之行者必有負俗之累凌敬詩心灰忘俗累王嗣奭曰此詩本為愛静厭喧而作乃結以不廢詩篇又如别崔潩詩惓惓於憂主濟時而結以薛孟論詩公蓋以詩為生平要事直欲藉以垂訓千古非但作驚人語也今其詩具在有名世語有經世語有維世語有醒世語有超世語又有涉世語至於事係綱常情關倫序則刳心瀝血寫出良心之所必不容巳而古今詞人所必不能到直踵三百之遺躅宛然孔氏家法也孔子周流而道不行始删述六經以垂憲公則衰謝不忘報主遲暮不廢詩篇濟世訓世惓惓意中子雲仲淹擬孔子反貽譏僭妄子美以無心暗合可不謂豪傑之士乎哉園官送菜并序云朱注送菜詩云常荷地主恩送𤓰詩柏公鎮䕫國則知地主即柏都督都督乃茂琳也舊書大厯元年八月茂琳方遷卭南節度其到䕫州必在元年二年之交草堂編入二年為是吏園官管園之園官送菜把本數日闕矧苦苣馬齒掩乎嘉蔬傷小人妬害君子菜不足道去聲也比而作詩清晨送一作䝉菜把常荷去聲地主恩守者愆實數畧有其名存苦苣刺如針馬齒葉亦繁青青嘉蔬色埋没在一作自中園首敘正意還詩序上截以趙注所送止苦苣馬齒惜園中嘉蔬未嘗摘相遺也左傳地主歸餼國語越王曰後世有敢侵之地者皇天后土四郷地主正之本草苦苣即野苣也野生者义名褊苣今人家常食為白苣嶺南吳人無白苣常植野苣以供厨饌圖經本草馬齒莧雖名莧類而苖葉與人莧軰都不相似一名五行草以其葉青梗赤花黄根白子黒也亦可食少酸古詩青青河畔草張載登成都白莵樓云原隰植嘉蔬園吏未足怪世事固一作因堪論平聲嗚呼戰伐乆荆棘暗長原此乃慨世之語蔬而惟存苣莧亂後荆棘故不植嘉道德經大軍之後必有凶年荆棘生焉乃知苦苣輩傾奪蕙草根小人塞音色道路為態何喧喧又如馬齒盛氣擁葵荏昏㸃染不易音異虞絲麻雜羅紈一經器一作氣物内永挂麤刺痕此敘喻意還詩序下截奪蕙草擁葵荏所謂掩嘉蔬也小人塞道路乃題中比義絲麻雜羅紈又比中之比㸃染言羙惡混雜不易虞在意料之外如洙曰蕙草薰草也葵何遜詩喧喧動四隣希曰葵戎葵兎葵楚葵蔠荏如荏菽桂荏皆嘉種也馬融廣成頌桂荏鳬葵爾雅疏蘇一名桂荏葉下紫色氣甚香志士採紫芝放歌避戎軒畦丁負籠至感動百慮端仍以感慨作結居採芝避軒自歎隱避人感動百慮則並傷身世矣二此章首中二段各八句腰尾二段各四句篇中一經句語冗可删採芝用四皓事舍虞世南詩輕齎不遑驚策戎軒王嗣曰詩序謂小人妬害君子不言何等小人葢當時武健卒倖功得官而凌侮志士幽人者不少此詩前云戰伐荆棘中言小人塞道為態喧喧終言志士採芝以避戎軒謂此輩也止露戎軒二字詩人慎言如此又䕫府詠懷詩云奴僕何知禮恩榮錯與權其縱恣可知園人送瓜當是大厯二年夏作江間雖炎瘴瓜熟亦不早柏公鎮䕫國滯務兹一作資一掃食新先戰士共少及溪一作窮老傾筐蒲鴿青滿眼顔色好首敘送瓜誌柏公之惠溪𤓰熟不早因䕫州土瘠滯務一掃庶政更新矣老公自謂蒲鴿喻瓜色之青翠得左傳晉侯不食新矣通北齊書蘭陵王長恭為將每一𤓰必與將士共之鑑宋文帝紀謝𢎞微曰分多共少不至有乏𤓰詩傾筐塈之首師氏曰青瓜色如蒲鴿蒲鴿狸首皆名也今按狸之甘美出張載瓜賦未知蒲鴿出何書耳白朱注齊民要術注凡𤓰落疏色青黒者為美黄及斑雖大而惡竹竿接嵌丘銜切竇引注來鳥道浮沉亂水玉愛惜如芝草落刃嚼冰霜開懷慰枯槁許以秋蒂除仍看小童一作兒抱晉作飽言次言食瓜嘉園人之意來竹竿引泉藉以浸瓜水玉其寒芝草言其黄抱瓜送此園人預訂之詞光嵌竇謂泉穴鳥道指高山洗抱朴子崑崙山有玉瓜明洞徹而堅須以玉井水之便軟而可食魏文帝與吳質書浮甘瓜於清泉沉朱李於寒氷䧟楊慎曰嘗疑本草不載西瓜後讀五代郃陽令胡嶠虜記云嶠於回紇得瓜種以牛糞結實大如斗味甘名曰西瓜是西瓜至五代始入中國也文選浮甘𤓰於清泉葢指土瓜甜瓜耳詩按水玉解作水精本郭璞山海經注據公送原少府云瓜嚼水精寒可證杜臆謂瓜中有水可解炎熱故稱水玉可當别號此另一説芝晉嵇含瓜賦其名龍膽其味亦竒是謂土芝廣雅土𤓰也謝朓辭隋王子隆牋邈如墜雨飄似秋蒂邵注小童可抱亦見瓜之大東陵一作溪跡蕪絶楚漢休征討園人非故侯種此何草草末從種瓜作慰勞園人之語此章前二段各八句役段四句收東史記邵平故秦東陵侯秦滅後為布衣種瓜長安城瓜有五色甚美故世謂之東陵瓜趙周語有征討之備豈詩勞人草草注草草勞心也曰此詩兩押草字東坡所謂兩字義不同故得重用耶課伐木并序時此當是大厯二年夏居瀼西作黄鶴編在元年非也課𨽻人柏夷杜臆伯當作柏𨽻人不當名伯夷辛秀信行去聲等入谷斬隂木人日四根止句維條伊枚正直挺然晨征暮返委音畏積音志庭内我有藩籬是缺是補載伐篠音小與筱同簜徒黨切伊仗一作杖支持則旅次一有於字疑羨小安山有虎句知禁句若恃爪牙之利必昬黑摚晉作撑一作搪突句䕫人屋壁列一作例樹白萄一作桃一作菊鏝為牆實以竹示式遏句也當有字為去聲與虎近混淪乎無良句賓客憂一作齒害馬之徒茍活為幸可黙息已作詩示宗武一作文誦課伐木以補籬伐竹篠以固牆安旅居而防虎患也末段另為一意言此地近虎并有無良者混雜其間致旅客負害馬之憂得茍存活便為幸自柏公鎮此可以黙銷矣詩云蕭蕭理體淨蜂蠆不敢毒即此意也少陵詩序多古拙難解處秦少㳺詩話曰曾子固文章妙天下而有韻者輒不工杜子美長於歌詩而無韻者幾不可讀夢弼謂無韻者若課伐木詩序之類是也木周禮仲冬斬陽木仲夏斬隂木注陽木春夏生者隂秋冬生者鄭𤣥注又云陽木生山南隂木生山北委條枚見詩召南注枝曰條幹曰枚箭景福殿賦叢集積注少曰委多曰積禹貢注篠竹簜大竹莫容齋隨筆云黄魯直宿舒州大湖觀音院詩云相戒浪出月黑虎䕫藩䕫字甚新其意葢言抵觸之義而莫究所出及閲杜工部課伐木詩序云必昏黒摚突䕫人屋壁乃知魯直用此然杜公時在䕫府作詩所謂䕫人者述其土俗耳本無抵觸之義魯直葢誤用耳可張溍注白菊葢其地易生之木如北地榆柳取其板作牆又編以竹也沙詩人之無良詩式遏冦虐童江賦或混淪乎泥莊子具茨山子謂黄帝曰為天下亦奚以異乎牧馬者哉亦云去其害馬者而巳長夏無所為客居課童一作奴僕清晨飯上聲其腹一作腸持斧入白谷青㝠曾音層巔後十里斬隂木人肩四根已亭午下去聲山麓尚聞丁丁音爭聲功課日各足蒼皮成一作見委積吳本作積委素節相照燭首敘課𨽻伐木麓曾巔言高十里言逺下山斬木而還尚聞聲勤於用力也蒼皮指木素節指竹基張衡南都賦攢立叢駢青㝠􅇗眠謝靈運詩築觀層巔麓山足也照詩伐木丁丁光七啟符彩燭照燭言其澤藉汝跨小籬當仗一云杖一云材苦一云若虚竹空荒咆熊羆乳獸待人肉不示知禁情豈惟干戈哭次言結籬防虎害斬木為椿取竹編籬若不為此禁防恐其甚於干戈矣此序所云山有虎示式遏也獸汝指木言之趙注苦虚竹謂虚心之苦竹乳乳虎也虎有力者或曰牝虎城中賢府主處上聲貴如白屋蕭蕭理當作治避高宗諱也體淨蜂蠆不敢毒虎穴連里閭隄防舊風俗此喜盜賊初息政盜不犯境見柏公新惟虎窺村落尚須隄防耳此序所云害馬之徒黙息也表鶴曰賢府主當是指柏都督公嘗為柏都督作謝上云先之以簡易開之以産業均之以賦斂終之以敦勤又禁將士之暴所謂治體淨也朱注時䕫州巳升為府故云府主前送瓜詩云柏公鎮䕫國滯務兹一掃此云蕭蕭理體淨蜂蠆不敢毒語意正相合晉書孫楚傳叅軍不敬府主北史王昕傳太尉汝南王悦曰懷其才而忽府主可謂仁乎潘尼碣㴱逺治體蜂蠆比盜賊泊舟滄江岸乆客慎所觸舍西崖嶠壯雷雨蔚含蓄牆宇資屢修衰年怯幽獨爾曹輕執熱為去聲我忍煩促秋光近青岑季月當泛菊報之以微寒共給酒一斛末乃歸功𨽻人也觸幽獨以上述畏虎之意爾曹以下慰用力之勤所謂虎觸藩籬含蓄謂虎藏崖嶠杜臆為我忍煩促見不得已而用之臣此章前後各十二句中二段各六句袁閑三國名序贊牆宇高嶷庾信詩秋先麗晚天菊江淹詩季月寒氣重陽泛菊謂酒中泛花張正見詩泛金枝下風俗記重相㑹登山飲菊花酒謂之登高㑹又謂之泛菊詩孔融書酣飲一斛胡夏客曰結語從盤中意化出王嗣奭曰公憫其執熱煩促有民吾同胞之意犒勞僕人世俗作套事公却以為實事而入之於詩具見真懇之意又云此篇及前後諸詩正晦翁所云鄭重繁絮者鍾氏則謂其處家常𤨏細事有滿腔化工全副王政真能細心看杜詩者也柴門此當是大厯二年夏自東屯徃瀼西作清黄鶴編在元年北時初寓草閣不當云茅棟池也泛一作孤舟登瀼西迴首望兩崖東城乾音干旱天其氣如焚柴長影没窈窕餘光散谽谺音酣蝦此從朱本舊作唅呀前三段記瀼西回望之景唐此望兩崖東城也州泛舟從東屯而至也兩崖即瞿兩崖白帝城在䕫之東故云東城日照城則見旱氣如焚日臨岸則見長影餘光詩爾雅燔柴積薪而焚之也庾信詩長影臨雙經正義解窈窕為幽㴱閒静上林賦注以谽谺為洞谷空大此言崖影直没窈窕之處餘光散在空洞之中秦宓奏記晝不操燭日有餘光當朱注韻書唅胡紺切哺也呀虚加切張口也於詩無涉是谽谺之訛上林賦谽呀豁閕呀與谺同閕許雅切豁開也大江蟠嵌口含切根歸海成一家下衝割坤軸竦壁攢鏌鋣蕭颯一作瑟灑秋色氛一作氣昏霾日車此望瞿崖江水也秋嵌根指崖歸海指江下衝承江竦壁承崖蕭颯江邊意氛昏崖前暮隂割坤軸言㴱囓地底攢鏌鋣言簇如列劍鏌吳越春秋吳使干將造劍二一曰干將二曰鏌邪邪者干將之妻名峽一作峽門自此始最窄容浮查禹功翊造化疏鑿就欹斜巴黄作巴一作巨渠決太古衆水為長虵風煙渺吳蜀舟楫通鹽麻此望大江衆流也水峽門正𣲖窄而且欹見勢之險危巴渠支流衆同注見源之鍾滙吳鹽蜀麻中集䕫江人見其為一大都㑹郭朱注水經注廣溪峽乃三峽之首自昔禹鑿以通江景純所謂巴東之峽夏后疏鑿今詩云峽門自此始與水經注合又公詩瞿唐爭一門雙崖壯此門即此詩所謂峽門也他本訛作峓遂以峓門為䕫州地名大謬也水經注清水出巴渠縣東北巴嶺南獠中即巴渠水西南流至其縣又西入峽如古詩赴壑長􅉬我今逺遊子飄轉混泥沙萬物附本性約一云處身一作性不願一作欲奢茅棟蓋一牀清池有餘花濁醪與脱粟在眼無咨嗟後三段敘柴門客居之情身此言居食粗給遊子可以託萬物附本性約身不願奢便有素位而行之意春江賦或混淪乎泥沙附本性言隨性所適吳越秋下以約身運命論不如顔回原憲之約其身也濁沈約詩茅棟嘯蹲鴟曹植詩清池激長林洙曰醪用嵇康事脱粟用公孫𢎞事阮瑜詩舉坐同咨嗟山荒人民少地僻日夕佳貧賤一作病一作窮固其常富貴任生涯老于干戈際宅幸蓬蓽遮石亂上上聲雲氣杉清一作青延日一作月華此言景趣堪娛老年藉以自慰潛貧賤固其常富貴任生涯又有樂天知命之意人陶詩山氣日夕佳沈約郊居賦歸閒蓬蓽聞倩詩清池映日華賞妍又分音問外理愜夫扶又切何誇足了垂白年敢居高士差義從差等之差韻從本音書此豁平昔迴首猶暮霞此言足已無求結出題詩之興直賞妍又分外理愜夫何誇較上約身常貧更進一層窺見孔顔樂處矣足了垂白年敢居高士差看清池蓬蓽非養名高又幾於遯世無悶矣少陵晚年識趣超絶如此前云回首是登岸囘望此云回首是詩成再望也詩此章前後三段各六句中間三段各八句謝靈運意惬理無違晉書畢卓云拍浮酒船中便足了一生後班超書今超年巳垂白矣敢猶豈敢差是差肩漢梁鴻傳仰慕前世髙士平世說殷仲堪謂子弟云弗以我受任方州云豁昔時意補註此係古詩麻佳通用槐葉冷淘鶴注當是大厯二年瀼西作槐朱曰以槐葉汁和麫為冷淘盧注有牙温淘有水花冷淘青青高槐葉采掇付中厨新麫來近市汁滓宛相俱入鼎資過熟加餐愁欲無碧鮮俱照筯香飯兼苞蘆經齒冷於雪勸人投比一作此珠此記製淘之法備稱其佳美杜臆蒸淘過熟其質消減故加餐愁其易盡投碧鮮句言色佳香飯句比味美以冷淘勸人食比之珠甚言其可愛曹植詩中厨辦豐膳注庾信小園賦晏嬰近市不求朝夕之利加周禮醴齊醴猶體也成而汁滓相將古詩努力餐飯之吳都賦玉潤碧鮮公夢弼曰苞蘆蘆笋也盧注蘆荻屬甲而未拆曰苞出峽詩泥笋初苞荻可證朱注引説文蘆飯器也亦作籚又引管子道有遺苞言取冷淘兼香飯苞裹於飯器中欲以贈人耳按此説太拙贈人冷淘何必又加香飯乎僞蘇注又云蜀人呼魚鮓為冷淘朱氏巳其謬妄矣願隨金腰褭走置錦屠蘇又作廜􅂒路逺思恐泥去聲興去聲㴱終不渝獻芹則小小薦藻明區區萬里露寒殿開冰清玉壺君王納凉晚此味亦時須逺注此對冷淘而思入獻蓋每食不忘君也此全是比喻路逺則欲達不能興㴱則初心未改獻芹之意雖微薦藻之誠可鑒倘寒殿玉壺之間亦須此物何時得以上陳耶句句道出忠愛苦衷一此章兩段各十句杜應劭漢書注古青駿馬名腰褭日行萬五千里臆錦屠蘇天子之屋朱注屠蘇本作廜􅂒玉篇廜􅂒庵也服䖍通俗文屋平曰廜􅂒蕭子雲雪賦没屠蘇之高影是也又廣韻廜􅂒酒名元日飲之可除温氣蓋昔人居廜􅂒釀酒因以名之也又大帽形類屋亦名屠蘇晉志謡曰屠蘇障日覆兩耳劉孝威詩挿腰銅匕首障日錦屠蘇是也此言馳貢冷淘當用前説朱子語類文字好用經語亦一病東坡寫此詩到路逺思恐泥云此不足為法區左傳蘋蘩蕰藻之菜可薦於鬼神楚元王傳豈為區之禮哉顔注區區小也照上林賦過鳷鵲望露寒露寒殿名鮑詩清如玉壺冰上上聲後園山脚鶴注詩云自我登隴首十年經碧岑公以乾元二年入隴右至大厯三年為十年然是年正月巳出峽今首云朱夏熱所嬰乃二年夏作無疑上林賦遊於後園朱夏熱所嬰清旭一作日步北林小園背音佩高岡挽葛上上聲﨑崟曠望延駐目飄颻散疎襟潛鱗恨水一作用壯去翼依雲㴱勿謂地無疆劣於山有隂石榞張作原遍天下水陸兼浮沉首記山脚勝景山上四曉登山脚中四山前所見下四登而慨世也潛鱗去翼承駐日來亦寓自况勿謂大地無疆此山便劣今舉世藉石榞以療飢則水陸皆屬浮沉耳不若園中猶可寄跡也植傅毅詩踐朱夏之炎赫彼江賦視雾祲於清旭曹詩徘徊步北林詩于高岡易坤厚載物德合無疆溪張逺引尸子莒國有石焦原者廣五十步臨百初之莒國莫敢近也有以勇見莒子者却行齊踵焉此詩借比世路之險窄也舊本作石榞沈存中云石榞木名子如芎藭其皮可禦饑時天下荒亂水陸並載石榞以充糧自我登隴首十年經碧岑劍門來巫峽薄倚一作倚薄浩至今故園暗戎馬骨肉失追尋時危無消息老去多歸心志士惜白日乆客藉黄金敢為蘇門嘯庶作梁父音甫吟此從後園感懷傷上四留蜀之乆中四思鄉之切下四窮老而情也戎馬指周智光犯京骨肉謂弟妹飄零乆客藉金不得為蘇門之長嘯而志士惜日猶思作梁父之行吟葢終不能忘情於用世耳志此章兩段各十二句萬庾信詩不言登隴首阮古詩士苦日短又徒有里志欲行囊無金籍傳籍嘗於蘇門遇孫登還半嶺聞有聲如鸞鳯之音乃登嘯也黄生謂梁父吟非竊比諸葛也陸機沈約各有梁父吟皆傷時運易逝之意此另一説季夏送鄉弟韶陪黄門從去聲叔朝音潮謁張逺注鄉弟故鄉同姓之弟大朱注唐杜鴻漸以黄門侍郎同平章事鎮蜀厯二年六月自蜀還朝當是其時作令弟尚為蒼水使原注韶比兼開江使通成都外江下峽舟船使去聲名家莫出杜陵人比必二切一作此來相去聲國兼安蜀歸赴朝廷已入秦捨舟策馬論平聲兵地拖玉腰金報主身莫度清秋吟蟋蟀早聞今本一作開黄閣郭作閤畫麒麟題本送韶因陪黄門朝謁故詩中兼及鴻漸捨首句提杜韶次句起鴻漸安蜀入秦此敘朝謁之故舟策馬杜韶陪行拖玉腰金鴻漸朝服莫度清秋望韶速徃早聞黄閣期漸功成也下四皆弟叔雙關靈杜臆弟為蒼水使而加一尚字見官未稱其才謝運詩末路值令弟者吳越春秋禹登衡嶽夢見赤繡衣男子自稱蒼水使曰聞帝使文命於此故來候之王洙曰杜陵有南北杜最稱名家捨韶出峽後從荆州陸道歸故曰捨舟策馬吳越春秋舟而去又策馬飛輿遂還宮闕鳴洙曰西征賦拖鳴玉以出入禁門勿岑文本頌腰金玉執贄奉璋韶行在六月囑其逗遛中途而聽蟋蟀秋吟舊注引王褒頌蟋蟀俟秋吟是也盧注引潘岳秋興賦蟋蟀鳴於軒屏葢以潘岳為黄門侍郎取其與杜黄門相合不知此句乃説杜韶非説鴻漸也鶴曰漢有給事黄門侍郎晉有黄門侍郎唐志龍朔二年改黄門侍郎曰東臺侍郎乾元元年又曰黄門演義黄閣蕭何所作崔旰殺郭英乂竊據成都罪在必討鴻漸初赴鎮時權為姑息偷安或勢非得已及入朝之日自官宻奏帝前斬旰都下以正典刑詩曰論兵地見離蜀可以用兵矣曰報主身見受恩宜思報國矣此時若能補過立功尚可勒名麟閣也下截頌中有諷寓意微婉後鴻漸廣為貢獻薦崔旰才堪寄任豈公屬望本意乎蔡夢弼曰考杜氏家譜襄陽杜氏出自晉當陽成侯預而佑葢其後也佑生三子師損式方從郁師損三子詮愉羔式方五子惲憓悰恂慆從郁二子牧顓羣從中悰官最高而牧名最著杜氏凡五房一京兆杜氏二杜陵杜氏三襄陽杜氏四洹水杜氏五濮陽杜氏而甫一𣲖又不在五𣲖之中甫與佑既同出於預而家譜不載何也豈以其官不達而諸杜不通譜系乎夢弼因覽其譜系而為之書謝􅇐曰公視杜陵之族甚踈然公亦世貴固無藉其尺五天矣灧澦鶴注此當是大厯二年夏作舊史大厯二年河東河南江浙淮南福建等道五十五州奏水災蜀雖不預宜亦水高矣灧澦既没孤根㴱西來水多愁太隂江天漠漠鳥雙去風雨時時龍一吟舟人漁子歌回首估客胡商淚滿襟寄語舟航惡年少去聲休翻鹽井擲一作横一作摸黄金此見灧澦水勢而戒人冐險也在四句分截鳥灧澦根没以水多故也江天風雨即太隂愁慘之象去龍吟則人不可徃矣回首見險知止也淚襟阻水難下也少年無賴逐利輕生故戒其翻鹽以擲金王濬表孤根獨立朱瀚曰水即太隂也公詩黒入太隂雷雨垂亦言氣象愁慘耳舊指水神自愁非是吳楊泉五湖賦太隂之所毖周王褒詩漠漠樹烟起翻陶潛詩時時見遺烈換韓信詩淮隂惡少年翻乃飛之意舟行疾也擲也又賭錢也沈攸之詩半醉驪歌應可奏上客莫慮擲黄金若作横讀去聲謂非理横取也葉夢得石林詩話曰詩下雙字極難便須七言五言之間除去四字三字外精神興致全見於兩言方為工妙唐人記水田飛白鷺夏木囀黄鸝為李嘉祐詩王摩詰添漠漠隂隂四字為嘉祐㸃化自見其妙如李光弼將郭子儀軍一號令之精彩數倍不然如嘉祐本句但是詠景耳人皆可到要之當令如老杜無邊落葉蕭蕭下不盡長江滚滚來與江天漠漠鳥雙去風雨時時龍一吟等句乃為超絶近世王荆公詩新霜浦漵綿綿白薄晚園林徃徃青與蘇子瞻詩浥浥爐香初泛夜離離花影欲摇春皆可以追配前作元今按王摩詰乃盛唐人李嘉祐乃中唐人胡瑞謂是李剪王句非王演李語石林誤矣七月一日題終明府水樓二首鶴注此當是䕫州作故云楚江巫峽半雲雨終明府當是奉節宰故云為政風流今在兹按杜詩凡稱月稱日者皆指節候言此七月一日乃立秋之日故曰秋風此日灑衣裳後有詩題大厯二年九月三十日而詩云悲秋向夕終則恰好秋盡矣高棟曾音層軒已自凉秋風此日灑衣裳翛然欲下去聲隂山黄生作山隂雪不去非無漢署香絶壁過雲開錦繡疎松夾黄作隔水奏笙簧看君宜著陟畧切王喬履真賜還疑出尚方此章從水樓説起結終明府隂首切水樓次貼初秋樓高風颯如此翛然疑下山之雪今對之不忍舍去非為無郎署而留此正以壁開錦繡松奏笙簧樓上見聞絶勝故耳終在此間去仙何逺故遂以王喬此之且望其即真也西張華詩穆如灑清風有洙曰隂山匈奴山名吐谷渾附隂山其地四時常冰雪雖六七月雨雹甚盛廣志代郡隂山五月猶宿雪使又曰尚書郎漢置四人口銜雞舌香以奏事答對欲氣息芬芳吹謝靈運詩晨策尋絶壁巻劉繪詩交錯錦嘯陳詩笙皷簧王喬履見四原注終明府功曹也兼攝奉節令故有此句切尹翁歸傳滿歲為真孝平帝紀吏在二百石以上一滿秩如真如淳曰諸官吏初除皆試守一歲迺為真食之俸方漢百官公卿表少府屬官一曰尚方師古曰尚主作禁器物虙音伏舊作宓誤宓音宻子彈琴邑宰日終軍棄繻英妙時承家節操七到切尚不泯為政風流今在兹可憐賓客盡傾蓋何處老翁來賦詩楚江巫峽半雲雨清簟徒㸃切疎簾看奕棋次章從終明府説起結歸水樓虙虙子切明府終軍切終姓承家頂終軍為政頂子下文好客好詩可見明府風流彼衆賓傾葢飲酒彈棋都屬官僚舊知公以羇旅老翁賦詩看奕於其中獨有無限悲凉之意賤黄生曰此詩首尾皆對人多不覺漢吕氏春秋虙子治單父身不下堂彈鳴琴而治之書終軍年十八選為博士弟子步入關關吏與軍繻軍問以此何為吏曰為復傳還當以合符軍曰丈夫西遊不復傳還遂棄繻而去後為謁者行郡國建節東出關關吏曰此乃前棄繻生也繻帛邊也裂繻頭合為符信即傳符也西征賦終童山東之英妙子抱朴子承家繼體廣晉書周虓傳少有節操左傳産為政晉書樂傳天下言風流者以王樂為稱首如家語孔子遇程子於途傾葢而語鄒陽傳古語白頭新傾葢如故文穎曰傾葢猶交葢駐車也用阮籍詩誰謂此何處賦魏文帝書已成老翁雲雨宋玉高唐賦江淹夏簟清兮畫不暮設魏文帝書彈碁間終以博弈蘇軾東坡詩話參寥子言老杜詩云楚江巫峽半雲雨清簟疎簾看奕棋此句可畫但恐畫不就耳僕言公禪人亦復愛此綺語耶寥云譬如不事口腹人見江瑶柱豈免一朶頥哉黄生曰前首多寫景後首多敘事相合成章後首一結冩景真􅃐在目可庇前路之板重此章法自為振救也補注次章五六失粘行去聲官張望補稻畦水歸鶴注當是大厯二年在瀼西時作是年秋始遷居東屯朱注行官是行田者韓文公答孟簡書行官自南迴過吉州葢唐時有此名目鶴曰行音去聲如行酒之行付與也使之領故曰行官非題言補足稻畦之水杜臆謂補稻補水是雨事也玩全詩俱言畦水可見東屯平聲大江北一云枕大江百頃平若案六月青稻多千畦碧泉亂插秧適云已引溜加溉灌㪅平聲僕徃方塘決渠當斷岸上四稻畦之水下四行官補水墾杜臆按志書城東有東瀼水公孫述於水濱稻田百許頃號東屯稻米為蜀第一故公孟冬詩有嘗稻雪翻匙之句百頃萬畝也崔瑗歌穿溜廣灌溉決渠作甘雨楨記乃留更僕注以番次更代使之也斷劉詩方塘含白水鮑照蕪城賦崒若岸公私各地著直畧切浸潤無天旱主守問家臣分明正異作朋見溪黄生作蹊畔一作伴芊芊一作芊芊一作竽竽炯翠羽剡剡以冉切生一作向銀漢鷗鳥鏡裏來關山雪邊看上四行官歸答之詞下四公想稻畦之景自補水之後公私地畝浸潤有餘今主守之事問之家僮皆分明共見者主守屬行官自稱朱注芊芊二句言苖色之青葱鷗鳥二句言畦水之明淨田蔡興宗正異作分朋謂芸者必分朋曹而進今按芸須用多人引水不必分朋不如仍作分明關杜臆瀼田在上牢下牢兩關之間故云關山與他處山不同梁武帝集公私畎畝務盡地利信食貨志理民之道地著為本注地著謂安土也庾春賦分朋入射堂黄生注蹊是田界潘岳詩稻栽肅芊芊黍苖何離離貎洛神賦或拾翠羽廣玉藻弁行剡剡起履注剡剡起説文剡鋭利貌雅天河謂之天漢亦曰銀漢鏡庚信行雨山銘樹入床前山來裏秋菰成黑米精鑿音作一作糓傳一作傅白粲玉粒足晨炊紅鮮任霞散終然添黄生作忝旅食作苦期壯觀去聲遺穗及衆多我倉戒滋漫上四言秋成可望下四欲有無與共即黑白紅鮮皆畦中所收者玉粒自食而紅稻霞散此遺穗也及衆多將分惠於人戒滋漫不專利於已八張逺注此係仄韻排律效六朝體也此章三段各句陳藏器曰菰首小者擘之内有黒灰如墨名烏鬱人亦食之庾肩吾詩黒米生菰葑青花出稻苗左傳注鑿謂治米使白本作糳凡舂米一石得三斗為精得四為鑿落漢書注白粲謂擇米使白粲粲然杜臆公詩有云杵光輝白除芒子粒紅即所謂玉粒紅鮮也湖拾遺記環丘上有方壺千里多大鵠高一丈羣飛於際採不周之粟於環丘之上生穟高五丈其粒皎然如玉沈約詩玉粒晨炊華燭夜炳韓信傳晨炊蓐食鮮于注江浙人謂紅米曰紅鮮李百藥詩羽觴傾緑蟻落日照紅鮮田辯命論終然不變魏文帝云旅食南館楊惲書家作苦黄注壯觀言委積之高封禪書天下之壯觀我詩彼有遺􅕗此有滯穗伊寡婦之利又我倉既盈庾維億秋行去聲官張望督促東渚耗一作刈稻向畢清晨遣女奴阿稽豎子阿段徃問鶴注此是大厯二年秋自瀼西居東屯時作行官督促東渚耗稻乃夏間事至秋而其事將畢又遣女奴豎子徃問令其始終毋怠也故篇中將全歲農功詳悉言之之東渚即東屯小洲曰渚舊注耗減也謂蒲稗能為禾害者盡減去之盧注漢高本紀中縣人以故不減耗注曰耗損也今云耗稻謂損去其草使稻得長猶耘苖也朱注説文耗本作秏稻屬從禾毛聲今作耗吕氏春秋飯之美者有𤣥山之禾南海之秏督促秏稻言督促田禾之事今玩詩首段意自當以舊注為正東渚雨今足佇聞粳稻香上天無偏頗蒲稗各自長人情見非類田家戒其荒功夫競搰搰除草置岸旁首敘東屯除草之事類秋成在望故粳稻欲香生物無偏造化之仁草除非裁成之道也洙曰謝靈運詩滮池溉粳稻字林云糯黏稻粳稻不黏者因漢書天不頗覆地不偏載謝靈運湖中作蒲稗相依前漢郊祀志萬物之情不可罔以非類漢書劉章歌非其種者鋤而去之漢武帝紀野荒田苛也莊子搰搰然用力甚多而見功寡草食貨志芸除也糓者命之一云令士本客居安可忘青春具所務勤墾免亂常吳牛力容易音異並驅去聲紛遊塲從吳本一作動莫當今此言春耕之事客居所急范農夫食力乃謀生常理東屯督耕庶免亂常也子計然曰五穀者萬民之命國之重寳也晉書黎元以穀為命驅世説滿奮曰臣猶吳牛望月而喘注水牛也詩並從兩牡兮染籍田賦遊塲屨豐苖亦已穊几利切或作溉雲水照方塘有生固蔓延静一資隄防督領不無人提擕一作挈頗在綱此言夏芸之事責在張望綱水多草生恐滋蔓延故須專意隄防所督雖多人提則行官也漢書㴱耕穊種注穊稠也穊種言多子孫延李巨仁詩白水溢方塘淼淼素波揚系葛歌葛不蔓棻台生書若網在綱有條而不紊荆揚風土煖肅肅候微霜尚恐主守疎用心未甚臧清朝遣婢僕寄語踰崇岡此因秋收將近遣人徃問霜降乃成熟之候主守指行官踰岡越山至東屯也書晉書阮籍傳樂其風土阮籍詩隂氣下微霜周惟土物愛厥心臧傅亮詩總斾崇岡西成聚必散不獨陵我倉豈要平聲仁里譽感此亂世忙北風吹蒹葭蟋蟀近中堂荏苒百工休鬱紆遲暮傷末擬秋成後情事遺亂世之人每多窮促故散粟以周隣里即前章穗及衆多意北風以下當與豳風蟋蟀床下塞向墐户曰為改歲入此室處叅看玩此一段見公先人後巳大道為公之念此章起結各八句中三段各六句賦書平秩西成宅籍田賦我倉如陵我庾如坻思𤣥匪仁里其焉詩北風其凉履又蒹葭蒼蒼月又十月蟋蟀入我床下衡謝靈運詩運傷荏苒令霜降百工休陸士詩紆鬱遊子情獨謝琨詩遲暮如何黄生曰杜田園諸詩覺有傲聣陶公之色其氣力沉雄骨力蒼勁處本色自不可掩耳又曰信行修水筒詩極其奬賞此詩乃云尚恐主守疎用心未甚臧則二人之賢否見矣阻雨不得歸瀼西甘一作柑後同林當是大厯二年七月作故詩云三伏適巳過大杜臆時暫徃白帝城而阻雨也道寰宇記䕫州昌縣西有千頃池水分三道一南流為奉節縣西瀼水三伏適已過驕陽化為霖欲歸瀼西宅阻此江浦㴱首記秋日阻雨秋隂陽書曰夏至後第三庾為初伏第四庚為中伏立後初庚為末伏王彪之井賦三伏焦暑亢陽重授漢郊祀志作伏祠顔師古曰伏者謂隂氣將起迫於殘陽而未得升故為藏伏因古伏日立秋之後以金代火金畏於火故至庚日必伏庚金也壞舟百板坼峻岸復扶又切萬尋篙工初一棄恐泥去聲勞寸心佇一作倚立東城隅悵望高飛禽草堂亂𤣥圃不隔崑崙岑昏渾衣裳外曠絶同曾音層一作層隂此歎不得歸瀼西瀼上四言無舟可渡下六東望増慨也盧注西咫尺非比𤣥圃崑崙其如水氣侵衣層隂隔絶何州詩佇立以泣立前柴門詩東城乾旱氣指白帝在䕫之東此云佇城東隅言瀼西在䕫州之東地志瀼水在䕫州府治東十里園甘長丁丈切成時三寸如黄金諸侯舊上上聲計厥貢傾千林邦人不足重所迫豪吏侵客居暫封殖日夜偶瑶琴虚徐五株態側塞先則切煩胸襟此遥憶甘林景物苦趙曰甘可入貢非不貴也邦人反不以為重者於豪吏侵奪故耳土人不敢多種唯客居者暫可封殖樹夢弼曰偶瑶琴謂聽其風韻若鼓瑶琴焉逺注甘為風雨掩塞故胸襟因之煩悶康南史劉義康傳文帝嘗冬月噉柑嘆其形味殊劣義還東府取柑大三寸者供御梁宗炳柑頌南金其色隋珠其形䕫州歳貢柑橘漢書計偕注計者上計簿也豪唐書前漢田儋傳召豪吏子弟注長也注左傳宿敢不封殖此樹以無忘角弓徐詩其虚其邪音徐爾雅作徐通幽賦承靈訓其虚兮注狐疑也憂何承天詩虞纒胸襟安一作焉得一作能輟雨一作兩非足杖藜出嶇嶔條流數所主切翠實偃息歸碧潯拂拭烏皮几喜聞樵牧音令平聲兒快搔背脱我頭上簪此預擬歸林情事入杖藜至偃息自外而也拂几至脱簪坐乆而卧也兩翠實指新甘碧潯指瀼水此章起四句結八句中段各十句謝朓詩森森散雨足流謝靈運詩舉目眺嶇嶔動劉孝儀緑李賦緑珠滿條條流枝條之上果實流也又翠實纍纍注楊師道詩連翩度碧潯中何遜詩羅袖幸拂拭將朱三輔決録注丁邯遷漢太守妻弟為公孫述繫獄光武詔曰漢中太守妻乃繫南鄭獄誰當搔其背垢者偽蘇注引袁安晴喜搔背初無此事又上上聲後園山脚初上山脚在大厯二年之夏比再上山脚當在是年之秋吳論前篇寫景而後咏懷此章咏懷而後寫景昔我遊山東憶戲東嶽陽窮秋立日觀去聲矯首望八一云北荒此追憶東遊徃事事杜臆上後園山脚忽憶舊日登臨之地無限情偶然觸發遂成長篇非專咏後園巖望八荒起下文巖何遜詩凛凛窮秋暮觀泰山記西為仙人石門東為介丘東南巖名日矯首昻首也甘泉賦仰矯首而高望兮地過秦論并吞八荒顔注八方荒忽極逺之也朱崖著直畧切毫髮碧海吹衣裳蓐收困用事𤣥㝠蔚强梁逝水自朝音潮宗鎮石一作名各其方平原獨憔悴農力廢耕桑非關一作北闕風露凋曾音層是戍役傷於時一作是國用富足以守邊疆朝音潮廷任猛將去聲逺奪戎馬一作鹵塲此傷當時黷武殃民乃望中所見者海上六記四望之景下八慨窮兵之禍朱崖南望碧東望蓐收西望𤣥㝠北望毫髮言渺茫吹衣謂海風蓐收困而𤣥㝠蔚謂秋衰冬旺杜臆此兼喻吐蕃西走禄山北競水石如故而中原獨疲以民傷戍役故耳此追咎當時邊將邀功朝廷好武也十漢書武帝定越地置珠崖郡在南海中亦曰朱崖洲記東有碧海廣狹浩汗與東海等水不醎苦正作碧色月令孟秋之月其神蓐收孟冬之月其神𤣥㝠老子曰强梁者不得其死注如屋梁橋梁其力强壯也鎮石即周禮九州之鎮山隋制祀四鎮東鎮沂山西鎮吳山南鎮㑹稽山北鎮醫無閭山冀州鎮霍山徳朱注平原泛言中原如晁錯書云平原易地黄鶴指州平原郡非也時河北皆苦戍役不止平原一郡矣㴱楊惲報孫㑹宗書身率妻子戮力耕桑司馬遷書踐戎馬之地到今事反覆芳服切故老淚萬行音杭龜䝉不可一作復見况乃懷一作復故一作舊鄉肺萎屬音竹乆戰骨出熱中腸憂來杖匣劍㪅上上聲林北岡瘴毒猿鳥落峽乾音干南日黄秋風亦巳起江漢始去聲如湯登高欲有徃蕩析川無梁此自傷衰年漂泊乃上山感懷者水上六世亂難歸而苦於病下八毒瘴難留而阻於事反覆謂河北屢叛向登日觀則傷中原憔悴今上北岡又苦南方峽瘴前後互相遥應風起以下言出峽艱難也沈佺期詩霑衣惜萬行也詩奄有龜䝉二山乃近東嶽者舊乆戰病咳而身戰公過王倚詩寒熱時交戰可證注作世亂戰伐者非行如湯言風濤相激如湯之沸苦熱湯泉發雲潭哀彼逺征人去家死路旁不及祖父塋纍纍塜相當末恐客死他鄉託征人以寄慨此章首尾各四句中二段各十四句學搜神後記丁令威化鶴歸集城門曰何不仙塜纍纍劉㑹孟曰本上後園山脚耳却從昔登東嶽俯望中州轉及時事情緒濶逺故收拾悲慟朱鶴齡曰開元末公遊齊趙有望嶽詩此云憶戲東嶽陽窮秋立日觀則後又甞登岱頂矣通鑑天寳九載四月平盧范陽節度使安禄山欲以邊功市寵數侵掠奚契丹奚契丹各殺公主以叛禄山討破之此詩平原戍役猛將戎馬等語正指當時之事年譜是歲公在齊州其登太山則在秋冬之交矣今按壯遊詩自下考功第後始放浪齊趙凡經八九年當是開元二十五年至天寶四載也又昔遊詩云是時倉廩實又云幽燕盛用武即此詩所謂國用富任猛將也公遊東嶽必在其時朱注謂再遊東嶽在天寶八載據年譜是歲雖到齊州但未知其確曾登嶽否耳奉送王信州崟北歸朱注鶴云唐潁州亦曰信州今詩有絶塞豁窮愁語乃是䕫州葢王以郎官出守䕫州今罷郡歸朝而公送之舊誤入湖南詩内特改正之杜臆王本䕫而稱信州襲舊名也朝音潮廷防盜賊供給愍誅求下去聲詔遷一作選郎署傳聲典信一作能典州蒼生今日困一作起天子嚮時憂井屋有煙起瘡痍無血流壤歌惟海甸畫胡化切角自山樓白髪寐常早荒榛農復扶又切秋從初守信州敘起力追言朝廷為民擇官以王能蘇民困也井邑有烟誅求巳息瘡痍無血盜賊漸弭歌惟海甸他皆經亂矣角吹山樓䕫尚防警也白髮二句自敘客䕫之况擊左傳誅求無時移帝王世紀堯時有老人壤而歌北山文張英風於海甸解龜踰卧轍遣騎去聲覔扁舟徐榻不知一作能倦潁川何以酬塵生一作老塵彤管筆寒膩黒貂裘高義終焉在斯文去矣休别離同雨散行止各雲浮林熱鳥開口江渾平聲魚掉頭此敘交情而惜别也公解龜謂離任卧轍百姓留王覓舟王來要公也趙曰以徐穉自方而比王崟為陳蕃言崟相待如陳蕃之於孺子我將何以酬潁川乎潁川屬陳氏郡號故用之塵生筆郎官巳謝寒膩裘客乆而敝高義四句述臨别之情林熱二句寫别時之景為謝靈運詩去徴郡牽絲及解龜在景平後漢書侯霸臨淮太守被百姓相擕號哭遮使者車或當道而卧詩世説劉真長遣騎覓張孝亷船徐孺下榻注别見彤管有煒注彤赤也公為郎官得用赤管筆詩時哉不我與去矣若雲浮黒貂裘用蘇秦事一劉琨曹植詩風流雲散别如雨依又詩行止林阻尉佗雖北拜太史尚南留軍旅應平聲都息寰區要盡收九重平聲思諫諍八極念懷柔徙倚瞻王室從七縱切容仰廟謀故人持雅論絶塞豁窮愁復扶又切見陶唐理甘為汗漫遊末望其歸朝以致治也拜當亂極思治之際南崟宜乗時建言尉佗北崔旰入朝也太史留自嘆客䕫也軍旅句應愍誅求寰區句應防盜賊九重句應天子憂八極句應蒼生困曰瞻曰仰皆公屬望之意王持正論以復太平則身依絶塞者亦甘為世外之遊矣諫諍廟謀王葢入為朝官鶴疑召為潁川守者斷謬此章三段各十二句面前漢高祖使陸賈賜尉佗印為南越王賈説佗郊迎北稱臣奉漢約高祖大悦拜賈為大中大夫有淮南子九州之外有八埏八埏之外有八紘八紘之外八極詩懷柔百神光武紀贊明明廟謀孫萬夀詩雅論窮名理吾史記非窮愁不能著書淮南子若士謂盧敖曰與汗漫遊於九垓之外驅豎子摘蒼耳鶴注公以大厯二年遷居赤甲瀼西皆在奉節縣北三十里詩云江上村中則知不在城郭矣當是大厯二年秋作詩爾雅注巻耳或曰苓耳形似䑕耳叢生如盤陸璣疏葉似胡荽白花細莖可煑為茹四月生子如婦人耳璫本草即今蒼耳江上秋巳分林一作村中瘴猶劇畦丁告勞苦無以供日夕蓬莠獨郭作猶不焦野蔬暗泉石巻耳况療風童兒且一作僕先時摘首敘摘蒼耳巻耳雜生者秋分猶旱故畦蔬不足蓬莠野蔬與封禪書嘉糓不生而蓬蒿藜莠茂劇甚也濕本草巻耳主療寒痛風周痺四肢拘攣侵星驅之去爛熳郭作漫任逺適放筐亭一作當午際洗剥相䝉羃音宻登牀半生熟下去聲筯還小益加㸃𤓰薤間依稀橘一作木奴跡次記食蒼耳也晨去午歸避瘴熱洗剥生熟言製之精潔因療風故小益其色青似橘皮也牀舊注羃覆食巾謂洗其土剥其毛以巾覆之趙曰登謂登食牀調杜臆加㸃謂𤓰薤之間參用蒼耳七又云古人用橘以和食味此以蒼耳當橘奴也杜預規云庶羞既異五味代臻糅以丹橘雜以芳鱗依晉書何曾傳食日萬錢猶曰無下筯處顔延之表實稀於河上荆州記吳丹陽太守李衡於武陵龍陽泛洲種甘橘千株臨死勅其子曰吾洲裏千頭木奴歲可得絹千匹亂世誅求急黎民糠籺音核窄飽食亦何心荒哉膏粱客富家厨肉臭戰地骸骨白寄語惡少去聲年黄金且休擲末從荒亂感慨膏粱徒飽而黎民苦饑傷在居人富家食肉而戰塲暴骨傷及征夫此嘆物力之宜惜也此章三段各八句陳平傳亦食糠覈耳晉灼曰覈音紇京師人謂麤屑為紇頭者論語飽食終日無所用心柳芳氏族論三世有三公曰膏粱有令僕曰華腴年魏志荀彧傳潁川四戰之地也梁元帝詩中有惡少技能專自得梁昭明詩一擲黄金留上客峽杜臆擲黄金謂賭錢者白晝攤錢與横黄金皆中惡少年事舊注引馮嫣事誤甘林此自城中歸瀼西甘林非從東屯而歸也詩中有朱門白屋語可見城野之别朱注編在大厯二年捨舟越西岡入林解我衣青芻適馬性好鳥知人歸晨光映逺岫夕露見日稀遲暮少寢食清曠喜荆扉經過平聲倦俗態在野無所一云或違試問甘藜藿未肯羨輕肥喧静不同科出處上聲各天機勿矜朱門是陋此白屋非首敘歸林景事意上八喜林間清曠乃目所見者下八羡野中静閒乃所適者藜藿白屋静而處也輕肥朱門喧而出也植杜臆解衣入我林可得前詩東帶還騎馬之解曹詩好鳥鳴髙枝謝朓詩窗中列逺岫堅後漢書仲長統傳卜居清曠七沈佺期詩俗態豈恒無所違不與俗違迕也啟余甘藜藿未暇此食也詩莊子蚿曰今子動吾天機而不知其所以然郭璞朱門何足榮未若託蓬萊蕭望之傳周公致白屋之士明朝步隣里長子丈切老可以依時危賦斂去聲數色角切脱粟為去聲爾揮相擕行豆田秋花靄菲菲子實不得喫貨市送王畿盡添軍旅用迫此公家威主人長跪問他本皆作辭戎馬何時稀我衰易去聲悲傷屈指數所主切賊圍勸其死王命慎莫逺奮飛此歸後感慨時事粟里老作三番訴詞揮舊以供賦斂一訴也賣新豆以應軍需二訴也公家迫索如此何時得以少寛三訴也中着跪問二字見其勢慼而情苦末四公答里老而朂以急公之義叅杜臆後段列問答之詞居然古調與三吏三别諸章觀何謂唐無古詩乎市邵注脱粟糙米也爾指索賦者子實豆子成實者貨貨之於市公家威謂官吏苛急主人即指長老屈指數言不乆賊平王命就賦斂言逺奮飛謂逃亡逺去此章兩段各十六句漢書公孫𢎞傳身食一肉脱粟飯木又張湯傳屈指計其日華海賦王命急宣盧元昌曰題是甘林詩不復敘甘林者已見於阻雨一篇也前篇以豪吏侵奪為辭此却以迫於賦斂為辭䕫土民不聊生矣此書懷篇所謂萬里煩供給孤城最怨思也朱鶴齡曰舊書大厯元年三月税青苖地錢命御史府差使徵之又用第五𤦺什畝税一法編户流亡二年九月吐蕃㓂靈州邠州詔郭子儀率師鎮涇陽京師戒嚴故有時危賦斂數戎馬何時稀等句暇日小園散病將種秋菜督勒郭作勒一作勤耕牛兼書觸目鶴注當是大厯二年在瀼西作東屯瀼西俱有茅屋然園圃在瀼西也不愛入州府畏人嫌我真及乎歸茅宇一云及歸在茅屋旁舍未曾音層嗔老病忌一作恐拘束應接喪去聲精神江邨意自一作日放林木心所欣首敘暇日小園散病四上四寫人情見城澆而野樸下寫巳意言厭動而喜静遁宋書何㸃不入城府豫章王嶷命駕造㸃㸃從後門去襄陽耆舊記龎德公不入襄陽城漢高彪詩利欲亂我真雄江宗表世網拘束此世説使人應接不暇揚解嘲但費精神於秋耕屬音竹地濕山雨近甚匀冬菁飯音反之半牛力晚一作曉來新湥耕種數畝未甚後四隣嘉蔬既不一名數頗具陳荆巫非苦寒採擷接青春此記種菜督勒耕牛蔓地濕則易耕山雨則宜種菁飼牛故力足能耕秋蔬多種直接來春則圃畦可以自給矣南都賦秋韭冬菁注菁蔓菁陳藏器本草蕪菁北人名蔓菁蜀人呼為諸葛菜比諸蔬其利甚博飯之半言佐飯牛之半孟子㴱耕易耨飛來雙一作兩白鶴暮啄泥中芹雄者左翮垂損傷已露一作及筋一步再流血尚驚一作經矰繳勤三步六號平聲呌志屈悲哀頻鸞凰不相待側頸訴高旻杖藜俯沙渚為去聲汝鼻酸辛此兼書觸目隱以自况也於園前之鶴垂翅哀號不為鸞凰所顧而惟上訴天旅人流落有似於此故見之而酸辛之此章首段八句次段十句末段十二句乃前短後長法蔡曰古樂府飛鵠行云飛來雙白鵠乃從西北來十十五五羅列成行妻卒被病行不能相隨五里一反顧六里一徘徊我欲啣汝去口噤不能開我欲負汝去毛羽何摧頽樂哉新相知憂來悲别離躊躇顧羣侶淚下不自知此詩全用艷歌行四解之意言淮南子為鴻鵠者則可以矰繳加也只杜臆借鶴寓此東坡後赤壁賦之祖三步六號呌是呌號不息下語却竒屈爾雅芹楚葵本草陶注二月三月可作葅鷦鷯賦猛志以服養楚辭鸞凰孔鳯宋玉賦寒心酸鼻黄生曰古人有一題展作數詩者有數題合作一詩者一題數詩貴在意緒各清數題一詩貴在聨絡無痕如何氏山林秦州雜詠此一題數詩也如臨邑舍法弟書至暇日小園散病此數題一詩也於此可悟作雨鶴注此當是大厯二年作時欲下峽入荆湘也是年吐蕃冦邠靈州京師戒嚴故云兵戈浩未息山雨不作泥一作埿江雲薄為霧晴飛半嶺鶴風亂平沙樹明滅洲景微隱見音現巖姿露拘悶出門遊曠絶經目趣首從雨景發端言三四承雨五六承霧本以拘悶而看雨故下文皆悶意禽經云鶴愛陽而惡隂因晴暫飛見雨中止故飛在半嶺唐太宗詩雲凝愁半嶺消中日伏枕卧乆塵及屨叶去聲豈無平肩輿莫辯望鄉路兵一作干戈浩未息􅉬虺反相顧悠悠邊月破鬱鬱流年度此旅人流落而悶也望鄉既不可見而且逺阻兵戈近侵蛇孽則託處荒山亦空伴歲月耳詩趙曰王子猷聞顧辟疆有名園乗平肩輿而徑入維虺維蛇月蔡琰胡笳夜夜吹邊月三沈佺期詩别離頻破月破月殘也公詩二月巳破月來王筠詩握髓駐流年針灸音究阻朋曹糠籺胡骨切一作覈對童孺一命須屈色新知漸成故窮荒益自卑飄泊欲誰訴尫羸愁應接俄頃恐違一作危迕此人情浮薄而悶也知對一命而屈色則自卑不可為新久而厭故則有懷將誰訴况疎於應接又易遭違忤所以阻朋曹而對童孺也杜臆一命指他人舊云公受郎官之命非是也漢書陳平傳亦食糠覈耳孟康曰覈麥糠中未破者晉灼曰覈音紇京師人謂粗屑為紇頭窮荒猶云絶塞規曹植白鶴賦傷本之違忤浮俗何萬端幽人有高一作獨歩龎公竟獨徃尚子終罕遇宿先就切留力就切洞庭秋天寒瀟湘素杖策可入舟送此齒髮暮末欲出峽以豁拘悶也澆俗難與乆處唯當追步幽人彼洞庭瀟湘之問扁舟送老是所願也明年公果下峽而去此章四段各八句阮瑀書情巧萬端細左思詩高步追許由逸淮南子江海之士山谷之人萬物而獨徃後漢民傳尚長字子平隱居不仕敕斷家事與禽慶俱遊五嶽名山竟不知所終秋漢郊祀志宿留海上注宿留謂有所須待也洞庭瀟湘素此拆用素秋二字言左思詩杖策招隱士説文杖持也方木細枝曰策溪鶴注此當是大厯二年秋在瀼西作峽内淹留客溪邊四五家古苔一作苕生迮音摘一作窄或作濕地秋竹隱疎花塞俗人無井山田飯有沙西江使去聲船至時復扶又切問京華逺注中四溪上景末聨溪上情杜顧注乆客孤村首聨寫得荒凉臆苔生花隱聊以自適無井有沙差可相安問京華有二意亂定可以北歸亂未定不如姑留溪上也董斯張曰苕陵苕也詩疏生下濕水中八九月花圖經浙有苕溪以岸多苕花也杜故于溪上詩言之今按苔可云古苕不可云古還作苔為當樹間黄鶴編在成都今依朱本屬䕫州詩中岑寂雙柑樹婆娑一院香交柯低几杖垂實礙衣裳滿歲如松碧同時待菊黄幾同霑葉晉作落露乗月坐胡牀上六樹間之景下二樹間之興之上截逐句分承雙樹故見交柯院香由於垂實交柯色其碧如松垂實之時其黄比菊沾露看月得以盡挹佳勝矣州顧注以一院為嚴武院中胡牀為幕府之物今按䕫雨不絶詩院裡長條風乍稀又咏孟倉曹詩胡牀面夕畦則顧説不足據矣鮑照舞鶴賦去帝鄉之岑寂庾信枯樹賦此樹婆娑生意盡矣婆娑盛貌書柑葉經四時而柯不凋任昉詩交柯溪易隂宋庾亮月夜登南樓據胡牀談咏演繁露云交牀名為胡牀隋改為交牀唐穆宗改名繩牀白露鶴注當是大厯二年秋在瀼西作以首句白露為題乃咏秋候也白露團甘子清晨散馬蹄圃開連石樹船渡入江溪憑几看平聲魚樂音洛回鞭急一作至鳥棲漸知秋實美幽徑恐多蹊上四從瀼西徃東屯曉時之景下四從東屯歸瀼西傍晚之景杜臆白露團聚於甘上則甘將熟矣不連石之樹開圃而見入江之溪乗船而渡連字屬樹屬圃入字屬溪不屬船方看魚樂而心急鳥棲秋日短也幽徑多蹊恐有竊取亦愛甘而故為戲詞耳庾信詩白露水銀團薛道衡詩高秋白露團莊子子非魚焉知魚之樂成古語云桃李無言下自蹊諸葛廟鶴注此當作於大厯二年故云久遊云屢入也乆遊巴子國屢入武侯祠竹日斜虚寢溪風滿薄帷君臣當共濟賢聖亦同時翊戴歸先主并吞㪅出師蟲蛇穿畫壁一作屋巫覡研歴切綴他本作醉杜臆作綴對穿字為工蛛絲歘憶吟梁父甫同躬耕也一作起未遲上四咏廟中景物中四遡武侯徃事下則對廟而感懷也但蟲蛇二句承中段來言當時勲業如此而遺廟凄凉見畫壁空穿蛛絲綴人耳與竹日二句不為犯重躬耕未遲葢借孔明以自况服水經注江州縣故巴子之都春秋桓九年巴子使韓告楚請與鄧好是也及七國稱王巴亦王焉元和郡國志武王伐殷巴人助焉後封為巴子三巴記其地東至魚復西至僰道北接漢中南極牂牁薄陳子昻詩城臨巴子國臺没漢王宫阮籍咏懷詩帷鑒明月應璩書賢聖殊品蔡邕篆書體藴若蟲蛇之棼緼京庾信詩龍來隨畫壁蜀國語在男曰覡在女曰巫東賦巫覡操茢揚雄都賦蜘蛛作絲不可見風本武侯本傳躬耕隴畝好為梁父吟出師表臣布衣躬耕南陽盧世㴶曰謁先主廟與諸葛廟詩是兩篇論世尚友文字而以排韻行之其曰㵕澹風雲㑹乗時各有人曰君臣當共濟賢聖亦同時將從來天造草昧建侯不寧同寅協恭咸有一德大作用大道理等閒説出此謂一詩不止了一題也有黄生曰諸葛時年尚少雖躬耕以待際㑹何遲之歘憶二字因巳而思及諸葛先主廟詩遲暮堪帷幄又因諸葛而轉及於巳與此正可叅看見螢火黄鶴編在大厯二年秋作葢次年之秋公遂出峽此詩末句預計歸期也黄生注此借螢火以紀候耳非専詠螢火也題曰見螢火詩曰愁看汝意可知矣詩熠燿宵行即螢火也巫山秋夜當作秋夜巫山螢火飛疎簾一作簾疎巧入坐人衣忽驚屋裏琴書冷復扶又切亂簷前星宿稀却遶井欄添箇箇偶經花蘂弄輝輝滄江白髮愁看平聲汝來歲如今歸未歸螢火飛領下五句自山而簾自簾而衣從外飛入内自屋而簷自井而花從近飛出逺六句皆摩寫見字杜臆本意全在末二借螢發端正詩之興也夜坐如黄鶯並坐之坐却如却立蒼石之却琴書添冷凉故也星宿同稀高飛故也中邵云却遶見聚散不常偶經見明滅不定照入井一螢兩影若添箇箇閃過花間其光互映如弄輝輝工顧注螢尾耀光迭開迭闔不停一瞬如弄光然弄字於肖物劉孝綽詩簾螢隱光息劉梁元帝螢詩着人疑不熱歆遂初賦玩琴書以滌暢庾信詩琴聲遍屋裏蕭和螢賦與列宿而俱浮前漢劉向傳夜觀星宿神南史齊江夏王鐸倚井欄為書梁簡文帝螢詩井疑火照紀少瑜螢詩臨池影更雙葩梁簡文螢詩拂樹若花生潘岳螢火賦若丹英之照簡文詩時送花蘂來鮑照詩翾翾燕弄風此弄字所本夜雨鶴注此當是大厯二年秋作小雨夜復扶又切宻迴風吹早秋野一作夜凉侵閉户江滿帶維舟通籍恨陳作限多病為郎忝薄遊天寒出巫峽醉别仲宣樓此章對雨而動歸思上四寫景下四述懷而野氣驟凉而侵户見秋風之早江水添滿繫舟見夜雨之宻多病薄逰言客况無聊公在䕫則思出峽徃荆又思别樓意在急於北歸也任彦昇詩序維舟久之以洙曰漢卜式不願為郎薄夏侯湛東方朔畫讚序為濁世不可富樂也故遊以取位黄生曰詩有正寫不出須用反撃始透者如野凉而戸始閉江滿而舟且維反撃出峽之無縁也人只賞侵字帶字不知苦景真情全在閉字維字五託多病六託浪游反撃朝廷非棄已也七以天寒挽一二出峽挽三四是預期之詞未經出峽便思去荆乂反撃欲出之難也㪅題朱注與前首同作故曰更題只應平聲踏初雪騎馬發荆州直怕巫山雨真傷白帝秋羣公蒼玉佩天子翠雲裘同舍晨趨侍胡為淹此一云此滯留此申前章未盡之意見初冬踏雪荆州且當急發何况巫峽乎怕雨傷秋此地斷難再留矣羣公四句遥憶京師之樂而重歎留滯之苦前杜臆發荆州承前醉别巫山雨承前小雨白帝秋承早秋記大夫佩水蒼玉而純組綬六典珮一品山𤣥玉五品以上水蒼玉記孟冬之月天子始棗宋玉風賦主人之女翳承日之華被翠雲之裘黄生曰五六句中不用虚字謂之實裝句蒼玉佩翠雲裘㸃簇濃至與三四寥落之景反照此古文中傳神寫照之妙其在於詩惟杜公有之淹此留應上發荆州乃通首倒敘法也舍弟觀歸藍田迎新婦送示二首此當是大厯二年夏作杜臆題云送示送弟北歸示之以意也前有得舍弟觀書喜觀即到諸詩蓋觀既到䕫州復歸藍田迎婦也汝去迎妻子高秋念却回即今螢巳亂好與雁同來東望西江永舊作水趙定作永南遊北户開卜居期静處㑹有故人杯此章拈去回二字為通首之主其螢亂去時景雁來回時景江永憐其去户開望回時荆州有故人可依故欲卜居其地瞿念却回謂弟當念迴也西朱注時觀歸藍田必東出唐故言送汝東下但見江之永將卜居江陵在藍田之南故言待汝南來當為北户之開望之之切也梁簡文帝詩初霜隕細葉秋風驅亂螢開月令仲秋之月鴻雁來賓邑詩江之永矣開吳都賦北户以向日黄庭堅曰林日南諸國皆北户向日楚塞難為路一作别藍田莫滯留衣裳判普宫切正作拌白露鞍馬信清秋滿峽重平聲江水開帆八月舟此時同一醉應平聲在仲宣樓此亦送别而望其早回裳難為路惜其逺去莫滯留囑其早回衣鞍馬弟從陸路而來江滿帆開公從水程而徃醉飲樓前期相㑹於江陵也楚塞即䕫州峽險則路難行判是􅂸着之意信是任他之意公詩春風自信牙檣動此信字正同衣江淹詩奉詔至江漢始知楚塞長王粲詩白露霑襟蕪顧注重江如北江中江大江之水皆自峽而下鮑照城賦重江複關之隩趙注王粲在荆州作賦故後世遂指荆州樓為仲宣樓别李秘書始興寺所居鶴注李秘書有二一是李十五一是李八此當是大厯二年在䕫州别李十五者公有贈李十五丈詩蓋被生事牽又云長受衆目憐惟其生事薄故常居於寺不見秘書心若失及見秘書失心疾安為動主理信然我獨覺子神充一作精神實重平聲聞西方止舊本作之杜田作正黄鶴定作止觀經老身古寺風泠泠妻兒待米陳作米一作我且歸去他日杖藜來細聽平聲意上四李秘書中二始興寺末二㸃别心安則神完此即止觀之法風泠襲體聞經境寂也良張溍曰時秘書必講經寺中故有末句後漢書戴見黄憲歸惘然若有失也張君祖詩止觀着無無還静滯空空黄希曰摩訶止觀陳隋間國師天台智者所説凡十巻止觀經應上安為動主楊慎曰佛經云止能捨樂觀能離苦又云止能修心能斷貪愛觀能修慧能斷無明止如定而后静觀則慮而后得也朱注李華左溪大師碑慧文禪師學龍樹法授慧思大師南嶽祖師是也思傳智者大師天台法門是也智者傳灌頂大師灌頂傳縉雲威大師縉雲傳東陽威大師左溪是也左溪所傳止觀為本祗樹園内常聞此經此詩止觀經明白可據舊本止譌作之音相近耳杜田引無量壽經正觀邪觀語皆非起結似宋人率語非杜真筆兮潘岳哀永逝文風泠泠入帷送李八秘英華作校書赴杜相去聲公幕原注相公朝謁今赴後期也黄鶴注大厯二年六月劍南節度使杜鴻漸入朝辟李秘書入幕杜蓋先行李追赴之也當是其年九月作還顧注唐制秘書郎從六品元李注按史杜鴻漸朝仍以平章事領山劍副帥故稱相公幕青簾白舫益州來巫峽秋濤天地迴石出倒聽平聲楓葉下去聲櫓揺背一作皆非指菊花開貪趨相去聲府今晨發恐失佳期後命催南極一星朝音潮北斗五雲多處是三台上四舟行之景下四赴幕情事吹蜀舟赴峽其波濤激盪勢若天地迴旋即所謂大聲地轉高浪蹴天浮也毛竒齡曰石崖横出則落葉之聲在上故曰倒聽飛櫓迅行則菊岸之移忽後故曰背指上句作上下兩層説下句作前後兩際説漢杜臆三四肰舟行之疾五六明疾行之故毛又曰天文志南極星在益州分野觜參之傍而三台三公又在北斗傍時杜相還朝李從益州來赴京故言南極而向北者以三公在北斗傍也倦游録劉濬白舫百棹皆繡帆青簾多載妓女首句用此邵注青簾白舫官舟也成都即漢之益州石出指峽中山崖舊指灧澦堆非是後楊慎曰倒聽句與包佶詩被影倒江楓同意恐催命故今晨發舟兩句倒叙時左傳宰孔謂齊侯曰且有後命瑞董仲舒曰太平之雲則五色而為慶五雲謂京城氣或指長安宫闕者非上天官書斗魁六星兩相比者為三台三公之象邵注台司命太尉中台司中司徒下台司禄司空南北三五句中自對一星多處兩句互對見詩法變化黄生曰起語輕秀接句猛健三四更竒險五六稍率得一結稱起前段七突然而轉八悠然而合雖用對結然筆意極其頓挫華南極句黄氏以為屬公自説猶云每依北斗望京不如從舊説指李秘書為順巫峽敝廬奉贈侍御四舅别之灃朗此當是大厯二年秋瀼西作天唐書灃州灃陽郡朗州武陵郡俱屬江南西道寶初割屬山南東道一統志灃州今屬岳州府朗州今為常徳府江城秋日落山鬼閉門中行李淹吾舅誅茅問老翁赤睂猶世亂青眼只途窮傳語桃源客人今出處上聲同上四廬中舅至下四感懐送别音黄生曰山鬼句突語竒險以見侍御來訪有空谷足之喜世亂難歸途窮寡援故願作桃源避世之人與為於耆舊内試覓姓龎人同法杜臆行李誅茅用借對法赤睂二句乃答問詞桃源在朗州故有末二語夜屈原九歌有山鬼篇持史記秦始皇三十六年使者過華隂平舒道有人璧遮使者曰今年祖龍死使者以聞始皇黙然曰山鬼不過知一年事耳庾信小園賦誅茅宋玉之宅漢光武時有赤睂賊此比崔旰也青晉阮籍能為青白眼黄生注白眼固當取嫉於世今眼亦只途窮此自傷自怪之詞語石崇昭君詞傳後世人孟氏鶴注此大厯二年䕫州作公九月一日過孟倉曹主簿詩云來因孝友偏與此詩正合朱注公有過孟十二倉曹十四主簿兄弟詩孟氏好兄弟養去聲親惟小園承顔胼一作胝手足坐客强溪兩切盤飱負米夕晉作寒一作力非葵外讀書秋樹根卜隣慚近舎訓子學一作覺非誰一作先門養親句領中四承顔負米固為奉養之事即留客讀書亦屬順親之心末有取於孟氏之家訓子學誰門言舎孟氏之外更學誰門乎讀此詩孟氏孝親賢兩見之矣聲顔氏家訓未知養親者欲其觀古人之先意承顔怡下氣史記大禹胼手胝足胼皮堅也胝皮厚也盧孔融傳座上客常滿鬱家語子路負米百里之外注陸機園葵詩葵生萋萋夕穎西南晞作夕葵為是耨後漢兒寛帯經書耕鋤束晳讀書賦兒寛口誦而芸庾信詩横琴坐樹根卜隣用孟母之事吾宗原注衛倉曹崇簡簡鶴注編在大厯元年馬又曰按世系表崇出襄陽房為益州司叅軍宗左傳晉吾也吾宗老孫子質朴古人風耕鑿安時論衣冠與世同在家常早起憂國願年豐語及君臣際經書滿腹中趙汸注次句領起中四其安時處順勤家憂國皆所謂質朴古風也末乂稱其通經術而知大義杜臆崇簡仕為倉曹葢性行惇質而兼有學問者非村民愿朴比也爾魏志陳羣傳陳寔曰此兒必興吾宗景福殿賦宜孫子讓荀悦漢紀周勃質朴忠誠漢永光詔舉質樸敦厚遜有行者魏志曹操謂毛玠曰君有古人之風莊子耕田而食鑿井而飲安時論曰為耕鑿中人彼亦安之矣周書王褒傳時論之記儒行孔子居魯衣逄掖之衣冠章甫之冠年内經早卧早起與雞俱興年左傳三時不害而民和豐盧注崇簡為倉曹故願豐趙後漢隗囂傳素有名好經書錢又壹傳文籍雖滿腹不如一囊胡應麟曰飛星過水白落月動沙虚吳均何遜之精思春色浮山外天河宿殿隂庾信徐陵之妙境山河扶繡户日月近雕梁碧瓦初寒外金莖一氣旁高華秀傑楊盧下風冠冕通南極文章落上台詔從三殿去碑到百蠻開典重冠裳沈宋退舍耕鑿安時論衣冠與世同在家常蚤起憂國願年豐寓神竒於古澹儲孟莫能為前片雲天共逺永夜月同孤落日心猶壯秋風病欲蘇含濶大於沉㴱高岑瞠乎其後退朝花底散歸院柳邊迷花動朱樓雪城凝碧樹烟王右丞失其穠麗地平江動蜀天濶樹浮秦日月低秦樹乾坤繞漢宮李太白遜其豪雄至岸花飛送客檣燕語留人則錢劉圓暢之祖兩行秦樹直萬㸃蜀山尖則元白平易之宗兩邊山木合終日子規啼盧仝馬異之渾成山寒青兕叫江晚白鷗饑孟郊李賀之瑰僻凍泉依細石晴雪落長松島可幽微所從出竹齋燒藥竈花嶼讀書牀籍建淺顯所自來雨抛金鎻甲苔卧緑沉槍義山之組織鮮新圓荷浮小葉細麥落輕花用晦之推敲宻切杜集大成五言律尤可見者奉酬薛十二丈判官見贈鶴注當是大厯二年秋在東屯作時吐蕃冦邠靈州京師戒嚴故云龍蛇尚格鬬灑血暗郊坰忽忽峽中睡悲風一作秋方一醒西來有好鳥為去聲我下去聲青㝠羽毛淨一作盡白雪慘澹飛雲汀既䝉主人顧舉翮唳孤亭首用比興引端馬好鳥來比薛君至唳孤亭比薛贈詩司遷書居則忽忽若有所亡聲李陵書但聞悲風蕭條之孫楚詩舉翮觸四隅持以比佳士及此慰揚舲清文動哀玉見道發新硎欲學鴟夷子待勒燕平聲山銘誰一作國重斬邪吳郭作斷蛇黄作斬郅劍致君君未聽平聲志在麒麟閣無心雲母屏此傷其負才不遇詩揚舲公將出峽也哀玉新硎喻其之鏗鏘而入理器馮班云言其欲學鴟夷霸越勒銘燕然惜抱斬蛇利不為時君所知然志在立功豈溺情於雲母屏哉雲母屏帶起下段户劉孝威詩揚舲濯錦流揚舲行船也楚辭注船有牕曰舲吳均詩清文動麗則徐陵賦哀玉發於新聲北莊子屠牛坦刀刃若新發於硎作後漢書竇憲大破單于於稽落山命中䕶軍班固燕然山銘勒石紀功人蔡曰斬邪用朱雲請劍斬佞臣頭事若作斷蛇恐非臣所用朱注斬蛇劍同谷七歌用之唐人使事不如此拘泥黄鶴以上有燕山銘下有麒麟閣句疑用陳湯斬郅支單于事改作斬郅按五色線酆去奢居山學道有神人謂曰張天師有斬邪劍并瓶盛丹在此石下可取之西京雜記趙飛燕為后女弟昭儀遺雲母屏風琉璃屏風鄭𢎞傳𢎞為太尉上聽置雲母屏風分隔其間卓氏近新寡豪家朱門一作户扃相如才英華作琴調去聲逸銀漢㑹雙星客來洗粉黛日暮拾流螢不是無膏火勸郎勤六經此記其新婚一事拾馮班云薛有相如之逸才得卓女於豪家方洗粉黛流螢相勉以勸學非風流放誕者比時薛當有臨卭之遇也善司馬相如傳相如初游臨卭富人卓氏女文君新寡琴相如因以琴心挑之遂為夫婦晉史贊王接才調秀出見賞知音更㑹雙星指牛女相㑹事梁鴻傳孟光初傅粉黛後為椎髻著布衣操作而前月朱注拾流螢用車𦙍事見前一巻之王均詩流螢映明空帳韓詩外傳孔子曰六經策皆歸論文中子心醉六經老夫自汲澗野水日泠泠我嘆黑頭白君看銀印青卧病識山鬼為農知地形誰矜坐錦帳苦厭食魚鯹此自敘客䕫景况有杜臆識山鬼病乆也知地形農熱也銀印既辭何錦帳野水託居故厭魚鯹劉琨詩烈烈悲風起泠泠澗水清謂漢百官表凡吏人比二千石以上銀印青綬銀印青印有青熒色吳越春秋舜明知人情審於地形枕漢官儀尚書郎入直官供錦緤被給帳帷茵褥通中沈佺期詩錦帳迎風轉東西兩岸晉作岸兩坼横一作積水注滄溟碧色忽一云苦惆悵風雷捜百靈空中右一作有白虎赤節引娉婷自云帝季一作里女噀蘇困切雨鳯凰翎襄王薄行跡莫學令威丁一作泠如冰千秋一拭淚夢覺古效切有微馨此託為陽臺結夢以解新娶之疑乃戲詞也雨兩岸瀼水東西白虎西方之宿娉婷謂巫山神女噀指暮為行雨鳯凰翎用弄玉乗鳯事襄王稀跡此寡情者令威去家尤其甚矣故神女追恨而千年拭淚也此應前忽忽峽中睡句庾信詩寒沙兩岸白屈蔡邕詩回顧生碧色楊記左青龍右白虎瑶前漢劉釐傳太子持赤節慎曰道藏神女名妃乃西王母之女曾助禹治水故稱帝女水經注宋玉謂天帝之季女名曰瑶姬封於巫山之臺神仙傳欒巴噀酒為雨滅成都火不吳邁逺詩徃來行跡稀薄猶疎也太王臺卿詩拭淚能語博物志文王夢覺明日召公人生相感動金石兩青熒文人但安坐休辯渭與涇龍蛇尚格鬬灑血暗郊坰吾聞聰明主治一作活國用輕刑銷兵鑄農器今古歲方寧天一作文王日儉德俊又始盈庭榮華貴少去聲壯豈食楚江萍此勸其乗時立功以釋人言之謗乃正意也娶精神相感金石為開况君臣之際而不可誠格乎今寡微節何必致辯但當勉力治朝奮志盛年諒弗留滯楚江巳也而杜臆末段方以莊語作結淵明所云始則蕩以思慮終歸閑止葢賦體也此應前志在麒麟閣意段此章起段八句次段十句相承中二段各八句後兩十句十二句相應錯綜之中仍有法度吳越春秋感動上皇武劉向新序楚熊渠子見其誠心而金石為之開漢光紀精誠所加金石為開青熒光色相映也后古樂府大人且安坐調絃未遽央十書亶聰明作元周禮刑新國用輕典農器見六巻華儉徳俊乂注皆見前王詩訟言盈庭大晉曲池歌榮壯盛時家語楚昭渡江有一物如斗圓而赤取之以問孔子曰此萍實也吾昔過陳聞童謡曰楚王渡江得萍實大如斗赤如日剖而食之甜如蜜此詩起處超忽不凡第五段又變㓜出竒前則取意於南華經後則脱胎於高唐賦乃少陵詩體中化境也當與渼陂行桃竹杖引寄韓諫議諸章叅看寄狄明府博濟鶴注當是大厯二年䕫州作梁公曾孫我姨弟不見十年官濟濟上聲大賢之後竟陵遲浩蕩古今同一體比去聲看平聲伯叔四十人有才無命百寮底今者兄弟一百人幾人卓絶秉周禮在汝㪅用文章為長上聲兄白睂復扶又切天啟從明府世系敘起稱其兄弟多才杜臆不見其十年在官濟濟上升所謂有才無命也傑百寮底居百寮之下長兄白睂言博濟之兄狄仁傳仁傑聖厯三年卒中宗即位贈司空睿宗又封梁國公後舊注母之姊妹其子曰姨弟詩濟濟多士史記稍凌遲衰微也者夏侯湛抵疑有其才而不遇者時也有其時而不遇命也書百僚師師孔光傳非卓絶之能弟左傳魯猶秉周禮未可動也常蜀志馬良字季常兄五人並有才名諺曰馬氏五白睂最良良睂中有白毛故以為稱之左傳卜偃曰以是始賞天啟矣汝門請從曾翁一云公説太后當朝音潮多巧詆一作計楊慎云計不在韻當作詆狄公執政在末年濁河終陳浩然本作中不汚清濟上聲國嗣初將付諸武公獨廷諍守丹陛禁中決策陳浩然作冊決請一作詔房陵前一作滿朝音潮長上聲老皆流涕太宗社稷一朝正漢官威儀重平聲昭洗時危始識不世才誰謂荼苦甘如薺此追敘狄公徃事見其有功社稷湥逺注犯顔苦節人所畏避此獨甘之如飴陵前漢書文巧詆史記齊有清濟濁河漢書王面折廷諍中沈約廟樂歌重檐丹陛策史記趙高傳陛下湥拱禁韓信傳蕭何曰顧王安決唐書武后革唐為周廢中宗為廬陵王遷於房州欲以武三思為太子仁傑數諫且曰子母姑侄孰親若立三思廟不祔姑后悔悟即日迎中宗還宮才漢官威儀見光武紀如風俗通應融曰伯休不世英詩誰謂荼苦其甘薺汝曹又宜列鼎一作裂土食身使門户多旌棨胡為飄泊岷漢間干謁侯王頗厯抵舊作詆誤况乃山高水有波秋風蕭蕭露泥泥乃里切虎之饑下去聲巉嵒蛟之横去聲出清泚早歸來黄土汚去聲衣浩然本作黄汚人衣眼易去聲眯音米後末憐明德之飄泊依人也之此章首段十句下二段各十二句則漢書注棨有衣㦸以赤黑繒為之隋志三品以上列棨㦸謝朓詩載筆陪旌棨歴歴抵言歴至王侯之門揚雄傳扺穰侯而代之舊作詆本息夫躬傳厯詆公卿大臣但明府方事干謁豈可詆毁當事乎朓詩蓼彼蕭斯零露泥泥嵇康琴賦𤣥嶺巉巖謝詩寒流自清泚梁末童謡可憐巴馬子一日行千里不見馬上郎但有黄塵起黄塵汚人衣皂筴相料理字林眯物入眼為病也莊子簸糠眯目則天地四方易位矣同元使去聲君舂陵行有序䕫鶴注此當大厯二年在州作同和也覽道州元使君結舂陵行兼賊退後示官吏作二首志之曰當天子分憂之地效漢官舊作朝良吏之目一作日今盜賊未息知民疾苦得結軰十數公落落然叅錯天下為邦伯萬物吐晉作姓壯氣天下小一作少安可待矣一作巳不意復扶又切見比興去聲體制微婉頓挫之詞感而有詩增諸巻軸簡知我者不必寄元晉作云人杜臆詩意在於救世使聞而興起故序云簡知我者不必寄元作郎久之拜道州刺史唐書元結傳代宗立結授著杜預左傳序微而顯婉而成章抑陸機遂志賦揚頓挫遭亂髮盡一作遽白轉衰病相嬰一作縈沉緜盜賊際狼狽江漢行歎時藥力薄為客羸瘵成首段敘憂亂傷時藥盜賊二句承遭亂力二句承衰病心黄生曰歎時二句言身疾可醫疾不可醫耳吾人詩家秀一作流博采世上名粲粲元道州前聖畏後生觀乎舂陵作歘見俊哲情復扶又切覽賊退篇結也實國楨賈誼昔流慟匡衡嘗引經道州憂一作哀黎庶詞氣浩縱平聲横兩章對秋月一作水一字偕一作皆華星此稱元結憫世之作名公於詩家之流每来其著者得一元道州而為之起畏矣秋月華星言當與日星並垂後漢崔琦傳豈獨吾人之尤論語後生可畏詩王國之楨疏賈誼傳可為痛哭者三傅匡衡傳衡為少傅數年上陳便宜及朝廷有政議經以對言多法義以漢元帝詔黎庶康寧明論語出辭氣之左傳序春秋一字為褒貶法言星皓皓華藻力也魏文帝詩華星出雲間致君唐虞際淳一作純朴憶一作意大庭何時降璽書用爾為丹青獄訟永一作乆衰息豈惟偃甲兵悽惻念誅求薄斂近休明乃知正人意不茍飛長纓凉飈振南嶽之子寵若驚色沮一作阻金印大興去聲含滄浪一作溟清此稱元結愛民苦心以偃甲兵承退賊篇念誅求承舂陵作朱注正人下因元詩有歸老江湖句故及之此杜臆正人之意不苟長纓公與元結心契在此人存心天下治矣應璩書思致君於有虞濟蒸民於塗炭也莊子昔容成氏大庭氏結繩而用之若此時則至治左傳云大庭氏古國名在魯城内古史考大庭氏姜姓以火徳王號曰炎帝詩正義大庭神農之別號漢循吏傳二千石有治效輒用璽書勉勵鹽鐵論公卿者神化之丹青莊子為丹青則藻縟王猷粉飾治具漢書龔遂治渤海郡中多蓄積獄訟止息漢禮樂志百姓素朴獄訟衰息薄司馬相如難蜀父老文以偃甲兵於此中庸時使斂左傳王孫滿曰德之休明雖小重也俗陸機詩長纓麗且光子黄生注凉飈句言其清標絶南嶽衡山也老寵辱若驚陶潛詩寵辱易不驚子晉周顗傳取金印如斗大繫肘後孺歌滄浪之水清兮我多長子兩切卿病日夕思去聲朝音潮廷肺枯渴太甚漂泊公孫城呼兒具紙筆隱去聲几臨軒楹作詩呻吟内墨淡字欹傾感彼危苦詞庶幾平聲知者聽平聲之意末再敘行踪收出和詩多病應病相嬰漂泊應江漢行但前是槩言此則指出肺渴之病及在白帝城矣語分虚實呻吟疾痛聲危苦詞即道州詩知者聽謂簡知我者税杜臆按道州本傳結以人困甚不忍加賦嘗奏免租及和市雜物十三萬緡又奏免租庸十餘萬緍因之流亡盡歸不特空言而巳書此章六句起十句結中兩段各十四句荀悦傳尚給筆札前漢淮南厲王傳艱難危苦甚矣黄生曰此詩前後皆自敘自敘多言病其筋節在歎時藥力薄句知作者全是借酒杯澆塊磊也䂬溪詩話曰杜子美褒元結春陵行兼示官吏詩云兩章對秋月一字偕華星致君唐虞際淳朴憶大庭序又云今盜賊未息得結軰數十公為天下邦伯天下少安可立待巳葢非專稱其文也至於李義山乃謂次山之作以自然為祖以元氣為根無乃過乎秦少游漫郎詩云字偕華星章對月漏洩元氣煩揮毫葢用子美義山語也舂陵行元結詩有序癸卯歳漫叟授道州刺史道州舊四萬餘户經賊已來不滿四千大半不勝平聲賦税到官未五十日承諸使去聲徴求符牒二百餘封皆曰失其限者罪至貶削於音嗚戲音呼若悉應其命則州縣破亂刺史欲焉於䖍切逃罪若不應命又即獲罪戾必不免也吾將守官静以安人待罪而巳此州是舂陵故地故作舂陵行以達下情唐書地理志道州江華郡屬江南西道陵漢書零陵郡泠道縣有舂陵鄉水經注都谿水出舂縣北二十里仰山縣本泠道縣之舂陵鄉葢因舂谿為名矣漢長沙定王分以為縣武帝元朔五年封王仲子買為舂陵節侯唐書大厯二年於道州東南二百二十里舂陵侯故城北十五里置大厯縣補注兩京賦收以大半之税注大音太軍國多所須切責在有司有司臨郡縣刑法竟一作意欲施供給豈不憂徴斂去聲又可悲首段叙事言情總提全意當時節使以軍須責有司故有司遂以刑法督窮民憂則郡縣悲在百姓也晉陽秋是時軍國多事玉藻有司府史之屬釋名秦置郡以監其縣州小經亂亡遺民一作人實困疲大鄉無十家大族命單羸朝飡是草根暮食乃樹皮出言氣欲絶意速行歩遲追呼尚不忍况乃鞭撲之郵亭傳急符來徃跡相追㪅無寛大恩但有迫促期欲令平聲鬻兒女言發恐亂隨悉使索生革切其家而又無生資上十經亂亡而人困疲下八憂供給而悲徴歛也曰一物失所亂亡之端周禮五黨為州為家語孔子漢食貨志五州鄉周禮四閭為族左傳同族五服之内辭鄒陽傳天下布衣窮居之士身在貧羸羸瘦也楚屑瓊以朝餐南史侯景之亂江南連年旱蝗百姓流亡采草根木葉菱芡而食之南齊書陳顯達督軍園南鄉馬圏城城中食盡噉及樹皮紀阮瑀詩行歩益疎遲詩賈誼策秦執鞭撲漢平帝因郵亭書以聞韓外傳使人温良而寛大也求叅同契迫促時隂資淮南子贅妻鬻子以給上説文資貨也生治生之物也聽彼道路言怨傷誰復扶又切知去冬山賊來殺奪幾平聲無遺所願見王官撫養以惠慈奈何重驅逐不使存活為安人天子命符節我所持州縣忽一作復亂亡得罪復扶又切是誰逋緩違詔令䝉責固所宜前賢重守分音問惡去聲以禍福一作敗移亦云貴守官不愛一作憂能適時上八代為貧民之訴惡郡縣之刑迫下十擬答諸使之詞寧受切責而不辭也符節刺史所受得罪謂不能恤民違詔謂不能供應禍敗移畏禍而變所守不適時不忍剥民以逄時此即序云守官待罪者黄石公素書仁者人之所親有慈惠惻隱之心道爾雅存在也活生也咸書在知人在安民國語守不如守官何遜詩云不適時顧惟孱弱者正直當不虧何人采國風吾欲獻此辭末自述巳志作歌以達下情也孱此詩六句起四句結中二段各十八句史記吾王王也注懦弱曰孱孱弱謂官卑力小王後漢朱穆傳讜言正直失漢書古有採詩之官者所以觀風俗知人得自攷正也陸時雍曰次山詩每有真性淺而可諷能吳山民曰是真憂真憤真慈惠人語使俗吏讀之不為之心怍而面熱賊退示官吏元結詩有序癸卯歲西原賊入道州焚一作殺掠一云焚燒殺掠幾平聲盡而去明年賊又攻永破邵不犯此州邊鄙而退豈力能制敵與平聲蓋䝉其傷憐而已諸使去聲何為忍苦徵斂故作詩一篇以示官吏朱注按唐西原蠻傳西原種落張侯夏永等内冦䧟道州據城五十餘日桂管經畧使邢濟撃平之餘衆復圍道州刺史元結固守不下今序云不犯此州邊鄙疑史有誤杜詩博議顔魯公撰次山墓碑云君在州二年歸者萬餘家賊亦懷畏不敢來犯與次山詩序語合唐史之誤明矣昔歲逢太平山林二十年泉源在庭户洞壑當門前井税有常期日晏猶得眠忽然遭世變數歲親戎旃首段自敘出處仙親戎旃經兵亂也洞壑人館孤峯玉女臺詩泉源在左風沈佺期詩左傳晉中軍於澤亡大斾之左旃君繫旌曰斾通帛曰旃陳子昻詩昔事胡馬余得奉戎旃今來典斯郡山夷又紛然城小賊不屠人貧傷可憐是以陷隣境此州獨見全使去聲臣將王命豈不如賊焉此記道州時事不賊尚能哀貧而官知憐官蓋甚於盜矣今彼徵斂去聲者迫之如火煎誰能絶人命以作時世賢思欲委符節引竿自剌郎達切船將家就魚菱一作麥窮一作歸老江湖邊末則憤時而欲棄官也臣時世賢即孟子所謂今之良古之民賊者八此詩三段各句羅大經曰葉水心云唐時道州西原蠻掠居民而諸使調發符牒乃至二百函故元結詩以為賊之不如杜少陵遂有粲粲元道州前賢畏後生之語葢一經兵亂不肖之人妄相促迫草芥其民賊猶未足以為病而官吏相與亡其國矣至哉言乎古今國家之亡兆之者夷狄盜賊而成之者不肖之官吏也且非特兵亂之後暴驅虐取吾民而巳方其變之始也不務為弭變之道乃以幸變之心施激變之術張皇其事誇大其功借生靈之性命為富貴之梯媒甚者假夷狄盜賊以邀脅其君展轉滋蔓日甚一日而國隨之矣秋日䕫府詠懷奉寄鄭監審李賓客之芳一百韻鶴注編在大厯二年瀼西詩内芳鄭審有湖亭在峽州舊唐書廣德元年李之兼御史大夫使吐蕃被留二年乃得歸拜禮部尚書改太子賓客絶塞烏蠻北孤城白帝邊飄零仍百里消渴已三年雄劍鳴開匣羣書滿繫音計船一作所向皆窮轍餘生且繫船亂離心不展一作轉衰謝日蕭然筋力妻孥問一作覺菁華歲月遷登臨多物色陶冶賴詩篇首敘䕫府咏懷之故六上六言客䕫巳乆意欲東行下言去䕫不能聊資遣興耳泰絶塞孤城皆指䕫州公自雲安至此百三十里自永元年至此巳厯三年劍嗚書繫將去䕫也身遭亂離故易衰謝筋力二句承衰謝登臨二句起下段晉封禪奏地險俗殊人望絶塞洙曰嶲州以西有鳥白蠻懷杜臆飄零只在百里而消渴已閲三年二句多少傷鮑照詩雙劍將别離先在匣中鳴雌沉吳江裏雄飛入楚城承後漢書袁閎愽覽羣書西京雜記開匣拔鞘禮謝記老者不以筋力為卿雲歌菁華既竭褰裳去之字登臨而見景物常藉詩篇以摩寫之西京雜記棟物色唯舊顔氏家訓文章陶冶性靈從容諷詠亦樂事也洙曰陶如陶者之埏埴冶如冶工之鎔鑄峽束滄一作蒼江起巖排古一作石樹圓拂雲霾楚氣朝音潮一作潮海蹴一作襯吳天煮井為鹽速燒畬詩遮切度達各切地偏有時驚疊嶂何處覓平川鸂􅈃雙雙舞獮猴壘壘懸碧蘿長似帶錦石小如錢春草何曾音層歇寒花亦可憐獵人吹戍火野店引山泉此詠䕫州風景六峽東四句記山水煮井四句記地脉鸂􅈃句記物産獵人二句記人事皆所謂登臨多物色也雄樹拂雲而鬰霾楚氣江朝海而浪蹴吳天此聨可以葢一世煮井一聨寫得竒剏叠嶂一聨寫得駭愕鸂􅈃數句寫得幽閒春草寒花寫得韶秀吹火引泉寫得冷雋句句可以入畫舊注石樹石楠也朝王勃詩巖朝古樹新吳地鏡圖楚氣似馬書江漢宗於海劉庭芝詩天積風霜蜀都賦濱以鹽池劉曰鹽池出巴東北新井縣水出地如湧泉可煮為鹽農書荆楚多畬田先縱火熂爐候經雨下種厯三歲土胍竭復熂旁山熂燹火燎草爐火燒山界也杜田曰楚俗燒榛種田曰畬王制量地以制邑度地以居民度地偏言不遺僻壞也詩梁武帝詩朝雲生叠嶂峽中地浚故無平川何遜平川看逺鳥安爾雅注鸂􅈃毛有五色府庾信詩雙雙淚眼生吾劉招隱獮猴兮熊羆樂詞鬰鬰纍纍庾肩詩錦石鎮浮橋曰謝靈運詩春草亦未歇人張協詩寒花發黄草趙時有屯戍在白帝城獵吹火於此庾信詩獵火一山紅竹洙曰峽民依山而居故以引山泉喚起搔頭急扶行幾屐穿兩京猶薄産四海絶隨肩暮府初交辟郎官幸備員瓜時猶一作仍一作拘旅寓萍泛苦一作若夤縁藥餌虚狼籍秋風灑静便平聲開襟驅一作袪瘴癘明目掃一作拂雲煙高宴諸侯禮佳人上客前哀筝傷老大華屋艷神仙南内開元曲當他本作常盧本作當時弟子傳原注都督柏中丞筵聞梨園弟子李仙奴歌法歌聲變轉滿座涕潺湲此咏在䕫情事淪喚起扶行乃衰頽之狀皆因偃蹇落所致二句作引端兩京四句敘客䕫之由𤓰時六句病中所對之境苦中有樂意高宴八句旅中所觸之懷樂處有哀思心煩悶故搔頭路﨑嶇故屐穿薄産田園乆荒隨肩故交日替暮府二句憶嚴武薦引旅寓二句應前飄零藥餌二句應前消疾開襟明目承上秋風高宴四句見節鎮之繁華南内四句感明皇之逸豫後數語又引起下段之師氏以喚起為晨鳥以扶行為竹杖裏冷齋詩話退詩喚起窗前曙催歸日未西無心花鳥更與盡情啼喚起催歸二鳥名催歸子規也喚起聲如絡圓轉清亮偏於春曉鳴江南謂之春喚易林鳩杖扶老陶潛歸去來辭策扶老以流憩嘗西京雜記武帝過李夫人取玉簪搔頭晉書阮孚自蠟屐因歎曰未知一生能著幾兩屐年兩京謂長安洛陽蔡沈佺期詩上京無薄産記五以長則肩隨之邕薦邊讓於何進曰幕府初開博選清英至申屠嘉傳為丞相備員而巳左傳齊侯使連稱管父戍葵丘曰瓜時而徃及瓜而代㑹謝靈運詩蘋萍泛㴱沉詩吳都賦夤縁山岳之岊韻夤縁連絡也謝靈運藥餌情所止狼籍出漢書唐謝靈運詩還得静者便膽登樓賦向北風而開襟書韋思謙曰須明目張以報天子顔延之城闕生雲煙書庾信詩將軍高宴罷篌古詩主人愛上客魏文帝哀筝傾耳曹植箜引空存華屋處城古詩金屋羅神仙十唐書興慶宮在皇城東南距京之東開元初置至四年又增廣之謂之南内弟唐㑹要開元二年上於梨園自教法曲號皇帝梨園子又太常梨園别教院法歌樂章曲等朱注白居易詩法曲法曲合夷歌夷聲邪亂華聲和以亂干和天寶末明年胡塵犯宮闕自注云𤣥宗雖雅好度曲然未嘗使蕃漢雜奏天寶十三年始詔諸道調法曲與胡部新聲合作識者㴱嘆異之明年冬禄山反隋李孝貞詩間關既多緒變轉復無窮孔子丘陵歌涕霣潺湲弔影䕫州僻回腸杜曲煎即今龍廐水莫帶犬戎羶耿賈扶王室蕭曹拱御筵乗一作秉威滅蜂蠆戮力効川本作教鷹鸇舊物森猶在凶徒惡未悛國須行戰伐人憶止戈鋋奴僕何知禮恩榮錯與權胡星一彗孛川作闇黔首川作首惡遂拘攣哀痛絲綸切煩苛一作頻煩法令蠲業成陳始王去聲兆喜出於畋宮禁經綸宻台階翊戴全熊羆載呂望鴻雁美周宣此回憶長安時事䕫州句承上杜曲句領下龍廐水羶吐蕃陷京也耿賈四句思靈武將相舊物四句惡當時叛將奴僕四句推禍本於程元振哀痛以下指代宗還京之事懷舊物謂帝京如故凶徒如李懷玉之逐侯希逸僕固恩之誘吐蕃是也止王道俊博議公以代宗不能徃問河北之罪而但慕戈之名養成禍亂故曰國須行戰伐人憶止戈鋋葢傷之也入盧注程元振以奴僕而錯與大權致將士懈心外夷冦而生民困苦舊指禄山為奴僕者非赦朱注舊紀永泰元年正月下制罪巳二年十一月大改元停什畝税一法此所謂哀痛切煩苛蠲也陳情表形影相弔西高唐賦感心動耳回腸傷氣苑杜曲公故居原注京龍廐門苑馬門也渭水流門内通鑑注唐禁苑南門直宮城之𤣥武門北枕渭水苑内有飛龍祥麟鳯苑等六廐莫帶莫不尚帶餘羶也後漢書論耿賈之洪烈􅃣此借比李郭諸功臣丙吉傳贊高祖開基蕭曹為左傳蜂蠆有毒而况國乎書與之戮力夏左傳見無禮於君者誅之如鷹鸇之逐烏雀又祀配天不失舊物晉史論招烏合之凶徒道左長惡不悛戈孔叢子今君生戰伐之世雲光武紀未方古亦正之武焉東都賦戈鋋彗注鋋小矛也榮公孫𢎞傳贊衛青奮於奴僕不謝靈運詩何以報恩説苑管子曰權不兩錯政一門前漢天文志昻曰旄頭胡星也張晏曰彗所以除舊布新孛氣似彗也史記秦本紀憂恤黔首西征賦陋吾人之拘攣詔前漢西域傳贊武帝末年遂棄輪臺之地下哀痛之記緇衣王言如絲其出如綸前漢循吏傳掃除煩苛陳秦本紀法令如一由詩序七月陳王業也周公遭變后稷先公風化所致王業之艱難也者書文王不敢盤於田遊方梁竦傳宮省事宻莫有知易君子以經綸東朔傳願陳泰階六符應劭曰泰階天之三階也上階為天子中階為諸侯公卿下階為士庶人王儉作禇淵碑文外矅台階魏神武帝傳檄方鎮曰天方與魏必將有主翼戴聖明非洪容齋隨筆史記載西伯出獵而遇太公其卜辭乃龍非彲非虎非羆崔駰達㫖引史記作非熊非羆此杜詩所本也詩序鴻雁美宣王也美其能勞來還定安集也側聽中興主長吟不世賢音徽一柱數音朔道里下牢千原注鄭在江陵李在夷陵鄭李光時論文章並我先隂何尚清省沈宋歘聨翩律比崑崙竹音知燥濕絃風流俱善價愜當去聲乆忘筌置驛常如此登龍蓋有焉雖云隔禮數不敢墜周旋高視收人表虚心味道𤣥馬來皆汗血鶴唳必青田羽翼商山起蓬萊漢閣連管寜紗帽淨一作静江令錦袍鮮東郡時題壁南湖日扣舷逺遊凌絶境佳句染華牋此稱頌鄭李二公里側聽句承上長吟句領下徽音數鄭書頻至道千李居不逺鄭李八句稱二公詩才置驛八向稱二公交誼羽翼八句稱二公宦迹荆州有一柱觀峽州有下牢關置驛切鄭登龍切李周旋公願與徃來也收人表言其愛士味道𤣥言其好道馬來鶴唳喻人才樂歸趙曰李為太子賓客故用四皓事鄭係秘書少監故近蓬萊閣管寜紗㡌李方在朝故比江令錦袍鄭巳退居故比朱注夷陵郡在䕫州之東故曰東郡南湖即鄭監湖亭室雋不疑傳側聽不疑衛宏詩序宣王任賢使能周中興焉應瑒詩永思長吟關曹植曰不世之賢關陸機詩音徽日夜離虞茂詩山多道里下牢注别見隂鏗何遜沈佺期宋之問以比鄭李之詩章文心雕龍陸士龍雅好清省朱异詩或賦聨翩之漢律厯志黄帝使伶倫去大夏之西崑崙之隂取竹嶰谷斷兩節間而吹之以為黄鐘之宮韓詩外傳夫時有燥濕絃有緩急徽指推移不可記也廣絶交論客所謂撫絃徽音未達燥濕變響晉書天下言風流者以王樂為首王衍樂廣也賦善價見論語重陸機文愜心者貴當摯虞傳辭理愜當為世所莊子得魚而忘筌漢書鄭當時常置驛馬長安諸郊請謝賓客昉後漢李膺獨持風裁有被延接者名為登龍門任詩生平禮數絶視左傳奉以周旋不敢失墜人曹植與楊修書足下高於上京任彦升集經師表老子虚其心實其腹又𤣥之又𤣥答賓戲味道之腴五君詠探道好淵𤣥汗血馬青田鶴注皆别見張良傳四人者隱商雒山從太子上召戚夫人指示曰彼羽翼巳成難動矣後漢書學者稱東觀為老氏藏室道家蓬萊管寜紗帽注别見有江總集山水衲袍賦序云皇儲監國餘辰勞謙終宴令以衲袍降賜賦云裁縫則萬壑縈體針縷則千巖映目埒符采於雕煥並芬芳於蘭菊袍之鮮麗可知史記江陵故郡都西通巴巫在巴武之東故曰東郡相南史何思澄少勤學工文為游廬山詩沈約見之大稱賞郊居宅新搆閣齋因命工人題此詩於壁辭謝靈運山居賦巻扣舷之逸曲感江南之哀嘆履楚有逺遊篇或曰逺遊履名洛神賦踐逺遊之文説桃花源記來此絶境箋世每至佳句華箋蜀也每欲孤飛去徒為百慮牽生涯已寥落國步尚一作乃迍邅衾枕成蕪没池塘作棄捐别離憂怛怛伏臘涕漣漣露菊斑豐鎬秋蔬一作菰影澗瀍共誰論平聲昔事幾處有新阡富貴空回首喧爭懶著陟畧切鞭兵戈塵漠漠江漢月娟娟局促看平聲秋燕蕭疎聽晚蟬雕蟲䝉記憶烹鯉問沉綿此段承前起後作通篇過峽每欲十句承杜曲一段傷故里難歸共誰十句承鄭李一段喜知交足慰百慮牽包下八句生涯愁在身國歩憂在國衾枕池塘無家可問矣别離悲弟妹㐲臘思祖父豐鎬澗瀍念及東西二京也又言故人凋謝如此巳亦懶於進取矣今託身兵戈江漢之間徒增局促蕭條耳幸䝉二公記問真舊交中不可多得者雪賦羨雲鳩之孤飛斯江淹詩撫枕懷百慮迍莊子吾生也有涯衾詩國歩頻蔡邕述行賦塗邅其蹇連兮錦角枕見毛詩體隋孫萬夀詩蓬萊雖巳變池塘尚所思吳越春秋骨棄捐詩勞心怛怛漢楊惲傳歲時伏臘風俗通曰臘者獵也獵取獸以祭祖先師古曰建丑之月為臘祭詩泣涕漣漣又作邑於豐又鎬京辟雍注鎬京在豐水之東相去三十五里獨周書我乃卜澗水東瀍水西張華詩昔事厯厯記坐向誰論曰風俗通阡謂之冡崔融詩京兆新阡闢烟世説劉琨常恐祖生先我着鞭王褒詩漠漠村起鮑照詩娟娟似娥睂子漢書局促如轅下駒不謝惠連詩蕭疎野趣生揚童子雕蟲篆刻壯夫為古詩呼童烹鯉魚中有尺素書漳王勣乆客病歸詩沉綿赴浦卜羨君平杖偷存子敬氊囊虚把釵釧米盡拆花鈿甘子隂凉葉茅齋八九椽陣圖沙北岸市暨音既瀼西巔羈絆心常折棲遲病即痊紫收一作秧岷嶺一作下芋白種陸池一作家蓮色好梨勝平聲頰穰多栗過拳勅􅌮惟一味求飽或三鱣俗異隣鮫室一云兒去看魚笱朋一作人來坐馬韉縳柴門窄窄通竹溜涓涓塹抵公畦稜去聲邨依野廟堧壖同而宣切缺籬將棘拒倒石賴藤纒此答二公之問備述居䕫秋况䕫鄭李必問及居處飲食故答詞獨詳卜羨四句州飲食甘子四句䕫州居室羈絆八句仍申飲食俗異八句仍申居室卜杖存氊生計艱難把釵折鈿藉供日用沙北瀼西乃甘隂結齋之處心折病痊答書中沉綿之問紫芋數者見物産之佳隣鮫既危坐韉復窘柴門之中唯存竹溜而巳抵畦依廟村居外景拒棘纒藤村居内景也而洙曰君平卜筮於成都得百錢足自養則閉肆下簾授老子阮宣子常步以百錢掛杖頭至酒店便得酣暢子敬氊見首巻釵釧見官軍臨賊濠詩庾肩吾詩縈環照鏡曉誰忍去花鈿桓南史顧初牽牛隂凉木下徐陵詩茅齋本自空温傳初諸葛亮造八陣圖於魚復平沙之上方原注峽人目市井泊船處曰市暨江水横通出谷處人謂之瀼晉載紀馬能千里不免羈絆山心折見别賦里詩衡門之下可以棲遲蹲貨殖傳岷之下沃野千下有蹲䲭至死不飢注䲭芋也蜀御覽任昉述異記吳中有陸家白蓮種顧家斑竹都賦紫梨津潤西京雜記上林苑有嶧陽栗嶧陽都尉曹龍所獻大如拳穰豐穰也一古隴西行談笑未及竟右顧勅中厨王羲之傳有味之甘割而分之堂論語食無求飽皆楊震傳有冠雀銜三鱣魚飛集講前謝承書鱣字作鱓然則鱣鱔古字通顔氏家訓孫卿云魚鼈鰌鱣韓非説苑皆曰鱣似蛇蠶似蠋並作鱣字假鱣為鱓其來乆矣按楊震傳三鱣音善所謂假鱣為鱓者也爾雅釋魚音知然反陸德明音義張連反即黄魚也此鱣鮪之鱣杜詩所謂三鱣也葢用楊震傳三鱣而兼取郭陸音釋未知當否吳曾曰以楊震碑考之則云貽我三魚以辯懿德稱鱓未必皆得其真也隣俗異猶云異俗居文選鮫人織絠於泉室當作俗異鮫室此段本言室不當插入魚笱詩敝笱在梁其魚魴鰥注笱以竹為之魚入其中其晉書范逵嘗過陶侃家時大雪乃撒所卧韉自剉給馬朱注舊注戰國策蘇秦激張儀令相秦以馬韉席坐之按朋來坐馬韉猶云坐客寒無氊也與蘇張事不合且舊注引國策藝文類聚又引史記今國策史記並無此文乃通竹溜涓涓即前野店引山泉但前是槩言䕫俗此專敘瀼居不妨一事兩用陶辭泉涓涓而始流云張耒曰公畦官園也原注京師農人指田逺近多幾稜稜岸也音去聲朱注按韻書稜字無去音葢方言也陸龜䝉詩我本曾無一稜田平生笑傲空漁船稜亦作去聲用内晁錯傳鑿太上皇廟堧垣師古曰堧者垣外遊地薛道衡詩卧石藤為纜借問頻朝音潮謁何如穩醉一作晝眠誰云行不逮一作達自覺坐能堅霧雨銀章澁馨香粉署妍紫鸞無近逺黄雀任翩翾困學違從衆明公各勉旃聲華夾宸極早晚到星躔懇諫留匡鼎諸儒引服舊作伏䖍不過平聲一作逢輸鯁直㑹是正陶甄宵旰憂虞軫黎元疾苦駢雲臺終日畫青簡為去聲誰編此因身既辭官望二公入朝以佐主居上十句公自述下十句朂鄭李朝謁不預則起自適亦何羨章署之榮乎所以黄雀卑飛唯知舊學而紫鸞高舉端屬明公矣朱注二公當勉為公輔之業引賢士進讜言以匡正天下今上方宵旰民多疾苦雲臺雖有功臣而青簡垂名非二公其誰屬耶蕭景宗詩借問霍去病何如路傍人此用其句法前沈佺期詩鷄鳴朝謁滿其南史朱百年飲酒醉眠漢公卿表銀章印龜鈕文曰章謂刻其官之章也又趙曰省謂之蘭者以諸郎官握蘭含香也故云馨香謂之畫省者以粉畫之也故云粉署華陳子昻詩驅馳翠虬駕伊鬰紫鸞笙之漢歌謡桂樹不實黄雀巢其顛鷦鷯賦育翩翾陋體兮嵩困學從衆俱出論語違衆謂不合時宜楊後漢皇甫傳嵩答董卓曰昔與明公俱為鴻鵠惲傳方當盛漢之隆願勉旃無多談旃語助詞非劉峻書聲華無寂殷仲文自解表宸極反正韓子無早晚之失也洙曰郎官象列星諸侯象四七宰相法三台皆星躔束晳詩星變其躔漢書日月初躔星之紀注躔舍也張匡衡傳諸儒為語曰無説詩匡鼎來匡説詩解人頥晏曰衡少時字鼎長乃易字稚圭西京雜記鼎衡小名業後漢儒林傳服䖍字子慎少以清苦建志入太學受善著文舉孝廉輸猶獻也荀子君有忠臣謂之骨鯁為揚子甄陶天下在和漢書音義陶家名樸下員轉者鈞以其制器為大小饋食禮纚笄宵衣左傳楚君大夫其旰食乎進易憂虞之象也漢孝經鈎命訣授圖子黎元劉琨勸表司牧黎元書問民疾苦載軫駢凑集之意取義於車馬也雲臺注別見文選劉向别録治竹青作簡書謂之青簡又見後漢吳祐傳行路難何有招尋興去聲巳專由來具飛檝暫擬控鳴弦身許雙峰寺門求七祖禪落帆追宿昔衣褐向真詮安石名高晉原注鄭高簡得謝太傅之風昭王客赴燕平聲宗原注李親有燕昭之美燕周之裔途中非阮籍查上似張騫披拂一作晤晉作豁雲寧在淹留景不延風期終破浪水怪莫飛涎他日辭神女傷春怯杜鵑淡交隨聚散澤國遶迴旋此欲出峽求禪與二公相晤於江陵承行路招尋為通節之綱飛檝二句承行路身許四句招尋安石四句欲訪二公亦承招尋披拂四句將赴荆門亦承行路他日四句去䕫留荆雙結行路招尋控鳴弦備不虞追宿昔遂初願也雙峯七祖言不落旁門小乗鄭比安石公則仰其名高李比燕昭公則願為燕客有地主可免途窮駕浮舟有似乗槎公詩窮途阮籍幾時醒又云奉使虚隨八月槎皆屬自言雲寧在景不延急於去䕫矣淡交指䕫人迴旋徃復於鄭李也飛古樂府有行路難控杜審言詩招尋獨有君海賦迅鼓檝西域傳弦者十餘萬按雙峯有兩處舊唐書道信與𢎞忍並住蘄州雙峯山東山寺故謂其法為東山法門姚寛西溪叢語引寶林傳云能太師傳法衣在曹溪寶林寺寶林後枕雙峯則曹溪亦稱雙峯矣周篆曰昔至嶺南見曹溪地形前對三峯後擁兩峯但不名雙峯寺傳七祖亦有兩𣲖達摩傳慧可可傳僧粲粲傳道信信𢎞忍此五祖也忍傳能大師是謂六祖其徒復以荷澤當七祖此南宗之餘裔也中岳越禪師記則云𢎞忍傳大通大通傳大照此北宗又竊附於六祖七祖也考能師既没法衣不傳則南宗七祖固失真傳而北宗上無承受篡名兩祖尤為謬種矣詩云門求七祖禪意葢主於南宗也師氏曰自達摩至慧能謂之中華六祖六祖之道至肅宗時方盛肅宗甞自曹溪請其衣鉢供養是六祖與子美同時先後人也故求禪言七祖而不言六祖何遜詩解纜及朝風落帆依暝浦謝莊子孰居無事而披拂是期楚辭蹇淹留而無成靈運詩尋異景不延風恐是言風信虞世基詩伊昔風期早怪南史宗慤曰願乗長風破萬里浪孔子世家水之龍罔象也江賦揚鬐掉尾噴浪飛涎交神女注見前國蜀都賦鳥生杜鵑之魂定記君子之淡若水澤見周禮史記漢長沙王曰國小地狹不足回旋本自依迦葉音攝何曾音層藉偓佺罏峰生轉眄橘井尚高褰東走窮歸鶴南征盡跕都牒切鳶晚聞多妙教卒踐塞先則切前愆顧愷丹青列頭陀琬琰以冉切鐫衆香㴱黯黯幾地肅芊芊勇猛為心極清羸任體孱金箆空刮眼鏡象一云平等未離一云難銓此申上門求七祖禪以終詠懷之意迦葉偓佺言仙不如佛罏峯四句欲遍遊佛地晚聞六句欲精叅佛理勇猛四句期於懾象以歸空也此章十二句起十六句者兩段二十句者四段二十四句者兩段二十八句者一段彌勒成佛經彌勒佛讚言大迦葉比丘是釋迦牟尼佛大弟子傳燈録迦葉摩竭陀國人姓婆羅門為天竺二十五祖之首列仙傳偓佺槐山採藥父也食松實形體生毛數寸能飛行逐走馬嶺罏峯在廬山洛神賦轉盻流精朱注橘井在馬山上故云高褰天台賦游氣高褰褰開也曰遼東歸鶴見卜居詩注馬援傳援擊交阯謂官屬我在浪泊西里間下潦上霧毒氣薰蒸仰視飛鳶站站墮水中愆釋氏有妙覺之説故云妙教沈約懺悔文收遜前洗濯今慮於六祖曰懺者懺其前愆悔者悔其後過巾顧愷之常瓦棺寺畫維摩詰像姓氏英賢録王字簡栖為頭陀寺碑文詞巧麗為世所重大琬琰言如玉之貴楚辭懷琬琰之英華法華經擊法鼓燒衆名香天台賦衆香馥以揚烟乃何遜詩黯黯連嶂隂色決定經不捨初地入於二地至十地籍田賦碧肅其芉芊難張君祖詩練神超勇猛楞嚴經發大勇猛行諸一切行法事顧野王傳體素清羸鶴注法苑珠林後周張元其祖失明元讀經燃燈夢一翁以箆療之後三日果痊湼盤經如目盲人為治目故造諸良醫即以金箆刮其眼膜衡圓覺經諸如來心於中顯現如鏡中象朱注説文銓也一曰度也言金箆雖可刮去眼膜而執鏡象以為實有則猶未離銓量之間也補注許旌陽石函記從兹得作真詮客王嗣奭曰題屬詠懷故篇中詳於自敘而轉換穿插妙合自然唐人百韻詩杜公首倡句句精緻字字峭拔真千古獨擅之長頓盧世㴶曰此是集中第一首長詩其中起伏轉折挫承逓若斷若續乍離乍合波瀾層叠竟無絲痕真絶作也風流善價愜當忘筌即可取此語以評此詩張溍曰此詩才大而學足以副之故能隨意轉合曲折自如其忽自敘忽敘人忽言景忽言情忽紀事忽立論忽述見在忽及巳前皆過接無痕而照應有法洪容齋隨筆曰詩至百韻詞意既多故有失於檢㸃者此詩滿座涕潺湲與伏臘涕漣漣為重意張溍曰不敢墜周旋與澤國遶迴旋為重韻詩題詠懷寄友是賓主兩意此詩或分或合極開闔變化錯綜恣肆之竒而按以紀律却又結構完整刻本割裂段落多寡不勺幾於亂絲難理今分作十段每段各有起正各有承轉天然位置不容毫髪混淆此在讀者詳翫耳考詩有近體古意衰矣近體而有排律去古益逺矣唐人排律初帷六韻左右耳長篇排律起於少陵多至百韻實為後人濫觴元白集中徃徃叠見不免誇多鬬靡氣緩而脉弛矣此篇典雅工秀才學既優而部伍森嚴章法尤為精宻每短章詩斷處多用突接長排體則須用鈎挑之法段出落處回顧上文者為鈎逗起下文者為挑必層層連絡各有關合照應否則散漫不屬矣玩此詩逐段鈎挽挑逗俱見作法之巧寄劉峽州伯華使去聲君四十韻鶴注當是大厯二年在瀼西作唐書峽州夷陵郡屬山南東道峽内多雲雨秋來尚鬱蒸逺山一作天朝音潮白帝深氷謁一作出夷陵首言䕫峽相去之近蒸上二記時下二記地傅𤣥詩呼吸氣鬰何遜詩天暮逺山前州白帝在䕫州夷陵指峽趙曰謁對朝字為工遲暮嗟為客西南喜得朋哀猿㪅􅊭聲一作勞起坐落雁失飛騰伏枕思瓊樹臨軒對玉繩青松寒不落碧海濶逾澄此乃思念劉君賓主並敘哀猿二句自比為客瓊樹四句申言得朋瓊樹難見而空對玉繩望劉之切也青松比其勁節碧海比其寛量易西南得朋朱注䕫在中州之西南崙江淹賦願一見顔色不異瓊樹枝瓊樹玉樹也在崑山故難見謝朓詩玉繩低建章魏畧王昶曰松柏之茂隆寒不衰何敬祖詩青青嶺上松光色冬夏茂十洲記扶桑在碧海之中昔歲文為理當作治避唐諱也羣公價盡增家聲同令聞去聲時論以儒稱太后當一作臨朝音潮肅多才接迹昇翠虚捎所交切魍魎丹極上時掌切鯤一作鵾鵬宴引春壺酒一作滿恩分夏簟冰雕章五色筆紫殿九華燈學並盧王敏書偕褚薛能老兄真不墜小子獨無承此追遡先世淵源羣文為理唐初以文治世也公指當時才士家聲謂公祖審言令聞指劉祖允濟捎魍魎小人逺遁上鯤鵬賢士登朝宴引二句言寵遇之優雕章四句言才名之盛不墜無承引起下文周王褒傳不以地位矜物時論稱之詩令聞令望唐書劉允濟武后朝上明堂賦手詔褒美賦甘泉賦梢魍魎而抶獝狂注捎抶皆擊也王延夀夢捎魍魎拂諸渠莊子北溟有魚名曰鯤化而為鳥名曰鵬秋江淹詩夏簟清兮冬不暮三國典畧齊蕭慤嘗於夜賦詩邢子才曰蕭之斯文可謂雕章間出周史滕趙二王雕章間發南史江淹嘗宿冶亭夢一丈夫自稱郭璞謂淹曰吾有筆在卿處多年可以見還淹乃探懷中得五色筆一以授之謝朓詩紫殿肅隂隂漢武内傳七月七日西王母至帝掃除宮内然九光之燈西京雜記元日燃九華燈於終南山上照見百里盧王盧照鄰王勃褚薛褚遂良薛稷也胡震亨曰詳詩語其先當是劉憲也憲與公之祖審言同列文藝傳憲在則天時累官冬官員外郎審言亦為膳部員外郎是為接迹昇也憲常受詔推按來俊臣嫉其酷暴欲因事繩之反為俊臣所搆坐貶故云翠虚捎魍魎俊臣貶憲轉鳯閣舍人景龍中與審言同直修文館故云丹極上鵾鵬也朱注唐史二劉皆以來俊臣搆貶官後皆轉鳯閣直修文館但憲文名不甚著史稱審言雅善五言詩工書翰有能名此云學並盧王書兼褚薛以劉與審言並稱必屬允濟無疑也審言子并以手刃周季重被殺蘇頲為墓誌允濟為祭文則二公交契之厚可知矣稷新書薛稷傳初虞世南褚遂良以書顓家後莫能繼外祖魏徴家多藏虞褚書故鋭精臨倣結體遒麗遂以書名天下晉書劉裕曰老兄試為卿答近有風流作聊從月竁充芮切舊本訛作繼師作窟趙作峽徴放蹄知赤驥捩翅服蒼鷹巻軸來何晚襟懷庶可憑㑹期吟諷數音朔益破旅愁凝雕刻初誰料一作解纖毫欲自矜神融躡飛動戰勝洗侵陵妙取筌蹄棄高宜百萬層白頭遺恨在青竹幾人登此敘劉君詩才健上八望使君寄詩下八稱其詩學獨精捷如驥足比鷹揚其雕刻非可意料纖毫盡皆愜心蹄杜臆神融句謂文有生氣戰勝句謂文無敵手筌棄言妙悟百萬層言超出公於詩道白頭猶憾知名傳青簡者難矣以見劉能不墜而巳獨無承也於朱注此數句當與文賦叅看雕刻誰能料即籠天地形内挫萬物於筆端也纖毫欲自矜即考殿最於鐍銖定去留於微芒也神融躡飛動即精騖八極心遊萬仞也戰勝洗侵陵即方天機之駿利夫何紛而不理也妙取二句即形不可逐響難為繫孤立而特峙非常言之所緯也此按杜詩必有來厯不特用其字句而并融其神理於可以觸悟宋郊祀歌月竁來賓目際奉土注竁窟也趙曰恭州有明月峽今三峽中亦有之葢石壁一竅圓透見天其明如月故以名峽也按朱注月竁猶言月脇月窟草堂及郭本作竁較繼字為優又近志載夷陵州有明月峽作峽亦通列子周穆王有赤驥詩任昉為齊竟陵王行狀所造箴錦積成巻軸襟懷擁虚景文心雕龍吟諷者銜其山川張華莊子刻雕衆形而不為巧飛魏志獻帝策命纖毫之惡子文心雕龍延夀靈光合動之勢韓非子子貢見夏肥而問之子夏曰吾義戰勝故肥而史記炎帝欲侵陵諸侯莊子筌者所以取魚得魚忘筌蹄者所以取兎得兎而忘蹄注筌者積柴水中使魚依而食焉一云魚笱也蹄兎􅇢也又云兎弶也係其脚故云蹄陸機文賦恒遺恨以終篇青竹即青簡回首追談笑勞歌跼寢興年華紛已矣世故莽相仍刺史諸侯貴郎官列宿應平聲潘生一作安雲一作驂閣逺黄霸璽書增此言遭遇不同亦賓主並敘追談笑憶使君跼寢興公自嘆厯盡年華世故自知不堪用世矣雲閣承郎官璽書承刺史劉葢郎官而出為刺史者古詩談笑未及竟勞謝混詩信此勞者歌善曰韓詩伐木廢朋友之道缺者歌其事詩人伐木自苦其事故以為文何遜詩寢興從閒逸進庾信詩年華改歲隂以嵇康書世故繁其慮翟方奏曰古選諸侯賢者為州伯今部刺史居牧伯之位一州之統請罷御史置州牧其漢明帝曰官上應星宿出宰百里苟非其人民受殃散潘岳秋興賦序余以太尉椽兼虎賁中郎將寓直於騎之省高閣連雲陽景罕曜漢循吏傳二千石有治理效者輒報璽書勉厲增秩賜金乳贙音畎號平聲攀石饑鼯訴落藤藥囊親道士灰刼問胡僧憑乆烏皮拆一作綻簪稀一作間白一作皁帽稜林居看蟻穴野食待一作行一作幸魚罾筋力交彫喪去聲飄零免戰兢皆一作昔一作旹為百里宰正似六安丞此序客䕫近况見乳贙飢鼯觸景無聊藥囊憐身病刼灰憂世亂憑乆身衰簪稀言性懶無事故看蟻近水故待魚筋力二句言垂老飄泊之狀亦朱注言我亦為郎官縣皆出宰百里今飄零若此是六安丞之見貶斥耳趙云公出為華州司功故用六安丞事亦通但於百里宰難貫舊注以乳贙二句屬公自况於上哀猿落雁犯重盧注以贙號比豪强斂迹鼯訴比窮民待澤涉劉公言失之太鑿今皆不取爾雅贙有力注出西海大秦國似狗多力獷惡不張正見詩飢鼯落劍鋒志神仙傳壺公賣藥市中口二價所治皆愈曹毗怪漢武帝穿昆明池極㴱悉是灰墨無復土以問東方朔曰臣愚不足以知之可問西域僧後漢明帝時外國道人來洛陽有憶朔言者試以灰墨問之其人曰經云天地大刦將盡則刦燒此刦燒之餘也朱注按髙僧傳西域國人乃竺法蘭臆世説韓康伯母隱古几毁壞烏皮几見十三巻杜凡戴冠必先簪髮惟懶事稀簪故帽稜如故通典宋時制高屋白紗帽宋明帝紀建安王休仁以白㡌代之齊和帝紀百姓皆着下屋白紗帽易林蟻封户穴大雨將集舊晉歡聞變歌張罾不得魚兀櫓罾空歸陸機樂府交皆彫喪詩戰戰兢兢免戰兢不免戰兢也不後漢書桓譚諫用讖帝大怒出為六安郡丞意忽忽樂道病卒注六安郡故城在今夀州安豐縣南姹女縈新裹丹砂冷舊秤但求椿夀永莫慮杞天崩鍊骨調情性張兵撓棘矜養生終自惜伐叛趙氏作叛草堂本作數必全懲政術甘疎誕詞塲愧服膺展懷詩誦一作頌魯割愛酒如澠此敘寄詩本意故杜臆公因多病與道士講修煉之術言姹女丹砂椿夀永承上藥囊杞天崩承上刼灰錬丹養生又承夀永張兵伐叛又承天崩公託身世外故求服藥永年不必懷杞人之慮劉身任民社則衛生固所宜講而懲亂皆其職分也張逺注時蜀寇未靖故有張兵伐叛等語政術詞塲二句必劉曾以此推服故答云政甘疎誕而詞愧服膺詩酒所以遣興於詩則誦魯推劉君為詩宗於酒則割愛時以消病斷飲也注杜臆自孔子删詩詩宗於魯稱劉詩得其正宗也朱謂公作詩以贈使君猶史克之頌魯侯前説作誦後説作頌兩意不同今從前説縈新裹新錬藥也冷舊秤棄舊丹也裹砂以養火必秤量其輕重垢魏伯陽叅同契河上姹女靈而最神得火則飛不染塵又曰丹砂木精得金乃并漢真人大丹訣曰姹女隱在丹砂中注姹女汞也庾莊子上古有大椿者以八千歲為春八千歲為秋晉闡詩椿夀自有極欲列子杞國有人憂天地崩墜身無所寄草朱注謂多戕生猶將兵伐性將二句作借喻又依堂本作伐數因解為尅伐年數終覺牽强涉庾闡詩赤松游霞乗烟封子錬骨凌仙徐欒傳陳起窮巷奮棘矜師古曰棘㦸也矜者棘之把秦銷兵器故但有戟之把耳嵇康有養生論袁紹書奉辭伐叛潘岳西征賦思夫人之政術實幹時之良具左思𤣥賦潛服膺其永清兮江淹别賦割慈忍愛傳有酒如澠有肉如陵原注平生所好消渴止之咄咄寧書字㝠㝠欲避矰江湖多白鳥天地有青蠅以慨歎身世作結夫咄咄傷去官㝠㝠欲遯世白鳥比貪青蠅比讒人皆承避矰意各此章起結四句中腰八句前二段各十六句後二段十二句世説殷浩被廢在長安終日常畫空作字揚州吏人竊視唯作咄咄怪事四字而巳有揚子法言鴻飛㝠㝠戈人何簒焉杜修可曰白鳥二説一謂鷗鷺之類如詩言白鳥鶴鶴此喻賢者之㓗白也一謂白鳥乃蚊蚋以譬小人之侵侮也言賢者居亂世欲隱則為蚊蚋所噆欲出則為青蠅所汚是無逃於天地間矣朱注大戴禮夏小正丹鳥羞白鳥丹鳥丹良也白鳥蚊蚋也凡有翼者為鳥梁元帝納凉詩白鳥翻帷暗丹螢入帷明杜臆梁元帝金樓子云齊威公卧於柏寢白鳥營飢而求飽公開翠紗之厨而進焉有不知足者長嘘短吸而食及其飽腹為之潰葢戒貪也毛詩以青蠅刺讒正蔡夢弼曰韓昌黎詩蠅蚊滿人區可與盡力格寓意相同篇中用二矜矜無二音止有兩解一云矛柄音勤者作􅚙秋清鶴注當是大厯二年謀出峽時作故有末二句秋清與清秋不同清秋者秋氣肅清也秋清者謂身逢秋候得以清爽也高秋蘇肺一作病氣白髮自能梳藥餌憎加減門庭悶掃除杖藜還客拜愛竹遣兒書十月江平穩輕舟進所如首句總領下五句皆承肺氣蘇輕舟出峽言秋盡冬初之事憎加減嫌其無效悶掃除懶於應接答拜還須扶杖題竹仍遣兒書此摹寫病後情狀極肖意黄生注三四追述五六現前七八豫期進所如得遂中欲徃之處也藥内經無外其志使肺氣清此秋氣之應靈運詩餌情所止衰疾忽在斯易不出門庭謝後漢書陳蕃不好掃室客怪之蕃曰大丈夫當為國掃除天下莊子原憲杖藜應門世説王子猷嘗暫寄人空宅便令種竹曰何可一日無此君愛竹暗用此事以按趙云遣兒書謂題字竹上杜臆云遣兒代書乞竹栽二説不同今從前説楚辭世莫知其所如秋峽鶴注當是大厯二年東屯作江濤萬古峽肺氣乆衰翁不寐防巴虎全生狎楚童衣裳垂素髮門巷落丹楓常怪商山老兼存翊贊功江峽衰翁首聯並提中二承江峽下四承衰翁狎萬古峽邊衰翁獨處起語不寒而慄夜須防虎晝宜童物性人情蓋種種可畏矣且素髪老人對此丹楓零落暮年秋景萬事灰心若商山四皓老立功名常怪其精力過人也趙曰作客逺方雖童稚亦須親狎欲免猜忌以全生耳杜臆楚童與巴虎並觀則難狎等於防虎矣末聨乃自傷筋力之衰非譏刺四皓之出賦詩寤言不寐領楊德周曰狎楚童謂樵採也秋興素髪颯以垂淮南子何謂七舍室堂庭門巷術野謝靈運詩曉霜楓葉丹揺落鶴注當是大厯二年作是年九月吐蕃寇邠州靈州京師戒嚴故云烟塵多戰鼓揺落巫山暮寒江東北流煙塵多戰皷風浪少行舟鵝費羲之墨貂餘季子裘長懷報明主卧病復扶又切高秋上四對景傷時下則自寫心事也於巫山秋暮而一望烟塵則欲留不可江水自流而沮風浪則欲去不能今但親翰墨而攬寒裘亦何救於國事乎雖有報主宿心徒託諸秋山卧病而巳報明主此公一生大志復高秋見在䕫已厯兩秋矣雜何遜詩寒江復寂寥之庾信詩寒風戰鼓鳴西京記船隨風浪莫知所顧注公詩九齡書大字有作成一囊公本善書故自比羲之戰國策蘇秦仕趙趙王負貂裘黄金使説秦書十上而説不行黒貂之裘敝宋之問詩卧病人事絶峽隘鶴注當是大厯二年有意出峽而作杜臆公心欲出峽故覺其隘也聞説江陵府雲沙静一作淨眇然白魚如切玉朱橘不論平聲錢水有逺湖樹人今何處船青山各一作若在眼却望峽中天上四想江陵之勝下歎峽隘難居也江雲沙思其風景魚橘思其物産逺湖樹遥指陵人何處想及弟觀也青山各在眼前而却仍望峽天恨出峽之不早耳盧注初云聞説欲徃而未得徃末云却望不欲留而却留也江陵即荆州峽中石窄須仰望乃見天光又云時公弟觀歸藍田迎婦望其早至江陵故曰人今何處船乃杜臆青山各在眼正對其人言䕫舊謂人今何處船自歎滯迹䕫州青山各在眼謂州江陵各有青山今從盧説為當杜詩詳註巻十九
