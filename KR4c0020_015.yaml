body:
  text: 杜詩詳注卷十五翰林院編修仇兆鰲撰移居夔州作或為郭書黃鶴注此大厯元年春晚作唐夔州雲安屬山南東道寰宇記夔州雲安縣上水去夔州奉節縣二百四十三里伏枕雲安縣遷居白帝城春知催栁别江與一作已放船清農事聞人説山光見鳥情禹功饒斷石且就土微平首二記行蹤二四承雲安言臨去時景五六承白帝言遷後景事末言移居之故春知别意江與清波此從無情處看出有情農事方興春已暮矣鳥悅山光春氣暖也多斷石謂雲安以下土微平見夔州可居杜臆農事聞人説便有為農意後果有瀼西督耕之舉與張溍注因灞橋贈别故事遂用春栁催别但春知江二語後人用之易涉於纖空宋之問詩春遲栁暗催出常建詩山光悅鳥性潭影人心為殷璠首推不知於少陵也杜臆見鳥情屬人悅鳥性屬鳥蓋左傳見河洛者思禹功水經注廣溪峽乃三峽之首自夏禹疏鑿以通江者少王洙注沿峽皆因開鑿而成故平土惟夔州稍平耳黃庭堅曰好作奇語自是文章一病但當以理為主理得而辭順丈章自然出羣拔萃觀子美到夔州後詩退之自潮州還朝後文皆不煩繩削而自合矣朱子語録人多説子美夔州詩好此不可曉夔州却説得鄭重煩絮不如前此有一節詩好今人只見魯直説好便都説好矮人看場耳陶開虞曰杜五律有偶然失檢者如移居詩云春知催栁别農事聞人説别説同韻與王摩詰新豐樹裏行人度聞道甘泉能獻賦度賦同韻皆犯上尾學者不可不知船下去聲夔州郭宿雨濕不得上上聲岸别王十二郭作二十判官鶴注大厯元年春晚自雲安遷居夔州時作郭宿宿於雲安郭外王判官蓋在雲安也依沙宿舸船石瀨月娟娟風起春燈亂江鳴夜雨懸晨鐘雲岸晉作岸一作外杜臆作徑濕勝地石堂煙一作偏柔櫓與櫓同輕鷗外含悽一作情覺汝賢上四宿郭遇雨夜中之景五六岸濕難上早起之景末因不得面别而留詩致王薄張逺注宿船見月忽而風起雨懸直至鐘響煙生從暮至平明景象厯厯清出晨鐘勝地略讀鷗風起句下因上江鳴句上因下判杜臆柔櫓相送輕伴行櫓鷗之外但覺汝賢此感官之厚亦愴人情之薄辭方言江湖凡大船曰舸月爾雅水流沙石上曰瀨楚石瀨兮淺淺鮑照玩詩娟娟似蛾眉雨雨落江鳴勢如懸瀑寫景刻畫長之霖霖庾信詩山寺響晨鐘蔡雍霖雨賦懸雲外方𢎞靜定為雲磴王嗣奭杜臆定為雲徑今依晉本作雲岸與題相合薛道衡詩石濕曉雲濃江總詩名山極厯覽勝地殊流連字者少理會趙曰石堂夔州佳處謝煙是晨景作偏古詩柔櫓鳴深江朓詩含悽泛廣川於或以汝賢指鷗鳥别王之意不合漫成一首鶴注此是雲安發船下夔州時作江月去人只數尺風燈照夜欲三更平聲沙頭宿鷺聨拳靜一作起船尾跳平聲魚撥方割切一作潑一作跋刺力達切鳴四句寫夜景一逺一近説見江月謂江中月影風燈謂風檣挂燈宿鷺靜岸邊所跳魚鳴水中所聞聨拳羣聚貌撥刺跳躍聲月梁劉瑗詩月光移數尺方知夜已深而謝莊玩詩水鷺足聨拳謝靈運賦魚水深撥刺客堂杜臆謂客堂與客居不同繫之大厯元年夔州詩內憶昨離去聲少去聲城而今異楚蜀捨舟復扶又切深山窅窕一林麓首敘行蹤此客堂所山居也山杜臆客堂非何客居客居前江後山此云深林麓見别是一所當是移夔後作故云捨舟復深山與遷居詩且就上微平合而栖泊雲安乃追述往事其云舊疾載來言舟至夔州也為成都為蜀夔州楚棲泊雲安縣消中內相毒舊疾甘一作草載一作戴一再作戰一作來衰年得無足一作得弱足一作弱無足死為殊方鬼頭白免短促老馬終望雲南雁意在北别家長子兩切兒女欲起慚筋力此敘客堂旅况念客居老病縱死亦非夭折但思鄉切無異老馬南雁耳長兒女作客已久慚筋力欲歸弗能矣徒疾而曰甘衰而曰足蓋以不死為幸也風俗通司祝恬道得溫病友人謝著不通因載病而去古詩代馬思朔雲客堂序節改具物對羈束石暄蕨芽紫渚秀蘆笋緑巴鶯一作稼紛未稀徼一作要麥早向熟悠悠日動江漠漠春辭木此感客堂時景句節換物新領下六朱注鶯未稀而麥向熟正春去夏來之時次公云鶯當作稼未然後漢延篤書昧爽櫛梳坐於客堂李義府詩節序催難駐山崔融詩具物昔未改色羈束旅困也陸璣詩疏蕨菜初生似蒜莖紫墨可食如葵謝靈運詩野蕨漸紫苞今爾雅注葭一名蘆菼一名薍薍或謂之荻郭云江東人呼蘆笋為虇臺郎選去聲才俊自顧亦已極前輩聲名人埋沒何所得居然綰章紱受性本幽獨平生憩息地必種數竿竹事業只濁醪營葺但草屋此憶成都往事前郎官本取才俊得此為極榮矣彼輩聲名埋沒不少今何幸身綰章服乎無如性喜幽獨不耐供職而謝官耳平生四句即幽獨之興杜臆種竹葺屋亦追敘前事非謂此客堂也一朱注漢官儀尚書郎初從三署郎選詣尚書臺試每郎闕則試五人先試箋奏初入臺稱郎中滿歲稱侍郎孔融薦禰衡表路粹嚴象以異才擢拜臺郎杜氏通典龍朔二年改尚書省為中臺後復為尚書省亦謂之省臺不章紱謂所服緋魚涵晉書王子猷所居必種竹自云可一日無此君申光曰公之種竹出自髙人性情非效子猷也上公有記者纍上聲奏資薄祿主憂豈濟時身逺彌曠職修一作循文廟算正獻可天衢直尚想趨朝廷毫髮禆社稷形骸今若是進退委行色末思歸朝以報主也耳目嚴公奏授一官常以主憂為念惜乎身逺而職曠今廟堂正直欲還京以圖禆益其如形骸衰罷何進退兩難徒委之行色而已病修文指君獻可指臣杜臆客居傷世亂客堂傷已形骸今若是與舊病草載來首尾相應鄭此章起四句中八句前後三段各十句嚴武曾封國公故曰上公記謂記念舊交後漢許后傳曠職尸官而杜篤傳修文則財衍行武則士要孫武子兵未戰廟算勝者得算多也左傳晏子曰君所謂可而有否焉臣獻其否以成其可君所謂否而有可焉臣獻其可以成其否曹植詩閶闔開天衢引水鶴注大厯元年至夔州作山魯訔曰夔俗無井以竹引山泉而飲蟠窟腹間有至數百丈者月峽瞿唐雲作頂亂石崢嶸俗無井雲安沽水奴僕悲魚復移居心力省白帝城西萬竹蟠接筒引水喉不乾音干人生流滯生理難斗水何直百憂寬此為夔俗引水而作也夔州取泉勝於雲安沽水但旅况艱難一水未足以解憂耳上下兩韻分截寰宇記三峽謂巫峽巴峽明月峽惟明月峽在利州綿谷縣界又云明月峽在渝州巴縣東八十里華陽國志巴郡江州縣有明月峽即此水經注江水又東徑廣溪峽峽中有瞿唐黃龕二灘夏水回復泝沿所忌雲作頂言地髙接雲鶴曰夔與雲安有鹽井而罕有鑿井汳泉者五酉陽雜俎雲安井自大江泝别派凡三十里近井十里澄清如鏡舟楫無虞近江十五里皆灘石險惡難於沿泝天師翟乾祐於漢城山上結壇考召迫命羣龍諭以灘波之險使皆平之一夕之間風雷震擊十四里盡為平潭惟一灘仍舊龍亦不至乾祐復嚴敕神吏追之又三日一女子至曰某所以不來者欲助天師廣濟物之功耳雲安之貧民自江口負財貨至近井潭以給衣食者衆矣今若輕舟利涉平江無虞即貧民無傭負之所絶衣食之路余寧險灘波以瞻傭負不能利舟楫以安富商也乾祐善其言使諸龍皆復其故風雷頃刻而長灘如舊人洙曰漢地理志魚復屬巴郡古庸國左傳文十年魚逐楚師是也水經注江水又東徑魚復縣故城南故魚國也魚復即唐奉節縣屬夔州白帝城在夔州府治東五里莊子期斗升水之活當盧照鄰詩賴此百憂寬何直言不得寬憂也示獠魯皎切奴阿段鶴注前有引水詩此亦同時所作獠奴公之𨽻人以夔州獠種為家僮耳次困學記聞北史獠者南蠻别種無名字以長幼第呼之丈夫稱阿謨阿段婦人稱阿夷阿等之類皆語之次第稱謂也山水蒼蒼落日曛竹竿裊裊細泉分郡人入夜爭餘瀝豎一作稚子尋源獨不聞病渴三更平聲回白首傳聲一注濕青雲曾音層驚陶侃胡奴異怪爾常穿虎豹羣此為獠童引泉而作也上四引泉之事下則泉至而喜圖生注爭瀝不聞而尋源則往視世之狃小利而忽逺避獨勞而諉公事者其賢逺矣故詩特表之淳溍注傳聲一注狀其從髙下注也詩籊籊竹竿于髠曰持酒於前時賜餘瀝流溫子升詩傳聲遞響何凄涼西張九齡望瀑布詩灑濕行雲此詩濕青雲本之王母吟虎豹為羣烏雀與處顧炎武曰子美久客四方未必盡擕經史一時用事不免有誤陶侃胡奴蓋謂士行有胡奴可比阿假胡奴乃侃子範小字非奴也或曰當作陶峴胡奴事見甘澤謠澤州陳冡宰廷敬曰陶侃奴見偽蘇注及劉敬叔異苑薛夢符已辨其妄謬然其事卒不知所出舊有臆解陶侃或是陶峴峴彭澤之孫浮遊江湖與孟彥深孟雲卿焦遂共載人號水仙有崑崙奴名摩訶善泅水後峴投劍西塞江水命奴取久之奴支體磔裂浮於水上峴流涕回棹賦詩自敘不復遊江湖峴既公同時人其友又公之友異事新聞故公用之耳陶奴入水卒死蛟龍公奴入山宜防虎豹事相類侃峴音相近但峴事僻人因改作侃也公嘗以時人姓名入詩如李白雲卿之類乂傳寫訛謬如周顒作何顒之類此説或亦可存上上聲白帝城鶴注此當是大厯元年初至夔州時作王彥輔曰周魚復國秦置巴郡漢公孫述僭偽更曰白帝城唐改夔州十道志述稱白帝以據西方色尚白也荆國圖經白帝城西臨大江東南髙二百丈西北髙一千丈水經注白帝山城周回二百八十步北緣馬嶺接赤岬山其間平處南北相去八十五丈東西七十丈又東傍瀼溪即以為隍西南臨大江瞰之眩目唯馬嶺小差逶迤猶斬山為路羊腸數轉然後得上全蜀總志白帝城在夔州府治東五里下即西陵峽口大江漰騰澎湃信楚蜀咽喉大劉禹錫夔州刺史廳壁記夔初城於瀼西後周總管龍門王述登白帝嘆曰此竒勢可居遂移府於今治所隋初楊素以越公領大總管又張大之城峻隨天壁樓髙望一作更女墻江流思夏后風至憶襄王老去聞悲角人扶報夕陽公孫初恃險躍馬意何長上四登城懷古下四登城感時曰隨天壁依山建城也臨墻遙望起下二句楊德周提出夏禹楚襄便足壓倒公孫子陽引出公孫躍馬又足折倒崔旰之徒妙在不直貶公孫而譏刺見於言外尤為微婉黃生曰老去人扶寫題中上字正見作者登臨慿弔之槩若無五六則題意不完而詩人胸次眼光俱不出矣詩有悲角句故知公孫當指崔旰也髙杜臆意何長言雖負雄心而不能久據天壁謂壁插天宋之問詩崖口衆山斷嶔岑聳天壁之釋名城上垣謂之女墻言其卑小比之於城如女子於丈夫古今注女墻城上小墻亦名睥睨功郭璞江賦巴東之峽夏后疏鑿左傳見河洛者思禹風賦楚襄王遊於蘭臺之宫有風颯然而至王乃披襟當之曰快哉此風討詩度其夕陽亂後漢書公孫述字子陽更始時起兵宗成王岑之破之遂有蜀土僭立為帝都成都色尚白改成都郭外舊倉為白帝倉築城於魚復號曰白帝城述立十二年為光武所滅向蜀都賦臨谷為塞因山為障一人守隘萬夫莫所謂恃險也又云公孫躍馬而稱帝上上聲白帝城二首黃鶴編在大厯元年蓋再登白帝城而作也故云一上一回新江城含變態一上上聲一回新天欲今朝雨山歸萬古春英雄餘事業衰邁久風塵取醉他鄉客相逢故國人兵戈猶擁蜀賦斂強丘兩切一作尚輸秦不是煩形勝深愁一作慙畏損神首章咏白帝城上四敘景下八感懷與雨意含春所謂變態一新也公流落風塵方故鄉人飲酒登眺忽見輸餉赴京者不覺觸目生愁因歎云我非厭煩此間形勝特以愁來之故怕損神而却步耳公之關心民瘼如斯以杜臆英雄餘事業謂此世界英雄儘有事業可為惜衰邁久混風塵耳亦因形勝而作此語觀兵戈蜀有崔旰之亂賦斂京師經吐蕃故也瑾楚辭南人之變態何遜詩一上一惆悵唐高詩相看會取醉寧知還路賒兵庾信詩誰言舊國人到在他鄉别吳越春秋欲興戈以誅暴楚劉向新序晉文公曰孤多賦斂重刑罰劍閣銘形勝之地非親勿舉盧世㴶曰此詩起四句見天地之心知雨暘之性窮新舊之變領山水之神俱能朗朗寫出余謂登髙而開道眼者此也為唐子西文録少陵秦中記行詩如江間饒竒石未極勝到暝色帶逺客則不可及已上白帝城詩云天欲今朝雨山歸萬古春蓋絶唱也豫惠州詩亦云雨在時時黑春歸處處青又云片雲明外暗斜日雨邊晴山轉秋光曲川長暝色橫皆間中所得句也白帝空祠廟孤雲自往來江山城宛轉棟宇客徘徊勇略今何在當年亦壯哉後人將酒肉虛殿日塵埃谷鳥鳴還過林花落又開多慙病無力騎馬入青苔次章咏白帝廟上八廟中弔古下四撫景自傷今公於先主武侯説得英爽赫奕千載如生此云勇略何在當年亦壯哉歎其隨死而俱泯也勝杜臆病無力何足為慚亦對勇壯而云然耳方輿覽白帝廟在奉節縣東八里舊城內援鮑照詩宛轉燭回梁也馬傳才明勇略非人敵陪諸公上上聲白帝城頭一作樓宴越公堂之作鶴注編在大厯元年春晚作孫原注越公楊素也有堂在城上畫像尚存李貽夔州都督府記白帝城東南斗上二百七十步得白帝廟又有越公堂在廟南而少西隋越公素所建竒構隆敵內無撑柱敻視中脊邈不可度五逾甲子無土木之隙見其人之瓌傑也朱注詩言柱穿棧缺而記云無土木之隙疑記語未足信此堂存古制一作製城上俯江郊落構垂雲雨荒階蔓草茅柱穿蜂溜蜜棧缺燕添巢上詠越公堂景其落構屋簷頽落垂雲雨言髙蔓草茅言其荒蜂溜蜜春氣融燕添巢新入堂也鮑照詩江郊靄微明朱注閣木曰棧坐接春杯氣心傷艷蘂梢英靈如過隙宴衎願投膠莫問東流水一作水清淺生涯未即拋下詠陪宴情事當艷蘂易謝起英靈過隙宴衎投膠及春歡飲生涯未拋不能舍夔州而東下也隙此章上下各六句衎莊子人生天地間若白駒之過詩嘉賓式燕以古樂府以膠投漆中誰能别離此白帝城最髙樓鶴注此亦大厯元年作題曰最髙樓則非前所賦白帝城樓與白帝樓也城尖徑仄舊作昃非一作翼旌斾愁獨立縹眇之飛樓峽坼雲霾龍虎卧一作睡江清日抱黿鼉遊扶桑西枝對一作封斷石弱水東影隨長流杖藜嘆世者誰子泣血迸空回白頭首寫樓髙次聨近景三聨逺景皆獨立所想見者末乃感慨當世尖城角也徑步道也旌斾亦愁言其髙而且險也清韓廷延云雲霾坼峽山水盤拏有似龍虎之卧日抱江灘石波蕩恍如黿鼉之遊與江光隱見黿鼉窟石勢參差烏鵲橋同一句法皆登髙臨深極形客疑似之狀耳朱注峽之髙可望扶桑西向江之逺可接弱水東流與朱崖著亳髮碧海吹衣裳同義海賦神仙縹眇庾信詩暗石疑藏虎磐根似卧龍曹植詩東觀扶桑曜西臨弱水流是正言東西也此詩扶桑西枝是就東言西弱水東影是就西言東山海經大荒之中暘谷上有扶桑十日所浴居水中有大水九日居下枝一日居上枝禹貢弱水既西淮南子弱水自窮石注窮石在張掖北其水弱不能出羽字阮籍詩所憐者誰子丁儀寡婦賦涕流迸以琳琅書迸散走也王嗣奭曰此詩真作驚人語是緣憂世之心發之以自消其壘塊歎世二字為一章之綱泣血迸空起於歎世以迸空寫髙樓落想尤竒樓黃生曰城尖徑仄與花近髙樓寓慨一也花近髙以傷心而直陳其事城尖徑仄以泣血而微見其辭直陳其事不失和平溫厚之音微見其辭翻成激楚悲壯之響若以本集較之花近髙樓正聲第一城尖徑仄變聲第一子又曰拗律本歌行變體故次句得用之字鄭縣亭澗之濱亦然甚東自扶桑西及弱水所包世界濶故下有歎世句武侯廟鶴注此指夔州之廟故云空山草木長當是大厯元年作張震武侯祠堂記唐夔州治白帝武侯廟在西郊生張溍曰此處兩絶句足盡武侯一心事遺廟丹青落一作古空山草木長猶聞辭後主不復扶又切卧南陽上二詠廟下二武侯馳朱注此詩後二語人無解者武侯為昭烈驅未見其忠惟當後主昏庸而盡瘁出師不復有歸卧南陽之意此則雲霄萬古者耳曰猶聞者空山精爽如或聞之也王逸魯靈光殿賦託之丹青軍陶潛詩孟夏草木長興五年亮率諸北駐漢中臨發上表蜀志後主建又徐庶謂先主曰諸葛孔明卧龍也將軍豈願見之乎西蜀志注漢晉春秋云亮家於南陽之鄧縣在襄陽城二十里號曰隆中荆州圖副云鄧城舊縣西南一里隔沔有諸葛亮宅是漢昭烈三顧處一曰南陽是襄陽墟名非南陽郡也八陳圗鶴注此當是大厯元年初至夔州時作州寰宇記八陳圖在奉節縣西南七里荆圖副云永安宫南一里渚下平磧上有孔明八陳圖聚細石為之各髙五尺廣十圍厯然碁布縱橫相當中間相去九尺正中開南北巷悉廣五尺凡六十四聚或為人散亂及為夏水所沒冬時水退復依然如故功蓋三分國名成八陳圖江流石不轉遺恨失吞吳江流石不轉此陳圖之垂名千載者所恨吞吳失計以致三分功業中遭跌挫耳下二句用分應東坡志林嘗夢子美謂僕世人多誤會吾八陳圖詩以為先主武侯欲與關公報仇故恨不能滅吳非也吾意本謂吳蜀唇齒之國不當相圖晉之能取蜀者以蜀有吞吳之志以此為恨耳朱注史昭烈敗秭歸諸葛亮曰法孝直若在必能制主上東行就使東行必不傾危觀此則征吳非孔明意也子美此詩正謂孔明不能止征吳之舉致秭歸挫辱為生平遺恨東坡之説殊非劉逴曰孔明以蓋世竒才制為江上陳圖至今不磨使先主能用其陳法何至連營七百里敗績於猇亭哉欲吞吳而不知陳法是則當時之遺恨也今按下句有四説以不能滅吳為恨此舊説也以先主之征吳為恨此東坡説也不能制主上東行而自以為恨此杜臆朱注説也以不能用陳法而致吞吳失師此劉氏之説也州蒯通傳功蓋天下者不賞出師表今天下三分益罷弊樂毅書蚤知之士名成而不毁方舊注陳勢八天地風雲飛龍翔鳥虎翼蛇盤也湛生詩盻江流兮洋洋詩我心匪石不可轉也正後漢王常傳死無遺恨蜀志却釋譏吞嚼八區附考東坡志林諸葛造八陳圖於魚復平沙之上壘石為八行相去二丈桓溫征譙縱見之曰此常山蛇勢也文武皆莫識吾常過之自山上俯視百餘丈凡八行為六十四蕝蕝正圜不見凹凸處如日中蓋影及就視皆卵石漫漫不可辨甚可怪也八劉禹錫嘉話録夔州西市俯臨江沙下有諸葛亮陳圖聚石分布宛然猶存峽水大時三蜀雪消之際􅐓湧滉漾大木十圍枯槎百丈隨波而下及乎水落川平萬物皆失故態諸葛小石之堆標聚行列依然如是者近六百年逮今不動成都圖經武侯八陳有三在夔者六十有四方陳法也在彌牟鎮者二十有八當頭陳法也在棋盤市者二百五十有六下營陳法也承嘉薛氏云武侯之圖可見者三一在沔陽之髙平舊壘一在廣都之八陳鄉一在魚復永安宫南江灘水上在髙平者自酈道元已言傾褫難識在廣都者隆土為基魁以江石四門二首六十四魁八八成行兩陳俱立陳周四百七十二步其魁百有二十在魚復者因江為勢積石慿流前蔽壁門後依却月縱橫皆八魁間二丈偃月內面九六鱗差廣都舊無聞焉惟見於李膺益州記其言魁行皆八才舉其半趙撲成都記稱耆老之説云為江石兵數魁應六十四卦則知兩陳二首之意以體乾坤門戶法象之所由生也然其陳居平地東於門壁營陳之法具而竒正之道藴魚復陳於江路因水成形七八以為經九六以為緯體方於八陳形圓於却月壁門可以觀營陳之勢却月可以識竒正之變故雖長江東注夏流湍駛轟雷奔馬不足以擬其勢回山卷石不足以言其怒峩峩八陳實激其衝厯年千數未嘗回撓故桓溫以為常山之蛇杜甫偉其江流而不轉也革王昱曰陳勢八二革二金為天三革三金為地二三金為風三革二金為雲四革三金為龍三革四金為虎四革五金為鳥五革四金為蛇曉望白帝城鹽山鶴注謂大厯元年春作蓋以二年之春公已遷居赤甲矣杜臆詩題當作白帝城曉望鹽山倚水經注廣溪峽乃三峽之首其間三十里頽巖木山上有神淵淵北有白鹽崖髙可千餘丈俯臨神淵土人見其髙白故因名之方輿勝覽白鹽山在州城東十七里徐步擕斑杖看平聲山仰白頭翠深開斷壁紅一作江逺結飛樓日出清一作寒江望暄和散旅愁春城見松雪始擬進歸舟上四曉望之景下四望中之興其壁切山樓切城皆仰頭所見者斷壁開處見深翠飛樓結處見其逺紅此用倒裝法和杜臆城中見日初出從清江而望此山兼以日氣暄真足散旅人之愁旅人以即次為安謂其堪卜居也春城焉得有雪亦謂鹽山似之見此佳景而始擬進舟有不忍恝然之意後入宅詩云斷崖當白鹽又移東屯云白鹽危嶠北公蓋眷眷於此山矣此詩上四句整對下四句散行與早花詩同屬變化之格焬斑杖斑竹杖也梁到溉有贈任新安斑竹杖詩隋帝詩飛樓倚觀軒若驚杜臆地志白鹽山有夷溪夷水出焉水色清照十丈名為清江窮申涵光曰暄和散旅愁是客中情事此與陽和不散愁恨各有妙理山顔延之詩山明見松雪天歸舟本擬出峽今盻望鹽而特進舟也謝朓詩際識歸舟灧澦堆鶴注此當是大厯元年作時崔旰未寧故云干戈解纜寰宇記灧澦堆在夔州之西蜀江中心夏水漲半沒冬水淺出二十餘丈巨石一作積水中央江寒出水長沉牛答雲雨如馬戒舟航天意存傾覆音福神功接混茫干戈連解纜行止憶垂堂上六咏堆下二敘懷心舟人過此必沉牛以祭者蓋見堆溺如馬而有戒耳此皆天意所在欲使行舟者知所傾覆故造物神功特留此石以接於混茫水中也連解纜自成都雲安而下至夔州杜臆行則憂險止則憂亂皆有垂堂之慮可高唐賦巨石溺溺之瀺灂兮公詩云起檣必椎牛證沈牛為行舟而設子虛賦沈牛塵麋注沈牛水牛也此借用其字但義亦相通水牛所以稱沈牛者以其喜入水也公靈湫詩曾祝沈豪牛水祭法山林川谷丘陵能出雲雨見怪物者皆曰神經注廣溪峽中瞿塘灘上有神廟至靈驗商旅上下饗薦不輟以世説灧澦如象瞿唐莫上灧澦如馬瞿唐莫下峽人此為水候淮南子託於舟航之上神後漢鄧陟疏追觀前世傾覆之誡茫魏收詩導水逼功春秋繁露水則源泉混混茫晝夜不竭何遜詩解纜及朝風金謝惠連詩如何阻行止袁盎傳千之子坐不垂堂黃生曰此詩天道神靈人事物理貫穿爛熟又説得玲瓏宛轉自非腹笥與手筆兼具者不能道隻字俯視三唐獨步千古誠非偶然李祥長曰少陵夔蜀山水詩在劍閣以前皆五古在瞿唐以後多五律各盡山水之竒每讀一句令人如目見山水而又得山水之所以然總由源本深厚窺見廣大意無有窮極耳老病鶴注詩云老病巫山裏當是大厯元年夔州作蓋是年春晚方自雲安遷夔州老病巫山裏稽留楚客中藥殘他日裹花發去年叢夜足霑沙雨春多逆水風合分雙賜筆猶作一飄蓬老病稽留意用雙提藥殘句承老病花發句承稽留夜雨逆風難於出峽故有飄蓬之歎往日藥裹今用之已殘去年叢枝當眷而花發舊注謂公兩經花放者非公自去年秋方至雲安也合猶當也後漢書太原閔仲叔家居安邑老病家貧佺焦氏易林行者稽留降賜筆見十四卷赤管注沈期詩惠移雙賜筆恩五時衣近聞唐書永泰元年十月郭子儀與回紇定約共擊退吐蕃時僕固名臣及黨項帥皆來降大厯元年二月命楊濟修好吐蕃吐蕃遣首領論泣陵來朝此詩蓋記其事近聞犬戎逺遁逃牧馬不敢侵臨洮渭水逶迤白日靜隴山蕭瑟秋雲髙崆洞五原亦無事北庭數音朔有關中使去聲似聞贊普更求親舅甥和好去聲應平聲難棄此詩記吐蕃之修好也吐渭水隴山內地清靜崆洞五原邊外宴寧北庭使至蕃通和也鶴注通鑑與新舊史皆云永泰元年三月庚戌吐蕃請和詔宰臣元載杜鴻漸與吐蕃使同盟於唐興寺而不載請和之辭意是復來求親而史失之賈漢書胸奴聞漢兵大出老弱奔走驅畜産逺遁逃誼過秦論胡人不敢南下而牧馬鶴注臨洮唐郡名而岷州亦有臨洮皆屬隴右舊史寶應元年十二月吐蕃陷臨洮通鑑廣德元年十二月入大震關盡取隴右之地京兆有渭南縣唐志隴山在渭州西南隴山有六盤關西北五里有吐蕃會盟壇崆洞占原州岷州五原謂鹽州也遊唐書鹽州五原郡屬關內道元和郡國志五原者龍原乞地千原青嶺原岢嵐貞原橫槽原言朱注地志崆洞有三此與五原並舉當指在平涼者之五原今榆林地直長安西北與靈州接壤先是僕固懷恩自靈州合吐蕃回紇入寇今吐蕃敗走故崆洞五原皆無事也通鑑北庭節度統瀚海天山伊吾三軍屯伊西二州境號薛夢符曰吐蕃傳其俗謂強雄者曰贊大夫曰普故君長曰贊普唐書貞觀十五年文成公主下降吐蕃景龍二年金城公主復降吐蕃開元二年贊普乞和親上書言許與通聘即日舅甥如初負薪行鶴注此及下章當是大厯元年初至夔州時見其習俗而作史滑稽傳負薪而食夔州處上聲女髮半華四十五十無夫家更遭喪去聲亂嫁不售一生抱恨長一作堪咨嗟此傷夔女之愆期不嫁者杜臆喪亂嫁不售蓋男子陳亡無娶者鍾白帖處女室子也售類苑無鹽女姓離名春貌醜嫁不土風坐男使女立男一作應當門户英華作應門當户女出入十有一作猶八九負薪歸賣薪得錢應一作當供給至老雙鬟一作環只垂頸野花山葉銀叉並筋力登危集市門死生射音石利兼鹽井此備敘夔女之苦而杜臆登危採薪集市賣錢以供給一家且不顧死生兼負鹽井其勞苦極矣然野花山葉比於銀叉則當之者以為固然而忘其苦矣此尤可悲也陸機詩土風清且嘉傅玄豫章行男兒當門戶墮地自生神古詩健婦持門户亦勝一丈夫多吳越春秋鬻薪之女陸遊入蜀記峽中負物賣率婦人未嫁者為同心髻髙二尺插銀叉至六隻後插象牙梳如手大抱朴子登危涉險蜀都賦乘時射利財豐巨萬面粧首飾雜啼痕地褊衣寒困石根若道去聲巫山女粗醜何得北一作此有昭君村此見其形容困悴而為憫惜之辭鶴注負薪行言夔州之女故以昭君村結之依詩三韻分為三段最能行杜臆劉須溪以最能為水手之稱良是峽中丈夫絶輕死少在公門多在水富豪有錢駕大可舟加我切貧窮取給行艓音葉子此譏夔人之冒險趨利者唯少公門不為胥吏多在水習行舟門東觀漢記吳漢勤勤不離公門文選注公門職事之也方言南楚江湖湘凡船大者謂之舸朱注杜田補遺艓小舟名言輕如葉也切韻玉篇並不載按王智深宋記司空劉休範舉兵潛作艦艓戴皓釣竿詩蕖花裝小艓公用字所本小兒學問止論平聲語大兒結束隨商旅欹帆側柂入波濤撇漩去聲一作旋梢濆音奮無險阻朝發白帝暮江陵頃來目擊信有徵瞿唐漫天虎鬚一作眼怒歸州長子兩切年行一作與最能此備言在水能事辭欹帆二句言操舟習熟朝二句言行舟神速厯瞿唐虎鬚而無恙故以最能見稱鑑杜臆小兒大兒不作兩人説言其自幼而長也通隋記蔡王智積有五男止教讀論語不令交通賓客而江賦漩澴滎瀯偎灅濆瀑李善曰皆波浪回旋噴湧起之貌周舊注撇拂也與撇同梢搖也於漩則撇於濆則梢王峽船具詩序峽中湍浚激石忽發者謂之濆沱洑而漩者謂之腦李實曰今川語漩濆皆去聲撇猶過捎者用梢撥之而度左峴曰蜀諺云濆起如屋漩下而井蓋濆高湧而中虛漩急轉而深沒濆可避漩不可避行舟者遇漩則撇開遇濆則捎過也盛𢎞之荆州記朝發白帝暮到江陵其間千二百里雖乘奔御風不以疾也杜臆朝發白帝暮到江陵此本庾信水經注江水乂經虎鬚灘灘水廣大夏斷行旅又東徑羊腸虎臂灘全蜀總志虎鬚潭在夔州府治西宋景文筆記蜀人謂柂師為長年三老入蜀記長年三老梢公是也此鄉之人器一作氣量窄悮競南風疏北客若道去聲士一作土無英俊才何得山有屈原宅此因人情澆薄而致激厲之語亦鶴注最能行傷夔州之男故以屈原宅結之此用三韻次段却兼兩韻絶水經注袁山松曰歸鄉山秀水清故出俊異地險流故其性亦隘左傳南風不競地主恃強故疏慢北客宅水經注秭歸縣故歸鄉縣北一百六十里有屈原故纍石為屋基今其地曰樂平里宅之東北六十里有女嬃廟搗衣石猶存王嗣奭曰二詩為夔州風俗惡薄而發末引昭君屈原又為夔州解嘲筆端遊戲如此寄韋有夏郎中黃鶴編在大厯元年夔州詩內朝潘淳曰顔魯公東方朔碑陰有城主簿韋有夏殆斯人耶省郎憂病士書信有柴胡飲子頻通汗懷君想報珠親知天畔少藥餌一作味峽中無歸楫生衣卧春鷗洗翅呼猶聞上上聲急水早作取平塗萬里皇華使去聲為僚記腐儒上四謝韋來書中四卧峽思歸下則待韋於夔州也王洙曰蜀本産藥峽俗信禱祠而不服藥故藥味常少矣杜臆楫生水衣而猶卧波乃春鷗洗翅若欲呼我去兩句自為照應急水謂峽江平塗謂夔州皇華指韋腐儒自謂為僚同為省郎也胡古人稱湯藥為飲子孫真人有甘露飲子此詩指柴飲子也柴胡性能發汗謝王融詩懷君首如疾師四愁詩何以報之明月珠朓詩浩蕩别親知氏曰夔峽間多險阻唯州中稍平公詩云林中才有地峽外更無天詩皇皇者華注君遣使臣也左傳同官為僚師氏注仇池翁云沈佺期回波詞姓名雖蒙齒録袍笏未服牙緋少陵以飲子對懷君亦齒録牙緋之比也又古今詩話云古之文章自應律度未嘗以音韻為主自沈約增崇韻學之後詩家體製漸多始有蹉對假對雙聲疊韻之類如自朱邪之狼狽致赤子之流離赤對朱邪對子狼狽流離乃獸名對鳥名也峽中覽物鶴注當是大厯元年在夔州作邢劭詩覽物惜時形曾音層為掾吏趨三輔憶在潼關詩興去聲多巫峽忽如瞻華去聲嶽蜀江猶似見黃河舟中得病移衾枕洞口經春長子兩切薜蘿形勝有餘風土惡幾時回首一高歌此公在峽而思鄉也上四追憶華州下四峽中有感峽向貶司功而詩興偏多以華嶽黃河足引壯思也今江相似而卧病經春無復前此興會矣蓋此間形勝雖佳風土殊惡幾時得回首北歸仍動長歌之興乎題曰覽物指山水言舟中承江洞口承峽形勝在此風土亦在此掾移衾枕捨舟登岸也趙曰公曾為華州司功故曰吏縣三輔京兆扶風馮翊也華屬扶風希曰潼關在華陰即桃林之塞華嶽在其地黃河亦經華而東庾信枯樹賦橫洞口而傾卧口謝靈運詩想見山阿人薜蘿若在眼陳允錫注洞五溪之口風謂其俗雜夷土謂其地多瘴土後漢唐羌疏南州惡杜詩巫峽忽如瞻華嶽蜀江猶似見黃河此在峽而憶華州也白樂天九江春望詩云爐煙豈異終南色盆草寧殊渭北春蘇子瞻橫翠閣詩云已見西湖懷濯錦更看橫翠憶峨嵋其句意皆本於少陵朱瀚曰初聨語平巫峽華嶽首尾癡肥匆如猶似親筆庸滑瞻見二字不免合掌第五似病呈移字亦晦洞口指何地未明七八句亦近庸率斷非少陵真筆憶鄭南梁氏編在大厯元年若朱注舊作憶鄭南玭玭浦眠切珠名吳注玭疑作玼音泚玉色鮮潔也按鄭南華州鄭縣之南詳詩意只是憶鄭南寺舊遊耳趙云師民瞻削去玭字草堂本作憶鄭南鄭南伏毒寺舊作守趙定作寺瀟灑到江心石影銜珠閣泉聲帶玉琴風杉曾音層曙倚雲嶠憶春臨萬里蒼茫一作蒼浪外一作水龍蛇只自深上四憶寺中之景下傷舊遊難得也寺在江中故氣象瀟灑珠閣閣有珠簾玉琴泉響若琴灑逺注峽水蒼茫徒為龍蛇深窟不似鄭南江心之瀟此句回應蔡曰伏毒寺在華州鄭縣劉禹錫别集云舅氏牧華州前後由華覲謁陪登伏毒寺曽題詩於梁云曾作關中客頻經伏毒巖晴煙沙苑樹曉日渭川帆何陸機詩飛泉潄鳴玉江淹去故鄉賦撫玉琴兮親雲嶠注見本卷贈崔十三評事公輔單復編在大厯元年今姑仍之題云評事而篇中言羽林言入幕崔蓋先為評事繼膺幕僚後以元戎之薦補羽林軍職也張逺注評事為公諸舅之子題下疑脫弟字飄颻一作飄飄西極馬來自渥窪池颯飁似立切寒一作定一作鄧山桂低徊風雨枝我聞龍正直道屈爾何為且有元戎命悲歌識者知一作誰摧從崔敘起之馬來渥窪比崔之才俊桂風雨比崔困抑龍屈當伸而元戎見知言崔之遭遇三用比喻意各不同崔杜臆元戎不記其名蓋薦崔使教練羽林者悲歌謂有憂世之心中漢禮樂志天馬來從西極靈漢郊祠歌馬生渥窪水唐韻颯飁大風也謝運入華子岡詩南州實炎德桂水凌寒山官聨辭冗長去聲行路徙一作洗欹危脫劍主人贈去帆春色隨陰沈鐵鳳闕教練羽林兒此送崔還朝辭冗長離散職徙欹危將出峽贈在元戎去指評事鳳闕謂宫殿羽林乃衛士朱注評事掌出使推按不為冗官此云官聨辭冗長下云教練羽林兒蓋崔自外僚徵入朝為羽林幕職評事恐是兼官或先曾以評事貶斥者取申屠嘉傳冗官居其中師古曰冗散輩也文賦固無乎冗長鄭曰長直亮切吳越春秋伍子胥解劍贈漁父則文心雕龍天髙氣清陰沈之氣逺上漢書建章宫東鳳闕髙二十餘丈西都賦注圓闕作鐵鳳凰令張兩翼舉頭敷尾陸倕石關銘銅雀鐵鳳之工盛漢宣帝紀羽林孤兒注天有羽林星林喻若林木之羽有羽翼鷙擊之意故以名武官焉百官表取從軍死事者之子養羽林官教以五兵號曰羽林孤兒天子朝音潮侵早雲臺仗數音朔移分軍應平聲供給百姓日支離黠吏因封已公才或守雌此則有慨時事數杜臆朝侵早世亂多事仗移乘輿播遷供給謂軍需之急支離謂民力已罷封已有害於民者守雌無益於民者二語説盡官曹之弊公才泛言在位者不指崔君公國語叔向曰引黨以封已注封厚也晉書孔愈有才而無公望老子知其雄守其雌燕平聲王買一作賈駿骨渭老得熊羆活國名公在拜壇羣寇疑冰壺動瑤碧野水失蛟螭此謂元戎得以靖亂用駿骨熊羆言主帥能崔名公即指元戎羣寇驚疑則國多全活矣冰壺句言將令肅清野水句言餘孽銷除戰國策涓人為君求千里馬馬已死買其骨五百金返以報君大怒涓人曰死馬且買之况生馬乎不三年千里馬至者三渭老熊羆注見三卷活南史王廣之子珍國為南譙太守高帝手敇云愛人國甚副吾意拜壇用漢髙拜韓信事意逺注冰壺即冰雪靜聰明鮑照詩清如玉壺冰入幕諸彥集一作聚渴賢高選去聲宜鶱騰坐可致九萬起於斯復扶又切進出矛戟昭然開鼎彛此謂崔公能顯功業二杜臆崔蓋先入幕而後被薦引也鶱騰句比其名位之逺大復進再升遷也矛戟謂専閫鼎彛謂勒功此又望其將來也鮑照别賦捨金閏之諸彥孔叢子子思對魯穆公曰君若飢渴待賢納用其謀莊潘嶽傳楊駿輔政髙選吏佐孟子可坐而致也子摶扶搖而上者九萬里矛世説見鍾士季如觀武庫但覩戟任昉序功銘鼎彛會看平聲之子貴歎及老夫衰豈但江曾音層決還思霧一披暗塵生古鏡拂匣照西施舅氏多人物無慙困翮垂末贈别而致稱羡之意昔聽崔談論如懸河之注今想其丰采如披雲見天其先屈而後伸又如拭塵照面矣舅氏之門多材如此亦何慙困抑乎末蓋幸之也此亦三用比喻與起處相應水此章首尾各八句中四段各六句莊子決西江之而活汝世説衛瓘見樂廣曰若披雲霧覩青天今鮑照詩明鏡塵匣中杜臆舊注皆以崔為公舅氏詩中稱崔為之子自稱為老夫其非甥舅可知後有毒熱簡崔評事十六弟詩亦自稱老夫而稱崔為內弟又知二評事皆公中表以生於舅家故云舅氏多人物耳奉寄李十五祕書文嶷二首鶴注當是大厯元年夏在夔州作避暑雲安縣秋風早下去聲來暫留刋作之魚復浦同過楚王臺猿鳥千崖窄江湖萬里開竹枝歌未好畫舸莫陳作且遲一作輕回此章望李至夔乃寄詩本意過李往雲安公在魚復約其下來留浦同臺而出峽也千崖窄指峽中萬里開望荆門避朱注莫遲回促其早至而出峽張正見詩林光稱暑寰宇記奉節縣北三十里有赤田城舊魚復縣故基也楚宫在巫山縣西二百步陽臺古城內即襄王所遊之地陽雲臺髙一百二十丈南枕長江竹朱注舊注竹枝歌巴渝之遺音惟峽人善唱劉禹錫枝詞序建平里中兒聯歌竹枝吹短笛擊鼓以赴節歌者揚袂雜舞以曲多為賢音中黃鐘之羽其卒章激訐如吳聲何宇度談資竹枝歌悽惋悲怨蘇長公云有楚人哀屈弔賈之遺聲焉鶴林玉露載宋時三峽猶能歌之今則亡矣徐陵詩畫舸圖仙獸行李千金贈衣冠八尺身飛騰知有策意度不無神班秩兼通貴公侯出異人玄成負文彩世業豈沈淪次章稱美李公致期望之意官上四言氣槩不羣而才品出衆所謂異人也祕書朝故云通貴凝乃宗室故云公侯元成世業謂其能致相位而光先業觀末二句知凝之父蓋嘗顯逹於朝者左傳行李之往來注云行李使人也槖杜臆千金贈見交遊之廣前漢書陸賈傳尉他賜賈中裝直千金郭泰傳身長八尺容貌魁偉飛騰猶韓文言飛黃騰踏之意楚辭吾令鳳凰飛騰兮服意度謂意思度量語林諸葛子瑜有容貌思度一時其雅量或云意度不無神言料事如神韓非子前識者無緣而忘意度後説度音鐸唐制祕書郎從六品上故曰通貴子左傳公侯之子必復其始於漢書韋元成之韋賢之少為相七年守正持重不及父而文彩過雷此記旱雷也鶴編在大厯元年舊史是年春旱至六月庚子始雨大旱山嶽焦密雲復扶又切無雨一云覆無雨南方瘴癘地罹此農事苦封內必舞雩峽中喧擊鼓真龍竟寂寞土梗空僂音吕俯他本作俯僂吁嗟公私病稅斂缺不補故老仰面啼瘡痍向誰數所主切祈從歲旱農憂敘起雨此條封內四句雨之事承大旱無吁嗟四句憂旱之情承南方農苦我莊子大旱金石流土山焦而不熱易密雲不雨自西郊晉武帝詔農夫苦其業雨周禮司巫國大旱則率巫而舞雩擊神農求雨書祈不雨則暴巫暴巫而不雨則積薪鼓而焚山土莊子葉公非好真龍也許慎淮南子注湯遭大旱作龍以象雲從龍魏文侯曰吾所學者土梗耳田子方篇猶土人也遭雨則壞神左傳一命而僂再命而傴三命而俯僂俯言鞠躬求詩雨我公田遂及我私季孟子薄稅斂瘳布傳瘡㾜未暴步卜切尫或前聞鞭石張逺作石舊作巫非稽古請先偃甲兵處上聲分音問聽人主萬邦但各業一物休盡取水旱其數一云數至然堯湯免親覩上天鑠金石羣盜亂豺虎二者存一端愆陽不猶愈此感傷時事道上六言救旱之下六乃慰農之意格暴尫鞭石非所以弭災若方鎮能息兵薄斂庶足上天心朱注水旱之數堯湯不免今亢陽雖酷不猶愈於盜賊乎備左傳僖二十一年夏旱公欲焚巫尫臧文仲曰非旱也注尫者瘠病之人其面上向俗謂天哀其病恐雨入其鼻故為之旱所以公欲焚之記歲早穆公召縣子而問曰天久不雨吾欲暴尫而奚若曰天則不雨而暴人之疾子虐母乃不可與記何居乎我未之前聞遠注巫字疑石字誤初學雜記宜都郡二大石鞭陽石則晴鞭陰石則雨庾信詩鞭石未成雨記古人與稽難蜀父老丈以偃甲兵於此湯晉書謝安謂桓沖曰朝廷處分已定治荀悅漢記堯水旱者天數也史記堯之時用鯀水九年而水不息説苑湯之時大旱七年雒圻川竭顯招魂十日代出流金鑠石詩家有省字法毛詩不惟德是云豈不顯此詩免親覩是言不免親覩左傳春無愆陽夏無伏陰昨宵殷上聲其雷風過齊萬弩復扶又切吹霾翳散虛覺神靈聚氣暍音腸胃融汗濕一作滋衣裳汚上聲一作腐吾衰尤一作猶計拙一作拙計失望築場圃此正寫旱雷景事風上四仍應大旱二句下四仍應南方二句散霾翳而不雨故虛覺神靈之聚南此章前二段各十二句後段八句收歌詩殷其雷在山之陽史記孫臏萬弩齊發九東風飄兮神靈雨腸暍暑熱也融謂腹瀉注劉向新序扁鵲曰君之疾在胄詩九月築場圃春夏為圃秋冬為場火鶴注編在大厯元年秋夔州作農原注楚俗大旱則焚山擊鼓有合神書楚一作焚山經月火大旱則斯舉舊俗燒蛟一作蛇龍驚惶致雷雨此先敘舉火之由首杜臆名勝志引水經注云廣溪峽乃三峽之其間三十里頽巖倚水厥𫝑殆交北岸山上有神淵淵北有白鹽崖髙可千餘丈俯臨神淵天旱燃火岸上推其灰燼下穢神淵則降雨又常璩以縣有山澤水神旱時鳴鼓請雨必應嘉澤蜀都賦所謂應鳴鼓而興雨也題下注云楚俗大旱則焚山擊鼓乃兼引之此皆流俗之談而公以熒侮闢之宋武帝詩楚山帶舊苑易雷雨作解爆皮教切嵌丘銜切魑魅泣崩凍嵐陰昈侯古切羅落沸百泓根源皆太一作萬古青林一灰燼雲氣無處所此言日中之火𦦨徹於山林韻會嵌巖山險貌句潘尼火賦山陵為之崩弛川澤為之涌沸此崩凍二所本邵注嵐山氣陰山背也西京賦漸臺立於中央赫昈昈以𢎞敞李善引埤蒼曰昈赤文也朱注積凍之地為火所崩迫故嵐陰皆有赤光莊子胠篋削格羅落置罘之智多則獸亂於澤矣太邵注火焚山木周圍隕落故泓水盡為沸驣三墳古之人皆壽雲髙唐賦風止雨霽無處所入夜殊黃作珠赫然新秋照牛女風吹巨焰作河漢正異定作漢一作掉一作倓騰一作勝煙柱柱與拄通勢欲焚崑崙光彌焮香靳切洲渚此言夜間之火猛熾於上下鶴注舊書大厯元年三月不雨至於六月詩云新秋照牛女殆是山南入秋猶未雨也朱注河掉蔡氏作河漢之掉此解未安正異作河漢為是或本作河淡乃漢字之訛耳吳煙柱果有所出否恐是煙拄謂煙氣直拄河漢也宋思純聨句無風煙熖直可證此句之意焮書火炎崑岡玉石俱焚左傳行火所焮火氣所炙腥至焦長蛇聲吼一作吼爭纏猛虎神物已高飛不一作只見石與土此言蛟龍避火而去不能為雨也注盧注聞腥氣知長蛇已焦聽吼聲知猛虎受纒朱蛟龍髙飛土石不礙貴耳集古傳龍不見石人不見風魚不見水爾寧要平聲謗讟慿此近熒侮薄關長子兩切吏憂甚昧至精主逺遷誰撲滅將恐及環堵流汗卧江亭更平聲深氣如縷未言燃火無救於旱徒增炎熱耳爾寧二句責夔民之誣妄薄關二句譏有司之失職逺遷四句自歎旅中畏火此朱注言爾等焚山之舉豈欲謗讟蛟龍而熒侮之乎固舊俗不經實因長吏薄於憂民不知以精誠為主盡祈救之道耳杜臆甚昧至精主責在主之者此句乃通篇緊要語注此章四句者兩段六句者兩段末段八句收張溍燒龍致雨有似謗毁要神且其事近於塋惑狎侮不足信也左傳民無謗讟薄盧注薄與甚相對言其關憂者亦薄乎云爾如毛詩汚薄言一例蔡夢弼注薄讀伯各切謂迫近郊關未合猶上林賦爛熳逺遷書若火之燎於原不可嚮邇其可撲滅詩將恐將懼詩記環堵之室陳後主更深難道留熱三首鶴注大厯元年夔州作此詩云十年可解甲自天寶十四載至為十年也雷霆空霹靂雲雨竟虛無炎赫衣流汗低垂氣不蘇乞為寒水玉願作冷秋菰何晉作那似兒童歲風涼出舞雩此詩為夔州苦熱而作露上四記酷熱下四思解熱也易鼓之以雷霆繁王者言不從則金不從革秋多霹靂霹靂者金氣也相國策宫中虛無人相傅毅賦踐朱夏之炎赫司馬如喻巴蜀檄流汗屬相如美人賦黼帳低垂水山海經堂庭之山多水玉子虛賦水玉磊砢郭璞曰玉水精也杜臆水玉恐是瓜之别名故對秋菰園人送瓜詩浮沈寒水玉可證雩菰蒲也成於深秋故性冷仲長統樂志賦風於舞之下味歸髙堂之上黃生曰詩中説冷易佳説熱難工如炎赫衣流汗低垂氣不蘇又林熱鳥開口又氣暍腸胃融如此句法在杜公亦不免褦襶矣瘴雲終不滅瀘水復扶又切西來閉户人髙卧歸林鳥却回峽中都是火江上只空一作聞雷想見陰宫雪風門颯沓一作踏開此章欲尋涼而不可得也之熱峽火江雷天氣之熱瘴雲瀘水地氣師氏曰瘴雲炎瘴之雲有水經注瀘峯最髙秀水之左右馬步之徑才通而時瘴氣三四月經之必死益州記瀘水兩峯有殺氣暑月不可行故武侯以五月渡瀘為艱後漢書注瀘水一名若水出旄牛徼外經朱提至𤏡道入江在今雋州却程曉詩閉户辟暑卧出入不相過罔却回鳥不安林轉回翔也繁欽暑賦雖托陰宫所避旃張孝祥曰宫中暑月積雪為山取其陰涼廣絶交論颯沓鱗萃朱李沉不冷雕胡一作菰炊屢新將衰骨盡病被暍一作褐非味空頻歘翕炎蒸景飄颻征戍一作伐人十年可解甲為去聲爾一霑巾三章熱不能耐而慨及征夫也瓜上四自歎下四傷人魏文帝書沈甘於清泉浸朱李於寒氷胡楊慎云説文雕苽一名蔣西京雜記及古詩多作雕內則注作雕胡亦作安胡宋玉賦炊雕胡之飯枚乘七發安胡之飯爾推齧雕蓬孫炎云米菱也米可作飯古人以為五飯之一杜臆天熱飯餿故每食新炊客味頻空雖有佳味頻頻空置也解庾信詩誰憐征伐今夜在交河可解者傷其未也揚雄解嘲解甲投戈詩家用古人成句有歇上歇下語如張載詩淚下霑衣襟周𢎞正則云行住雨霑衣曹植詩歔欷涕霑巾杜詩則云為爾一霑巾此是歇上語又如用詒厥而去孫謀用友于而去兄弟此是歇下語夔州歌十絶句鶴注此當是大厯元年夏作中巴之東巴東山江水開闢流其間白帝高為三峽鎮瞿唐一作夔州險過百牢關首章志夔州形勝與下雨章相連白帝瞿唐分承山水見其為蜀中險要為水經劉璋分三巴有中巴有西巴有東巴唐志夔州巴東郡在中巴之東水經注章武二年改白帝為永安巴東郡治也闢尚書考靈耀天地開闢曜滿舒光楊炯詩自古天地流為峽中水周禮職方氏五嶽皆云山鎮三峽鎮本此所唐書漢中郡西縣西南有百牢關寰宇記隋開皇中置以入蜀路險號曰百牢白帝夔州各異城蜀江楚峽混殊名英雄割據非天意霸王去聲一作主并平聲吞在物情次章承前白帝三峽事上二辨古迹下二論往朱注古白帝城在夔州城東故曰各異城瞿唐峽舊名西陵峽與荆州西陵峽相亂故曰混殊名英雄割據謂公孫述劉馬輩霸王并吞如漢髙以巴蜀收中國入竊據者逆天得民者致王見在德不在險也陸遊蜀記唐故夔州與白帝城相連江吳越春秋闔閭曰寡人欲強國霸王何由而可淹詩物情棄疵踐羣雄競起問一作聞郭作向前朝音潮王者無外見今朝音昭比兵媚切訝漁陽結怨恨元聽平聲舜日舊簫韶三章承前英雄霸王割據則競起并吞則無外此見古今異勢漁陽北叛而舜樂南來言蜀中無恙也羣雄指前代據蜀者不指安史陷京舜日指明皇入蜀時不指代宗復國也世説喬玄曰羣雄虎爭公羊傳王者無外比近訝駭也朱浮責彭寵書奈何以區區漁陽結怨天子成沈約詩舜日堯年歡無極書簫韶九赤甲白鹽俱刺七迹切天閭閻繚繞接山巔楓林橘樹丹青合復道重平聲樓錦繡懸四章記赤甲白鹽也居刺天言山勢之髙接巔言人之密丹青謂楓橘異色錦繡謂樓閣相映州盧云見夔州既庶且富也吳論此下七章散咏夔景物南都賦森䔿䔿而刺天水經注孤峯刺天西江淹詩繚繞華山陰藉田賦若茂松之倚山顛京雜記終南山有樹葉一青一赤望之斑駁長安謂之丹青樹相叔孫通傳孝惠乃作復道何遜詩重樓霧中出如答盛覽書列錦繡以為質瀼奴朗切東瀼西一萬家江北江南晉作江南江北春冬花背音佩飛鶴子遺瓊蕊相趁丑慎切鳬雛入蔣牙五章記瀼東瀼西也一萬家人煙盛春冬花地氣暖遺蕊入蔣形容花草之多江瀼水直流故地界東西江水橫流故地分南北瀼與有小大之别瀼吳論鶴子鳬雛季夏之景謂水經注白帝山城東望溪即以為隍入蜀記夔人山澗之流通江者曰瀼居人分其左右謂之瀼東瀼西飛王勃詩江南江北互相望擬李陵别詩雙鳬相背海賦鶴子淋滲皆王粲白鶴賦食靈嶽之瓊蘂陸機擬古上山採瓊蘂言花之白也楚辭屑瓊蘂以為糧乃言玉英耳蜀字書趁逐也蒲海賦鳬雛離縰都賦攢蔣叢注蔣菰名也杜詩瀼東瀼西一萬家江北江南春冬花詠村居景物而語涉拗體白玉蟾詩云山後山前鳩喚婦舍南舍北竹生孫則調逸而意更新矣東屯徒昆切稻畦一百頃北有澗水通青苗晴浴狎鷗分處處雨隨神女下去聲朝朝六章記東屯之勝其屯可種稻溉以流泉民受利矣多鷗常雨言澗水之不竭也東用學紀聞東屯乃公孫述留屯之所距白帝城五里屯之田可百頃稻米為蜀第一田又東屯有青苖陂一統志青苖陂在瞿唐東蓄水溉民得其利孫綽詩物我俱忘懷可以狎鷗鳥也髙唐賦楚先王夢見一婦人曰妾巫山之女旦為朝雲暮為行雨朝朝暮暮陽臺之下蜀麻吳鹽自古通萬斛之舟行若風長子兩切年三老長歌裏白晝一作買攤錢一作白馬灘前髙浪中七章記水次之便商賈販貨而競趨舟人忘險而爭利市舶輻輳真西南一大都會也作江鄰幾雜志作白馬灘前髙浪中是蒙上句連説若白晝攤錢則長歌者舟子攤錢者賈客也桑漆麻紵之饒左思吳都賦煮海為鹽常璩蜀志梁冀傅能意錢之戲注何承天纂文曰詭億一曰射意一曰射數黃注即今之猜枚射覆之類若攤錢則以錢攤撥於地今謂之跌博與意錢不同曾季貍艇齊詩話攤錢即攤賭也憶昔咸陽都市合山水之圖張賣時巫峽曾音層經寶屏見楚宫猶對碧峰疑八章記楚王宫也真咸陽所見者畫圖夔州所對者境但楚宫難覔終成疑似即真境亦同幻相矣公詩舟人指點到今疑即同此意張賣張圖以賣於市也西京雜記武帝為寶屏風設於桂宫碧江淹詩刻畫􅍶崒兮山雲而峯唐人七絶多從首句拈韻如李太白王龍標諸作盡然杜詩有對起而不用韻者如落落出羣非櫸栁青青不朽豈楊梅是也有散起而不用韻者憶昔咸陽都市合山水之圖張賣時是也唐詩如盧照鄰日觀仙雲隨鳳輦天門瑞雪照龍衣亦是對起無韻劉長卿天書逺召滄浪客幾度臨岐病未能又是散起無韻楊用修謂劉詩起句尤奇武侯祠堂一作生祠不可忘中有松柏參天長干戈滿地客愁破雲日如火炎天涼九章記武侯祠也雄武侯忠義千古難忘見非英割據及楚宫高唐可比松柏陰森堪散愁而納涼亦對樹懷人之意薛道衡老氏碑考其故迹營建祠堂干戈滿地崔旰未平也融謝靈運詩雲日相照媚孔詩赫赫炎天路閬風玄圃與蓬壺中有髙唐一作堂天下無借問夔州壓何處峽門江腹擁城隅十章記高唐觀也有古稱仙界西有閬風玄圃東海上蓬壺而髙唐神觀地在中間此天下絶境也今夔州髙壓而峽江外擁庶髙唐遺迹遙望可見矣吳船録陽臺髙唐觀在來鶴峯上又漢書注髙唐在雲夢華容縣兩説不同詩謂高唐在夔州也毒熱寄簡崔評事十六弟鶴注當是大厯元年夔州作大火正異定作火舊作暑連金氣荆揚不知秋林下有塌翼水中無行舟千室但掃地閉關人事休首記夔州秋熱意火盛金微尚無秋故人物皆困於暑德詩七月流火注火大火心星也陳月令孟秋之月盛在金趙曰塌翼謂熱不能飛琳檄垂頭塌翼求梁簡文帝詩落葉灑行舟關掃地欲卧地涼也易先王以至日閉老夫一作大轉不樂音洛旅次兼百憂蝮蛇暮偃蹇空床難暗投炎宵惡烏故切明燭况乃懷舊丘自敘不堪毒熱舊畏蛇須燭對燭增煩不如丘之安適只易旅即次捍楚辭宋玉大招南有炎火千里蝮蛇蜒大人賦指橋以偃蹇張揖曰偃蹇委曲貌沈約詩空床寄杯酒鄉鄒陽書暗投之於路此法言正服明燭鮑照詩去三十載復得還舊丘舊丘指洛陽開襟仰內弟一作第非執熱露白頭束帶負芒刺接居成阻修何當清霜飛會子臨江樓載聞大易義諷詠一作興詩家流此述念崔之意即畏熱不能過訪欲俟之秋深接居成阻修所謂寸步難相就也王粲登樓賦向北風而開襟陶白帖舅之子為內兄弟陸厥有答內兄顧希叔詩潛詩束帶候雞鳴霍光傳如芒刺在背修向秀思舊賦序居止接近齊張載詩欲往從之路阻魏都賦覽大易與春秋書陸澄讀易三年不能解其義頌顔氏家訓諷詠詞賦楊修曰今之賦古詩之流藴當作醖藉異時輩檢身非茍求皇皇使去聲臣體信是德業優楚材擇杞梓漢苑歸驊騮短章達我心理為去聲一作待識者籌末述簡崔之意評事賢而奉使故贈詩以談心句楚材喻崔使夔漢苑喻崔回京此章前二段各六後二段各八句能束晳讀書賦優遊藴藉及晉書周顗傳時輩親狎莫褻也商書檢身如不詩皇皇者華序皇華勞使臣也則唐書評事掌出使推按革左傳晉卿不如楚其大夫賢皆卿材也如杞梓皮自楚往也維楚有材晉實用之短驊騮歸漢暗用武帝得天馬孔融書附此章聊申我心素識者指崔信行去聲逺修水筒原注引泉筒大鶴注以課伐水序證之當是厯元年在夔州作伐師氏曰姓譜有姓信者公木詩序有隸人信行汝性不茹葷清淨僕夫內秉心識本一作根源於事少凝滯首敘信行為人此杜臆清淨而心識本源恭謹而事少疑滯士人有亦佳士矣公以此觀僮僕何等深心符莊子顔子不飲酒不茹葷心漢書揚雄傳常清淨作命詩召彼僕夫又秉塞淵史記秦碑本原事迹推屈原傳聖人不凝滯於物而能與世移晉陽秋劉輿事無凝滯雲端水筒坼林表山石碎觸熱藉子修通流與厨會往來四十里荒險崖谷大此記修筒之事雲石碎故筒拆冒險逺修用力勤矣鮑照詩端楚山見林表吳岫微淮南子江淮通流日曛驚未餐一作食貌赤愧相對浮瓜供老病裂餅嘗所愛於斯答恭謹足以殊殿丁甸切最此憫信行之勞驚而且愧公之仁心懇至也裂餅分嘗公之一體待物也乃杜臆嘗所愛謂分嘗所愛之餅盧注後周王羆傳裂薄餅緣舊引何曾餅裂十字文不合老素恭謹又萬石君傳恭謹無與比前漢蕭何傳年漢書注上功曰最下功曰殿詎要平聲方士符何假將軍佩高麗本作佩黃生作拜舊作蓋行去聲諸直如筆用意崎嶇外末因得水而贊其能竒引泉如是亦何須符佩之乎即此直性之人意無崎嶇遂能力任勤勞而通流逺注矣此章首尾各四句中二段各六句史記秦本紀方士欲鍊以求竒藥先神仙傳葛玄取一符投水中能使逆流而上又汝南賢傳葛玄與吳大帝坐樓上見作請雨土人即書符著廟社中須臾大雨淹注平地水尺餘何雲曰真誥有制虎豹符方士符蓋用此示獠奴阿段詩云怪爾常穿虎豹群此可證也公朱注古今注曲蓋太公所作武王伐紂大風折蓋太因折蓋之形而為曲蓋焉戰國嘗以賜將軍此言信行觸熱入山不假張蓋也行諸猶云行乎呼其名也袁淑詩信行直如弦𨽻人取名本此其定功曰後魏古弼太武嘉其直而有用賜名曰弼以頭尖時人呼為筆公晉書周處為中丞正繩直筆陸吳越春秋民去崎嶇歸於中國前漢賈傳崎嶇山海間申涵光曰日曛驚未餐貌赤愧相對體恤下情如是真仁者之用心陶公云此亦人子也可善遇之兩賢一轍催宗文樹雞柵鶴注詩云山腰宅即前客堂也當是大厯元年作吾衰怯行邁旅次展崩迫愈風傳烏雞秋卵方漫喫自春生成者隨母向百翮驅趁丑慎切制不禁喧呼山腰宅踏藉盤案翻此句舊在塞蹊上終日憎赤幘首明樹柵之由育趙注春卵可抱故秋卵方充食也禁百翮連母五十頭驅趁謂驅去仍來雖制之亦不能此處舊本顛錯杜臆謂當再整今上下互調語意便明迫詩行邁靡靡烏展崩迫言迫促少休任昉表無任崩之情本草䳄雞治風濕淋痺折張衡南都賦春卵夏筍南庾信枯樹賦頓山腰而半干寶搜神記安陽城有亭一書生明術數入亭宿夜半有赤幘者來或問曰向赤幘者誰答曰西舍老雄雞也課奴殺青竹此句舊在終日上塞先則切蹊使之隔墻東有隙晉作間散地可以樹高柵織籠曹其內令平聲入不得擲稀間苦一作可突過觜距一作瓜還汚去聲席此記樹柵之事之者則宗文也樹柵織籠奴僕之責課督曹群處也擲拋走也稀間柵間有稀隙則雞可突出而席仍霑汚矣令殺青注洙曰楚人以火炙竹去其汗令耐久也月塞徯徑漢書逸民傳避世墻東王君公賦左傳宋鄭之間有隙地焉梁書樹木為柵上林捷垂條掉希間張華鷦鷯賦雕鶡介其觜距避熱時來晉作未歸問兒所為迹二句舊在髙柵下依杜臆改正我寬螻蟻遭彼免狐貉厄應平聲宜各長子兩切幼自此均勍敵籠柵念有修近身見一作知損益明明領處上聲分音問一一當剖析此面命宗文之語復我寬四句宗文答詞籠柵四句公申囑有柵則雞不啄蟻有籠則狐不噬雞且各領長幼均敵不爭所以區分諸籠者又悉矣損益查籠柵之不齊剖析别雞群之異黨狐齊民要術雞棲宜椓地為籠內著棧安穩易肥又免狸之患詩取彼狐貉左傳勍敵之人隘而不利咸易近取諸身天法言應時而造者損益可知也傅樂府明明總機晉書謝安謂桓沖曰朝廷處分已定矣公韓非子一一而聽之魏志管明剖析玄旨不昧風雨晨亂離減憂戚其流則凡鳥其氣心匪石倚賴窮歲晏撥煩及一作去冰釋未似尸鄉翁拘留蓋阡陌此豫計柵成後事以平時聽雞減憂藉自寬歲終賴雞充用兼慰宗文也末二作自哂語惱不昧謂鳴不失期匪石言司晨有信撥煩無喧呼煩也拘留應怯行邁阡陌應墻東地黃生曰詩本瑣細結見大家數此章十句者兩段八句者兩段詩風雨如晦雞鳴不已小序言亂世則思君子之凡鳥謂家禽朱浮書褻之者以為園囿之凡鳥外廏下乘詩我心匪石不可轉也撥窮歲晏謂貧窮歲暮釋後漢胡廣傳才略深茂堪能煩莊子渙若冰將列仙傳祝雞翁居尸鄉北山下養雞百餘年雞至千頭皆立名字欲引呼名皆依呼而至後升吳山莫知所在楚辭序拘留不遣盧元昌曰雞柵本一瑣事杜公説來便見仁至義盡之意念其生成春卵不食仁也人禽有别驅諸柵籠義也螻蟻可全狐狸亦免義中之仁長幼不混勍敵亦均仁中之義於課柵一事直扶至理如許可謂善朂其子矣貽華去聲陽栁少去聲府鶴注此當是大厯元年在夔州作唐書華陽縣屬成都府貞觀十七年析成都縣置繫音計馬喬木間問人野寺門栁侯披衣笑晉作嘯見我顔色溫並坐石堂下一作石下堂一作堂下石俯視大江奔火雲洗月露絶壁上上聲朝暾敘曉訪少府下少府寓居寺中故繫馬問之月之露洗出火雲朝起之暾上於絶壁此言夏時早景句法倒裝思陶潛詩相思則披衣言笑無厭時火雲朝霞也盧道納涼賦火雲赫而四舉露謝瞻詩月露皓已盈晨東坡詩火雲勢方壯未受月洗本此謝靈運詩䇿尋絶壁楚辭暾將出兮東方注日始出東方日暾其容暾暾然盛也謝靈運詩晚見朝自非曉相訪觸熱生病根南方六七月出入異中原老少去聲多暍於歇切死汗踰水漿翻俊才得之子筋力不辭煩此言曉訪之故不耐觸熱固須早行况少府才俊尤宜亟候也年晉程曉詩可憐褦襶子觸熱到人家漢紀元封四夏大旱民多暍死暍傷暑也如世説魏文帝問鍾育面何以汗對曰兢兢皇皇汗出漿後漢馬融傳美辭貌有俊才詩彼其之子指揮當世事語及戎馬存涕淚一云流涕濺衣一作我裳悲風排帝閽鬱陶抱長策義仗知者論平聲吾衰卧江漢但愧識璵璠文章一小技於道未為尊起豫幸斑白因是託子孫此敘少府肝膽議論末有少府長䇿足以匡濟當時則已之文章技何大道乎故有起豫之歎且服其意氣過人并欲以子孫託之長張衡賦呌帝閽使闢書鬱陶乎豫心過秦論振䇿而御宇內詩家語美哉璵璠逺而望之奐若也又栁必推贊公之文故自謙云文章特小技耳他日云文章千古事方是實語曰後漢楊賜傳造作賦説以蟲篆小伎見寵於時揚雄雕蟲小技壯夫不為起豫出論語玄斑白出孟子矣世説曹公少時見橋玄謂曰吾老當以子孫相纍俱客古信州結廬依毁垣相去四五里徑微山葉繁時危挹佳士况免軍旅喧醉從趙女舞歌鼓秦人盆子壯顧我傷我歡兼淚痕餘生如過鳥故里今空村此自敘客夔景况夔成都有崔旰之亂而州免於軍旅故得以歌舞歡宴但思餘生無幾而故里難尋故不覺相對淚下耳杜臆我歡兼淚痕此真情苦語本此章前二段各八句後二段各十二句二朱注夔州梁信州隋為巴東郡武德元年改信州年又改夔州新書避皇外祖獨孤信諱改夔州免陶潛詩結廬在人境吳越春秋越王曰寡人冀得於軍旅之憂甕李斯書隨俗雅化佳冶窈窕趙女不立於側也夫擊叩缶彈箏拊髀而歌鳴鳴快耳者真秦之聲也揚惲書家本秦也能為秦聲婦趙女雅善鼓瑟酒後耳熱仰天拊缶而歌烏烏莊子鼓盆而歌詩顧我則笑梁簡文帝詩淚痕未燥詎終朝目張載詩人生苦海內忽如鳥過七月三日亭午已後校熱退晚加小涼穩睡有詩因論壯年樂音洛事戲呈元二十一曹長子丈切是鶴注當大厯元年初至夔州作故云衰年旅炎方歇史言是年春旱至六月始雨觀詩云徂暑終衰則知夔州六月尚無雨也七月三日蓋立秋之日凡公詩記日者皆指節候言今茲商用事餘熱亦已末衰年旅炎方生意從此活亭午減汗流比音皮一作北鄰耐人聒晚風爽烏匼遏合切筋力蘇摧折從初秋敘起涼五六言亭午熱退承餘熱句七八言晚加小承生意句孟子今兹未能月令孟秋之月其音商律中夷則西前漢五行志尊卦用事已末已盡也莊子待決江之水而活汝天台山賦羲和亭午頂比鄰見二卷本薛夢符曰烏匼烏巾也趙曰今有匼巾之語吳若注魏武擬古皮辨裁縑帛以為帢以色别貴賤晉咸和中制尚書八座丞郎門下三省皆白帢二官真官烏紗帢作帢音恰苦協切字書無匼字朱注博物志魏武作白帢禮部韻略帢帽也亦作帢士服狀如辨缺四角至匼字古人多用之如鮑照詩銀屏匼匝公詩馬頭金匼匝唐書楊再思阿匼取容盧杞諂諛阿匼皆不以言巾洪駒父謂烏匼不舒貌此臆説耳尚吳均詩不為君所惜摧折何言閉目踰十旬大江不止渴退藏恨雨師健步聞一作供旱魃園蔬抱金玉無以供採掇密雲雖聚散徂暑終一作經衰歇此申言旱虐難堪承上餘熱來退藏雨師不來健步旱魃疾行抱金玉貴如金玉也終衰歇終夏無雨也謝靈運詩我勞盈十旬易退藏於密大人賦誅風伯刑雨師縱山海經黃帝攻蚩尤於冀州之野蚩尤請風伯雨師大風雨帝下天女曰魃雨止遂殺蚩尤魃不得上所居不雨神異經南方有人長二三尺裸身而目在頂上走行如風名曰􅂒俗曰旱魃所見之國大旱赤地千里薄庾信詩拂雲就園蔬易洛陽伽藍記玉蕊金莖詩言采之薄言掇之密雲不雨徂詩六月暑前聖眘古慎字焚巫武王親救暍於歇切陰陽相主客時序遞回斡烏括切灑落惟清秋昏霾一空濶蕭蕭紫塞雁南向欲行音杭列此預道秋涼節候承上晚風來隂陽進退時序迭有轉移古人不焚巫而惟救暍止有見於此耳今秋雁南飛喜時候之不爽矣臧文仲當時有聖人之名故云前聖其諫止焚巫事見前而帝王世紀武王自孟津還及於周見暍人王自左擁右扇之古諺越阡度陌互為主客摵謝惠連七夕詩傾河易回斡土潘嶽賦庭樹以灑落古今注秦築長城色皆紫歘思紅顔日霜露凍階闥胡馬挾雕弓鳴弦不虛發長鈚音批逐狡突羽當滿月惆悵白頭吟蕭條遊俠窟此追論壯年樂事亦從秋景想出趙上六思昔下二傷今皂盧注此即壯遊詩中放蕩齊間裘馬頗清狂呼鷹櫪林逐獸雲雪岡事也林庾信詩紅顔無復多鈚子虛賦左烏號之雕弓上賦弦不虛發廣韻箭也通俗文骨鏃曰􅀈鐡鏃曰鏑鳴箭曰骹靃葉曰鈚皆古制之趙曰突羽其羽奔突而疾也劉孝威賦彎弓滿月勢楚辭惆悵兮私自憐京卓文君有白頭吟郭璞詩華遊俠窟臨軒望山閣縹眇安可越高人鍊丹砂未念將朽骨少去聲壯迹頗疏歡樂音洛曾音層倐忽杖藜風塵際老醜難剪拂吾子得神仙本是池中物賤夫美一睡煩促嬰詞筆此結出呈元之意下上四稱元中四自敘四賓主並收能杜臆曹長喜燒煉故末以此戲之謂其雖得仙術未羽化猶是池中物而已之善睡不減於仙遊方云修真者戒睡故云戲呈迹此章前四段各八句末段十二句收迹頗疏言蹤疏放向秀思舊賦序嵇意逺而疏兮蔡琰笳曲不得歡樂兮當我之盛年應又人生倐忽如白駒之過隙莊子原憲杖藜而門雲劉孝標絶交論剪拂使長鳴侯吳志周瑜曰蛟龍得雨終非池中物續仙傳夏隱登山渡水亦閉目美睡人同行聞其鼾聲而不蹉跌人稱睡仙張華詩煩促每有餘牽牛織女鶴注當是公初至夔時因所見而賦之依梁氏編在大厯元年牽牛出河西織女處上聲其東萬古永相望七夕誰見同神光一作仙竟一作意難候此事終蒙朧颯然精靈魯訔作爽合何必秋遂逢他本作通牛首言牛女會合出於俗傳之妄朱注女會合自漢人已有其説吳均齊諧又撰桂陽成武丁事以實之世俗多為所惑公故力闢其誣齊諧記桂陽成武丁有仙道忽謂弟曰七月七日織女當渡河吾向已被召弟曰何事織女渡河曰暫詣牽牛爾雅河鼓謂之牽牛晉書織女二星在天紀東端天女也主果蓏絲帛珍寶陸機詩牽牛西北回織女東南顧周處風土記七月七日夜灑掃於庭露施几筵設酒脯時果散香粉於筵上以祀河鼓織女言此二星辰當會少年守夜者咸懷私願或云見天漢中奕奕正白氣有光曜五色以此為徵便拜而乞願漢武帝紀祭后土神光三燭支遁詩朦朧望幽人夏宋玉風賦有風颯然而至職后湛東方朔像贊精靈永亭亭新粧立龍駕具層空一作穹世人亦為去聲爾祈請走去聲兒童稱去聲家隨豐儉白屋逹公宫膳夫翊堂殿鳴玉凄房櫳曝衣遍天下曳月揚微風蛛絲小人態曲綴一作掇瓜果中初筵裛重露日出甘所終一作從龍此見七夕祈請乃世俗之好事新粧駕想望織女也稱家句言貧富皆然白屋句言朝野皆然膳夫鳴玉言貴賤皆然曝衣瓜果引證七夕事裛露照日謂終夜虔祀杜臆亭亭二句指織女乃俗論如此世説亭亭玉立七庾信七夕賦嫌朝粧之半故憐晚拭之全新謝朓夕賦回龍駕之容裔注記稱家之有無長説苑窮巷白屋白屋茅屋也綖明皇貴妃七夕生殿有感牛女事知當時宮中有此俗矣嵇左傳有守於公宫庾西京賦膳夫馳騎注宰夫也康傳鳴玉殿省信七夕賦此時併捨房櫳共往庭中凄房櫳言室內一空於西京雜記太液池西有漢武曝衣樓七夕出后衣曝樓上崔實四民月令七月七夕曝經書及衣裳荆謝莊賦曳雲表之素月李德林詩微風動羅帶楚歲時記七夕人家婦女結綵樓穿七孔針陳瓜果於庭中以乞巧有蟢子網於瓜上者則以為得巧詩賓之初筵陶潛詩裛露掇其英莊子日出而作嗟汝未嫁女秉心鬱忡忡防身動如律竭力機杼中雖無舅姑一作姑舅事敢昧織作功明明君臣契咫尺或未容義無棄禮法恩始夫婦恭小大有佳期戒之在至公方圓茍齟壯五切齬偶許切丈夫多英雄一云勿朁丈夫雄嫁此因織女而及夫婦見人情不可以茍合女子待未免憂心忡忡但以禮律身唯勤事織作而已蓋夫婦之道通於君臣臣一失節則君將不容矣婦一失身則夫將見絶矣故知大而仕進小而婚配皆當出於至公也人牛女渡河説既荒唐舊俗乞巧願涉私情故以夫婦倫之道諷論世人君臣句特比語耳琳此章八句起後兩段各十四句律詩憂心忡忡墨陳檄文如律令李善注文書下如令言當履繩動不失律令也舅姑未嫁夫也古詩扎扎弄機杼禮記逮事舅姑無劉伶灑德頌陳設法內則禮始於謹夫婦而楚辭與佳期兮夕張齬論語戒之在色書九辨圓鑿方枘兮吾固知其齟而難入孔融盛孝章實丈夫之雄也張綖曰易言物不可以茍合故借牛女無私會之事以興男女無茍合之道又因男女無茍合之道以比君臣無茍合之義蓋合必以禮者女之佳期進必以正者士之佳期如或不在至公恐英雄丈夫必不以不令之女而為婦剛明正大之主又豈以不令之士而為臣哉是詩觸類旁通髙古嚴正可見古作詩者之意羅大經曰朱文公嘗病女戒鄙淺欲别集古語成一書立篇目曰正靜曰卑弱曰孝愛曰和睦曰儉質曰寬惠曰講學且言如杜詩云嗟汝未嫁女秉心鬱忡忡防身動如律竭力機杼中句此等句便可入正靜他皆倣此嘗以書屬劉靜春先生子澄纂輯迄不能成公蓋欲以配小學書也洪邁容齋隨筆曰洞微志載蘇德哥為徐肇祀其先人曰當夜半鬼宿渡河之後翟公巽作祭儀十卷云或祭於昏或祭於日皆非是當以鬼宿渡河為候而鬼宿渡河常在中夜必使人仰瞻以俟之豫按天上經星終古不動鬼宿隨天西行春昏見於南夏晨見於東秋夜半見於東冬昏見於東安有所謂渡河及常在中夜之理織於昏晨與鬼宿正相反其理則同杜詩云牛女漫愁思秋期猶渡河牛女年年渡何曾風浪生梁劉孝儀詩云欲待黃昏至含嬌淺渡河唐人七夕詩皆有此説此自是牽俗遣詞之過故杜老又有詩云牽牛出河西織女處其東萬古永相望七夕誰見同神光竟難候此事終蒙朧蓋自洞曉其實非也雨此言旱後得雨當在行雲遞崇髙之前且云白谷變氣候知為夔州作也舊編前後互錯峽雲行清曉煙霧相徘徊風吹蒼江樹朱子改作去董作澍雨灑石壁來此章喜旱後得雨即下章所云前雨傷卒暴也雲霧先興風雨並作此曉時驟雨之勢漢書天馬歌神徘徊若留放風先吹樹而繼以雨來也此乃古詩作樹字本合言朱文公語録杜詩最多誤字如風吹蒼江樹雨灑石壁來樹字無意思當作去正對來字又如蜀有漏天以其西極陰盛常雨如天之漏也故云鼓角漏天東後人不曉其義遂改漏為滿似此類極多董斯張曰峽中波浪險絶長風吹江濤驚沫濺勢如暴雨之澍洞簫賦聲􅐀􅐀而澍淵李善云澍古注通凄涼生餘寒殷殷上聲兼出一作山雷白谷變氣候朱炎安在哉高鳥濕不下去聲居人門未開此寫雨中之景鳥雨久則寒生兼雷則雨大故暑氣乍銷而人俱寂邵注白谷巫山之谷候厯法有二十四氣七十二候艷謝靈運詩旦昏變氣景福殿賦開建陽則朱炎鮑照詩居人掩闥卧楚宫久已滅幽珮為去聲誰哀侍臣書王夢賦有冠去聲古才冥冥翠龍駕多自巫山臺此歸功行雨之神誰楚襄久沒神女更為哀乎彼巫山行雨特才人託夢以諷成賦耳今之乘龍灑雨者豈真陽臺神力耶此章四句起下二段各六句終神女賦搖珮飾鳴玉鸞超陸機傳贊言論慷慨冠乎古河東賦乘翠龍而河兮師古曰翠龍穆天子所乘馬音胡夏客曰多當讀章移切論語多見其不知量也古如是今按多乃大都之意恐不必解作祗同是咏雨此章説得竒而空下章説得正而實雨黃鶴編在雲安作今按雲安有喜雨詩言巢燕林花當是夏時得雨此云亢陽秋熱知非雲安矣且詩又云我圃蒼翠雲安匆匆焉得有圃其為夔州作無疑杜臆因詩有郊扉我圃疑為瀼西所作今按客堂詩言深山林麓雞柵詩言山腰阡陌何嘗非郊圃還依朱本入在大厯元年行雲遞崇高飛雨靄而至潺潺石間溜汩汩松上駛亢陽乘秋熱百穀皆一作亦已棄皇天德澤降燋卷有生意此章言積雨之象即下文所云今雨喜容易也聲上四雨景下四雨澤溜在山上故隔松傳響潺潺大而逺汩汩聲細而近文宋玉高唐賦朝為行雲翩謝朓詩朔風吹飛雨魏帝詩谷水潺潺落葉翩謝惠連詩響出山溜碧五海賦浤浤汩汩水聲也靈運詩活活夕流駛洪範行傳君將亢陽之節故旱災應也輝易百穀草木麗乎土日古詩皇天布德澤萬物生光應璩書頃者炎旱更甚砂礫銷鑠草木燋卷王褒詩摧殘生意餘前雨傷卒倉活切暴今雨喜容易音異不可無雷霆間去聲作鼓增氣佳聲達中宵所望時一致清霜九月天髣佛見滯穗此言久雨須雷庶秋晴有穫卒上四望雷下四得雷前漢師丹傳暴無漸百左傳一鼓作氣鶴三國序贊懦夫增氣長易一致而慮湛方生弔文負清霜而夜鳴門賦時髣佛以物類兮滯詩彼有遺􅕗此有穗郊扉及我私一作栽耘我圃日蒼翠恨無抱甕力庶減臨江費末乃感頌雨德圃蔬霑潤則汲水省費矣此章前二段各八句後段四句收子詩雨我公田遂及我私方謝朓詩蒼翠望寒山莊子貢至漢隂見一丈人為圃畦鑿隧而入井抱甕而出灌搰搰然用力甚多而見功寡雨二首此亦夔州所作首章云巢居云層臺次章云倚天石云長江白皆係峽中景象青山淡無姿白露誰能數上聲片片水上雲蕭蕭沙中雨此章對雨而念行人也首言雨中之景蕭雲氣蒙故山常淡雨濕多故露難辨片片秋雲之狀蕭秋雨之聲數江淹詩青山淡無姿頭邵注誰能暗用佛書雨露皆有數之義殊俗狀巢居層臺俯一作附風渚佳客適萬里沉思去聲情延佇挂帆逺色外驚浪滿吳楚久陰蛟螭出寇盜一云寇蓋復扶又切幾許下乃對雨之懷慮佳客萬里乃層臺所遙望者挂帆以下又沉思所計者杜臆佳客必有所指此章上四句下八句一博物志南越巢居北朔穴處元稹通州詩平地才應頃餘閣欄都大似巢居自注巴人都在山陂架木為居自號閣欄頭驚曹植詩之子在萬里角離騷結幽蘭而延佇海賦浪雷奔蛟龍屬無似蛇細頸頸上有白嬰四腳嬰逆鱗也螭似蛟無角如龍而黃古詩河漢清且淺相去復幾許空山中宵陰微冷先去聲枕席回風起清曙一作曉萬象萋已碧落落出岫雲渾渾倚天石日假何道行雨含長江白次章對雨而傷戍卒也首記峽中秋雨寫陰慘之狀上四見自宵及旦下四言雲濃雨晦陶潛詩夜中枕席冷象回風旋轉之風古詩曰風動地起而孝經鈎命訣萬咸載岫山穴也陶潛詞雲無心出岫黃日行有道赤道連檣荆州船有士荷去聲戈一作矛戟南防草鎮慘霑濕赴逺役羣盜下去聲辟山總戎備強敵水深雲光廓鳴櫓各有適次記雨中征戍寫愁苦之情黃杜臆草鎮地名想即黃草峽前詩云草峽西船不歸可證蓋峽西有亂總戎調荆兵以防之故船中軍士荷戈冒險而赴逺役羣盜指小寇言時又有下辟山者而總戎止備強敵不睱及之故鳴櫓合有所適峽中不能安枕可知已唐地志渝州冇壁山縣宋史辟山縣隸重慶府疑即此地光吳越春秋強敵之兵日駭漢昭帝詩雲開曙月低河漁艇息一作自悠悠夷歌負樵客留滯一老翁書時記朝夕末見漁樵自得而歎已之留滯也皆首段敘時景次段述時事所謂書時也而朝夕所見記於此矣此章前二段各八句末段四句收歌蜀都賦陪以白狼夷成章王嗣奭曰公憂旱詩云上天鑠金石羣盜亂豺虎今雖得雨而復憂盜前章憂吳楚之盜故恐逺客難行此章憂峽中之盜故憐士卒勞役耳江上鶴注當是大厯元年夔州作所顧注詩言江上倚樓此夔州西閣作也江上日多雨一作病蕭蕭荆楚秋髙風下去聲木葉永夜攬一作挈貂裘勳業頻看平聲鏡行藏獨倚樓時危思報主衰謝不能休上四敘景旅客悲秋之况下四言情舊臣憂國之懷夜不眠以至曙故對鏡倚樓看容色而計行藏但以報主心切雖衰年未肯自諉此公之篤於忠愛也黃生注勳業老尚無成故頻看鏡行藏抑鬱誰語故獨倚樓以鮑照詩江上氣早寒公春秋正皆義荆楚一木二名故為國號亦得二名莊之世經書荆僖之元年乃書楚人伐鄭蓋始改為楚也晉書羅含傳可謂荆楚之秋江􅓉詩髙風吹節變楚辭洞庭波兮木葉下業謝靈運羅浮山賦發潛夢於永夜自杜篤吳漢誅勳既崇庾信詩匣中取明鏡披圖照看經江淹詩豎儒守一未足識行藏陳師道後山曰真宗嘗觀子美詩勳業頻看鏡行藏獨倚樓謂甫之詩皆不逮此黃生曰此詩後半所云是本懷是正説其餘自嗤自怪自寬自釋皆即此意而反覆變化以出之詩以言志才以抒辭志不變者也辭百變者也才不能變則其志亦不足觀矣此非志之罪也才之罪也於此歎杜公之才之足以副其志也雨晴鶴注當是大厯元年夔州作雨時一作晴山不改晴罷峽如新天路看一作休殊俗秋江思去聲殺人有猿揮淚盡無犬附一作送書頻故國愁眉外長歌欲損神上四雨晴有感下四思鄉之意初雨時總是此山及晴罷而峽洗如新喜晴矣晴則可以出峽而猶然留滯故不勝愁思指殊俗指夔州淚盡蒙此秋思念家鄉無書蒙此故國洛陽愁睂外心愁而眼不能見也此凡引古典須用翻新猿聲霑淚黃犬附書情已悲矣説猿多而淚零已盡無犬而頻覔附書語倍悽慘上句用水經注漁父歌下句用陸機入洛事注皆别見蕭子顯詩雨罷葉增菉山峭夾水曰峽序天路猶云天邊即指夔州枚乘詩天路隔無期詩國異政家殊俗釋亡名詩愁眉獨向闕陸機詩長歌赴促節按羅景綸云雨晴山不改晴罷峽如新言或雨或晴山體本無改變唯既雨初晴則山際精神乃煥然如新此説似未當若上句出晴字則下句便復據公詩久雨巫山暗新晴錦繡文即此詩注腳知雨晴兩句乃分説也雨不絶梁權道依舊次編在大厯元年夔州詩內以詩有行雲莫自濕仙衣句也演義先之以鳴雨繼之以微雨故題云雨不絶鳴雨既過平聲漸細晉作細雨微映空搖揚去聲如絲飛階前短草泥不亂院裏長條風乍稀舞石旋應平聲將乳子行雲莫自濕仙衣眼邊江舸何匆促一作遽未待晉作得安流逆浪歸上六雨中景物末二雨際行舟不風狂而急故鳴而有聲既過則細若飛絲矣草沾汚見雨之微風雖乍稀雨仍未止也舞燕將子記暮春雨行雲濕衣切巫山雨江舸逆浪譏夔人冒險以趨利王褒詩空林鳴暮雨都應瑒詩乃肯顧細微密梁簡文詩春色映空來吳賦與風颻揚古詩雨如散絲沈約雨詩非煙復非雲如絲復如霧也朱注增韻室有垣墻者為院黃鶴謂是嚴武幕中非庾信詩河邊楊栁百尺枝别有長條踠地垂者黃生注石燕乳子神女濕衣此嚴羽所謂趣不關理羅含湘中記石燕在零陵縣遇風雨則飛舞如燕止則為石水經注燕山有石紺色狀燕其石或大或小及雷風相薄小者隨大者而飛如相將乳子之狀將領也古樂府一母將九雛胥演義莫自濕勸神女莫久行雨而自濕其衣也何詩拂鏡下仙衣撫南史庾子輿奉父喪歸至瞿唐大灘秋水猶壯子輿心長呌其夜水忽減退安流而下楚辭使江水兮安流舟樂府逆浪故相邀菱不怕搖律體以首尾為起闔三四承上五六轉下此一定章法也若在六句分截則上重下輕不見轉折生動之趣詩之可議在此亂朱瀚曰題便可怪搖揚如絲只是申上細微泥不語近於率風乍稀節外生枝舞石加乳子未免冗贅神女自濕衣何須過慮眼邊襯字匆促拙字安流逆浪反覆重言亦少意味此當係贋作也須辨之晚晴鶴注當是大厯元年秋分作何遜詩褰裳對晚晴返一作晚照斜初徹一作散浮雲薄未歸江虹明逺一作近飲峽雨落餘飛鳬雁一作鶴終高去熊羆覺自肥秋分客尚在竹露夕一作久微微上四晚晴之景下四晚晴有感返夕照映虹有似下垂而飲承上照雨後雲過尚帶餘點飄飛承上浮雲鳥獸逄秋而自得興已之久客未歸張正見詩鏡如臨風月流如飲澗虹前漢燕王旦時有大虹下於宫中飲井水竭按虹見則雨晴矣杜臆鳬不高飛字恐有誤陶潛詩間雨紛微微黃生曰上半寫景並精絶晚晴之景如畫三四倒裝句各上三字一讀五喻高蹈之士六喻貪庸之人公於兩者均無所處所以途窮作客留滯秋江也雨黃鶴編在大厯元年夔州詩內舟杜臆謂舟中所作蓋因趙注以風扉為扉耳萬木雲深隱連山雨未開風扉掩不定水鳥過舊作去仍回鮫館如鳴杼樵舟豈伐枚清涼破炎毒衰意欲登臺丄六雨中之景下二雨後之情定雲深而萬木隱藏者以雨氣連山而不開也風扉不水鳥仍回風雨並至也雨落空江聲如鳴杼樵人阻雨不能伐枚江邊雨驟也盧注登陽臺而襲快風衰意欲藉以少舒胡夏客曰風扉一聨意在言外比興無窮非僅摹景而已伐文選鮫人織綃於泉室江賦鮫人構館於懸流詩其條枚注枝曰條幹曰枚涼古艷歌夏節純和天清黃生曰杜詩吟風之句如風扉掩不定風幔不依樓風簾自上鈎寒聲風動簾風連西極動風前竹徑斜皆畫風手也奉漢中王手札鶴注漢中王貶蓬州刺史今出峽將歸京作書報公而公復之以詩州舊編在永泰元年今依朱氏入在大厯元年夔杜臆題上加奉字以天潢尊之其謹嚴如是國有乾坤大王今叔父尊剖符來蜀道歸蓋取荆門峽險通舟峻一作過江長注海奔主人留上客避暑得名園首段敘王行蹤主王時罷郡歸朝取道夷陵而暫留歸州也張逺注人指歸州守上客即漢中王胡夏客曰上四起局莊嚴通舟注海作去筆留客避暑作留筆溍注首句謂王所封之國甚大也書大傳周公曰吾今王之叔父也爵王讓皇帝之子代宗之叔父如曹植詩剖符梭玉王是加夷陵有荆門山其狀闕然於海吳越春秋決江導河東注梁元帝詩光時留上客前後緘書報分明饌玉恩天雲浮絶壁風竹在華軒已覺良一作涼宵永陳作逸何看平聲駭浪翻入期朱邸雪朝音潮傍去聲一作望紫微垣此想歸途景事堪饌玉蓋與緘書同贈者絶壁華軒即名園佳景良宵適不必觸浪前行朱邸指王第紫微指帝宫皓避暑在夏宵永屬秋還京正當冬雪敘次詳明丘戴詩饌王待鳴鐘蘇彥詩洪濤奔逸勢駭浪駕山國謝朓箋朱邸方開又詩黃旗映朱邸玉海漢書注郡朝宿之舍在京師者率名邸諸侯朱尸故曰朱邸座晉志紫微大帝之天子之所居也枚乘去聲文章老河間禮樂存悲秋宋玉宅失路武陵源淹泊俱崖口東西異石根夷音迷咫尺鬼物倚一作傍朝一作黃昏此記峽中景况宋枚乘自擬河間比王悲玉王在歸州失武陵公時之楚俱崖口兩地多山異石根彼此分手矣夷音鬼物厭蠻俗之醜惡自傷獨居夔州也趙曰梁孝王時枚乘在諸文士之間年最高時漢書景帝子河間獻王德學舉六藝被服儒術武帝來朝獻禮樂對三雍宫用宋玉宅在歸州哀江南賦誅茅宋玉之宅武陵源桃花源迷路事宋之問詩崖口衆山斷石根歸州在夔州之東石根山足也庾信詩橫琴坐夷音指楚語蕪城賦木魅山鬼昏見晨趨洞冥記明莖草照見鬼物之形宋之問詩山鬼泣朝昏犬馬誠為戀狐狸不足論平聲從音聰容草奏罷宿昔奉清樽末致臨岐繾綣之情時犬馬自方狐狸指當竊位者王於草奏之餘應念宿昔交歡囑其去後不忘也此章前三段各八句末段四句收曹植詩不勝犬馬戀主之情王張綱傳豺狼當道安問狐狸叨前漢京房傳為淮陽作求朝奏草沈佺期詩顧我郎署漸無草奏工清古詩宿昔夢見之古歌樽發朱顔返照杜臆謂詩作於西閣閣臨白帝城西故見返照演義詩成後偶舉二字為題非專詠返照也後有五律一首是全寫返照楚王宫北正黃昏白帝城西過雨痕返照入江翻石壁歸雲擁樹失山村衰年病肺惟髙枕絶塞愁時早閉門不可久留豺虎亂南方實有未招魂上四雨後晚晴之景下四衰病亂離之感雲雨痕初過故日照江而石壁之影搖動黃昏乍暝故擁樹而山村之路遮迷此時方欲髙枕閉門乃思及豺虎為亂則兹地不堪久留矣但恐驚散之旅魂未必能招之北歸耳愁時指亂招魂自謂顧注楚王宫在巫山縣西北九孫登詩飄揚楚王宫緬楚辭黃昏以為期吳均詩莖日返照江淹詩映石壁素史傅毅七激仰歸雲訴朔風晉庾信詩山村落獵圍夏張儀傳大王髙枕而卧封禪奏人望絶塞胡客曰愁時而在絶塞無可奈何唯早閉門耳可漢嚴助傳邊境之民為之早閉晏開楚辭山中不以久留時張載詩盜賊如豺虎公鶴注公屢以強鎮比豺虎是楊子琳攻崔旰未己知子琳將變故曰不可以久留三年子琳果殺夔州别駕張忠據其城恐盧注招魂者禮之所謂復也宋玉哀其師無罪放逐其魂魄離散故作招魂招魂曰魂兮歸來南方不可以止黃生曰前半寫景可作詩中圖畫後半言情能濕紙上淚痕視白帝城中詩較勝一籌以起屬正聲後半氣力雄厚故也説又曰年老多病感時思歸集中不出此四意而橫豎説反説正説無不曲盡其情此詩四項俱見至結語云云尤足悽神戛魄晴二首鶴注當是大厯元年初到夔州時作久雨巫山暗新晴錦繡文一作紋碧知湖外一作上草紅見海東雲竟日鶯相和去聲摩霄鶴數羣野花乾音干更落風處急紛紛此為久雨初晴而作也晴三四新晴逺景下四新晴近景錦繡文光映於山色碧字紅字另讀與青惜峯嵐過黃知橘柚來句法相同鶯和鶴羣自慨羇孤花落紛紛歎已飄零也劉繪琵琶峽詩照爛虹蜿集交錯錦繡陳湖外謂洞庭湖之外啼烏爭引子鳴鶴不歸林下去聲食遭泥去高飛恨久陰雨聲衝塞盡日氣射音石江深回首周南客驅馳魏闕心此章對晴景而感懷點啼烏下食鳴鶴髙飛見物情厭雨而喜晴雨聲日氣明題意末傷羇旅不歸也衝塞射江與魏闕相照太易鳴鶴在陰談史記太史公留滯周南公借以自喻史公乃司馬周南在今西安府涇陽縣在吕氏春秋中山公子謂詹子曰身江湖之上心居魏闕之下雨鶴注當是大厯元年作柏洙注詩云蛟龍鬬干戈盛是張獻誠楊子琳茂林並起兵討崔旰時也始賀天休雨還嗟地出雷驟看平聲浮一作巫非峽過密作一作塞密渡江來牛馬行無色蛟龍鬬不開干戈盛陰氣未必自陽臺乍晴復雷雨將作矣中四狀其雨至而勢大末言此關人事所召非由地氣使然詩蓋有感而作也殘盧注行無色從雨密來鬬不開從雨驟來上句喻凋未起下句喻戰爭不休易雷出地奮豫莊子秋水時至兩涘渚涯之間不辨牛馬詩漢武帝歌蛟龍騁兮放逺遊龍鬬野出漢書阮籍朔風厲嚴寒陰氣下微霜殿中楊監見示張旭草書圖鶴注此及後二篇同是大厯元年作杜臆楊本殿中監題云殿中楊監尊殿也草書云圖豈如右軍筆陳圖耶唐書殿中省監一人掌天子服御之事南齊有內外殿中監斯人已云亡草聖祕難得及茲煩見示滿目一悽惻楊示旭書起處總提詩人之云亡斯人指張及茲指楊陸機詩感物情悽惻悲風生微綃萬里起古色鏘鏘鳴玉動落落羣松直連山蟠其間溟漲與筆力此敘其書法之神妙狀微綃之上如風生萬里以筆有古意也玉動其疾徐松直狀其蒼徑連山狀其起伏溟漲狀其浩瀚賦潘嶽詩凱風揚微綃謝朓詩鏘鏘玉鑾動天台蔭落落之長松法書要録索靖章草書若雪嶺孤松氷河危石蕭思話行草如連岡盡望勢不斷絶溟漲謂溟渤漲水謝靈運詩溟漲無端倪名南史王僧虔論書云張芝索靖韋誕鍾會二衛並得前代無以辨其優劣惟見筆力驚異耳有練實先書臨池真盡墨俊拔為之主暮年思轉極未知張王後誰並百代則此贊其書學之精深家衛恆書勢𢎞農張伯英凡之衣帛必先書而後染練之臨池學書池水盡黑韋仲張謂之草聖杜臆俊拔為之主自是筆訣在草書尤難王羲之傳我書比鍾繇當抗行比張芝草猶雁行嗚呼東吳精逸氣感清識楊公拂篋笥舒卷忘寢食念昔揮毫端不獨觀酒德末結楊公之賞鑒揮草書逸氣足動楊之清識故常卷舒把玩而又念其毫落筆時旭醉後善書不獨酒德可觀公詩張旭三杯草聖傳可證氣此章四句起下三段各六句東吳精稟東吳之精本傳旭東吳蘇州人杜臆云李頎贈張顛詩皓首窮草隸時稱太湖精知旭原有此號也魏文帝書公幹有逸氣晉書衛瓘忠允清識有文武之才下班婕妤詩捐棄篋笥中鮑照詩朝日卷舒劉伶有酒德頌楊監又出畫鷹十二扇鶴注題云又出則是同時所作近時馮紹正能畫鷙鳥樣明公出此圖無乃傳其狀殊姿各獨立清絶心有向一作尚疾禁平聲千里馬氣敵萬人將去聲發首記畫鷹之神雋鷹杜臆此詩蓋因才志不展而興於鷹揚者公賦馬必有會心語此則清絶心有向是也羣前草書是張旭真迹此鷹圖乃臨摹馮畫獨立靜出有向動欲飛千里馬比其健萬人將喻其雄一禁當也云朱注謝赫畫計畫有傳移摹寫為十六法之張彥逺顧愷之有摹拓妙法古時好拓畫得七八亦有御府拓本謂之宫拓十二扇蓋拓馮監畫本也厯代名畫記馮紹正開元八年為户部侍郎善畫鷹鶻雞雉盡其形態嘴眼腳爪毛彩俱妙曾於禁中畫五龍堂有降雲蓄雨之感河圖説徴示鳥一足曰獨立敵洙曰漢文帝時有獻千里馬猛史記項羽學萬人宋武帝紀魯爽纍世將家驍善戰號萬人敵憶昔驪山宫冬移含元仗天寒大羽獵此物神俱王去聲當時無凡材百中去聲皆用壯粉墨形似間識者一惆悵此見鷹而慨往事而紹正乃開元間人故想出驪山校獵之盛不覺對畫惆悵也黃希曰舊書東內曰大明宫正殿曰含元殿驪山在昭應縣故幸驪山則移含元之仗洙曰玄宗太平時常以冬十月幸驪山溫泉宫較羽獵氣冿陽門詩注申王有髙麗赤鷹歧王有北山黃鶻逸竒姿特異他等上每校獵必置於駕前目為決勝兒雖揚雄有羽獵賦庾莊子澤雉十步一啄百步一飲神王不善也世説文康云見子嵩在其中常自神王百又桓溫曰萬石撓弱凡才顔史記養由基善射百發中用壯出易大壯卦氏家訓皆須粉墨不可濫也干戈少暇日真骨老崖嶂為去聲君除狡會是翻一作飛韝上末借真鷹寄慨老遊獵不暇鷹老空山矣然其力能摶雖猶可用也寫一畫鷹而世之治亂身之用舍俱在其中真是變化百出凌此章前二段各八句末段四句收鍾嶸詩品真骨霜高風跨俗崔旰輩孫楚鷹賦擒狡於平原鶴注狡指隋煬帝鷹詩雖蒙韝上榮無復凌雲志送殿中楊監赴蜀見相去聲公鶴注大厯元年二月杜鴻漸以黃門侍郎平章事帥蜀明年六月入朝此詩當是元年秋作相公指鴻漸去水絶還波泄雲無定姿人生在世間聚散亦暫時離别重平聲相逢偶然豈足一作定期送子清秋暮風物一作動長年悲首段送别楊監散上二興下聚散别離二句承聚送子二句承古詩長江無回波泄雲雲之飄散者鮑照詩泄雲去不極馳波往不窮悲殷仲文詩風物自凄涼淮南子木葉落長年豪俊貴勳業邦家頻出師相去聲公鎮梁益軍事無孑遺解榻再見今用才復扶又切擇誰此言楊當受知於杜相才國家出師之日正豪俊見之時也州初學記劍南道禹貢梁州之域自劍閣西南方為益出師表曉暢軍事詩靡有孑遺後漢徐稚傳陳蕃為太守惟稚來特設一榻去則懸之左傳維楚有材晉實用之况子已高位為郡得固辭難拒供給費慎哀漁奪私干戈未甚息綱紀正所持此言楊當愛民以盡職情於供億之中能絶侵漁此正操綱紀而恤下也唐志殿中監從三品則其位已髙漁得固辭言不得固辭也書禹謨稽首固辭景帝紀奪百姓侵牟萬民又二千石官長綱紀人倫泛舟巨石橫登陸草露滋山門日易去聲夕一作久當念居者思末致丁寧之意今言水陸之艱難此居者代為行人思也我日夕還山客當念此而致戒於前途矣巨此章八句起四句結中二段各六句子虛賦內隱石白沙宋之問詩草露濕人衣已隋蕭子隆詩山門一絶左傳不有居者贈李十五丈别鶴注李十五丈即文凝祕書也前寄李祕書詩云衣冠八尺身又云玄成負文彩此詩云不聞八尺軀又云玄成美價存故知為文凝也前詩在大厯元年夏作此乃其秋作也峽人鳥獸居其室附層巔下臨不測江中有萬里船多病紛倚薄迫各切少留改歲年絶域誰慰懷開顔喜名賢此敘在夔景事其杜臆前寄李詩云猿鳥千崖窄江湖萬里開上四乃注疏也見萬里船則思出峽名賢慰懷喜對李丈也詩魏都賦蠻陬夷落度道而通者鳥獸之氓謝靈運築觀基層巔漢武都太守李翕西峽頌下冇不測之溪心謝靈運詩拙疾相倚薄倚薄猶言交迫又開顔披胸荀悅漢紀序殊德名賢孤陋忝末親等級敢比肩人生意氣一作頗合相與襟袂連一日兩遣僕三日一共筵揚論展寸心壯筆過飛泉玄成美價存子山舊業傳不聞八尺軀常受衆目憐此述李丈交誼并其才品公李與公必同輩親戚故云末親比肩遣僕共筵李待厚也展寸心其議爽快過飛泉其詩敏捷玄成子山皆父子顯達以比李之家世通貴學記獨學而無友則孤陋而寡聞蔡雍陳留太守碑意氣精朗改潘嶽賦躡踵側肩掎裳連袂思鮑照詩撫寸心而未曹植王仲宣誄文若春華若湧泉東周書庾信字子山父肩吾為梁太子中庶掌管記室海徐摛為左衛率摛子陵及信並為抄撰學士父子在東宫既有盛才文並綺麗故世號為徐庾體焉陳壽諸葛亮表身長八尺容貌甚偉且為辛苦行蓋被生事牽北回白帝棹南入黔陽天汧公制方隅迥出諸侯先封內如太古時危獨蕭然清高金掌露一作莖露一作莖掌正直朱絲絃昔在堯四嶽今之黃潁川此述李行之故兼美汧公注封內言其治化金露比其清操朱絃比其直節朱舊書勉坦率淡素好古尚竒清亷簡易為宗臣之表清高數語乃其實録舊一統志重慶府彭水縣自三國至唐皆名黔陽縣注汧公李勉也宗室鄭惠王孫鶴注舊史大厯七年勉拜工部尚書及滑亳節度不言封汧國新史謂自嶺南節度召歸進工部尚書封汧國公勉以大厯四年入嶺南歸在五年公殁之後今此詩已云汧公蓋新史誤也黃生注時李勉為梁州都督山南西道觀察使李往訪之由蜀入黔為自北而南也盧思道集外靜方隅內康庶績管子四封之內曰金莖露見二卷之後漢黨錮傳直如弦死道邊洙四嶽分掌四方諸侯漢黃霸為潁川太守有治狀于邁恨不同所思無由宣山深水增波解榻秋露懸客遊雖云久主要平聲陳作亦思月再圓晨集風渚亭醉操雲嶠篇丈夫貴知已歡罷念歸旋此送别李丈而望其再晤也不同不得同行所思指汧公言懸上言三日共筵李丈蓋嘗設榻以待公今則解榻而諸秋露之傍矣客遊久言李丈行蹤月再圓訂别後重逢可朱注李往汧公必有留連詩酒之興然為歡易盡不久遊而忘返也此章八句起十句結中二段各十二句方詩從公于邁也王融詩結賞自雲嶠移燕乃壺此遊仙詩黃生曰此詩北回南入二句杜田謂李丈訪勉於梁州是也黃鶴謂由黔南以入豫章故下有解榻秋露懸句是就用陳蕃事其固已甚夫由蜀入豫章一水之便反迂道以入黔陽何為者耶如解榻再見今前以之贈楊監矣豈必泥於江西乎種萵苣并序公鶴曰當是大厯元年秋作句朱注萵苣借以自喻序有晚得微祿詞旨甚明既雨已秋堂下理小畦隔種一兩席許萵苣萵烏禾切苣勤吕切向二旬矣而苣不甲拆獨野一作伊人非莧青青傷時君子或晚得微祿轗軻不進因作此詩本草萵苣花子並同白苣江東人謂之萵筍謂莧有赤白二種或細莧俗謂野莧陰陽一錯一作屯亂驕蹇不復扶又切理枯旱干其或作此中炎方慘如燬植物半蹉跎嘉生將已矣從夏旱敘起致陰陽錯亂而旱亦有感時事也不復理謂不循常理蹇蔡雍詩苦熱氣驕蹇邵注驕謂日色驕亢蹇謂雨水澀司馬相如難蜀父老文若枯旱之望雨地詩王室如燬川周禮地官大司徒以土會之法辨五之物其山林澤丘陵墳衍原隰各有植物也史記神降之嘉生注嘉穀雲雷歘奔命師伯集所使指揮赤白日澒洞青光一作雲色起雨聲先以晉作以一作已風散足盡西靡此秋雨大作之象日奔命奉上帝之命所使為造化所使指揮色藏影澒洞雲氣鬱蒸舊注西靡言雨散而斜向西也於左傳子重子反一歲七奔命揚雄河東賦叱風伯南北兮呵雨師於東西宋謝朓詩森森散雨足玉笛賦白日西靡山泉落滄江霹靂猶在耳終朝紆颯沓信宿罷瀟灑灑同想里切堂下可以畦呼童對經始此雨後治畦之事經猶霹靂雷久矣紆颯沓風緩矣罷瀟灑雨止矣對始兩童相對而治畦也易山下出泉沓應瑒西狩賦颯風翔苣兮蔬之常隨事藝其子破塊數席間荷去聲鋤功易音異止兩旬不甲拆空惜埋泥滓此見嘉蔬之難植鳴藝子下種也破塊鋤土也月鹽鐵論周公之時風不條雨不破塊陶潛詩帶荷鋤歸易雷雨作而百果草木皆甲拆野莧迷汝來宗生實於此此輩豈無秋亦蒙寒露委翻然出地速滋蔓户庭毁此見賤種之易繁生不知汝從何來叢於此憎之也一當秋露寒涼不久委落危之也户庭毁謂遮塞路徑吳都賦宗生髙岡族茂幽草揚雄蜀都賦其竹則宗生簇攢俊茂豐美易鮑照詩歸華先委露左傳無使滋蔓不出户庭因知邪干正掩抑至沒齒賢良雖得祿守道不封已擁塞先則切敗芝蘭衆多盛荆杞此拈出本意著眼在邪干正三字小君子守道潔已其芳澤可以被人人必欲摧抑終身如荆杞之敗芝蘭也杞掩抑至沒齒此公痛心疾首語苣莧是比義芝蘭荆又是比中之比守干侵害也詩道自不擕吳均詩掩抑摧藏張女彈李謝靈運國語叔向曰引黨以封已康運命論封已養高勢動人主中園陷蕭艾老圃永為恥登於白玉盤藉以如霞綺莧也無所施胡顔入筐篚仍以喻意作結見邪終不能勝正也登蕭艾陷苣老圃傷心豈知久屈終伸玉盤霞綺之上苣而不用莧君子之可貴猶是矣此章七段各六句分截老世説寧為蘭摧玉折不為蕭敷艾榮詩注蕭蒿也圃見論語漢官儀封禪壇有白玉盤徐摛詠橘詩愧以無雕飾徒然登玉盤忍藉綺盤下承之以綺謝朓詩餘霞散成綺曹植表垢茍全則犯詩人胡顔之譏高元之荼甘録曰自古工詩者未嘗無興也覩物有感則有興今之作詩以興近乎訕也故不敢作而詩之一義廢矣杜萵苣詩云兩旬不甲拆空惜埋泥滓野莧述汝來宗生實於此皆興小人盛而掩抑君子也至髙適題處士園云耕地桑柘間地肥菜常熟為問葵藿資何如廟堂肉則近乎訕矣作詩者知興之與訕異始可與言詩矣白帝鶴注當是大厯元年秋作白張逺注此在白帝城而作非専咏帝也白帝城中雲出門一作城頭雲若屯白帝城下雨翻盆高江急峽雷霆鬬翠一作古木蒼一作長藤日月昏戎一作去馬不如歸馬逸千一作百家今有百一作十家存哀哀寡婦誅求盡慟哭秋原何處村此章為夔州民困而作也上四峽中雨景下四雨後感懷江流助以雨勢故聲若雷霆之鬬樹木蔽以陰雲故昏霾日月之光此陰慘之象也戎馬之後百家僅存户口銷於兵賦故寡婦遍哭於秋村此為崔旰之亂而發歟馬杜臆前敘雨景便興下亂象戎馬指作亂者不如歸逸笑其勞而無益光莊子望之若屯雲震馬融廣成頌暗昧不覩日月之聾昏不聞雷霆之王逸楚辭注雲興而日月閽之陽國語范文子立於戎馬之前鼂錯書調立城邑無下千家書歸馬於華山文心雕龍百家飈駭泣楚辭聲哀哀而懷髙丘兮陳賈捐之對老母寡婦飲巷哭左傳誅求無藝後主詩四野秋原暗杜詩起語有歌行似律詩者如倚江柟樹草堂前古老相傳二百年是也有律體似歌行者如白帝城中雲出門白帝城下雨翻盆是也然起四句一氣滚出律中帶古何礙唯五六掉字成句詞調乃稍平耳黃草朱注觀首二句乃夔州作無疑黃鶴疑松州被圍謂廣德二年事因以秦中驛使為李之芳使吐蕃蜀道兵戈為徐知道據劍閣全解俱謬今以舊編正之單復編在大厯元年之秋黃草峽西船不歸赤甲山下人行一作行人稀秦中驛使去聲無消息蜀道兵一作干戈有是非萬里秋風吹錦水誰家别淚濕羅衣莫愁劍閣終堪據聞道去聲松州已被去聲圍此章為蜀中兵亂而作也上四刺崔旰下四憂吐蕃處船不歸水阻也行人稀陸梗也無消息未聞朝命區有是非郭崔互有曲直錦江别淚憶舊交之遭亂者松州被圍則全蜀安危所係故所憂不獨在劍閣也黃草峽在涪州上流四十里赤岬山在夔州府東北七里通鑑大厯四年涪州守捉使王守仙伏兵黃草峽胡三省曰黃草峽在涪州之西益州記涪州黃葛峽有相思崖今名黃草峽山草多黃故名水經注赤岬山公孫述所造因山據勢周回七里一百四十步東髙二百丈西北髙一千丈南連基白帝山甚髙大不生樹木其石悉赤土人云如人袒胛故謂之赤甲山或王粲為劉表書河山阻限狼虎當路雖遣驛使或至否吳越春秋欲興兵戈以誅暴楚錦莊子無成心而有是非橫萬里橋在成都庾信詩水照簪裾又别淚損波恐何遜詩復濕羅衣朱鶴齡曰考唐史杜鴻漸至蜀崔旰與楊子琳柏茂林等各授刺史防禦而不正崔旰專殺主將之罪故有兵戈是非之語蓋言崔亂成都柏楊討之其是非不可無辨也然旰本建功西山郭英又通其妾媵激之生變其罪有不專在旰者未幾釋甲隨鴻漸入朝而吐蕃則歲歲為蜀患故末語又不憂劍閣而憂松州也松州先為吐蕃所陷此云已被圍必中間嚴武又收復之白鹽山鶴注當是大厯元年秋作卓立羣峰外蟠根積水邊他皆任厚地爾一作我獨近去聲高天白榜千家邑清秋萬估一作古一作里船詞人取佳句刻畫竟誰一作難傳英華作刷練始堪傳集上四寫山勢之孤高中二記人民之聚末則自信詩句足傳也積杜臆山高者基必大此山卓立羣峯之表乃蟠根於水之邊望若懸空是不任地而近天矣豈非夔府一竒觀哉且繞山而上千家成邑積水之中萬估船來又蜀中一都會也向者春望此山雖有斷壁紅樓之句今秋親厯其地苦心刻劃而始得此山真面目但恐詞人取句未必能傳耳此詩細玩始知描寫之工後來選者不及論文笑自知信矣而謝莊月賦任地班形扁東京賦豈徒局高天踳厚地已哉白榜指門上額邑杜臆地志載赤甲山有孤城即魚復縣鹽山不言有此特言其有似千家之邑耳江淹詩刻劃崷崒兮山雲而碧峯山黃希曰世説周顗云刻劃無鹽此因名白鹽故有末句謁先主廟鶴注成都有先主廟夔州亦有之先主伐吳步歸魚復崩於永安宫所以有廟永安宫在豐溪之側即詩中青溪也搖落乃秋候當是大厯元年秋作方輿勝覽廟在奉節縣東六里慘淡風雲會乘時各有人力侔分社稷志屈偃經綸復漢留長策中原仗老臣雜耕心未已歐於口切嘔同血事酸辛霸氣西南歇雄圖厯數屯錦江元過楚劍閣復扶又切通秦首敘先主始末遂當時創業未半委之武侯及武侯既殁而漢祚亡矣各有人孫曹角立也力侔謂三國鼎峙志屈謂征吳未遂仗老臣以復漢即先主臨終時所謂君才十倍曹丕必能定大事也雜耕渭南歐血軍中此出師表所謂鞠躬盡瘁死而後已者也霸氣二句言天命去而漢祚終舊注錦江劍閣蜀地也過楚通秦傷其不久而合於晉都杜臆蜀漢不興以霸氣歇厯數屯天限之也不然蜀雖小其東達楚可以取吳其北通秦可以取魏何患不能混一哉按此説多一轉折不如前説為當世説道一道人曰風霜固所不論乃先集其慘淡雲陸機詩靄靄風雲會雲臺二十八將論咸能感會風奮其知勇吳越春秋湯武乘四時之利而制夏殷社陸抗疏德均則衆者勝寡力侔則安者制危左傳稷有主易君子以經綸策出師表北定中原興復漢室也晉郭欽疏萬世之長也吳越春秋先王之老臣蜀志亮與司馬懿對於渭南每患糧不繼分兵屯田為久駐之基耕者雜於渭濱居民之間百姓安堵軍無私焉鍾會檄文勞役未已未然已然二字折開與酸辛為借對發魏志亮糧盡勢窮憂恚嘔血一夕燒營遁走入谷道病卒裴松之曰亮在渭濱魏人躡迹勝負之形未可測量而云嘔血蓋因孔明亡而自誇大也夫以孔明之略豈為仲達嘔血乎劉琨喪師與元帝箋亦云亮軍敗嘔血此則引虛記以為言也阮籍詩舉翼更酸辛吳越春秋范蠡曰霸王之氣見於地户在謝朓詩雄圖悵若茲書天之厯數爾躬舊俗存祠廟空山立一作泣鬼神虛簷交一作扶鳥道一作過枯木半龍鱗竹送清樊作青溪月苔移玉座春閭閻兒女換歌舞歲時新此寫廟中景事度交鳥道廟之髙半龍鱗水之古竹送二句見歲時屢閭閻二句見廟祀常存盧世㴶曰此見人心思漢厯數百年如一日也舊俗後漢成安侯傳帝為起祠廟國語卒厯代之立謂設立神像作泣鬼神者未安信江總詩虛簷靜暮雀虛南中八志鳥道四百里庾詩自能枯木潤子賦照爛龍鱗抱朴子松樹其皮中有脂狀如龍形春杜臆清溪之月從竹稍露出故云竹送玉座之苔與色頻呈故云苔移千玉座神牀也謝朓詩玉座猶寂寞舞東都賦閭閻且黃注兒女即歌舞者左傳歌不倦竺僧度詩倐忽歲時過絶域歸舟逺荒城繫音計馬頻如何對搖落况乃久風塵孰荆作勢與關張並功臨耿鄧親應一作繼天才不小得士晉作土契無鄰遲暮堪帷幄飄零且釣緍一作罠向來憂國淚寂寞灑衣巾此謁廟而有感也孰周甸注當此風塵搖落中與關張並列而功侔耿鄧乎必有真主應天之才方成君臣契合之機今年齒遲暮豈堪更參帷幄秪作磻溪釣叟已耳但憂國念深不禁淚灑衣巾也君杜臆後八句一是言有君則有臣一是歎有臣而無此思古傷今之語他此詩中八句乃敘題前後各十二句全以議論成章人無此深厚力量李陵書出征絶域謝朓詩天際識歸舟兮又荒城迥易隂衰劉琨詩繫馬長松下塵楚辭蕭瑟草木搖落而變周王褒詩久戍風色床蜀志關公字雲長張飛字翼德先主與二人寢則同恩若兄弟陳書蕭摩訶仕陳屢從吳明徹北伐謂其材不減關張畤後漢書耿弇字伯昭從光武拜建威大將軍後封好侯鄧禹字仲華光武安集河北拜前將軍後定河東拜為司徒封高密侯應蜀志譙周等上言聖王應際而生與神合契願大王天順民武侯本傳先主曰孤之有孔明猶魚之有水所謂得士契無鄰也史記嚴仲子亦可謂知人能得士矣無鄰無與比鄰也用楚辭恐美人之遲暮籌黃生注帷幄用子房事釣緡太公事髙帝紀運帷幄之中吾不如子房緡庾信賦將軍一去大樹飄零緡詩其釣維何維絲伊抱朴子施釣緡於修木之末一作罠引文選注鹿網為證非也公在江邊故云釣緡進有憂國之心楚辭寂寞而絶端前漢蓋寬饒傳沈約詩寧假灑衣巾善作詩者必構全局全局既定則議論得展而意義層出矣此篇若無起段之激昻悲壯則開端少力量若無後段之感慨淋漓則收結少精神能以弔古之情寫用世之志足令千年上下英雄墮淚烈士撫膺不獨記敘廟貌處見其古色斑斕哀音悽愴也孔明與伊吕相伯仲舊説以關張相比並非也一云孔明豈與關張相並直與耿鄧相親亦非也詩本言先主而突贊武侯語氣不符據杜臆公不以將材自居而欲為中興名佐是也公當流落風塵之中而追懷應天得士之遇故有此言耳胡應麟曰力侔分社稷志屈偃經綸歐蘇得之而為論宗江山如有待花栁更無私程邵得之而為理窟魯衛彌尊重徐陳略喪亡魯直得之而為沉深白屋留孤樹青天失萬艘無已得之而為徑瘦煙花山際重舟楫浪前輕聖俞得之而為間淡江城孤照日山谷逺含風去非得之而為渾雄凡唐末宋元人不皆學杜其體則杜集咸備元微之謂自詩人來未有如子美者乃不易之論至輕俊學流時相詆駁纍亦坐斯然益足見其大也古柏行鶴注此大厯元年至夔州作夔趙次公曰成都先主廟武侯祠堂附焉州先主廟武侯廟各别此詩云孔明廟前有老柏蓋指夔州柏也中云憶昔路繞錦亭東先主武侯同閟宫追言成都廟中柏也公夔州十絶云武侯祠堂不可忘中有松柏參天長此可證也蔡夢弼曰成都先主廟西院即武侯祠有武侯手植古柏公蜀相詩云丞相祠堂何處尋錦官城外柏森森此又一證也甚田况古柏記自唐季凋瘁厯王孟二國蠧稿尤然以祠中樹無敢伐者宋乾德丁卯歲仲夏枯柯復生日益敷茂觀者歎聳以為榮枯之變應時治亂自三分迄今八百餘年矣明季蜀經張獻忠之亂成都老柏今不復存孔明廟前一作階有老柏柯如青銅根如石霜一作蒼皮溜雨一作水四十圍黛色參天二千尺雲來氣接巫峽長月一作日出寒通雪山白二句舊在愛惜之下今依須溪改正君臣已與時際會樹木猶為人愛惜首咏夔州柏而以君臣際會結之銅比幹之青石比根之堅霜皮溜雨色蒼白而潤澤也山四十圍二千尺形容柏之高大也氣接巫峽寒通雪正從高大處想見其聳峙陰森氣象耳君臣際會即起下先主武侯尺巫峽在東而近雪山在西而逺朱注四十圍二千皆假象為詞非有故實夢溪筆談譏其太細長湘素雜記以古制圍三徑一駁之次公注又引南鄉故城社柏大四十圍皆為鄙説考水經注社柏本云三十圍亦與此不合銅任昉述異記盧氏縣有盧君冡冢傍柏二株根徑如石賦劉越石扶風歌上枝拂青雲中心十數圍山江淹竹黛色參天蕭懿詩雲來覺山近宜都川記巴東三峽巫峽長其詩月出皎兮况張衡同聲歌邂逅承際會左傳思人猶愛其樹用其道而不恤其人乎憶昨路繞錦亭舊作亭英華作城東先主武侯同閟宫崔嵬枝幹郊原古窈窕丹青户牖空落落盤踞雖得地冥冥孤高多烈風扶持自是神明力正直元因造化功此咏成都柏而以神力化功結之而郊原古有古致也户牖空虛無人也此柏下雖得地上受風侵至今長存無恙者蓋以神明呵護為造化鍾靈耳武廟在錦城之西不當言城東當以亭東為正朱注嚴有寄題杜二錦江野亭詩故曰錦亭之詩閟宫有侐幽蕭子範詩郊原共超詩正義所居宫形狀窈窕深而間靜也魯靈光殿賦旋室㛹娟以窈窕篤司馬相如傳丹青赭堊西鮑照詩開軒當户牖杜首陽山賦長松落落京雜記中山王文木賦或如龍盤虎踞欲沈約髙松賦鬱彼高松栖根得地陸機豪士賦序隕之葉無所借烈風柏天台山賦實神力之所扶持聰莊子受命於地惟松獨也正左傳內史過曰神明正直而一者也化王羲之詩大矣造功萬殊莫不均大厦如傾要梁棟萬牛回首丘山重不露文章世已驚未辭剪伐誰能送苦心豈免容螻蟻香一作密葉終一作曾經一作驚宿鸞鳳志士幽人莫怨嗟一作傷古來材大難為一作皆難用此從咏柏寄慨而以材大難用結之濟世大任必須大材間世大材須是大用能用則為宗臣名世不用則為志士幽人此末段託喻大意大厦四句伏下材大難用容螻蟻傷其赤心已盡宿鸞鳳喜其餘芳可挹賦中皆有比義此章三韻分三段每段自為起結文中子大厦之傾非一木所支小晉書袁粲見王儉而嘆曰宰相之材也栝柏豫章雖已有棟梁之器杜預水災疏所留好種萬頭此萬牛所本楚鮑照詩丘山文不可勝文木賦既剝既刋見其文章辭青黃雜糅章爛兮蟻詩蔽芾甘棠勿剪勿伐母郭璞蚍蟻賦屬莫賤於螻謝承後漢書方儲遭憂種松柏鸞棲其上焦氏易林枝葉盛茂鸞鳳以庇衡何遜詩臨川何怨嗟杜臆才大難為用出王充論即孔子道大莫容意邵注引莊子樗樹大而無用不切黃常明曰不露文章世已驚未辭剪伐誰能送先器識後文藝與浮華炫露者自異也大厦如傾要梁棟萬牛回首丘山重此賢者難進而易退非其招不往也王嗣奭曰公生平極贊孔明蓋竊比之意孔明才大而不盡其用公嘗自比稷契而人莫之用故篇終結出材大難用此作詩本旨發興於古柏者不然廟樹豈真梁棟之需哉范元實曰詩有形似之語若詩人賦蕭蕭馬鳴悠悠斾旌是也有激昻之語若詩人興周餘黎民靡有孑遺是也古人形似之語如鏡取形燈取影激昻之語孟子所謂不以文害辭不以辭害意者今遊武侯廟然後知古柏詩所謂柯如青銅根如石信然決不可改此乃形似之語霜皮溜雨四十圍黛色參天二千尺雲來氣接巫峽長月出寒通雪山白此乃激昻之語不如此則不見柏之髙大也文章固多端然警策處往往在此兩體夢溪筆談曰樂天長恨歌云峨嵋山下少人行旌旗無光日色薄峨嵋在嘉州與幸蜀路全無涉子美武侯廟柏詩云霜皮溜雨四十圍黛色參天二千尺四十圍乃徑七尺無乃太細長耶此皆文章之病也少陵題先主武侯詩特具論世知人之識從古詩家所僅見者宋儒王十朋梅溪集有祭文二首短句枯韻堪與少陵相為羽翼其謁昭烈廟云嗚呼東都之季盜窺神器分鼎者三帝乃劉氏有髙皇度有光武氣有王佐臣無中原地以區區蜀抗大國二天厭漢德壯圖弗遂功雖少貶四海歸義永安故宫遺迹可記君臣有廟英雄墮淚歲月侵逺棟宇莫治來守是邦過而興喟一新廟貌薄薦殽胾傍觀八陳細讀三志我雖有酒不祀曹魏又謁武侯廟云丞相忠武蜀之伊吕髙卧南陽悲吟梁甫草廬之中三顧先主將漢是興非劉曷與君臣魚水蛟龍雲雨才十曹丕志小寰宇假令無死師一再舉吳魏可吞禮樂可許寧使英雄墮淚今古將略非長庸史之語受命天子來帥兹土夢觀八陳果至夔府廟貌僅存風流可覩旁有關張一龍二虎安得斯人以消外侮杜詩詳注卷十五
