body:
  text: 杜詩詳註巻十四翰林院編修仇兆鰲撰寄董卿嘉榮十韻黄鶴注當是廣徳二年秋作聞道去聲君牙帳防秋近去聲赤霄下臨千仞雪一作千雪嶺却背音佩五繩橋首記董卿防秋之地言近赤霄言其髙千仭雪言其寒五繩橋其險君牙帳謂董君之牙帳吴注引邢君牙謬矣王洙曰兵家書牙旗將軍之旗立於元帥帳前故謂之牙旗曹植詩高牙乃建南部新書近代通謂府庭為公衙即古之公朝也字本作牙詩曰祈父予王之爪牙祈父司馬掌武備象獸以爪牙為衛故軍前大旗謂之牙旗出師而有建牙禡牙之事軍中聽號令必至牙旗之下與府朝無異近俗尚武是以通呼公府門為牙門字訛變轉為衙東京賦注竿上以象牙飾之後人逐以牙為衙鶴曰唐志佛堂一百八十里至勃令驛鴻臚館至贊普牙帳前高適謂三城邈在窮山之顛其髙可知雪山注見謝靈運詩連峯競千仞以元和郡國志繩橋在茂州西北架大江上今按繩橋蔑索五條布板其上架空而度山在橋外故却轉與橋相背海内久戎服京師今晏朝音潮犬羊曾音層爛漫宫闕尚蕭條猛將去聲宜嘗膽龍泉本作淵必在腰黄圖遭汚去聲辱月窟可焚燒㑹取干戈利無令平聲斥候驕居然雙捕虜自是一嫖姚中敘吐蕃之亂勉其敵愾也腰亂後事冗故日晏退朝嘗胆劍欲報汚辱月窟在西吐蕃巢穴也兵利寇退則斥候不驕捕虜嫖姚以古名將望之家語子路戎服見孔子羣漢明帝論日晏坐朝幽枉必達孫應劭曰犬馬為班婕妤賦登薄軀於宫闕兮子荆書蕭條非復漢有甘李陵書猛將如雲鐵吴越春秋采葛婦歌嘗膽不苦如飴越絶書取英作鐵劍三枚一曰龍淵風胡子曰欲知龍淵觀其狀如登高山臨深淵詩避唐諱改稱龍泉哀江南賦擁狼望於黄圖駱賓王詩紫塞流沙北黄圖灞水東唐藝文志有三輔黄圖一巻張溍注黄圖猶今之黄冊後漢魯恭疏汚辱善人長楊賦西壓月窟否西域傳斥候百人五分之擊刁斗自衛張翰詩能居然别後漢馬武傳建武四年武與虎牙將軍葢延等討劉永拜捕虜將軍嫖姚注别見落日思輕騎去聲高一作秋天憶射義從石音讀從謝音鵰雲臺畫户化切形像皆為去聲掃氛妖末結寄懐之意重為激勵也寇落日高天秋時景輕騎射鵰軍中事雲臺諸將以掃著名董卿當自勉矣此章首尾各四句中間十二句轉北齊書斛律光嘗射一大鳥正中其頭形如車輪旋而下乃鵰也邢子高歎曰此射鵰手時號為落鵰都督立秋雨院中有作廣徳二年秋在嚴武幕中作院中節度使府署山雲行絶塞大火復扶又切西流飛雨動華屋蕭蕭梁棟秋窮途愧知已暮齒借前籌已費清晨謁那成長子兩切者謀敘立秋逢雨在院有感也也借籌時為參軍長者指嚴公言不能成就其謀此及下段皆一景一情疊敘上下相應火詩七月流火注大火心星也七月則此星西流左傳猶西流司厯過也謝靈運詩華屋非蓬居侯謝朓詩朔風吹飛雨蕭條江上來詩風雨蕭蕭留世家臣請借前箸為大王籌之好謀而成子為長者慮句中兩用語孟解衣開北户高枕對南樓樹濕風凉進江喧水氣浮禮寛心有適節爽病微瘳主將去聲歸調鼎吾還訪舊丘撫院中雨景思及草堂也景北户南樓幕府宫室樹濕江喧雨時象訪舊丘復尋花溪也舉此章上下各八句調漢官儀三台助鼎調味牛𢎞食歌鹽梅既濟鼎鉉還舊丘黄生謂隨武回京按破船詩云緬邈懐舊丘本指草堂此可相證奉和去聲嚴鄭公軍城早秋鶴注當是廣徳二年秋七月在幕府作秋風嫋嫋動高旌玉帳分弓射音石虜營已收滴博雲間戍欲奪胡三省作次取蓬婆雪外城此詩稱嚴公將畧上二早秋軍城下二頌其戰功九歌嫋嫋兮秋風博趙曰玉帳謂大將軍之帳詳十一巻困學紀聞的嶺在維州韋臯傳出西山靈闗破峨和通鶴定亷城踰的博嶺遂圍維州摶雞棲攻下羊溪等三城取劍山屯焚之鶴曰蓬婆乃吐蕃城名元和郡國志柘州城四面險阻易於固守有安戎江蓬婆水在州南三十里大雪山一名蓬婆山在柘縣西北一百里王胡夏客曰唐書吐蕃傳開元二十六年劍南節度使昱攻安戎城於城左右築兩城以為攻拒之所頓兵蓬婆嶺下運資糧守之吐蕃來攻安成官軍大敗兩城並陷將士數萬及軍糧甲仗俱沒此云欲奪蓬婆雪外城望其為中夏雪恥也黄生曰詩中用地名必取其佳者方能助色如鳳林魚海烏蠻白帝魚龍鳥䑕是也滴博蓬婆地名本粗硬用雲間雪外字以調適之讀來便覺風秀運用之妙如此軍城早秋附嚴武詩昨夜秋風入漢闗朔雲邊雪一作月滿西山更催飛將去聲追驕鹵莫遣一作故沙場匹馬還此詩見嚴武雄心上二邊秋之景下二軍城之亊以催飛將謂風雪促行矣張溍曰嚴詩豪健無匹宜其風雅重公可謂同調唐民謡將士長歌入漢闗鹵漢書匈奴號李廣為飛將公羊傳匹馬隻輪無返者沈佺期詩薄命由驕嚴武傳廣徳二年九月破吐蕃七萬餘衆抜當狗城遂收鹽川城通鑑武以崔旰為漢州刺史使將兵擊吐蕃於西山連抜其城攘地數百里院中晚晴懷西郭茅舍即浣花草堂年鶴注當是廣徳二秋作幕府秋風日夜清澹雲疎雨過高城葉心朱實看平聲一作堪時落階面青苔老更從英華他本作先自黄生作元自生復扶又切有樓臺銜暮景同影不勞鐘鼓報新晴浣花溪裏花饒笑肯信吾兼一作今吏隠名此不樂居幕府而作也上四雨後秋色五六院中晚晴七八西郭茅舍皆朱實落承秋風青苔生承疎雨晚影西照鐘鼓聲高晴占也溪菊正開若笑人勞攘者彼亦肯信我吏隠之志否耶厚杜臆玩未二句直欲乞休而其詞含蓄近謔温柔敦之意可見劉琨詩朱實損勁風朱瀚曰落其實見左傳俗江淹詩青苔日夜黄占蕭懿詩樓臺自相隠舊注以鐘鼓聲亮為晴之故曰報新晴花徐悱妻劉氏百舌詩庭樹且新晴免唐太宗詩笑樹分色舊以饒笑為多笑或解作笑引公詩日月不相饒為證濤汝南先賢傳鄭欽吏隠於蟻陂之陽楊徳周曰晉山吏非吏隠非隠公在幕府為吏歸草堂為隠兼有其名也盧世㴶曰此詩舉束縛蹉跎無可奈何意一㾗不露只輕輕結語云浣花溪裏花饒笑肯信吾兼吏隠名既悲老趨幕府為溪花所笑將欲駕言吏隠又恐為溪花所疑幾多心事俱聽命於花深乎深乎宿府鶴注此廣徳二年在幕府作清秋幕府井梧一作桐寒獨宿江城蠟炬一作燭殘永夜角聲悲自語中天月色好誰看平聲風塵荏苒音書絶闗塞蕭條行路難已忍伶俜十年事强區兩切移棲息一枝安此秋夜宿府而有感也上四敘景下四言情好首句㸃府次句㸃宿角聲慘憟悲哉自語月色分明與誰看此獨宿凄凉之况也鄉書濶絶歸路艱難流落多年借棲幕府此獨宿傷感之意也玩强移二字葢不得已而暫依幕下耳字按杜臆悲自語好誰看下三字連讀悲字好字作活用測㫖將角聲悲月色好連讀於下兩字未妥文朱瀚曰一枝應井梧棲息應獨宿格意精妍殷仲詩獨有清秋日漢書李廣幕府省文書庾肩吾詩井梧生未合本詩敦彼獨宿聲王延詩霏雲承永夜胡夏客曰角列宿故借角對月色殊巧庾信詩地逈角聲長荏梁武帝詩秋月出中天也何遜詩月色臨窗樹詩苒柔木邵注荏苒侵尋張華詩荏苒日月何庾信詩音書兩俱絶山闗塞注别見難曹植詩中野蕭條蔡琰笳曲闗修阻兮行路禄占猛虎行伶俜到他鄉注易十年乃字棄邵寶云自山初反至此為十年顧謂自乾元初官至廣徳二年為七年其云十年者舉成數言耳兩説不同今從前説宋武帝敎棲息閭閻懐寳待耀左思詩巢林棲一枝到邨此乞假而暫到村也舊注謂是廣徳二年秋作明年正月遂辭幕歸村矣碧澗雖多雨秋沙先去聲陳作亦少泥蛟龍引子過荷芰逐花低此到村秋景子澗經雨洗則泥去沙存矣雨多水寛故蛟龍引而過泥少根脱故荷芰逐花而低下二分承杜臆謂荷芰低垂如蛟龍經過所致以上句形容下句此另一説謝靈運詩銅陵映碧澗西京雜記瓠子河决有蛟龍從九子自决中逆上入河噴沫流波數十里老去參戎幕歸來散馬蹄稻粱須就列榛草即相迷蓄積思江漢疎頑吴作頑疎惑一作感町一作珽畦暫一作稍吴作蹔酬知已分音問還入故林棲此到村敘懐商老參戎幕苦於拘束歸散馬蹄喜得游行也下文皆度歸來之亊欲謀稻粱須身就農列惜田間榛草日已荒迷耳思出江漢則蜀難久留但舊畦仍在未免惑志耳所以願辭戎幕而歸棲故園也末聨仍應上二句植此章上四句下八句征沈佺期詩戎幕生光輝曹詩俯身散馬蹄東賦且從衆而就列兮所蓄積思江漢即所謂江漢思歸客舉司馬遷傳其素蓄積也王濬自理表而以頑疎措失宜嵇康詩匪降自天實由疎頑之謝靈運詩去子惑故蹊界莊子彼且為無町畦亦與為無町畦町畦田畔之也分謂分誼虧交友之分魏志臧洪書分為篤友又杖策擕背王融詩人情舊鄉客鳥棲思故林邨雨鶴注當是廣徳二年在草堂作雨聲傳兩夜寒事颯高秋攬一作挈帶看平聲朱紱開箱覩黑裘世情只益睡盜賊敢忘憂松菊新霑洗茅齋慰逺遊首聨記村雨次聨承寒亊下乃感懐自遣今禦寒則思衣看朱紱君恩未報覩黒裘失意未歸幕僚不合世情付之一睡而軍謀既豫盜賊每以分憂唯此松菊茅齋差慰客遊耳仍照村雨作結何遜詩蕭蕭江雨聲蘇陸倕詩江闗寒事早情員外服緋故云朱紱黒裘用秦事纒子不識世歸去來辭松菊猶存指逺遊在蜀獨坐詩云朱紱負平生當是廣徳三年秋為參軍時所作即所謂白頭趨幕府深覺負平生意黄鶴編在江陵詩内非是李陵書獨坐愁苦悲秋一作愁廻白首倚杖背音佩孤城江斂洲渚出天虛風物清滄溟恨一作服非衰謝朱紱負平生仰羨黄昏鳥投林羽翮輕上四獨坐秋景下四獨坐感懐高楚辭收潦而水清此江斂洲渚出所自來天而氣清此天虛風物清所自出渚投林羽翮輕即還入故林棲意指謝靈運詩蕭條洲際國語風物以聽之滄溟江村文選浩浩滄溟總何遜詩相顧無羽翮何由奮飛倦夜顧陶類編作倦秋夜詩張逺注竟夕不寐故曰倦夜趙次公曰此無情無緒是比興非専詠夜景也黄生曰七八句是作詩本意亦是作者本色杜臆此詩亦必到村後作竹凉侵卧内野月滿一作遍庭隅重露成涓滴稀星乍有無暗飛螢自照水宿鳥相呼顧陶類編作飛螢自自照水宿鳥競相呼事干戈裏空悲清夜徂上四夜中景下四景中情夜竹迎風故凉月當空故滿此初之景露凝竹而成涓滴星近月而乍有無此深夜之景月落以後暗螢自照竹林之外宿鳥相呼此夜盡之景萬事干戈此終宵所思者初秋夜短故歎其易徂傷暗飛螢水宿鳥上三字連讀自照有感孤棲相呼心無侣黄注前幅刻畫夜景無字不工結處㸃明章法緊峭涓史記信陵君傳出入卧内孫綽子時雨霑乎地中滴可潤形王符潛夫論螢飛耀自照傅咸螢火賦期自照於陋謝靈運詩水宿淹晨暮杜修可曰陸鳥曰棲水鳥曰宿又曰凡鳥朝鳴曰嘲夜鳴曰㖡林鳥以朝嘲水鳥以夜㖡春秋繁露水鳥夜半水生感其生氣益相呼而鳴洞長門賦徂清夜於房王直方詩話東坡云司空表聖自論其詩以為得味外味緑樹連村暗黄花入麥稀此句最善又云棋聲花院閉幡影石幢髙吾嘗獨遊五老峯入白鶴觀松陰滿地不見一人惟聞棋聲然後知此句之工但恨其寒儉有僧態若子美暗飛螢自照水宿鳥相呼四更山吐月殘夜水明樓才力富健去表聖之流逺矣如慈水姜氏曰朱文公謂暗飛螢自照語自是巧不韋蘇州寒雨暗深更流螢度髙閣此景為可想却説得自在了據此可見詩家身分當作三層看蘇與司空尚是就詩論詩晦翁則於詩外别有見解矣陪鄭公秋晚北池臨眺鶴注編在廣徳二年秋成都作公在幕中故云參軍乏北池雲水濶華館闢秋風獨鶴元一作先依渚衰荷且映空首敘秋池景物鶴劉楨詩華舘寄流波豁達來風凉謝靈運詩獨方朝唳蕭慤詩池清似映空采菱寒刺上踏藕野泥中素檝分曹往金盤小徑通萋萋露草碧片片晚旗紅盃酒霑津吏衣裳與釣翁此記臨眺景事人素檝金盤採取菱藕以獻也分杯授衣席前頒恵於也杜臆素檝盃酒兩聨寫出大官遊宴氣象片招魂分曹並進女謝靈運詩萋萋春草生期庾信詩片紅顔落列傳趙簡子擊楚與津吏津吏醉卧不能度異方初艶菊故里亦高桐搖落闗山思去聲淹留戰伐功嚴城殊未掩一作啟清宴已知終何補參軍一作卿乏一作事歡娱到薄躬末敘陪燕情景心異方淹留身在成都故里闗山想長安嚴成以下記陪宴也戰功稱嚴末聨自謙活杜臆菊花開而吐艶桐脱葉而枝髙艶高二字死字用嚴城未掩清宴知終樂而有節非縱逸遊而忘敵愾者下二段各八句徐悱詩嚴城不可啟此章四句起參軍用孫子荆為石苞參軍事至徐勉戒子書薄躬遭逄遂今日黄鶴曰公在嚴武幕中自遣悶有作奉呈後如詠竹泛舟觀岷山畫圖至北池臨眺皆分韻賦詩其情分稠宻如此而史謂嚴武中頗銜之不知何所本而云遣悶奉呈嚴吴本有鄭字公二十韻鶴注此廣徳二年秋作白水魚一作漁竿客清秋鶴髪翁胡為來一作居幕下祗合在舟中首段敘情言致悶之由葢不樂居幕府而欲遂其幽閒也幕下舟中領下二段申涵光曰胡為二句語似太率鶴後漢趙典傳贊大儀鶴髪注白髮也庾信賦予老矣髪雞皮在舟與漁樵為侣也黄巻真如律青袍也去聲自公老妻憂坐痺卑利切幼女問頭風平地專欹倒分曹失異同禮甘衰力就義忝上官通疇昔論平聲詩早光輝仗鉞雄寛容存性拙剪拂念途窮露裛思藤架烟霏想桂叢信然龜觸網直作鳥窺籠此述幕中勞瘁之態露藤烟桂欲息草堂而不得也頽如律自公言為官守所拘坐痺頭風恐致多病欹倒憊已甚異同意見不侔衰力如此而甘就列者以義與嚴公通好也論詩四句俱就武言寛容剪拂厚故交也觸網窺籠言不得遂已優游之性失唐會要天寶四載十一月勅御史依舊置黄巻書闕每歲委知雜御史長官比類能否送中書門下改轉日褒貶員光武詔敢拘執論如律儒林傳他如律唐志尚書外郎從六品至上元元年制五品服淺緋六品服深緑朱注公時已賜緋而云青袍者以在幕府故耳舊注謂青袍九品服誤矣而退矣昔在朝班則自公退食今青袍從事亦自公漢安帝贊即位痿痺痺脚冷濕病也漢食貨志廼分遣御史廷尉正監分曹古世説桓𤣥北伐人間頗有異同之論吴志孫堅曰之名將仗鉞臨衆鳴世説謝之寛容愈表於貌山廣絶交論剪拂使其長淮南小山桂樹叢生兮之幽史龜策傳龜使抵網而遭漁者得之池齊書劉善明謂沈攸之曰此已籠之鳥耳秋興賦魚籠鳥有江湖山藪之思西嶺紆邨北南江繞舍東竹皮寒舊翠椒實雨新紅浪簸船應平聲坼杯乾音干甕即空藩籬生野徑斤斧任樵童束縳酬知已蹉跎効小忠周防期稍稍太簡遂怱怱曉入朱扉啟昏歸畫角終不成尋别業未敢息微躬此述草堂景物之勝曉入昏歸趨走幕府之不暇也甕西嶺南江此逺景竹翠椒紅此近景船應坼不暇修即空不暇釀生野徑聽人行任樵童慿人採矣今束縳而酬知己者亦以蹉跎日久欲效小忠耳雖涉世亦念周防而生性終傷太簡晨夕之間往來幕下安能偃息茅堂乎實申涵光曰束縳二句感恩語説得悲酸詩椒聊之説苑鮑叔奉酒而起曰祝在君無忘其出而在莒也使管仲無忘其束縳而從魯也世説周處曰年以蹉跎終無所成大忠也楚辭陳誠兮效忠京房傳可謂小忠未可謂杜預左傳序云包周身之防太簡出論語角徐伯陽詩丹城壁日啟朱扉别張正見詩風前噴畫石崇思歸引肥遯於河陽業沈約詩遇可淹留處便欲息微躬烏鵲愁銀漢駑駘怕錦幪㑹希全物色時放倚梧桐末結呈嚴本意見出幕可以遣悶矣望愁銀漢無填河之力怕錦幪乏致逺之才惟全其物色庶得逍遙自適耳各杜臆物色謂幸全體面而此章首尾各四句中二段十六句七諫却騏驥不乗兮策駑駘以取路而何遜詩華池物色新莊子倚樹吟據槁梧而暝周必大益公詩話韓退之上張僕射書云使院故事晨入夜歸非有疾病事故輙不許出抑而行之必發狂疾乃知唐藩鎮之屬皆晨入昏歸亦自少暇如牛僧孺待杜牧固不以常禮也王嗣奭曰觀公此詩知非縱情傲誕矣即幕僚不合止云分曹失異同而平地傾欹且又自分其過可以覘公所養矣黄生曰公與嚴武始終睽合之故具見此一詩葢公在蜀兩依嚴武其於公故舊之情不可謂不厚及居幕中未免以禮數相拘又為同輩所譖此公所以不堪其束縳往往寄之篇詠也送舍弟穎一作頻一作潁赴齊州三首鶴曰此廣徳二年秋成都作岷嶺南蠻北徐闗東海西此行何日到送汝萬行音杭啼絶域惟高枕清風獨杖藜時危暫相見衰白意都迷首章敘惜别之情悠上四送弟赴齊下四自歎寥落臆岷嶺徐闗言道里長高枕杖藜言形影相弔杜岷嶺在南蠻之北徐闗在東海之西行非計日可到故淚亦無時不流又云時則危見則暫身則衰白恐再晤難期也結語極悲自南蠻南詔蠻徐闗在齊地心左傳鞌之戰齊侯徐闗入列子穆王意迷荒風塵暗不開汝去幾時來兄弟分離苦形容老病催江通一柱觀去聲日落望鄉臺客意長東北齊州安在哉次章兼敘别後之思上此亦四句分截過風塵二句承上時危兄弟二句承衰白一柱觀經之路望鄉臺遙想齊州安在二字寫穎意中旁皇奔赴之情從上句連讀一柱觀望鄉臺注見成都詩内諸姑今海畔兩弟亦山東去傍去聲干戈覓來看平聲道路通短衣防戰地匹馬逐秋風莫作俱流落長瞻碣石鴻术章冀其去而復來看穎赴齊州故并想諸姑兩弟去傍干戈冒險可慮來道路後㑹難期五六承去七八承來之碣石在山東鴻雁比兄弟裴公范陽盧氏墓誌審言女薛氏所出者適魏上瑜榮期盧正均皆前卒盧氏所出者一適京兆王佑一適㑹稽賀撝謂豐與觀國策趙武靈王好戎服士皆短衣兩弟淮南子遇歸雁於碣石地前漢黥布傳自戰其嚴鄭公堦下新松得霑字年鶴注此廣徳二秋作弱質豈自負移根方爾瞻細聲侵一作聞玉帳疎翠近珠簾未見紫烟集虛䝉清露霑何當一百丈欹葢擁高簷全首詠松俱屬寓意一二新松三四堦下五六新松七八堦下杜臆松竹二首各於結語微露本意自負不淺軍玉帳本兵家壓勝方位此言松聲侵於卧榻耳因在中故云玉帳詳見前梁武帝詩瑤臺含碧霧羅幕生紫烟紫烟葢指紫禁而言閣梁簡文帝相宫寺碑銘高簷三丈連四周嚴鄭公宅同詠竹得香字年鶴注此廣徳二秋作緑竹半含籜新梢纔出墻色侵書帙晚陰過酒樽凉雨洗娟娟浄風吹細細香但令平聲無剪伐㑹見拂雲長新梢二字全詩之眼色侵陰過静時景也雨洗風吹動時景也末則欲加保䕶言外託諷沈約詩弱草半抽黄首句意本此篁包緑籜謝靈運詩初詩勿剪勿伐楊慎曰竹亦有香人罕知之杜詩雨洗涓涓浄風吹細細香李賀詩竹香滿幽寂粉節塗生翠皆善於體物晚秋陪嚴鄭公摩訶池泛舟得溪字秋鶴注此廣徳二年作元和郡國志摩訶池在州城西通鑑注成都記云摩訶池在張儀子城内隋蜀王秀取土築廣子城因為池有一僧見之曰摩訶宫毗羅葢胡僧謂摩訶為大宫毗羅為龍謂此池廣大有龍因名摩訶池或曰蕭摩訶所開非也池今在成都縣東南十二湍駛一作駃風醒酒船回一作行霧起隄高城秋自落雜樹晚相迷坐觸鴛鴦起巢傾翡翠低莫須驚白鷺為伴宿青一作清溪首聨泛舟次聨晚秋五六池上所見七八池上所感湍急流也駛迅疾貌秋自落承風晚相迷承霧船行近鳥故見或起或低鷺伴青溪不欲久居幕府矣杜臆湍駛風醒酒高城秋自落出語皆竒阡謝靈運詩浩浩夕流駛巢謝朓詩眠起雜樹巢傾謂樹下垂奉觀嚴鄭公㕔事岷山沲江畫圖十韻得忘字廣鶴注此徳二年作得杜臆題加奉觀致敬嚴公至此安有登牀笑傲之失乎沱水臨一作流中座岷山到一作對俗本作赴北一作此堂白波吹一作侵粉壁青嶂挿雕梁直訝松杉冷兼疑菱荇香雪雲虚㸃綴沙草得微茫此並提江山敘出㕔事畫圖句白波青嶂松杉菱荇雪雲沙草句山水對言下節亦然蜀都賦金罍中坐寰宇記沱水在成都府新繁縣書岷山導江東别為沱唐地志茂州汶山縣有岷山粉鮑照詩忽過北堂陲峻莊子白波若山張正見詩壁麗椒塗沈約詩増起青嶂蘋陰鏗詩雕梁畫早梅曰劉歆甘泉賦芙蓉菡蓞菱荇蘩西京雜記雪雲同雲晉書謝韶傳夜月明浄王道子嘆以為佳謝重曰不如微雲㸃綴茫孔稚圭詩沙草不常青陳子昻詩髙丘正微嶺雁隨毫末川蜺飲練光霏紅洲蘂亂拂黛石蘿長谷暗一作暗谷非闗雨楓丹一作丹楓不為去聲霜秋城一作成𤣥圃外景物洞庭旁此分頂山水曲盡畫中景物小寫出或逺或近或高或下或虚或實或大或無不形容刻畫色毫末謂畫筆練光謂畫絹非闗雨墨氣也不為霜朱也晉江逌詩鳴雁薄雲嶺道徳經合抱之木生於毫末尚隋王胄詩殘虹低飲澗隨謝朓詩發蕚初攢紫餘采霏紅沈佺期詩拂黛時廣江淹詩石蘿日上尋靈宋之問詩谷暗千旗出沈佺期詩暗谷疑風雨謝運詩晚霜楓葉丹江總詩秋城韻晚笛余淮南子崑崙𤣥圃唯絶通天楚辭朝發於蒼梧兮夕至乎𤣥圃王臺卿詩景物共依遲楚辭洞庭波兮木葉落繪事功殊絶幽襟興去聲激昻從來謝太傅丘壑道難忘末乃觀畫而頌嚴公此因畫圖中江山而想見謝公丘壑比意貼切章前二段各八句後段四句收聖繪事出論語考工記凡繢畫之事後素功宇楊修書賢卓犖固所以殊絶凡庸也王勃詩桂幽襟積情揚雄解嘲激昻萬乗之主始晉書謝安放丘壑雖受朝寄東山之志末不渝楊萬里曰杜集排律多矣獨此瓊枝寸寸是王栴檀片片皆香然排律僅可止此至五十韻百韻則非古矣娓王嗣奭曰此詩是唐人詠畫格調而遣詞工緻娓不窮他人無復措手處末拈限韻亦自穏稱胡夏客曰起聨莊重接聨精警收語穏足此最入格之篇按昔人論此詩為宋人詠畫之祖但其分寫山水亦有所本謝靈運過始寧墅詩中十句云剖竹守滄海枉㠶過舊山山行窮登頓水涉盡洄沿巖峭嶺稠疊洲縈渚連綿白雲抱幽石緑篠媚清漣葺宇臨廻江築觀基層顛此亦一山一水對言然杜用以詠畫更較詳細精工耳過故斛斯校書莊二首原注老儒艱難病於庸蜀歎其殁後方授一官英華注斛斯名融鶴曰斛斯即斛斯六乃草堂之隣公所謂酒伴者此當是廣徳二年作此老已云殁隣人嗟一作嘆未一作亦休竟無宣室召徒有茂陵求妻子寄他食園林非昔遊空餘一作堂繐帷在淅淅野風秋首章痛校書身亡而慨山莊之閴寂在四句生分截隣人尚嗟則平日為人可知宣室召前不遇茂陵求殁後授官林黄注玩妻子寄食句知此莊特空舍隣人葢代守園者漢書賈誼自長沙徵見文帝方受釐宣室問以鬼神之本蘇林曰宣室未央前正室司馬相如傳家居茂陵病甚武帝使所忠往求其書至則相如已死問其妻得遺札書言封禪事疎左傳民食於他陶潜詩静念園林好繐細布而者以繐為靈帳也陸機弔魏武文惮繐帳之㝠漠謝惠連詩淅淅振條風江淹詩寥戾野風急燕入非傍舍鷗歸祇故池斷橋無復扶又切板卧栁自生枝遂有山陽作多慚鮑叔知素交零落盡白首淚雙垂次章對舊莊荒凉而傷故交之凋謝亦四句分截林上半觸景傷人步步咨嗟處處悲感山陽作應前園慚鮑叔應前妻子素交盡而老淚垂哀人亦復自哀矣漢書髙帝紀上從旁舍來謝靈運詩故池不更穿漢五行志上林苑中大栁樹仆地一朝起立生枝葉庾信詩春栁卧生枝黄注遂字有意見相去一年而斛斯遂亡也曰晉書向秀經嵇康山陽舊居作思舊賦絶史記管仲生我者父母知我者鮑子也劉孝標交論斯賢達之素交厯萬古而一遇謝朓詩零落悲友朋黄生曰二詩借古敘事處見筆之老寫景寓情處見筆之靈二種筆法俱難到况兼之乎懷舊蘇源明卒於廣徳二年此詩追憶舊交也黄鶴編在永泰元年源明舊為司業後為秘書少監新史云雅善杜甫故詩言情親也原注公前名預避御諱改名源明地下蘇司業情親獨有君那因䘮去聲一作衰亂後便有一云更作死生分老罷知明鏡歸來望白雲自從失辭伯不復扶乂切更論平聲文上四悼蘇之亡下四自傷失侣身對鏡而知身老望雲而想故人説得世悽然不杜詩有用字犯重者漢使徒空到徒下不當用空字復更論文復下不當用更字傅𤣥挽歌地下無滿期友鮑照詩惆悵憶情親復顧注望白雲用淵明停雲思意鍾子期死伯牙不鼓琴末句之意亦然論衡文詞之伯哭台州鄭司户蘇少去聲監鶴注蘇鄭同是廣徳二年卒詳見八哀詩注故舊誰憐我平生鄭與蘇存亡不重平聲見䘮平聲亂獨前途總敘生死交情見次句㸃鄭蘇語似稍率故人不復者因遭亂而分離也豪俊何人一作人誰在文章掃地無羇遊萬里濶凶問一年俱白首一作日中原上清秋大海隅夜臺當北斗泉路窅海鹽劉氏本作窅一作著東吴得罪台州去時危棄碩儒移官蓬閣後穀貴殁潛夫流慟嗟何及銜寃有是夫音扶重此傷其死後承存亡不見一句凶問一年俱謂鄭蘇先後繼亡東吴台州承海隅指鄭逺注北斗蓬閣承中原指蘇胡夏客曰此云移官蓬閣後穀貴殁潛夫八哀詩咏蘇源明云長安米萬錢凋䘮盡餘喘則蘇死果以飢歟任昉策文衣冠禮樂掃地無餘權魏志蜀黄權軍敗降魏蜀先主凶問至羣臣咸賀唯獨否陸雲傳凶問卒至痛心摧剥阮瑀云㝠㝠九泉室漫漫長夜臺無釋智愷詩泉路方幽噎寒隴向凄清左思詩志若東吴鶴注廣徳二年斗米千錢故云穀貴𤣥抱朴子洽聞之碩儒及王符著潛夫論傷心賦對經而流慟詩何嗟矣唐韋嗣立論刑法四海銜寃對有是夫用經語作道消詩發興去聲心息酒為徒許與才雖薄追隨跡未拘班揚名甚盛嵇阮逸相須㑹取君臣合寧詮品命殊賢良不必展廊廟偶然趨勝決風塵際功安造化罏從七容切容詢一作拘舊學慘澹悶陰符此憶其生前承故舊誰憐我二句二許與承詩追隨承酒二句自謂班揚承詩嵇阮承酒句鄭蘇㑹取四句言天寶之際鄭蘇俱仕而未久勝決四句言肅宗復國蘇為少監鄭遭貶斥也詮論也品命殊位卑也詢舊學蘇昔為太子諭徳後又除秘書少監也閟陰符鄭常著天寶軍防録坐私撰國史謫官其談兵之書秘不能出也詩杜臆公前詩云痛飲聊自遣放歌破愁絶此云道消發興心息酒為徒皆道本色髙人所益於詩酒如此髙易言君子道憂劉向傳言君子道消康酈食其傳吾陽酒徒也班固揚雄作賦擅名嵇阮籍嗜酒彈琴以潘岳詩器非廊廟姿大漢書决勝千里之外學莊子天地為大爐造化為冶説命台小子舊於甘盤陰戰國策蘇秦遊説六國不遇而返乃夜發書得大公符之謀而頌之唐書兵書類有周書陰符九巻擺落嫌疑久哀傷志力輸俗依綿谷異客對雪山孤童稚思諸子交朋列友于情乖清酒送望絶撫墳呼瘧病一作痢餐巴水瘡痍老蜀都飄零迷哭處天地日榛蕪此身經䘮亂而遙哭鄭蘇也哀上四謂棄官以來漂流異地中四歎知交别久殁失奠下四見身衰友故人世荒凉也貶擺落哀傷舊注仍指鄭蘇按此皆自迷之詞公向遭斥本涉嫌疑今則擺落已久特志力日虧為可傷耳于日在童稚時便思諸子才名鄭蘇年葢少長也列友即異姓篤天倫意綿雪巴蜀遍厯東西二川哭處榛蕪仍應存亡䘮亂潜此章四句起中二段各十四句末段十二句收陶詩擺落悠悠談記禮所以决嫌疑定猶豫言阮籍詩揮涕懐哀傷榛蕪道路梗塞盧世㴶曰此詩泣下最多縁兩公與子美莫逆故也豪俊人誰在文章掃地無羇遊萬里濶凶問一年俱二十字抵一篇大祭文結云飄零迷哭處天地日榛蕪蒼蒼茫茫有何地置老夫之意想詩成時熱淚一湧而出不復論行㸃矣是以謂之哭也苕溪漁隠叢話律詩有扇對格第一與第三句對第二與第四句對此詩得罪台州去四句是也東坡和鬱孤臺詩邂逅陪車馬尋芳謝朓洲凄凉望鄉國得句仲宣樓亦用此格别唐十五誡因寄禮部賈侍郎鶴曰此廣徳二年作舊書賈至傳寶應二年為尚書右丞廣徳二年轉禮部侍郎又云廣徳二年九月尚書左丞楊綰知東京選禮部侍郎賈至知東京舉兩都分舉選自至始之張逺注時唐十五必往東都赴舉公故寄詩為先容也九載上聲一相見一作逢百年能幾何復扶又切為萬里别送子山之阿白鶴久同林潛魚本同河未知棲集期衰老强區兩切髙歌歌罷兩悽惻六龍忽蹉跎相視髪皓白况難駐羲和首敘惜别之情傷上四另提感聚散不常中四承萬里復别之也下四承百年幾何勉之也今九載一見自乾元二年至廣徳二年也潘岳懐舊賦九載而來歸古詩百年能幾何㑹少别離多梁元帝詩寧為萬里别爾李陵録别詩送子淇水陽楚辭若有人兮山之阿雅大陵曰阿相鶴經鶴千六百年形定而色白潛詩有鶴在林陸機詩出自幽谷及爾同林曹植詩魚躍清波謝靈運詩棲集建薄質見鮑照詩零落就衰老岳宋玉舞賦抗音髙歌張正詩歌罷咏新詩潘寡婦賦心摧傷以悽惻公楚辭維六龍於扶桑笑阮籍詩白日忽蹉跎睂左傳子宋與子家相視而留侯世家四人鬚皓白攬阮籍詩願羲和轡胡星墜燕平聲地漢將去聲仍横戈蕭條四海内人少豺虎多少人慎莫投多虎信所過平聲飢有易子食獸猶畏虞羅子負經濟才天門鬱嵯峨飄飄一作飄颻適東周來往若一作亦崩波次記行路之難星唐往東都故敘亂後荒凉胡指史朝義漢將指僕固懐恩人少死於兵賦虎多餘寇未平畏虞羅民飢捕獸也天門謂君門東周謂洛陽唐孟莊曰子負經濟四語敘其淪落為賈先容地燕史記天官書昻曰旄頭湖星也江淹書飛霜擊於地唐書廣徳元年正月史朝義縊死於幽州醫巫閭祠下傳首京師又云廣德元年九月懷恩拒命於汾州其子瑒進攻榆次未幾為帳下所殺懐恩遂渡河北走靈武人張正見詩胡兵屯薊北漢將起山西吕氏春秋行燭免胄横戈而進易張載詩盜賊如豺虎禮信所過謂經過方信左傳子而食析骸而㸑記有虞人有大羅氏掌田獵之事者芒趙曰漢官儀泰山東上七十里至天門潘岳詩崇鬱嵯峨楚辭注嵯峨高貌孔融詩飄颻安所依索戰國策注西周王城今河南東周成周今洛陽史記隠西周河南也東周鞏也鮑照詩客行惜日月崩波不可留南宫吾故人白馬金盤陀雄筆映千古見賢心靡一作匪他念子善師事歲寒守舊柯為去聲我謝賈公病肺卧江沱末結寄賈之意柯惟賈能好賢故唐宜善事歲寒守勉其始終勿變此章前二段各十二句末段八句收南杜田正謬漢建尚書百官府曰南宫葢取象天官書宫朱鳥猶唐以中書省為紫徵尚書省為丈昌之類後漢書鄭𢎞為尚書令前後所陳補益王政者著之南宫以為故事考禮部之名起於江左而南宫自漢有之葢南宫猶言南省舊注專謂禮部非也鶴曰唐職林云舊説禮部郎中掌省中文翰謂之南宫舍人故定功謂南宫猶南省郎史項羽紀若非吾故人乎夢弼注賈逵為禮部侍常乗白馬故於賈至亦云韓金盤陀馬鞍也注見三巻史詩之子死靡他史記信得廣武君師事之又南孔休源人倫儀表當師事之守潘岳詩不見山下松隆冬不易故不見澗底柏歲寒一度史記伍子胥曰為我謝申包胥曰卧江沱公自謂詩江有沱毛萇沱江之别者初冬鶴注此廣徳二年冬在幕府時作垂老戎衣窄歸休寒色一作氣深漁舟上上聲急水獵火著涉畧切高林日有習池醉愁來梁父音甫吟干戈未偃息出處上聲遂何心此暫歸草堂而作也首聨雙提三四承次句言歸溪冬景五六承首句言在幕情事末句出處二字總綰之黄注白首老人戎衣趨府寫出堪發人笑亦見自慚意漁獵亦常事指急字髙字便有意致兩干戈未息是年十月武攻吐蕃鹽川城遂何心出處未遂也蔡邕房楨碑享年垂老黄注幕官以戎服從事當用兵之際也又云朝士兼戎服知在朝亦間用之隋蘇子卿詩鋒劍但須利戎衣不畏窄張溍注歸休謂歸溪休沐火著鮑照詩長霧高林杜臆著火炎起也猶俗云習池醉梁父吟注見十三巻處陸機詩出鮮為諧觀李固請司馬弟一作題山水圖三首李固當是蜀人其弟曾為司馬能冩山水圖公至固家固掛其圖於壁而請公題之也黄鶴編在廣徳二年簡易去聲一作易簡髙人意一作體匡牀竹火爐寒天留逺客碧海挂新圖雖對連山好貪看平聲絶島孤羣仙不愁思去聲冉冉下去聲蓬壺首章觀李氏山水圖客上四敘事下四咏畫髙人指李逺自謂掛碧海之新圖此倒裝句連山中有絶島即蓬壺也有愁忽想到羣仙之不愁真得味外之味杜臆自已劉向傳向為人簡易無威儀亷静樂道不交接世俗衡莊子麗姬與晉公同匡牀而食芻豢匡牀安牀也張同聲歌思為莞蒻席在下蔽匡牀徐陵詩紺席下羣仙方丈渾平聲連水天台總映雲人間長見畫老去一云身老恨空聞范蠡舟偏一作偏舟小王喬鶴不羣此生隨萬物何處出塵氛次章㮣言山水人物離見山水恨不能親至其地見人物又歎不能俗而去上下兩段各用一景一情謂之虛實相間格臆趙次公曰圖必兼畫舟鶴故引范蠡王喬為證杜隨物與出塵此仙凢之别也陸天台賦涉海則有方丈蓬萊登陸則有四明天台機董逃行但為老去年道范蠡乗扁舟泛五湖隨天台賦王喬控鶴以冲天徙王洙曰萬物即莊子所謂與物轉也髙浪垂翻屋崩崖欲壓牀野橋一作樓分子細沙岸繞微茫紅浸珊瑚短青懸薜茘長浮查並坐得一作相並坐仙老暫相將末章詳敘山水景物珊髙浪崩崖言山水絶險橋在水上岸在山下瑚浸水而紅薜茘懸山而青俱分配山水品杜臆起勢突兀雄偉中四皆就細微處形容畫家妙未覩仙查而望其接引與前二章結語相同而出之變幻不拘拾郭璞詩髙浪駕蓬萊於子細出源思禮傳見六巻遺記堯時有巨查浮西海其上有光若星月常繞西海十二年一周名貫月查又名挂星查羽人棲息其上謝惠連詩並坐相招邀口梁簡文帝詩相將渡江溍注相將相擕也至後鶴注此當是廣徳二年冬在嚴武幕中作冬至至後日初長逺在劍南思洛陽青袍白馬有何意金谷銅駝非故鄉梅花欲開不自覺棣萼一别永相望平聲愁極本慿詩遣興去聲詩成吟咏轉凄凉在劍思洛領起三四下乃至後景情花青袍白馬劍南幕府也金谷銅駝洛陽遭亂矣因梅而念棣萼總是觸物傷懐此詩青袍白馬與洗兵行所引侯景傳不同朱注以公詩青袍也自公歸來散馬蹄為證皆指幕府言曰有何意言志不得自展也舊注以青袍白馬比安史則有何意三字却説不去矣周禮冬至日在牽牛影長一丈三尺庾信哀江南賦青袍如草白馬如練金東漢張湛傳帝見湛輒言白馬生且又諫矣邵注谷園銅駝陌皆洛陽勝地石崇金谷詩序余别廬在河南縣界金谷澗水經注金谷水出河南太白原東南流厯金谷謂之金谷水經石崇故居相陸機洛陽記漢鑄銅駝二枚在宫南四㑹道頭夾路對華延雋洛陽記兩銅駝在宫之南街東西相向髙九尺洛陽謂之銅駝陌鞾蔡琰茄曲故鄉隔兮音塵絶詩棠棣之華鄂不鞾棣萼以比兄弟也咏嵇康琴賦吟以適志朱瀚曰此詩疑贋作複㸃至字累墜日初長剰語有何意可發一笑金谷銅駝正是故鄉但可云風景非昔耳不自覺冗率竟以棣萼為兄弟亦是俚習七八如村務火酒薄劣異常寄賀蘭銛前有詩贈别此别後再寄也當是廣徳二年冬末所作朝音潮野歡娱後乾坤震蕩中相隨萬里日總作白頭翁歲晚仍分袂江邊更轉蓬勿云俱異域飲啄幾回同上四亂後相逢之感下四逺方惜别之情日從歡娱説至震蕩公與銛初交於盛時而再逢於亂也萬里白頭暫遇途中分袂轉蓬又忽散去矣幾杜臆今日勿以俱在異域為悲只此飲啄之縁尚能回同事乎語極悽慘震張恊詩昔在西京時朝野多歡娱翁張華詩天地相蕩回薄不知窮曹丕書已成老但未白頭耳謝惠連詩分袂澄湖陰飲朱穆詩與子異域何承天樂府啄雖勤苦送王侍御往東川放生池祖席朱注此詩見王原叔本蔡氏編在夔州詩内今按成都詩有王侍御郁及王侍御契此或即其人歟詩云衰疾江邊卧應指草堂言放生池亦當在成都邵注謂在蓬溪縣龍多山誤矣蔡曰梓州為東川唐肅宗詔天下臨池帶郭處置放生池凢八十一所顔真卿為碑席行者有祖道之祭祭畢飲於其側謂之祖東川詩友合此贈怯輕為况復扶又切傳宗匠舊作近空然惜别離梅花交近野草色向平池儻憶江邊卧歸期願早知上四送王侍御五六池邊春景末乃預訂歸期况東川乃詩友㑹合之地故欲贈詩而怯於輕為侍御能詩共傳宗匠徒然作惜别常語亦何為乎當兹冬盡春來之際惟願早歸以慰衰疾此今日送行之意也有諸本皆作傳宗近意不可解張遠指放生池以佛家南北宗也此説牽强邵注作傳踪謂音信相通此亦無據按近字犯重恐是匠字乃字形相似而訛耳公八哀詩云宗匠集精選宗匠二字本袁宏書初欲改近為匠尚無確據偶閲詩紀載晉時仙䜟匠不足慮憂逺危馮惟訥云匠疑作近今按彼是誤近為匠此則誤匠為近可以互證正月三日歸溪上有作簡院内諸公鶴曰當是永泰元年春自幕府歸浣花溪作日公詩題凢記日者皆涉節候此指立春也故云臘味春聲野外堂依竹籬邊水向城蟻浮仍臘味鷗泛已春聲藥許隣人斸書從稚子擎白頭趨幕府深覺負平生首聨溪前景趣次聨新正物候三聨歸溪之事末聨簡院之懐顧注臘味酒造於臘月也春聲鷗泛春水而有聲也鶴注種藥本以濟世故許人斸藏書本以教兒故任子擎老趨幕府不得遂其立朝素志故云深負庾信詩浮蟻對春開王嗣奭曰公有分曹失異同之句似與諸公不合而歸此詩毫無芥蒂足占所養其言溪上之樂如鳥脱籠中自是衷語也敝廬遣興去聲奉寄嚴公當是永泰元年春自幕府居草堂時作故云幕府瞻暇日野水平橋路春沙映竹邨風輕粉蝶喜花暖蜜蜂喧把酒宜一作且深酌題詩好細論平聲首此敝廬遣興自杜臆開寫景有適然得之趣下文宜字好字正䝉此府中瞻暇日江上憶詞源跡忝一作寄朝廷舊情依節制尊還思長子兩切者轍恐避席為門此奉寄嚴公草暇日詞源想及嚴公朝舊情依自敘故交末望重過廬仍致繾綣之意寶應元年嚴至浣花溪也此章上下各六句外陳平傳家貧以席為門然門多長者車轍營屋鶴注當是永泰元年正月歸溪上時營屋而作也自上元元年營草堂始植竹至是己六載矣我有陰江竹能令平聲朱夏寒陰通積水内髙入浮雲端首敘屋前之竹陰森髙大而傅毅賦踐朱夏之炎赫搖輕箑致凉甚一作如疑鬼物慿不顧剪伐殘東偏若面勢户牖永可安愛惜已六載上聲茲晨去千竿蕭蕭見白日洶洶開奔湍次言伐竹除翳將以營屋竹蔽日疑憑鬼物施翦伐則通户牖矣見日開湍此面勢所覩者曹植詩巖析苦崩缺湖水何洶洶度堂匪華麗養拙異考槃草茅雖薙葺衰疾方少寛洗音洒然順所適此足代加餐寂無斤斧響庶遂憩息歡此記營屋可以棲身也堂在近郭故異於考槃洗然四句伸明寛病之故段薙刈草也葺覆茅也代猶當也此章四句起下兩各八句人考工記室中度以几堂上度以筵子詩考槃在澗碩之寛考成也槃樂也潘岳傳吾洗然恬澹自逸補鮮于注若順也除草原注去䕭草也䕭音潛山韭永詩云藩籬松竹當是草堂詩依朱氏編在泰元年成都詩内葉益部方物贊燖麻自劍以南處處有之或觸其如蜂螫人以溺灌之即解莖有刺葉或青或紫善治風腫考杜詩當作䕭李實曰䕭葉如苧麻川人名曰䕭麻毛刺􅯟人亦曰􅯟麻􅯟音謔又音釋毒螫也草有害於人曾音層何生阻修其毒甚蜂蠆其多彌道周清晨步前林江色未散憂芒刺在我眼焉於䖍切能待高秋此言毒草之害阻綖注此章遍於道周比惡人充滿當路也詩道且修左傳臧丈仲曰蜂蠆有毒而况國乎光詩生於道周憚張載詩蕭瑟埽前林霍光傳驂乘上内嚴之若有芒刺在背霜露一作雪一霑凝一作衣蕙葉亦難留荷去聲耡先去聲童稚日入仍討求轉致水中央豈無雙釣舟頑根易音異滋蔓敢使依舊丘此欲亟除其根辯趙曰待霜至而後除則蕙葉與䕭草美惡無矣故去之不可不早先童稚身率先也葉綖注此喻屏去小人有不與同中國意在陰鏗詩蕙斂欲瞑陶潜詩荷鋤稚子倦詩宛水中央載晏殊曰周禮薙人掌殺草有水火之化以釣舟而置之此水化也左傳無使滋蔓自茲一作移藩籬曠更覺松竹幽芟夷不可闕疾惡信如讎末㸃寓言本意也師氏曰小人既去則君子道長如惡草芟而松竹清張綖注栁子厚作捕蛇者説至篇末方説出苛政猛於虎一句龍用此格也悲此章前兩段各八句後段四句收庾信詩松竹且吟左傳為國家者見惡如農夫之務去草焉芟夷藴崇之絶其本根勿使能植則善者信矣後漢書疾惡如風朱伯厚申涵光曰芒刺在我眼焉能待高秋丰裁凜然除姦當如鷙鳥擊物少遲則生變矣調停之説誤身誤國所云霜雪一霑凝蕙草亦難留也頑根易滋蔓敢使依舊丘去惡務盡三致意焉少陵一生目覩小人之害故痛恨如此末只一語㸃破正意多則反淺春日江邨五首鶴注此當是永泰元年春歸溪後作公自乾元二年冬入蜀至此已經六年矣江江邨即浣花溪前有長夏邨事事幽之句農務邨邨急春流岸岸深乾坤萬里眼時序百年心茅屋還堪賦桃源自可尋艱難昧陳作昧一作賤一作淺生理飄泊到如今首章敘春日江村有躬耕自給之意田杜臆公贈王侍御詩談及農月田家葢欲耕以為生理故見農務春流而起興居萬里眼蜀江所見百年心春事又逢賦茅屋草堂託尋桃源花溪覽勝漂泊到今故願為老農以資生計也深陶潜詩農務各自歸莊江奐詩春流豈難越岸岸可以溉田也明人定山詩千家小聚村村合萬里河流岸岸同句本於杜但同字較深字覺少遜耳鮑照詩争先萬里途各事百年身九陶詩茅屋八間迢遞來三蜀蹉跎有一作又六年客黄作容身逢故舊發興去聲自林泉過懶從衣結頻遊任履穿藩籬頗無限一作無限景恣意向一作買江天次章歸蜀而依嚴武泊來下截仍抱江村上四承飄故交復鎮便堪發興且未講到幕府事下兩章方層次敘出左杜臆衣結履穿茅堂自適恣意江天不異桃源矣思蜀都賦三蜀之豪時來時往注三蜀謂蜀郡廣漢郡犍為郡也鮑照詩發興誰與歡王隠晉書董威輦不知何許人忽見洛陽止宿白社中拾得殘碎繒輒結為衣號曰百結衣莊子原憲衣弊履穿滑稽傳齊人東郭先生貧困飢寒履有上無下行雪中著地處皆足跡生謝莊詩霧罷江天分一本作買江天句意未穏黄主向字種竹交加翠栽桃爛熳紅經心石鏡月到面雪山風赤管隨王命銀章付老翁豈知牙齒落名玷薦賢中三章言薦授郎官之事錫上四承江天寫村前近逺之景下四承發興敘老年命之縁高唐賦交加累積重疊増益劉孝綽詩堂皇更隠暎松灌雜兼加赤世説為是塵務經心漢官儀尚書令僕丞郎月給管大筆一雙椽題曰北宫著作曰漢百官表凢吏秩比二千石以上皆銀印青綬師氏漢舊儀云銀印背龜紐其文曰章刻曰某官之章顧注唐時無賜印者公時已賜緋因其有隨身魚袋而言耳東方朔答客難脣腐齒落服膺而不釋至此陳平傳吾聞薦賢蒙上賞非魏無知無以甫本傳嚴武表為參謀檢較工部員外郎扶病垂朱紱歸休步紫苔郊扉存一作在晚計幕府愧羣材燕外晴絲巻鷗邊水葉開鄰家送魚鼈問我數音朔能來四章言辭還幕僚之故府上四承薦賢來下四又應江村郊扉頂歸休幕頂扶病燕外以下言景物甚娱而人情相習所謂歸休晚計也詞公不耐拘束而辭幕職曰扶病託詞也曰愧羣材謙也前漢韋賢傳黼衣朱紱洙曰紱古蔽膝也象冕服以韋為之之漢武帝詔思得歸休沈約詩客位紫苔生顔延詩側同幽人居郊扉晝常掩戲杜臆存晚計言將終老於此阮籍詩浴鷗開水葉蝶避風絲新序出訟隣家數記水潦降不獻魚鼈勤問而來不特饋物又致殷也羣盜哀王粲中年召賈生登樓初有作前席竟為榮宅入先賢傳去聲才高處上聲士名異時懐二子春日復扶又切含情末章借古人以自况是江村感懐後三四分頂王賈乃生前事五六合承王賈乃身事末句有竊比前人意未公避亂蜀中作詩言志甚有類於王粲而老授郎官䝉見召歎不得為賈生至於卜宅花溪留名後世則自信古今同調矣者王賈各有舊宅各負才名故兩句當合承曰處士名謂才名髙出於處士非指二子為處士結㸃春日仍與首章遙應亂哀王粲動王粲之哀也首句倒裝王粲七哀詩西京無象豺虎方遘患注豺虎喻羣盗也中王粲避亂客荆州思歸作登樓賦潘岳夏侯湛誄年隕卒前漢書賈誼洛陽人文帝召為博士時年二十餘後為長沙王太傳歲餘帝思誼徴之坐宣室問鬼神之事至夜半文帝前席誼古書有汝南先賢傳楚國先賢傳坐朱注西征賦賈洛陽之才子魏志蔡邕見王粲謂客曰此王公孫有異才司史記孫叔敖楚之處士也縣漢食貨志異時筭軺車馬相如傳異時嘗通為郡矣顔注異時猶言往時欲王粲詩含情待誰趙汸曰此五詩首尾開闔始終相承皆有意義所謂憂中有樂而樂中有憂者也王嗣奭曰五首如一篇文字前四首一氣連環不斷至末章總發心事作結長吟朱注此係逸詩收在卞圜本者亦見吴若黄鶴本按杜斿云此詩已撥形骸累真為爛熳深乃初辭幕府之作樓鑰謂束縳酬知已形骸之累己極到此始得爛熳長吟耳今編在永泰元年之春長應瑒詩永思吟江渚翻鷗戲官橋帶栁陰花飛競渡日草見音現踏青一作春心已撥形骸累真為爛深賦詩新一作歌句穏不覺一作免自長吟上四春郊佳景下乃對景怡情在翻字帶字句中著眼競渡在江渚踏青栁陰皆一水一岸對言撥形骸謂身世兩忘爛熳深謂恣情游玩顧注公詩云晚節漸於詩律細非細不能穏也可見語不驚人死不休尚帶少年意氣髙胡夏客曰詩句己穏猶自長吟比他人􅒝草成篇輒歌鳴得意者相去懸絶以抱朴子屈原没汨羅之日人並命舟楫以迎之至今為競渡或以水車謂之飛鳬亦曰水馬一州士庶悉觀臨之荆楚歲時記屈原以五日死於汨羅人以舟拯之競渡是其遺俗唐人以中和節為戲踏青心有兩説一云足踏青草之心一云人有踏青之心前説為近竇氏壺中贅録蜀中風俗舊以二月二十為踏青節踏青又見舊唐書代宗紀隋煬帝望江南曲踏青鬬􅒝事青春春逺鶴注此是永泰元年春在浣花溪作顧注春逺猶言春深也肅肅花絮晚菲菲紅素輕日長惟鳥雀春逺獨柴荆數音朔有闗中亂何曾音層劍外清故鄉一作園歸不得地入亞夫營上四暮春之景下四春日感懷絮吴論肅肅落聲菲菲落貌黄注紅素乃地下花顧注惟鳥雀見過客之稀獨柴扉見村居之僻西闗中數亂謂吐蕃黨項入寇劍外未清謂吐蕃近在山故鄉尚有軍營則欲歸不得矣蕃花絮指桃栁一唐書廣德二年十月僕固懐恩誘吐回紇入寇十月吐蕃遁去永泰元年二月黨項寇富平鶴注富平屬京兆府屯顧注周亞夫營在昆明池南今桃市是也時郭子儀兵涇原為吐蕃請盟之故黄生曰寫有景之景詩人類能之寫無景之景惟杜獨擅場此詩上半當想其虚中取意之妙絶句三首單氏編在永泰元年成都詩内鮑氏曰謝克莊任伯云此詩得于慎文肅家故書中猶是吴越錢氏時人所傳格律髙妙其為少陵無疑詩説雋永謂晁氏得吴越人寫本杜詩如日出東籬水六首乃九章其一云漫道春來好云云今按前六首當另為一處不必併合聞道去聲巴山裏春船正好行趙作還都將百年興去聲一望九江城趙作山在首章欲往荆楚而作註杜臆九江洞庭詳見九江落日水檻温江口茅堂石筍西移船先主廟洗藥浣花一作沙溪次章見成都形勝而仍事遊覽也都地志温江在成都西五十里石筍街在成西門外謾一作設道去聲春來好狂風太放顛吹一作飛花隨水去翻却釣魚船末章見春江風急歎不得逺行也杜臆三首一氣轉下三韻三篇鶴注此當是永泰元年作時代宗信任元載魚朝思而士之變節者爭出其門二人在廣徳永泰間其權特盛詳玩末章其意顯然矣髙馬勿捶一作唾面長魚無損鱗辱馬馬毛焦困魚魚有神君看平聲磊落士不肯易其身此見士有不可奪之志比而兼賦申涵光曰三韻三篇甚古悍雨毛焦猶詩言我馬𤣥黄其正義曰馬病變色也雷大作鯉魚空中飛去是神也蕩蕩萬斛船影若揚一作搖白虹起檣必椎牛挂席集衆功自非風動天莫置大水中此見大才不可以小用全屬此體顔氏家訓昔在江南不信有千人氊帳及來河北不信有二萬斛船挂趙曰椎牛所以享衆古歌椎牛煮猪羊謝靈運詩席拾海月風鮑照舞鶴賦箕動天烈一作列士惡烏故切多門小人自同調去聲名利茍可取殺身傍去聲權要何當官曹清爾輩堪一笑此為當時趨炎附勢者發語多諷刺同調左傳晉政多門國寶謝靈運詩異代可要世説云王緒王相為脣齒上下權天邊行詩成後拈首二字為題四鶴注此是永泰元年成都作自天寶十載至此己恰十載唐五行志永泰元年三月辛亥大風拔木天邊老人歸未得叶都木切日暮東臨大江哭隴右河源不種田胡騎去聲羌兵入巴蜀洪濤滔天風拔木前飛秃􅒗後鴻一作黄鵠九度附書向洛陽十年骨肉無消息叶蘇六切濤此詩為久客思鄉而作也江隴右二句天邊憂亂洪四句欲歸未得皆申明臨哭泣之故趙曰廣徳元年吐蕃陷隴右而河源不種矣十二月陷松維保三州則入於巴蜀矣鶴曰胡騎指吐蕃羌兵指党項羌渾奴刺之類而王洙曰洪濤滔天言民罹昏墊秃􅒗鴻鵠欲與借飛不能也鶴注骨肉指弟在東都何遜詩天邊看逺樹記班固兩京賦西盪河源書浩浩滔天史項羽圍漢王大風拔木莫相疑行詩成後拈末三字為題斥黄氏編在永泰元年舊説指嚴武鶴其非謂公與郭英乂不合去成都而作英乂帥蜀時年方三十餘也單注云此與後詩必有為而作今不知其所指男兒生無所樊作一生無成頭皓白牙齒欲落真可惜憶獻三賦蓬萊宫自怪一日聲烜荆作烜一作輝一作燀赫集賢學士如堵墻觀我落筆中書堂往時文采動人主此文粹作今日飢寒趨路旁晩將末契託年少去聲文粹作末節契年少當面輸一作論心背面笑寄謝悠悠世上兒不一作莫爭好惡並去聲莫相疑此詩為少年輕薄而作也涵上六暮景而追往事下六途窮而慨世情申光曰起句説得突兀悲愴自怪句從失意中忽作驚人語當面輸心背面笑視天下朋友皆膠漆人情風俗可想見矣盧注輸心文采竊笑飢寒此輩好惡無常老翁漠然不與之争彼亦何用相疑哉末二句葢開誠以示之也李陵書男兒無所成名院王洙曰開元十三年改集仙殿為集賢殿麗正殿書為集賢殿書院院内五品以上為學士六品以上為直學士事記孔子射於矍相之圃觀者如堵墻李華中書政堂記武徳以來於門下省議事謂之政事堂髙宗光宅元年裝炎自侍中除中書令執宰相筆乃遷政事堂於中書省本傳甫獻三大禮賦帝竒之使待制集賢院命宰相試文章而陸機歎逝賦託末契於後生抱朴子不面從背憎黄生曰公以白頭趨幕不免為同列少年所侮故一則云晚將末契託年少當面輸心背面笑一則云老翁慎莫怪少年葛亮貴和書有篇合二作觀之顯是幕中所賦從未經人拈出胡夏客曰往時文彩動人主此日飢寒趨路旁雖懐抱如斯亦品地有失凢詩必説憂君憂國太迂但言愁飢愁寒大卑杜公不免有此二病今按公之憂君國根於至性愁飢寒出於真情若欲避此而泛言景物反非本來面日宣子之説未為少陵知音赤霄行詩成後拈中間赤霄為題元鶴曰此與莫相疑行同是永泰年作孔雀未知牛有角蔡叶音谷杜臆音六渴飲寒泉逢觝觸赤霄𤣥圃須往來翠尾金花不辭辱江中淘河嚇音罅又音赫飛燕銜泥却落羞華屋皇孫猶曾音層蓮音輦勺困衛朱云當作鮑莊見貶傷其足老翁慎莫怪少去聲年葛亮貴和書有篇丈夫垂名動萬年記憶細故非髙賢此詩亦慨歎世情之意孔雀飛燕借鳥自喻皇孫鮑莊引古自方末見自負者大故犯而不挍依兩韻分兩段孔雀被觸一事四句飛燕見嚇一事兩句皇孫鮑莊一事一句文法錯綜入古申杜臆名垂萬年寧記細故此申明不争好惡之意涵光曰赤霄行胸中有一段説不出之苦故篇中皆作借形語其博物志孔雀尾多雙色或紅或黄如雲霞無定人採尾有金翠始生三年尚小五年而後成初春乃生四月後凋與花蘂俱榮哀嶺南異物志交趾郡人網捕孔雀採其金翠尾裝為扇拂或全株生截其尾為方物云生取則金翠之色不減晉左九嬪孔雀賦擢翠尾之修莖金花尾上之色霄易寒泉之食𤣥文子兕牛之動以牴觸楚辭載赤而凌太清圃在崑崙山上爾稚鵜鴮鸅注今之鵜鶘也好羣飛入水食魚故名鴮鸅俗呼為淘河莊子鴟得腐䑕鵷雛過之仰而視之曰嚇注嚇怒而拒物聲趙曰燕從江上來淘河疑其銜魚故嚇之古詩生存華屋處漢宣帝紀帝初為皇曾孫喜游俠常困於蓮勺鹵中如淳曰為人所困辱也蓮勺縣有鹽池縱廣十餘里鄉人名為鹵中蓮音輦左傳齊國子相靈公以㑹髙鮑處守及還孟子愬之曰髙鮑將不納君秋刖鮑牽而逐髙無咎仲尼曰鮑莊子之智不如葵葵猶能衛其足注葵傾葉向日以蔽其根和諸葛亮傳陳夀所上諸葛亮集目録凢二十四篇貴第十一咏漢文帝紀捐細故注小事也阮籍懐細故何足慮髙度跨一世聞高常侍亡唐書廣徳元年適召還為刑部侍郎轉左散騎常侍永泰元年正月卒贈禮部尚書鶴注詩云蜀使忽傳亡當是永泰元年成都作原注謂忠州所作非不應正月己卒六月始聞也歸朝音潮不相見蜀使去聲忽傳亡虛厯金華省何殊地下郎致君丹檻折哭友白雲長獨步詩名在祇令平聲故舊傷此詩將生前死後逐句配説其歸朝厯省乃為常侍時事若折檻詩名則概論生平才節也上下界限仍見分明亡不相見不得面别也虚厯二句言生雖未展死實不唐史稱適負氣敢言權貴側目當至徳時陳江東利害繼又抗疏陳西山三城戍故云致君丹檻折庾信詩蜀使何時廻王洙曰後漢班固傳王鳳薦班伯召見宴暱誦説有法拜為中常侍時上方嚮學鄭寛中張禹朝夕入説尚書論語於金華殿中詔伯受焉漢宫闕記金華殿在未央宫白虎殿右秘府圖書皆在焉故王思逺遜侍中表云奏事金華之上進議玉臺之下夢王隠晉書蘇韶仕中牟令卒韶伯父承第九子節夜見韶言顔回卜商今現在為修文郎修文郎凢八人鬼之聖者項梁成賢者吴季子植丹檻用朱雲上書事白雲用陶潛停雲思友意曹詩仲宣獨步於漢南去蜀題曰去蜀是臨去成都而作也公自乾元二年季冬來蜀至永泰元年首尾凢七年其實止六年耳所謂五載客蜀者上元元年上元二年寶應元年廣徳二年永泰元年也一年居梓者專指廣徳元年也此詩作於永泰元年夏將往戎渝之時黄鶴編在廣徳二年閬州詩内恐未然今從蔡氏編次五載上聲客蜀郡一年居梓州如何闗塞阻轉作瀟湘遊萬一作世事已黄髪殘生隨白鷗安危大臣在不一作何必淚長流上四去蜀之故下四去蜀有感憶闗塞阻難返長安瀟湘遊將往荆楚也萬事從前殘生思後日大臣指郭子儀唯黄注國家安危自有大臣負荷杞憂徒抱何補於事有拭淚長辭扁舟下峽而已此反言以自釋之辭也波古詩瀟湘逢故人秋書尚猷詢茲黄髪鮑照詩翻揚白鷗吕氏春先王之所以治亂安危也注亂者治之危者安之喜雨鶴注史永泰元年自春不雨四月已已乃雨詩云巢燕林花皆四月間事鮑照有喜雨詩題南國旱一作早無雨今朝江出雲入空纔漠漠灑迥已紛紛巢燕高飛盡林花潤色分晩來聲不絶一作更急應平聲得夜深聞上四初雨之景下四雨後之景雨漠漠雲宻貌紛紛雨多貌燕啄泥故飛花經故潤入夜仍聞喜其汪濊也降趙次公曰南國荆楚也禮記天時雨山川出雲北齊劉逖對雨詩云重輪宵犯畢行雨且浮空細落疑含霧斜飛覺帶風濕槐仍足緑沾桃更上紅無由似𤣥豹縦意坐山中此摹寫雨景入細杜詩工力正相敵也宿青溪驛奉懐張員外十五兄之緒鶴注當是永泰元年去成都經嘉州下忠渝時所作傳輿地紀勝青溪驛在嘉州犍為縣高力士外李輔國弄權但經推按不死則流黔中道尤多員外則張謂張之緒李宣朱注輔國死於寶應元年十月之緒復官當在輔國敗後漾舟千山内日入泊枉一作荒渚我生本飄飄今復扶又切在何許石根青楓林猿鳥聚儔侶月明遊子静畏虎不得語此宿溪情景猿漾舟千山自蜀赴嘉也日入泊渚宿於驛前矣鳥有羣而遊子獨宿此屬興體杜臆月明遊子静五字凄絶發謝靈運詩漾舟陶嘉月莊子日入而息楚辭朝枉渚兮夕宿辰陽王融詩猿鳥時斷續侶陸厥詩鳬鵠嘯儔中夜懐友朋乾坤此深阻浩蕩前後間佳期赴一作付荆楚此懐張員外故時張在荆楚公將往與相㑹云前後間黄生曰此詩在杜集己為輕秀之作較諸唐賢猶見氣骨此章上八句下四句楚辭志浩蕩而傷懐又與佳期兮夕張狂一作短歌行贈四兄此當是永泰夏去成都之嘉戎時作觀詩言嘉州可見喜兄弟相見故興至而狂歌四胡夏客曰公之諸弟見於詩者不一此所贈兄又其諸從也與兄行年校一歲賢者是兄愚者一作是弟叶去聲兄將富貴等浮雲弟竊一作切功名好去聲權勢首敘兩人性情之異等浮雲見其賢好權勢見已愚貴莊子籧伯玉行年六十而化富等浮雲用論語長安秋雨十日泥我曹鞴音備馬聽晨雞公卿朱門未開鎻我曹已到肩相齊吾兄睡穏方舒膝不襪不巾踏曉日男啼女哭莫我知身上須繒腹中實此追敘長安往事勢下四承等浮雲上四承好權説文鞴車􅀈也一曰駕於馬曰鞴年為吾兄分為篤友魏志臧洪傳老子實其腹今年思我來嘉州嘉州酒重一作香花繞一作滿樓樓頭喫酒樓下卧長歌短咏一作歌迭一作還一作逺相酬四時八節還拘禮女拜弟妻男拜弟幅巾鞶帶不掛身頭脂足垢何曾音層洗此又記嘉州近事詩酒唱酬見其豪放男女禮拜喜其殷勤脱巾䝉垢摹其狂態庾信詩三脊冠葢聚八節管絃遊後漢鮑永傳但幅巾詣河内注不著冠但幅巾束首也通典漢末王公名士以幅巾為雅是以袁紹崔豹之徒雖為將帥皆著幅巾洗易或錫之鞶帶説文鞶大帶也一内則足垢燂湯請南史陰子春身脂垢汚脚數年洗言每洗則失財敗事吾兄吾兄巢許倫一生喜怒長任真日斜枕去聲肘寢已熟啾啾唧唧為何一作何為人末以贈兄之意作結率性任真此可追比巢許處枕肘熟睡則付人事於罔聞矣真此章首尾各四句中二段各八句晉書王導能任推分澹如也鳴廣韻啾唧小聲也枚乗賦鎗鍠啾唧蕭條寂寥楚辭玉鸞之啾啾古捉搦歌牕中女子聲唧唧王嗣奭曰此詩所謂不繩削而自合者狀四兄真有王民皥皥不識不知氣象奔走風塵者對之汗顔雖脂垢不洗自然清浄過人成黄生曰杜五古力追漢魏可謂毫髪無憾波瀾老矣至七古間有頽然自放工拙互陳者宋人自以其才力所及專取此種為詩𣲖如偪仄行及此篇入眼頗覺塵氣總為前人嚼爛耳宴戎州楊使去聲君東樓鶴注唐志戎州本犍為郡與嘉州皆犍為地公以永泰元年五月去成都之嘉戎詩云輕紅擘茘枝當是其年六月作黄山谷在戎州有食茘枝詩云六月連山柘枝紅可知茘枝熟於六月也敘元和郡國志戎州古僰國全蜀總志東樓在州府治東北唐建勝絶驚身老情忘發興去聲竒座從歌妓宻樂音洛任主人為重碧拈歐陽公作拈舊作酤一作擎一作拓春一作筒酒輕紅擘荔枝樓高欲愁思去聲横笛未休吹突説驚竒見喜出望外中四宴中景事承發興竒末二樓上有感應驚身老逢勝宴而自驚身老惜非少壯也忘老而發興特竒忽樂事也兩句輾轉説來意思沈著山坐從妓宻寫出年少癡心樂任主為曲盡妖姬媚態谷云拈酒擘枝此主人使歌妓為樂也笛聲無解於愁思葢衰年漂泊之感終有不能忘情者矣色潘尼琉璃椀賦榮宻坐之曲宴重碧酒色輕紅茘杜臆引藝海泂酌云敘州官醖名重碧戎州即敘州曹植七啟蒼梧縹清注縹深碧色趙曰二千石設筵豈有酟酒者當從歐公作拈為正元微之元日詩羞看稚子先拈酒白樂天歲假詩歲酒先拈辭不得則拈酒乃唐人語也有蕭子顯詩濃黛輕紅㸃在色以寰宇記戎州僰道縣茘扶園郡國志僰僮之富多茘枝為素唐書戎州土貢茘枝煎白居易茘枝園序殻如紅繒膜如紫綃瓤肉瑩白如冰雪蜀都賦傍挺龍眼側生茘枝趙曰茘枝雖有數種而膜皆帶粉紅黄谷山在戎州詩試傾一杯重碧色快剥千顆輕紅肌皆用此詩語盧元昌曰公詩中慣用為字作韻脚如贈畢曜曰顔狀老翁為此為字下得苦孟冬詩曰方冬變所為此為字下得微送王侍御曰此贈怯輕為此為字下得逸偶題曰餘波綺麗為此為字下得雅復至東屯曰一學楚人為此為字下得傲和少府書齋曰書齋聞爾為此為字下得藴藉此曰樂任主人為此為字下得跌宕渝州候嚴六侍御不到先下先下並去聲峽鶴曰永泰元年公去成都經嘉戎至此作元和郡國志渝州古之巴國也開皇元年改為渝州以渝水為名峽明月峽也在巴縣東八十里杜臆渝州即今重慶府寰宇記渝州其地東至魚復西連僰道北接漢中南極牂牁聞道去聲乗驄發沙邊待至今不知雲雨散虚費短長吟山帶烏蠻濶江連白帝深船經一柱觀去聲留眼一作滯共登臨上四候嚴未到五六渝州之勝七八下峽以待也本言泊船相待耳却云留眼共登臨句法婉而多風雨王粲詩風流雲散一别如雨江總别袁昌詩不言雲散更似東西流古詩有長短吟唐書南蠻傳南詔本哀牢夷後烏蠻别種也居永昌姚州之間梁益記嶲州雋山其地接諸蠻部有烏蠻白蠻全蜀總志白帝城在夔州府治東五里下即西陵峽口大江漰騰澍湃楚蜀咽喉一柱觀在荆州劉孝綽詩經過一柱觀出入三休臺出顧注杜詩一字一句皆有來厯如盡室畏途邊盡室左傳畏途出莊子此詩雲雨散長短吟俱本古詩撥悶黄鶴云永泰元年在忠州作邵注是年五月離成都下戎渝六月至忠州杜臆題曰撥悶因心有所悶為此謔浪以自寛演義謂欲飲酒撥悶非也别本作贈嚴二别駕者誤聞道去聲雲安麴米春纔傾一盞即醺人乘舟取醉非難事下去聲峽銷愁定幾廵長子兩切年三老遙憐汝捩音列柂開頭一作鳴鐃捷有神已辦青錢防雇直當令平聲美味入吾脣上四欲往雲安五六頂乗舟下峽七八承取醉銷愁顧注一盞即醺故取醉非難但欲銷愁定須酌幾廵也柂蔡注峽中以篙師為長年柂工為三老邵注三老捩者長年開頭者杜臆汝指麴米春言舟子亦憐酒而捷往也安舊唐書雲安縣屬夔州本漢巴郡􅓃䏰縣地邵注雲即今雲陽縣東坡志林退之詩百年未滿不得死且可勤買抛青春國史補酒有滎陽之土窟春富平之石凍春劍南之燒春子美亦云聞道雲安麴米春裴鉶傳竒記裴航事亦有松醪春乃知唐人名酒多以春也東方朔傳銷愁者莫若酒庾信詩五兩開船頭青黄生注趙氏以不準折一色見錢為青錢此倒訓矣銅質美故一色行使其鎈惡者用必準折故價直以青錢為率也史記秦紀酒未及濡脣杜臆雇謂舟費直謂酒資補注白樂天詩青旗沽酒趂棃花自注杭俗棃花開時酒熟號棃花春申涵光曰雲安麴米與七月六日并乞胡孫等篇皆戲筆耳拘儒執為指摘之端偏嗜者又附㑹而巧䕶之皆非也語黄生曰全篇只説一事畧無景襯綴殊少開闔之致宴忠州使去聲君姪宅鶴注永泰元年至忠州逢杜使君而作顧注忠州古巴地貞觀八年改臨州為忠州地志以巴蔓子及嚴顔皆忠烈故名出守去聲吾家姪殊方此日觀自須遊阮舍一作巷不是怕湖一作溪灘樂助長歌逸一作送杯一作林饒旅思去聲寛昔曾音層如意舞牽率强區兩切為看上四過使君宅下四歡宴比之情出守為刺史阮舍姪居湖灘近忠州而顧注長歌旅思皆公自言宴時作樂適助長歌逸興酒杯饒足故覺旅思稍寛王戎王導之姪常以鐵如意起舞言使君昔為如意之舞故今日仍牽引而相看也顔延之詩一麾乃出守吴越春秋分州殊方阮晉書阮咸與叔父籍為竹林之遊咸與籍居道南諸居道北北阮富而南阮貧峽程記四百五十灘有清水重峰湖灘漢灘一統志湖灘在夔州府萬縣西六十里其水甚險春夏水泛江面如湖接陸機詩長歌赴促節哀響逐高徽畢庾信詩山簡倒䍦王戎如意舞周王褒詩未能扶卓猶足舞王戎答左傳牽率老夫謝瞻靈運詩牽率酬嘉藻禹廟鶴注夔州本巴東郡而忠乃析巴東之臨江置又渝州有巴縣此詩當是永泰元年秋在渝忠間作禹廟空山裏秋風落日斜荒庭垂橘柚古屋畫胡化切龍蛇雲氣嘘青従英華一作生虚壁江聲走白沙早知乘四載疏鑿控三巴首二秋至禹廟三四廟中之景五六廟外之景末乃因禹廟而遡禹功孫莘老曰貢橘柚放龍蛇皆禹事公見此而有感也水黄注壁間嘘雲氣沙上走江聲二句倒裝能寫出山之險峻故下接以疏鑿三巴之語其禹乘四載以治水向時早已知之今親至三巴而見疏鑿遺蹟也疏主江言鑿主山言控則引水而往廟黄注秋風記時三巴記地景胡夏客曰只一水涯古耳寫得如許雄壯陶𢎞詩空山霜滿高烟平魂古詩秋風蕭蕭愁殺人莊張協詩荒庭寂以閒招仰觀刻桷畫龍蛇些子乘雲氣御飛龍陸倕詩網户圖雲氣虚宋書馬岌銘詩於石壁曰丹崖百丈青壁千尋子賦鉅石白沙庾信詩早知覓不見山書傳四載水乗舟陸乗車泥乗輴山乗樏庾信詩玉乗四載江賦巴東之峽夏后疏鑿班固兩都賦控引淮湖郡譙周巴記劉璋分巴以永寧為巴東郡墊江為巴閬中為巴西郡是為三巴題忠州龍興寺所居院壁鶴注公永泰元年至忠州寓居於寺故作此詩題杜臆忠州使君乃公之姪其薄情至此詩不著其名而止題院壁猶見忠厚之意忠州三峽内井邑聚雲根小市常争米孤城早閉門空一作豈看平聲過客淚莫覓主人恩一作言淹泊一作薄仍愁虎深居賴獨園上四忠州之景下四有感而歎凉峽内雲根言其僻隘争米閉門則極荒矣使君必失於周旋故有客淚主恩之慨邑近山故愁虎居獨園在寺院也蜀都賦經三峽之峥嶸巴東永安縣有高山對峙相去可二十丈左右崖甚高人謂之峽江趙曰三峽以明月峽為首巴峽巫峽之類為中東突峽為盡忠州在渝州之上所謂三峽内也百黄希曰唐志忠州本臨州州有五縣而戸止六千七則井邑蕭條可知陸雲詩井邑自相循也張協詩雲根臨八極注五岳之雲觸石出者雲之根庾信詩山城早掩扉鮑照詩既荷人主恩園金剛經有祗樹給孤獨黄生曰舊嫌五六語意太露今覺不然從三四讀下則此州之荒凉已極安能為客壯行色乎故知二語乃苦詞非怨詞也哭嚴僕射歸櫬鶴注當在渝忠時作自通典唐左右僕射本副尚書令尚書令廢僕射為宰相開元元年改為左右丞相天寶元年復舊嚴武傳永泰元年四月薨年四十贈尚書左僕射素幔隨流水歸舟返舊京老親如一作知宿昔部曲異平生風送一作逆蛟龍匣一作雨天長驃騎去聲營一哀三峽暮遺後見君情上四敘歸櫬下四哀僕射部武本華陰人故返於舊京老親猶在而下人稀此歸路之可哀者風送舟行而軍營長寂此去後之可哀者至想到平日交情尤足傷心酸鼻所以一哀而日暮也而陶潜詩平生去舊京後吾知免為官婢矣國史補武卒母哭且曰吾今漢書李廣傳行無部曲行陣久褚少孫集風雨以送之流水以行之引老子天長地驃騎營朱注引霍去病為是舊注晉齊王攸遷驃騎將軍當時罷營兵士數千戀攸恩德不忍去以比軍士思嚴如天長地久按上文有部曲異生平句此説不合跡曾子問盡一哀反位遺黄生注凢曰遺音遺遺風遺愛皆留遺之遺後亦猶是也劉後村詩話故人感知己之遇季布奏事彭越頭下臧洪盧諶皆不以主公成敗而二其心叔季所謂賓客方翕翕熱時則趨附恐後及時異事改則掉臂而去至有射羿者世傳嚴武欲殺子美殆未必然觀老親如宿昔部曲異平生之句極其悽愴至置武於八哀詩中忠厚藹然異於幕府少年今白髪之作矣李義山過舊府有寄諸掾詩云莫慿無鬼論終負託孤心猶有門生故吏之情可以矯薄俗旅夜書懐鶴注當是永泰元年去成都舟下渝忠時作細草微風岸危檣獨夜舟星垂一作隨平野濶月湧大江流名豈文章著官應一作因老病休飄飄一作飄零何所似天地一作外一沙鷗上四旅夜下四書懐星微風岸邊夜舟獨繫兩句串説岸上垂舟前月湧兩句分承五屬自謙六乃自解末則對鷗而自傷飄泊也二顧注名實因文章而著官不為老病而休故用豈應字反言以見意所云書懐也舞一沙鷗仍應上獨字度王融詩翻堦沒細草宋玉賦順微風陰鏗詩鳥息危檣詩王粲詩獨夜不能寐詩易天垂象當作星垂吴均逺送出平野謝朓大江日夜流揚雄傳贊雄好古樂道其意欲求文章成名於後世一漢書韋賢以老病乞骸骨罷歸按天地一沙鷗乾坤草亭一字上加間字句義自明黄生曰太白詩山隨平野盡江入大荒流句法與此畧同然彼止説得江山此則野濶星垂江流月湧自是四事也朝又曰此詩與客亭作工力悉敵但意同語異耳聖無棄物老病已成翁此不敢怨君引分自安之語名豈文章著官應老病休此無所歸咎撫躬自怪之語史氏曰詩要健字撑拄活字斡旋如紅入桃花嫩青歸栁葉新弟子貧原憲諸生老服䖍入與歸字貧與老字乃撑拄也生理何顔面憂端且歲時名豈文章著官應老病休何與且字豈與應字乃幹旋也撑拄如屋之有柱幹旋如車之有軸作文亦然詩以字文以句放船鶴注當是永泰元年自忠渝下雲安時作收㠶下去聲急水巻幔逐回灘江市戎戎暗山雲淰淰音閃寒荒林一作村荒無徑入獨鳥怪人看已泊城樓底何曾音層夜色闌上四放船暮景下四泊船暮景暗㠶以御風幔以蔽日曰收曰巻日將晚矣市雲寒行舟所見荒林獨鳥停舟所見無徑入林已昏也怪人看鳥將宿矣自放而泊夜色未闌正見行舟之速庾肩吾詩離舟巻幔城戎詩何彼穠矣注穠穠猶戎戎張衡冡賦乃樹靈木戎繁霜黄注戎戎市中晩烟之盛也董斯張曰禮運龍以為畜故魚鮪不淰注羣隊驚散貌淰淰者狀雲物散而不定孔氏曰讀淰為閃者淰從水閃從門中人言水中之形狀忽有忽無如人在門或見或不見也何遜詩獨鳥赴行楂闌盡也胡應麟曰詩用叠字最難叠字中最警語對屬尤不易工如野日荒荒白江流泯泯清下句稍遜不若山市戎戎暗江雲淰淰寒銖兩既敵而駢偶天成昔人有以雨荒深院菊霜倒半池蓮為的對者彼特常格常語耳雲安九日鄭十八擕酒陪諸公宴鶴注永泰元年八月僕固懐恩及吐蕃回紇等入寇故詩云萬國皆戎馬逺注鄭十八名賁雲安人寒花開已盡菊蘂獨盈枝舊摘人頻異輕香酒暫隨地偏初衣去聲裌袷同山擁更登危萬國皆戎馬酣歌淚欲垂上四九日自傷飄蕩下四雲安慨世亂離來人指諸公曰頻異憶去年也鄭方擕酒曰暫隨念將也初衣夾見地氣之煖更登危見山城之髙文張正見詩霜雁排空斷寒花映短籬沈佺期詩魏頒菊蘂漢武賜茰囊蒻陶潜詩心逺地自偏日説文裌無絮衣秋興賦籍莞御裌衣風俗通九登高以禳災厄記孝子不登危於商書酣歌室答鄭十七郎一絶鶴注鄭十七鄭十八兄弟也雨後過平聲畦潤花殘步屐遲把文驚小陸好去聲客見當時此訪鄭後鄭贈詩而公答之也上二敘景下二言情小陸陸雲也比鄭十八當時鄭莊也比鄭十七别常徵君顧注永泰元年自秋徂冬公在雲安故云卧病一秋强强多也兒扶猶杖策卧病一秋强白髪少新洗寒衣寛總長故人憂見及此别淚相望平聲黄生作望舊作忘各逐萍流轉來書細作行音杭病上四自敘病態下四送别常君矣扶而猶杖已憊也髪少矣新加梳洗衣寛下垂而長此備寫老病之狀張故人憂及已病彼此傷心而相對淚下故曰淚相望逺謂憂病甚於惜别故淚可相忘稍曲此白髪少寒衣寛此上三字下二字句法也謝靈運詩别久無適黄注見及恐大命之見及長江二首鶴注瞿塘峽在夔州東一里雲安在州西百三十里永泰元年公在雲安雲安與萬州為隣使君一灘占兩境時崔旰叛蜀故有朝宗人共挹萬國奉君心之句衆水㑹涪萬瞿塘争一門朝音潮宗人共挹盜賊爾誰尊孤石隠如馬髙蘿垂飲猿歸心異波浪何事即飛翻首章觀長江而慨身世也上四惜水以感時事下四觸景而動歸思衆水㑹集而争赴一門其迅急可知自此東流赴海水有朝宗之義今盜賊據險為亂爾不尊朝廷而將誰尊耶石如馬險可畏猿垂飲物可増寫景中亦含歸意江水飛翻阻人歸路而歸心終不可阻亦何用飛翻為哉黄注此八句整對格亦虚實相間格舊書涪州涪陵郡武徳元年以渝州之涪陵鎮置萬州南浦郡武徳二年析信州置俱屬山南東道寰宇記瞿塘在夔州東一里古西陵峽也連崖千丈崩流電激方輿勝覽瞿塘峽乃三峽之門兩崖對峙中貫一江望之如門焉言詩沔彼流水朝宗於海衆詩挹彼注茲黄注共挹猶共飲其徳以一門應水以誰尊應朝宗皆用斜對法杜臆云朝宗者人所共取今盜賊不知此義誰是尊爾者見逆理之必亡也二句解作正對以下章奉君例之則誰尊當主君説人李膺益州記灔澦堆夏月漲没數十丈其狀如馬舟不敢進又曰猶豫言舟子取途不决水脈故猶豫也水經注江中有孤石為滛豫石冬出水二十餘丈夏則沒亦有裁出矣樂府滛豫大如馬瞿唐不可下寰宇記灔澦堆周圍二十丈在州西南二百步蜀江中心瞿唐峽口水經注瞿唐峽多猿猿不生北岸非惟一處或取之放著北山中初不聞聲吴均書企水之猿百臂相接謝靈運游名山志觀掛猿下飲百丈相連浩浩終不息乃知東極臨一作深衆流歸海意萬國奉君心色借瀟湘濶聲驅灔澦沈一作深未辭添霧雨接上上聲過一作遇衣襟次章申明上章之意上四言朝宗至海見世當戴君下四言歸心阻雨歎已難出峽使江漲波濶似預借瀟湘之色水奔聲急如欲驅灔澦沈此狀水勢之壯悍一説瀟湘之濶其色皆借資於此以瀟湘乃江水下流也衣杜詩博議江流之大不辭霧雨雨接江流而上過人襟之間所謂波浪兼天者如此大東極指東海小水水東流歸海西都賦衆流之隈國尚書大傳古史執玉帛者萬鄒陽傳浮雲出遊霧雨咸集單列仙傳王子晉遊伊洛間道士浮丘公接上嵩山復疑末句有訛字今按接上二字恐當作接壤言水浸岸上也壤與上葢聲相近而訛耳補注史記周覽東極王嗣奭曰詩以長江命題乃寫其朝宗之性以警盜賊之背主者兩章同意但有逺近源流之别前章言瞿唐以上之水後章言瞿唐以下之水郭通鑑永泰元年夏嚴武卒行軍司馬杜濟等共請英乂為節度使漢州刺史崔旰請大將王崇俊為節度使㑹朝廷已除英乂英乂殺崇俊召旰還成都旰不至英乂將兵攻之大敗而還英乂奔簡州普州刺史韓澄殺英乂時卭瀘劍三州牙將各舉兵討旰蜀中大亂承聞故房相去聲公靈櫬自閬州啓殯歸塟東都有作二首聞上加承字尊故相也春鶴注琯卒於廣德元年權瘞閬州二年公有詩别其墓今云孤魂久客間則此詩作於永泰元年是時公在雲安故云逺聞又云風塵終不解其年吐蕃回紇寇邊也逺聞房太尉一作守非歸塟陸渾平聲山一徳興王後孤魂久客間孔明多故事安石竟崇班他日嘉陵淚一作涕仍霑楚水還首章哀思故相欲候哭於夔江也言一德而多故事言生前相業孤魂而竟崇班歿後贈典嘉陵淚初哭於閬州楚水還再逄於夔州園黄生注孔明安石皆身厯兩朝者比房相獨切公田在東都常有歸志今哭公於此地空有淚逐櫬還而已還字仍挽歸塟趙曰舊本作太守非善本作太尉葢琯適漢州刺史召拜刑部尚書道病卒贈太尉不應呼之為太守也宋之問詩歸塟出三條唐書琯河南人宰相房融之子少好學與東平吕向偕隠陸渾山十年鄭曰十道志陸渾山在洛陽洙曰昔辛有適伊川見被髪而祭者言此地當夷後為陸渾之戎所有山因而得名魂書咸有一德宋之問詩業重興王際孔融詩孤遊窮暮長後漢書温序為隗囂所殺䘮到洛陽賜城旁地為塜子夀夢序曰久客思鄉里夀即上書請骸骨歸塟四蜀志陳壽與荀勗等定故蜀丞相諸葛亮故事二十篇以進謝安傳安塟時年六十六帝三日臨於朝堂賜東園秘器朝服贈太傅謚曰文靖及塟加殊禮依大司馬桓温故事王獻之傳謝安薨贈禮有異同之議獻之與徐邈共明安之忠勛遂加殊禮江鶴曰嘉陵江在果州果與梓閬為隣楚水夔已下之也江淹賦楚水而吴江丹旐飛飛日初傳發閬州風塵終不解江漢忽同流劍動黄注一作近親身匣書歸故國樓盡哀知有處為客恐長休次章傷心歸櫬欲終哭於東都也四閬州起殯應前嘉陵江故國歸塟應前陸渾山三時危而憶老臣五六物在而悼人亡公思盡哀塟所又恐客死不還葢痛房而兼自痛矣丹旐銘旌也王褒送塟詩丹旐書空位寡婦賦飛旐翩以啟路公虞世基詩飛飛未得栖閬州有漢水即嘉陵江房之櫬自西漢而下夔江故云江漢同流即朱注左傳不識屬辟疏云屬次大棺辟親身棺也匣蛟龍玉匣黄生注劍動言靈爽所慿書歸言手澤所存者史記孔子世家各復盡哀淮南子䘮所以盡哀劉克莊曰子美與房琯善其為哀挽方之孔明謝安投贈哥舒翰詩盛有稱許比之亷頗魏綘然陳濤斜潼闗二詩直筆不少恕或疑與素論相反愚謂翰未敗非事前所知琯雖敗猶不失為名相及二人各敗又直筆不恕所以為詩史也何相反之有將曉二首鶴注此當是永泰元年冬雲安作石城除擊柝鐵鎻欲開闗鼓角愁荒塞星河落曙一作曉山巴人常小梗蜀使去聲動無還垂老孤㠶色飄飄一作飄颻犯百一作白蠻此詩曉發雲安而作上四脟曉景事下四將曉心緒柝方静而鼓角又鳴門將啟而星河已沒此曉時聞見者巴蜀不安以致孤㠶早發所謂干戈連解䌫也水經江水逕臨江縣南左逕石城南巴漢志朐䏰縣山有大小石城漢胊䏰唐雲安也易重門擊柝黄鶴曰巴人常小梗謂上元間劍南東川節度兵馬使段子璋反伏誅寶應初劍南西川兵馬使徐知道反伏誅明年劍南西川兵馬使崔旰反殺成都節度使郭英乂蠻黄生注㠶色即行色州夔為楚地本屬蠻方唐書諸羈縻州九十二𨽻戎都督府軍吏廻官燭舟人自楚歌寒沙縈一作䝉薄霧落月去清波壯惜身名晩衰慚應接多歸朝音潮日簪笏筋力定如何此章敘景言情亦四句分截衰上四乃發船時所聞見者下截仍歎垂老意壯字字微讀言追思壯年惜身名已晚今當衰老慚應接徒多縦使歸朝正恐筋力難堪耳前章寫岸上之景此章寫舟前之景前章歎留滯南方此章欲還歸北闕也暗官燭官府之燭黄庭堅曰巴祇為揚州刺史與坐客中不燃官燭史記項羽紀聞軍中四面皆楚歌國沈慶之詩朽老筋力盡徒步歸南懐錦水居止二首鶴注當是永泰元年在雲安作陶潛詩居止次城邑軍旅西征僻風塵戰伐多猶一作獨聞蜀父老不忘去聲舜謳歌天險終難立柴門豈重義從平聲讀從去聲過平聲朝朝巫峽水逺逗郭作逺逺錦江波首章避亂而去錦水也在四句分截西征僻王師未到戰伐多共討崔旰舜謳歌𤣥宗曾幸蜀也兵亂如是故天險難以立身而草堂不復經過矣惟看巫峽之水遙連錦水而已逗引也蜀杜臆天險即所謂西蜀地形天下險曰終難立已知亂難平矣唐書永泰元年冬十月劍南節度使郭英乂為兵馬使崔旰所殺卭州牙將柏茂琳瀘州牙將楊子琳劍州牙將李昌夔等共起兵討之漢書相如著書假蜀父老為辭不舜謳歌出孟子天險劍門也易天險可升也萬里橋西一作南宅百花潭北莊層軒皆面水老樹飽經霜雪嶺界天白錦城曛日黄惜哉形勝地回首一茫茫次章懐思錦水勝境也亦四句分段首首二居止所在三四近景五六逺景此即形勝也回句應前豈重過仍結到懐字世杜臆萬里橋六句乃草堂記也公之神情鍾此故百而後復為所有宋玉招魂髙堂䆳宇檻層軒閣史萬歲詩界天自嶺勝金湯劍銘形勝之地匪親勿居葛常之韻語陽秋曰公作草堂經營上元之始斷手寶應之年有此草堂者始終祗得四載而其間往梓閬三年公詩所謂三年奔走空皮骨也永泰元年四月嚴武卒是秋公寓夔州雲安縣則居草堂僅閲歲而已其起居寢處之興不足以償其經營往來之勞可謂一世之羇人也然自唐至今已數百載而草堂之名與其山川草木皆因公詩以為不朽之傳葢公之不幸而山川草木之幸也青絲朱氏編在永泰元年亂鶴曰此詩言僕固懐恩之也青絲白馬誰家子麄豪且逐風塵起不聞漢主放妃嬪近静潼闗掃蜂蟻殿前兵馬破汝時十月即為虀粉期不如一作未知面縛歸金闕萬一皇恩下去聲玉墀此詩諷僕固懐恩也揚首以候景之亂比其犯順放妃嬪頌主徳也静潼闗國威也下則料其敗亡而勸之歸正朱注永泰元年九月懐恩死於鳴沙虀粉之言騐矣漢南史侯景傳大同中童謠曰青絲白馬夀陽來前書文帝十二年出惠帝後宫美人令得嫁又文帝遺詔歸夫人以下至少使又成哀平帝皆出宫人媵妾朱注舊唐書永泰元年二月内出宫女千人品官六百人守洛陽宫此與肅宗收京即放宫女三千皆盛徳事故借漢主為言不聞謂豈不聞乎三唐書吐蕃䧟長安涇州刺史高暉為鄉導吐蕃遁帥百驍騎東走潼闗守將李日越擒而殺之云蔡琰胡笳聚如蜂蟻魚殿前兵馬謂神策軍也兵志廣徳元年代宗幸陜朝恩舉神策軍迎扈後以軍歸禁中自將之永泰元年又以神策軍屯苑中自是寖盛分為左右廂勢居北軍右數出征伐有功莊子使宋王而寤子為虀粉矣向史記微子造軍門肉袒面縛注面縳者縛手於背面前也金闕玉墀注見五巻皇曹植責躬詩恩過隆三絶句朱注此詩梁權道編在廣徳二年魯訔編在上元二年黄鶴編在大厯三年按首章渝開殺刺史事雖無考而以後二章證之此乃永泰元年事也前一作去年渝州殺刺史今年開州殺刺史羣盜相隨劇虎狼食人更肯留妻子此三章雜記蜀中之亂首章傷兩州之被寇也食人留妻子就虎狼言以見盜之尤劇天唐書開州盛山郡屬山南西道本萬州郡寶元年更名二十一家同入蜀惟殘一人出駱谷自説二女齧臂時廻頭却向秦雲哭次章記難民之罹禍也者入蜀諸家葢當時避羌渾而至蜀杜臆殘餘也二女齧臂恐不兩全故棄之而走元朱注唐書興道有駱谷路南口曰儻谷北口曰駱谷和郡縣志儻谷一名駱谷駱谷在興道縣北三十里按駱谷在長安西南駱谷闗在京兆府盩屋縣西南一百二十里武徳七年開駱谷道以通梁州在今闗外九里貞觀四年移於今所駱谷道漢魏舊道也南通蜀漢寰宇記自鄠縣界西南經盩屋縣又西南入駱谷出駱谷入洋州興勢縣界史記吴起出衛國門與母訣齧臂而盟世説趙飛燕妹弟少貧微及飛燕見召與女弟齧臂而别劉孝威詩秦雲猶變色殿前兵馬雖驍雄縱暴畧與羌渾平聲同聞道去聲殺人漢水上婦女多在官軍中末章歎禁軍之暴横也而漢水在巴西禁兵葢曾至蜀肆虐者地羌渾黨項羌吐谷渾也唐書黨項古析支東距松州北隣吐谷渾吐谷渾注見前朱鶴齡曰代宗任用中人依禁軍以平亂而不知其縱暴乃如此詩故深刺之也師古注時天子命陸瓘以三千神策軍彈壓蜀亂徧考史鑑俱無此事凢師氏所引唐史拾遺皆出偽譔嚴滄浪嘗辯之如公詩自平中官吕太一事載正史師乃云唐史拾遺有呂寧為太一宫使即此推之他可知矣又曰唐本紀永泰元年九月僕固懐恩誘黨項羌渾奴刺寇同州及鳳翔盩厔末章云縱暴畧與羌渾同則知其時為寇者乃羌渾也次章云惟殘一人出駱谷駱谷闗在盩厔西南又知二十一家因避羌渾而入蜀也雖寶應元年黨項奴刺嘗寇梁洋間然爾時禁軍尚未盛兵志謂在廣徳元年代宗幸陜以後以詩中殿前兵馬句觀之是作於寶應之後矣遣憤鶴注此當是永泰元年作郭子儀與回紇再盟以破吐蕃正在此年聞道去聲花門將去聲論平聲功未盡歸自從收帝里誰復扶又切總戎一云兵機一云軍麾蜂蠆終懐毒雷霆可震威莫令平聲鞭血地再濕漢臣衣此為回紇驕横作詩以遣憤也得回紇方矜功邀賞而總戎又不其人此皆時事之可憤者今朝廷之上宜思養毒貽患急震威以制防之母令其再恃軍功辱及廷臣也朱注通鑑永泰元年十月郭子儀使白光元帥精騎與回紇將藥葛羅追吐蕃於靈臺西原大破之又破之於涇州東於是回紇都禄督等二百餘人入見前後贈賚繒帛十萬疋府藏空竭所謂論功未盡歸也王猛辭表總督戎機出納帝命朱注吐蕃敗去京師解嚴時魚朝恩統神策軍勢寖盛誰復總戎機葢諷中人典兵而任子儀之不専也蠆左傳君無謂邾小蜂蠆有毒况國乎通俗文長尾為短尾為蠍漢賈山傳人主之威非特雷霆也初左傳齊侯誅屨於徒人費弗得鞭之見血于慎行曰雍王見回紇可汗於黄河北責雍主不於帳前舞蹈車鼻逐引藥子昻李進章少華魏琚各榜捶一百少華琚一宿而死漢臣鞭血正記此事張注公追憶回紇助討朝義時其肆毒如此今助討吐蕃母再濕漢臣衣可也觀一再字可見舊注引漢書禁中非刑人鞭血之地於此無涉王嗣奭曰子儀説花門同逐吐蕃而論功猶未歸去則其觖望可知子儀身係天下安危而有事相之無事棄置所以外夷輕視中國公甚惜之故云自従收帝里誰復總戎機回紇毒如蜂蠆若元戎得人可震以雷霆之威矣使黄生曰題云遣憤憤人主蔽於近倖不任元戎而花門得行其肆横也總戎指郭子儀蜂蠆指程元振輩望代宗一震雷霆以去讒佞耳按此説稍異不如杜臆十二月一日三首鶴注永泰元年秋公至雲安是冬在雲安作明年春晚遷居䕫州今朝臘月春意動雲安縣前江可憐一聲何處送書雁百丈誰家上上聲瀨一作水船未將梅蘂驚愁眼要一作更取椒一作楸花媚逺天明光起草人所羨肺病㡬時朝音潮日邊此詩厭居雲安而作承首記時次記地三四縣前景承次句五六臘後事首句末因春近而念朝正也春聞雁聲想家書見瀨船思出峽方在臘故梅蘂未吐將至故椒花欲頌逺天指雲安媚言其可愛張正見詩終無一雁帶書回北晉樂府沿江引百丈一濡多一綖南史宋超傳宋武伐超石前鋒入河軍人縁河南岸牽百丈朱注演繁露云杜詩多用百丈問之蜀人云水峻岸石又多亷稜若用索牽遇石輒斷故劈竹為大瓣用麻繩連貫以為牽具是名百丈陸游入蜀記上峽惟用艣及百丈不用張㠶百丈以巨竹四破為之大如人臂前吴都賦直銜濤而上瀨瀨急灘也榛江總詩玩竹春筍驚花雪後梅驚眼本此晉劉妻元日獻椒花頌揚慎謂當作楸花未然迂古樂府入門各自媚即此媚字朱瀚引媚於天子太漢王商借明光殿起草作制誥即趙大綱謂公詩翰林學士如堵墻觀我落筆中書堂明光起草人所羨也據石硯詩蔡注引漢官儀尚書郎主作文章起草乃自敘郎官事也人晉明帝云只聞人自長安來不聞人自日邊來故後遂指長安為日邊寒輕市上山煙碧日滿樓前江霧黄負鹽出井此溪女打鼓發船何郡郎新亭舉目風景切茂陵著書消渴長春花不愁不爛熳楚客惟聽棹相將次章承雲安上四雲安景事下四雲安情緒冒烟碧霧黄冬暖之色此溪女嫌其俗陋何郡郎怪其險中原未平故有新亭風景之傷肺病留蜀故有茂陵消渴之慨春花應春動聽棹思出峽也謠何遜詩山烟函樹色鮑照詩濛昧江上霧馬嶺三牛對馬嶺不出貴人出鹽井逺注雲安人家有鹽井其俗以女當門戸皆販鹽自給唐書夔州奉節縣有永安井鹽官又雲安大昌皆有鹽官船又云峽中多曲江有峭石兩舟相觸急不及避故發多打鼓聽前船鼓聲既逺後船方發恐相值觸損也何氏語林王敦嘗坐武昌釣臺聞行船打鼓嗟稱其能王導傳中州士人避亂江左毎至暇日邀飲新亭周顗中坐歎曰風景不殊舉目有江山之異通鑑注新亭去江寧縣十里近臨江渚見切乃悽切之切故茂陵著書用司馬相如事注别顧注䕫為南楚自稱楚客鮑照詩楚客心悠哉舊儀禮注相將彼此相扶助陶潛詩相將還居杜臆發必同行故曰相將猶俗云船幇即看平聲燕子入山扉豈有黄鸝厯翠微短短桃花臨水岸輕輕栁絮㸃人衣春來準擬開懐久老去親知見面稀他日一盃難强區兩切進重平聲嗟筋力故山違末章承春意上四擬春日之景下四冩春日之情其朱注詩作於十二月一日而云燕鸝桃栁者葢逆道事即所謂他日也意親知稀見欲開懐而不得故山終違欲强飲而不能有兩層故曰重嗟朱瀚謂一嗟筋力一嗟故山非是筋力即上文老去耳長即看即可見也豈有豈不有也他日指來春故山指安瀚曰故山山扉首尾相應微陳後主詩雲色入山扉字何遜詩黄鸝隠葉飛矮翠山腰春色黄注短短老而趣如小小則嫩矮則俗灼灼則太文皆替此二字不得曰王羲之與謝萬書欲與親知時共懽讌史記趙高羣臣莫得見其面别薛道衡詩陶然寄一杯游李嶠詩重嗟歡賞地翻召離憂陶𢎞景授陸敬文筋力盡於登築謝靈運詩故山日已逺杜詩凢數章承接必有相連章法首章結出還京次章結出下峽三章又恐終老峽中皆其布置次第也有盧世㴶曰末章尤空竒變化其虛實實虚有無無之間妙極厯亂而懐人歎老抱映盤紆此老杜七律之神境又雪鶴注當是永泰元年冬作脱題曰又雪前面應有雪詩一章疑漏矣南雪不到地青崖霑未消微微向日薄脈脈去人遙冬熱鴛鴦病峽深豺虎驕愁邊有江水焉於䖍切得北之朝此公厭居雲安而託冬雪以寫意也上四言景下四感懐雪不到地氣煖故也霑崖之雪向日旋消人毎不見故脈脈而遙此杜臆文禽偏病猛獸偏驕見地惡不可久居安得乗江水而北返長安乎風土記南方無雪微江淹詩雞鳴丹壁上猿嘯青崖間峽陶潛詩閒雨紛微吴均詩脈脈留南浦杜臆深有虎負嵎之勢陶淵明詠雪詩凄凄歲暮風翳翳經日雪傾耳無希聲在目皓已㓗摹寫最工上四彷彿似之皆狀物佳句雨鶴注舊史大厯元年正月丁已朔則初八日為甲子史又云是春旱至六月庚子始雨與唐諺合㝠㝠甲子雨已度立春時輕箑煩一作須相向纖絺恐自疑烟添纔有色風引更如絲直覺巫山暮兼催宋玉悲詩為甲子逢雨而作首聮記異三四承立春時怪其乍暖五六承雨㝠㝠形其細微巫山暮雨後昏翳也宋玉悲客况凄凉也千楚辭雷填填兮雨㝠㝠輕朝野僉載春雨甲子赤地里秋興賦於時乃屏箑釋纖絺注箑扇也纖絺細葛湧洙曰扇可相向則葛疑其可著矣張協詩騰雲似烟宻雨如散絲高唐賦妾在巫山之陽暮為行雨王嗣奭曰先雨而度立春是冬甲子雨也諺云冬雨甲子飛雪千里南方地煖故不雪而雨舊引春雨甲子誤又諺云雨前如毛不肯雨雨後如毛不肯晴冬雨度春而風引如絲乃雨之可厭者白日晦㝠如巫山已蕃疑神女之行雨也宋玉悲秋賦云憀慄兮若在逺行又云坎廩兮貧士失職而志不平故兼催宋玉悲注謂雨過如秋與輕箑纖絺戾矣南楚鶴注當是大厯元年春在雲安作笛顧注雲安在楚之西南故曰南楚宋玉賦絶鄭之遺離南楚兮方言南楚之人南楚青春異暄寒早早分無名江上草隨意嶺頭雲正月蜂相見非時鳥共聞杖藜妨躍馬不是故離羣上六寫春暄之景下二敘客楚之情早杜臆他處初春必有餘寒惟南楚交春即暄故云早分春暄佳勝如此而不及與人遊賞正恐杖藜緩行有妨少年躍馬者耳非是故意離羣也黄注五六見物皆樂羣與七八反照記子夏離羣而索居無名江上草隨意嶺頭雲此奥水流心不競雲在意俱遲同一間曠心境但此處似出之太易耳水閣朝霽奉簡雲安嚴明府一作嚴雲安也嚴明府雲安縣令時公居嚴之水閣故作詩以贈之鶴注當是大厯元年春在雲安作東城抱春岑江閣隣石面崔嵬晨雲白朝旭一作日射音石芳甸雨檻卧花叢風床展書巻一作輕幔鈎簾宿鷺起丸藥流鶯囀呼婢取酒壺續兒誦文選去聲晩交嚴明府矧此數音朔相見首二水閣形勢崔嵬四句朝霽之景鈎簾四句朝霽之事末㸃簡嚴之意城抱山閣後也石為隣閣傍也晨雲朝旭在閣外卧花展書在閣中鷺起鶯囀在閣外呼酒課兒在閣中句句切水閣却句句貼朝霽此皆現前景事不煩雕琢者芳杜臆水閣即前江樓情異而其景遂别芳甸春野菲也謝朓詩雜英滿芳甸自沈約詩雨檻雲欄沈風俗通祝恬道得温病應融躬御之手為丸藥約詩流鶯復滿枝申涵光曰呼婢取酒壺不似詩語子誦文選斷不能接公為口續之黄生曰此詩全首風致葢即景寫心之作也祖張綖曰杜詩無所不具後人各因其姿之所近而之皆足以名家雨檻風床一聨秦淮海以婉麗得之而有雨砌隨危芳風軒納飛絮之句鈎簾丸藥一聨王荆公以工刻得之而有青山捫虱坐黄鳥挾書眠之句又淮海云有情芍藥含春淚無力薔薇卧曉枝亦倣杜句而微涉於纖矣起葉石林詩話蔡天啟云荆公毎稱老杜鈎簾宿鷺丸藥流鶯囀以為用意髙妙五字模楷他日公作詩得青山捫虱坐黄鳥挾書眠自謂不減杜語求之集中不見其全篇或但得此聨未嘗成章耶杜鵑鶴注當是大厯元年春在雲安作故云雲安有杜鵑洙曰華陽風俗録杜鵑其大如鵲而羽烏聲哀而吻有血人云春至則鳴聞其初聲者有離别之苦惟田家候其鳴則興農事西川有杜鵑東川無杜鵑涪萬一作南無杜鵑雲安有杜鵑首記蜀中杜鵑之有無西川雲安起下二段紀杜臆起用四杜鵑或有或無皆就身之所厯而自所聞鵑鳴有時西川雲安當其鳴則聞之而謂之有東川涪萬當其不鳴則不聞而謂之無故初拜於錦城而雲安則身病不能拜通篇起結照應如此乃拘泥者見其疊用杜鵑以為題下注注應止分有無二項不應有無參錯若以比刺史忠逆則雲安非州無刺史也且嚴武亦卒矣故誼伯東坡之説皆非也老杜變體最多如三絶句疊用兩刺史唐人有此體乎或黄希曰白頭吟郭東亦有樵郭西亦有樵此詩起法本此吴曾漫録樂府江南詞魚戲蓮葉東魚戲蓮葉西魚戲蓮葉南魚戲蓮葉北子美正用此格古韻西與北叶北音悲趙曰連用四杜鵑正詩有酒醑我無酒酤我坎坎鼓我蹲蹲舞我之勢豈是題下注耶我昔遊錦城結廬錦水邊有竹一頃餘喬木上上聲參天杜鵑暮春至哀哀呌其間我見常再拜重是古帝魂叶胡弮切鵑此承西川有杜自述往時致敬之意行陶潜詩結廬在人境鵑何胥詩古木上參天鮑照路難中有一鳥名杜云是古時蜀帝魂生子百鳥巢百鳥不敢嗔叶稱延切一作喧仍為餧其子禮若奉至尊叶租全切鴻雁及羔羊有禮太古前行户郎切飛與跪乳識序如一作又知恩叶衣尖切之此言鳥尊杜鵑乃承上起下詞奉若至尊物性所禀猶羔雁知禮從古皆然也行飛識序雁有兄弟之禮跪乳知恩羊有母子之禮世説杜鵑養子於百鳥巢百鳥共養其子而不敢犯為春秋繁露雁有行列羔飲其母必跪類知禮者故以贄羊祜雁賦鳴則相和行則接武前不絶貫後不越序聖賢古一作吾法則付與一作之後世傳君看平聲禽鳥情猶解事杜鵑今忽暮春間值我病經年身病不能拜涙下去聲如迸泉此承雲安有杜鵑又敘病中哀憐之意君臣之禮世傳已久即禽鳥之微猶知尊事今病不能拜惟有泣下悲傷而已與前段我見常再拜相應申涵光曰開首四語起得竒朴其云拜杜鵑竒不能拜而泣更竒為此章四句起下三段各八句淮南子設儀立度可法則息劉琨詩據鞍長歎淚下如迸泉趙次公曰此詩譏世之不修臣節者曾禽鳥之不若耳大意與杜鵑行相表裏又曰世有杜鵑辯乃仙井李新元應之作鬻書者編入東坡外集詩話中其説云葢譏當時刺史也嚴武在蜀雖横斂刻薄而實資中原是西川有杜鵑其不䖍王命擅軍旅絶貢賦以自固如杜克遜在梓州是東川無杜鵑耳涪萬雲安刺史微不可考凢尊君者為有懐貳者為無不在乎杜鵑真有無也其説穿鑿子規此亦雲安春作乃水閣所聞子規也者杜臆一説子規非杜鵑乃呌不如歸去峽裏雲安縣江樓翼瓦齊兩邊山木合終一作盡日子規啼眇眇春風見蕭蕭夜色凄一作棲客愁那聽此故作傍去聲一作傍旅人低此聽子規而動客愁也峽中有縣縣前有江江上有樓樓邊擁以山木而子規終日啼號當此春風之際儼如夜色凄凉客愁何堪聽此况故作低聲以近人乎八句一氣滚下夜色即就日間言此杜臆之説也眇眇指子規蕭蕭指山木手申涵光曰兩邊山木合終日子規啼爽豁如彈丸脱此太白雋語也梵夢弼曰翼瓦謂簷宇飛揚如鳥之張翼湛庾信詩清兩邊來鮑照詩眇眇負霜鶴夏后秋夕賦木蕭蕭以被風客居唐書大厯元年二月以杜鴻漸為東西川副元帥詩云已開動行軒葢三月初作杜臆謂此詩作於雲安是也又謂前江後山即前所云江樓水閣印合自確黄鶴編在䕫州與客堂為一處誤矣客居所居堂前江後山根下塹七艶切萬尋岸蒼濤鬱飛翻葱青衆木梢邪豎雜石痕子規晝夜啼壯士斂精魂峽開四千里水合數百源人虎相半居相傷終兩存此記客居情景峽岸下翻濤承前江木梢石痕承後山四句江山近景開千里水合百源二句江山逺景子規夜啼已動歸思况人虎雜居更難久處矣髙杜臆濤翻色白今云蒼濤以岸髙掩映故也所處地故見木梢雜石之痕或斜或豎湖客居旅舍也下居字指居處後漢楊震傳常客居於沈約詩林薄杳葱青又傾壁復邪豎峽恨賦拱木斂魂阮籍咏懷詩精魂自漂淪郎宋肇三堂記峽江綿跨西南諸夷合牂牁越嶲夜鳥蠻之水縈紆曲折掀騰洶湧咸歸納於峽口實衆水水之㑹也申涵光曰人虎兩存此大道理他人數語説不出蜀麻久不來吴鹽擁荆門西南失大將去聲商旅自星奔今又降元戎已聞動行軒舟子候利涉亦慿節制尊此記蜀中時事也大將謂郭英乂元戎謂杜鴻漸麻鹽不通商旅避兵節制可慿望其平蜀也夢弼曰蜀出麻吴出鹽招廣絶交論莫不望影星奔詩招舟子易利涉大川我在路中央生理不得論平聲卧愁病脚廢徐步視小園短畦帶碧草悵望思王孫鳳隨其凰去籬雀暮喧繁覽物想故國十年别荒一作鄉邨日暮歸㡬翼北林空自昏此感客居而思故鄉雲安在荆蜀之間故曰路中央感趙曰見碧草則思王孫見雀喧則思鳳舉皆因小園興短畦四句從小園追想故國也禄山䧟京屠戮宗室故曰悵望思王孫楊妃殁後上皇亦亡故曰鳳隨其凰去下云攬物想故國傷亂後不能北歸也鳳又按楚詞注屈原楚同姓故稱王孫司馬相如有歸求凰之詠此詩悵望王孫應指屈原鳳隨凰去應指相如此説不如前舊注則云王孫指嚴武鳳去雀喧比君子亡而小人競此説太泛詩宛在水中央兮世説陶淵明有脚疾江劉安招隠士王孫游不歸春草生兮萋萋淹别賦春草碧色安得覆八溟為去聲君洗乾坤稷契音錫易音異為力犬戎何足吞儒生老無成臣子憂四藩一作四番魯直刋作憂思翻篋中有舊筆情至時復扶乂切援末歎時事而傷身老乎言安得覆八溟之水一洗乾坤汚雜朝廷茍用稷契外寇何難掃除今年老無成而猶憂及邊境唯有賦詩寄慨而已杜臆公嘗自比稷契此亦自負語此章八句兩段十二句兩段命趙岐孟子注秦滅經籍坑戮儒生宋樂歌訏謨定辰告四藩曹植詩援筆從此辭石硯原注平侍御者有黄鶴依梁氏編在雲安詩内以詩奉使三峽句也平公今詩伯秀發吾所羨奉使去聲三峽中長嘯得石硯首敘得硯之由孔蜀都賦王褒暐曄而秀發蜀志諸葛明客荆州抱膝長嘯巨璞禹鑿餘異狀君獨見其滑乃波濤其光或雷電聨坳於交切各盡墨多水遞隠見音現揮灑容數人十手可對面此記石硯之美其滑澤光潔能發墨而濡毫遜来注聨坳硯穴相並多水硯潤出水也何詩對面何由即比公頭上冠貞一作正質未為賤當公賦佳句况得終清宴公含起草姿不逺明光殿致于丹青地知汝隨顧眄從硯結到平公事以冠比硯語近率賦詩染翰是一事宴開臨書又一明光起草切侍御杜臆起草之時汝能隨人顧眄而盡所欲言汝指硯言清此章四句起下二段各八句前漢諸葛豐傳願賜宴謂清閒之時朱注三秦記未央宫漸臺西有桂宫内有明光殿皆金玉珠璣為簾箔金戺玉堦晝夜光明按黄圖漢有兩明光宫一在長樂宫後成都侯王商借以避暑之所一在甘泉宫武帝以燕趙美人充之若明光殿自在桂宫三者原不相干杜詩不逺明光殿東坡先入明光宫注家都混為一程大昌王楙皆有辯夢弼曰起草知制誥也漢官儀尚書郎主作文章起草間丹青地謂丹墀青瑣之贈鄭十八賁黄鶴編在大厯元年雲安詩内縣趙曰鄭葢雲安縣令故有異味煩尹之句温温士君子令平聲我懐抱盡靈芝冠去聲衆芳安得闕親近總領全意人温温句屬賦靈芝句屬比下二蒙上相詩温温㳟後漢李通傳光武初以通士君子慕也遭亂意不歸竄身跡非隠細人尚姑息吾子色愈謹高懐見物理識者安肯哂卑飛欲何待捷徑應去聲未忍示我百篇文詩家一標準此敘鄭才徳申明温温士君子遭亂竄身直指鄭言鄭葢避亂之蜀曾為小吏者尚姑息人見憐也色愈謹能守正也髙懐可服有識位卑不由捷徑此其德器過人處詩篇可法則才華又復出衆矣歸舊説以遭亂二句屬公自敘公身雖在蜀而心實思觀前後諸詩可見豈可云遭亂意不歸乎姑趙曰山濤吏非吏隠非隠檀弓細人之愛人也以息荀濟詩高懐不可忌孫武子鷙鳥將擊卑飛斂翼訓張衡應間捷徑邪至吾不忍以投步尚書序典謨誥之丈凢百篇孫綽丞相碑道徳之標準羇離交屈宋牢落值顔閔水陸迷畏一作長途藥餌駐修軫古人日已逺青史字不泯步趾咏唐虞追隨飯音反葵董一作謹數杯資好去聲事異味煩縣尹此記鄭交情申明安得闕親近以屈宋承詩文二句顔閔承髙懐二句公當羇離牢落得遇鄭賁為幸也身厯畏途故飲藥停車因而披史共討相隨同食或酌盃酒或嘗異味皆往來情誼之宻也後漢李固傳通游夏之藝顔閔之仁輟左思賦水陸所湊兼六合而交㑹焉駐駐修軫謂暫行踪正對上迷途説朱氏解作藥餌年者非江逌賦駐修軫於平原趾趙曰青史者殺青竹簡之史也左傳今君親步玉劉楨詩步趾慰吾身圖經本草葵處處有之苗葉作菜茹甚甘爾雅齧苦芹注今堇葵也葉似栁子如米汋食之滑唐本草堇菜野生花紫色鮑照詩蓼蟲避葵堇酒揚雄傳贊家素貧嗜酒人希至其門時有好事者載肴從游學後漢書太原閔仲叔徴博士不到客居安邑老病家貧不能得肉日買猪肝一片安邑令聞之敇吏常給仲叔曰豈可以口腹累安邑令遂去心雖在朝音潮謁力與願矛盾閏上聲抱病排金門衰容豈為敏末用自敘作結違欲抱病赴朝而衰年不敏所謂力與願也此章首尾各四句中二段各十句曰尸子楚人有鬻矛與盾者曰吾盾之堅莫能䧟也又吾矛之利於物無不䧟也或曰以子之矛䧟子之盾何如其人弗能應玉黄希曰排字本樊噲傳所謂排闥解嘲厯金門上堂鮑照詩衰容不還稚為左傳魯人以敏别蔡十四著作鶴注至徳二載公在鳳翔至大厯元年為十春詩云主人薨城府扶櫬歸咸秦主人謂郭英乂蔡至成都值郭已死遂扶櫬以歸公與蔡相逢於巴道當在雲安也著作郎官名賈生慟哭後寥落無其人安知蔡夫子高義邁等倫獻書謁皇帝志已清風塵流涕灑丹極萬乘去聲為去聲酸辛天地則瘡一作創痍朝廷多一作當正臣異才復扶又切間去聲出周道日惟新敘蔡平時忠義見獻書流涕同於賈生慟哭異才間出其髙義絶倫楚辭正臣端其操行兮使去聲蜀見知已别顔始一伸主人薨城府扶櫬歸咸秦巴道此相逢㑹我病江濱憶念鳳翔都聚散俄十春此記雲安重遇之由扶公初遇蔡於鳳翔及其使蜀再晤於成都今櫬而歸又逢於䕫江總前後計之則十春矣旰朱注舊史英乂奔簡州普州刺史韓澄斬其首送崔英乂必殯於成都此云薨城府隠之也我衰不足道去聲但願子意一作章陳稍令平聲社稷安自契魚水親我雖消渴甚敢忘帝力勤尚思未朽骨復扶又切覩耕桑民此望其入告以恤民亂朱注蔡以使事之成都值有崔旰之公欲其以兵食匱乏歸奏天子計安蜀人故有但願子意陳及𤣥甲聚不散之語蜀志先主曰孤之有孔明猶魚之有水也北魏節閔帝詩君臣體魚水書軌一華戎其莊子帝力於我何有哉吴越春秋一男不耕有受飢一女不桑有受其寒積水駕三峽浮龍倚長津一云輪囷揚舲洪濤間仗子濟物身鞍馬下去聲秦塞王城通北辰𤣥甲聚不散兵久食恐貧窮谷無粟帛使去聲者來相因若馮慿同一作逢南轅吏陳作使書札到天垠末敘送别之意蔡上六記途次下六望寄書之出峽還京先從水行其陸路則由王城而入闗也猶𤣥甲㑹討崔旰之兵使者京師索餉之官後詩兵戈擁蜀賦斂强輸秦可證䕫在長安之南故北來者為南轅尾楊徳周曰𤣥甲四句觸目傷心感悵泫然此詩首各十二句中二段各八句不宋武帝詩積水溺雲根濬造戰船時謠曰畏岸上虎只畏水中龍晉書王郭璞詩高浪駕蓬萊浮龍倚長津注楚辭注舲船有窗牖者隋牛𢎞詩揚舲泛急流逺仗子句即若濟巨川用汝作舟楫意班王城在河南甲漢書霍去病傳發屬國𤣥甲軍洙曰固燕山銘𤣥曜日注𤣥甲鐵甲也唐書崔旰反柏茂林等舉兵討之大厯元年三月山南西道節度使張獻誠與旰戰於梓州大敗漢書陳陳相因谷左傳令尹南轅返斾雅古詩遺我一書札窮天垠俱指夔州爾九天之際曰九垠寄常徵君首句言春末句言雲安知是大厯元年春雲安作其云入夏又云熱新乃當春而預道夏時也亭逺注魏漢以來起隠士謂之徵君後漢韓康傳長以韓徵君當至方修道橋鶴曰徴君去秋曾訪公雲安今在開州寄以此詩白水青山空復扶又切春徵君晩節傍去聲風塵楚妃堂上色殊衆海鶴堦前鳴向人萬事糺糾同紛猶絶粒一官羈絆實藏身開州入夏知凉冷不似雲安毒熱新此詩傷徵君之晩出上四惜詞五六解詞七八慰詞之山水空度春光以其晚節猶逐風塵也楚妃比朝貴得寵海鶴比處士之依人今事叢猶然乏食知官卑但以藏身耳不黄注藏身猶云吏隠七句見地見時世説顧景怡就徵晩節服食不與世通途澤州陳冡宰注楚妃猶言宋子齊姜燕姬越女喻仕中名位相軋炫才嫉妬者舊引樊姬以比徵君之徳非也陸機詩楚妃且勿嘆齊娥且莫謳馬元熙詩掩抑歌張女淒清奏楚妃應瑒鸚鵡賦表衆艶之殊色孤西京雜記海鶴江鷗萬湛方生弔鶴文忽聞堦前有鶴鳴莊子通其一事畢賈誼傳糺錯相紛司馬相如傳交錯糾紛時後漢書范丹為萊蕪長遁居梁沛之間所止單陋有絶粒窮居自若劉莊子知效一官羈晉載紀馬能千里不免羈絆宋書瑀曰騏驥羅於絆逺注藏身即東方朔避世金馬門意莊子夫全其形生之人藏其身也里九域志開州東至夔州雲安縣龍目驛二百九十盧世㴶曰此詩字字沈痛説者類云諷刺因錯㑹晚節傍風塵一語遂致通篇皆錯夫傍風塵猶奔走道路耳人少壯蹇躓猶冀前途至老年道路則無復之矣此最是傷心處海鶴鳴向人豈雞鶩流哉萬事糾紛猶然絶粒一官羈絆實以藏身此等艱辛向誰人道全是自苦自訴并以憐及徵君想寄詩時不知淚下㡬行矣寄岑嘉州原注州據蜀江外秋詩云泊船秋夜經春草葢公自去年至雲安大厯元年春尚在其地也漸杜確岑參集序參自庫部正郎出為嘉州杜鴻表為職方郎中兼侍御史列於幕府無㡬使罷寓居於蜀古漢武帝通西南夷立犍為郡成帝永初六年得磬改嘉定後周改為嘉州唐初嘉定郡領縣八乾元初仍為嘉州嘉州在成都東南去成都為近去夔州為逺不見故人十年餘不道去聲故人無素書願逢顔色闗塞逺豈意出守去聲江城居思遇岑於嘉州也城張衡詩長跪讀素書江指嘉州外江三峽且相接斗酒新詩終自一作日疎謝朓每篇堪諷誦馮唐已老聽吹嘘此敘岑之近况也一謝比岑馮自方邵注一統志渠由永康過新安入成都府謂之外江一渠由永康過郫縣入成都府謂之内江縣西五里自洛口分支經漢州謂之中江三江皆與嘉州岷江相接遍前漢楊惲傳斗酒自勞南史梁昭明太子讀五經通諷誦泊船秋夜經春草伏枕青楓限玉除眼前所寄選何物贈子雲安雙鯉魚此寄詩以逹情也南雙魚應素書為此章三段各四句公湖詩有青草續名輟棹青楓浦俱指地名此處只泛言如云春草萋已碧青楓逺自愁皆泛言也杜詩詳註巻十四
