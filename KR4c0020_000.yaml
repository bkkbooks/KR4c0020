body:
  text: 杜詩詳註提要臣等謹案杜詩詳註二十五巻補註二巻國朝仇兆鼇撰兆鼇字滄柱鄞縣人康熙乙丑進士官至吏部侍郎是書乃康熙三十二年兆鼇為編修時所奏進凡詩註二十三巻襍文註二巻補註二巻其總目自二十八巻以下尚有倣杜集杜諸巻皆有録無書疑欲續為而未成也毎詩各分叚落先詮釋文義於前而徴引典故列於詩末其中摭拾類書小有舛誤者如注忘機對芳草句引高士傳葉幹忘機今髙士傳無此文即太平御覧所載嵇康高士傳幾盈二巻亦無此文又注宵旰憂虞軫句不知二字本徐陵文乃引左傳注旰食引儀禮注宵衣考之鄭注宵乃同綃非宵旦之宵也至吟杜巻中載徐增一詩本出於説唐詩中所謂佛讓王維作才憐李白狂者盖以維詩雜佛趣白詩多逸氣以互形甫之謹嚴兆鼇乃改上句為賦似相如逸乖其本㫖如此之類往往有之皆不可據為典要然援據繁富而無千家諸註偽撰故實之陋習核其大局可資考證者為多如諸將詩第一首早時金盌出人間句注家引漢武故事茂陵玉盌則與金盌不符或引捜神記盧充金盌則與漢朝陵墓不相應兆鼇獨引唐至徳中戴叔倫詩有漢陵帝子黄金盌晋代仙人白玉棺句謂其事必出舊史但古籍散佚今不可見如斯之類亦往往為舊注所不及也乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:0cd799f6cd1a675b4aa84fbaf6f5f4e68c63a7c526f3e9b28ec3dc7b8d74c6ad
