body:
  text: 杜詩詳注卷十八翰林院編修仇兆鰲撰偶題鶴注當是大厯元年秋作文章千古事得失寸心知作者皆殊列名聲豈浪垂騷人嗟不見漢道盛於斯前輩飛騰入餘波綺麗為後賢兼舊制郭作制一作例韻會例古或作列歷代各清規首敘詩學源流杜臆少陵一生精力用之文章始成一部詩集此篇乃一部杜詩總序而起二句乃一部杜詩所託胎者文章千古事便須有千古識力得失寸心知則寸心具有千古此文章家祕密藏為古今立言之標凖也作者殊列名不浪垂此二句又千古文人之總括謂其所就雖不同然寸心皆有獨知者在也三百篇乃詩家鼻祖而騷體則裔孫也騷人不見則雅頌可知自蘇李輩倡為五言漢道於斯為盛此又詩之大宗也前輩如建安黃初諸公飛騰而入至六朝尚綺麗亦其餘波不可少也言兼舊制取材者廣各清規命意特新杜臆公詩嘗文章本小技於道未為尊此須識其道之所尊者安在得所尊則文垂千古失所尊則文止小技初無二義也魏文帝典論文章經國之大業不朽之盛事此即千古事也曹植曰文之佳惡我自知之此即寸心知也典論古之作者寄身於翰墨非荀子彼貴我名聲謝胡夏客曰騷人已往漢即有詩悲騷人之不見也舉詩望逺騷人歌盛漢文帝紀登我漢道楚梅福書漢之得賢於斯為張纘賦前輩宿逹辭吾令鳯凰飛騰兮書餘波入於流沙後劉楨詩綺麗不可忘奉尊徐景休參同契序立法以傳賢前漢朱博傳舊制杜預左傳序據舊例而發義令宋書謝靈運傳自靈均以來多歷年代魏志太祖曰邴原名高德大清規邈世法自儒家有心從弱嵗疲永懷江左逸多病一作謝鄴中竒騄驥皆良馬騏驎一作麒麟帶好貌車輪從已斫堂構惜一作肯仍虧漫作潛夫論虛傳幼婦碑一作詞學莫傳此歎詩杜臆舊制清規法也儒家久已有之而妙從心悟自弱嵗曽殫精於此每永懷江左之逸却負病於鄴中之竒江左諸公猶之騄驥無非良馬乃曹家父子如騏驎又帶好貌此其獨擅之竒也今自信車輪已斫而貌懶失學堂構仍虧能如曹家父子乎雖潛夫有論幼婦有詞竟莫為繼述矣此所病於鄴中竒也張逺注公祖審言以詩名家故云儒家有即所謂詩是吾家事也心從弱嵗疲公詩謂讀書破萬卷語不驚人死不休皆可證也前漢藝文志儒家者流又儒家言十八篇永弱嵗弱冠也隋孫萬夀詩弱嵗逢知已顔延之詩懷交在昔趙曰江左逸如嵇阮鮑謝之徒鄴中竒如建安七才子之類洙曰江左晉所都鄴中魏所都東漢史論律謝臯蘇而制令亟易又沈約表逺愧南董近謝遷固字騄驥句舊解作起下之詞王右仲承上文解意於病竒字皆有理會斯典論今之文人孔融陳琳王粲徐幹阮瑀應瑒劉楨七人者於學無所遺於辭無所假咸自以騁騄驥於千里仰齊足而並馳麟吕氏春秋得十良馬不如得一伯樂胡夏客云麒好貌借用徐陵貌事晉書張后傳司馬懿曰老物不足惜慮困我好貌耳苦莊子輪扁對齊桓公曰夫斫輪徐則甘而不固疾則而不入不徐不疾得之於手應之於心臣不能以喻臣之子臣之子亦不能受之於臣是以行年七十而老斫輪書若考作室既底法厥子乃弗肯堂矧肯構失後漢書王符字節信隱居著書三十餘篇以譏當時得不欲章顯其名故號曰潛夫論孫魏略邯鄲淳作曹娥碑蔡雍題其後曰黃絹幼婦外虀臼楊修讀之即解得曹操行三十里乃悟曰黃絹色絲絶字也幼婦少女妙字也好外孫女子之子好字也虀臼受辛之器辭字也言絶妙辭緣情慰一作苦漂蕩抱疾屢遷移經濟慙長䇿飛棲假一枝此下敘客夔情事慰杜臆緣情用陸機語謂作詩其也詩緣情生止自其漂蕩而抱疾纍遷又自疏漂蕩也經濟以下備述漂蕩之意左陸機文賦詩緣情而綺靡魏武詩播越西遷移思詩巢林借一枝塵沙傍去聲蜂蠆江峽繞蛟螭蕭瑟唐虞逺聨翩楚漢危聖朝音潮兼盜賊異俗更喧卑此承飛棲假一枝言漂蕩之迹蜂蠆蛟螭乃峽中景物唐虞四句傷蜀亂未平蔡趙曰治莫盛於唐虞戰莫急於楚漢故並舉言之琰胡笳疾飛千里兮吹塵沙何南都賦憚虬龍兮怖蛟螭豪四皓歌唐虞世逺吾將歸前漢書贊楚漢之際傑相王盜賊謂崔旰喧卑謂夔土厭詩序國異政家異俗舞鶴賦人寰之喧卑鬱鬱星辰劍蒼蒼雲雨池兩都開幕府萬宇字同插軍麾南海殘銅柱東風避月支此承經濟慙長䇿言漂蕩之故䇿莫施幕府四句傷四方未靖星劍雲池喻抱朱注星辰劍用張華事雲雨池用周瑜語自歎如寶劍埋獄而未出蛟龍在池而未躍殘銅柱粵寇初平避月支吐蕃西徑也都越絶書寶劍篇觀其鈲爛如列星之行萬班固有兩賦幕府注見别卷牛𢎞詩恭已臨宇沈約碑文軍麾命服之序注銅柱見十五卷域胸奴傳東湖強而月支盛溍月支即月氐西國名音書恨烏鵲號平聲怒怪熊羆稼穡分詩興去聲柴荆學土宜故山迷白閣秋水憶一作隱黃朱云當作皇陂不敢要平聲佳句愁來賦别離此客夔而念故都也柴恨烏鵲家信不來怪熊羆山居厭聞稼穡荆夔州居食白閣皇陂長安山水别杜臆漂蕩之中安得復有佳句但愁來則賦别離耳離即漂蕩意此章前二段各十句後二段各六句中四句為腰末八句為尾我西京雜記乾鵲噪而行人至魏武苦寒行熊羆對蹲書稼穡作甘其左傳無失土宜張溍曰文章祕訣詩統源流前半已道盡曰騷人曰漢道曰鄴中曰江左言詩家歷代各有體製可倣後人兼採原不冝過貶偏抑公之所見甚大所論甚正太白則云自從建安來綺麗不足珍自晉人以下未免一槩抹例矣此詩是兩段格前半論詩文以文章千古事為綱領後半敘境遇以緣情慰漂蕩為關鍵前段結云漫作潛夫論虛傳幼婦碑隱以千古事自期矣後段結云不敢要佳句愁來賦别離仍以慰漂蕩自解矣其段落之整嚴脈理之精細如此君不見簡蘇徯詩言深山窮谷當是夔州作其遇蘇蓋在大厯元年也君不見道邊廢棄池君不見前者摧折桐百年死樹中去聲琴瑟一斛舊水藏蛟龍先用比興引端生七發龍門之桐其根半死半吳均詩百年積死樹十尺挂寒藤異苑吳平在勾章門外忽生一株青桐上有歌謡之聲平惡而砍之其後樹自遷立於故根又聞歌聲曰死樹今更青平以為琴瑟事始定終周𢎞正詩舊水浸成岸吳志周瑜曰蛟龍得雲雨非池中物丈夫蓋棺事始定君今幸未成老翁何恨憔悴在山中深山窮谷不可處上聲霹靂魍魎兼一作并狂風此乃申明上意可廢池尚蓄蛟龍折桐猶作琴瑟况蘇君年力未衰豈終遁山林蓋勸之用世也此章上段四句下段五句寒古詩蓋棺事乃已靂左傳深山窮谷固隂沍鮑休清溪賦霹破石狂風驚林贈蘇四徯鶴注詩云巴蜀倦剽劫幽薊已削平當是大厯元年作剽劫指崔旰之徒是時河北巳盡平矣而張逺注時蘇欲下荆揚公贈以此時異縣昔同遊各云厭轉蓬别離已五年尚在行李中此總敘前後行蹤異行李句領下文苦劉孺聨句余歸方縣古詩為客轉蓬戎馬日衰息乘去聲輿安九重平聲有才何棲棲將老委所窮為郎未為賤其奈疾病攻此言身在行李之中蕃鶴注永泰元年郭子儀與回紇再定約吐引兵夜遁自是戎馬始息乘輿得安將公負才不用故窮困委之於命但疾病相攻恐來終難用世耳棲棲見論語子何面黧黑焉於虔切得豁心胸巴蜀倦剽劫一作掠下愚成土風幽薊已削平荒徼尚彎弓斯人脫身來豈非吾道東此言蘇在行李之中也蘇之靣悴心憂為巴蜀遭亂故耳吾道東蘇至夔州鶴注五年之間假子璋徐知道崔旰相繼為逆盜賊隨起安得不倦於剽劫真下愚之習以成風者列子靣目黧黑江淹詩冀以滌心胸鄭馬融傳鄭玄辭歸融曰生今去吾道東矣乾坤雖寬大所適裝囊空肉食哂菜色少去聲壯欺老翁况乃主客間古來逼側同此言夔峽俗澆身為行李所困與陸機詩無以肉食資取笑葵藿君今下去聲荆揚獨帆如飛鴻二州豪俠一作傑非場人馬皆自雄一請甘飢寒再請甘養蒙此言荆揚地美蘇之行李為冝者飢寒自耐則不為肉食者哂養蒙守正則不為少壯欺一請再請乃丁寧致戒之詞曰此章首段四句中段八句前後三段各六句幔楊慎帆字符咸切舟上幔也又扶泛切使風也舟則平聲使風則去聲動靜之異也孫綽子曰動不中理若帆而無柁南史因風帆上前後連煙荆州記宫庭湖廟神能使湖中分風而帆南北選詩無因下征帆徐陵詩南茨大麓北帆清湘劉剛詩回艫乘𣲖水舉帆逐分風杜詩獨帆如飛鴻及浦帆晨初發皆讀去聲歟胡夏客曰人馬自雄似有不可言者豈其往謁劉展易蒙以養正聖功也别蘇徯原注赴湖南幕年鶴注此亦大厯元作故人有遊子棄擲傍去聲天隅他日憐才命居然屈壯圖十年猶塌翼絶倒為去聲驚呼首傷蘇久淪落前他日謂往時居然謂目塌翼承屈壯圖驚呼承憐才命翰李陵詩遊子暮何之機沈佺期詩才命重當時張詩能否居然别陸集雄心摧於弱情壯圖終於衰志談陳琳檄忠義之徒垂頭塌翼世説衛玠道平子絶倒消渴今如此黃作在提攜愧老夫豈知臺閣舊先一作洗拂鳯凰雛得實俗本作食非翻蒼竹棲枝把翠梧次喜蘇逢知已而臺閣舊人必徯父交力能提攜者得實棲枝從此有所依託矣攜魏志夏侯玄傳銓衡掌於臺閣記長者與之提蜀志龎統號鳯雛不詩注鳯凰非竹實食非梧桐不棲北辰當宇宙南嶽據江湖國帶煙一作風塵色兵張虎豹符數色角切論平聲封內事揮發府中趨贈爾一作汝秦人䇿莫鞭轅下駒此勉其及時有為結出送别之意當時節鎮權重幕僚得與參謀故勸其志圖逺大而勿局於銅近小此章前二段各六句末段八句收漢書音義虎符第一至第五發兵則遣使者至郡合之冉淮南王書古者封內甸服古樂府盈盈公府步冉府中趨朝左傳秦伯使士會行繞朝贈之以䇿注䇿馬撾也繞秦大夫前漢灌夫傳上怒內史曰今日廷論局趣效轅下駒應劭曰駒者駕著轅下張晏曰駒俯頭於車轅下隨母而巳起云故人有遊子及提携愧老夫公蓋蘇徯父接也後云豈知臺閣舊先拂鳯凰雛湖南幕主亦徯父交而昔日同朝者原注云公為拾遺時徯父在臺閣此與詩意不合朱注謂唐史肅宗收京蘇源明擢考功郎中知制誥疑徯為源明之子今按源明卒於廣德二年不應喪制未終而急趨幕府知非源明子矣李潮八分小篆歌鶴注當是大厯初在夔州作潮乃公之甥詩云巴東逢李潮夔本巴東郡也時周越書苑李潮善小篆師李斯嶧山碑見稱於趙明誠金石録唐慧義寺彌勒像碑李潮八分書也潮書初不見重當時獨杜詩盛稱之今石刻在者惟此碑與彭元矅墓志其筆法亦不絶工蒼頡鳥迹既茫昧字體變化如浮雲陳倉石鼓又一作文已訛大小二篆生八分秦有李斯漢蔡雍中間作者絶不聞嶧山之碑野火焚棗木傳刻肥失真苦縣光和尚骨立猗覺察作力書一作畫貴瘦硬方通神先敘篆書源流李趙曰野火焚謂斯書尚骨立謂蔡雍書故於嶧山之碑則傷棗木失真誦於苦縣之碑則喜瘦硬通神衛恆書勢黃帝之史沮蒼頡眺彼鳥迹始作書契尤淮南子茫茫昧昧頭陀寺碑茫昧與善王羲之傳善𨽻書論者稱其筆勢以為飄若浮雲矯若驚鴻文鶴曰鳯翔府寶雞縣本陳倉縣元和郡縣志石鼓在鳯翔天興縣南二十許里石形如鼓其數有十蓋紀周宣王田獵之事即史籀大篆也衛恆書勢宣王太史籀著大篆十五篇與古文或異時人即謂之籀書李斯作蒼頡篇趙高作爰厯篇胡母敬作博學篇皆取史籀式或頗省改所謂小篆者也鍾周越書苑八分者秦羽人上谷王次仲飾𨽻書為之繇謂之章程書蔡文姬别傳云臣父雍言割程邈𨽻字八分取二分割李斯小篆二分取八分故名八分又云皆似八字勢有偃波洙曰史記始皇二十八年東行郡國上鄒嶧山刻石以頌秦德其碑為野火所焚後人惜其文以棗木傳刻之梁武帝論書古今既殊肥瘦頗反亦潘淳曰樊毅西嶽碑後漢光和二年立苦縣老子碑漢碑其字刻極徑杜詩苦縣光和謂二碑也明劉思敬臨池漫記老子苦人也今為毫州真縣縣有道宫宫有漢光和年所立碑蔡雍書馬永卿贊字畫遒徑少晉王獻之傳字勢疏瘦如隆冬之枯樹肩字書王逸云凡字多肉微骨謂之墨豬書也庾吾書品胡肥鍾瘦俊魯靈光殿賦通神之才惜哉李蔡不復扶又切一作可得吾甥李潮下去聲筆親尚書韓擇木騎去聲曹蔡有鄰開元已來數所主切八分潮也奄有二子成三人况潮小篆逼秦相去聲快劍長戟森相向八分一字直百一作千金蛟龍盤拏拿同音如又音拿肉屈與偏通強去聲宗此稱李潮書法篆李蔡為正韓蔡作陪賓小八分分雙頂李蔡四下筆親謂與李蔡相親近禮舊書肅宗紀上元元年月右散騎常侍韓擇木為部尚書宣和書譜韓擇木昌黎人工𨽻兼作八分風流間媚世於謂雍中興馬竇泉述書賦衛包蔡鄰工夫亦到出人意乃近天造書史會要有鄰雍十八代孫官至右衛率府兵曹參軍工八分書書法徑險詩奄有四方注奄遂也忽也張書法要録袁昻云韋仲將書云如龍拏虎距劍拔弩皇朝歐陽詢書森森然若武庫矛戟拏揉也一西京雜記淮南王劉安著淮南子揚子雲以為一出入字直百金公孫𢎞著公孫子言刑名事亦謂字直百金小成公綏𨽻書體或若虬龍盤遊蜿蜒軒翥非古八分篆體也前漢陸賈傳屈強於此顔注謂不柔服也庾肩吾書品蕭思話書走墨連綿字勢屈強吳郡張顛誇草書草書非古空雄壯豈如一作知吾甥不流宕丞相去聲中郎丈人行音巷流申贊其書法入古正張旭名重當世故又借以相形宕雄壯皆指草書與瘦硬相反湛方生詩流宕失真宗注漢書漢天子吾丈人行尊老之稱巴東一作江逢李潮逾月求我歌我今衰老才力薄潮乎潮乎奈汝何末結作歌之意少趙曰退之石鼓歌陵無人謫仙死才薄將奈石鼓何倣此詩末四句二句也此章前二段各十句後二段各王嗣奭曰字體變化如浮雲一語已括全篇鳥迹變而大小篆又變而八分至變而草書極矣篆與八分猶存古意若草書去古逺矣雖雄壯何取快劍長戟蛟龍屈強俱形容瘦硬而書已通神矣宜其字值百金也瘦硬之書未易形容故自恨才力之薄如此作結絶新瘦硬兼八分言韓木作八分書師蔡雍風流間媚號伯喈中興蔡有鄰亦善八分其始拙弱至天寶遂精故子美引二子比潮又送顧八分詩亦引二子云張懷瓘書斷水經注曰上郡王次仲變蒼頡舊文篇為今𨽻書既變蒼頡書即非效程邈𨽻蔡雍勸學謂次仲初變古形是也始皇之世出其數書小篆古形猶存其半八分已減小篆之半𨽻又減八分之半然可云子似父不可云父似子故知𨽻不能生八分矣八分則小篆之捷𨽻亦八分之捷本謂之楷書楷𨽻初制大範幾同故後人惑之朱注衛恆書勢詳𨽻而不言八分其實師宜官梁鵠邯鄲淳毛𢎞皆工八分者張懷瓘以程邈以後之𨽻與鍾王之今楷為一意蓋取漢碑之𨽻皆屬之於八分而專以𨽻為楷也歐陽永叔以八分為𨽻洪適因之迄無定説吾衍學古編云八分漢𨽻之未有挑法者也比秦𨽻則易識比漢𨽻則微似篆用篆筆作漢𨽻即得之今存其説待考書斷李斯小篆入神大篆入妙伯喈八分飛白入神大篆小篆𨽻書入妙太封演聞見記嶧山始皇刻石其文李斯小篆後魏武登山使人排倒之然而歷代摹拓以為楷則邑人疲於奔命聚薪其下因野火焚之由是殘闕不堪摹寫然猶求者不已有縣宰取舊文勒於石碑之上凡成數片置之縣廨須則拓取今人間有嶧山碑皆新刻之碑也歐陽公集古録今俗所謂嶧山碑秦二世詔李斯篆史記不載其字特大不類泰山存者其本出於徐鉉又有别本出於夏竦家自唐封演已謂嶧山碑非真而杜甫直謂棗木傳刻耳又曰今嶧山實無此碑鄭文寶嘗學小篆於徐鉉以鉉所摹本刻石於長安世多傳之縣後漢桓帝紀延熹八年正月遣中常侍左悺之苦祀老子續漢書桓帝夢老子令中常侍左悺於賴鄉祠之詔陳相邊韶立祠兼刻石金石録苦縣老子銘舊傳蔡雍文并書杜詩云云世云此碑是也然而邊韶延熹八年作非光和中未知杜所云是此碑否書苑遂謂韶文而雍書亦無所據杜田曰苦縣祠立於桓帝延熹而光和乃靈帝年號豈非祠立於延熹碑乃立於光和乎峽口二首單復編在大厯元年秋在此即瞿唐峽口也方輿勝覽瞿唐峽夔州東一里舊名西陵峽陸機辨亡論謹守三峽之門峽口大江間西南控百一作白蠻城欹連粉堞岸斷更青山開闢當一作多天險防隅一水關亂離聞鼓角秋氣動衰顔此章見形勝而傷世亂也三四申峽口之景五六申控蠻之勢山形斜側故城堞皆欹傍多疊嶂故岸斷見山天險如此而又設關水上真足控制全蜀矣外唐志劍南諸蠻州九十二無城邑椎髻皮服通典松諸蠻貞觀末遣兵從西洱河討之西洱河去嶲州西千五百里其地有數十百部落按此當作百蠻王洙注峽口有關斷以鐵鎖似易天險不可升也盈防隅水防山隅也杜臆水關即牢關古詩盈一水間聞鼓角時有崔旰之亂也酒隋尹式詩秋鬢含霜白衰顔倚紅時清關失險世亂戟如林去矣英雄事荒哉割據心蘆花留客晚楓樹坐猿深疲苶魚列切音孽與􅒒同煩親故諸侯數音朔賜金次章遡往事而傷羇旅也上四言形勝之盛衰皆因人事下四言客夔之景况有愧人情英雄承時清如光武昭烈之平蜀是也割據承世亂如公孫述李特之僭蜀是也孤客對猿不勝悽惻親故贈金何解窮愁耶率其旅如林公自注主人柏中丞頻分月俸去書紂魏志田豐舉杖擊地曰惜哉事矣陳子昻詩荒哉穆天子深駱賓王詩堆起蘆花晚張楓樹坐猿深坐字下得竒字下得逸然各有所本説詩樹坐參猿嘯宋之問詩猿啼江樹深一句中兩用之可稱入化歎逝賦同時親故陳平傳賜金尚在詩句中用虛字貴乎逸而有致謝朓詩去矣方滯淫懷哉罷歡宴不如老杜去矣英雄事荒哉割據心更有逺神又詩古人稱逝矣吾道卜終焉説得韻趣鮑明逺詩傷哉良永矣黃山谷詩得也自知之非不流利但不如杜之俊逸耳若東坡詩倦客再遊行老矣高僧一笑故依然方是善於摹杜南極鶴注當是大厯元年冬在夔州作中趙曰南極星名晉天文志南極在井柳之正是南方之星故用之夔州黃希曰此是用爾雅四極中之南極夔在長安之極南也南極青山衆一作外非西江白谷分古城疏落木荒戍密寒雲嵗月蛇常見風颷虎忽一作或聞近身皆鳥道殊俗自人羣睥睨登哀柝蝥一作矛趙作蝥弧照夕曛亂離多醉尉愁殺李將軍此公不欲久居南土而作也四盧注首二南方山水三四南方風景中南方人物末四南方時事舊杜臆西江至白谷而分此楚蜀之交也古城白帝城荒戍戍土之兵皆鳥道居高峽也自人羣非我族也柝弧城上戒嚴醉尉小人橫行在據公詩云白谷氣候變又云白谷會深遊則白谷當夔州杜臆謂即白帝城之谷哀朱超詩荒戌久無樓褒陶潛詩寒雲沒西山庾信江南賦風颷凜然王頌虎嘯而風生臨司馬彪續漢書种皓為益州刺史開曉殊俗古詩高臺篇辭仙俗歸人羣古今注女墻亦名睥睨靈左傳鄭伐許潁考叔取鄭伯之旗蝥弧以先登謝運詩夕曛嵐氣隂説文日入曰曛李廣傳廣屏居藍田南山中射獵嘗夜出從人飲還至渟灞陵尉醉呵止廣廣騎曰故李將軍尉曰今將軍尚不得夜行何故也宿廣亭下杜臆末用醉尉事必有所感瞿唐兩崖此詩舊編在大厯二年考二年之秋公在東屯矣還是元年冬作三峽傳何處雙崖壯此門入天猶石色穿水忽雲根猱乃高切玃厥縳切鬚髯古蛟龍窟宅尊羲和冬一作驂馭近愁畏日車翻首點兩崖中咏景物末乃歎其危險一杜臆傳何處三峽之名互異壯此門瞿唐峽不移也黃希曰公作長江云瞿唐爭一門又瞿唐懷古云勍敵兩崖開蓋瞿唐乃三峽之門又兩崖對峙中貫一江望之如門然之崖入天而青同一色崖穿水而下至雲根乃狀其勢高深黃生注惟高山水險故物得以久據深藏曰古曰尊字法俱妙光杜臆冬時日行南陸正值崖上今兩崖聳窄屏去日似乎羲和亦畏車翻而却避之者今朱注庾仲雍荆州記巴楚有明月峽廣德峽東突峽謂巫峽秭歸峽歸鄉峽峽程記三峽即明月峽巫山峽廣溪峽其瞿唐灧澦燕子屏風之類皆不與三峽之數寰宇記夔州三峽曰西峽巴峽巫峽宋肇三峽堂記又以西陵峽巫峽歸峽為三峽按三峽諸説不同疑明月峽不列三峽內蓋明月峽在夔州之上也然忠州龍興寺詩又云忠州三峽內則公於此亦無定説矣杜臆詩人多以雲根為石以雲觸石而出也宋孝武登樂山詩屯煙擾風穴積水溺雲根而蔡注爾雅猱善援玃善顧爾雅注玃貑玃也似獼猴大色蒼黑能攫搏人故云玃述異記猿五百嵗化為玃玃千嵗化為老人揚雄蜀都賦猿蠝玃猱杜臆公詩龍以瞿唐會則知其有龍蛇矣宅王勃山亭序徵石髓於蛟龍之窟江賦瑰竒之所窟淮南子日乘車駕以六龍羲和為之馭李冬馭近謂近於瞿唐非秋近於冬之謂尤歌安得壯士翻日車黃生曰首言來之逺次言勢之雄三言峽之峻四言崖之深五六喻盜賊之盤據七八言朝廷之隱憂上四貼本題下四開一步多又曰愁畏本一意特連用之以助句法唐人詩中有之杜集如人客信使眠卧車輿書疏重疊稀少涼冷曛黑暄暖晨朝徒空更復之類不可勝數瞿唐懷古顧注懷古是懷瞿唐古迹鶴曰此當是大厯元年作今按前首應是初見時故云三峽傳何處此首應是再詠者故題云瞿唐懷古西南萬壑注勍敵兩崖開地與山根裂江從月窟來削成當白帝空曲隱陽臺疏鑿功雖美陶鈞力大哉上四瞿唐之景下四懷古之意黃鑿山本以通水故山水並起山裂承崖開江來承壑注言峽之隘四言源之長五言壁之峭六言崖之深相傳皆禹功所疏鑿者其實瞿唐天險蓋出於造化神力也山附於地山裂乃地勢使然必地與山以裂而後江水得從此來黃氏説與字含下陶鈞意獨冇解會高與白帝相當空處藏隱陽臺以陽臺配白帝亦暗指神女天然對仗隘世説萬壑爭流左傳宋及楚戰子魚曰勍敵之人而不列以兩崖而關鎖萬壑真有拔地倚天之力故曰勍敵庾信詩山根一片兩長楊賦西厭月螖螖與窟同山海經泰華之山削成而四方杜臆白帝山在夔州府治東五里陽臺在府治北五里高百丈陶𢎞景隱於句容之勾曲山中周回一百五十里空曲寥曠雲鶴曰寰宇記陽臺臺高一百二十步即宋玉賦遊陽之臺郭璞江賦巴東之峽夏后疏鑿回鄒陽傳獨化於陶鈞之上師氏曰陶人轉鈞蓋取周調鈞耳此借以喻造化黃生曰此詩竒險之句亦若假鑿於五丁者兼又曰疏鑿控三巴專歸功於神禹也疏鑿功雖美歸功於造物也蓋題屬懷古不敢忘禹之迹而險山天造亦不可沒天之工結以詠歎出之倍有神致夜宿西閣曉呈元二十一曹長子丈切年顧宸注大厯元公自雲安縣至夔州秋寓於西閣終嵗居之明年春始自西閣遷居赤甲故凡西閣諸詩皆自秋及冬作也黃鶴及千家注分為兩時俱失考公昔曽與元同曹故曰曹長城暗更平聲籌急樓高雨去聲雪微稍通綃幕霽逺帶玉繩稀門鵲晨光起一作喜檣一作墻非烏宿處飛寒流江甚細有意待人歸首聨宿閣三四曉景下則對景思歸也起綃幕霽旭光初動玉繩稀疏星未沒鵲烏飛舟行之象二句賦中含興引起末聨杜臆流細則江平有若待人歸者何不與鵲俱起與烏並飛耶梁元帝詩夜短更籌急在詩雨雪霏霏以沈佺期詩千金麗人掩綃幕説文帷上曰幕朱注綃為幕也陶𢎞景水仙賦橫帶玉繩刻舊注因謝朓詩有金波麗鳷鵲句遂以門鵲為門端鵲因傅毅相風賦有棲神鳥於竿首俟祥風之來征遂云刻烏竿上名曰相風將門鵲檣鳥俱作假象今按鵲起烏飛就實景言顧注公詩檣烏相背發危檣逐夜烏皆指檣上棲烏舊乃曲説也歸去來辭恨晨光之熹微何遜詩江燕繞檣飛朱超道詩落葉泛寒流西閣口號平聲呈元二十一仍依梁氏編在大厯元年山木抱雲稠寒空一作江繞上頭雪崖才變石風幔不依樓社稷堪流涕安危在運籌看平聲君話王室感動幾銷憂上四寫西閣景下四寄元曹長流隂雲繞樹寒氣盤空故雷霑石變而風緊幔飄堪涕世亂未已在運籌謀國待人二句述元君話中之意感動銷憂喜留心王室者尚有同志也前首未及呈元意故此章特詳之係顧注謂杜鴻漸不能征討請以節制讓旰運籌無䇿蜀安危公故聞而流涕據詩云社稷王室應指朝政言所謂運籌者嘆當時不任賢相也漢唐太宗詩寒空碧霧輕薛道衡詩東方來上頭書運籌帷幄之中度幾謂幾也閣夜即西閣聞此當是大厯元年冬作也鶴注詩云戰伐時崔旰之亂未息嵗暮隂陽催短景同影天涯霜雪霽寒宵一作霄五更平聲鼓角聲悲壯三峽星河影動搖野哭千一作幾家聞戰伐夷歌幾一作數一作是處起漁樵卧龍躍馬終黃土人事音書吳作依依漫一作頗一作久寂寥此在閣夜而傷亂也上四閣夜景象下四閣夜情事鼓角夜所聞星河夜所見野哭夷歌將曉所傷感者末則援古人以自解也鼓角之聲當更盡而悲壯星河之影映峽水而動搖皆宵霽之景吳論悲壯動搖下兩字另讀漫思及千古賢愚同歸於盡則目前人事逺地音書亦付之寂寥而已故黃生注題云閣夜而詩及曉景乃知為人事音書之徹曉不寐也卧龍躍馬因夔州祠廟而及之景古詩折楊柳隂陽催我去那得有定主霜庾信詩短負餘睴古詩各在天一涯楚辭悲雪之俱下晉顔氏家訓或問一夜何故五更答曰更歷也經也鼓載記石勒耕作於野嘗聞鼓角之聲李衛公兵法三百三十三槌為一通角動吹十二聲為一疊故又曰鳴笳疊鼓史天官書注正義曰左旗九星在河鼓左右旗九星在河鼓右動搖則兵起漢書元光中天星盡搖上以問候星者對曰星搖者民勞也後征伐四夷百姓勞於兵革江總詩水上動搖明雄千家幾處言哭多而歌少記孔子惡野哭者楊太玄經交於戰伐蜀都賦陪以白狼夷歌成章明何遜詩豫念返漁樵蜀志徐庶謂先主曰諸葛孔卧龍也蜀都賦公孫躍馬而稱帝元王褒僮約文早歸黃土陌楚魏武樂府絶人事遊混吳均詩萬里音書斷辭寂寥兮收潦而水清漫徒然也杜修可曰西清詩話云作詩用事要如釋語水中著鹽飲水乃知鹽味此説詩家祕藏也如子美五更鼓角聲悲壯三峽星河影動搖人徒見陵轢造化之工不知乃用故事也禰衡傳容態有異聲莭悲壯漢武故事星辰搖動東方朔謂民勞之應則善用事者如繫風捕影豈有迹耶余氏曰百斛明珠云七言之麗者在子美此二句後寂寥無聞矣盧世㴶曰杜詩如登樓閣夜黃草白帝九日二首一題不止為一事一詩不止了一題意中言外愴然有無窮之思當與諸將古迹秋興諸章相為表裏讀者宜知其關係至重也胡應麟曰老杜七言律全篇可法者紫宸退朝九日登高送韓十四香積寺玉臺觀登樓閣夜藍田崔莊秋興八篇氣象雄蓋宇宙法律細入毫芒自是千秋鼻祖異時微之昌黎並極推尊而莫能追步宋人一槩棄置惟元虞伯生楊仲𢎞得少分至近日諸公始明此義瀼西寒望鶴注此是大厯元年冬作明年春遷居赤甲三月遷瀼西水色含羣動朝光切太虛年侵一作終頻悵望興去聲逺一蕭疏猿挂時相學鷗行音杭炯自如瞿唐春欲至定卜瀼西居此詩扼題在三四為上下關紐年侵頻望點明寒望興逺蕭疏望時所見杜臆水色朝光此蕭疏之逺而大者猿挂鷗行此蕭疏之近而小者瀼西卜居又結出望中之意又云水色含羣動即寒水光難定變語也朝光切太虛即早霞隨類影變景也皆公冥搜所得日映水靣其色閃動朝光初起切近太虛此以一俯一仰對言趙汸注時相學寫猿之戲狎炯自如寫鷗之明潔此以在山在水對言年侵照春至是傷嵗暮不是恨年衰一杜臆年侵悵望初非樂事乃因頻望而發興遂有此假光景無邊際無絓礙直神與境會意超象外矣賦陶潛詩日入羣動息後鮑照詩朝光散流霞天台太虛寥廓陸機詩望隨年侵謝靈運遊名山志觀挂猿下飲百丈相連吳均詩猿挂似懸瓜西閣曝日鶴注此大厯元年冬作凛冽郭作烮倦玄冬負暄嗜飛閣羲和流德澤顓頊愧倚薄毛髮具一作且自和一作私肌膚潛沃若太陽信深仁衰氣歘有託歌傾煩注眼容易音異收病腳此敘曝日情事首聨敘題暄可禦寒是羲和施澤而顓頊斂威矣毛髮六句皆德澤之浹身者注眼收腳坐久而起行也地傾注視恐病腳偶蹉忽而舉步容易則暖氣流暢於足矣田太玄經萬物耗於玄冬負暄背向日也列子宋國夫負日之暄之廣雅日御曰羲和玄忠經序沐浴德澤氣月今孟冬月其帝顓頊其神冥愧倚薄言寒不能侵人謂楚國語手拇毛髮沃記可以固人肌膚之會者沃若暖如湯沃詩其葉若此借用之説文日太陽之精病公客居詩卧愁腳廢流離一作劉離木杪一作梢猿翩躚山巔鶴朋舊作用非知苦聚散哀樂音洛日已作英華作亦已昨即事會賦詩人生忽如昨英華作錯古來遭喪去聲亂賢聖盡蕭索胡為將暮年憂世心力弱此觸景而有感也貌水猿山鶴閣前所見流離圓轉翩躚輕舉貌皆日中自得之態聚樂散哀此旅人之情狀人生如昨亦且隨時遣興耳末乃援古以自慰心力已弱何堪加憂乎靈此章兩假各十句謝運詩俯視喬木杪阮籍鳩賦終飄颻以流離何敬祖詩翩躚御飛鶴古詩賢聖莫能度暮何遜詩蕭索高秋不離西閣二首此亦大厯元年冬作閣杜臆題曰不離有厭居西意江柳非時發江花冷色頻地偏應平聲有瘴臘近已含春失學從愚子無家任一作住老身不知西閣意肯别定留一作何人首章對景感懷向西閣作問詞閣非時先發當冷頻開此見地暖含春也失學中之事無家居閣之故末乃久客無聊之語注趙注言西閣之意肯令我别乎抑亦定留人也顧公詩用定字有兩義定卜瀼西居是決詞肯别定留人是疑詞杭州定越州亦然陶詩心逺地自偏西閣從人别人今亦故亭江雲飄素綀一作葉石壁斷一作斬空青滄海先迎日銀河倒列星平生耽勝事吁駭始初經次章代西閣作答詞仍取其佳勝也亭西閣何心亦任人别去只人不能離直視為故耳江雲飄而白如素綀石壁斷而空處皆青此閣上近景曉登樓而海日先迎夜臨窗而星河倒列此閣上逺景似此勝事平昔所耽今目擊初經能無吁歎而驚駭乎西閣之亦中亦差堪自遣矣杜臆亭以行旅停宿得名故西閣可稱亭復古編解作故停言人自停留耳以停亭本通用也沈約恩幸傳論素綀丹魄至庾信詩空青為一林日十洲記滄海島在北海上水皆蒼色帝史記黃帝迎推䇿楚辭並光明於列宿梁武論書此直一藝之工非吾所謂勝事縛雞行鶴注當時大厯元年冬西閣所作故云注目寒江倚山閣小奴縛雞向市賣雞被縛急相喧爭家中厭雞食蟲蟻不知雞賣還遭烹蟲雞於人何厚薄吾叱奴人解其縛雞蟲得失無了時注目寒江倚山閣首二敘題三四縛雞之故惡之也五六釋雞之縛憫之也未以設難作結愛物而幾於齊物矣杜臆雞蟲不能兩全故云得失無了時計無所出帷有望江倚閣而已寫出一時情事如畫物鮑照詩飛走樹問啄蟲蟻黃生注得失指用心於言陶𢎞景論書啓非但字字注目師厚云天下利害當權輕重除寇則勞民愛民則養寇與其養寇孰若勞民與其惜蟲孰若存雞此論聖人不易天下亦無難處之事始知浮屠法不可治世趙次公曰黃魯直逹此詩之旨其書酺池寺壽堂云小黠大癡螳螂捕蟬有餘不足夔憐蚿退食歸來北窗夢一江風月趂漁船可與言詩者當自解也洪邁曰縛雞行自是一假好議論至結語之妙尤非思議所及李德逺賦東西船行全擬其意東船得風帆席高千里瞬息輕鴻毛西船見笑苦遲鈍流汗撑折百張篙明日風翻波浪異西笑東船却如此東西相笑無已時我但行藏任天理此詩語意極工幾於得奪胎法但行藏任天理與注目寒江不可同日語耳蠖張逺曰此詩可以齊物化大有蟻何親魚鱉何讐之意小至鶴注詩云舒柳放梅當是大厯元年作是年冬暖故云唐會要開元八年中書門下奏開元新格冬至日祀圜丘遂用小至日視朝杜相傳小至為冬至前一日據會要小至是第二日臆若以小至為冬至前一日則詩不當云添線動灰亦矣薛夢符謂陽大隂小冬至隂極故曰小至此説非冬至一陽初生不當取隂小之義天時人事日相催冬至陽生春又來刺七迹切繡五紋一作文添弱線吹葭六琯動飛一作浮灰岸容待臘將舒柳山意衝寒欲放一作破梅雲物不殊鄉國異教貌且覆音福掌中杯上六冬至景事下則對酒思鄉也相一年各有時候事到冬至春來而嵗功將盡故云催線揆景灰氣此承冬至柳將舒梅欲放此承春來或以三四貼人事五六貼天時似是而非首句天時人事原從已往説到現在且三四亦正言天時不得分屬也杜朱瀚曰將舒承容欲放承意用字精貼如此晉書預傳天時人事不得如常紋史記刺繡紋不如倚市門黃希曰線有五色故云五唐雜録唐宮中之女工揆日之長短冬至後日晷漸長比常日增一線之功為漢書以葭莩灰實律管候至則灰飛管通冬至之律黃鍾也葭蘆也琯以玉為之凡十有二六琯舉律以該吕也後漢律厯志候氣之法為室三重布緹縵木為案內庳外高加律其上以葭莩灰抑其內端按律候之氣至者灰去感楊慎曰左傳分至啓閉必書雲物舊注引此考春秋精符冬至有雲迎送日者來嵗美宋忠注雲迎日出雲送日沒也冬至用書雲當指此吳越春秋越王曰風景不殊舉目有山川之異左覆杯有二義鄧粲晉書晉元帝好酒王導深諫帝令右進觴飲而覆之自是遂不復飲此覆杯是不飲也鮑照三日詩臨流競覆杯此覆杯是快飲也公墜馬詩云喧呼且覆杯中緑知此詩乃盡飲之義寄柏學士林居黃鶴謂是大厯元年夔州作蓋先寄詩而後往題其茅屋也自胡之反持干戈天下學士亦奔波嘆彼幽棲載一作精典籍蕭然暴音薄露依山阿青山萬重平聲一作里靜散地白雨一洗空垂蘿亂代一作世飄零豫一作余到此古人成敗子如何敘學士林居有感於世事耳干戈謂祿山之叛既靜處散地則空對藤蘿二句申依山阿博觀古來成敗今日當如之何此句申上載典籍幽庾信碑文豫州拓境兩鎮奔波謝靈運詩資此永棲荀悅漢紀序典籍之淵林爻漢書衣冠暴露地楚辭若有人兮山之阿王弼易通變例投戈散沈約詩援木闕垂蘿古後漢崔琦傳梁冀行多不軌數引今成敗以戒之荆揚冬春一作春冬異風土巫峽日夜多雲一作風雨赤葉楓林百舌一作鳥鳴黃花一作泥野岸天雞舞盜賊縱平聲橫甚密邇形神寂寞甘辛苦幾時高議排金門各使蒼生有環堵記林居之景并望其濟時雲兩三句正言風土之異吳論百舌春鳥而啼於楓林見其非時天雞水禽而舞於花岸見其多雨盜賊指崔旰之亂辛苦謂避地巖居末以經國安民期之學士蓋濟世須用讀書人也此章兩段各八句風土記荆揚之間春寒而冬暖吳邁逺詩荆揚春早和幽冀猶霜雪月令仲夏之月反舌無聲反舌即百舌何遜詩野岸平沙合闥謝靈運詩天雞弄和風堵魯褒錢神論丈排金門入紫記環堵之室五坂曰環堵止方一王嗣奭曰此詩兩韻乃一問一答體上下兩段分列甚明按末段推開作結仍綰林居與茅屋秋風歌同格折檻行黃鶴編在荆南詩內蓋誤認白馬將軍為崔旰也按朱注指為魚朝恩當是大厯元年所作以漢朱雲傳雲請賜尚方斬馬劍斷佞臣一人頭厲其餘上問誰也對曰安昌侯張禹帝大怒命御史將雲下雲攀殿檻檻折嗚呼房魏不復扶又切見秦王學士時難羡青襟胄子困泥塗白馬將軍若雷電千載上聲少似朱雲人至今折檻空嶙峋婁公不語宋公語尚憶先皇容直臣此詩有感時事而作上四嘆中官之恣橫下慨當時無救正者首憶太宗末憶明皇乃傷今而思古也唐書武德四年太宗為天䇿上將軍寇亂稍平乃作文學館收聘賢才司勳郎中杜如晦考功郎中房玄齡等並以本官為學七凡分三番遞宿閣下悉給珍膳命閻立本圖像褚遂良為之贊題名字爵里號十八學士在選中者天下所向慕謂之登瀛洲建朱注史房玄齡本名喬故秦府學士魏徵佐隱太子成不在十八人之列吳若注以並舉房魏為疑夢弼云此嘆房魏之直諫不可得因泛思秦王時之十八學士也秦王學士本不蒙房魏言之然考翰林故事貞觀中祕書監虞世南等十八人為十八學士秦府學士遇缺即補意貞觀猶沿其制徵以貞觀二年為祕書監安知不嘗與十八人之數乎此詩稱秦王學士者猶秦王破陳曲後遂以名樂耳詩青青子襟注青襟青領也學士所服尚尚書注胄子長子也謂卿大夫之子弟鶴曰時方武故困泥塗魏志龎德與關公交戰射公中額德常乘白馬公軍謂為白馬將軍憚之白馬將軍當指魚朝恩時朝恩為左監門衛大將軍兼神䇿軍使也若雷電言勢焰驚人無魏都賦陛楯嶙峋注嶙峋高貌容齋三筆婁公既語何得稱直臣錢伸仲云朝有闕政婁公或不語則宋公語之但師德乃武后時人璟為相時其亡久矣詩言先皇謂明皇也因朱雲傳後當治殿檻上曰勿易而歸之以旌直臣覽柏中丞一作允兼子姪數人除官制詞因述父子兄弟四美載歌絲綸柏中丞除官之命在大厯元年八月其在任當在冬間詩蓋此時作也父博議題云柏中丞兼子姪數人除官制詞因述子兄弟四美詩云戮力自元昆又云子弟先卒伍必茂林起兵時闔門赴義子弟俱在戎行而其人不可考矣公有蜀州柏二别駕將中丞命詩柏二當即四美之一并劉琨詩四美不臻王勃滕王閣序四美具二難書乃賡載歌注賡續也載成也紛然喪去聲亂際見此忠孝門蜀中冦亦甚柏氏功彌存首段總提見柏氏有靖亂之功晉書卞壼傳忠孝之道萃於一門深誠補王室戮力自元昆三止錦江沸獨清玉壘昏高名入竹帛新渥照乾坤此敘中丞戰功共錦江玉壘皆指崔旰之亂爾世説王導謂周顗曰當戮力王室剋復神京雅先生為昆長謂之元昆釋名非長兄不得呼元昆指朱注三止錦江沸乃柏中丞與崔旰相攻時事黃鶴討平假子璋徐知道乃崔旰非也子璋反東川與成都無涉次公謂寶應元年徐知道反永泰元年崔旰反大厯三年楊子琳以瀘州反考子琳入成都公去夔州已久柏中丞亦不聞後復遷蜀安可妄為之説哉寇亂如湯之沸趙曰傅謂以湯止沸北博議唐志玉壘山在彭州九域志云在茂州彭州西至茂州止八十里是時杜鴻漸以茂州授旰故曰玉壘昏鄧禹曰垂功名於竹帛子弟先義從去聲讀從平聲卒伍芝蘭疊一作壘璵璠同心注師律灑血在戎軒絲綸實具載紱冕已殊恩次及子弟戰功將絲綸謂制詞紱冕謂除官世説王大軍語右軍汝是我佳子弟庭齊國語君若正卒伍蘭世説芝蘭玉樹欲其生於階此言子弟多材如芝之疊於璵璠也任昉箋推此魚目唐宇璵璠吳均詩袖間血灑地易二人同心羣又師出以律漢書贊有來彥捷我戎軒記王言如絲其出如綸王言如綸其出如綍豈西都賦紱冕所興冠蓋如雲陶𢎞景書若非殊恩可觖望奉公舉骨肉誅叛經寒溫一作暄金甲雪猶凍朱旗塵不翻每聞戰場説歘激懦氣奔此又追憶戰功始末見其一門忠勇奉公指中丞骨肉指子弟厯卲注崔旰反在永泰元年十月柏氏起兵討旰至大元年三月方休兵故云誅叛經寒溫張湯傳趙禹志在奉公孤立骨世説荀爽曰祁奚內舉不失其子劉向封事重以肉之親新語調寒溫適輕重天蔡琰詩金甲曜日光緋陸倕石闕銘朱旗萬里鶴注寶中諸衛隊仗所用色旗幡並改為赤故諸節度亦準此場塵不翻旗霑雨雪也立蘇武詩行役在戰激懦猶言懦夫有志聖主國多盜賢臣官則尊方當節鉞用必絶䘲沴一作戾根吾病日回首雲臺誰再論平聲作歌挹盛事推轂期孤鶱一作鶱非末以期望之意作結今賢臣官尊柏本中丞也若授以節鎮可絶崔旰禍根但為都督則雲臺之功又誰論乎然既有四美盛事將來推轂專閫終當屬之中丞耳既博議杜鴻漸初議授茂林卭南崔旰劍南以兩解之而旰專制西川漸不相容故徒茂林於夔州蓋以避旰之逼然自節度除都督為失職故詩云方當節鉞用又觀宴詩云幾時來翠節蓋惜之也得此章四句起八句收中三段各六句王褒有聖主賢臣頌節鉞授之旌節鈇鉞也晉書漢魏故事遣將出征符節郎授節鉞於明堂西京雜記隂陽相蕩而為䘲沴之妖漢顯宗圖畫二十八將於雲臺望詩是用作歌也推轂舊注引鄭當時推轂天下士似鴻漸之特薦朱注引馮唐傳王者遣將跪而推轂對上節鉞而言其説較勝王道俊博議曰年譜公至夔州時柏中丞為夔州都督公為作謝上表今考柏都督乃柏茂林中丞其兼官也黃鶴注以柏都督是貞節中丞則茂林又以茂林與貞節為兄弟俱大謬舊書於杜鴻漸傳則云崔旰殺英乂據成都自稱留後卭州衙將柏貞節瀘州衙將楊子琳劍州衙將李昌􅀈等興兵討之于崔寧傳又云旰率兵攻成都英乂出兵於城西門令柏茂林為前軍郭英幹為左軍郭嘉琳為後軍與旰戰茂林等軍屢敗旰令降將統兵與英乂轉戰大敗之一則記貞節興兵而不及茂林一則記茂林喪軍而不及貞節新書崔寧傳則兼録二傳之文上書柏茂林等戰敗下書卭州柏貞節討寧鴻漸表為卭州刺史於杜鴻漸傳則止書貞節今以本紀考之則授卭州刺史卭南防禦及節度皆茂琳一人之事蓋茂琳以衙將為英乂前軍敗於城西復卭州興兵討寧耳疑貞節乃茂琳之字或後改名非二人也覽鏡呈柏中丞鶴注柏中丞大厯元年為夔州都督公以是年至夔嘗為柏作謝上表謝靈運詩覽鏡睨頺容渭水流關內終南在日邊膽銷豺虎窟淚入犬羊天起晚堪從事行遲更學一作覺仙鏡中衰謝色萬一故人憐上四回憶長安歎亂不可歸下則自傷衰老而有望於中丞也膽銷淚入起晚行遲皆衰謝之狀從覽鏡而思及之吐豺虎犬羊京師為盜侵蕃陷也或指蜀中叛將松州蕃於上二句不接趙注凡仕者必早起起晚矣尚堪從事乎仙者必輕步行遲矣更可學仙乎杜臆公與中丞素厚故末二自陳苦衷非乞憐語水西都賦帶以洪河涇渭之川表以泰華終南之山渭在長安北五十里南山在長安南五十里史記高帝紀興關內卒乘塞日世説晉明帝數嵗答元帝曰不聞人從日邊來趙曰邊帝京也漢書張耳陳餘述曰據國爭權還為豺虎呼晉史論犬羊之侣交書卧喜晚起而當關之不置一不堪也嵇康絶詩黽勉從事之神仙傳薊子訓行若遲徐走馬不及萬抱朴子學仙人未必有經國之才曹冏六代論一之慮也陶詩萬一不合意永為世笑之陪柏中丞觀宴將去聲士二首年次同上極樂音洛三軍士誰知百戰場無私齊綺饌久坐密金章醉客霑鸚鵡佳人指鳯凰幾時來翠節特地引紅粧首章記會宴之盛是堂上事情起言宴為賞功倒敘有力饌齊見席無厚薄坐密見之欵洽拈鸚鵡舉杯也指鳯凰彈琴也中丞未拜節度故云來翠節唐人多用官妓故得引紅粧西都賦俯仰極樂又觀三軍之殺獲內許敬宗詩長驅七萃卒成功百戰場上漢韓演在河志在無私綺饌即綺筵以錦蒙其也何遜輕薄篇象床沓繡被玉盤傳綺食衡鮑照詩左右佩金章金章金印也舊注鸚鵡引禰作賦事鳯凰引弄玉吹簫事皆未當朱注又以鳯凰為當時章服引代宗詔文禁盤龍對鳯為證亦太曲嶺表録異鸚鵡螺旋尖處屈而朱如鸚鵡嘴故以名殼裝為酒杯竒而可玩梁簡文答張纘書車渠屢酌鸚鵡驟傾薛道衡詩共酌瓊酥酒同傾鸚鵡杯西張衡歸田賦彈五絃之妙指陸機詩泠泠纎指彈京雜記趙后有寶琴曰鳯凰皆以金王隱起為龍鳯螭鸞之象又云成帝時慶安世為侍郎善鼓琴能為雙鳯離鸞之曲趙后悅之虞世南詩香銷翠羽帳絃斷鳯凰琴何翠節符節所以傳信者以旄牛尾為之遜詩輕扇掩紅粧繡段裝簷額金花帖鼓腰一夫先舞劍百戲後歌樵一作鐎江樹城孤逺雲臺使去聲寂寥漢朝音潮頻選將去聲應拜霍嫖姚次章言堂下事復稱美中丞使繡假金花器物之華舞劍歌樵聲樂之盛江城寂慨其目前將拜嫖姚望其將來銖裝簷額即今人宴會結綵於簷之類江淹麗色賦金花於珠履古辭鼓腰鈴椑各相競庾信詩花釘鼓床樂陳琳與魏文帝書一夫揮戟項羽紀軍中無以為請以舞劍古詩百戲起魚龍樵趙曰歌樵戲作夔峽樵歌公詩云夷歌負樵客杜臆歌乃夔俗歌名如巴渝歌之類别作歌鐎謂軍中擊刁斗以歌未然姚雲臺使䇿功之使臣也漢霍去病為嫖校尉後拜驃騎大將軍奉送蜀州柏二别駕將中丞命赴江陵起居衛尚書太夫人因示從去聲弟行軍司馬位黃蔡俱以中丞為柏貞節王道俊謂兩名止是一人别駕中丞之弟曰柏與衛必中表之親故使弟起居其母黃生舊唐書代宗紀大厯元年五月加荆南節度使衛伯玉檢校工部尚書時位在江陵為行軍司馬中丞問俗畫熊頻愛弟傳書綵鷁新遷轉五州防禦使去聲起居八座太夫人楚宫臘送荆門水白帝雲偷碧海春與報一作報與惠連詩一作書不惜知吾班鬢總如銀上四柏二將中丞往候衛太夫人下四公送柏赴江陵囑其寄詩從弟中丞頻問民俗故須弟代行三四主賓流對五六時地兼舉先送行在臘而云春者所謂臘近已含春也東方春氣行故又言雲碧海春王維楨曰末言鬢今盡白本以苦吟之故不能别寄一詩非惜詩也時解謂望弟寄詩以慰哀白恐非記入國而問俗後漢輿服志三公列侯車倚鹿較伏熊軾黑幡顔師古曰倚鹿較者畫立鹿於車之前兩轓外也伏熊軾者車前橫軾為伏熊之形也愛顔氏家訓人之事兄不可同於事父何為愛弟不及子乎劉孝綽詩釣舟畫彩鷁張性注彩鷁船首畫鷁以壓水神置論衡遷轉之人或至公卿唐書方鎮表廣德二年夔忠涪防禦使治夔州原領夔峽忠歸萬五州𨽻荆南節度分中丞為夔州都督時自都督遷防禦初學記光武尚書為六曹并一令一僕射謂之八座魏有五曹與二僕射一令謂之八座隋以六尚書左右僕射合為八座唐同後漢岑彭傳大長秋以朔望問太夫人起居族沈佺期詩梅花未發已偷春宋書謝惠連能屬文兄靈運嘉賞之云每對惠連輒得佳句晉武歌質如輕雲色如銀毛竒齡曰柏二為蜀州别駕是中丞屬官杜位為江陵司馬是衛尚書屬官中丞遣弟候衛太夫人而少陵送之因并寄弟位此唐人長題用八句完點之法黃生曰首聨用字平鈍次聨對語朴拙經五六渲染方見清新警拔而一結造句又自曲折可思後半得詩家回互周旋法張南士改偷為輸與送同意不如從偷字禦胡應麟曰嘉隆學杜善矣而猶未盡遷轉五州防使起居八座太夫人本常語而一時模尚遂令大夫使者填塞奚囊太尉中丞類被差遣至不佞扶風漢大藩之類亦後學之前車也送鮮于萬州遷巴州此是夔州作年次難考今附在大厯元年之後二年之前曰顔真卿鮮于仲通碑仲通子六人皆有令聞叔萬州刺史炅雅有父風頗精吏道作牧萬州政績尤異有詔遷祕書監尋又改牧巴州又九域志萬州至逹州二百七十里逹州至巴州二百二十里京兆先時傑琳琅照一門朝音潮廷偏注意一作璽接近與名藩祖帳排一作雜陳作維舟數間氏音促寒江觸石喧看平聲君妙為政他日有殊恩上四鮮于遷巴下則餞别而祝之也唐書李叔明本姓鮮于氏與兄仲通俱尹京兆兼秩御史大夫並節制劍南又與子升俱兼大夫蜀人推為盛門盧東美鮮于氏冠冕頌序仲通天寶末為京兆尹弟叔明乾元中亦為之炅兄昱為工部侍郎炅子映為屯田郎兼侍御史三世冠冕為海內望族一觸目見琳琅出世説詳見二卷傳後漢孔融傳豈有門忠孝而祿賞不及乎陸賈天下安注意相天下危注意將萬遷巴故云接近向秀思舊賦序居止接近趙曰自漢書二疏歸時設祖道供帳於東門外賦數密也雲蜀都觸石吐奉送十七舅下去聲邵桂此亦大厯間夔州作南唐書邵州邵陽郡屬山西道府一統志邵州屬寶慶桂州屬衡州府絶域三冬暮浮生一病身感深辭舅氏别後見何人縹眇蒼梧帝推遷孟母鄰昏昏阻雲水側望苦傷神上四旅中送别之情下四别後相思之意詩絶域病軀何堪離别感深二字上下俱關薛道衡絶漠三秋暮窮隂萬里生人鶴注九域志蒼梧山在道州與邵為鄰徙湛方生詩運互推遷潘嶽間居賦孟母所以三注軻少居近墓乃戲為墓軻母曰此非所以居去居市傍軻又戲為商賈移居學宫之傍遂為大儒朱注時舅氏必奉母同往故有孟母句望蜀都賦望之天迥即之雲昏張衡四愁詩側身東涕沾翰别賦造分手而銜涕感寂寞而傷神荆南兵馬使去聲太常卿趙公大食刀歌夔州𨽻荆南節度趙太常刮冦至此當在永泰元年崔旰反時公遇趙於夔州必在大厯元年之冬公以是秋始至夔也是時崔旰雖平杜鴻漸尚在蜀中荆南之兵亦應未歸也唐志天下兵馬元帥下有前軍中軍後軍兵馬使斯太常卿趙之兼官俗舊唐書大食本在波之西兵刀徑利其勇於戰鬬太常樓船聲嗷嘈問兵刮冦趨一作超下牢牧出令奔飛百艘音騷猛蛟突獸紛騰逃首敘趙公至夔之故蛟牧出令奔謂官吏候迎猛突獸比盜賊却走詩漢武鑿昆明池始製樓船上建樓櫓有仙人馬明生嗷嘈天地間囂聲安得附夷陵縣下牢鎮與江陵相近白帝寒城駐錦袍玄冬示我胡國刀壯士短衣頭虎毛憑軒拔鞘所交切天為高翻風轉日木一作水怒號平聲冰翼雪一作雲淡俗作淡傷哀猱鐫音煎錯碧罌鸊音匹鵜音題膏鋩鍔一作銛鋒已瑩虛秋濤鬼物撇匹蔑切捩練結切辭一作亂坑壕蒼水使去聲者捫赤絛他刀切一作縧龍伯國人罷釣鼇此極狀胡刀之瑩利閃壯士舞刀之人頭虎毛首蒙虎皮也天為高刀光上也翻風二句言其勢激動而有聲其色慘淡而增悲磨以碧罌塗以鸊膏故鋒鋩如秋濤之澄徹亂走坑壕避其鋒刃也捫住赤絛遜其銛利也停罷釣鼇驚其光氣也此皆假設形容之語蛇莊子説劍篇垂曼胡之纓短後之衣西京雜記斬劍開匣拔鞘輒有光氣如朱注酉陽雜俎王天運征勃律還忽驚風四起雪花翼冰翼恐亦此義言劍器飄忽如冰翼而雪淡翼即飛意按李竒長門賦注淡猶動也見鐫錯鐫刻磨錯也罌長徑瓶以盛膏者鸊鵜膏注三卷時西京雜記高帝斬蛇劍十二年一磨瑩叱搜神記秦有人夜渡河見一人丈餘手橫刀而立之乃曰吾蒼水使者也步赤絛刀頭飾所列子龍伯之國有大人舉足不盈數而暨五州之一釣而連六鼇博物志河玉版云龍伯國人長三十丈生萬八千嵗而死芮郝敬作衛公回首顔色勞分閫一作壺救世用賢豪趙公玉立高歌起攬環結佩相終始萬嵗持之護天子得君亂絲與君理蜀江如線針如一作如針水荆岑彈去聲丸心未已賊臣惡子休干紀魑魅魍魎徒為耳妖腰亂領敢欣喜用之不高亦不庳不似長劍須天倚言趙公能用刀戡亂顧杜臆芮公二句是篇中過脈身在荆南而回蜀亂故獨用趙公之賢區朱注趙承主帥之命偑服此刀安王室而除亂萌區荆蜀無足難者彼干犯之臣用此以誅斬其腰領高下不差豈似倚天長劍徒為夸大之詞哉寬舊注芮公荆南節度使也朱注唐惟豆盧欽望豆盧封芮公而不在大厯間舊書衛伯玉傳廣德元年拜江陵尹充荆南節度觀察等使大厯初丁母憂朝廷以王昻代之伯玉諷將吏留已遂起復再為節度至大厯十一年入覲卒則是時節度荆南者乃伯玉也伯玉以大厯二年六月封陽城郡王或由芮公進封陽城亦未可知史失之不詳耳杜臆芮公當作衛公桓溫表抗節玉立誓不降辱之攬環攬刀環而結佩之為萬嵗對天子而言乃久長意謝承後漢書方儲郎中章帝以繁亂絲付儲使理儲拔刀三斷之曰反經任勢臨事宜然北齊書神武使諸子理亂絲文宣抽刀斬之曰亂者必斬魏志孤蜀如線北登樓賦蔽荆山之高岑注漢書臨沮縣荆山在其東虞卿傳此彈丸之地庾信哀江南賦地猶黑子域惟彈丸輕後漢書光武與公孫述書君非吾賊臣亂子又漢書薄少年惡子左傳臧孫紇干國之紀陸機誄誅鋤干紀魎左傳魑魅魍魎莫能逢之注魍山神獸形魅怪物魍水神也魏國䇿蘇代説秦王曰恐其不忠於下吏自使有要領之罪杜臆妖腰承魑魅亂領承賊臣樂記欣喜歡愛射雉賦揆懸刀聘絶技如輕如軒不高不埤注埤短也古與庳通用漢書劉向傳增埤為高埤作卑字用後漢律厯志內庳外髙庳作卑字用此詩宜讀上聲以押韻宋玉大言賦彎弓挂扶桑長劍耿耿倚天外吁嗟光祿英雄弭大食寶刀聊可比丹青宛轉麒麟裏光芒六合無泥滓以期望趙卿作結麒趙公將才足弭羣雄之亂如寶刀之銛利麟承趙光芒承刀此章首尾各四句次段十一句下段十三句王嗣奭曰此燕歌行變體布局既新鍊詞特異所謂驚人之作也郝敬曰竒竒怪怪如礓石古松從樂府鐃歌等曲化出然溫柔敦厚之意和平淡雅之音斬然盡矣故詩至子美而大成亦自子美而大變不可不知王兵馬使去聲二角鷹趙卿刮冦至夔承芮公之命而來此詩亦言荆南芮公得將軍王蓋同時討亂而至者悲臺蕭瑟一作颯石巃嵸哀壑杈丫浩呼荆作汚洶中有萬里之長江回風滔一作陷日孤光動首敘臺前景象為角鷹作勢杜臆悲臺哀壑言山溪險峭夾長江南北時王兵馬蓋駐軍於此也氣黃生注起見江山黯淡日色慘悽皆若助其肅殺之詩大呼洶湧樹夾泉聲孤光浮動日映江波也登曹植高臺多悲風西征賦巃嵸逼迫何遜詩俱巃嵸嶺里權岐枝木丫秃枝木任晉紀孫綽曰實賴萬長江畫而守之耳昉詩孤光巖下映角鷹倒翻壯士臂將軍玉帳軒翠一云昻一云勇氣二鷹猛腦絛徐墜荆作絛徐墜一作徐絛墜目如愁胡視天地杉雞竹不自惜溪一作孩當作駭虎野羊俱辟音僻易鞲上鋒稜十二翮將軍勇鋭與之敵此賦角鷹形起王兵馬之上四初放之狀下四欲攫之勢軒然翠氣鷹毛色絛徐墜將舉也視天地將飛也杉雞二句言能搏擊烏獸十二翮左右徑羽各六也甘泉賦揚翠氣之宛延潘尼苦雨賦始豪瀎而徐墜悲黃生注王延夀魯靈光殿賦胡人遙集於上楹狀若愁於危處此孫楚魏彥深鷹賦用愁胡字所本下臨海異物志杉雞頭有長黃毛冠頰正青嘗在杉樹竹小如野食竹葉廬山記逺公送客未嘗過虎溪過則虎輒鳴此用溪虎足配野羊别作孩虎恐是駭虎之訛吳越春秋兩目忽張聲如駭虎上林賦手熊羆足壄羊顔注野羊今之山羊也羽紀人馬辟易師古注謂開張而易其本處史記項鮑照詩昔如鞲上鷹徑傅玄鷹賦左目若側右視如傾翮二六機連體輕將軍樹勳起安西崑崙虞泉入馬蹄白羽曽音層肉三狻先丸喑切酸又音俊猊五兮切敢決豈不與之齊荆南芮公得將軍亦如角鷹下去聲一作入朔一作翔雲惡鳥飛飛啄金屋安得爾輩開其羣驅出六合梟鸞分此稱王兵馬仍映帶角鷹臆上四言氣之勇鋭下五言力能平亂杜鷹翻壯士臂人肉三狻猊皆竒語相匹與敵與齊上下遙應將黃生曰末假歸重主人乃杜詩作法又及主人之主更為周到毋吳論吐蕃侵京猶梟啄金屋將軍能用羣力以驅除使其混雜區宇也此雙綰作結此章首假四句次假八句下假九句淵崑崙虞淵乃西極之地弱淮南子日入於虞淵唐諱故云泉上林賦彎蕃滿白羽注羽箭即爾雅狻猊如虦貓食虎豹注云即獅子也肉狻猊蓋肉食之意漢武故事當以金屋貯之莊子六合之外存而不論辨命論梟鸞不接翼王嗣奭曰此詩突然從空而下如轟雷閃電風雨驟至令人駭愕又云公時在夔因角鷹觸目發興竒崛森聳不待言矣尤得力在角鷹翻倒句隨插入將軍勇氣有此二句方承接得住通篇將王兵馬配角鷹穿插巧妙忽出忽入莫知端倪而各極形容充之直欲為朝廷討亂誅讒而後已他人起得雄偉後多不稱此詩到底無一字懶散豈不雄視千古見王監兵馬使去聲説近山有白黑二鷹羅者久取竟未能得王以為毛骨有異他鷹恐臘後春生鶱飛避暖徑翮思秋之甚眇不可見請余賦詩二首黃鶴曰唐史大厯初衛伯王丁母憂朝廷以王昻代其任伯潛諷將吏不受詔遂起復再任王兵馬得非王昻乎雪一作雲飛玉立盡清秋不惜竒毛恣逺遊在野只教平聲心力一作膽破于一作干一作千人何事網羅求一生自獵知無敵百中去聲爭能恥下去聲鞲鵬礙九天須却避免藏一作經一作營三窟一作穴莫深憂首章咏白鷹上四錯綜敘題下寫其英決機警雪玉比鷹色之白竒毛指毛骨之異清秋逺遊所謂徑翮思秋也心力雖破而網羅難求所謂羅取未得也知無敵自信其能恥下鞲不受人役鵬須避欲擊其大莫憂不屑於細也綖盧德水云一生二句可以想鷹之有品而不茍張注漢張綱謂豺狼當道安問狐狸末聨意正如此九朱注太白樂府神鷹夢澤不顧鴟鳶為君一擊鵬搏天義與此同柱酉陽雜俎漢北鷹白者身長且大五斤有餘細班短鷹內之最向代州中山飛又有房山白漁陽自東道自取鷹法七月二十日為上時內地者多塞外殊少八月上句為次時八月下旬為下時塞外鷹畢至矣破齊高洋天保二年獲白鷹一聨毛羽如雪詩心力指虞人戰國䇿文子曰破心而歸阮嗣宗羅網孰能制獨陶潛詩一生能復幾逺庾信詩野鷹能自獵江鷗解魚陳琳書氣高志似若無敵國䇿養由基去柳葉百步而射之百發百中良書唯汝不爭能東觀漢記太守桓虞曰善吏如使鷹下鞲命中鞲捍臂也以皮為之為後幽明録楚文王好獵有人獻一鷹文王見其殊常獵於雲夢俄而雲際有一物凝翔鮮白此鷹便竦翮而升矗若飛電須臾羽墮如雪血下如雨有大鳥墮地兩翅廣數十里時有博物君子曰此大鵬雛也方礙天鵬翼障天也有楚辭指九天以為正注中央八也戰國䇿狡兔三窟僅得免其死黑鷹不省悉井切人間有度海疑從北極來正翮摶風超紫塞玄一作立冬幾夜宿陽臺虞羅自覺一作各虛施巧春雁同歸必見猜萬里寒空祗一日金眸玉爪不刋作未凡材次章咏黑鷹上四遡其來之逺下四憫其去之速幾北極紫塞玄冬皆為黑鷹點染正翮言直北正飛夜言暫時停宿虞羅自覺言其機警春雁同歸言皆北向虛施巧取之未得也必見猜恐其摶擊也萬里一日見飛騰之迅金眸玉爪謂形質之竒首句明提其黑末句反襯其黑盧照鄰堆詩萬里南翔渡海來莊子摶扶搖羊角而上扶搖羊角風也摶風本此山綖注紫塞雁門也其山髙入霄漢雁飛不能踰從兩斷處而過故謂之雁門今黑鷹超越此門故曰超紫塞蕪城賦紫塞雁門曹植離繳雁賦逺玄冬於南裔兮避炎夏於朔方橫楚王陽臺在巫山威魏彥深鷹賦何虞者之多巧運羅以羈束劉孝詩猜鷹鷙隼無由逐此猜字所本翅西京雜記茂陵少年李亨以鷹鷂逐雉兔鷹則有青黃眸青冥金距高洋獲白兔鷹目色紫爪本白顧宸曰黃石識子房於圯橋而退老穀城德公拜孔明於牀下而長隱鹿門殆一生自獵知無敵百中爭能恥下鞲者乎魏武欲以遊説致公瑾而不能奪其知已之感桓溫欲以豪傑招景略而不能解其共國之嫌殆虞人自覺虛施巧春雁同歸必見猜者乎千古高人竒士性情出處從二十八字拈出可想老杜胸中全史此張璁曰公嘗為王兵馬賦二角鷹言其勇鋭相敵亦所以况之也或疑詠二鷹止於起首分别白黑中間多彼此混同何也曰黑白其形色也題中羅取未得徑翮思秋此鷹之精神骨力也詩從神力上摹寫其迅疾英竒正深於體物者杜臆謂二詩勝人在氣魄雄偉不落纎巧家數良然楊德周曰詩家論唐律有明暗二例作者皆然如杜詩黑鷹鄭谷雙鷺是明也杜詩白鷹鄭谷鷓鴣是暗也四詩可以為法雙鷺詩云雙鷺應憐水滿池風飄不動頂絲垂立當青草人先見行傍白蓮魚未知一足獨拳寒雨裏數聲相呌早秋時林塘得爾須增價况與詩家物色宜鷓鴣詩云暖戲煙蕪錦翼齊品流應得近山雞雨昏青草湖邊過花落黃陵廟裡啼遊子乍聞征袖濕佳人才唱翠眉低相呼相喚湘江曲苦竹叢深春日西玉腕騮原注江陵節度衛公馬也黑鶴注此當是大厯元年作邵注赤馬鬛曰騮腕臂腕也前足腕肉白曰玉腕騮良馬名也聞説荆南馬尚書玉腕騮驂驔音潭一作頓驂飄赤汗局蹐顧長楸胡虜三年入乾坤一戰收舉鞭如有問欲伴習池遊上四咏騮馬之神駿下則有功成身退之意一赤汗如珠而長楸欲奮言今有餘勇三年伐叛而戰收功言昔能陷陳事平之後思伴習池結語竒俊馬杜臆舉鞭欲問問馬也欲伴習池代馬對也此雖咏兼諷衛公詩吳都賦䟃𧽼翋􅢣李善注相隨驅逐衆多貌溫庭筠白馬䟃𧽼衆塵起杜詩作驂驔義蓋相同詩注局曲也蹐纍足也史曹植詩走馬長楸間積舊唐書乾元二年衛伯玉擊思明大破於強子坂尸滿野以功遷神䇿軍節度上元二年大破史朝義於永寧進封河東郡公廣德元年冬吐蕃寇京師乘輿幸陜以伯玉有幹略使節度江陵封陽城郡王醉為馬墜諸公攜酒相看此夔州詩年次難考甫也諸侯老賓客罷酒酣歌拓金戟騎馬忽憶少去聲年時散蹄落瞿唐石白帝城門水雲外低身直下去聲八千尺粉堞電轉紫遊韁東得平岡出天壁江村野堂爭入眼垂鞭一作肩嚲典可切鞚凌紫陌先敘醉後馳馬之狀諸侯賓客對柏中丞言自城門馳下瞿唐約計八千尺非謂身墮八百丈也粉堞經過紫韁疾如電轉平岡在天壁之下故近江村而凌紫陌侯世説何次道見賈寧在後輪中曰此人金不死終為諸上客書酣歌於室庾信詩醉來拓戟詩杜審言詩直下騎才通御紫遊韁紫絲為韁晉中興太和中鄴下童謡青青路楊白馬紫遊韁鞚馬口勒廣韻嚲垂下貌向來皓首驚萬人自倚紅顔能騎去聲射音石安知決臆追風足朱汗驂驔音潭猶噴本作噴普問切玉不虞一蹶終損傷人生快意多所辱職當憂戚伏衾枕况乃遲暮加煩促此墜馬見傷而歎也也皓首應老紅顔應少追風噴玉奔悍難馭馬跟平岡故傷而不害快意多辱既悔其前遲暮煩促又憂其後矣呼沈約詩共矜紅顔日俱忘白髮年紅顔能騎射即鷹皂櫟林逐獸雲雪岡事汗決臆縱意也梁陽晉詩躡影追風本絶羣朱注朱汗血馬也車􅛴詩意欲驂驔走唐盧照鄰詩雕弓夜宛轉鐵騎曉驂驔崔腋詩驂驔始散東城曲倐忽還逢南陌頭以驂驔對宛轉倐忽乃飛騰迅疾之貌或曰驂驔以驔為驂猶陸機詩言服驥驂騮魯頌有驔有魚疏毫毛在骭而長白名為驔此説却與詩意不合馬穆天子傳天子東遊於黃澤使宫樂謡曰黃之澤其噴沙皇人威儀黃之澤其馬噴玉皇人夀穀今按踏岸則噴沙激水則噴玉皆言馬勢之雄猛朋一作明知來問腆一作椣我顔杖藜強丘兩切起依僮僕語盡還成開口笑提攜别掃清溪曲酒肉如山又一時初筵哀絲動豪竹共指西日不相貸喧呼且覆音福杯中渌何必走馬來為問一作不為身君不見嵇康養生被一作遭殺戮末記諸公攜酒相看老年失足故厚顔語相慰藉故還笑絲竹侑觴日暮猶飲依然樂以忘憂結引嵇康見事有出於意外者此章中假八句起結各十句月作㥏顔是慚色作腆顔是厚顔客莊子開口而笑一之中不過四五日鮑照詩幽時結侣提攜遊三山因送樂記絲聲哀哀以立辨嵇豪竹大管也後何遜詩何欵欵半飲杯中渌晉康著養生論刑東市郝敬曰題有景致詩寫得霑足辭藻風流情興感慨無不佳覆音福舟二首詩言巫峽當是夔州所作但年次不可考夢弼以此詩為追諷玄宗事朱云唐世人主多好神仙豈必玄宗也子張溍曰求仙本荒唐事故託覆舟以諷新序孔曰水則覆舟巫峽盤渦曉黔陽貢物秋丹砂同隕石翠羽共沉舟羇使去聲空斜影一作景龍宫一作居閟積流篙工幸不溺俄頃逐輕鷗此章記夔江覆舟之事斜黔陽之貢經於巫峽丹砂翠羽八貢之物空影側身落水閟積流沒入深淵矣舟逐輕鷗篙工以脫身為幸也詩舊以空斜影為使者悵快於斜日之下此説不然玩意先敘砂羽之墜繼敘羇使之亡末則幸篙工之不溺耳於篙工加一幸字知使者為不幸矣江賦衝巫峽以迅激又盤渦谷轉置一統志重慶府彭水縣自三國至唐皆名黔陽縣隨彭水縣為黔州治所又唐以黔江縣屬黔州老唐志黔陽嵗貢廾砂等物本草丹砂久服通神明不輕身神仙能化為汞衍義云出辰州蠻洞老鴉井者最良汲左傳隕石於宋五梧爾雅注翠鷸似燕紺色生鬱林塜周書王會解蒼翡翠所以取羽鄒陽書積羽沉舟記王僧孺詩翠枝結斜影茫徐陵寺碑夜動龍宫十洲南海有龍綃宫海賦茫積流劉孝威詩循汀俄頃回竹宫時望拜桂館或求仙姹陟嫁切女凌波日神光照夜年從聞斬蛟劍無復扶又切㸑犀船使去聲者隨秋色迢迢獨上上聲天次章諷當時求仙之妄落竹宫桂館借漢比唐姹女凌波言丹砂已江水神光照夜言宫中猶望成仙此見其誙妄也且方士既神竒其説何獨無斬蛟之劍照水之犀以解此水厄乃至身罹覆舟而沓然上天乎朱注使者即指方士一輩升舊以上天為還朝非是閟積流魄沉水也獨上天魂天也杜臆云帝未必升天而使者已獨上天矣譏之也有漢禮樂志正月上辛用事甘泉圜丘昏祠至明夜常神光集於祠壇天子自竹宫而望拜百官侍祠者數百人皆肅然心動焉師古曰竹宫去壇三里郊祀志公孫卿曰仙人好樓居於是上令長安作飛廉桂館甘泉作益夀延夀觀使卿持節設具而候神人師古曰飛廉桂館二館名注參同契河上姹女靈而最神得火則飛不染垢塵顧漢真人大丹訣姹女隱在丹砂中謂砂中有汞也於洛神賦凌波微步紀郊祀志宣帝築世宗廟神光興殿旁如燭狀武帝祭后土神光三燭吕氏春秋荆人佽飛得寶劍渡江中流兩蛟繞舟幾沒佽飛拔劍斬蛟乃得濟晉書溫嶠宿牛渚磯水深不可測世云其下多怪物嶠遂燃犀角照之須臾見水族覆火竒形異狀宋王微咏賦秋色隂兮白露商陸機詩迢迢造天庭歐吳越春秋羣臣上天冶死矣送李功曹之荆州充鄭侍御判官重平聲贈舊編在夔州詩內曽音層聞宋玉宅每欲到荆州此地生涯晚遙悲一作通水國秋孤城一柱觀去聲落日九江流使去聲者雖光彩青楓逺自愁上四公欲往荆州而悲悲在於淹留下四李獨往荆州而愁愁生於孤寂一悲一愁寫出兩地情懷極其悽切宜此地指夔水國指荆一柱九江俱在荆州水經注城城南有宋玉宅玉邑人雋才辨給善屬文而識音渚宫故事庾信因侯景之亂自建康遁歸江陵居宋玉故宅宅在城北三里故其賦曰誅茅宋玉之宅穿徑臨江之府晉顔延之詩水國周地險阮夏書過九江至於大别曲池歌一朝光彩落藉詩上有楓樹林逺望令人悲送王十六判官此亦夔州詩年次難考客下去聲荆南盡君今復扶又切入舟買薪猶白帝鳴櫓已一作少沙頭衡霍生春早瀟湘共海浮荒林庾信宅為去聲仗主人留上四送王之荆下敘欲往之意兩唐書肅宗至德之後中原多故襄鄧百姓京衣冠盡投江湖荆南井邑十倍於初乃置荆南節度使以統之鶴注是時蜀避崔旰之亂故客下荆南俱盡也才白帝而忽沙頭猶云朝發白帝暮江陵此十字句法春來水發故瀟湘如海主人指王先到其地即為地主矣舊注江陵吳船至泊於郭外沙頭方輿勝覽沙頭市去江陵地五十里邵注荆南荆州以南荆州府古名江陵衡山在衡州府瀟湘在嶽州府嶽在荆以南衡在嶽以南爾雅疏衡山一名霍山趙次公曰皮日休以霍之本地自在夀州作霍山賦中云自漢之後始易吾號而歸於衡公此所云衡霍乃是衡山故與瀟湘作對庾信宅見上章别崔潩因寄薜據孟雲卿原注內弟潩赴湖南幕職姑從黃鶴入大厯元年志士惜妄動知深陳作深知難固辭如何久磨礪但取不磷緇夙夜聽憂主飛騰急濟時荆州遇一作過薛孟為去聲報欲論平聲詩上六送崔赴幕末二兼寄薛孟故逺注崔必好靜不出湖南幕主知而辟之有起二句三四承首句諷其硜硜獨善五六承次句勸以汲汲有為何劭詩志士惜日短左傳磨礪以須聽憂主聽其憂國之語王嗣奭曰此詩與九卷送竇九歸成都同一機局夭矯頓挂唐律所無竇本有才朂之以苦節崔能潔已勉之以濟時意若相反合之始為全人此見公明體逹用之學寄杜位原注頃者與位同在故嚴尚書幕詩姑依鶴注編在大厯元年冬陳注此稱惠連前守嵗詩稱阿戎則位為公從弟明矣唐世系表公為征南十三代位與濟為征南十四代或據此遂疑位為從姪誤矣世表未可信也寒日經簷短窮猿失木悲峽中一作筵為客久一作恨江上一作並憶君時天地身何在一作往風塵病敢辭封書兩行音杭淚霑灑裛新詩寒日窮猿對景有感為客久承窮猿憶君時承寒日五六申客久之况七八申憶君之情之杜臆漂流天地既無定在憔悴風塵病又奚辭凄涼况真堪流涕窮猿失木乃歎無家可歸或云蕩嚴武之亡非也武在日公已辭回草堂矣淮南子猿狖顛蹶而失木世説窮猿奔林豈暇擇木裛裛新詩手紙上淚也立春詩云巫峽寒江係夔州所作依朱氏入在大厯二年春日春盤細生菜忽憶兩京全盛一作梅發時盤出高門行白玉菜傳纖手送青絲巫峽寒江那平聲對眼杜陵逺客不勝平聲悲此身未知歸定處呼兒覓紙一題詩上四憶兩京春日下四感夔江春日而杜臆通章只是一個悲意人但知其悲一身之飄泊不知其悲兩京之蕭索也對春盤生菜憶及兩京盛時今老客峽江則兩京失其而身亦失其居矣悲曰不勝包身世無窮之感三四分承盤菜而意却貫穿菜經纎手玉盤傳送二句倒敘那對眼謂那能對眼歸定處謂欲歸兩京尚無定處也托言晉李鄂立春日命以蘆蔔芹芽為菜盤相餽貺四時寶鏡唐立春日春餅生菜號春盤黃生注生菜韭也歐公歸田録楊六年為文務避俗語門生摘其德邁九皇之句諷之云未知何時得買生菜以九皇音近韭黃也按詩言青絲指韭良是東坡詩漸覺東風斜峭寒青蒿黃韭試春盤謝靈運詩兩京愧佳麗公居杜陵而家在洛陽故兩京春盤皆所嘗食黃莊子高門懸薄無不走也此指貴戚之家舊引三輔圓未央宫中高門殿誤出傳經也古詩纖纖素手朱瀚曰細生菜不成語次聨分承盤菜稍窺工部家法其奈才腐何宋元詩人或未盡深知杜法不害其為可傳正以其才思出羣耳那對服是何語不勝悲亦熟調第七乃率句結語益無賴矣江梅鶴注當是大厯二年春作若三年之春公將下峽不當云巫峽鬱嵯峨矣趙曰此咏江邊之梅也如在嶺曰嶺梅在野曰野梅官所種者曰官梅後人見梅便謂之江梅誤矣梅蘂臘前破梅花年後多絶知春意好一作早最奈客愁何雪樹元一作能同色江風亦自波故園不可見巫岫鬱嵯峨此見江梅而有感也客愁二字乃全首之眼映梅占春意景物自好而反動客愁者蓋見臘前雪年後飄風花開花謝都非故園春色是以對巫岫而添愁耳陸機詩雲山鬱嵯峨庭草鶴注當是大厯二年作詩云輕過屢供尚無放舟出峽之期也張協詩庭草蔞以緑楚草經寒碧庭春入眼濃舊低收葉舉新掩卷牙重平聲步履宜輕過開筵得屢供看花隨節序不敢強丘兩切為容上四形容草色下致憐惜之意云寒碧春濃地暖故也葉舉牙重入眼濃矣杜臆舊葉之低垂者今收而乍舉新牙之掩伏者今卷而重出此將舊低新掩略讀是也朱注將低收掩卷連説非是後四句杜臆作代摹庭草之詞人若憐而勿踐得以屢供筵前倘愛花而見棄亦不敢強為容色以媚人君子之交蓋如此為蕭子範詩節序亦徂炎強詩誰適容老子夫惟不可識故為之容愁原注強戲為吳體為黃生注皮陸集中亦有吳體詩乃當時俚俗此體耳詩流不屑效之杜公篇什既衆時出變調凡集中拗律皆屬此體偶發例於此曰戲者明其非正律也杜臆胸有抑鬱不平之氣而以拗體發之公之拗體詩大都如是玩詩意當是大厯二年春夔州作江草日日喚愁生巫一作春峽泠泠非世情盤渦鷺浴底心性獨樹花發自分明十年戎馬暗南一作萬國異域賓客老孤城渭水秦山一作川得見否人今罷音疲病虎縱平聲橫上四敘夔州景物觸愁之端下四憶長安時事致愁之故杜臆愁人心事觸目可憎如江草新生却謂喚起愁思巫峽中流却謂不近人情盤渦鷺洛本自得愁也疑其有何心性獨樹花發此春意也謂其只自分明出非常故情亦反常耳下文所云真異常之愁也人戎馬南國前此勢不可歸客老孤城目前身不可歸病虎橫將來時不可歸託身無處愁難自遣矣民南國指洛陽孤城指夔州渭水秦山指長安人罷病力竭虎縱橫暴斂亟也首王維楨曰楚辭春草生兮蔞蔞王孫遊兮不歸此即句意公詩清渭無情極愁時獨向東即次句意聲班偼妤賦房㯿虛兮風泠泠朱翰曰泠泠乃細流水恐與峽水不合伏知道詩桃花隔世情孤水回曰渦城絶四鄰前漢盧綰傳陳豨招致賓客孔楊素詩韓非子士民疲病於內記子曰苛政猛於虎張璁曰時京兆用第五琦十一稅法民多流亡是即虎也黃生曰此因不得歸秦沉憂英寫無端對物生憎皆是愁人實歷之境草生花發水流鷺浴皆唤愁之具下三句特變文言之耳愁從中來微物之故則亦強戲言之而已胡應麟曰老杜吳體但句格拗耳其語如側身天地更懷古回首風塵甘息機落花遊絲白日靜鳴鳩乳燕青春深實皆冠冕雄麗宋人作拗體者若永叔滄江萬古流不盡白鳥雙飛意自間文潛白頭青鬢有存沒落日斷霞無古今尚覺近之魯直黃流不解涴明月碧樹為我生涼秋蜂房各自開戶牖蟻穴或夢封侯王自以平生得意遍讀老杜拗體未嘗有此等語獨盤渦浴鷺底心性獨樹花發自分明稍類然亦杜之僻者而黃以為無始心印天下幾人學杜甫誰得其皮與其骨其魯直之謂哉王十五前閣會黃鶴編在大厯二年春以詩有楚岸春臺句也前有送王十五扶侍詩楚岸收新雨春臺引細風情人來石上鮮鱠出江中鄰舍煩書札肩輿強丘兩切老翁病身虛俊味何幸飫兒童上二前閣春景三四王君宴會下序始終欵曲之情見杜臆以鄰舍而致札迎輿見其殷勤又且飫及兒童札中并招其子詩邵注夔州古楚地故云楚岸詩此指閣下石臺陸雲遣情春臺託蔭寒水鮑照留酌待情人疆七發鮮鯉之鱠安世説王獻之乘平肩輿徑入顧辟園陸雲答車茂書東海之俊味肴膳之至妙崔評事弟許相迎不到應平聲慮老夫見泥雨怯出必愆佳期走筆戲簡顧注當時大厯二年春在夔州西閣作邵注崔評事公之表弟江閣邀賓許馬迎午時起坐自天明浮雲不負青春色細雨何孤白帝城身過花間霑濕好醉於馬上往來輕虛疑皓首衝泥怯實少銀鞍傍去聲險行起結二聨賓主雙關中間四句述坐時望迎之意倒本是邀賓江閣許馬迎天明起坐至午時兩句皆用裝法卲注江閣公所寓白帝城崔所居通首逐句順下俱帶戲詞車顧注剡溪漫筆云王右軍在郡迎王敬仁敬仁每用常惡其遲後以馬迎敬仁雖復風雨亦不以車也杜詩江閣邀賓許馬迎用此事於泥雨甚切秦嘉詩起坐為不寧别賦龍馬銀鞍朱瀚曰為一酒食侵曉而待亦太無聊雲不負春色語尚可通雨不孤白帝便無意義霑濕有何好處醉則龍鍾何得體輕虛疑衝泥聲韻頽唐馬行何必銀鞍且馬又何必傍險赴燕豈逃難耶遣悶戲呈路十九曹長子兩切州公於大厯元年春至夔此云誰家數去又云百遍相過知其作於二年之春也路為拾遺院在西省故曰曺長江浦雷聲喧昨夜春城雨色動微寒黃鸝一作鶯並坐交愁濕白鷺羣飛太劇乾音干晚節漸於詩律細誰家數音朔去酒杯寬唯君一作吾最一作醉愛清狂客百遍相過一作看意未闌上四阻雨是悶所由生下四呈路乃悶所由遣卲注夜經雷雨旦必微寒鶯畏雨而坐若交愁其濕鷺乘雨而飛甚難於得乾公身滯雨中故見之增悶下數語本稱路之好客而詞近於索飲故云戲呈古清狂客三字曠懷豪興兼而有之公之自命甚高賈樂府烏生八九子端坐秦氏桂樹間坐字本此誼旱雲賦惜旱大劇蜀志劉先主謂宋忠曰今禍至方告我不亦太劇乎注解為太甚今按詩意恐是太難之意如煩劇之劇舊解作太苦乾未當方遇雨何云苦乾耶演義解為戲劇使乾又覺太鑿後漢鍾皓傳以詩律教授同郡陳實胡夏客云漢書本言詩與法律用為詩之律體巧矣庾信詩梳頭百遍撩寬多也闌盡也公嘗言老去詩篇渾漫與此言晚節漸於詩律細何也律細言用心精密漫與言出手純熟熟從精處得來兩意未嘗不合欠朱瀚曰江浦二字打頭近俗喧昨夜更俗動微寒穩雨色雷聲土木對偶比雷聲忽送千峯雨何如交並二字重復太劇乾三字晦澀此從黃鶯過水一聨偷出而手腳並露其云晚律漸細豈少年自居粗率乎杜則少時入細老更橫逸耳故曰語不驚人死不休老去詩篇渾漫與參看始知其謬六類寒乞語七似庸鄙八無品地皆非少陵本色晝夢顧注大厯元年暮春公至夔州此詩作於次年二月吳越春秋吳王過姑胥之臺忽然晝夢二月饒睡昏昏然不獨夜短晝分眠桃花氣暖眼自醉春渚日落夢相牽故鄉門巷荆棘底中原君臣豺虎邊安得務農息戰鬭普天無吏橫去聲索色責切錢上四致夢之由五六夢中之景末則夢醒而慨世也倦吳論二月昏昏多睡不獨夜短而且晝眠止因暖氣神故日落而夢猶未醒耳務故鄉中原積想成夢故遂現出荆棘豺虎矣張綖注農息兵吏無積斂則中原清而故鄉可歸饒睡多睡也山邵注二月晝夜平分之時不謝靈運詩春渚稅鑾登椒張組朓朱瀚曰武臣弄兵則豺虎自弭文臣不橫斂則荆棘可披機農務始於二月傅玄疏務農若此何有不贍乎陸登臺賦委普天之光宅質率土之黎庶暮春此依朱氏編在大厯二年玩詩意是久卧峽中有厭居意其不在元年明矣卧病擁塞先側切在峽中瀟湘洞庭虛映空楚天不斷四時雨巫峽常一作長吹萬一作千里風沙上草閣柳新暗一作暗城邊野池蓮欲紅暮春鴛鷺立洲渚挾子翻一作翾飛還一叢此詩卧病峽中而作上四峽中景下四暮春景杜臆公本欲初春下峽病至暮春則舟不可行矣故有慨於卧病擁塞也擁塞則瀟湘不可到而虛此映空水色矣風雨不絶旅人增悶而柳暗蓮紅又日月如流對此鴛鷺立渚挾子羣飛何以為情耶文帝詩春色映空來夔州地暖故蓮欲吐紅梁簡杜臆公詩用鴛鷺皆有意如空慚鴛鷺行年衰鴛鷺羣寒空見鴛鷺回首憶朝班故此詩鴛鷺亦是借以自比楚辭望大河之洲渚兮棲魏文帝短歌翩翩飛鳥挾子巢棲王筠詩庭禽挾于楚辭翾飛兮翠層庾信春賦一叢香草足礙人説文叢聚也朱瀚曰初聨雷堆晦蝕有目共知楚天巫峽不免合掌四時雨萬里風村孰對句沙上城邊裝頭無謂新柳不得云暗城邊不得云野池蓮城柳不當遞及鴛鷺立洲渚已是拙俗冠以暮春益復可笑即事黃鶴編在大厯二年詩云捲簾飛閣知是在西閣時作暮春三月巫峽長皛胡了切皛行雲浮一作無日光雷聲忽送千峯雨花氣渾平聲如百和去聲香黃鶯過水翻回去燕子銜泥濕不妨飛閣卷簾圖畫胡化切裏虛無只少對瀟湘此詩峽中對景而作上六春景所謂即事末乃自道出峽之意雲浮日光而過其色皛皛然雷雨將作矣乍雨忽晴香氣撲人鶯來燕往物各適情捲簾一望真如圖畫但以久卧峽中故思江湖之映空耳鶯畏雨故翻回燕乘雨故銜泥飛閣即西閣虛無空曠貌東丘遲與陳伯之書暮春三月江南草長荆州記巴三峽巫峽長良陶潛詩皛皛川上平注隂鏗詩映日動浮光陳子詩花氣近薰衣邵漢武帝時月支國進百和香盧世㴶曰江雨云春雨暗暗塞峽中早晚來自楚王宫即事云暮春三月巫峽長皛皛行雲浮日光返照云返照入江翻石壁歸雲擁樹失山村俱能寫化工之情狀精神畫不出想不到詩至此與天為徒矣黃生曰起句稍拗中二聨亦失粘對法更不衫不履然其寫景之妙可作暮春山居圖看懷灞上遊黃鶴編在大厯二年以詩有江漢歸舟句也楚漢春秋漢高帝西入武關居灞上悵望東陵道平生灞上遊春濃停野騎去聲夜敞宿舊作宿敞雲樓離别人誰在經過平聲老自休眼前今古意江漢一歸舟上四憶舊遊景事下則念同遊而動歸思也有晝停騎夜宿樓極盡一時遊興唯聚散無常故古今之慨即夜宿對春濃不工當云夜敞宿雲棲杜顧注東陵道長安城東門乃秦東陵侯種瓜處臆唐都關中即今西安城東三十里有灞水又東乃文帝霸陵出長安東門為東陵道得名以此灞水橋曰灞橋乃長安餞别之所灞上當即在其處詳詩意則行樂之地也楊炯少室山廟碑璇宫夜敞銀榜朝開隋辛德源詩戲笑上雲樓入宅三首朱注年譜大厯二年春自西閣遷居赤甲鶴注赤甲瀼西皆在奉節縣北三十里奔峭背音佩赤甲斷崖當白鹽客居愧遷次春色一作酒非漸多添花亞欲移竹鳥窺新捲簾衰年不敢恨勝概欲相兼首章志赤甲之勝內此詩八句整對而實相間首聨宅外景三聨宅景春色起花鳥勝概總六句顧注背赤甲之奔峭當白鹽之斷崖以二山形勢明宅之向背花厭竹枝愛花故須移竹鳥常入室卷簾故復來窺藉此娛之故不恨屢遷又謝靈運詩徒旅苦奔峭邵注山峯高峻如奔湧然云赤甲城是魚復縣舊基故云水生魚復浦談白鹽注見十五卷果洙曰次舍也遷次移居也詩二編杜審言枝亞新肥孟東野南浦紅花亞水紅包佶多年亞石松方干應候先開亞木枝亞義如壓言低披也黃注亞乃相依之意王嗣奭曰避亂奔走無日不思故鄉造次移居必擇勝地且加修葺點綴如此襟懷自不可及郭林宗逆旅經過必灑掃王子猷借居必種竹意正相同亂後居難定春歸客未還水生魚復音腹浦雲暖麝香山半樊作􅀈頂梳頭白過平聲眉拄杖斑相看平聲多使去聲者一一問函關此遷宅而想故居也下四敘情應客未還三四寫景承上春歸顧注陽和復至故曰春歸關半頂見髮之少是老狀過眉見杖之長是病狀問函者望亂定而還鄉也王胄詩柳黃知節變草緑識春歸名地志夔治魚復灔澦風濤震射巨魚却步不得上故魚復浦鶴注寰宇記麝香山在秭歸縣東南一百十里其山多麝武德二年前秭歸屬夔州斑魏武陌上桑拄杖挂枝佩秋蘭梁到溉有贈任新安竹杖詩文彩既斑斕姿性甚綢直桃王應麟曰潼關至函谷關歷峽華二州之地俱謂之林塞時周智光據華州反宋玉歸州宅雲通白帝城吾人淹老病旅食豈才名峽口風常急江流氣不平只應平聲與兒子飄轉任浮生此故鄉未歸而嘆旅居也淹杜臆公欲北還必過歸州雲通白帝見相去不逺老病久留白帝豈才名不如宋玉二句分承風急江翻歸州且不易到何况故鄉亦惟隨地漂轉而已杜臆三詩各一意而展轉相因顧注公居赤甲本非得已故後復有瀼西之遷刻陸遊入蜀記宋王宅在秭歸縣東今為酒家舊有石宋玉宅三字唐書歸州屬山南東道武德二年析夔州之秭歸巴東置湖廣通志宋玉宅有兩處一在歸州一在荆州與杜詩相合赤甲鶴注此與入宅詩同時作卜居赤甲遷居新兩見巫山楚水春炙背可以獻天子美芹由來知野人荆州鄭薛寄詩一作書近蜀客郤音隙岑非我鄰笑接郎中評事飲病從深酌道去聲吾真此居赤甲而念知交也在四句分截春公初遷赤甲而云兩見春色者自去春至夔已經兩也炙背食芹述春山景物兼有朝野濶絶之感評鄭薜在荆寄詩頗近郤岑在蜀漸與之逺惟接郎中事喜得酌酒而道真精列子宋國有田父東作曝於日不知有綿纊狐貉謂其妻曰負日之暄人莫知之以獻吾君將有重賞里之富室告之曰昔人有美戎菽甘枲莖芹萍子對鄉豪稱之鄉豪取嘗之蜇於口慘於腹衆哂而怨之子此類也嵇康絶交書野人有快炙背而美芹子者欲獻之至尊雖有區區之意亦已疏矣鶴注鄭是江陵鄭少尹審薛是石首薛明府璩岑是岑嘉州參郤是梓州郤使君昻評事必崔十三評事公在夔州多有詩與之顧注郎中應是吳郎司法蓋刑曹也朱注文苑英華有苻載志楊鷗墓云永甫泰二載相公杜公鴻漸奏授鷗犀浦縣令僚友杜員外岑郎中參郤舍人昻聞公殞落失聲咨嗟則郤為郤昻無疑曹植髑髏説是反吾真也朱瀚曰卜居遷居重復無法獻天子突甚由來知野人筋脈不收中聨厄塞全無頓挫磊落氣象笑不典郎中評事豈律詩可著或置題中可耳末句從近識峩嵋老知余懶是真偷出􅕙倒甚矣且抱病何能深酌與比來病酒開涓滴參看自知卜居此是大厯二年自赤甲將遷居瀼西而作歸羡遼東鶴吟同楚執圭未成遊碧海著涉略切處覔丹梯雲嶂陳作障寬江北一作左春耕破瀼西桃紅客若至定似昔一作晉人迷上四客居有感下欲託居瀼西也忘丁公魂歸故里莊舄病而吟越皆不故鄉者故借以自方碧海丹梯歎不能水行而復山棲江北即瀼西其地寬平故可耕種杜臆公以此地為桃源直作避秦計矣千遼東華表柱有鶴棲其上曰有鳥有鳥丁令威去家里今始歸城郭如故人民非何不學仙塜纍纍病猶為越吟選注越人莊舄起家寒微為楚執圭有十洲記扶桑之東有碧海謝靈運詩灑步臨丹梯東破是破土劉希曰瀼溪在白帝城之昔人迷指晨阮肇暮春題瀼西新賃草屋五首年譜大厯二年自赤甲將遷居瀼西而作久嗟三峽客再與暮春期百舌欲無語繁花能幾時谷虛雲氣薄波亂日華遲戰伐何由定哀傷不在兹首章題瀼西暮春杜中四寫季春時景末二傷心世亂為後兩章伏脈臆久客而再逢暮春見非初意百舌二句見物候易遷谷虛二句見瀼土堪適豈谷內雲升春晴故曰薄波中日漾春長故遲不在兹言不在此戰伐趙反舌無聲在芒種後十日今欲無語則暮春時矣謝朓詩日華川上動此邦一作北郊干樹橘不見比封君養拙干戈際全生麋鹿羣畏人江北草旅食瀼西雲萬里巴渝曲三年實飽聞次章題瀼西賃居干地産貧瘠而託居於此不過為養拙全生計耳身際戈故畏人而依江北之草同群麋鹿故旅食而伴瀼西之雲三年聞曲即所謂久嗟三峽客也公自永泰元年秋之雲安至此為三年在夔州逢春則再度矣江史貨殖傳封者衣租稅千户之君嵗率二十萬蜀漢陵千樹橘其人皆與千戶侯等絶交論獨立高山之頂歡與麋鹿同群六魏文帝詩客子常畏人漢禮樂志巴渝鼓員三十員注高帝初為漢王得巴渝趫捷人與之定三秦滅楚存其樂為巴渝樂巴州在今夔州府渝州今在重慶府綵雲隂復扶又切白錦樹曉一作晚來青身世雙蓬鬢乾坤一草亭哀歌時自惜一作短醉舞為去聲誰醒細雨荷去聲鋤立江猿吟翠屏三章對草屋而有感也句隂復白雲變態曉來青雨後色二屋前春景誰趙汸注雙蓬鬢老無所成一草亭窮無所歸草自惜醒窮老獨悲雨際聞猿觸景堪傷矣下六句屋情事身世二字又起下章哀王融詩日暮綵雲合淵鮑照詩身世兩相棄莊子歌以賣聲名詩鼓淵醉言舞陶潛詩帶月荷鋤歸黃生曰此詩首尾實而中間虛是實包虛格唯杜有之三四乃藏頭句法若申言之則悠悠身世雙蓬鬢落落乾坤一草亭耳江猿吟翠屏即白鷗元水宿何事有餘哀意而含蓄較深永矣壯年晉作志學書劍他日委泥沙事主非無一作無非祿浮生即有涯高齋依藥餌絶域改春華喪去聲亂丹心破王臣未一家四章旅居而慨身世也前書劍委於泥沙欲用而世不見用也非無祿曽授官即有涯後無餘望矣五六承浮生七八承事主伐高齋指草屋絶域指瀼西春華點暮春喪亂應前戰王臣未一諸鎮猶多叛志也詩項羽紀少年學書不成去學劍沈約淪沒委泥沙詩莫非王臣欲陳濟世䇿已老尚書郎不一作未息豺狼一作虎鬬空慙鴛鷺行音杭時危人事急一作惡風逆羽毛傷落日悲江漢中宵淚滿牀承上章來乃世亂年衰之感前濟世䇿應前喪亂尚書郎應前事主悲淚應丹心破此遙承上章也有䇿莫陳故豺狼未息省郎空老故鴛鷺終慚人事危見狼鬬方張羽毛傷見鴛行莫起末二又總頂上六此逐句分承也屋亦非安居之地矣杜臆落日增悲終宵流淚則草後漢盧植傳植剛毅有大節常懷濟世志於前漢書馮唐老郎署寄從去聲孫崇簡詩云林居未相失蓋與瀼西相去不逺當是大厯二年作唐書世系表崇簡出襄陽房益州司馬參軍嵯峨白帝城東西南有龍湫北虎溪吾孫騎去聲曹不記一作騎馬業學尸鄉多一作常養雞此崇簡幽居景况吾杜臆此即前詩所云宗老孫子者今比之騎曹尸鄉猶然質朴古人風也不世説王子猷為桓沖騎曹參軍桓問曰卿署何曹曰知何曹時見牽馬來似是馬曹又問所管幾馬曰不知馬何由知數崇簡衛倉曹故比之尸鄉祝雞翁見首卷龎公隱時盡室去武陵春樹他人迷與汝林居未相失近身藥裹酒常一作長攜牧豎一作叟樵童亦無賴莫令平聲斬斷青雲梯此喜偕隱而勉其有終從蔡曰末二託言勿相疏絶盧注即前贈孫濟所云淘米刈葵之意談此章上段四句下段六句躑龎公武陵注見前桓新論雍門周曰遊見牧豎躅其足而歌共謝靈運詩登青雲梯江雨有懷鄭典設鶴注此當是大厯二年瀼西作唐書東宫官有典設郎四人春雨暗暗平聲塞音色晉作發峽中早晚來自楚王宫亂波紛一作分披已打岸弱雲狼藉不禁平聲風寵光蕙葉與多碧點注桃花舒小紅谷口子真正憶汝岸高瀼滑一作濶限西東上四江上雨景下四對景懷鄭先楚王宫用神女雲雨事波撼雲飛未雨而狂風發患碧桃紅經雨而花木爭妍不禁不能耐風也龍洞簫賦若凱風紛披張華詩僵禽正狼藉詩為為光注龍寵也易林嘉樂君子為國寵光梁元帝詩雨罷禁生光古賦天雨之施惠於蕙葉羽鍾會孔雀賦五色點注華參差有沈約詩桃枝紅若點授紫桃雜組曰寵光點注唐詩此二語施之官職選間則寵光乃特恩之意點注乃注授之意顧注此詩寵光點注加之蕙葉桃花見雨露之恩蕙桃獨霑也公自赤甲遷居瀼西則鄭必居瀼東矣熟食日示宗文宗武鶴注當是大厯二年在夔州作蓋元年春晚方遷夔三年正月已下峽矣日洙注熟食日即寒食節也秦人呼寒食為熟食言其不動煙火預辦熟食物過節也齊人呼為冷節又曰禁煙節鶴曰天寶十載二月勑禮標納火之禁語有鑽燧之文今後寒食並禁火三日消渴遊江漢羇棲尚甲兵幾年逢熟食萬里逼清明松柏邙舊作卭杜田定作邙山路風花一作光白帝城汝曹催我老回首淚縱平聲橫首章逢寒食而念先塋也忽杜臆客遊羇棲茫茫過去至熟食之日驚清明已逼清明在次日也年邙山舊隴拜掃久荒故對白帝風花不勝怵惕况子日長已年日衰有似催之老者故山不見惟回首而淚零耳詩舊注公先塋在洛流寓不能展省故有此句陸機墳壟日月多松柏鬱芒芒黃希曰唐制寒食百官有墓塋在城外及在京畿外者任往拜掃元和郡縣志北邙山在河南府偃師縣北二里沈佺期洛城記邙山古今東洛九原之地曹梁孝元帝詩風花下砌傍馬援戒兄子書願汝效之顧注云汝曹催我老謂已亦將為松柏中人矣今按只言老不能歸以接回首故塋方於松柏邙山相應又示兩兒令節成吾老他時見汝心浮生看物變為恨與年深長葛書難得江州涕不禁平聲團圓思弟妹行坐白頭吟此足前章之意兼憶弟妹也物言老不歸鄉他時奉先省墓見汝曹之用心耳我看候屢遷而先塋長隔恨與年俱深矣汝曹當體此意也且弟留長葛妹託江州當此令節不能一室團圓惟有頭白哀吟而已汝曹并母忘此意也恨字有兩意一恨久違墳墓一恨逺離弟妹弟前有送弟往齊州詩長葛與齊州相近故知長葛指七歌云有妹在鍾離江州與鍾離相近故知江州指妹帝令節指寒食唐以中和上已九日為三令節漢明詔吹時律觀物雙江舊書長葛屬許州隋分許昌縣置江州潯陽郡屬南西道本九江郡天寶元年更名溝史正義封豕主瀆不欲團圓他時見汝心别有兩説劉會孟云身後寒食他時見汝思親之心王嗣奭云令節悲老汝曹今日不知他時到我之年當自知耳一是傷已之將殁一是憂子之易老俱無關係還作囑兒回省邙山為當張表臣珊瑚詩話寒食之名起於禁火拜掃之儀因於禮經昔者宗子去在他國庶子無廟孔子許望墓為壇以時祭祀此其本也得舍弟觀書自中都已逹江陵今兹暮春月末行李合到夔州悲喜相兼團圓可待賦詩即事情見音現乎詞鶴注當是大厯二年春作題云今兹暮春末合到夔州時公已定居夔州矣若元年暮春方自雲安遷夔尚無定處也州唐書至德二載以西京為中京自中都至夔十九字皆弟書中語爾過一作到江陵府何時到峽州亂離生有别聚集病應平聲瘳颯颯開啼眼朝朝上上聲水樓老身須付託白骨更何憂此章寫離合悲喜之情語根至性登江陵峽州照題敘清生别是悲聚集是喜間眼樓將到則可喜付託何憂既到則免悲矣颯詩亂離瘼矣王融詩春盡風颯喜觀即到復扶又切題短篇二首此與上章乃先後同時作巫峽千山暗終南萬里春病中吾見弟書到汝為人意一作竟答兒童問來經戰伐新一作塵泊船悲喜後欵欵話一作議歸秦此章亦兼悲喜意首二是悲三四是喜五六喜中之悲七八悲後之喜千山迷暗公不見弟萬里春行弟在途中也病中見弟書到知其身尚無恙乃十字為句戰伐新經答以書中之意此亦十字句法弟黃生注開書之時其子在傍詢叔動定且答且讀兄叔姪之情俱見泊船應巫峽歸秦應終南按談元春云書到汝為人即妻孥怪我在意以下句來經戰伐證之良是杜臆謂書到而如對其人是題中即到語意亦通隨漢書梁孝王傳書到明以誼曉主郭神仙傳薊子訓主人意答乃不同也盧注是年子儀討周智光命大將渾臧李懷光軍渭上是來經戰伐新也淮南子悲喜轉而相生任昉詩何因送欵欵半飲杯中渌黃生曰杜詩有兩句斷續看者兩京三十口雖在命如經上七字連説下三字另住病中見吾弟書到汝為人亦然待爾嗔烏鵲拋書示鶺鴒枝間喜不去原上急曽音層經江閣嫌津柳風帆數所主切驛亭應平聲論平聲十年事愁一作然絶始去聲惺惺從趙汸本舊作星星也此章仍不出悲喜兩意烏鵲棲枝喜鶺領經難悲也五六喜處銜悲七八悲極還喜來待弟不至遂嗔烏鵲難憑矣將拋書以示鶺鳹欲問時消息耳鵲在枝間若報喜而不去復望之也鶺鴒原上乃急難曽經者何又寂無一言乎四句總是自揣自語展轉盻望之情嫌津柳遮眼不見數驛亭來程可計即前章朝朝上水樓也談及十年中聚散流離將愁絶而復惺惺矣舊以枝間承烏鵲原上承鶺鳹按西京雜記乾鵲噪而行人至莊子云烏鵲孺傳枝而孚生通雅云因傳枝而名鳷鵲詩鶺鳹在原兄弟急難開顧注謂首句撇過烏鵲枝間原上皆指鶺鴒今考唐元間有鶺鴒數千集麟德殿柳樹翔棲浹日魏光乘作頌以為天子友愛之祥據此似亦可證枝間不去矣潘微詩津柳稍垂門陸機詩安得風帆深濯佛滅十自乾元元年至大厯二年為年黃生曰前半喜其至而又怨其不即至皆引領延佇時無可奈何之語嗔烏鵲之不靈已妙矣拋書示鶺鴒尤覺怪得竒三四是解上不是承上上意已明是承上意未完則須解也此詩末句一作撚絶始星星舊注引唐詩吟安一個字撚斷數莖髭又引謝靈運詩星星白髮垂為證撚絶之下去髭髮而用星星不巳晦乎且於始字亦解不去一作愁絶始星星吳論云因知愁絶之際細語星星也解亦拙澀或解云愁絶之時始覺白髮星星公頭白多年豈至此始白耶今得趙子常刻本作愁絶始惺惺黃生云愁絶愁死也惺惺蘇惺也言死去復生也此解當從晚登瀼上堂鶴注大厯二年三月公自赤甲移居瀼西詩云林花田麥當是其時作故躋瀼岸高頗免崖石擁開襟野堂豁繫音計馬林花動雉堞粉如一作似雲山田麥無隴春氣晚更生江流靜猶湧首敘瀼上春景麥起云故躋為遣悶而登也曰繫馬乃乘馬上山也無隴高低星散晚更生返照增妍靜猶湧波平流順以版築雉堞之盛周禮注雉長三丈高一丈蕪城賦江淹詩還望岨山田王僧逹詩麥壠多秀色草莊子春氣發而百生四序嬰我懷羣盜久相踵黎民困逆節天子渴垂拱所思注東北深峽轉修聳衰老自成病郎官未為冗凄其望吕葛不復扶又切夢周孔濟世數所主切嚮時斯人各枯冡次敘登高感懷不上六歎亂不能歸下六傷亂能救到夔已經一年故云四序時蜀有崔旰之亂京輔有周智光之亂故欲歸東北東北指洛陽若長安則在直北舊注誤如公以衰病謝官無復周孔之夢矣向時同事大臣才吕葛者嘗以濟世望之今其人各埋枯冡則羣盜何時得弭耶斯人承吕葛敕秋興賦四運代序據鶴注唐史大曆二年正月戊辰同華二州頃因盜民力凋殘宜給復二年一切蠲免黎民之困班謝靈運詩懷賢亦凄其吕葛謂吕望諸葛亮漢嗣書伏周孔之軌躅楚星南天黑蜀月西霧重安得隨鳥翎迫此懼將恐末將景情並收北星月言晚隂恐懼憂羣盜西南指夔州隨鳥往東也此章起段八句中段十二末段四句懼詩將恐將寄薛三郎中璩鶴注當是大厯二年春作詩時薛在荆州將北歸京師而寄贈之也薛唐會要天寶六年風雅古調科薛璩及弟注韓詩愈公達墓志父璩為尚書郎中贈給事中朱唐紀事據終禮部侍郎與韓志不合代杜臆解悶詩以薛郎中比何水部此又稱其蓋手而無一字傳世知唐詩遺逸者多矣人生無賢愚飄颻若埃塵自非得神仙誰克免從英華一作免危其身與子俱白頭役役一作沒沒常苦辛雖為尚書郎不及村野人前兩假賓主合敘此言作客飄零之狀矣上下四句虛實相應役役苦辛飄若埃塵不及野人難免勞身矣神蒿里曲聚精斂魄無賢愚庾信詩役役盡傷曹植詩能不懷苦辛憶昔村野人其樂音洛難具陳藹藹桑麻交公侯為等倫天未厭戎馬我輩本常貧子尚客荆州我亦滯江濱此言彼此客遊之故其上四想承平下四記離亂江公侯等倫猶貨殖傳言人皆與千戶侯等客荆滯二語起下陶潛詩桑麻日已長濱楚辭吟澤畔之江峽中一卧病瘧癘終冬春春復扶又切加肺氣此病蓋有因早嵗與蘇鄭痛飲情相親二公化為土嗜酒不失真余今委修短豈得恨命屯中兩假賓主分列此乃自敘衰病之况承上我滯句感病有因為傷故人而增劇二公以下有前後存亡之不失真性雖物化亦無憾矣而洙曰蘇鄭謂蘇源明鄭虔之莊子失吾道者上見光下為土委修短夀夭聽於天也東征賦修短之運愚智同兮靖恭委命唯吉凶兮聞子心甚壯所過信席珍上上聲馬不用扶每一作忽扶必怒嗔當作瞋賦詩賓客間揮灑動八垠乃知蓋代手才力老益神此言薛之心力過人承上子客句席珍人皆推重下言筋力之強才思之雄皆所謂心甚壯也漢書功業蓋代鮑照蕪城賦才力雄富青草洞庭湖東浮滄海漘君山可避暑况足采白蘋子豈無扁舟往復江漢津我未下去聲瞿唐空念禹功一作力勤末兩段仍用賓主合敘此想荆州風景惜已不能出峽也州鄭曰青草洞庭二湖俱在巴陵一統志君山在嶽西南洞庭湖中堯女湘君居此上有十二峯聽説松門峽吐藥攬衣巾高秋却束帶鼓枻視青旻鳯池日澄碧濟濟上聲多士新余病不能起健者勿逡巡上有明哲君下有行化臣此言欲去夔江與薛共商出處也行松門峽險為之驚心吐藥必深秋水落方可鼓枻東若朝寧之上有君有臣薛當乘時有為矣八余病應前肺氣健者應前心壯返此章前後四段各句中末二段各十句杜臆前照詩松門似晝圖蓋在夔江下流一聞説及至於吐藥而攬濕衣巾其險不下於瞿唐矣木華海賦飛迅鼓楫詩濟濟多士説袁紹傳董卓欲廢立紹勃然曰天下健者豈唯董公命明哲實作則衛宏詩序天下喜王化復行送惠二歸故居一作聞惠二過東溪二鶴注詩云崖蜜山杯當是大厯年春作東溪蓋指瀼東也洪駒父詩話劉路左車言嘗收得唐人雜編詩册有老杜送惠二歸故居詩即此也惠子白駒一作魚坡作驢瘦歸溪唯病身皇天無老眼空谷滯一作值斯人崖蜜松花熟一作白一作古山杯一作村醪竹葉新一作春柴門了無一作生事黃一作園綺未稱臣上四送惠歸溪惜之也下四溪中自適慰之也八與四應言雖在空谷之中不失為黃綺高風黃生注崖蜜山杯即柴門生事黃綺尚多一出惠乃未稱臣之黃綺更覺高於古人矣有詩皎皎白駒在彼空谷一四正用其語蔡琰曲天眼兮何不見我黃生注斯人亦從詩中伊人字變換避聲病也蜜本草白蜜一名崖蜜蓋蜂釀松花所成杜臆山蜂釀於高崖從山上縋人採之竹庾信詩山杯捧竹根協竹葉酒名張華輕薄篇蒼梧葉清宜城九醖酒張七命荆南烏程豫北竹葉黃注韓詩且可勤買拋青春坡公歷引唐時以春名酒者為證不知春之為義因酒熟於春而名之也下又云柴門亦本詩衡門之可以棲遲意來承聞河北諸道節度入朝音潮歡喜口號平聲絶句十二首朱注唐史大厯二年正月淮安節度使李忠臣入朝三月汴宋節度使田神功來朝八月鳯翔等道節度使李抱玉入朝河北入朝事史無明文疑公在夔州特傳聞而未實耳杜臆綱目代宗大厯元年冬十月帝生日諸道節度使上夀當指此事詩蓋作於二年三月也祿山作逆降天誅更有思明亦已無洶洶人寰猶不定時時戰鬬欲何須首章喜河北冦平小天寶之亂起於安史今元惡並除醜復何覬乎末句乃戒詞漢後漢書往者王莽作逆漢天人致誅六合相滅前馮奉世傳師不久暴而天誅亟決李德林集半天之下洶洶鼎沸患司馬相如諭巴蜀檄戰鬬之社稷蒼生計必安蠻夷雜種上聲錯相干周宣漢武今王是孝子忠臣後代看次章喜邊境初靜力安史既平戎狄亦退此君臣戮而民社奠安時也末句乃勸詞氏雜種指吐蕃回鶻黨羌言沈約詩雜種寇輪臺吕春秋此孝子忠臣親父交友之大事喧喧道路好童一作多歌謡河北將軍盡入朝音潮自一作始是乾坤王室正却教平聲一作交江漢客魂銷此聞諸鎮入朝而喜之也河北入朝出於道路童謡蓋據一時傳聞而言耳何趙曰客魂銷自傷流落不得還朝也吳均詩陌上喧喧以史記帝堯紀康衢童謡者淮南子諷之歌謡恨賦黯然銷魂唯别而已矣不一作北道去聲諸公無表來茫茫一作茫然庶事遣一作使人猜擁兵相學干戈鋭使去聲者徒勞萬里一作百萬回此遡往時不朝而惜之也心曰不道曰遣人猜據迹而疑其心也至是則諸鎮之迹可白矣朱注舊解引吐蕃陷京師諸鎮不入援者誤矣鳴玉鏘金盡正臣修文偃武不無人興王會靜俗作盡妖氛氣聖夀宜過平聲一萬春此喜其入朝而頌美君身也願正臣取其舍逆歸順偃武其永息干戈玩末句知當時入朝乃為聖夀節而來也西征賦飛翠綬拖鳴玉以出禁門者衆矣梁費昶詩鏘金驅響至孫楚辭正臣端其操行兮願尚書乃偃武修文世説皓爾汝歌上汝一杯酒汝夀萬春英雄見事若通神聖哲為心小一身燕平聲趙休矜出佳麗宫闈不擬選才人此因其朝獻而規諷君心也度大厯元年十月上生日諸道節使獻金帛器服珍玩駿馬共直緍錢二十四萬常衮請却之而帝不聽據此則諸鎮將有逢迎以獻佳麗者詩云英雄見事當指常衮言聖哲為心豫防逸欲也小一身言不侈天下以自奉孝經通乎神明左傳並建聖哲所古詩燕趙多佳人傳戰國䇿趙天下善為音佳麗之出也前漢翼奉未央建章甘泉宫才人各以百數唐制才人正二千石抱病江天白首郎空山樓閣暮春光衣冠是日朝音潮天子草奏何時一作人入帝鄉此遙聞入朝之事嘆不能身見也三章言武將入朝此章兼及在朝文臣子王莽傳孫竦為崇草奏顔注草謂創立其文莊華封人曰乘彼白雲至於帝鄉澶市連切漫山東一百州削成如案抱青丘包茅重平聲入歸關內王祭還供盡海頭已下三章備記入朝諸事此言節鎮朝而貢賦至也山東諸州即河北地包茅正供與進佳麗者不同泰西京賦澶浸靡迤作鎮於近澶漫廣逺貌山海經華之山削成而四方在削成雖云形勢亦指削平禍亂而言寰宇記青丘青州千乘縣齊景公田於青丘是也不左傳爾貢包茅入王祭不供代宗誤聽僕固懷恩之説留田承嗣等於河北遂成藩鎮跋扈之患自此以後幽薊十六州不入版圖幾六百年公之思深慮逺亦正在此也東逾遼水北滹一作呼沱星象風雲喜共一作氣色和紫氣關臨天地濶黃金臺貯俊賢多此言強域廣而人才盛也遼水滹沱亦河北地共和言一統大順函關西控可以收羅天地賢才矣平水經大遼水出塞外衛白平山東南入塞過遼東襄縣西又小遼水出玄莵高句麗縣遼山西南至遼隧縣入大遼水山海經大戲之山滹沱之水出焉後漢書注滹沱河在今代州繁畤縣東流經定州深澤縣東南一統志屬保定府束鹿縣史記周厲王出奔周公召公二相行政號曰共和黃注紫氣關即函谷關臺鮑照詩豈伊白璧賜將起金臺上谷郡圖經黃金在易水東南十八里足阮藉奏記俊賢抗漁陽突騎去聲邯鄲兒酒酣並轡金鞭垂意氣即歸雙闕舞雄豪復扶又切遣五陵知此言主將歸心而士卒效力也突騎健兒昔為賊黨者今為國用矣雙謂都中五陵指郊外酒杜臆此并開導諸道之叛卒後漢光武克邯鄲置高會從容謂馬武曰吾得漁陽上谷突騎欲今將之意唐書磁州有邯鄲縣屬河北道蔡雍陳留太守碑氣精朗晉書慕容翰性雄豪多權略李相去聲將軍擁薊門白頭惟有一作雖老赤心存竟能盡説音稅諸侯入知有從來天子尊此以河北入朝歸功李光弼也赤心存明其報國之忠説諸侯記其降叛之力今後漢書光武推赤心置人腹史記高帝紀吾而知天子之尊也朱鶴齡曰按史李懷仙先以范陽歸順是時為撿挍侍中幽州盧龍等軍節度使但未有説諸侯入朝夢弼謂是李光弼近之光弼在玄肅朝嘗加范陽節度使又嘗兼幽州大都督府長史雖止遙領其地亦可謂之擁薊門也十二年來多戰場天威已息陳堂堂神靈漢代中興主功業汾陽異姓王此以戡亂致治推崇郭子儀也十自天寶十四載至大厯二年首尾二年其間討安史父子却回紇吐蕃平僕固懷恩斬周智光等皆子儀百戰而後息兵獨以異姓王配中興主見其君臣一德始終無間也史左傳天威不達顔咫尺孝孫武子無擊堂堂之陳記黃帝生而神靈劉綽詩齊楚磐石貴韓盧異姓王王郭子儀傳寶應元年進封汾陽郡月三首此當是大厯二年六月初旬所作矣曰巫山曰二十四回則在夔州已二年曰半輪曰六上弦則是二年之六月矣斷續巫山雨天河此夜新若無青嶂月愁殺白頭人魍魎移深樹蝦蟆沒一作動半輪故園當北斗直想一作指照西秦此章見月而動歸思是詠初晴之月上嶂月新懸故旅愁暫解空照西秦則客愁仍在是玩月而喜下是思家而悲約移深樹避明月動半輪上弦月也故園指杜曲沈詩崚嶒起青嶂黃生注魍魎蝦蟆如此粗醜字惟少陵能用然終不可訓赤左傳注疏魍魎川澤之神也淮南子狀如三嵗小兒黑色赤目長耳美髮缺酉陽雜俎月中有金背蝦蟆居劉孝綽詩輪光不半秦城上當北斗公故所在併照一作點巫山出新窺楚水清羇棲愁裏見一作愁見裏二十四回明必驗升沉體如知進退情不違銀漢落亦伴玉繩橫此章見月而傷久客是通計兩年之月含併照字承上來照從月言舍下明字窺就人言下見公客夔二年故曰二十四回升沉進退乃二十四回中所見者升沉謂月有出沒進退謂月有盈虧上弦之月早升故夜違銀漢而先落下弦之月遲升故曉伴玉繩而猶橫二句言久暫遲速之不同正見其升沉進退也不亦二字活看謂不是如彼亦是如此他注謂望夜之月自昏待旦不落而常橫却於上文不相貫矣以羇棲愁對二十四乃借對法落庾信馬射賦橫弧於楚水之蛟鮑照詩銀漢傾露天文志杓三星為玉衡春秋元命苞玉衡北兩星為玉繩陶𢎞景水仙賦橫帶玉繩杜詩春星帶草堂取帶字為句腰亦伴玉繩橫又取橫字著句尾知每字各有來歷萬里瞿唐月一作峽春來上六弦時時開暗室故故滿青天爽合風襟靜高當淚臉懸南飛有烏鵲夜久落江邊此章對月而念孤棲是專論半年之月風杜臆中四有一喜一恨意時開暗室則喜之而爽合襟故滿青天則恨之而空當淚臉一月而分作兩般景隨情轉故也夜落江邊則無枝可棲借烏鵲以自傷飄泊王褒月詩上弦如半壁襟故故猶云屢屢見宋玉風賦有風颯然而至王乃披而當之張正詩淚臉年年流出烏鵲南飛魏武詩晨雨黃鶴依梁氏編在大厯二年今姑仍之小雨晨光內初來葉上聞霧交才灑地風折一作逆旋去聲隨雲暫起柴荆色輕霑鳥獸羣麝香山一半亭午未全分黃生曰光處始見葉上始聞體物既精而布置風雨雲霧四字能將是日景色曲折描出山色未分應上雲霧之趙汸注必霧起而方能灑地經風折而旋即隨雲細甚也此與煙添才有色風引更如絲相似蓋著題處所必用者曰暫曰輕皆言其細小夢自晨至午全詩皆用順寫工細入妙柴荆小木弼曰夔州圖經麝香山在夔州東南一百二十里山出麝香故名黃生曰讀微雨不滑道一章以為微雨難寫故多從題外著筆及閲此詩能字字實寫小雨以正靣還題真如化工肖物杜詩詳注卷十八
