body:
  text: 杜詩詳註巻二翰林院編修仇兆鰲撰飲中八仙歌黄鶴注蔡興宗年譜云天寶五載而梁權道編在天寶十三載按史汝陽王天寶九載巳薨賀知章天寶三載李適之天寶五載蘇晉開元二十二年並巳殁此詩當是天寶間追憶舊事而賦之未詳何年人蔡夢弼曰按范傳正李白新墓碑在長安時時以公及賀監汝陽王崔宗之裴周南等八人為酒中八仙公此篇無裴豈范别有稽耶知章騎馬似乗船眼花落井水底眠此極摹賀公狂態騎馬若船言醉中自得眼花落井言醉後忘軀興吳人善乗舟故以比乗馬舊唐書賀知章㑹稽永人自號四明狂客又稱秘書外監醉後屬辭動成巻軸文不加㸃咸有可觀天寶三載上疏請度為道士還鄉里越絶書夫越水行而山處以船為車以楫為馬何吳均雜句夢中難言見終成亂眼花張華詩三雅來遲耳熱眼中花抱朴子余從祖仙公每大醉輒入湥淵之底一日許乃出此條偽蘇注所引阮咸王祥事俱係妄撰今削去汝陽三斗始朝音潮天道逢一作見麯車口流涎恨不移封向酒泉三斗朝天醉後入朝也見麯流涎欲向酒泉甚言汝陽之好酒舊書讓皇帝長子璡封汝陽郡王與賀知章褚庭誨為詩酒之交行抱朴子管輅傾酒三斗而清辯綺粲漢樂府婦病道逢親交魏文帝與吳質書蒲萄釀以為酒甘於麯蘖道之巳流㵪咽唾㵪同涎陸機詩目苦濁鏡日流涎三秦記酒泉郡城下有金泉泉味如酒故名酒泉拾遺記羌人姚馥嗜酒羣軰呼為渴羌晉武帝擢為朝歌宰辭曰請辭朝歌之縣長充養馬之役時賜美酒以樂餘年帝曰朝歌紂之舊都地有酒池使老羌不復呼渴對曰老羌漸染王化若歡酒池之役更為殷紂之民帝大悦即遷酒泉太守此條偽蘇注所引北齊王詢及漢郭𢎞事亦係妄撰師氏又造為舊史拾遺之説並無根據左相去聲日興費萬錢飲如長鯨吸百川銜杯樂音洛聖稱避舊本作世邵氏聞見録作避賢費萬錢言其豪侈吸百川狀其縱飲樂聖避賢即述適之詩中語决舊書李適之雅好賓友飲酒一斗不亂夜則燕賞晝公務天寶元年代牛仙客為左丞相與李林甫爭權不叶五載罷知政事守太子少保與親知歡㑹賦詩曰避賢初罷相樂聖且啣杯為問門前客今朝幾個來七月貶宜春太守仰藥而卒黄希曰日費萬錢餉客之用皆出於此是也師氏謂唐時酒價每斗三百錢以萬錢計之當飲三石三斗有餘誤矣據本傳但云一斗不亂耳晉書何曾日食萬錢猶言無下箸處海左思吳都賦長鯨吞航修鯢吐浪木華海賦魚則横之鯨突兀孤游噏波則洪連踧蹜吹􅕙則百川倒流人劉伶酒德頌銜杯潄醪魏志醉客謂酒清者為聖濁者為賢人世説簡文曰請避賢路宗之蕭灑美少去聲年舉觴白眼望青天皎如玉樹臨風前宗之蕭灑丰姿超逸白眼望天席前傲岸之狀玉樹臨風醉後揺曳之態舊書崔宗之日用之子襲封齊國公李白傳侍御史崔宗之謫官金陵與白詩酒倡和北山移文蕭灑出塵之想阮籍詩朝為美少年之列子景公舉觴自罰子晉書阮籍任情不羈見禮俗士以白眼對之列至人者上闞青天夏甘泉賦翠玉樹之青葱世説毛曾與侯𤣥共坐時人謂蒹葭倚玉樹蘇晉長齋繡佛前醉中徃徃愛逃禪持齋而仍好飲晉非真禪直逃禪耳逃禪猶云逃墨逃楊是逃而出非逃而入杜臆云醉酒而悖其教故曰逃禪後人以學佛者為逃禪誤矣新唐書蘇晉珦之子數歲知為文房潁叔王紹宗歎曰後來之王粲也舉進士先天中為中書舍人𤣥宗監國所下制命多晉及賈曾槀定屢獻讜言天子嘉允厯户吏二部侍郎終太子庶子林續晉陽秋謝敷崇信釋氏以長齋供養為業徐陵䨇寺碑絶粒長齋之唐𢎞明集宋劉義隆時靈鷲寺有羣燕共銜繡像委堂内據此則繡佛之製乆矣此條師氏謂晉得胡僧所繡彌勒佛事亦屬偽撰李白一斗詩百篇長安市上酒家眠天子呼來不上上聲船自稱臣是酒中仙斗酒百篇言白之興豪而才敏登吳論當時沉香亭之召正眠酒家白蓮池之召扶以舟此兩述其事酒中仙兼述其語新唐書李白興聖皇帝九世孫天寶初至長安徃見賀知章知章見其文曰子謫仙人也言於𤣥宗召見金鑾殿奏頌一篇帝賜食親為調羮有詔供奉翰林白猶與飲徒醉於市帝坐沉香亭子欲得白為樂章召入而白已醉左右以水頮面稍解援筆成文婉麗精切帝愛其才數宴見范傳正李白新墓碑𤣥宗泛白蓮池公不在宴皇懽既洽召公作序時公巳被酒翰苑中命高將軍扶以登舟史記淳于髠傳臣飲一斗亦醉墨子周公朝讀百篇王晉書劉延之為始安郡與淵明二萬錢悉送酒家濬表先臣一日上其船王績醉鄉記中國以為酒仙張旭三杯草聖傳脱帽露頂王公前揮毫落紙如雲煙旭書為人傳頌故以草聖比之脱帽露頂醉時豪放之狀落紙雲烟得意疾書之興舊書吳郡張旭善草書好酒每醉後號呼狂走索筆揮灑變化無窮若有神助國史補旭飲酒輒草書揮筆而大呌以頭揾水墨中而書之醒後自視以為神異金壺記旭官右率府長史漢書朱愽案上不過三杯王愔文章志後漢張芝好草書學崔杜之法韋仲將謂之草聖不古樂府少年見羅敷脱帽着帩頭後漢西域傳莫露頂肘行李頎贈旭詩露頂據胡牀長呌三五聲落高允徵士頌揮毫頌德宗欽贈高允詩彈毫珠零紙錦粲潘岳楊荆州誄翰動若飛落紙如雲高彪詩抗志凌雲烟焦遂五斗方卓然高談雄辯驚四筵談論驚筵得於醉後見遂之卓然特異非沈湎於醉鄉者此詩參差多寡句數不齊但首尾中腰各用兩句前後或三或四閒錯成文極變化而仍有條理袁郊甘澤謠陶峴開元中家於崑山自製三舟客有前進士孟彦湥進士孟雲卿布衣焦遂各置僕妾共載遊山水滑稽傳淳于髠曰朋友交遊私情相語飲不過五六斗竟醉矣飛漢元帝紀卓然可觀庾信詩高譚變白馬雄辯塞狐謝贍詩四筵霑芳醴説此條師氏所引口吃之亦屬妄撰蔡絛寛夫詩話此歌眠字天字再押前字三押古未見其體叔父元度云歌分八篇人人各異雖重押韻無害亦周詩分章之意也章唐汝詢曰柏梁詩人各説一句八仙歌人各記一特變其體耳重韻何害學王嗣奭杜臆曰此係創格前古無所因後人不能描寫八公各極生平醉趣而都帶仙氣或兩句或三句四句如雲在晴空巻舒自如亦詩中之仙也之吳見思曰此詩一人一段或短或長似銘似贊合共為一篇分之各成一章誠創格也舊刻分類千家注多載偽蘇注大概以杜句為主添設首尾假託古人初無其事蔡傅卿編年千家本削去最快前軰如邵二泉焦弱侯多為偽註所惑後來五車韻瑞遂引作實事張邇可㑹粹又本韻瑞且於附㑹古人處妄添某史可謂巧于縁飾矣近日吳門所刻庾開府文集亦誤引偽注沿訛不覺亟當正之此篇所引偽蘇注數條㮣從芟却不使惑人高都䕶驄馬行按高仙芝平少勃律在天寶六載是年大食諸部七十二國皆降附八載入朝詩云飄飄逺自流沙至又云長安健兒不敢騎正其時也九載仙芝討石國俘其王以獻則知次年又徃邊疆矣此詩當是天寶八載所作黄云七載梁云十一載皆非漢書鄭吉傳吉威震西域遂并䕶車師以西北道故號都䕶都䕶之置自吉始焉注竝䕶南北二道故謂之都安西都䕶胡青驄聲價歘許勿切然來向東此馬臨陣乆無敵與人一心成大功此言驄馬在邊而有功行陣都舊唐書貞觀十七年置安西䕶府於西州顯慶三年移治龜兹國城于闐以西波斯以東十六都䕶府𨽻焉隋書西域吐谷梁有青海中有小山至冬冰合嘗得波斯馬放入海因生驄馬日行千里故時稱青海驄馬胡青驄猶淮南子所云胡駿馬古詩躑躅青驄馬廣韻驄馬青白色天赭白馬賦聲價隆振又歘聳擢以驚注歘忽也漢馬歌天馬來立無草徑千里循東道五戴暠詩刀環臨陣鳴史記項王謂亭長曰吾騎此馬歲所向無敵國語戮力一心大戴禮均馬力齊馬心應德璉慜驥賦展心力於知巳兮史記亷頗曰我為趙將有攻城野戰之大功功成惠養隨所致飄飄一作颻逺自流沙至雄姿未受伏櫪恩猛氣猶思戰塲利此言驄馬在廐而不忘戰伐兮赭白馬賦願終惠養䕃本枝縣曹植詩飄飄隨長風古元和郡縣志居延澤在張掖東北一千六百里即流沙天馬歌天馬徠從西極涉流沙不赭白馬賦弭雄姿以奉引櫪漢書李尋傳馬不伏櫪可以趨道注伏櫪謂伏槽而秣之西征賦何猛氣之咆勃固戰國策張儀曰魏之地勢戰塲也腕一作踠促蹄高如踣音匐鐵交河幾蹴曾同層冰裂五花散作雲滿身萬里方看平聲汗流血此言其形相精力之出羣賦上云流沙此云交河正見來自逺地也南都馬踠餘足相馬經馬腕欲促促則健蹄欲高高耐險峻齊民要術馬腕欲促而大其間纔容靽蹄欲得厚二三寸硬如石踣踏也邵注踣鐵言馬蹄之堅取元和郡縣志貞觀四年於漢車師前王地置交河縣界内交河為名交河源出縣北天山分流城下一統志今為西番火州地王洙注唐安西去交河七十里顧野王詩交河冰未堅趙曰東方朔神異記曰北方有層冰萬里厚百丈詩言交河有層積之冰馬幾度蹴踏之而破裂也舊引顔賦經𤣥蹄而雹散厯素皮而冰裂非是葢賦謂騎射耳𤣥蹄素皮皆射帖名而雹散冰裂皆射帖聲與馬踏冰裂之義無涉元名畫録開元内廐有飛黄照夜浮雲五花之乗毛丹子步天歌五箇花文王良星李白集注五花馬色也又郭若虚云五花者剪鬃為瓣或三花或五花白樂天詩馬鬛剪三花此另一説天馬歌經萬里兮歸有德汗漢書李廣利獲汗血馬來注大宛舊有天馬種蹋石血汗從前肩髆小孔中出如血趙曰汗血之姿非萬里無以見長安壯兒不敢騎走過掣電傾城知青絲絡頭為去聲君老何由却出横孟康音光門道末用感慨作結即老驥伏櫪志在千里之意此此章四段各四句始鄭氏曰長安古雍州地漢始都崔豹古今注秦皇有七馬一曰追電隋書長孫晟為總管突厥畏之見其赤馬稱為閃電趙注此言馬行如電舉國皆知耳舊引傅𤣥詩童女掣電策童男挽雷車非其義馬孫楚詩傾城逺追送注傾猶盡也送古樂府青絲纒尾黄金絡馬頭漢西域傳百官至横門外三輔黄圖長安城北由西頭第一門曰横門其外有橋曰横橋程大昌雍録自横門渡渭而西即是趨西域之路驅逺注出横門道言欲馳於戰場張綎曰凡詩人題咏必胸次高超下筆方能卓絶此詩雄姿未受伏櫪恩猛氣猶思戰場利青絲絡頭為君老何由却出横門道如此狀物不唯格韻特高亦見少陵人品若曹唐病馬詩一朝千里心猶在曽敢潛忘秣飼恩乃乞兒語也真王嗣奭曰與人一心成大功此盛贊馬德即所謂堪託死生也下文猛氣思戰塲萬里看流血壯兒不敢騎却出横門道節節俱蒙此意寫得雄駿絶倫語不驚人死不休洵足空前絶後矣胡應麟曰七言古詩概曰歌行余漫考之歌之名義由來逺矣南風擊壤興於三代之前易水越人作於七雄之世而篇什之盛無如騷之九歌皆七古所始也漢則安世房中郊祀鼔吹咸係歌名竝登樂府或四言上規風雅或雜調下倣離騷名義雖同體裁則異孝武以還樂府大演隴西豫章長安京洛東西門行等不可勝數而行之名於是著焉較之歌曲名雖小異體實大同至長短燕鞠諸篇合而一之不復分别又總而目之曰相和等歌則知歌者曲調之總名原於上古行者歌中之一體創自漢人明矣又曰今人例以七言長短句為歌行漢魏殊不爾也諸歌行有三言者郊祀歌董逃行之類四言者安世歌善哉行之類五言者長歌行之類六言者上留田妾薄命之類純用七字而無雜言全取平聲而無仄韻則栢梁始之燕歌白紵皆此體自唐人以七言長短為歌行餘皆别類樂府矣又曰歌行兆自大風垓下四愁燕歌而後六代寥寥至唐大暢王楊四子婉轉流麗李杜二家逸宕縱横又曰闔闢縱横變幻超忽疾雷震電凄風急雨歌也位置森嚴筋脉聨絡走月流雲輕車熟路行也太白多近歌少陵多近行又曰李杜歌行擴漢魏而大之而古質不及盧駱歌行衍齊梁而暢之而富麗有餘冬日洛城北謁𤣥元皇帝廟鶴注天寶二年三月壬子親祀𤣥元廟改西京𤣥元廟為太清宮東京廟為太微宮天下為紫微宮據舊史改廟為宮巳在二年題曰𤣥元皇帝廟仍舊稱也五聖聨龍衮是天寶八載閏六月事題云冬日當是其冬作葢天寶九載公歸長安進三大禮賦不在洛陽矣朱注此詩所詠即太微宮也作於加諡五聖之後當在八載之冬封演見聞記高祖武德三年晉州人吉善行於羊角山見白衣老父呼謂曰為吾語唐天子吾是老君即汝祖也今年無賊天下太平高祖即遣使致祭立廟其地唐書高宗乾封元年幸亳州詣老君廟追尊為𤣥元皇帝開元二十九年制兩京諸州各置𤣥元皇帝廟天寶元年陳王府叅軍田同秀上書𤣥元皇帝降於丹鳯門之通衢告錫靈符在尹喜故宅上遣使就函谷關尹喜臺西發得之乃置𤣥元廟於大寜坊東都於積善坊臨淄舊邸親享新廟配極𤣥都閟憑高一作虚禁籞一作禦正異作籞長守祧嚴具禮掌節鎮非常碧瓦初寒外金莖一氣旁山河扶繡户日月近雕梁首段記廟制之尊嚴邙趙曰廟在洛城北故云配極洙曰廟在北山故云憑高趙曰尊老君為聖祖故謂守祧符騐以備非常故得掌節拱碧瓦外覆寒氣先侵矣金莖旁列一氣上通矣山河户形其雄壯日月近梁狀其高華曰史記始皇為極廟象天極索隱曰為宫廟象天極故極廟李嶠詩配極光輝逺殿康駢劇談録東都北邙山有𤣥元觀南有老君廟臺高敞下瞰伊洛道藏道君處大𤣥都坐高葢天雲笈七籤三洞經𤣥都上有九曲崚嶒鳯臺瓊房玉室處於九天之上玉京之陽張正見詩𤣥都府内駕青牛一望詩閟宮有洫注閟湥閉也籞王僧孺詩憑高且羽獵賦禁禦所營漢紀注者禁苑之遮衛也後漢紀注折竹以繩懸連之使人不得徃來今作籞周禮守祧掌守先王先公之廟祧注遷主所藏曰祧唐書老君廟置令丞各一員周史記蕭何曰王若欲拜大將具禮乃可此借用字禮掌節掌守邦節而辯其用注節猶信也行者所執之信詩史記備他盜之出入與非常也亦借用字劉騊駼縹碧以為瓦碧瓦琉璃瓦也以謝靈運燕歌行孟冬初寒節氣成也西都賦抗仙掌承露擢䨇立之金莖注金莖銅柱郊祀志漢武作柏梁銅柱承露仙人掌之屬朱注曹子建集明帝詔有司鑄銅建承露盤於芳林園莖長十二丈大十圍使植作頌銘則洛城金莖固有之矣後莊子通天下一氣耳西征賦化一氣而甄三才陳主詩日月光天德山河壯帝居歌舞影賦耀金波兮繡户檀約陽春白日映雕梁仙李蟠根大猗蘭奕葉光世家遺一作貽舊史道德付今王此推言廟祀之由唐奉老君為聖祖故言根大而葉盛史記不載於世家故云遺舊史明皇嘗注道德經故云付今王神仙傳老子生而能言指李樹曰以此為我姓老子内傳太上老君姓李名耳字伯陽其母見日精下落如流星飛入口中因有娠七十二歲於陳渦水李樹下剖左掖而生老述異記中山有縹李大如拳者呼為仙李又云瀨鄉子祠有紅縹李一李二色老唐太宗探得李詩云盤根植􅘵渚交榦倚天舒庾信子廟詩盤根古樹底漢武故事帝以乙酉年七月七日旦生於猗蘭殿先是景帝坐崇芳閣見赤氣如林來蔽户牖乃改閣為猗蘭殿曹植王仲宣誄伊昔顯考奕葉佐時注奕不絶之稱伯唐㑹要開元二十三年敕升老子莊子為列傳首居夷之上下西京賦雅好博古學乎舊史氏演史記老子著書上篇言道徳之意五千餘言封聞見記開元二十一年明皇親注道德經令學者習之書今王嗣有令緒畫手看平聲前軰吳生逺擅塲森羅移地軸妙絶動宮墻五聖聨晉作連龍衮千官列一作引雁行音杭冕旒俱秀發旌斾盡飛揚此記繪畫之精工移地軸言山水逼真動宮墻言殿宇生色冕旒承龍衮從衣及冠也旌斾承千官由扈從及儀仗也原注廟有吳道子畫五聖圖其朱景𤣥名畫録吳道𤣥字道子東京陽翟人明皇知名召入内供奉吳生凡畫人物佛像神鬼禽獸山水臺殿草木皆冠絶於世國朝第一厯代名畫録吳道子學書不成因工畫張懷瓘每云吳生之畫下筆有神是張僧繇後身官至寧王友利孔融與曹操書今之少年喜謗前軰東京賦秦政觜長距終得擅塲曹植詩常得擅此塲論黄山谷云能於前軰中擅塲不獨爭長時軰也肇萬象森羅海賦地軸挺拔而争逈春秋元命苞地有三千六百軸互相牽制續晉陽秋顧愷之尤好丹青妙絶於時應璩詩侈靡在宮墻高通鑑天寶八載六月上以符瑞相繼皆祖宗休烈上祖諡曰神堯大聖皇帝太宗諡曰文武大聖皇帝高宗諡曰天皇大聖皇帝中宗諡曰孝和大聖皇帝睿宗諡曰𤣥貞大聖皇帝康駢劇談録𤣥元觀壁上有吳道子畫五聖真容及老子化胡經事丹青絶妙古今無比淮南子此五聖者天下之盛王禮器天子龍衮緑荀子天子千官佺記兄之齒雁行旒又天子之冕朱藻十有二旒沈期詩朝光映冕蜀都賦王褒暐曅而秀發大孔德璋詩風交旌斾揚漢高帝歌風起兮雲飛揚翠柏湥留景與影同紅梨逈得霜風筝吹玉柱露井凍英華作動銀床此兼敘冬日之景銀柏耐寒而色留梨得霜而葉落吹王柱風冽簷前凍床冰凝井榦也水經注翠柏䕃峯謝朓松賦懷風音而送聲當月路而留景風庾肩吾詩梨紅大谷晚郭知達注風筝謂挂筝於際風至則鳴也楊慎丹鉛録古人殿閣簷稜間有風琴風筝皆因風動成音自叶宮商或曰風筝簷鈴也俗謂呼風馬兒朱注唐人有風筝詩前説是李白詩兩廊振法皷四角吟風筝趙柳惲詩秋風吹玉柱袁淑正情賦陳玉柱之鳴筝曰露井露地之井古樂府桃生露井上庾樂府淮南王篇後園鑿井銀作牀金瓶素綆汲寒漿肩吾詩銀牀落井桐朱注舊以銀牀為井欄名義考銀牀乃轆轤架非井欄也身退卑周室經傳拱漢皇谷神如不死養拙㪅何鄉一作方凟末乃追論老子以見祀之不經身退二句言人徃而道存谷神二句言神藏而迹隱結含諷意此章起首中間各八句前後三段各四句老子道德經功成名遂身退天之道八列仙傳老子生於殷時為周柱下史轉為子藏史積百餘年後周德衰乃乗青牛車而去入大秦紀孔叢子今周室卑微道高士傳經傳世國老氏聖圖河上公授漢文帝德二經㫖奥帝齋戒受之神仙傳漢孝景讀老子經有所不解以問河上公公乃授素書二巻拱漢皇謂端拱而受此書元老子谷神不死是謂𤣥牝按谷神謂身中空竅處有神也即丹田之説故庾信詩云虛無養谷神舊解谷為養則谷神上不當更加養字矣何潘岳閒居賦仰衆妙而絶思終優游以養拙莊子不樹之於無何有之鄉張表臣珊瑚鉤詩話陳無巳先生語余曰今人愛少陵詩一句之内至竊取數字以髣像之非善學者學詩之要在乎立格命意用字而巳予曰如何等是曰冬日謁𤣥元皇帝廟詩敘述功德反覆伸意事核而理長閬中歌辭致峭麗語脉新竒句清而體好兹非立格之妙乎江漢詩言乾坤之大腐儒無所寄其身縛雞行言雞蟲得失不如兩忘而寓於道兹非命意之湥乎贈希魯云輕身一鳥過力在一過字徐步詩云花蘂上蜂鬚力在一上字兹非用字之精乎學者體其格高其意練其字則自然有合矣何必規規然髣像之乎故武衛將軍挽詞三首此詩梁氏編在天寶十四載是年十一月安禄山巳反而詩中並無傷亂之詞知其非此時矣黄氏據通鑑八載冬冰合遂以此証黄河十月冰按詩意本謂塞外河冰引証未合大抵屬未亂以前之詩其年數巳不可考矣又按開元天寶間府兵罷折衝停民間挾兵器者有禁王者今無戰正指其時葢天寶六七載時在京師作也自此以後邊將多尚戰功矣衛鶴注武衛將軍之名起於魏許禇唐書左右武大將軍各一員將軍各一員掌統領宮禁警衛之法柩譙周法訓挽歌出於田横之門人挽而行因謂之挽歌嚴警當寒夜前軍落大星壯夫思敢陳作敢一作感決哀詔惜精靈王者今無戰書生巳勒銘封侯意疎濶編簡為去聲誰青首章記初喪情事星上四言身殁可哀下四言功存足述夜落將見其有關氣運敢決念生前精靈傷死後無戰世際承平勒銘立碑墓道意疎濶褒封絶望為誰青史簡足傳也杜臆封侯句無限感慨與漢文帝惜李廣不遇時者同意將武衛主警衛宮禁故云嚴警魏志太后令曰馳語大軍得先嚴警梁武帝詩調校輟寒夜星諸葛武侯與步隲書僕前軍在五丈原晉陽秋有赤而芒角自東北徃西南投於諸葛亮營俄而亮卒注揚子壯夫不為折吳都賦舜禹精靈留其山河盧是時罷府兵停衝禁民間挾兵器故云今無戰為淮南王安書王者之師有征無戰晉書蘇峻傳少書生有才學蔡邕張伯雅祠堂碑假石勒銘此謂墓銘也舊引班固作燕然山銘勒石紀功未合後漢梁竦傳大丈夫生當封侯死當廟食歆賈誼鵩賦制度疎濶王右軍書論疎濶相間新劉責太常書或脱簡或脱編劉孝標書青簡尚舞劍過平聲人絶鳴弓射音石獸能銛音纖鋒行愜順猛噬失蹻丘妖切騰赤羽一作雨千夫膳黄河十月冰横去聲行沙漠外神速至今稱次章憶生前忠勇承上思敢决猛鋒利而師行皆順此劍之雄中箭而獸失威此弓之㨗操此絶技率衆渡河直能横行沙漠矣羽杜臆行惬順謂所向如意失蹻騰謂應弦倒獸赤旗下千夫㑹膳言孤軍湥入塞外黄河十月冰凍見不避苦寒此正形容其横行神速漢書項莊請以劍舞前漢鼂錯傳皇太子材智高竒馭射伎藝過人絶逺隂鏗詩戰士夜鳴弓西京賦胸突銛鋒西都賦掎僄狡扼猛噬夢弼云猛噬猛虎之齧噬者盧注謂即飲羽意猶曹景宗云放箭如餓鷂呌澤中此欲配合銛鋒耳失之纎巧若蹻騰壯躍之貌劉家語子路曰願得白羽若月赤羽日注羽旗也按㑹孟以赤羽為塞雁不知十月時雁巳南翔矣壯千夫指軍士漢牧誓千夫長百夫長虞世南詩冰黄河絶前樊噲傳臣願得十萬衆横行匈奴中後晉書張賓謂石勒曰用兵貴神速勿時也哀挽青門去新阡絳水遙路人紛雨泣天意颯風飈部曲精仍鋭匈奴氣不驕無由覩雄畧大樹日蕭蕭三章想死後餘威承上惜精靈而上四言歸櫬堪傷下四言邊功猶在哀挽挽喪車哀慟也三輔黄圖長安城東出南頭第一門曰霸城門民見其青色因名青城門氏崔融詩京兆新阡闢扶陽甲第開原涉傳京兆尹曹塟茂陵謂京兆阡涉慕之起父冢表曰原氏阡阡墓表也水經注絳水出絳山西北流注於澮應劭曰絳水出絳縣西南邵注絳州去長安六百里曹阮瑀詩悲聲感路人趙曰諸葛亮亡人皆野哭植誄延首嘆息雨泣交頥喪尚德緩刑書以應天意光庾仲初弔賈誼文飇風獨爾雅風從下上曰飈武紀注大將軍營有五部三校尉部下有曲曲有軍候一人鋭晉書劉牢之傳領精鋭為前鋒精仍鋭精力仍然勇也通鑑燕梁琛謂符堅曰吳王垂雄畧冠世折衝禦侮大樹暗用馮異事見首巻此詩次章云横行沙漠外將軍葢能立功邊外者首章則云封侯意疎濶末章又云大樹日蕭蕭是能有功而不伐者異於邊將之邀功生事矣公特表而出之以致湥惜焉贈翰林張四學士垍音既溪鶴注天寶十三載垍貶盧郡司馬旋召還遷太常卿題云贈翰林張學士則在未貶司馬前詩云此生任春草垂老獨漂萍意是天寶九載自河南歸時作是時未獻賦故詩不及之梁權道編在十四載非舊唐書張説傳二子均垍皆能文唐㑹要𤣥宗始選朝官有詞藝學識者入居翰林供奉别㫖制詔書敕猶或分在集賢開元二十六年始以翰林供奉改稱學士别建學士院俾專内命太常少卿張垍起居舍人劉光謙等首居之而集賢所掌由是罷息翰林逼華葢鯨力破滄溟天上張公子宮中漢客星首敘翰林張垍垍逼華葢其位高破滄溟其勢大宰相之子故云公子尚公主故比客星唐㑹要翰林院在銀臺門内麟德殿西廂重廊之後學士院在翰林院之南别户東向晉天文志大帝上九星曰華葢所以蔽覆大帝之座也葢下九星曰杠葢之柄也蔡邕傳擁華葢而奉皇極洙曰逼言宻邇帝座海賦魚則横海之鯨突兀孤游吳都賦徽鯨背中於羣犗注徽鯨魚之有力者趙曰破如宗慤所云乗風破浪之破謝朓箋滄溟未運波臣自蕩每漢書成帝時童謡曰燕燕尾涎涎張公子時相見帝微行出常與張放俱稱富平侯家故曰張公子嚴蜀志出師表宮中府中皆為一體後漢書光武與光共卧太史奏客星犯帝座甚急宗懔荆楚歲時記漢武帝令張騫使大夏尋河源乗槎經月而至一處見一女織一丈夫牽牛飲河織女取支機石與騫而還明庾肩吾江州詩漢使俱為客星槎共逐流虞茂賦昆池織女石詩船疑海槎渡珠似客星來徐陵詩張星舊在天河上由來張姓本連天俱用此事張逺注此乃切張姓而用舊引嚴光與此不切今按公贈太常卿張垍詩能事聞重譯嘉謨及逺黎葢嘗奉使於外故有宮中漢客星句耳舊唐書垍尚寧親公主𤣥宗特加恩寵許於禁中置内宅侍為文章賦詩拾翠殿佐酒望雲亭紫誥仍兼綰黄麻似六經内頒舊作頒一作分金帯赤恩與荔枝青次敘才華寵遇多賦詩二句居禁地也紫誥二句優文翰也内分二句恩眷也魏文帝詩賦詩以寫懷兩京新記大福殿在麟德殿北拾翠殿在大福殿東南漢高帝本紀上置酒沛宮召故人父老子弟佐酒應劭曰助行酒臺長安志大福殿拾翠殿西内延嘉殿西北有景福臺西有望雲亭王洙注紫誥謂以紫泥封誥黄麻謂寫誥詞於黄麻紙上詔隴右記武都紫水有泥其色紫而粘用貢封璽書故誥有紫泥之美西京雜記漢以武都紫泥為璽室加緑綈其上年唐㑹要中書以黄白二麻為綸命重輕之辯開元三十月始用黄麻紙寫詔上元三年二月制敕並用黄麻紙李肇翰林志故事中書舍人專掌詔誥開元間始置學士大事直出中禁不由兩省凡制用白麻紙詔用白籐紙書用黄麻紙東都賦按六經而校德鶴注制誥本集賢學士領之今翰林學士得分掌故云兼綰寫誥詞於黄麻訓詞謹嚴如六經薛蒼舒曰自别置學士院以專掌内命其後選用益重而禮遇益親至號為内相凡充其職者無定員自諸曹尚書下至校書郎皆得與選入院一歲則遷知制誥班矣内宴則居宰相之下一品之上唐書緋為四品服淺緋為五品服竝金帶但􅙧數别在朱注唐書貴妃嗜生荔枝明皇置驛傳送垍尚主宅禁中得與此賜所謂恩與荔枝青也海録碎事載戎州出緑荔枝肉熟而皮猶綠曽子固荔枝狀云江家緑出福州又色紅而有青班者名虎皮亦出福州荔枝青殆即此類乎舊注引楊文公談苑荔枝金帶乃是宋制且與上句複出李肇國史補張均兄弟俱在翰林垍以尚主獨賜珍玩以誇於均均曰此乃婦翁與女婿固非天子賜學士也無復扶又切隨高鳯空餘泣聚螢此生任讀平聲春讀上聲周禮梓人春以功草垂老獨漂萍儻憶山陽㑹悲歌在一聽平聲意末乃自敘結出贈詩不能隨鳯高騫依然聚螢勵志耳春草歎卑微漂萍傷流落山陽㑹望其念舊聽悲歌諷其汲引此章四句起下二段各六句高鳯詩鳯凰鳴矣于彼高岡顔延之秋胡詩椅梧傾晉書車𦙍家貧不常得油夏月以練囊盛數十螢火照書讀顔氏家訓古人勤學照雪聚螢鮑梁元帝詩既看春草歇蔡邕房楨碑享年垂老令暉詩流漂萍無根後魏氏春秋嵇康寓居河内山陽與王戎向秀同遊秀經康山陽舊居作思舊賦史記項羽紀悲歌慷慨公韓非子一聽而㑹樂音洛遊園歌英華題作晦日賀蘭楊長史筵醉歌張綖曰天寶十載公獻賦詔試集賢院為宰相所忌得參列選序詳詩中聖朝巳知賤士醜似當在此歲作鶴注唐以正月晦日三月三日九月九日為三令節德宗時李泌請廢正月晦日以二月朔為中和節漢書神爵三年起樂遊苑注三輔黄圖云在杜陵西北長安志樂遊苑在京兆萬年縣南八里亦曰樂遊原洙曰西京記樂遊園漢宣帝所立唐長安中太平公主於原上置亭遊賞其地四望寛敞每三月上巳九月重陽士女戲就此袚褉登高幄幕雲布車馬填塞虹彩映日馨香滿路朝士詞人賦詩翌日傳於京師樂遊古園崒昨律切一作萃森爽煙綿碧草萋萋長丁丈切公子華筵勢最高秦川對酒平如掌首從宴園叙起川木森草碧言近景秦如掌言逺景惟地勢高故一望皆見也崒山危峻貎子虛賦隆崇嵂崒森爽森疎而爽豁鮑照詩岫逺雲烟綿谷屈泉靡迤指江淹别賦春草碧色兮楚辭芳草生兮萋萋公子楊長史楚辭思公子不敢言三秦記長安正南秦嶺嶺根水流為秦川一名樊川周王褒詩遥遥秦川水曹孟德詩對酒當歌長安志樂遊原居京城之最高四望寛敞京城之内俯視如掌沈佺期詩秦地平如掌長生木瓢示英華作樂真率㪅調鞍馬狂一作雄歡賞青春波浪芙蓉園白日雷霆夾一作甲城仗閶闔晴開詄大結切舊作昳趙定作詄英華同蕩蕩曲江翠幙排銀牓拂水低回舞袖翻縁雲清切歌聲上上聲勝次記園中景亊曲酌瓢之後調馬而行得以盡覽諸芙蓉苑夾城道江池此明皇遊幸之處仗過門開翠幕銀牓舞袖歌聲皆園前所聞見者晉杜臆西京雜記載上林苑有長生木葢以木為瓢也嵇含有長生木賦鄴中記金華殿後種䨇長生樹八九月乃生花花白子黒大如橡子世人謂之長生樹世説王懷祖直以真率少許便足對人多多許行抱朴子馬不調造父不能超千里之迹謝靈運歌心歡賞兮歲易淪江曹植詩白日曜青春春張禮遊城南記芙蓉園在曲西南與杏園皆秦宜下苑地園内有池謂之芙蓉池唐之南苑也夾兩京新記開元二十年築夾城入芙蓉園自大明宮亘羅城複道經通化門觀以達興慶宫次經春明延喜門至曲江芙蓉園天易鼓之以雷霆楚辭倚閶闔而望予漢禮樂志門開詄蕩蕩漢書注詄讀如迭又舊注詄緩也於義不切如淳云詄蕩蕩天體清堅之狀亦於詄字無涉一本作泆猶云蕩泆也挂潘岳籍田賦翠幙黙以雲布北史姚萇張翠幙繡簾金篆銀牓張正見詩銀牓映仙宮潘尼詩倉卒低迴縁張正見詩舞袖飄金谷歌聲繞鳯臺光殿賦雲上征飛燕外傳音詞舒閑清切魯靈西京雜記高帝令戚夫人作出塞望歸之曲後宮齊唱聲入雲霄却憶年年人醉時只今未醉已先悲數莖白髮那抛得百罰一作刻湥杯辭從英華一作亦不辭聖朝音潮亦一作巳一作但知賤士醜一物但從英華一作自荷去聲皇天慈一作私此身飲罷無歸處獨立蒼茫自咏詩末乃借酒遣懷憐上四歎年衰下四慨不遇也矣朝已見棄而天猶見假以一飲之縁其無聊亦甚此章四句起下兩段各八句漢列子景公舉杯自罰享陳後主詩杯湥猶恨稀後馮衍説鄧禹書聖朝堯舜之榮酒揚子曰秦之士也賤陸機云𤣥冕無醜士悲一物指猶陶公云杯中物江淹詩一物之微有足者楚辭皇天無私阿兮以庾信詩蒼茫落餘暉朱異詩值塞野之蒼茫趙注蒼茫為荒寂貌杜臆謂蒼茫詠詩乃勃然得意處引公詩蒼茫興有神為証今按上文語涉悲凉末作發興語方見後勁同諸公登慈恩寺墖鶴注梁氏編在天寶十三載不知何據應在禄山䧟京師之前十載奏賦之後第原注時高適薛據先有作兩京新記京城東一街進昌坊慈恩寺隋無漏寺故地西院浮屠六級高三百尺永徽三年沙門𤣥裝所立長安志慈恩寺在萬年縣東南八里高標跨蒼穹一作天烈風無時休自非曠一作壯士懷登兹翻百憂首言墖不易登領起全意迴墖高故凌風百憂憫世亂也蜀都賦陽鳥翼乎高標爾雅穹蒼蒼天也郭璞曰天形穹窿其色蒼蒼丹元子步天歌昭昭列象布蒼穹古樂府暮秋烈風起鮑照詩安知曠士懐王粲登樓賦登兹樓以四望兮聊暇日以銷憂此云翻百憂葢翻其語也詩逢此百憂方知象教力足一作立可追㝠搜仰穿龍蛇窟始音試出英華作驚枝撑幽此敘登墖之事搜象教建墖者㝠搜登墖者穿窟出穴所謂㝠也盧注磴道屈曲如穿龍蛇之窟厯盡盤錯始出枝撑之幽象王巾頭陀寺碑正法既没象教凌夷注象教言為形以教人也孫綽天台山賦序夫非逺寄㝠搜何肯遥想而存之枝謂此墖真可追攀而㝠搜也王延夀魯靈光殿賦撑权枒而斜據注枝撑交木也黄山谷曰墖下數級皆技撑洞黒出上級乃明七星在北户一作户北河漢聲西流羲和鞭白日少去聲昊行清秋秦一作泰非山忽破碎涇渭不可求俯視但一氣焉於䖍切能辯皇州此記登墖之景川上四仰觀於天見象緯之偪近下四俯視於地見山之微渺總是極摹其高星河夜景西流秋候之象羲和晝景鞭日秋光短促也忽破碎謂大小錯雜不可求謂清濁難分皇州莫辯薄暮陰翳矣史記天官書北斗七星所謂璇璣玉衡以齊七政春秋運斗樞斗第一天樞第二璇第三璣第四權第五衡第六開陽第七瑶光河吳都賦開北户以向日魏古詩河漢清且淺廣雅天謂之天漢亦曰河漢文帝詩天漢回西流昭楚辭吾令羲和弭節王逸注羲和日馭也明又白日只月令孟秋之月其帝少昊潘尼詩朱送夏少昊迎秋輿殷仲文詩獨有清秋日之朱注秦山指終南諸山廣記藍田有秦嶺乃南山脊若隴西秦山與此相去甚逺涇賈誼旱雲賦正雲布而雷動兮相擊衝而破碎詩以渭濁鮑照詩涇渭不可雜鶴注涇渭乃關西大川韋朝宗引渭水入金光門置漕於西市魏文帝詩俯視清水波西征賦化一氣而甄三才州鮑照詩表裏望皇皇州帝都也迴首呌虞舜蒼梧雲正愁惜哉瑶池飲一作燕日晏一作宴非崑崙丘黄鵠去不息哀鳴何所投君看隨陽雁各有稻粱謀末乃登墖有感所謂百憂也迴首二句思古以虞舜蒼梧比太宗昭陵也惜哉二句傷今以王母瑶池比太真温泉也朱注末以黄鵠哀鳴自比而歎謀生之不若陽雁此葢憂亂之詞望此章前二段各四句後二段各八句王粲詩回首長安杜詩博議高祖號神堯皇帝太宗受内禪故以虞舜方之朱注兩京新記載慈恩寺浮屠前階立太宗三藏聖教序碑迴首呌舜寓意在太宗舊謂泛思古聖君者非也淵記舜塟於蒼梧之野山海經南方蒼梧之丘蒼梧之中有九疑山舜所塟在長沙零陵界中詩文選注歸藏啟筮有白雲出自蒼梧入於太梁謝朓雲去蒼梧野江總詩雲愁數處黒崙程嘉燧曰明皇遊宴驪山皆貴妃從幸故以日晏崑諷之魏文帝詩惜哉時不遇列子穆王升崑崙之丘以觀黄帝之宮遂賓於西王母觴於瑶池之上乃觀日之所入日行萬里鮑照詩夕飲乎瑶池史記張湯傳日晏天子忘食園韓詩外傳田饒謂魯哀公曰夫黄鵠一舉千里止君池啄君稻粱君猶貴之以其從來逺也故臣將去君黄鵠舉矣晉黄鵠曲黄鵠參天飛半道還哀鳴沈約詩驚麏去不息禹貢陽鳥攸居注隨陽之鳥鴻雁之屬三山老人胡氏曰此詩譏切天寶時事也秦山忽破碎喻人君失道也涇渭不可求言清濁不分也焉能辯皇州傷天下無綱紀文章而上都亦然也虞舜蒼梧思古聖君而不可得也瑶池日晏謂明皇方耽於淫樂而未巳也賢人君子多去朝廷故以黄鵠哀鳴比之小人貪禄戀位故以陽雁稻粱刺之同時諸公登墖各有題詠薛據詩巳失傳岑儲兩作風秀熨貼不愧名家高達夫出以簡淨品格亦自清堅少陵則格法嚴整氣象峥嶸音節悲壯而俯仰高湥之景盱衡今古之識感慨身世之懷莫不曲盡篇中真足壓倒羣賢雄視千古矣界三家結語未免拘束致鮮後勁杜於末幅另開眼獨闢思議力量百倍於人岑參詩云墖勢如湧出孤高聳天宮登臨出世界磴道盤虚空突兀壓神州崢嶸如鬼工四角礙白日七層摩蒼穹下窺指高鳥俯聽聞驚風連山若波濤奔走似朝東青松夾馳道宮觀何玲瓏秋色從西來蒼然滿關中五陵北原上萬古青濛濛淨理了可悟勝因夙所宗誓將掛冠去覺道資無窮儲光羲詩云金祠起真宇直上青雲垂地靜我亦閒登之秋清時蒼蕪宜春苑片碧昆明池誰道天漢高逍遥方在兹虚形賓太極携手行翠微雷雨傍杳㝠鬼神中躨跜靈變在倐忽莫能窮天涯冠上閶闔開履下鴻雁飛宮室低邐迤羣山小參差俯仰宇宙空庶幾了義歸崱屴非大厦乆居亦以危高適詩云香界泯羣有浮圖豈諸相登臨駭孤高披拂欣大壯言是羽翼生逈出虚空上頓疑身世别乃覺形神王宮闕皆户前山河盡簷向秋風昨夜至秦塞多清曠千里何蒼蒼五陵鬱相望盛時慙阮步末宦知周防輸效獨無因斯焉可遊放投簡咸一作成非華去聲兩縣諸子鶴云梁氏編在上元二年成都作葢以成為成都華為華陽唐志成都華陽兩縣為附郭乃次赤按詩云長安苦寒又言南山之豆東門之瓜皆長安京兆事其云故舊禮數絶又云棄擲與時異當是天寶十年召試後送𨽻有司叅選時作成華當作咸華葢咸陽華原二縣也赤縣官曹擁才傑軟裘快馬當冰雪長安一作夜非苦寒誰獨悲杜陵野老骨欲折首段有慨身世稱惟少年得志故老成落魄自杜陵野老詩作於長安明矣子赤縣官曹本謂長安貴人不指兩縣諸子葢投簡諸者另有其人也朱注誤認兩縣為赤縣故有畿縣之疑正異不知長安即赤縣故欲改為長夜總錯在詩題成華二字耳元和郡縣志大唐縣有赤畿望緊上中下六等之差京都所治為赤縣京之旁邑為畿縣曹植賦在官曹之典列沈約詩吏部信才傑杜前漢地理志杜陵屬長安古杜伯國宣帝塟此因曰陵長安志杜陵今在奉先城東南二十五里後漢李固傳霍光憂愧發憤悔之骨折南山豆苗早荒穢青門瓜地新凍裂鄉里兒童項領成朝音潮廷故舊禮數絶自然棄擲與時異况乃疎頑臨事拙饑卧動即向一旬敝一作弊衣何啻聨百結君不見空牆日色晚此老無聲淚垂血此自述饑寒之狀禮杜臆鄉里後軰挾勢驕人固不足責乃故舊在朝而數亦絶尚何望乎疎懶任性公之致貧在此公之立品亦在此又曰闒冗尊顯賢哲棄遺則時事可知無聲淚血望諸子之推解也此章上四句下八句萁漢書楊惲傳田彼南山蕪穢不治種一頃豆落而為青門瓜注别見傅𤣥詩冬寒地為裂鄉里小兒出陶潛傳領詩四牡項領注項大也四牡者人所駕今但養大其不肯為用後漢呂强傳羣邪項領膏唇拭舌注自恣也實任昉哭范僕射詩生平禮數絶事嵇康書匪降自天由疎頑饑卧暗用袁安卧雪王隱晉書董威輦拾殘繒結為衣號曰百結又張協詩青苔依空牆蔡琰胡笳哭無聲兮氣將咽曰十拍悲湥兮淚成血盧世㴶曰投簡中入鄉里兒童數語意覺不平然是一片真氣激出不能隱忍不宜隱忍者也豈許曖曖昧昧假敦厚軰所敢望其邊際故曰詩可以怨杜位宅守歲鶴注詩云四十明朝過則是天寶十載為四十歲唐書世系表杜位出襄陽房為考功郎中湖州刺史甫困學紀聞位李林甫諸壻也年譜天寶十載林方在相位盍簪列炬其炙手之徒與中公集有寄杜位詩題下原注位京宅近西曲江守歲阿戎一作咸家椒盤已頌花盍簪喧櫪馬列炬散林鴉四十明朝過飛騰暮景斜誰能㪅拘束爛醉是生涯上四守歲之事下四歲終有感從趙汸云椒盤頌花位宅設宴喧馬散鴉言同㑹者騎之盛又云公年四十進三大禮賦明皇命待制集賢院而未嘗授官此詩除夕所賦後四句感慨豪縱讀之可想公之為人顧注公目擊附勢之徒見位而傴僂俯仰不勝拘束故言不能效此拘束之態惟有爛醉是吾生涯而巳唐太宗有守歳詩冬盡今宵促年開明日長孟浩然詩守歲接清筵則知除夜守歲唐時風俗然也通鑑注晉宋間人多呼弟為阿戎宋書謝惠連初不為父所知族兄靈運曰阿戎才悟如此而何作常兒遇之朱注南史齊王思逺小字阿戎王晏從弟也明帝廢立嘗規切晏及晏拜驃騎謂思逺兄思微曰隆昌之際阿戎勸吾自裁若如其言豈得有今日思逺曰如阿戎所見尚未晚也詩用阿戎葢出此耳胡儼曰阿戎注家改為阿咸不知阿咸乃叔侄事與兄弟不相當東坡與子由詩欲喚阿咸來守歲林鳥櫪馬正諠譁亦一時誤用耳不必據以為証酒崔實四民月令過臘一日謂之小歲拜賀君親進椒從小起後世率於正月一日以盤進椒飲酒則撮置酒中號椒盤焉晉書劉臻妻陳氏元旦獻椒花頌曰標美靈葩爰采爰獻易豫四爻勿疑朋盍簪王弼解盍為合解簪為速葢因古冠有筓不謂之簪耳程傳則解簪為聚所以聚髮也此詩盍簪對列炬取朋友聚合之義直作冠簪説矣火隂鏗詩亭嘶背櫪馬顧沈佺期詩歲炬常燃桂炬燭也記四十曰强仕注言四十自明朝而過則是年正四十也吾子攀其飛騰之勢挂其羽翼之末夏侯湛抵疑今李尢詩年歲晚暮日巳斜子任昉詩拘束名教裏莊吾生也有涯敬贈鄭諫議十韻鶴注此當是天寶十載奏賦後作故有求顔闔厭禰衡之句梁氏編在十一載為是公諫議大夫起於後漢韋彪疏曰諫議之職應用直之士是也續通典武后龍朔二年改為正諫大夫開元以來仍復凡四人屬門下省諫官非不達詩義早知名破的由來事先鋒孰敢爭思飄雲物外一作動律中去聲鬼神驚毫髮無遺憾波瀾獨老成此贊鄭詩才之詩義知名乃通節之綱破的如射之中先鋒如戰勇雲物外言思窮高逺鬼神驚言巧奪化工洙曰曲盡物理故無遺憾才氣浩瀚故有波瀾首言諫官雖達其知名實以詩重耳諫官二字見蕭望之疏唐太宗詔每宰相入内平章大計必使諫官隨入與聞政事詩序詩有六義庾信枯樹賦海内知名若世説王長史曰我徃輒破的勝我庚翼謂謝尚曰卿破的當以鼓吹相賞易傳其所由來者漸矣謝靈運詩由來事不同鋒蜀志曹公使關羽為先鋒史記張良傳慎毋與楚爭左傳必書雲物王褒四子講德論轉運中律瑕詩序動天地感鬼神莫近於詩鮑照詩毫髮一為文賦恒遺恨以終篇爾雅大波為瀾小波為淪鶴曰陸機文賦或沿波而討源或龍見而鳥瀾波瀾二字本此又詩翻覆若波瀾曹植魏武帝誄謀過老成篇毫髮無憾謂字句斟酌波瀾老成謂通結搆包大小而言野人寧得所天意薄浮生多病休儒服㝠搜信客旌築居仙縹緲旅食歲崢嶸使去聲者求顔闔諸公厭禰乃里切衡此自敘淪落野人失所因浮生命薄也下六皆失所之狀旅不修儒服而但任客旌則行踪難定矣卜居無地而食多年則謀生不給矣求賢有詔而當事忌才則抱志莫伸矣之鶴注使者二句指召試不遇言説苑茍可而行謂野人天漢主父偃傳彼人人喜得所而意得矣莊子其生也若浮息夫躬傳民心悦庾信傳茂陵忽多病勝莊子魯少儒哀公曰舉國儒服羣㝠搜謂搜尋幽謝靈運詩躡險築幽居海賦仙縹緲餐玉清涯聞崢嶸謂年齒日高舞鶴賦崢嶸而愁暮曰莊子魯君顔闔得道之士也使人以幣先焉闔對恐聽誤而遺使者罪不若審之使者還反審之復求之則不得巳後漢書禰衡氣剛傲好矯時慢物曹操懷忿以才名不欲殺之送劉表表不能容以江夏太守黄祖性卞急送衡與之為所殺史記主父偃傳上不召留乆諸公賓客多厭之將期一諾或作語非重歘許勿切使寸心傾君見途窮哭宜憂阮步兵末望諫議之汲引也窮期諾於人而此心先傾求援急也途之哭公蓋大聲疾呼矣見首巻此章前二段各八句後段四句收心一諾注鄭氏曰歘暴起也吳邁逺詩寸從此殫沈約齊太尉王儉碑銘傾方寸以奉國返阮籍傳籍率意命駕不由徑路車跡所窮輒慟哭而聞步兵厨人善釀有貯酒三百斛乃求為步兵校尉王嗣奭曰他人贈諫議必用伏蒲廷諍等語公則止贊其詩詞葢自李林甫為相諫諍路絶故不作虛辭以諛人此其立言有法也璣葛常之韻語陽秋曰詩人讚美同志詩篇多比珠璧玉錦繡花草之類至杜公豈肯作此陳腐語耶如寄岑參詩云意愜關飛動篇終接混茫夜聽許十誦詩云精微穿溟涬飛動摧霹靂贈盧琚詩云藻翰唯牽率湖山合動揺贈諫議詩云毫髮無遺恨波瀾獨老成寄李白詩云筆落驚風雨詩成泣鬼神贈高適詩云美名人不及佳句法如何皆驚人語也視餘子其神芝之與腐􅌲哉兵車行杜臆舊注謂明皇用兵吐蕃民苦行役而作是也此當作於天寶中年周禮有兵車之㑹車轔轔馬蕭蕭行人弓箭各在腰耶孃妻子走相送塵埃不見咸陽橋牽衣頓足攔一作橋道哭哭聲直上上聲干雲霄首段敘送别悲楚之狀乃紀事下二段述征夫苦役之情乃紀言轔轔衆車之聲蕭蕭鳴不喧嘩行人行役之人記詩有車轔轔箭又蕭蕭馬鳴府又行人彭彭捜神李楚賓帶弓遊獵古樂不聞耶孃哭子聲但聞黄河流水鳴濺濺和魏文帝詩妻子牽衣袂楚辭蒙世俗之塵埃元郡縣志便橋在咸陽縣西南十里以與便門相對因名漢武帝造中渭橋在咸陽縣東南二十里本名横橋秦始皇造皆架渭水一統志便橋唐時名咸陽橋吏何遜詩兒女牽衣泣國䇿張儀説秦頓足徒裼酷傳路温舒頓足而嘆雲北山移文干霄而直上道旁過者問行人行人但云㸃行頻或從十五北防河便至四十西營田去時里正與裹頭歸來頭白還英華作猶戍邊邊庭英華作庭一作亭流血成海水武一作我皇開邊意未巳君不聞漢家山東二百州千邨萬落生荆杞縱有健婦把鋤犁禾生隴畝無東西况復扶又切秦兵耐苦戰被去聲驅不異犬與雞次提過者行人設為問答而以君不聞數語作收應當曰防河曰營田曰戍邊所謂㸃行頻也開邊未巳譏日之窮兵至於邨落蕭條夫征婦耕則民不聊生可知本言秦兵而兼及山東見無地不行役矣古樂府詞觀者盈道旁師氏曰㸃行漢史謂之更行以丁籍㸃照上下更換差役則唐食貨志開軍府以捍要衝因隙地以置營田有警以軍若夫千人助役杜臆營田乃戍卒備吐蕃者里韓非子里正與伍老海録碎亊唐制凡百户為一里置正一人二儀實録古以皂羅三尺裹頭曰頭巾周武帝裁為襆頭鮑氏曰時老幼俱戰亡又括鄉里之少小者故里正為之裹頭擐甲也韓駒曰歸來頭巳白又屯戍邊疆言役使無巳時也史記中國擾亂諸秦所徙戍邊者皆復去後漢書卧鼔邊庭使史記蔡澤傳流血成川忠杜臆唐鑑天寶六載帝欲王忠嗣攻吐蕃石堡城嗣上言石堡險固非殺數萬人不能克帝不快董延光白請取石堡帝命忠嗣分兵助之不克八載帝使哥舒翰攻拔之士卒死者數萬故有邊城流血等語漢班固曰武帝廣開三邊謝靈運詩辭殫意未巳書漢家自有制度山黄希曰古所謂山東即今之河北晉地是也今所謂東古之齊地青齊是也閻璩曰此謂華山以東不指泰山之東亦不指太行之東秦時河山以東强國六皆山東地十道四蕃志關以東七道凡二百一十七州杜臆云隋得天下改郡為州唐又改州為郡凡一百九十二郡曰州仍舊名也曰二百州巳盡天下矣世説陸士衡入洛次河南偃師逆旅嫗曰此東數十里無邨落阮籍詩堂上生荆杞邵注兵亂地荒盡生荆棘枸杞户王彦輔曰健婦耕則夫逺征可知古樂府健婦持門亦勝一丈夫王粲詩不能效沮溺相隨把鋤犁莫史記項羽起隴畝之中東師氏曰疆埸不修故東西辯史記正義南北為阡西為陌杜臆秦兵即關中之兵正此時㸃行者因堅勁耐戰故驅之尤迫今驅負耒者為兵直棄之耳與犬鷄何異孔叢子秦兵將至戰駱兵王詩龍庭但苦左傳行出犬雞長丁丈切者雖有問役夫敢伸恨且如今年冬未休關一作隴西卒一云役夫心益憤如今縱得休還為隴西卒縣官急索先側切租草堂本作縣官云急索租税從何出信知生男惡反是生女好生女猶得嫁比頻脂切鄰生男一作兒埋没隨百草君不見青海頭古來白骨無人收新鬼煩寃舊鬼哭天隂雨濕聲一作悲啾啾再提長者役夫申明問答而以君不見數語作總結生未休戍卒應上開邊未巳租税何出應上邨落荆杞男四語因前爺娘妻子送别而為此永訣之詞青海鬼哭則驅民鋒鏑之禍至此極矣各此章是一頭兩脚體下面兩扇各有起結各換四韻十四句條理秩然而善於曲折變化故從來讀者不覺耳戴曲禮長者問不辭讓而對非禮也左傳呼役夫暠詩召募取關西鶴注通鑑天寶九載冬十二月關西遊奕使王難得擊吐蕃克五城拔樹敦城漢食貨志縣官當衣租食税而巳史記索隱謂國家為縣官者畿内縣即國都王者官天下故曰官也嚴助傳租税之收足以給乗輿之御朱注名𨽻征伐則當免其租稅矣今以逺戍之身復督其家之輸賦豈可得哉與健婦鉏犁二語相應無陳琳詩生男慎莫舉生女哺用脯漢衛皇后歌生男喜生女無怒孔融書州里比隣知之最早周禮族師五家為比又遂人五家為隣哥庾信哀江南賦身名埋没江淹詩零落被百草舒翰傳築神威軍於青海上吐蕃至攻破之又築城於龍駒島以人二千戍之由是吐蕃不敢近青海水經注金城郡南有湟水出塞外又東南經卑禾羗海世謂之青海舊唐書吐谷渾有青海周回八九百里高宗龍朔三年為吐蕃所併儀鳯中李敬𤣥與吐蕃戰敗於青海開元中王君􅎢張景順張忠亮崔希逸皇甫維明王忠嗣先後破吐蕃皆在青海西忌梁横吹曲尸喪狹谷中白骨無人收寃左傳夏父弗曰吾見新鬼大故鬼小鮑照詩煩荒隴側曲後漢陳寵為太守洛陽城每隂雨常有哭聲啾晉歌天隂不作雨漢樂府鳴聲何啾啾周注啾猶言唧唧嗚咽聲也單復曰此為明皇用兵吐蕃而作故託漢武以諷其辭可哀也先言人哭後言鬼哭中言内郡凋弊民不聊生此安史之亂所由起也吁為人君而有窮兵黷武之心者亦當為之惻然興憫惕然知戒矣王道俊杜詩博議王湥父云時方用兵吐蕃故託漢武事為刺此説是也黄鶴謂天寶十載鮮于仲通喪師瀘南制大募兵擊南詔人莫肯應楊國忠遣御史分道捕人連枷送詣軍前故有牽衣頓足等語按明皇季年窮兵吐蕃徴戍驛騷内郡幾徧當時㸃行愁怨者不獨征南一役故公託為征夫自愬之詞以譏切之若云懼楊國忠貴盛而詭其詞於關西則尤不然太白古風云渡瀘及五月將赴雲南征怯卒非壯士南方難逺行長號别嚴親日月慘光晶泣盡繼以血心摧兩無聲已明刺之矣太白胡獨不畏國忠耶蔡寛夫曰齊梁以來文士喜為樂府詞徃徃失其命題本意烏生八九子但詠烏雉朝飛但詠雉雞鳴高樹顛但詠雞大抵類此甚有并其題而失之者如相府蓮訛為想夫憐楊婆兒訛為楊叛兒之類是也雖李太白亦不免此唯老杜兵車行悲青坂無家别等篇皆因時事自出已意立題畧不更蹈前人陳迹真豪傑也乎海寧周甸曰少陵值唐運中衰其音響節奏駸駸變風變雅與騷同功唐非無詩求能仰窺聖作禆益世教如少陵者鮮矣字胡應麟曰六朝七言古詩通章尚用平韻轉聲七成句讀未大暢至於唐人韻則平仄互換句則三五錯綜而又加以開闔傳以神情宏以風藻七言之體至是大備矣又曰少陵不效四言不倣離騷不用樂府舊題是此老胸中壁立處然風騷樂府遺意杜徃徃得之太白以百憂等篇擬風雅鳴臯等作擬離騷俱相去懸逺樂府竒偉高出六朝古質不如兩漢較輸杜一籌也又云樂府則太白擅竒古今少陵嗣迹風雅蜀道難逺别離等篇出鬼入神惝恍莫測兵車行新婚别等作述情陳亊懇惻如見張王欲以拙勝所謂差之釐毫温李欲以巧勝所謂謬以千里前出塞九首杜臆前出塞云赴交河後出塞云赴薊門明是兩路出兵考唐之交河在伊川西七百里當是天寶間哥舒翰征吐蕃時事詩亦當作於此時非追作也張綖注單復編在開元二十八年黄鶴以為乾元時思天寶間事而作今依范編在天寶年間晉樂志出塞入塞曲李延年造師胡夏客曰前後出塞詩題不言出師而言出塞出無名為國諱也可為詩家命題之法加當時初作九首單名出塞及後來再作五首故前後字以分别之舊註見題中前後字遂疑同時之作誤矣戚戚去故里悠悠赴交河公家有程期亡命嬰禍羅君已富土境開邊一何多棄絶父母恩吞聲行負戈首章敘初發時辭别室家之情上張綖注前四敘事見在下者之率義後四敘情見在者之不仁葢富土開邊事之可巳棄絶親恩人之大情為人上者亦獨何心哉此杜臆已富而又開邊乃諷刺語亦國家安危所係下諸章皆代為從軍者之言詩楚辭居戚戚而不可解交顔延之詩去國還故里悠悠南行鶴注西川河郡在唐隴右道郡亦有交河縣自縣二百七十里至北庭都䕶府城備吐蕃之處也司馬遷傳赴公家之難傳陳琳詩官作自有程洙曰程限期㑹也林史記張耳張耳常亡命遊外黄漢書竇榮亡命山顔師古注命名也謂脱其名籍而逃亡也以盧注開元中折衝未停兵有定籍不似召募無稽可逃脱故曰亡命嬰禍羅嵇康詩坎壈趣世務常恐嬰禍羅帝陸機五等諸侯論境土踰溢漢書嚴助傳是時武好征伐四夷開置邊郡王融策秀才文選將開邊躅説苑喪制三年所以報父母之恩鮑照詩吞聲躑不敢言陸機從軍行朝食不免胄夕息常負戈盧元昌曰此拈開邊為諸章眼目自開元十五年王君􅎢啟釁後張忠亮破吐蕃於渴谷拔其大莫門城杜賓客破吐蕃於祁連城下十七年張守素破西南蠻拔昆明及盬城王禕破吐蕃於石堡城十八年烏承玭破奚契丹於捺禄山二十年以後雖吐蕃又欵至赤嶺之碑仆釁端又開與奚契丹交搆不巳此皆開邊之禍也出門日已逺不受徒旅欺骨肉恩豈斷男兒死無時走馬脱轡頭手中挑青絲捷下去聲萬仞一作丈岡俯身試搴旗二章敘在道時輕生自奮之語矣上四意决下截氣猛軍伍習熟不受欺於徒侶生死無時不暇計及骨肉矣脱轡而挑起青絲下岡而學試搴旗言時時蹈危地也杜臆前言棄絶父母恩此云骨肉恩豈斷乃徘徊輾轉之意詩左思詩出門無通路肉古詩相去日巳逺顔延之改服飭徒旅記骨之親無絶也植陳琳詩男兒寧當格鬬死死無時時時可死也梁曹詩走馬長楸間樂府木蘭詩南市買轡頭簡文帝詩宛轉青絲鞚注青絲馬鞚也俯左思詩振衣千仞岡何承天詩湥谷萬仞曹植詩身㪚馬蹄李陵書斬將搴旗瓚云拔取曰搴磨刀嗚咽於吉切水水赤刃傷手欲輕腸斷聲心緒亂巳乆丈夫誓許國憤惋復扶又切何有功名圖麒麟戰骨當速朽三章中道傷心而為自解之詞作水聲觸耳不覺心亂而手傷二句乃申上語後意外之想以自寛也子杜臆前四化用隴頭歌極鑪錘之妙夜韓詩外傳晏左手持頭右手磨刀蔡琰胡笳曲聞隴水兮聲嗚咽辛氏三秦記隴山頂有泉清水四注東望秦川如四五里俗歌隴頭流水鳴聲幽咽遥望秦川肝腸欲絶鮮博物志江河水赤名曰泣血腸老子夫代大匠斵者有不傷手矣鮑照詩行子心斷孫萬夀詩心緒亂如絲况戴暠詩丈夫意氣本自然王孔稚圭詩本持許國志復武功彰吳越春秋越夫人歌情憤惋兮誰譏年後漢鄧禹傳垂功名於竹帛霍漢書蘇武傳甘露三上思股肱之美圖畫大將軍光等一十八人於麒麟閣張宴曰武帝獲麒麟時作記死欲速朽送徒既有長子兩切逺戍亦有身生死向前去不勞吏怒瞋七真切路逢相識人附書與六親哀哉兩決絶不復扶又切同一作問苦辛四章在途驅廹而歎也逺上四傷一身之見陵下四痛六親之不見戍亦有身此被徒長呵斥而作自憐語也杜臆初出門則父母難割在途乆則徧想六親此人情哀哉兩語即書中之意孤身逺戍欲同苦辛而不可得語更慘戚聞史記高祖以亭長為縣送徒驪山隂鏗詩逺戍唯皷寒山但見松吏即送徒之長烈未嘗怒瞋鮑照詩呵辱吏見侵賈顔氏家訓房文古詩道逢鄉里人誼策以奉六親注六親父母兄弟妻子前漢禮樂志六親和睦注父子兄弟姑姊甥舅婚媾姻婭陶潛詩哀哉亦可傷莊子流遁之志決絶之行卓文君白頭吟聞君有兩意故來相決絶曹植詩倉卒骨肉情能不懷苦辛迢迢萬里餘領我赴三軍軍中異苦樂音洛主將去聲寧盡聞隔河見胡騎去聲倐忽數百羣我始為奴僕幾時樹功勲五章初到軍中而歎也樹上四傷主將之寡恩下四慨立功之無日曰幾時勲則麒麟之願難必矣謝靈運詩迢迢萬里帆古詩相去萬餘里主左傳作三軍王粲詩從軍有苦樂六韜後漢注將龍韜庾信詩嘶馬隔河聞倐史記李敢直貫胡騎吳均詩胡騎欲成羣左思詩忽數百敵公孫𢎞傳贊衛青奮於奴僕胡夏客曰封常清始為高仙芝僕後代仙芝為節度使同開邊拓境此亦起於奴僕者謝靈運詩我行詎幾時立揚子法言人道交功勲成楊炯詩丈夫皆有志㑹見功勲後出塞云重高勲即樹功勲意也有引通鑑百姓有勲者免征役不合挽弓當挽强用箭當用長射音石下同人先射馬擒賊英華作冦先擒王殺人亦有限立一作列國自有疆茍能制侵陵豈在多殺傷六章為當時黷武而歎也興張綖注章意只在擒王一句上三句皆引語下四句申明不必濫殺之故從上半疊用成語擒王則衆自降即所謂殲厥渠魁脅罔治者杜臆他人有前四句必無後四句兼此八句方是仁者無敵之師三代而下誰復領此論兵邁古風此老葢自道也周國策長兵在前强弩在後蘇秦傳天下强弓勁弩皆從韓出左周勃傳材官引彊孟注如今挽彊司馬左傳樂伯射馬而右射人援書不愆於六伐七伐乃止齊焉所謂殺人有限也馬立銅柱為界所謂列國有彊也史記炎帝欲侵陵諸侯餘又李陵殺傷萬人黄生曰前四語似謡似諺最是樂府妙境無又曰戰陣多殺傷始自秦人葢以首級論功前代是也至出塞之舉則始于漢武帝當時衛霍雖屢勝然士卒大半物故矣明皇不恤其民而逺慕秦皇漢武此詩託諷良湥驅馬天雨去聲雪軍行入高山逕危抱寒石指落曾同層冰間已去漢月逺何時築城還浮雲暮南征可望不可攀七章為戍邊築城而歎也嘗上四述嚴寒之苦下四敘思歸之情唐注哥舒翰築城青海疑於冬月行師故為軍士苦寒之吟文詩驅馬悠悠而又雨雪霏霏而又高山仰止梁簡帝賦既浪激沙游亦苔生逕危詞前漢蒯通傳㑹大寒士卒􅑁指者什二三霜王逸楚注北方常寒其冰重累張正見昭君詞樓明漢月城史記蒙恬傳秦巳并天下使䝉恬將三十萬衆築長天寶中哥舒翰屢築軍城備吐蕃樂府古八變歌浮雲多暮色望楚辭泊吾南征兮孫擢詩可不可尋單呈延切于冦我壘百里風塵昏雄劍四五動彼軍為去聲我奔虜其名王歸繫音計頸授轅門潛身備行音杭列一勝何足論平聲下八章見其有敵愾之勇也上四言臨敵制勝欲掃淨邊氛即擒王意劍動冦奔此軍士之獲勝乃其意必欲盡空幕南之庭而後快一勝又何足論乎此寫猛氣雄心躍躍欲動盧注潛身備行列如獨坐樹下之馮異一勝何足論如八戰八克之吳漢杜臆單于借用漢事自外侵内曰冦説文壘軍壁也抱庾信詩風塵千里昏孕烈士傳楚王夫人常納凉而鐵柱心有所感遂懷後産一鐵楚王命鏌鋣鑄此為䨇劍三年乃成劍一雌一雄越絶書楚王作鐵劍三枚晉鄭聞而求之不得興師圍楚三年不解楚引太阿之劍登城而麾之三軍破敗士卒迷惑流血千里張綖注開元中河西將宋青春每戰運劍大呼執馘而旋未嘗中鋒鏑後獲吐蕃主帥問之曰常見青龍突陣而來兵刃所及如及銅鐵以為神助也始知劍之異公雄劍二句兼用此事人魏文帝詩一發連四五漢書衛青霍去病虜名王貴以百數注名王謂有大名以别於諸小王也史史高帝紀秦王子嬰繫頸以紐周禮設車宮轅門記項羽召見諸侯將入轅門張晏曰軍行以車為陣轅必相向為門不説苑楚莊王伐陳吳救之左史倚相曰吳兵夜至何行列皷出待之一呂氏春秋武王勝而王天下從軍十年餘能無分寸功衆人貴茍得欲語羞雷同中原有鬬爭况在狄與戎丈夫四方志安可辭固一作困窮九章為冒功邀賞者發報上云貴茍得見邊將營私之弊下云志四方見軍士國之忠十載從戎何啻一勝乃有功不伐窮且益堅此軍伍而有純臣之節矣皆盧注冐功茍得凡濫殺無辜掩敗為捷及攘奪人功是當時如高仙芝崔嘉逸之徒徃徃蹈此志若爭功而鬬則中原且不自安况能逺征戎狄乎見在天下者不為一身計也昔廉頗欲辱藺相如相如避之曰吾所以為此者先國家之急而後私讐也意正相同舊説中原而有鬬爭則與外夷無異况能責及戎狄乎有曹植詩從軍度函谷又君行踰十年蘇秦傳無分寸之功記荀子名不貴茍得淮南子計功而受賞不為茍得毋雷同注雷之發聲物無不同時應者左傳戰於中原曰呂氏春秋喜怒鬬爭反為用矣四記西西方曰戎北方狄左傳姜氏謂公子曰子有方之志窮張協詩君子守固在約不爽貞張綖曰李杜二公齊名李集中多古樂府之作而杜公絶無樂府惟此前後出塞數首耳然又别出一格用古體寫今事大家機軸不主故常昔人稱詩史者以此黄生曰六朝好擬古類無其事而假設其詞杜詩詞不虛發必因事而設此即修辭立誠之㫖非詩人所及周珽曰前後出塞諸作奴𨽻黄初諸子而出如將百萬軍寶之惜之而又能風雨使之真射潮之力没羽之技王嗣奭曰出塞九首是公借以自抒所藴讀其詩而思親之孝敵愾之勇恤士之仁制勝之畧不尚武不矜功不諱窮豪傑聖賢兼而有之詩人乎哉送高三十五書記十五韻按舊書高適字達夫渤海人解褐授汴州封丘尉非其好也乃去位客遊河右河西節度使哥舒翰見而異之表為左驍衛兵曹充翰府掌書記從翰入朝盛稱之於上前據此則適為書記在翰未入朝之前其入朝稱適亦必在十一載時蓋適同至京而公作詩以送之也若十四載翰以風疾還京闔門不與朝請豈暇薦士君前乎通鑑謂十三載五月翰奏前封丘尉高適為掌書記此特遥奏授官恐適未必至京何縁送贈詩章耶明與舊書杜詩不合崆峒小麥熟且一作吾願休王師請公問主將去聲焉於䖍切用窮荒為首戒邊將窮兵兆天寶之亂由當時黷武所致公已先見其矣高為書記軍事皆得叅謀故以休兵息民告之發贈哥舒翰詩先從朝廷發端寄高書記詩先從主將端起局正大黄希曰寰宇記禹迹之内山名崆峒者三一在臨洮一在安定一在汝州黄帝問道之所專指汝州此當是指臨洮葢河西節度治梁州而洮涼在唐並𨽻隴右通古詩高田種小麥桓帝初童謡小麥青青大麥枯鑑積石軍每歲麥熟吐蕃輒穫之邊人呼為吐蕃麥莊天寳六載哥舒翰先伏兵於其側冦至斷其後夾擊之無一人得返者自是不敢復來此詩正指其事唐志崆峒山在岷州積石軍在廓州廓去岷不逺詩王師之所江賦竭南極窮東荒詩言不必窮兵於荒外也饑鷹未飽肉側翅隨人飛高生跨鞍馬有似幽并平聲兒一作并州兒脱身簿尉中始與捶楚辭此原其逺行之故尉窮而依人有似饑鷹且素負鞍馬之才豈肯羈身一鮑欽止曰捶楚謂鞭朴有罪者朱注魏志陳登喻呂布曰登見曹公言待將軍譬如養虎當飽其肉否則噬人公曰不如卿言譬如養鷹饑則為用飽則颺去又晉載記慕容垂猶鷹也饑則附人飽則高飛吳質答東阿王書情踊躍於鞍馬梁簡文帝詩少解孫吳法家本幽并兒師氏曰幽并二州其俗習騎射也史記張耳傳耳是時脱身遊司馬遷報任少卿書被箠楚受辱後漢陳寵傳宜滌蕩煩苛之法輕薄箠楚以濟羣生説文捶以杖擊也箠與捶同皆木名借問今何官觸熱向武威答云一作言一書記所媿國士知人實不易去聲知㪅一作尤須慎其儀此誌其初為書記設為問答本於古詩箴不易知見事人之難慎其儀見行巳之難此朋友規之義也程曉詩今世褦襶子觸熱到人家舊唐書凉州屬河西道武德二年置總管府天寶元年改武威郡督凉甘肅三州乾元元年復為凉州洙曰前漢武威郡故匈奴休屠王地武帝太初四年開太祖以陳琳阮瑀為司空軍謀祭酒掌書記室魏志國策豫讓曰智伯以國士遇我庾信詩疇昔國士遇生平知巳恩范雎傳侯嬴曰人固未易知知人亦不易詩敬慎威儀黄庭堅注陶侃傳諸㕘佐當正其衣冠攝其威儀何可亂頭養望自謂曠達耶十年出幕府自可持旌麾一作旗此行既特達足以慰所思一云亦足慰逺思男兒功名遂亦在老大唐佐切時此冀其將來建樹年高遇哥舒巳在暮故有功名老大之語以蔡邕薦邊文韶表幕府初開博選清英師古曰幕府者軍幕為義軍旅無常居止故以帳幕言之亷頗李牧市租皆入幕府非因衛青始有其號曹植離思賦欲畢力於旌麾師氏曰唐制從軍歲乆者得為大郡故云十年持旄麾男蕭琛詩之子兩特達古詩褰裳望所思陸機詩兒多逺志荀子功名綦大傷古詩老大徒悲常恨結驩淺各在天一涯叶音宜又如參與商慘慘中腸悲驚風吹一作飄鴻鵠不得相追隨黄塵翳沙漠念子何當一作時歸古韻支微通用邊城有餘力早寄從軍詩末結送别之意之方聚而散故恨結驩之淺别難復聚又有參商感驚風二句巳不得徃黄塵二句高不能來故囑其寄詩以相慰從軍詩仍應記室於此章四句起十句結中三段各六句左傳願結驩二三君任昉詩結驩三十載生死一交情商古詩相去萬餘里各在天一涯左傳子産以辰為星參為晉星蘇武詩昔為鴛與鴦今為參與辰此本左氏也鄭司農説星土引春秋傳曰參為晉星商為大火始改左氏本文而參商並稱蔡琰胡笳同天隔越兮如商參此又本於鄭氏也詩或慘慘畏咎陸倕詩沉思結中腸曹植詩驚風飄白日曹植詩飛葢相追隨張良傳鴻鵠高飛一舉千里又賦揚黄塵之㝠㝠前漢書隔以山谷壅以沙漠葛蘇武詩念子不得歸雲商君傳盡遷之於邊城諸頴詩𤣥覽屬睿詞風有餘力從王仲宣有軍詩按捶楚有兩説一云尉楚罪人一云尉自受楚邵氏聞見録引杜牧之詩云參軍與簿尉塵土驚劻勷一語不中治鞭笞身滿瘡此指尉被捶楚也張綖引韓昌黎詩云棲棲法曹掾何處事卑陬何况親犴獄敲榜發奸偷則尉固以捶楚為職矣友人萬斯同曰與人贈别而舉其戮辱賤事恐不近情考高適為封丘尉時作詩云秪言小邑無所為公門百事皆有期拜迎官長心欲碎鞭撻黎庶令人悲故杜公送達夫云脱身簿尉中始與捶楚辭即用高詩意也還作捶楚他人為是奉留贈集賢院崔國輔于休烈二學士鶴注此當是天寶十一載作公獻三賦明皇竒之召試文章崔于二學士當是試文之官公詩云集賢學士如堵墻觀我落筆中書堂賢唐詩紀事崔國輔吳郡人初授許昌令累遷集直學士禮部員外郎唐書于休烈開元初第進士自秘書省正字累遷集賢殿學士轉比部員外郎唐六典開元十三年召學士張説等宴於集仙殿改名集賢殿修書所為集賢殿書院五品以上為學士六品以下為直學士昭代將垂白途窮乃叫閽氣衝星象表詞感帝王尊首敘獻賦之事時上二説得悲憫下二説得豪邁前洙曰昭代猶言明指本朝也搜神記將辭昭代漢杜業傳注垂白老言白髮下垂也鮑照詩垂白對講書詩阮籍哭窮途甘泉賦選巫咸兮叫帝閽宋之問氣衝落日紅徃王融策文上叶星象下符川嶽王洙曰公嘗有詩云年文彩動人主即所謂詞感帝尊也天老書題目春官驗討論平聲倚風遺鶂音逸鷁同路隨水到龍門竟與蛟螭雜空聞一作寧無燕雀喧青㝠一作雲非猶契濶一作連澒洞凌舊作陵厲不一作小非飛翻次言召試不遇送上四集賢應試下四𨽻有司門天老謂宰相春官謂禮部上遺鷁路期免退飛到龍意在騰躍蛟螭雜龍門難矣燕雀喧鷁路却回矣契濶不飛無復飛騰之志也下帝王世紀黄帝以風后配上台天老配中台五聖配台謂之三公張衡詩天老教軒皇學晉書山濤傳甄拔人才各為題目南史杜之偉傳與士劉陟等抄撰羣書各為題目周禮太宗伯為春官典杜臆驗討論謂考驗其文詞所自出故赴試者語必雅唐詩可為後世羽儀者以此孔安國書序討論墳典隋煬帝賜劉炫詩名理窮研覈英華恣討論左傳六鷁退飛過宋都也昭明太子啟鷁路頽風諸三秦記龍門在河東界每暮春有黄黒鯉魚自海及州爭來赴之得上者便化為龍否則曝腮㸃額而退鴻南都賦憚虬龍兮怖蛟螭雀史記陳涉曰燕雀安知鵠之志哉何胥詩空餘燕喧青㝠注見首巻絶詩死生契濶注以為勞苦之意今云青㝠契濶乃濶之義陳琳書陵厲清浮顧盼千里抱朴子徒間振翅竦身不能凌厲九霄主王粲詩茍非鴻鵰孰能飛翻朱注公以詞賦為人所知再降恩澤止送𨽻有司叅列選序故有青㝠契濶之嘆儒術誠難起家聲庶巳存故山多藥物勝槩憶桃源欲整還鄉斾長懷禁掖垣謬稱三賦在難述二公恩原注甫獻三大禮賦出身二公嘗謬稱述末欲東還而敘留贈之意上四失意思歸下四感别知已吏此章四句起下二段各八句子公孫𢎞傳𢎞習文法事而又縁飾以儒術抱朴起家作臺郎任難起謂不能奮起在位家聲謂詩名猶足紹祖也昉傳四子竝無術業墮其家聲公系出襄陽曾祖依藝始如洛之鞏縣遂居於此杜陵乃其宗族所在夢弼泥鹿門採藥武陵桃源遂以故鄉為襄陽但移鞏巳經四世襄陽無復田廬可依矣當從朱注作洛陽故居其曰憶桃源欲如秦人之避世耳不必親至桃源也陶應瑒詩日暮歸故山元抱朴子仙人以藥物養身淵明桃花源記晉太中武陵人捕魚為業緣溪行忘路之逺近忽逢桃花林夾岸林盡水源便得一山捨舟從山口入豁然開朗屋舍儼然阡陌交通鷄犬相聞黄髮垂髫並怡然自樂見漁人乃大驚自云先世避秦時亂率妻子邑人來此絶境不復出焉方輿勝覽桃源在鼎州縣南二十里旁有秦人洞唐朗州即宋鼎州今為常德府桃源縣鸚鵡賦眷西顧而長懷西劉楨詩誰謂相去逺隔此西掖垣師氏曰禁中有東兩掖垣乃禁墻也江總詩下筆成三賦范𢎞之牋仰尊二公貧交行鶴注此必公獻賦後乆寓京華故人莫有念之者故有此作梁氏編在天寶十一載是也翻手作雲覆音福手雨紛紛輕薄何須數所主切君不見管鮑貧時交此道今人棄如土公見交道之薄而傷今思古也杜臆作行止此四句語短而恨長亦唐人所絶少者照史記陸賈説尉陀曰越殺王降漢如反覆手耳鮑詩暫交金石心須臾雲雨隔記史記漢王曰天下紛紛與張華詩末世多輕薄史管夷吾者潁上人也常鮑叔牙游叔知其賢仲貧困嘗欺鮑叔叔終善遇之巳而鮑叔事齊公子小白遂進管仲仲既任政於齊桓公以霸仲曰生我者父母知我者鮑叔也言後漢書宋𢎞曰貧賤之交不可忘范雲詩思舊昔有此道今巳微莊子視喪其足猶遺土也送韋書記赴安西鶴注安西都䕶府治所在龜兹國城内節度使撫寧西域考天寶十一載封常清為安西副大都䕶攝御史中丞持節充安西四鎮節度經畧度支營田副大使知節度事韋必為其書記也公以天寶十載獻三賦召試文章待制集賢詩云公車留二年當是十一年作記唐書元帥節度府有掌書一人關預軍中機宻夫子歘許勿切通貴雲泥相望懸白頭無藉申氏疑作籍在朱紱有哀憐書記赴三捷一作接公車留二年欲浮江海去此别意茫然雲泥包下四句白頭無藉而朱紱見憐此叙目前韋赴書記而巳留公車此叙别後皆一雲一泥相去懸絶處末二結出惜别意贈杜臆書記未是顯官而作雲泥之歎其窮可知如投哥舒翰語極贊頌望一書記尚不可得也性晉丁彬書雲泥異途邈矣懸隔千金翼論老人之必恃其老無有藉在趙曰無藉在謂無所倚藉故用對哀憐申涵光曰舊解作通籍及無聊意俱杜撰葢言無着籍所在如今籍貫之籍身老無家幸為朱紱所哀憐耳班唐制御史賜金印朱紱韋書記必兼官御史故云固牋將軍哀憐賜固手迹公書記見前尉詩豈敢定居一月三捷代東方朔傳注車令屬衛上書者所詣曹冏六論浮舟江海照謝靈運詩此别乆無適鮑詩茫然荒野中𤣥都壇歌寄元逸人鶴注道書有𤣥都所謂禹封五符秘以金英之函檢以𤣥都之印是也詩葢作於天寶十一載午蔡夢弼曰𤣥都壇漢武帝所築在長安南山子谷中十洲記𤣥都在北海去岸三十六萬里上有太𤣥都仙伯真公所治師氏注元逸人隱道士也盧注李白與元丹丘遊疑即此人故人昔隱東䝉峰巳佩含景音影蒼精龍故人今居子午谷獨並步浪切一作在隂崖白一作結茅屋首叙逸人之居居元葢自山東而遷秦嶺者開首叙明兄朱注公同太白訪范隱居詩余亦東䝉客憐君如弟此在魯郡作也昔遊詩東䝉赴舊隱尚憶同志樂正指元逸人言陸放翁謂東䝉乃終南山峯名引种明逸詩登遍終南峯東䝉最孤秀為証乃喜新之説未足信也法潘鴻曰抱朴子道術諸經可以却惡防身者有數千如含景藏形等不可勝計又云諸大符出於老君其中有青龍符等術用之可以得仙此詩巳佩含景蒼精龍即所謂青龍符耳初學記後漢公孫瑞劍銘從革庚新含景吐商史記索隱文耀鉤云東宮蒼帝其精為龍神仙傳壺公云吾嘗佩含景駕蒼精注東方蒼龍春秋繁露劍之在左蒼龍象也午漢書子午道從杜陵直絶南山逕漢中注子北方也南方也言通南北道相當秦記長安正南山名秦嶺谷名子午西征賦眺華嶽之隂崖顔師古漢書注白屋茅屋也屋前太古𤣥都壇青石漠漠松從文粹一作常風寒子規夜啼山竹裂王母晝下去聲雲旗翻一作蟠石中記𤣥都壇景青松風地幽僻矣子規夜啼幾於裂竹聲悲慘也王母晝下有似翻旗尾動揺也列子太古至於今年數固不可勝紀朱注十洲記𤣥洲在北海去岸三十六萬里上有太𤣥都仙伯真公所治唐六典煬帝改佛寺為道塲道觀為𤣥壇皆神仙傳王烈之太行山中見山破石裂數百丈兩畔是青石述異記利州葭萌縣玉女房是大石穴前有數竹莖下有青石壇每因風自掃急梁簡文帝詩淇水漠漠青苔浮劉繪詩松風循路張華詩巢居知風寒越禽經鸐嶲周子規也江介曰子規蜀右曰杜宇注甌間曰怨鳥夜啼達旦血漬草木凡啼必北向云山竹裂别有三説劉云燒竹爆裂以驚去子規謝注子規啼聲如竹裂偽蘇注引竇誼居蜀之津源子規啼而庭竹裂出於妄撰黄希謂子規夜啼而山竹為之欲裂得之杜修可曰王母鳥名故對子規酉陽雜俎云齊郡函山有鳥足青嘴赤黄素翼絳顙名王母使者又王椿齡云其尾五色長二三丈許飛則翩翻正如旗狀擁列仙傳穆王與王母㑹瑶池雲旗霓裳簇自天而下九歌乗回風兮載雲旗知君此計成一作誠長徃芝草琅玕日應平聲長丁丈切鐵鏁高垂不可攀致身福地何蕭爽末稱其抱道高棲超於塵俗人芝草琅玕仙家之食鐵鏁高垂仙之居福地蕭爽逍遥自得也北此章三段各四句長史記留侯傳誰為此計者乎山移文或歎幽人徃漢武内傳王母曰太上之藥有黄庭芝草碧海琅玕有邵注仙人能種玉故云日應長舊注道藏經晉時戍卒屯於子午谷入谷之西澗水窮處忽見鐵鎻下垂約有百餘丈戍卒欲挽引而上有虎蹲踞焉法苑珠林終南山大秦嶺竹林寺貞觀初採蜜人山行聞鐘聲尋而徃至焉寺旁大竹林可二頃其人斷二竹節以盛蜜尋路至大秦戍具告防人戍主利其大竹遣人覔取過小竹谷達於崖下有鐵鎻長三丈許防人曳鎻掣之大牢將上有二虎踞崖頭向下大呼其人怖急返右洞天福地記終南山太乙峰在長安西南五十里左四十里内皆福地爽阮籍首陽山賦初蕭而揚音虞元昌曰是時道教盛行山人王元翼紛紛撰妙寶真符元逸人修真子午谷中不求人知自高人一等矣旗申涵光曰子規夜啼山竹裂王母晝下雲翻二語大類長吉見此老無所不有也曲江三章章五句此詩三章舊注皆云至德二載公陷賊中時作按詩㫖乃自嘆失意初無憂亂之詞當是天寳十一載獻賦不遇後有感而作李肇國史補進士既捷大燕於曲江亭子謂之曲江㑹曲江大㑹在闗試後亦謂之開宴據此則知公之對景興慨意固有所為矣鶴注寰宇記曲江池漢武帝所造名為宜春苑其水曲折有似廣陵之江故名朱注曲江在杜陵西北五里康駢劇談録云曲江池本秦隑州開元中疏鑿為勝境其南有紫雲樓芙蓉苑其西有杏園慈恩寺花卉環列烟水明媚都人遊賞盛於中和上巳二節曲江蕭條秋氣高菱荷枯折隨風濤遊子空嗟垂二毛白石素沙亦相蕩哀鴻獨呌求其曹首章自傷不遇其情悲在第三句㸃意上二屬興下二屬比念菱荷枯折引起二毛沙石相蕩自比飄流哀鴻求曹及同氣也宋玉風賦蕭條衆芳芙月令以達秋氣楚辭天高而氣清壯洛陽伽藍記葭被岸菱荷覆水謝靈運詩江濶風濤蘇武詩請為遊子吟淹左傳不禽二毛注頭白有二色詩白石鑿鑿江詩素沙匝廣岸禰衡賦哀鴻感類駭劉安招隱士禽獸兮亡其曹即事非今亦非古長歌激越捎所交切林莽莫補切比毘至切屋豪華固難數所主切吾人甘作心似灰弟姪何傷淚如雨次章放歌自遣其語曠華歌聲激林足以一抒胸臆在第二句作截江上豪乆巳灰心置之弟姪何必為我傷心乎葢勸之逹觀也言杜臆即亊吟詩體雜古今其五句成章有似古體七成句又似今體曰長歌者連章疊歌也事列子周之尹氏有老役夫晝則呻吟即事陶潛詩即多所欣謝靈運詩即事怨睽擕蘇武詩長歌正激烈西都賦震聲激越曰宋玉風賦蹷石伐木捎殺林莽捎動揺也木曰林草莽尚書大傳周民可比屋而封躬傳僕遫不足數庾信詩金穴盛豪華攣前漢息夫西征賦陋吾人之拘莊子心固可使如死灰乎孤王績詩衰宗多弟姪古樂府兒淚下如雨自斷丁亂切此生休問天杜曲幸有桑麻田故將移住南山邊短衣匹馬隨李廣看射裳炙切猛虎終殘年三章志在歸隱其辭激南窮達休問於天首句陡然截住因杜曲故及南山因山故及李廣射虎一時感慨之情豪縱之氣殆有不能自掩者矣問陶潛詩聊復得此生不杜修可曰楚辭天問篇序天者屈子之所作也何言問天天尊不可問韋杜曲在長安俗云南城韋杜去天尺五雍録樊川曲東十里有南杜北杜杜固謂之南杜杜曲謂之北杜二曲名勝之地賦東方朔諫起上林苑疏其地有桑麻竹箭之饒西都桑麻鋪棻寗戚飯牛歌短布單衣適至骭葢越絶書匹馬啼嘷文心雕龍車兩馬疋以並耦為用車貳佐乗馬儷驂服服乗不隻故名號必䨇名號一定則雖單為疋矣匹夫匹婦亦取配義也漢李廣傳廣屏居藍田南山中射獵見草中石以為虎而射之中石没羽視之石也廣所居郡聞有虎常自射之詩中故將二字乃承上之詞或因李廣傳有故將軍語遂指當時武將謝官者恐不合詩意王嗣奭曰先言鴻求曹以起次章弟姪之傷次言心似灰以起末章南山之隱三章氣脉相屬總以九迴之苦心發清商之怨調此公學三百篇遺貌而傳神者也觀命題可見而自謂非今非古意可知矣嘗謂公此詩學三百七歌學離騷新安吏諸作學古樂府俱自開堂奥不肯優孟古人盧世㴶曰曲江三章塌翼驚呼忽遨天際國風之後又續國風奉贈鮮于京兆二十韻鶴注通鑑天寶十二載正月京兆尹鮮于仲通諷選人請為國忠刻頌立於省門制仲通撰其詞則仲通為京兆尹在十一年十一月國忠為相後也詩云獻納紆皇眷中間謁紫宸當是公獻賦待詔集賢院後十一年十二月作也唐書李叔明傳叔明本姓鮮于氏兄仲通字向天寶末為京兆尹楊國忠傳國忠素德仲通使討雲南舉軍没以白衣領職未幾國忠引為京兆尹鄭曰鮮于複姓王國稱多士賢良復扶切又幾人異才應平聲間去聲出一作世爽氣必殊倫始見張京兆宜居漢近臣驊騮開道路鵰鶚離去聲風塵前三段稱鮮于後三段公自敘首從多士形起稱其才氣傑出驊騮喻異才鵰鶚喻爽氣上下四句自相呼應之詩思皇多士生此王國漢文帝詔將何以來逺方賢良孔融表近日路粹嚴亦用異才公孫𢎞贊異人間出有雄情爽氣左思詩與世亦殊倫世説桓宣武素漢書膠東相張敞治京兆畧循趙廣漢之迹元帝即位待詔鄭明薦敞先帝名臣宜傅輔皇太子國語近臣盡規穆天子傳左服驊騮而右騄耳郭璞注驊騮色如華而赤伏吳志孫權書自道路開通高唐賦鵰鶚鷹鷂飛揚竄邵注鵰鶚皆鷙鳥之大者而鶚又大於鵰王文憲集序脱落風塵侯伯知何算一作等文章實致身奮飛超等級容易去聲失沉淪脱畧磻溪釣操持郢匠斤雲霄今已逼台衮㪅誰親次從侯伯形起稱其位望特優當今侯伯雖多鮮于獨以文章進身一旦奮飛而起則向之沉淪頓失矣磻溪言遇合之遲郢匠言鋒鋩之利二句承失沉淪雲霄言得近天子台衮言得交宰相二句承超等級亦上下四句自為開闔顔魯公墓碑仲通年近四十舉鄉貢進士五十始擢一第從官十年而後超登四岳可見其晚年始遇陸機五等諸侯論侯伯無可亂之符帖何足算見論語處典論文章經國之大業晉王導足下所欲致身尚在彀中吳均詩相須無羽翮何由總奮飛屯記貴賤之等級傳談何容易抱朴子運則沉淪於勿用東方朔恨賦脱畧公卿南水經注渭水之右磻溪水注之溪中有泉謂兹泉東隅石室太公所居水次平石即太公垂釣之所使莊子何其無操持與成又郢人堊墁其鼻端若蟬翼匠石斵之匠石運斤風盡堊而鼻不傷張昶華山堂闕銘必雲霄之路可升而起三王褒尉遲公碑任隆台衮趙注上公應天上三台公一命衮鳯穴雛皆好龍門客又新義聲紛感激敗績自逡巡中四結上以起下然墓碑謂其有子六人皆有令聞又謂輕財尚義果於諾此即鳯雛龍門之説也敗績逡巡自歎蹇於遭際鳯山海經丹穴之山有鳥焉其狀如雞五采而文名曰凰北史文苑傳飾羽儀於鳯穴晉書陸雲幼時吳尚書閔鴻見而竒之曰此兒若非龍駒定是鳯雛李膺傳膺性簡亢被容接者名為登龍門傅𤣥詩義聲馳雍凉大趙岐孟子章㫖千載聞之猶有感激左傳以敵崩曰敗績過秦論逡巡而不敢進途逺一作永欲何向天高難重陳學詩猶孺子一云子夏鄉賦忝一作念嘉賓不得同眺錯吁嗟後郄音隙詵計疎疑翰墨時過憶松筠此追敘應舉下第事在開元二十三年忝途逺天高進身無階也猶孺子公年尚少嘉賓時登鄉薦引晁郄二公言知遇弗如古人計疎不善干謁時過欲收晚節也主父偃傳日暮途逺曹植云天高聽逺教劉琨詩棄置勿重陳論語學詩乎小序史記孺子可矣鄉賦謂鄉舉詩我有嘉賓鹿鳴宴羣臣嘉賓也者晁錯傳文帝詔有司舉賢良文學錯在選中時對策百餘人惟錯為高第由是選中大夫以詩吁嗟麟兮議晋書泰始中舉賢良直言之士郄詵對策上第拜郎史記范雎傳其於計疎矣然曹植書豈徒以翰墨為勲績筠學記時過後學任昉求立館啟竟松於歲晚獻納紆皇眷中間謁紫宸且隨諸彦集方覬薄才伸破膽遭前政隂謀獨秉鈞微生霑忌刻萬事益酸辛此敘獻賦召試事在天寶十載林紆皇眷曲荷主知謁紫宸應試殿中破膽以下恨李甫之忌才只隂謀忌刻四字極盡姦邪情狀按李林甫傳天寳六載帝詔天下通一藝以上者皆詣京師林甫恐對策者斥言其奸乃委尚書省覆試遂無一人及第公初應詔而見黜後以召試而仍棄皆林甫為之今林甫巳去故云前政兩都賦序言語侍從之臣朝夕論思日月獻納也沈約齊安陸昭王碑皇情眷眷阮瑀書中間尚淺唐六典紫宸殿即内朝正殿江淹别賦金閨諸彦傳臣所以破膽寒心嚴助傳越人綿力薄才政谷永孔叢子文咨曰不害前而有成牛孫綽喻道論隂謀之人子孫不昌多詩秉國之鈞𢎞詩微生逢大造庾信賦既言於忌刻謝靈運詩萬事俱零落阮籍詩悽愴懷酸辛交合丹青地恩傾雨露辰有儒愁餓死早晚報平津末望汲引乃贈詩本意為仲通與國忠交合則施恩正易力故託以窮愁之狀報於平津公此章前後四段各八句中腰結尾各四句鹽鐵論卿者神化之丹青賀凱詩恩榮雨露濡無早晚之失朱買臣傳終餓死於溝中耳為韓非子漢公孫𢎞傳元朔中代薛澤丞相封平津侯開閣延士平津比國忠舊指京兆朱注力辯其誤少陵之投詩京兆隣於餓死昌黎之上書宰相迫於饑寒當時不得巳而姑為權宜之計後世宜諒其苦心不可以宋儒出處湥責唐人也白絲行此詩當是天寳十一二載間客居京師而作故末有忍羇旅之説當依梁氏編次師氏謂此詩乃譏竇懐貞鶴云懐貞亡於開元元年公時纔兩歲於年月不合繰絲須長不須白越羅蜀錦金粟尺象一作牙牀玉手亂殷烏間切紅萬草千花動凝碧已悲素質隨時染一作改裂下去聲鳴機色相射食亦切美人細意熨貼平裁縫滅盡針線跡此見繰絲而託興正意在篇末上段有踵事增華之意欲成羅錦用尺量絲故須長所織花草色兼紅碧故不須白熨貼裁縫製為舞衣也碧象牀指機牀玉手指織女亂殷紅謂經緯錯綜動凝謂光彩閃皪照記夫人繅三盆手朱注廣韻繅繹繭為絲也繰同鮑詩繰絲復鳴機唐書越州土貢花文寳花等羅頭魏文帝詔每得蜀錦殊不相似國何遜詩金粟裹搔尺以金粟飾之富貴家之物策孟嘗君至楚獻象牀直千金朱江淹賦惜玉手之空佇縈廣韻殷赤黑色左傳左輪殷王子安青苔賦云修樹而凝碧素王彪之詩絲染墨悲歎路岐楊感悼庾信連珠白羽絲隨其所染謝朓詩望望下鳴機朱注色相射五色射人也之班彪傳細意委曲威南史何敬容衣裳不整伏床熨楊慎曰王莽傳有斗即尉斗也威與尉音相近本音畏轉音鬱隋書李穆奉尉斗於楊堅曰願公執威柄以尉安天下史照通鑑釋文尉斗火斗持火以申繒也俗加火作熨説文尉與熾本一字從上按下也又持火申繒也今俗言平曰尉帖杜詩美人細意熨帖平是也又白樂天詩金斗熨波刀剪文曹植樂府裁縫紈與素春天衣去聲著陟畧切為去聲君舞蛺蝶飛來黄鸝語落絮遊絲亦有情隨風照日宜英華同一作疑輕舉香汗清一作輕塵汙去聲顔色英華作似微汚一作汚不著開新合故置何許君不見才英華作志士汲引難恐懼棄捐忍羇旅下段有厭故喜新之感而蝶趁舞容鸝應歌聲落絮游絲乗風日綴衣前此人情趨附者多一經塵汗汙顔棄置何所見繁華忽然零落矣士故有鍳於此不輕受汲引而甘忍羇旅誠恐一旦棄捐等於敝衣耳翫末二語公之不屑隨時俯仰可知此章兩段各八句徐君倩詩衣著一時新鮑照詩催絃急管為君舞毛何遜詩黄鸝隱葉飛蛺蝶縈空戲庾信詩落絮鵝下徐陵詩柳絮飛還聚遊絲斷復結絲庾肩吾詩桃紅柳絮白照日復隨風照日宜輕舉謂絮飄颺與衣之輕舉相宜楚辭願輕舉以逺遊塵六朝詩朱顔潤紅粉香汗沾玉色笥古詩空牀委清邢劭詩桃李無顔色衣裳在故有開合漢艷歌乍開乍合在世説桓冲妻曰衣不經新何由而故阮籍詩君子何許嵇康琴賦厯世才士並為之賦難劉向傳禹稷與臯陶傳相汲引不為比周塘汲引難就薦引也即記難進易退之難魏甄后上行莫以豪賢故棄捐素所愛也左傳羇旅之臣漢書張晏注羇寄旅客也鰲按詩詠白絲即墨子悲素絲意也巳悲素質隨時染當其渲染之初便是汗汚之漸及其見置時欲保素質得乎唯士守貞白則不隨人榮辱矣此風人有取於素絲歟陪鄭廣文遊何將軍山林十首鶴注鄭䖍膺博士之命在天寳九載以詩中第五首考之是公未定官時遊此當在十一二載間東方朔傳竇太主曰回與枉路臨妾山林注園中有山故言山林通志少陵原乃樊川北原自司馬邨起至何將軍山林而盡其高三百尺在杜城之東韋曲之西俗呼為墖陂不識南塘一作唐路今知第五橋名園依緑水野竹上上聲青霄谷口舊相得濠梁同見招平生為去聲幽興去聲未惜馬蹄遥首章領起乃未至而遥望之詞橋上四何氏山林下四陪鄭同遊自塘至橋畔有園園中有竹層次如畫谷口指鄭濠梁指何林趙汸曰何於鄭為舊交因而并招及已但以素有山幽意故作此遊非輕赴人招也説得曲折微婉南杜臆末拈幽興為十首之綱世説祖逖曰昨夜復塘一遊此借其字朱注許渾詩云背嶺枕南塘意亦在韋曲左右有通志韋曲之西有華巖寺寺西北有雁鶩坡坡西北第五橋張禮遊城南記第五橋在韋曲西以姓得名人世説王子敬自㑹稽經吳顧辟疆有名園先不識主徑徃其家梁魏文帝詩菱芡覆緑水路庾肩吾詩野竹交臨浦王訓詩石橋通小澗竹上青霄谷口用鄭子真事注見首巻稱莊子莊子與惠子同遊濠梁之上吳論園以水勝故濠梁陶潛詩山澤乆見招陳子昻詩山深興轉幽不盤中詩何惜馬蹄歸數趙汸曰凡一題而賦數首者須首尾布置有起有結每章各有主意無繁複不倫之失乃是家數觀此十章及後五章可見隰王嗣奭曰山林與園亭異依山臨水連邨落包原溷樵漁王右丞輞川似之非止一丘一壑之勝而巳合觀十首分明一篇遊記有首有尾中間或賦景或寫情經緯錯綜曲折變化用正出竒不可方物馬吳門顧氏曰首章言馬蹄四章言没馬八章言走葢此遊有馬無舟故柁樓疑越刺船思郢乃虚擬舟楫之趣非實事也為黄生曰首章敘入何鄭他人不免費手此能引古喻語不繁而意巳明何等簡淨百頃風潭上千章草堂本作重夏木清卑枝低結子接葉暗巢鶯鮮鯽銀絲鱠香芹碧澗羮翻疑柂徒可切樓底晚飯越中行二章誌林中景物之勝景首二為綱三四承夏木五六承風潭末乃觸而念昔遊風潭覆以夏木見其蕭森可愛乃朱注卑枝接葉二句古人所謂疊韻詩食有芹鯽初到而留飲末云晚飯葢至暮而留宿矣廣庾信詩交柯乍百頃擢木或千尋拂黄希曰潭當是濟潭在萬年縣祖孫登詩風潭如鏡山溜似調琴夏史記貨殖傳山居千章之荻注大樹曰章陶潛詩木獨森疎方氏疑卑低二字犯重然古人亦所不避太白詩云玉窗青青下落花下落兩字不免犯重但下就窗前言落就花片言亦自有别列子鴻鵠高飛不集卑枝葉孫擢詩晚花猶結子色周景式孝子傳三荆同株接連隂銀絲鮮鱠之碧澗芹草所生廉洛陽伽藍記王肅至魏飯鯽魚羮菜酉陽雜俎南孝善斫膾絲縷輕可飛呂氏春秋之美者雲夢之芹説文楚葵水芹也今水中芹菜一名水英謝靈運詩銅陵映碧澗庾信詩翻疑承毒水南方大船尾有柁樓仲長統詩微風為柁公年二十時曾遊吳越萬里戎王子何年别月支異花來舊作開犯重杜臆作來蓋音近而訛耳絶域滋蔓匝清池漢使去聲徒許作慚空到神農竟不知露翻兼雨打開拆漸别作漸一作日離披三章記林間花卉之竒首記花名次記花種五六承異花見其可貴七八承滋蔓憐其易謝不擕此種故曰空到本草弗載其名故曰不知張騫杜臆開拆頂露翻離披頂雨打類本草日華子云獨活一名戎王使者戎王子當是其朱子語類未知何種鶴曰加一戎字言其來自戎中猶云戎菽戎葵杜臆人競珍之故猶稱戎王子胡夏客曰外國王子入居内地擕有其土異花何將軍得其種也此説戎王子是借人稱花漢書注月支西域外國也舊唐書肅州酒泉郡漢月氏國地氏音支使水經注水側生異花巳李陵書出征絶域左傳無滋蔓王儉詩蘭生匝苑子虚賦游於清池離史記漢使至宋玉九辯奄披此梧楸初疑第五句空字上不應用徒字後見許彦周詩話作漢使慚空到但慚字又下得太實楊升菴云古人用字有不嫌重者左傳十年尚猶有餘臭猶即尚也書經弗遑暇食遑即暇也據此則徒空不妨連用矣若實字便不當疊用太白懷張子房詩我來圯橋上却是言橋橋可乎旁舍連高竹疎籬帶晚花碾渦湥没馬藤蔓曲藏一作垂蛇詞賦工無一作何益山林跡未賒盡捻捻正異作拈奴兼切書籍賣來問爾東家四章羨林傍幽僻之致工上四寫景下四敘情上四以整鍊為下四以蕭疎見致俱有章法賣没馬是實事藏蛇是想像云杜臆公獻賦不售故欲書買宅乃憤激之詞此晚花七章言清晨白日見其次第疎漢書高祖適從旁舍來地梁簡文帝詩晚花欄下照螢簟上飛莊子輪碾西京賦當足見碾值轂被轢此言碾轍底陷處水漩成渦偶舉所見以入詩如壞道哀湍瀉亦然杜臆謂園水周圍曲繞狀如碾槽之渦不蕭琛詩奕奕工辭賦粲古詩虚名復何益未賒言逺魏志蔡邕見王曰此王公孫也有異才吾家書籍文章當盡與之鄭捻指取物也邴原傅原遊學詣孫崧崧曰君鄉里君學者之範模也君乃舍之所謂以鄭君為東家丘也原曰以鄭君為東家丘以僕為西家愚夫耶王筠詩微步出東家東家指何氏剰郭作賸趙云賸俗作剰水滄江破殘山碣石開緑垂風折笋紅綻雨肥梅銀甲彈筝用邵本作卸金魚一作盤非換酒來興去聲移無灑去聲埽去聲隨意坐莓苔五章見山林景物而喜逢豪飲在四句分截言此間穿池壘石特大地中剰水殘山耳其勢之雄濶足以破滄江而開碣石烹笋摘梅園中佳品彈筝换酒將軍豪興故復移席苔前以享其用意之殷勤之申涵光曰起語近纎五六太板唐書有殘膏賸馥句隋煬帝詩日落滄江靜折庾信謝滕王啟蒲桃繞館始開碣石之池本是風笋而緑垂雨肥梅而紅綻乃用倒裝句法耳曽沈佺期詩園槿綻紅艷有古詩十五學彈筝銀甲不卸以銀甲作指甲取其聲晉書阮孚為散騎常侍常以金貂換酒罷唐車服志佩魚始高宗朝武后改佩魚為龜中宗初龜袋復給魚楊慎曰高宗初用佩魚以鯉為李也武后改用龜龜屬𤣥武也杜詩金魚換酒來此時仍用魚矣李白贈賀知章云金龜換酒處葢係徃時舊物耳盧照隣詩金貂有時須換酒漢陳蕃傳薛勤謂蕃曰孺子何不灑掃以待賓客後庾信賦細草横階隨意坐石天台山賦踐莓苔之滑王嗣奭曰通首散漫寫去無起束呼應另是一格亦縁十首自有大起結此首如中聨也又曰銀甲二句見其好客而貧何本武人而風致不減賀季真尤為難得後人霑丐杜詩皆成佳句杜有春色醉仙桃句陳簡齋云暖日薰楊柳濃隂醉海棠杜有紅綻雨肥梅句范石湖云梅肥朝雨細茶老暮煙寒各見脱化之妙風磴丁鄧切吹隂一作梅非雪雲門吼瀑蒲木切泉酒醒思卧簟衣冷欲一作得裝綿野老來看平聲客河魚不取錢秪一作只疑淳樸處自有一山川六章狀山林高寒而美其淳樸亦四句分截風磴而吹隂雪者乃雲門之吼瀑泉也以下句解上句葢夏本無雪飛瀑遥濺乍疑是雪耳酒醒方思卧簟而衣冷反欲裝綿言夏日隂森也野老看客饋以河魚即此見風土淳樸與他處不同洪注另有一山川暗用桃花源事鮑照詩既類風門磴劭孔融詩高明躍雲門野山海經廬山有瀑布泉應藝文志注年老居田相民耕種故稱野老丘遲詩野老時一望倉淮南子河魚不得明目晉樂曲酤酒不取錢亢子政省則人淳樸川陶潛詩山一何曠梀音色一作棘樹寒雲色茵蔯春藕香脆添生菜美隂益一作蓋食單一作簞非涼野鶴清晨出一作至山精白日藏石林蟠水府百里獨蒼蒼七章記山林物産而歎其景幽亦四句分截茵蔯之脆得生菜而加美栜樹之隂展食單而倍涼次聨分頂野鶴晨出言其超曠山精晝藏言其湥邃百里之内獨見蒼蒼甚言石林之高聳非謂何林有百里也小此云晨日下二章言晚言夜次第又相聨絡栜棘乃棗棘下鋪單頗無佳致當是梀樹詩正義白色為梀赤梀為桋郭璞曰赤梀葉細而岐鋭白梀葉員而岐大木也陶潛詩寒雲没西山氏本草茵蔯蒿類經冬不死更因舊苗而生故名之趙以單為鋪地之單乃布單也邵氏以單為盛器簞乃竹筐也謂方曰笥圓曰簞朱氏從前説鄭望善夫録韋僕射巨源有燒尾宴食單世説昻昻如野鶴之在雞羣四秦嘉詩清晨當引邁庾𤣥中記山精如人一足長三尺食山蟹夜出晝藏信詩山精鏤寶刀石林叢石如林也楚辭焉有石林一述異記漢沔㑹流處岸上有石銘云下至水府三十里皆傳李斯刻此石梁江淹詩山氣亘百里蕭統詩漸見岫蒼蒼王嗣奭曰公恣意㝠搜觸目成趣粗亦成精近不遺逺隨意命筆變幻生動如此憶過平聲楊柳渚走馬定丁令切昆池醉把青荷葉狂遺白接䍦剌郎達切船思郢客解下戒切水乞欺吉切王原叔本作丘既切非吳兒坐對秦山晚江湖興去聲頗隨八章因水府而旁記遊迹上四實景下四虛摹巾山林勝遊留連累日故柳渚昆池亦皆經過折荷脱醉時狂態刺船解水走馬而思泛舟也曹植詩走馬長楸道定唐書安樂公主傳嘗請昆明池為私沼不得乃自鑿昆池張禮游城南記池在韋曲之北定昆池既在韋曲之北楊柳渚亦當在其傍以酉陽雜俎魏鄭公慤取大荷葉置硯格上盛酒三升簪刺葉令與柄通傳吸之名碧筒杯按池有荷葉醉中把此為戲顧氏以為飲器之名非是漢招商歌青荷晝偃葉夜舒䍦晉山簡傳時人歌曰時時能騎馬倒著白接䍦白接白巾也爾雅注白鷺翅上有長翰江東取為接䍦王洙曰郢客善操舟吳兒善泅水郢莊子刺船而去山濤詩刺船蓮花浦郢客思遨遊乃楚之都解水識水性也爽謝朓詩吳兒本習水歌笑輕波瀾梁高詩坐對空寂宇秦山即終南山諸家以上六句為追敘舊遊非也此遊本在夏時而把荷解水亦正言夏日事豈指平時遊厯耶諸章言鮮鯽香芹言緑笋紅梅言生菜食單言醉把荷葉知園中留飲非一日矣此章所憶經過興㑹葢同屬遊園事也牀上書連屋階前樹拂雲將軍不好去聲武稚子總能文醒酒微風入聽平聲詩靜夜分絺衣掛蘿薜涼月白紛紛九章宿何園而記其韻事不上四見主人儒雅下四言夜景清幽首句屬賦起好武次句屬比起總能文誦顧注五六乃倒裝本言風入而酒醒夜分猶聽詩也詩者必何氏子弟趙汸注微風涼月不作對耦轉換開闔意態無窮此所謂大家數也傅南史蕭恭傳仰眠床上看屋梁而著書世説謝太問諸子姪子弟亦何預人事而正欲使其佳謝車騎曰譬如芝蘭玉樹欲使其生於階庭耳顔氏家訓漢郎顔駟自稱好武更無事迹能歸去來詞稚子候門愈前漢賈誼傳諸生於是以為文風賦清清泠泠病析酲嵇康詩微風動袿禮静夜分夜中分出更漏也魏文帝詩静夜不能寐周以星分夜韓非子夜分而聞皷新聲者薜茘女蘿見楚辭岑文本詩雕樓網蘿薜紛王融詩壁門涼月舉言月穿蘿薜影著絺衣者紛零落也張正見詩紛紛白雪綺窗前劉㑹孟謂將軍好文亦見世變杜臆謂此治終亂始之機皆非也明皇好大喜功致將帥開邉啟釁黷武而殃民公詩健兒寧鬬死壯士恥為儒葢傷之也何將軍不好武正與邀功生事者有别少陵豈肯譏之耶宋明之世以將不知兵而亡天寳之時以將好用兵而亂事勢不同未可槩論劉之謬於説詩徃徃如此幽意忽不愜歸期無奈何出門流水住一作注回首白雲一作雜花非多自笑燈前舞誰憐醉後歌秪應平聲與朋好風雨亦來過平聲之十章總結乃出門以後情事前首二惜别情三四别後之景五六回憶事七八豫訂重遊笑幽意不愜為迫於歸期耳兩句起勢突兀舞曰自歌曰誰憐無復林中豪興矣故須再過以慰寂寥朋好指鄭廣文思江淹詩寂寞幽意長歸世説左太冲作三都賦初意甚不愜宋之問詩期多年歲住莊子為之奈何劉易出門同人歸庾信詩畫水流全圖雲色半輕顯詩回首望途左思詩白雲停隂岡全劉邠曰古人多歌舞飲酒張燕公詩云醉後歡更好勝未醉時動容皆是舞出話總成詩李白云要須回舞袖拂盡五松山醉後涼風起吹人舞袖環今時舞者必欲曲盡竒妙又恥效樂工藝益不復如古人常舞矣古人重歌詩自隋以前南北舊曲頗似古如公莫舞丁督䕶亦自簡淡唐來是等曲又不復入聽矣近世樂府為繁聲加重疊謂之纒聲促數尤甚固不容一唱三歎也沈約詩心從朋好盡杜臆風雨用谷風詩語盧元昌曰公自留贈崔于後還鄉之斾故山興濃貧交之歎白絲之悲既有慨乎言之何將軍於裘馬困頓時獨有濠梁見招之舉得非城東種𤓰之客㶚陵射虎之人歟宜公於遊覽之下記敘特詳也麗人行鶴注天寳十二載楊國忠與虢國夫人鄰居第徃來無期或並轡入朝不施障幕道路為之掩目冬夫人從車駕幸華清宮㑹於國忠第於是作麗人行此當是十二年春作葢國忠於十一年十一月為右丞相也三月三日天氣新長安水邊多麗人態濃意逺淑且真肌理細膩骨肉匀繡一作畫羅衣裳照英華作朝莫同暮春蹙金孔雀銀麒麟頭上何所有翠微英華作為㔩音罨烏合切英華作匌音洽葉垂鬢唇背一作身後何所見珠壓腰衱其輒切一作襻英華作枝穩稱去聲身此詩刺諸楊遊宴曲江之事首敘遊女之佳麗也三言丰神之麗四言體貎之麗五六言服色之麗頭背四句舉上下前後而通身之華麗俱見得本寫秦虢冶容乃槩言麗人以櫽括之此詩家含蓄體處徃周禮女巫掌歲時袚除釁浴注如今三月三日上巳水上之類晉書禮樂志魏以後但用三日不復用巳劉尊詩三月三日咄泉水趙曰晉宋諸人侍宴曲水皆以三月三日為題唐開元中都人遊賞於曲江莫盛於中和上巳節神王右軍蘭亭曲水序天朗氣清惠風和暢曹植洛賦覩一麗人於巖之畔王績三月三日賦聚三都之麗人王劉緩詩日日態還新淑庾信答趙王啟飄飄意逺粲神女賦何産氣之真濃如紅桃裛露逺如翠竹籠烟淑如瑞日祥雲真如澄川朗月一句中寫出絶世丰神東京賦擘肌分理楚辭招魂靡顔膩理又豐肉微骨神周甸注肌膚腠理細嫩而膩滑骨肉匀肥瘠相宜也女賦穠不短纎不長即骨肉匀也盧古詩被服羅衣裳錦南都賦暮春之氣元巳之辰肇柘枝舞賦靴瑞以雲匝袍蹙生而雁欹趙曰杜牧自謂其詩蹙金結綉知蹙金乃唐人常語周注孔雀竒禽麒麟瑞獸衣上所繡物色胡夏客曰唐宣宗嘗語大臣曰𤣥宗時内府錦襖二飾以金雀一自御一與貴妃今則卿等家家有之矣此詩所云葢楊氏服擬於宮禁也布辛延年詩頭上藍田玉匌趙曰翠微㔩葉言翡翠微於㔩綵之葉若作翠為葉則以翠為匌匝之葉也杜曰廣韻㔩綵婦人髻飾花也即鬢唇鬢邊也晉書阮孚傳以著背後趙曰腰衱今之裙帯綴珠其上壓而下垂也吳注爾雅衱謂之裾郭璞云衣後裾也穩稱身不徒以其服美矣劉緩詩袜小稱腰身紫琅玕之勢趙曰此四句即曹植頭上金雀釵腰佩楊慎謂松江陸湥見古本尚有二句足下何所著紅蕖羅鞿穿鐙銀今按兩段各十句為界限添此反贅就中雲幕椒房親賜名大國虢與秦紫駞之峰一作珍出翠釡水精之盤行素鱗犀筯厭飫乆未下去聲鸞刀縷切空一作坐紛綸黄門飛鞚不動塵御厨絡繹英華作絲絡送八珍簫管一作鼔哀吟感鬼神賓從去聲雜一作合遝音沓實要津次誌秦虢之華侈也駝峯二句言味窮水陸犀筯二句言飲食暴殄黄門二句言寵賜優渥簫管言聲樂之盛賓從言趨附者多杜臆態濃八句極狀姿容服飾之盛而後接以就中雲幕二句紫駝四句極言肴饌品物之美而後接以黄門飛鞚二句皆倒揷法唯杜善用之雲庾信詩就中言不醉三西京雜記成帝設雲幄雲帳幕於甘泉紫殿世謂雲殿周注雲幕謂鋪設幕帳如雲霧也都三輔黄圖椒房殿在未央宫以椒和泥塗壁班固西賦後宫則掖庭椒房后妃之室漢官儀曰皇后稱椒房取其蕃實之義也詩云椒聊之實蕃衍盈升又以椒塗宫室亦取其温暖辟除惡氣韓舊唐書太真姊三人皆有才貌竝封國夫人大姨封國三姨封虢國八姨封秦國通鑑適崔氏者為韓國適裴氏者為虢國適柳氏者為秦國鶴注明皇雜録上幸華清宮貴妃姊妹競飾衣服共㑹於國忠第同入禁中炳煥照燭觀者如堵及上巳修褉亦必爾也有洙曰漢書大月氏本西域國出一封槖駞注云脊上一封高也如封土然今俗呼為犎酉陽雜俎衣冠家名食有將軍曲良翰作駞峯炙味甚美王績遊北山賦拭丹爐而調石髓裛翠釜而出金精覽周注三輔黄圖董偃以水精為盤貯冰同色太平御交州雜事太康四年刺史陶璜表送林邑王所獻縹紺水精盤各一枚有王廙笙賦舞靈蛟之素鱗酉陽雜俎明皇賜禄山金平脱犀頭匙筯無楚辭時厭飫而不用兮傳晉書何曾日食萬錢猶曰下筯處詩執其鸞刀云鸞刀刀環有鈴割中節也西征賦饔人縷切鸞刀若飛人嵇康詩隨波紛綸客漢百官表注禁中黄門謂閹居禁中在黄門之内給事者鮑照詩飛鞚越平陸通俗文制馬口曰鞚王莽傳絡繹道路周禮膳夫珍用八物注珍用淳熬淳母炮豚炮牂㹗珍漬熬肝膋也鳴漢武帝秋風詞簫鼓鳴兮發棹歌曹植七啟簫管齊又詩過庭長哀吟輿詩序動天地感鬼神莫近於詩遝魏文帝與吳質書輪徐動賓從無聲劉向傳雜衆賢要古詩先據路津後來鞍馬何逡巡當軒一作道下去聲馬入一作立錦茵楊花雪落覆敷救切白蘋青鳥飛去銜紅巾炙手可熱勢一作世絶倫慎莫近英華作向前丞相去聲瞋末乃指言國忠形容其烜赫聲勢也行秦虢前行國忠殿後鞍馬逡巡見擁䕶填街按轡徐之象當軒下馬見意氣洋洋旁若無人之狀楊花青鳥㸃暮春景物見唯花鳥相親遊人不敢仰視也一時氣燄可畏如此末句仍用倒揷作收朱注國忠與虢國為從兄妹不避雄狐之刺故有近前丞相瞋之語葢微詞也此章前二段各十句後段六句收地曹植詩遊馬後來告鮑照詩賓御紛颯沓鞍馬光照莊子逡巡而却之王融詩當軒巻羅縠丘古詩為焦仲卿妻下馬入車中雪錦茵謂地鋪錦褥遲詩舒心謝錦茵七命素膚落廣雅楊花入水化為萍爾雅翼萍之大者曰蘋五月有花白色謂之白蘋張華詩白蘋開素葉隋煬帝江南曲絮飛晴雪暖風時此即楊花落雪之意用趙曰青鳥應如鸚鵡之類豢養馴熟飛銜紅巾此借西王母青鳥也薛道衡詩願作王母三青鳥飛來飛去傳消息漢武故事七月七日上於承華殿齋坐中忽有青鳥從西方來集殿前有頃王母至有二青鳥如烏夾侍王母旁婦梁元帝咏柳枝邊通粉色葉裏映紅巾趙注紅巾葢人之飾黄注巾葢樹間所掛之綵季崔灝詩莫言炙手手可熱兩京新記安樂公主上之妹也附㑹韋氏熱可炙手道路懼焉趙曰炙手可熱言勢熖薰灼通桓驎詩超等絶倫晉樂府詞當年近前面發紅鑑天寶十一載十一月以楊國忠為右相兼文部尚書欲玉臺新詠引漢桓帝時童謡曰撫梁之下有懸鼓我擊之丞相怒瞋怒之瞋從目音稱人切陳餘傳瞋目張膽嗔字從口音田盛氣貌詩振旅嗔嗔二字音義本異杜却通用周敬曰鋪敘得體氣脉條暢的從古樂府摹出另成少陵樂府盧元昌曰中云賜名大國虢與秦後云慎莫近前丞相嗔玩此二語則當時上下驕淫凟倫亂禮巳顯然言下矣陸時雍曰詩言窮則盡意䙝則醜韻軟則庳杜少陵麗人行李太白楊叛兒一以雅道行之故君子言有則也又曰色古而厚㸃染處不免墨氣太重虢國夫人詩云承恩入朝乃虢國得寵時作依類編入當附麗人行之後但未定何年耳首朱注此詩見草堂逸詩據張祜集作集靈臺二又萬首唐人絶句作張祐三體詩唐詩品彚亦作張祜集靈臺與紫微殿相近之今按祜乃中唐人去天寶巳乆若作追憶虢國詞亦當微帶亂後事詩意全不及之還是譏諷現在應屬少陵作也唐后妃傳楊貴妃三姊長韓國三虢國八秦國並承恩入宫掖通鑑至德二載貴妃縊死於佛堂虢國夫人及其子裴徽走至陳倉縣令薛景仙帥吏士追捕誅之虢國夫人承主恩平明上上聲馬入金門却嫌脂粉涴鳥卧切顔色澹掃蛾睂朝音潮至尊乍讀此詩語似稱揚及細玩詩㫖却諷刺微婉曰虢國濫封號也曰承恩寵女謁也曰平明上馬不避人目也曰淡掃蛾睂妖姿取媚也曰入門朝尊出入無度也當時濁亂宮闈如此巳兆陳倉之禍矣一旦紅顔委地白骨誰憐徒足貽臭千古焉耳王褒講德論主恩滿溢程史記張良傳平明與我㑹此漢搜神記上馬赴前前漢書厯金門上玉堂後陳蕃傳脂油粉黛妃廣韻涴泥着物也修楚國策顔色變作宫楊妃外傳有姊三人皆豐碩整工於謔浪毎入中移晷方出虢國不施粧粉自衒美艷常素面朝天似掃畫睂也詩螓首蛾睂蛾之睂曲而細美人之睂之過秦論履至尊而制六合九日曲江當是天寶十二載作葢十三年九日有寄岑參詩十四年九日有楊奉先詩此詩葢在前也時公年四十有二故云百年巳半綴席茱茰好浮舟菡户敢切萏徒感切衰所追切百年秋巳半一作季秋時欲半九日意兼悲江水清源曲荆門此路疑晚來一作年非高興去聲盡揺蕩菊花期杜臆此章即老去悲秋之意上四拈九日所感在身老故有兼悲之歎下四拈曲江所傷在落魄故有揺蕩之嗟通首將一景一情兩截重敘虛實相間格杜集頻用之茱此詩乍看似乎直致須抑揚説來方見曲折生動言萸雖好而菡萏已衰不覺悲秋悲老兼集意中也且江上此遊彷彿荆門勝㑹而揺蕩花期者猶是去秋故吾浮沉身世又可悲巳荆楚歲時記茱萸一名藙九月九日熟味辛色赤拆其房揷頭可辟惡氣曹植詩茱茰自有芳爾雅荷芙蕖其華菡萏洙曰蓮莖為茄葉為荷花為菡萏蓮根為藕劉楨詩菡萏溢金塘張正見詩百齡倐忽半屈原逺遊軼迅風於清源兮東九域志江陵府龍山上有孟嘉落帽臺其地在荆門宋之問詩邪溪此路通李百藥詩晚來風景麗摇殷仲文詩獨有清秋日能使高興盡云上林賦與波蕩荆楚歲時記九日為菊花㑹故菊花期續齊諧記費長房謂桓景曰九月九日汝家有厄急去令家人各作絳囊盛茱茰以繫臂登高飲菊花酒則此禍可除武衛將軍補註後人崇尚杜詩於鍊字鍊句鍊格莫不取法焉如杜銛鋒行愜順猛噬失蹻騰上二字用漢書作對王介甫云一水䕶田將緑遶兩山排闥送青來借用漢書字而語尤工巧杜洛城一别四千里胡騎長驅五六年將地里年數作對柳子厚云一身去國六千里萬死投荒十二年蘇子瞻云故山西望三千里徃事回思十二年亦本杜句但杜以兩語領全詩柳蘇只中間敘述耳杜鄭駙馬宅宴詩上尾用薄麓谷乃同韻字唐末章碣詩東南路盡吳江畔正是窮愁暮雨天鷗鷺不嫌斜雪岸波濤欺得逆風船偶逢島寺停㠶看湥羡漁翁下釣眠今古若論英達算鴟夷高興固無邊七律中隔句用韻並為竒格但杜出之無心而章却摹倣有意也杜詩詳註巻二
