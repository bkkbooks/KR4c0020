body:
  text: 杜詩詳注卷五翰林院編修仇兆鰲撰送率音帥府程録事還鄉原注程擕酒饌相就取别鶴注謂乾元元年在諫省作據詩云內愧突不黔則非為拾遺時矣當是天寶十五年春作唐六典太子左右衛率府有録事參軍鄙夫行衰謝抱病昏忘一作妄集常時往還人記一不識音志十程侯晚相遇與語才傑立薰然耳目開頗覺聰明入首言衰病遇程精神頓豁東杜臆公非真昏忘待尋常不經意人則如是耳都賦鄙夫寡識前漢彭宣傳數伏疾病昏亂遺忘南史劉顯傳沈約曰老夫昏忘聊記數事不可至十家語孔子遇程子於途傾蓋而與之語終日角才傑立才氣卓立也沈佺期詩彼美稱才傑徐稚傳立傑出薰乃薰炙之意韓詩外傳齊桓公得管仲隰朋曰吾得二子也吾目加明吾耳加聰千載上聲得鮑叔末契有所及意鍾一作中老柏青義動修蛇蟄若人可數音朔見慰我垂白泣告一作生别無淹晷百憂復扶又切相襲此敘交誼相投下二惜别之意可意鍾青柏言交情長久義動蟄蛇言豪氣激發此正方鮑叔處史記管仲曰生我者父母知我者鮑叔易陸機歎逝賦託末契於後生杜淮南子封豨修蛇龍蛇之蟄以存身也前漢欽傳紅陽侯書誠哀老姊垂白注白髮下垂也鮑照詩垂白對講書陸機詩序悼心告别內愧突不黔庶羞以一作庶明似賙給素絲挈長魚碧酒隨玉粒途窮見交態世梗悲路澀東風吹春冰泱漭一作莽后土濕此敘周恤之情下二臨别時景樂飲過三爵緩帶傾庶羞揚子墨突不黔妻曹植詩漢人為焦仲卿詩宛轉素絲繩之杜修可曰酒譜安期先生與神女㑹於圜丘酣𤣥碧酒戰國策粒米如玉沈約詩玉粒晨炊華燭夜炳未鄭當時傳一貧一富乃知交態復潘尼詩世故尚夷崤函方路澀謝朓詩晨光泱漭念君惜羽翮既飽更思戢莫作翻雲鶻胡骨切聞呼向禽急末則送别丁寧囑其歸而斂才也方朱注上云與語才傑立録事必負才敢為者然世難殷當思斂戢故又以向禽之鶻戒之鶻此章前三段各八句末段四句收盧注聞人呼則向禽而擊鄭駙馬池臺喜遇鄭廣文同飲此詩當作於至德二載之春是年正月安慶緒殺祿山故詩中有燃臍句想此時賊黨稍縱降官鄭得回京也黃鶴疑公與䖍皆被拘東都因飲駙馬池臺按公在長安未嘗至東都恐長安别有鄭駙馬池臺不必指河南新安之池臺又是年九月克復西京十二月詔定從僞者之罪䖍貶台州司户若乾元二年春公在諫省不應與之同飲流連矣表盧注題曰廣文稱舊官其志也不謂生戎馬何知共酒杯燃臍郿塢敗握宋景文作秃節漢臣回白髮千莖雪丹心一寸晉作片灰首敘廣文回京遇平時不謂遭亂亂何知復聚喜處含悲二語攝起全意燃臍握節幸其脫賊而來白髮丹心明其憂在君國也道德經天下無道戎馬生於郊殺後漢書董卓築塢於郿高厚七尺號萬歲城及吕布卓尸卓於市天時始熱卓素充肥脂流於地守尸吏燃火置卓臍中光明達曙使唐書至德二載正月嚴莊與祿山子慶緒謀殺祿山帳下李猪兒以大刀斫其腹腸潰於牀而死事與卓類當時䖍陷賊中僞授水部詐稱風緩以密章達靈武蓋雖身在賊庭而志存王室故以蘇武比之乃朝以道家有宋子京手書少陵詩一卷握節漢臣回是秃節考本傳云蘇武仗漢節牧羊卧起持旄節盡落留十九年而還楊升菴引張衡傳蘇武以秃節效貞為證今按秃節雖本張衡傳然握節字却有三據左傳襄公之難公子卭握節以死晉書王機傳機入廣州郭訥衆皆散乃握節避機機就訥求節訥歎曰昔蘇武不失其節前史以為美談祖孫登詩握節暮看羊公詩蓋兼用之且蘇武在外多年故節旄秃落鄭陷賊止一年自當從握節也寸宋之問詩鬒髮俄成素丹心巳作灰傅𤣥詩丹心為傷别離經死一作此地披寫忽登臺重平聲對秦簫發俱過平聲阮宅一作巷來留連一作醉留春夜舞一作席淚落强豈兩切一作更徘徊一云醉連春苑夜舞淚落徘徊乃此記同飲心事交次句㸃池臺三四駙馬叔姪末悲歡離合一時集之情仍與章首相應𤣥此章兩段各六句披韓信傳陷之死地而後生桓書忝任在逺是以寫事實朓晉書阮籍與兄子咸居道南諸阮居道北如齊書謝傳留連晤對古詩為焦仲卿妻淚落便寫楚辭周徘徊以漢渚自京竄至鳯翔喜達行在所從英華諸本無上六字朱注舊書至德二載肅宗自彭原幸鳯翔時改扶風為鳯翔郡按舊注公自京竄至鳯翔在至德二年夏四月漢書武帝紀徵詣行在所蔡雍獨斷曰天子以四海為家謂所居為行在所顔注當是行所在所也西憶岐陽信無人遂却回眼穿當一作看落日心死著涉略切寒灰茂英華作茂别作霧樹行相引連山趙作連山一作蓮峯望忽一作或開所親驚老瘦辛苦賊中來首章自京赴鳯翔著眼穿落日承西憶心寒灰承無人依樹傍山間道奔竄之跡辛苦賊中親知驚問之詞岐陽即鳯翔在長安之西故云西憶輿地廣記岐陽縣漢美陽縣地詩所謂居岐之陽即此唐省入扶風縣為岐陽鎮却回謂退回之人莊子心可如死灰乎鮑照詩寒灰滅更燃朱劉向新序晝遊乎茂樹蓮峰舊注指華州蓮花峯注云公自金光門出西歸鳯翔不應走華隂道當依趙次公作連山為是謝朓詩遙樹匝清隂連山周逺淨漢書注所親素所親任也曹植詩果得心所親之李陵書不顧流離辛苦補注黃生曰岐陽信望官軍再舉唯眼穿心死因始為脫身之計也愁思去聲胡笳夕凄凉漢苑春生還今日事間去聲道暫時人司隸章初睹南陽氣巳新喜心翻倒極嗚咽入聲淚一作涕沾巾下二章喜達行在所生此承上賊中來故接以愁思胡笳夕今日還得覩中興氣象間道暫免尚覺嗚咽傷心三四分領下段說出喜極而悲人苑中花木之地春尚凄凉以賊兵蹂躪其中也暫時謂生死懸於頃刻沈秦嘉詩愁思難為數輔蔡琰詩胡笳動兮邊馬鳴約詩凄凉霜野三黃圖漢有三十六苑通鑑祿山使安忠順將兵屯苑中以鎮關中漢書班昭上書乞超生還復見闕庭又班超從間道至疏勒注間道伺其間隙之道而行舊光武紀更始以帝行司𨽻校尉置官屬作文移一如章傅亮進宋元帝詔東京父老重覩司隸之章陵光武紀望氣者蘇伯阿為王莽使至南陽遙望見春郭唶曰氣佳哉鬱鬱葱葱路翻倒翻喜為悲也木蘭詩喜極成悲傷說蔡琰詩行亦嗚咽曹植哀詞淚流射而霑巾世桓𤣥以手巾掩淚死去憑誰報歸來始自憐猶瞻太白雪喜遇武功天影靜千官一作門裏心蘇七校前今朝漢社稷新數所主切中張仲切興年此承上暫時人故接以死去憑誰報班瞻雪遇天幸依行在矣千官七校親覩朝矣新數中興從此治安矣皆寫出破愁為喜耳趙汸注脫一生於萬死在道時猶不覺及歸乃自憐起語悲痛奔波初定故曰影靜精神頓爽有似心蘇官指文臣校乃武衛陶潛詩死去何所道報報信也陶詩歸來夜未央魏顧注前曰生還此曰歸來總以君之所在為歸耳文帝詩私自憐兮孤棲地圖記太白山甚高上常積雪無草木辛氏三秦記太白山在武功縣南去長安三百里録異記金星之精墜於終南號為太白其精化為白石狀如美玉常有紫氣覆之唐書鳯翔府郿縣有太白山長安志京兆武功縣以武功山得名三秦記武功太白去天三百曰武功天至此得見天日也荀子古者天子千官漢書嚴助傳奉千官之供內蘇蘇醒也中漢書京師有南北軍屯至武帝平百越增七校壘屯騎步兵越騎長水胡騎射聲虎賁凡八校尉胡騎不常置故言七校使詩以永今朝陸東臯雜録毛公詩序蒸民任賢使能周室中興焉德明釋文讀去聲故杜云新數中興年又百年垂死中興時黃生曰公若潛身晦跡可徐待王師之至必履危蹈險歸命朝廷以素負匡時報主之志不欲碌碌浮沉也間趙汸注題曰喜達行在所而詩多追說脫身歸順關跋涉之情狀所謂痛定思痛愈於在痛時也自今按首章曰心死次章曰喜心末章曰心蘇脉絡相照應首章見親知次章至行在末章對朝官次第又有淺深送樊二十三侍御赴漢中判官此是至德二載初赴行在時作肅宗在鳯翔兩京未恢復故有頓兵岐梁二京未收之句公尚未拜拾遺故云我無匡復資唐書漢中郡屬山南道本梁州漢川郡天寶元年改漢中郡興元元年升為興元府威弧不能弦自爾無寧歲川谷血橫去聲流豺狼沸相噬首歎天寶致亂之由弦明皇不能早除祿山以致禍亂連年故云威弧不能自爾無寧歲易弦木為弧剡木為矢弧矢之利以威天下揚雄河東賦彏天狼之威弧國語自子之行晉無寧歲法言原野厭人之肉川谷流人之血孟子洪水橫流後漢張綱曰豺狼當道天子從北來長驅振凋敝頓兵岐梁下却跨沙漠裔二京陷未收四極我得制蕭索一作瑟漢水清緬音勉通淮湖一作河稅此言肅宗興復之勢靈武在鳯翔之北故曰北來岐梁二山在鳯翔境內王師在焉沙漠裔回紇方許助兵也四極制四方猶奉唐朔也漢水連接淮湖當時貢賦得以不絶矣二句切漢中凋陳琳書長驅山河朝至暮捷漢書酷吏傳吏民益敝諸葛武侯遣陳震往吳論頓兵相持漠杜篤論都賦衍陳於岐梁李陵詩經萬里兮度沙中國之有外夷猶衣之有裔也西晉書儒林傳二京繼踵以淪胥祝爾雅東至於泰逺至於邠國南至於濮沿北至於栗謂之四極漢禮樂志四極爰輳師古曰四方極逺之處也阮籍詩蕭索人所悲漢書注索盡也漢水在漢中舟緬逺也引西都賦東郊則有通溝大漕潰渭洞河泛山東控淮湖通鑑至德元載十月第五琦請以江淮租庸市輕貨泝江漢而上至洋州令漢中王瑀陸運至扶風以助軍上從之使去聲者紛星散王綱尚旒綴南伯從事賢君行立談際坐一作生知七曜厯手畫三軍勢冰雪淨聰明雷霆走精鋭此言侍御才堪經世指使者星散經營邊事也王綱旒綴人心繫屬也南伯漢中王瑀從事指府中幕僚立談起下四句聰明承七曜精鋭承三軍此稱其智勇過人世杜臆冰雪雷霆一聨篇中警語言明而且斷方能濟也古詩星使日夜馳春秋斗運樞璇璣星散結曹冏六代論王綱弛而復張詩為下國綴旒注綴也旒旗之垂者言天子為諸侯所繫屬如旗之縿為旒所綴也公羊傳君若綴旒然劉琨勸進書國家之危有若綴旒通鑑至德元載七月𤣥宗以隴西公瑀為漢中王梁州都督山南西道采訪防禦使史記虞卿立談而取卿相唐藝文志吳伯善陳七曜厯五卷何承天集有既往七曜厯每記其得失通志日月歲星熒惑填星太白辰星也北史劉焯博學洽聞如九章算術周髀七曜書莫不覆其本根窮其祕要李德林集口授兵書手畫行陳漢書張千秋擊烏桓還霍光問戰鬬方略山川形勢千秋口對兵事畫地成圖無所忘失江總詩淨心抱冰雪左傳畏之如雷霆晉劉𢎞表奮揚雷霆折衝萬里通鑑劉牢之為參軍領精鋭為前鋒幕府輟疑作綴諫官朝音潮廷無此一作比例至尊方旰食仗爾布嘉惠補闕暮徵入柱史晨征憩樊作補闕入柱史晨征固多憩正當艱難時實藉長久計此言朝廷倚侍御以為重急諫官作判此乃破例用人正以邊防警故暮入晨征耳有久長計則可以布嘉惠矣賦左傳伍奢曰楚君大夫其旰食乎注旰晏也賈誼恭承嘉惠兮張綖注補闕諫官也蕭望之願在朝補闕史鶴曰御史在殿柱之間亦謂之柱下史秦改為侍御張蒼自秦時為御史主柱下方書即其任也通典侍御史於周為柱下史一名柱後史征憩征行不遑少憩也詩天步艱難回風吹獨樹白日照執袂慟哭蒼煙根山門萬重平聲一作里閉居人莽牢落遊子方迢遞徘徊悲生離局促老一世此敘送别情景說獨樹比居者執袂送行者蒼烟暮凝山門夕閉得臨别凄凉居人公自謂遊子指侍御生離頂遊子局促頂居人詩古詩迥風動地詩何遜詩天邊看獨樹隋蕭子隆山門一巳絶巷無居人所上林賦牢落陸離牢落寥落也漢魏文帝詩遊子戀生何遜詩迢遞封畿外前天馬歌神裝回若流放此徘徊所出促吳邁逺詩生離不可聞前漢灌夫傳今日廷論局效轅下駒劉楨詩天地無期竟民生甚局促陶唐歌遺民後漢更平聲列一作别帝我一作恨無匡復資一作姿聊欲從此逝末以自敘作結帝唐祚中興故比之後漢列公未授官故自言遺民欲逝周此章首尾各四句中四段各八句左傳季札請觀樂為之歌唐曰思深哉其有陶唐氏之遺民乎大後漢自光武以下凡十二帝皆殷仲文表匡復社稷𢎞善類漢書高帝曰公等去吾亦從此逝矣阮籍詩吾將從此逝逝謂隱去也胡夏客曰公送樊侍御送從弟亞送韋評事三詩感概悲壯使人懦氣亦奮宜其躬遇中興此聲音之通乎時命者也送韋十六評事充同谷防禦判官鶴注此至德二載作故詩中有行在鳯翔等句唐鮑曰舊注以為韋宙宙乃宣宗時人誤矣舊書成州同谷郡屬山南西道秦置隴西郡天寶元年改為同谷郡乾元元年復為成州通鑑天寶十四載冬安祿山反郡當賊衝者始置防禦使昔沒賊中時潛與子同遊今歸行在所王事有去留從交情聚散敘起遊濠梁之上去指韋留自謂顧莊子莊子與惠子同詩王事靡監歡詩達生任去留逼側兵馬間主憂急良籌子雖軀幹小老一作志氣橫去聲九州挺身艱難際張目視寇一作仇讎朝音潮廷壯其節特舊作奉詔令平聲參謀此言評事忠勇故朝廷命判邊方夜西京賦駢闐逼側後漢馮異傳勒兵馬死范睢傳主憂臣辱有晉載記劉曜討陳安於隴城安人歌曰隴上健兒陳安軀幹雖小腹中寬愛養將士同心肝髮北山移文霜氣橫秋夜杜臆挺身張目句讀之令人指谷永傳挺身晨與羣小為隨顔注挺引也子曹植冬獵篇張目决􅗃就杜修可曰視寇讎借用孟語壯其節令參謀皆朝廷言奉詔二字當作特詔語氣方順且與下文受辭不犯重鑾輿駐鳯翔同谷為咽喉西扼弱水道南鎮枹音孚罕一作氐羌陬此邦承平日剽劫吏所羞况乃胡未滅控帶莽悠悠此言同谷重地故控馭必須得人西都賦乘鑾輿晉書劉􅚐表人想鑾輿之聲記三國楊洪曰漢中益州咽喉禹貢弱水既西寰宇弱水自甘州刪丹縣界流入張掖縣北昌漢書金城郡有枹罕縣唐書河州治枹罕縣唐志安郡本枹罕郡又有枹罕縣在隴右道與弱水同道世詩此邦之人控漢食貨志時據承平之周崔猷書帝京洛府中韋使去聲君道足示懷柔令姪才俊茂二美又何求此言幕府同事之賢韋使君蓋指防禦使必評事之叔也前前出師表宮中府中俱為一體府中幕府之中也漢王欣傳使君顓生殺之柄顔師古注為使者故謂之使君生漢書段㑹宗傳總領百蠻懷柔殊俗揚雄蜀都賦宗族攢俊茂豐美受詞太白腳走馬仇池頭古色一作邑沙土裂積隂雲雪稠一作霜雪稠一作雪雲稠一作積雪隂雲稠羌父豪猪靴一作帽羌兒青兕裘晉作漢兵黑貂裘吹角向月窟蒼山一作山蒼旌斾愁鳥驚出死樹龍怒拔老湫古來無人境今代橫戈矛此言同谷凄凉之景鳥上六記風土下六記屯兵太旌斾愁謂帶愁慘之容驚龍怒兵馬震動故也白注見前曹植詩走馬長楸間池舊唐書成州上祿縣白馬羌所處州南八十里有仇山辛氏三秦記仇池山上廣百頃地平如砥其南北有出路東西絶壁萬仞上有數萬家一人守道萬夫莫向山勢自然有樓櫓却敵之狀東西二門盤道可七里上多岡阜泉源冰前漢書音義沙土曰漠即今磧也陸機苦寒行凝結重澗積雪被長巒隂雲興巖側悲風鳴樹端注長楊賦扼熊羆拖豪猪山海經豪彘狀如豚而白毛能以脊上豪射物江東呼為豪猪皮宋玉招魂君王親發兮樿青兕說文兕如野牛青色厚可為鎧吹角注見遣興詩月窟西極之地長楊賦西壓月崛何揚雄蜀都賦蒼山隱天經後漢唐羌疏鳥驚風發遜詩百年積死樹水注龍怒當時大雨謡趙曰吳平為句章州門前忽生一株青桐樹上有歌之聲平惡而斫之平隨軍三年死樹歘自還立於故根上樹顛空中歌曰死樹今更青吳平尋當歸洙曰湫水在涇州界興雲雨土俗亢旱每於此求之相傳云龍之所居天下山川隈曲有之天台賦卒踐無人之境詩修我戈矛傷哉文儒士憤激馳林丘中原正格鬬後㑹何緣由百年賦命定豈料平聲沉與浮且復扶又切戀良友握手步道周論平聲兵逺壑靜一作淨亦可縱冥搜題詩得秀句札翰時相投末敘臨别繾綣之情浮上八送韋下四望韋既文士馳林公未受職也故云沉難料吳論論兵定使逺壑清靜亦可冥搜得句投寄相慰也二此章起首中腰皆四句前二段各八句後二段各十句論衡上書白記者文儒也晉儒林傳迄於孝武蔚為文儒注謝安詩寄傲林丘漢書武五子傳主人遂格鬬死相抱而殺之曰格朴孔叢子後㑹何期沉王粲傷天賦惟皇天之賦命抱子賦命宜均浮謂此後遭際難知司馬遷書從俗浮沉與時俯仰孫詩有枤之杜生於道周師氏曰道邊也吳越春秋子一旦與吳王論兵江淹詩夙齡愛逺壑劉鍾嶸詩品竒章秀句往往道警楨詩投翰長歎息述懷鶴注此當是至德二載夏拜拾遺後作王彥輔曰阮籍有述懷詩去年潼關破妻子隔絶久今夏草木長脫身得西走麻鞋見天子衣袖見音現一作露兩肘朝音潮廷慜生還親故傷老醜涕淚受拾遺流離主恩厚柴門雖得去未忍即開口此受職行在而回念室家也而杜臆草木叢長故可潛身西走揮涕受官以流離感主恩也故不忍開口言歸伽杜氏土通典潼關本名衝關言河流所衝也洛陽藍記風隔絶陶潛詩孟夏草木長王睿炙轂子夏商以草為屩左氏曰扉屨也至周以麻為之謂之麻鞋貴賤通著顔氏家訓麻鞋闕屋莊子原憲捉襟而肘見詩夕暮成老醜魏文帝與吳質書親故多離武阮籍蔡琰笳曲涕淚交垂通典后置左右拾遺二人掌供奉諷諫離公本傳至德二年亡走鳯翔謁上拜左拾遺詩流之子王褒講德論主恩滿溢皇陶潛詩長吟掩柴門郎南史鄭灼夢與侃遇於塗侃謂曰鄭開口寄書問三川不知家在否比必意切聞同罹禍殺戮到雞狗山中漏茅屋誰復扶又切依户牖摧頽蒼松根地冷骨未朽幾人全性命盡室豈相偶嶔岑一作崟猛虎場鬱結回我首此寄書至家恐其遭亂難保也時朱注通鑑祿山初反自京畿鄜坊至於岐隴皆附之所在寇奪故以家之罹禍為憂故破屋誰依室無人矣摧頽骨冷死者久矣居民稀少猛虎縱橫魏文帝詩寄書浮雲往不還舊注三川在鄜州南公之家寓焉長淮南子賦斂無度殺戮不止漢獻帝紀董卓悉燒安宮廟官府二百里內室屋蕩盡無復雞犬植庾信小園賦穿漏茅茨去鮑照詩開軒當户牖曹詩何意今摧頽江淹故鄉賦寧歸骨於松柏詩出師表茍全性命於亂世結左傳盡室以行陸厥嶔岑鬱上干楚辭獨鬱其誰語自寄一封書今巳十月後反畏消息來寸心亦何有漢運初中去聲興生平老耽酒沉思歡㑹處恐作窮獨一作塗叟末傷家信杳然又恐存亡莫必也處書斷則疑書來則畏正恐家室盡亡將來歡㑹之反成窮獨之人耳公此章前二段各十二句末段八句收曰越世家陶朱為一封書遺故所善莊生趙次公十月謂自去年寄書巳經十月非指孟冬之十月公往問家室在閠八月初吉此詩尚在閏月之前謝靈運詩寸心若不亮曹晉書阮咸耽酒浮虛植詩歡㑹難再遇申涵光曰麻鞋見天子衣袖露兩肘一時君臣草草狼籍在目反畏消息來寸心亦何有非身經喪亂不知此語之真此等詩無一語空閒只平平說去有聲有淚真三百篇嫡𣲖人疑杜古鋪敘太實不知其淋漓慷慨耳得家書鶴注此是至德二載秋在鳯翔作去憑遊客寄一云休汝騎來為去聲附家書今日知消息他鄉且舊居熊兒幸無恙驥子最憐渠臨老羇孤極傷時㑹合疏此喜得家書猶傷父子相隔也居顔延之詩曷為久遊客杜臆家在他鄉之舊幸無轉徙也他鄉指鄜州古樂府他鄉各異縣夏陶潛詩相將還舊居舊注驥子熊兒二子小字胡客曰驥當是宗文熊當是宗武者李陵答蘇武書足下𦙍子無恙風俗通噬蟲曰恙古人多露宿為恙所嚙故早相見必相勞問曰無恙乎詩月賦羇孤遞進曹植㑹合何時諧二毛趨帳殿一命侍鸞輿北闕妖氛滿西郊白露初凉風新過雁秋雨欲生魚農事空山裏眷言終一作終篇言荷去聲鋤此感時撫事意在聚首山中也趨帳殿時為拾遺矣色此章二段各八句詩左傳不禽二毛注鬢毛斑白二也庾肩吾曲水曰川入帳殿唐六典尚舍奉御凡大駕行幸預設三部帳幕皆鳥氊為表朱陵為覆下有紫帷方座金銅行牀覆以簾其外置排城以為蔽捍高王制小國之卿與下大夫一命闕鸞輿注見前漢帝紀蕭何治未央宮立東闕北注未央殿雖南向而上書奏事謁見之徒皆詣北闕用給左右以除妖氛時安慶緒方熾也魏文帝書五經通義立秋禮西郊續漢書立秋迎氣西郊禮月令孟秋之月涼風至白露降又仲秋行春令則秋雨不降又季秋之月鴻雁來賓烟管子視其耕藝計其農事詩空山霜滿高平陸機詩眷言懷桑梓陶𢎞景陶潛詩帶月荷鋤歸送長子兩切孫九侍御赴武威判官鶴注此是至德二載公既為拾遺時作故詩云奪我同官良度凉州武威郡唐屬隴右乃河西節所治驄馬新鑿蹄銀鞍被去聲來好繡衣黃白郎騎向交河道問君適萬里取别何草草首敘侍御赴武威馬漢書桓典為御史常乘驄語曰行行且止避驄馬御史而周禮頒馬攻特注牡馬蹄齧不可乘用故因夏乘馬攻鑿其蹄祖孫登詩飛塵暗金勒落淚灑銀鞍斧分部逐捕羣盜漢書武帝遣直指使者衣繡衣杖朱注或曰黃白即漢書銀黃顔師古注銀銀印也黃金印也北齊樂曲懷黃綰白鵷鷺成行交河注見二卷應瑒詩逺適萬里道歸來未有由草詩勞人草天子憂凉州嚴程到須蚤去秋羣胡反不得無電掃此行收陳作牧遺氓風俗方再造此申奉命急赴之故宋之問詩嚴程無休隙集後漢皇甫嵩傳旬月之間神兵電掃收是平定安之意顔延之詩留滯感遺民宋武帝詔𢎞濟朕躬再造王室族父領元戎名聲國晉作閣中老奪我同官良飄颻按城堡使我不能餐令平聲我惡懷抱此述同僚繾綣之情為奪我同官蓋杜鴻漸題為判官也侍父之從祖昆弟族父唐書至德二載五月以武部郎杜鴻漸為河西節度使戎詩元戎十乘以先啓行謝朓恩教任總侯伯受鉞元洙曰元戎元帥也荀子彼貴我名聲注記有虞氏養國老於上庠所左傳同官為僚又通鑑武威郡治姑臧舊城胸奴築張氏據河西增築四城廂并舊城為五又二城未知誰所築懷蔡琰悲憤詩飢當食兮不能餐孫楚詩惆悵盈抱若人才思去聲濶溟漲浸一作漫絶島樽前失詩流塞上得一作多國寶皇天悲送逺雲雨白浩浩此敘憐才惜别之意沈約詩溟漲無端倪文楊修書古詩之流趙左傳親仁善鄰國之寶也北史苑傳江漢英靈燕竒俊竝該天網之中俱為大國之寶須鮑照詩暫交金石心臾雲雨隔東郊尚烽火朝去潮野色枯槁西極柱亦傾如何正穹昊末傷邊境未寧望其力為匡救此章前四段各六句後段四句收獨留書保釐東郊於烽火見四卷天楚辭形枯槁而列子常怒流西極又折柱傅昭詩皇猷屬穹昊朱鶴齡曰去秋羣胡反趙次公黃希諸注皆指吐蕃非也唐書至德元載吐蕃陷威戎等諸軍入屯石堡此在隴右河鄯等州而河西凉州未嘗陷通鑑至德二載河西兵馬使蓋庭倫與武威九姓商胡安門物等殺節度使周泌聚衆六萬武威大城之中小城有七賊據其五二城堅守度支判官崔稱與中使劉日新以二城兵攻之旬有七日平之此云羣胡反正指其事曰去秋者討平在正月而發難則在去秋是時武威雖復而餘亂尚有未戢者故欲早到凉州安黎氓而按城堡也送從去聲弟亞赴河西判官鶴注此至德二載夏在鳯翔作是時京師未復故云宗廟尚成灰物舊唐書杜亞字次公自云京兆人少涉學善言理及歷代成敗事肅宗在靈武上書論時政擢校書郎其年杜鴻漸節度河西辟為從事纍授評事御史終東都留守貞觀元年分隴坻以西為隴右道景雲二年自黃河以西分為河西道南風作秋聲殺氣薄炎熾盛夏鷹隼擊時危異人至起處感時託興時危異人至乃一篇之主造惟南風先作秋聲故鷹隼當夏而擊此殺氣之見於物者南風夏風也薰風歌南風之薰兮庾信詩南風多死聲浸周𢎞讓立秋詩木葉動秋聲月令仲秋之月殺氣盛薄迫也易雷風相薄事射雉賦時暑忽隆熾擊王充論衡盛夏之時太陽用記立秋之日鷹乃漢孫寶為京兆尹敕曰今鷹隼始擊當從天氣人鮑照詩時危見臣節世亂識忠良辨亡論異輻輳令弟草中來蒼然一作茫請論事詔書引上上聲殿奮舌動天意兵法五十家爾腹為筐笥應對如轉丸郭作圓疏通略文字經綸皆新語足以正神器此言亞之才辨足動天聽所謂異人也杜臆略文字而皆新意知其談兵非徒讀父書者比亨胡夏客曰考亞本傳知此段所言皆其實録漢應詩濟濟四令弟何謝朓詩平楚正蒼然去吳越春秋諸大夫論事蕭傳帶劒履上殿霍病傳天子常欲教之孫吳兵法漢書藝文志兵權謀十三家兵形勢十一家隂陽十六家兵技巧十三家凡兵書五十三家七百九十篇詩後漢邊韶傳邊為姓韶為字腹便便五經笥魏文帝緘藏筐笥裏莊子蜣螂之智在於轉丸梅福傳高祖從諫如轉圜以記疏通知逺書教也世說山簡疏通高素易君子經綸陸賈傳粗述存亡之徵凡著十二篇奏之帝稱善號曰新語政老子天下神器不可為也漢書注神器令也宗廟尚為灰君臣俱一作皆下去聲淚崆峒地無軸青浩然作清海天軒輊一作􅀈西極最瘡痍連山暗烽燧此言世亂倥偬須人以濟所謂時危也唐書祿山陷京師九廟皆為所焚曹冏六代論宗廟焚為灰燼七鶴曰崆峒青海皆河西節度統之唐書瀚海軍西百里有青海軍本青海鎮天寶中為軍𨽻北庭都護府詩如輊如軒注車後頓曰輊前頓曰軒後漢馬援傳居前不能令人輊居後不能令人軒帝上林賦左蒼梧右西極季布傳瘡痍未瘳梁武詩連山去無限燔漢書音義晝則燧夜則舉烽帝曰大布衣藉卿佐元帥坐看清流沙所以子奉使去聲歸當再前席適逺非歷一作虛試須存武威郡為去聲畫長久利此言命亞西行以救武威蓋時危而用異人也神京未復邊陲多故此正英雄見才之時帝曰數句述天語丁寧如古詔誥體朱注武威郡地勢西北斜出隔斷羌戎乃控扼要地河西有事則隴右朔方皆擾是時有九姓商胡之叛故曰須存武威郡為畫長久利左傳衛文公衣大布之衣漸晉書王裒傳責在元帥傳布衣謂杜亞元帥謂杜鴻書被於流沙蘇武丁年奉使賈誼傳文帝思誼徵之至入見上方受釐宣室上因感鬼神而問誼具道所以然之故至夜半文帝前席書序歷試諸艱久孔融書文武並用成長之計孤峰石戴驛快馬金纒轡黃羊飫不羶蘆蔡肇作虜一作魯酒多還醉踴躍常人情慘淡苦士志安邊敵何有反正計始遂此送别而勉其立功言上四言西土景物下四濟時籌略上杜臆踴躍慘淡數語深致規諷之意書綖注安邊應佐元師反正應上正神器王僧達介於孤峰絶頂者積數十載驛爾雅石戴土謂之崔嵬土戴石謂之砠石戴驛謂路在石巖之上古樂府健兒須快馬立蔡曰大觀三年郭隨出使虜舉黃羊蘆酒問外使時愛立愛云黃羊野物可獵取食之不羶蘆酒縻穀醖成可醱醅取不醡也但力微飲多則醉子美之言信驗楊慎曰蘆酒以蘆為筒吸而飲之今之咂酒也又名釣藤酒此見溪蠻叢笑朱注蔡肇本蘆作虜引高適虜酒千鍾不醉人當兩存之羶羊臭也詩踴躍用兵勝世說道一道人曰先集其慘淡細趙充國傳全師保安邊之策漢高祖紀帝起微撥亂世反之正吾聞駕鼓車不合用騏驥龍吟回其頭夾輔待所致未以歸朝大用望之京博議騏驥駕鼓車比亞不當為判官龍馬長吟回首闕思成夾輔之功喻亞雖在河西乃心不忘朝廷也舊解都憒憒興綖注末二句應上歸再前席意杜臆起結皆用比英矯不凡起結各四句中假十句又六句後二假各八句為盧注亞於大厯年間為諫議大夫使魏州宣慰繼又江西觀察使足見其能以後漢書建武十三年異國有獻名馬者日行千里詔馬駕鼓車南史王融謂宋辨曰若千里馬斯至聖上當駕鼓車夾楚辭乘騏驥以馳騁兮左傳輔周室盧世㴶曰送三判官詩絶有關係别出機杼於威弧振敝制極收京布嘉惠藉長計清流沙存武威反復諄託即憤激林丘論兵逺壑穆然有無窮之思與尋常贈送迥别故特表而出之要三判官定自可人於樊曰冰雪淨聰明雷霆走精鋭於亞曰奮舌動天意疏通略文字於韋曰老氣橫九州張目視寇讐夫所冀安邊反正舍若人誰屬乎腳申涵光曰疏通略文字便是英雄本色若兩書厨濟得甚事送靈州李判官黃鶴及朱顧諸家俱編在乾元元年玩詩中羯胡血戰等語及近賀中興一句當是安史正猖獗靈武初即位時蓋至德二載在鳯翔時所作當從杜臆唐書地理志靈州靈武郡夏州朔方郡羯胡腥四海回首一茫茫血戰乾坤赤氛迷日月黃將軍專策略幕府盛才良近賀中興主神兵動朔方上四記當時之亂下望其乘時建功也判血戰氛迷正言四海腥膻策略稱其主將才良美李官兵動朔方蓋將大舉興復也度按唐書祿山反以郭子儀為靈武太守充朔方軍節使陳濤斜之敗帝惟倚朔方軍為根本此章言專策略又言動朔方當指郭子儀黃鶴謂王思禮恐誤古詩四顧何茫茫後漢袁紹傳參咨策略曹植征蜀論以謨謀為劍㦸以策略為旌旗上張協七命希代之神兵北齊裴讓之詩皇威奮武略將總神兵奉送郭中丞兼太僕卿充隴右節度使三十韻鶴注舊史言至德初英乂遷隴右節度使兼御史中丞不言兼太僕卿新史言祿山亂拜秦州都督隴右採訪使至德二載加隴右節度使不言兼御史中丞與太僕卿此題曰送郭中丞兼太僕卿充隴右節度使可補二史之闕當是至德二載秋八月作詔發山西别本作西山今從英華將去聲秋屯徒昆切一作營隴右兵凄凉餘部曲燀一作烜赫舊家聲鵰鶚乘時去驊騮顧主鳴艱難須一作思上策容易去聲即前程斜日當軒蓋高一作歸風卷斾旌松悲天水冷沙亂雪山清和虜猶懷惠防邊詎一作不敢驚古來於異域鎮靜示一作得專征首敘郭鎮隴右上下八句分截郭詔發二句扼題凄凉二句言將門宿望雕鶚四句言公忠勇斜日四句記秋隴時景與前程相應和虜四句語屯兵方略與上䇿相應古朱注吐蕃和好久懷舊恩故防邊之法不在驚擾自禦戎惟於鎮靜之中默寓專征之意沙唐六典隴右道古雍梁二州之境東接秦川西逾流南連蜀及吐蕃北界沙漠鮑照東武吟將軍既即世部曲亦空存右朱注舊唐書英乂知運之季子知運為鄯州都督隴諸軍節度大使自居西陲甚為蠻夷所憚開元九年卒於軍至德初肅宗興師朔野英乂以將門子特見任用英乂繼其父節度隴右故有部曲家聲之句步司馬遷報任少卿書李陵既生降頽其家聲詩天艱難漢賈讓治河奏議今行上策范前漢書楊惲曰事何容易詩搜神記上馬赴前程雲詩軒蓋照墟落曹植高風吹我軀師氏注高風八月風也曰詩悠悠斾旌元唐書天寶元年改秦州為天水郡洙天水郡漢武鼎三年置後漢明帝紀祁連山即天山一名雪山今名析羅漢山在伊州北蔡琰笳曲異域殊風晉書謝安傳每鎮以和靜桓溫薦譙秀表足以鎮靜頽風事古史紂賜西伯弓矢得專征伐陳子良詩受脤專征燕平聲薊奔封豕周秦觸駭鯨中原何墋楚錦切一作慘黷遺一作餘孽尚縱音宗橫箭入昭陽殿笳吹一作吟細柳營內人紅袖泣一作短王子白衣行宸極妖英華作妖一作祅西溪音醯堅切神也星動一作大園陵一作林殺氣平空餘金碗出無復扶又切繐須兑切帷輕毁廟天飛雨焚宮火徹明罘罳朝共落棆桷夜同傾此傷祿山之亂亦在八句分截四燕薊謂陷河北周秦謂破兩都遺孽指安慶緒箭入句賊至而奔散也宸極四句言驚擾陵寢毀廟四句言燒焚宮廟時賊將安忠順等入長安未嘗有發園陵焚宮殿事當燒左藏大盈者亂民也其公卿墳墓亦必有乘亂發掘者故此詩槩及之左傳吳為封豕長蛇薦食上國洙曰豕善突故喻祿山信陳琳檄若駭鯨之觸網言其易决也黷英華辨證庾哀江南賦茫茫慘黷杜詩中原何慘據陸機漢功臣贊上墋下黷並當作墋柳史記羣盜縱橫昭陽殿見哀江頭注括地志細倉在雍州咸陽縣西南二十里周亞夫屯兵處四崔令欽教坊記唐妓女入宜春院謂之內人子夜時歌羅裳迮紅袖玉叉明月璫職逺注白衣行改微服也秦王苻堅黜賈雍以白衣領可見虞翻别傳仰瞻宸極徐孝穆書齊聖廣淵體自宸極妖漢天文志祅星不出五年其下有軍杜審言詩雲淨星落光武紀赤睂發掘園陵注園謂山墳沈謝朓詩殺氣盛凉飈零金碗用搜神記盧克幽婚事炯表甲帳珠簾一朝落茂陵玉碗早出人間細鄴宮故事魏武遺令西陵施六尺牀張繐帷說文繐疏布也舊唐書東都太廟九室神主共二十六座祿山取太廟為軍營神主棄街巷棆史記項羽入咸陽燒其宮室火三月不滅爾雅注木名楩屬似豫章之說文屋椽周謂之榱魯謂桷左傳注桷椽也三月師逾整羣胡一作凶勢就烹瘡痍一作恭承親接戰勇决一作餘勇冠去聲垂成妙譽期元宰殊恩且列卿幾時回節鉞戮力掃欃初銜切槍抽庚切此望郭回京與上段相承也言破賊之勢指日可成今暫住隴右終當歸殲巨寇盧注至德二載肅宗至鳯翔隴右河西安西西域兵皆㑹時王思禮軍武功王難得軍西原郭英乂軍東原是三月師逾整羣凶勢就烹也安守忠寇武功英乂戰不利流矢貫頤而走是瘡痍親接戰勇决冠垂成也梁簡文帝詩潛師夜接戰庾信平鄴表天策勇決傳北山移文馳妙譽於浙右宰上相也晉書王導實賴元宰固懷匪石之心元潘嶽馬汧督誄明明天子旌以殊恩從朱注唐志御史中丞二人正四品下太僕寺卿一人三品中丞兼卿所以為加恩出楊惲報孫㑹宗書位在列卿商晉書漢魏故事遣將征符節郎授節鉞於明堂書聿求元聖與之戮力槍爾雅彗星為欃槍謝瞻詩鴻門銷薄蝕垓下隕欃注亦謂之孛言其形孛孛似掃彗圭竇一作蓬户三千士雲梯七十城恥非齊說音稅客秪荆作甘似魯諸生通籍微班忝周行户狼切獨坐榮隨肩趨漏刻短髮寄一作愧簮纓徑欲依劉表還疑一作能無厭禰衡漸衰那一作寧此别忍淚獨含情此送郭而敘交情也自圭竇諸生不如下齊說客此謙之詞公除拾遺故曰微班郭為中丞故曰獨坐隨肩短髮歎年老得官杜臆觀劉表禰衡語則郭亦非可依者後果鎮蜀而為崔旰所殺逺記儒有蓽門圭竇注門旁窬穿墻為竇如圭家語方弟子之進蓋三千焉墨子莊王令公輸作雲梯以攻宋城漢書酈食其說田廣罷歷下守備馮軾下齊七十餘朱注時賊尚據長安故用下城事叔後漢書光武答馬援曰非刺客乃說客也前漢書孫通曰臣願徵魯諸生共起朝儀通籍注見六卷當微班下位也以詩箋周行周之列位也梁武帝詔方置諸周行飾青紫後漢書宣秉拜御史中丞光武特詔御史中丞與司𨽻校尉尚書令竝專席而坐京師號三獨坐記五年以長則肩隨之左傳其髮短而心甚長人陳後主詩進退簮纓移以魏志王粲字仲宣山陽獻帝西遷粲從至長安西京擾亂乃之荆州依劉表詩禰衡見二卷庾信詩故人傷此别王粲含情欲待誰廢邑狐狸語空村虎豹爭人頻墜塗讀上聲炭公豈忘去聲精誠元帥調新律一作鼎前軍壓舊京安邊仍扈從去聲莫作一作無使後功名終以恢復之事望諸郭卿與第三段相應王狐狸虎豹指當時附賊為盜者元帥指廣平前軍指李嗣業扈從應上回節鉞功名應上掃欃槍句此章前二段各十六句三五段各八句第四段十二沈炯詩空村餘拱木廢邑有頽城傅𤣥放歌行但見狐狸跡虎豹自成羣商書民墜塗炭史記龜策傳塗叶讀杜周流天下還復其所上至蒼天下薄泥塗委前漢鄒陽書精誠變天地後漢陶謙書謹同心腹之元帥傳易師出以律庾信賦玉律調鐘喜前將軍見漢李廣唐書李嗣業至鳯翔上謁肅宗曰卿至賢於數萬衆以為前軍收長安馬陶潛詩生平去舊京於朝錯傳安邊境立功名司相如傳扈從橫行出四校之中逺鄒若倩遺公孫𢎞書勉作功名以俟嘉譽注後功名即孟子後名實之意王嗣奭曰此詩本送郭之隴右而語意輕外重內其於隴右但以懷惠鎮靜朂之未幾吐蕃果遣使來并請討賊蓋有先見矣至於中原慘黷餘孽縱橫亹亹而談有人臣所不忍言者正以激感中丞使知急也後云幾時回節鉞又云安邊仍扈從蓋深以討賊大事望之英乂矣送楊六判官使去聲西蕃鶴注此當是至德二年秋作詩云帝京氛祲滿時京師尚未收復也討朱注舊唐書至德元載吐蕃遣使和親願助國賊二載三月吐蕃遣使和親遣給事中南巨川報命詩云慎爾參籌畫楊蓋贊巨川以行送逺秋風落西征海氣寒帝京氛祲滿人世别離難首叙送楊出使嶽秋風記時西征記地氛祲感世事别離念交情潘賦潘子憑軾西征海謂青海梁元帝詩海氣且如樓豫王僧達詩逺山斂氛祲楚辭既不難夫離别絶域遙懷怒和親願結歡敕書憐贊普兵甲望長安宣命一作令前程急惟良待士寬子雲清自守今日一作令尹起為官此敘奉使之故絶域二句謂吐蕃請討祿山敕書二句謂朝廷望其助兵宣命惟良指巨川為正使子雲起官指楊六為幕判李陵書剄身絶域之表和左傳使君懷怒以及敝邑彊漢書婁敬傳使敬往結親之約唐書吐蕃俗謂雄曰贊丈夫曰普故號君長曰贊普其妻曰末䝉博秦國策武安君曰繕治兵甲周書惟良折獄杜詩議漢書宣帝曰與我共理者其惟良二千石乎此詩用惟良本此亦友于貽厥之類李嘉佑送五叔守歙州詩新安江自緑明主重惟良可證時楊判官必膺郡守推薦銜命入蕃故曰惟良待士寬也朱注漢書言子雲系出揚侯其字不從木平晉羊舌氏食邑於揚曰揚食我後分其田為三縣曰陽楊氏則揚與楊同出一姓故楊修有吾家子雲之語或疑此送楊判官不合用子雲事蓋失考耳揚雄傳雄三世不徙官有以自守泊如也垂淚方投筆傷時即據鞍儒衣山鳥怪漢節野童看平聲邊酒排金碗一作盞夷歌捧玉盤草肥一作輕蕃馬健雪重拂廬乾音干杜此敘西行景事關上四言中途下四言至蕃臆垂淚傷時有臣誼草肥雪乾善摹邊景異班超傳超為官傭書久勞苦投筆嘆曰丈夫當立功域安能久事筆硯乎馬援傳援請討五溪蠻據鞍顧盻以示可用厯杜臆儒衣山鳥怪與壯士恥為儒同一感慨漢律志古之大夫儒衣庾信詩山鳥一羣驚文蘇武杖漢節注見本卷書蜀都賦夷歌成章梁簡帝詩玉盤余自嘗唐吐蕃贊普聯毳帳以居號大拂廬容數百人部人處小拂廬慎爾參籌畫從兹正羽翰平聲歸來權可取九萬一朝摶末勉其成功歸國外朱注借兵非美事又恐其屈節藩故以慎謀畫正羽翰戒之欲其伸中國之威不辱君命也之權位可取言不終於判官張注謂借兵之舉權且取乃曲說也軍此章首尾各四句中二段各八句排晉紀總論籌畫國何遜詩無因生羽翰千里暫空莊子摶扶搖而上者九萬里羅大經曰葉石林云杜工部詩對偶至嚴而送楊六判官云子雲清自守今日起為官獨不相對竊意今日字當是令尹字傳寫之訛耳余謂不然此聨之工正為假雲對日兩句一意乃詩家活法若作令尹字則索然無神夫人能道之矣且送楊姓人故用子雲為切題豈應又泛然用一令尹耶如次第尋書札呼兒檢贈篇之句亦是假以第對兒落按元白劉賓客輩汝洛唱和集九日送人清秋方帽子夏正離羣假對之工本於杜句哭長子兩切孫侍御朱注此詩或刻杜誦載高仲武中興間氣集今載子美集中文苑辨證兩存其說為鶴注公有送長孫九侍御赴武威判官詩稱其詩流與此合意豈其未到官而死耶當是至德二載作中語恐非長孫九侍御也今按此詩不及亂離周置御史掌邦國都鄙及萬民之治命以贊冢宰漢因置十五員唐四人道為去聲詩一作謀一作諫書重去聲名因賦一作雅頌雄禮闈曾音層擢桂憲府屢一作舊一作近乘驄流水生涯盡浮雲世事空惟餘舊臺柏蕭瑟一作颯九原中上四生前履歷下四死後哀挽謝靈運詩事為名教用道以神理超起用謝意賦阮籍詩信道守詩書入前漢書司馬相如蔚為辭宗頌之首任昉集出禮闈朝夕舊館注禮闈尚書省也主顧注唐初考功試進士開元末徙禮部以春官侍郎之晉郤詵對武帝云臣舉賢良對策為天下第一猶桂林一枝為御史所居之署漢謂之御史府亦謂憲臺唐龍朔中東宮憲府阮漢桓典名驄馬御史吾劉楨詩逝者如流水朱晉書籍遺落世事庾肩詩韓城想舊臺漢博傳御史府中列柏樹常有野烏數千棲宿其上原登樓賦風蕭瑟而並興記趙文子與叔譽觀乎九文子曰死者如可作也吾誰與歸奉贈嚴八閣老鶴注考舊史嚴武遷給事中在收長安之前此詩在至德二載作是年公亦為拾遺老蔡曰國史補宰相相呼為堂老兩省相呼為閣通鑑王涯謂給事中鄭肅韓佽曰二閣老不用封敕此唐人稱給事中為閣老也至德初武以房琯薦纍遷給事中扈聖一作扈從或作今日登黃閣明公獨妙年蛟龍得雲雨鵰鶚在秋天客禮容疏放官曹可一作許接聨新詩句句好應平聲任老夫傳上四頌嚴稱其遇主乘時下四敘情喜其同官相契顧注武父挺之與公友善故稱武為妙年而自稱老夫閣困學紀聞給事中屬門下省開元曰黃門省故曰黃左拾遺亦東省之屬故曰官曹可接聨近世用此詩為宰輔事誤黃扈後從也省世說王𢎞之曰風馬不接無緣扈從曰唐門下其長曰侍中與中書令參總而顓判省事即宰相也給事中掌分判省事故得同登黃閣朱注說文閣與閣異閣夾室也以板為之亦樓觀通名閣門旁小户也漢公孫𢎞開東閣以延賢人蓋避當門而東向開一小門引賓客以别於官屬也漢三公黃閣以不敢洞開朱門以别於人主故黃其閣又唐門下省黃塗門謂黃閣此詩閣字與待嚴大夫詩生理止憑黃閣老皆當作閣杜公誤作閣字訛字相沿耳後漢祭遵傳明公常欲衆軍整齊纍曹植求自試表終軍以妙年使越御鶴注舊唐書武遷給事中既取長安為京兆尹兼史中丞時年三十二其為給事才三十一故曰妙年蛟吳志周瑜上疏曰劉備以梟雄之姿得關張為之輔龍得雲雨終非池中物北史魏慕容紹宗曰高公雄才蓋世復使握大兵於外辟如借蛟龍以雲雨將不可制矣唐書韋思謙為御史大夫見王公未嘗屈禮曰耳目之官固當特立鵰鶚鷹鸇豈衆禽之偶淮南子秋風下霜鷹鵰搏鷙載揮麈録蛟龍得雲雨鵰鶚在秋天一聨子巳見晉書記昔人不以蹈襲為非記郊特牲天無客禮舊賦序漢景帝詔其以客禮待之梁疏放出向秀思曹植詩在官曹之典列元帝𤣥覽賦高門接連嘗陶詩登高賦新詩託劉君白答僧巖書何不句句破的任也傳傳頌也月此當是至德二載七月作故云秋期近是時官軍尚在扶風至閏八月二十三日始命郭子儀收長安國西營指扶風軍士扶風在長安西北也天上秋期近人間月影清入河蟾不沒搗藥免長生只益丹心苦能添白髮明干戈知滿地一作道休照國西營上四月中之景下四月下之懷照蟾兔承月影來緊注下闕月色常明如此恐巳照人各惹愁恨耳三四闕無可比詩秋染不必别生議論帝高昻詩天上人間以為期梁簡文詩月影山遲遲庾肩吾望月詩渡河凶不沒暮張衡靈憲序嫦娥託身於月是為蟾蜍說文蟾蜍蝦也傳𤣥擬天問月中何有白搗藥日又詩丹心為寸傷偏吳質箋白髮生鬢所慮深戴皓詩西園照人黃生曰此詩詠月全首作嗔怪之詞實與一百五夜耳對月同一竒恣特此首精深渾雅故讀者不見其竒王嗣奭曰杜詩凡單詠一物必有所比此詩為肅宗而作天運初回新君登極將有太平之望秋期近而月影清也然嬖幸巳為熒惑貴妃方敗復有良娣入河而蟾不沒也國忠既亡又有輔國搗藥之免長生也所以心愈苦而髮增白耳張綖曰蟾免以比近習小人入河不沒不離君側也搗藥長生潛竊國柄也丹心益苦無路以告也白髮添明憂思致老也故結言休照軍營恐愈觸其憂耳當時寇勢侵逼如此而近習猶然用事何時得見清平耶留别賈嚴二閣老兩院補闕得雲字公一作兩院遺補諸得聞字朱注時賈至為中書舍人嚴武為給事中兩院謂拾遺補闕也作遺補是此是至德二載八月往鄜州省家時作詔新唐書公家寓鄜彌年艱窶許公自往視田園須暫往一作住戎馬惜離羣去逺留詩别愁多任酒醺一秋常苦雨今日始去聲無雲山路時一作晴吹角一作笛那堪處處聞上四留别之情下四歸途之景語顧注五六紀天時之可往作途中自慰七八紀時事之難往作途中自悲語夏蕭慤詩田園聊復歸巳庾信詩暫往春園傍記子曰吾離羣而索居亦久矣始庾詩酒醺人半醉齊月令苦雨數來詩陶潛詩日暮無雲王勃詩葉山路狹何遜處處皆城市晚行口號平聲帝此公往鄜省家在道時作號梁簡文有和衛尉新渝侯巡城口張說有十五夜衛前口號口號不始於杜公三川不可到歸路晚山稠落雁浮寒水飢烏集戍樓市朝音潮今日異喪去聲亂幾時休逺愧梁江總還家尚黑頭上四晚行之景下四晚行有感而落雁飢烏寫中路凄凉之狀亦見喪敗之餘行人少戍卒稀盧注讀此二句有春燕巢於林木之感汸邵注三川在鄜州南六里顔延之詩日夕望三川注不可到徒步行緩也雁蔡琰詩雲山萬里兮歸路遐詩國䇿更嬴虛發而落江總詩落雁不勝彈陸機寒水入雲烟張正見詩飢烏落箭鋒遷庾信詩戍樓鳴夕鼓山寺響晨鐘陸機詩市朝忽易詩喪亂既平古詩為焦仲卿妻且暫還家去一顧炎武曰考江總傳梁太清三年臺城陷總年三十自此流離於外十四五年至陳天嘉四年還朝總年四十五所謂還家尚黑頭也子美遭亂﨑嶇略與總同自傷其年巳老故發此歎耳傳又云開皇十四年卒於江都時年七十六既無還家之文而禎明三年為陳亡之歲總年巳七十一頭安得黑乎且子美詩云莫看江總老猶被賞時魚又云管寧紗帽淨江令錦袍鮮亦巳亟稱之矣劉須溪謂著一梁字不勝其愧此謬說也獨酌成詩此公往鄜州在途獨酌而作南沈坰有獨酌謡江總詩獨酌一尊酒史顔延之獨酌郊野當其為適旁若無人燈花何太喜酒緑一作色正相親醉裏從趙作曾非為客詩成覺有神兵戈猶在眼儒術豈謀身苦一作共非被去聲微官縛低頭愧野人上四敘旅夜情事題意巳完下則有感身世而歎一官之拘束杜臆遇酒而燈花為兆酒之難得可知承任從為客酒解客愁詩覺有神喜動詩興也二句暗陶歎折腰杜愧低頭皆不肯屈節於仕途者為西京雜記目瞤得酒食燈花得錢財朱超詩若言客易吳越春秋欲興兵戈以誅暴楚微前漢蕭望之傳宣帝不甚從儒術默潘嶽詩豈敢陋官後漢梁鴻傳妻曰今何為默無乃欲低頭就之乎之愧野人愧不如彼自適也趙汸曰東坡詩夢裏似曾遷海外醉中不覺到江南又云却舉酒杯疑是夢試拈詩筆巳如神皆出於此古人凡送别遣懷之作只寫景言情而作詩本意巳在其中若於篇中明說作詩近於自注終覺非體如大雅卷阿篇乃召康公相成王之詩首云來游來歌以矢其音末云矢詩不多維以遂歌此係一時唱和之作故首尾提出賦詩之意又嵩高篇乃吉甫送申伯之詩末云吉甫作誦其詩孔碩其風肆好以贈申伯但於章尾結出贈詩之意收束有情杜集如留别嚴賈詩於第三句云去逺留詩别如此詩於第四句云詩成覺有神又如遊修覺寺詩於第三句云詩應有神助突於半腰中插入作詩題意巳盡而語氣亦傷後面重敘便脉絡不貫矣此皆少陵不拘古法處未可為訓也徒步歸行原注贈李特進自鳯翔赴鄜州途經邠州作鶴注李特進當是李嗣業本傳京兆高陵人因隨高仙芝平少勃律加特進祿山反肅宗追之至鳯翔上謁嗣業忠毅憂國不計居産有宛馬千匹倥杜臆近侍之臣徒步而歸以見軍事偬之狀命題有感明公壯年值時危經濟實藉英雄姿國之社稷今若是武定禍亂非公誰敘李公戡亂之才兵吳志孫堅謂張溫曰明公親率天威震天下魏志曹操曰天下英雄唯孤與使君泰忠經茍利社稷不顧其身通鑑魏賀拔軌謂宇文曰文足經國武能定亂不國語與人誦喪田愆禍亂其興鳯翔千官且飽飯衣馬不復扶又切能輕肥青袍朝音潮士最困者白頭拾遺徒步歸此自敘徒步之由二公往行在麻鞋謁帝有青袍而無朝服軍舊書至德載二月議大舉收復盡括公私馬以助故惟徒步而行重儒術范雲詩衣馬悉輕肥策孔融書朝士最史白頭如新燕國匹夫徒步之士人生交契無老少去聲論平聲心英華作心一作交何必先同調去聲妻子山中哭向天須公櫪上追風驃末言歸行須馬之意何無老少見忘年之交同調見忘形之交借魯訔注時李特進守邠州公便道經邠作詩贈李就乘馬也此章三段各四句說苑論交合友古謝靈運詩誰謂古今殊異代可同調藍櫪馬槽也今注秦始皇七馬一曰追風洛陽伽記後魏河間王琛遣使至波斯國得千里馬號曰追風廣韻馬黃白色曰驃九成宮張逺注此途中所見記事之作下首同隋唐書九成宮在鳯翔麟遊縣西五里本仁夀宮貞觀間修之以避暑因更名焉宮周垣千八百步并置禁苑及府庫官寺等太宗高宗嘗臨幸舊書九成宮總監一人副監一人丞簿録事各一人魏徴九成宮醴泉銘序九成宮隨之仁夀宮也冠山抗殿絶壑為池跨水架楹分巖竦闕高閣周建長廊四起棟宇膠葛臺榭參差仰視則迢遰百尋下臨則峥嶸千仞珠璧交映金碧相輝照灼雲霞蔽虧日月觀其移山回澗窮泰極侈以人從欲良足深尤蒼山入百里崖斷如杵臼曾音層宮憑風回一作迥岌嶪土囊口從九成宮敘起詩眇眇蒼山色山高宮敞此遙望之勢經謝朓蕪城賦崒若斷崖水注猶傳杵臼之迹楊敬之華山賦坳者似池窪者似臼可相如哀二世賦坌入層宮之嵳峩谷口回風見其以避暑地西京賦狀崔峩以岌嶪岌嶪高峻貌囊風賦風起於浸淫於溪谷盛怒於土囊之口注土谷口也立神扶棟梁一作宇鑿翠開户牖其陽産靈芝其隂宿牛斗紛披一作扶長松倒一作側揭􅣈魚列切怪石走哀猿啼一聲客淚迸林藪此記故宮景物四言古跡蒼凉上四言殿宇軒豁下魯靈光殿賦神靈扶其棟宇林老子鑿室以為户牖嵕西都賦其陽則崇山隱天幽穹谷其隂則冠以九陪以甘泉酈炎詩靈芝生河洲有孫逖詩紗窗宿斗牛殿庾信賦紛披草樹墨子荆長松文梓魯靈光賦飛陛揭􅣈緣雲上征揭􅣈嶄巖貌樂書禹貢厥貢鉛松怪石劉江總詩哀猿數處愁古府猿鳴三聲淚沾裳珊詩邊聲隕客淚林蔡雍薦皇甫規表藏器藪之中荒哉隋家帝製此今頽朽向使國不亡焉於䖍切為巨唐有雖無新增修尚置英華作署官居守巡非瑶水逺跡是雕牆後此段敘事言宮歷兩朝有殷鑒不逺之意通鑑隋開皇十三年二月詔營仁夀宮於岐山之北夷山堙谷以立宮殿崇臺纍榭宛轉相屬役使嚴急丁夫多死世史記嚮使秦緩其刑罰曲海賦昔在帝媯巨唐之置官見題下注王融水詩序周王八駿如舞瑶水之隂宇書甘酒嗜音峻雕牆我行陳作來屬之玉切時危仰望嗟嘆久天王狩晉朝並作狩趙云守音狩太白駐馬更搔一作回首末段敘情對故宮而念新君含無限興亡之感此杜臆天王守太白蓬萊且不能居况九成遺跡乎章首尾各四句中二段各八句歎之前漢郊祀志百姓仰望王記長言之不足故嗟時肅宗在鳯翔故云天狩春秋天王狩於河陽唐書鳯翔郿縣有太白山踟溫子升詩駐馬詣當罏詩搔首蹰玉華宮舊唐書貞觀二十一年七月作玉華宮詔玉華宮制度務從菲薄更令卑陋二十二年詔曰即澗疏隍憑巖建宇土無文繪木不雕鏤矯鋪首以荆扉變綺窗於甕牖地理志貞觀二十年置玉華宮在坊州宜君縣北七里鳯凰谷永徽二年廢為玉華寺寰宇記廢玉華宮在坊州宜君縣西四十里貞觀十七年置正殿覆瓦餘皆葺茅當時以為清凉勝於九成宮溪回一作迥松風長蒼鼠竄古瓦不知何王殿遺構絶壁下隂房鬼火青壞道哀湍瀉萬籟真笙竽一作竽瑟秋色一作氣一作光正一作極蕭灑首記舊宮凄凉湍松風屬聞蒼鼠屬見鬼火屬見哀屬聞萬籟屬聞秋色屬見釀七發依絶區兮臨回溪梅聖俞曰玉華宮前有溪曰醁溪劉孝綽詩松風吹繐帳朱注玉華宮作於貞觀年間去公時僅百載而云不知何王殿者何也按高僧傳載𤣥奘嘗於此譯經意久廢為寺與九成之置官居守者不同故人皆不知為何王之殿耳非公真昧其跡也謝靈運詩晨策尋絶壁陸機登臺賦步隂房而夏凉之淮南子人血為燐楚辭鬼火兮熒熒尚書傳傅氏巖在虞虢界有澗水壞道說文湍急瀨也萬張正見詩聊因萬籟響莊子敢問天籟子綦曰夫吹不同而使其自巳也墨子彈琴瑟吹笙竽無周王褒詩秋色照孤城名釋詩瀟灑出樊籠美人為黃土况乃粉黛假當時侍金輿故物獨石馬憂來藉草坐浩歌淚盈把冉冉征途間誰是長年者此撫遺迹而增慨也世即觀美人物化孰是長年住者乃冉冉征途間乎所以有感而歎息耳上章以傷亂作結本章以憂老作結此章二段各八句江淹詩美人歸重泉黑王褒僮約文早歸黃土陌喪列子鄭衛之處粉白黛樂府粉黛不加飾恨賦金輿及玉乘古詩所遇無故物輦西京雜記張丞相墓前有石馬曰趙曰當時必有隨美人殁葬宮旁故及之梅聖俞玉華宮近有晉苻堅墓晏魏文帝詩憂來無方人莫知之說苑齊景公坐地子獨搴草而坐謝惠連詩藉草繞回壑惜楚辭臨風恍兮浩歌兮王微詩傾筐未盈把賈誼逝賦夀冉冉而日衰注冉冉漸也徐陵詩征途愁轉斾短兩都賦神仙長年天台賦嗟人生之期孰長年之能執洪邁容齊隨筆云張文潛暮年在宛丘何大圭方弱冠往謁之凡三日見其吟哦老杜玉華宮詩不絶口大圭請其故曰此章乃風雅鼓吹未易為子言大圭曰先生所賦何必減此曰平生極力摹寫僅有一篇稍似之然未可同日語也遂誦其離黃州詩曰扁舟發孤城揮手謝送者山回地勢卷天豁江面寫中流望赤壁石腳插水下昏昏烟霧嶺歷歷漁樵舍居夷實三載鄰里通假借别之豈無情老淚為一灑篙工起鳴舷輕櫓健於馬聊為過江宿寂寂樊山夜此其音響節奏固似之矣羌村三首此亦還鄜州時道中作洛夢弼曰鄜州圖經州治洛交縣羌村交村墟也崢嶸赤雲西日腳下平地柴門鳥雀當作鵲噪歸客一作客子千里至此旅人初至家而喜也平杜臆荒村晚景摹寫如畫謝朓詩崢嶸瞰陸郭璞曰崢嶸高峻也外漢書五行志赤雲起而蔽日植陳後主詩日腳沉雲鮑照詩瀉水置平地曹詩柴門何蕭條陸賈新語乾鵲噪而行人至謝靈運詩歸客逐海隅妻孥怪我在驚定一作走還拭淚世亂遭飄蕩生還偶然遂鄰人滿牆頭感歎亦歔音虛欷叶音戲夜闌更秉燭相對如夢寐此記悲歡交集之狀家人乍見而駭鄰人遙望而憐道出情事逼真後二章俱發端於此亂後忽歸猝然怪驚有疑鬼疑人之意偶然遂死方幸免如夢寐生恐未真山司空曙詩乍見翻疑夢相悲各問年是用杜句陳後詩了知不是夢忽忽心未穩是翻杜語簡此章上四句下八句之在梁文帝詩拭淚空搖手我在如論語子在鮑照詩世亂識忠良列古詩飄蕩水無根偶蔡琰曲喜得生還兮逄聖君子范氏之黨以為然劉孝孫詩鄰人思舊情深楚辭曽歔欷余鬱邑注歔欷哀泣之聲不蔡琰曲更夜闌兮夢汝來斯樂府晝短苦夜長如秉燭遊陸放翁云夜深宜睡而復秉燭見久客喜歸之意泠齊讀平聲謂更換執燭未然列子一里老幼垂涕相對交沈約詩神疲夢寐王嗣奭曰前有述懷得家書二詩公與家人巳知兩存矣此云妻孥怪我在生還偶然遂何也蓋此時盜賊方橫乘輿未回人人不保直至兩相面而後知尚存此亂世實情也王慎中曰三首俱佳而第一首尤絶一字一句鏤出肺腸才人莫知措手而婉轉周至躍然目前又若尋常人所欲道者真國風之義黃初之㫖而結體終始乃杜本色耳村申涵光曰杜詩鄰人滿墻頭與羣雞正亂叫摹寫落田家情事如見今人謂苦無詩料者只是才弱膽小觀此等詩何者非料耶晚歲迫偷生還家少歡趣嬌兒不離去聲膝畏我復扶又切却去憶昔好去聲一作多追凉故繞池邊樹蕭蕭北風徑撫事煎百慮此章敘還家後事承上妻孥來一急於回家而仍少歡趣者一為父子久疏為生計艱難也最不離膝乍見而喜復却去久視而畏此寫幼子情狀肖好追凉去夏方暑北風徑今秋向冬矣撫事百慮傷禦寒無具雪逺注下四句即詩昔我往矣楊柳依依今我來思雨霏霏之意隋孫萬夀詩晚歲出函谷方春度京口何軍壘暫歸故云偷生吳志秦旦曰孰與偷生茍活遜詩幽居乏歡趣前溪歌寧斷嬌兒乳林孝經親生之膝下詩仲長統傳濯清水追凉風李德詩山水暫追凉北風其凉江淹詩伏枕懷百慮賴知禾黍英華作黍秫收巳覺糟牀注如今足斟酌且用慰遲暮末乃對酒自慰方幸家人完聚也上慰遲暮回應晚歲偷生撫事百慮此章八句下四句酒麥秀歌禾黍油油兮趙曰黍秫所以造酒衢魯訔曰牀即酒醡也淮南子聖人之道其猶中而致樽耶至者斟酌多少不同各得其所宜離騷恐美人之遲暮羣雞正一作忽亂叫客至雞鬭爭一云正生驅雞上上聲樹木始聞叩柴荆父老四五人問我久逺行手中各有擕傾榼濁復扶又切清此章記鄰里之情承上鄰人來各客至雞啼見荒舍寂寥之景清濁遞斟領村家酒味也分首章客至公自謂此章客至指父老驅應瑒詩二部曹伍羣雞煥以陳申鑒覩孺子之雞而見御民之術高漢樂府雞鳴高樹巔樂謝靈運詩俶裝返柴荆漢帝紀與父老約漢府兄弟四五人重古樂府逺行不如歸酒左傳行人執榼承飲造於子酒德頌揳榼提壺榼榼魏志徐邈曰酒清者為聖人濁者為賢人莫從英華一作苦辭酒味薄黍地無人耕兵革既未息兒童一作郎盡東征請為去聲父老歌艱難愧深一作餘情歌罷仰天歎四座涕一作淚縱平聲橫再敘飲中問答皆亂後悲傷之意莫辭四句代述父老之語請為二句致謝父老之詞歌罷而歎公傷亂也聽歌而涕父老酸心也杜臆兒當兵革故莫耕而酒薄此正艱難處乃能用情如是故感而有愧金氏曰艱難愧深情即所歌之詞此章上下各八句酸莊子魯酒薄而趙酒厚說苑器薄則亟毁酒薄則亟過秦論兵革不休潘嶽閒居賦兒童稚齒緬東征討安祿山也子詩遇人之艱難矣天桃花源記焉起深情韓非造父終日不食仰而歎孔融詩高談滿四座橫長門賦涕流離而縱杜詩每章各有起承轉闔其一題數章者互為起承轉闔此詩首章是總起次章上四句為承中四句為轉下四句為闔三章上八句為承中四句為轉下四句為闔此詩法之可類推者北征公遭祿山之亂自行在往鄜州鄜州在鳯翔東北故以北征命篇鶴注此詩述在路及到家之事當在羌村後至德二載九月作故云菊垂今秋花班彪作北征賦用以為題皇帝二載上聲秋閏八月初吉杜子將北征蒼茫問家室首段從北征問家敘起自春秋繁露德侔天地者稱皇帝蔡雍獨斷秦承周末以為德兼三王功包五帝故并以為號漢因之而不改隂詩二月初吉初吉朔日也楚辭駕𤣥螭兮北征鏗詩蒼茫歲欲晚蒼茫急遽之意室詩宜其家維時遭艱虞一作危朝音潮野少暇日顧慙恩私被詔許歸蓬蓽拜一作奉辭詣闕下一云閣門怵惕久未出雖乏諫諍姿恐君有遺失君誠中去聲興主經緯固密勿東胡反未已臣甫憤所切揮涕戀行在道途一作路猶恍惚乾坤含陳浩然本作合瘡痍憂虞何時畢次述辭朝戀主之情上八欲去不忍憂在君德下八既行猶思憂在世事三王洙曰時房琯得罪甫上言琯罪細不宜死帝怒詔司推問甫謝因稱琯宰相子少自樹立有大臣體帝不省録詔放甫歸鄜州庾信哀江南賦逮永嘉之艱虞張協詩朝野多歡娛之王粲登樓賦聊暇日以銷憂夢弼曰少暇日謂軍興際公私不遑安處顧慙自顧慚愧也裴松之三國志注表顧慚二物論曹植詩不得顧恩私涕傅咸詩歸身蓬蓽廬晉史陳王就國則拜辭隕班彪詩上書詣闕下正曹植詩皇恩過隆祗承怵惕孔叢子犯顔諫諍公無私公為拾遺故恐君有遺失前漢張安世傳無所遺失心文心雕龍經緯區宇彌綸彛憲傅亮表密勿軍國力俱盡密祕也勿黽勉也語東胡指安慶緒無鍾惺曰臣甫用章奏字面如對君家語敬姜曰揮涕行在見竄鳳翔詩法言人心恍惚痍傷也金瘡也漢書瘡痍者未起說文易悔吝者憂虞之象也靡靡踰阡陌人煙眇蕭瑟一作索所遇多被傷呻吟更流血回首鳯翔縣旌旗晚明滅前登寒山重平聲屢得飲馬窟邠郊入地底涇水中蕩潏猛虎立我前蒼崖吼時裂菊垂今秋花石帶一作戴一作載古車轍青雲動高興去聲幽事亦可悅山果多瑣細羅生雜橡栗或紅如丹砂或黑如㸃漆雨露之所濡甘苦一作酸齊結實緬一作縹思桃源內益歎身世拙坡陀望鄜畤巖谷郭作谷巖互出沒我行已水濵我僕猶木末鴟鳥一作梟鳴黃桑野鼠拱亂穴夜深一作中經戰場寒月照白骨潼關百萬師往者散一作敗何卒昌活切遂令平聲半秦民殘害為異物此歷敘征途所見之景而既踰越阡陌復回顧鳯翔自此過邠郊望鄜畤家鄉漸近矣鄜大約菊垂以下皆邠土風物此屬佳景坡陀以下乃州風物此屬慘景周甸注途中所歷有可傷者有可畏者有可喜者有可痛者涵光曰丹砂數句混然元化我行二句儼若畫圖申詩行邁靡靡陌王粲詩悠悠涉荒路靡靡我心愁四望無烟火但見與阡漢書注南北曰阡東西曰陌曹植詩千里無人烟者眇少也周陶潛詩蕭瑟室宇中則被傷戰士之帶傷列子之尹氏有老役夫晝呻吟即事呻吟聲引氣也二國策流血成川清元年十月房琯有陳陶青坂之敗年郭子儀復有渠之敗故云呻吟更流血山家語旌旗繽紛疊沈約詩雲華乍明滅隂鏗詩寒但見松重重也古樂府飲馬長城窟邠唐書邠州新平郡屬關內道杜篤論都賦瘞后土禮郊胡夏客曰入地底暗用陶復陶穴事其俗尚窟居也甘泉賦窺地底而上回九括地志涇水發源涇州東南流邠州界至高陵入渭域志邠距涇才百五十里海方蕩潏海賦蕩潏島濵蕩潏水流貌陳子昻詩雲陸機詩猛虎憑林嘯又狐獸更我前左傳周穆王周行天下將必有車轍馬跡焉惺阮籍詩託志青雲上殷仲文詩能使高興盡鍾曰幽事六句當奔走愁絶時偏有閒心清眼看景入微生支遁詩芳泉代甘醴山果兼時珍高唐賦芳草羅晉虞摰流離鄠杜間拾橡栗而食廣韻橡櫪實也本草其實似栗實而小左思蜀都賦丹砂赩熾出其坂世說王右軍見杜𢎞治歎曰面如凝脂眼如㸃漆泉淮南子雨露所濡化生萬物又嘗百草之滋味水之甘苦公景福殿賦結實秋商敷華青春郊綖注鄜畤即鄜州家所在畤地高而逺先見也漢祀志秦文公夢黃蛇自天而下止於鄜衍作鄜畤用三牲郊祀白帝我薛道衡詩鸞旗歷巖谷劉繪詩出沒萬重山詩行其野步左傳君其問諸水濵杜臆公先至水濵望家切而行速也詩我僕痡矣楚辭搴芙蓉兮本末詩鴟梟鴟梟注鴟梟鵂鶹惡鳥爾雅茅鴟怪鴟郭璞注茅鴟今鳩似鷹怪鴟即鵂鶹一名角鴟鳴即雨晝無見夜即飛實詩桑之落矣其黃而隕能漢書蘇武傳掘野鼠去草而食之說文江東大鼠人立以前兩腳拱頭跳舞詩蘇武詩行役在戰場翰張華詩平臺寒月色王粲白骨蔽平原哥舒傳翰率兵出關次靈寶縣之西原為賊所乘自相踐􅏳墜黃河死者數萬人庾信哀江南賦百萬義師一朝卷甲散何卒倉卒散失也秦長安舊為秦地故曰秦民史記白起傳天下不樂為民之日久矣何承天集徒以殘害剝辱物鵩賦化為異兮又奚足悲况我墮一作隨胡塵及歸盡華音花髮經年至茆屋妻子衣百結慟哭松聲回一作迥悲泉共幽一作嗚咽入聲平生所嬌一作驕兒顔色白勝雪見耶背音悖面啼垢膩腳不襪牀前兩小女補綴一作綻才一作才過膝海圖拆一作坼波濤舊繡移曲折天吳及紫鳯顛倒在裋一作短褐老夫情懷惡嘔泄一作咽卧數日一云數日卧嘔泄那無一作能囊中帛救汝寒凛栗粉黛亦解苞一作包衾裯稍羅列瘦妻面復扶又切光癡女頭自櫛學母無不為曉妝隨手抹移時施朱鉛狼籍畫睂濶生還對童稚似欲忘飢渴問事競挽鬚誰能即瞋喝翻思在賊愁甘受雜亂聒新歸且慰意生理焉於䖍切得說一作脫褐此備寫歸家悲喜之狀裋以上乍見而悲極夫妻兒女至情老夫以下悲過而喜盡室家曲折之狀在賊四句繳上以起下所憂在君國矣晉劉聰載記論背幽后不綱胡塵暗於戲水城劉向新序士亦華髮墜顛而後可用何遜詩洛陽東西却作經年别子夏衣若懸鶉百結王隱晉書董威輦拾殘繒輒結為衣號曰百結阮籍車駕所窮慟哭而返宋玉高唐賦虛聞松聲陶陶潛詩驟驥感悲泉臆古歌隴頭流水鳴聲幽咽詩嬌兒索父啼杜白勝雪乃飢色韻府俗人謂父曰耶亦作㸙多南史隂子春身服垢汚腳數年一洗沈佺期詩窮囚垢膩說文襪足衣也自三代有之謂之角襪故記內則衣裳綻裂紉針請補綴杜臆海圖四句乃家窮狀淮南子起波濤王褒講德論曲折不失節物趙注天吳海圖所畫之物紫鳯舊繡所刺之物剪舊以補豎衣故折移而顛倒也曰木華海賦天吳乍見而髣佛山海經朝陽之谷有神天吳是為水伯虎身人面八首八足八尾背青黃色又丹穴之山有鸑鷟鳯之屬也五色而多紫注詩顛倒衣裳方言開西謂襜褕短者為裋褐漢書裋謂僮豎所著之襦褐毛布也始皇紀寒者利裋褐古淮南王安書夏月暑時嘔泄霍亂之病相隨屬也詩面以粉黛似空青駢詩抱衾與裯箋衾被也即寢衣裯牀帳也揚雄賦羅列布鱗以雜沓兮左傳晉嬴氏曰寡君使婢子侍執巾櫛以固子也注櫛梳比總名賦沈佺期詩斜光映曉妝朱鉛即丹粉也宋玉好色臣東家之子著粉則太白施朱則太赤草史記淳于髠傳杯盤狼籍七命瀾漫狼籍狼所卧處皆披靡曰狼籍且前漢書張敞為婦畫睂漢城中謡城中好廣睂四方半額雷次宗書吾童稚之年巳懷逺略詩茍無飢渴過陶詩父老雜亂言左傳聒而與之語期陸機詩生理各萬端至尊尚䝉塵幾日休練卒仰觀一作看天色改坐一作旁覺妖一作襖氛一作氣豁隂風西北來慘淡隨回紇一作鶻其王願助順其俗善一作喜馳突送兵五千人驅馬一萬匹此輩少為貴四方服勇决所用皆鷹騰破敵過一作如箭疾聖心頗虛佇時議氣欲奪此憂借兵回紇之害復妖氛豁天意回矣回紇助人心順矣此興大機也但借兵外夷終為國患故云少為貴虛佇帝望回紇氣奪羣議沮喪趙次公曰不用外兵而用官軍此即當時之議前二段分應北征問家後三段申恐君遺失之故注左傳臧文仲曰天子䝉塵於外敢不奔問官守漢書天子在外曰䝉塵帝吳越春秋揀士練卒氛陶潛詩逺眺同天色魏文書用給左右以除妖顔延之詩隂風振凉野敇唐書回鶻傳回紇其先胸奴元魏時號高車部或曰勒訛為鐵勒隋曰回紇亦曰韋紇至德元載九月回紇遣其太子葉護率兵四千助國討賊肅宗宴賜甚厚命廣平王見葉護約為兄弟葉護大喜稱王為兄趙曰隨回鶻當以回紇為正德宗元和四年始請易號回鶻言捷鷙猶鶻然後漢郎顗傳助順元氣孔德璋詩漢家嫖姚將馳突胸奴庭馳突馳驟衝突也晉趙王倫傳從兵五千人詩驅馬悠悠戰國策張儀曰車千乘騎萬匹記禮有以少為貴者晉石勒傳令我與此輩共事司馬遷書勇之決也回紇傳其人驍强初無酋長逐水草轉徙善騎射喜盜鈔隋淮南子破敵陷陳莫能壅禦庾信詩箭飛如疾羽煬帝取桃竹白羽箭賜佛羅酋長曰此事宜速使疾如箭也大戴禮聖心備矣世說桓溫悵然失望向之虛佇一時都盡粲後漢許劭傳劭與從兄靖不睦時議以此少之王羽獵賦魂亡氣奪魏志吳人奪氣伊洛指掌收西京不足拔官軍請深入蓄鋭可一作何浩然本作伺俱發此舉開青徐旋瞻略恆碣昊天積霜露正氣有肅殺禍轉亡胡歲勢成擒胡月胡命其能久皇綱未宜絶此陳專用官軍之利擒是時名將統兵竒正兼出可以收兩京定河北而安史此為制勝萬全之策朱注當時李泌之議欲令建寧並塞北出與光弼犄角以取范陽所見正與公同綖注公以乞師回紇為非計故云聖心頗虛佇時議氣欲奪又謂官軍直可乘勝長驅故云此舉開青徐旋瞻略恆碣唯此議不行回紇果為唐患而河北迄非唐有其云雖乏諫諍姿恐君有遺失蓋為此也公嘗自比稷契其經綸概見於此矣昊天六句仍以天意決其必勝也路抱朴子八極之外如在指掌陸機詩伊洛有岐出師表深入不毛徐蓄養也鋭鋒利也東杜預疏此舉十有八九利行青禹貢二州名在山恆山碣石在東北書太恆山至於碣石帝詩昊天曰明西記霜露既降肅春秋演孔圖正氣為漢郊祀歌皓沆蕩秋氣殺翼奉傳轉禍為福帝酉陽雜俎祿山死太白蝕月絶崔駰違㫖皇綱云緒紀乃設宋明帝即位詔皇綱而復鈕憶昨一作昔狼狽初事與古先别必列切姦臣竟葅醢同惡隨蕩析不聞夏殷胡仔云當作殷周衰中自誅妹妲諸本作褒妲周漢獲再興宣光果明哲桓桓陳將軍仗鉞奮忠烈微爾人盡非於今國猶活此借鍳楊妃隱憂張良娣也當許彥昭曰禍亂既作惟賞罰則能再振否則不可支矣陳玄禮首議誅國忠太真無此舉雖有李郭不能奏匡復之功故以活國許之欲致興復當先去女戎絶魏志曹操曰淯水之難吾猶狼狽酉陽雜俎狽兩足短每行駕兩狼失之則不能行人吳都賦古先帝代姦姦臣謂楊國忠同惡謂虢國夫輩陸機辨亡論臣竊命漢書韓彭葅醢書同惡相濟妹又今我民用蕩析離居褒從夏殷為是下有周漢也喜妲巳桀紂所嬖舊作妲疑誤書明哲實作則大周宣漢光皆中興主軍舊唐書上至馬嵬驛左龍武將軍陳𤣥禮整比六以從𤣥禮以禍由楊國忠欲誅之㑹吐蕃使者遮國忠馬訴以無食國忠未及對軍士呼曰國忠謀反遂殺之以槍楬其首上出驛門慰勞軍士令收隊軍士不應使高力士問之𤣥禮對曰國忠謀反貴妃不宜供奉願陛下割恩正法上令力士引貴妃於佛堂縊殺之書詩桓桓于征注桓桓武勇貌書左仗黃鉞後漢海內忠烈張元節微爾即徹管仲之意道孫楚與孫皓書愛民活國家所尚凄凉大同殿寂寞白獸闥都人望翠華佳氣向金闕園陵固有神掃灑數不缺煌煌太宗業樹立甚宏達終以太宗事業望中興之主光當時舊國思君陵寢無恙其復在指顧間矣事此章大㫖以前二節為提綱首節北征問家乃身上伏第三四段次節恐君遺失乃意中事伏五六七段公身為諌官外恐軍政之遺失內恐宮闈之遺失凡辭朝時意中所欲言者皆罄露於斯此其脉理之照應也若通篇構局四句起八句結中間三十六句者兩段十六句者兩段後面十二句者兩段此又部伍之整嚴也之庾信詩凄凉多怨情同長安志南內興慶宮勤政樓北曰大同門其內大殿天寶七載大同殿桂産玉芝有神光照殿殿庾信小園賦寂寞天外三輔黃圖未央宮有白虎唐避太祖諱改為獸白獸闥即白獸門也注上林賦建翠華之旗注以翠羽為旗上葆也佳氣見前神異經東北大荒中有金闕高百丈蔡曰金闕謂以金飾闕門守後漢郎顗疏園陵至重聖神攸憑張悛為諸孫置冢人表掃除塋壟舊書天寶十載正月太廟置內官灑掃諸陵廟功淮南王歌煌煌上天傅毅詩靡所樹立陸機高祖臣贊曲逆宏達羅大經曰唐人每以李杜並稱至宋朝諸公始知推尊少陵東坡云古今詩人多矣而惟杜子美為首豈非以其飢寒流落一飯未嘗忘君與又云北征詩識君臣大體忠義之氣與秋色爭高可貴也范椁曰孫莘老嘗謂老杜北征詩勝退之南山詩王平甫以為南山勝北征終不能相服時山谷尚少乃曰若論工巧則北征不及南山若書一代之事與國風雅頌相為表裏則北征不可無而南山雖不作未害也二公之論遂定詩王嗣奭曰昌黎南山韻賦為詩少陵北征韻記為體不相蒙南山琢鏤凑砌詰屈竒怪創體傑出不可無一不可有二不易學亦不必學總不脫文人習氣北征固是雅調古來詞人多用之如韓之赴江陵寄三學士等作庶可與之雁行也又曰其篇法幻妙若有照應若無照應若有穿插若無穿插不可捉摸得李長祥曰杜詩每有起得極厚而無頭重之嫌收極詳而無尾大之迹北征中間歷言室家情緒乃本題正意故不見腹脹之病人葉夢得曰長篇最難晉魏以前無過十韻者蓋古以意逆志初不以敘事傾倒為工至杜子美北征述懷諸篇窮極筆力如太史公記傳此古今絶唱也胡應麟曰杜之北征述懷皆長篇敘事然高者尚有漢人遺意平者遂為元白濫觴李送魏萬等篇自是齊梁但才力加雄辭藻增富耳於唐汝詢曰杜五言古體情莫妙於三别嘆事莫核三吏自訴莫若於紈袴經濟莫備於北征夢李白寫懷見其高望嶽慈恩寺取其壯他若留花門前後出塞玉華九成諸作胸中羅宇宙無所不有斯見其大篇鍾惺曰讀少陵奉先詠懷北征等篇知五言古長不易作當於潦倒淋漓忽正忽反若整若亂時斷時續處得其篇法之妙禹魏泰道輔曰唐人詠馬嵬之事尚矣世所稱者劉錫云官軍誅佞幸天子捨妖姬白樂天云六軍不發無奈何宛轉蛾睂馬前死此乃官軍背叛逼迫明皇不得巳而誅貴妃也頗失事君之禮老杜北征詩曰不聞夏殷衰中自誅褒妲蓋言明皇畏天悔禍賜妃子以死無預官軍也行次昭陵朱注昭陵在醴泉近涇陽直京師之北草堂詩箋序於北征詩後良是蓋省家鄜州道經此也黃鶴編在天寶五載謂西歸應詔時作大謬今按題云行次是便道經行而次於陵前當從朱說為正陵唐書京兆府醴泉縣有九嵕山太宗昭在西北六十里舊俗疲庸主羣雄問獨夫讖歸龍鳯質威定虎狼都首敘太宗戡亂之功煬庸主指六朝諸君羣雄指李密竇建德輩獨夫指隋帝龍鳯質真主出也虎狼都關中入也疲凋敝問問罪讖符讖威兵威也罰國語率歷代之舊俗史記范睢傳庸主賞所愛而所惡世說喬𤣥謂曹公曰天下方亂羣雄虎爭李百藥皇德頌定羣雄之逐鹿拯方割之為魚書曰獨夫紂朱注隋書楊𤣥感謂游元曰獨夫肆虐陷身絶域此夭亡之時也之舊唐書太宗方四歲有書生見之曰龍鳯之姿天日表年將二十必能濟世安民據隋都關中即秦舊地張綖注太宗得天下根本在先關中蘇秦傳秦虎狼之國也參顧炎武日知録以虎狼為秦分野蓋據天官書西宫為白虎東一星曰狼秦本紀贊據狼弧蹈參伐此另一說天屬尊堯典神功協禹謨風雲隨絶一作逸足日月繼一作亨高衢文物多師古朝音潮廷半老儒直詞寧戮辱賢路不﨑嶇此記貞觀致治之盛宗堯典尚書篇名高祖諡神堯禪位太故曰尊堯典禹謨言九功惟敘太宗樂名九功舞故曰協禹謨古朱注李靖房杜諸公乘風雲之㑹依日月之光師如製雅樂定律令議封建之類老儒如用虞世南諸學士直辭如納王圭魏徵之諌賢路如召馬周劉子翼皆是許顗彥周曰文物多師古四句見太宗智勇英特武定天下而能如此最盛德也莊子彼以利合此以天屬洙曰天屬父子也能魏收詩導水逼神功中興二十八將咸感㑹風雲奮其智勇後漢書論魏文帝與孫權書中國雖饒馬其知名絶足亦時有之一登樓賦唯日月之逾邁兮俟河清其未極冀王道之平兮假高衢而騁力沈約齊安陸昭王碑氣藴風雲身負日月左傳臧哀伯曰文物以紀之書說命事不師古以克永世非說攸聞下賈山至言今方正之士皆在朝廷矣宋宗炳論柱翁直是知禮老儒說苑晏子曰明君在上下有直詞名賢戮辱便孽黨進後漢鄧后紀論建光之後遂乃前漢劉向傳通賢者之路潘嶽詩在疚妨賢路﨑南都賦下䝉籠而﨑嶇廣雅嶇傾側也往者灾猶降蒼生喘未蘇指麾安率土蕩滌撫洪爐此再敘當時仁政以補上文所未備自隋末大水餓殍滿野至貞觀初年連遭水旱是往者之天災猶降而民困尚未蘇也太宗則勤恤以安民修省以回天如吞蝗而畿輔不災肆赦而所在皆雨遂能安率土撫洪爐矣一說此從天寶之亂追想太宗當祿山陷京是隋末災殃再降於今以致生民重困故想太宗神靈指麾而蕩滌之今按前說文意平順本於張南湖王右仲後說語氣陡健本於唐仲言朱長孺兹以前條為主左傳孤實不德天降之災書至於海隅蒼生喘氣疾也蘇息緩也矣漢書陳平對漢王曰去兩短集兩長天下指揮即定詩率土之濱歐陽公曰蕩滌撫洪爐謂陶成天下如洪爐漢紀陳琳曰此猶鼓洪爐燎毛髮耳壯士悲陵邑幽人拜鼎湖玉衣晨自舉鐵英華作石馬汗常趨松柏瞻虛一作靈殿塵沙立暝樊作暗途寂寥開國日流恨滿山隅末乃行次昭陵而有感也存壯士指守陵者幽人公謁陵也玉衣鐵馬見靈爽猶松柏塵沙歎景色荒凉傷今思昔故對山隅而流恨耳何此章起首中腰各四句前後二段各八句韓信傳為斬壯士西都賦三選七遷充奉陵邑易幽人貞吉帝漢郊祀志黃帝鑄鼎荆山下鼎成有龍垂胡髯下迎騎龍上天後人名其地為鼎湖列子日日獻玉衣旦旦進玉食漢儀注以玉為衣如鎧狀連綴之以黃金為縷漢武故事髙皇廟中御衣自篋中出舞於殿上王莽傳杜陵便殿乘輿虎文衣廢藏在室匣者出自樹立外堂上良久乃委地莽惡之陸倕石闕銘鐵馬千羣朱旗萬里丞庾信碑銘碑枕金龜松橫石馬西京雜記陳縞見張相墓前石馬按玉衣既用漢事則鐵馬亦當援引古典考南史蕭猷為益州刺史遇齊茍兒反衆十萬攻城猷兵糧俱盡遙禱楚王廟神請救是日有田老逢一騎浴鐵從東方來俄有數百騎如風一騎過飲田老問為誰曰吳興楚王來救臨汝侯此時廟中侍衛土偶皆泥濕如汗是月猷大破茍兒鐵馬汗趨疑用此事詩松柏丸丸春秋含文嘉天子墳高三仞樹則松諸侯半之樹則柏陶何思澄詩虛殿簾帷靜薛道衡詩塵沙塞下暗𢎞景詩暝途載誰賞沈楚辭聲嗷嗷以寂寥兮照易大君有命開國承家約詩流恨滿青松鮑詩高墳纍纍滿山隅重平聲經昭陵此必鄜州省家之後復至長安時作草昧英雄起謳歌厯數歸風塵三尺劍社稷一戎衣翼亮貞文德丕承戢武威聖圖天廣大宗祀日光輝先敘太宗生前一綖注首聨言應運而興天人係屬乃一篇之柱風塵聨應草昧句翼亮一聨應謳歌句聖圖廣大言創業之𢎞尺劍戎衣之成功也宗祀光輝言垂統之逺文德武威之餘䕃也何景明曰用經史入詩絶不見斧鑿痕使他人道之未免拙滯不齊昧而不明此言隋末之亂易天造草昧注草而應劭人物志草之秀者為英獸之特者為雄太宗紀上問侍臣帝王創業與守成孰難房𤣥齡曰草昧之初羣雄並起角力而後臣之創業難矣躬梁武帝詔謳歌攸奉萬有樂推古書天之厯數在汝陸機表天命未改厯數有歸詩中用風塵有二義如前漢終軍傳邊境時有風塵之警即杜詩風塵三尺劍也如陸機詩京洛多風塵即杜詩風塵為客日也一是戰鬭之風塵一是行旅之風塵有漢高帝紀吾以布衣提三尺劍取天下左傳社稷主風俗通社者土地之主土地廣博不可遍祀故封土以為社而祀之稷者五穀之長五穀衆多不可遍祭故立稷而祭之衣書一戎衣天下大定庾信詩終封三尺劍長卷一戎抱朴子儒雅而乏治略者非翼亮之才石崇大雅吟啓土萬里志在翼亮振書誕敷文德應又丕承哉武王烈隋煬帝詩前驅武威蘇頲制詩聖圖恢㝢縣孝蔡雍陳太丘廟碑光明配乎日月廣大資乎天地經宗祀文王於明堂以配上帝前漢兒寬傳癸亥宗祀日宣重光光輝充塞天文粲然陵寢盤空曲熊羆守翠微再窺松柏路還有一作見五雲飛此記重謁昭陵氣張逺注末句即五陵佳無時無之意山此章上八句下四句祀古詩陵寢暮烟青漢書注陵陵寢寢廟也後漢祭志漢諸陵皆有園寢起居衣服象生之具唐㑹要昭陵因九嵕層峰鑿山南面深七十五丈為𤣥宮傍巖架梁為棧道懸絶百仞繞回二百三十步始達𤣥宮門頂上亦起游殿寥陶𢎞景詩句容之句曲山中周回一百五十里空曲曠宋之問詩簷端接空曲注書則亦有熊羆之士古爾雅山未及上曰翠微唐因重經故云再窺詩松柏夾廣路光京房易飛侯宣太后陵前後數有又有五采雲在松下如車蓋彭衙行單復注公避賊艱難之際得孫宰顧遇事後感荷而作黃希曰公避寇在天寶十五載此云别來歲月周知詩是至德二載追憶避賊時事非謂歸鄜州如此也憶昔避賊初北走經險艱夜深彭衙道一作門月照白水山首記避亂彭衙桑北走南走見漢書古樂府陌上不見天路險艱盡室久徒步逢人多厚顔參初簮切差此兹切谷鳥吟一作鳴不見遊子還癡女飢咬我啼畏虎狼一作猛虎聞古叶無沿切懷中掩其口反側聲愈嗔古叶稱延切小兒强區兩切解事故索色責切苦李餐此叙擕家逺行兒女顛連之苦羽左傳盡室以行詩書顔厚有忸怩鍾㑹孔雀賦華參差宋之問谷鳥囀尚澀輾鳥鳴無人一路荒凉之景解古詩手巾掩口啼詩轉反側唐書劉仁軌稱事僕射庾信詩苦李無人摘晉書王戎與羣兒戲於道側見李樹多實等輩競趨之戎獨不往或問其故戎曰樹在道邊而多子必苦李也取之信然一旬半雷雨泥濘相攀牽一作牽攀既無禦雨一作濕備徑滑衣又寒有時經一作最契濶竟日數里間野果充糇糧卑枝成屋椽早行石上水暮宿天邊煙此敘雨後行蹇困頓流離之狀雨徐幹詩所經未一旬謂荀濟詩誰肯相攀牽易雷之動滿盈經契濶連朝勤苦詳見六卷暮左思詩秋菊兼餱糧望宋之問詩暮投人煙宿杜臆宿天邊烟逃難之人烟而宿莫定其居也小留同晉作固一作周家窪欲出蘆子關故人有孫宰高義薄曾同層雲古叶于元切延客巳曛黑張燈啓重平聲門古叶民堅切暖湯濯我足剪紙招我魂古叶胡勬切詩此記孫宰晉接之情據意孫宰當在同家窪遇孫之後因寄妻子於鄜州遂欲從蘆子關以達靈武朱注鄜州在白水縣北延州在鄜州西北蘆關又在延州北時公欲北詣靈武故道出蘆關也名逺注黃希以孫宰為三川宰或曰人名也玩詩意人為近謝沈約詩髙義薄雲天薄迫也王粲詩哀鳴入層雲靈運詩朝游窮曛黑漢書外戚傳張燈燭設幃帳旐易重門擊柝必古歌可以濯我足方夢弼曰剪紙作以招其魂不果有此事只是多安慰耳韓詩外傳三月上巳於溱洧雨水之上執蘭招魂續魄祓除不祥從此出妻孥相視涕闌干衆雛爛熳睡喚起霑盤飱古叶七緣切誓將與夫子永結為弟昆古叶居員切遂空所坐堂安居奉我歡備志孫宰周恤之誼出妻孥出見宰也衆雛指兒女爛漫熟睡貌露杜臆誓將與夫子永結為弟昆乃代述孫宰語所謂心肝於艱難之際者必如此說下面文氣方順舊解俱云夫子指孫宰誤矣息夫躬絶命詞涕泗流兮萑蘭瓚曰萑蘭涕泗闌干也王洙注闌干淚墮衆多貌趙注談藪王元景使劉孝綽送之泣下闌干鸚鵡賦憫衆雛之無知寫莊子大德不同而性命爛漫矣申涵光曰爛漫二字稚子睡態入神左傳盤餐加璧注餐水澆飯也陶潛詩誓將不復疑誰肯艱難際豁達露心肝别來歲月周胡羯仍構患古叶胡涓切何當有翅翎飛去墮爾前末結别後追思之意杜臆公念孫宰肝膈時往來於中故追寫逃難之苦愈真則感勒周旋之德愈重此章四句起六句結前二段各十句後二段各八句粲潘嶽西征賦髙祖之興也聰明神武豁達大度王詩喟然傷心肝梁書何敬容曰西晉祖尚𤣥虛使中原淪於胡羯引王粲詩豺虎方構患黃希曰仍構患謂史思明等兵共十萬寇太原安慶緒使尹子竒及同羅夷兵十三萬趨睢陽此詩用韻參錯不一經朱注考訂知各本古韻也至於分析段落諸家頗混今鈎清睂目庶朗然易見耳蕭山毛竒齡韻學指要曰古韻無明注惟宋吳棫鄭庠各有古韻通轉注本惜當時但行棫說而不行庠說致韻學大晦考鄭氏古音辨分古韻六部束冬江陽庚青蒸七韻皆協陽音支微齊佳灰五韻皆協支音真文元寒删先六韻皆協先音魚虞歌麻四韻皆協虞音蕭肴豪尤四韻皆協尤音侵覃鹽咸四韻皆協覃音其書出吳氏韻補後按之古音巳得十之九所略不足者魚虞歌麻與蕭肴豪尤尚分兩部耳按毛氏此書實足破沈韻之拘隘閲少陵彭衙行合六韻於一篇唐人尚知古韻也喜聞官軍已臨賊境二十韻鶴注考唐史至德二載八月丁卯廣平王俶為天下兵馬元帥郭子儀副之此詩當作於九月胡騎一作虜潛京縣官軍擁賊壕鼎魚猶假息穴蟻欲何逃首言軍臨賊境勢在必克縣木蘭詩但見胡騎鳴啾啾梁元帝詩擁旄去京唐書至德二載閏八月賊寇鳯翔崔光逺行軍司馬王伯倫等率衆捍賊乘勝攻中渭橋追擊至苑門賊大軍屯武功燒營而去九月丁亥廣平王將朔方等軍及回紇西域之衆十五萬發鳯翔壬寅至長安城西與賊將安守忠等戰於香積寺之北澧水之東賊大敗斬首六萬賊帥張通儒棄京城走陜郡癸卯大軍入京師甲辰捷書至鳯翔南史丘遲與陳伯之書將軍魚游於鼎沸之中中後漢謝夷吾傳游魂假息非刑所加異苑晉太元桓謙見有人皆長寸餘悉被鎧持槊乘具裝馬從塪中出緣凡登竈蔣山道士來應子令作沸湯澆所入處因掘之有斛許大蟻死在穴中安史記鄭桓公曰王室多故豫逃死乎帳殿羅𤣥冕轅門照白袍秦山當警蹕漢苑入旌旄路失一作濕非羊腸險雲橫雉尾高五原空壁壘八水散風濤今日看平聲天意遊魂貸爾曹乞降胡杜切那更得尚詐莫徒勞此言鑾輿漸逼長安𤣥冕公卿服白袍回紇衣秦山漢苑京師在望矣路失險言中途無阻雉尾高言儀仗甚整空壁散濤謂賊衆將滅乞降無及矣臣庾肩吾曲水聯句回川入帳殿令侍服有衮冕鷩冕毳冕繡冕𤣥冕舊唐書武德周禮以車轅為門趙國策張孟談遇智過轅門之外白胡夏客曰留花門詩云百里見積雪知回紇軍皆衣也梁書陳慶之所統之兵悉著白袍所向披靡坂前漢書出稱警入稱蹕漢志上黨壺關縣有羊腸漢氏春秋太行羊腸其山盤行如羊腸魏武苦寒行羊腸險詰曲車輪為之摧唐書天子舉動必以扇大駕鹵簿有雉尾障扇小團雉尾扇方雉尾扇小雉尾扇之屬高長安志長安萬年二縣之外有畢原白鹿原少陵原陽原細柳原謂之五原漢單于欵五原塞潏曹植賦步壁壘之常制關中記涇渭滻灞潦滈灃為關內八水前漢王嘉曰民心悅而天意得朱世說苻堅遊魂近境尚靈帝紀赤睂遣劉恭乞降注賊急則乞降緩則詐今皆無用矣元帥歸龍種上聲司空握一作擁豹韜前軍一作旌蘇武節左將去聲呂䖍刀兵氣回飛鳥威聲沒巨鼇戈鋋開雪色弓矢向一作尚秋毫天步艱方盡時和運更遭誰云遺一作貴毒螫一作蠆巳是沃腥臊此言諸將協力征討郭元帥謂廣平王司徒謂子儀前軍謂李嗣業左將謂僕固懷恩兵氣二句言軍勢之振戈鋋二句言軍器之利毒螫腥臊指賊黨唐書二載九月以廣平王俶為天下兵馬元帥郭子儀副之先是子儀進位司空晉劉琨表晉文以郤縠為元帥而定霸功論小學紺珠文武龍虎豹犬為六韜後漢書注霸典文文師武論龍韜主將虎韜偏裨豹韜校尉犬韜司馬曰唐書李嗣業統前軍陳於香積寺北收長安胡夏客嗣業所將皆蕃夷四鎮故以蘇武之典屬國為比是晉書蘇峻平王導令取峻節陶侃曰蘇武節似不如通鑑香積之戰賊伏精騎欲擊官軍朔方左廂兵馬使僕固懷恩就擊之剪滅殆盡相晉書徐州刺史呂䖍檄王祥為司馬初䖍有佩刀工之以為必三公可服䖍乃與祥於鄒陽傳上覆飛鳥下不見伏鼇文心雕龍震雷始曜電出師先乎威聲列子巨戴山趙曰巨鼇贔屭之物毫東都賦戈鋋彗雲鋋小矛也詩弓矢斯張向秋言雖微必中慎子離朱之明察秋毫之末西詩天步艱難之左傳時和年豐見文選遭遇嘉運京賦蕩亡秦毒螫腥臊别沃以蕩滌其穢也睿想一作思丹墀近神行羽衛牢花門騰絶漠拓唐書作柘羯渡臨洮此輩感恩至羸俘何足操鋒先衣染血騎去聲突劒吹毛喜覺都城動悲憐一作連子女號平聲家家賣叉釧只同秖待一作凖擬獻香一作春醪末言逺人同助益知舊都旋復矣睿想指肅宗神行謂六軍花門指回紇拓羯指安西彼既感恩思奮則殘俘不足執矣鋒先騎突見其勇决悲喜兼至預想人情如是耳省此章四句起下三段各十二句漢書元后傳注尚書中以丹漆塗地曰丹墀西京賦青瑣丹墀蕩溫子升詩神行揚翠旗天臨肅清警江淹詩羽衛流景孔稚圭詩橫行絶漠表胡夏客曰封常清傳祿山先鋒至東京使驍騎與拓羯逆戰時常清以北庭都護入朝命討祿山故有拓羯之兵此詩所云蓋指北庭之歸義者唐西域傳安西者即康居小君長罽王故地募勇健者為拓羯猶中國言戰士也北唐書洮州臨洮郡屬隴右道凉通鑑是年二月安西庭及拔汗那大食諸國兵至鄯鼂錯傳輕車突騎師古曰言驍鋭可用衝敵人也此舊注吳越春秋干將之劍能决吹毛遊塵考本書無語谷永與段㑹宗書優游都城而取卿相相董卓傳呂布殺卓長安士女賣其珠玉衣裝市酒肉慶者填滿街肆顧炎武曰南史庾杲之傳杲之嘗兼主客郎對魏使魏使問杲之曰百姓那得家家題名帖賣宅答曰朝廷既欲掃蕩京雒克復神州所以家家賣宅耳王嗣奭曰此詩二十韻字字犀利句句雄壯真是筆掃千軍者中間如今日看天意此輩感恩至兩聨排律中不用駢耦更覺精神頓起而鋒先騎突句法倒裝尤為警露收京三首此當是至德二載十月在鄜州時作詩云生意甘衰白天涯正寂寥忽聞哀痛詔又下聖明朝此明是在家聞詔按肅宗於至德元年七月十三日甲子即位靈武制書大赦二年十月十九日帝還京十月二十八日壬申御丹鳯樓下制前後兩次聞詔故云又下也是時公尚在鄜州其至京當在十一月年譜謂十月扈從還京與詩不合當以公詩為正至於上皇回京十二月甲寅之赦又在其後舊注錯引仙仗離丹極妖星帶一作照玉除須為下去聲殿走不可好去聲樓居一云得非羣盜起難作九重居暫屈汾陽駕聊飛燕平聲將去聲書依然七廟略更蔡讀平聲與萬方初首章從陷京說至收京在四句分截仙仗指上皇妖星指祿山須為下殿謂宮闕忽離不可樓居見奉仙無益此追敘往事駕曰暫屈言上皇將回書曰聊飛言河北易定末喜更新氣象也養郴陽仙傳蘇耽被命升仙辭母曰仙仗臨門不得終唐書儀衛志凡朝㑹之仗五一曰供奉仗二曰親仗三曰勳仗四曰翊仗五曰散手仗皆帶刀捉仗立於東西廊下邵注天子有太極殿以丹掩泥塗殿上地故庭曰丹墀妖星凡二十一星晉載記劉曜曰昨夜妖星犯月安祿山事迹祿山生夜赤光旁照羣獸四鳴望氣者見妖星芒熾落其穹廬帶玉除即春星帶草堂意曹植詩凝霜依玉除殿梁武帝紀諺云熒惑入南斗天子下殿走乃跣足下以禳之漢武帝紀公孫卿曰仙人好樓居於是令長安作飛廉桂館甘泉作益夀延夀觀天莊子堯往見四子藐姑射之山汾水之陽窅然喪其下焉杜臆汾陽句暗藏喪天下在內歸史記燕將攻下聊城聊城人或讒之燕將懼誅不敢田單攻之歲餘不下仲連乃為書約之矢射城中遺燕將燕將見書泣而自殺庾信詩願得魯連飛一箭持寄思歸燕將書王制天子三昭三穆與太祖之廟而七羊祜傳祜外揚王化內經廟略庾肩吾詩方憑七廟略更雪五陵寃趙曰兵謀謂之廟略蓋謀於七廟中也朱鶴齡曰𤣥宗晚節怠荒深居九重政由妃子以致播遷之禍公不忍顯言而寓意於仙人之樓居因貴妃常為女道士故舉此况之連昌宮辭上皇正在望仙樓太真同憑闌干立此一的證生意甘衰白天涯正寂寥忽聞哀痛詔又下去聲聖明朝音潮羽翼懷一作慙商老文思憶帝堯叨逢罪巳日灑涕一作霑灑望青霄次章在鄜而喜收京亦四句分截何言自甘衰白寥落天涯忽聞詔書再下喜如矣此時懷商老而李泌巳去憶帝堯而上皇初歸有關於朝事君德者非小只恐罪巳之日又增闕失是以望青霄而灑涕耳意趙汸云甘字正字忽字又字呼應起伏有出自望外周王褒詩寂寥灰心盡摧殘生意餘趙汸注生意似指恩澤言白嵇康養生論積損成衰從衰得白從白得老注白謂髮漢西域傳武帝棄輪臺下哀痛之詔樓舊唐書是年十月肅宗還京十一月壬申朔御丹鳯下制曰早承聖訓常讀禮經義切奉先恐不負荷十二月戊午朔又御丹鳯門下制大赦雒鼂錯傳施利後世名稱聖明張良傳四人者隱商山從太子上召戚夫人指示曰彼羽翼已成難動矣虞書序昔在帝堯聰明文思光宅天下將遜於位讓於舜書左傳禹湯罪巳其興也勃焉馬融疏伏讀詔深惟禹湯罪巳之義搜神記灑涕而别朱鶴齡曰羽翼指廣平王而言肅宗前以良姊輔國之譖賜建寧王死至是廣平初立大功又為良姊所忌潛構流言雖李泌力為調護而時巳還山公恐復有建寧之禍故不能無思於商老也又云肅宗之失不在黨武即位之舉而在還京以後失於定省使良姊輔國得媒孽其間以致劫遷西內子道不終是年十二月上皇還居興慶宮父子之間猜疑未見而公於此若深有見於其微者曰憶帝堯欲其篤於晨昏之戀也沾灑青霄其所以望肅宗者豈不深且厚耶汗馬收宫闕春城鏟賊壕賞應平聲歌杖杜歸及薦櫻桃雜虜橫戈數音促一作槊非功臣甲第高萬方頻一作同送喜無乃聖躬勞三章收京而憂事後亦四句分截時宮闕巳收賊壕可鏟賞功薦廟即在來春也但恐回紇恃功邀賞諸將僭奢無度故又為之慮曰今京師收復此萬方送喜之時無乃聖躬焦勞之漸乎公蓋憂敵橫臣驕將成蹂躪跋扈之勢厥後邊方猾夏藩鎮專權果如所慮惜當時不能見及此耳晉世家矢石之難汗馬之勞白班媫妤搗素賦登薄軀於宮闕兮平謝朓詩春城覆日庾信枯樹賦平鱗鏟甲鏟削也含詩序杕杜勞還役也櫻月令仲夏之月天子乃羞以桃先薦寢廟注含桃桃郭欽疏漸徙內郡雜虜於邊地功庾肩吾詩橫戈念北奔碑漢高帝紀吾於天下賢士臣可謂無負矣楊炯甲第何高甲第謂甲乙之第言第一等第宅也長安志天寶中京師堂寢巳極宏麗而第宅未甚逾制安史之後大臣宿將競崇棟宇無有界限人謂之木妖生孔融疏身為聖躬國為神器易林謳歌送喜黃注從五六讀下則結尾二句乃反辭致諷見公慮事之深愛君之切按末句舊有兩說師氏曰此聖主之勳勞人臣不宜奪天工以為巳力此說歸功主上其意是矣但於無乃二字下得太輕朱云聖躬勞即大夫速退無使君勞之意此說作喜幸之詞但於上文橫戈甲第不見關合耳送鄭十八䖍貶台州司户傷其臨老陷賊之故闕為面别情見音現於詩通鑑至德二載十二月陷賊官六等定罪三等者流貶䖍在次三等故止貶台州此當是其時作鄭公樗散鬢成一作如絲酒後常稱老畫師萬里傷心嚴譴日百年垂死中張仲切興時蒼惶一作伶俜已就長途往邂逅無端出餞遲便與先生應平聲永訣九重平聲泉路一作下盡交期上四鄭貶台州傷其臨老罹罪下則闕為面别而寄詩言情杜臆首記其狀次記其言兩句巳為䖍撰一小影觀八哀詩鄭多才藝而畫更精曰老畫師此其自知語亦其自慨語萬里傷心正為嚴譴之故百年垂死乃在中興之時嚴譴中興四字無限痛楚結聯情見乎詞鄭果卒於台州樗樹散木見莊子言材不合世用也情漢書酒後耳熱䖍薛道衡詩不䝉女史進更失畫師趙次公曰鄭好書善畫山水𤣥宗稱為三絶䖍水部郎中因稱風疾求攝市令潛以密章達靈武賊平與王維等並囚宣陽里以善畫崔圓使繪齊壁䖍即祈解於圓卒免死貶台州司户參軍孔融詩俯仰內傷心漢襄楷疏不見採察而嚴被譴讓宋之問詩逐臣北地承嚴譴興荀悅漢紀張禹不吐直言佞於垂死又贊光武中之後北山移文蒼黃反覆始乎無端崔駰箋萬里長途于詩邂逅相遇侯管子詩出宿于干飲餞言潘嶽夏湛誄存亡永訣太釋智愷詩泉路方幽噎寒隴向凄清梁昭明子詩還信三洲曲誰念九重泉盧世㴶曰䖍之貶既傷其垂老陷賊又闕於臨行面别故篇中倣徨特至如中二聨清空一氣萬轉千回純是淚㸃都無墨痕詩至此直可使暑日霜飛午時鬼泣在七言律中尤難末徑作永訣之詞詩到真處不嫌其直不妨於盡也文顧宸曰供奉之從永王璘司户之汚祿山僞命皆人敗名事使硜硜自好者處此割席絶交不知作幾許雨雲反覆矣少陵當二公貶謫時深悲極痛至欲與同生死古人不以成敗論人不以急難負友其交誼真可泣鬼神李陵生降子長上前申辨甘受蠶室之辱而不悔與任少卿書猶刺刺為分疏亦與少陵同一肝膽人知龍門之史拾遺之詩千秋獨步不知皆從至性絶人處激昻慷慨悲憤淋漓而出也臘日此至德二年十二月還長安時作祖小學紺珠五行始於祖終於臘唐土德戊辰臘趙大綱測㫖唐以大寒後辰日為臘臘日常年一作年年暖尚遙今年臘日凍全消侵凌雪色還萱草漏泄春光有一作是柳條縱酒欲謀良一作長夜醉歸一作還家初散一作放紫一云北宸朝音潮口脂面藥隨恩澤翠管銀罌下去聲九霄此詩臘日喜霑恩賜而作也上四言景下四記事張綖注大寒之後必有陽春大亂之後必有至治臘日而暖此寒極而春亂極將治之象公故喜而賦焉朱瀚曰雪色承凍春光承暖侵凌承全消漏泄承尚遙插顧注臘祭自應㑹飲况當恩澤下頒之日下四用倒乃歸重感恩意若先將口脂翠管作聨散朝縱酒作結便覺板實少致春朱瀚曰庾子山詩常年臘月半巳覺梅花闌不信今晚俱來雪裏看沈休文詩山光浮水至春色犯寒來前半本此史記炎帝欲侵陵諸侯詩焉得萱草魏武紀檄必恐漏泄酒梁元帝詩徒望春光新志陳書太傅平秦王歸彥縱為樂經宿不知長安宣政殿北曰紫宸門內有紫宸殿即內衙之正殿召朱瀚曰口脂面藥以禦寒凍景龍文館記帝於苑中近臣賜臘晚自北門入於內殿賜食加口脂臘脂酉陽雜俎臘日賜口脂臘脂盛以碧鏤牙筒太平御覽盧公家範臘日上澡豆及頭膏面脂口脂翠管銀罌指所盛之器前漢郊祀志亦施恩澤張注惠逺詩孰是騰九霄不奮冲天翮奉和去聲賈至舍人早朝音潮大明宮此乾元元年春書在諫省作唐賈曾景雲中擢中書舍人開元中復拜中書舍人子至字幼鄰從𤣥宗幸蜀拜起居舍人知制誥帝傳位至當撰册既進藁帝曰昔先天誥命乃父所為今兹命册又爾為之可謂繼美矣至頓首流涕歷中書舍人貞舊唐書東內大明宮在禁苑之東南本永安宫觀八年置九年改大明宮龍朔二年號蓬萊宮咸亨元年改含元宮尋復大明宮正殿曰含元殿天后改大明殿雍録唐都城有三大內太極宮在西故名西內大明宮在東故名東內數别有興慶宮號南內也三內更迭受朝而大明最五夜漏聲催曉箭九重平聲一作天春色醉仙桃旌旗俗作旗非日暖龍蛇動宮殿風微燕雀高朝音潮罷香煙擕滿袖詩成珠玉在揮毫欲知世掌絲綸美池上于一作如今有一作得鳯毛詩在四句分截上詠早朝景下和賈舍人退演義初聨早朝之候次聨大明宮景三聨言朝作詩稱賈至之才結聨言父子繼美切舍人之事此詩比諸公所作格法尤為謹嚴朱注春色之穠桃紅如醉以在禁中故曰仙桃非用王母事也贈顧注賈詩言鳯池公即用鳯毛貼賈氏父子不可移他人結語獨勝者衛宏漢書儀晝漏晝夜漏起省中黃門持五夜五夜甲夜乙夜丙夜丁夜戊夜陸倕新漏刻銘六日無辨五夜不分邵注夜以五為節起於甲止於戊又謂之五更漏箭即更籌緗素雜記梁武本紀帝燃燭側光常至戊夜杜詩五夜漏聲正謂戊夜耳手殷䕫刻漏法曰鑄金為司晨具衣冠以左手抱箭右指刻以别天時早晚吳思元詩愁逐漏聲長殿楚辭君之門以九重隂鏗詩上林春色滿唐時庭多植桃柳故岑詩言柳拂旌旗杜詩言春色仙桃皆面前真景張性謂天顔有喜如醉仙桃誤矣酉陽雜俎仙桃出郴州蘇耽仙壇庾肩吾詩御梨寒更紫仙桃秋轉紅熊燕雀配龍蛇以實對虛周禮析羽為旌交龍為旗虎為旗龜蛇為旐釋名旗倚也畫作兩龍相依倚也楚辭仰觀刻桷畫龍蛇只淮南子大厦成而燕雀賀庾信詩香烟龍口出唐書儀衛志凡朝日殿上設黼扆躡席熏爐香案何遜詩還飄袖裏香曹植與楊修書人人自謂握靈蛇之珠抱荆山之玉梁簡文帝答新渝侯書風雲吐於行間珠玉生於字裏文選摛文揮月毫記王言如絲其出如綸七左傳世濟其美詩唐人律格多於五六作轉語結到八大杜和早朝善於布格唐書載𤣥宗曰兩朝盛典出卿家父子可謂繼美矣七句意本此晉王劭風姿似其父導桓溫曰大奴固自有鳯毛宋書謝鳯子超宗有文詞作殷淑妃誄帝大嗟賞謂謝莊曰超宗殊有鳯毛朱瀚曰作詩須知賓主前半撮略賓意後半重發主意始見精神王岑賓太詳主太略岑掉尾猶有力王則迂緩不振矣必如此詩方見格律和黃生曰王元美嫌此詩後半意竭不知自作詩與人詩體固不同唐賢和詩必見出和意王岑二首結並歸美於賈少陵後半特全注之此正公律格深老處可反以此為病哉且王結美掌綸岑結美倡詠惟杜兼及之又顯其世職寫意周到更非二子所及又曰合觀四作賈首倡殊平平三和俱有奪席之意就三詩論之杜老氣無前王岑秀色可攬一則三春穠李一則千尺喬松結語用事天然凑泊故當推為擅場可按前人評此詩謂其起語高華三壯麗四悠揚無議矣頗嫌五六氣弱而語俗得結尾振救便覺全體生動也蘇軾曰七言之偉麗者子美云旌旗日暖龍蛇動宮殿風微燕雀高五更鼓角聲悲壯三峽星河影動搖爾後寂寞無聞歐陽氷叔云蒼波萬古流不盡白鳥雙飛意自閒又萬馬不嘶聽號令諸蕃無事樂耕耘可以並驅爭先矣小生亦云令嚴鐘鼓三更月野宿貔貅萬竈烟又露布朝馳玉關塞捷書夜到甘泉宮亦庶幾焉爾山今按米南宮浙江潮詩天排雲陳千軍吼地擁銀萬馬奔陸放翁詩樓船夜雪瓜州渡鐡馬秋風大散關又云雲埋廢苑呼鷹處雪暗荒郊射虎天又云江聲不盡英雄恨天意無私草木秋皆雄偉激壯可參唐人佳句早朝音潮大明宮呈兩省僚友附賈至詩銀燭朝音潮天紫陌長禁城春色曉蒼蒼千條弱柳垂青瑣百囀流鶯繞建章劍佩聲隨玉墀步衣冠身惹御爐香共沐恩波鳯池裏朝朝染翰侍君王上四早朝大明宮下四呈兩省僚友曰曰銀燭曰春曉曰弱柳曰流鶯皆早朝景物曰紫陌禁城曰青瑣曰建章皆宮殿層次劍佩衣冠兩省朝容鳯池染翰同僚職事也天顧野王舞影賦列銀燭兮蘭房楊慎詩話穆天子傳子之寶璿珠燭銀郭璞曰銀有精光如燭也唐人詩用銀燭字本此莊殷仲文詩紫陌結朱輪顔延之詩朝駕守禁城子天之蒼蒼其正色耶登詩弱柳垂江翠蕭子顯詩楊柳千條共一色祖孫前漢書元后傳曲陽侯根驕奢僭上赤墀青瑣顔師古曰青瑣者刻為連瑣文而青塗也劉孝綽百舌詩百囀似羣吟沈約詩流鶯復滿枝三輔黃圖武帝太初元年柏梁殿災於是作建章宮度為千門萬户史記高祖令蕭何帶劍履上殿鮑照詩虛容遺劍佩塵禮記行則鳴佩玉衣漢武帝落葉哀蟬曲玉墀兮生史記留侯世家冠甚偉丘遲詩肅穆恩波被悵晉書荀朂傳朂久在中書專管機事及失之甚罔罔悵或有賀之者朂曰奪我鳯凰池諸君賀我耶序宋玉高唐賦朝朝暮暮陽臺之下君潘嶽秋興賦染翰操紙吳筠詩年年月月對王楊仲𢎞曰榮遇詩如賈至諸公早朝篇氣格雄深句意嚴整宮商迭奏音韻鏗鏘真麟遊靈囿鳯鳴朝陽也熟之可洗寒儉數周敬曰氣度冠冕音調琳琅起句軒昻即唐人有結渾融莊雅作尋常煞語者少窺其妙中聨亦佳不必吹毛求疵也田子藝云紫陌禁城青瑣建章玉墀鳯池太重身字不雅不如王岑逺甚亦太深文矣真黃家鼎曰早朝詩帶不得山林氣如此格律是錦明霞燦電爍雷鳴七律中有平仄未諧而句中自調者賈幼鄰詩劍佩聲隨王墀步玉墀二字仄平互換杜少陵詩西望瑶池降王母降王二字亦仄平互調此偶用變通之法耳和前附王維詩絳幘雞人報一作送曉籌尚衣方進翠雲裘九天閶闔開宮殿一作九天宮殿開閶闔萬國衣冠拜冕旒日色才臨仙掌動香煙欲傍去聲衮龍浮朝音潮罷須裁五色詔佩聲歸向鳯池頭上六早朝景事末二美賈舍人也蔡雍獨斷幘者古之卑賤執事不冠者之所服董仲舒上書執事者皆赤幘漢官儀宮中輿臺竝不得畜雞夜漏未明三刻雞鳴衛士侯於朱雀門外著絳幘雞唱三體詩注絳幘者朱冠以象雞夜漏未盡雞鳴時也周禮雞人夜呼旦以􅑧百官注唐書百官志尚衣掌供冕服宋玉風賦主人之女披翠雲之裘曰呂氏春秋天有九野中央曰鈞天東方曰蒼天東北變天北方曰𤣥天西北曰幽天西方曰皓天西南曰朱天南方曰炎天東南曰陽天大人賦排閶闔而入帝宮韋昭注閶闔天門也冕左傳禹㑹諸侯於塗山執玉帛者萬國色記天子之朱緑藻十有二旒邢子才詩天高日淺廟記神明臺武帝造上有承露盤有銅仙人舒掌捧銅盤玉杯以承雲表之露以露和玉屑服之以求仙道陳公讓詩香烟百和吐朝記天子龍衮注畫龍於衮衣也史記袁盎傳絳侯罷趨出事始石季龍置戲馬觀上安詔書用五色紙銜於木鳯口而頒行省潘嶽西征賦想珮聲之遺響文選注鳯池中書也顧璘曰氣象濶大音律雄渾句法典重用事新清無所不備未全美者以用衣服字面太多耳陸時雍曰七律摩詰與少陵爭馳杜好虛摹吞吐含情神行象外王用實寫神色冥㑹意妙言前二者誰可軒輊馬胡應麟曰右丞早朝詩五用宮室字出塞詩兩用字郴州詩六用地名字雖其詩神骨泠然絶出烟火要不免冗雜高岑即無此等而氣韻自逺兼斯二美獨見杜陵然百七十首中利鈍雜陳正變互出後來讀者亦須知分别也云此詩閶闔宮殿衣冠冕旒句中字面復見杜詩有閶闔開黃道衣冠拜紫宸却無此病矣和前附岑參詩雞鳴紫陌曙光寒鶯囀皇州春色草堂作夜闌金闕曉鐘開萬户玉階仙仗擁千官花迎劍佩星初落柳拂旌旗露未乾音干獨有鳯凰池上客陽春一曲和去聲皆難上六早朝末二和賈旌詩女曰雞鳴梁劉孝綽詩紆餘出紫陌鮑盧思道詩門曙光轉元帝詩新鶯隱葉囀照詩表裏望皇州注皇州帝都也鐘梁武帝詩珠珮婐􅛭戲金闕孔德紹詩臨風聽曉千門萬户見前西都賦玉階彤庭仗唐書儀衛志每月以四十六人立內廊閣外號曰內宋玉對楚王問客有歌於郢中者其始曰下里巴人國中屬而和者數百人其為陽春白雪國中屬而和者不過數人而巳是其曲彌高其和彌寡注下里巴人下曲名也陽春白雪高曲名也楊萬里曰七言褒頌功德如賈至諸公唱和大明宮乃為典重和其詩者惟此最佳胡應麟曰八句皆精工整密字字天成比王似勝然令上官昭容坐昆明殿窮歲月較之未易墜其一也周敬曰皇紫假對星露二字實詩眼通篇心靈脉融語秀作廊廟古衣冠法物令人對之魂肅神斂不特早朝諸什此為首唱即舉唐七律取為壓卷何讓諸周珽曰或謂早朝詩用寒闌乾難險韻似屬吹毛家取唐七言律壓卷者或推崔司勳黃鶴樓或推沈詹事獨不見或推杜工部玉樹雕傷昆明池水老去悲秋風急天高等篇然音響重薄氣格高下俱前有確論珽謂冠冕莊麗無如嘉州早朝淡雅幽寂莫過右丞積雨淡齊翁以二詩得廊廟山林之神髓欲取以壓卷真足空古準今質之諸家亦必以為然也行次昭陵補注黃生曰此章分兩段前六韻言太宗創業垂統之事後六韻言目前天下未安因有太宗不作之恨耳又曰昭陵武功文德只六韻述盡可謂巨筆如杠堯典禹謨之句叙繼統事尤見大力斡旋又曰唐仲言云明皇任楊李亂政故有災猶降喘未蘇之歎因思向者之安撫而不可得是以向山隅而流恨舊作隋末之亂者非按此說甚是蓋從文物四句讀下便見今日之朝廷事事與之相反開元之治嫓美貞觀者今已掃地有志之士皆為當路沮抑而不得進安得不望昭陵而興悲乎後來杜牧亦有樂游原上望昭陵之句蓋昭陵之時士無不遇之歎也重經昭陵補注鍾惺曰陵廟之作典古悲凉說功業無竹帛氣說神靈無松杉氣杜詩詳注
