body:
  text: 杜詩詳注卷二十二翰林院編修仇兆鰲撰暮歸梁權道編在大厯三年按是年暮秋在公安作霜黃碧梧白鶴棲城上擊柝復扶又切烏啼客子入門月皎皎誰搗練風淒淒南渡桂水闕舟楫北歸秦一作洛非川多鼓鞞年過平聲半百不稱去聲意明日看雲還杖藜上四暮歸見聞之景下四暮歸流落之感一杜臆闕舟楫無錢雇船多鼓鞞吐蕃為寇杖藜看雲可謂安時而處順者黃生注朝出於斯暮歸於斯南渡不可北歸不能年老客居失意可勝道哉起一復字結一還字見日日如是皆無可奈何之詞木梁鮑泉詩露色已成霜楸梧半欲黃邵氏謂鶴不棲恐是白鵠然詠懷古跡云古廟松杉巢水鶴亦言棲木矣抱朴子千年之鶴能隨時而鳴登於木上漢童謡城上烏尾畢逋易重門擊柝傳陳後主詩烏啼漢沒天應曙乎客子自謂史記范睢謁君得無與諸侯客子俱來記客入門而左古詩明月何皎皎照我羅裳帷歌樂府折楊柳歌夜聞搗衣聲窈窕誰家婦漢昭帝涼風淒淒揚棹歌楚辭渺南渡之馬如舟廣東韶州有桂水其地北抵湖廣衡州之桂陽易楫之利水經注秦水出大隴山歷秦川川有秦亭秦仲所封也冦記君子聽鼓鼙之聲通繿大厯三年八月吐蕃復靈邠京師戒嚴邠去京師不滿四百里友黃生注陶詩停雲為思也盧世㴶曰崔氏東山草堂暮歸曉發公安三首皆拗調詩之絶佳者愛汝玉山前半篇高爽鮮新操勝於人後半篇質欵近情詼諧有趣詩之頓放宜如此霜黃碧梧全首矯秀原是悲詩却絶無一㸃悲愁溽氣犯其筆端讀去如竹枝樂府曉發公安一首更瘦更狂搖曵脫灑真七言律中散仙也申㴠光曰作拗體詩須有疏斜之致不衫不履如客子入門月皎皎及落日更見漁樵人語出天然欲不拗不可得而此一首律中帶古傾欹錯落尤為入化安又曰霜黃碧梧白鶴棲一句中用三個顔色字見插頓放之妙李空同云野寺霜黃鎖碧梧此偷用杜句黃碧之中隔一鎖字而文義却難通矣毛竒齡曰杜律拗體較他人獨合聲律即諸詩皆然始知通人必知音也哭李尚書之芳考鶴注詩當作於大厯三年秋江陵府宗室世系表之芳乃蔣王惲之孫又舊史云安祿山奏為范陽司馬祿山反自投歸京師廣德二年兼御史大夫使吐蕃被留二歲乃得歸拜禮部尚書改太子賓客陵黃生曰時公在公安而李殁於江漳濱與蒿里逝水竟同年欲挂英華作把留徐劍猶回憶戴船從哀死叙起船不果行也得病隨亡故曰同年挂劍將赴弔回劉楨詩余嬰沈痼疾竄身清漳濱洙曰魏文帝為太子時應瑒劉楨並見友善李厯禮部尚書薨於太子賓客故用漳濱事蒿里注見十六卷挂劍注見十四卷戴船注見九卷相知成白首此别間去聲黃泉風雨嗟何及江湖涕泫然修文將管輅奉使去聲失張騫史閣行人在詩家秀句傳此記交情遺事修風雨思友又值江湖更覺哀慘矣文言精靈不沒奉使指出使吐蕃下二分承不潘嶽詩投分寄石友白首同所歸左傳鄭莊公曰及黃泉無相見也詩風雨淒淒序風雨思君子也下詩何嗟及矣十文中子泫然流涕顔回卜商為地修文郎注見四卷魏志管輅字公明平原人舉秀才謂弟辰曰天與我才明不與我年夀恐四十七八間不見女嫁男婚也是歲八月為少府丞明年二月卒年四十八杜臆修文句兼用兩事周禮秋官有大行人小行人鍾嶸詩品竒章秀句往往警遒客亭鞍馬絶旅櫬網蟲懸復魄一作塊昭邱逺歸魂素滻偏樵蘇封葬地喉舌罷朝音潮天秋色凋春草王孫若箇邊末傷其客死逺歸也濶馬絶蟲懸見空館荒涼昭邱素滻言歸途遼喉舌㸃尚書秋色㸃時景王孫切李姓若箇邊言葬於舊壘之傍記此章前假四句中後八句沈約詩網蟲垂户織復諸侯以褒衣鄭司農曰復謂始死招魂復魄也昉昭邱楚昭王墓潘嶽西征賦地有𤣥灞素滻任卞忠貞墓啓樵蘇之刑逺流於皇代尚書亦猶陛下之喉舌後漢李固傳斗為天之喉舌楚辭招隱王孫遊兮不歸春草生兮萋萋京若個唐人方言沈佺期詩華若箇邊重平聲題涕灑不能收哭君餘一作余白頭兒童相識一作顧盡宇宙此生浮江雨銘旌濕湖風井徑秋還瞻魏太子賓客減應平聲劉涕不能收拈重哭意下三句有身世無窮之悲江湖風雨對景悽然客減應劉李為太子賓客也哭申㴠光曰哭李尚書二首是挽詩絶調兒童相識盡及衆友宇宙此生浮兼哭自已矣黃注三四申明餘字意可何遜詩蕭蕭江雨聲死者為不别已故以其旌識之攉弓銘者旌也以蕪城賦邊風起兮城上寒井徑滅兮邱壠殘注九夫為井遂上有徑黃生注井徑似指隧道今形家目穴內為金井原注李公薨於太子賓客劉魏文帝與吳質書徐陳應一時俱逝哭李常侍嶧二首鶴注當是大厯三年冬江陵作李常侍蓋死於廣南歸葬長安公逢於江漢間而哭之也過唐志左右散騎常侍𨽻門下中書省掌規諷失侍從顧問一代風流盡修文地下深斯人不重平聲見將老失知音短日行梅嶺寒山一作江落桂林長安若箇伴一作畔猶想映貂金首章悼常侍之亡上四為自已惜下四為他人惜也梅嶺桂林之問歸櫬已在途中而長安同伴猶望生還蓋愛之深而不忍其死也吳齊史張緒卒從弟融哭曰阿兄風流頓盡曹丕與質書伯牙絶絃於鍾子期痛知音之難遇也實史記東越傳令諸侯屯豫章梅嶺謝靈運詩南州炎德桂水凌寒山舊注桂林指衡州之桂陽唐制侍中冠金蟬珥貂青瑣陪雙入銅梁阻一辭風塵逢我地江漢哭君時次第尋書札呼兒檢贈詩發揮王子表不愧史臣詞次章於往日交情現前哀死身後留名曲盡之矣於公昔在長安與李同入青瑣之門後李在銅梁公疏一辭之寄今旅櫬相逢但有殁後一哭耳尋書檢詩常侍手跡所在王子表李為宗室也史臣有詞録其素行也唐銅梁縣屬渝州𨽻劍南道渝州即今重慶府也周拾上雲樂乃欲次第說釋名弟第也言次第相生則第字本與弟相通故可對兒詩古詩遺我一書札王又呼兒烹鯉魚應瑒詩贈見存慰漢書有子侯表楊德周曰詩有假對法如子雲清自守今日起為官次第尋書札呼兒檢贈詩以日對雲以第對兒是也後人濫觴借一對柏以十對遷謬矣葉石林謂杜詩對偶至嚴必無散句甚欲改今日為令尹則又太拘至東原録又改今日為金日謂金日磾沒入官輸黃門養馬唐中興時贊普入中國必有相類故杜用之更穿鑿不通矣舟一有中字出江陵南浦奉寄鄭少去聲尹審鶴注此當是大厯三年秋作是時公移居公安公安在江陵之南故出南浦也時鄭審為江陵少尹更欲投何處飄然去此都形骸元土木舟楫復扶又切江湖社稷纒妖氣干戈送老儒百年同棄物萬國盡窮途此舟行有感離杜臆起語突然悲不自勝言已之飄流無定皆因亂所致今身棄途窮將安託乎申㴠光曰更欲投何處窮途堪涕干戈送老儒暮景足悲嘗賈誼云何必懷此都嵇紹土木形骸老子聖人善救人故無棄物雨洗平沙淨天銜濶岸紆鳴螿音將隨泛梗别燕起一作赴秋菰棲託難高卧饑寒迫向隅寂寥相詬沫浩蕩報恩珠此撫景言情謀雨洗二句南浦之景鳴螿二句秋候之景棲託而不能安卧總為饑寒所驅耳不杜臆人少相詬之沫而已亦曠於報恩之珠見人情足深怪與一味責人者不同謝朓詩雨洗花葉鮮螿爾雅注霓一名寒蜩又名寒螿似蟬而小青赤趙曰得梗而託之故隨泛梗而鳴世說謝公與王右軍書敬和棲託好佳子魚相詬以濕相濡以沫徐悱詩向隅獨心傷藥莊洙曰隋侯見傷蛇以封之蛇銜明珠以報溟漲鯨波動衡陽雁影徂南征問懸當作解榻東逝想乘桴濫竊商歌聽時憂卞泣誅經過平聲憶鄭驛斟酌旅情孤末乃叙懷别鄭逝杜臆見雁影而問南征對鯨波而想東所往尚未定耳商歌卞泣知已難逢也每有經過便思鄭尹為其能酌酒以慰旅情如前此兩飲湖亭皆是此章三假各八句謝靈運詩溟漲無端倪二曹植詩乘桴何所志吁嗟我孔公寧戚商歌注見十卷韓非子卞和得玊璞以獻楚王王刖其足乃抱璞而哭於荆山之下蘇武詩願子留斟酌叙此平生親移居公安山館朱氏編在大厯三年冬自江陵至公安時作唐書公安縣屬江陵府杜臆公安山在荆州東南七十里南國晝多霧北風天正寒路危行木杪身迥樊作迥一作逺宿雲端山鬼吹燈滅厨人語夜䦨雞鳴問前館世亂敢求安此移居公安時途次所作上半投宿之景下半將發之事黃注三四本屬苦境翻得佳語雞鳴之前厨人夜起因手燈吹滅戲語為鬼所吹細人口角如此兩句用倒插法問乃問道安謂安眠也鮑照詩雲端楚山見不楚辭有山鬼篇秋傅𤣥詩厨人進藿茹有酒盈杯世亂是又有吐蕃之警也醉歌行贈公安英華有縣字顔十一本無十字少去聲府請顧八題壁鶴注此大厯三年至公安時作是公作詩而使顧書於少府之壁邵注顔少府公安尉也分朱注顧八即顧八文學戒奢神仙中人不易音異得顔氏之子才孤標天馬長鳴待駕馭秋鷹整翮當雲霄先稱美顔少府孤天馬逺行秋鷹高舉正見才氣標洙曰言負駿逸之才以待用也之鶴注梅福為南昌尉謂之神仙尉此以顔為尉而用世說杜乂預之孫美姿容王逸少目之曰膚如凝脂眼如㸃漆神仙中人也孤易繫辭傅顔氏之子其庶幾乎梁元帝碑文獨振標倫數之所逺絶君不見東吳顧文學君不見西漢杜陵老詩家筆勢君不嫌詞翰升堂為去聲君掃次記題壁作歌君君指顔少府兩用不見意氣豪放詩家自謂筆勢謂顧詞承詩家翰承筆勢前漢仲長統傳秦時以文學徴待詔博士杜陵在西京故曰西漢是日霜風凍七澤烏蠻落照銜赤壁酒酣耳熱忘頭白感君意氣無所惜一為英華有醉字歌行歌主客末賦景而兼言情志七澤烏蠻記地風霜落照記時下三句結出醉歌以一時賓主之興此章前二假各四句後假五句收結歌行體可以錯綜也赤子虛賦楚有七澤其小小者名曰雲夢烏蠻在西壁在東落照自西而映東也吳漢書楊惲曰酒後耳熱聽鳴鳴而歌秦聲魏文帝與質書昔日游處每至酒酣耳熱仰面賦詩忽然不自知其樂也送顧八分文學適洪吉州鶴注當是大厯三年秋公安作歐陽公集古録唐吕諲表元結撰顧戒奢八分書景祐三年余謫夷陵過荆南謁吕公祠堂見此碑西溪叢語吕公表前太子文學翰林待詔顧戒奢書訪唐書洪州豫章郡吉州廬陵郡俱屬江西道採使治漢州中郎石經後八分蓋憔悴顧侯運爐錘筆力破餘地昔在開元中韓蔡同贔平祕切屭虛器切𤣥宗妙其書是以數子至御札早流傳揄揚非造七到切次三人並入直恩澤各不二顧於韓蔡內辨眼工小字分日侍英華作侍别作示諸王鈎深法更祕首叙顧君書法見重於朝廷是杜臆謹守途轍謂之奴書力破餘地深於書者侍明皇御札精工知其揄揚不爽矣各不二䝉恩如一諸王使講書法也水經注蔡雍以熹平四年與五官中郎將堂溪典等奏求正定六經文字靈帝許之雍乃自書丹於碑使工鐫刻立太學門外洙曰運爐錘言能煆錬以成一家之書莊子皆在爐錘之間耳綴隋藝文傳筆有餘力莊子恢乎有餘地西都賦以二華巨靈贔屭注贔屭作力之貌章韓蔡指韓擇木蔡有鄰書苑明皇好圖畫工八分草豐茂英特張說等獻詩明皇各賜贊褒美自於綵箋上八分書之揄妙其書稱美三人也盧諶贈劉琨詩序抑不足以揚𢎞美亦以攄其所抱而已辭衛恆字勢梁鵠宜為大字邯鄲淳宜為小字易繫探賾索隱鈎深致逺文學與我遊蕭疏外聲利追隨二十載上聲浩蕩長安醉高歌卿相去聲宅文翰飛省寺視我揚馬一作班揚間白首不相棄驊騮入窮巷必脫黃金轡一論朋友難遲暮敢失墜古來事反覆音福相見橫涕泗嚮者玊珂人誰是青雲器才盡傷形骸英華作骸一作體病渴汚去聲官位故舊獨依然時危話顛躋此叙平日交情見其始終無間事二十載通前後而言高歌以下憶長安窮巷脫轡再㑹公安也遲暮敢墜克踐白首之言矣才盡以下自傷老病而喜顧之舊好依然前漢儒林傳延文學儒者以百數宣帝紀詔內郡國舉文學高第各一人雲趙曰黃金轡言其富貴也延顔之五君詠仲容青器言其器之高逺此云誰是青雲器歎貴者未必賢也才盡用江淹事李尋曰久汚玉堂之署朱超道詩悵望轉依然乃書微子王子弗出我顛躋我甘多病老子負憂世志胡為困衣食顔色少稱去聲遂逺作辛苦行順從衆多意舟楫無根蒂蛟鼉好去聲為祟况兼水賊繁特戒風飈駛崩騰戎馬際一作險往往殺長子兩切吏子干東諸侯勸一作勤勉防縱恣邦以民為本魚饑費香餌請哀瘡痍深告訴皇華使去聲下同使臣精所擇進德知厯試此因洪吉之行望其留心世事我甘句承上子負句起下少稱遂不能愜心也順衆意委蛇從俗也舟楫四句備言水路之險此應上辛苦行戎馬四句以防亂告東諸侯侯乃州刺史也邦本四句以愛民告皇華使使即觀察使也使臣二句言觀察為民擇官必能進有德者而厯試之此十句應上憂世志少洪吉州在荆州之東故曰東諸侯舊史大厯二年魏游為洪州刺史兼江西觀察使洪州即觀察使治所也莊子其鬼不祟李顒雷賦濆淪隱轔崩騰磊落鶴注大厯三年商川兵馬使劉洽殺刺史殷仲卿幽州兵馬使朱希彩殺節度使李懷仙所謂往往殺長吏也下書民惟邦本香五略香餌之必有懸魚費餌即招徠意惻隱誅求情固應平聲賢愚異烈一作列士惡烏固切茍得俊傑思自致贈子猛虎行出郊載酸鼻末戒其失身於所往見朋友相規之意異見民困誅求而動惻隱之情賢者諒當於庸愚此行豈可茍得而不思自盡乎贈言酸鼻臨别丁寧也此章十六句起六句結中二假各二十句史記不能自致於青雲之上無陸機猛虎行渴不飲盜泉水熱不息惡水隂惡水豈枝志士多苦心江淹書履影弔心酸鼻痛骨王嗣奭曰此詩全篇無一字虛飾可以知其相與之情至末而愛民之真懇規友之直諒又兩見之矣官亭夕坐戲簡顔十少去聲府年月同上夕顧注時公在官亭坐侯少府不至故戲為此簡舍漢章帝詔過止官亭無雇宿南國調寒杵西江浸日車客愁連蟋蟀亭古帶蒹葭不返青絲鞚虛燒夜燭花老翁須地主細細酌流霞上四亭前夕景記其聞見下四坐待少府戲簡索飲也字杵聲應節故曰調日影沈江故曰浸顧注用一連倍增客情悽切用一帶字愈覺亭畔蒼涼落鞚疑不返恐留客無人燭曰虛燒恐燈前無酒故有句為戲庾信搗衣詩南國女郎砧調聲不用琴杜臆搗衣杵有音節俗謂之花練槌司空曙詩宫響傳花杵即此意也又云西江即蜀江元詩十月蟋蟀入我床下霞又業葭蒼蒼白露為霜梁帝詩宛轉青絲鞚流注見十七卷移居公安敬贈衛大郎鈞年鶴注公於大厯三秋移居公安衛侯不易音異得余病汝知之雅量㴠高逺清襟照等夷平生感意氣少去聲小愛文詞江海由來合風雲若有期從衛郎叙起者公處貧病而衛獨知之由其雅量能㴠清襟能照也感其平時意氣如江海之流易合又愛其少而能文知風雲之㑹有期也瑜余病汝知猶管仲言知我貧故也魏志曹公曰周雅量高致袁粲答王儉詩老夫亦何寄之子照清襟陛下舊等夷秦嘉詩少小罹煢獨張良傳諸將皆鍾嶸詩品文詞之命世也遇古詩風雲若㑹形容勞宇宙質朴謝軒墀自古幽人泣流年壯士悲水烟通徑草秋露接園葵入邑豺狼鬬傷弓鳥雀饑此叙公安旅况水謝軒墀作幽人遁迹勞宇宙則流年已逝烟秋露言風景淒涼狼鬬慨世亂雀饑傷旅窮也陸陶潛詩寓形宇宙復幾時垂後漢傅毅傳徂年如流士衡詩種葵北園中零露鮮澤白頭供宴語烏几伴棲遲交態遭輕薄今朝豁所思以贈衛意作結憂宴語誰供惟伴烏几則交態之薄可知故得衛郎而思頓豁耳末句仍應雅量清襟此章前二假各八句末假四句結詩衡門之下可以棲遲盧元昌曰公在江陵至小吏相輕吾道窮矣於顔少府曰不易得於衛大郎亦曰不易得志幸亦志慨也是時公安有警故於山館有世亂敢求安句後曉發則曰鄰雞野哭如昨日發劉郎浦則曰岸上空村盡豺虎此章入邑豺狼鬬必有所指矣公安送韋二少去聲府匡贊鶴注當是大厯三年秋晚作是年吐蕃入冦故詩云兵甲黃塵贊邵注少府今之典史匡韋名也逍遙公後世多賢送爾維舟惜此俗本作别筵念我能書一作常能數字至將詩不必萬人傳時危兵革黃塵裏日短江湖白髮前古往今來皆涕淚斷腸分手各風烟上四送韋之情下四離别之感不演義韋蓋後輩而知慕公者故起用朴直之詞詩必傳舊指韋詩演義謂公詩多傷時語故囑其不必浪傳乃時逢兵革身泊江湖白髮之年短如秋日此情此景今古所同悲者况故人分手於風烟之際能不為之傷心而腸斷乎四語叠遞意極慘悽朱注唐書韋嗣立中宗亦封為逍遙公韋氏九房以敻後為逍遙公房嗣立後為小逍遙公房田注此詩所云逍遙公指韋敻也北史周韋敻養高不仕明帝號為逍遙公軍潘嶽西征賦古往今來邈矣悠哉涕謝瞻送王撫詩分手東城闉别賦造分手而銜公安縣懷古年地同上野曠吕䝉營江深劉備城寒天催日短風浪與雲平灑落君臣契飛騰戰伐名維舟倚前浦長嘯一含情首二遺跡三四時景下述懷古之意分野曠寒侵江深浪激劉合君臣吕爭戰伐四句各用承長嘯含情傷跡在而人已亡矣張胡夏客云此嘯從抱膝吟梁父化出灑先主之待關誼同兄弟其得孔明歡如魚水所謂落君臣契也吕䝉之破皖城軍士皆騰躍而升其擒廬陵賊帥孫權稱其百鳥不如一鶚所謂飛騰戰伐名也黃生注結以前浦二字綰住前半以含情二字雙綰後半章法極整寰宇記公安縣有孱陵城十三州志吳大帝封吕䝉為孱陵侯即此地水經注洈水東至孱陵縣入油水縣治故城王莽更名孱陵劉備孫夫人權妹也又更修之其城背油向澤荆州記吳大帝推劉備為左將軍荆州牧鎮油口即居此城時人號為左公故名其城公安也處名勝志公安縣北二十五里有吕䝉城即䝉所屯兵阮籍見孫登長嘯而返嘯蹙口出聲也先主得公安使關羽守之及羽討樊城吕䝉乘虛襲之孫劉之戰爭始自公安漢業之不振亦撓於公安公至其地故弔古而有慨墓近年常州吕城之處有修關壯繆廟掘地得吕䝉者千年姦窟一朝發露事竒而快呀虛加切鶻胡骨切行蔡夢弼編在大厯三年江陵詩內以詩有江邊秋日語也然在䕫州亦可言之今姑依蔡編未定何年耳呀張口貌病鶻孤陳作卑飛俗眼醜每夜江邊宿衰柳清秋落日英華作月已側身過雁歸鴉錯回首緊腦雄姿迷所向疏翮稀毛不可狀彊神非舊作迷復扶又切皂雕前俊才早在蒼鷹上此見呀鶻而自傷也首假寫其病憊之狀句俗眼看醜憎其病廢雁鴉回首畏其餘威緊腦二仍摹其病態彊神二句回想其猛氣下迷復二字出易復卦言迷於所復也上文有迷所向句不應又用迷復當作非復為是風濤颯颯寒山陰熊羆欲蟄一作縶龍蛇深念爾此時有一擲失聲濺血非其心下假深致憐惜之意鳥言當此天寒物藏正鶻凌厲之秋此時應有一擊而悲鳴悽慘如此豈其本心乎此章上八句下四句擲投也鷙鳥傳物必自上投下宴王使君宅題二首鶴注當是大厯三年秋作中者邵注王必荆州人間居邑漢主追韓信蒼生起謝安吾徒自漂泊世事各艱難逆旅招要平聲一作邀近他鄉意英華作意一作思緒寬不才甘朽質高卧豈泥蟠首章宴中有感其古人皆獲大用而使君乃漂泊艱難惜不過也若已之逆旅他鄉亦唯借酒寬懷耳不才高卧豈望泥蟠復奮乎又自解也五六㸃宴史記高帝入關諸將多道亡者蕭何聞韓信亡自追之何晉書謝安高卧東山當時皆曰安石不出其如蒼生莊子陽子之宋宿於逆旅楊子法言龍蟠於泥泛愛容霜鬢一作髮留歡卜夜閒一作闌一作上夜關自吟詩送老相對酒開顔戎馬今何地鄉園獨在一作舊山江湖墮清月酩酊任扶還次章𡨕時之興顔愛而留宴德使君也送老承霜鬢開頂留歡今當戎馬之地使君獨有故園不覺留連而醉歸耳也五六㸃王宅杜臆公詩每用泛愛蓋以衆人自居前漢伍被傳泛愛蒸庶後漢書李軼曰劉伯升兄弟泛愛容衆殷仲文詩廣筵散泛愛英華辨證世傳杜公不避家諱其實非也卞圜集杜詩及别本自是留歡上夜關蓋有投轄之意或改作夜闌人不在韻盧注王維登裴迪小樓云好客作乘月應門莫上關顧炎武曰閒乃間暇於間字自不相犯謝靈運詩開顔披心胸送覃二判官詩云卧荆衡當是大厯三年江陵作先帝一作皇弓劍逺小臣餘此生蹉跎病江漢不復扶又切謁承明餞爾白頭日永懷丹鳯城此送覃而動歸朝之興先帝指肅宗白頭公自謂帝牛𢎞隋文帝頌慕深考妣哀纒弓劍前漢郊祀志黃鼎成騎龍上天小臣持龍髯拔墮墮黃帝之弓列仙傳黃帝葬橋山山崩空棺無尸唯劍舄在焉前漢嚴助傳君厭承明之廬張宴注承明廬在石渠閣外曹植詩謁帝承明廬制唐書至德二載十一月上御丹鳯門下即此城門遲遲戀屈音厥宋渺渺卧荆衡魂斷航舸居何切失天寒沙水清肺肝若稍愈亦上上聲赤霄行此申言别後思歸之意堪身卧荆衡而見乘舸逺去者何復滯水濱乎故欲寒時一返舊京也意曰承明曰丹鳯曰赤霄懷君戀闕之誠篇中蓋三致焉此章兩假各六句貞屈宋自比賦詩荆衡謂荆門衡嶽宫太宗實録觀六年二月宴三品已上於九成赤霄殿公安送李二十九弟晉肅入蜀余下沔鄂鶴注此大厯三年冬作郡晉肅李賀之父見韓文辨諱後唐書沔州漢陽鄂州江夏郡俱屬江南西道併沔州入鄂郡正解柴桑纜仍看平聲蜀道行檣烏相背音悖發塞雁一行音杭鳴南紀連銅柱西江接錦城憑將百錢卜漂泊問君平上四送别之情下四别後之慨序方為沔鄂之遊而送李入蜀是兩舟背發不如雁同行矣南紀西江頂上背發寄卜君平問何時得免漂泊也李稱弟故用雁行往蜀中故引君平黃生注柴桑在江州前詩云江州涕不禁豈公有弟客此而欲訪之耶又詩九江春色外三峽暮帆前知公久有此興或此行終不果耳通典潯陽縣南楚城驛即漢柴桑縣也一統志在今九江府城南檣烏檣上相風烏劉孝綽詩别有啼烏曲東西相背飛在趙注南紀江漢也下沔鄂所經二杜臆名勝志銅柱衡陽縣城北百二十里吳黃武年都督程普與蜀將關羽分界共立銅柱為誓公將下衡州正指此處與馬援交址之銅柱不同世說成都城皆種芙蓉至秋開望之若錦閉舊注嚴君平賣卜成都日得百錢即肆下簾留别公安太易沙門鶴注此當是大厯三年冬作後漢郊祀志沙門漢言息心剃髮出家絶情洗欲而歸於無為也舊注沙門乃僧之通稱㑹稽沙門惠皎作高僧傳云漢始有沙門名太易僧隱居欲就廬山逺麗藻初逢休上人數色角切問舟航留製作長開篋笥擬心神沙村白雪仍含凍江縣紅梅已放春先去聲踏罏峰置蘭若爾者切徐飛錫杖出風塵上四贊太易詩詞五六志相别時地末則望其修道廬山也成澤州陳冡宰云末二句言太易當築室罏峰以俟道飛舉舊解謂公欲先往廬山置寺以待太易之來遂引志公爭山麓事以證飛錫其說非也此本用廬山神仙事隱廬山在江西九江府周武王時匡俗先生兄弟七人於此因號匡廬山晉惠逺姓賈氏見廬山清淨遂居焉公欲就者蓋託言也湯麗藻謂文詞葩麗文賦嘉麗藻之彬彬宋惠休姓氏能詩宋世祖令其還俗神任昉詩已矣生平事咏歌盈篋笥其張華感婚賦心內正擬者欲和其詩也上林賦北含凍裂地辨林曰梵言阿蘭若蘭香草也若乾草也乃香潔草菴之意陳注湛方生廬山神仙詩序云潯陽有廬山者盤基彭蠡之西阻絶重險窈窕冲深可謂神明之區域列真之苑囿太元十一年有樵採其陽者於時鮮霞褰林傾暉映岫見一沙門披法衣獨在巖中俄頃振裳揮錫陵崖直上排丹霄而輕舉起九折而一指窮日蒼蒼翳然滅迹久客黃編在廣德二年閬州詩內蔡氏編在大厯三年江陵詩內是年正月公出峽三月至江陵秋晚遷公安冬之嶽陽詩言小吏相輕蓋其時落落寡合也又引王粲賈生皆楚中事應在出峽以後羇旅知交態淹留見俗情衰顔聊自哂小吏最相輕去國哀王粲傷時哭賈生狐狸何足道去聲豺虎正一作亂縱平聲橫上四客况下四感懷者杜臆交態俗情世人類然而小吏為最其見輕為衰顔也顧注狐狸比小吏豺虎比亂賊言一已見侮猶可自解天下遭亂憂不能釋耳公述懷詩豺虎亂雄猜意有所指時楊子琳崔寧之徒互相攻擊所云豺虎縱橫也黃鶴以為吐蕃誤矣鄭當時傳一貧一富乃知交態抱朴子仲尼不免乎俗情去過秦論小吏詈罵而榜笞之復漢末西京擾亂王粲而依劉表於荆州故其詩云棄中國去逺身適荆蠻為賈誼上書言時事可為痛哭者一可為流涕者二可長太息者六前漢孫寶傳豺狼橫道不宜復問狐狸冬深一作即日一黃編在雲安蔡編在䕫州今按公在雲安冬在䕫州兩冬未嘗他往何云風濤不穩夜宿誰門耶當是發公安後詩江溪石根景固相合於末二語尤為切當矣梁簡文帝詩冬深柳條落花葉惟諸本作隨犯重當是惟字蓋聲近而訛天意江溪共石根早霞隨類一作淚非影寒水各依一云流㾗易音異下去聲楊朱淚難招楚客魂風濤暮不穩捨棹宿誰門上四冬深之景下四舟行有感此章全用倒插花葉惟天意以早霞隨類影也江溪共石根以寒水各依㾗也易下楊朱淚以風濤暮不穩也難招楚客魂以捨棹宿誰門也杜臆謂此在五律中另一竒格杜初疑寒水與石根緊承早霞與花葉似不相貫後見臆方悟霞狀變化如花如葉耳蓋霞有紅紫青諸色故比之花葉且玩天意二字明屬早霞矣起句特竒宋子侯詩花葉正低昻合趙曰隨類影隨其所類而呈影也摯虞祈禮表隨類之舊注楊朱泣岐路謂其可南可北也幾古詩風濤暮不止日到瀟湘曉發公安原注數月憩息此縣徑陸游入蜀記公移居公安詩水烟通草秋露接園葵而留别太易沙門詩沙村白雪仍含凍江縣紅梅已放春則以是秋至此暮冬始去其曰數月憩息蓋謂此也公黃鶴注此大厯三年冬自安往嶽陽時作北城擊柝復扶又切欲罷東方明星亦不遲鄰雞野哭如昨日物色生態一云生生能幾時舟楫眇然自此去江湖逺適無前期出門轉眄已陳跡藥餌扶吾隨所之上四曉景歎流光易逝下四發舟傷行踪莫定句杜律有語承意承之法不遲承欲罷幾時承如昨此承法也鄰雞承擊柝以所聞言物色承明星以所見言此意承法也明物色指物生態指人陳迹指公安之地詩東有啓西有長庚注曰旦出謂明星為啓明日既入謂明星為長庚晉傅𤣥詩東方大明星光景照千里顔延之詩日暮行樂歸物色桑榆時為樂府滿歌行居世詎能幾時止劉恢傳俯仰之間已陳迹謝靈運詩藥餌情所王嗣奭曰七律之變至此而極妙亦至此而極真此山谷所云不煩繩削而自合者蓋䕫州以後詩也唐人作拗體律詩平仄多有失粘處明季蕭雲從作杜律細平仄用轉音改拗從順雖考證詳洽但恐多此轉折耳如此章仄聲七字改作平聲欲字音迂揚雄羽獵賦壯士慷慨殊響别趨東西南北騁勢奔欲桂詩五律初月首句光細弦欲上可證也罷字即疲叶遲在沈氏四支韻史記漢與楚相距士卒罷弊左傳師退曰疲禮少儀師役曰罷方字音訪漢帝欲殺雍齒用張良計封為什方侯猶言釋放也又後漢楊仁拜什方令易韻水在火上君子以慎辨物居方亦音放昨字音槎周禮大宗伯雞人諸臣之所昨注謂諸臣酢酒尊也戰國䇿蘇厲上趙王書著之盤盂屬之讐柞注即酬酢如周禮柞人掌攻草木者與公羊傳山木不槎國語木不槎枿同中原音韻昨膈宵也曲有人作平聲而分陰陽北音精戈翻南音靜羅翻皆平聲爾態音臺司馬相如封禪文􅌈􅌈穆穆君子之態蓋聞其聲今視其來態作臺音可證自當音私說文曰倉頡作字自營為私雖不解為私音而㑹意當然耳杜五律風月自清夜及致此自僻逺皆宜作平聲用矣已字音遺元人侯正卿菩薩蠻第二句心頭已作平聲陽音杜五律乘爾亦已久亦讀平聲今按態讀作臺音則能字宜讀作耐平仄乃各諧也發劉郎浦當是大厯三年冬作浦趙曰公自公安縣往嶽州故經劉郎浦在公安之下石江陵圖經劉郎浦在首縣先主納吳女處掛帆早發劉郎浦疾風颯颯昏亭午舟中無日不沙塵岸上空村盡豺虎十日北風風未回客行歲晚晚一作尤相催白頭厭伴漁人宿黃帽青鞋歸去來上四寫景見浦中不可復留下四叙懷歎飄流未有歸計相空村人少故豺虎縱橫北風未回則南行甚便歲晚催故舟不得停黃帽青鞋野人之服也孫氏曰亭高貌午時日正高也沈氏曰黃帽籜冠青鞋芒鞋别董頲鶴注當是大厯三年作詩云逆浪開帆難蓋董泝漢水而之鄧也又云老夫纜亦解公是時將適潭州矣窮冬急風水逆浪開帆難士子甘㫖闕不知道里寒叙董生出遊之故昧晉長于曲逆浪故相邀內則爽而朝慈以甘㫖有求彼樂音洛土南適小長安别一作到我舟楫去覺君衣裳單素聞趙公節兼盡賓主歡已結門閭一作廬望無令平聲霜雪殘送别而望其早旋曰不知道里寒表其孝思也曰覺君衣裳單憫其冬行也曰無令霜雪殘勉其歸侍也贈行而作衷語可謂委曲情至矣縣詩適彼樂土古光武紀戰於小長安注續漢書淯陽有小長安聚城在鄧州南陽縣南吳均詩江南霜雪重相如衣裳單歸趙公鄧州守也汝國策王孫賈之母曰汝朝出而暮則吾倚門而望暮出而不還則吾倚閭而望閭里門也霜雪殘老人易凋殘於冬日也老夫纜亦解脫粟朝未餐飄蕩兵甲除幾時懷抱寬漢陽頗寧靜峴首試考槃當念著音勺皂吳作白帽一作褐采薇青雲端以自叙行踪作結朱注峴山在襄陽與鄧州相近公素欲居襄陽故因董適鄧而及之言已亦將道漢陽登峴首皂帽采薇為終隱之計子能念我於雲端否耶黃鶴以漢陽峴首為董頲所經之地詩意不然此章四句起下二假各八句沔公孫𢎞傳𢎞食一肉脫粟飯郡唐書鄂州漢陽縣本州漢陽郡武德四年以沔陽之漢陽汶川二縣置詩考槃在澗碩人之寬注考成也槃盤桓之意夜聞􅓋篥孫權道編在大厯三年離公安次嶽州時以詩中有江湖行路難句也其云天地干戈滿者以去年吐蕃兩入冦桂州山獠反是年之夏楊子琳反成都也樂府雜録􅓋篥者本龜兹國樂亦名悲栗以竹為管以蘆為首其聲悲栗有類於笳樂部􅓋篥者笳管也唐編鹵部名為笳管夜聞􅓋篥滄江上衰年側耳情黃生注情字疑作尋所嚮鄰舟一聽多感傷塞曲三更平聲歘悲壯積雪飛霜此夜寒孤燈急管復扶又切風一作奔湍君知天地一作下干戈滿不見江湖一作湘行路難夜吹􅓋篥復歌塞曲而又佐以急管此江上哀音也公在鄰舟乍聽已足感傷久聞尤加悲慘况當寒夜孤燈霜雪零而風湍緊兼之干急管悲鳴不勝慘絶矣故語篥篥者曰君為此曲但知戈離亂之苦獨不見舟中漂泊者江湖行路之難乎何為故作此聲動人愁思也情所嚮謂旅情頓起鄰舟句即承此起下蔡前漢伍被傳引領而望側耳而聽琰有入塞曲出塞曲衡州送李大夫七丈勉赴廣州朱注李勉自江西觀察使入為京兆尹兼御史大夫大厯三年十月拜廣州刺史充嶺南節度使詩應是其年冬作盧注時嶺南番帥馮崇道與桂州朱濟時叛故朝廷遣勉討之唐書衡州衡陽郡屬江南西道斧鉞下去聲青冥樓船過洞庭北風隨爽氣南斗避文星日月籠中鳥乾坤水上萍王孫丈人行音項垂老見飄零上四送李入廣烜赫有勢下四自叙飄流悲惋動情斗盧注青冥自北而來故風隨爽氣洞庭向南而往故避文星便見叱咤風雲指揮天地氣象浮杜臆日月照臨之下身如籠鳥乾坤覆載之中迹若萍此垂老飄零之狀王孫乃我丈人行忍見其若此耶蓋望之援手矣記諸侯賜斧鉞然後專征伐漢光武書黃鉞一下無處所非下青冥猶言自天而下黃生謂入廣度嶺如下青冥也漢楊僕為樓船將軍正合粵中事世說王子猷曰西山朝來致有爽氣李盧注勉好古尚竒故曰文星今按文昌本在北斗宫自北至南故南斗應避之起方回曰日月年年也乾坤處處也張綖注虛度日月下垂老浪跡乾坤起下飄零左思詩習習籠中鳥舉翮觸四隅天王粲詩朝霧竟幾何忽如水上萍前漢蘇武傳漢子我丈人行也黃生注唐人極重中表親皆叙行輩同者稱兄弟卑者稱侄尊者稱丈此自勉為丈人行蓋中表尊屬也黃生曰前半極其雄邁五六意悲而語則壯得此方稱結亦不覺衰颯此章法凑泊之妙也又曰王右丞詩鐃吹喧京口風波下洞庭似可敵首二語而微遜者此起即用韻其響雄亮故也胡應麟曰少陵詩兼總盛唐集諸家之勝如山隨平野濶江入大荒流太白壯語也杜星隨平野濶月湧大江流骨力過之九衢寒霧斂萬井曙鐘多右丞壯語也杜星臨萬户動月傍九霄多精彩過之氣蒸雲夢澤波撼嶽陽城浩然壯語也杜吳楚東南坼乾坤日夜浮氣象過之弓抱關西月旗翻渭北風嘉州壯語也杜北風隨爽氣南斗避文星風神過之讀唐諸家至杜輒令人自失今按日月籠中二句須添字注釋句義方明不如日月低秦樹乾坤繞漢宫詞氣乾雄壯亦不如乾坤萬里眼時序百年心身世雙蓬鬢坤一草亭語意明爽也歲宴行鶴注此當是大厯三年次嶽州作歲云暮矣多北風瀟湘洞庭白雪一作雲中漁父天寒網罟凍莫徭射音石雁鳴桑弓首記歲晏景事傷窮民之漁獵者隋地理志長沙郡雜有夷蜒名曰莫徭自言其先祖有功嘗免征役故以為名記桑弧蓬矢以射四方漢五行志女童謡曰檿弧箕服顔師古注山桑之有㸃文者木弓曰弧去年米貴闕軍食今年米賤太傷農高馬逹官厭酒肉此輩杼柚茅茨空此又傷窮民之耕織者此輩指農家夫婦充朱注舊唐書大厯二年十月減京官職田三分之一軍糧又十一月率百官京城士庶出錢以助軍此詩作於三年冬故云去年米貴闕軍食也鶴注舊史大厯二年二月郭子儀自河東來朝元載裴冕第五琦黎幹各出錢三十萬置宴於子儀之第三月魚朝恩宴子儀宰相節度度支使京兆尹於私第朝臣以酣酒為樂而民間空乏如此此子美所以形之詩歟漢書穀賤傷農詩杼柚其空玉篇柚機具也杼機之持緯者楚人重魚不重鳥一作肉汝休枉殺南飛鴻况聞處處鬻男女割慈忍愛還租庸此歎當時賦斂之困庸魚鳥承漁父莫徭租承農夫杼柚此皆迫於官賦者雍風俗通吳楚之人嗜魚鹽不重禽獸之肉楚辭雁雍而南飛别賦割慈忍愛離鄉去里者舊書凡授田者丁歲納粟稻謂之租不役日為絹三尺謂之庸往日用錢捉私鑄今許一作來鉛鐵和去聲青銅刻泥為之最易音異得好惡不合長相䝉此慨當時錢法之壞可民窮財盡故惡錢濫用為官者豈聽其相䝉而不為糾察乎淮舊書天寶數載之後富啇奸人漸收好錢潛將往江之南每錢貨得私鑄惡者五文假託官錢將入京私用鵝眼鐵錫古文綖繯之類每貫重不過三四斤洙曰唐制盜鑄者死沒其家屬至天寶間盜鑄益甚雜以鉛錫無復錢形號公鑄者為官爐錢刻泥以泥為錢模也左傳上下相䝉注䝉欺也萬國城頭吹畫角此曲哀怨何時終末以歲晏所聞結出憂亂之意生民窮困由亂離所致而困窮之甚將復致亂離故云哀怨何時終此章前四假各四句末用二句結吹角非歌曲以樂曲中常用角音故亦可云曲也哀怨謂角聲悲慘胡晉志角者本以應笳之聲後漸用之橫吹有雙角即樂也張騫入西域傳其法於西京唯得摩訶兜勒一曲據此則吹角用曲亦相因之事故及之泊嶽陽城下鶴注當是大厯三年冬深作即嶽州在天嶽山之陽故名嶽陽唐書嶽州巴陵郡屬江南西道江國踰千里山城近趙汸作近舊作僅百層岸風翻夕浪舟雪灑寒燈留滯才難盡艱危氣益增圖南未可料變化有鵾鵬首二記嶽陽城三四泊舟之景下則泊舟而有感也顧注謂千里而來僅見此百層趙注解作高近百層尤為穩當挫杜臆前詩才盡傷形體此云留滯才難盡後詩窮迫曩懷此云艱危氣益增非前後相左蓋因舟行向南有激於鵾鵬之變化而云然耳者顔延之賦臨廣坐望百層史記懦夫增氣圖南圖往南方公蓋不甘終於廢棄也莊子鵾化為鵬而後乃今圖南後人喜學杜詩而工拙迥殊杜云緑垂風折笋紅綻雨肥梅范至能云梓花紅綻碎粟穗緑垂低歎其工力悉敵杜云留滯才難盡艱危氣益增陳無已云留滯常思動艱危却悔來覺杜老健而陳衰颯杜云五聖聨龍衮千官列雁行宋徽宗挽哲廟云北極聨龍放衮西風拆雁行服其用語切當杜云苦遭白髮不相羞見黃花無數新李後主九日詩云鬢從今日添新白花似去年依舊黃又覺杜生新而李平熟矣纜船苦風戲題四韻奉簡鄭十三判官泛大鶴注此厯三年冬在嶽陽作楚一作東岸朔風疾天寒鶬鴰音􅀈呼漲沙霾草樹舞雪渡江湖吹帽時時落維舟日日孤因聲置驛外為去聲覔酒家壚上四風寒之景下四泊舟簡鄭以沙霾雪渡風狂所致此時舟中落帽故欲索酒禦寒所謂戲題也而爾雅翼蒼麋其色蒼如麋也一名鴰鹿本草狀如鶴頂無丹兩頰紅西都賦鳥則鶬鴰泛浮往來邱遲詩森森荒樹齊析析寒沙漲漢古詩扁舟載風雪半夜渡江湖因聲猶云寄語書鄭莊置驛請謝賓客此比鄭判官也人遞曰置馬遞曰驛壚司馬相如傳文君當壚顔師古曰賣酒之處纍土為以居酒甕四邊隆起其一面形如煆壚故名壚耳世人皆以當壚為對溫酒火壚失其義矣登嶽陽樓鶴注當是大厯三年作瞰嶽陽風土記嶽陽樓城西門樓也下洞庭景物寬濶元盧注是年郭子儀將兵五萬屯奉天備吐蕃白光李抱玉各出兵擊之是戎馬關山北也昔聞洞庭水今上上聲嶽陽樓吳楚東南坼乾坤日夜浮親朋無一字老病有孤舟戎馬關山北憑軒涕泗流上四寫景下四言情勢昔聞今上喜初登也包吳楚而浸乾坤此狀樓前水下則隻身漂泊之感萬里鄉關之思皆動於此矣情杜臆三四已盡大觀後來詩人何處措手下四只寫方是做自已詩非泛詠嶽陽樓也黃生曰末以憑軒二字綰合登樓敬國䇿吳起曰左有彭蠡之波右有洞庭之水葉秉曰或疑洞庭楚地何逺及於吳考荆州記君山在洞庭湖中上有道通吳之包山今吳之太湖亦有洞庭山以潛通君山故得名或疑乾坤日夜浮有似詠海考水經注洞庭湖廣五百里日月若出沒其中又拾遺記洞庭山浮於水上方知杜句所云皆是洞庭本色朓三輔黃圖南極吳楚有史記趙世家地坼東南謝詩大江日夜流又酒招親朋關歸去來辭或棹孤舟軒道德經戎馬生於郊詩恨賦山無極登樓賦憑檻以遙望兮張載登崕逺望涕泗流鼻出曰涕目出曰泗黃生曰前半寫景如此濶大五六自叙如此落寞詩境濶狹頓異結語凑泊極難轉出戎馬關山北五字胸襟氣象一等相稱宜使後人擱筆也金玉詩話云洞庭天下壯觀自昔騷人墨客鬬麗搜竒者尤衆如水㴠天影濶山拔地形高四望疑無路中流忽有山鳥飛應畏墮帆逺却如閒皆見稱於世然莫若氣蒸雲夢澤波撼嶽陽城則洞庭空曠無際雄壯如在目前至讀杜子美詩則又不然吳楚東南坼乾坤日夜浮不知少陵胸中吞幾雲夢也唐庚子西文録嘗過嶽陽樓觀子美詩不過四十字耳其氣象閎放㴠蓄深逺殆與洞庭爭雄所謂富哉言乎者太白退之輩率為大篇極其筆力終不逮也杜詩雖小而大餘詩雖大而小黃鶴曰一詩之中如吳楚東南坼乾坤日夜浮一聨尤為雄偉雖不到洞庭者讀之可使胸次豁逹方回曰嘗登嶽陽樓左序毬門壁間大書孟詩右書杜詩後人不敢復題劉長卿云叠流浮元氣中流沒太陽世不甚傳他可知矣趙汸曰公此詩同時惟孟浩然臨洞庭所賦足以相敵後則陳簡齊渡江及朱文公登定王臺所賦最迫近之浩然詩云八月湖水平㴠虛混太清氣蒸雲夢澤波撼嶽陽城欲濟無舟楫端居恥聖明坐看垂釣者徒有羡魚情簡齊詩云江南非不好楚客自生哀搖楫天平渡迎人樹欲來雨餘吳岫立日照海門開雖異中原險方隅亦壯哉朱文公詩云寂寞番君後光華帝子來千年餘故國萬事只空臺日月東西見湖山表裏開從知爽鳩樂莫作雍門哀分葉秉敬敬君詩話張祜詩一宿金山寺微茫水國僧歸夜航月龍出曉堂雲樹影中流見鐘聲兩岸聞因悲在城市終日醉醺醺此詩可取在第二聨或云僧亦有晝歸者何偏云夜航月耶不知旦出暮歸人情之常况稱夜月則景色清逈此當以意融㑹不必苛責也至云龍出曉堂雲則分明畫出寺在江中之景逼直甚矣此二句已盡其狀至云樹影中流見頗缺天趣又云鐘聲兩岸聞更復著相且四句俱說景似堆垜而無清味老杜洞庭只是兩句而下便云親朋無一字老病有孤舟方見變化之妙湖楊慎曰昔過嶽陽樓見一詩云樓上元龍氣不除中范蠡意何如西風萬里一黃鵲秋水半江雙白魚鼓瑟至今悲二女沈沙何處弔三閭朗吟仙子無人識騎鶴吹簫下碧虛視其姓名乃元人張翔字雄飛不知何地人也雄飛在元不著姓名然詩實可傳同時虞伯生范德機皆有嶽陽樓詩逺不及也陪裴使去聲君登嶽陽樓鶴注當是大厯四年春作使君必嶽州守故詩用陳蕃事湖濶兼雲霧樓孤屬之玉切晚晴禮加徐孺子詩接謝宣城雪岸叢梅發春泥百草生敢違漁父問從此更南征首二登嶽陽樓三四陪裴使君五六樓前春景七八自叙行踪此虛實相間格也一日之間陰晴迭換亦見登眺之久黃生謂可當嶽陽樓圖是也推徐稚自方謝朓比裴屈原至江濱渙父勸其與世移公旅况依人故不敢違漁父之問而更欲南征南征指潭州倘杜臆落句深有意於裴言已不異屈原之放逐漁父肯見問豈敢違之而更南征乎此另一說陳濶與孤相照屬當也後漢徐孺子豫章南昌人時蕃為太守以禮請署功曹為宣城太守謝朓傳除祕書丞未拜仍轉中書郎出楚辭屈原既放遊於江潭漁父見而問之湘離騷濟沅兮南征黃生曰一二目前景所以興三四五六意中景所以起七八格局莊凝句法精錬詞㫖深渾從來人止膾炙前作耳蓋彼詩之妙易見此詩之藴難窺也南征此當是大厯四年春潭衡間作前詩從此更南征可證依蔡氏編次為是春岸桃花水雲帆楓樹林偷生長避地適逺更霑襟老病南征日君恩北望心百年歌自苦未見有知音上四南征景事下則申述情緒也地楊慎曰桃水用秦人桃源事楓林用楚辭招魂事避接桃花句適逺接楓樹句身南心北又承避地逺適未見知音結見南行之故陵謝靈運詩海鷗戲春岸庾信詩流水桃花色李書陵豈偷生之士去王粲詩逺身適荆蠻居蘇武傳因泣下霑襟與武決後漢書閲仲叔客安邑老病家貧嶽鄙謝朓詩君思不可追傷國語北望古詩不惜歌者苦但知音稀歸夢黃鶴誤編廣德二年蔡氏編在湖南詩中應是大厯三四年間作謝朓詩歸夢相思夕道路時通塞先責切江山日寂寥偷生唯一老伐叛已三朝音潮雨急青楓暮雲深黑水遙夢魂一作歸歸未一作亦得不用楚辭招上四叙事身未得歸下四述夢魂未得歸趙注當是用兵道路或通或塞故江山氣象日見蕭條楓三朝謂𤣥宗肅宗代宗伐叛謂安史僕固吐蕃也青在楚黑水在秦蓋夢中所見之景杜臆夢歸未得魂仍在楚故不用招歸指長安老黃生曰五六即魂來楓林青魂返關寨黑意七八即魂歸不得歸路恐長迷意之記不憗遺一老距禹貢黑水西河惟雍州蔡傳雍州域西據黑水東西河又禹貢導黑水至於三危入於南海蔡傳雍梁二州西界皆以黑水為界是黑水自雍之西北而直出梁之西南也寰宇記嶲州越嶲縣有黑水朱注黑水源流非一唐嶲州地瀘水所出瀘水即黑水也次公注黑水在鄠杜之間兮楚辭招魂魂歸來故居些過南嶽入洞庭湖鶴注此大厯四年正月自嶽陽之潭州時作殆自嶽陽過南嶽而入洞庭也州南嶽乃嶽麓衡山以嶽麓為足在長沙唐書潭湘潭縣有衡山山海經注長沙巴陵縣西有洞庭陂潛伏通江水經注湖水廣圓五百餘里日月若出沒於其中嶽陽風土記鼎澧沅湘合諸蠻黔南之水滙於洞庭至巴陵與荆江合洪波忽爭道岸轉異江湖鄂渚分雲樹衡山引舳音軸艫音盧翠牙穿裛蔣一作漿碧節吐一作上寒蒲病渴身何去春生力更無此舟過南嶽也故湖水爭道而趨以江湖異流故也鄂在北曰分衡在南故曰引二句言江湖之異蔣牙蒲節春時景物國謝靈運詩莫辨洪波極誰知大壑東吳越春秋二爭道楚辭乘鄂渚而返顧兮九州記鄂今武昌是也孫權自公安徙此改曰武昌劉孝威詩雲樹交為密漢武帝紀舳艫千里說文舳舟尾艫舟前浸趙注蔣乃菰蔣之蔣蓋蒲有節而蔣有牙也准南子潭苽蔣苽者蔣實也唐雅菰蔣其米謂之胡裛蔣蔣之瘦而未壯者壤童犁雨雪漁屋架泥塗欹側風帆滿微冥水驛孤悠悠回赤壁浩浩略蒼梧帝子留遺恨曹公屈壯圖此入洞庭湖也而壤童二句近岸景事風健則帆飽舟帶欹斜行速故回顧而水驛微小帝子承蒼梧曹公承赤壁此逺覽古跡也趙注赤壁在夏口之東武昌之西盛𢎞之荆州記薄沂縣沿江一百里南岸名赤壁歌趙注蒼梧在洞庭西南九域志蒼梧山在道州九帝子降兮北渚帝子指娥皇女英史記舜南巡狩崩於蒼梧之野師後漢獻帝紀劉表卒少子琮立以荆州降操操以舟伐孫權周瑜傳瑜請得精兵三萬人追往夏口遇於赤壁大破之聖朝音潮光御極殘孽駐艱虞才淑隨厮養去聲名賢隱煆爐邵平元入漢張翰後歸吳莫怪啼㾗數色角切危檣逐夜烏末乃撫時感懷言趙注聖朝二句代宗雖復長安而吐蕃猶未息也自才淑名賢歎賢才淪棄邵平張翰謂身欲歸鄉末則傷漂泊也此章三假各八句之任昉集肇允才淑見史記趙王武臣為燕軍所得囚有厮養卒走燕壁燕將曰張耳陳餘名為求趙王實欲燕殺之兩人分趙自立夫以一趙尚易燕况以兩賢王左提右挈而責殺王之罪滅燕易矣燕將乃歸趙王韋昭注析薪為厮炊烹為養路溫舒傳願給厮養暴骨方外以盡臣節蒯通傳隨厮養之役者失萬乘之權杜煆爐用嵇康事邵平張翰注皆别見臆夜烏啼用烏鵲南飛語宿青草湖鶴注當是大厯四年赴衡嶽時宿此巴元和郡國志巴邱湖又名青草湖在陵縣南周回二百六十五里俗云即古雲夢澤十道志湖在嶽州名勝志湖北連洞庭南接瀟湘東納汨羅之水每夏秋水泛與洞庭為一水涸此湖先乾青草生焉故名荆州記湖因青草山得名洞庭猶在目青草續為名宿漿依農事郵籖報水程寒冰爭倚薄雲月遞微明湖雁雙雙起人來故北征上四宿湖之事下四對景言情防南有青草北為洞庭一湖兩名故曰續為名孤舟盜故須宿依農畔水程夜泊故閵驛報更籌倚薄曰爭見寒冰交侵而競迫微明曰遞見雲月迭掩而迭開黃生注末㸃湖字前面青草方不落空此見詩律之細人顧注湖雁雙飛而起豈為我之南征故意以北征示耶見南行非木願矣朱注郵籖驛館更籌也隋煬帝詩投籖初報晚月倚薄之薄即雷風相薄之薄言迫也杜臆月令正侯雁北故云北征王融詩秋雁雙雙飛兮楚辭九歌駕飛龍兮北征邅吾道洞庭宿白沙驛鶴注年月同上川洙曰初過湖五里底顧注湘中記湘清照五六丈下見石如樗蒲五色鮮明白沙如霜雪赤崕如朝霞水宿仍餘照人烟復扶又切此亭驛邊沙舊白湖外草新青萬象皆春氣孤槎自客星隨波無限月一作景一作好的的近去聲南溟上四白沙驛景下四宿驛有感即黃生注曰仍曰復見水程非止一日三四景因地見時五六即景借物形已巧法兼備前詩先見地後㸃宿字此詩反之是章法變化處水含殘照亭起夕烟此將晚之候白沙驛名青草湖名拆開用之倒裝以協韻耳趙汸注皆春氣見各有生意自客星見已獨飄零按二句乃一進一退格靈樓鑰云的的昭著貌謂乘月之明以到南溟也謝運詩客遊倦水宿哀江南賦舟楫路窮星漢非乘槎可上黃注此反用之新梁簡文帝水月詩溶溶如潰璧的的似沈鈎吳均望月詩的的與沙靜灔灔逐波輕宋之問寒宵引明月的的寒潭中杜臆莊子南溟者天池也本屬寓言此將虛語作實用妙在的的二字此用古之一法湘夫人祠鶴注此大厯四年春作祠在長沙府湘陰縣山海經洞庭之山帝之二女居之檀弓舜葬於蒼梧之野三妃未之從也陳澔注舜長妃娥皇次妃女英三妃癸比從堯而言皆謂帝子從舜而言皆謂之妃其曰湘君湘夫人者後人從湘起見以水神尊之水經注太湖水西流徑二妃廟南世謂之黃陵廟大舜之陟方也二妃從征溺於湘江神遊洞庭之淵出入瀟湘之浦民為立祠水側焉肅肅湘妃廟空牆碧水春蟲書玉佩蘚燕舞翠帷塵晚泊登汀樹微馨借一作香惜渚蘋蒼梧恨不盡染淚在叢筠上四祠中之景記其淒涼下四祠外之景致其感慨徘首句黠祠次句記時蘋樹斑筠皆出祠後所觸目而徊者發也杜臆臣望君不減妻望夫蒼梧之恨不為夫人詩肅肅在廟蟲書蟲蝕如字書衛恆書勢四曰蟲書曰生注微馨用黍稷馨香渚蘋用蘋蘩可薦不曰薦而借表已欲薦之誠耳博物志舜南巡崩於蒼梧二妃淚下染竹成斑黃生曰空牆碧水寫荒涼之狀三四本屬荒涼語轉濃麗五事實六意虛七八倒叙因淚筠而知妃恨耳蒼梧何恨恨不得從舜也用本色作收而自喻之㫖已露又曰首用肅肅二字令人凜然起敬較李羣玉三女明粧九疑如黛不離文士口角幾於瀆神矣公詩發源楚詞波瀾故自老成此章意味深厚可當近體中九歌衛許顗彥周曰有客泊湘妃廟前夜半偶不寐見輿入廟中置酒鼓瑟心悸不敢窺逮明方散隱隱絶水浮空去因入廟中見詩四句墨色猶未乾碧杜紅蘅縹眇香冰絲彈月弄新涼峯巒向曉渾相似九處堪疑九斷腸祠南夕望公既謁湘夫人祠次夕在祠南回望也百丈牽江色孤舟泛日斜興去聲來猶杖屨目斷更雲沙山鬼迷春竹湘娥倚暮花湖南清絶地萬古一長嗟上四日夕望祠下四望中之情湘舟泛日斜來途已逺故杖屨登岸猶如昨日而目斷祠渺隔雲沙矣回想花竹幽𡨕倍覺弔古淒涼耳古張綖曰如此清絶之地徒為遷客羇人之所厯此萬所以同嗟也結語極有含蓄兮舟行上水故用百丈竹索郭楚辭山鬼章余處幽篁終不見君迷遮迷也璞江賦協靈爽於湘娥湘娥即屈平所謂湘妃也黃生曰此近體中弔屈原賦也結亦自喻日夕望祠髣佛山鬼湘娥如見靈均所賦者因歎地雖清絶而俯仰興懷萬古共一長嗟此借酒杯以澆塊磊山鬼湘娥即屈原也屈原即少陵也上時掌切水遣懷梁權道謂是大厯四年自嶽入潭時作趙子櫟譜自嶽之潭之衡為上水自衡回潭為下水我衰太平時身病戎馬後蹭蹬多拙為安得不皓首驅馳四海內童稚日糊口但遇新少去聲年少逢舊親友此傷老病飄流從叙懷說起幕太平指天寶以前戎馬指至德以後蹭蹬謂貶官入童稚謂擕子逺遊左傳糊其口於四方低頭下去聲邑地故人知善誘後生血氣豪舉動見老醜窮迫挫曩懷常如中去聲風走一紀出西蜀於今向南斗此歎無交可依乃上水之故新親友知而善誘舊交欵洽也少年視為老醜知輕薄也窮途既無可仗之人則奔走南行實非得已矣䕫州詩云新知已暗疏後生之交態可知郭有道碑善誘善導仁而愛人伯阮藉詩朝為美少年夕暮成老醜乾朱浮與彭寵書通獨中風狂走自捐盛時公自元元年入蜀至大厯三年出峽凡十一年殆將近一紀也孤舟亂春華一作草暮齒依蒲柳冥冥九疑葬聖者骨已一作亦朽蹉跎陶唐人鞭撻日月久中間屈賈輩讒毁竟自取叶此茍切鬱悒樊作悒一作沒二悲魂蕭條猶在否此上水而動弔古之思疑春華蒲柳即所見以興感言舜葬九其骨已朽因思陶唐至今人生代謝久矣中間如屈賈忠魂尚有存焉者乎此從暮齒而傷歎及之栁惲詩春華復將晚在世說蒲柳之質望秋先零子山海經九疑山舜所葬長沙零陵界中史記老曰人存而骨已朽矣元和郡縣志堯先居唐後居陶邱故曰陶唐氏公鞭撻日月猶云驅送歲月朱注以陶唐人為羲和引詩羲和鞭白日為證是也或謂指唐堯或謂指湘妃或謂公自言唐杜皆唐堯之後俱非淮南子日駕車以行羲和為御直讒毀自取言忠取忌􅍶崒清湘石逆行雜林藪篙工密逞巧氣若酣杯酒歌謳互激越一作逺回斡烏括切明一作相受授善一作蓋知應平聲觸類各藉頴脫手古來經濟才何事獨罕有此上水而述行舟之事水水中石露則舟經險岸多林藪則路易迷上故曰逆行謳歌句言其氣壯回斡句言其力巧脉趙曰回斡回旋斡轉其船也舟人首尾相呼以求水謂之受授善知者若能觸類以推則凡事皆如鋒頴之脫手矣乃從來經濟之才如操舟敏捷者何獨罕有乎下四句拓開立論易引而伸之觸類而長之乃趙國䇿毛遂曰使遂蚤得處囊中潁脫而出蒼蒼衆色晚熊掛𤣥蛇吼黃羆在樹顛正為于僞切羣虎守羸骸將何適履險顔益厚庶與逹者論平聲吞聲混瑕垢末乃觸景生愁結出遣懷之意其熊蛇羆虎見聞可畏羸軀又且履險總緣窮迫所致欲逹觀以混塵俗見前途亦未必有知音也此章前後三假各八句中間二假各十句注詩義疏熊能攀緣上高樹見人則顛倒投地而下朱爾雅羆如熊黃白文柳宗元熊說鹿畏貙貙畏虎虎畏羆詳詩意正言熊升樹而伺虎也左傳瑾瑜匿瑕國君舍垢公初入蜀則曰故人供祿米在梓閬則曰途窮仗友生再還蜀則曰客身逢故舊初到䕫則曰親故時相問至此則親朋絶少旅况益艱故篇中多抑鬱悲傷之語遣遇鶴注當是大厯四年春自嶽之潭時作詩云駕洪濤見其為上水也黃生注題曰遣遇謂雖遇風濤之險猶得遂其生理不若迫於征役者有死亡離散之悲故以此自遣也磬折辭主人開帆駕洪濤春水滿南國朱崕雲日高舟子廢寢食飄風爭所操我行匪利涉謝爾從去聲者勞此叙舟行景事折主人中途所遇者從者指操舟之人赤曲禮立則磬垂佩莊子夫子曲腰磬折湘中記崖若朝霞朱崖正指此易利涉大川石間采蕨女鬻市一作菜輸官曹丈夫死百役暮返空村號平聲聞見事略同刻剝及錐刀貴人豈不仁視汝如莠蒿索音色錢多門户喪去聲亂紛嗷嗷奈何黠吏徒漁奪成逋逃自喜遂生理花時甘一作貰侍夜切緼袍此見民困而慨歎號六句為案八句為斷鬻蕨輸官公所目見空村女兼舉所聞也喪亂征求貴人無可如何豪吏侵奪貴人獨可坐視乎曰豈不仁諷刺隱然公之甘心緼袍此遣遇之詞亦見窮途之狀此章上八句下十四句御左傳錐刀之末貨劉孝綽詩黠吏本須裁豪民亦難前漢書吏以賂為市漁奪百姓侵牟萬民袍書逋逃藪抱朴子緼麗於衮服解憂鶴注此亦自嶽之潭時作其杜臆題與他處異乃幸憂之得解而追記事欲人觸類於兹也減米散同舟路難思共濟向來雲濤盤衆力亦不細呀坑吳趙作坑一作帆一作吭瞥眼過飛櫓本無蒂得失瞬息間致逺宜恐泥去聲終此脫險防危之意之散米本期濟衆而遇險藉其力此遡從前事渡坑雖免風波而涉逺尚恐沮滯此慮將來之事也趙注雲濤盤言雲濤之間盤轉未出方言所謂盤灘舊注以雲濤盤為灘名恐是附㑹呀坑者淤坑如口之呀開也易略例同舟而濟吳越何慮乎異心百慮視安危分明曩賢計兹理庶可廣拳拳期勿替此小心處世之道視安若危此即前賢慮事深計若能推此以行凡事可免傾覆所宜拳拳而勿忘者杜臆云此易傳所謂懼以終始其要無咎也下此章上八句四句宿鑿石浦此大厯四年二月初作寶鶴注浦當在洞庭之上近於潭州邵曰鑿石浦在今長沙府湘潭縣西空趙子櫟年譜登潭州泝湘宿鑿石浦過津口次靈岸宿花石戍過衡山早宿賓從去聲勞仲春江山麗飄風過無時舟楫不敢一作敢不非繫音計回塘淡暮色日沒衆星嘒闕月殊未生青燈死分翳此宿浦景事邊上水逆風賓從皆助力行舟故勞而早宿江風狂浪急故不敢繫舟而務入回塘以避之他本作敢不繫舟者非是分初三之月為哉生明闕未生必初二也燈死無光故夜色之隂翳記詩嘒彼小心注嘒微貌月三五而盈三五而闕窮途多俊異亂世少恩惠鄙夫亦放蕩草草頻年一作卒歲斯文憂患餘聖哲垂彖繫此宿浦叙情因多俊異指賓從少恩惠中路乏周旋者杜臆俊異窮途而多見窮之有益於人恩惠因亂世而少見少惠不當責備於人末聨公之自負不淺窮而有以自樂矣非知道安能作此語一部詩章公以當彖繫可以尋常韻語目之乎文此章上八句下六句莫易傳作易者其有憂患乎王䝉難而作彖孔子容而贊易皆從憂患得之彖謂卦辭繫謂繫辭傳早行鶴注此大厯四年作三年九月吐蕃入冦白元光破吐蕃於靈武所謂干戈也歌哭俱在曉行邁有期程孤舟似昨日聞見同一聲此記早行之事日杜臆哭因兵亂歌亦悲歌行邁有程故曉遂開舟每俱逢歌哭故曰同一聲列子雍門之人至今善歌哭飛鳥數音朔一作散求食潛魚何師作何一作亦獨驚前王作網罟設法害生成碧藻非不茂高帆終日征干戈未一作異揖讓崩迫關從樊本一作開其情此借魚鳥以興畏亂之意黃生注鳥以求食不能安居魚雖安水而又有網罟之患今對此碧藻猶然挂帆亟征是求食之鳥兼為罹網之魚矣崩迫指歌哭者關情觸於聞見也湯此章上四句下八句讓易作結繩而為網罟莊子武之于戈堯舜之揖任昉表無任崩迫之情言崩裂迫切也過津口鶴注此大厯四年春作謂津口當在衡山相近之處夢弼屬江陵南嶽自兹近湘流東逝深和風引桂楫春日漲雲岑此舟行之景和南嶽在西南則湘水屬東流矣風日二句寫春氣融之象詩桂楫松舟陶潛詩近憩雲岑雲岑即雲峰漲謂日光浮於雲上回道一作首過津口而多楓樹林白魚困密網黃鳥喧佳音物微限通塞先則切惻隱仁者心此咏物之情在回道猶言紆道何黃生注魚困鳥喧物之通塞雖異仁者自宜一視獨使魚困於密網乎阮籍詩湛湛長江水上有楓樹林其魏文帝詩重罝施密網詩睍睆黃鳥載好音易知通塞也瓮餘不盡酒膝有無聲琴聖賢兩寂寞眇眇獨開襟此自叙已懷酌酒對琴舟中自得之趣洙云傷時無君子故獨開襟而已杜臆公在窮途遇風平舟利便自怡神知其胸中無宿物矣有此章首尾各四句中間六句一陸機詩瓮餘殘酒膝橫琴晉書陶潛常蓄無絃琴張庾信詩有菊翻無酒無絃則有琴次空靈岸鶴注當是大厯四年春作注蔡曰空靈當作空舲刀筆誤耳水經湘水縣北有空舲峽驚浪雷奔濬同三峽十道四蕃志湘水有空舲灘一統志空舲岸在湘潭縣西一百六十里沄沄逆素浪落落展清眺幸有舟楫遲得盡所厯妙從次岸叙起沄申㴠光曰停舟遍厯亦見客途韻事沸楊德周曰沄浪紋也落落曠逺意長楊賦沄沄渭空靈霞石峻楓栝一作枯隱奔峭青春猶無一作有私白日已一作亦偏照可使營吾居一作屋終焉託長嘯毒瘴未足憂兵戈滿邊徼此羡空靈岸景軒石峭如奔喜其高聳白日偏照喜其敝故欲託此以嘯歌但恐兵戈滿地未堪卜居終身耳峭湘中記赤岸如朝霞張載賦霞石駁落黃生注壁隱天故有白日偏照之語邊就中原而言湖南為徼之地嚮者留遺恨恥為逹人誚回帆覬賞延佳處領其要末期遍覽名勝也但遺恨謂遊踪未到佳處領要不斯岸所厯矣賦杜臆領要一語此别具隻眼者公每經一處必即景詩無不敻絶蓋所領得其要也此章首尾各四句中間八句厯潘尼詩回帆轉高岸日得延賞黃生曰道途雖苦征役然有山水之趣入蜀及湖南諸詩一邊述征行一邊志賞眺襟次已越俗流然猶云恥為俗人誚尚有經過草草之憾也宿花石戍鶴注此大厯四年春入潭州作戍唐書潭州長沙有渌口花石二午辭空靈岑夕得花石戍岸疏開闢水一作山木雜古今樹地蒸南風盛春熱西日暮四序本平分氣候何回互茫茫天造一作地間一作開理亂豈恆數此記戍前景物時候朱注即此地蒸春熱寒暑平分之氣猶回互不齊何怪理亂之無常即二句引起下意九辨皇天平分四時兮海賦回互萬里昧易天造草繫音計舟盤藤輪杖䇿古樵路罷音疲人不在村野圃泉自注柴扉雖蕪沒農器尚牢固山東殘逆氣吳楚守王度誰能叩君門下去聲令減征賦此登岸而傷民困也繫舟之後杖䇿而行見其民罷征戍村野荒涼因歎吳楚之人未經冦逆奈何窮迫至此誰能一叩帝閽而下寬賦之令乎河杜臆罷人四句讀之悽然便堪入告史朱注山東謂北諸降將唐史大厯四年三月遣御稅商錢時必吳楚為甚故末語云然招此章上下各十句舟纜盤岸圓若藤輪也祈詩思我王度盧世㴶曰杜公紀行詩從發秦州至萬丈潭從發同谷至成都府入天穿水萬壑千崖雨雪烟虹朝朝暮暮一切可怪可吁可娛可憶之狀觸目經心直取其髓而犁然次諸掌上嗣是金華山觀去通泉十五里山水清溪驛鑿石浦津口空靈岸花石戍晚洲衡州莫不隨處㸃綴盡妙領佳統成少陵一部遊記留譜與人早發鶴注此亦上水所作故詩云早行篙師怠席挂風不正有求常百慮斯文亦吾病以兹朋故多窮老驅馳併早行篙師怠席掛風不正昔人戒垂堂今則奚奔命首叙早發之故一杜臆以斯文而朋故多以朋多而驅馳併意在有求有求便須百慮是反以斯文受病也語極曲折總為苦於有求以此自病不能解脫而遷病於斯文然斯文不在受病也可以窺其苦衷矣公之奔命為謀生計也左朋故朋友故舊也傳罷於奔命濤翻黑蛟躍日出黃霧映煩促瘴豈侵頽倚睡未一作還醒去聲僕夫問盥櫛暮顔一作未􅌤青鏡隨意簪葛巾仰慙林花盛此記早發景事四上四苦風土之惡下傷年齒之衰鷗鮑照詩騰沙鬱黃霧翻浪揚白謝朓詩青鏡悲曉髮側聞夜來冦幸喜囊中淨艱危作逺客干請傷直性薇蕨餓首去聲陽粟馬資厯聘賤子欲適音的從疑誤此二柄末乃早發傷感干艱危作客不得不請一涉干請自慚非本性此所以有求常百慮也下文正申明此意言不能抗節高隱如夷齊之窮餓又不屑屈已逢人如儀秦之厯聘進退兩無所適幾疑誤於此二途矣此章三假各八句伯夷列傳義不食周栗隱於首陽山採薇而食之及餓且死乃作歌曰登彼西山兮採其薇矣舊注蘇秦張儀厯聘六國諸侯皆以粟馬迎之杜臆引孟子傳食諸侯事非也用左傳吾誰適從逺注韓非子有二柄篇此借其事䂬溪詩話曰杜詩許身一何愚自比稷與契其平居趨嚮自是唐虞上人有時自方儀秦似不可曉飄飄蘇季子六印佩何遲敝裘蘇季子厯國未知還季子黑貂敝得無瘦嫂欺戰國奸民蘇張為渠此老不應未喻及觀薇蕨餓首陽粟馬資厯聘賤子欲適從疑誤此二柄其意甚明前言蓋戲耳次晚洲鶴注此亦四年春入潭時所作杜臆洲在湘潭參錯雲石稠坡陀風濤壯晚洲適知名秀色固異狀棹經垂猿把身在度鳥上擺浪散帙妨危沙折一作拆花當去聲也此次洲之景春秀色異狀承雲石參錯此晚洲佳勝棹經四句言水漲而船勢高也散帙在船浪動則看書有礙花發沙前舟近則拆之為便以當對妨乃便當之當杜臆說是舊注以花當為花根誤江淹詩石林上參錯把樹枝而垂飲也沈約詩烟林雲石稠虞騫詩澄潭寫度鳥垂猿把猿逺注孔德紹詩逆浪取花難與危沙折花當可以反證羇離暫愈悅羸老反惆悵中原未解兵吾得終疏放此次洲之情中對景暫喜而忽然惆悵者思及原多故得終疏放於江湖否耶四此章前八句後句清明二首鶴注當是大厯四年春初到潭州時作朝來新火起新烟湖色春光淨客船繡羽銜一作衝花他自得紅顔騎竹我無緣胡童結束還難有楚女腰肢亦可憐不見定王城舊處長懷賈傅井依然虛霑周舊作焦舉為寒食實藉君平一作嚴君賣卜錢鐘鼎山林各天性濁醪粗飯任吾年此章先咏長沙景事後及清明感懷在六句分截新火春光㸃叙清明鳥銜花兒騎竹童裝胡服女作細腰此皆舟前所見者定王城賈傅井思長沙遺跡也寒食之時周舉雖開火禁而舟鮮熟食故曰虛霑此皆無錢之故因思君平賣卜以自給濁酒粗飯即舟中飲食杜臆以胡童承竹馬楚女頂繡羽未免重出不如分作四項晨唐制清明日賜百官新火鮑照芙蓉賦曜繡羽以過宋之問詩銜花翡翠來隔世說桓溫少時與殷洪共騎竹馬服傅咸詩參辰曠㑹無緣楚雜苖蠻故有胡童之漢章帝紀馬瘳引傳曰吳王好劍客百姓多瘡瘢楚王好細腰宫中多餓死梁簡文帝詩腰肢本猶絶睂眼特驚人二水經注高祖五年封吳苪為長沙王城即苪築景帝年封唐姬子發為王都此寰宇記潭州長沙縣定王廟在縣東一里廟連岡高七丈俗謂之定王岡盛𢎞之荆州記湘州南市之東有賈誼宅宅中有井小而深上斂下大狀似壺即誼所穿也井旁有石有局腳食牀可容一人坐形制甚古洪容齊隨筆左傳晉文公賞從亡者介之推不言祿祿亦弗及遂與母偕隱而死晉侯求之不獲以綿上為之田史記子推從者書宫門有一蛇獨怨之語文公見其書使人召之則亡聞其入綿上山中於是環山封之名曰介山劉向新序始云子推怨於無爵齒去而之介山之上文公待之不肯出以謂焚其山宜出遂不出而焚死汝南先賢傳云太原舊俗以介子推焚骸一月寒食鄴中記云并州俗冬至後一百五日為子推斷火冷食三日後漢周舉傳云太原一郡舊俗以介子推焚骸有龍忌之禁士民每冬至輒一月寒食莫敢烟㸑舉為并州刺史乃作書置子推廟言盛冬去火殘損民命非賢者之意示民使還溫食然所謂寒食乃是冬中非今二三月間也庾信詩成都賣卜錢富趙注擊鐘而食列鼎而烹貴人之事也朱瀚曰朝來率爾新火新烟重復繡羽字面塵坌銜花騎竹屬對不倫他自得我無緣還難有亦可憐純是暮氣豈少陵頓挫本色正自孤舟老病牽情楚女腰肢甚無謂矣出言有章者不應如是城舊處井依然神理安在鐘鼎山林濁醪粗飯堆積陳腐各天性任吾年與他自得亦可憐等同一庸軟耳此身飄泊苦西東右臂偏枯半耳聾寂寂繫音計舟雙下去聲淚悠悠伏枕左書空十年蹴踘將雛逺萬里鞦韆習俗同旅雁上上聲雲歸紫塞家人鑽火用青楓秦城樓閣烟一作鶯花裏漢主山河錦繡中春水一作風水春來洞庭濶白蘋愁殺白頭翁次章先慨飄流之迹後歎清明景事亦六句分截繫舟承飄泊左書空應右臂枯將雛逺逺在楚中習俗同同於長安紫塞雁仍指長安青楓火又指楚中秦城漢主思長安而不見也洞庭白蘋歎楚中之淹滯也素管子入國聾盲喑啞跛躠偏枯者上收而養之黃帝問風疾或為偏枯漢藝文志蹴踘二十五篇顔注鞠以韋為之實以物蹴踏為戲樂也杜臆蹴踘乃軍中擊毬之戲與下將雛方關合將雛謂挈子而行樂府有鳯將雛術宗凛歲時記寒食有打毬鞦韆施鈎之戲古今藝圖以綵繩懸木立架士女坐立其上推引之謂之鞦韆一云當作千秋本出漢宫祝夀詞後人倒讀又易其字為鞦韆耳蕪城賦北走紫塞雁門妙全唐詩話劉禹錫盛稱春水二句謂兩春字叠用見杜臆蘋大萍也五月開花白色清明未花用成語耳朱瀚曰起四句竟似貧病拿舟乞嗟來之食者有一字近少陵風骨否因右臂偏枯而以左臂書空既可噴飯只㸃左字尤為險怪蹴踘鞦韆坊間對類將雛習俗屬對殊難鑽火句又犯朝來新火秦城二句街市燈聨耳漢主更不可解風水句亦是吳歌結句無聊鋪陳情事則有五言百韻等作格律精嚴則有七言八句集中偏缺此體無須蛇足食肉不食馬肝未為不知味也發潭州鶴注此四年春自潭之衡時作前杜臆時未到衡詩當在望嶽之夜醉長沙酒曉行湘水春岸花飛送客檣燕語留人賈傅才未俗本作何有褚公書絶倫名高一作高名前後事回首一傷神上四潭州景事下則發舟而有感也出送客但花飛留人惟燕語本屬寥落之感却能以鮮俊之辭賈褚立朝各有鯁亮之節但舉才名書法者蓋借以自方耳二人固為前後公於二賢亦前後事也故有回首傷神之歎西謝氏雪賦酌湘吳之醇酎工名勝志湘水在潭州之環城而下唐書褚遂良𨽻楷太宗令侍書高宗時為右僕射諫立武昭儀為后左遷潭州都督蔡雍為陳太邱碑命世絶倫杜臆公之善書此又一證楊氏丹鉛録云賈島詩長江風送客孤館雨留人二句為平生之冠而集中不載僅見於坡詩注所引今按杜詩岸花飛送客檣燕語留人實賈句所本而何仲言詩岸花臨水發江燕繞檣飛則又杜句所本固知詩學遞有源流也言洪仲曰此詩三四託物見人五六借人形已此皆外寓意實說便少含蓄矣發一作登白馬潭趙注白馬潭在潭州經顧注嶽州巴陵縣有白馬湖水注江水又東徑彭城口北對隱磯二磯之間有巨石孤立大江中東江浦世謂之白馬口李白詩側叠萬古石橫為白馬磯潭詩云日出野船開明是潭前發舟杜臆謂在上水故云登於詩不合水生春纜沒日出野船開宿鳥行音杭猶去叢花一作花叢笑不來人人傷白首處處接金杯莫道去聲新知要義從平聲讀用去聲南征且未回上四記發舟景物下四叙經潭情事上實下虛格杜臆春水方生故繫纜浸沒逆流難上故日出方開此時宿鳥之成行者猶且先我而去水花之帶笑者不肯向舟而來見逆水行舟之難也客舟難進如此縱使人人傷我白首處處接我金杯亦莫道新知為要事只管南征而未回也後半作虛擬之詞不然艱危作逺客安得到處金杯乎權傳注權為箋與曹公春水方生公宜速去吳志孫杜詩背指菊花開狀順流之速水花笑不來指逆流之遲要楚辭樂莫樂兮新相知舊解要為要事新說作招解野望鶴注此亦大厯四年春作張正見詩王城野望通納納乾坤大行行郡國遙雲山兼五嶺風壤帶三苖野樹侵江濶春蒲長子丈切雪消扁舟空老去無補聖明朝三四逺望承上乾坤郡國五六近望起下扁舟空去中二聨雖俱屬言景然細玩語意仍是四句分截五嶺在南三苖在北江漲直侵野樹雪消始長春蒲五六倒裝句法顧注尾聨抱負甚大感慨甚深裴遜之詩納納江海深秦樂府行行重行行戍賈誼傳乘傳而行郡國舒曰始皇略定揚越謫五方南守五嶺塞上嶺一也騎歸嶺二也都龎嶺三也略緒嶺四也越城嶺五也自北徂南入越之道必由嶺焉元和郡國志晉懷帝分荆州湘中諸郡置湘州南以五嶺為限北以洞庭為限祖􅓨詩方城殊風壤書竄三苖於三危注三苗之國左洞庭右彭蠡潭州圖經潭州為三苖國之南境入喬口鶴注年月同上一原注長沙北界唐書潭州有喬口鎮兵統志喬口鎮在長沙府城西北九十里漠漠舊京逺遲遲歸路賖殘年傍去聲水國落日對春華樹密早蜂亂江泥輕燕斜賈生骨已朽悽惻近去聲長沙上四自叙行踪下四流落之感長言故鄉遙隔而老客他方曾不如蟲鳥之自適矣况沙地近能無今古同悲乎歎胡夏客曰此言賈生沒後乂有近長沙而悽惻者非賈也趙汸注公至湖南每懷賈誼蓋羇旅窮愁之感神交冥漠之情皆在於此非泛拾故事成詩也陸機詩街巷紛漠漠盧諶詩南望舊京路孟子遲遲吾行也榆顔延之詩水國周地險蜜杜臆落日對春華亦涉桑之感崔豹古今注木生南方合體皆甜嫩枝及葉皆可生噉味如蜜其老枝及根幹堅不可食細破煮之煎以為蜜味倍甜濃陶隱居本草木蜜懸樹枝作之色青白類黃希曰言早蜂而及樹蜜言輕燕而及江泥皆取其此與望兜率寺詩樹蜜當山徑江深隔寺門不同泣前漢丙吉傳仁心感動涕悽惻黃生曰一二步步入南心心懷北寫出此行萬非得已三足上四起下五六又倒承三四結句見他應轉起語如見神色慘沮之意而此詩竟成已䜟可哀也已銅官渚守風年月同上鑄趙注潭州長沙有銅官山云是楚錢處此渚蓋以是得名乎水經注湘水右岸銅官涌出焉一統志銅官渚在長沙府城北六十里不樊作亦夜楚帆落避風湘渚間水耕先浸草春火更燒山早泊雲物晦逆行波浪慳飛來雙白鶴過去杳難攀首二銅渚守風三四渚前之景下四守風有感農未夜收帆為避風也浸草作糞燒灰擁田皆楚地春事雲物冥晦而浪沮行舟不若飛鶴之乘風自適矣草漢武詔江南之地火耕水耨應劭注燒草下水種稻與稻俱生高七八寸因悉芟去復下水灌之草死而稻獨長所謂火耕水耨燒山在冬而春火更燒故以為異慳沮滯難行也從古樂府飛來雙白鶴乃西南來黃生曰帆落早泊語似犯重其實不然一二乃叙事五六則寫意雲晦浪慳極盡守風悶坐無可娛目之懷來又曰湖雁雙雙起人來故北征見南行非得已飛雙白鶴過去杳難攀見阻風不自由皆因物以寫意也北風原注新康江口信宿方行水經注晉改益陽曰新康公自潭至衡於北風為順故喜而有作春生南國瘴氣待北風蘇向晚霾殘日初宵鼓大罏爽擕卑濕地聲拔洞庭湖萬里魚龍伏三更平聲鳥獸呼此寫北風之勢拔霾生則風至矣卑濕之處爽若擕來洞庭之中聲如起狀風之自近而逺魚龍承湖鳥獸承地地詩終風且霾傳霾雨上蒙霧也雨去聲髮莊子以天為大罏王粲無異於鼓洪罏以燎毛賈誼傳長沙卑濕滌除貪破浪愁絶付摧枯執熱沈沈在凌寒往往須且知寬病肺不敢恨危途再宿煩舟子衰容問僕夫此避風之事枯滌除瘴氣方思破浪南行奈風急可愁不敢付之摧也此時驟寒解熱肺病得蘇而容色頓起矣傳北魏杜弼檄文摧枯朽者易為力左再宿曰信詩招招舟子人涉卭否今晨非盛怒便道却他本作即長驅隱去聲几看平聲帆席雲山湧坐隅此記風緩行舟也八胡夏客曰末二寫舟行之景有興道此章前二句各句末假四句收風賦盛怒於便之口海賦掛帆席坐賈誼鵬賦止於隅雙楓浦鶴注此詩亦去潭時所作浦杜臆前注青楓為楚地名今知即雙楓方輿勝覽青楓浦在潭州瀏陽縣名勝志瀏水至縣南三十五里為青楓浦縣有八景楓浦漁樵其一輟棹青楓浦雙楓舊已摧自驚衰謝力不道去聲棟梁材浪足浮紗帽皮須截錦苔江邊地有主暫借上上聲天回此全是託物喻意言停舟楓浦見雙樹久摧自從衰謝以後人但驚其精力已竭又誰道未衰之先材堪棟梁乎今兀立江干浪高而楓頂微露似浮沙帽波平而皮蘚半呈如截錦苔其摧朽若此我欲問江邊地主借作上天浮槎庶不終棄於無用耶裏謝朓詩停驂我悵望輟棹子夷猶劉孝標書年髮謝庾子嵩目和嶠森森如干丈松施之大厦有棟梁之用截申函光曰浮紗帽句拙截錦苔猶水漲截蒲腰之西京雜記終南山有樹葉一青一丹其色如錦繡舉異苑烏傷陳氏未蘸著履徑上大楓樹巔了無危怖手辭訣家人而去飄聳輕越移時乃沒末句暗用其事詠懷二首此當是大厯四年春自潭州上衡州時作人生貴是男丈夫重天機未逹善一身得志行所為首為咏懷發端兩丈夫處世貴乎獨善大行各遂天機以傷已之出處妨耳列子榮啓期曰男尊女卑故以男為貴吾既得為男是二樂也孟莊子嗜欲深者天機淺綖注天機謂天時之機㑹即子乘勢待時之意此與莊子異解孟善身得志本子嗟余竟轗軻將老逢艱危胡雛逼神器逆節同所歸河洛化為血公侯一作卿草間啼西京復扶又切陷沒翠蓋䝉塵飛萬姓悲赤子兩宫棄紫微倐忽向二紀奸雄多是非公之轗軻由奸危所致二句領起兩假此條記世亂艱危之故胡雛指安祿山逆節指附賊者河洛西京兩都俱破也悲赤子悲號同於赤子去紫微𤣥肅二宗出奔也奸雄是非謂降將向背不常詩二紀厯兹辰孔融疏身為聖躬國為神器亂何遜三國志許劭曰治世之能臣世之奸雄本朝音潮再樹立未及貞觀去聲時日給在軍儲上官督有司高賢迫形勢豈暇相扶持疲苶茍懷䇿棲屑無所施先王實罪已愁痛正為去聲兹歲月不我與蹉跎病于斯此自述遭遇轗軻之狀儲代宗平河北逐吐蕃是本朝再立也當事迫於軍不暇扶持旅困此亦時勢使然無足責者但已懷濟世之略而無從一施有負先朝罪已之意用是愁痛耳今歲月蹉跎尚何望乎夢弼注先王罪已謂肅宗即位詔書痛自刻責疲恭孱弱貌棲棲屑屑謂奔走道途夜看平聲酆城氣回首蛟龍池齒髮已自料意深陳苦吳本作昔詞末自寫已懷反應起首得志行所為意唯酆城劍氣池水蛟龍言壯志猶存而身老不復可為有陳詞見意而已此章起結各四句中間各十二句邦危壞法則聖逺益愁慕飄颻桂水遊悵望蒼梧暮上章厯記世事此則專叙行踪也水法制既壞則太平難見矣故有聖逺愁暮之歎涉桂而望蒼梧傷去聖年逺也前二承上貞觀後二起下南遊雖淮南子被服法則漢章帝詔去聖久逺思𤣥賦遊娛以自樂兮豈愁慕之可懷與元和郡國志桂江一名灕水經臨桂縣東朱注灕水湘水同出今桂林府興安縣海陽山灕南流而湘北流灕水又名桂水公時未嘗至桂林而此又言飄颻桂水遊他詩又云桂江流向北滿眼送波濤蓋湘水自臨桂而來亦得稱桂水也梧山海經長沙零陵古者總名其地為蒼潛魚不銜鈎走鹿無反顧皎皎幽曠心拳拳異平素衣食相拘閡五慨切朋知限流寓風濤上上聲春沙千刋作十里侵一作浸江樹逆行值陳作值一作小吉日時節空復扶又切度井竈任塵埃舟航煩數色角切具牽纒加老病瑣細隘俗務萬古一死生胡為足名數此述舟行窮迫之况幽言潛魚走鹿皆知見幾逺害我亦本有曠之心今拳拳屈身于人而異於素志者祗為衣食所驅明知逺隔耳江濤逆行衡為上水也吉日謂清明令節井竈逺離舟航屢涉以老病之身而嬰心俗務能免窮途生死之患乎杜臆萬古之中碌碌死生亦何足當人間名數正與前章丈夫語相應或云萬古同歸一死何必取足於名數乎文賦若游魚銜鈎而出重淵之深左傳鹿死不擇音鋌而走險曠朱云以潛魚走鹿况已之避難奔走不得遂生平幽之志陶潛詩揮觴道平素後後虞詡傳願寬輿䇿勿令有所拘閡處鮑照詩催促時節過陶詩井竈有遺多憂汙去聲桃源拙計一作計拙泥去聲銅柱未辭炎瘴毒擺落跋涉懼虎狼窺中原焉於䖍切得所厯住葛洪及許靖避世常此路賢愚誠等差此兹切自合受杜臆作合受一作受合一作愛各馳騖羸病且如何魄奪針灸音救屢叶去聲擁滯童僕慵稽留篙師怒終當掛帆席天意難告訴此述前往衡山之意今杜臆公水宿詩欲訪武陵溪不得一經其地故託云恐汚桃源也乃計拙而滯銅柱不辭炎瘴不懼跋涉蓋以虎狼方橫即今所厯未可便住將學葛許之避世矣又度賢不如古人則合受此馳騖耳難贏病針灸則身困擁滯稽留則人倦掛帆乘風則天測此假備陳中途偃蹇情狀許銅柱注見本卷江葛洪為勾漏令後止羅浮山蜀靖傳孫䇿來渡走交州以避其難太守士燮厚加敬待王朗與靖書周遊江湖以暨南海厯觀彞俗可謂遍矣張載酒賦雖賢愚之同好不揚雄曰方其有事則聖賢馳騖不足甫靈樞經針所為灸之所宜扁鵲有針灸玉龍賦皇諡有針灸經曰林易行者稽留晉陽秋謝尚收涕告訴南為祝融客勉强區兩切親杖屨結託老人星羅浮展衰步末欲訪道衡山遙應前章未逹善一身意盧注衡山有祝融峯董鍊師在焉故思一親其杖屢耳老人星在南極羅浮山為仙洞蓋將託此以求長年此章首尾各四句中間各十六句浮茅君內傳羅浮之洞周圍五里名朱明曜真之天羅山記二山合體謂之羅浮在增城博羅二縣之境神仙所居金大鏞曰出處各安天命故曰天機首假為兩章總冒下言欲濟時而不能當藏身以逺去章法照應甚明心兩詩悽惋沈鬱蓋愁苦之衷藴結而成者非如爽快意之詞軒豁易見也必再四尋繹始見其愷至深長耳杜員外兄垂示詩因作此寄上附郭受詩郭公必先有詩寄故受作此以答但原詩未載集中新詩海內流傳遍舊德朝音潮中一作中朝屬望勞郡邑地卑饒霧雨江湖天濶足風濤松花一作醪酒熟旁看平聲醉蓮葉舟輕自學操春興去聲不知凡幾首衡陽紙價頓能高首尾贊杜公詩才中四記舟次景事舟少陵詩名久為朝中推重今於霧雨風濤中酌酒乘興到詩成能令衡陽紙貴矣八句只如一句酒裴硎傳竒酒名松醪春元化記崔希真獻父老松花邵注蓮葉舟小舟也太乙真人乘蓮葉舟揚莊子津人操舟若神又操舟可貴學乎世說庾闡作都賦成人競傳寫都下為之紙酬郭十五判官受判唐詩紀事郭受大厯間為衡陽官據此當是發潭以後未到衡州時作黃鶴謂公在衡郭在潭誤矣才微歲晚一作老尚虛名卧病江湖春復扶又切生藥裹關心詩總廢花枝照眼句還成只同燕平聲石能星隕自得隋一作隨珠覺夜明喬口橘洲風浪促驚帆何惜片時程上四自謙下四懷郭喬藥裹承卧病花枝承春生燕石比已詩隋珠贊郭詩口橘洲去衡不逺且風浪甚速行當掛帆一至耳地燕石係宋人事并綴以隕石於宋言已詩如星隕於不見光彩然兩事牽合在一句中不如對語自然花古詩虛名復何益之梁武帝春歌階上香入懷庭中照眼韓非子宋愚人得燕石於梧臺之側藏之以為大寶周客聞而觀焉掩口笑曰此燕石也與瓦甓等左傳隕石於宋五隕星也搜神記隋侯出行見大蛇被傷中斷使人以藥封之歲餘蛇銜明珠以報珠盈徑寸夜有光明可以燭室世說葛稚川目陸平原之文如𤣥圃積玊無非夜光杜臆喬口乃長沙入境橘州已近郡皆去衡所經者集中酬答諸詩皆據來詩和意語無泛設如此章首句酬舊德次句酬江湖三四酬新詩春興五六酬衡陽紙價七八酬天濶風濤及蓮葉操舟逐句酬答却能一氣貫注所以為佳也末句驚帆一作繫舟望嶽當是大厯四年春晚自潭之衡州作徐水經注衡山山海經謂之岣嶁山南嶽也靈期南嶽記南嶽周圍八百里回雁為首嶽麓為足元和郡國志衡嶽廟在衡州衡山縣西三十里南嶽配朱鳥秩禮自百王􅣐吸領地靈鴻一作澒洞半炎方邦家用祀典在德非馨香巡狩何寂寥有虞今則亡從南嶽叙起志祀嶽之典其來已久因思帝舜南巡之事漢天文南宫朱鳥權衡索隱南宫赤帝其精為朱鳥於湘中記度應權衡位值離宫故曰衡山􅣐書柴望秩山川秩禮二字出陳壽魏志江淹詩吸鵾雞鳴注􅣐吸猶俄頃也鴻顔延之詩邑社總地靈祀講德論洪洞朗天淮南子濛澒洞莫知其門書典無豐於昵五又黍稷非馨明德惟馨舜典月南巡狩至於衡嶽洎一作汩吾隘世網行邁越瀟湘渴日絶壁出漾舟清光旁祝融五一作三峰尊峰峰次低昻紫蓋獨不朝音潮爭長子兩切嶫相望叶平聲恭聞魏夫人羣仙夾一作來翺翔有時五峰氣散風如飛霜此記南嶽之景恭綖注洎吾四句述過嶽情事祝融四句言嶽前形勢聞四句言嶽內神竒隘世網憶貶官竄身也世杜臆散風如飛霜說得神靈颯然東支遁詩外身解網詩行邁靡靡水經注衡山南二面臨映湘川自長沙至此江湘七百里中有九向九背故漁歌曰帆隨湘轉望衡九面渴日謂旱日舊注渴日如渴虹渴雨之渴軒拾遺記皇娥歌曰乘桴輕漾著日旁長沙記衡山翔聳拔九千餘丈尊卑差次七十二峰最大者五芙蓉紫蓋石廪天柱祝融為最高去樹萱録嶽之諸峰皆朝於祝融獨紫蓋一峰勢轉東夬嶫山峻貌字庾信詩恭聞正直祀女南嶽魏夫人傳人名華存賢安晉司徒魏舒之適南陽劉文生二子夫人幼而好道味真耽𤣥常服胡麻散茯苓丸忽太極諸真人授以仙經三十三卷又授黃庭內景經令晝夜存念遂得冥心齊靜真靈纍感凡在世八十三年以晉成帝咸和九年託劍化形而去北詣上清宫王闕之下諸真君授夫人玉札金文位為紫虛元君領上真司命南嶽夫人比秩仙公牽迫限一作恨修途未暇杖崇岡歸來覬命駕沐浴休玉堂三嘆問府主曷以贊我皇牲璧忍一作感衰俗神其思降祥末以祀嶽之意作結忍封內山川府主當祭問何以仰贊皇猷其牲璧之薦如衰俗之循行故事而謂神其降康乎是當精誠以格之矣主玊堂指神廟府主指衡山太守前梓州詩逹書賢府䕫州詩城中賢府主可證朱注解作洞府之主即指嶽神下句牲壁忍衰俗幾於責備神靈矣於理不合此章前後各八句中間十二句吳郡論玉堂對霤石室相距注云皆仙人所居春記一唱而三歎昭明太子詩百代歸我皇周禮官以玉作六器以禮天地四方皆有牲幣各放其器之色所謂牲璧也據此南方應用赤璋書作善降之百祥鍾惺曰岱宗喬嶽若著山水清妙語及景狀竒壯語便是一邱一壑文人登臨眼孔須胸中典故筆下雍容有郊壇登歌氣象始為相稱以黃生曰衡華岱皆有望嶽作岱以小天下立意華問真源立意衡以修祀典立意㫖趣各别而此作尤見本領文士無其學儒者無其才故須兩讓之嶽麓山道林二寺行蔡興宗年譜編在大厯四年春初到潭時詩云春日暄暖正其時也里元和郡國志嶽麓山在長沙縣西南隔湘江六方輿勝覽自湘西古渡登岸夾徑喬松泉澗盤繞諸峯叠秀下瞰湘江嶽麓寺在山上百餘級又曰道林寺在嶽麓之下距善化縣八里玊泉之南麓山殊道林林壑爭盤紆寺門高開洞庭野殿腳插入赤沙湖五月寒風冷佛一作拂骨六時天樂朝音潮香爐地靈步步雪山草僧寶人人滄海珠塔劫一云當作級宫墻英華作壇壯麗敵香一作石厨松道清涼樊作崇俱蓮花樊陳俱作池交響共命鳥金榜雙回三足烏首叙兩寺勝景首聨分提寺門應嶽麓野殿應道林洞庭赤沙遙相掩映也山深故夏寒佛骨蓋遺迹天樂乃梵音也吳論曰步步曰人人曰壯麗敵曰清涼俱曰交響曰雙回皆並摹二寺之勝述異記荆州青溪諸山山洞往往有乳窟窟中多玉泉交流隋煬帝集開皇十二年十二月智顗禪師至荆州創立玉泉寺南都賦溪壑錯繆而盤紆嶽陽風土記赤沙湖在華容縣南夏秋水漲與洞庭湖通胡夏客曰赤沙湖今名蠡湖在龍陽縣西跨沅江縣界阿彌陀經極樂國土常作天樂晝夜六時天雨曼陀羅華姚察遊明慶寺詩地靈居五淨山幽寂四禪楞嚴經雪山大力白牛食其山中肥膩香草此牛惟飲雪山清水其糞微細可和合㫋檀起信論一真如是覺性名佛寶二真如有執持義名法寶三真如有和合義名僧寶譬喻經王舍國人欲作寺錢不足入海得名寶珠洙曰滄海珠言性圓明而無瑕纇香景福殿賦嗟瓌瑋以壯麗維擘經上方有國佛號積如來以一鉢盛香飯恆飽衆生陀涅槃經有國多清涼風能除一切鬱蒸之惱阿彌經極樂國土有七寶池池中蓮花大如車輪又有伽陵頻伽共名之鳥晝夜六時出和雅音寶藏經雪山有鳥名為共命一身二頭識神各異同共報命曰共命神黃生注金榜回烏猶云日射黃金榜三足烏即日也異經西方有宫五色黃門金榜而銀鏤虞淮南子目中有踆烏注三足烏也抱朴子有至孝三足烏集其庭此詩所用主前說方丈涉海費時節𤣥圃尋河知有無暮年且喜經行近春日兼䝉暄暖扶飄然斑白身一作將奚適傍去聲此烟霞茅可誅桃源人家易音曵制度橘洲田土仍膏腴潭府邑中甚淳古太守去聲庭內不喧呼此記其山川風俗之美近仙界逺而難求不若此地之而可即其間構廬便易田産肥饒民淳事簡即此是方丈𤣥圃矣天台賦涉海則有方丈蓬萊洙曰𤣥圃乃崑崙也張騫贊禹本紀言河出崑崙騫窮河源烏覩所謂崑崙者乎法華經佛子住此地則是佛受用常在於其中經行及坐卧西楚辭誅鋤草茅以全生乎渚寰宇記橘洲在長沙縣南四里江中時有大水洲皆沒此洲獨存湘中記昭潭無底橘洲浮注漢書田蚡傳田園極膏腴漢地理志為九州膏腴顔腹之下肥曰腴故取喻云西唐書潭州長沙郡屬江南道為中都督府昔遭衰世皆晦迹今幸樂音洛國養微軀依止老宿亦未晚富貴功名焉於䖍切足圖久為謝一作野非客尋幽慣細學何當作周顒免興去聲孤一重平聲一掩吾肺腑山鳥山花英華作仙鳥仙花共從黃魯直一作吾友于宋公原注宋之問放逐曾音層題壁物色分留待從英華一作與老夫末欲卜居養生於此也運晦迹思古人樂國指長沙老宿寺僧之高年者靈遊山周顒好佛故並舉以自方一重一掩言山形稠叠肺腑比其關切友于言其親愛物色分留謂題詠以踵前賢此章十二句起下二假各十句夕樂國見上㑹異苑初錢塘杜明師夢有人入其館是靈運生於稽旬日而謝𤣥亡其家以子孫難得送靈運於杜治養之十五方還都故名客兒鍾嶸詩品謝客為元嘉之雄宋書靈運為永嘉太守性好山水嘗於南山伐木開徑直至臨海青周顒注已别見宋之問詩山一重兮悲一重衛傳吾幸得肺腑待罪行間劉向傳臣幸得託肺腑顔注肺腑相附著猶言心膂庾信詩山花即眼前梁昭明太子書清風朗月思我友于南史劉湛傳友于素篤皆截用書經語宋之問傳睿宗立詔流欽州欽州屬嶺南之問道經長沙故有詩題寺壁楊升菴云宋詩今已失傳王嗣奭曰全篇一氣抒寫如珠走盤此排律化境七排類編中前人何以不載耶奉送韋中丞之晉赴湖南鶴注舊史大厯四年二月以湖南都團練觀察使衡州刺史韋之晉為潭州刺史因是徙湖南軍於潭州此當是在衡州寄送韋者寵渥徴黃漸權宜借冦頻湖南安背音悖水峽內憶行春王室仍多故一作難蒼生倚大臣還將徐孺榻一作子處處待高人上四送韋之詞下四勉韋之意南徴黃漸漸將內召也借冦頻頻刺衡潭也湖安於背水是望其新政峽內猶憶行春乃思其遺澤多難之際人倚大臣正當設榻求賢以圖治安之計沈約集階緣寵渥徴前漢黃霸為潁川太守户口歲增治行為天下第一守京兆尹後漢冦恂為潁川太守盜平又拜汝南太守潁川冦賊復羣起恂從帝至潁川百姓遮道曰願從陛下復借冦君一年盧注湖南形勢背水地險接獠非中丞不能安之嘗鶴注韋嘗峽內作守水後漢計荆傳荆遷桂陽太守行春到耒陽縣背見韓信傳多故指吐蕃言湘江宴餞裴二端公赴道州鶴注此當是四年夏作若五年公已去潭而之衡矣四朱注浯漢觀唐賢題名河東裴虬字深源大厯年為著作郎兼侍御史道州刺史唐書木紀大厯二年十二月道州刺史崔渙卒虬蓋代渙為刺史舒元輿御史記中丞為端長顧注臺端之長也白日照舟師朱旗散廣川羣公餞南伯肅肅秩初筵首叙湘江設餞州舟師朱旗迎候儀從南希曰王制二百一十國為州有伯道州在南故曰伯王粲詩方舟順廣川筵詩賓之初鄙人奉末眷佩服自早年義均骨肉地懷抱罄所宣盛名富事業無取愧高賢不以喪去聲亂嬰保愛金石堅次叙平日交情名杜臆公推裴為前輩故云佩服自早年盛四句正平生所佩服而欲罄懷以相質者末眷䝉眷顧也上林賦臣楚國之鄙人也無綖注奉淮南子高賢稱譽已漢名氏詩壽無金石固計拙百寮下氣蘇君子前㑹合苦不久哀樂音洛本相纒交遊颯向盡宿昔浩茫然促觴激百慮掩抑淚潺湲此叙聚散不常也激百寮指候送者君子指裴侍御交游凋謝故心而淚零吳均詩掩抑摧藏張女彈兮楚辭橫流涕潺湲熱雲初集從英華一作集曛黑缺月未生天白團為去聲我破華燭蟠長烟鴰鶡一作鶡鷃一作鴰鶬催明星解袂從此旋上請減兵甲下請安井田永思病渴老附書逺杜臆恐當作峴山顛此宴别而致丁寧也宴自日而夜餞飲已久既而星殘解袂則畢將散矣朱注道州先經西原蠻冦掠元結為守稍得安戢裴繼元之後故以裁兵安農告之此當是靖亂之要道也此章四句起十二句結中二假各八句謝靈運詩朝遊窮曛黑古詩三五明月滿四五蟾缺何遜詩逶迤搖白團白團指扇乃古樂府中婦對華燭即朱注鴰鶡二烏名鴰鶬鴰鶡鶡鴠楚辭炙鴰蒸鳬此鴰也月令孟冬之月鶡鴠不鳴注求旦之鳥舊注引字林鶷􅗾似伯勞而小頗混詩明星有爛王嗣奭曰詩云盛名富事業無取愧高賢言所以致功名者一有愧於高賢則無足取焉此即孔孟之所鄙薄管仲者秦漢以來唯董子一發之而又見於公非聞道安得有此語耶哭韋大夫之晉鶴注此當是大厯四年夏作大題云大夫則韋在湖南加御史夫矣韋卒於潭州公在衡而作詩哭之悽愴郇須倫切瑕邑一作地差此池切池弱冠去聲年丈一作大一作士人叨禮數文律早周旋臺閣黃圖裏簪裾紫蓋邊尊榮真不黍端雅獨翛然首叙交誼相郇瑕記地弱冠記時禮數周旋契之情黃圖昔在京紫蓋今在衡尊榮稱其位端雅重其品河左傳晉人謀去故絳諸大夫曰必居郇瑕氏之地注東解縣西北有郇城一統志在今平陽府猗氏地君曲禮二十曰弱冠文賦普詞條與文律左傳與周旋江總賦覽黃圖之棟宇此沈約集陪龍駕於伊洛侍紫蓋於咸陽指紫微華藎則指紫蓋峯衡山七十二峯之一時韋先為衡州刺史也貢喜音容間去聲馮招疾病纒南過平聲駭倉一作蒼卒昌活切北思去聲悄聨綿鵩鳥長沙諱犀牛蜀郡憐素車猶慟哭寶劔欲高懸次叙哭韋之情用貢喜喜韋登進馮招韋方招公在衡韋在潭故聞訃之辰自南而思北賈生鵩鳥比其刺潭李冰石犀比其守蜀素車用范式事懸劍用季札事此存亡死生之悲首絶交論王陽登位貢公喜日左思詩馮公豈不偉白不見招沈佺期詩北思悠哉梁簡文帝詩春思坐聨綿焉後漢書范式字巨卿少與張劭為友劭死式夢而赴劭葬日其母望見素車白馬號哭而來母曰必巨卿也式乃修墓種樹而去掛劍徐君墓注已别見漢道中興盛韋經亞相去聲傳冲融標世業磊落映時賢城府深朱夏江湖渺霽天此惜其生不重見𤣥城府韋治潭州江湖公客衡州也韋賢少子成復以明經為相故曰亞相府南齊書張融世業清貧延後漢書龎德公未嘗入城陸機瓜賦迎朱夏而自宋之問詩開簾延霽天綺樓關一作高樹頂飛旐泛堂前帟音繹幕旋從海鹽劉本一作疑非風燕笳簫咽一作急暮蟬興去聲殘虛白室跡斷孝亷船此痛其殁後淒涼樓興殘公不復往跡斷韋不復來也者古詩西北有高交疏結綺忩綺樓蓋韋平日所居舊注以為奠樓恐非詩邵注旐銘旌也寡婦賦飛旐翻以啓路王融曲水序緹帷宿置帟幕宵懸周禮注在旁曰惟在上曰幕孝憤賦棄虛白之室歸長夜之臺亷船注别見前童孺交遊盡喧卑俗事牽老來多涕淚情在强溪兩切詩篇誰繼方隅理朝音潮難將去聲帥權春秋褒貶例名器重雙全末致哀挽之意童孺交遊應上差池弱冠名器雙全應上尊榮不黍孺此章八句者三假六句者兩假蔡雍胡根碑嗟童之夭逝兮褒慮思道集外靜方隅內康庶績市穀梁傳序一字之寵踰華衮之贈片言之貶辱過朝之撻左傳惟名與器不可以假人雙全謂名不愧其實江閣卧病走筆寄呈崔盧兩侍御崔乃崔大渙盧乃盧十四弟也江鶴注大厯五年潭州有臧玠之亂公已去潭則閣不在潭州也詩云長夏想為情又云滑憶雕菰飯則是四年秋作意江閣在潭近境故四年之秋五年之夏皆在焉客子庖厨薄江樓枕席清衰年病秪瘦長夏想為情滑憶一作喜雕胡飯香聞錦帶羮溜匙兼暖腹誰欲致一作覔杯罌上四江閣卧病下四寄呈崔盧想為情起誰致為情猶云用情庖厨薄起飯羮朱注以溜匙承飯暖腹承羮恐蓴性不能暖腹吳論以溜匙承羮暖腹承飯據前詩正想滑溜匙原指飯言不當指羮顧注溜匙總承飯羮暖腹指酒兼欲得杯罌也此說軗妥其秪古與祗通但也林洪山家清供云雕菰飯似蘆米黑故云波漂菰米沈雲黑暴乾礱洗既香而滑故又云滑憶雕菰飯朱注錦帶即蓴絲本草作蓴或謂之錦帶生湖南者最美此詩錦帶與秋菰並舉知必為蓴也薛夢符以為錦帶花謬顧注臨湘縣有蓴湖在縣東潭州留别杜員外院長附韋迢詩江畔長沙驛一作澤相逢纜客船大名詩獨步小郡海西偏地濕愁飛鵩天炎畏跕鳶去留俱失意把臂共澘然上四記乍逢之迹下四叙惜别之情用大名指杜小郡自謙飛鵩用賈誼事傷杜在潭跕鳶馬援事憐已往韶去留二字承此絶晉書王坦之字文度與郗超俱有名時人語曰盛德倫郗嘉賓江東獨步王文度賈誼傳誼為長沙王太傅長沙卑濕俱自傷悼乃為鵩賦馬援傳吾在浪汩西里時下潦上霧毒氣薰蒸仰視飛鳶跕跕墮水中潭州送韋員外迢牧韶州鶴注當是大厯四年秋作唐書世系表韋迢終嶺南節度行軍司馬韶州屬嶺南道炎海韶州牧風流漢署郎分符先令望同舍有輝光白首多年疾秋天昨夜涼洞庭無過雁書疏去聲莫相忘上四送韋下四望韋輝分符承州牧同舍承署郎公亦曾為郎官故曰有光趙注自洞庭而往此間無過雁以寄書而彼中書信却不可忘也各分其半右留京師左以與之漢紀與郡守為符舍詩令聞令望同即見直不疑傳纎秋在昨夜詩作於立秋次日矣宋上梁主疏聲聞書疏早發湘潭寄杜員外院長附韋迢詩史鶴注湘潭屬潭州舊後漢湘南縣地吳分湘南立衡陽屬衡陽郡隋廢郡縣屬潭州天寶八載移治於洛口因改為湘潭北風昨夜雨江上早來涼楚岫千峰翠湘潭一葉黃故人湖外客白首尚為郎相憶無南雁何時有報章上四咏景下四叙情之峯翠葉黃此秋時景亦雨後景也杜有白首多年疾句故韋云故人湖外客白首尚為郎杜有洞庭無過雁之句故韋云相憶無南雁何時有報章前後贈答三詩塤箎相應如此白首為郎用馮唐顔駟事非顔延之和謝監詩盡言報章聊用示所懷贈韋韶州見寄鶴注此當是大厯四年秋韋發湘潭而公酬於潭州也養拙江湖外朝音潮廷記憶疏深慚長子兩切者轍重平聲得故人書白髮絲難理一作並新詩錦不如雖無南過雁看取北來魚上四感韋交情下四謝韋寄詩良江湖作客朝士久忘韋枉轍而又寄書情厚矣白髮自憐新詩稱韋南雁自道北雁指韋古人以魚雁比書坰雁峰高故不去湘水北流故可來吳論韋詩上四句虛故不答江湖白髮答故人白首二句南雁北魚答南雁報章二句陳平傳門外多長者車轍古詩相去萬餘里故人心尚爾樓上此當是潭州所作詩末云身在五湖南可見此及下章並依蔡氏編次天地空搔首頻抽白玉簪皇輿三極北身事五湖南戀闕勞肝肺掄一作論材愧把柟亂離難自救終是老湘潭此詩登樓而感懷也孤樓之上俯仰天地徒然搔首而抽簪者正以皇輿在北身事在南故也戀闕而不才淪棄既無補於皇輿亂離而終老湘潭又無濟於一身此所以搔首踟蹰耳西京雜記漢武帝取李夫人玉簪搔頭鍾㑹賦散髮抽簪杜臆白玉簪蓋朝冠所用屢思入朝而中止故云頻抽陸機論旋皇輿於夷庚反帝座於紫闥極地有四極皇輿在東西南之北故云三極與繫辭三不同舊注誤史記索隱具區洮滆彭蠡青草洞庭共為五湖公律詩多在首聨領起亦有在三四領下者如七律萬古雲霄一羽毛領下伊吕蕭曹三分割據紆籌䇿領下運移身殲是也五律此詩皇輿三極北領下戀闕掄材身事五湖南領下亂離湘潭是也逺遊詩言江濶浮高棟必潭州江閣所作此當與樓上詩同時蓋大厯四年楚辭有逺遊篇江濶浮高棟晉作凍雲長出斷山塵沙連越嶲音水風雨暗荆蠻雁矯銜蘆內猿啼失木間敝裘蘇季子厯國未知還此登江樓而歎逺遊也上四言景是賦下四言情兼比日色映江故水光浮棟嶺腰雲截故斷際露山此見晴而忽雲也遙瞻越嶲則塵沙連接近望荆蠻則風雨暗迷此見隂而且雨也雁銜蘆前行已倦猿失木無處可依故下有裘敝未還之感嶲朱超詩高棟響行雷陽陳子昻詩離亭風雨暗越郡今四川行都司華國志司馬相如開僰道通南中置越嶲郡而荆蠻即荆州淮南子雁從風而飛以愛氣力銜蘆翔以避弋繳張華賦又矯翼而增逝徒銜蘆而避繳失梁簡文帝詩雁去銜蘆上猿戲繞枝來淮南子猿狖木而擒於狐狸非其處也千秋節有感二首此大厯四年八月潭州作月舊書𤣥宗紀開元十七年八癸亥上以降誕日宴百僚於花蕚樓下百僚表請每年八月十五日為千秋節王公以下獻寶鏡及承露囊天下諸州咸令宴樂休假三日仍編為令通鑑又移社日就千秋節自罷千秋節頻傷八月來先朝音潮常宴㑹壯觀去聲已塵埃鳯紀編生日龍池塹劫灰湘川新涕淚秦樹逺樓臺寶鏡羣臣得金吾萬國回衢尊不重平聲飲白首獨餘哀首章叙崩後節日乃傷今思昔之感在六句作截壯賜宴之事雖編於帝紀而龍池王氣久已銷亡不但觀塵埃也四句申千秋節罷今遙望秦中樓臺之下得寶鏡者舊臣凋謝為金吾者各國散歸獨留白首書生淚滴湘川而已六句申八月頻傷注封禪文此事天下之壯觀鳯紀注見三卷龍池見十七卷高僧傳漢武帝穿昆明池悉是灰墨後有胡僧云此天地劫灰之餘陰鏗詩雲裏望樓臺張說詩寶鏡頒神節淮南子聖人之道其猶中衢而致樽耶過者斟酌多少不同而各得其所宜御氣雲樓敞含風綵仗高仙人張內樂王母獻宫桃羅襪紅蕖艷金羈白雪毛舞階銜壽酒走索背音佩黃生欲作骨秋毫聖主他年貴邊心此日勞桂江流向北滿眼送波濤次章叙生前節日乃樂極悲來之感在八句作截之樓受賀綵仗迎風於是梨園奏樂大真獻桃舞階御白馬銜酒前來走索之宫人紅蕖高露當年可謂恣情尊貴矣豈知邊憂即從此日而生乎至今日送波濤不勝北望傷神也詩邊心此日勞猶云芙蓉小苑入邊愁王融曲水亭序時乘既位御氣之駕翔焉或以雲樓為樓名含風為殿名非也考㑹要千秋節宴在勤政花蕚諸樓不在含風殿且紫雲樓在曲江起於太和中於此無預吾宋之問詩寒輕綵仗外豫開元傳紀帝謂高力士曰昨夜夢遊月宫諸仙娛以上清之樂寥亮清越之音非人間所聞也力士請名曰紫雲曲青漢武內傳王母令侍女索桃七枚大如鴨子形色正以四枚啖帝自食其三人洛神賦陵波微步羅襪生塵黃生注羅襪紅蕖艷後詠弓足者妍雅無及此語當時婦人裙必曵地故罕見篇詠此亦因走索之妓結束有别故特拈出耳紅蕖指宫鞋白馬篇白馬飾金羈連翩西北馳舞通鑑明皇教舞馬百匹銜杯上壽唐志明皇千秋節馬於勤政樓下西京賦跳九劍之揮霍走索上而相逢通典注舞絙者兩妓女各從一頭上行於繩上相逢比肩而不傾玉海唐實録開元二十四年八月千秋節御廣運樓宴羣臣奏九部樂內出舞人繩妓頒賜有差此言兩人背走索上不爽秋毫也黃注以繩掛獸足曰罥秋毫言所緣之少土門詩微徑緣秋毫此在索上非罥字不足以發其意杜臆桂江乃潭州所見之水王嗣奭曰頻傷八月來非傷明皇崩逝也明皇席全盛而縱荒淫致賊臣叛逆干戈不息肅宗繼之非無生日而憂亂不暇奚知樂生乎故公之感有二一感倐忽盛衰之異故云先朝常宴㑹壯觀已塵埃一感昔年之樂召後日之悲故云聖主他年貴邊心此日勞而已之流離因之故云湘川新涕淚又云滿眼送波濤奉贈盧五丈參謀琚原注時丈人使自江陵在長沙待恩㫖先支率錢米鶴注此大厯四年秋潭州作豫唐書元帥副元帥府有行軍參謀關軍中機密恭惟同自出妙選去聲異高標入幕知孫楚披襟得鄭僑丈人藉才地門閥冠去聲雲霄老矣逢迎拙相於契託饒從盧叙起親誼交情官序才地俱見於此秋孫楚切參謀鄭僑聘晉比使長沙王褒頌恭惟春惟思也朱注同自出蓋參謀之母與公毋皆崔氏也黃鶴引公祖母盧氏非左傳我之所自出爾雅男子謂姊妹之子曰出標語林琅琊王鎮廣陵妙選僚佐披世說李元禮高自持王僧孺序道合神遇投分襟左傳季札聘鄭見子産如舊相識齎世說王恂自計才地必應在已朱注前漢朱博傳閥閲詣府車千秋傳千秋無閥閲勞注閥積功也閲所經也唐六品以上通用烏頭大門又曰表揭又曰閥閲義謝云表揭閥閲是也俗呼為櫺星門詩言盧氏積纍日月立功而致表揭高於雲霄也孔融書岸㥽廣堂舉杯相於相於猶云相與賜錢傾府待爭米駐一作貯船遙鄰好去聲艱難薄氓一作氓心杼柚焦客星空使去聲伴寒水不成潮此記支率錢米事朱注時必有長沙錢米應輸江陵者盧為之請㫖支給本郡也潮鄰指潭州客星自謂使者指盧民困莫輸如寒冰涸小通鑑杜弼作檄移梁朝曰連結姦惡斷絶鄰好杜詩東大東杼柚其空駱賓王詩流星疑伴使臆潮極寒則涸俗謂之凍殺潮素髮乾音干垂領銀章破在腰說詩能纍上聲夜醉酒或連朝藻翰唯牽率湖山合動搖此長沙遇盧情事素髮銀章自謂老年帶官說詩四句言一時詩酒興豪所謂相於契託也白帖漢世有鞶囊者佩在腰間謂之綬囊朱注隋唐以後官不佩印止有隨身魚袋此云銀章破在腰蓋舉銀魚言之當時金銀魚謂之章服左傳牽率老夫謝瞻詩牽率酬嘉藻時清非造七到切次興去聲盡却蕭條天子多恩澤蒼生轉寂寥休傳鹿是馬莫信鵩如陳作為梟此慨時事以勉盧指天子施恩而生民轉困者以朝有姦佞外多掊克耳鹿為馬如魚朝恩是也鵩鳥如梟若臧玠是也曰休傳莫信故婉其詞以隱諷耳梟史記趙高持鹿獻於二世曰馬也鵩鳥賦序鵩似不祥鳥也未解依依𬒮還斟泛泛瓢流年疲蟋蟀體物幸鷦鷯孤俗作辜負滄洲願誰云晚見招末惜别而自叙已懷鷦疲蟋蟀謂行年已晚幸鷯謂一枝暫棲負滄洲不能遁世誰見招無復用世矣所謂老拙逢迎也此章八句起下四假各六句江總詩共此依依情無奈年年别齊注泛者成而浮澤泛泛然周禮酒有五齊一曰泛宋之問詩常是惜流年促詩蟋蟀在堂歲聿其暮古詩晨風懷苦心蟋蟀傷居莊子鷦鷯巢林不過一枝李陵書陵雖孤恩漢亦負德滄揚雄檄虛賦世有黃公者起於洲精神養性與道漂流惜别行送劉僕射判官詩云扶病相識長沙驛劉判官蓋括馬至此與公相晤而贈之以詩當是大厯四年秋作此朱注唐制僕射下宰相一等時蓋劉之主將加官劉其屬下判官也詩見陳浩然又見文苑英華聞道去聲南行市去聲駿馬不限匹數軍一作官中須襄陽幕府天下異主將去聲儉省憂艱虞秪收壯健勝平聲鐵甲豈因格鬬求龍駒叙劉君至潭之由起南行指判官主將指僕射處並題而今西北自反胡騏驎蕩盡一匹無龍媒真種上聲在帝都子孫未落東南此從英華他本作西南隅向非戎事備征伐君肯辛苦越江湖江湖凡馬多憔悴衣冠往往乘蹇驢此言南行車馬之難西北指安史吐蕃東南指襄陽長沙凡馬皆疲何况龍種乎義鶻行以老鶻為其父此詩以馬駒為子孫語近詼諧必徐幹中論遊帝都梁公富貴於身疏號令明白人安居俸錢時散士子盡府庫不為去聲驕豪虛以兹報主寸心赤氣却西戎回北狄羅網羣馬一作烏籍馬夕夕意一作氣在一作用驅除一作馳出金帛此見襄陽主將之賢愛梁公即梁崇義上四言儉省而人下四言憂虞而敵愾守淮南子見之明白處之如玉石帛黃香傳香為魏郡分俸祿賞賜出贍貧者出金購馬也劉侯奉使去聲光推吐雷切擇滔滔才略滄溟窄杜陵老翁秋繫音計船扶病相識長沙驛强豈兩切梳白髮提胡盧手把一作兼菊花路旁摘九州兵革浩茫茫三嘆聚散臨重平聲陽當杯對客忍流涕一作涕淚一本有君字不覺老夫神內傷此記相逢惜别之意歡劉奉使承上兩假光推擇不負所使也提壺把菊宴而作離筵故黯然神傷耳各此章首假六句末假十句中二假八句唐之潭州即漢長沙郡朱鶴齡曰唐志襄州襄陽郡乃山南東道節度使所治廣德初梁崇義據襄州代宗不能討因拜山南東道節度至建中元年始為李希烈所誅則梁公即崇義也史稱其以地褊兵少法令最治折節遇士自振襄漢間觀此詩所稱襄陽幕府天下異主將儉省憂艱虞又曰梁公富貴於身疏號令明白人安居其語正與唐志相合匹盧元昌曰唐初得突厥馬二千匹又得隋馬三千令太僕張萬歲葺其政貞觀至麟德中有馬七千餘萬自後馬政頗廢開元間以王毛仲領內外間廄使馬復蕃息安祿山陰選勝甲馬驅歸范陽肅宗時市馬於回紇多以羸馬充數後又括民間馬為團練馬唐之馬政遂不可復矣詩云西北及徒騏驎蕩盡感慨係之矣重平聲送劉十弟判官鶴注當是大厯四年秋在潭州作分源豕韋派别浦雁賓秋年事推兄黍人才覺弟優首假叙事世上二叙送别下二㸃兄弟之陶潛詩同源分流人易疏左傳范宣子曰昔丐祖自虞以上為陶唐氏在夏為御龍氏在商為豕韋氏在周為唐杜氏晉主夏盟為范氏蔡墨曰陶唐氏既衰其後有劉纍學擾龍於豢龍氏事孔甲以更豕韋之後盡月令季秋之月鴻雁來賓劉孝標書頃年事道容髮衰謝經過平聲辨豐劍意氣逐吳鈎垂翅徒衰老先鞭不滯留本支凌歲晚高義豁窮愁他日臨江待長沙舊驛樓次假言情吳上四承才優下四承别浦之劉之才氣英利如豐劍鈎故能先鞭用世不似已垂翅飄流也晚逢高義差慰旅愁但未知此别之後何時重㑹驛樓耳豐本支應分源歲晚應年事此章上四句下八句劍吳鈎注皆别見書後漢馮異傳始雖垂翅回溪終能奮翼澠池劉琨常恐祖生先吾著鞭毛詩本支百世車永與陸雲書豁然忘愁唐地志長沙縣屬潭州杜詩詳注卷二十二
