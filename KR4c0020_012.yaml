body:
  text: 杜詩詳注卷十二翰林院編修仇兆鰲撰題郪七積切原一作縣郭三十二明府茅屋壁顧注此廣德元年從梓州往閬州時作東唐志梓州治郪縣一統志廢郪縣在潼川州治明併入州州西一百里有漢廢郪縣故城盧注茅屋壁便見亷吏梗槩江頭且繫音計船為去聲爾獨相憐雲散灌壇雨春青彭澤田頻驚適小國一擬問高天别後巴東路逢人問幾賢首聨臨别之情次聨郪縣之景下皆憐郭之意應明府大才小試天意雖曰難知但有遺愛在民人情共稱述問天問人乃互應之詞夢搜神記文王以太公為灌壇令期年風不鳴條文王一婦人甚麗當道而哭問其故曰我泰山之女嫁為西海婦欲歸灌壇令當道有德廢吾行吾行必有大風疾雨文王覺召太公問之果有疾風暴雨從太公邑外過文王乃拜太公為大司馬陶潛傳潛為彭澤令公田悉令種秫曰令吾嘗醉於酒足矣妻子固請種粳乃使一頃五十畝種秫五十畝種粳此引灌壇彭澤乃借比縣令左傳楚文王戒申侯毋適小國之屈原有天問問幾賢問如郭賢者幾人乎奉送崔都水翁下去聲峽鶴注廣德元年在梓州作崔為都水使與公為甥舅故稱曰翁下峽將歸洛陽也舊注謂歸長安反紆途矣公詩即從巴峽穿巫峽便下襄陽向洛陽此可證也上唐書都水監使者二人正五品總河渠諸津監署無數涪音浮江筏鳴橈總發時别離終不久宗族忍相遺白狗黃牛峽朝雲暮雨祠所過平聲憑一作頻非問訊到日自題詩上四叙送崔下四記下峽親筏多橈響從行者衆别離不久公亦將出峽以族在京不忍遺棄故也峽畔祠前皆崔翁經過之地日杜臆經過之處有相知者在先憑翁問訊待將來到我自題詩以贈也胡夏客曰出峽之舟多以竹木之筏附於兩旁至今猶然邵注編竹為桴大者曰筏橈短棹也十道志白狗峽在歸州兩崖如削白石隱起其狀如狗黃牛峽在夷陵州石色如人牽牛之狀人黑牛黃宋玉高唐賦朝為行雲暮為行雨此即巫山神女祠也跡顧注將來欲憑此以問安信何不按日題詩留存手乎盧注云張藉送逺曲願君到處自題名他日知君從此去即末二句意按二說太曲還從杜臆為當郪城西原送李判官兄武判官弟赴成都府鶴注此當是廣德元年春作憑高一作登送所親久坐惜芳辰逺水非無浪他山自有春野花隨處發官一作妖柳著直略切行音杭新天際傷愁别離筵何太頻此章惜芳辰三字見戀别之情水浪可憂而山春又可樂花柳可娛而離筵又可悵皆就芳辰上寫出悲歡交集之意於惜别情景倍覺悲傷矣李武稱兄弟故曰所親兩人俱往蜀故云太頻梁元帝纂要春辰曰芳辰賦隋煬帝詩逺水翻如岸詩他山之石鮑照遊思陽精滅兮天際紅宋之問詩離筵多故情涪江泛舟送韋班歸京得山字縣鶴注涪江在梓州涪城此當是廣德元年春在梓州作追餞同舟日傷春一作心一水間飄零為客久衰老羡君還花雜一作逺重重平聲樹雲輕處處山天涯故人少更益一作憶鬢毛斑上四泛舟送别下四對景傷情應花樹雲山歸途春色天涯應為客故人君還鬢斑應衰老比上截更進一步愈覺可傷花古詩相望一水間隋煬帝詩逺意更重重趙曰逺不如花雜蓋重重便有逺意不宜疊用也泛舟送魏十八倉曹還京因寄岑中允參范郎中季明鶴注此當是廣德元年在梓州作是年岑參自虢州長史歸為太子中允唐書諸衛府各有倉曹參軍侍杜確岑參出為虢州長史改太子中允兼殿中御史充關西節度判官范季明無考遲日深江一作春水輕舟送别筵帝鄉愁緒外春色淚痕邊見酒須相憶將詩莫浪傳若逢岑與范為去聲報各衰年上四送魏還京有感時事下四臨别丁寧兼寄岑范也鶴曰𤣥肅二宗是年三月葬故有帝鄉愁緒春色淚痕之句遲公詩多傷時語故囑其莫浪傳以取忌詩春日遲古歌乘彼白雲至於帝鄉梁簡文帝詩此時愁緒密傳又淚痕未燥詎終朝已朝野僉載咸亨中謡曰莫浪阿娑瞋各衰年以之衰年報岑范也送路六侍御入朝音潮年黃鶴編在廣德元春梓州詩內童稚情親四一作三十年中間消息兩茫然更為後㑹知何地忽漫相逢是别筵不分音問一作忿桃花紅似錦生憎柳絮白於一作如綿劍南春色還無賴觸忤愁人到酒邊上四送别之情下四臨别之景悲追已往念將來傷現在寫出㑹難别易數語含無限傷張綖注花柳春色可愛者忽然可惱以其觸忤愁人直到酒邊也方張華詩詞端究未竟忽唱分途始前悲尚未弭後感復起此前四語所本能孔叢子云彼有戀戀之心未知後㑹何期不分不分辨也徐摛詩恆教羅袖拂不分秋風吹張正見詩不分梅花落還同橫笛吹溪又衰桃賦爾乃萬株成錦千林似翼寰宇記桃花在郪縣三十里南流入射洪縣般盧照鄰詩生憎悵額繡孤鸞駱賓王詩生憎燕子千語祖孫登詠柳飛綿亂上空曰唐貞觀元年分天下為十道九劍南道無賴言其狼籍朱瀚曰始而相親繼而相隔忽而相逢俄而相别此一定步驟也能反覆照應便覺神彩飛動及細按之後㑹無期應消息茫然忽漫相逢應童稚情親無賴即花錦絮綿觸忤即不分生憎脉理之精密如此涪城縣香積寺官閣鶴注此當是廣德元年春作涪城在梓州西北五十五里杜臆涪城縣今入潼川州寰宇記香積山在涪城縣東南三里北枕涪江寺當在其上長安亦有香積寺題故加涪城縣以别之寺下春江深不流山腰官閣逈添愁含風翠壁孤雲細背音佩日丹楓萬禾稠小院回廊春一作深一作清寂寂浴鳬飛鷺晚悠悠諸天合在藤蘿外昏黑應平聲須到上頭逈閣臨江故易生愁中四皆登閣所見之景雲細木稠在山前小院回廊在閣內浴鳬飛鷺在江中日晚到寺得以盡覽其勝矣有寺也作三層看便明山下有江山腰有閣山上則輕風散雲則漸細落日映楓則更稠此從一淡一濃對說寂寂境地之幽悠悠物性之閒不庾信詩春江下白帝世說淵注渟著納而不流流者江深水靜也添愁者山髙難上也回庾信枯樹賦頓山腰而半折梁簡文帝善覺寺碑廊遙迓淮南子鳬浴猿躩界北齊蕭慤詩飛鷺復驚翬四佛書有三界諸天自欲以上皆曰諸天陳注自天王天至非有想天非無想天皆諸天也此指山頂殿像言古樂府夫壻居上頭泛江送客鶴注此是廣德元年暫遊左綿時作東津在綿州打魚歌云綿州江水之東津是也二月頻送客東津江欲平烟花山際重舟楫浪前輕淚逐勸杯下去聲一作落愁連吹笛生離筵不隔日那得易去聲為情上四泛江送客下四臨别傷情二春水生故江平烟花承二月舟楫承東津重輕字眼在句底把杯聞笛適足增悲離筵故也不隔日應上頻送黃孔融詩烟花雜如霧烟花山際重重乃濃厚之意生云重即平聲深字言望去非一重也洛隋尹式詩淚逐斷絃揮王洙曰馬融去京踰年有客逆旅吹笛暫聞之甚悲感也離筵祖席雙燕當是廣德元年春在閬州作銜泥入堂此春日事曰應曰且乃計其將來也鶴曰觀末句公有意於出峽未聞嚴武鎮蜀之信也旅食驚雙燕一作雙飛燕銜泥入北一作此堂應平聲同避燥濕且復扶又切過一作遇炎涼養子風塵際來時道路長今秋天地在吾亦離去聲殊方此詩託燕自喻於首尾露意而旅食而驚雙燕者為身將去燕反來也隨地羇棲聊避燥濕也交遊漸冷歷過炎涼也擕家梓閬養子風塵也長安赴蜀來時道路也句句說燕却句句自慨皆與旅食二字相關注顧云世經亂離而天地仍在猶云天空任鳥飛顧春燕以其匹至故詩曰燕燕子飛裏古詩昔為雙飛燕銜泥巢君室鮑照詩出入南關經過北堂陲避燥濕燕不露巢過炎涼自夏徂秋劉左傳子罕曰吾儕小人皆有闔廬以避寒暑燥濕虬書炎涼始茂動靜惟安古樂府蛺蝶行蛺蝶之遨戲東園奈何卒逢三月養子燕接我首蓿間吳均燕詩問余來何遲山川幾紆直所謂來時道路長也結從春叙起從秋收百舌此亦同時所作時程元振已貶斥公初春猶未知故借百舌以寄慨王十朋曰百舌者反舌也能反覆其舌隨百鳥之音春囀夏止禮記小暑至反舌無聲朝野僉載百舌食蚯蚓正月蚓出而來十月蚓藏而往百舌來何處重重平聲秪報春知音兼衆語整翮豈多身花密藏難見一云難相見枝高聽轉新過時如發口君側有讒人此詩借鳥託諷在未二露意利起句便有怪駭意重重報春厭其聒耳中四見口百出不在多人且匿形難見而聳聽易投過時發口慮及讒人結語大有關係汲冢周書芒種之日螳螂生又五日鵙始鳴又五日反舌無聲螳螂不生是謂隂息鵙始不鳴令奸壅逼反舌有聲佞人在側黃山谷云豫讀周書月令乃解老杜過時如發口君側有讒人之句側張儀傳陳軫曰軫可發口言乎公羊傳晉趙鞅除君之惡楚辭讒人高張上上聲牛頭寺鶴注當是廣德元年在梓州作九州記葛仙翁嘗遊此山青山意不盡衮衮上上聲牛頭無復扶又切能拘礙真成浪出遊花濃春寺靜竹細野池幽何處啼鶯切移時獨未休首章初上寺而賦也上四登山喜心目之曠下四入寺詠景物之佳山意不盡謂巒嶂層疊衮衮連步登陟貌無拘礙觸景蕭灑浪出遊恣情覽勝花竹之下寺靜池幽反覺鶯啼太切真是巧於形容虞詡傳勿令有所拘礙何遜詩吾人少拘礙得性便游逸梁簡文詩真成恨不已望牛頭寺杜臆題必有誤望字當在寺下地志州南七里有鶴林寺而牛頭山在州西南二里正與相望牛頭見鶴林梯徑繞幽深一云秀麗一何深春色浮一作流山外天河宿正異定作沒殿陰傳燈無白日布地有黃金休作狂歌老回看平聲不住心次章既上寺而有望也上四望中之景下四望中之意杜臆牛頭山高故望見鶴林下三句乃鶴林寺景其寺必有名僧傳佛心印而長者於此布金故公欲從之求第一義也燈幽深謂路徑曲折春色日所見天河夜所見無白日常在有黃金殿至華回看不住欲此心空虛無著涅槃後分佛入涅槃已東西二雙合為一樹南北二雙亦合為一皆垂覆如來其樹慘然變白經云樹色如鶴之白故名鶴林王融法門頌啓鶴林雙樹顯究竟以開氓釋迦成道記一燈滅而一燈續注燈有照暗除昏之義故淨名有無盡燈王洙曰釋家以燈喻法謂能破暗也六祖相傳一法故云傳燈釋書有傳燈録趙曰此言長明燈也借傳燈言之易江總賦成黃金之勝地邵注給孤長者以黃金側布國王太子祗園朱注彌陀經極樂國土有七寶蓮池池底以金沙布地無金剛經應無所住而生其心衆香偈轉不住心退因果登牛頭山亭子與前詩亦同時作路出雙林外亭窺萬井中江城孤照日山一作春谷逺含風兵革身將老關河信不通猶殘數行音杭淚忍對百花叢此章乃登山亭而作也上四叙景下四感懷八句皆整對憑高遙望故城照日而見其孤谷含風而覺其逺甚世亂無家止餘數行之淚忍對此百花叢中乎傷心矣朱注傅大士傳大士捨宅於松下建寺因以樹名雙林徐陵東陽雙林寺傳大士碑大士熏禪所憩獨在高巖爰挺嘉木是名檮樹擢本相對似雙槐於夾門合幹成隂類雙桐於空井盛庾信哀江南賦提挈妻子關河纍年趙汸注吐蕃猶故關河未通張易之詩鳥吟千户竹蝶舞百花叢上上聲兜率音律寺鶴注寺在梓州當是廣德元年作洙曰佛書有兜率天宫故以名寺釋迦成道記注梵云兜率陀或云覩史陀此云知足即欲界第四天也兜率知名寺真如㑹法堂江山有巴蜀棟宇自齊梁庾信哀雖久周蔡作周舊作何顒好去聲不忘白牛車逺近且欲上上聲慈航此章初上兜率寺而作也上四言景下四言情兜率知名之寺乃真如㑹法之堂見其為禪宗也江山兼有巴蜀寫其形勝棟宇起自齊梁推其古迹庾信哀時周顒好佛皆屬自喻末言安得駕彼牛車以藉慈航之一渡乎謂圓覺經略疏圓覺自惟本無僞妄變易即是真如真真實顯非虛妄如謂如常表無變易梁簡文帝詩當須耳應漏然後㑹真如巴江總入龍丘巖精舍詩法堂猶集雁趙注江山自蜀猶羊叔子登峴山云自有宇宙即有此山之義王勃詩江山蜀道賖向秀思舊賦棟宇存而不毁朱注王勃郪縣兜率寺碑兜率寺者隋開皇中之所建也此云自齊梁疑未詳考北史庾信位望通顯常有鄉關之思乃作哀江南賦顒蔡曰何顒見後漢書黨錮傳與詩義不類或疑是周周顒奉佛有隱操朱注云按蔡注本葉少藴避暑録南史周顒音詞辨麗長於佛理於鍾山西立精舍休沐則歸之清貧寡欲終日長蔬雖有妻子獨處山舍公嶽麓道林二寺詩用此亦作何顒蓋周何字相近而訛耳胡遁叟曰史稱周顒與何𦙍皆精信佛法周娶妻何食肉各有其纍公蓋誤憶其姓用之耶以文選李善注引梁簡文帝草堂傳曰周顒昔經在蜀蜀草堂林壑可懷乃於鍾嶺雷次宗學館立寺因名草堂亦號山茨法華經有大白牛肥重多力形體殊好以駕寶車者車逺近謂逺近俱可到燭清涼禪師般若經序般若苦海之慈航昏衢之巨梁昭明太子詩慧海渡慈航葉夢得曰詩人以一字為工世固知之唯變化開闔出竒無窮殆不可以形迹捕詰如江山有巴蜀棟宇自齊梁則其逺近數十里上下數百年盡在有自兩字間而吞吐山川之氣俯仰古今之懷皆見於言外者也望兜率寺杜臆此亦指寺前望見者樹密當山徑江深隔寺門霏霏雲氣動一作重閃閃浪花翻不復扶又切知天大空餘見如字須溪音現非佛尊時應平聲清盥一云興罷隨喜給孤園次章既上寺而又望也上四詠寺前之景下四有超世之思雲氣承樹密浪花承江深到此禪林妙境不復知天之大而唯見佛為尊矣因欲盥手而行隨處覽勝也九章雲霏霏而承宇天江逌賦寒光閃閃而翻漢制朱長孺云言佛之尊於也闞澤云孔老二教法天用不敢違天佛之設教諸天奉行不敢違佛故佛號人天師沈約懴悔文隨喜讚悅給孤園注别見儒者敬天佛氏信心惟敬天故時時戒懼慎獨求無忝於所生惟信心故乍見圓覺妙明視一切皆空幻充其說殆流於無忌憚而不自知也此詩云不復知天大空餘見佛尊非推尊釋道之大正言其所見之小耳甘園甘古通作柑園黃鶴編在廣德元年春作蓋梓州舊有甘非瀼西甘園也朱注益州方物贊柑生果渠嘉等州結實埒於江南味差薄李實曰柑園在梓州城南十里今猶名柑子鋪柑廢唐書劍南睂簡資等州歲貢柑春日清江岸千甘二頃園青雲羞一作著葉密白雪避花繁結子隨邊使去聲開籠舊作筒杜臆欲作筐近至尊後於桃李熟終得獻金門此詠春日甘園故從葉花說起結子上貢在秋來成熟時末二言外感慨見大器晚成不求早逹也青雲羞雪避此句中著眼處然各有所本江淹蓮花賦梧羞烈沉水慚馥此羞字所本王績春日詩雪避南軒梅風催北庭柳此避字所本也字顧注蜀為遐方故稱邊使杜臆橋非筒盛當是筐揚雄解嘲歷金門上玉堂陪李魯訔作章梓州王閬州蘇遂州李果州四使去聲君登惠義寺鶴注當是廣德元年春作道唐書閬州屬山南西道舊書屬劍南遂州後周所置唐因之即今潼川州之遂寧縣唐時與梓州為鄰果州南充郡屬山南西道武德四年析隆州置山蔡曰地志惠義寺長平在梓州郪縣北春日無人境虛空不住天鶯花隨世界樓閣倚一作寄山巔遲暮身何得登臨意惘一作寂然誰能解金印瀟灑共安禪一云三車將五馬若個合安禪言上四詠寺下四感懷無人境言其幽不住天其曠鶯花春時景物樓閣寺中形勢遲暮二句自傷入道已晚誰能二句并勸四公解脫杜臆公以作客之窮真有學佛之想故後詩屢及之天楞嚴經虛空寂然佛書不住相意謂運無常以成四時杜修可曰取唐孫逖詩邊地鶯花少年來未覺新逈瓔珞經無量世界盡觀衆生周王褒詩建章樓閣晉書周顗曰取金印如斗大華無名釋詩高揖謝時俗瀟灑出樊籠法經偈安禪合掌江緦詩石室乃安禪數色角切陪李魯訔作章下同梓州泛江有女樂在諸舫方輿勝覽作渚舫戲為艷曲二首贈李鶴注當是廣德元年春作上客回空騎去聲佳人滿近船江清歌扇底野曠舞衣前玉袖杜臆作燕凌一作臨風並金壺杜臆作鳬隱趙汸作引浪偏競將明媚色偷眼艷陽天一作年聲首章從李公說到女樂形容一時妓之盛所謂艷曲也舫上佳人有歌者有舞者有迎風並立者有提壺引水者此分寫佳人景態也又見彼此凝眸媚眼交映於春光此合寫佳人情致也通黃生注首句上客不應於本章而應於下章結處乃二首為章法凌風承野曠引浪承江清競將二字見女樂滿船何謝靈運詩野曠沙岸靜梁簡文帝詩風吹玉袖香遜詩驚絃雪袖遲玉雪皆言袖色之白耳若以玉飾袖豈能凌風乎半鮑照詩金壺啓夕淪隱浪偏舊注謂浪映金壺之偏於上下文不合黃生從趙本作引浪為是陽隋煬帝江南曲宿霧洗開明媚眼鮑照詩當避艷年邵注佳人偷眼春光以爭妍媚也王嗣奭曰玉袖金壺疑其有誤蓋詩詠佳人不應參入金壺上有舞衣不應復用玉袖今定玉袖為玉燕金壺為金鳬燕凌風者學其舞也鳬隱浪者避其歌也亦戲詞也梁簡文帝詩玉燕貼青驪拾遺記載師曠時有白燕來巢明皇有金鳬燈何遜詩銀海終無浪金鳬㑹不飛皆可證復齊漫録古今詩人詠婦人者多以歌舞為稱梁元帝妓應令詩歌清隨澗響舞影向池生劉孝綽看妓詩燕姬奏妙舞鄭女愛清歌北齊蕭放冬夜對妓詩歌還團扇後舞出妓行前𢎞執恭觀妓詩合舞俱回雪分歌共落塵陳陰鏗侯司空宅詠妓詩鶯啼歌扇後花落舞衫前陳劉刪亦云山邊歌落日池上舞前溪庾信趙王看妓詩緑珠歌扇薄飛燕舞衫長江總看妓詩並歌時轉黛息舞暫分香隋盧思道夜聞鄰妓詩怨歌聲易斷妙舞態難雙陳元操春園聽妓詩紅樹搖歌扇緑珠飄舞衣釋法宣觀妓詩舞袖風前舉歌聲扇後嬌王績詠妓詩早時歌扇薄今日舞衫長劉希夷春日閨人詩池月憐歌扇山雲愛舞衣以歌對舞者七以歌扇對舞衣者亦七雖相緣以起然詳味之自有工拙也杜取以為艷曲云江清歌扇底野曠舞衣前又陳子良詩明月臨歌扇行雲接舞衣李義山詩鏤月成歌扇裁雲作舞衣儲光羲詩竹吹留歌扇蓮香入舞衣洪容齊曰唐人好以歌扇對舞衣白日移歌袖一作裏青霄近笛牀翠睂縈度漢書注一音鐸一音渡曲雲鬢儼成一作分行音杭立馬千山暮回舟一水香使去聲君自有婦莫學野鴛鴦次章從女樂說到李公白日承艷陽來前後自相聨絡移白日酣歌終日也近青霄聲徹雲霄也縈回度曲前歌將盡也儼立成行後歌將繼也立馬即空騎之候迎者回舟即女樂之滿舫者末聨雖涉戲詞而却合規諷而黃生曰李梓州耽於女樂公故撰為艷曲雖曰戲之實所以規之曲終雅奏其詞麗以則本詩人作賦之義此豈玉臺香奩諸體淫而近䙝者所可同日語哉曹植七啓為歡未㳿白日西傾宸蜀都賦干青霄而秀出齊南郊樂歌紫芬靄青霄顧注此言響遏行雲覺青霄若與笛牀相近鼓釋名牀裝也凡所以裝載者皆謂之牀如糟牀食牀牀筆牀皆此義樹萱録云南朝呼筆管為牀笛牀當即其類歌宋玉好色賦睂如翠羽古漢元帝紀帝自度曲瓚云終更授其次謂之度曲詩度曲翠睂低西京賦度曲未終雲起雪飛張衡舞賦度終復合次授二八沈約詩麗色倘未歇聊承雲鬢垂有薛道衡詩佳麗成行百羅敷行使君自有婦羅敷自夫古樂府歌湖中種鳥半雌半是雄鴛鴦逐野鶴恐畏不成雙盧注鴛鴦本有定耦若野鴛則亂羣矣送何侍御歸朝音潮訔原注李梓州泛舟筵上作李魯作章鶴注此當是廣德元年春作舟楫諸侯餞車輿使去聲者歸山花相映發水鳥自孤飛春日垂霜鬢天隅把繡衣故人從此去一作逺寥落寸心違上四送别之景下四悵别之情發舟楫水餞車輿陸行諸侯指李使者指何山花映起下繡衣故人見侍御歸朝之樂水鳥孤飛起下霜鬢寸心見異方作客之窮興中有比杜詩善用此法易舟楫之利漢書王嘉傳今之郡守重於古諸侯說淮南子車輿極於雕琢庾信詩山花熖火然世王子敬曰從山隂道上行山川自相映發使人應接不暇期詩義疏鷺水鳥也洙曰漢御史繡衣持斧沈佺詩故人從此去江亭送睂州辛别駕升之得蕪字州鶴注公有江亭王閬筵餞蕭遂州詩則江亭在閬州此當是廣德二年春在閬州作柳影含雲幕一云重江波近酒壺異方驚㑹面終宴惜征途沙晚低風蝶天晴喜浴鳬别離傷老大意緒日荒蕪首聨餞别之事次聨惜别之情三聨臨别之景末聨憶别之懷柳影江波之處設幕置酒故屬叙事下面風蝶浴鳬全寫時景意非重復低杜臆宴終即别故云終宴惜征途語淺而有味五六喜二字虛字實用雲幕幕高如雲也不後漢書范丹曰逺適千里㑹面無期曹植詩終宴知疲古今注蛺蝶一名野蛾一名風蝶總淮南子鳬浴暖躩邵古詩老大徒傷悲江詩遊人意緒多注荒蕪撩亂也行次鹽亭縣聊題四韻奉簡嚴遂州蓬州兩使去聲君咨議諸昆季鶴注當是廣德元年自梓州至鹽亭時作公是年春夏客梓州鹽亭縣在梓州東九十里遂州與梓州為鄰蓬州則鄰於閬州而閬與梓又為鄰也杜臆遂州蓬州同姓而各以官地為號元顧注舊唐書嚴震字遐聞梓州鹽亭人至德乾間屢出家財以助軍需授州長史王府咨議參軍嚴武移西川署為押衙德宗朝纍官至同平章事檢校尚書左僕射礪震之宗人也纍官至山南西道節度使寰宇記嚴震及弟礪墓在負戴山下去縣西一里據此則咨議諸昆季蓋嚴震及礪也其嚴遂州蓬州二使君名不可考矣馬首見鹽亭高山擁縣青雲溪花淡淡一作漠漠春郭水泠泠全蜀多名士嚴家聚德星長歌意無極好為去聲老夫聽平聲二上四鹽亭之景下四簡嚴昆弟顧首二乃逺望次乃近見五六言地靈而人傑注題止四韻而曰長歌反覆長吟意思無窮也平蜀都賦近則江漢炳靈世載其英蔚若相如皭若君王褒暐曅而秀發揚雄含章而挺生全蜀多名士本此太異苑陳仲弓與諸子姪造荀季和父子於時德星聚史奏五百里內有賢人聚倚杖原注鹽亭縣作也詩成後拈倚杖二字為題非詠倚杖鮑照詩倚杖牧雞豚看花雖郭內一作外非倚杖即溪邊山縣早休市江橋春聚一作近船狎一作野鷗輕白浪一云月歸雁喜青一作清天物色兼生意淒涼憶去年杜臆閲前詩知縣中有山有溪故有郭內溪邊之句早休市見俗朴春聚船見民稠狎鷗歸雁俱物色而兼生意者鹽亭屬梓州蓋去年避亂於此也市承郭船承溪鷗雁承春物色生意又承鷗雁逐層接下甚明近注將生意物色分頂中二聨者未確首句用一雖字自當作郭內任昉詩聊訪狎鷗渚何遜詩華池物色曛何敬祖詩歸雁和鳴王褒詩摧殘生意餘惠義寺送王少去聲尹赴成都得峯字年鶴注當是廣德元春梓州作苒苒谷中寺娟娟林表峯闌干上上聲處逺結構坐來重平聲騎馬行春徑衣冠起暮一作晚鐘雲門青一作春寂寂一作寂寞此别惜相從上四登寺寫景叙事下四送王即景言情杜臆苒苒狀寺之幽蔚娟娟狀山之高秀闌外設闌干中有石級所謂結構也前飛仙閣詩棧雲干峻梯石結構牢可證上處見其遙逺坐來見其重疊山路之高峻可知餞别之後少尹騎馬而行僧人衣冠而起暮鐘矣山門閴寂惜不與之偕行也杜臆志書寺在北山名長平山楊炯惠義寺銘長平山兮建重閣山穹窿兮下磅礴可知寺高路逺申涵光曰寺僧見貴客至故衣冠鳴鐘劉云解不得何也惠義寺園一本無園字送辛員外鶴注此亦廣德元年作朱注以下二首俱見卞園吳若黃鶴本實櫻桃結子在春而熟於四月今云垂蓋在春末矣朱櫻此日垂朱實郭外誰家負郭田萬里相逢貪握手高才仰望足離筵此章從寺前時景寫出餞别傷情筵足盡也言仰望無窮之意盡於離頃刻之間曰永徽圖經櫻桃洛中者勝深紅色朱櫻明黃色曰蠟櫻又送鶴注魯訔年譜云公送辛員外暫至綿詩云直到綿州始分首則魯說為是雙峰寂寂對春臺萬竹青青照一作送客杯細草留連侵坐軟殘花悵望近去聲人開同舟昨日何由得並馬今朝未擬回直到綿州始去聲分首一作手江邊樹裏共誰來此章從離筵之景重叙送别之情在四句分截往雙峰逺景萬竹近景細草殘花觸景生愁矣綿州同江上獨來說得情緒難堪客趙大綱曰留連就草言悵望就花言歐公詩野花向開如笑芳草留人意自閒亦同此意然唯人留連故見草亦留連唯人悵望故見花亦悵望耳寂寂對青青是借對王維詩落花寂寂啼山鳥楊柳青青渡水人客王勃詩他席他鄉送杯朱瀚曰此詩一二死句三四無脉五六枯拙七八不韻故知其為􅎓作也今按臺上酌酒而花草傷情四句亦自聨絡唯下四語生意索然疑非少陵手筆耳巴西驛亭觀江漲呈竇十五使去聲君二首寶應元年夏公送嚴武至綿州廣德元年春公在梓州有惠義寺送辛員外詩中云細草殘花蓋春候也末云直到綿州蓋重至綿州矣此詩末章言春暮正其時也今依黃鶴編在廣德元年春綿州作黃謂年譜脫漏是也分朱注唐書地志綿州巴西郡治巴西縣又劉璋三巴巴郡閬中縣巴西郡治馬唐先天二年改隆州巴西郡為閬州治閬中郡蓋綿閬皆稱巴西也又杜安簡地志云巴郡則巴渝集壁巴東則夔忠巴西則綿閬此詩巴西驛亭當如舊注附綿州詩內楊德周曰綿州地志巴字水在綿州治西四里涪水自北經城西折而為二安水自東迤邐繞城東南滙於芙溪每江漲登山望之㸃畫天然甚肖也芙蓉溪即杜東津觀打魚處宿雨南江漲波濤亂逺峰孤亭凌噴薄萬井逼舂容霄漢愁高鳥泥沙困老龍天邊同客舍擕我豁心胸此章喜江漲之景記與竇同觀在六句分截謂波濤高湧而水映逺峰有似搖亂孤亭指驛亭萬井巴郡噴薄侵蝕之勢舂容衝激之聲水漲而濶故鳥愁水漲而蕩故龍困天邊指綿州同舍指竇使君按首章曰天邊同客舍末章曰同是一浮萍竇使君蓋寄迹於綿州者黃鶴疑為綿州刺史繼杜使君之任者誤矣杜臆因關心小剡縣句謂竇必官於剡亦鑿矣出崔湜詩宿雨清龍界黃希曰南江蓋岷江也岷江茂州而茂與綿為鄰謝靈運詩逺峯隱半規同海賦峌􅒈孤亭薄沸騰漢刑法志一百里提封萬井吳都賦噴學記待其從容注從讀如舂謂擊也擊鐘者每一舂為一容然後盡其聲此借言水勢衝擊之狀史記韓信傳高鳥盡良弓藏淹江賦或混淪乎泥沙江詩無以滌心胸公詠江漲詩前後三見初云細動迎風燕輕搖濯浪鷗此狀江流平滿之景繼云大聲吹地轉高浪蹴天浮此狀江水洶湧之勢兩者工力悉敵其云魚鱉為人得蛟龍不自謀語稍近直不如霄漢愁高鳥泥沙困老龍尤為警拔轉驚波作惡一作怒即恐岸隨流賴有杯中物還同海上鷗關心小剡縣傍去聲眼見揚州為去聲接情人飲朝來減片一作半愁次章畏江漲之勢記與竇同飲在四句分截波惡岸流江漲未平此眼前實景杯酒海鷗忘其淪溺矣剡縣揚州比擬江漲此意中客景對飲銷愁感在使君也史記始皇紀水波惡陶潛詩且進杯中物取杜臆同海鷗乃謔詞舞列子海上人好鷗鳥其父欲之明日之海上鷗鳥而不下鮑照詩萬曲不關心興九域志越州東南二百八十里有剡縣一統志今紹府嵊縣揚州大江所經禹貢淮海惟揚州旦張逺注公少遊吳越久不能忘一見水勢之大遂疑夕可逹故曰關心曰傍眼鮑照詩留酌待情人情人指竇又呈竇使去聲君杜臆謂此詩與前二章乃同時作觀首句向晚二字可見向晚波微一作猶緑連空岸却一作腳青日兼春有暮愁與醉無醒漂泊猶杯酒踟蹰此驛亭相看平聲萬里外同是一浮萍此詩在驛亭志别又與竇同慨岸首聨叙景次聨叙情下四逐聨相承波緑青水平雨止矣日晚春盡故皆云暮愁來醉倦故不能醒杯酒驛亭此春日愁醉之由萬里浮萍此飄泊躊蹰之感波微緑對岸却青不必作腳青解言趙汸注詩用兼與以一字而貫兩事杜臆對江漲故云同一浮萍江淹别賦春水緑波竒杜臆緑波曠濶似連青天為岸腳寫景亦李白詩驛亭三楊樹鄢陵劉逴曰子美五言律多創立法度逈異諸人變化無窮誠可師資但有膾炙羣口實非當效者如身無却少壯迹有但羇樓客病留因藥春深買為花日兼春有暮愁與醉無醒俱屬刻削知枉道祗從入吟詩許更過風送蛟龍雨天長驃騎營屬用意深晦如暖老須燕玉充飢憶楚萍屬用事過僻如野花留寶靨蔓草見羅裙則屬纎巧委波金不定照席綺逾依則屬瑣碎仰蜂粘落絮行蟻上枯梨則屬細小不㸑井晨凍無衣牀夜寒則屬猥苦賜書誇父老壽酒賽城隍則屬俚俗鹿門擕不遂雁足繫難期則屬歇後不知西閣意肯别定留人則屬補綴待爾嗔鳥鵲拋書示鶺鴒枝間喜不去原上急曾經又羣盜哀王粲中年召賈生登樓初有作前席竟為榮宅入先賢傳才高處士名異時懷二子春日獨含情皆以下續上交股相承則屬繁復如悶詩句句見悶則屬謎語惟子能渠細石吾亦沼清泉以實字作眼固所當效而後聨柴荆即有焉却涉草率語大槩詩出杜口人即羣然尊信無暇别擇其亦不善學杜矣陪王漢州留杜綿州泛房公西湖鶴注當是廣德元年春至漢州時作故云春池賞不稀西湖在漢州即所云城西池也又曰九域志成都北至綿不滿二百里蓋漢在成都綿州之間晉舊書房琯傳上元元年四月以禮部尚書出為州刺史八月改漢州刺史寶應二年四月拜特進刑部尚書春朱云此詩與下詩俱及房公赴召則廣德元年公嘗至漢州矣舊譜不書略也今按唐書謂召琯在寶應二年之夏是即廣德元年也其云夏召恐誤據此詩春末蓋已赴召矣舊相去聲恩追後春池賞不稀闕庭分音問未到舟楫有光輝豉是義切化蓴絲熟刀鳴鱠縷飛使去聲君雙皂蓋灘淺正相依三頂恩追歎不與房相偕往四頂池賞喜得與王杜同遊蓴絲鱠縷房湖所産雙蓋相依陪宴已久也故三四對法錯綜亦律中帶古耉闕庭未到就自已言用分字曹植責躬表自分黃永無執圭之望又云僻處西館未奉闕庭光武紀封隆曰臣得生到闕庭說文豉配鹽幽菽也世說陸機詣王武子武子前有羊酪問吳中何以敵此機曰千里蓴羮但未下鹽豉耳師氏曰本草蓴生水中三月至八月莖細如叉股通名為絲蓴在西征賦饔人縷切鸞刀若飛依雙蓋在岸上泛舟池中水滿灘淺故舟與蓋相此詩舊有兩說一指房公應召時則恩追乃恩命追赴所謂分未到者房在中途也一指房公既殁後則恩追乃恩賜追贈所謂分未到者房卒中途也今按房琯見召屬廣德元年事其卒在夏此時房復起用故泛湖而有喜詞觀下章云為報鵝隨王右軍以琯在途次故也若二年之春公不復至漢州焉得復有西湖之泛乎輝或將上四句全主房湖說者曰思追曰未到曰光為知已之感故三致意焉但此詩本為王杜泛湖而作不應多叙房事也得房公池鵝此亦在漢州作房相去聲西池鵝一羣眠沙泛浦白於一作如雲鳯凰池上應平聲回首為去聲報籠隨王右軍杜臆池中養鵝而題云得鵝必有取而餉之者因戲言房公在鳯池休得回顧此鵝為我報云右軍已籠而去矣房向在中書故用鳯凰池公素善書法故自比王右軍公詩云七齡作大字可見者法書要録王羲之性好鵝山隂曇􅙓村有道士養好十餘王往求市易道士言府君若能自屈書道德經各兩章便合羣以奉羲之住半日為寫畢籠鵝而去答楊梓州單復編在漢州詩內楊據前有李梓州後有章梓州此又有梓州一歲而有三梓州何更代之速耶悶到房舊作楊郭知逹本定作房公池水頭坐逢楊子鎮東州却向青溪不相見回船應平聲郭作因載阿戎遊遇楊而未盡遊池之興故作詩以答之此只如一首短札耳與阿戎指梓州之侄晉書阮籍謂王渾曰與卿語不如阿戎談阿戎渾子戎也舟前小鵝兒原注漢州城西北角官池作官池即房公湖鵝兒黃似酒對酒愛新鵝引頸嗔船逼一作過無行音杭亂眼多翅開遭宿雨力小困滄波客散層城暮狐狸奈若何上二對酒觀鵝嗔船亂眼切舟前翅開力小切小鵝末二深致愛惜之意盧注謂諷董廷蘭非也公於房相從無譏刺語鄰方輿勝覽鵝黃乃漢州酒名蜀中無能及者盧照詩鵝黃粉白車中出裴慶餘詩滿額鵝黃金縷衣皆言淡黃色也杜詩則言酒色東坡詩小舟浮鴨緑大杓瀉鵝黃陸放翁詩兩川名醖避鵝黃此皆用公語耳常希注鵝一名舒雁王羲之愛其宛頸宛頸而宿鵝之性今云引頸則鵝嗔怒時也庾信詩雲光偏亂眼杜詩有用俗字而反趣者如鵝兒雁兒本諺語也一經韻手㸃染便成佳句如鵝兒黃似酒對酒愛新鵝雁兒爭水馬燕子逐檣烏是也協補注舊本俱作新鵝朱氏獨作鵝黃不歌韻官池春雁二首鶴曰官池即城西也自古稻粱多不足至今鸂鶒亂為羣且休悵望看平聲春水更恐歸飛隔暮雲此詩寓意於春雁也上二歎其失所下二惜其未歸看春水時不能留隔暮雲逺不能逹交杜臆首章比逆旅無依最苦在亂為羣三字廣絶論分雁鶩之稻粱詩歸飛題題青春易去聲杜臆作易舊作欲盡急還鄉紫塞寧論平聲尚有霜翅在雲天終不逺力微矰音增繳音勺絶須防承前章歸飛說來上二歸思之急下二歸路之難無終不逺慰之也絶須防危之也歸杜臆下章比欲歸資最苦在力微二字又曰雁在初春若春盡則無霜矣首句欲盡當作易盡門孫楚雁賦背青春而北息邵注紫塞在太原府雁關下北地寒故尚有霜蕪城賦北走紫塞雁門母蕭子範詩遊雁犯霜飛翅在力微各兩字另讀丘儉詩飛騰冲雲天奮迅協光熙兩都賦撫鴻罿御矰繳投簡梓州幕府兼簡韋十郎官黃本無官字郭云新添黃鶴編在漢州詩內幕下郎官安隱烏衮切一作穩無從來不奉一行音杭書固知貧病人須棄一作不知貧病關何事能使韋郎跡也去聲疏上二諷幕府諸公下二諷韋十郎官書黃希曰唐多以朝士入州幕故云幕下郎官不奉不接來書也王凝之王氏女帖說汝勉難安隱深慰懸心朱注說文隱安也又與穩通通鑑𤣥宗遣中使至范陽祿山踞牀不拜曰聖人安隱注隱讀曰穩又唐帖多寫穩為隱作隱正得之杜臆無字出韻或六魚七虞兼用耶漢川王大録事宅作朱注此見郭知逹本他刻皆不載按成都無漢川之名當是廣德元年漢州作魏志張普傳魯據漢中功曹閻巴曰漢川之民户出十萬財富土沃則漢川即漢中也人朱氏謂公有詰王録事許修草堂資詩疑即其非也按此詩言才名叔蓋公尊行也後詩直云為嗔王録事知其别為一人矣南溪老病客相見下去聲肩輿近髮看平聲烏帽催蓴煮白魚宅中平岸水身外滿牀書憶爾才名叔含悽意有餘首聨自叙下六叙王三四見其老而好客五六見其宅之清雅公送韋司直歸成都詩為問南溪竹抽梢合過牆知南溪即浣花溪毛晉史王獻之乘平肩輿徑入顧辟疆園杜詩白益髮古是明說白頭近髮看烏帽是暗藏白頭同一事而句法善化傳陰鏗詩岸水帶斜暉庾信詩書卷滿牀頭江表諸葛恪少有才名發藻岐嶷辨論應機悽異鄉相遇故曰含悽謝靈運詩含泛廣川滹南遺老詩話世所傳新添杜詩四十餘篇吾舅周君卿嘗辨之云惟瞿唐懷古呀鶻行惜别行為杜無疑自餘皆非真本蓋後人依倣而作朱鶴齡曰新添詩固多贋者然滹南之說恐亦未然如别嚴二郎客舊館呈路十九遣憂巴山愁坐陪鄭公秋晚放船避地等詩皆非子美不能作短歌行送祁録事歸合州因寄蘇使去聲君鶴注此當是廣德元年春梓州作公梓州詩有應須理舟楫及長嘯下荆門之句也唐六典煬帝罷州置郡有東西曹掾及主簿皇朝省主簿置録事參軍開元初改司録參軍事三人唐書合州涪陵郡屬劍南東道府朱注祁録事乃合州録事故詩稱蘇使君為賢主魯訔作邛州録事誤也古樂府題有短歌行前者途中一相見人事經年記君面後生相勸一作動何寂寥君有長才不貧賤君今起柂春江流余亦沙邊具小舟幸為去聲逹書賢府主江花未盡㑹江樓上四稱祁録事下四送歸寄蘇詞相勸後生何憂寂寥具此長才終當顯逹矣二句慰賢府主指蘇使君花期相訂公亦將往合州也非申涵光曰此老固記一不記十者得令經年記面亦易事王洙曰古者有半面之交史記陳平傳豈有美好如陳平而長貧賤者乎釣起柂所以行舟方輿紀勝江樓在合州州治之前魚山學士山巫山橫其前下臨漢水送韋郎司直歸成都鶴曰此是廣德元年春在梓州作若廣德二年暮春公已歸成都即仲春在閬亦當聞嚴武之信何云為問南溪竹抽梢合過牆耶竄身來蜀地同病得韋郎天下兵一作干戈滿江邊歲月長别筵花欲暮春日鬢一作春鬢色俱蒼為去聲問南溪竹一作笋抽梢合過墻原注余草堂在成都西郭楨上四留蜀之感下四送韋成都劉詩竄身清江濱相吳越春秋子胥曰子不聞河上歌乎同病相憐同憂救南溪即浣花溪宋之問詩緑縟南溪樹寄題江外草堂鶴注此當是廣德元年作李泰伯曰公在梓州懷思草堂而作是詩我生性放誕雅欲逃自然嗜酒愛風一作修竹卜居必一作此林泉憶前此卜居士申涵光曰嗜酒愛風竹可想名士風流文傳阮籍放誕有傲世情不樂仕宦去雅常也逸高彪詩滌蕩穢纍飄任自然遭亂到蜀江卧痾遣晉作遺所便誅茅初一畝廣地方一作必連延經營上元始斷手寶應年敢謀土木麗自覺面勢堅一作賢亭臺一作臺亭隨高下敞豁當清川惟一作雖有㑹心侣數色角切能同釣船此追叙草堂始末注上四構堂之由中四營堂之事下四堂景之勝逺肅宗乾元二年十二月公至成都上元元年乃建草堂之始又二年為寶應元年乃成草堂之日慧杜臆臺亭隨高下敞豁當清川結構殊不草草釋淨詩卧痾苦留滯闢户望遙天畝屈原卜居寧誅鋤草茅以力耕乎記儒行儒有一之宫選賦階除連延不詩經之營之斷淳化帖唐高宗敕使至知元堂已成知諸作總得手後漢書梁冀起第宅殫盡土木歌考工記審曲面勢重古樂府短行不羡一囊錢惟心襟㑹干戈未偃息安得酣歌眠蛟龍無定窟黃鵠摩蒼天古來賢逹士一作賢逹志一作逹士志寧受外物牽顧惟魯鈍姿豈識悔吝先偶擕老妻去慘淡凌風烟事跡無固必幽貞貴一作愧雙全此述去草堂之故各四句轉意言避亂播遷如蛟龍黃鵠之縱遊惜前此不能先幾逺去覺有愧於古人但欲身名兩全不得不擕家他適耳守干戈指徐知道之亂風烟謂冒寒而行幽貞謂隱居正書酣歌於室古樂府黃鵠摩天極高飛詩晉羊祜登峴山曰由來逹賢勝士登此眺望沈約所纍非外物顧念也惟思也南史劉峻傳少年魯鈍必繫辭憂悔吝者存乎介介即幾先也固見論語易利幽人之貞尚念四小松蔓草易音異一作已拘纒霜骨不堪一作甚長子兩切永為鄰里憐此回憶故園景物也蔓此章首尾各四句中二段各十二句詩野有草杜臆松曰霜骨松苗曰霜根立言清峭士大夫能視物我一體則無自私自利之懷少陵傷茅屋之破則思廣厦萬間以庇寒士念草堂則曰干戈未偃息安得酣歌眠詠四松則曰敢為故林主黎庶猶未康觸處皆仁心發露稷卨之徒也陪章留後侍御宴南樓得風字元鶴注寶應元年及廣德年之春守梓州者乃李使君也是年之夏守梓州者乃章侍御也此當是廣德元年夏作絶域長夏晚兹樓清宴同朝音潮廷燒棧北鼓角漏舊作滿正異及英華皆作漏天東此登樓而有感世亂在朝廷在燒棧之北歎長安未平鼓角漏天之東恐梓州多事宴漢武詔茂才異等可為將相使絶域者總詩清留神賞漢書張良說高祖燒絶棧道江寰宇記卭都縣漏天秋夏長雨僰道有大漏天小漏天趙曰漏天在雅州鶴曰廣德元年吐蕃陷隴右諸州詔焚大散關是時史朝義已誅東都無事鼓角不至於滿天當依舊注作漏天雅州屬西川而梓州為東川故也關朱注通鑑上元二年二月奴刺黨項寇寶雞燒大震廣德元年秋七月吐蕃入大震關陷蘭廊河鄯洮岷秦成渭等州故有燒棧二句屢食將軍第一作邸仍騎一云驕御史驄本無丹竈術一作訣那免白頭翁此陪宴而自傷年老將曰屢曰仍見宴非一次軍第切留後御史驄切侍御成左傳豈將軍食之而有不足梁冀傳大將軍西第南越志長沙郡瀏陽縣有王喬山山有合丹竈江淹别賦守丹竈而不顧鍊金鼎而方堅寇盜狂歌外形骸痛飲中野雲低度水簷雨細隨風此記歡宴情景且寇盜付狂歌之外亂莫愁形骸寄痛飲之中老可暫忘二句雙挽上文低雲細雨此樓前所見之景出號江城黑題詩蠟炬一作燭紅此身醒復扶又切醉不擬哭途窮此記宴畢情事杜臆一面出令一面吟詩有孟德橫槊賦詩之風鑑窮途免哭身託醉鄉也此章四段各四句朱注通𤣥宗誅韋后逮夜葛福順李仙鳬皆至請號而行注凡用兵下營及攻襲就主帥取號以備緩急相應臺上得涼字南此與上章同時之作初宴樓後移臺上也改席臺能俗本作為逈留門月復扶又切光雲霄一作行遺暑濕山谷進風涼老去一杯足誰憐屢舞長何須把官燭似惱鬢毛蒼此臺上夜飲而作也上四風月之佳下四衰老之感近雲納風臺上高曠也酒杯樂舞席問供設也把燭句又與月光相應此只隨意說來而脉理清析如此謝朓詩臺逈月難中蕭琮詩重門月已映即所謂留門月復光也舊云留住城門者非是主將燕客不待留門且言留城門而月復光豈有此句法乎聲薛道衡詩陶然寄一杯屢老去二句即所謂老畏歌繼愁隨舞曲長也詩舞傞傞謝承從漢書巴祇為揚州刺史與客坐閣下不燃官燭送王十五判官扶侍還黔中得開字廣黃鶴依舊次編在德元年夏作養顧注王判官本黔陽人而宦於蜀者時奉母歸故作詩以送之唐書黔州黔中郡屬江南西道本三國吳黔陽郡周為黔州貞觀四年置都督府王應麟云黔中漢改為武陵郡今鼎灃浱沅黔州之地一統志今為辰州府地大家音姑東征逐楊作將陳作隨子回風生洲渚錦帆開青青竹笋迎船出日日一作白白江魚入饌來離别不堪無限意艱危深仗濟時才黔陽信使去聲應平聲稀少莫怪頻頻一作頻煩勸酒杯上四王歸養下四送還黔笋大家同回提明扶侍風生洲渚還舟之景竹江魚舟中供母臨别而歎時危以其才堪濟蜀也頻勸酒杯欲别不忍之意朱注大家東征賦維永初之有七兮余隨子乎東征逐子即隨子義也顧注婦人三從其一從子逐即從義楊用修因古樂府有一母將九雛欲改逐為將將子領子也澤州陳冢宰注依賦直當作隨子中楚國先賢傳孟宗最孝母好食笋冬月無之宗入林哀號笋為之生庾信春賦新芽竹笋俄東觀漢記姜詩與婦傭作養母母好飲江水嗜魚鱠而湧泉舍側味如江水每旦出雙鯉魚須降濟時才薛道衡詩幸逢為善樂吳祗詩玉關信使斷楊慎曰杜詩青青竹笋迎船出白白江魚入饌來用孟宗姜詩事韋蘇州送人省覲詩云沃野收紅稻長江釣白魚又云洞庭摘朱果松江獻白鱗然杜不如韋句之雅青青自好白白近俗有似童謡白白一羣鵝之句矣竟朱瀚曰首句逐字無出次句可入元人院本三四是吳歌而用事亦俗五句無聊之極六句上文不接但勦襲安危須仗出羣材句耳七八淺易又似酒肆主人聲口喜雨據原注有浙右多盜賊句朱注謂舊唐書寶應元年八月台州人袁朝反陷浙東州郡廣德元年四月李光弼討之此詩末首注語正指袁朝也是時公在梓閬間故有巴人困軍須之句諸本編次皆失之題鮑照有喜雨詩春旱天地昏日色赤如血農事都已樊作未休兵戎况騷屑歲旱兵興兩意並提血趙次公曰晉光熙元年五月壬辰日光四散赤如流照地皆赤吳均詩仲秋黃葉下長風正騷屑騷屑不安貌巴人困軍須慟哭厚土熱滄江夜來雨真宰罪一雪穀根小一作少蘇息沴音例氣終不滅何由見寧歲解我憂思結此憫巴人之困窮未前四喜久旱得雨後四憂兵戈息分應起段詩旱災為虐此造化之罪愆也惟一雨足以洗雪之公吾將罪真宰黃希曰巴人謂三巴之人滄江即梓州之江黃鶴指為夔江非是任昉遊桐廬詩滄江路窮此知滄江可槩用莊子陰陽之氣有沴國語自子之行晉無寧歲崢嶸羣一作東山雲交㑹未斷絶安得鞭雷公滂沱洗吳越原注時浙右多盜賊章從蜀中想到吳越以感時意收結此中段八句起結各四句斷絶周禮陰陽之所交風雨之所㑹詩曹操詩不可初學記易傳曰雷神曰雷公月離於畢俾滂沱矣孫季昭曰杜詩結語每用安得二字皆切望之詞安得廣厦千萬間大庇天下寒士俱歡顔安得壯士挽天河淨洗甲兵長不用此用安得鞭雷公滂沱洗吳越皆是一片濟世苦心述古三首鶴注此當是廣德元年代宗即位後作時公在梓州趙次公曰述古者引古事以諷今也赤驥頓長纓非無萬里姿悲鳴淚至地為去聲問馭者誰鳯凰從東一作天來何意復扶又切高飛竹花不結實念子忍朝飢古來一作時君臣合可以物理推賢人識定分音問進退一作用固一作因其宜此傷賢士不遇也泌趙次公注肅宗初立任用李張鎬房琯諸賢其後或罷或斥或歸隱君臣之分不終故言驥非善馭則頓纓鳯無竹實則飛去君臣遇合其難如此賢者可不明於進退之義乎詩穆天子傳右驂赤驥而左白義長纓馬鞅也陸機長纓麗且鮮王褒頌周流八極萬里一息仰悲鳴淚下霑地李陵書牧馬悲鳴後漢楊震傳俯為問為此而問也戰國䇿驥服鹽車上太行漉汗灑地中阪遷延負轅而不能上伯樂遭之下車攀而哭之解紵衣以羃之驥於是俯而噴仰而鳴者何也彼見伯樂之知已也日楚辭鳯凰高飛而不下韓詩外傳黃帝即位鳯凰蔽而至止帝東園集帝梧桐食帝竹實鸞范雲詩竹花何莫莫時李畋該聞集云舊稱竹實為鳯所食今近道竹間見花開如棗結實如麥江淮號為竹米乃荒年之兆其竹即死信非鸞鳯之食近餘干人言彼有竹實大如雞子竹葉層層包裹味甘勝蜜食之令人心肺清冷生深竹茂林處乃知鸞鳯所食必非常物也詩惄如調飢韓詩作朝飢薛君章句朝飢最難忍有淮南子耳目之察不足以分物理歐陽建詩窮逹定分表記事君難進而易退則位有序市人日中集於利競錐刀置膏烈火上哀哀自煎熬農人望歲稔相率除蓬蒿所務榖一作農為本邪贏無乃勞舜舉十六相去聲身尊道何高秦時任商鞅法令如牛毛此諷當時理財者秦市爭利農藝穀此本末之辨舜舉賢致治知本計也苛法斂民但趨末耳謀國者奈何不知鑒哉上兩段亦屬引端正意在結末稅朱注是時第五琦劉晏皆以宰相領度支鹽鐡使榷四出利悉錐刀故言為治之道在乎敦本而抑末調盧注寶應間元載代劉晏專判財利按籍舉八年租之逋負者計其大數籍其所有謂之白著故曰商鞅不專指劉晏第五琦也韓信傳驅市人而戰之易日中為市左傳錐刀之末將盡爭之江淹書寧當爭尺寸之末競錐刀之利哉莊子膏火自煎也阮籍詩膏火自煎熬汲汲營利猶膏火相煎故下云邪贏無乃勞優謝朓詩解顔勸農人西京賦何必昏於作勞邪贏而足恃薛綜注昏勉也邪僞也優饒也十左傳天下同心戴舜以為天子以其舉十六相故也六相指八元八愷史記商鞅衛之庶公子相秦封商君天資刻薄少思變秦法令密如牛毛宗室貴戚多怨望者後滅商鞅之家漢光得天下祚永固有開豈惟高祖聖功自蕭曹來經綸中去聲興業何代無長才吾慕寇鄧勳濟時信一作亦良哉耿賈亦宗臣羽翼共徘徊休運終四百圖畫在雲臺此念中興諸將也其論光武中興而推本高祖人才思太宗創業名臣也引寇鄧耿賈比肅宗恢復諸將但昔則圖畫雲臺生享爵祿而沒垂令名今則功臣疑忌忠如李郭尚憂讒畏譏故借漢事以諷唐杜臆高祖創業蕭何養民以致賢曹參有攻城略地之功及光武中興有寇鄧以當蕭何而耿賈以戰功羽翼之猶之曹參也此見文武並用之意冠記國之將興有開必先筆丙吉傳高祖開基蕭曹為漢書蕭何曹參起刀吏為一代宗臣作史記留侯傳羽翼已成追後漢獻帝贊終我四百永虞賓東觀漢記顯宗感前世功臣圖畫二十八將於南宫雲臺陪章留後惠義寺餞嘉州崔都督赴州鶴注惠義寺在梓州此當是廣德元年夏梓州作置章留後即章彛任杜氏通典節度使若朝覲則留後擇其人以之劍唐書嘉州睂山郡屬劍南東道舊書乾元元年南節度使盧元裕請升嘉州為中都督尋罷中軍待上客令肅事有恆前驅入寶地祖帳飄金繩首段叙餞送之事切中軍指章上客指崔令嚴事定就設席言寶地金繩惠義寺左傳晉以郤縠將中軍孔融謂李膺為登龍之上客歌王洙曰縣令負弩前驅詩為王前驅沈佺期詩長入寶地漢疏廣傳設祖道供帳東都門外金觀經下有金剛七寶金幢擎琉璃地琉璃地上以黃繩雜厠間錯以七寶界法華經國名離垢琉璃為地有八交道黃金為繩南陌一作伯既留歡兹山亦深登清聞樹杪磬逺謁雲端僧回䇿匪新岸樊作崖所攀仍舊藤耳激洞門飈目存寒谷冰此山上遊覽之景下上四登山言境之高下四山言氣之涼於張逺注南陌乃寺前設祖處鮑杜臆公登惠義寺見詩兩次矣故云匪新仍舊照詩雲端楚山見䇿世說回如縈出塵閟軌躅畢景影同遺炎蒸永願坐長夏將衰棲大乘羇旅惜宴㑹艱難懷友朋勞生共幾何離恨兼相仍此寺前惜别之情悵言此地清幽可以銷暑無如席中客散倍增恨耳閟軌躅無車轍人踪也畢景謂盡一日之影躅此章四句起下兩段各八句班固傳伏周孔之軌孔魚詩金門朱軌躅鮑照詩侵星赴早路畢景逐前儔此庾信詩五月炎蒸氣傳燈録若頓悟自心即佛依而修者是最上乘禪李顒大乘賦序大乘者如來之道場也故緣覺聲聞謂之小乘申涵光曰羇旅惜宴㑹一是惜情一是惜物非久客不知詩吳均詩故人寧知此離恨煎人腸鮑照何慚宿昔意猜恨坐相仍送竇九歸成都竇九恐是成都竇少尹之子故用問絹事時蓋以省覲歸成都耶文章亦不盡竇子才縱平聲橫非爾更苦一作持節何人符大名讀書雲閣觀去聲問絹錦官城我有浣花竹題詩須一行上四稱竇才名下則送歸成都杜有文章才略而又砥節立名知其人品不凡臆起得突兀轉亦頓挫似尺水興波以苦節二字他本因聲律不諧改作持節黃鶴泥此遂竇九為檢察竇侍御誤矣雲閣觀當在成都乃平日讀書處逵通鑑梁武帝謂沈約才智縱橫王韶之贈潘綜吳詩固此苦節易彼大名騰束晳讀書賦被紈素而讀書荆應瑒釋賓子猶不能雲閣攀天衢魏志胡質為州刺史子威自京師往省自驅驢不止傳舍留十餘日告歸父賜縑一匹威跪問曰大人清貧何以得此質曰此吾俸餘聊助汝糧耳章梓州水亭原注時漢中王兼道士席謙在㑹同用荷字韻鶴注此當是廣德元年秋作句吳郡志席謙郡人梓州肅明觀道士善棊公絶席謙不見近彈棊是也沈佺期詩回借水亭幽城晚通雲霧亭深到芰荷吏人橋外少秋水席邊多近屬淮王至高門薊子過平聲荆州愛山簡吾醉亦長歌上四水亭景物下四同席交情去趙汸注首見亭在城傍次見亭臨水上吏人少略儀從秋水多前臨清曠杜臆後半並列賓主四人却流利不板屬亦長歌如荆人之歌山簡世說梁王趙王國之近貴重當時淮南王安傳武帝以安屬為諸父辨博善為文辭甚尊重之莊子高門懸簿無不走也神仙傳薊子訓至京師諸貴人各絶客灑掃凡二十三家並時各有一子訓到其家明朝至朝相問二十三人所見皆同唯所言話隨主人意答乃不同也其神變若此漢章帝詔吏人同聲謂之不煩晉山簡鎮襄陽每出遊習家池有兒童歌詳見他卷章梓州橘亭餞成都竇少去聲尹得涼字元鶴注此是廣德年秋作是年九月公至閬州秋日野亭千橘香玉杯錦席高雲涼主人送客何所作音佐行酒賦詩殊未央衰老應平聲為難離去聲别一云難為應離别賢聲此去有輝光預傳籍籍新京兆一作尹青史無勞數色主切一作缺趙張橘亭之餞公屬陪賓故上四稱梓州厚情下截祝少尹新政唯第五句帶自叙盧注東川絶域刺史每多豪舉如李梓州有玉袖金壺之艷章梓州有玉杯錦席之華亦足見天隅斗絶戎馬不交作宦者得優游膴仕此高崇文謂川中乃宰相回翔之地也漢武帝賦惜蕃華之未央央盡也唐書至德二載改成都府置尹視二京故以京兆比之青漢藝文志青史二十七篇古人以竹為簡寫書殺其故曰青史吏漢書趙廣漢張敞相繼為京兆尹民語曰前有趙張後有三王隨章留後新亭㑹送諸君鶴注新亭在梓州當是廣德元年作新亭有高㑹行子得良時日動映江幕風鳴排檻旗絶葷終不改勸酒一作醉欲無辭已墮峴山淚因題零雨詩上四新亭㑹送是景下四惜别諸君是情或座客必有絶葷者故詩中及之顧注謂指漢中王者然且諸客中當有仕梓而去者故用峴山碑以志去思舊注謂送客至襄陽者太泥晉樂曲新亭送客渚史記宋義置酒高㑹襄楚辭日吉兮時良見晉書羊祜嘗登峴山置酒祜沒陽百姓建碑其上者莫不流涕杜預因名為墮淚碑岐孫楚陟陽候送别詩晨風飄路零雨被秋草客舊館依舊編廣德元年梓州詩內詩年譜謂秋往閬州冬晚復回梓州據此則是初秋别梓秋盡復回也館周𢎞正詩依然歸舊陳迹隨人事初秋别此亭重平聲來梨葉赤依舊竹林青風幔何一作前時卷寒砧昨夜聲或作聽無由出江漢愁緒一作秋渚非日冥冥上四舊館秋景下四觸物傷情昔隨人事謂跡隨事往杜臆風幔是有今無者寒砧是昔無今有者者聲字出韻若作聽字對卷字亦穩杜詩五律無失韻蘭亭記俯仰之間已為陳迹前投幕府詩本用魚韻而起借七虞無字謂之孤雁入羣格此題客舊館本用青韻而後借八庚聲字謂之孤雁出羣格又有雙入雙出謂之進退格如前二聨用東韻後二聨用冬韻前二聨用寒韻後二聨用刪韻是也戲作寄上上聲漢中王二首原注王新誕明珠年黃鶴注當是廣德元秋在梓州作雲裏不聞雙雁過掌中貪看吳作見一珠新秋風嫋嫋吹江漢只在他鄉何處人首章憐已之飄泊故雁書不至豈為貪看新珠之乎抑知秋風江上流落他鄉者為何處人耶第二句屬戲詞雁雁足繫書從來襲用且古詩云寄我雙鯉魚此稱雙亦有所本考蔡注以雙雁比汝陽王璡之亡取兄弟雁行之義也汝陽卒於天寶九載年歲隔逺情事不符范雲詩寄書雲間雁為我西北飛珠三輔決録孔融見韋元將仲將與其父書曰不意雙生於老蚌傅𤣥詩昔君視我如掌中珠江淹傷愛子賦痛掌珠之愛子庾信傷心賦掌中珠碎九歌嫋嫋兮秋風邵寶注江水出茂州岷山東流自夔州至荆州與漢水合漢水出漢中府沔縣嶓冢山東流至襄陽又南流至荆州與江水合謝安舟楫風還起梁苑池臺雪欲飛杳杳東山擕妓去嚴滄浪作妓去舊作漢妓泠泠一作隂隂修竹待王歸次章憐王之逺謫謝安舟楫王在蓬州梁苑池臺京有舊第風起雪飛深秋景候也東山承謝安修竹承梁苑後二句屬戲詞謝安傳安嘗與孫綽等泛海風起浪湧諸人並懼安吟嘯自若舟人猶去不止風轉急安徐曰如此將無歸耶舟人承言即回衆咸服其雅量治漢書梁孝王築東苑方三百里廣睢陽城七十里大宫室為復道自宫連屬於平臺三十餘里晉灼曰或說平臺在城中東北角亦或言園在平臺側如淳曰今城東二十里有臺寬廣而不甚高俗謂之平臺謝惠連雪賦歲將暮時既昏寒風積愁雲繁梁王不悅遊於園俄而微霰零密雪下謝安傳安居東山每遊賞必以妓女從獸史記正義西京雜記梁孝王苑中竒果佳樹瑰禽異靡不畢備世人言梁王竹園也枚乘園賦修竹檀欒夾池水棕拂子鶴注詩云家貧卧災蒸當是廣德元年夏秋間作梁氏編在寶應元年梓州內是年乃九月至梓州於詩語不合子黃希曰比丘患草蟲佛聽作拂棕拂且薄陋豈知身效能不堪代白羽有足除蒼一作青蠅熒熒金錯刀濯濯一作擢擢朱絲繩非獨顔色好亦由一作用顧盻一作眄稱此言物當適用人情皆知顧惜注拂足驅蠅此其效能於人身者朱錯刀絲繩皆棕拂之飾能前漢鄒陽傳竊自薄陋扇潘嶽射雉賦思長鳴以效蜀志諸葛亮以白羽指揮軍事理詩蒼蠅之聲子酉陽雜爼西域有黑獅子棒集賢校張希復有獅尾拂夏月蠅蚋不敢集其上施青臣繼古叢編金錯刀一名而二物錢一也刀二也漢食貨志王莽更造大錢又造錯刀以金錯其文曰一刀直五千張衡四愁詩美人贈我金錯刀何以報之雙瓊瑶此言錢也續漢書輿服志佩刀乘輿通身雕錯諸侯黃金錯東觀漢記賜鄧通金錯刀此言刀也今按杜詩金錯囊徒罄銀壺酒易賖韓昌黎詩聞道松醪賤何須吝錯刀皆指錢言杜詩熒熒金錯刀濯濯朱絲繩孟襄陽詩美人聘金錯雙手膾紅鱗此皆指刀言杜詩金錯旌竿雪滿霜此以金錯於旌竿也漢秦嘉妻以金錯碗奉其夫此以金錯於碗上也古人於器物多以黃金錯之漢鮑照詩直如朱絲繩司熒熒光明貌濯濯鮮潔貌秦嘉詩熒熒華燭馬相如頌濯濯之麟嵇康詩顧盻生姿吾老抱疾病家貧卧炎蒸咂膚倦撲滅賴爾甘服膺物微世競棄義在誰肯徴三歲清秋至未敢闕緘縢此言功在平時事後不忍輕棄之拂久效能情義猶在但過時則忘誰肯徴收乎公三歲緘藏有不棄著簪之意此詩借物寓言君子不遺舊交義王如此筐朱注班婕妤團扇詩常恐秋節至涼飈奪炎熱棄捐笥中恩情中道絶末二句從班詩翻出子此章上下各八句咂膚指蠅咂與噆同齧也抱撲蚊噆膚則坐不得安難書其猶可撲滅莊服膺持拂於胸前也東方朔答客服膺而不可釋子惟恐緘縢扄鑰之不固送陵州路使去聲君之郭作赴任鶴注此廣德元年秋在梓州作時河北已平故云幽燕通使者山朱注唐書陵州仁壽郡屬劍南東道本隆郡天寶元年更名王室比必二切荆作此多難去聲高官皆武臣幽燕平聲通使去聲者嶽牧用詞人從時事叙起融時平復用詞人故路君得膺此任孔喻邳原書王室多難朱注按史是時諸州久屯軍旅多以武將兼領刺史法度廢弛人甚弊之故有高官皆武臣之嘆說苑高官大位德唐山夫人歌詔撫成師武臣承唐虞時有四嶽十二牧國待賢良急君當拔擢新佩刀成氣象行蓋出風塵戰伐乾坤破瘡痍府庫貧衆寮宜潔白萬役但一作萬物役平均此勉使者初政之吕䖍佩刀刺史事皂蓋行縣太守之職路殆郡守故兩用之亂後民貧當潔身以率屬平役以愛民公孫𢎞傳上方興功業屢舉賢良佩陸雲傳不以駑暗特䝉拔擢乃晉書吕䖍為刺史有刀相者以為必三公可服䖍贈别駕王祥曰卿有公輔之望故相與也萬穆天子傳天子答西王母曰和治諸夏民平均霄漢瞻佳士一作家事泥塗任此身秋天正搖落回首大江濱此述送行之情霄漢泥塗彼此懸隔矣回首江濱望其見憶也濱此章中段八句起結各四句王粲詩率彼江朱鶴齡曰高適在蜀請合東西川疏云嘉陵比為夷獠所陷今雖小定瘡痍未平可證陵州先經寇亂矣惜二史不載其事此詩潔已平役蓋以文臣救亂之道告之耳送元二適江左黃鶴編在廣德元年今姑仍之西朱注王右丞集有送元二適安詩疑即此人舊注以元二為元結考本傳結未嘗至蜀亦未嘗適江左也亂後今相見秋深復扶又切逺行風塵為客日江海送君情晉室丹陽尹公孫白帝城經過平聲自愛惜取次莫論平聲兵原注元嘗應孫吳科舉承上四送别傷情下則囑其前途慎密也風塵亂後江海承逺行二句有無窮之悲自白帝而丹陽乃江左經過處此與白狗黃牛峽朝雲暮雨祠同是起下語時藩鎮多跋扈觀望者故戒其毋談兵以賈禍丹趙汸注亂離之際作客送客倍難為情胡孝轅曰陽尹不必指定晉何人南渡初如溫嶠劉隗尹京多在王敦俶擾際而子陽負劍稱白帝大似肅代朝節鎮分據景象用此二語先之正為論兵語脉也朱注云宋書漢元封三年立丹陽郡治今宣城之宛陵縣晉武帝太康二年分丹陽為宣城郡治宛陵而丹陽移治建業元帝太興元年改為尹領縣八梁元帝丹陽尹傳序自二京板蕩五馬南渡因乃上燭天文下應地理即變淮海為神州亦即丹陽為京尹劉謙三晉記蘇峻召祖約為逆約遣許柳以衆㑹峻充京師拜丹陽尹後以罪誅復元和郡縣志白帝城與赤甲山相接初公孫述至魚有白龍出井中因號魚復為白帝城容邵注取次猶言即次之處黃生注此當時方言猶從之意今按當是次第之意北齊樂歌日日飲酒醉國計無取次白居易詩老愛尋思事慵多取次眠又遇客踟蹰立尋花取次行又閒停茶碗從容語醉把花枝取次吟兵史記孫子臏腳而論法九日鶴注此廣德元年在梓州作去年登高郪縣北今日重平聲在涪江濱苦遭白髮不相放羞見黃花無數新世亂鬱鬱久為客路難悠悠常傍去聲人酒闌却憶十年事腸斷驪山清路塵公在梓州自歎兩度重九也上四九日情事下四旅中感懷而白髮黃花本屬常景只添數虛字語意便新世亂久為客愈增鬱鬱路難而長傍人倍覺悠悠兩句中含多少悲傷酒闌以後忽憶驪山往事蓋歎明皇荒遊無度以致世亂路難也末作推原禍本方有關係若徒說追思盛事詩義反淺矣鶴曰梓州治郪縣水經涪江水東南合射江射江在梓州顧注涪江在郪縣西二百里自涪城縣東南流入縣界不相放謂不饒人月令季秋之月菊有黃花宗杜臆天寶十四年冬公自京師歸奉先路經驪山𤣥方幸華清宫安祿山反然後還京至此十年矣所以憶之而腸斷也暮清路麈輦出而清道也滑稽傳日酒闌合尊促席對雨顧注此廣德元年秋作時公從梓州將往閬州也七月吐蕃盡取河隴邊備正嚴故云雪嶺防秋急雨北齊劉逖有對詩題莽莽天涯雨江邊獨立時不愁巴道路恐濕一作失漢旌旗雪嶺防秋急繩橋戰勝遲西戎甥舅禮未敢背倍同恩私上四雨景下四感時但雨時獨立憂思並起故不愁身經梓閬巴路﨑嶇恐征人逢雨旗濕難行耳因思雪嶺繩橋乃禦寇之地今防秋方急而戰勝無期事勢大可慮矣或者吐蕃念甥舅之禮不忍背我國恩乎然其情終未可測也遲五六句上四字連讀下一字另讀杜臆雨濕則行故以為恐須溪改為失非是未有大軍過而防旌旗之迷失者今按宋僧惠崇詩劍㦸明山雪旌旗濕海雲正用杜濕旌旗語也鶴曰九域志雪嶺距威州二百六十里威即維州高適傳適出西山三城置戍論東西兩川當合為一即雪嶺也師氏曰邊人秋高馬肥常入寇故云防秋橋鶴曰唐志注唐興有羊灌田朋笮繩橋三守捉城繩蓋三城之一非指岷江竹橋也按繩橋兩岸立巨木繫竹繩為橋駕空而渡趙曰中宗景龍二年以金城公主妻贊普故望其篤甥舅之禮盧注郭子儀嘗言吐蕃無道不顧甥舅之禮結句蓋反用之左傳夫齊甥舅之國也鮑照詩結主逺恩私薄暮顧注廣德元年秋在閬州作是年九月至閬州周捨詩况兹薄暮情薄迫也江水長流一作最深地山雲薄暮時寒花隱亂草宿鳥探一作擇深枝故一作舊國見何日高秋心苦悲人生不再好鬢髮自一作白成絲上四暮景下四暮情喻此詩縱橫看來意無不合晚花隱色已之混迹夕鳥歸林方已之避亂此雖寫景而兼屬寓言故國生悲仍與流水相應白頭興歎又與暮雲相關脉理之精細如此空張正見詩霜雁排斷寒花映日紅閬州奉送二十四舅使去聲自京赴任青城鶴注此當是廣德元年作臆顧注此舅氏使蜀還京隨有青城之命也杜閬州今為保寧府附郭有閬中縣青城縣屬成都聞道去聲王喬舄名因太史傳如何一作何如碧雞使去聲把詔紫微天秦嶺愁回首一作馬涪音浮江醉泛船青城漫汚雜吾舅意凄然上四惜舅氏外授下四送舅氏赴任今王喬因太史而傳見外吏有藉於朝臣以王朝之使詔除縣令是京官反為外吏矣如何二字訝而惜之也秦嶺不堪回首涪江且醉客船自此至青城見彼汚雜之俗舅氏得不悽然乎伺後漢王喬為葉令每朔望來朝雙鳬先至帝令太史之得朝舄二前漢王褒傳益州有金馬碧雞之神宣帝使褒往祀焉公舅必先使於蜀也杜臆青城為第五大洞寶仙九室之天故云紫微天一說紫微殷名開元四年召縣令䇿於廷二十四年宴新除縣令於朝堂因知除授縣令得把詔紫微也雖鶴曰唐志秦川有秦嶺縣貞觀二年省又曰涪江出合州而水經則云涪江水東南合射江則梓閬皆可通言言閩中陳氏曰汚言風俗雜居民王閬州筵奉酬十一舅惜别之作鶴注此是廣德元年九月至閬州作時吐蕃黨項與僕固懷恩之亂方殷故有羣盜如毛之句邵寶注公母崔氏十一舅乃是崔氏梓九域志閬州西至州二百二十里萬壑樹聲滿千崖秋氣高浮舟一作雲出郡郭别酒寄江濤此記王閬州筵曰杜臆起語筆力雄壯而别景已覺凄然陳師道世稱杜牧之南山與秋色氣勢兩相高老杜云千崖秋氣高才用一句而語益工非世說顧愷之曰千巖競秀萬壑爭流江總詩樹聲有意也梁簡文帝詩千崖共隱天浮宋五賦悲哉秋之為氣天高而水清魏文帝詩舟橫大江吳均詩離歌玉絃絶别酒金巵空良㑹不復扶又切久此生何太勞窮愁但一作唯有骨羣盜尚如毛吾舅惜分手使去聲君寒贈袍沙頭暮黃鶴一作鵠失侣亦一作自哀號平聲㑹此叙惜别之情良二句傷舅窮愁二句自慨舅有分手之詩王有寒袍之贈兩感其意也孤鶴哀號比别後凄凉之况黃生注起語激厲結調悲惋首尾自相稱子此章上四句下八句形洛神賦悼良㑹之永絶莊大塊勞我以生史記太勞則敝但有骨猶云貧到骨家語子路靜思不食以至骨立賈誼新書反者如蝟毛而起謝瞻詩分手東城闉記贈袍是贈已不是贈舅若贈舅氏不煩公代謝矣史范睢見須賈賈曰范叔一寒至此乃取一綈袍以賜之長孔德紹詩華亭失侣鶴門賦白鶴噭以哀號閬州東樓筵奉送十一舅往青城得昏字四盧注時二十舅赴任青城十一舅與之同往也前是奉酬之作此是奉送之作一統志東樓在保寧府治南嘉陵江上唐杜甫有詩曾音層城有高樓舊作㑹制古丹雘存迢迢百餘尺豁逹開四門雖有一作㑹車馬客而無人世喧遊目俯大江列筵慰别魂首記東樓别筵有淮南子崑崙之山有層城九重古詩西北高樓書惟其塗丹雘丹朱色雘采色各塗以膠漆也賦西京賦迢迢以亭亭闢古詩雙闕百餘尺景福殿開南端之豁逹書四門遊陶潛詩結廬在人境而無車馬喧别儀禮注目所視廣也謝靈運詩得以慰魂是時秋冬交節往顔色昏天寒鳥獸伏一作休霜露在草根今我送舅氏萬感集清樽豈伊山川間去聲回首盜賊繁此叙臨别情景句冬時物皆休息而已獨浪迹他鄉所以增感山川二傷長安亂離也顔色昏謂黯淡無光雪賦歲將暮時既昏靈沈約詩草根積霜露穆詩我送舅氏曰至渭陽謝運詩萬感盈朝昏天子傳王母歌曰道里悠逺山川間之高賢意不暇王命久崩奔臨風欲慟哭聲出已復吞末又兼懹青城舅氏氏前奉命而任青城者實以賢勞之故今舅復往益覺孤危矣故傷心而欲哭屢此章前二段各八句末段四句收比謝靈運詩圻岸崩奔山下墮曰崩水急流曰奔此行役之匆遽書李陵答蘇武書臨風懷想能不依依晉阮籍車轍所窮每慟哭而返放船按鶴注此廣德元年秋閬州作蓋蒼溪屬閬州橘熟在秋候也杜臆地志蒼溪於閬中為上遊臨嘉陵江今有放船亭因杜詩得名送客蒼溪縣山寒雨不開直愁騎馬滑故作放舟回青惜峯巒過黃知橘柚來江流大音太一作天自在坐穩興去聲悠哉上四放船之由下四放船景事象見青而惜峯過望黃而知橘來皆舟行迅速之青是雨後色黃是秋深色志趙汸注青字黃字略讀乃上一字下四字格寰宇閬州蒼溪縣因縣界蒼溪谷為名嘉陵江在縣東一里東南流九域志在閬州西北四十里曰樓鑰曰嘗與蜀黃文叔裳食花椑因問蜀中有此乎此物甚多正出閬州杜詩所云黃知橘柚來誤矣曽親到蒼溪縣順流而下兩岸黃色照耀直似橘柚其實乃花椑也問之土人云工部既誤有好事者欲為解嘲於其處大種橘柚終非土宜無一活者椑音悲諸葛武侯黃陵廟記峯巒如畫曝劉楨詩橘柚生南國夏統别傳統在船所市藥穩坐不搖葛常之曰五律於對聨中作一意詩家謂之十字格如放船詩直愁騎馬滑故作放舟回對雨詩不愁巴道路恐濕漢旌旗江月詩天邊長作客老去一霑巾是也王嗣奭曰此聨却是流水對公别有十字句法如子規詩渺渺春風見蕭蕭夜色凄是也如吳子良偶談錢起詩山來指樵火峯去惜花林不此詩青惜峯巒過黃知橘柚來薄遊鶴注唐志閬州綿州皆為巴西郡公廣德元年曽至兩郡但至綿乃是春晚至閬乃是秋晚詩言病葉寒花當是閬州作周捨詩薄遊久已倦淅淅一作漸漸風生砌團團日一作月隱牆遙一云滿空秋雁滅一作過半嶺暮雲長一云張病葉多先墜寒花只暫香巴城添淚一作月眼今夕一作夜復扶又切清一作秋光上四叙景薄遊所見下四言情薄遊所感寒風聲日影屬近景空雁嶺雲屬逺景病葉寓言憔悴花自况凄涼觸景增悲故淚添此夕耳光五六賦中帶比故屬下截七八用倒裝句本是對清而墮淚謝惠連詩淅淅振條風淅淅風聲細也言班婕妤詩團團似明月何遜詩團團日隱洲楊杜審詩迸水落遙空宋之問詩還鄉秋雁飛慎丹鉛録衢州爛柯橋斷碑詩有句云薄烟羃逺郊遙峯沒歸翼蓋六朝人語杜詩遙空秋雁滅本此唐詩帆帶夕陽千里沒亦本此信詩雙雙淚眼生李百藥詩雲凝愁半嶺城庾閬州屬巴郡地故曰巴嚴氏溪放歌一作放歌行作此依朱氏編在廣德元年秋閬州朱注華陽國志閬中有三狐五馬蒲趙任黃嚴為大姓唐書李叔明傳閬州嚴氏子疏稱叔明少孤養於外族遂冒其姓可證嚴氏溪在閬州溪蓋以其族名也天下兵一作甲馬未盡銷豈免溝壑常漂漂劍南歲月不可度邊頭公卿仍獨樊作何其驕費心姑息是一役肥肉大酒徒相要平聲嗚呼古人已糞土獨覺志士甘漁樵此自傷旅况歎時無知已也要邊鎮驕蹇凌物即有時小惠姑息其所費心不過相一役而已酒肉之外豈有愛敬真情乎因歎古之好士者不可復作志士獨向漁樵而遁迹耳此句起下邊頭公卿恐指章彝鮑氏指郭英乂趙注謂郭在成都非邊頭也以洙曰成都在劍嶺之南楊慎曰記君子之愛人也德細人之愛人也以姑息注姑且也息休也此說殊晦尸子紂棄黎老之言而用姑息之政注姑婦女也息小兒也杜臆是一役言徒以此一役了事耳舊注誤謂以一役夫待人左傳陰飴甥曰一役也秦可以霸韓非子厚酒肥肉甘口而病形吕氏春秋肥肉厚酒務以相强命曰爛腸之食晉語玉帛酒食猶糞土也况我飄蓬鮑作轉無定所終日戚戚忍羇旅秋宿樊作夜霜一作清溪素月高喜得與子長夜語東遊西還力實倦從此將身更何許知子松根長子兩切茯苓遲暮有意來同煮此過嚴氏溪欲與之偕隱也候漂流無定之時喜得溪邊景色且當此筋力已衰之不如託此以養生矣朱注閬州在梓州之東此言東遊閬州又西還梓州也趙次公謂西還成都迎家者誤引去年事耳此章兩段各八句分韻更何許言此身更往何所乎時解謂將身更許何人者未然晉童謡天子在何許本草茯苓千歲松脂也作丸散服能斷榖不飢警急原注高公適領西川節度二鶴注當是廣德元年十月閬州作是年十月吐蕃陷松維州師蔡夢弼曰考史代宗即位吐蕃陷隴右漸逼京適練兵於蜀臨吐蕃南境以牽制之師出無功尋失松維等州此詩乃松州未陷時作漢書備邊防警急才名舊楚將去聲妙略擁兵機玉壘雖傳檄松州㑹解圍和親知計拙公主漫無歸青海今誰得西戎實飽飛題曰警急畏邊警之日急也疆上四望高適下四憂吐蕃失高公才略自足控制邊但恐和親失計於前青海守於後一時驟難攘斥耳王魏志賈詡傳臨菑侯甚有才名朱注至德二年永璘反適因陳江東利害永王必敗肅宗竒其對以適為揚州左都督府長史淮南節度使故云舊楚將李乂詩河塞有兵機玉壘山有二此指威州之玉壘松趙注吐蕃入寇故檄書傳聞鶴注此云㑹解圍時州尚未陷也黃希曰當時以金城公主下嫁吐蕃而卒不免其入寇所以為計拙漫徒然也趙曰青海復為吐蕃所得如飽鷹之不可縶紲矣城天寶中哥舒翰曾築於青海四明揚守陳曰此下三章皆為高適作譏其不能禦侮也首冠以才名楚將妙略兵機而下皆敗北之事則機略概可見矣王命詩王命南仲漢一云漠北豺狼滿巴西道路難血埋諸將去聲甲骨斷使去聲臣一云君鞍牢落新燒棧蒼茫舊築壇深懷喻蜀意慟哭望王官一云京巒事題曰王命望王朝之命將也戰上六叙時下二想安邊西戎入寇和無功故諸將之血埋入於甲中使臣之骨幾斷於鞍上今棧閣已燒而始用舊人亦已晚矣此時安得詔書諭蜀以退寇兵乎故人皆慟哭而望王官之至也西趙曰漢與巴相連蓋吐蕃入寇之地漢北為褒斜巴則綿漢也鶴曰渭北兵馬使吕月將將精卒二千與吐蕃戰於盩厔兵為賊所擒所謂血埋諸將甲也趙曰廣德元年使李之芳崔倫往聘吐蕃留而不遣所謂骨斷使臣鞍也朱注上元二年二月奴刺黨項寇寶雞燒大散關所謂牢落新燒棧也廣德元年十月吐蕃帥吐谷渾黨項氐羌二千餘萬衆度渭命郭子儀禦之子儀得二千騎而行所謂蒼茫舊築壇也人朱注王官當指嚴武吐蕃圍松州高適不能制故蜀思得武以代之史高帝紀諸將過此者多道陳子昻詩當盡使臣能注漢書張良說漢王燒絶棧漢高帝築壇在漢中見七卷其司馬相如傳唐䝉通夜郎徴巴蜀吏卒用軍興法誅渠帥巴蜀大驚恐上使相如責䝉等因喻告巴蜀人以非上意征夫詩騂騂征夫十室幾人在千山空自多路衢唯見哭城市不聞歌漂梗無安地銜枚有荷去聲戈官軍未通蜀吾道竟如何題曰征夫傷征人之喪敗也有上四哀陳亡者多下四歎援師不至千山空多言險莫守銜枚荷戈望官軍來救吾道如何自慨進退失據矣周盧注官軍未通蜀仍望嚴武也漂梗注見一卷禮軍旅令銜枚禁無囂漢書高帝紀章邯夜銜枚擊項梁定陶顔師古注枚狀如箸橫銜之結鈕而繞項以止言語也詩荷戈與祋西山三首鶴注此廣德元年松州被圍時作夷盧注圖經云岷山巉絶崛立捍阻羌全蜀依為巨屏夷界荒山頂蕃州積雪邊築城依一作連白帝轉粟上上聲青天蜀將去聲分旗鼓羌兵助一作動鎧鋋一作井泉西南背倍同和好去聲殺氣日相纒此章記西山時事三首聨言地之逼次聨言守之難聨言戰之急末聨言戰之故青荒山頂望可見雪嶺邊近易侵也依白帝擬其高上天狀其險蜀將㑹討之師羌兵服屬之夷背和尚殺故須同仇以敵愾有杜臆築城轉粟見謀國者之失算高適諫之不聽則分其過者矣黃希曰白帝西方之帝也舊引䕫州白帝城非是城李白蜀道難蜀道之難難於上青天高適請減三戍兵疏平戎以西數城邈若窮山之巔蹊隧險絶運糧於束馬之路坐甲於無人之鄉公東西兩川說仍使羌兵各繫其部落殺鎧頭盔鋋小矛蔡琰笳曲氣朝朝衝塞門補注漢韓安國傳轉粟挽輸辛苦三城戍長防萬里秋烟塵侵火井雨雪閉松州風動將軍幕一作蓋天寒使去聲者裘漫平聲山賊營一云成壁壘回首得無憂次章記松州之圍卒上四叙寇邊之事下四歎安邊無䇿戍防秋而犯邊者屢至侵火井彼深入矣閉松州此被圍矣行軍遣使和戰兩疲賊壘漫山長驅莫遏也鶴曰唐志火井在邛州有火井縣九域志云有火井在蓬州蓬與果巴州為鄰而邛與雅州為鄰雅去羇縻羅巖州不滿三百里此當指邛而言松維二州唐屬西川自廣德元年後吐蕃復置行州以首領為刺史司馬矣蔡雍樂府海水知天寒子弟猶深入關城未解圍蠶崖鐵馬瘦灌口米船稀辨士安邊䇿元戎決勝威今朝烏鵲喜欲報凱歌歸三章憂松州將陷也稀上四言時勢之危下四望和戰有成而鐵馬瘦米船見兵疲糧盡矣軍幕使裘戰和無益猶云辨士元戎者蓋思兩者之中得一以濟庶可却敵而凱旋耳公東西兩川說兼差堪戰子弟向二萬人足以備邊守險灌寰宇記蠶崖關在導江縣西北四十七里寰宇記口鎮在導江縣西六十里方輿勝覽淳熙五年胡元質奏曰唐之季年吐蕃入寇必入黎文南詔入寇必入沈黎吐蕃南詔合入寇必出灌口沈黎兩州去成都千里關隘險阻足以限隔唯灌口一路去成都止百里又皆平陸朝發夕至威茂兩州即灌口之蔽障西希曰唐志彭州導江縣有蠶崖關寰宇記灌口山在嶺有天彭關又云有灌口鎮在彭州九隴縣然則蠶崖灌口蓋在彭州也無庾信賦陶侃空爭米船顧榮虛搖羽扇莊子辨士談說之序則不樂范睢傳范睢蔡澤世所謂一切辨士啓趙充國傳全師保勝安邊之䇿詩元戎十乘以先行史記決勝千里之外至西京雜記烏鵲噪而行人凱歌見前贈高適詩注公抱憂國之懷籌時之略而又洊逢亂離故在梓閬間有感於朝事邊防凡見諸詩歌者多悲涼激壯之語而各篇精神煥發氣骨風神並臻其極此五律之入聖者熟復長吟方知為千古絶唱也與嚴二郎一作歸奉禮别鶴注此當是廣德元年在閬州作唐書太常寺奉禮郎二人掌君臣班位以奉朝㑹祭祀之禮詳詩語時嚴蓋入京師赴職别君誰暖眼將老病纒身出涕同斜日臨風看去塵此送别之意塵頂别誰暖眼言冷眼者多斜日頂老去易出涕沱若楚辭臨風兮浩歌商歌還入夜巴俗自為鄰尚愧微軀在遙聞盛禮新山東羣盜散闕下受降音杭頻諸將去聲歸應平聲盡題書報旅人此别後情事商歌巴俗自傷寥落遙聞盛禮喜嚴為奉禮也盜息兵歸正獻俘告廟禮官從事之時故囑其一報太平此章上四句下八句飯淮南子寧戚飯牛車下擊牛角而疾商歌此詩正用牛夜半語劉孝綽啓參陪盛禮莫匪國華任昉表不得臨列闕庭共觀盛禮受黃鶴曰是時薛嵩以四州降田承嗣以魏州降故云降頻事在寶應元年冬廣德元年春素漢書武帝使公孫驁築塞外受降城班婕妤搗賦書既封而重題贈裴南部原注間袁判官自來欲有按問唐鶴注此廣德元年公至閬時所贈書南部縣屬閬州塵滿萊蕪甑堂橫單父音甫琴人皆知飲水公輩不偷金此言裴君以清節受誣史杜臆人皆知管下句此十字格也後漢書范丹字雲為萊蕪長清貧人歌曰甑中生塵范史雲釡中生魚范萊蕪鄧吕氏春秋子賤為單父宰彈琴不下堂而治晉書攸為吳郡守載米之官俸祿無所受飲吳水而已金漢書直不疑為郎其同舍有告歸者持同舍郎金去主意不疑不疑買金償之後告歸者來而歸金金主大慙梁獄書應一作因上上聲一作作秦臺鏡欲臨獨醒時所嫉羣小謗能深即出黃沙在何一作應須白髮侵使去聲君傳舊德已見直繩心此望袁君以直道仲枉也秦鏡獨明故嫉謗得剖而寃獄可出使君指袁判官者此章上四句下八句漢書鄒陽從梁孝王遊羊勝讒毁之下吏陽從獄中上書王出之時裴必有訴理之詞也高西京雜記高祖入咸陽宫周行府庫有方鏡廣四尺五尺九寸表裏洞明人直來照之影則倒見以手掩心而來即見腸胃五臟又女子有邪心則膽張心動楚辭衆人皆醉我獨醒曰詩愠於羣小習黃沙獄名魏志高柔傳注晉諸公贊柔次子光少家業明練法理晉武帝世為黃沙御史與中丞同駱賓王在獄書懷詩青陸芳春動黃沙旅思催張載詩憂來令髮白陳琳檄舊德名臣多在載籍繩晉書李𦙍遷御史中丞恭恪直百官憚之巴山鶴注此是廣德元年十一月公在閬州作閬居巴子之國故曰巴山巴山遇中使去聲云自陜郭作陜舊作峽非城來盜賊還奔突乘去聲輿恐未回天寒邵伯樹地濶望仙臺狼狽風塵裏羣臣安在哉此章在巴山而慨朝事也上四憂在君上下四責及人臣盜賊二句述中使之言顧注甘棠樹望仙臺俱屬陜州近境時天子在陜故有天寒地濶之感吐蕃入寇徴兵不應官吏奔散曰羣臣安在譏文官不能扈從武將不能禦敵也故唐書陜州陜縣有陜城宫水經河水又西徑陜縣城南注昔周召分伯以此城為東西之别括地志邵伯廟在洛州壽安縣西北五里有棠在九曲城東阜上九域志邵伯甘棠樹在陜州府署西南隅志三輔黃圖望仙臺漢武帝所建在華州華陰縣長安望仙臺在鄠縣西三十里籍狼狽注見前哉阮詩梁王安在早花杜臆此與前篇乃一時之作西京安穩未不見一人來臘日一作月巴江曲山花已自開盈盈當雪杏艷艷待春一作香梅直苦風塵暗誰憂客一作容鬢催此歎臘盡花開而亂猶未平也首首聨傷時次聨感物五六承次聨七八承聨不見人來無確耗也一杜臆早花有二意一是因聞報之遲而傷花開之早是見花開之早而感年華之易邁但憂亂為重不暇憂老耳志此詩上四散行下四整對亦藏春格也鶴注長安天寶六年曰西京至德二年曰中京上元二年復曰西京按紀上元二年曰上都志誤也此云西京者循舊名也漢書武帝曰君除吏未此詩未字所本女古詩盈盈樓上發閬中鶴注廣德元年九月公自梓入閬冬末復歸梓明年初春又至閬詩云别家三月當是元年冬晚歸梓州時作曰舊唐書閬水迂曲經郡三面故閬中前有毒蛇後猛虎溪行盡日無村塢江風蕭蕭雲拂地山木慘慘天欲雨女病妻憂歸意急一作速秋花錦石誰能一作復數所主切别家三月一書來一作得書避地何時免愁苦此自閬州回梓而作也可上四閬中景物下四發閬情事蛇虎為患無村避且當此雲迷雨暗愈增中途悽愴矣女病妻憂即於家書中見之浮劉向新序前有大蛇如堤庾肩吾詩錦石鎮橋江陵望幸謂江陵人望車駕之臨幸也南朱注唐書上元初吕諲建請荆州置都於是更號江陵府以諲為尹置永平軍萬人以遏吳蜀之衝廣德元年冬乘輿幸陜以衛伯玉有幹略可當重寄乃拜江陵尹充荆南節度觀察等使詩所云甲兵分聖㫖居守付宗臣也時公在巴閬傳聞代宗欲巡幸江陵故有此作封禪文太山梁父設壇望幸雄都元壯麗望幸歘威神地利西通蜀天文北照秦風烟含越鳥舟楫控吳人未枉周王駕終期漢武巡甲兵分聖㫖居守付宗臣早發雲臺仗刋作路恩波起涸鱗首句江陵次句望幸中四詠江陵形勢下六寫望幸情事作短章排律多在首聨扼題此定式也西蜀北秦南越東吳江陵四至之地甲兵分自聖㫖以衛伯玉統兵往鎮也居守付之宗臣時郭子儀留守西京也發雲臺天子將巡起涸鱗窮民待澤顔史記蕭何曰天子以四海為家非壯麗無以重威延之詩望幸傾五州甘泉賦象泰一之威神魯靈光殿賦景福兮帝室之威神注威神言尊嚴也孟子天時不如地利謝靈運詩列宿炳天文南秦分野占狼弧狼弧與南極老人星相近是天星在而北照秦野也謝朓詩風烟有鳥路子古詩越鳥巢南枝肆易舟楫之利以濟不通車左傳革曰昔周穆王欲其心周行天下必將有轍馬跡馬甲漢書武帝南巡至於盛唐韋昭曰在南郡君詩修我兵前漢陳湯傳承聖㫖倚神靈左傳行則居守史記留侯世家羣臣居守北漢書蕭何傳為一代之宗臣庾信哀江南賦非無闕之心猶有雲臺之仗轍丘遲詩肅穆恩波被去涸鱗本莊子涸之鮒駱賓王詩涸鱗轍還遊海葛常之曰近時論詩皆謂對偶不切則失之粗太切則失之俗如江西詩社所作慮失之俗也老杜江陵詩云地利西通蜀天文北照秦秦州詩云水落魚龍夜山空鳥鼠秋叢篁低地碧高柳半天青豎子詩云楂梨且綴碧梅杏半傳黃如此之類可謂對偶太切矣又何俗乎如云雜蘂紅相對他時錦不如磨滅餘篇翰平生一釣舟之類雖對不求太切而未嘗失格律也學詩者當審此愁坐單復編在廣德元年梓州詩內詩云終日憂奔走時蓋往來梓閬間也鮑照詩空愁坐相誤沈佺期詩愁坐饒蟣蝨高齊常見野愁坐更臨門十月山寒重孤城水氣昏葭萌氐種上聲逈左擔去聲犬戎屯音諄一作存終日憂奔走歸期未敢論平聲葭上四叙景愁坐所見下四感事愁坐所思萌左擔與梓州相近氐種指羌人犬戎指吐蕃恐其內外相結為亂故憂奔走也高高齊乃齊之通名公詩屢言高齊有指他人言者如齊坐林杪是說白水崔少府之齊有就自已言者如高齊常見野是說梓州所寓之齊後䕫州詩高齊凡三見亦同此例其華陽國志蜀王封其弟葭萌於漢中號曰苴侯因命地曰葭萌唐書葭萌縣屬利州楊慎曰太平御覽引李充蜀記云蜀山自綿谷葭萌道徑險窄北來擔負者不容易肩謂之左擔道益州記陰平縣有左擔道其路至險自北來者擔在左肩不得度右肩也陰平在今之文縣任豫益州記江油左擔道乃鄧艾懸車束馬之處也遣憂盧注廣德元年吐蕃入寇邊將告急程元振皆不以聞十月深入上方治兵吐蕃已度便橋上出幸陜州吐蕃入京師焚燒一空公聞而心傷故曰遣憂吳曾漫録唐顧陶大中丙子歲編唐詩類選載此詩世所傳杜集皆無之亂離知又甚消息苦難真受諫無今日臨危憶古人顧作傷故臣紛紛乘白馬攘攘著陟略切一作看黃巾隋氏留顧作營宫室焚燒何太頻亂離一句直攝通章祿山之後再陷吐蕃故云又甚代宗出奔未知復國故云難真受諫二句推致亂之由白馬四句傷世亂之極亦杜臆若早能受諫則無今日之亂至臨危而憶古人已晚矣按盧注舊以受諫句指柳伉一疏此在長安既陷之後是年四月郭子儀數為上言吐蕃黨項不可忽宜早為之備上狃於和好而不納至還京勞子儀曰用卿不早亦已晚矣代宗之勞子儀猶明皇之思九齡也公不忍明言故託之古人獻白馬指侯景黃巾指張角是時高暉以城降吐蕃王忠脅豐王珙以迎吐蕃吕太一乘機作亂故云紛紛攘攘末二亦借隋形唐蓋諱言也詩亂離瘼矣孫楚為牽府君碑臨危運竒童史記漢王曰天下紛紛何時定乎傳侯景傳大同中謡曰青絲白馬壽陽來史貨殖天下攘攘皆為利往帥後漢靈帝時巨鹿人張角自稱天公其部有三十六萬人皆著黃巾同日反叛冬狩行原注時梓州刺史章彝兼侍御史留後東川鶴注當是廣德元年冬梓州作是年十月代宗幸陜故云天子不在咸陽宫夢弼曰時章彞大閲東川公詩諷其多殺兼勉其攘外寇以安王室也君不見東川節度兵馬雄校獵亦似觀成功夜發猛士三千人清晨合圍步驟同首叙冬狩軍容觀成功謂兵馬雄壯似凱旋奏功步驟同謂進止齊習無先後參差普鶴注舊書地理志劍南東川節度使治梓州管梓綿陵遂合瀘渝等州又考㑹要上元二年二月分為兩川廣德二年正月復合為一道則知廣德元年冬宜有東川節度也漢成帝紀行幸長楊宫從胡客大校獵如淳曰周禮校人掌王田獵之馬故曰校獵師古曰校謂以木自相貫穿為闞校耳校獵者大為闌校以遮禽獸而獵取也上林賦天子校獵注云五校兵出獵蔡注校獵謂獵有所獲校其多寡以賞功也然記天子不合圍於鄧粲晉紀王湛率驅騁步驟不異王濟禽獸已斃十七八殺聲落日回蒼穹幕前生致九青兕馲駝􅐑落猥切峞丑毁切垂𤣥熊東西南北百里間髣佛蹴踏寒山空有鳥名鸜鵒力不能高飛逐走蓬肉味不足登鼎爼胡為見羇虞羅中次詳校獵之事六禽獸四句言殺獲之多舉大以該小東西句言追逐之廣舉小以該大西杜臆百里空山已無剩語忽入鸜鵒法竒而意足京賦僵禽斃獸爛若磧礫白日未及移晷已獮其十七八發金氏曰回蒼穹暗用魯陽揮戈返日朱楚辭君王親兮憚青兕郭璞曰角青色重千斤注馲駝即駱駝􅐑峞高貌馳魯靈光殿賦𤣥熊蚺䗊以斷斷上林賦東西南北騖往來南都賦蹴踏咸陽詩有鳥高飛亦傅於天鴝左傳有鸜鵒來巢童謡曰鸜鵒鸜鵒往歌來哭禽經鵒剔舌而語鷦鷯賦肉不登於俎味植周禮山虞掌山林之政令若大田獵則萊山田之野虞旗於中致禽而珥焉又羅氏掌羅烏鳥仲春羅春鳥獻鳩以養國老陳子昻詩虞羅忽見尋春搜冬狩侯一作候得用叶以中切舊作同誤使去聲君五馬一馬驄况今攝行大將去聲權號令頗有前賢風此美章留後巡朱注唐刺史即古諸侯職也趙注周禮狩本天子事而諸侯得行之故曰侯得用令吳論五馬切刺史一馬驄切侍御攝大將切留後號嚴明所以校獵可觀左傳臧僖伯曰春搜夏苖秋獮冬狩皆於農隙以講武事子列子天地無全功萬物無全用用與功叶朱注潘真詩話禮天子六馬左右驂三公九卿駟馬左驂漢制九卿二千石右驂太守駟馬而已其加秩中二千石乃右驂故太守以五馬稱之遁齊閒覽及學林云漢時朝臣出使為太守增一馬故為五馬或曰毛詩良馬五之以為州長建旗後遂作太守事程大昌曰鄭𤣥注詩以州長比方漢州大小絶逺周之州乃統𨽻於縣比漢太守秩殊不侔未足為據按古樂府有使君從南來五馬立踟蹰則太守五馬必起於漢但其說不一次公云出應劭漢官儀今亦無從考證若類書所稱王羲之守永嘉庭列五馬此乃無稽之言不可引為故實史記孔子世家攝行相事令書發號施飄然時危一老翁十年厭見旌旗紅喜君士卒甚整肅為去聲我回轡擒西戎草中狐盡何益天子不在咸陽宫朝音潮廷雖無幽王禍得不哀痛塵再䝉嗚呼得不哀痛塵再䝉此以慨時作結言當勤王敵愾不宜校獵騁雄也鶴曰老翁公自謂西戎指吐蕃自天寶十四年至此已經九年云十年者舉成數也朱注明皇前幸蜀代宗今幸陜故云塵再蒙人王洙曰代宗在陜詔徴天下兵時程元振用事無一應召者故章末感激言之此章首腰各四句前段十句有五字句後段十句有二字句並鶴曰天寶九載五月諸衛與諸節度所用緋色旗幡改為赤故諸將詩云曾閃朱旗北斗殷德史記申侯與犬戎攻殺幽王於驪山之下唐書廣元年十月吐蕃陷邠州及奉天車駕幸陜州又三日吐蕃陷京師益桓談新論狐穴其中申涵光曰草中狐盡何二句即賈生不獵猛敵而獵禽獸意胡夏客曰冬狩行因校獵之盛思外清西戎內匡王室視他題他篇之憂國者尤為切貼矣王嗣奭曰此詩規諷不淺前云亦似觀成功繼云頗有前賢風俱致不滿之意此公竟為嚴武所殺得非有罪可指乎禍羅大經曰篇末引幽王蓋幽王以褒姒致犬戎之明皇以妃子致祿山之變正相似也今無妃子孽矣而鑾輿乃再蒙塵何哉此必胎變稔禍有出於女寵之外者不可不哀痛而悔艾也山寺原注章留後同遊得閒字冬依朱注編在廣德元年之野寺根一作限石壁諸龕遍崔嵬前佛不復扶又切辨百身一莓苔雖一作唯有古殿存世尊亦塵埃如聞龍象泣足令平聲信者哀首述山寺荒殘之象曰前佛露石龕者世尊坐殿中者黃希諸經皆以佛為世尊義維摩經菩薩勢力譬如龍象蹴踏非驢所堪翻譯名集水行中龍力最大陸行中象力最大杜修可曰傳燈録云龍象乃鱗毛類中最巨者故經稱僧之出類者曰龍象非指佛像也逺注信者指佞佛之徒使去聲君騎紫馬捧擁從西來樹羽靜千里臨江久徘徊山僧衣藍縷告訴棟梁摧公為去聲顧一作領賓從去聲荆作賓從黃作賓徒一作兵徒咄嗟檀施去聲開此記入寺施捨態大官豪侈之狀僧家乞憐之摹寫逼真詩崇牙樹羽楚周𢎞正詩山僧盡凋散縷高僧傳帶索藍縷字林南人貧衣被敝醜謂之藍晉陽秋謝尚收涕告訴作魏氏春秋鍾㑹乘肥衣輕賓從如雲極石崇傳為客豆粥咄嗟立辦晉孫楚詩人命皆有咄嗟不可保越文選注大品經不施不慳是名檀波羅蜜大乘論檀者檀施也謂此人行檀能越貧窮海故薛夢符曰佛書信施檀越王筠簡棲頭陀寺碑且行不捨之檀施諸羣有黃希曰佛書注梵語檀波羅蜜華言布施此合華梵之語而云檀施吾知多羅樹却倚蓮華臺諸天必歡喜鬼物無嫌猜以兹撫士卒孰曰非周才黃生注云以兹二句當在窮子二句之下窮子失淨處高人憂禍胎此借修寺託諷神發願布施意在祈祐天若移此奉佛之心以撫恤軍士豈非𢎞濟才乎蓋窮子多行穢不淨高見者宜防禍於未萌窮子指士卒朱注謂諷章不修臣節如窮子離淨處而甘糞穢將來自蹈禍機如子璋知道之破滅也恐無此當席罵主之理酉陽雜爼貝多出摩伽陀國樹長六七丈經冬不凋此樹有三等一多羅婆力義貝多二多梨婆力義貝多三部闍婆力義貝多多羅多梨並書其葉部闍一色取其皮書之貝多漢翻為葉婆力義漢翻為樹西域經書用此三種皮葉若能寶護亦得五六百年翻譯名義集貝多形如此方棕櫊極高長八九十尺花如黃米子嵩山記嵩高寺中忽有思惟樹即貝多也一年三花人文殊傳世尊之座高七尺名七寶蓮花臺大智度論中蓮華大不過尺漫陀耆尼池及阿那婆逹多池中蓮華大如車蓋天上寶蓮華復大於此如此蓮華臺嚴淨香妙可坐聞佛書有三界諸天自欲界以上皆曰諸天人金剛經佛所說皆大歡喜王康琚詩周才信衆偏智任諸已窮法華經譬如有人年既幼稚捨父逃逝長大復加困父求不得窮子傭賃遇到父舍受雇除糞汚檅不淨其父宣言爾是我子今我財物皆是子有窮子聞言即大歡喜王融啓閉三乘於窮子發二諦於四蒙乘駱賓王詩高人儻有訪枚傳福生有基禍生有胎歲宴風破肉荒林寒可回思量平聲入一作人道苦自哂同嬰孩此自慨而含諷意章上文檀施撫卒告之意已完此下頗難措語兹將已意作結諷諭在離即之間言當此寒盡春來之候方欲如嬰孩之自適豈能與山僧輩為此入道之艱苦乎晏此章前三段各八句後段四句收唐吳少徴詩歲風落山謝靈運詩荒林紛沃若嘗金剛經虛空可思量否靈覺寺寶明作隴西太守棄官入道洛陽伽藍記老子若嬰兒之未孩郭璞詩竒齡邁五龍千歲方嬰孩朱鶴齡曰章彞事二史無考但附見嚴武傳云武再鎮劍南杖殺之公在東川與往來最數然桃竹杖冬狩行語皆含刺他詩又以指揮能事訓練强兵稱之大抵彝之為人將略似優乃心不在王室是冬天子在陜彝從容校獵未必無擁兵觀望坐制一方之意公窺其微而不敢誦言因遊寺以諷諭之世尊塵埃咄嗟檀施豈天子蒙塵獨能宴然罔聞乎以兹撫士卒孰曰非周才欲其用此道以治兵敵愾無但廣求福田也而其詞意含蓄此公之善於忠告乎桃竹杖引贈章留後黃鶴編在廣德元年冬作桃爾雅釋草竹四寸有節曰枝書顧命敷重篾席疏即桃枝竹戴凱之竹譜桃枝皮赤編之滑徑可為席揚雄蜀都賦笻節桃枝木華海賦桃枝篔簹左思蜀都賦靈壽桃枝注桃枝竹屬出墊江縣可以為杖元和郡國志合州銅梁山出桃枝竹東坡跋桃竹杖引後桃竹葉如棕身如竹密節而實中犀理瘦骨蓋天成拄杖也出巴渝間郭璞有桃杖贊子美有桃竹歌杜臆桃竹即棕竹川東至今有之江心一作上磻石生桃竹蒼波噴浸尺度足斬根削皮如紫玉江妃水仙惜不得叶音篤梓潼使去聲君一作者開一束滿堂賓客皆歎息叶蘇六切石首言竹杖之美贈自章公生磻則質堅浸蒼波則體潤尺度足長短適宜如紫玉光澤可玩遊北史楊津傳受絹依公尺度列仙傳江妃二女出漢江湄逢鄭交甫解佩與之江王逸楚辭注馮夷水仙人也江賦馮夷倚浪以傲睨妃含嚬而綿眇鶴注梓州為梓潼郡以東倚梓林西枕潼水也憐我老病贈兩莖出入爪甲鏗有聲老夫復扶又切欲東南征乘濤鼓枻一作棹白帝城路幽必為鬼神奪拔一作杖劍或與蛟龍爭此喜得竹杖而深加愛護鏗有聲明其堅徑東南征將適吳楚也拔劍衛杖用淡臺子羽拔劍碎璧事楚辭漁父鼓枻而去注鼓枻鼓舷鳴也重平聲為告曰杖兮杖兮爾之生也甚正直慎勿見水踴躍學變化為龍使我不得爾之扶持滅跡於君山湖上之青峰噫風塵澒胡孔切或作鴻洞兮豺虎咬古肴切當作咬人忽失雙杖兮吾將曷從此見竹杖靈竒恐其變化而去故復為丁寧祝告之詞吳論重告者重復其語以結上文猶楚辭亂曰之類語風塵言亂離豺虎比寇盜見扶衰避患皆藉此杖結感慨意特竒縱此章各六句分段前兩段各一韻後一段兼兩韻還神仙傳壺公遣費長房歸以一竹杖與之曰騎此當家中矣長房騎杖忽然如眠便到家以竹杖投葛陂中視之乃青龍耳楊德周曰此兼用豐城之劍躍出延津幾於風雨晦冥天地澒洞異哉洞內則出入則或先或後而敬扶持之博物志君山庭湖山也帝之二女居之曰湘夫人水經注君山有石穴潛通吳之包山郭景純所謂巴陵地道者也是山湘君之所遊處故曰君山前漢食貨志罷夫羸易子而咬其骨六書正訛俗作咬非咬音五考切咬音居肴切朱鶴齡曰此詩蓋借竹杖規諷章留後也既以踴躍為龍戒之又以忽失雙杖危之其微㫖可見鍾惺曰此詩調竒法竒語竒而無撒潑之病氣奧故也以王嗣奭曰公自云老去詩篇渾漫興是真話廣德來之作俱漫成者故其得失相參失之或淺率無味得之則出神入化此等詩俱非苦心極力所能到也斤黃生曰一竹杖耳說得如此珍貴便增其詩多少兩又曰前是對主人語後是對杖語故作一轉用重為告曰字蓋詩之變調而其源出於騷賦者也後段亦非告杖暗諷朋友之不可倚仗耳細味語氣自見宋之問騷體詩有嵩山天門歌登天門兮坐盤石之磷􅚑前漎漎兮未半下漢漠兮無垠紛窈窕兮巖倚披以鵬翅洞膠葛兮峰稜層以龍鱗松移岫轉左變而右易風生雲起出鬼而入神吾亦不知其靈怪如此願遊杳𡨕兮見羽人重曰天門兮穹崇回合兮攢藂松萬接兮拄日石千尋兮倚空晚陰兮足風夕陽兮赩紅試一望兮奪魄况衆妙之無窮此杜詩桃竹杖引所自出然杜之靈竒却勝於宋之雋麗矣將適吳楚留别章使去聲君留後兼幕府諸公得柳字鶴注此當是廣德元年十一月代宗未還京時作故云重見衣冠走黃屋今安否我一作甫來入蜀門歲月亦已久豈惟長子兩切兒童自覺成老醜常恐性坦率失身為去聲杯酒近辭痛飲徒折節萬夫一作人後此憶在蜀情事其杜臆觀失身折節等語公亦殊有戒心告别以此但不明言耳醜古詩歲月忽以晚間阮籍詩朝為美少年夕暮成老古詩失意杯酒此暗用灌夫罵坐事漢書郭解年長更折節為儉易萬夫之望昔如樊作若縱壑魚今如喪去聲家狗既無遊方戀行此復扶又切何有相逢半新故取别隨薄厚不意青草湖扁舟落吾手此叙去蜀情事薄杜臆相逢半新故取别隨厚各有餽贐可為行資故湖舟落其手也魚王褒頌沛乎若巨魚縱大壑夏侯湛贊若失水之喪家之狗史記孔子纍纍然若喪家之狗在論語遊必有方二元和郡國志巴丘湖又名青草湖巴陵縣南周圍百六十五里俗名即古雲夢澤眷眷章梓州開筵俯高柳樓前出騎去聲馬帳下羅賓友健兒簸紅旗此樂音洛幾平聲一作或難朽日車隱崑崙鳥雀噪户牖此記章公餞别景事眷日晏鳥歸而飲筵未散正見章之戀交情莊子徐無鬼若乘日之車波濤未足畏一作慰三峽徒雷吼所憂盜賊多重平聲見衣冠走中原消息斷黃屋今安否終作適荆蠻安排用莊叟此叙臨别躊蹰之意波濤不畏起荆蠻二句盜賊可憂起中原二句時長安經亂既不能北還惟有南適吳楚而已曰七發混混沌沌聲如雷吼祿山吐蕃兩陷京師故重見衣冠奔走蠻王粲詩復棄中國去逺身適荆莊子安排而去化入於寥天隨雲拜東皇挂席上上聲南斗有使去聲下同即寄書無使長回首此寫别後繾綣之懷東皇楚神祠南斗吳分野長回首常望諸公寄書也乙此章前四段各八句末四句收結楚辭有東皇太章文選注太乙天之尊神祠在楚東以祀東帝故曰東皇南謝靈運詩揚帆采石華挂席拾海月春秋說題辭斗吳地舊書天文志南斗在雲漢之流當淮海之間為吳分釋寶月詩有信數寄書無信心相憶王嗣奭曰章留後所為多不法而待杜特厚公詩屢諫不悛想託詞避去乃保身之哲不欲以數取疏也不然有此地主不必去蜀又何以别去而終不去蜀耶後章將入朝公寄詩云江漢垂綸則公客䦘州去梓不逺乃申涵光曰常恐性坦率失身為杯酒半生疏放晚謹飭如是飽更患難遂得老成方是豪傑歸落處一味使酒罵坐禰正平為可鑒也舍弟占歸草堂檢校聊示此詩鶴注此廣德元年冬避亂梓閬時作各陶開虞曰有四弟穎觀豐在他鄉唯占從公入蜀久客應平聲吾道相隨獨爾來孰今本作熟知江路近頻為去聲草堂回鵝鴨宜長數所主切柴荆莫浪開東林竹影薄臘月更須栽前四占歸草堂下四囑其檢校也無天下莫容吾道應作旅人矣杜臆草堂人安得鵝鴨想有代為看守者臘月非種竹時乘弟暫歸故囑其栽補耳鍾云家務瑣屑有一片友愛在內故只見其真不見其俚惟家語孔子曰吾道非耶生朱注說文孰食飪也古文有孰字後人加火以别熟之熟漢書孰計皆作孰其魯連子鵝鴨有餘食西京雜記曹元理善算術嘗從友陳廣漢羊豖鵝鴨皆道其數謝靈運詩促裝返柴荆柴荆門也臘秦曰嘉平漢曰臘取獵取禽獸以祭也葉夢得云月種竹無一竿活者若五六月栽烈日無害亦不必拘定五月十三日為竹醉可栘也年譜謂寶應秋末公回成都迎妻子遍考詩中絶無一語記及知公未嘗回成都矣此詩云熟知江路近頻為草堂回想迎家赴梓必弟占代任其事也皆黃生曰杜善鍊字竹稀而曰影薄樹多而曰隂雜能涉􅓗成趣歲暮鶴注詩云邊隅還用兵烟塵犯雪嶺當指廣德元年吐蕃陷松維保三州雪嶺近維州也梁權道編在上元元年成都詩內考唐史及通鑑是年與二年及寶應元年雪嶺無警又考寶應元年十二月吐蕃寇秦成渭三州皆無聞於雪嶺謝靈運有歲暮詩題歲暮逺為客邊隅還用兵烟塵犯當作侵雪嶺鼓角動江城天地日流血朝音潮廷誰請纓濟時敢愛死寂寞壯心驚此詩憂亂而作也上四歲暮之景下四歲暮之情忍烟塵鼓角蒙上用兵當此流血不已請纓無人安惜死不救哉故雖寂寞之中而壯心忽覺驚起可見公濟時之念至老猶存也崔湜詩嵗盡仍為客晉史論舒元出蒞邊隅欽其明德梓孔叢子用兵於敵書蔡琰笳曲烟塵蔽野兮江城州江城也王粲僵尸流血聞之哽咽廆終軍傳請受長纓必羇南粵王置之闕下晉慕容傳張華曰君至長必為命世之器匡難濟時者也心魏武歌行烈士暮年壯不已送李卿曄鶴注此當是廣德二年初春作時代宗已還京而巴西尚未聞也唐書李峴傳肅宗詔刑部侍郎李曄鞫謝夷甫事忤㫖貶嶺南世系表曄太鄭王房淮安忠公琇之子終刑部侍郎王子思歸日長安已亂兵霑衣問行在走馬向承明暮景巴蜀當作西僻春風江漢當作上清晉山雖自棄魏闕尚含情上四送李還京下乃自叙已意暮亂兵指吐蕃問行在而向承明急於覲君也垂巴西自憐地僻傷春江上唯待時清蓋身雖廢棄而心猶戀闕也思李為宗室故稱王子古今樂録楚之王子質於秦歸作歌洞庭兮木秋涔陽兮草衰去千乘之家國作咸陽之布衣哀江南賦咸陽布衣非獨思歸王子何遜詩極目淚霑衣明用淚字周𢎞正詩行住兩霑衣暗藏淚字杜句霑衣多用暗藏前漢嚴助傳君厭承明之廬張晏曰承明廬在石渠閣外直宿所止曰廬考黃圖未央宫有承明殿著述之所也杜臆閬州舊名巴西而嘉陵在閬亦名漢江寰宇記一曰西漢水亦曰閬江故蔡曰地理志閬州有晉安縣本晉城公與李俱在閬云晉山今按晉山本就閬言而兼用介之推入綿上山中事趙次公曰宣室志載庶史有道士尹君者隱晉山北門從事嚴綬敬事之蔡氏又曰王子晉學仙隱於緱山是曰晉山吕氏春秋中山公子牟謂詹子曰身在江海之上心在魏闕之下朱鶴齡曰公嘗扈從肅宗故自比之推曰自棄者不敢以華州之貶懟其君上也壯遊詩子推避賞從亦此意博議云晉山自棄即出金光門詩移官豈至尊意也古人流離放逐不忘主恩故公於賈嚴之貶則曰開闢乾坤正榮枯雨露偏於已之貶則曰晉山雖自棄魏闕尚含情其溫柔敦厚之意言外可想若以肅宗不甚省録故往往自况之推失之逺矣釋悶黃鶴編在廣德二年蓋天寶十四載至此為十年也杜臆此篇是杜集中七言排律四海十年不解兵犬戎一作羊也去聲復扶又切臨咸京失道非關出襄野揚鞭忽是過湖城豺狼塞所責切路人斷絶烽火照夜尸縱平聲橫天子亦應平聲厭奔走羣公固合思去聲升平但恐誅求不改轍聞道去聲嬖孽能一作今全生江邊老翁錯料平聲事眼暗不見風塵清上八亂極思治之機下四憂時慮患之意毒杜臆此為代宗不誅程元振而作吐蕃入寇逼乘輿生民禍皆起於程元振所望一時君臣翻然悔悟當柳伉疏入但削官放歸此詩所以有嬖孽全生之歎也豈知嬖孽不除則兵不得解兵不能解則誅求仍不得息其事之舛謬真出於意料之外矣然則風塵亦何由清而太平將何時見乎通篇一氣轉下皆作怪歎之詞帝天台謝省注代宗避寇奔走非如黃帝迷道却似明微行莊子黃帝將見大隗於具茨之山至於襄城之野七聖皆迷無所問塗一世說王大將軍頓軍姑熟明帝著戎服乘巴竇馬齎金鞭陰察軍形勢敦晝寢夢日繞城忽驚覺曰營中有黃鬚鮮卑奴來何不縛取命騎追之不及朱注按晉書明帝紀微行至於湖隂察敦營壘而出王敦傳帝至蕪湖察敦營壘於湖即蕪湖也地志晉太康中分丹陽置於湖縣即今當塗縣地又蕪湖縣有王敦城此詩所云湖城也自唐以來皆破句讀故樂府有湖陰曲張文潛始正之云於湖為句孝經鈎命訣明王用孝升平致歸梅福傳升平可致唐書代宗在陜削程元振官爵田里廣德二年春正月以私入京師配流溱州復令於江陵府安置也茍悅申鑒省闥清淨嬖孽不生江邊指嘉陵江贈别賀蘭銛音纖在詩云國步初反正逺赴湘吳春蓋廣德二年春代宗回京後作黃雀飽野粟羣飛動荆榛今君一作吾抱何恨寂寞向時人老驥倦驤首蒼一作饑鷹愁易音異馴高賢世未識固合嬰飢貧此歎賀蘭之困窮驥士之寂寞由於世未識賢其甘守飢貧寧為倦鷹馴不為雀飽羣飛此可見其志節矣詩黃雀比趨勢附利者驥鷹比抱才不遇者王僧孺日中驅上駟驤首通京苑嬰縈繞也國步初反正乾坤尚風塵悲歌鬢髮白逺赴湘吳春我戀岷下芋君思千里蓴生離與死别自古鼻酸辛此叙送行之意岷反正代宗還京風塵吐蕃未靖悲歌逺赴皆指銛言下公滯蜀思蓴銛往吳彼此離别故至傷心也是他注以湘吳為公欲往吳楚者誤黃鶴謂銛欲東下也此章二段各八句漢書高帝紀撥亂世反之正下翟方進傳童謡云飯我豆食羮芋魁貨殖傳岷山之沃野千里下有蹲鴟至死不飢注蹲鴟芋也世說陸機詣王武子武子前置數斛羊酪問機吳中何以敵此機曰千里蓴羮但未下鹽豉耳一統志千里湖在溧陽縣東南一十五里至今産美􅐜俗呼千崖蓴朱注賀蘭當是吳人而遊蜀者故有君思千里之句楚辭悲莫悲兮生别離鼻高唐賦孤子寡婦寒心酸杜詩詳注卷十二
