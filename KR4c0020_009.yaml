body:
  text: 杜詩詳注卷九翰林院編修仇兆鰲撰發同谷縣原注乾元二年十二月一日自隴右赴成都紀行公居同谷不踰月即赴成都賢有不黔突聖有不暖席况我飢愚人一作夫焉於䖍切能尚安宅始來兹山中休駕喜一作嘉地僻奈何迫物纍一歲四行役此歎行踪無定也僻上四以古人自解下四以勞生自慨地謂同谷境幽物纍為妻子所牽又趙曰春自東都回華秋自華州客秦冬自秦赴同谷自同谷赴劍南故曰四行役淮南子墨子無黔突孔子無暖席全詩其究安宅物莊子無物纍無鬼責淮南子性保真不以纍形忡忡去絶境杳杳更逺適停驂龍潭雲回首虎一作曰崖石臨岐别數子握手淚再滴交情無舊深一作雖無舊深知一作雖舊情深知窮老多慘戚此記臨發躊躇也谷龍潭虎崖同谷之景不忍舍交情慘戚同之人不忍别詩憂心忡忡冥陶潛桃花源記來此絶境不復出焉千莊子杳杳冥後漢書范丹謂王奐曰今子逺適里謝靈運詩停驂我悵望龍夢弼曰龍潭即七歌云南有龍兮在山湫是也杜臆潭即萬丈潭地志有虎穴在成州西寄贊上人詩云徘徊虎穴上豈即其處耶崖宋書拓跋齊聞符達兵起遁走達追擊斬之因據白分平諸戊通鑑注古葭萌地如劉琨詩相與數子遊朝江淹詩樽酒送征人握手淚霰孫綽詩交情逺市陶潛詩相知何必舊無舊深不必舊交深契也平生懶拙意偶值直吏切棲遁跡去住與願違仰慚林間翮此歎奔走非其本願舍偶逢棲遁願本欲住今又之而去是去住願違不能如林鳥之自適也遁此章前二段各八句後段四句收郭璞詩山林隱棲嵇康書事與願違林陶潛詩遲遲出翮木皮嶺方輿勝覽木皮嶺在同谷縣東二十里河池縣西十里杜甫發同谷取路栗亭南入郡界厯當房村度木皮嶺由白水峽入蜀即此黃巢之亂王鐸置關於此以遮秦隴路極險阻一統志木皮嶺在鞏昌府徽州西十里首去聲路栗亭西尚想鳳凰村季冬擕童一作幼稚辛苦赴蜀門南登木皮嶺艱險不易弋制切論平聲汗流被去聲我體祁寒為之暄自成赴蜀述冬行勞苦漢陟嶺艱險承辛苦祁寒汗流承季冬書北首燕路注首謂趣向顔延之詩首路局艱險凰朱注鳳凰村當與鳳凰臺相近在同谷杜臆地志鳳山在徽州城西一里即杜詩鳳凰村曰雷次宗書童稚之年銘劉伯倫詩從役知辛苦魯蜀門即劍門也劍閣惟蜀之門作固作鎮書漢書汗流洽背冬祁寒逺岫一作􅰖爭輔佐千巖自崩奔始知五嶽外别樊作更有一作見他山尊仰于一作看塞先則切大明俯入裂厚坤此記嶺前逺景一仰一俯就山勢言有王籍詩陰霞生逺岫淮南子輔佐能記雪賦瞻山則千巖俱白之謝靈運詩圻岸屢崩奔五嶽視三公物理論鎮以五嶽泰山東嶽華山西嶽霍山南嶽恆山北嶽嵩山中嶽生詩他山之石名張昶華山碑山莫尊於嶽記大明於東廣雅日輝靈一名大明易坤厚載物再聞虎豹鬬屢局風水昏髙有廢閣道摧折如斷一作短轅下有冬青林石上走長根此記嶺中近景一髙一下就物狀言乖劉安招隱士虎豹鬬兮熊羆咆陳劉孝綽詩風水互違王洙曰冬青今之楩柟也藏器本草冬青木肌白有文其葉堪染緋冬月青翠西崖特秀發煥若靈芝繁潤聚金碧氣清無沙土痕憶觀崑崙圖一作墟目擊𤣥圃存對此欲何適默傷垂老魂此兼寫西崖之景發曰煥曰潤曰清皆形容秀崑崙𤣥圃借仙境以稱其絶勝欲留不得所以傷神樓此章首尾各八句中二段各六句劉孝綽詩𤣥圃金碧楚辭天問崑崙縣圃神仙傳崑崙一名𤣥圃一名積石瑤房一曰閬風室一曰華蓋一曰天柱莊子目擊而道存舍禮記孔子曰吾魯何適矣白沙渡方輿勝覽白沙渡水回渡俱屬劍州畏途隨長江渡口下去聲絶岸差此兹切池上上聲舟楫杳窕入雲漢此記渡口登舟之畏途指陸行長江乃嘉陵江即西漢水故比雲漢莊子夫畏途者日殺一人則父子兄弟相戒山江賦絶岸萬丈常孫綽天台賦幽邃窈窕湛方生廬詩序窈窕冲深舍霞而貯氣天詩倬彼雲漢為昭於注雲漢天河也天寒荒野外日暮中流半我馬向北嘶山猿飲相喚水清石礧礧沙白灘漫漫迥一作翛然洗愁辛多病一疏散此記舟中之景嘯鼓棹中流日已暮矣馬鳴猿此記所聞水石沙灘此記所見對境爽心故覺愁洗而病散北鮑照詩茫茫荒野中詩我馬瘏矣古詩胡馬嘶風楚辭石礧礧兮葛蔓蔓未沈約詩歸海水漫漫謝靈運詩若長疏散髙壁抵嶔音欽崟音吟一作岑洪濤越凌亂臨風獨回首攬轡復扶又切三嘆此捨舟而陸行風抵嶔崟到山頂也越凌亂踰急流也回首三歎幸脫波之患也始則馬嘶舟內既復攬轡前行矣此章首尾各四句中段八句惠魯靈光殿賦嶔崟離樓曹植詩泛舟越洪濤謝連詩清波時凌亂後漢書范滂攬轡慨然有澄清天下之志左傳置食三嘆水㑹一云回渡鶴曰渡名水㑹即前所謂合鳳溪也山行有常程中夜尚未安微月沒已久崖傾路何難大江動一作當我前洶若溟渤寬篙師暗理楫歌笑輕波瀾此從山行說向水渡山崖傾在未渡以前江動在登舟之際史記夏禹紀行乘檋阮籍詩中夜不能寐詩傅𤣥詩微月出西方記丘遲詩崖傾嶼難傍縣謝朓大江流日夜寰宇嘉陵江去興州長舉南十里水經注漢水又南入嘉陵道而為嘉陵水穿池類溟渤吳都賦篙工楫師選自閩禺鮑照詩劉孝綽詩榜人夜理楫詩王融詩所知共歌笑劉楨從爾浮波瀾霜濃水石滑風急一作烈一作冽手足寒入舟已千憂陟巘仍萬盤回一作迥晀一作出積水一作石外始知衆星乾音干逺遊令平聲人瘐衰疾慙加餐此又從渡水說到登岸德霜濃風急冬夜所經水外星乾岸上回視也曹孟碣石觀海詩星漢粲爛若出其裏此俯視水中之星杜詩回眺積水外始知衆星乾此仰觀水外之星又陸放翁詩水浸一天星與水外衆星乾參看更明文此章兩段各八句吳沈佺期詩霜濃候雁哀江淹汩木石於深嶼均詩風急雁毛斷陟謝靈運詩入舟陽已微樂詩陟則在巘回陸機詩仰髙山盤夏侯湛春可賦登夷岡以晀溫子升碑大地淪於積水詩古詩仰觀衆星列詩曹植詩逺遊欲何之謝靈運哀疾當在斯古努力加餐飯周明輔曰少陵入蜀紀行諸作雄奇崛壯蓋其辛苦中得之益工耳飛仙閣方輿勝覽飛泉嶺在興州東三十里相傳徐佐卿化鶴跧泊之地故名飛仙上有閣道百餘間即入蜀路通志棧道在褒斜谷中飛仙閣即今武曲關北棧閣五十三間總名連雲棧朱注飛仙閣在今漢中府略陽縣東南四十里或云即三國時馬鳴閣魏武所謂漢中之咽㗋華陽國志諸葛亮相蜀鑿石駕空為飛梁閣道水經注大劍戍至小劍三十里連山絶險飛閣相通謂之閣道土一作出門山行窄微徑緣一作徑微上秋毫棧雲䦨干峻梯石結構牢萬壑欹疏林一作竹積陰帶奔濤寒日外淡泊長風中怒號平聲上此記閣道形勢及所見景物髙土門之山窄徑微故閣道從此而起棧連雲外設闌干壘石成梯堅於結構言閣之險而固也萬壑二句此閣上所俯視者寒日二句此閣上所周厯者日林樹斜倚故曰欹奔流逺注故曰帶故朱注幽深則不及照故外淡泊空大則風從內出中怒號土門見前垂老别注極慎子離婁之明察秋毫之末縣梁州圖經棧道連空天下之至險興利州至三泉橋閣共一萬九千三百八十間護險編欄共四萬七千一百三十四間魏武善哉行月沒參橫北斗闌干顧凱之曰萬壑爭流茂孫綽詩疏林積凉風類淮南子積陰之氣為水虞詩長瀾疑浴日連島奔濤陶潛詩慘慘寒日塊莊子淡與泊相遭則吳筠詩長風倒危葉莊子大噫氣其名為風作萬竅怒號歇鞍在地底始覺所厯髙往來雜坐卧人馬同疲勞浮生有定分音問飢飽豈可逃嘆息謂妻子我何隨汝一作爾曹此敘度閣後情事備杜臆解鞍坐卧人馬俱疲蓋險與逺俱有之末四嘗困頓無可如何而為自寬自謔之詞孝此章兩段各八句兮劉綽詩坐卧猶懷想思𤣥賦追慌忽於地底魏文帝詩人馬同時飢其後漢書張步曰今大耿兵少於彼又皆疲勞生若浮其死若休歐陽建詩窮違有定分莊子潘嶽詩撫襟長嘆息曹後漢張奐誡兄子書汝薄祜蜀道山水竒絶若作尋常登臨覽勝語亦猶人耳少陵搜竒抉與峭刻生新各首自闢境界後來天台方正學入蜀對景閣筆自歎無子美之才何况他人乎五盤一統志七盤嶺在保寧府廣元縣北一百七十里一名五盤嶺魯訔曰棧道盤曲有五重五盤雖云險山色佳有餘仰凌棧道一作閣細俯映江木疏首記五盤嶺詩棧在上江在下嶺在中間故曰仰凌俯映陶潛山氣日夕佳史記棧道千里通於蜀漢地僻無網罟水清反多魚好鳥不妄飛野人半巢居喜見淳朴俗坦然心神舒次記盤中風景見魚安於水烏不避人即此淳朴之俗清莊子網罟之事多而魚亂於淵魚揚雄答客難水至則無魚此反用之詩潛有多曹植詩好鳥鳴髙枝志有巢氏始學篇上古皆穴處有聖人教之巢居博物南越巢居北朔穴處亢倉子政省一則人淳朴然王羲之詩蕭心神王東郊尚格鬭巨一作臣猾何時除故鄉有弟妹流落隨丘墟成都萬事好一作在豈若歸吾廬末慨故鄉亂離也日方對景神舒而忽動鄉關之思以思明未平歸家無也時弟在濟州妹在鍾離此章四句起下兩段各六句西書序淮夷並興東郊不開猾漢書主人翁格鬭死征賦望漸臺而扼腕梟巨而餘怒列子弟妹之所不見棘阮籍詩流落恆苦心非吳越春秋城郭丘墟殿前荆漢杜欽傳萬事是何足備焉陶古詩客行雖云樂不如早旋歸潛詩衆鳥欣有託吾亦愛吾廬龍門閣元和郡國志龍門在山利州綿谷縣東北八十二里方輿勝覽他閣道雖險然山在腰亦微有徑可以增置閣道惟此閣石壁斗立虛鑿石竅架木其上比他處極險清江下龍門絶壁無尺土長風駕髙一作白浪浩浩自太古危途中縈盤一云縈盤道仰望垂線縷滑石欹誰鑿浮梁裊相拄此記江勢之險及閣道之危行下龍門江在龍門之下也俯臨風浪愈見山可畏縈盤言閣委曲線縷言閣細微滑石傾欹誰鑿其孔浮梁裊空下有柱拄此言製閣之竒巧水經注水色清照十丈故名清江魯訔曰地理志施州清江郡土世說桓公入峽絶壁天懸騰波迅急李陵書無尺之封陸機詩長風萬里舉太郭璞詩髙浪駕蓬萊天應瑒詩浩浩長河水三墳古之人皆夀孫綽台賦踐莓苔之滑石無沈約詩浮梁經度跨回漪其水經注棧道俗謂千梁柱諸葛孔明與兄瑾書曰閣梁一頭入山腹其一頭立柱於水中水大而急不得安柱後孔明卒五丈原魏延先退而焚之即是道也自後按修舊路者悉無復水中柱徑涉者浮梁振動無不搖心眩目目眩隕雜花頭風吹過雨一云過飛雨百年不敢料平聲一墜那得取飽聞一作知經瞿塘足見度大庾終身厯艱險恐懼從此數所主切發此因度閣之難而為驚歎也風朱注花隕而日為之眩視不及審也雨吹而頭為之迫不能避也正形容閣道險絶次公注雜花過雨作比喻者非當杜臆瞿唐大庾之險未曾親厯今涉此危途則恐懼從此數起也上文日眩頭風正是恐懼之狀曹此章上下各八句風秦國策秦王目眩良久料魏志操讀陳琳檄草頭自愈司馬懿曰不能死傳瞿唐峽在䕫州大庾嶺在䖍州將左艱難險阻備嘗之矣詩將恐懼石匱閣方輿勝覽石欄橋在綿谷縣北一里自城北至大安軍界營橋欄閣共一萬五千三百一十六間其著名者為石匱閣龍門閣季冬一作冬季日已長山晚半天赤蜀道多早一作草花江間饒竒石石匱曾音層波上臨虛蕩髙壁清暉回羣鷗暝音明色帶逺客此段敘景故上四蜀道時景下四閣道暮景日初長晚猶赤地氣暖故早放花水光上映則髙壁影蕩日落鷗還則暝色侵客矣村杜臆清暉回羣鷗已竒暝色帶逺客更雋何遜詩梅落早花石水經注盛𢎞之謂空泠峽有五六峯參差互出有竒楚辭溪谷嶄巖兮水曾波郭璞江賦迅蜼臨虛以騁巧清水經注髙壁緬然與霄漢連接逺謝靈運詩山水含暉又林壑斂暝色孫綽詩客興長謠羇棲負幽意感嘆向絶跡信甘孱懦嬰不獨凍餒迫優游謝康樂音洛放浪陶彭澤吾衰未自由一作安謝爾性所一作有適此段述懷非羇棲絶跡有負幽意實以身弱不能搜竒但迫於飢寒也吾哀句承孱懦謝爾句承陶謝琚此章亦上下八句陶陳子昻詩感歎情何一王康詩絶迹窮山裏潛詩凍餒固纒已襲詩優哉游哉瑜杜修可曰謝𤣥暉封康樂公孫靈運其封與何長等以文章賞㑹共為山澤之遊詩家稱康樂乃靈運非𤣥暉也古蘭亭記放浪形骸之外陶潛為彭澤令注見前詩為焦仲卿妻汝豈得自由皆黃生注陶謝二公適性於山水此能自由者謝猶言讓也古詩有五字皆平者曹植詩悲鳴夫何為杜詩清暉回羣鷗是也有五字皆仄者應瑒詩逺適萬里道杜詩窟壓萬丈內是也有七言皆平者崔魯詩梨花梅花參差開有七言皆仄者杜詩有客有客字子美但在古詩可不拘耳桔居屑切柏渡舊唐書𤣥宗幸蜀次利州益昌縣渡吉柏江有雙魚夾舟而躍議者以為龍方輿勝覽桔柏渡在利州昭化縣戰胡夏客曰五代唐莊宗伐蜀王衍兵屯利州逆三泉敗衍懼斷吉柏江浮橋即其地也青冥寒江渡駕一作架竹為長橋竿濕煙一云竹竿濕漠漠江永一作水風蕭蕭連笮側柏切動嫋乃了切娜奴可切征衣颯飄颻急流鴇音保鷁音溢與鶂同散絶岸黿鼉驕此渡橋之景江竿濕承次句永承首句鴇鷁黿鼉橋下所見之物或以鴇鷁為船黿鼉指橋者非蓋渡用竹橋則無石梁可知矣楚辭據青冥而攄虹青冥髙逺之貌煙何遜詩寒江復寂寞矣又水影漾長橋謝朓詩生紛漠漠詩江之永之荆軻歌風蕭蕭兮易水寒之梁益記笮橋連竹索為亦名繩橋洙曰前漢卭笮君鶴曰成都之笮橋即此類颻起古詩焦仲卿妻婀娜隨風轉賦戴皓詩衣風飄曹植詩淮泗馳急流西都鶬鴰鴇鷁注鴇似雁無後趾鷁水鳥所淮南子積水重泉黿鼉之便西轅自兹異東逝不可要平聲髙通荆門路濶㑹滄海潮孤光隱顧盻遊子悵寂寥無以洗心胸前登但山椒此對景言情荆身向西行水從東注其赴海者不能要之暫停矣且欲臨流顧盻挹水洗心亦不可得此所以悵然而山行也杜臆謂八句作一氣說見少陵胸襟濶大勢此章亦上下八句乃繁欽詩流泉東逝流髙濶指水言舊注桔柏渡文州嘉陵二江合處東下入渝合逹荆州盻東海潮汐隨月為消長人孤光孤影也曹植詩顧遺光彩庾信詩寂寥事屏易聖人以此洗心江淹詩無以滌心胸猿王十朋曰漢武帝李夫人賦釋馬山椒謝惠連詩悲響山椒謝莊月賦菊散芳於山椒謝靈運詩稅駕登山椒廣雅土髙四墮曰椒劍門舊唐書劍州劍門縣界大劍山即梁山也其北三十里有小劍山大劍山有閣道三十里一統志大劍山在保寧府劍州北二十五里蜀所恃為外户其山峭壁中斷兩崖相嶔如門之闢如劍之植故又名劍門山張孟陽劍閣銘惟蜀之門作固作鎮是曰劍門壁立萬仞惟天有設險劍門一作閣天下壯連山抱西南石角皆北向兩崖崇墉倚刻畫城郭狀一夫一作人怒臨關一作門百萬未可傍去聲一作仰南此言劍門勢險可以守國屬杜臆山抱西而石角北向亦見地形內彼并吞割據者皆違天矣長亘未可傍人不敢近也崇墉象其壁立城郭象其易坎卦天險不可升也地險山川丘陵也王公設險以守其國岸相如封禪書天下之壯觀荆州記峽長七百里兩連山略無絶處向王洙曰劍門山石北向如拜伏狀淹仇池記石角外張協𤣥武館賦崇墉四匝江賦刻畫崷崒兮山雲而碧峯劍水經注云連山絶險飛閣涌衢可想墉城之勢矣閣銘一人荷㦸萬夫趦趄陳琳與魏文帝書一夫揮㦸萬人不得進珠玉陳作玉帛走中原往見舊人手卷此句之上有川嶽儲精英天府興寶藏二句方接以珠玉云云岷峨氣悽愴三皇五帝前雞犬各一作莫相一作自放後王尚柔逺職貢道已喪去聲門下二條對劍而衡論古今愁此段記其財賦恐蜀人困於誅求也尚民苦須索故怨結而山含悽愴雞犬放中國未通職貢珠玉是徴矣道喪謂失柔逺本意之按珠玉句突接似乎陡健但細玩文氣當先言蜀産竒而後言悽愴之故下文先言三皇五帝而後言職貢道喪上下四句各一開一闔說方見抑揚頓挫之致抱朴子儲八石之精英石記寶藏興焉西揚雄蜀都賦於近則有瑕英蘭芝玉江珠淮南子方之美者有霍山之珠玉焉錢神論無足而走即趙注岷山在成都之西即青城山峨山在成都西南峨嵋山書岷山𨗳江江賦峨嵋為泉陽之揭同王粲詩悽愴令吾悲神莊子三皇五帝之治天下不白虎通三皇謂伏羲農燧人也五帝謂黃帝顓頊帝嚳帝堯帝舜也漢潘嶽西征賦渾雞犬而亂放書柔逺能邇束觀記百蠻職貢周禮制其職各以其所能制其貢各以其所有至今一作令英雄人高視見霸王于况切并吞與割據極力不相讓吾將罪真宰意欲鏟疊嶂恐此復扶又切偶然臨風默一作黯惆悵末段言其形勝恐蜀人罹於戰爭也并吞者王如漢光武是也割據者霸如公孫述是也從古多因疊嶂憑險恐此復有其事故臨風而生悵首條形容劍門題意已盡下靣又另開議論自三皇至今包舉數千年治亂興亡真絶大經濟文字此詩與鹿頭山皆同時之作下章三段各八句此章格局亦宜相似中段止六句斷屬脫漏無疑王命論英雄陳力劉孝綽詩髙視獨辭雄下齊國策能致其主霸王論漢書主父偃書秦蠶食天并吞戰國陸機辨亡遂割據山川跨制荆吳而與天下爭衡矣而不得其朕海賦鏟臨崖之阜陸莊子若有真宰王筠詩開窗延疊嶂默江淹詩臨風含情胡夏客曰劍門詩因劍閣銘而成但銘詞出以莊嚴此詩尤加雄肆用古而能勝於古人方稱作家按公登慈恩寺塔詩秦山忽破碎涇渭不可求知天寶之將亂也悲青坂詩安得附書與我軍忍待明年莫倉卒知收京在次年也收京詩雜鹵橫戈數功臣甲第髙知回紇生釁藩鎮跋扈也秦州詩西征問烽火心折此淹留知吐蕃冦邊不能安枕也此詩云恐此復偶然臨風默惆悵知蜀必有事而深憂逺慮也未幾段子璋徐知道崔旴楊子琳輩果據險為亂公之料事多中如此可見其經世之才矣鹿頭山唐書漢州德陽縣有鹿頭關關在鹿頭山上南距成都百五十里髙崇文擒劉闢於此全蜀總志鹿頭山在德陽縣治北三十餘里鹿頭何亭亭是日慰飢渴連山西南斷俯見千里豁遊子出京華一云咸京劍門不可越及兹險阻盡始去聲喜原野濶此初至蜀地而喜承首句㸃題俯見千里乃山上遙望者中後兩段俱此王洙曰自秦入蜀川嶺重復極為險阻及下鹿頭關東望成都沃野千里䓤鬱之氣乃若烟霞靄然寰宇記古老云昔有張鹿頭居此因以為名志西都賦狀迢迢以亭亭野應璩詩以副飢渴懷蜀諸葛亮傳益州險塞沃千里江總詩山豁自疏快險郭璞詩京華游俠窟野左傳踰越阻淮南子周視原殊方昔三分霸氣曾音層間去聲發天下今一家雲端失雙闕悠然想揚馬繼起名硉兀有文一作才令平聲人傷何處埋爾骨此思蜀中古迹時先主霸業揚馬文章皆垂名千載者失雙闕無復當宫殿矣何處埋不見往日遺蹤矣裴秀九州圖論絶域殊方之迥一蜀志今天下三分益州疲弊人能以天下為家古詩善哉行遊戲雲端記聖蜀都賦華闕雙邈重門洞開孫綽天台賦雙闕雲竦以夾路何遜墓志競收揚馬華陽國志司馬相如耀文上京揚子雲齊聖廣淵斯蓋華岷之靈標江漢之精華也繼起謂揚繼馬後硉兀危石也蔡琰笳曲死當埋骨兮長已矣紆餘脂膏地慘淡豪俠窟仗鉞非老臣宣風豈専逹冀公柱石姿論道邦國活斯人亦何幸公鎮踰歲月此幸撫蜀得人也得蜀本膏腴豪俠之場自經喪亂不免元氣日虧必老臣仗鉞方能播宣風教専達朝廷裴冕以宿望而鎮此邦可為生民厚庇矣逺此章三段各八句上林賦紆餘逶迤髙曰紆餘廣貌蜀都賦內函要害於膏腴華陽國志蜀人稱郫繁曰膏腴綿洛為浸沃又曰秦克六國輒徙其豪俠於蜀家有鹽銅之利人擅山川之材簫鼓歌吹擊鐘肆懸富侔公室豪過田文王褒詩豪俠競交游吳志孫堅曰古之名將仗鉞臨衆布漢書疏廣曰聖主惠養老臣其後漢隗囂傳威命四宣風中嶽周禮大事則從長小事則専達杜臆中宗時蕭至忠為専違中丞謂事得専逹於天子不受人節制舊唐書至德二載十二月右僕射裴冕封冀國公乾元二年六月拜成都尹克劍南西川節度使據詩云公鎮踰歲月則裴冕拜成都尹當在是年六月之前恐舊書有誤柱許靖與曹操書扶危持傾為國柱石晉嚴纘疏宜得石之士如周昌者經書論道邦李長祥曰自秦州至此山川之竒險已盡詩之竒險亦盡乃發為和平之音使讀者至此别一世界情移於境不可强也成都府漢書地理志蜀郡有成都縣唐為成都府舊唐書成都府在京師西南二千三百七十九里去東都三千二百一十六里翳翳桑榆日照我征衣裳我行山川異忽在天一方但逢新人民未卜見故鄉大江東流去一作從東來遊子日月一作去日長初見成都人物而歎遊子不歸也此以江水東流興已之棲泊歸去來辭景翳翳以將入翳翳朦朧之貌之淮南子日西垂景在樹端謂之桑榆後漢馮異傳失東隅收之桑榆古詩照我羅衣幃潘嶽詩山川邈離異少蘇武詩良友逺離别各在天一方曹植詩但覩新年晏子春秋未卜其夜漢傷歌行思念故鄉鬱鬱纍纍歌謝朓詩大江流日夜短博物志水潦東流漢人變愴愴遊子懷陸機歌來日苦短去日苦長曾音層城填音田華屋季冬樹木蒼喧然名都㑹吹簫間去聲一作奏笙簧信美無與適側身望川梁鳥雀夜各歸中原杳茫茫又聞成都歌吹而歎中原遙隔也此以鳥雀歸巢興已之無家劉㑹孟曰遊子日月長中原杳茫茫悲凉憤怨讀之黯然張逺注公初至成都而輒動鄉關之思所謂成都萬事好不如歸吾廬也闕陸機詩朝游游層城注層重也曹植詩嘉賓填城注填滿也國策蘇秦見趙王於華屋之下注華髙麗也論阮瑀詩季冬乃來歸名漢古歌樹木何修修鹽鐵皆為天下之名都釋都者國君所居人所都㑹也雖樂府詩玉女坐吹簫何詩吹笙鼓簧王粲登樓賦信美而非吾土兮曾足以少留詩無與適意不自適也運楚辭欲側身而無所劉鑠河廣川無梁謝靈詩空庭來鳥雀詩中原有菽原王羲之詩茫茫疇初月出不髙衆星尚爭光自古有羇旅我何苦哀傷此心傷羇旅而聊為自寬之詞鳥薄暮方至故云桑榆既而黃昏故云歸久之星出月升蓋在下弦之候也初此章前二段各八句末段四句收子夜歌碧樓冥月古詩衆星何厯厯見史記屈原傳雖與日月爭光可也淮南子日出星不不能與之爭光也陶潛詩自占有行役左傳羇旅之臣幸若獲宥傷阮籍詩揮涕懷哀楊德周曰此詩寄意含情悲壯激烈政復有俯仰六合之想朱鶴齡曰此詩語意多本阮公咏懷翳翳桑榆日照我征衣裳即阮之灼灼西頽日餘光照我衣也側身望川梁即阮之登高望九州也鳥雀夜各歸中原杳茫茫即阮之飛鳥相隨翔曠野莽茫茫也自古有羇旅我何苦哀傷乂翻阮之羇旅無儔匹俯仰懷哀傷以自廣也初月出不髙衆星尚爭光則本子建贈徐幹詩圓景光未滿衆星粲以繁公云熟精文選理於此益信杜田注桑榆喻明皇在西內初月喻肅宗衆星喻史思明之徒此最為曲說王伯厚困學紀聞亦引之吾所不解李長祥曰前後出塞石壕新安新婚垂老無家等作與山水諸作少陵五言古詩之大者出塞等作猶有三百篇漢魏之在其前山水諸作則前後當無復作者矣語不驚人死不休少陵之作詩也篇終接混茫則其詩之氣候也死不休用力處接混茫神化處其至爾力也其中非爾力也氣又曰少陵詩得蜀山水吐氣蜀山水得少陵詩吐周珽曰少陵入蜀諸篇絶脂粉以堅其骨賤丰神以實其髓破繩格以活其肢首首摛幽擷奧出鬼入神詩運之變至此極盛矣酬高使去聲君相贈鶴注公初到成都寓居浣花溪寺時髙適為彭州刺史以詩寄贈而公酬以此詩也古寺僧牢落空房客一作得寓居故人供祿米鄰舍與園蔬雙樹容聽平聲法三車肯載書草𤣥吾豈敢賦或似一作比相如此詩逐聨分答與髙詩句句相應空房客居見無詩書可計鄰友供給見非取資僧飯但容聽法則不能設難未肯載書亦何處翻經乎末則謝草𤣥而居作賦言詞人不敢擬經也洛陽伽藍記凡有古寺名僧德衆草上林賦牢落陸離寺秦嘉詩獨坐空房中成都記堂寺在府西七里極宏麗僧復空居其中與杜員外居處逼近趙清獻玉壘記公寓沙門復空所居杜臆故人當指裴冕公孫𢎞傳故人賓客仰衣食奉祿皆給之晉書山濤傳祿賜俸秩散之親故後漢陳忠疏鄰舍比里顔延之陶徴士誄伊好之洽接閻鄰舍樹湛方生詩茹彼園蔬飲此春酒方翻譯名義集娑羅東西南北四方各雙故曰雙樹靣悉皆一榮一枯涅槃經世尊在雙樹間演法出舊注法華經長者以牛車羊車鹿車立門外引諸子離火宅王勃釋迦成道記牛羊鹿之三車出宅注法華三車喻也羊車喻聲聞乘鹿車喻緣覺乘牛車喻菩薩乘俱以載運為義前二乘方便設施唯大白牛乘是實引重致逺不遺一物漢書揚雄傳贊經莫大於易故作太𤣥本傳孝成時有薦雄文似相如者召雄待詔承明之庭贈杜二拾遺附髙邇詩傳道去聲招提客詩書自討論平聲佛香時入院僧飯屢過平聲門聽法還應平聲難去聲尋經賸一作剩欲翻草𤣥今已畢此後一作外更何言公初居浣花溪寺故云招提客佛香僧飯聽法尋經想寺中景事草𤣥之外更有何言謂别有著作也通孔安國書序討論墳典高僧傳支遁講維摩經遁一義許詢無以措難詢設一難遁亦不復能通槃庾信詩經文漢語翻盧山記謝靈運即逺公寺翻涅經名其臺曰翻經臺翻者委曲敷衍之意非翻譯也卜居楚辭有卜居公借以為題上按顧注乾元二年十二月公至成都明年元元年卜成都西郭浣花溪以居公題草堂詩云經營上元始是也黃鶴鮑欽止皆云劍南節度使裴冕為公卜成都草堂以居之此說無據裴若為公結廬則詩題當特標裴冀公而詩中亦不當以主人卜林塘一句輕敘矣如王判官遺草堂資公必載之又如嚴鄭公擕酒饌來亦必亟稱之何况為公卜居耶其說不足信矣浣花溪一作之一作流水水西頭主人為去聲卜林塘幽已知出郭少塵事更有澄江銷客愁無數蜻蜓齊上上聲下去聲一雙鸂鶒對沈浮東行萬里堪乘興去聲須向山陰入一作上小舟首二卜居草堂中叙景物申上林塘幽末喜此溪直通吳㑹可乘興而至山陰也主人公自謂為卜者為此而卜居也此從浣花溪敘入即可稱花溪主人後歸成都詩云錦里逄迎有主人亦可稱錦里主人矣蜓顔廷矩曰出郭逺俗澄江散懷此幽居自得之趣蜻上下鸂鶒沈浮此幽居物情之適寰宇記浣花溪在成都西郭外屬犀浦縣一名百花潭趙曰公之居在浣花溪水西岸江流曲處世說士衡在西頭班固作東都賦自稱為主人劉孝標作廣絶交論亦自稱為主人此可互證王勃詩林塘風月賞陶潛詩遂與塵事冥注謝朓詩澄江淨如練愁輕顧曰齊曰對善狀物情劉孺聨句詎使客張孟陽濛汜池賦珍魚産而無數黃謝朓詩蜻蜓草路飛白枚乘栁賦既上下而好音亦衣而絳足庾信詩鶴一雙來謝惠連詩覽水禽之萬類信莫麗乎鸂鶒褘景福殿賦沈浮翺翔樂我皇道華陽國志蜀使費聘吳孔明送之褘歎曰萬里之行始於此矣趙曰萬里橋在浣花之東故以此起興耳世說王子猷居山隂雪夜忽憶戴安道時戴在剡溪即乘輕船就之既造門不前便返人問其故曰吾本乘興而行與盡而返黃生注此故為放言以寫其胸次非真欲逺行也其暗用孔明子猷語融㑹入妙公壯遊詩云鑑湖五月凉蓋深羡山陰風景之美今見浣溪幽勝倣佛似之故思乘興東遊此快意語非愁歎語諸說紛紛總於詩意不合張綖謂東向山陰意在訪鄭䖍也按公崎嶇入蜀方構草堂豈能捨妻子而逺尋故人其說迂矣周珽謂欲東歸洛陽須從山北陰處上船而去按成都無山不當以溪畔為山陰其說鑿矣顧宸謂公欲萬里而至山隂則冕之為人可知此似作憾冕之詞按公至成都在乾元二年十二月次年三月以李若幽為成都尹時公方卜居而裴亦將去矣焉得有不足之詞其說亦無據也王十五司馬弟出郭相訪遺去聲營草堂資鶴注此當是上元元年初營草堂時作客裏何遷次江邊正寂寥肯來尋一老愁破是今朝憂我營茅棟擕錢過野橋他鄉唯表弟還往莫辭勞一作遙上四敘出郭見訪下則謝其遺資草堂也積邵注遷次遷居次舍也左傳楚子期伐吳廢日共一日遷次陳樂昌公主詩今日何遷次新官對舊官一楚辭聲嗷嗷以寂寥兮詩惠然肯來又不然遺老又以永今朝子古詩茅棟嘯愁鳶功抱朴出不辭勞入不數陶開虞曰子美草堂有四其一在西枝村未成一在浣花一在瀼西一在東屯初營成都草堂有裴嚴二中丞高使君為之主有徐卿蕭何韋三明府為之圃有王録事王十五司馬為之營修大官遣騎親朋展力客居正復不寂寥也蕭八明府實處覔桃栽黃鶴注數首俱上元元年初營草堂時作覓桃覓竹覓榿覓松覓果皆營草堂時漸次栽種者從朱本因類附之桃栽二字連用猶俗云桃秧乃小桃之可栽者榿栽松栽亦然竹不言栽者移竹兼用根竿也奉乞桃栽一百根春前為去聲送浣花村河陽縣裏雖無數濯錦江邊一作頭未滿園初春乞栽及時易種故欲致桃之早河陽貼明府此截律詩上四句潘齊民要術凡種樹正月為上時二月為下時白帖嶽為河陽令遍樹桃李庾信枯樹賦若非金谷滿園樹定是河陽一縣花王嗣奭曰公無日不思鄉而種榿栽松若為久住之計其襟情可想然浣花一草堂遂為千古宅豈偶然哉諸章皆以詩代札乃公戲筆從韋二明府續處覔綿一作錦竹一作覔錦竹三數叢蔡曰綿竹産漢州綿竹縣之紫巖山地志漢綿竹縣以其地宜竹故名朱注楊子雲有綿竹頌此蜀産也故覓之黃鶴云錦竹即竹譜之䈄竹其皮似繡者楊慎又引梅宛陵錦竹詩云雖作湘竹文還非楚筠質本與凡草俱偶近君子室原注云此草也似竹而斑亦與杜詩不合華軒藹藹他年到綿竹亭亭出縣髙江上舍前無此物幸分蒼翠拂波濤出縣之梢映波加翠故欲分竹江干華軒指韋署此截律詩下四句王微詩長想慿華軒紀鮑令暉詩藹藹垂門桐陶潛詩亭亭復一謝朓詩蒼翠望寒山慿何十一少去聲府雍覓榿木一有數百二字栽時何雍為利州綿谷尉草堂塹七艷切西無樹林一作木非子誰復扶又切見幽心飽聞榿唐韻不載此字苕溪漁隱云丘宜切木三年大與致溪邊十畝陰堂西夕照得木成陰故欲致榿之多子指何雍時解指榿木者非亦截上四句鼂錯書髙城深塹廣韻塹繞城水也宜江淹詩蘅杜緩幽心為宋祁益部方物記榿木蜀所民家蒔之不三年可薪疾種亟取里人利之蔡夢弼曰蜀中記玉壘以東多榿木易成而可薪美陰而不害然余嘗厯考韻書無榿字詢之蜀人相傳以為丘宜切後見王荆公集中有薛秀才詩云濯錦江邊木有榿小園封殖佇華滋地偏幸免桓魋伐歲晚聊同庾信移則知欹音為是也詩十畝之間兮慿韋少去聲府班覓松樹子栽鶴注後有涪江泛舟送韋班詩韋當是涪江尉鹿晉書許孜傳有犯其松栽落落出羣非櫸栁青青不朽豈楊梅欲存老蓋千年意為去聲覓霜根數寸栽一云來他不露一松字却句句切松較之章獨有藴藉此截中四句子天台賦蔭落落之長松楊何敬宗詩青青陵上松虛賦梬棗楊梅張楫曰梅似穀子而有核其味酢出江南今按楊梅經冬不凋故比青松之不朽若作楊樹梅樹其葉先落不可云青青矣酉陽雜俎松千歲方頂平偃蓋草王僧達詩孤蓬卷霜根負吳筠詩松生數寸時遂為所沒未見籠雲心誰知霜骨又於韋處乞大邑瓷碗唐書大邑縣屬卭州咸亨二年析益州之晉原置大邑燒瓷輕且堅扣如哀一作寒玉錦城傳君家白碗勝平聲霜雪急送茅齊也去聲可憐上二瓷碗下二乞韋金此截首尾四句吳門氏曰一瓷碗至微却用三四層寫意初稱其質次想其聲又羡其色先說得珍重可愛因望其急送茅齊只尋常器皿經此㸃染便成韻事矣徐陵賦哀玉發於新聲詣徐卿覓果栽一作覓果子歌公有徐卿二子草堂少花今欲栽不問緑李與黃梅石筍街中却歸去果園坊裏為去聲求來上二覓果下二詣徐石筍街公歸路果園坊徐住所亦截上四句果西京雜記初修上林苑羣臣逺方各獻名李十五種內有緑李西都賦竹林果園堂成依黃鶴編在上元元年背音佩郭堂成蔭白茅緣江路熟俯青郊榿丘宜切林礙日吟風葉籠力鍾切山谷音夢竹和煙滴露梢暫止一作下飛烏將數子頻來語燕定新巢旁人錯比揚雄宅懶惰一作懶無心作解嘲詩家因事立題便須就題命意此拈堂成為題則賦堂之外不得旁及矣起聨言堂之規制靣勢中四記竹木之佳禽鳥之適則堂成後景物備矣末借揚雄自况以終所賦之意一起一結自相照應此通篇章法也則背郭成堂緣江熟路四字本相對將堂成路熟倒轉上半句變化矣林礙日葉吟風竹和煙露滴梢六字本相對將風葉露梢倒轉則下半句變化矣詩白茅菅兮漢書注白屋謂以白茅覆屋謝朓詩結軫青郊路嘲榿木注見前章常庾肩吾詩疏林不礙日涸浦暫通王勃詩野花捧露山葉自吟風籦黃山谷曰籠竹蜀人名大竹云蔡氏曰蜀有竹名籠朱注竹有數種節間容八九寸者曰籠竹一尺者曰苦竹弱梢垂地者曰釣絲竹紀古樂府烏生八九子端坐秦氏桂樹間通鑑晉安帝魏王圭畋於白登山見熊將數子顔師古曰將率領也卿唐太宗詩新巢封古樹左思詩寂寂揚雄宅門無相輿寰宇記子雲宅在華陽縣少城西南角一名草𤣥堂事陶潛詩懶惰故無匹揚雄傳哀帝時丁傅董賢用雄方草太𤣥或嘲雄以𤣥尚白而雄解之號曰解嘲王嗣奭曰此章與卜居相發前詩寫溪前外景此詩寫堂前內景前景是天然自有者此景則人工所致者乃卜居堂成之别也羅大經曰詩莫尚乎興興者因物感觸言在於此而意在於彼非若比賦之直言其事也故興多兼比賦比賦不兼興古詩皆然今以杜陵詩言之發潭州云岸花飛送客檣燕語留人蓋因飛花語燕傷人情之薄言送客留人止有燕與花耳此賦也亦興也若感時花濺淚恨别鳥驚心則賦而非興矣堂成云暫止飛烏將數子頻來語燕定新巢蓋因烏飛燕語而喜已之擕雛卜居其樂與之相似此比也亦興也若鴻雁影來聨峽內脊令飛急到沙頭則比而非興也蜀相此公初至成都時作録先主建安二十六年即帝位册亮為丞相尚書事方輿勝覽廟在府西北二里武侯初亡百姓遇節朔各私祭於道中李雄稱王始為廟於少城內桓溫平蜀夷少城獨存孔明廟丞一作蜀相去聲祠堂何處尋錦官城外柏森森映階碧草自春色隔葉黃鸝空一作多好音三顧頻繁郭作煩天下計兩朝音潮開濟老臣心出師未捷一作用身先死長使英雄淚滿襟上四祠堂之景下四丞相之事好首聨自為問答記祠堂所在草自春色鳥空音此寫祠廟荒凉而感物思人之意即在言外天下計見匡時雄略老臣心見報國苦衷有此兩句之沈摰悲壯結作痛心酸鼻語方有精神宋宗忠簡公臨殁時誦此二語千載英雄有同感也直書丞相尊正統名臣也朱子綱目大書丞相亮出師先後同㫖題稱蜀相仍舊稱耳王寰宇記諸葛武侯祠在先主廟西府城西有故宅逸楚辭注公卿祠堂則華陽國志成都西城故錦官城也錦江織錦濯其中鮮明他江則不好故命曰錦官孫季昭曰成都呼為錦官城以江山明麗錯雜如錦也趙注或以其地有錦官如銅官鹽官之類此更見官字取義嘗觀范至能參政作詩每官為一集所著錦官集蓋鎮都時作乃親見成都為錦官城故取以名之耳顧注儒林公議曰成都先主廟側有諸葛武侯祠祠前有大柏係孔明手植圍數大唐相段文昌有詩刻存焉唐末漸枮厯王建孟知祥二僞國不復生然亦不敢伐皇宋乾德五年丁卯夏五月枯柯再生余於皇祐初守成都又八年矣新枝聳雲枯幹存者若老龍之形正所謂柏森森也潘嶽懷舊賦柏森森以攢植江淹詩幽冀生碧草謂謝朓詩春色滿皇州之陸機詩疏黃鳥黃鸝留也或之黃栗留幽州人謂黃鶯一名倉庚一名商庚一名鵹黃一名楚雀齊人謂之摶黍遜何遜詩黃鸝隱葉飛詩晛睆黃鳥載好其音何行孫氏陵詩山鶯空樹響壟月自秋暉空字自字不勝寥落之感此詩即用其意出師表三顧臣於草廬之中頻繁言頻數繁多也陸雲詩黃鉞授征鍚命頻繁庾亮辭中書令表頻煩省闥出總六軍韓非子周公旦假為天子七年非為天下計也為其職也誼兩朝指先主後主杜臆謂欲復高光舊業似逺賈傳搴兩朝之器朱瀚注開濟謂章武開基建興濟美諡法開物濟務司馬瑋傳性開濟好施又桓宣傳開濟篤素趙充國曰無踰於老臣矣馬諸葛亮傳亮悉大衆由斜谷出據武功五丈原與司懿對於渭南相持百餘日疾卒於軍望蜀志天下英雄喁喁有王筠詩淚滿橫波目周甸曰薛逢籌筆驛詩出師表上留遺恨猶自千年激壯夫羅隱武侯祠詩時來天地雖同力運去英雄不自由吁漢運告終天嗇其夀使不能盡展其才以光復大業讀二三君子之詩未嘗不流涕歎息也楊慎曰正德戊寅於武侯祠見壁間有詩云劍江春水緑沄沄五丈原頭日又曛舊業未能歸後主大星先已落前軍南陽祠宇空秋草西蜀關山隔暮雲正統不慙傳萬古莫將成敗論三分此詩始終皆武侯事雖子美或未過之惜不知其姓氏耳廟今按杜詩先祠廟而後弔古此詩先弔古而後祠其云春水指當時出師之時又云秋草乃後人謁祠之日結用萬古三分亦本杜詠懷諸葛詩但杜是以虛對實此則以實對虛尤為斟酌耳此詩升庵闕其姓名後閲七修類稿載戴天錫集句知是元人吳漳作也梅雨鶴注詩云茅茨疏易濕當是上元元年草堂初成時作周處風土記夏至前雨名黃梅雨埤雅江湘二浙四五月間梅欲黃落則水潤土溽柱礎皆汗蒸鬱成雨謂之梅雨沾衣敗汗故自江以南三月雨謂之迎梅四月雨謂之送梅然則蜀亦不異江南也南京犀一作西浦道四月熟黃梅湛湛一作黤黤長江去冥冥細雨來茅茨疏易音異濕雲霧密難開竟日蛟龍喜盤楊慎云蜀音讀作旋渦與岸回此咏蜀中梅雨也犀浦記地黃梅記時長江承浦細雨承梅茅茨二句見細雨濛濛之象蛟龍二句見長江洶洶之勢號唐書元宗幸蜀還至德二載改成都府置尹視二京曰南京此黃希曰蜀都有石犀李冰以壓水怪犀浦之名或本犀浦縣屬成都府垂拱二年析成都縣置薛道衡詩細雨應黃梅隋煬帝江都詩梅黃雨細麥秋橫楓樹蕭蕭江水平楚辭湛湛長江兮上有楓又雷填填兮雨冥冥雲梁元帝詩從風疑細雨日莊子茅茨不剪何遜詩霧江邊起庾信詩竟坐春臺漢瓠子歌蛟龍騁兮放逺遊聚郭璞江賦盤渦谷轉凌濤山頽師氏曰水盤而回洑者與岸回旋也庚溪詩話江南五月梅熟時霖雨謂之黃梅雨然少陵詩曰南京犀浦道四月熟黃梅是蜀中梅雨乃在四月也及讀栁子厚詩云梅熟迎時雨蒼茫值曉春此子厚在嶺外詩是南粵梅雨又在春矣蓋時候所至早晚不同耶今按風土記所載則迎梅送梅之雨春夏自别也為農詩云圓荷細麥當是上元元年季春時作管子農之子恆為農錦里煙塵外江村八九家圓荷浮小葉細麥落一作墮輕花卜宅從兹老為農去國賒逺慚勾漏令不得問丹砂杜臆此喜避地得所而作也首句烟塵外為一詩之骨自安史倡亂遍地兵戈江村獨在烟塵之外如圓荷細麥舉目所見景物可嘉故將卜宅為農有終焉之志烟塵不到便同仙隱乃以不得丹砂為慚戲詞也錦里錦城之地烟塵𤇺火之警顔延年詩去國還故里蔡琰胡笳曲烟塵蔽野兮九域志容州有古勾漏縣城一統志勾漏山在今安南古勾漏縣在其下勾漏令用晉葛洪事吕氏童蒙訓曰潘邠老云七言詩第五字要響如返照入江翻石壁歸雲擁樹失山村翻字失字是響字也五言詩第三字要響如圓荷浮小葉細麥落輕花浮字落字是響字也所謂響者致力處也竊以為字字當活活則字字自響有客鶴注編在上元元年草堂作下首同按舊以此章為賓至下章為有客詩題互錯此詩云有客過茅宇當依草堂本彼此改正詩有客有客患氣經時久臨江卜宅新喧卑方避俗疏快頗宜人有客過平聲茅宇呼兒正葛巾自鋤稀菜甲小摘為去聲情親此章見相親之意上四卜居景况下言客來情事也趙汸注菜經自鋤其甲尚稀未免小摘者為情親故十字中有數曲折江王右軍重熙帖患氣懸情師氏曰公嘗有肺疾哀南賦誅茅宋玉之宅穿經臨江之府總左傳非宅是卜惟鄰是卜毛古詩喧卑厭俗居思江詩山豁自疏快宜人見詩王勃詩野客茅宇山人愛竹林出語林梁國楊氏子九歲甚聰慧孔君平詣其家呼兒為設果庾信詩葛巾久乖角菊徑簡經過時說文草木初生曰甲莊謝靈運永嘉記百卉正發聊以小摘供日謝詩惆悵憶情親趙汸曰此詩自一句順說至八句不事對偶而未嘗無對偶不用故實而自可為故實散淡率真之態偶爾成章而厭世避喧少求易足之意自在言外所以為不可及也王嗣奭曰公於情親之人當病氣已久猶必正巾以接之安有不冠而見嚴武者此可作辨誣之一證也賓至依草堂本作賓至至盧注有客者偶然有之也賓至者有為而也題相似而微不同左傳賓至如歸幽棲地僻經過平聲少老病人扶再拜難豈有文章驚海內漫勞車馬駐江干竟日淹留佳客坐百年粗糲音辣腐儒餐不一作莫嫌野外無供給乘興去聲還來看藥欄此章見相欵之情上四賓至下四留賓直敘情事而不及於景此七律獨創之體不拘唐人成格矣僻居老病不意人來客以文章之契跋涉江干意亦誠矣公先為謙已之語而復盡欵洽之情讀此詩見豪放中有殷勤氣象顧注此詩詞人聲價高士性情種種具見暇生注竟日淹留乃傾蓋如故之根何遜詩幽棲多豫謝叔原詩願言屢經過古宋宗炳有疾還江陵曰老病俱至名山恐難遍觀詩隴西行却略再拜跪庾信枯樹賦殷仲文海內知名說漫勞徒勞也陸范雲詩江干雲氣浮干水涯也世談宴竟日機詩淹留終不見粟沈約詩佳客信龍鑣國百年猶言終身為廣韻一斛舂約六斗米為糲韓策嚴遂曰特以丈人粗糲之費後漢魏霸為巨鹿太守常服粗糲不食魚肉之味漢書高祖以隋何為腐儒張耳傳女家厚供給耳徑庾肩吾詩向嶺分花隨階轉藥欄補注此詩五六失粘朱瀚曰一主一賔對仗成篇而錯縱照應極結搆之法起語鄭重次聨謙謹腹聨真率結語殷勤如聆其謦咳如見其儀型較之香山諸作真覺髙曾規矩肅肅雍雍也羅大經曰近時趙紫芝詩云一瓶茶外無祗待同上西樓看晚山世以為佳然杜少陵云莫嫌野外無供給乘興還來看藥欄即此意也杜子野詩云尋常一樣窗前月才有梅花便不同世亦以為佳然唐人詩云世間何處無風月才到僧房分外清亦此意也欲道古人所未道信矣其難矣紫芝又有詩云野水多於地春山半是雲世尤以為佳然余讀文苑英華所載唐詩兩句皆有之但不作一處耳唐僧詩云河分岡勢斷春入燒痕青有僧嘲其蹈襲云河分岡勢司空曙春入燒痕劉長卿不是師兄偷古句古人詩句犯師兄此雖戲言理實如此作詩者豈故欲竊古人之語以為已語哉景意所觸自有偶然而同者蓋自開闢以至於今只是如此風花雪月只是如此人情物態狂夫鶴注編在上元元年句盧注此詩因草堂而興感詩成之後用末狂夫為題詩狂夫瞿瞿萬里橋西一一作新草堂百花潭水即滄浪風含翠篠音小娟娟淨一作靜雨裛紅蕖冉冉香厚祿故人書斷絶恆飢稚子色凄凉欲填溝壑惟疏放自笑狂夫老更狂上四言草堂之景聊堪自適下因客况艱難而託為笑傲之詞叶竹篠在堂迎風則愈呈其疏秀荷蕖在潭霑雨則更其芬芳娟娟美好貌冉冉漸至貌而朱瀚注以故人享厚祿而書并斷絶致幼子受恆飢色帶凄凉每句三層語最沈痛然身瀕溝壑而唯自笑疏狂終不怨恨故人可見公之曠懷矣杜臆故人必有所指但謂裴冕則非堂既成後冕方去蜀也在華陽國志少城西南兩江有七橋南渡流曰萬里橋城都縣南八里即諸葛亮送費褘處因以為名周顧注北山移文李善注引梁簡文帝草堂傳曰汝南顒昔經在蜀以蜀草堂寺林壑可懷乃於鍾嶺雷次宗學館立寺因名草堂所謂草堂之靈也公卜居浣花里近草堂寺因以命名耳陸游筆記四月十九日成都謂之浣花遨頭宴於杜子美草堂滄浪亭傾城皆出自開歲宴游至是日止蜀人云雖戴白之老未嘗見浣花日有雨在夏書嶓冡𨗳漾東流為漢又東為滄浪之水一統志襄陽府均州垂影釣滄浪簡謝靈運詩緑篠媚清漣蔓鮑照詩娟娟似蛾眉梁文帝詩紅蕖間青瑣紫濕丹楹選詩柔條紛冉冉策淮南子無大功而有厚祿向王濬表人道斷絶國願及未填溝壑而託之秀思舊賦嵇康志逺而疏吕安心曠而放公詩每用疏放本此羅大經鶴林玉露云風含雨浥一聨上句風中有雨下句雨中有風謂之互體楊誠齊詩緑光風動麥白碎日翻池風日互映亦本於此但杜本無心楊則有意矣楊升菴謂詩中疊字最難下唯少陵用之獨工今按七律中有用之句首者如娟娟戲蝶過閒幔片片輕鷗下急湍短短桃花臨水岸輕輕栁絮㸃人衣青青竹笋迎船出白白江魚入饌來是也有用之句尾者如信宿漁人還泛泛清秋燕子故飛飛小院回廊春寂寂浴鳬飛鷺晚悠悠客子入門月皎皎誰家搗練風凄凄是也有用之上腰者宫草霏霏承委佩爐烟細細駐遊絲江天漠漠鳥雙去風雨時時龍一吟雲石熒熒髙葉晚風江颯颯亂帆秋山水蒼蒼落日曛竹竿裊裊細泉分是也有用之下腰者如穿花蛺蝶深深見㸃水蜻蜓欵欵飛風含翠篠娟娟淨雨裛紅蕖冉冉香無邊落水蕭蕭下不盡長江滚滚來碧窗宿霧濛濛濕朱拱浮雲細細輕是也聲諧義恰句句帶仙靈之氣真不可及矣田舍鶴注此當是上元元年初夏作觀櫸栁枇杷可見世說王大將軍舊有田舍名田舍清江曲一作上柴門古道旁草深迷市井地僻懶衣裳楊栁唐顧陶類編作楊栁一作櫸栁櫸居許切正異作櫃枝枝弱枇杷對對從顧陶本一作樹樹香鸕鷀西日照曬翅滿漁梁上四敘村居荒僻下言景物之幽閒岷晉書陶潛傳惟至田舍及廬山遊觀而已俗楚辭隱山以清江元行恭詩草深斜徑成風通古者二十五畝為一井因為市交易故稱市井有上林賦盧橘夏熟注即枇杷也左思蜀都賦其園則林擒枇杷李善注枇杷冬華黃實本出蜀中鳥洙曰鸕鷀水鳥蜀人以之捕魚晉樂歌君非鸕鷀詩疏敝敗之笱在於魚梁趙曰陶侃母責其為漁梁吏而寄鮓學林新編曰此詩以櫸栁對枇杷或謂櫸栁者栁之一種其名為櫸栁非雙聲字也枇杷乃雙聲字相對未工豫謂詩題曰田舍則當在田舍時偶然見此二物舉以成對耳如覓松苗子詩云落落出羣非櫸栁青青不朽豈楊梅楊梅乃梅之一種以此相配乃正對也江村鶴注此當是上元元年夏作謝朓詩曖曖江村見清江一曲抱村流長夏江村事事幽自去自來一作歸梁上燕相親相近去聲水中鷗老妻畫紙為一作成棊局稚子敲針作釣鈎但有故人供樊作分祿米此從英華一作多病所須惟藥物微軀此外更何一作無求江村幽事起中四句梁燕屬村水鷗屬江棋局屬村釣鈎屬江所謂事事幽也末則江村自適有與世無求之意年燕鷗二句見物我忘機妻子二句見老少各得蓋多匍匐至此始得少休也周周注清江指浣花溪王臺卿詩清江窮廣深世說顗曰吾若萬里長江何能不千里一曲筠沈佺期詩坐看長夏晚梁陶潛詩事事在中都吳詩一燕海上來一燕髙息何遜詩可憐雙白鷗朝夕水上游為晉李秀四維賦序四維戲者衛尉摰侯所造也畫紙局截木為棋東方朔七諫以直針而釣兮又何魚之能得惟直針不可以釣故敲針作鈎也漢樂府烏生曲釣鈎尚得鯉魚口分祿米亦指裴冕此暗用公孫𢎞給俸祿於故人事英張華賦行藥物以為娛局字物字疊用入聲當從華為是且祿米分給包得妻子在內賦謝靈運山居賦奉微軀以宴息陸雲逸民淡浩然其何求申涵光曰此詩起二語尚是少陵本色其餘便似千家詩聲口選千家詩者於茫茫杜集中特簡此首出來亦是奇事王介甫悼鄞江隱士王致詩云老妻稻下收遺􅕗稚子松門拾墮樵二語本此杜能說出旅居閒適之情王能說出髙人隱逸之致句同意異各見工妙灑黃生曰杜律不難於老健而難於輕鬆此詩見蕭流逸之致江漲鶴注詩云江漲柴門外當是上元元年在草堂作郭璞江賦濟江津而起漲注漲水大貌江漲柴門外兒童報急流下去聲牀高數尺倚杖沒中洲細動迎風燕輕搖逐浪鷗漁人縈小楫容易音異拔趙音蒲撥切一作捩船頭上四江漲下寫漲時景物是方下牀而水髙數尺及倚杖而水沒中洲急漲之勢迎風之燕貼近水靣水微動而燕不驚逐浪之鷗浮泛水中水輕搖而鷗自適此見江流平滿波浪不興容易拔船頭亦見江水寬而漁人樂此杜臆動曰細搖曰輕因鷗燕之得趣亦若水使之然於無情中看出有情曹植詩柴門何蕭條雪鮑照詩急流騰飛沫倚古詩媒人下牀去庾信詩花深數尺鮑照詩杖牧雞豚漁楚辭蹇誰留兮中洲五陶潛桃花源記人甚異之庾信詩兩開船頭野老鶴注當是上元元年秋作考乾元二年九月東京及濟汝鄭滑四州皆陷賊上元元年六月田神功破思明之兵於鄭州然東京諸郡尚未收復故詩云城闕秋生畫角哀詩成後拈首二字為題野老籬邊一作前江岸回柴門不正逐江開漁人網集澄潭下去聲估客船隨返照來長路關心悲劍閣片雲何事一作意又云行雲幾處傍去聲琴臺王師未報收東郡城闕秋生畫角哀此在草堂而感時也上四寫景下四言情漁江岸回曲其柴門不正設者為逐江靣而開也網客舟即臨江所見者劍閣琴臺皆無佳趣正為東郡未平而角吹聲哀也黃生曰前幅摹晚景真是詩中有畫後幅說旅情幾于淚痕濕紙矣關漁人網估客船三字略讀宋人詩多用此法長路心既傷入蜀片雲何事又嫵留蜀下句作比喻語漁洪仲曰秋生則角聲更哀生字屬秋不屬角莊子人入海利在水也虞鶱詩澄潭寫度鳥邵注潭即百花潭詩世說謝尚船行清風朗月聞江渚間估客船上有詠聲梁元帝纂要日西落光返照於東謂之返景顧注日暮急於泊船故隨返照而來康孟詩返照若華池古詩長路漫浩浩連鮑照詩萬曲不關心謂水經注小劍去大劍三十里山絶險飛閣涌衢故之劍閣梁簡文帝詩可憐片雲生北郭璞詩何事登雲梯注玉壘記相如琴臺在浣花溪詩王師之所朱東郡概指京東諸郡非専指滑州靈昌郡也廣原注至德二年升成都為南京故得稱城闕曹植詩曕戀城闕易林秋風生哀簫梁簡文詩城髙短發林空畫角悲雲山鶴注詩言望鄉臺當是上元元年成都作是年羌渾黨項冦涇隴史思明入東都故有京洛音書之語者夢弼曰此詩懷京洛而作然京洛不可見所見雲山而已故首句因雲山起興遂以雲山命題兮蔡琰笳曲雲山萬重歸路遐京洛雲山外音書靜不來神交作賦客力盡望鄉臺衰疾江邊卧親朋日暮回白鷗元水宿何事有餘哀此對雲山而懷故鄉也首二遙憶兩京次二託迹成都下乃漂泊無聊而作自解之語舊以作賦句承京洛因班固作兩都賦張衡作兩京賦故也其說似迂杜臆謂作賦客指相如傷時無同調而心切思鄉耳按作賦用蜀人望鄉用蜀地此說較穩本黃生注故鄉不見而異地羇孤客子哀號宜矣彼鷗水宿之鳥亦何事而作江上哀聲乎末乃觸物寄慨濤謝朓詩誰能久京洛涉吳筠詩萬里斷音書晉山與阮籍為神交言不形迹也南史劉評字彥度阮孝緒博學隱居不交當世評一造之即願以神交漢書揚雄傳司馬相如作賦甚𢎞麗盧照鄰詠琴臺詩雲疑作賦客月似聽琴人成寰宇記益州記云升仙亭夾路有二臺一名望鄉臺都記望鄉臺隋蜀王秀所築謝張華詩衰疾近殆辱太子集宿昔親朋靈運詩水宿淹晨暮梁昭明曹植詩悲歎有餘哀遣興去聲曰梁權道編在成都詩內題遣興借詩以自遣也干戈猶未定弟妹各何之拭淚霑襟一作巾血梳頭滿靣絲地卑荒野大天逺暮江遲衰疾那能久應平聲無見汝期一作時蹤此章憶弟妹而作也上四傷手足睽離下四歎行流落地平故見野寬天曠故覺暮遲此寫蜀中春景不左傳子産曰日尋干戈以相征討昔列子弟妹之所見莊子涕泣霑襟晉子夜歌宿不梳頭絲髮被兩肩詩易大傳天尊地卑照鮑照詩茫然荒野中隋煬帝暮江平不動鮑詩屏迹勤耕稼衰疾倚芝藥遣愁此詩當入在成都詩內蓋與雲山遣興諸詩先後同時之作舊編在䕫州者非是養拙蓬為戶茫茫何所開江通神女館地隔望鄉臺漸惜容顔老無由弟妹來兵戈與人事回首一悲哀通首皆言愁緒欲借詩以遣之來江可通而地猶隔歎不能往䕫也兵戈阻則弟妹難人事蹇則容顔易老故不勝悲哀回首對開户而言山潘嶽間居賦終優游以養拙詩尚書大傳子夏曰深之中作壤室編蓬戶庾信原野正茫茫姬水經注丹山西即巫山宋玉所謂帝女居之名曰瑤為之立廟號朝雲祠方輿勝覽神女廟在巫山縣治西北二百五十步有陽雲臺淮南子悲哀抱於情此詩將前後諸篇參看方知為成都所作江通神女館即所謂獨立見江船也地隔望鄉臺即所謂力盡望鄉臺也漸惜容顔老即所謂梳頭滿靣絲也無由弟妹來即所謂弟妹各何之也舊編屬䕫州者斷誤若身在䕫州不必云江通神女館矣且久思出峽何反追言地隔望鄉臺耶杜鵑行此詩蔡氏編在䕫州詩內但䕫州别有杜鵑詩不應重出今按詩中有蜀人聞之之語蓋初至成都時泛咏杜鵑也其云昔日蜀天子一章應是託物寓言有感朝事而作今正其先後次序決英華刻作司空曙注云又見杜甫集蓋兩存未也華陽國志魚鳬王後有王曰杜宇教民務農一號杜主七國稱王杜宇稱帝號曰望帝更名蒲卑㑹有水災其相開明决玉壘山以除水患帝遂禪位於開明升西山隱焉時適二月子鵑鳥鳴故蜀人悲子鵑鳥鳴也成都記望帝死其魂化為鳥名曰杜鵑亦曰子規又記杜宇亦曰杜主自天而降稱望帝好稼穡教人務農治郫城亦曰望帝至今蜀人將農者必先祀杜主時荆人鱉靈死其尸沂流而上至文山下復生見望帝望帝因以為相古時杜宇稱望帝魂作杜鵑何微細跳枝竄葉樹木中搶佯英華作翔瞥捩雌隨雄毛衣慘黑貌一作自憔悴衆鳥安肯相尊崇隳英華作陋形不敢栖華屋短翮惟願巢深叢此章詠杜宇以破從來望帝之說也首段記其形細微而狀凋悴邵注搶佯飛掠有似猖狂瞥捩目斜視而旋折也黲黑淺黑色深叢竹木叢生處一夏侯湛飛鳥賦舒修頸以儴佯上林賦轉騰撇烈作撇捩朱超詩寄語故林無數鳥㑹入羣裏比毛衣崇易林毛羽憔悴陶潛詩衆鳥欣有託隋帝詔尊聖教謝靈運詩華屋非蓬居穿皮啄朽觜欲秃苦飢始得食一蟲誰言養雛不自哺此語亦足為愚䝉聲音咽咽如有謂英華作咽噦若有謂注云咽平聲號平聲啼略與嬰兒同口乾音干垂血轉迫促似欲英華作欲以上上聲訴於蒼穹此憐其求食勞而啼聲慘南漢盤中詩空倉鵲苦飢淮子齊莊公出獵有一蟲舉足漢楊惲書足下哀其愚蒙雛不自哺注見十卷也前韓非子嬰兒相與戲蜀人聞之皆起立至今相效傳微風從英華一作斆學傳遺風乃知變化不可窮豈思昔日居深宫嬪嬙一作妃左右如花紅末歎世俗之傳訛可蜀人起立將敬至今傳為風俗謂望帝之魂變化不窮詰也乃今之對花哀鳴者豈猶思深宫妃嬪之樂耶其亦終述不悟矣前此章前二段各八句末段五句收書惟斆學半漢賈誼傳遺風餘俗尚猶未改宫長門賦步從容於深題壁上韋偃畫馬歌黃鶴編在上元元年成都詩內與下首戲題韋偃歌乃先後同時作㸃朱景𤣥畫斷韋偃京兆人寓居於蜀常以越筆簇鞍馬千變萬態或騰或倚或齕或飲或驚或止或走或起或翹或跂其小者或頭一㸃或尾一抹巧妙精竒韓幹之匹也朱注張彥逺畫記韋偃作鷗黃長睿東觀餘論云少陵詩韋偃當作鷗傳寫誤耳今存其說以待考韋侯别我有所適知我憐渠一作君畫無敵戲陳浩然本作試拈秃筆掃驊騮歘見騏驎出東壁一匹齕草一匹嘶坐看平聲千里當霜蹄時危安得真致此與人同生亦同死韋偃畫馬在草堂壁上乃臨行留蹟也公愛其神駿而欲得此以同生死其所感於身世者深矣顔延之白馬賦歘聲躍以鴻驚之漢書梅福傳欲以三代之法取當世之士猶以伯樂圖求騏驎於市盧注顔淵望吳門馬見一匹練一匹本此蹄後漢書馬援傳皆有騏驥一日千里莊子馬可以踐霜雪齕草飲水洪邁容齊隨筆云江山登臨之美泉石賞玩之勝世間佳境也觀者必曰如畫至於丹青之妙好事君子嗟歎之不足者則人以逼真目之如老杜人間又見真乘黃時危安得真致此悄然坐我天姥下斯須九重真龍出慿軒忽若無丹青高堂見生鶻直訝松杉冷兼疑菱荇香之句是也以真為假以假為真均之為妄境耳人生萬事如此何特此耶戲題王宰畫山水圖歌梁氏編在上元元年成都詩內張彥逺名畫記王宰蜀中人多畫蜀山玲瓏嵌空巉嵯巧峭十日畫一水五日畫一石能事不受相促迫英華作逼王宰始肯留真跡壯哉崑崙方壺一作丈圖挂君高堂之素壁首贊王宰圖畫宰吳門金氏曰不受促迫方得從容盡其能事此見王品格亦見主人知音杜臆崑崙方壺舉極西極東以狀其逺景非真畫此兩山也下文日本銀河亦即此意庾肩吾詩畫水即生苔水經注石崖山上冇畫石山少後漢書鄭興上疏臣下促迫河梁武帝論書法真跡雖可得而推文中子壯哉山之固則崑崙注别見壺拾遺記三壺海中三山也一曰方壺方丈二曰蓬則蓬萊也三曰瀛壺則瀛州也形如壺器上廣中狹下方也漢樂府相逄行挾瑟上髙堂掛素壁所謂留真蹟湛方生七歡素壁流光巴陵洞庭日本東赤一作南岸水與銀河通中有雲氣隨飛龍舟人漁子入浦溆山水盡亞一作帶洪濤風此記圖中山水東崑崙方壺山既自西而東故巴陵日本水亦自西而且其水勢浩瀚銀漢通而雲龍起又見風濤激蕩漁舟避而山水搖真可謂壯觀矣縣江賦爰有包山洞庭巴陵地道山海經注長沙巴陵西有洞庭陂潛伏通江邊唐書外國傳日本國者倭國之别種也以其日在國故名日本赤岸銀河言水天一色七發凌赤岸篲扶桑吳越春秋西踰赤岸曹植表南至赤岸江賦鼓洪濤於赤岸南兖州記瓜步山東五里有赤岸山南臨江中山謙之南徐州記曰京江禹貢北江也春秋分朔輒有大濤至江乘北激赤岸尤更迅猛李善文選注謂赤岸在廣陵興縣桑欽水經云新安縣南白石山名廣陽山水名赤岸水莊子姑射山有神人乘雲氣御飛龍而遊乎四海之外浦木華海賦舟人漁子徂南極東謝靈運詩映泫歸溆湛方生詩山木兮摧披說文亞次也廣韻亞就也相依也朱注風勢湧濤山木盡為之低亞公詩花亞欲移竹及花蘂亞枝紅皆與此同義楊慎曰亞枝臨水低枝也孟郊詩南浦桃花亞水紅水邊栁絮揚春風尤工逺勢古莫比咫尺應平聲須論平聲一作千一作行萬里焉於䖍切得并平聲州快剪刀剪取吳松從英華一作淞半江水末將看畫作結蓋玩賞不忍釋也杜臆王畫神妙只咫尺萬里盡之前靣許多景象皆包在一句中又曰此詩通篇設想俱有戲意而收語尤戲之甚故云戲題劉公少遊吳越故對畫而思及松江黃鶴謂上元元年展陷潤升蘇三州故託意於吳松其說大鑿此章上二段各四韻末段四句收李世說袁彥伯曰江山遼落居然有萬里之勢朱注賀詩欲剪湘中一尺天吳娥莫道吳刀澀本此十趙曰吳松言吳地之松江也吳郡志松江在郡南四五里禹貢三江之一蔡絛西清詩話云梁蕭文奐能書善畫於扇上圖山水咫尺之內便覺萬里為遙老杜題山水圖云尤工逺勢古莫比咫尺應須論萬里乍讀似非用事如男兒既介胄長揖别上官用介胄之士不拜婦人在軍中兵氣恐不揚用軍中豈有女子乎皆用事而隱其語戲為韋偃舊作戲韋偃為雙松圖歌名畫記韋鑒子鶠工山水髙僧竒士老松異石筆力徑健風格髙舉人知鶠善馬不知松石更佳天下幾人畫古松一作樹畢宏已老韋偃少去聲絶筆長風起纖末滿堂動色嗟神妙首贊韋偃畫松接杜臆起二句語氣平緩忽以絶筆長松二句何等筆力獲隋煬帝詩古松惟一樹也杜預春秋左傳序絶筆於麟絶筆畫成而閣筆封演聞見記畢宏天寶中御史善畫古松後見張璪於是閣筆張彥逺名畫記大厯二年畢宏為給事中畫松石於左省㕔壁好事者皆詩詠之改京兆少尹為左庶子徘樹石擅名於代樹木改步變古自宏始也張載詩徊向長風堂長笛賦其應清風也纖末奮梢象謝莊月賦滿變容吳都賦斯實神妙之響兩株慘裂苔蘚皮屈鐡交錯回髙枝白摧朽骨龍虎死黑入大陰雷雨垂一作隨蝕次摹古松之狀回朱注皮裂故幹之剝如龍虎骨朽枝故葉之陰森如雷雨下垂杜張綖注白摧言畫之枯淡處黑入言畫之濃潤處臆寫雙松止四句耳而冥思𤣥構幽致深情更無剩義可屈鐡枝曲而黑也謝神仙傳薊子訓手足交胸上不得伸狀如屈鐡惠連賦散漫交錯氤氲蕭索隱韓非子朽骨爛肉施於土地史記索極南為太陽極北為太隂松根胡僧憩寂寞龎眉皓首無住著直略切偏袒右肩露雙腳葉裏松子僧前落又記松下僧人有杜臆入老僧一段突兀蕭灑窗冥靈超更神氣漢書武帝過郎署見顔駟龎眉皓髮李陵書皓首而歸膝楞嚴經名無住行名無著行金剛經偏袒右肩右著地朱注長水經疏袒肉袒也西方俗儀見王者必肉袒示非敢有犯佛教亦隨此用然此以表將荷大法之重擔耳松子見䕫州詩注韋侯韋侯數色角切相見我有一匹好東一作素絹重之不減錦繡段已令平聲拂拭光凌亂請公放筆為直幹此索韋畫松也汝杜臆韋之畫松以屈曲見竒直便難工匹絹幅長能放筆為直幹乎戲之也此章四段四轉韻前各四句末段五句關吳曾漫録東絹關東綃也庾肩吾答武陵王賚絹啓東之妙潛織陋其卷綃朱注唐志東川陵州土貢鵝溪絹歲黃希曰三國志李衡州里有千樹木奴不責汝衣食止一匹絹亦可用矣坡集詩注鵝溪在梓州鹽亭縣出絹甚良時人謂之鵝溪絹即東絹也四愁詩美人贈我錦繡段縱謝朓詩雲錦相凌亂無放筆筆也丘遲詩直幹曲枝唐詩紀事載湯文圭九莘雨吟雷劈老松疑虎怒雨衝陰洞覺龍腥與杜詩白摧朽骨龍虎死黑入太陰雷雨垂造句竒峭足以相當北鄰鶴注此指草堂之鄰當是上元元年作又云公詩多以縣令為明府此北鄰蓋王明府與牙潘尼詩瓜司北鄰明府豈辭滿藏身方告勞青錢買野竹白幘岸江皋愛酒晉山簡能詩何水曹時來訪老疾步屧到蓬蒿上四美明府髙致下則喜其興豪而多情也閒不為辭滿而為藏身見其志在隱遁野竹江皋寫其適亦見鄰居相近多山簡水曹人名官職借對自巧方謝靈運詩辭滿豈秩謝病不待年杜臆藏身而告勞亦見在官不憚勞矣人詩黽勉從事不敢告勞興鶴云青錢銅錢也趙云蜀謂見錢為青錢今按漫詩㸃池荷葉疊青錢可見青係錢色援庾肩吾詩野竹交臨浦之後漢書光武岸幘以見馬舊云岸幘露額也如水露岸晉書謝奕為桓溫司馬岸幘嘯咏應劭漢官云幘古者卑賤執事不冠者之所服也蔡雍獨斷漢元帝額有壯髮不欲使人見始進幘服之羣臣皆隨焉尚無巾王莽頭秃因施巾故里語曰王莽禿幘施屋漢有緑幘紫幘黑幘赤幘元帝微行從者皆白衣幘假楚辭朝騁騖於江皋晉書山簡濤之子永嘉三年節鎮襄陽惟酒是耽起梁書何遜字仲言八歲能賦詩為名流所稱天監中家奉朝請遷建安王水曹行參軍兼記室又為安西安成王參軍事兼尚書水部郎窮屧即履也或云履薦髙士傳張仲蔚平陵人常居素室中蓬蒿沒人草蓬蒿公堂地也南鄰顧宸曰南鄰朱山人也後有過朱山人水亭詩左思詩南鄰聲鐘罄錦里先生烏角巾園收芋一作芧非栗一作栗非不一作未全貧慣看平聲賓客一云門戶兒童喜得食階除鳥雀馴秋水才深一作添四五尺野航魯直作艇恰受兩三人白沙翠竹江村一作山暮一作路相送英華作送或作對柴門一作籬門或作籬南月色新上四造山人之居下則喜其同舟送别也雀角巾隱士之冠芋栗野人之食兒童喜接人之厚鳥馴待物之仁詩善鍊格前段叙事數層括以四語後段寫景一意拓為半篇兒童鳥雀用倒裝法秋水野航用流對法華陽國志西城故錦官城也錦江濯錦其中則鮮明故命曰錦里王南史劉巖隱逸不仕常著緇衣小烏巾通鑑范通謂濬曰君平吳之日當角巾歸第栗宋之問詩栗芋秋新熟杜臆芋栗止於一物作芋可該園中所産陸瑜詩姮娥婺女慣相看之公孫𢎞傳賓客故人迎後漢郭汲傳有兒童數百迎曰聞使君到喜故來景福殿賦階除連延大謝靈運詩空庭來鳥雀家莊子秋水時至水經注者長四五尺蕭何世多者兩三人折湘中記白沙如霜雪相梁昭明太子扇賦翠竹之枝吳筠詩送出江潯中涵光曰秋水才深四五尺野航恰受兩三人語疏落而不酸今人作七律堆砌排耦全無生氣而矯之者又單弱無體裁讀杜諸律可悟不整為整之妙補黃生注烏角巾與錦里相映帶起語逸致顧宸曰周祈名義考云園收芧栗未全貧與山農詩呼兒登山收橡栗同意芧栗即橡栗乃櫟木子也莊子徐無兒先生居山食芧栗此一說也王洙云成都風俗曰大飢不飢蜀有蹲鴟史記卓氏曰岷山之下沃野之陰蹲鴟至死不飢注云大芋也揚雄蜀都賦言閒蹲鴟之沃野又言榛栗罅發則芋栗明為兩物據公他詩云我戀岷下芧又云嘗果栗皺開亦可證芋栗皆成都所産矣且芧栗野生不待園中收種而芧栗充飢乃貧餒之甚者豈可云未全貧乎後過南鄰朱山人詩云殘樽席更移其家非藉芧栗以充飢者還作芋栗為當過南鄰朱山人水亭蔡氏編在廣德二年復歸成都時今附在南鄰之後以類相從也絶句云梅熟許同朱老喫疑即此山人相近竹參初簪切差此兹切相過平聲人不知幽花欹滿樹細一作小胡云麗澤本作野水曲一作細通池歸客村非逺殘樽席更移看君多道氣從此數音朔追隨首聨叙事過南鄰也次聨寫景見水亭也下四言情山人留飲也於朱瀚曰前詩云兒童喜於看客隱不絶俗也鳥雀食階除貧能推恩也看君多道氣此可互證台身行竹裏故人不知矣徐陵天山館碑蕭然仙才卓道氣羅大經曰自昔閒居野處者必有同道同志之士相與往還淵明移居詩云昔欲居南村非為卜其宅聞多素心人樂與數晨夕又云鄰曲時來往抗言談在昔竒文共欣賞疑義相與析則南村之鄰豈庸庸之士哉李太白尋魯城北范居士詩云忽憶范野人閒園養幽姿又云還傾四五酌自詠猛虎詞近作十日歡逺為千歲期風流自簸蕩謔浪偏相宜想范野人者蓋亦可人之流也少陵在錦里亦與朱山人往還兩見於詩章既稱為錦里先生又稱為多道氣而數追隨山人固亦非常流矣因崔五侍御寄高彭州一絶朱注公追酬髙蜀州人日詩考之上元二年高已刺蜀此云彭州牧必元年作也時公年將五十而詩云百年已過半猶乾元二年立秋後題年止四十八亦曰惆悵年半百里九域志云彭州至成都九十二百年已過半秋至轉飢寒為去聲問彭州牧何時救急難難叶平聲時此詩自敘窮老而望髙公之相恤也兄秋至收穫之宜免於飢寒而兹不然故曰轉詩弟急難叶况也永歎俱讀平聲奉簡髙三十五使去聲君髙由彭州刺蜀州公時在蜀年譜云上元元年間常至蜀州之青城新津是也當代論平聲才子如公復扶又切幾人驊騮開道路鷹隼出風塵行色秋將晚交情老更親天涯喜相見披豁對一作道吾真吳若本作君恐誤致上四稱髙之才調下四述髙之交情驊騮逺鷹隼髙騫喻才人得位可以大行其志晚秋行色引起下句披豁即開心見誠之意舊唐書有唐以來詩人之達者唯適而已蔡琰曲我將行兮向天涯也曹植髑髏說是反吾真和去聲裴迪登新津寺寄王侍郎原注王時牧蜀英華注即王蜀州鶴注此必公暫如新津與裴同至寺中故有此作當在上元元年蜀州至成都才百里故可唱和也新唐世系表裴迪出洗馬房裴天恩之後地理志津縣屬蜀州九域志縣在蜀州東南七十里夢弼曰王侍郎王維弟縉也何恨一作限倚山木吟詩秋葉黃蟬聲集古寺鳥影度寒塘風物悲遊子登臨憶侍郎老夫貪一作賞一云費佛日隨意宿僧房首句陡然而起言我亦何所愁恨而倚木吟詩乎正以草木黃落之時蟬聲鳥影秋景堪傷而風物登臨故人足念也且已之棲宿寺中漂流更可歎耳此詩句句含恨意必裴詩原有恨字而和之如此趙單二注將上六句作述裴語說得全無意義矣君遊子指裴陳子昻詩平生亦何恨公别賀蘭銛詩今抱何恨雁何遜詩幾逢秋葉黃寒隋王胄詩風度蟬聲逺雲開路長何遜詩露濕塘草殷仲文詩風物自凄凉碑陰鏗開善寺詩登臨情不極蕭散趣無窮教江總寺佛日初照慈雲不偏隋李士謙傳或問三優劣士謙曰佛日也道月也儒五星也蔡注古詩貪佛不如貪僧金光明經佛日大悲減一切暗又云佛日輝耀放于光明為大積寶經衆僧隨意所樂造經行之處贈蜀僧閭丘師兄鶴注此當是上元元年秋作書原注太原博士均之孫舊唐陳子昻後成都人閭丘均亦以文章著稱景龍中為安樂公主所薦起家拜太常博士公主誅均坐貶循州司倉卒有集六卷大師銅梁秀籍籍名家孫嗚呼先博士炳靈精氣奔首敘閭丘世系唐晉髙僧傳惠亮大師小師又銅梁秀鍾山川秀氣也書合州石鏡縣有銅梁山有銅梁縣十道志銅梁山在涪江南七里左思蜀都賦外負銅梁於宕渠籍籍聲名之盛也前漢江都易王傳口語籍籍江後漢方術傳餘亦班班名家焉精蜀都賦近則漢炳靈世載其英齊顧歡詩氣因天行惟一作往昔武皇后臨軒御乾坤多士盡儒冠墨客藹雲屯當時上上聲紫殿不獨卿相去聲尊世傳閭丘筆峻極逾侔作崑崙鳳藏丹霄暮一作穴龍去一作出白水渾青熒雪嶺東碑碣舊製存斯文散都邑髙價越璵璠音煩晚看平聲作者意妙絶與誰論平聲生此追敘博士文章身上八稱其望重前下八稱其名垂後漢書史丹傳天子自臨軒檻長詩濟濟多士林史記酈食其傳諸客冠儒冠來者楊賦序藉翰為主人子墨為客卿以風武詩藹藹王多吉士殿列子望之若屯雲三輔黃圖帝於甘泉宫起紫雕文刻鏤以玉飾之謝朓詩紫殿肅陰陰之不獨卿相尊言墨客亦膺主眷成公綏賦潛崑崙峻極兮鳳藏龍去比閭丘之殁晉東海越王檄文申陸機陸雲之枉穴碎雙龍巢傾兩鳯北魏段承根贈李寶詩鳳戢崑丘龍藏𤣥漠周庾信齊憲王碑鳳沈丹穴龍亡黑陂又三鳳八龍古人以比賢士原不專指人君也山海經丹穴之山有鳥狀如鶴五色而文名曰鳳碑東京賦龍飛白水在班固西都賦琳珉青熒此詩言文之光耀雪嶺維州南三百六十里文髙僧傳𢎞忍沒於髙宗上元二年十月開元中太子學閭丘均為塔碑焉杜田曰東蜀牛頭山下有閭丘均撰瑞聖寺磨崖碑嚴政書寺今改為天寧羅漢禪院宗懍詩接里開都邑蔡雍薦邊讓書章環瑋之髙價昭知人之絶明也暮曹植詩亮懷璠璵美杜臆晚看作者意言識定於年也漢髙帝敕太子時方省書乃使人知作者之意妙陸厥答內兄希叔詩書記既翩翩賦歌能絶吾祖詩冠去聲古同年䝉主恩豫章夾日月歲久空深根此敘世交自嘆繼起衰微品傅亮宋公策文爰發初迹則竒謀冠古講庾肩吾書施吳鄴下後生同年拔萃王褒四子德論主恩滿溢史杜審言傳武后朝授著作郎遷膳部員外郎朱注稱均拜太常在中宗景龍間據公詩則武后時已擢用二上林賦楩柟豫章正義曰豫今之枕木章今之樟木木生至七年乃可分夾日月言其髙大根老子深固蒂小子思去聲疏濶豈能達詞門窮秋一作愁一揮淚相遇即諸昆我住錦官城兄居秪翹移切樹園地近慰旅愁往來當丘樊天涯歇滯雨粳稻卧不翻漂然薄遊倦始晉作如與道侣一作旅敦景晏步修廊而無車馬喧夜闌接軟語一作夜言詞柔軟落月如金盆此述旅次相逢八上八叙事記地下敘景言情皆杜臆公詩善用借景如落月如金盆與隴月向人圓據一時所見之景而傾蓋歡洽之意自見傅毅詩伊余小子昆何遜詩凜凜窮秋暮淚歎流離即諸通家世交如弟兄也陸機詩揮金剛經注須達長者施園秪陀太子施樹為佛說法之處故後人名為祗園亦曰給孤園湛茂之詩衰廢歸丘樊蜀都賦粳稻漠漠一周捨詩薄遊久已倦親世說愍度道人始欲過江與傖道人為侣曹植詩交義在敦西京雜記重閣修廊行之移晷種陶詩結廬在人境而無車馬喧法華經如來能種分别巧說諸法言詞柔軟悅可衆心華嚴經菩薩摩訶薩有十種語一者柔軟語能使一切衆生得安穩維摩經所言誠諦常以軟語眷屬不離善和爭訟盤洛陽伽藍記旭日始升則金晃朗漠漠世界黑一作空一作穴一作冥驅驅爭奪繁惟有摩尼珠可照濁水源結出贈閭丘意言其空明之體可滌塵凡也詩此章首尾中腰各四句前後兩段各十六句陸機街術紛漠漠瓔珞經無量世界盡觀衆生尼黑即黑葉也也翻譯名義集摩尼或曰踰摩正云末即珠之總名圓覺經譬如清淨摩尼寶珠映於五色隨方各見宣室志馮翊嚴生家漢南峴山得一珠如彈丸胡人曰此西國清水珠至濁水泠然洞徹矣今人作五古長篇多任意揮灑不知段落勻稱之法杜詩局陳布置章法森然如此篇首尾中腰各四句提束前後兩段俱十六句鋪敘有毫髮不容增減者然此法起於魏人繁欽定情詩我出東門遊八句作起中情既欵欵八句作結前靣何以致拳拳兩句一轉者十段後靣與我期何所六句一轉者四段後四段本張平子四愁詩其前十段則韓昌黎南山詩所自出也古詩各有淵源如此捫蝨新話陶淵明詩采菊東籬下悠然見南山采菊之際無意於山而景與意㑹此淵明得意處也老杜亦曰夜闌接軟語落月如金盆豫愛其意度閒雅不減淵明而語句雄健過之每詠此二詩便覺當時情景盡在目前而二公寫之筆端殆若天成兹為可貴泛溪浣花溪也此當是上元元年秋作落景影同下去聲髙堂進舟泛迥溪誰謂築居小未盡喬木西逺郊信荒僻秋色有餘凄練練峯上雪纖纖雲表霓此溪上逺見之景地杜臆自卜居浣花至此始溯溪西遊誰謂築居之果小乎特未盡覽喬木以西耳今一望逺郊秋色在目對雪見霓斯亦竒矣謝越王貞詩參差落景遒宋子侯詩挾瑟上髙堂靈運詩對嶺臨回溪逺郊之地又躡險築幽居色詩遷於喬木宋王微詠賦秋陰兮白露商周禮任吳均詩練練波中白讀劉孝綽詩秋月始纖纖東晳書賦抗志雲表童戲左右岸一云兒童戲左右罟弋畢提擕翻倒荷芰亂指揮徑路迷得魚已割一作劇鱗採藕不洗泥人情逐鮮美物賤事已一作亦一作跡睽此溪上近見之事傷彼兒童戲逐者擕罟得魚翻荷採藕本取鮮美今乃鱗帶泥則是賤其物而乖事理矣罟以取魚弋以取鳥畢字作盡字解不作掩禽之畢舊引莊子畢弋網罟易誤詩弋鳬與雁莊子得魚而忘筌暌晉史論事其趣吾村靄暝姿異舍雞亦棲蕭條欲何適出處上聲庶可齊衣上見新月霜中登故畦濁醪自初熟東城多鼓鼙末叙泛溪回舟也夜日暝返棹猶之身老息機故曰出處可齊酌新醪而忽聽鼓鼙則歸溪亦非安枕之地矣詩此章三段各八句康陸機詩出處鮮為諧張正見新月半輪空嵇書濁醪一杯曰陶潛詩漉我新熟酒東故東城舊指東都者非朱注成都城在草堂之記君子聽鼓鼙之聲則思將帥之士出郭從舊次編在上元元年成都詩內舊草堂在郭外從城中復歸草堂故有還與烏啼之句舊說謂自青城還成都新說謂從成都往青城者皆非前詩云已知出郭少塵事可證古詩出郭門直視霜露晚凄凄髙天逐望低逺煙鹽井上斜景影同雪峯西故國猶兵馬他鄉亦一作正鼓鼙江城今夜客還與舊烏啼此出成都郭外而作也上四郭外晚眺之景下四郭外夜宿之情杜臆故國兵馬既未可歸他鄉鼓鼙又未可去故還與舊烏作伴前故國指東都他鄉指成都時思明未滅故蜀常備兵詩云王師未報收東都城闕秋生畫角哀可以互證薛記霜露既降澄髙天逐望低因霜露之氣所掩也道衡詩髙天逺色秋氣入蟬聲不蜀有火井煮鹽者初以柴火引發後火起井中連日斷逺烟即煮鹽之烟也蜀都賦家有鹽泉之井劉注蜀都臨卭江陽漢安縣皆有鹽井雪元和郡國志雪山在松州嘉城縣東春夏積雪圖經山在維州保寧縣西南連乳州白狗峽城鼙騎上鼓也歲凡城郭臨江者皆謂之江城此詩江指錦江城如暮詩言江城玩月詩言江城皆屬梓州以有射洪江也客公自謂唐劉垍詩無勞拂長袖直待夜烏啼補注張九齡詩江城何寂寞秋樹亦蕭森恨别據詩中長驅五六年之說當是上元元年在成都作顧注公於乾元二年春自東都回華州客秦州寓同谷至成都奔走四千里初自天寶十四載安史倡亂至乾元之末上元之為五六年洛城一别四一作三蕭雲從注四音司千里胡騎去聲長驅五六一云六七年草木變衰行劍外兵戈阻絶老江邊思家步月清宵立憶弟看平聲雲白日眠聞道去聲河陽近乘勝司徒急為去聲破幽燕平聲其首二領起恨别四千里言其逺五六年言久行劍外承四千里老江邊承五六年思家憶弟傷洛城阻亂乘勝破燕望胡騎早平也劍外劍門之外江邊錦江之邊宵立晝眠憂而反常漢書周勃傳擊胡騎平城下衰曹植詩長驅陷胸奴阻九辨蕭瑟兮草木搖落而變魏志田疇傳道路絶冦鹵縱橫含薛道衡詩空庭聊步月閒坐獨臨風不潘尼桑樹賦溢露於清宵王懋野客叢談梁瑄歸弟璟每望東南白雲慘然久之大朱注李光弼傳乾元二年冬十月光弼悉軍赴河陽破賊衆上元元年進圍懷州通鑑上元元年三月光弼破安太清於懷州城下夏四月又破史思明於河陽西渚此河陽乘勝之事也德傅毅樂府乘勝席捲遂南征至二載加李光弼檢校司徒顧宸曰破幽燕之策當時見及者不過數人清河李蕚告顔真卿請分兵開崞口討汲鄴以北至於幽陵時哥舒翰守潼關郭子儀李光弼上言請引兵直取范陽覆其巢穴此潼關未破前事也又李泌對肅宗請令光弼自太原出井陘子儀白馮翊入河東來春命建寧為范陽節度大使竝塞北出與光弼南北犄角以取范陽破其巢穴此祿山未死時事也及祿山死河東平泌勸上如前策遣安西及西域之衆竝塞西北自歸檀南取范陽永絶根本此長安未復時事也蕚與李郭之策不行是以有靈武之奔泌之策不行是以有九節度之潰至上元元年光弼乘河陽之勝遂平懷州此時長安已復慶緒已死直搗幽燕萬萬不容更緩故下一急字蓋深惜前三策之不早用耳散愁二首此詩乃初入蜀時作當在上元元年光弼破安太清史思明之後故云百萬傳深入若上元二年王思禮已死不得致望於尚書矣晉武帝詔思所以散愁養氣久客宜旋斾興王未息戈蜀星陰見少江雨夜聞多百萬傳一作轉深入寰區望匪他司徒下去聲燕平聲趙收取舊山河首章以北伐之功望諸李光弼也因久客而思靖亂從有愁處說到散愁三四承首句言作客凄凉五六承次句欲河北息兵望匪他注下司徒陳潘嶽永逝文回首兮旋斾謝瞻詩聿來扶興王琳設難合百萬師若運諸掌者義也詩出師表深入不毛他後漢書自致寰區之外盧諶綢繆委心自同匪聞道去聲并平聲州鎮尚平聲書訓士齊幾時通薊北當去聲日報關西戀闕丹心破霑衣皓首啼老魂招不得歸路恐長迷次章以討賊之事兼望王思禮也因世亂而念歸途本欲散愁愁仍未散薊平報捷則息戈可望心破淚霑恐久而莫歸又與前章相應北唐書太原府本并州開元十一年為府天寶元年曰京舊書肅宗紀乾元二年七月以兵部尚書路泌節度使霍國公王思禮兼太原尹充北京留守思禮本傳光弼徙河陽思禮代為河東節度用法嚴整人不敢犯函王褒詩桑生薊北寒杜臆關西謂京師地在潼關谷之西也舊注謬於西征賦猶犬馬之戀主竊託慕闕庭李陵書皓首而歸王嗣奭曰題云散愁故前章總起後章總結皆說自已心事中間將司徒尚書聨絡上下兩章只如一章此見章法之妙破朱鶴齡曰史鄴城之潰惟思禮與光弼軍獨完尋思明别將於潞城東乃當時名將也故以收薊北報關西望之陽又云諸將中獨屬望王李者公意思明在東都范必空虛可圖欲光弼乘河陽之捷長驅燕趙傾其根本思禮以潞澤之兵㑹之即前詩斬鯨遼海波意也以散愁命題深㫖可見建都十二韻趙次公注此詩上元元年九月後作也朱注詩云窮冬客劍閣隨事有田園其為成都草堂作甚明鮑欽止編在寶應元年冬是年雖復建南都時公往來梓州未嘗定居安得有田園之句趙注得之京通鑑至德二載以蜀郡為南京鳳翔為西京西為中京上元元年九月改置南都於荆州以荆州為江陵府二年九月罷鳳翔西都及江陵南都之號寶應元年建卯月復建唐書上元初以吕諲為荆州刺史諲請以荆州置南都帝從之於是荆州號江陵府以諲為尹蒼生未蘇息胡馬半乾坤議在雲臺上誰扶黃屋尊從時事說起慨朝議之失計仰王右軍與謝安書小得蘇息各安其業束都賦俯乎乾坤東觀漢記桓談拜議郎詔令議雲臺江淹獄中書髙議雲臺之上漢書注黃屋天子之車建都分魏闕下去聲詔闢荆門恐失東人望其如西極存時危當雪耻計大豈輕論平聲雖倚三階正終愁萬國翻此論建都興廢而陳時勢之緩急言分置宫殿新闢都㑹雖欲慰東人之望其如西極儼然存不當建彼而廢此也且此時不急圖雪耻而輕論建都恐治亂尚未可定耳固東人指吕諲建都之議西極指上皇幸蜀之地班東觀賦建都河洛周禮懸治象之法於象魏注象魏宫門雙闕南史何𦙍傳闕謂之象魏象者法也魏者當塗而髙大也袁紹傳下詔之日乃唐書荆州有荆門縣以荆門山名寰宇記荆門之地荆襄要津詩東人之子職勞不來東人指荆門以東言將朱穆奏記紀綱少弛頗失人望季史記秦穆公謂三曰子其悉雪恥後漢馮異傳文誠能亟定大訃為東方朔傳願陳泰階六符注泰階天之三階也上階天子中階為諸侯公卿大夫下階為士庶人三階平等是為太平易先王以建萬國牽裾恨不死漏網辱殊恩永負漢庭哭遙憐湘水魂窮冬客江劍一云劍外隨事有田園風斷青蒲節霜埋翠竹根此傷旅迹流離不得參預朝事牽裾為救房琯漏網謂謫司功漢庭湘水欲效賈屈而未能雖有客舍田園而對此風蒲霜竹不免衰老摧殘矣申涵光曰人亦有一時感激事過輒悔者公以不死為恨真諫臣也內魏志文帝欲徙十萬户實河南辛毗諫帝不答起入毗隨而引其裾叨漢刑法志網漏吞舟之魚一袁紹書殊恩厚德臣既之賈誼傳可為痛哭者屈原見讒沈於湘水去王褒詩生年隨事闌杜臆隨事猶云隨便有之歸來辭田園將蕪庾信詩蒲低猶抱節賦梁昭明太子扇折翠竹之枝衣冠空穰穰石蔣切關輔久一作逺昏昏願枉一作惟駐一作願駐趙云作駐非長安日光輝郭作暉照北原此諷當時君相之謀國者隱衣冠二句槩刺朝臣應上議在雲臺二句願枉二句諷肅宗應上蒼生未蘇二句朱注衣冠雖多未救關輔之難今中原淪陷天子當回陽光以照之奈何汲汲建都之舉耶此詩首尾各四句中二段各八句風史記貨殖傳天下穰穰皆為利往陰關中三輔謂扶馮翊京兆江淹詩飭驂去關輔鑑詩昏昏隴日沈昏昏言日故下接以長安日明世說晉明帝數歲元帝問日與長安孰逺答曰日逺日重問之答曰日近鋒曹植登臺賦齊日月之光輝時庾肩吾詩駐日逐戈按夢弼云北原河北之地史思明據東京及河北懷衛等州是也當時房琯分建之策與吕諲建都之請前後事勢逈不相同初安史首亂時陷中原破兩京剪宗室逼乘輿唐室孤危極矣故分建子弟之議足使賊子膽寒其後長安既復兵勢復張惟河北未平故須専意北向以除禍本若建都荆門虛張國勢迂疏甚矣且東南本無事而勞民動衆恐反生意外之虞此作詩本意也村夜鶴注詩云多難蓋指安史也當是上元元年浣花作是年十一月史思明遣田承嗣將舟徇淮西王同芝將兵徇陳許敬江將兵徇兖鄲薛鄂將兵徇曹州若在二年則段子璋反李奐奔成都不應詩不皆及而及安史也風色蕭蕭暮一作蕭蕭風色暮江頭人不行村舂雨外急鄰火夜深明胡羯何多難去聲樵漁一作漁樵寄此身中原有兄弟萬里正含情上四村夜之景下四村夜感懷狀舂急暮所聞火明夜所見趙云此寫難之景如在目前詩杜臆身得所安而思家更甚故曰正含情詩吳邁逺春城起風色周禮有舂人梁簡文帝甘泉烽火夜深明樵詩未堪家多難覩南史宋武帝時見二小龍附翼漁山澤同侣或亦焉劉孝威詩散步懷漁樵孔魚和詩水鄉訪松石蘭澤侣漁樵王粲詩含情欲待誰寄楊五桂州談原注因州參軍段子之任當鶴注桂州屬嶺南道中都督府是上元元年成都作五嶺皆炎熱宜人獨桂林梅花萬里外雪片一冬深聞此寬相憶為邦復扶又切好音江邊送孫楚逺附白頭吟上四桂州之景下四寄楊之情音梅時有雪可銷炎瘴故曰宜人寬相憶因瘴少復好見政異孫楚比段白頭吟懷楊五杜臆通篇氣勢流走字句空靈詩之不縳於律者嶺始安越城臨賀大庾臘嶺是也始安嶺在今廣西桂林府城西越城嶺在桂林府興安縣北臨賀嶺在平樂府賀縣境內大庾即梅嶺在廣東南雄府城北臘嶺在廣東韶州府乳源縣西發班婕妤詩凉飈奪炎熱南康記大庾嶺多梅而先亦曰梅嶺白帖大庾嶺上梅南枝落北枝開廣志梅嶺本因梅鋗得名今競作梅花之梅矣聊從同山海經桂林有八樹在番禺東注八樹成林言其大也鶴曰桂林雖居嶺外然治古始安𨽻荆州之零陵非鬱林州之桂林故白樂天云桂林無瘴氣兹所以宜人也嶺南無雪獨桂林有之范成大云靈州興安之間兩山蹲踞中容一馬謂之嚴關朔雪至關輒止大盛則度關至桂州城下不復南矣北城舊有樓曰雪觀所以夸南州也詩懷之好音孫楚為石苞參軍西郊鶴注題曰西郊從西郊赴草堂也此當是上元元年冬作易自我西郊時出碧雞坊西郊向草堂市橋官栁細江路一作岸野梅香傍去聲架齊書帙看平聲題檢一作減藥囊無人覺舊作競一作與荆公定作覺來往疏懶意何長上四西郊途次之景下四草堂幽寂之况此詩大段兩截分界然逐層敘述却是逐句順下八句一氣以齊謂整書使齊題謂藥上標題杜臆此喜地僻得遂其疏懶也勝梁益記成都之坊百有二十第四曰碧雞坊輿地紀漢宣帝聞益州有金馬碧雞之神遣諫議大夫王褒持節醮祭而致之其文曰持節使者王褒敬移南崖金精神馬縹眇碧雞處南之荒深溪回谷非土之鄉歸來歸來漢德無疆今北門石馬巷中有金馬祠碧雞坊在城之西南成都記草堂在府西七里華陽國志成都西南石牛門外曰市橋下石犀所潛淵也李膺益州記冲星橋市橋也在今成都縣西南四里漢舊州市在橋南因以為名延岑渡市橋挑戰即此早陶侃傳都尉夏施盜官栁種之己門隋王由禮詩梅香野徑說潘嶽楊仲武誄披帙散書屢覩遺文帙書衣也世謝安看題便各使四坐通史記刺客傳夏無且以藥囊提荆軻當趙次公曰荆公定為無人覺來往甚善徐悱妻詩惟夜枕知過此無人覺梁簡文帝詩㑹是無人覺何用早梅粧嵇康絶交書性復疏懶王安石曰老杜之無人覺來往下得覺字大好瞑色赴春愁下得赴字大好若下見字起字即是小兒言語足見吟詩要一字兩字工夫人無人覺謂不見人跡來往黃注泥上出郊向堂謂不知已之來往其說太曲和去聲裴迪登蜀州東亭送客逢早梅相憶見寄此公往蜀州時朱氏編在上元元年冬置唐書蜀州唐安郡屬劍南道垂拱二年析益州黃鶴曰九域志蜀州東至成都才百里宜公與裴頻有和寄陳陰鏗詩梁花畫早梅東閣官梅動詩興去聲還如何遜在揚州此時對雪遙相憶送客逢春一作花可一作更自由幸不折之舌切來傷歲暮若為看去亂鄉一作春愁江邊一樹垂垂發朝夕催人自白頭上四答裴詩意下四對時感懷詩裴有早梅之咏故以何遜梅詩相比相憶句和題憶寄送客句和詩題送客玩第三聨語氣必裴詩有不及折贈之句故答云幸不折來免傷歲暮若使一看益動鄉愁矣既而又自嘆曰此間江梅漸發亦覺催人頭白蓋當衰老之年觸處皆足傷情也東閣指東亭官梅官種之梅猶言官栁本胡震亨曰何遜墓志東閣一開競收楊馬杜甫東閣此志載墨莊漫録陸凱詩折梅逢驛使寄與隴頭人江南何所有聊贈一枝春此曰逄春是照早梅梁簡文帝詩逢春始發花晉雜曲折梅寄江北多何遜詩江邊雲霧起花陳蘇子卿詩中庭一樹梅寒蘂未開楊慎云梅放皆下垂故云垂垂吳防雪梅賦帶冷雪之垂垂梅開歲暮似催白頭黃生曰此詩直而實曲撲而實秀其暗映早梅婉折如意往復盡情筆力橫絶千古兩自字有自已自然之别楊德周曰幸不折來傷歲暮若為看去亂鄉愁必如此方不墮詠物劫王元美以為古今詠梅第一朱鶴齡曰何遜揚州早梅詩云兔園標物序驚時最是梅銜霜當露發映雪凝寒開枝橫却月觀花繞凌風臺朝灑長門泣夕驅臨卭杯應知早飄落故逐上春來遜時為廣陵王記室首云兔園則以梁孝王園此之也却月觀凌風臺應是園中臺觀名南史徐湛之出為南兖州刺史更起風亭月觀吹臺琴室遜梁人在徐湛之後暮登四一作西安寺鐘樓寄裴十迪此當是上元二年往蜀州時作四蜀志新津縣南二里有安寺神秀禪師所建暮倚髙樓對雪峰僧來不語自鳴鐘孤城返照紅將斂近市浮煙翠且重平聲多病獨愁常閴寂故人相見未從七容切容知君苦思去聲緣詩瘦太一作大向交游萬事慵首聨鐘樓次聨暮景下四寄裴中顧注僧來不語寫出彼此落落漫不相顧之狀惟旅寂寞故愈想故人耳趙大網曰裴之貌瘦雖由耽詩所致然於故舊交情亦太疏矣蓋裴在蜀州但寄詩而未嘗一過故公諷之如此朓張正見詩秋色照孤城德王融詩迅節瀹浮烟其謝詩從容宴語補注楊周曰縣有修覺山上為寶華山以峯頂多雪又名雪峯寄贈王十將軍承俊據詩意則王將軍在成都詩題云寄贈必上元二年在青城作將軍膽氣雄臂懸兩角弓纒結青驄馬出入錦城中時危未授鉞勢屈難為功賓客滿堂上何人髙義同上四稱將軍之雄壯下則惜其不當大任而徒懷髙義也經此似齊梁律詩故上四未諧平仄光武記諸將既屢捷膽氣益壯魏文帝詩猛將懷暴怒膽氣正縱橫結左右二臂各懸一弓故云兩角弓詩騂騂角弓纒馬之裝飾堂摯虞新禮儀漢魏故事遣將出征符節郎授鉞於朝趙曰未授鉞未為大將也信陵君傳賓客滿堂待公子舉酒遊王融詩髙義幸知楊慎曰五言律詩起句最難六朝人稱謝朓工於發端如大江流日夜客心悲未央雄壓千古矣唐人多以對偶起雖森嚴而乏髙古宋周伯弜選唐三體詩取起句之工者二酒渴受江清餘酣潄晚汀又江天清更愁風栁入江樓是也語誠工而氣衰颯余愛蘇頲北風吹早雁日日渡河飛張柬之淮南有小山嬴女隱其間杜子美將軍膽氣雄臂懸兩角弓孟浩然八月湖水平涵虛混太清雖律也而含古意皆起句之可法者奉酬李都督表丈早春作朱氏亦編在二年力疾坐清曉來詩一作時律髓作采詩悲早春轉添愁伴客更覺老隨人荆作身紅入桃花嫩青歸栁葉新望鄉應平聲未已四海尚風塵此據李詩而翻其意全是自寫已懷下四乃申明上截杜臆言來詩但悲早春我則有轉添而更甚者愁伴客老隨身麾之不去尤可悲也且早春何必悲當此桃嫩栁青其景色亦正佳耳但以四海猶亂望鄉未歸此我之所以聞詩而愈悲也書力疾扶病强起也魏志司馬懿奏臣輒力疾將兵晉習鑿齒力疾著論一篇落劉琨詩序適足以彰來詩之益美耳陳子良詩故早春中客人二字俱就自已言塵漢書野無風之警栁青桃復紅起於謝尚龍用便成常語梁簡文詩云水照栁初碧烟含桃半紅乃借烟水以形其紅碧杜云紅入桃花嫩青歸栁葉新用歸入二字寫出景色之新嫩皆是化腐為新之法題新津北橋樓得郊字元新津乃蜀州屬縣朱氏編在上二年杜臆此蓋新津令設宴於樓上也望極春城上開筵近鳥巢白花簷外朵青栁檻前梢池水觀為政厨煙覺逺去聲庖西川供客一作逺眼一作醉客惟有一作偏愛此江郊通首皆樓上所見者望極二字直貫至末春城鳥巢屬外景花簷栁檻屬內景池水厨煙又屬席前之景末則嘆美江郊也又杜臆設宴者乃邑令故以池水比其官清厨烟逺庖稱其有好生之仁江郊供客眼必田野闢而稻粱肥也何吳邁逺詩春城起風色梁簡帝詩開筵命羽觴遜詩簷外鶯啼罷授庾信詩池水朝含墨世說漢陽任棠有竒節隱居教龎仲達為太守到先候之棠不交言但以水一盂置戶屏前仲達思其微意良久曰水者欲吾清也在職以惠政得民列子庖厨之下不絶烟火玉藻君子逺庖厨微鮑照詩江郊靄明遊修覺寺朱氏編在上元二年里蜀總志修覺山在新津縣治東南五山有修覺寺絶勝亭野寺江天豁山扉花竹幽詩應平聲有神助吾得及春遊徑石相一作深縈帶川雲自一作晚去留禪枝宿衆鳥漂轉暮歸愁此初遊修覺寺而作也上下兩截遙相照應記首聨景之自外而內者就一逺一近說次聨入寺之事三聨景之自內而外者就一靜一動說末聨記宿寺之情詩有神助非自夸能詩是云勝地能發詩興耳川雲自去留寫得流行無礙語涉禪機宿衆鳥即陶詩衆鳥皆有託意用禪枝二字便於遊寺有關切堂陳後主詩雲色入山扉惠南史謝靈運嘗於永嘉西吟詩不就忽夢見族弟連即得池塘生春草之句云此語有神助極張駿詩春遊誠可樂任梁武帝詩靣勢周大地縈帶長川顧况詩達生去留庾信安昌寺碑禪枝四靜慧窟三明後遊鶴注當是一春兩遊故云江山如有待花栁更無私寺憶曾音層一作重一作新遊處橋憐再渡時江山如有待花栁更無私野潤煙光薄沙暄日色遲客愁全為去聲減捨此復扶又切何之此重遊修覺寺而作也在四句分截愁江山花栁足上曾遊烟光日色起下減末聨與前章互應蓋思家則生愁覩景則銷愁也光如有待依然待人更無私常得賞玩也野潤之處烟微薄是早景沙暄之候日色遲留是晝景帝庾信詩暫有江山趣何遜詩復看花栁枝梁元詩烟光入綺帷劉何遜詩日色花中亂曰通鑑三秦父老聞裕將還詣門流涕訴舍此欲何之乎趙汸曰杜詩有兩等句皆嘗自言之其一曰新詩改罷自長吟凡集中抑揚開闔與造化爭衡於一字間者皆是其二曰意愜關飛動篇終接混茫如此章有待無私之類是也蓋與造化相流通矣絶句漫興去聲九首公經營草堂在上元之始此詩云手種桃李又云熟知茅齊應是二年春作府杜臆興之所到率然而成故云漫興亦竹枝樂之變體也九首逐章相承各有次第眼見一作前客愁愁不醒無賴春色到江亭即遣花開一作飛深一作從造七到切次便教平聲一作覺鶯語太丁寧此因旅况無聊而發為惱春之詞突杜臆客愁二字乃九首之綱所衆眼共見客愁春色然而至無賴甚矣即遣便教謂無賴也深造次過於忙迫太丁寧厭其繁數無人當適意時春光亦若有情人當失意時春色亦成賴猶所謂感時花濺淚恨别鳥驚心也本楞嚴經同將眼見物西京雜記新豐多無賴按無賴屬人杜詩借以指前云花無賴此云無賴春色是也謐抱朴子造次之接孫綽詩鶯語吟修竹皇甫詩三命丁寧手種桃李非無主野老牆低還是一作似家恰似春風相陸音思必切欺得夜來吹折數枝花此章借春風以寄其牢騷承首章花開桃李有主且近家園而春風忽然吹折似乎造物亦欺人者惜桃李正自惜羇孤也陶潛詩桃李羅堂前陸放翁云白樂天用相字多作入聲如為問長安月如何不相離是也此詩亦當從入聲讀王元之在商州嘗賦詩云兩株桃杏映籬斜裝㸃商州副使家何事春風容不得和鶯吹折數枝花其子嘉祐謂後二句頗與杜語相似欲請易之元之欣然更為詩曰本與樂天為後進敢期杜甫是前身卒不復易熟一作耐知晉作孰如茅齊絶低小江上燕子故來頻銜泥㸃汚去聲琴書內更接飛蟲打著涉略切人此章借燕于以寓其感慨承首章鶯語人鶯去燕來春已半矣汚琴書撲衣袂即禽鳥亦若欺者杜臆逺客孤居一時遭遇多有不可人意者故兩章皆帶寓言君熟知就燕言論徐陵詩茅齊本自空古詩銜泥入室梁虞和書以手捉書大㸃汚懷陶潛詩委在琴書二月已破三月來漸老逢春能幾回莫思草堂作辭身外無窮事且盡生前有限杯此章言春不暫留有及時行樂之意杜臆是達生語亦是遣愁語破此下三章皆暮春景物有破殘也沈佺期詩别離頻月世說張翰曰使我身後名不如生前一杯酒腸斷江春一云春江欲盡一作白頭杖藜徐步立芳洲顛狂栁絮隨風舞輕薄桃花逐水流此見春光欲盡有傲睨萬物之意顛狂輕薄是借人比物亦是託物諷人蓋年老興闌不耐春事也此併下二章聲調俱諧不用拗體鮑照詩行子心腸斷陳後主詩春江時一望辭莊子原憲杖藜而應門謝曇瑗詩徐步寡逢迎楚搴芳洲之杜若世說道韞咏雪詩不如栁絮因風起之西京雜記茂陵輕薄者化許彥周曰世間花卉無踰蓮花者蓋諸花皆藉暄風暖日獨蓮花得意於水月其香清凉雖荷葉無花亦自香也梁江從簡為採荷調云欲持荷作柱荷弱不勝梁欲持荷作鏡荷暗本無光此語嘲何敬從而波及蓮荷矣春時濃麗無過桃栁桃之夭夭楊栁依依詩人言之矣老杜云顛狂栁絮隨風舞輕薄桃花逐水流不知緣誰而波及桃花與楊栁矣懶慢無堪不出村呼兒日一作自在掩柴門蒼苔濁酒林中靜碧水春風野外昏此是酌酒留春有物外逍遙之意無堪無可人意者林中靜聊以自適野外昏聽其自擾嵇嵇康書懶與漫相成吳庾信代閻將軍表臣實無堪康書有不堪者七志吳王責孫綝曰築第南橋不復朝見此為自在無所復畏謝朓詩蒼苔依砌上梁房篆詩前溪碧水流外爾雅野為林糝桑感切雜也徑楊花鋪白氊㸃溪荷葉疊一作纍青錢一云鈿筍一作竹根雉一作稚子無人見沙上鳬雛傍去聲母眠此借景物以自娛乃將夏之候也雛糝字鋪字㸃字疊字皆句中眼夔州歌用鶴子鳬與此詩用雉子鳬雛同義神仙傳茅君大宴㑹皆有青縑帳幄下鋪重白氊唐書天寶中童謡云燕燕飛上天天上女兒鋪白氊洞冥記連錢荇荇如錢文子趙曰雉性好伏其子身小在筍旁難見俗本訛作稚遂起紛紛之說漢鐃歌有雉子斑西京雜記太液池中鳬雛雁子布滿充積故以雉子鳬雛作對宋何承天樂府雉子遊原澤幼懷耿介心今按舊作稚子或以為筍名或以為竹留或以為鼠名或以為食笋之竹豚鼠形而大或以為公子宗文字稚子皆謬說楊慎曰絶句詩一句一義如杜詩此章本於古詩四時詠王維詩栁條拂地不忍折松幹梢雲從更長藤花欲暗藏猱子柏葉初齊養麝香歐陽公詩夜凉吹笛千山月路暗迷人百種花棋散不知人換世酒䦨無奈客思家亦是此體舍西柔桑葉可拈江畔細麥復扶又切纖纖人生幾何春已夏不放香醪如蜜甜此與四章相應前是逢春而飲此則遇夏而飲桑青麥秀言初夏農桑之樂幾詩爰求柔桑醪纖纖麥穗也傅左傳俟河之清人夀何杜臆香指郫筒酒𤣥酒賦味蜜甜而膽苦也隔户一云户外楊栁弱嫋嫋杜臆嫋字叶平聲恰似十五女兒腰誰謂朝來不作意狂風挽斷最長條此與二章相應折花斷栁皆歎所遭之不幸青自春入夏所詠花木禽鳥俱隨時託興者獨栁色夏而仍經摧折故感慨終焉鮑照詩翾翾燕弄風嫋嫋栁垂腰於琅琊王歌新買五尺刀懸著中梁柱三日三摩挲劇十五女庾信詩上林栁腰細朝來作意謂栁葉鮮翠栁晉樂歌日和狂風扇地垂庾信詩河邊弱百丈枝别有長條踠李東陽麓堂詩話少陵漫興諸絶句有古竹枝詞意跌岩竒古超出詩人蹊徑韓退之亦有之申涵光曰絶句以渾圓一氣言外悠然為正王龍標其當行也太白亦有失之輕者然超軼絶塵千古獨步惟杜詩别是一種能重而不能輕有鄙俚者有板澀者有散漫潦倒者雖老放不可一世終是别派不可效也李空同處處摹之可謂學古之過恰似春風相欺得夜來吹折數枝花語尚輕便莫思身外無窮事且盡生前有限杯似今小說演義中語糝徑楊花鋪白氊則俚甚矣客至原注喜崔明府相過堂邵氏注公母崔氏明府其舅氏也此是草既成後春景黃鶴編在上元二年意張綖注前有賓至詩而此云客至前有敬之之此有親之之意客至二字見於世說舍南舍北皆春水但見一作有羣鷗日日來花徑不曾音層緣客掃蓬門今始為去聲君開盤飱蘇昆切市逺無兼味樽酒家貧只舊醅鋪杯切肯與鄰翁相對飲隔籬呼取盡餘杯黃生曰上四客至有空谷足音之喜下四留客見村家真率之情前借鷗鳥引端後將鄰翁陪結一時賔主忘機亦可見矣也盤餐樽酒略讀市逺指南市津頭鄰翁即南鄰北鄰朱瀚曰首句用在水一方詩意次句用海翁狎鷗故事疾庾信詩花徑日相擕謝朓詩安得掃蓬徑銷此愁與丘巨源詩蓬門長自寂飱熟食也醅酒之未漉者樽左傳盤飱加璧顔潘嶽作夏侯湛誄重珍兼味易酒簋二莊子淵曰回之家貧不飲酒不茹葷而抱朴子竒士碩儒或隔籬不接遣意二首詩云春水生又云更移橙當是草堂成後逢春而作蓋上元二年也囀枝黃鳥近泛渚白鷗輕一徑野花落孤村春水生衰年催釀黍細雨更一作夜移橙漸喜交游絶幽居不用名首章敘草堂春日之景藉以遣意生近從囀字聽來輕從泛字看出野花落承囀枝春水承泛渚此皆天然佳句釀黍移橙乃間居適情之事謝交忘名有淡然世外之思末聨不唯笑倒結客少年亦且喚醒虛聲處士矣烏申涵光曰一徑孤村二句髙岑秀句也為詩交交黃江總詩野花不識采春秋緯凡黍酒陽據陰乃能動故以麥釀黍為酒按語林王無功有田十六頃在河渚閒自課種黍春秋釀酒王洙曰橙香橙也相如上林賦黃甘橙楱華陽國志蜀有給客橙葵歸去來辭喜息交以絶游簷影微微落津流脉脉斜野船一作松明細火宿鷺杜臆作鷺他本作雁起一作聚圓一作寒沙雲掩初弦月香傳小樹花鄰人有美酒稚子夜一作也能賒次章敘草堂春夜之景皆堪遣意首聨將夜之景次聨入夜之景三聨久夜之景末㸃夜字上文皆有關東香因影落故見流斜因船火故見鷺起月為雲掩故花暗傳六句語平而意穿則杜臆雁當作鷺蓋因建子月詩句同而兩誤也春來雁北向白露降則鷺飛去其兩誤無疑脈何遜詩徘徊簷影斜沙沈約詩積翠逺微微古詩脈不得語吳論起聚沙須分别火照鷺驚故此詩云起沙寒雁羣宿故後詩云聚沙皆當參定庾肩吾詩初弦值早秋曹植詩美酒斗十千杜詩詳注卷九
