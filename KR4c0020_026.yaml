body:
  text: 杜詩補注卷上翰林院編修臣仇兆鰲撰少陵逸詩小序杜詩零落人間宋時後先繼出諸家所採贋本頗多附餘四十五章蔡氏登諸正集至傳疑未决者亦名姓兩存焉如張祜杜誦暢當得文苑英華辨證自此之外無復遺篇考公四十以前有詩一千餘首其少年之作所載巳稀而散逸之餘於今難覯邇者他書流覽偶逢片語單章名係少陵不忘搜録在作者雖云刻鵠但後人自辨續鳬耳壬午春日兆鰲識合璧事類載杜詩楊慎丹鉛録此見合璧所載而舊集不收知今之全集遺逸者多矣三月雪連夜未應傷物華只緣春欲盡留著涉略切伴梨花五言逸句寒食少天氣春風多柳花見合璧事類又小桃知客意春盡始開花同前又笛唇揚折柳衣髮掛流蘇元人伊世珍琅環記引謝氏詩源二句詩源云輕雲鬒髮甚長每梳頭立于榻上猶拂地巳綰髻左右餘髮各粗一指結束作同心帶垂于兩肩以珠翠飾之謂之流蘇髻富家女子多以青絲效其制亦自可觀故杜子美贈美人詩曰笛唇揚折栁衣髮掛流蘇七言逸句朱彜尊曰此乃宋人鄭獬詩張氏誤引杜句野色更無山隔斷天光直與水相通見張子韶傳心録又萬事無成虛過日百年多難未還鄉中唐戎昱詩范德機誤引杜句十訛為百按張范所引律句皆杜集未載者據黃伯思校本凡一千四百四十七首而今本尚闕八篇知後世仍有遺逸矣只嚴羽曰迎旦東風騎蹇驢絶句决非盛唐人氣象似白樂天言語今世俗圖畫以為少陵詩漁隱亦辨其非矣而黃伯思編在杜集非也見談苑載杜句云狨擲寒條馬見驚亦本集所未者杜公石文詩出詩話類編詩王本在陳芳國九夜捫之麟篆熟聲振扶桑享天福杜甫十餘嵗夢人令採文于康水覺而問人此水在二十里外乃往求之見峩冠童子告曰汝本文星典吏天使汝下謫為唐世文章雲誥巳降可于豆壠下取甫依其言果得一石有金字文三句云云後因佩入葱市歸而飛火入室有聲曰邂逅穢吾令汝文而不貴樹萱録記杜詩紫領寬袍漉酒巾江頭蕭散作閒人秋風有意吹蘆葉葉落無情下水濱淮海集中乃八句律詩此删為絶句矣許彥周詩話云元撰作樹萱録載夫差墓中見白居易張籍李賀杜牧之諸人賦詩皆能記憶句法亦各相似最後老杜亦來賦詩記其前四句如此嗟乎若數君子皆不能脫然高蹈猶為鬼耶殊不可曉矣若以為元撰自造此詞則數公之詩尚可庶幾而少陵四句非元所能題也洪容齊隨筆秦少游集有秋興九首皆擬唐人數詩咸在焉有秦詩云紫領寬袍漉酒巾江頭蕭散作閒人悲風意吹林葉落日無情下水濵車馬憧憧諸道路市朝衮衮共塵埃覔錢稚子啼紅頰不信山翁篋笥貧今按後四句頗涉宋人腐句樹萱録删去却佳百斛明珠記杜詩佳城鬱鬱頽寒煙孤城乳獸號荒阡夜卧北斗寒掛枕木落霜野舊刋作拱雁連天浮雲西去半落日行客東盡隨長川乾坤未毀吾尚在肯與蟪蛄論大年百斛明珠云狄遵度自兒童時巳能屬文落筆有奇氣年十八一夕夢杜子美誦平生詩皆集中所未見者覺而記兩句後遂續之洞微志云彭城劉景直雍熙間遊華清宫因題詩于門屏云天子多情寵太真六宫専幸掌中身漁陽鼓動長安破從此香䏎委路塵是夜夢明皇召去論當時事妃子索景直有所贈立作詩曰玉刻水中龍雲牌揭故宫霓裳滿天月粉骨幾春風眉勢逺山盡裙腰芳草空共知千古事悽恨與誰同見岐王至明皇曰來何晚王曰適杜甫到臣帳中誦哥舒翰詩向臣似有德色云日月低秦樹乾坤繞漢宫明皇曰常愛伊夜闌更秉燭相對如夢寐之句李白終無甫之筋骨至如賈至崔輔國亦闕自然之句張老死把筆無伊一字遂宴飲忽聞寶雲寺鐘聲方覺草堂詩話辨杜詩昔時曽從漢梁王濯錦江邊醉幾場拂石坐來衫袖冷踏花歸去馬蹄香當初酒賤寧辭醉今日愁來不易當暗想舊遊渾似夢芙蓉城下水茫茫古今詩話蜀人將進酒嘗以為少陵詩作瑞鷓鴣唱之相傳或謂杜甫或謂鬼仙或謂曲詞未知孰是然詳味其言唐人語也起首有曾從漢梁王之句决非子美所作况集中不載灼可見矣不知楊曼倩何所據云此首中四句來當兩字犯重疑是乩壇鬼仙信手揮成之作唯三四頗近杜語餘皆淺淡絶無似處朝陽巖歌此歌出零陵總記謂杜陵所作今見詩話總龜朝陽巖下消水澄朝陽洞中寒泉清零陵城郭夾峭岸巖洞幽奇當郡城荒蕪自古人不見零陵徒有先賢傳去聲水石為娛安可忘長歌一曲留相勸朝陽巖在永州城西南一里餘唐元結所名也以東向日先照故名今按杜公遊蹟未嘗至此且詩義淺薄恐亦後人所託者諸家詠杜小序少陵同時宗工角立吐盛唐之雅調成才士之風流登塔賦詩則有慈恩四作早朝屬和咸推春殿諸章嚴高贈答於西川韋郭倡酬於南楚列存正集俱見交情他如散出遺篇每覩名家逸興任華太白各著清詞杜牧昌黎並占佳句歐王起於北宋揚榷居先范陸繼自南朝賡歌未墜若元明而降覺風韻依然或經錦里草堂衣冠肅拜或過耒陽荒塜蘋藻薦馨或諷誦遺文動詞人之感發或登臨勝地追往蹟以留連凡兹泝流尋源皆足標新領異欲徵韻事爰綴餘編壬午夏日兆鰲識魯郡東石門送杜甫見太白集此下皆唐人李白醉别復幾日登臨遍池臺何言石門路重有金尊開秋波落泗水海色明徂徠飛蓬各自逺且盡手中杯沙丘城下寄杜甫同上我來竟何事髙卧沙丘城城邊有古樹日夕連秋聲魯酒不可醉齊歌空復情思君若汶水浩蕩寄南征太白逸詩此見唐人本事詩飯顆山頭逢杜甫頭戴笠子日卓午為問因何太瘦生只為從來作詩苦此詩唐人謂譏其太愁肝腎也今按李集不載洪容齊謂是好事者為之耳李杜文章知己心相推服斷無此語且詩詞庸俗一望而知為贋作也雜言寄杜拾遺此首見唐詩紀任華杜拾遺名甫第二才甚奇任生與君别來巳多時何嘗一日不相思杜拾遺知不知昨日有人誦得數篇黃絹詞吾怪異奇特借問果然稱是杜二之所為勢攫虎豹氣騰蛟螭滄海無波似鼓蕩華嶽平地欲奔馳曹劉俯仰慚大敵沈謝逡巡稱小兒昔在帝城中盛名君一箇諸人見所作無不心膽破郎官叢裡作狂歌丞相閣中嘗醉卧前年皇帝歸長安承恩濶步青雲端積翠扈遊花匼匝披香寓直月團欒英才特達承天眷公卿無不相欽羡只緣汲黯好直言遂使安仁却為掾如今避地錦城隅幕下英僚每日相就一作隨提玉壺半酣起舞捋髭鬚乍低乍昂旁若無古人制禮但為防俗士豈得為君設之乎而我不飛不鳴亦何以只待朝廷有知已巳曾讀却無限書拙詩一句兩句在人耳如今看之總無益又不能崎嶇傍一作倚朝市且嘗事耕稼豈得便徒爾南陽葛亮為朋友東山謝安作鄰里閒常把琴㺯悶即提樽起鶯啼二月三月時花發千山萬山裡此時幽曠無人知火急將書憑驛使為報杜拾遺玩此詩起假似杜舊友又似杜乍交當時少陵詩名推重海內此篇頗傲睨放恣幾乎呼大將如小兒矣考唐詩紀中止載華兩首一寄太白一寄少陵何獨揀此二大名公作詩相贈耶又篇中語帶俚俗格調不見高雅俱屬可疑調張籍韓愈李杜文章在光焰萬丈長不知羣兒愚那用故謗傷蚍蜉撼大樹可笑不自量伊我生其後舉頭遙相望夜夢多見之晝思反微茫徒觀斧鑿㾗不矚治水航想當施手時巨創磨天揚垠崕劃崩豁乾坤擺雷硠惟此兩夫子家居率荒凉帝欲長吟哦故遣起且僵剪翎送籠中使看百鳥翔平生千萬篇金薤垂琳琅仙官敕六丁雷電下取將流落人間者泰山一毫芒我願生兩翅捕逐出入荒精誠忽交通百怪入我腸刺手拔鯨牙舉瓢酌天漿騰身跨汗漫不著織女襄顧語地上友經營無太忙乞君飛霞珮與我高頡頏題杜子美墳見分類千家注本何人鑿開混沌殼二氣由來有清濁孕其清者為聖賢鍾其濁者成愚朴英豪雖沒名猶嘉不肖虛死如蓬麻榮華一旦世俗眼忠孝萬古賢人牙有唐文物盛復全名書史册俱才賢中間詩筆誰清新屈指都無四五人獨有工部稱全美當日詩人無擬倫筆追清風洗俗耳心奪造化回陽春天光晴射洞庭秋寒玉萬頃清光流我常愛慕如饑渴不見其面生閒愁今春偶客耒陽路悽慘去尋江上墓召朋特地踏煙蕪路入溪村數百步招手借問騎牛兒牧童指我祠堂路入門古屋三四間草茅緣砌生無數寒竹珊珊搖曉風野蔓層層纒庭户升堂再拜心惻然心欲䖍啓不成語一帶空土煙蕪裏虛使詩人歎悲起怨聲千古寄西風寒骨一夜沉秋水當時處處多白酒牛䏑如今家家有飲酒食䏑今如此何故常人無飽死子美當日稱才賢聶侯見待誠非喜洎乎聖意再搜求姦臣以此欺天子捉月走入千丈波忠諫便沉汨羅底固知天意有所存三賢所歸同一水過客留詩千百人佳詞繡句虛相美墳空飫死已傳聞千古醜聲竟誰洗明時好古疾惡人應以我意知終始鄭昂曰嘗讀李元賓補傳及韓退之題子美墳詩皆謂溺死於漲水此自托遺所載疑非二公所作大抵好事者為之耳正今按退之去李杜不逺捉月漂水之說世俗浪傳當力闢其誣何反助之狂瀾此詩本集不載在編詩者固已汰去矣然其中雋拔之語又似非後人所託何耶韓詩原集外後人復搜録遺篇而尚有逸詩唐五竇聫珠載竇牟為東都判官陪韓院長韋河南同尋劉師不遇分韻賦詩都官員外郎韓愈得尋字云秦客何年駐仙源此地深還隨躡鳬騎來訪馭雲襟院閉青霞入松髙老鶴尋猶疑隱形坐敢起竊桃心今韓集皆不載見洪容齊隨筆中或云題子美墳詩亦其散逸人間者送客遊蜀張籍行盡青山到益州錦城樓下二江流杜家曾向此中住為到浣花溪水頭讀李杜詩集因題卷後白居易翰林江左日員外劍南時不得高官職仍逢苦亂離暮年逋客恨浮世謫仙悲吟咏流千古聲名動四夷文場供秀句樂府待新詞天意君須㑹人間要好詩讀杜詩杜牧杜詩韓筆愁來讀似倩麻姑癢處搔天外鳯凰誰得髓無人解合續絃膠杜甫同谷茅茨咸通十四載作趙鴻工部棲遲後鄰家大半無青羌迷道路白社寄杯盂大雅何人繼全生此地孤孤雲飛鳥什空勒舊山隅栗亭杜甫栗亭詩詩人多在口悠悠二甲子題紀今何有蜀中鄭谷夜多無雨曉生塵草色風光日日新蒙頂茶畦千㸃露浣花箋紙一溪春揚雄宅在唯喬木杜甫臺荒絶舊鄰却共海棠花有約數年留滯不歸人送沈光集作田光九陌低迷誰問我五湖流浪可悲君著書笑破蘇司業賦詠思齊鄭廣文理棹好擕三百首阻風須飲幾千分耒陽江口春山緑慟哭應尋杜甫墳峽山寓止荆州未解圍小縣結茅茨强對官人笑偏為野鶴欺江春鋪網濶市晚鬻蔬遲子美猶如此翻然不敢悲蜀中賞海棠濃淡芳春滿蜀鄉半隨風雨斷鶯腸浣花溪上堪惆悵子美無心為發揚杜工部居兩蜀詩集中無海棠之題聞杜鵑李洞萬古瀟湘波上雲化為流血杜鵑身長疑啄破青山色秖恐啼穿白日輪花落𤣥宗回一作歸蜀道雨收一作飛工部宿江津聲聲猶得到君耳不見千秋一作愁一甑塵湘南春日懷古羅隱晴江春暖蘭蕙薰鳬鷖苒苒鷗著羣洛陽賈誼自無命少陵杜甫偏有文空濶逺帆遮落日蒼茫密樹一作高岫礙歸雲松醪酒好昭潭靜閒過中流一弔君寄南城韋逸人杜甫詩中韋曲花至今無賴尚家家美人曉折露沾袖公子醉歸香滿車萬里丹青傳不得二年風雨恨無涯羡他南澗高眠客春去春來任物華經耒陽杜工部墓紫菊馨香覆楚醪奠君江畔雨蕭騷旅魂自是才相纍閒骨何妨冡更高騄驥喪來輕蹇蹶芝蘭衰後長英華作逺蓬蒿屈原宋玉鄰居處幾駕青螭緩鬱陶耒陽楚水隱隱浸耒亭楚南天地兩無情忍教孫武重泉下不見詩人說用兵樟亭驛小櫻桃韋莊當年此樹正花開五馬仙郎載酒來李白已亡工部死何人堪伴玉山頽蜀中贈廣上人章孝標曾持麈尾引金根萬乘前頭草五言疏講青龍歸奈苑歌抄白雪乞梨園朝驚雲氣遮天閣暮達猿聲入劍門今日西川無子美詩風又起浣花村經杜甫舊宅雍陶一作殷陶浣花溪裏花多處為憶先生在蜀時萬古只應留舊宅千金無復換新詩沙崩水檻鷗飛盡樹壓村橋鳥過遲山月不知人事變夜來江上與誰期耒陽杜工部祠堂徐介手接汨羅水天心知所存故教工部死來伴大夫魂流落同千古風騷共一源消凝傷往事斜日隱頽垣耒陽縣志杜公墓祠在縣治北郭外二里耒江左畔洞庭觀之西詩話總龜云杜祠過客多題詩歐陽文忠獨稱介此詩題耒陽杜公祠見耒陽祠志裴說騷人久不出安得國風清擬掘孤墳破重教大雅生皇天高莫問白酒恨難平悒怏寒江上誰人知此情歐公詩話裴說裴諧俱有詩名說官至補闕諧終于桂嶺假官宰說題杜墳云擬掘孤墳破重教大雅生諧曰名終埋不得骨且朽何妨景事同而語意别又劉訥言諧噱談録賡凝覽說詩三四句答曰說豈劫墓賊耶耒陽杜公祠孟賓于南遊何感思更甚葉繽紛一夜耒江雨百年工部文青山當日見白酒至今聞惟有為詩者經過時弔君詩話總龜載僧紹員詩云百年失志古來有牛肉因傷是也無又載耒陽宰詩云詩名天寶大骨葬耒陽空此皆言聶令空堆土也喜詩句類杜此下皆宋人王禹稱前賦村居雜興二首間半嵗不復省視長男嘉祐讀杜工部集見語意頗有類杜者咨于余且意余竊之也余喜而作詩聊以自負命屈由來道日新詩家權柄敵陶鈞任無功業調金鼎且有篇章到古人本與樂天為後進敢期子美是前身從今莫厭閒居職主管風騷勝要津元之自注向謫居時多取白公詩時時玩之送馮學士入蜀錦川宜共少年期四十風情去未遲蠶市夜歌欹枕處峩眉春雪倚樓時休誇上直吟紅藥多羡乘軺聽子規莫學當初杜工部因循不賦海棠詩欹枕倚樓紅藥子規皆杜詩所用者前詩以古對金此詩以子對紅皆假對法杜詩雲薄翠微寺天青皇子陂子雲清自守今日起為官少陵先有此法矣讀杜子美集孫何孫僅之兄世系留唐史丘封寄耒山高名落身後遺集出人間逸氣應天與淳風自我還鋒鋩堪定霸徽墨可繩姦進退軍三令回旋馬六閒楚詞休獨步周雅合重刪李白從先達王維亦厚顔庖刀盡餘創羿彀肯虛彎聖域分中上天樞奪要關逍遙登禁闥偃蹇下塵寰麗思蘇幽蟄神功鑿險艱語成新體句才折好官班誰氏傳軒冕何人得佩環朱弦本疏越黃鳥浪綿蠻元白詞華窄錢郎景象慳蜀峰愁杳杳湘水恨潺潺子欲探驪頷吾思擷虎斑毛錐應頴脫燕石竟疏頑已襲蘭兼菊無嫌蒯與菅二南如有得高躅願追攀題杜子美書室趙抃直將騷雅鎮澆淫瓊貝千章照古今天地不能籠大句鬼神無處避幽吟幾逃兵火羇危極欲厚民生意思深茅屋一間遺像在有誰於世是知音三四語意拙滯乃宋詩習氣過公安杜有移居公安題劉郎浦上公安渡我過高吟老杜詩煙浪幾重江幾曲算應風物似當時公自注子美嘗有發劉郎浦離公安渡詩子美畫像歐陽修風雅久寂寞吾思見其人杜君詩之豪來者孰比倫生焉一身窮死也萬世珍言茍可垂後士無羞賤貧讀李白集開元無事一作太平二十年五兵不用太白閒太白之精下人間李白高歌蜀道難蜀道之難難於上青天李白落筆生雲煙千奇萬險不可攀却視蜀道猶平川宫娃扶來白已醉醉裏詩成醒不記忽然一作來乘興登名山龍咆虎嘯松風寒山頭婆娑㺯眀月九域塵土一作下看塵世悲人寰吹笙飲酒紫陽家紫陽真人駕雲車高山流水空流花飄然巳去凌青霞下看一作堪笑區區郊與島螢飛露濕吟秋草劉貢父謂歐公不甚喜杜詩獨稱韓吏部絶倫貴韓而不悅子美所不可曉然葉石林詩話載歐公子棐云先公平日未嘗矜大所為文一日被酒語棐曰吾詩廬山高今人莫能為唯李太白能之明妃曲後篇太白不能為唯杜子美能之至於前篇則子美亦不能為唯吾能之也因欲别録此二篇以烏絲欄絹一軸求毗陵張正素處士書之據此則歐公推服子美固在太白之上矣李東陽麓堂詩話云歐陽永叔深於為詩高自許與觀其思致視格調為深然較之唐詩似與不似亦門墻藩籬之間耳子美畫像王安石吾觀少陵詩謂與元氣侔力能排天斡九地壯顔毅色不可求浩蕩八極中生物豈不稠醜妍巨細千萬殊竟莫見以何雕鎪惜哉命之窮顛倒不見收青衫老更斥餓走半九州瘦妻僵前子仆後攘攘盜賊森戈矛吟哦當此時不廢朝廷憂常願天子聖大臣各伊周寧令吾廬獨破受凍死不忍四海寒颼颼傷屯悼屈止一身嗟時之人我所羞所以見公畫再拜涕泗流推公之心古亦少願起公死從之遊荆公深知杜酷愛杜而又善言杜此篇於少陵人品心術學問才情獨能中其窽㑹後世頌杜者無以復加矣次韻張安道讀杜詩蘇軾大雅初微缺流風困暴豪張為詞客賦變作楚臣騷展轉更崩壞紛綸閲俊髦地偏蕃怪産源失亂狂濤粉黛迷真色魚蝦易豢牢誰知杜陵傑名與謫仙高掃地收千軌爭標看兩艘詩人例窮苦天意遣奔逃塵暗人亡鹿溟翻帝斬鼇艱危思李牧述作謝王褒失意各千里哀鳴聞九臯騎鯨遁滄海捋虎得綈袍巨筆屠龍手微官似馬曹迂疏無事業醉飽死遊遨簡牘儀刑在兒童篆刻勞今誰主文字公合抱旌旄開卷遙相憶知音兩不遭般斤思郢質鯤化陋鯈濠恨我無佳句時蒙致白醪殷勤理黃菊未遣沒蓬蒿次孔毅夫集古人詩見贈天下幾人學杜甫誰得其皮與其骨劃如泰華當我前跛羊欲上驚崷崒名章俊語紛交衡無人巧㑹當時情前生子美君即是信手拈得俱天成送戴蒙赴成都玉局觀拾遺被酒行歌處野梅官柳西郊路聞道華陽版籍中至今尚有城南杜我欲歸尋萬里橋水花風葉暮蕭蕭芋魁徑尺誰能盡榿木三年已足燒百嵗風狂定何有羡君今作峨嵋叟縱未家生執㦸郎也應世出埋輪守莫欺老病未歸身玉局他年第幾人此詩既用成都故事又參入少陵詩詞逼真杜詩嫡𣲖其開首四句直作草堂題詠可也李太白讚天人幾何同一漚謫仙非謫乃其遊揮斥八極隘九州化為兩鳥鳴相酬一鳴一止三千秋開元有道為少留縻之不得矧肯求東望太白橫峨岷眼高四海空無人大兒汾陽中令君小兒天台坐忘身平生不識高將軍手涴吾足矧敢嗔作詩一笑君應聞禁臠詩話云一韻七句方換韻又是平聲其法不得用雙殺題杜子美浣花醉圖黃庭堅拾遺流落錦官城故人作尹眼為青碧雞坊西結茅屋百花潭水濯冠纓故衣未補新衣綻空蟠胸中書萬卷探道欲度羲黃前論詩未覺國風逺干戈峥嶸暗㝢縣杜陵韋曲無雞犬老妻稚子且眼前弟妹漂零不相見此公樂易真可人園翁溪友肯卜鄰鄰家有酒邀皆去得意魚鳥來相親浣花酒船散車騎野墻無主看桃李宗文守家宗武扶落日蹇驢䭾醉起願聞解冠脫兜鍪老儒不用千户侯中原未得平安報醉裏眉攢萬國愁生綃鋪墻粉墨落平生忠義今寂寞兒呼不蘇驢失腳猶恐醒來有新作常使詩人拜畫圖煎膠續弦千古無題老杜集孔平仲七月鴟梟乃至此語言閎大復瑰奇直侔造物并包體不作諸家細碎詩吏部徒能歎光焰翰林何敢望藩籬讀罷還看有餘味令人心服是吾師讀杜子美詩韓維寒燈熠熠宵漏長顛倒圖史形勞傷取觀杜詩盡纍紙坐覺神氣來洋洋高言大義經比重往往變化安能常壯哉起我不暇寐滿座歎息喧中堂唐之詩人以百數羅列衆制何煌煌太陽垂光燭萬物星宿安得舒其芒讀之踊躍精膽張徑欲追躡忘愚狂徘徊攬筆不得下元氣混浩神無方讀子美集張伯玉寂寞風騷主先生第一材詩魂躔斗壁筆力撼蓬萊運動天樞朽奔騰地軸摧萬蛟盤險句千馬夾雄才勢走岷峨盡辭含混沌來剖山無鵲石傾廄盡龍媒薦擢誇三賦飄零放一杯艱難行蜀道感激上燕臺日月兵前沒江湖笑裏開獨吟千載後肝膽洗塵埃觀子美畫像楊蟠文光萬丈照詞林獨步才難一代欽塵土未論今日貌篇章空憶舊時心寂寥冠劍無由作零落丹青豈復吟師法望公千載後仰風三歎感知音草堂宋京君不見少陵草堂背西郭浣花溪水流堂腳竹寒沙白自凄凉莫問四松霜草薄入門好在烏皮几公去不歸換鄰里西嶺千秋雪未消舍北泥融飛燕子秪今榿木平橋路籠竹和煙雜江霧野僧作屋號草堂不是柴門舊時處詩壇今古誰能將艷艷文章光萬丈安得英才擅品量當使公居摩詰上晚泛浣花遂宿草堂喻汝礪扣橈泛澄虛濯流睇幽芳晚霙襯奇樹夕霏媚疏篁歸鳥亦暫閒夜魄動初凉忽焉衆星微天高月舒光昔也杜陵子淡然此茅堂客至酒自斟句得意已忘云何常念饑零落在道旁古來技入神一飯豈所望吾輩天所窮慨歌淚霑裳草堂詩四首燦燦詩翁錦里西只緣詩好合窮栖竹鋪冷色雲連寺柳漾輕絲鳥過溪凝怨不禁關樹暗駐情應恨蜀山低離人苦怕春歸盡可忍紅英半著泥閒把煙光次第陳岷峨風物見精神翻成錦繡千般樣供與江山幾度春深屋長河兀老大峨眉曼緑却逡巡從公乞取無邊手免作詩中半箇人竹外清疏浸碧溪溪邊竹淡煙雨霏閒看雪嶺題詩罷醉向西郊信馬歸霄漢直愁雙闕逈夢魂長著五陵飛故園秀木又春色只恐歸去池臺非錦官城西春草芳杜陵客子憂思長浴晴晚樹淡浮淥卧水幽花深度香交情憫憫言燕阻舊國迤迤雲山蒼白蘋洲渚落日晚明邊正銜歸雁行同楊元徹遊杜子美草堂邵博萬里橋西路幽居今尚存共來披草徑逺去問江村冉冉花扶屋蕭蕭竹映門斯人隔今古此意與誰論和賈相公覽杜工部北征篇宋祁唐家六葉太平罷宫艷醉骨恬無憂孽虜垢天翠華出糢糊戰血腥九州乾瘡坤痍四海破白日殺氣寒颼飀少陵背賊走行在採梠拾橡填饑喉眼前亂離不忍見作詩感慨陳大猷北征之篇辭最切讀者心隕如搖輈莫肯念亂小雅怨自然流涕袁安愁才高位下言不入憤氣鬱屈蟠長虬今日奔亡匪天作向來顛倒皆廟謀忠骸佞骨相撑拄一燎同燼悲崑丘相君覽古慨前事追美子美真詩流前王不見後王見願以此語詒千秋杜子美李綱杜陵老布衣饑走半天下作詩千萬篇一一干教化是時唐室卑四海事戎馬愛君憂國心憤發幾悲咤孤忠無與施但以佳句寫風騷列屈宋麗則凌鮑謝筆端籠萬物天地入陶冶豈徒號詩史誠足繼風雅嗚呼詩人師萬世誰為亞南宋有忠定相才可當鄴侯而韓嶽將略可方李郭不能用之以平河北詩悲少陵實自傷也忠定公葬㑹稽之范𤾉明季越紳董念儒卜兆侵穴形家見公擊以金簡嘔血立斃忠賢名墓不可無傳願修志者亟表彰之杜工部祠此亦宋人詩闕名瞻拜荒祠下萍踪此尚留心存唐社稷詩續魯春秋竹屋斜通徑花溪逺抱樓江山真占絶千古獨風流與客遊滄浪亭分韻得一字楊甲霧回林蒼黃漲落水寒碧西郊好風景曉霽千里色相從二三子掃灑溪上石主人亦愛客沽酒炊玉粒年荒酒味薄相勸取吻濕同光與共景㺯此竹間曰沄沄憂端來落落險語出穽機誰復設骩骳各自適跳波醉中舞野唱寒外急牛羊歸匆匆鳬雁來一一觴行豈不好酒盡歸亦得頽然寄天放未愛世褊迫永懷堂中翁回首千嵗跡豈無獨往願冉冉饑凍逼霜空洞庭野天濶雲夢澤欲窮扶桑枝尚掛滄海席何當從今去一夜生羽翼過子美草堂馬俌棲遲九月錦水行獨過草堂西出城村樹苒苒秋照白水花漪漪江水眀溪邊三重結茅屋松蘿翳疏晚雨晴往來沽酒且有客胡為奔走不自停四海紛然霾㙪多我憂豈但白馬盟藜藿未足飽我腹况又一頃供耘耕只今騎驢走江滸終日飄飄浪如許可看顔色太癯生憂愁盡入篇章苦信眉一笑古復作却似韓宣適東魯此生蕩漾胡能留兩腳風塵奚所休此道滄浪付一漚喚之千古與爾謀吾亦往矣作春秋宋有成都文類乃慶元二年四川按撫使建安袁說友所編今録其佳者如宋京喻汝礪邵博楊甲馬俌五人皆出文類中嘉陵江過合州漢初縣下范成大井徑東川縣山河古合州盤根拏斷岸急雨沸中流關下嘉陵水沙頭杜老舟江花應好在無計㑹江樓咏杜陸游古詩三百篇刪取財十一每讀先再拜若聽清廟瑟詩降為楚騷猶足中六律天未喪斯文杜老乃獨出陵遲至元白固巳可憤疾及觀晚唐作令人欲焚筆此風近復熾隙穴始難窒淫哇解移人往往喪妙質苦言告學者切勿為所怵航川必至海為道當擇術讀李杜詩出劍南集濯錦滄浪客青蓮淡蕩人才名塞天地身世老風塵士固難推挽人誰不賤貧明窗數編在長與物華新野飯詩可憐城南杜零落依澗曲面餘作詩瘦趨拜尚不俗放翁自注杜氏自譜以為子美下峽留一子守浣花舊業其後避成都亂徙眉州大埡或徙大蓬云鰲按杜公去成都正當崔旰之亂焉得拋留一子公之子見於詩中者止宗文宗武不聞更有别子此事尚屬可疑秋興功名不垂世富貴但堪傷底事杜陵老時時矜省郎讀杜詩城南杜五少不羈意輕造物呼作兒一門酣法到子孫熟視嚴武名挺之看渠胸次隘宇宙惜哉千萬不一施空回英槩入筆墨生民清廟非唐詩向令天開太宗業馬周遇合非公誰後世但作詩人看使我撫几空嗟咨明人謝杰作少陵紀云公祖審言善詩與蘇味道李嶠崔融齊名時稱文章四友公詩蓋衣鉢於其祖而益大之審言嘗言吾文章當得屈宋作衙官吾筆當得羲之北面與再從兄易簡並以狂名公之自號曰狂夫亦有所本題少陵畫圖像長安落葉紛可掃九陌北風吹馬倒杜公四十不成名袖裏空餘三賦草車聲馬聲喧客枕三百青銅市樓飲杯殘䏑冷正悲辛仗內鬭雞催賜錦讀杜千載詩亡不復刪少陵談笑即追還嘗憎晚輩言詩史清廟生民伯仲間遊龍興寺弔少陵寓居詩中原草草失承平戍火邊塵到兩京扈蹕老臣身萬里天寒來此聽江聲自注寺門外江聲甚壯懷舊翠崖紅棧鬱參差小益初程景最奇誰向毫端收拾得李將軍畫少陵詩書事關中父老望王師想見壺漿滿路時寥寂西溪衰草裏斷碑猶有少陵詩華州西溪郡老杜所謂鄭縣亭子者示子聿我初學詩日但欲工藻繪中年始少悟漸若窺𢎞大怪奇亦間出如石潄湍瀨數仞李杜墻常恨少領㑹元白才倚門溫李真市儈正令筆扛鼎亦未造三昧詩為六藝一豈用資狡獪汝今欲學詩根源在詩外原注晉人謂戲為狡獪今閩語尚爾長孺共讀杜詩楊萬里病身兀兀腦岑岑偶得兒曹文字林一卷杜詩揉欲爛兩人齊讀味初深斫肝枉却期千載漏眼誰曾更再尋筆底奸雄死猶毒莫將饒舌泄渠心再和雲龍歌留陸務觀西湖小集老夫不願萬户侯但願與君酒船萬斛同拍浮老夫不怯故將軍但怯與君筆陳千里相追奔少陵浣花舊時屋太白青山何處墳二仙死可埋丘阜二仙生可著韋布名挂廣寒宫裏樹非煙非雲亦非霧長使玉皇掉頭誦渠句詩府誰得玉􅙞開詩壇誰授黃鉞來留君不住君急回不道西出陽關無此杯西山金盆儘渠頽斯遊明日方懷哉跋陸務觀劍南詩稿今代詩人後陸雲天將詩本借詩人重尋子美行程舊盡拾靈均怨句新鬼嘯狨啼巴峽雨花紅玉白劍南春錦囊翻罷清風起吹仄西窗月半輪又云只哦少陵七字詩但得長年飽喫飯讀杜詩文天祥平生蹤跡只奔波偏是文章被折磨耳想杜鵑心事苦眼看戎馬淚㾗多千年䕫峽有詩在一夜耒江如酒何黃土一丘隨處是故鄉歸骨任蹉跎題陸放翁詩卷後許月卿天寶詩人詩有史杜鵑再拜淚如水龜堂一老旗鼓雄徑氣往往摩其壘輕裘駿馬成都花氷甌雪碗建溪茶承平麾節半海宇歸來鏡曲盟鷗沙杜甫墳徐照耒陽知縣非知已救厄無蹤豈忍聞若更聲名可埋沒行人定不吊空墳溫公詩話杜甫終于耒陽藁葬之至元和中其孫始改葬于鞏縣元微之為志而鄭刑部文寶謫官衡州有經耒陽子美墓詩豈但為志而不克遷或已遷而墳塜尚存耶杜甫祠戴復古嗚呼杜少陵醉卧春江漲文章萬丈光不隨枯骨葬平生稷契心致君堯舜上時兮弗我與屹然抱微尚干戈奔走蹤道路飢寒狀草中辨君臣筆端誅將相高吟比興體力救風雅喪如史數十篇才氣一何壯到今五百年知公尚無恙麒麟守高阡貂蟬入畫像一死不幾時聲迹兩塵莽何如耒陽江頭三尺荒草墳名如日月光天壤答杜子野主簿杜陵之後有子孫自守詩家法度嚴秀骨可仙官况簿高情追古俗人嫌起看星斗夜推枕為愛江山寒捲簾飽喫梅花吟更好錦囊雖富不傷亷論詩七絶杜有戲為六絶論齊梁初唐人詩文章隨世作低昂變盡風騷到晚唐舉世吟哦推李杜時人不識有陳黃飄零憂國杜陵老感寓傷時陳子昂近日不聞秋鶴唳亂蟬無數噪斜陽作詩不與作文比以韻成章怕韻虛押得韻來如砥柱動移不得見工夫古今胸次浩江河才比諸公十倍過時把文章供戲謔不知此體誤人多曾向吟邊問古人詩家氣象貴雄渾雕鎪太過傷於巧朴拙唯宜怕近村陶寫性情為我事留連光景等兒嬉錦囊言語雖奇絶不是人間有用詩草就篇章只等閒作詩容易改詩難玉經雕琢方成器句要豐腴字要安論唐宋詩體戴昺安用雕鎪嘔肺腸辭能達意即文章性情元自無今古格調何須辨宋唐人道鳯筒諧律呂誰知牛鐸有宮商少陵甘作村夫子不害光芒萬丈長謁杜工部祠文王十朋風雅頌息嗣之者誰後代風騷先生主之讀書萬卷蓋欲有為明光三賦烜赫一時致君堯舜卒不克施此志蕭條乃昌其後天欲其鳴窮之使悲復生太白如塤應箎流落劍南厥聲益馳暮年制作莫多於夔詩史有堂遺像有祠光焰照人膏馥滿碑歌蜀道難誦杜鵑詞忠不忘君先生是思此乃有韻之文四字成句類於古詩者故亦附詠杜之中東屯絶句少陵别業古東屯一飯遺忠畎畝存我輩月叨官九斗須知粒粒是君恩原注云輿地紀勝東屯稻米為蜀第一郡給各官俸廩以高下為差帥曹月得九斗東屯行東屯有青苖坡白巽雨足稻畦春水滿插秧未半青短短馬塵追逐下關頭北望東屯轉三坂一川洗盡峽中想逺浦疏林分氣象溝塍漫漫堰源低灘瀨泠泠石磯響中田築場亦有廬翬飛夏屋何渠渠李氏之子今地主少陵祠堂疑故居陸務觀高齊記云少陵有瀼西高齊東屯高齊東屯李氏居已數世上距少陵才二易主大厯初故劵猶在論詩三十首之三此下皆元人元好問排比鋪張特一途藩籬如此亦區區少陵自有連城璧爭奈微之識碔玞事見元稹子美墓志筆底銀河落九天何曾鷦悴萬山前世間東抹西塗手枉著書生待魯連古雅誰將子美親精純全失義山真論詩寧下涪翁拜未作江西社裏人杜甫故里李俊民不知故隱幾時離天寶年間處處詩過客不須尋世譜萬山山下看沉碑杜詩吾家碑不昧王氏井依然注杜預沉碑峴山之下老杜醉歸圖二首尋常行處酒債每日江頭醉歸薄暮斜風細雨長安一片花飛百錢街頭酒價蹇驢醉裏風光莫傍鄭公門去恐猶恨在登牀桐江集雜書方回竊嘗評少陵使生太宗時豈獨魏鄭公論諫垂至兹天寶得一官主昏事巳危脫命走在所窮老拜拾遺卒坐鯁直去漂落西南垂處處苦戰鬭言言悲亂離其間至痛者莫若八哀詩我無此筆力懷抱頗似之人言太白豪其詩麗以富樂府信皆爾一掃齊梁腐餘編細讀之要自有朴處最於贈答篇肺腑露情素何至昌谷生一一雕麗句亦焉用玉溪纂組失天趣沈宋非不工子昂獨高步畫肉不畫骨乃以帝間故六經天日月諸子如四時史自班以上語奇文亦奇踵武蔚宗輩語有文無之小宋刋新唐不悟宵寐規以藝傳李杜待之無乃卑他人有遺集一覽不再窺惟此與韓柳咀嚼無厭期儕彼楓落生吾欲鐫此疵道自漢魏降裂為文與詩詩工文或拙文高詩或卑香甌假山序不妨自一奇鰣橘多骨核乃至肆詆訾恭惟陳無已此事獨兼之五七掩杜集千百臻秦碑四海紫陽翁歸吳豈其私所以此虛叟取為晚節師奕山值寇讀杜詩有感尹廷高杜曲衣冠盡羣凶轉陸梁疏林巢燕雀空谷鬭豺狼衣濕彭衙雨砧敲楚岸霜年荒難自給拾橡當餱糧題杜陵浣花圖趙孟俯春色醺人苦不禁蹇驢馱醉晚駸駸江花江草詩千首老盡平生用世心送杜伯玉四川行省都事浣花溪上草堂存㑹見能詩幾代孫橘刺藤梢隱菉竹椒漿桂酒薦芳蓀日長畫省文書靜春近岷江雪浪奔我向東吳君向蜀别離從古解銷魂九日張養浩一行作吏廢歡遊九日登臨擬盡酬詩有少陵難著語菊無元亮不成秋雲山自笑頭將鶴人海誰知我亦鷗幸遇佳辰莫辭醉浮雲今古劇悠悠懷故園虞集聞道故園生瑞竹令人歸興滿江干扁舟不畏瞿塘險匹馬誰云蜀道難杜甫溪頭花匼匝孔眀廟裏柏闌珊新堂題作歸歟字定得臨江把釣竿王庶山水蜀人偏愛蜀江山圖畫蒼茫咫尺間駟馬橋邊車蓋合百花潭上釣舟閒亦知杜甫貧能賦應歎揚雄老不還花重錦官難得見杜鵑啼處雨斑斑石田集雜詠馬祖常不作還鄉夢因吟李杜詩平生無飽飯抵死只憂時事實兼唐史風流接楚詞山川舊遊處千載有餘悲詩品五則詩品本司空圖所作范氏引此以證李杜范椁大用外腓真體內充返虛入渾積健為雄具備萬物橫絶太空荒荒油雲寥寥長風超以象外得其環中持之非强來之無窮此論雄渾以杜少陵當之緑杉野屋落日氣清脫巾獨步時聞鳥聲鴻雁不來之子逺行所思不逺若為平生海風碧雲夜渚月明如有佳語大河前橫此論沉著亦以少陵當之畸人乘真手把芙蓉泛彼浩劫窅然空蹤月出東斗好風相從太華夜碧人聞清鐘虛佇神素脫然畦封黃唐在獨落落𤣥宗此論高古亦以少陵當之行神如空行氣如虹巫峽千尋走雲連風飲真茹强蓄素守中喻彼行健是謂存雄天地與立神化攸同期之以實御之以終此論徑健亦以少陵當之觀化匪禁吞吐大荒由道返氣處得以强天風浪浪海山蒼蒼真力彌滿萬象在旁前招三辰後引鳯凰曉看六鼇濯足扶桑此論豪放以李太白當之杜工部祠宋無老病思明主乾坤入苦吟秋風茅屋句春日杜鵑心詩史孤忠在文星萬古沉祗應憶李白到海去相尋據四明楊德周所考杜公祠堂凡有數處夫唐代詩人何啻千輩獨少陵忠義之氣足以感發人心故足跡所經之地千年祠宇今古留傳此詩人之另闢乾坤者自成都夔州耒陽外又存四祠并記于後方輿勝覽云工部有祠在江原縣邑宰趙抃建昔杜公依高適寓此鄜州學孔廟㦸門祀子美祿山之亂子美避兵三川肅宗立復自鄜州奔行在故有是祠又杜甫祠在成縣治儀門左唐天寶末關輔饑亂甫以華州司功棄官之秦州寓居同谷躬負薪拾橡栗以自給有同谷七歌思賢樓在劍閣水門上畫張孟陽李太白杜子美柳子厚像未劍州文熖堂記曰劍門題詩以太白子美為重世有並記之者㑹從李參預壁所得所賜阜陵御書蜀道難又從李長史得趙忠定汝愚大書劍門詩因建祠刻二詩詩側榜其堂曰文熖取韓退之詩語也讀杜拾遺老瓦盆戲作洪希文此翁坦率性長享甕頭春觴客終頽玉傾人懶注銀干戈塵世淚風月草堂身賴爾有蘇鄭情親不厭貧杜詩早嵗與蘇鄭痛飲情相親梨杜詩有麵米春松醪春白香山杭州詩青旗沽酒趁花則杭俗有梨花春舊矣可補杜注所未及題杜甫麻鞋見天子圖錢惟善四郊多壘未還鄉又别潼關謁鳯翔九廟君臣同避難十年弟妹各殊方中興百戰洗兵甲萬里一身愁虎狼寂寞當時窮獨叟按圖懷古恨茫茫九日感懷至正戊戌葉顒悠悠江影雁南飛黃菊飄香蝶滿枝斜日西風彭澤酒殊方異國杜陵詩煙巒慘淡山林暮霜葉蕭疏草木悲醉後不思時節異半欹烏帽任風吹杜少陵春遊曲鄭允端何處尋芳䇿蹇驢典衣買酒出城西𤣥都觀裏桃千樹黃四娘家花滿溪正淑乃鄭清之五世孫女有病中吟云伏枕南窗下徒吟老杜詩此閨秀之學杜者玉山草堂借杜集詩題為顧仲瑛作也楊維楨愛汝玉山草堂好草堂最好是西枝浣花杜陵錦官里載酒山簡高陽池花間語燕春常在竹裏清樽晚更移無奈道人狂太甚時看紅袖寫烏絲夜聞謝太史讀李杜詩此下皆明人高啓前歌蜀道難後歌逼仄行商聲激烈出破屋林鳥夜起鄰人驚我愁寂寞正欲眠聽此起坐心茫然高歌隔舍與相和雙淚迸落青燈前李供奉杜拾遺當時流落俱堪悲嚴公欲殺力士怒白首江海長憂飢二公高才且如此君今謂我將何為祭杜子美文洪武癸酉年作朱椿蜀獻王先生距今之世數百餘年而成都草堂之名至今日而猶傳豫嘗縱觀乎萬里橋之西浣花溪之邊尋草堂之故址黯衰草兮寒煙是以不能無所感也於是命工構堂闢地一㕓扁舊名於其上庶幾過者仰慕乎先賢然人之所傳者先生之遺編也而豫之所羡者蓋以先生一飯之頃而忠君愛國之惓惓雖其出巫峽下湘川固不戀戀於此而先生之精神猶水之在地無所往而不在焉爰矢詞於翰墨寫豫心之悁悁臨風釃酒尚其來旃蜀記梵安寺乃杜甫舊宅在浣花溪去城十里大厯中節度使崔寧妻任氏亦居之後捨為寺都人為之立廟于其中每嵗四月十九凡三日衆遨遊於兹生宋元祐庚午間丞相吕大防鎮成都作草堂於先之舊址明初蜀王分藩于此復為構堂致祭賢王韻事可為後世法矣秦州王褘水積從天降山連與蜀通遺碑李廣宅廢寺隗囂宫度隴遲回際游秦感慨中長憐少陵老曾此歎途窮論詩方孝孺舉世皆宗李杜詩不知李杜又宗誰能探風雅無窮意始是乾坤絶妙辭太白詩言大雅久不作王風委蔓草少陵詩言别裁僞體親風雅轉益多師是汝師知二公皆得力於風雅者此詩云李杜宗誰而繼之以能探風雅此極推崇二公語非謂其不及古人也題耒陽祠堂解縉蔡倫池上霧如紙杜老祠前秋日黃為問靴洲江上水流船三日到衡陽頥菴祭酒寄讀杜詩一章奉和黃潤玉先生觀杜詩洞曉其中趣顧兹藜藿腸焉識菽粟味乾坤初未交風雲本難際自匪假聲詩烏能吐忠義高歌動千言曲庇非一類區區稷契心綽綽廊廟器胡為月下烏却繞風前樹魚龍方混爭鴻雁若相避雖致杜鵑詞曷驅野狐媚間關蜀道行悽惻巫峽淚纍然喪家厖困苦伏櫪驥康衢本平夷大雅惜顛墜斯文既云亡吾道安所寄浩浩三百篇寥寥千萬世惟公得其傳作者奚足繼公詩天寶間落日山橫翠白沙論詩陳獻章子美詩之聖堯夫更别傳後來操翰者二妙少能全康節先生天挺人豪包造化於胸中拓古今于眼際其擊壤集一編浩氣雄思真足一空前後然就詩格而論還是宋人一𣲖終與唐風分道而馳題杜拾遺像謝應芳國破家何在窮途更莫年七歌同谷裏再拜杜鵑前戎馬長安滿騎驢短褐穿畫圖憔悴色猶足見憂天泛舟浣花東阜楊慎風簷水檻含清暉月閠夏五暑氣微山中薜荔幽人帶池上芰荷遊子衣雙魚六馬慣識曲青蛉白鷗皆忘機揚雄𤣥閣不寂寞杜甫草堂天下稀百花潭送人之楚杜詩百花潭北即滄浪滄浪潭水照潭花無賴家家惱杜家不數潘安河內縣堪留衛玠洛陽車晴烟翡翠蘭苕濕凉雨鴛鴦荇藻斜五兩行穿巴峽樹百壺先泛楚江槎習池溫新昔聞少陵咏今過習家池下馬穿幽徑新楊滿地垂青荷元自藎碧水暗通溪漫有山翁興何由醉似泥三四似對非對因首聫對起故次聫參差謂之偷春格杜集中亦有之出劍門楊興宗嘔啞鳴艫下長川萬疉青峰只眼前山鷓啄殘紅杏粉杜鵑啼破緑楊煙夢回蜀棧雲千片醉枕巴江月一船物色誰分杜陵老風騷牢落劍南天杜員外述貶王世貞昔我遊山東高李相先後豪鷹搏青冥所擊無不取斫句必老蒼驪珠戀吾手西入咸陽城落魄鮮所偶駝錦青貂裘半為酒家有時來異援出三賦天子售泚筆中書堂公卿盡回首蟣蝨脫洗沐毛羽出抖擻清華文昌步磊落國士耦欃槍亘北極熒惑趨南斗哥舒小豎子棄我潼關守萬乘倏蒙塵羣公但奔走嗚呼上帝仁蒼茫意愈厚馬嵬剪陰孽朔方建陽紐桓桓漢陰公玉璽主親受制曰相國琯汝往馘羣醜戎車實間飭驕將違指授遂令陳濤士義血漂杵臼天威震莫測左右奮申救甫也一小臣上書戒求舊孤忠報社稷餘分推朋友幸免左伯誅仍寬馬遷咎優游上州佐零落一野叟雪壓履下趾風欺衣前肘饑寒自切骨虛名在人口窮途往念至遲暮新恩負千載與百年茫茫付杯酒和前題盛時泰自豫來巴州得繼昔賢後游覽錦官城功名奚所取溪邊一草堂縛茅自吾手賔朋雖衆多性情無所偶醉來賦新詩豪蕩不復有建安與西京肯為人輕售騎驢自暮歸秋風甘白首面目雖巳黎精神日抖擻丈夫抱經濟進則夔龍偶思以拯蒼生勳庸高北斗肯為升斗粟易我平生守朝夕貴人前奴顔效奔走皇天有深仁慈貶意誠厚昨遊孔明祠眼見柏紋紐扶漢豈不勞三分帝所受下視曹與孫心術一何醜覬覦竊神器不出漢廷授一時忠義人粉身向虀臼譬彼大厦顛一木焉能救我今濩落來所賴惟親舊君王恩未酬交結得朋友于以棲餘齡沒齒亦何咎所存喘息在居然共田叟饑寒良切身履穿還露肘在處與冷汁聊以充吾口意氣干雲霄自知未為負豈為活斯須所貪在杯酒遊杜工部草堂陳文燭驅車出郭外來泛浣花溪青郊緣江路乃在成都西孤舟繫水檻上有杜甫祠振衣一下拜思君㑹亂離兵戈正滿眼卜居聊茅茨嚴武憐才者而有草堂資故人况高適細酌哦新詩蒼松帶幽色寒林半成榿忠貞貫草木不減初移時數椽未零落千載誰心期禁愁取蜀酒臨風不自持信美非鄉國萬里同牽思浣花溪納凉朱夏多炎暑束帶發長歎偶坐浣溪水溪水生餘寒况有陰江竹清風吹羽翰杜陵亦苦熱高咏江之干澄江如石鏡白雲如雪山雪山層氷好不及使君灘倚檻一舒嘯歸路斜陽殘同李修撰高大行飲浣花草堂金閨彥客到沙頭老杜高名日月浮掃徑百花香自好題橋萬里景偏幽太平關塞無戎馬水檻城中有白鷗却憶咏歌曾涕淚何如陶謝共登樓周公瑕為豫書浣花草亭碑寄謝浣花溪頭半竿竹溪上誅茅數椽屋故人為我題豐碑故人草聖真堪讀平生飄零憶杜甫感慨論文仍吊古百花吹散溪水紅參天獨樹經風雨鳥鳴高枝月滿地似共山靈愛碑字徘徊若問草堂資可嗔當年王録事夢杜少陵作王嗣奭青蓮號詩仙我翁號詩聖仙如出世人軒然逺泥濘在世而出世聖也斯最盛詩祖三百篇我翁嫡孫子詩豪立如林雙鞬視翁指嗟豫倫壤蟲何緣夢見翁草堂留古色簷花落輕紅典衣易斗酒雄談凌霄虹覺來謦咳在山寺鳴晨鐘起牀訝餘輝初旭破昏蒙翁今在何所脈脈精靈通賤質若頑石未諗堪磨礱浣花草堂二首益都勝地浣花溪水竹沙村好杖藜築舍纍年差得穩㑹心多景不勝題身羇夔梓神空到舟下荆衡意轉迷今日草堂長作主達人應悟死生齊詩聖神交蓋有年到來追想一悽然浮雲轉盼失蒼狗古帝遊魂空杜鵑背郭堂成辭郭去驚人句好任人傳黃精未必生毛羽名不刋時骨是仙憶昔余嘗夢訪少陵於浣花草堂典衣沽酒對酌談詩三十年往矣臨老入蜀兹夢是踐草堂距涪千里以赴勘始至數也奚尤噫神交詩聖獲登草堂拜瞻遺像雖罹轗軻未為非幸也憶昔攻詩夢少陵草堂疏豁罥寒藤典衣沽酒歡相引短述長吟愧未能居在市廛仍半虎止非樊棘轉多蠅白頭入蜀因公誤公困窮愁我亦應咏杜本朝人列後魏裔介老杜才名髙萬丈誰云刪後更無詩此豈人力之所為山川風雨發其姿玲瓏刋盡琅環祕饑寒迫出竒崛詞文章自不關花鳥性命深沉乃出之亦知不祥造物忌原非富貴飲啄資但快狂歌啄三尺安問令名垂來兹讀杜子美詩古作多蔚跂兹編實云聖盥手展縹帙肅然起恭敬世人誦公詩擷芳資游泳我誦見公心楷模性情正救琯雖云非其意實孤徑一躓不復收驊騮終逺屏有語不忘君愴怛忠愛盛飄泊蠶叢間櫹槮長鑱柄路阻豺虎多身傍干戈橫燦燦浣花詞磊磊夔州詠百年歌獨苦斯語淚如迸放舟夷陵後潦倒春華競天困萬古胸抒發鴻濛性陶冶不可窮世秉詞伯政讀之浹數旬高齊風雨併既哭復還歌枕籍以為命斯人竟巳矣惄焉心如怲讀李太白詩三謝與鮑庾江左稱獨步大白更絶塵汗血如飛兔擲筆振金石有文懸瀑布萬象羅胸中百代生指顧是氣曰浩然不祇為章句沉香亭畔詞諷諫有微趣奴視高將軍才人詎能慕羽翮落九天挂席逐煙霧留滯東魯雲蹭蹬采石路我思汾陽王再衍晉陽祚云誰識此人青蓮慧眼故無知功未酬夜郎竟逺戍璘也實蠢愚偶而被籠笯龍章與鳯姿豈若爭食鶩古今稱謫仙斯言良不誤黃金如可成須並子美鑄讀少陵集鄭日奎三百巳逺王迹熄詩事大成誰為集天恐風雅遽中微特生杜陵老布衣真宰含悲泄太古元氣茫茫恣所取蕩除塵翳斬荆榛為經為騷復為史河山日月本平平一觸此老奇趣生心計驅使從豪變淋漓墨汁皆峥嶸饑貧百折氣不阻猶託微詞存國是忠愛居然三百遺豈特宗風紹乃祖古今作者代不同都來涵孕神明中一語縱橫散屢足得其爪距皆稱雄歎我研尋猶未得蟲魚瑣瑣紛空積擬焚灰燼副以膏頻飲令吾腸胃易讀青蓮集青蓮詩負一代豪撗掃六宇無前矛英雄心魄神仙骨溟渤為濶天為高興酣染翰恣狂逸獨任天機摧格律筆鋒縹眇生雲煙墨騎縱橫飛霹靂有如懷素作草書崩騰歷亂龍蛇攄更如公孫舞劍器渾脫瀏灕雷電避冥心一往搜微茫乾端坤倪失伏藏佛子嵌空鬼母泣千秋詞客孰雁行我讀君詩起我意飄然如有凌雲思便欲麾手謝塵緣相從飲酒學仙去翁玉于索題蕭尺木畫杜子美詩冊宋琬蕭生畫手稱絶妙風格逺過文待詔曾貌天問與九歌荒唐隱怪皆殊肖三閭大夫色憔悴山鬼乘貍善窈窕解衣盤礴余在旁舉杯向天發狂嘯翁侯酷愛少陵詩驚人佳句常相隨手裂生綃三十幅蕭生一一丹青之浣花草堂若在眼劍門棧道橫參差罷𣙜歸來無長物獨擕此冊還京師長安公卿頗好事書畫寧復論真假百鎰始購宣窑杯千金贋買銅臺瓦此圖一出價必高翁侯賞玩不肯捨即今遷謫轉蕭瑟欲歸無舟陸無馬翁侯翁侯誰令爾愛杜陵翁千年坎壈將無同蘆花采采雁南渡笠澤煙水秋濛濛君歸結廬在何處余欲擕孥學梁鴻蕭生夙有五湖志何不招隱來江東嗚呼何不招隱來江東畫君與余持竿垂釣秋風中瀼西謁少陵先生祠王士禎萬古瀼西宅斜連峽口關高雲魚復縣秋水麝香山老作諸侯客心依供奉班樊川臨素滻遺恨不生還欲去頻回首停舟灧澦堆東屯渺雲水西閣莽蒿萊感事悲諸將懷人賦八哀昆明遺碣在落葉滿蒼苔祠有石刻秋興詩僅存昆明池水一首題秦州杜工部像杜陵人不見遺照自輝光離亂經天寶艱難剩草堂東屯田父宅西閣楚人鄉才子千秋淚青蓮亦夜郎靈武中興日秦州旅食年羌戎常雜處崕谷到今傳意氣凌天馬幽愁拜杜鵑瞻依思往事攬涕一澘然南池趙開雍城隅秋水自千年杜老經過亦偶然遂使池塘增氣色始知人事重山川芰荷香動微風夜蒲柳凉生欲雨天獨有宦遊人易感那能不憶舊青氊燈下讀杜毛際可靜夜微吟刻漏長淋漓元氣散天章新詩無復千金換明主何能一飯忘老病孤舟生事少江湖滿地故園荒當年望古希陶謝未許青蓮得雁行白帝城熊文舉白帝城猶峙永安定可尋英雄情掩抑今古事浮沉落日𤣥猿絶孤笻芳草深無由弔詩史寂寞少陵心杜少陵宅方象瑛浣花溪邊草堂好背郭初成春色早晚年更卜瀼西居領略山川都不少瀼西一帶溪流清渚田漠漠皆粳稻白鹽赤甲互峥嶸東屯月落瞿塘曉策杖閒登白帝城詠懷古跡恣探討長鑱白柄悵逺遊故園杜曲空縹眇未能歸卧南山邊萍踪應向此中老無端去峽下荆門老死耒陽胡草草宅舍東屯屢易主故劵傷心踪如掃陸務觀記東屯李氏居巳數世距少陵才三易主唐時劵尚存我來西閣問綺疏哀壑無聲魂悄悄不見傷秋感興人日暮江村數歸鳥杜子美草堂題句葉吟錦城傳草堂數里近南浦方池引浣花創寺本老杜幽情想遺跡素心遇儕伍同遊者武林張建侯䇿蹇出林原鳥語便媚嫵村荒犬吠客境靜風開户入門蒼翠合雜樹森環堵香火照几筵丹堊新廊廡人疑是佛宫誰知為藝圃中範子美像頳面髯承輔威儀倣開元官銜題工部峩冠紆長袖猶見先民矩似此英雄姿不宜長困苦奚為久落拓抱志未得吐光芒長萬丈稱許由韓愈風雨歷饑寒文章信無補嘗聞有大功殁則祀兹土文翁孔明輩専祠列江滸少陵亦何為爼豆依天府有客詳語余詞人悉迂腐獨有唐拾遺忠信根肺腑姓氏動明皇試文别良楛立奏三禮賦豪氣盛於虎高自陳先世鄒枚不屑數自期願稷契至治宗三五言大本非誇抵掌效可覩長安悲奕棋漁陽震鼙鼓宫闕對南山第宅皆新主曲江潛行日吞聲淚如雨避亂走彭衙謁帝岐山下陸渾善房相車戰亡干羽疏救陳陶斜適逢肅宗怒棄置遂連年憤膺每自撫橡栗充口食負薪遍山塢節度表參謀暫往依嚴武何曾解愛才命幸脫黃祖瞿塘青山斷茅屋秋風舞行藏獨倚樓短句心堪憮雖經流離中念不忘君父是豈僅詩人大節誠當取存無一日歡死垂一生譜例合享春秋祼薦豈莽鹵後人長太息清言愛縷縷技不重雕蟲亦不尊文組止憐志士心畏壘成千古紛紛銘與贊浮淺類狂瞽一笑出庭除花隂日移午見少陵遺像有感向􅉨詩稿留天地羣稱集大成縱然遺小像只自薄浮榮潦倒瞿塘路悲凉杜宇聲憂民與念國誰得似先生讀杜少陵詩徐增詩史春秋筆大名垂草堂二毛猶在蜀一字不忘唐賦羡相如逸才憐太白狂晚年律更細獨立自蒼蒼絶句嚴允肇吏部文章工部詩前人矩步後人師世間爝火同消隕落落星辰萬古垂任城懷古登臨多古意憑眺起人思壯觀留飛閣豐碑浸曲池謫仙非傲物工部本憂時千載斯人去風流亦我師旅蜀追懷杜少陵柴雲杜子栖遲錦水濵杖頭到處得相親幽花細竹隨南叟愛酒能詩訪北鄰江畔草堂時駐馬月臺梅蘂晚留人浪遊偏向巴山裏愁聽啼鵑兩度春歷代至今多題咏之作一隅管見搜輯多遺尚俟續所未備也續編秋雨吟杜少陵逸詩屋小茅乾雨聲大自疑身著蓑衣卧兼是孤舟夜泊時風吹折葦來相佐我有愁襟無可那才成好夢剛驚破背壁寒燈不及螢重挑却向燈前坐此詩本集不載見祝氏事文類聚不知見於何書今玩其句調語氣酷似夔州夜歸詩俟從容詳考也耒陽溪夜行為傷杜甫作唐人戎昱乘夕棹歸舟緣源二疑當作路轉幽月明看嶺樹風靜聼溪流嵐氣船間入霜華衣上浮猿聲雖此夜不是别家愁送客遊蜀張籍行盡青山抵益州錦城樓上二江流杜家曾向此中住為到浣花溪水頭雪晴訪趙嘏街西所居杜牧命世舊作代風騷將誰登李杜壇少陵鯨海動翰苑鶴天寒今日訪君還有意三條氷雪獨來看杜荀鶴弔陳陶處士耒陽山下傷工部采石江邊弔翰林兩地荒墳各三尺却成開解哭君心亦以李杜相方峽中鄭谷萬里煙靄裏隱隱見夔州夜靜明月峽春寒堆雪樓獨吟誰㑹解多病自淹留往事如今日聊同子美愁耒陽弔杜子美李節耒陽浦口繫扁舟紅蓼洲頭宿白鷗半夜青燈千里客數聲寒雁一天秋蛩吟隔岸情如訴斗柄橫江勢若流惆悵杜陵老詩伯斷碑古木繞荒丘耒陽縣志以李節為天寶詞客誤也杜公卒于大厯年間豈有天寶時先作弔語耶大約中晚人耳又載祠前夢子美和詩一首詞氣俚俗决非少陵語意故削而不存讀杜工部詩宋人張方平文物皇唐盛詩家老杜豪雅音還正始感興出離騷運海張鵬翅追風騁驥髦三春上林苑八月浙江濤璀璨開鮫室幽深閉虎牢金晶神鼎重玉氣霽虹高甲馬騰千隊戈船下萬艘吳鈎銛莫觸羿彀巧無逃逺意隨孤鳥雄筋舉六鰲曲巖周廟肅頌美孔圖褒世亂多羣盜天遙隔九臯途窮傷白髮行在窘青袍憂國論時事司功去諫曹七哀同谷寓一曲錦川遨妻子饑寒纍朝廷戰伐勞倦遊徒右席樂善乏干旄舊里歸無路危城至輒遭行吟悲楚澤達觀念莊濠逸思乘秋水愁腸困濁醪耒陽三尺土誰為剪蓬蒿坡公曾和此詩兩篇參看尚不如原作和平燮貼也感舊詩陸游我思杜陵叟處處有遺踪錦里瞻祠柏綿州有海棕蹉跎悲櫪驥感㑹失雲龍生世後斯士吾將安所從過杜工部祠鄒定疇昔哦詩憶耒陽兹因捧檄過祠堂一生忠義孤吟裏千載凄凉古道旁自是風霜侵病骨非干牛酒涴詩腸明朝解纜長江上閒訊先生一炷香思杜亭姜仲謙十里松陰大道場一亭還復枕瀟湘詩翁至死憂唐室野客于今弔耒陽窗户雲生山雨集巖溪花發曉風香不惟臨眺添惆悵自是年來鬢巳霜衡陽府城南華光寺傍舊有杜公祠宋郡守劉清之登華光山東眺耒陽慨然思杜工部因為立祠以黃庭堅配焉又即地立亭號曰思杜亭祠亭俱廢讀杜詩王逢原鐫劖物象三千首照耀乾坤四百年次何漕司小紅翠亭韻劉士季少陵遺跡瀼西東端的高齊在此中今日花枝㺯煙雨前時蔬甲卧霜風根株移取他山翠跗萼輸來别國紅收得陽春無盡藏夔人端說兩詩翁其二花在中巴東復東滿城春色一園中休言小小鶯花界也勝纎纎燕麥風舞袖卷紗空映翠晴窗磨鏡漫晞紅葉成帷幄花成陳壯觀詩壇矍鑠翁弔耒陽杜墓王元才高憂負國身沒耒陽城雖葬先生骨難埋騷雅名事往斯文在時遷旅冡平邑侯新布政一為剪柴荆庚寅六月再過耒江謁杜工部墳元人余恁一寸心丹篤愛君數根髮白苦憂民吟邊見得公真像莫問公墳真不真庚寅嵗乃元順帝十年余秋山為湖廣提刑按察使留題祠下和合江亭詩吳拭使者風流照錦城東郊攬轡更澄清雙江合處煙凝曉秀嶺橫邊日㺯晴石鼎煮茶濃有味金鍾注酒釅無聲何時却信橋南步細讀詩人古柏行讀李杜詩明人胡翰太音在天地浩浩空山河作者推李杜千古未足多至哉風與雅采之委巷歌世人事雕琢伐柯徒伐柯弔杜墓張翔迢遞來南紀倉皇問北征詩通高叟固才到屈原清天地心無愧風雷氣不平徘徊江上月昨夜照文明弔耒陽杜墓解縉何年陵墓存翁仲尚有殘碑紀鳯行行過石橋江上路一林芳樹近宫墻弔杜公墓再見陳獻章裸葬不葬等悠悠有生無生名可留夀遲殤子千年在文與江河萬古流天借人心昭日月山藏廟貌自春秋拾遺苦被蒼生纍贏得乾坤不盡愁感懷鄭昂王粲凄凉仍去國杜陵老大竟飄蓬荆州豈免依劉表蜀道終須謁鄭公三禮賦成追昔日七哀歌罷起秋風青青亦有江南草鸚鵡洲邊恨不窮送陳學使玉叔之成都謝榛沔陽日高刺桐樹文旌飛出荆門路錦城形勝今尚具曾見左思蜀都賦揚馬文章子昂句西漢初唐歷可數后來壇坫孰追步杜曲詩人劍門度光動文昌映武庫地湧橫流豎砥柱浣花溪頭弔古迹少陵舊寓非疇昔棟宇一新耀丹碧憂時慘淡髮全白唐室宗廟雜荆棘日月雙懸照社稷千載孤忠耿無隔瞻拜神交在咫尺好題巔崖一片石古人吟眺餘物色杜甫墓謝榛洞庭昔返楚天魂孤塜千年失子孫蜀道悲歌今不見暮雲愁色滿中原懷古拾遺年老别長安胡馬西馳忽棄官妻子一朝俱涕淚弟兄千里各艱難風高蜀嶺松聲落月滿巴江鶴夢寒異代愁歌有同調何當寄迹浣花灘遊草堂詩陳南賔西出秦關道路長岷峨東望鬱蒼蒼蓬萊三賦舊無敵同谷七哀今可傷茅屋秋高風瑟瑟布衾鐵冷雨牀牀浣花溪上應回首千載令人憶草堂西瀼杜少陵祠出峽是何境棲巢亦戀枝不應三畝劵買得古今祠淺泊龍猶侮孤鳴雀自悲祗應蘺芷近屈宋有前期讀少陵集陳繼儒兔脫如飛神鶻見珠沈無底老龍知少年莫漫輕吟咏五十方能讀杜詩題李白送别杜子美發魯郡圖華愛杜陵有客才名早却與山東李白好短褐飄飄泗水春登臨落日同傾倒浮踪轉盼各飛蓬石門一别風煙渺同心之誼袪形骸相期直在雲霞表渭北江東日渺茫王孫不見凄芳草由來造化躓英賢奈爾風流天地老杜少陵騎驢小影白髮窮愁日清秋過雁時浣花溪上路多是憶君詩送黃子羽之任本朝人吳偉業魚鳬開國險花月錦城香巨石當門觀奇書刻渺茫江流人事勝臺榭霸圖荒萬里滄浪客題詩問草堂黃以徴辟為新都令道經成都遊浣花溪訪拾遺草堂朱嘉徴郊南十里浣花溪溪繞空原東復西題壁總隨蝌蚪漫穿林不住鳥烏啼詩情獨傲千峰出野興頻牽草木低豫亦愁心江上客故園芳草日凄淒耒陽道中留杜少陵祠順治戊戌孟冬彭而述此地留工部荒祠拜古墳一身存大雅萬世頌斯文隔岸江流樹空山野度雲到來悲馬鬛黃葉正紛紛傷心天寶客遺蛻重衡山况近魚龍窟竟成虎豹關好花隨地發落葉趂秋閒便遇魯中叟公詩不用刪如公原未死疑塜在江邊靈武君臣後詩名天地間亂離來白帝談笑老荆蠻萬古郴江水東流不肯還耒令紛如許獨傳姓聶人江山流上客風物見元神忠愛生前事離騷死後鄰却憐嚴節度知已更無倫公遊耒殁耒詳見公本傳及年譜豫既為文記之及戊戌之孟冬行部臨耒首謁公祠綴以四詩噫公靈有知魂魄戀此豫敢言詩哉聊以記嵗時耳雞鳴山宿齊送别蔣前民杜濬屢入亭侯廟長吟老杜詩公孫躍馬日丞相出師時弔古英雄志悲歌喪亂知江樓如抱膝此地最相思拜杜少陵草堂再見宋琬少陵棲隱地古屋鎖莓苔峭壁星辰上驚濤風雨來嵗華三峽暮身世七歌哀欲作招魂賦臨流首重回步草堂碑韻熊夢鶴少陵作客此為廬松竹幽深始卜居官馬有塵隨使卒花溪無伴狎樵漁任人非是難慿史成我迂踈半誤書千古悲辛同往轍日西歸去尚躊躇約諸人同看草堂劉璽何日尋幽出郭西與君舒嘯浣花溪草堂勝事重興起工部高蹤待品題擕手祗須雙不借看山惟用一偏提百年如夢今頭白好趁清閒共杖藜盧德水侍御寄杜亭詩李弱翁正聲自古初作者誰獨步猗歟杜少陵大雅洵足數流傳八百年此道莽回互蔓草委王風鬼語亂如鶩盧公具體微感慨任詞賦誅茅祠少陵以精通寐寤晨興謁高堂次及林居趣興觀有本懷性情與古遇胥鈔寓微言直以魂魄聚邇者服終喪補官到邸寓獻酬無凡才見力有餘裕短褐識我曹令德表心素投我杜亭詩如飲石上露沈鮑不足推羮牆有深慕通淨取性靈清妙去雲霧人倫盡衣歸薰氣相吹附中興一家言式昭我王度題杜少陵畫像程可則杜陵老叟生絶奇蒼髯頳面英雄姿似兹不合久貧賤曷為坎􅀈長歔欷自從大禮獻三賦尉授河西不肯赴當寧何曾解愛才旅食京華嵗虛度忽然鼙鼓動長安玉輦西遊蜀道難奔走三川寄家室脫身賊壘多辛酸麻鞋謁帝趨靈武拾遺侃侃居言路直節何妨救友生諫書反得君王怒牢落天涯到秦州負薪拾橡窮且愁微官棄去亦何恨可憐事業付沙鷗劍南直入嚴武幕散髮戎渝致非惡春流無恙下夔門秋色蕭然卧西閣晚年出峽望衡山楚水茫茫潭嶽間酒酣賫志仰天哭咫尺襄樊那得還一生落拓無窮已獨有豪吟詠詩史同時比肩惟太白後來作者紛誰是鄢陵先生絶世雄讀書萬卷身乘驄稱詩酷擬草堂作沈鬱頓挫將無同昔年作吏向秦國工部祠堂拜顔色傳與先賢作畫圖曠代風流畫相識嗟哉杜陵一沒已千秋吾徒仰止空悠悠先生望古有殊契神交豈直形像謀我亦幼齡重高詠乞將粉本歸南州謁杜公祠康熙丙午仲冬劉宗沛祠後荒丘野草春祠中遺像惹飛塵唐家多少詩才子老杜應為第一人杜陵墓劉明遇煙雨淹三月荒荒出郭村楚江流怨緒春鳥喚詩魂往事猶悲在時艱應恨存詞臣忠愛蹟豈但立言尊流寓君多地胡然留此丘雖崇千古祀未了一生愁風雨無今昔滄桑變海疇殘紅新霽後疑在浣溪頭耒陽道中山城早發剔燈煙盡日崎嶇秀可憐驟雨驟晴深澗路飛花飛鳥夕陽天雲生馬足春猶冷風入松梢晝欲眠暝色催人喧萬籟怒號蛙鼓亂溪田古陌纎纎路春深花亦深野塘驅馬影芳草故人心荒寺藏松壑山僧導竹林佛燈薰客帳一雨度寒衾杜文貞公祠元太監紐憐請追諡唐杜甫為文貞高引勝日坐春風江流半畝宮耒陽依聶令西蜀憶嚴公橋諺梅花白洲吟野蓼紅今來探古蹟若有夢魂通九日袖杜詩獨登石子嶺鄒章周羣醉高樓日懷詩獨野遊自堪孤影度不與衆山謀秋興誰還賦杜陵欲正愁狂歌驚落葉隨意憩椒丘憶浣花溪作陸洽原浣花溪邊憶老翁詩卷長留錦川東昔日草堂兵戈後頻年羌塞氷雪中不堪羇旅同苦調還遲衰病扶悲風長安渭水今在否回首風塵思何窮讀杜詩詳注蕭山張逺詩者樂之祖樂府難具陳風雅變為騷源流日以分漢魏古尚存西晉不失真頽波及六朝作意求為新選言必月露滿眼飛沙塵有唐大復古卓爾多不羣少陵更挺生振古無其倫許身稷與契一飯不忘君山川之所歷喪亂之所親歷歷載諸筆落筆真有神經史任其驅稗野任其吞精微混溟涬􅀈乎渺無津注者百十家妙篆誰能伸余也性耽此從事二十春編年以紀時晰疑必尋根段落初一剖不使久沈淪自謂頗苦辛可以掩前人朅來得新注歘翕歎積薪滄海鮮遺珠纎毫必見珍少陵如可作不信是前身安得薔薇露盥手揚清芬讀杜詩詳注桐城程師恭千古詩壇少陵踞紛持觚稜解多誤支離未巳或抵牿翻令光焰隔雲霧杜不易注恐失真誰其洗髓愜傳神薈萃諸家多創獲指㸃後學啓迷津甬上仇先生擁書勝百城石渠校中祕月旦操評衡剩馥餘脂澤藝苑衣被寰宇先風聲耽吟尤嗜杜陵集心摹口咏忘寢食力拔鯨牙酌天漿思穿溟涬推霹靂頃刻揮毫手不停經營濡墨遲無敵豁目人驚杜再來醒心不覺羣疑開作者待闡注者筆注者已登作者臺廣搜博采洵至矣沿訛襲舛胡為哉余生學杜苦難似考辨差擬㑹其㫖每將愚臆質大方談言微中未見鄙神傾意豁覩斯注子美曠代逢知己鈎索字句枉稱工所取精誠為交通杜陵遇嗇甬江豐家無儋石清況同今日功成身退之名宿依然留連風雅之宗公讀杜詩詳注㑹稽田易自有詩人一子美草堂箋注紛百家櫛比句字互爭長知無故實勞搜爬亦思少陵才經世許身稷契言非誇生際亂離不得志假以聲韻長咨嗟河源萬里渺星宿導之浩浩流泥沙曰史曰聖杜知已詎同博士矜蟲蝦四明先生儒林宗胸中書卷三十車毛詁鄭箋談一一鏗鍧雅奏刪淫哇屈宋之後誰作者大雅固應推浣花退食一編朝在手翻抹舊冊堆欹斜當年情事豈爾爾詮解獨出飛龍蛇悄然如與公晤語行間隱躍三毫加固哉高叟不可說鑿空却歎漂浮槎鎸兹善本傳藝苑晦翁騷注無㸃差足慰吟魂賦大招可許問字來侯芭讀杜詩詳注㑹稽金埴杜陵遺老才非凡詩史詩聖稱名咸一縑惟出自機杼百味不共人甘醎聰明直令氷雪淨清真都使鉛華劖小賦誰能賦大禮短歌孰類歌長鑱忠君愛國託聲律說理慕義飽飢饞甬江先生善讀杜前人穿鑿二字讀去聲皆誅芟詳注祇求得真是千秋知己神和諴官貧正好浣花對恍共草堂哦喃喃潛織鮫人紅玉手菴蘿花女青茸衫銀河夜漲躍天泗渤海煙滅騰仙帆御覽兹編三太息二十八卷天威監歸來把向蛟門讀金鱗閃閃龍珠銜惟有遭時今古異經綸大展輝廊巖唐詩誰第一寤寐少陵親心寫風期合神交晤語真友應千載尚公有齊名尚友堂官亦拾遺貧賞鑑經明主流傳啓後人補注慙無補公猶許可多未能一詞贊聊辨四聲訛公出杜集補注見示以辨四聲相契也絶瘧沈綿霍通靈鬼魅哦事見詳注及補注詩魂結忠愛抽卷浣花過杜詩補注卷上
