body:
  text: 杜詩詳注卷二十一翰林院編修仇兆鰲撰冬至鶴注此當是大歷二年作者玊燭寶典云至有三義一者隂極之至二陽氣始至三者日行南至年年至日長為客忽忽窮愁泥乃計切殺人江上形容吾獨老天涯一作邊風俗自相親杖藜雪後臨丹壑鳴玉一作明主朝來散紫宸心折此時無一寸路迷何處是一作見三秦上四言旅居冬至下憶長安冬至也風惟客途久滯故自傷泥殺形容獨老皆窮愁所致俗自親於為客無與身臨丹壑而意想紫宸故有心折路迷之慨心折則窮愁轉甚路迷則久客難歸矣鮑照詩去親為客滯阮籍詩忽忽至夕窮澤測㫖忽忽不定也泥殺人膠也楚辭屈原放於畔形容枯槁陸雲詩風土豈相親征莊子原憲杖藜而應門入鮑照詩妍容逐丹壑西賦飛翠緌拖鳴玉以出禁門者衆矣江淹别賦心折骨驚邯謝靈運詩路迷糧亦絶為史記項羽分秦地為三章為雍王都廢邱司馬欣塞王都櫟陽董翳為翟王都高奴謂之三秦栁司馬至鶴注此當是大曆二年作是年九月十月吐蕃入寇兩京戒嚴故詩中說兩京事有客一作使歸三峽相過平聲問兩京函關猶出一作自將去聲渭水更一作自屯徒昆切兵設備邯鄲道和親邏力佐切逤蘇箇切唐書作娑韻㑹云娑或作逤通作些城幽燕平聲唯鳥去商洛少人行衰謝身何補蕭條病轉嬰霜天到宫闕戀主寸心明首二栁至夔而問信也中六栁答詞下四公自叙洛出將屯兵設備和親此指西京吐蕃事幽燕路梗商人稀此指東京叛將事此杜臆霜天望闕千里明淨唯戀主丹心與之共明耳十字句法漢書文帝至霸陵慎夫人從帝指視新豐道曰此走邯鄲道也城舊唐書吐蕃傳其人或隨畜牧而不常厥居然頗有郭其國都城號邏些城新書吐蕃贊普居跋布川或居邏娑川道髙士傳四皓共入商洛劉楨詩余嬰沉疴疾薛衡詩霜天斷雁聲申涵光曰此詩用三峽兩京函關渭水邯鄲邏些幽燕商雒地名八見亦是一病别李義此當是大歷二年冬作祭盧注李義李鍊之子鍊在明皇朝曽遣沂山東安公鍊乃宗室之賢義能繼美神堯十八子十七王其門道國洎一作及舒國實一作督維親弟昆中外貴賤殊余亦忝諸孫丈人嗣三葉一作玉業之子白玉溫從世系親誼叙起故云中外貴賤殊朱注義與公為中表戚趙曰丈人指義之父鍊之子則指李義也詳味詩意李義者道國之裔孫而公則舒國後裔之外孫也從義之父上遡至道王為三世故曰嗣三葉皇通鑑天寶十三載二月上高祖諡曰神堯大聖光孝帝鮑曰高祖二十二子衛懷王𤣥霸楚哀王智雲皆先薨太子建成巢王元吉以事誅詔除籍故止言十八子太宗有天下止十七子封王唐書道王元慶高祖第十六子舒王元明第十八子潘嶽誄楊綏藉三葉世親之恩詩溫其如玉道國繼德業請從丈人論平聲丈人領宗卿肅睦一作穆古制敦先朝音潮納諫諍直氣橫乾坤子建文章一作筆壯河間經術存此申丈人嗣三葉兼舉其忠義文學以唐書宗正寺卿一人從三品掌天子族親屬籍辨昭穆肅睦敬而和也見曹子建河間王注各前爾一作溫克富詩禮骨清慮不喧洗蘇亥切然遇知巳談諭淮湖一作河奔憶昔初見時小襦一作孺繡芳蓀長丁丈切成忽㑹面慰我久疾魂此申之子白玉溫備述其人品交情蜂潘嶽詩吾子洗然恬淡自逸曰洙曰淮湖奔言談論起如奔濤之不可涯涘鶴百姓歌亷范云昔無襦今五袴則襦下於袴也急就篇注短衣曰襦自膝以上古詞妾有繡腰襦葳㽔自生光謝靈運詩挹露馥芳蓀三峽春冬交江山雲霧昏正宜且聚集恨此當離樽莫怪執杯遲我衰涕唾煩重平聲問子何之西上上聲岷江源此叙䕫江餞别之意唾趙曰舉杯遲以涕唾之煩故也解嘲涕流沫孟子先生將何之赴䕫江居下流故蜀為西上願子少干謁蜀都足戎軒誤失將去聲帥意不知一作如親故恩少去聲年早歸來梅花已飛翻努力慎風水豈惟數所角切盤飱猛虎卧在岸蛟螭出無痕王子自愛惜老夫困石根生别古所嗟發聲為去聲爾吞末致臨别戒勉之辭反人情既不足恃而物害又復可危公於知交誼切故覆丁寧至此此章前四段各八句末一段十四句曰魏志鍾繇而傳當厄於水努力慎之洙吞聲聲出復吞也王嗣奭曰當時戎軒多武夫公所甚畏詩每及之此云誤失將帥意不知親故恩又云努力慎風水豈惟數盤餐一飯跡便掃世情大抵然也故以頻過人飯為戒皆忠谷之語李少年涉世尚淺故致其惓惓公之篤於親誼如此王道俊博議曰舊書道玉元慶麟德元年薨子臨淮王誘嗣次子詢詢子微神龍初封為嗣道王景雲元年官宗正卿卒子鍊開元二十五年襲封嗣道王廣德中官宗正卿新書宗室世系表於道孝王元慶之下首書嗣王誘次書嗣王宗正卿微嗣王宗正卿鍊嗣王京兆尹實困學紀聞云義蓋微之子以豫考之不然義乃鍊之諸子而實之弟耳詩云丈人嗣三葉丈人謂鍊自誘至鍊為嗣道王者三世故曰嗣三葉也又云丈人領宗卿肅穆古制敦先朝納諫諍直氣橫乾坤按舊志天寶十載正月遣太子率更令嗣道王鍊祭沂山東安公則鍊在𤣥宗時巳䝉任使所云先朝納鍊諍者蓋𤣥宗也又云憶昔初見時小襦繡芳蓀長成忽㑹面慰我久客魂與少年早歸來梅花已飛翻王子自愛惜老夫困石根等語皆前輩諄勉之詞蓋公天寶中曽見義於京師年尚少今來巫峽將入蜀干謁故以猛虎蛟螭戒之若令義為微之子則微卒於景雲中去大歷二年且五十六七載義之齒當長於公安得目為少年而自居老夫乎由此言之則義為鍊之諸子審矣送高司直尋封閬州鶴注此當是大歷二年䕫州作司直大理寺官後魏永安二年置司直十人唐制六人寺有疑讞則參議之丹雀銜書來暮棲何鄉樹驊騮事天子辛苦在道路司直非冗官荒山甚無趣借問泛舟人胡為入雲霧首叙司直入蜀之上四比興下四賦詞王趙曰高通籍事主故比丹雀於文王驊騮之於穆荒山雲霧非司直所宜經故惜而問之於周禮疏中候我應云季秋甲子赤雀銜丹書入豐止昌戶昌拜稽首受其文遁甲赤雀不見則國無賢注赤雀主銜書陽精也令周穆王駕八駿之乘右服驊騮通鑑和帝以尚書黃香為東郡太守香辭以典郡從政才非所宜乞冗官與子姻婭間既親亦有故萬里長江邊邂逅亦相遇長丁丈切卿消渴再公幹沉綿屢音慮清談慰老夫開卷得佳句此叙相遇交情亦得其清談佳句雖消病沉綿可頓蘇矣詩瑣瑣姻婭身有故謂故交祗劉公幹詩余嬰沉痼疾竄清漳濵周針清談輟響時見文章士欣然談一作淡情素伏枕聞别離疇能忍漂寓良㑹苦短促溪行水奔注熊羆咆空林遊子慎馳騖西謁巴中侯艱險一作難如跬步此為司直惜别阻清談屬高談情屬公水行恐奔注陸行恐遇熊羆特以巴侯舊契故視艱險如跬步耳遊蔡澤傳公孫鞅之事孝公披腹心示情素曹植節賦步北林而馳騖無巴中侯指封閬州曰越絶書曽跬步之勞按半步跬主人不世才先帝常特顧拔為天軍佐崇大王法度淮海生清風南翁尚思慕公宫造廣厦木石乃無數初聞伐松柏猶卧天一柱此稱閬州之賢須封初為宿衛官又嘗仕於淮海乃歷來宦迹且廣厦梁棟之材乃採松柏而舍天柱惜其未得大用也度漢天文志虛危南有衆星曰羽林天軍言王朝法能尊崇而擴大之朱穆崇厚論天不崇大則覆情不廣其詩穆如清風新趙曰凡官府貴處謂之公宫左傳搆公宫桓談論雍門周謂孟嘗君曰足下居則廣厦高堂連闥洞房天神異經崑崙有銅柱其高入天謂之柱我病一作瘦書不成成字讀一作字亦誤為去聲我問故人勞心練征戍末以寄語聞州作結務病不成書應前消渴沉綿練兵征戍乃當時守土急此章前二段各八句中二段各十句末段四句收可歎此詩據黃氏當編在大歷二年之末張鶴注隆興有石幢載李勉為洪州刺史在鎬之後魏少游之前鎬以廣德二年九月卒勉即以是月繼之至大歷二年凡三年是年勉入朝四月拜京兆尹此詩乃勉入京後作故曰三年未曾語以今按詩又云李也疑丞曠前後亦是既入朝而此頌之黃鶴復疑四年勉入廣時作蓋誤認山南為廣南也詩中山南本追論前事耳抱朴子可歎非一天上浮雲似一作如白衣斯須改變如蒼狗古往今來共一時人生萬事無不有首段借端託興下以浮雲變幻比人事不常起婦人棄夫晉天文志鄭雲如綘衣又云衛雲如狗赤色長尾漢五行志見物如蒼狗維摩經是身如浮雲須臾變滅此用其意謂之宙梁元帝纂要往古來今嵇康詩事故無不有近者抉眼去其夫陳作眯河東女兒身姓栁丈夫正色動引經酆城客子王季友羣書萬卷常暗誦孝經一通看平聲在手貧窮老瘦諸本作瘦唯朱本誤作叟家賣屫諸本作屐作履張逺改作屫吉嶽切好去聲事就之為去聲擕酒此叙王生家鄉之事其王有正論不能挽去婦之心此事之可歎者然家貧好學人來就正如此則亦何害於素行乎之杜臆抉眼猶云反目趙曰栁氏不喜其夫如抉眼中物而去之東北人方言不喜見者每曰抉眼吳世家子胥將死曰抉吾眼置吾東門引河東乃栁氏郡名杜臆以為唐風近淫雋不疑傳經以斷燒唐書豐城縣屬洪州豫章郡又南史徐陵嘗疾子份香泣涕跪誦孝經日夜不息云庾子輿五嵗讀孝經手不釋卷北史馮亮臨卒遺誡右手執孝經一卷崔實政論一通置坐側後漢劉勤家貧每作屫供食嘗作一屫已斷勤置不賣他日出妻竊以易米勤歸知之責妻欺取直因棄不食揚雄傳好事者載酒肴從游學豫章太守去聲後同高帝孫引為賔客敬頗久聞一作問道去聲三年未曾音層後同語小心恐懼閉其口太守得之更不疑人生反覆方服切看巳醜明月無瑕豈容易音異紫氣鬱鬱猶衝斗此叙王生幕府之事不太守敬而且信以王生小心慎密語外泄與人情反覆者不同也明珠比其德之粹劍氣言其才可用氣朱注謂栁氏棄夫此事之反覆而可醜者於上句語不接公高帝孫李勉也唐書世系表鄭惠王元懿生安德郡琳琳生擇言擇言生勉舊唐書勉歷河南尹徙洪都刺史江西觀察使大歷二年四月拜京兆尹御史大夫史記張儀傳願陳子閉口毋復言淮南子明月之珠不能無纇曹植賦夫言何容易時危可仗真豪俊二人得置君側否太守頃者領山南一作南山非邦人思之比父母王生早曽拜顔色高山之外皆培部茍切塿路茍切用為羲和天為成用平水土地為厚此稱王李之才可當大任一本欲表章季友忽將太守並稱見時賔主俱不尋常張逺云如所謂不知其人視其友是也顔色公與王相遇之早皆培塿視衆人皆卑小矣拜舊書肅宗寶應初勉為梁州刺史山南西道觀察使方詩民之父母左傳部婁無松柏魏都賦培塿之於壺說文培塿小土山方言冡秦晉間謂之培塿羲和注羲伸和仲皆堯臣也書地平天成書乃命又汝平水土王也論道阻江湖李也疑一作凝非丞一作丞疑曠前後死為星辰終不滅致君堯舜焉於䖍切肯朽吾輩碌碌飽飯行風后力牧長回首末慨其不能大用而深惜之此二人之才可殁為名神生為名相風后力牧之儔也故常回首而望之所朱注季友雖云豪俊何至許之以良相蓋季友為妻棄時議必多嗤薄之者公盛稱其人以破俗見明事變無常不足為賢者纍也此章四句起六句結中三段各八句書論道經邦曠鶴注德宗初年勉加平章事檢校左僕射詩言疑丞前後可謂知人先見矣書大傳古者天子必有鄰前曰疑後曰丞左曰輔右曰弼星莊子傅說得之以相武丁乘東維騎箕尾而比於列世說桓溫曰正在我輩紀史記平原君傳公等碌碌皆因人成事者大帝王世黃帝得風后於海隅進以為相得力牧於澤進以為將杜臆逺引風后力牧取其有古心者王嗣奭云詩題曰可歎是歎其懷才不用非歎其夫婦乖離河東女兒不指季友之妻王特見此一事而正色斥之今按若果如其說則王生偶然論此亦何關於其身而舉此以發端乎開首蒼狗一段感慨甚深斷是為季友妻而發朱買臣見棄於妻古人亦明有之又何必為季友諱耶盧元昌曰王季友詩有自耕自刈食為天如鹿如麋飲野泉亦知世上公卿貴且養山中草木年等句其為人食貧勵志可知此詩所云乃實録也朱鶴齡曰此詩為季友作也季友肅代間人殷璠謂其詩放蕩愛險務竒然而白首短褐錢起有贈季友赴洪州幕詩云列郡皆用武南征所從誰諸侯重才略見子如瓊枝即豫章賔客之事也潘淳詩話載唐江西新幢子記題名云使兼御史中丞李勉兼監察御史王季友蓋勉罷河南尹以御史中丞歸西臺出為江西觀察使故紀銜如此于邵送王司議季友赴洪州序云洪州之為連率舊矣朝廷重於鎮定咨爾宗支勉移獨坐之權專方面之寄是以王司議得為副車按此詩豐城客子云云則季友秖在勉幕府耳題名及序所云與白首短褐語不合疑御史司議止是虛銜未嘗官於朝也奉賀陽城郡王太夫人恩命加鄧國太夫人原注陽城郡王衛伯玉也玉舊書代宗紀大歷二年六月荆南節度使衛伯封城陽郡王公詩乃賀其母受封蓋伯玉封王後母亦進封大國也陽城新舊唐書作城陽衛幕銜恩重潘輿送喜頻濟時瞻上將去聲錫號戴慈親富貴當如此尊榮邁等倫郡依封土舊國與大名新首叙陽城鄧國銜杜臆起二擒題意完詞偉且衛幕潘輿天然佳對恩以衛公能濟時也送喜以慈親膺錫號也富貴尊榮承上起下夫人加號鄧國故曰新朱注郡封仍是陽城故曰舊漢書衛青征胸奴大克獲帝就拜大將軍於幕中輿傅咸詩銜恩非望始度潘嶽閒居賦太夫人乃乘板升輕軒上將為節也徐陵文元戎上將紫誥鸞回紙清朝燕賀人逺傳冬筍味更覺彩衣春奕葉班姑史芬芳孟母鄰義方兼有訓詞翰兩如神次記郡王之孝及鄧國之賢伯誥命初頒適當燕來之候膳用冬笋身服綵衣言玉娛親之意義方比諸孟母詞翰可繼班姑又見母氏之受封不偶碑趙曰紫錦之誥其紙上有回鸞之勢庾信賀婁慈臺堪走馬書足回鸞賀謝惠連詩從夕至清朝用淮南子大厦成而燕雀相冬笋川孟宗事綵衣老萊子事注皆别見字後漢列女傳扶風曹世叔妻者同郡班彪之女名昭惠姬兄固著漢書其八表及天文志未竟而卒和帝詔昭就東觀藏書閣踵而成之母文心雕龍佩之則芬芳閒居賦此里仁以為美孟所以三徙方左傳臣聞愛子教之以義王儉褚淵碑凄凄辭翰委曲承顔體鶱飛報主身可憐忠與孝雙美畫胡化切一作映麒麟一作騏驎致末以忠孝兼稱并勉衛之意忠杜臆畫麒麟者忠則有之未卜其孝若衛之移孝作非獨擅雙美者乎此章前兩段各八句末段四句收里曹植書飛鶱絶跡一舉千琴賦雙美並進送田四弟將軍將䕫州柏中丞命起居江陵節度使去聲一無使字陽城郡王衛公幕一云䕫府送田將軍赴江陵衛伯玉封王在大曆二年此詩亦二年所作黃鶴編在元年者非離筵罷多酒起柁從杜臆舊作地發寒塘回首中丞座馳箋異姓王燕辭楓樹日雁度麥城霜定一作空醉山翁酒遙憐似葛疆首二送田三四赴衛五六送别秋景七八江陵情事楓樹指青楓江故對麥城山簡比衛葛疆比田同逺注此詩兩以酒字作句腳古人不避然兩酒字不離筵酒公送時也山翁酒到江陵時也意田將軍好酒故云舊起柁起船而行前有短歌行君今起柁春江流可證作起地刋誤無疑御史中丞謂之獨座國漢書有異姓諸侯王表劉孝威詩韓吳異姓王郡志荆州當陽縣東南有麥城杜臆時必八月是𤣥鳥歸鴻雁來之候葛襄陽兒童謡舉鞭問葛疆何如幽并兒疆山簡愛將也題柏學士茅屋鶴注依舊次編在大歷二年蓋寄詩在先而題屋在後也顧注公過學士茅屋羡其立品之高讀書之勤故題其茅屋如此按詩言讀書以取富貴於學士尚不相似黃氏謂朂其子姪者得之碧山學士焚銀魚白馬却走身巖居古人已用三冬足年少去聲今一作曽開萬卷餘晴雲滿户團傾蓋秋水浮階溜決渠富貴必從勤苦得男兒須讀五車書學士茅居舊有藏書上四叙事五六屋前秋景七八勉其子姪下截承上言銀魚見焚白馬却走遭祿山之亂也雲如傾蓋之團其濃水似決渠之溜言其急也張江淹詩遊豫碧山隅銀魚學士所佩之章後漢湛常乘白馬光武每見曰白馬生且復諫說東方朔傳臣年十二學書三冬文史足用沈氏蘧曰古人春誦夏弦秋學禮冬讀書故讀書者曰三冬而不言春夏秋雲梁元帝曰讀書萬卷猶有今日蕭子雲詩重叠晴新周王褒詩俯觀雲似蓋低望月如弓雲鄒陽傳傾蓋如故豐漢白公穿渠民歌之曰舉插為決渠為雨陸機詩注溢修霤黃潦浸階除雲隂結不解通衢化為渠欲後漢薊子訓傳諸貴人共呼太學生曰子勤苦讀書規富貴惠陸機詩男兒多逺志道莊子施多方其書五車其蹖駁杜詩近體有兩段分截之格有兩層遙頂之格此章若移晴雲秋水二句上接首聨移古人年少二句下接末聨分明是兩截體今用遙頂亦變化法耳又中間四句平仄仄平俱不合律蓋亦古詩體也黃生曰舊疑此詩不似對學士語今考寄柏學士詩及題柏大兄弟山居屋壁詩始知其說一則云自胡之反持干戈天下學士亦奔波歎彼幽居載典籍蕭然暴露依山阿一則云叔父朱門貴郎君玉樹高山居精典籍文雅涉風騷是學士乃柏大之叔父柏大之山居即學士之茅屋學士奔波之所載即柏大山居之所精二詩語意互見此詩則合而言之勉其子弟而本其父兄以為勸言勤苦以取富貴爾叔父業有前效則年少積學之功安可少哉朱瀚曰焚銀魚不言其故句意未明第三句使東方曼倩事㸃金為鐵以三冬文史足用為已用三冬足可乎今開萬卷餘開字餘字不貫年少對古人不工晴雲滿戶秋水浮階足矣團傾蓋溜決渠蛇足輪困下句猶可解云浮於階而溜於所決之渠但非詩法耳至於團傾蓋則難乎箋注矣晴雲高妙亦無滿戶之理白帝城中雲出門自為雷雨設色耳七八可粘村孰少陵生平以道義功業自許何出此語五車書亦與萬卷餘犯重題柏大兄弟山居屋壁二首黃鶴謂柏大蓋柏貞節子姪柏為中丞是即朱門貴一門四美是即玉樹高也黃生謂柏大乃柏學士子姪詩云山居精典籍即前詩歎彼幽居載典籍也又云野屋流水山籬帶雲即前詩浮雲滿戶秋水浮階也後說近是此應是大厯二年䕫州作叔父朱門貴郎君玉樹高山居精典籍文雅涉風騷江漢終吾老雲林得爾曹哀絃繞白雪未與俗人操首章記柏氏好學喜得知音於精典籍則博古涉風騷則能文此正玉樹之姿不囿朱門者哀絃白雪言相與彈琴咏歌不與俗人同調此承雲林句來是賦非比朱門洞啓當陽之正色郭璞詩朱門何足榮鄭𤣥曰應璩與滿公琰書外嘉郎君謙下之德注璩常事其父故稱郎君玉樹用謝𤣥語詳見前孫綽詩山居感時變魏志向朗優游無事垂三十年潛心典籍風曹植詩文雅縱橫飛虞茂詩睿藻冠風騷風騷國離騷也鮑照詩寧能與爾曹瑕瑜稍辨論楚七發游涉於雲林記絲聲哀哀以立亷宋玉對襄王曰客有歌郢中者其始下里巴人國中屬和數千人其為陽春白雪國中屬而和者數十人而已謝希逸琴論白雪師曠所作商調曲也鮑照詩蜀琴抽白雪郢曲繞陽春野屋流寒水山籬帶薄一作白雲靜應平聲連虎穴喧已去人羣筆架霑窗雨書籖映隙曛蕭蕭千里足一作馬箇箇五花文次章叙山居景事而贊其多材籍境幽地僻之中見此筆架書籖知真能精典而涉風騷矣上章玉樹高比其質秀此章千里馬比其才良箇箇該柏氏兄弟也吳志吕䝉傳不入虎穴焉得虎子楚辭離人羣而遁逸里何遜詩霏霏入窗雨造詩蕭蕭馬鳴漢文帝有千馬說苑使驥得王良父驥無千里之足乎酈炎詩舒吾凌霄羽奮此千里足良五花毛有五色也丹元子步天歌五箇花文王星白帝樓鶴注此大厯二年嵗晏作二公於元年至䕫州今云去年梅栁意則是年冬盡時矣漠漠虛無裏連連睥睨侵樓光去日逺峽影入江深臘破思端綺春歸待一金去年梅栁意還欲攪邊心上四城樓之景下四出峽之情上太虛之際城堞上侵極言城之高峻日照水而其光映惟樓高故去日逺峽臨江而其影下垂惟水落故峽影深尚臘盡春回正可出峽思端綺一金製春服而作行資不可得恐仍似去年之留滯耳故對梅栁而還動邊心來邵注女牆所以睥睨人故名睥睨古詩客從逺方遺我一端綺漢書一金值萬錢臆陶潛詩梅栁夾門植鄉詩秪攪我心杜邊心身在邊而心思也白帝城樓鶴注此是大厯二年歲晏作明年正月公遂出峽故有夷陵春起擬放扁舟之句江度寒山閣城高絶塞樓翠屏宜晚對白谷㑹深遊急急能鳴雁輕輕不下去聲鷗夷陵春色起漸擬放扁舟此詩登樓而有出峽之思在四句分截深公舊居西閣因上城樓而回望之晚對則返照增妍遊則佳境遍厯此樓前所見者又以鳴雁輕鷗興起春日放舟此江邊所感者杜臆高與度對皆作活字用言樓之高由城高之也如白帝城最高樓可見思天台賦搏壁立之翠屏陳子昻詩不及能鳴雁徒海上鷗五六本此而語更工秀其莊子莊子舍於故人之家令豎子殺雁烹之豎子曰一能鳴其一不能鳴請奚殺主人曰殺不能鳴者江總詩終謝能鳴雁不列子海上有人每旦從鷗鳥游鷗鳥之至者百數而止其父曰鷗鳥從汝游汝取來吾玩之明日鷗鳥舞而不下也有歎鶴注當是大厯二年冬作自詩云兵鬭蓋指吐蕃之亂原注云傳蜀官軍普還却另是一事壯心久零落白首寄人間天下兵常鬭江東客未還窮猿號平聲雨雪老馬怯一作望一作泣關山武德開元際蒼生豈重義從平聲讀協去聲攀上四言衰老而當亂離此發歎之故五六承客未還流落思歸也七八承兵常鬭亂極思治也注寄人間謂僑寓他鄉窮猿老馬自况流離失所盧此言武德開元而不及貞觀永徽者武德為唐治之始開元為唐治之終舉高祖明皇以該二宗也末聨亦猶下泉之念周京歟鶴注江東客公自謂峽盧注水經云江水東徑赤甲又東徑魚復又東徑巫又東徑䕫城故曰江東客非弟豐在江左之謂朱注引元日詩不見江東客為證非是從晉書窮猿投林管子老馬之智可用杜臆老馬句胡馬依北風來比思歸之意舍弟觀赴藍田取妻子到江陵喜寄三首鶴注此當是大厯二年冬作為邵注天寶初荆州江陵汝迎妻子達荆州消息真傳解我憂鴻雁影來連峽內鶺鴒飛急到沙頭嶢關險路今虛逺禹鑿寒江正穩流朱紱即當隨綵鷁青春不假報黃牛首章弟到江陵而喜下半敘欲往之志則鴻雁影來承消息句鶺鴒飛急承荆州句弟到沙頭嶢關不見其逺矣身在寒江則穩流正可出峽矣從此乘舟東下無煩報書峽中也張衣朱紱而乘彩鷁兄弟骨肉須作此慰勞語不嫌侈也此詩末二句與即從巴峽穿巫峽便下襄陽向洛陽語意相似但彼詩語勢軒豁此將朱綵青黃作對不免拙滯矣禮記雁行比先後有序毛詩鶺鴒比急難相須故以二鳥喻兄弟古詩兄弟雁行序方輿勝覽沙頭市去江陵十五里堯嶢關即藍田關從藍田迎妻子必經嶢關之險嶢音故與禹作借對漢髙帝紀秦王子嬰遣將將兵據嶢關嶢關在上洛北藍田南武關之西坡長安志杜氏通典曰七盤十二䋫藍田之險路也䋫在縣東南帝庾信詩春江下白畫舸向黃牛馬度一作瘦秦山一作關雪正深北來肌骨苦寒侵他鄉就我春生色故國移居見客心歡劇一作賸欲提擕如意舞喜多行坐白頭吟巡簷索先則切共一作近梅花笑冷蘂一作落疏枝半不禁平聲之意次章憫弟逺來之情下半寫喜慰盧世㴶曰他鄉就我故國移居還題明淨而意更溫深歡劇喜多尚與弟相隔許程於是步繞檐楹索梅花共笑此時梅花半開即冷蘂疏枝亦若笑不能禁矣說得無情有情極迂極切說他鄉指江陵故國指藍田弟在客途故云客心世王戎好作如意舞吟朱瀚曰孔德紹夜宿荒村詩勞歌欲敘意終是白頭袁朗秋夜獨坐詩如何悲此曲坐作白頭吟六朝人皆通用不必專屬文君索煬帝幸江都詩鳥聲爭勸酒梅花笑殺人笑句本此黃生曰浣花溪裏花饒笑肯信吾兼吏隱名言其不信已衷巡簷索共梅花笑冷蘂疏枝半不禁言其善㑹人意此嚴滄浪所謂詩有别趣非關理也庾信羅含俱有宅春來秋去作誰家短牆若在從殘草喬木如存可假花卜築應平聲同蔣詡徑為園須似邵平瓜比必二切年一作因病一作斷酒開涓滴弟勸兄酬何怨嗟三章謀卜居江陵下半喜同室聚首也一庾羅舊宅久厯春秋未知今屬誰家倘故宅猶存雖草一木亦不忍傷也若須别為營構亦當開蔣經以延客學邵瓜而治生兄弟勸酬乃豫道新居樂事庾信羅含就江陵而言蔣詡邵平本長安人物公以故里先賢偶憶及之非謂欲卜居長安也黃生曰此借先賢舊宅以寓意乃見詩腸之曲詩趣之靈在庾信因侯景之亂自建康遁歸江陵居宋玉故宅宅城北三里羅含為桓溫别駕於江陵城西三里小洲上立茅屋而居布衣蔬食宴如也從任從也蔣詡舍前竹下開三徑惟求仲羊仲從之遊為兖州刺史及王莽居攝以病免歸田里邵平瓜注見四卷王制比年一小聘盧世㴶曰三詩句句是喜句句是寄若竟像對面浹洽語便不是寄矣朱瀚曰一首云解我憂二首云歡劇喜多三首云何怨嗟顧題中喜寄二字次第天然夜歸鶴注此詩作於大厯二年瀼西夜半歸來衝虎過山黑家中已眠卧傍見北斗向江低仰看明星當空大唐佐切庭前把燭嗔一作喚兩炬峽口驚猿聞一箇白頭老罷舞復扶又切歌杖藜不睡誰能那奴卧切必上六夜歸之景下二夜歸感懷以杜臆公深夜歸舍有不如意事而又未易語人所杖藜不睡而舞復歌也又云一炬足矣兩則多費故嗔之旅居貧態也爾雅明星謂之啓明太白星也晨見東方為啓明昏見西方為太白劉後漢廉范傳令軍士各縛兩炬三頭舉火王粲為表與袁紹書又弱一箇姜氏蔡興宗傳范慶宗曰老罷私門兵力頓闕此左傳棄甲則那那何也黃生注那開口呼即奈字對家人促睡之語亦見深夜無聊之况王嗣奭曰黑夜歸山有何情致而身所經心所想耳目所聞見皆人所不屑寫而畢寫於詩却字字靈活語語清亮恍覺夜色凄然夜景寂然又是人人所不能寫者唯情真故妙也前苦寒行二首據次章之說是公兩遇白帝之雪明係大厯二年冬作黃鶴引舊唐書永泰元年正月癸巳雪盈尺二年正月丁已朔大雪平地二尺遂以此詩為大厯元年作誤矣史所記雪乃長安事恐與䕫州不同苦古今樂録王僧䖍技録清調有六曲一寒行漢時長安雪一丈牛馬毛寒縮如蝟楚江巫峽冰入懷虎豹哀號平聲又堪記秦城老翁荆揚客慣習炎蒸歲絺綌𤣥冥祝融氣或交手持白羽未敢釋此䕫州遇雪而作也長安雪寒古以為災巫峽冰寒今更可異乂歎南方經歲常暖而今則地氣忽變矣冰入懷冷氣切膚虎豹號雪中無食秦翁荆客公自北而南𤣥冥祝融謂冬夏相似牛西京雜記元封二年大寒雪深五尺野中鳥獸皆死馬踡局如蝟三輔人民凍死者十有二三傳炙轂子蝟似鼠性獰鈍物少犯則毛刺攢起賈誼孔子曰習慣如自然首白羽指扇見卷䂬溪詩話曰諸史傳稱名首尾一律惟左氏傳春秋千變萬狀有一人而稱目數異者族氏名字爵邑諡號皆密布其中以寓褒貶此史家祖也觀少陵詩亦隱寓此㫖如杜陵有布衣自為青城客長安布衣誰比數韋曲幸有桑麻田肯訪浣花老翁無東郭先生住青丘秦城老翁荆陽客杜子將北征臣甫憤所切甫也東西南北人有客有客字子美蓋自見其里居名字也不作河西尉率府且逍遙白頭拾遺徒步歸曽為椽吏趨三輔幕府初交辟凡才汚省郎其補官遷徙厯厯可考至敘他人亦然如云粲粲元道州又云結也實國楨凡例森然誠春秋之法也去年白帝雪在山今年白帝雪在地凍埋蛟龍南浦縮寒刮一作割肌膚北風利楚人四時皆麻衣楚天萬里英華作頃無晶輝三尺之烏足英華作骨恐斷羲和送之將安歸從英華一作迭送將安歸郭作送將安所歸一作送將何所歸此記連歲雪寒也雪在山寒氣尚微雪到地祁寒甚矣未見日色陰霾而設為慨歎之詞和冬日無光豈日烏畏寒而羲和使之匿影耶此與羲冬馭近愁畏日車翻同屬憑空想像語辭詩麻衣如雪送古今注日中無光者三足烏也楚登山臨水兮將歸晚晴鶴注當是大厯二年䕫州作髙唐舊作堂師尹改作唐暮冬雪壯哉舊瘴無復扶又切似塵埃崖沉谷沒白皚皚魚開切江石缺裂青楓摧從積雪敘起崖地皆積雪故谷隱雪中露石故狀似裂雪壓楓林故勢若摧劉歆遂初賦漂積雪之皚皚南天三旬苦霧開赤日照耀從西來六龍寒急光徘徊照我衰顔忽落地口雖吟咏心中哀未怪及時少去聲年子揚睂結義黃金臺汩音聿一作洎乎吾生何飄零支離委絶同死灰此晚晴有感老冬晷短則寒急夕影斜故落地傷暮年故心哀未言少意氣不同對景而自傷也此章上假四句下段九句來舞鶴賦嚴嚴苦霧揚六龍日馭也徘徊往盧思道集抵掌睂髙視濶步漢髙后紀摰虞答杜育詩好以義結友以文㑹兮燕昭王築黃金臺以禮郭隗離騷汩余若將弗及汩去貌疾若流水莊子支離既久灰又心可使如死杜詩歌行前半段多隔句用韻後半段多叠句用韻此篇前俱叠韻後反隔韻又另一變體也復扶又切陰此與上章同時作方冬合沓𤣥陰塞先則切昨日晚晴今日黑萬里飛蓬映天過孤城樹羽揚風直江濤簸一作欺岸黃沙走雲雪埋山蒼兕吼君不見䕫子之國杜陵翁牙齒半落左耳聾此為既晴復陰而作也上六冬陰悽慘之象下二老年作客之感盧注齒落耳聾欲付之不議不聞矣謝惠連雪賦𤣥陰疑不昧其潔鮑照詩蒼兕號空林後苦寒行二首蔡氏編後苦寒在晴陰二詩之後次第時清詩云天兵新斬青海或大厯二年吐蕃寇邠靈州故云然黃鶴指永泰元年者非也南紀巫廬瘴不絶太古以來無尺雪蠻夷長子兩切老畏一作怨苦寒崑崙天關凍應平聲一作欲折𤣥猿口噤不能嘯白鵠翅垂眼流一作出血安得春泥補地裂此章寫雪寒之苦末句寒極思春乃道其常撰舊注巫廬二山南國之綱紀也唐天文志李淳風法象志以天下山河分為兩戒北紀所以限戎狄南紀所以限蠻夷山鶴注巫廬合二山而言然廬山在大江之南未若巫之迫於炎瘴長楊賦云順斗極運天關橫巨海溧崑崙李善注天官星占云北辰一名天關今按崑崙天關欲折言天上地下皆凍也杜臆謂天關當是天柱之别名引山海經為證天不足西北燭龍銜火以照天門天門即天關也夢弼云崑崙山為天柱崆峒山為天關銜世說南州謂之炎方地溫無雪樂府飛鵠行吾欲汝去口噤不能開坼月令仲冬之月氷益壯地始荀恱漢紀序天開地裂晚一作曉來江門一作間一作邊失大木猛風中夜吹英華作飛白屋天兵斬斷英華作新斬青海戎殺氣南行動坤軸不爾苦寒何太一作其酷巴東之峽生凌澌一作澌非彼蒼回斡烏滑切舊作軻一作軒人一作那得知次章寫風寒之苦末言峽水生冰乃慮其變兵臨青海殺氣南行此想其現在巴峽生凌蒼天難測此患其將來中間不爾句極抑揚頓挫之情是年五月楊子琳襲成都崔寬攻破子琳果有兵戈之事知變不虛生矣語朱注謂巴東冰解知彼蒼有旋轉之機却與上章結同意且詩云生凌未嘗言解凍也凌吳志孫堅謂張溫曰明公親率天兵冰也說文澌流冰也張溍曰合前後苦寒四首觀之命意用筆善於轉換無一重復處此可悟詩文活法元日示宗武黃鶴編在大厯三年正月元日五據次章言十五男兒志時年蓋十歲矣汝啼吾手戰吾笑汝身長處處逢正月迢迢滯逺方飄零還柏酒一作漿一作葉衰病只藜牀訓諭一作喻青襟子名慚白首郎賦詩猶落筆獻夀更稱觴不見江東弟原注第五弟漂泊江左近無消息髙歌淚數行户郎切子首章敘元日情事景首言父末及兄弟中皆觸而傷懷手杜臆啼手戰見子孝笑身長見父慈賦詩落筆應前戰故用猶字獻夀稱觴因上柏酒故加更字進世說桓公讀詔手戰流汗椒柏酒凡飲次第從小起宗凛嵗時記正月一日庾肩吾詩聊用柏葉酒且具五辛􅌉之管寧家貧坐藜牀欲穿純詩青青子襟注青領學子所服鄭箋禮父母在衣以青王粲詩馮公豈不偉白首不見招潘嶽賦稱萬壽以獻觴此詩皆悲喜並言啼手戰是悲笑身長是喜逢正月是喜滯逺方是悲對柏酒是喜坐藜牀是悲子可教是喜身去官是悲賦詩稱觴又是喜憶弟淚行又是悲只隨意序述而各有條理又示宗武與上章同時作覓句新知律攤書解五買切滿牀試吟青玉案莫羡一作帶紫羅囊暇一作假日從時飲明年共我長應平聲須飽經術已似愛文章十五男兒志三千弟子行戶郎切曽參與游夏達者得升堂次章專言訓子之意文覓句攤書武知學矣飽經術以發為章此進一層語法先賢之孝行文學又進一層語酒青玉案謂古詩紫羅囊指戲具暇日方飲戒其母縱以曠時吳論末句即所云學無先後達者為先也晉張衡四愁詩美人贈我錦繡段何以報之青玉案書謝𤣥少好佩紫羅香囊叔父安患之而不欲傷其意因戲賭取之遂止楚辭聊假日以偷樂兮賈逵國語注暇閒也或為假師氏云假是休假之假士焦仲卿妻詩新婦初來時小姑如我長孔融書朝益重經術十五句暗用孔子十五志學語顗史記孔子以詩書禮樂教弟子蓋三千焉後漢郎疏通游夏之藝履顔閔之仁家語衛將軍文子問於子貢曰入室升堂者七十有餘人胡夏客曰詩云覓句新知律又云試吟青玉案或疑公有譽兒癖非也宗武定是有才若宗文則但使樹雞柵耳後宗武之子嗣業能葬祖乞志不墜其家聲云胡應麟曰雲仙雜記云甫子宗武以詩示阮兵曹阮答以石斧一具併詩還之宗武曰斧父斤也欲使我呈父加斤削耶阮聞之曰欲令自斷其手耳不爾天下詩名又在杜家矣此事甚新然史傳不載宗武詩詩亦竟不傳豈三世為將道家所忌哉杜嘗命宗武熟精文選又作詩屢令其誦友人之言宜有可信者惜無從互證之逺懷舍弟頴觀等張逺注此詩亦元日所作因前詩不見江東弟句故又有此詩觀落句舊時元日㑹可見陽翟空知處荆南近得書積年仍逺别多難去聲不安居從頴觀敘起矣二句分承頴在陽翟仍逺别矣觀赴荆南不安居唐書陽翟縣貞觀元年屬許州龍朔二年𨽻洛州亂多難謂遭喪江漢春風起冰霜昨夜除雲天猶錯莫花萼尚蕭疏對酒都疑夢吟詩正憶渠舊時元日㑹鄉黨羡吾廬下乃元日感懷兄風起霜除新正氣候雲天言異地花萼比弟對酒疑夢憶弟難見也段錯莫謂紛錯冥莫舊時元日傷今而思昔形此章上四句下段八句梁范靜妻沈氏詩神往返情錯漠語鶴注渠猶言伊蓋陳梁以來庾信詩無事教渠莫相失續得觀書迎就當陽居止正月中旬定出三峽此亦大厯三年歲初所作府唐書當陽縣屬荆州自汝到荆府書來數色角切喚吾頌椒添諷詠禁火卜歡娛一作呼來首記續得觀書期頌椒屬正月禁火屬寒食此接書而計歡聚之世說謝安謂謝萬曰汝為元帥宜數喚諸將宴㑹司烜氏仲春修火禁於國中頌椒注見本卷也周禮為季春將出火荆楚歲時記寒食禁火三日舟楫因人動形骸用杖扶天旋䕫子峽一作國春近嶽陽湖發日排南喜傷神散北吁飛鳴還接翅行户郎切序密銜蘆此敘出峽之意舟天旋陽和初轉發日發行有日排而南則離散於北矣接翅喻隨肩而行銜蘆喻旅中防患皇杜臆公本北人以江陵為南方喜而忽吁即下文覬都意嶽陽湖在巴陵詩魏略孫權稱臣太子與鐘繇書曰得報知喜南方題彼鶺鴒載飛載鳴淮南子雁順行以愛氣力銜蘆而翔以避矰弋俗薄江山好時危草木蘇馮唐雖晚達終覬在皇都末及當陽風土而終思北歸也此章起結各四句中間八句陳輔之曰柳遷南荒云愁向公筵問重譯欲投章甫作文身李白云我似鷓鴣鳥南遷懶北飛皆褊忮躁辭非畎畎惓惓之義杜詩馮唐雖晚達終覬在皇都又愁來有江水焉得北之朝賦張曲江云歸老守故林戀闕悄延頸其乃心王室可知太歲日鶴注此是大厯三年正月初三日作日舊書是年正月丙午朔則戊申乃初三也為潘鴻曰太歲日疑當時以是慶故詩有閶闔衣冠等句楚岸行將老巫山坐復扶又切春病多猶是客謀拙竟何人此撫時有感於陸機云吾將老而為客何竟何言不得比何人祖延年詩存歿竟人閶闔開黃道衣冠拜紫宸榮光懸日月賜豫上聲一作與出金銀愁寂鴛行户郎切斷參初金切差此兹切虎穴鄰西江元下去聲蜀北斗故臨秦此傷不與朝班也令上四思朝事下四念歸京楚辭吾帝閽開關兮倚閶闔而望豫大人賦排閶闔而入帝居道漢天文志日有中道中道者黃道一曰光道晉志黃日之所行也半在赤道外半在赤道內家宋之問詩清蹕喧黃道乘輿降紫宸後漢書朱暉世衣冠鶴注唐紫宸殿正殿之名李鋭上疏紫宸殿者周之路寢漢之前殿也雲尚書中候帝堯之時榮光出河休氣四塞江淹詩青浮洛榮光四塞齊書永明中天忽黃色照地王融上金天頌王摛曰是非金天所謂榮光武帝大悅易懸象著明莫大乎日月黃蜀志先主取蜀城中金銀錢賜將士北齊樂曲懷綰白鴛鷺成行楚辭憭兮栗虎豹穴為趙曰䕫州近虎狼之穴楚人謂蜀江西江舊注秦城上直北斗散地逾髙枕生涯脫要津天邊梅柳樹相見幾回新末歎流滯䕫江也髙枕謂多病脫要津不得仕朝天邊指楚岸幾回新應坐復春戈此章起結各四句中間八句王弼明爻通變例投散地舊注散地間散之地詩張良傳君安得髙枕而卧也古先據要路津詩家採用成語有增字減字法而工拙不同如庾信詩地中鳴鼓角天上下將軍駱賓王賦云隱隱地中鳴鼓角迢迢天上出將軍此增五字為七字而精警不及王維詩漠漠水田飛白鷺陰陰夏木囀黃鸝李嘉祐詩云水田飛白鷺夏木囀黃鸝此減七字為五字而風韻不如王維詩九天閶闔開宫殿萬國衣冠拜冕旒杜云閶闔開黃道衣冠拜紫宸則節去二字而語更清徑薛據詩省署開文苑滄浪學釣舟杜云獨當省署開文苑兼泛滄浪學釣舟則增加兩字而句便流逸用語入化全係乎作者身分也人日二首鶴注此大厯三年作客蔡絛詩話都人劉克窮該典籍嘗與論云子美人日詩元日到人日未有不陰時人知其一不知其二起就架上取書示客曰此東方朔占書也歲後八日一日為雞二日為狗三日為豕四日為羊五日為牛六日為馬七日為人八日為榖其日晴主所生之物育陰則災少陵意謂天寶離亂四方雲擾人物歲歲俱災豈春秋書王正月意耶申涵光曰此詩首二句紀實也舊注引東方朔占書以證天寶亂離人物俱災鑿之極果爾則八日為穀較餘日尤要獨不言陰何耶元日到人日未有不陰時冰雪鶯難至春寒花較遲雲隨白水落風振紫山悲蓬鬢稀疏久無勞比素絲首章感人日陰寒而作也絲上四寫陰慘氣象下乃觸景而增憂杜臆昔此素蓬鬢猶在今又稀疏愧於素絲矣山海經白水至蜀而東南注江入江州城下江州縣屬巴郡後漢地志紫巖山綿水之所出此日此時人共得一談一笑俗相看平聲樽前柏葉休隨酒勝裏金花巧耐寒佩劎衝星聊暫拔匣琴流水自須彈早春重平聲引江湖興去聲直道去聲無憂行路難次章當人日而思出峽也休人共得舉世同此人日俗相看流俗相沿為樂柏葉隨言元日巳過金花耐寒見人日尚陰杜臆琴劎乃作客隨行之物醉後拔劎鳴琴則江湖興動直謂行路無難矣直道句舊引忠信可涉風波解作直道而行者非是直道處世固屬正理但用之此詩却非本意當時一救房琯十載流離嘗云薄俗防人面又云全生狎楚童艱難險阻備嘗之矣豈敢自矜其直與世無患哉李夢陽詩中年獨覺滄洲穩直道誰非行路難是翻用杜句却是錯看杜句令崔實四民月令元日進椒柏酒椒是玉樹星精服之人却老柏是仙藥能駐年却病尊卑次列以年少者為先各飲畢遂獻尊人長夀庾信詩柏葉隨銘至椒花逐頌來荆楚歲時記日剪綵為人或鏤金箔為人以貼屏風亦戴之頭鬢賈充李夫人典戒人日造華勝相遺像瑞圖金勝之形又像西王母戴勝也漢書注勝婦人首飾漢代謂之華勝杜臆勝取人勝人之意沈佺期詩百福香奩勝裏人晉輿服志自天子至百官無不佩劎有紫氣雷煥曰寶劎之精上徹於天晉書牛斗之間吕氏春秋伯牙鼓琴志在流水鍾子期曰善哉湯名湯乎若流水行路難古樂府曲兩詩本同時所作前見咎徵有憫時之意此對習俗有玩世之情他注照上章作慨歎語者太拘喜聞盜賊總退口號平聲五首吐蕃之退在大厯二年冬詩作於三年之春觀末章可見蕭關隴水入官軍青海黃河卷塞雲北極晉作闕轉愁一作湥龍虎氣西戎休縱犬羊羣首章喜王師能禦冦也於蕭隴軍入路嗣恭殲鹵此也河海雲卷塞外之風烟已靜矣時宦官典兵內憂方切故云北極轉愁吐蕃暫退而禍根未除故曰西戎休縱受按逺注龍虎軍蓋禁旅也此時魚朝恩掌禁兵中外制公故深愁之此從來無人注及者鶴注蕭關與靈州相近正指吐蕃冦靈州西路嗣恭破之也海趙曰蕭關在靈州之傍隴水則隴州之水又曰青在西蕃之地黃河則自積石而往贊普多教平聲使去聲入秦數音朔通和好止一作尚煙塵朝音潮廷忽用哥舒將去聲殺伐虛悲公主親此追咎邊將之起釁者當時吐蕃請和正可息兵自哥舒翰迎合上意縱兵恣殺而邊釁從此開矣據此章則哥舒翰當服善戰之刑前贈哥舒翰開府詩又盛誇其武功能免諛詞乎皇唐書開元末金城公主薨吐蕃遣使告哀因請和明不許天寶七載以哥舒翰節度隴右攻拔石堡城收九曲故地崆峒西極一作北過崑崙駝馬由來擁國門逆氣數年吹路斷蕃人聞道去聲漸星奔此記吐蕃叛服之不常也命駝馬入貢往時歸順自逆數年而今乃奔散喜之也其趙注崆峒在西郡之西崑崙又在崆峒西極之西言從化之地逺也謝瞻書裹糧擕弱匍匐星奔廣絶交論靡不望影星奔勃律天西采玉河堅昆碧碗最來多舊隨漢使去聲千堆寶少一作小答胡晉作朝王萬匹羅此憶往時和戎之有道也勃律采玉堅昆碧碗來多答少此朝廷羈縻逺夷之法惜今不可復見耳唐書大勃律直吐蕃西與小勃律接小勃律去京師九千里而贏距吐蕃牙帳東八百里中酉陽雜俎天寶初安思順進五色玉帶又於左藏庫得五色玉杯上怪近日西賮無五色玉命責安西諸蕃蕃言比常進皆為小勃律所劫上怒欲征之羣臣多諫獨李右座林甫贊成上意且云武臣王天運謀勇可將乃命將四萬人兼統諸蕃兵伐之及逼城勃律君長恐懼請罪悉出寶玊願歲貢獻天運不許即屠城虜二千人及其珠璣而還勃律中有術者言將軍無義不祥天將大風雪矣行數百里忽風四起雪花如翼風吹小海水成氷柱起而復摧經半日小海漲湧四萬人一時凍死惟蕃漢各一人得還具奏帝大驚異即令中使隨二人驗之至小海側冰猶峥嶸如山隔冰見兵士死立者坐者瑩徹可數中使將反冰忽消釋衆尸亦不復見其師氏曰晉平居海為張鄴使于闐判官作行程記云國采玉之地玉河在于闐城外其源出崑山西流一千三百里至于闐界牛頭山乃流為三河一曰白玊河在東二曰緑玉河在城西三曰烏玉河在緑玉河西其源雖一而其玊隨地而變每嵗五六月大水暴漲則玊隨流而至至秋水退乃可采人謂之撈玊荒唐書堅崑國在康居西葱嶺北寰宇記黠戛斯西北之國也本名結骨又名居易又謂之堅昆酉陽雜俎堅昆部落其上代有神與㹀牛交而生其人髮黃目緑赤髭髯其髭髯俱黑者漢將李陵及其兵衆之後也碧碗琉璃碗今春喜氣滿乾坤南北東西拱至尊大厯三一作二年調玉燭𤣥元皇帝聖雲孫末章備述喜慶之意雲南北東西喜皇圖無外玊燭孫喜太平有象角封演聞見記唐高祖武德三年晋州人吉善行于羊山見白衣老父呼謂曰為吾語唐天子吾是老君即汝祖也今年無賊天下太平高祖即遣使致祭立廟其地唐書高宗乾封元年幸亳州詣老君廟追尊為𤣥元皇帝開元二十九年制兩京諸州各置𤣥元皇帝廟天寶元年陳王府參軍田同秀上書𤣥元皇帝降于丹鳯門之通衢告錫靈符在尹喜故宅上遣使就函谷關尹喜臺西發得之乃置𤣥元廟于大寧坊東都于積善坊臨淄舊邸親享新廟元黃鶴曰天寶二年三月壬子親祀𤣥元廟改西京𤣥廟為太清宫東京為太微宫天下為紫微宫鰲按唐以老君為聖祖封𤣥元皇帝也爾雅𤣥孫之子為來孫來孫之子為晜孫晜孫之子為仍孫仍孫之子為雲孫注言輕逺如浮雲也詩以絶句記事原委詳明此唐絶句中另闢手眼者送大理封主簿五郎親事不合却赴通州主簿前閬州賢子余與主簿平章鄭氏女子垂欲納采鄭氏伯父京書至女子已許他族親事遂停送大理至通州三句詩題已盡下數句申明親事不合之故唐此詩鶴注編在大厯三年正月未出峽時作書大理寺主簿二人從七品上通州通川郡屬山南西道太平廣記天寶中范陽盧子夢謁其從姑姑訪盧未婚曰吾有外甥女姓鄭甚有容質當為兒平章據此則平章唐人通好語也禁臠去東床趨庭赴北堂風波空逺涉琴瑟幾音洎虛張首段敘事還題為風波句承北堂琴瑟句承東床但晉謝混傳孝武帝晉陵公主求婚謂王珣曰主壻如劉真長王子敬便足珣曰謝混雖不及員長不減子敬未幾帝崩袁嵩欲以女妻之珣戲曰卿莫近禁臠初元帝始鎮建業公私窘罄每得豚以為珍膳項下一臠尤美輒以薦帝呼為禁臠故珣因以為戲混竟尚主王羲之傳郤鑒使門生求女壻於王導子弟咸自矜持唯一人在東床坦腹卧乃羲之也士昏禮婦洗在北堂注房半以北為北堂者房室所居之地總謂之堂朱曰赴北堂封至通州省毋也詩琴瑟友之又妻子好合如鼓瑟琴幾及也渥水出騏驥崑山生鳯凰兩家誠欵欵中道許蒼蒼頗謂秦晉匹從來王謝郎此記封鄭約婚之事騏驥閬州子鳯凰鄭氏女蒼蒼指天以誓也秦晉王謝比􅊚婭相敵詩東京賦鳴女床之烏鳥舞丹穴之鳯凰繁欽定情中情既欵欵卑莊子蒼蒼者天之正色耶族左傳秦晉匹也何以我晉江左以王謝為胄嘗通婚姻青春動才調去聲白首缺輝光玊潤終孤立珠明得暗藏餘寒拆花卉恨别滿江鄉此惜其停婚而去也郎青年負才而白首未諧在封則孤立無耦在鄭女則暗藏失所矣花折記别時江鄉記别地此章四句起下二段各六句晉史論王接才調秀出見賞知音婦晉史樂廣人謂之冰鏡壻衛玠時號玊人議者以為公冰清女壻玉潤漢書鄒陽傳明月之珠暗投於道將别巫峽贈南卿一作鄉兄瀼西果園四十畝鶴注此大厯三年正月作園仲長統曰場圃築前果樹後苔竹素所好去聲萍蓬無一作不定居逺遊長子兩切兒子幾地别林廬首述行踪竹幾地自秦而蜀又自閬而䕫也杜臆苔萍蓬凑合生新海賦萍流而蓬轉雜蘂黃生曰蘂當作果紅相對他時錦不如具舟將出峽巡圃念擕鋤正月喧鶯未兹辰放鷁初雪籬梅可拆之舌切風榭柳微舒此敘果園之勝在果紅如錦憶從前秋色雪梅風柳寫現春光鶯未喧而鷁初放記臨别時候公於此園有不勝低徊繾綣之意焉託贈卿家有因歌野興去聲疏殘生逗一作逼江漢何處狎樵漁末贈園而兼敘情無離園則林泉興少恐復漁樵之侣矣之此章首尾四句中間八句合洛陽伽藍記山情野興士遊以忘歸說文逗投也陰鑑詩行舟逗逺樹趙次公曰果園四十畝公直舉以贈人此一假美事而古今未嘗揄揚其美可歎也鍾惺曰以果園贈好友全寫出一片愛惜鄭重之意方見詩人情趣若說作輕棄所有反覺尋常膚淺矣胡孝轅曰八韻詩除梅柳一韻外並語對意不對極貫珠之妙留陸放翁有野飯詩自注云杜氏家譜謂子美下峽一子守浣花舊業其後避亂成都徙睂州大埡或徙大蓬云今按當時若留子在䕫應見於詩章集中既無或譜說未可信耶巫山縣汾州唐使去聲君十八弟宴别兼諸公擕酒樂相送率題小詩留於屋壁鶴注此大厯三年正月作唐書巫山縣屬䕫州九域志縣在䕫州東七十二里朱注唐十八先為汾州刺史時貶施州卧病巴東久今年强丘兩切作歸故人猶逺謫兹日倍多違接宴身兼杖聽平聲歌淚滿衣諸公不相棄擁别借光輝首二經巫山縣三四别唐使君五六宴時酒樂七八諸公送别黃生曰稱唐為故人其餘以諸公槩之筆下自分涇渭對故人語極悲凉對諸公語如欣荷悲凉者情真欣荷者意泛公詩言取别隨厚薄其此之謂歟者擁别㑹别多人也敬寄族弟唐十八使去聲君鶴注前有唐十八使君宴别詩蓋下峽時與唐相别於巫山此是既别之後唐寄書而公賦詩以簡之時猶未出峽也公萬年縣君杜氏墓銘其先系統於伊祁分姓於唐杜師古曰唐太原晉陽縣也杜京兆杜縣也左傳豕韋唐杜與劉氏皆出陶唐後故於唐使君劉判官皆稱為弟而各敘淵源與君陶唐後盛族多其人聖賢冠去聲史籍枝派羅源津在今氣一作最磊落巧僞莫敢親介立實吾弟濟時肯殺身首敘唐之世譜人品操聖賢承盛族枝派承唐後磊落氣概不羣介立節過人濟時謂其能忘身救世後鶴注唐宰相世系表杜氏出祁姓帝堯裔孫劉纍之在周為唐杜氏成王滅唐以封弟叔圉改封唐氏子孫於杜城京兆杜陵是也然則唐與杜蓋同族也生文心雕龍慷慨以任氣磊落以使才荀恱漢紀僞於多巧固顔延之陶徴士誄物尚孤生人介立論語殺身以成仁物白諱受玷行去聲高無汚去聲真得罪永泰末放之五溪濱鸞鳯有鎩所拜切翮先儒曽音層抱麟雷霆劈長松骨大却生筋此敘其到䕫之故行髙無汚言素能自守知五溪放逐非其罪也鎩羽抱麟言遭時不幸長松筋骨言窮而益堅詩白圭之玷尚可磨也鎩漢黃瓊疏皎皎者易汚西五君咏鸞翮有時劉琨詩宣尼悲獲麟狩涕孔丘一失不足傷念子孰蔡云與熟同自珍泊舟楚宫岸戀闕浩酸辛除名配清江厥土巫峽鄰登陸將首去聲途筆札枉所申此記其往施情事之自珍言窮當愛身酸辛謂去不忘君貶清江憫流離迹枉手札感念舊之情王僧孺書除名為民幅巾家巷縣配乃流配一禹貢厥土惟白壤一九域志施州清江北至州界百里自界首至䕫百二十五里漢朱注首塗言將赴貶所茍恱紀尚書給筆札歸朝音潮局病肺敘舊思重平聲陳春風洪濤壯谷轉頗彌旬我能泛中流唐突鼉獺嗔長子大切年已省柂慰此貞良臣結出贈詩之意病中思友方將往候惜為風濤所阻耳今泛流觸險將理柂而行矣先寄此以慰故人也此章四段各八句劉琨詩棄置勿重陳中顔延之詩春江風濤壯唐江賦􅌉渦谷轉詩泛彼流任昉箋惟此魚目突璠璵洙曰長年操舟者視柂則將行矣省視也春夜峽州田侍御長子兩切史津亭留宴得筵字大鶴注此厯三年正月作津亭在峽州又詩云津亭北望孤即此北斗三更平聲席西江萬里船杖藜登水榭揮翰宿春天白髮煩一作須多酒明星惜此筵始知雲雨峽忽盡下牢邊上四留宴之事下四惜别之情也三更留席為餞長行也水榭指津亭揮翰同賦詩峽盡下牢從此分手矣杜崔湜詩水榭宜時涉山樓向晚看處詩明星有爛臆前詩有上牢下牢語注未詳其讀是詩知下牢設關峽州而巫山之峽亦盡於此也峽州本冶下牢戍又夷陵縣有下牢鎮大厯三年春白帝城放船出瞿唐峽久居䕫府將適江陵漂泊有詩凡四十韻鶴注詩言舟行所經之地至宜都而止則此詩作於宜都也舉按詩本四十二韻目四十者成數言耳老向巴人裏今辭楚塞隅入舟翻不樂音洛解纜獨長吁從䕫州放船敘起身公久欲出峽及登舟後仍不樂而長吁者感懷在於世玩末二段可見左傳巴人伐楚修可曰䕫為中巴舟江淹詩奉詔至江漢始知楚塞長謝靈運詩入陽已微又解纜乃流潮窄轉深啼狖虛隨亂浴一作落鳬石苔凌几杖空翠撲肌膚疊壁排霜劎奔泉濺水珠杳冥藤上下濃淡樹榮枯神女峰娟妙昭君宅有無曲留明怨惜一作别夢盡失歡娛此言放船佳景二峽窄船轉時聞猿狖啼深虛舟隨水每見浴鳬驚亂句山水並言石苔若凌几杖空翠直撲肌膚二句舟行傍岸峭壁排劎飛泉濺珠藤垂上下樹間榮枯此舟中近見者神女之峰雲雨夢杳昭君之宅琵琶留恨此舟中逺望者多杜臆神女峰在目故云娟妙昭君宅未經故云有無恨少歡借二女以自慨也畏陳後主詩石苔侵緑蘚難空翠山中陰寒之氣病人其侵膚謝靈運詩空翠强名鮑照詩奔泉冬激射杳謝朓詩離離水上蒲結水散為珠謁江淹詩白雲上冥陸游入蜀記過巫山凝真觀妙用真人祠即世所謂巫山神女也祠正對巫山峰巒上插霄漢山腳直入江中神女峰最為竒峭盛𢎞之荆州記巫山有神女峰而寰宇記歸州巴東有王昭君宅失神女賦序寐夢之寤不自識惘兮不樂悵爾志擺闔盤渦沸欹斜激浪輸風雷纒地脉冰雪曜天衢鹿角真走一作趨險狼頭如跋胡惡灘寧變色髙卧負微軀書史全傾撓裝囊半壓濡生涯臨臬兀死地脫斯須此言放船經險盤渦之沸轟若風雷激浪所輸白如氷雪過鹿角狼頭寧免變色誠恐猝罹水患負此殘軀也傾壓幾危故以死地得生為幸擺擺闔欹斜舟行簸蕩之象日知録鬼谷子有捭闔篇捭古今字輸送也江賦流風蒸雷灘關令尹內傳地脉亦如之一統志鹿角狼頭虎鬚三在夷陵州最險左傳德則其人也不德則其鹿也鋌而走險急何能擇所水經注江水又東流狼頭灘其水並峻激奔暴魚鱉不能游其歌曰灘頭白浡堅相持倐忽淪沒别無期粲詩狼跋其胡於跋躐也胡頷下懸肉江淹詩揆日書史易困葛藟于臲卼廣韻臲卼不安也通作臬兀故史記致之死地而後生曹植詩變在斯須不有平川決作快焉於䖍切知衆壑趨乾坤霾漲海雨露洗春蕪鷗鳥牽絲揚去聲驪龍濯錦紆落霞沉緑綺殘月壞金樞泥筍苞初荻沙茸出小蒲雁兒爭水馬燕子逐􅧃烏絶島容煙霧環洲納曉晡前聞辨陶牧轉盻拂宜都縣郭南畿好原注路入松滋縣津亭北望孤此出峽所見景物平起二句反接陡健峽過則川矣因水行之快故知衆流所趨霾漲海形其渺茫洗春蕪言其嫩緑鷗鳥羣飛有類牽絲驪龍出水麗如濯錦落霞映於綺波殘月沒於金樞皆平川中變幻也荻筍舍泥蒲茸出沙雁爭水馬燕逐􅧃烏平川中生動之致也絶島之中能容烟霧環洲之外常納曉晡平川之大觀盡此矣陶牧可辨江陵近也宜都將拂夷陵至也出宜都縣郭則南畿在前登峽州津亭則長安在北蓋希曰荻筍蒲茸皆仲春時物而雁燕去來亦不同時放船在正月而作詩在二月公以三月至江陵故前後所見如此書何遜詩平川看逺鳥宋之問詩天香衆壑滿漢陳茂常渡漲海身列子千金之珠必在驪龍頷下沈懷逺南越志蟠龍長四丈青黑色赤帶如錦文謝朓詩餘霞散成綺樞周王褒詩殘月半山低處木華海賦大明㩠轡於金之穴注金樞西方月沒詩維筍及蒲爾雅筍竹之初生者陸璣云薍或謂之荻其初生三月中其心挺出其下如箸以鋭而細揚州人謂之馬尾其萌為虇郭云今江東人呼蘆筍為虇芽許慎說文云蒲水草也澤陂傳云蒲草柔滑茸乃之初出者朱注以為蒲花恐非是謝靈運詩初箟苞緑籜新蒲含紫芽雁兒爭食水馬蓋蝦蟲之類子瞻二蟲詩云君不見水馬兒步步逆流水大江東流日千里此蟲躍躍長流此或引江賦之㹀馬或引競渡之水車或引本草之海馬俱非周篆曰宋巴長卿妻李氏詩池中羅水馬庭下列蝸牛水馬對蝸牛疑即水靣四足蟲方以智物理小識云水馬能化蜻蜓則水鱉蟲耳非四足之水秀才也一名蝦扒蟲蜻蜓入水生子所化故復變為蜻蜓刻陰鏗詩亭嘶背櫪馬檣轉向風烏趙曰檣烏船檣上為烏形以占風者朱云此處檣烏當從舊注與西閣詩不同至謝靈運詩環洲亦玲瓏納曉晡猶言朝夕淮南子日於悲谷是為晡時杜臆曉晡即所謂日月出入其中此用三字括之簡妙縣登樓賦北彌陶牧注陶鄉名郭外曰牧荆州記江陵西有陶朱公冡趙真景書從容轉盻百杜臆宜都即夷陵在州東九十里而東抵江陵尚二五十里詩成於將到宜都時也水經注夷道縣漢武帝伐西南路由此出故曰夷道劉先主曰宜都唐書宜都縣屬峽州肅宗以江陵府為南都故曰南畿朱水經注江津戍南對馬頭岸北對大岸謂之江津口注此云津亭疑即江津之亭公有春夜峽州津亭留宴詩王勃詩津亭秋月夜庾信詩薊門還北望勞心依憩息朗詠劃昭蘇意遣樂音洛還笑衰迷賢與愚飄蕭將素髮汩沒聽洪爐丘壑曾音層忘返文章敢自誣此生遭聖代誰分去聲哭窮途卧疾淹為客䝉恩早厠儒廷爭義從去聲讀用平聲酬造化朴直乞江湖灔澦險相迫滄浪深可逾浮名尋已已懶計却區區此自敘漂泊苦情丘憩􅒚謂舟泊宜都衰迷謂老年混俗返故而著詩文此應前北望意窮途作客目前流落之感廷爭朴直前救房琯之事身到滄浪而奔走區區此應前南畿意丘壑曽忘返文章敢自誣是慰心語此生遭聖代誰分哭窮途是痛心語廷爭酬造化朴直乞江湖是愜心語天台賦朗詠長川以劃昭蘇謂忽然開豁記蟄蟲昭蘇未王粲傳鼓洪爐燎毛髮謝靈運詩昔余遊京師嘗廢丘壑也曽忘謂不曽忘陳誰分猶云誰料臣厠儒身列儒官前漢王陵傳平曰面折廷爭不如君酬造化言不負天地浪杜臆武當縣有川曰滄浪禹貢所云漢水東流為滄也字書尋俄也已已本楚狂已而已而羲之書俯仰悲咽實無已已世說何揚州曰使人情何能已已古詩一心抱區區喜近天皇寺先披古畫圖應平聲經帝子渚同泣舜蒼梧上文厯敘中途情景下文又寫到荆心事此四句乃上下關鍵注近寺披圖想古迹依然經渚泣帝傷聖治難逢原此寺有晉王右軍書張僧繇畫孔子及顔子十哲形像畫厯陵代名畫記張僧繇吳人梁武帝崇飾佛像多僧繇江天皇寺明帝置也內有柏堂僧繇畫廬舍那佛及仲尼十哲像帝怪問釋門之內如何畫孔聖僧繇曰後當賴此耳及後周滅佛法焚天下寺塔獨此殿以有宣尼像得不毁拆九歌帝子降兮北渚帝子堯二女湘夫人也蒼同泣欲與二妃同哭從記舜葬於梧之野而二妃未之焉朝音潮士兼戎服君王按湛盧旄頭初俶擾鶉首麗泥塗甲卒身雖貴書生道固殊出塵皆野鶴厯塊匪轅駒自此至末皆申明不樂長吁之故此為生遭世亂而思救時也此戎服按劎臣主俱憂總以吐蕃俶擾而長安塗炭耳時武夫得志儒術不尊豈知出羣厯塊吾道固堪濟世乎公之自負仍不淺矣吳孔融書朝士益重儒術趙國策武靈王好戎服越春秋越王允常使歐冶子作名劎五一曰湛盧允常以獻之吳吳公子光弒吳王􅒼湛盧去如楚晉天文志昴為旄頭為書俶擾天紀未晉天文志自東井十六度至柳八度鶉首於辰為秦之分野屬雍州淮南王安書甲卒不下數十萬頌世說嵇紹在稠人中昻昻如野鶴之在雞羣王褒過都越國蹶如厯塊前漢灌夫傳局趣作轅下駒伊吕終難降韓彭不易音異呼五雲髙太甲六月曠摶扶回首黎元病爭權將去聲帥誅山林託疲􅚿一作蒲非未必免﨑嶇此慨致治無人而憂叛將也者朝無伊吕大臣以故韓彭難馭今五雲之下鵬搏南徙將藉江陵以託迹矣但恐生民罷敝而將帥爭權又未免﨑嶇遷播耳然則漂泊將安止耶盧注謂伊吕指李泌歸隱張注謂韓彭指藩鎮跋扈來爭權將帥如成都之郭英乂崔旴互相殺伐襄陽之瑱裴茙謀奪節鎮皆是未幾湖南有臧玠之亂公之明炳幾先如此此章起首四句中腰四句前二段各十二句次二段各十八句後二段各八句越漢書贊履伊吕之列史記淮隂候韓信建成侯彭期㑹而擊楚軍至固陵信越之兵不㑹劉庭芝詩近取韓彭計兒胡夏客曰降用詩維嶽降神呼用史記呼大將如小朱注京房易候視四方有大雲五色具而不雨下有賢人隱五雲當用此太甲或出緯書未可强解是時公適荆南故用鵬徙南溟事以楊德周曰漢封禪書乃作畫雲氣車索隱曰畫青車甲乙畫赤車以丙丁畫𤣥車以壬癸畫白車以庚辛畫黃車以戊己宋書五色安車五色立車名五乘即五雲車也庾信詩北屬五雲車即指此西方畢宿晉分野正屬益州王勃碑文言華蓋西臨髙望五雲之車於太甲之象木車色青既以甲乙畫之又以甲寅候之實五車之首故云太甲甲乙皆天神之名太者尊之之至也太甲猶云太乙莊子鵬之徙於南溟也摶扶搖而上者九萬里去以六月息者也司馬云摶飛而上也上行風謂之扶搖沈佺期詩弱羽遽摶扶史前漢谷永傳天下黎民咸安家樂業記張耳陳餘據國爭權卒相滅亡按五雲髙太甲注家凡數說王伯厚困學紀聞云杜詩五雲髙太甲注不解五雲之義嘗觀王勃益州夫子廟碑云帝車南指遁七曜於中階華蓋西臨藏五雲於太甲酉陽雜俎謂燕公讀碑至此四句悉不解訪之一公一公言北斗建於七曜在南方有是之祥無位聖人當出華蓋以下則不可悉晉天文志華蓋在旁六星曰六甲分陰陽而配節候太甲恐是六甲一星之名然未有考證耳嚴滄浪詩話云太甲即太乙甲乙相近而誤用也董斯張曰此與廟碑華蓋西臨語不甚合考隋書天子有所遊往其地先發天子氣故如華蓋在霧中或有五色蒼帝起青雲扶日白帝起白雲扶日黑帝起黑雲扶日孔子周素王故子安以天子氣比之華蓋五雲之說當本於此魯分野在戍之奎婁奎為溝瀆婁為聚衆皆在西宫故曰華蓋西臨戌後天乾方也京氏易納甲以甲屬乾宫甲為歲陽首故曰太甲乃借爾雅太歲在甲字面也華蓋之氣一臨乾甲五帝五雲皆逡巡不敢方駕所云賢於堯舜也是之謂藏若杜公引用五雲太甲正用蒼帝起青雲扶日意蒼帝盛德在木太昊厯起甲寅代宗於壬寅歲即位而改元之春實唯甲寅是時國雖多難而五雲猶扶翼蒼帝也六月曠摶扶冀其將來一奮乾斷如乘扶搖而上黃生謂五雲句申上伊吕終難降六月句申上韓彭不易呼今按諸說異同董說可謂苦心思索矣然輾轉凑合終覺晦僻不如從朱長孺之說以京房易候為證而姑闕太甲之疑行次古城店泛江作不揆鄙拙奉呈江陵幕府諸公此亦大厯三年春作記水經注江水又東徑陸抗故城北荆州圖夷陵縣南對岸有陸抗故城周回十里即山為墉四靣天險老年常道路遲日復扶又切山川白屋花開裏孤城麥秀邊濟江元自濶下去聲水不勞牽風蝶勤依槳春鷗懶避船首敘途中景物景一二敘行三四城店乃岸上景下四泛江乃舟前杜臆白屋孤城一聨寫得景象蕭條風蝶春鷗一聨寫得物情親切屋陶開虞曰此數語開闔㸃次在有意無意之間臼旅店也王莽傳延士不及白屋兮箕子歌麥秀漸漸王門髙德業幕府盛才賢行色兼多病蒼茫泛愛前此呈幕府諸公城原注衛伯玉為江陵節度時封陽郡王故云王門黃生曰結句隱動諸公盻睞蒼茫二字舍許多難言之情此章上八句下四句陸韓卿詩王門所以貴自古多俊人其蔡雍薦邊讓文幕府初開博選清英愛荀悅漢紀觀溫良泛愛賙急殷仲文詩廣筵散泛此指幕府諸公也泊松滋江亭鶴注當是大厯三年三月作勝唐書松滋縣屬江陵府輿地紀江亭在松滋縣治後杜子美孟浩然俱有詩紗帽隨鷗鳥扁舟繫音計此亭江湖深更白松竹逺微一作還青一柱全應平聲近髙唐莫再經今宵南極外甘作老人星首二泊江亭三四亭前景下四泊舟感懷性黃生注前詩言生涯臨兀臬死地脫斯須幾有命之憂今幸而獲免則雖老人星亦甘為之矣與邵寶曰公大厯五年卒於湘潭道中豈此詩為之讖杜臆一柱觀即在松滋縣其觀猶在縣東丘家湖故云全應近史記天官書狼星北地有大星曰南極老人老人見治安不見兵起常以秋分時候之南郊正義老人一星在弧南䕫州詩云南極青山衆南極指䕫州此曰南極外去䕫至江陵也但玩詩意乃取南極老人而折用之乘雨入行軍六弟宅鶴注分大厯三年春抵荆南是時衛伯玉為節度使故位為行軍司馬行軍六弟即杜位也掌唐志元帥府節度使大都督府皆有行軍司馬弼戎政居則習搜狩有役則申戰守之法曙角凌雲亂朱作亂舊作罷春城帶雨長水花分塹七艷切弱巢燕得泥忙令弟雄軍佐凡才汚去聲省郎萍漂忍流涕衰颯近去聲中堂上四春時雨景下四入宅有感塹角聲齊起故曰亂雨氣連城故曰帶分弱荷初抽葉也得泥忙燕急營巢也羊省郎公自謂中堂位聽事潘徽詩潮落水花翻祐與弟琇書凡才而居重任上已日徐司録林園宴集鶴注大厯三年三月三日在江陵作舊唐書開元元年改録事參軍為司録參軍病周禮三月三日為上已女巫掌歲時以袚除疾修祓褉者潔也故於水上盥潔之丁按每月天干三換故經史所用如先甲先庚上上辛皆主天干不主地支上已亦其類也宋周公謹癸辛雜識謂是戊己之巳顧炎武曰季春之月辰為建巳為除故用三月上巳為祓除不祥古人謂病愈為巳亦此意也吳才老韻譜辰巳之已如已矣之已說文已已也四月陽氣已出陰氣已藏據此則辰巳之巳不當音仕鬢毛垂領白花蘂亞枝紅欹倒衰年廢招尋令節同薄一作蕩衣臨積水吹面受和風有喜留攀桂無勞問轉蓬上四林園宴集五六上已之景七八司録之情上杜臆鬢白花紅彼此相左衰年到園以令節見招也截悲中有喜臨水受風修禊樂事暫留攀桂而莫問轉蓬下截喜中有悲盧注謂薄衣與吹面相對是侵薄之薄非單薄之薄又引髙適詩水氣薄行衣為證今按上已御單夾之衣故云薄衣若說水氣薄衣更不得用臨字矣還依舊解為當十秋興賦斑鬢彪以承辨兮素髮颯以垂領花亞見八卷劉安招隱士攀援桂枝兮聊淹留離曹植詩轉蓬根本趙汸曰邵康節詩梧桐月向懷間照楊栁風來面上吹僧志髙詩霑衣欲濕杏花雨吹面不寒楊柳風意本於邵亦為朱子所賞老杜吹面受和風句已先道之矣乃知子美無所不有也劉逴曰唐詩霜重柳條疏刻畫固佳不如秋深萬木疏渾然無跡又如芙蓉露下落楊柳月中疏有何深意但視月到梧桐上風來楊柳邊氣象自殊薄衣臨積水吹面受和風有何深意視吹面不寒楊栁風已殊視楊柳風來面上吹愈殊愈逺能辨此方可言詩宴胡侍御書堂原注李尚書之芳鄭祕監審同集得歸字韻此大厯三年春江陵作江湖春欲暮牆宇日猶微暗暗書籍滿輕輕花絮飛翰林名有素墨客興去聲無違今夜文星動吾儕醉不歸上四侍御書堂下四李鄭同宴自暗暗句貼日微輕輕句貼春暮翰林指李鄭墨客公謂文星兼賓主言德星聚也賦吳論書翰文墨俱㸃書堂客法書暗暗在上陳長楊序藉翰林為主人子墨為卿以風後漢仲弓從諸子過荀季和家其夜德星聚左傳吾儕小人書堂飲既夜復扶又切邀李尚書下去聲馬月下賦絶句此與上章同時之作湖月楊慎作月一作水俗本作上林風相與清殘樽下去聲馬復扶又切同傾久一作已拚野鶴如雙羅大經作雙諸本皆作霜鬢遮莫鄰雞下下字重出當作不五更平聲白周珽注風月既清酒興未䦨飲當垂逹旦何妨鍾情自道氣味宛然少陵七絶老健竒瑰别成盛唐一家霜史記留侯世家漢王下馬踞鞍而問杜臆野鶴如鬢倒語以協韻林野鶴注見本卷莫趙典傳大儀鶴髮注白髮也已鶴玉露詩家用遮字蓋俗語所謂儘教也杜詩判野鶴如雙鬢言鬢如野鶴已判老矣儘教鄰雞下五更言日月逾邁不復惜也藝苑雌黃李太白詩遮莫枝根長百尺不如當代多還往又遮莫親􅊚連帝城不如當代自簪纓姜氏曰唐鄭綮傳信記云劉朝霞獻明皇幸溫泉詞直攖得盤古髓掐得女媧娘遮莫儞古時千帝豈如我今日三郎此是俳諧正合俗語杜臆遮莫恐即今俚語怎麼而庾肩吾詩鄰雞聲已傳一洞冥記有司夜雞隨鼓節鳴從夜以至曉一更為聲五更為五聲亦謂之五時雞奉送蘇州李二十五長子兩切史丈之任鶴注當是大厯三年公在江陵作唐書蘇州吳郡屬江南西道星拆台衡地曽音層為人所憐公侯終必復經術竟一作昔相傳食德見從事克家何妙年一毛生鳯穴三尺獻龍泉首敘李文家世才華詳朱注長史父必以宰相得罪故云星拆台衡但未其人或云是適之胡夏客曰明皇時李適之為左相罷後仰藥死此恐是適之之子但適之子季卿史不載為蘇州長史或另是一子也張華傳華為司空少子韙以中台星拆勸華遜位華不從未幾被害漢成帝歌謡故為人所羡今為人所憐儒左傳公侯之子必復其始至漢書韋賢號稱鄒魯大少子𤣥成復以明經厯位宰相易訟六三食舊德貞厲終吉或從王事帝䝉九二子克家殊曹植表終軍以妙年使越南史謂謝莊曰超宗有鳯毛抱朴子丹穴之山其上有鳥焉名曰鳯凰冶漢髙帝紀提三尺取天下注三尺劎也越絶書歐子鑄劎三枚一曰龍淵赤壁浮春暮姑蘇落海邊客間頭最白惆悵此離筵此送其赴任蘇州漢此章上竟句下四句在黃希曰赤壁有三一在水之側陵之東一齊安郡之步下一在江夏郡西南二百里間按魏武紀及周瑜傳操自江陵而下劉備周瑜由夏口往逆戰則操所敗之地乃在江夏之西南今屬漢陽縣李長史自江陵往姑蘇正經漢陽也越絶書闔廬起姑蘇臺三年聚材五年乃成髙見三百里吳郡志姑蘇山連橫山之北古臺在其上舊圖經云在吳縣西三十里九域志蘇州東北去海一百八十里頭白自謂暮春江陵送馬大卿公恩命追赴闕下鶴注大厯三年三月作自古求忠孝名家信有之吾賢富才術此道未磷緇首將朝命馬卿總提必於孝子之門後漢韋彪議求忠臣未磷緇謂忠孝無虧玉府標孤映霜蹄去不疑激揚音韻徹籍甚衆多推潘陸應平聲同調徒弔切孫吳亦異時此備言其道術過人二玉府比其操潔霜蹄比其才敏激揚句言詩名獨震潘陸二句言文武兼優亦異時前後相符也謂穆天子傳天子至於羣玉之山四徹中繩先王之所䇿府梁簡文帝集神峰標映北山移文髙霞孤映明月獨舉范蔚宗論激揚名聲互相題拂文選音聲悽以激揚陸前漢陸賈傳賈遊漢庭名聲籍甚今南史江右稱潘江左稱顔謝謝靈運詩誰謂古殊異代可同調并梁簡文帝詩少解孫吳法家本幽兒趙曰潘嶽陸機孫武吳起北辰徵事業南紀赴恩私卿月升金掌王春度玉墀薰風行應律湛露即歌詩此記其承命赴闕官事業可徵則赴召非虛往矣南紀記地卿月紀王春紀時金掌謂內擢玊墀謂陛見應薰風而歌湛露預道入朝後事漢前漢天文志北辰一名天關一名北極詩滔滔江南國之紀金鮑照詩結主逺恩私王洪範卿士惟月文上官儀詩掌露初稀春秋春正月宋袁伯詩玊墀滴凄露春陶開虞曰卿月春王二句工緻正在典雅中詩吕氏秋東南方曰薰風記八風從律而不奸湛湛露斯序湛露天子燕諸侯之詩天意髙難問人情老易音異悲樽前江漢濶後㑹且深期末敘送别之情首天意人情自述貧老淒涼此章尾各四句中間各六句劉克莊曰杜送馬卿云天意髙難問人情老易悲送惠子云皇天無老眼空谷滯斯人唐詩送山人處士五言多矣似此二聨劉隨州鮑溶輩精思不能逮和去聲江陵宋大少去聲府暮春雨後同諸公及舍弟宴書齊鶴注此大厯三年季春作席顧注宋少府於春雨後宴諸公及杜位上必皆賦詩公聞而和之也渥窪汗血種上聲天上麒麟兒才士得神秀書齊聞爾為棣華晴雨好綵服暮春宜朋酒日歡㑹老夫今始知汗血麒麟所謂神秀也此稱諸公及弟才士指宋少府爾為後言各賦詩棣華比其弟綵服兼諸公兩句并㸃暮春雨今始知不得與宴而遙和其詩也事渥窪馬漢天馬也汗血馬大宛馬也麒麟兒用徐陵注各别見嵇康琴賦厯世才士並為之賦詩詩序棠棣之華宴兄弟也綵服有職者之服朋酒斯饗注兩樽曰朋暮春陪李尚書李中丞過鄭監湖亭泛舟得過字韻鶴注湖在峽州公往江陵時過此而同遊也海內文章伯湖邊意緒多玉樽移晚興去聲桂楫帶酣歌春日繁魚鳥江天足芰荷鄭莊賓客地衰白逺來過首聨敘二李才思三四泛舟之事五六春亭之景七八美鄭監而志陪遊意緒謂賦詩之意杜臆用移帶兩字說舟宴生色鄭洙注唐文三變而王楊為之伯審此比二李當時置驛馬以邀賓客此比鄭宇文朝尚書之子崔彧司業之孫重平聲泛鄭監審前湖此當是大厯三年初夏作當唐書宰相世系表崔彧官太子少詹事同遊是三人尚書之子司業之孫當是小注原本孫字下重出尚書之子必題內脫一姓名今依杜臆並削去郊扉俗逺長幽寂野水春來更接連錦席淹留還出浦葛巾欹側未回船樽當霞綺輕初散棹拂荷珠碎却圓不但習池歸酩音茗酊音頂君看平聲鄭谷去夤緣首二鄭監湖亭三四泛舟同飲五六前湖晚景末則歸美鄭監也先郊居俗逺而又春水接連寫得野趣悠然淹留亭中酌欹側舟中醉容霞綺暮天景荷珠雨後景結乃借古形今言不但習池醉歸昔著風流還看鄭谷頻來今成韻事矣習池因地近而用之鄭谷因姓同而用之酩酊昏醉貌夤緣連絡之意一說後二句是結重遊意謂不但前遊見其酩酊今來更覺夤緣矣一說結出遊人踵至意言不但同舟醉歸而後來者又雜沓矣海賦羣産接連成沈約詩歸海流漫漫出浦水濺濺詩謝朓詩餘霞散綺梁元帝詩荷珠漾水銀謝朓風碎池中荷梁武帝詩墜露散珠圓州習池鄭谷口注見首卷常吳都賦夤緣山嶽之岊澤陳冡宰注夤緣本詩家用字孟浩然詩沙岸曉夤緣公詩萍泛苦夤緣俗語以潛通賄賂為夤緣與此不同申涵光曰樽當霞綺輕初散補綴不成語棹拂荷珠碎復圓景真而近俗矣歸雁唐㑹要大厯二年嶺南節度使徐浩奏十一月二十五日當管懷集縣陽雁來乞編入史從之先是五嶺之外朔雁不到浩以為陽為君德雁隨陽者臣歸君之象也朱注詩云聞道今春雁南歸自廣州正是三年春所作又云是物關兵氣何時免客愁蓋浩以為祥公以為異耳聞道去聲今春雁南歸自廣州見花辭漲海避雪到羅浮是物關兵氣何時免客愁年年霜露隔不過五湖秋上六記其異下二道其常忽辭漲海言今春之去到羅浮遡去秋之來南方地氣寒故北雁乘秋而至此殺氣之可愁者在往時則瘴暖無霜雁飛原不過湖也曰衡山一陽峰以內有霜自此峰以南有露無霜矣故霜露隔今詢之粵東人却云有霜有雁豈地氣自北而南始於大厯問耶杜臆禽鳥得氣之先明年潭州果有臧玠之亂桂州又有朱濟之亂此與邵子洛陽聞杜鵑無異可謂具前知之見矣謝承後漢書交趾七郡士獻皆從漲海出入南史扶南國東界即大漲海海中有大洲洲上有諸薄國羅浮山記羅山浮山二山合體謂之羅浮在增城博羅二縣境一統志羅浮山在今惠州府連廣州境後漢唐檀因南昌婦生四子古云京師當有兵氣禍發蕭雁地志衡山一陽峰極髙雁不能過遇春北歸故名回朱注雁至衡陽則回此五湖當指洞庭湖言史記索隱具區洮滆彭蠡青草洞庭共為五湖則洞庭正得稱五湖耳黃生曰事起景接事轉景收亦虛實相間格為又曰五六本屬結意却作中聯七八本是發端翻結語前半先言歸次言辭後言到終乃言不過章法層層倒捲矯變異常短歌行贈王郎司直朱注此詩仲宣樓中二句乃在荆南時作諸本誤入寶應元年成都詩內獨草堂本編在大厯三年最是糾前漢蕭望之為丞相司直唐書百官志司直掌劾官􅒼王郎酒酣拔劎斫地歌莫哀我能拔爾抑塞先則切磊落之竒才豫章一作樟翻風白日動鯨魚跋浪滄溟開且脫劎佩休徘徊此慰司直哀歌之意厲醉酣拔劎歌聲甚哀公勸其莫哀而激振拔之翻風跋浪言竒才終當大用何須撫劎悲歌乎也盧注首句歌莫哀王郎之歌後面青眼髙歌公自歌即題中所云短歌須見分别往世說王曇首年十四五便歌謝靈運出東府土山王土山下庾家墓中作一曲歌卒曲便去妓自謝公曰此是王郎歌士後漢齊武王傳張卭拔劎擊地後漢郭泰傳振拔人皆如所鍳此拔字所本陸史記公孫鞅年雖少有竒才本賈新語楩相豫章天下之名西得諸侯棹錦水欲向何門趿先答切一作颯珠履仲宣樓頭春色一作已深青眼髙歌望吾子眼中之人吾老矣此送司直赴蜀之情樓王赴西蜀將謁侯門今頭贈别注眼髙歌惟望知已遭逢以慰我衰老之人也進此章二段各五句分截字書棹搖動也說文趿足有所擷取也志朱注荆州記當陽縣城樓王仲宣登之而作賦一統仲宣樓在荆門州即當陽縣城樓按方輿勝覽仲宣樓在荆州府城東南隅此乃後梁時髙季興所建或引之非也記望吾子之教之也注吾子相親之辭子陸雲詩髣佛眼中人老國語中行宣謂趙文子曰惜也吾矣盧世㴶曰兩短歌行一贈王郎司直一送卭州録事一突兀橫絶跌宕悲凉一委曲溫存疏通藹潤一則曰青眼髙歌望吾子一則曰人事經年記君面待少年人如此肫摯直是腸熱心清盛德之至耳全詩皆贈司直語單復將上截作王郎勸公者非是諸侯指成都節鎮黃氏謂司直刺蜀中者非是仲宣樓乃送别之地蔡氏謂公欲依司直者非是髙歌望子蓋望司直遇合朱氏謂望其早還江陵者非是諸說紛紛總未體貼本文耳叶此歌上下各五句於五句中間隔一韻腳則前後韻處不見其錯綜矣此另成一章法㑹孔穎達詩正義云詩以申志一字則言蹇而意不故詩之見句少不減二即祈父肇禋之類也三字者綏萬拜屢豐年之類也四字者關關睢鳩窈窕淑女之類也五字者誰謂雀無角何以穿我屋之類也六字者昔者先王受命有如召公之臣之類也七字者如彼築室於道謀尚之以瓊華乎而之類也八字者十月蟋蟀入我牀下我不敢效我友自逸是也其外更不見九字十字者摯虞流别論云詩有九言者泂酌彼行􅕙挹彼注兹是也遍檢論本皆云洞酌三章章五句則以為二句也顔延之云詩體本無九言者將由聲度闡緩不協金石仲治之言未可據也句字之數四言為多雜以二三七八者將由言以申情唯變所適播之樂器俱得成文故也落懹麓堂稿云國初人有作九言者謂昨夜西風擺千林梢渡頭小舟捲入寒塘坳以為可備一體不知九言起於髙貴鄉公鮑明逺沈休文亦有此體唐人則李太白蜀道難然後天梯石棧相鈎連上有六龍回日之髙標下有衝波逆折之回川杜集中炯如一段清冰出萬壑置在迎風寒露之玊壺又何時眼前突兀見此屋吾廬獨破受凍死亦足此九言之最妙者詩又有十字成句者太白黃帝鑄鼎於荆山鍊丹砂丹砂成騎龍飛上太清家又有十一字成句者杜詩王郎酒酣拔劎斫地歌莫哀我能拔爾抑塞磊落之竒才李詩紫皇乃賜白兔所搗之藥方韋應物詩一百二十鳯凰羅列舍明珠若坡公詩山中故人應有招我歸來篇似可讀作兩句矣憶昔行鶴注當是大厯三年出峽後作憶昔北尋小有洞洪河怒濤過輕舸辛勤不見華蓋君艮岑青輝慘么麼亡果切千崖無人萬壑靜三步回頭五步坐秋山眼冷魂未歸仙賞心違淚交墮首憶初入山景事洪河怒濤水行之險千崖萬壑山行之艱曰不見曰魂未歸時華蓋君已亡矣慘么麼謂山色無光仙賞心違求仙之志不遂也虛御覽名山記云王屋山有洞周回萬里名曰小有清之天王君內傳三十六洞天之第一在河內沁水縣界小梁簡文帝詩洪濤猶鼓怒山廣雅南楚江湘凡船之者謂之舸艮岑東北之麼漢書作䯢通俗文不長曰么細小曰麼倣曹公祭橋𤣥文車過三步李陵别蘇武詩五步一徨陸機詩中心若有違弟子誰依白茅一作石屋盧老獨啓青銅鎖巾拂香餘搗藥塵階一作前除灰死燒丹火𤣥圃滄洲莽空濶金節羽衣飄婀於可切娜奴可切落日初霞閃餘映倐忽東西無不可次憶入山後景事華上四言物在人亡下四言遊魂無定盧老蓋君弟子藥塵餘香沾於巾拂丹火死灰䝉在階除此身後荒涼之狀賦巾拂是二物舞鶴賦巾拂兩停階除是庭除景福殿階除連延或云巾以拂塵階上除灰恐非金葛仙傳崑崙一曰𤣥圃滄洲十洲之一洙曰以黃為節鳥羽為衣漢武帝拜欒大為五利將軍使衣羽衣立白茅上王謝朓詩葉生既婀娜葉落更扶疏苕溪漁隱詩話屋山中日西落而人影或在西日東出而人影或在東不可致詰故曰落日初霞閃餘映倐忽東西無不可王粲詩山岡有餘映梁元帝纂要日在午曰亭在未曰映蔡琰曲人生倐忽兮如白駒之過隙松風澗水聲合時青兕黃熊啼向我徒然咨嗟撫遺跡至今夢想仍猶左一作佐祕訣隱文須內教平聲晚歲何功使一作收願果更討一作覔衡陽董錬師南浮一作游早鼓瀟湘柂從華蓋君而及董鍊師乃全詩歸結密松風二句觸耳增悲遺跡即藥丹舊處內教謂傳授諦杜臆公泛舟瀟湘時董錬師在衡陽欲乘便訪之因而追憶華蓋君也其詞筆𤣥超真帶仙靈之氣此章三段各八句謝靈運詩熒熒非向我傳王粲詩先民遺跡為左思詩夢想騁良圖陶𢎞景既得神符祕訣以神仙可成梁御覽玊清石刻隱銘曰佩玉帝隱文者得為上仙嚴武帝立神明成佛義記早念身空栖心內教楞經偈願今得果成寶王陵輿地紀勝董奉先天寶中修九華丹法於衡陽棲朱後洞六典道士修行其德髙思精謂之鍊師後真仙通鑑東楚董鍊師周游三湘名山混跡於衡陽洞嘗以咒術治人病苦後尸解如蟬蛻飛晉庾闡揚都賦青雀艫余皇鼓柂范元實詩眼云昔嘗問山谷耕田欲雨刈欲晴去得順風來者怨山谷云不如千崖無人萬山靜三步回頭五步坐蓋七言詩四字三字作兩截也此句法出黃庭經自上有黃庭下有關元以下多此體張平子四愁詩句句如此雄健穩愜至五言詩亦有三字二字作兩截者老杜云不知西閣意肯别定留人肯别耶定留人耶山谷尤愛其深逺閒雅門今按杜詩有兩字作截者如雪嶺獨看西日落劎猶阻北人來有三字作截者如漁人網集澄潭下估客舟隨返照來有五字作截者如五更鼓角聲悲壯三峽星河影動搖有全句一滚不能截者如松浮欲盡不盡雲江動將崩未崩石又陸務觀詩有六字作截者客從謝事歸時散詩到無人愛處工惜别行送向卿進奉端午御衣之上都鶴注當是大厯三年在荆南作肅宗昔在靈武城指揮猛將去聲收咸京向公泣血灑行殿佐佑卿相去聲乾坤平逆胡冥寞隨煙燼卿家兄弟功名震麒麟圖一作閣畫鴻雁行音杭紫極出入黃金印首敘向卿傳上四述其扈從之功下四稱其家門俱顯盧王彬别佐佑皇業纍遷侍中逆胡指安史按注云向公向卿是兩人故曰卿家兄弟戴世說郗超謂傅瑗曰保卿家終當在兄又謝太傅謂安道曰卿兄弟志業何其太殊為陸機詩奕世台衡扶帝紫極鶴注紫極比王居北極紫微垣漢丞相金印紫綬尚平聲書勳業超千古雄鎮荆州繼吾祖裁縫雲霧成御衣拜跪題封賀一作向端午向卿將命寸心赤青山落日江湖一作潮白卿到朝音潮廷說老翁漂零已是滄浪客此記送别進奉御衣者衛伯玉也以節鎮而加尚書代衛將命者則向卿也其赤心如懸白日盧注公昔在朝曽叨端午賜衣故逢進衣端午有老客飄零之歎江此章上下各八句朱注舊書廣德元年衛伯玉拜陵尹荆南節度使尋加檢校工部尚書封陽城郡王故曰鎮荆州繼吾祖者杜預以鎮南大將軍都督諸軍事也江總山水衲袍賦裁縫則萬壑縈體針縷則千崖映日漢李義府堂堂詞裁雲作舞衣雲霧謂衣上織文隴西行却略再拜跪題世說桓公𤣥發厨取畫封如故黃常明詩話曰杜云卿到朝廷說老翁漂零已是滄浪客又朝覲從容問幽仄勿云江漢有垂綸其後夢得送陳郎中云若問舊人劉子政而今懶拙每如初送慧則云休公久别如相問楚客逢秋心更悲小杜江湖酒伴如相問終老烟波不計程交遊問我憑君道除却鱸魚更不聞商隱寄崔侍御云若向南臺見鶯友為言垂翅度春風臨川故人亦見如相問為道方尋木雁編歸見江東諸父老為言飛鳥㑹知還聖俞倘或無忘問姓名為言懶拙皆如故東坡單干若問君家世莫道中朝第一人語皆有所因也夏日楊長寧宅送崔侍御常正字入京得深字韻一作探韻得深字州鶴注當是大厯三年作正唐書長寧縣屬鎮大都護府祕書省有字一人醉酒揚雄宅升堂子賤琴不堪垂老鬢還對欲分襟天地西江逺星辰北斗深烏臺俯麟閣長夏白頭吟揚雄子賤借比楊長寧醉酒升堂同飲其家也三四送别崔常五六承上分襟公在江陵故曰西江崔常赴京故曰北斗烏臺麟閣侍御正字官署也未句回應垂老㸃還夏日通志漢氏圖籍藏麒麟天祿二閣桓帝延熹二年始置祕書監一人初唐六典祕書省天授初改為麟臺監神龍元年復舊漢御史中丞掌蘭臺祕書圖籍故厯代置都邑建臺省以祕書與御史為鄰夏夜李尚書筵送宇文石首赴縣聯句鶴注此亦大厯三年作石首縣在江陵府東南二百里注王道俊博議題中宇文石首即前宇文朝也詩彧者即崔彧也公與彧同在李尚書筵中送宇文石首故有宅相令宰等句以美朝也舊本俱作宇文彧誤耳愛客尚平聲書重之官宅相去聲賢甫酒香傾坐側帆影駐江邊之芳翟表郎官瑞鳬看平聲令宰仙彧雨稀雲葉斷夜久燭花偏甫數音朔語欹一作𫾣紗帽髙文擲綵箋之芳興去聲饒行處樂音洛離惜醉中眠彧單父音斧長多暇河陽實少去聲年甫客居逢自出為别幾凄然之芳聨首聯李餞宇文次筵宴之事三聯宇文赴縣四聨送别時景五聨同席聨句六聨座中惜别七聨記宇文之賢八聨記送别之情劉孝綽詩愛客待驪歌廣宅相比宇文朝此用魏舒事注見一卷翟雉名蕭濟孝子傳蕭芝至孝除尚書郎有雉數十飛鳴車前詩鳬看用王喬事單陸機雲賦金柯分玊葉散徐陵髙文㑹斗樞父子賤所治河陽潘嶽所治左爾雅男子謂姊妹之子為出傳康公我之自出西漢柏梁詩即聨句之始六朝人效之遂人各兩句但以一氣呵成次序秩然者方為合法玩此篇起結承轉各極自然多病執熱奉懷李尚書之芳月鶴注當是大厯三年四作邵注執囚也囚困於熱也衰年正苦病侵凌首夏何須氣鬱蒸大水渺弭沼切茫炎海接竒峰硉兀火雲升思霑道暍音一黃梅雨敢望宫恩玉井冰不是尚平聲書期不顧山陰夜雪興去聲難乘首聨拈多病執熱炎海火雲言鬱蒸之狀梅雨井冰思解熱而不得也欲赴期約而無雪可乘總緣畏熱所阻耳此結懷李之意鬱魏文帝槐賦即首夏之初期虛應璩書處凉臺而有蒸之氣大水炎海上實下竒峰火雲上虛下實洲渺茫水大貌江賦狀滔天以渺茫雲炎海南海也十記炎洲在南海之中陶潛詩夏多竒峰吕硉兀峰髙貌江賦巨石硉兀以前却江火雲夏雲也氏春秋早雲烟火暍暑熱也湘四月有熟梅雨薛道衡詩細雨應黃梅龍魚豢魏略明帝九龍殿前為玉井綺欄蟾蜍含受神吐水陸翽鄴中記石季龍於冰井臺藏冰三伏日以賜大臣後漢書琅琊有冰井趙曰唐制百官賜冰公嘗為拾遺當預賜冰之列漢書陳孟公每飲賓客輒閉門取客車轄投於井中時北部刺史奏事過陳值其方飲刺史大窮候陳霑醉時突入見其母叩頭自白當對尚書有期㑹狀毋乃令從後閣出去應璩書仲孺不辭同産之服孟公不顧尚書之期逵世說王徽之嘗居山陰夜雪初霽月色清朗忽憶戴逵時在剡便夜乘小船詣之不前而返曰乘興而行興盡而返何必見安道水宿遣興去聲奉呈羣公鶴注詩云小江異縣當是在江陵暫至外邑大厯三年夏作所盧注此羣公即行次古城店時所呈幕府諸公云蒼茫泛愛前此語蓋有為矣謝靈運詩客游倦水宿魯鈍仍多病逢迎逺復扶又切迷耳聾須畫字髮短不勝平聲箆澤國雖勤雨炎天竟淺泥小江還積浪弱纜且長堤從衰年流落敘起而上四與諸公致欵下四為水宿引端魯鈍多病又逺行以故昧於逢迎耳聾髮短猶泊舟江上諸公當亦念及此耶勤雨之後故江猶積浪淺泥礙船故纜繫長堤易林目肓耳聾周禮澤國用龍節注穀梁傳言不雨者勤雨也注思雨之勤也鶴此言得雨勤數與穀梁傳注異歸路非關北行舟却向西暮年漂泊恨今夕一作久客亂離啼童稚頻書札盤飱詎俗本作具糝桑感切藜我行何到此物理直難齊此水宿感懷歎行踪溧蕩也寬歸北思故鄉向西往武陵是年四月楊子琳與崔戰於成都故云亂離書頻移而飱不給則此行之寥落甚矣書古詩烈士暮年杜臆公因右臂偏枯故囑兒子代古詩遺我一書札藜莊子孔子在陳蔡之間七日不火藿不糝莊子有齊物篇髙枕翻星月嚴城疊鼓鞞風號平聲聞虎豹水宿伴鳬鷖異縣驚虛往同人惜解擕蹉跎長泛鷁展轉屢鳴雞此水宿景事歎旅况無聊也夜卧舟中故見星月翻動䕫蜀有警故聞鼓鼙疊響虎豹號則地險鳬鷖伴則身孤驚虛往傷近邑無贈遺者惜解擕惜與羣公分手也泛鷁聞雞水邊不寐之狀嚴抱朴子人君恐姦釁之不時故嚴城以備之何遜詩城方警夜百張載詩此郭非吾城入聞鼓鼙聲聲衛公兵法鼓三三十槌為一通鼓止角動吹十二為一疊蕪城賦風嘷雨嘯宿哢吭清渠苦寒詩虎豹夾路啼古樂府他鄉復異縣蜀都賦雲飛水易出門同人宋之問詩骨肉初分愛親朋忽解擕以解擕對分愛謂擕手者解散也張九齡詩義玷投分末情及解擕初岑參詩為君題惜解擕皆說分離之意嶷嶷瑚璉器陰陰桃李蹊餘波期救涸費日苦輕齎杖策門闌邃肩輿羽翮低自傷甘賤役誰愍强丘兩切幽棲此奉呈羣公之意趨瑚璉器謂人品不凡桃李蹊言奔者衆本期餘波救涸乃日久而齎資已竭矣杖䇿步行則閽者不執故門闌邃肩輿往拜則窮途乏費故羽翮低賤役如此誰復愍其勉强棲遲乎蓋諷羣公之不見恤也輿公詩殘杯與冷炙到處潛悲辛此云杖䇿門闌邃肩羽翮低曲盡干人情狀語史記其色郁郁其德嶷嶷言德髙也瑚璉器見論葛洪詩陰陰驅千乘李廣傳桃李不言下自成蹊曰左傳其波及晉國者君之餘也雋莊子車轍中有鮒吾得升水可以活矣後漢朱傳輕齎數百金到京師虞世基詩輕齎不遑舍巨海能無釣浮雲亦有梯勳庸思樹立語默可端倪贈粟囷區倫切應平聲指登橋柱必題丹心老未折時訪武陵溪末述已志以遣興平釣海梯雲想勳庸之得遂時思為樹立嘗於語言中微露之今當旅困倘有贈我以粟者則題橋之志猶存也寸心未灰終期有濟武溪之行特暫時焉耳有杜臆想羣公必有許救濟者故以指囷望之時武陵故人而公將訪之也此章二假各八句以裴秀九州圖論峻山巨海之隔世莊子任公為大鈎五十犗為餌投釣於東海虞基詩勳庸震邊服周禮民功曰庸莊司馬遷書素所樹立然也吳江總詩語默豈同歸子反覆終始不知端倪志魯肅家富於財廬江周瑜為居巢長聞之往求資糧肅時有米二囷各三千斛直指一囷與瑜瑜竒之乃結僑札之交已司馬相如題升仙橋柱注見三卷空重丹心悵不紓别賦心折骨驚古樂府皇恩杜臆武陵即今常德在荆州西南遣悶鶴注當是大厯三年夏江陵作地濶平沙岸舟虛小洞房使去聲塵來驛道城日避烏檣一作牆暑雨留蒸濕江風借夕涼行雲星隱見音現疊浪月光芒螢鑒緣帷徹蛛絲罥音畎鬢長哀筝猶憑去聲几鳴笛竟霑裳此記舟中夜景聞上四泊舟初晚中四入夜景事下四坐久見來驛道晚將宿也避烏檣城障日也能胡夏客曰隱見言雲中之星光芒言浪中之月繪景新盧注螢光能鍳緣帷乍徹蛛絲引風掠鬢加長後杜臆哀筝尚憑几而聽鳴笛則淚下霑裳初猶强忍竟難忍也二句已涉悶意溍注小洞房舟如洞房也明柳𧦬詩風生疊浪起霧卷孤帆出鮑阮籍詩薄帷鍳月江總詩蜘蛛作絲滿帳中照詩絲罥千里心選注罥結也魏文帝詩哀筝順耳倚著陟略切如秦贅過平聲逢類楚狂氣衝看平聲劍匣穎脫撫錐囊妖孽關東臭兵戈隴右瘡時清疑武略世亂局文場餘力浮於海端憂問彼蒼百年從萬事故國耿難忘此述遣悶之情四上四自敘中四傷時末感懷隨地漂流身如出贅矣意多感憤迹若楚狂矣看劎壯心猶在撫囊欲試未能關東安史之亂隴右吐蕃之警時方右武故文人失志浮海思避世問蒼乃悲天萬事聽其自然唯故國難忘所以常悶耳此章兩段各十二句劎賈誼傳秦人家富子壯則出分家貧子壯則出贅氣衝牛斗出張華傳平原君傳夫賢者處世譬如錐處囊中其末立見毛遂曰使遂早得處囊中乃脫穎而出後漢來歙傳諸將方務關東浮海見論語暇月賦端憂多詩彼蒼者天江邊星月二首鶴注當是大厯三年江陵作驟雨清秋夜金波耿玊繩天河元自白江浦一作渚向來澄映物連珠斷緣空一鏡升餘光隱一作憶更平聲漏况乃露華凝朱注首章咏雨後星月承首聯江邊星月雨後氣清故云元白向澄此首句星月夜皎故知珠連鏡升此承次句更深光隱則露華凝而天欲曉矣未句逗起下章謝朓詩金波麗鳷鵲玊繩低建章漢律厯志日月如合璧五星如連珠莊古詩破鏡飛上天公孫乘月賦蔽修堞而分鏡謝詩露華識猿音江月辭風纜一作檻江星别霧一作露船雞鳴還曙一作曉色鷺浴自晴川厯厯竟誰種悠悠何處圓客愁殊未已他夕始去聲相鮮朱注次章咏將曉星月矣星月離舟光將沒矣雞鳴鷺浴天已曉想星月無踪而俟之他夕蓋客愁藉之以頻遣也楚謝惠連詩亭亭映江月江總詩忽聽晨雞曙非復宫歌蕭慤詩野禽喧曙色白袁嶠之詩俯仰晴川煥之古詩天上何所有厯厯種榆謝莊月賦升清質悠悠降澄暉之藹藹色郭璞詩容更相鮮王嗣奭曰二詩照定星月比偶發揮如應制文字别是一體惜次章結句近拙不見精彩耳舟月對驛近寺鶴注當是大厯三年舟中作更平聲深不假燭月朗自明船金剎青楓外朱樓白水邊城烏啼眇眇野鷺宿娟娟皓首江湖客鈎簾獨未眠首聨舟中月金剎切寺朱樓切驛四句完題烏啼鷺宿月下見聞鈎簾而望借此遣懷也維摩經佛言佛滅後以金身舍利起七寶塔表剎莊嚴而供養令西京雜記以黃金為剎阮籍詩上有青楓林逺望人悲方輿勝覽青楓浦在潭州瀏陽縣縣馮衍顯志賦伏朱樓而四望黃希曰江陵府松滋有白水鎮左傳城上有烏注漢文帝紀眇眇之身眇眇細未也舟中年月同前題鶴注詩云驛樓即前詩所云對驛也風餐江柳下雨卧驛樓邊結音係纜排魚網連􅧃並米船今朝雲細薄昨夜月清圓飄泊南庭老秪應平聲學水仙前詩舟中月下所作此詩舟中朝起之作夜風餐雨宿舟行苦况魚網米船舟前喧境顧注昨今朝變熊不同而繫舟如故故有飄泊南庭之感下四作一氣說鮑照詩風餐委松宿雲卧恣天行古詩阻風餐柳下值雨坐蓬窗相結音係漢書張釋之跪為王生結襪之郭璞詩舳艫屬萬里連檣趙叟曰南庭謂南方庭猶北地謂之北庭公泊舟如此故自稱南庭老術邵注馮夷得為水仙名河伯列仙傳琴髙行涓彭之浮遊冀州涿郡間二百餘年後入涿水中取龍子與諸弟子期曰皆潔齊待於水旁果乘赤鯉來留月餘復入水去吳均詩是有琴髙者凌波去水仙江陵節度使陽城郡王新樓成王請嚴侍御判官賦七字句同作陽城郡王即尚書衛伯玉初代宗幸陜以衛有幹略可當方面任大事拜荆南節度使大鶴注當是大厯三年夏至江陵作史云衛伯玊厯初丁毋憂則是夏未再朞也雖曰起復亦不當作樓命客賦詩當時士論醜之宜哉顧注公詩極贊美揚厲倘亦迫於賓主之情故耶名杜臆題云賦七字句知當時無律詩之王特請賦亦以七言為難也樓上炎天冰雪生髙飛燕雀賀新成碧窗宿霧濛濛濕朱栱浮雲細細輕仗鉞褰帷瞻具美投壺散帙有餘清自公多暇延參佐江漢風流萬古情首章志新樓落成而稱陽城韻事在四句分截文碧窗朱栱樓新故麗霧宿雲浮樓髙故凉瞻具美言武兼優有餘清言儒稚不俗延參佐暗用庾亮登樓事雅黃生注一席風流與江漢相為終古命意𢎞逺廣南方曰炎天舊注晉羊球登西樓賦畫棟浮細細之輕雲朱栱濕濛濛之飛雨碧窗二句修可引羊球賦為證未知何據濛濛二字形容其濕細細二字形容其輕漢司馬法左杖黃鉞漢宗資為中郎將杖鉞督兵後賈琮傳琮為冀州刺史之部升車言曰刺史當逺視廣聽糾察美惡何反垂帷裳以自掩塞乎命御者褰之祭遵傳為將軍對酒設樂必雅歌投壺康謝靈運詩凌澗尋我室散帙問所知淳靈運初襲封樂公後移籍㑹稽與隱士王𢎞之孔之等為娛故與祭公投壺並用清說文帙書衣也謝靈運詩密林含餘詩退食自公黃生曰首句見時結句見地此杜詩章法其全篇溫浼和雅非公平日本色却是盛唐正宗又曰杜詩善用清字如當暑著來清則以清為凉關河霜雪清則以清為寒天清木葉聞則以清為靜沙亂雪山清則以清為明天清皇子陂則以清為霽侍立小童清則以清為秀衣乾枕席清則以清為爽投壺散帙有餘清則以清為閒是也又作此奉衛王與前首同時作西北樓成雄楚都逺開山嶽散江湖二儀清濁還髙下三伏炎蒸定有無推轂幾年惟鎮靜曵𥚑終日盛文儒白頭授簡焉於䖍切能賦愧似相如為大夫次章咏登樓景事而作謙已之辭亦四句分截勝顔箋山嶽分峙曰開江湖流别曰散此句見楚中形樓極髙故二儀各還其髙下樓最凉故三伏莫定其有無鎮靜則能愛民文儒則知好士末用梁王授簡事切於郡王黃生注古詩西北有髙樓起語用之乃見句老徙前漢地理志南郡江陵縣故楚郢都楚文王自丹陽此代宗時江陵已升為南都上曹植惟漢行太極定二儀清濁始已形列子輕清者為天重濁者下為地記天髙地下黃生注初時為物所蔽及登樓曠觀始還出天地之髙下古今詩人不能道此顔師古曰伏者謂陰氣將起迫於殘陽而未得升故為藏伏因為伏日孟康曰周時無伏至漢乃有此名舊注夏至後三庚為初伏四庚為中伏立秋後初庚為末伏逺注金畏火見火而伏惟長夏火最盛秋初金方稚尤為相尅故夏末秋初逢庚謂之伏庾信詩五月炎蒸氣轂西京雜記董仲舒曰二氣之初蒸也若有若無推注見本卷劉惔别傳真長有雅量厯司徒左長史侍中丹陽尹為政務鎮靜信誠孝鄒陽傳何王之門不可曵長裾乎晉儒林傳迄漢武蔚為文儒賦雪賦梁王遊兔園授簡於司馬大夫曰為寡人之漢藝文志登髙能賦可以為大夫劉誠意伯題靈峯寺棲雲樓詩中二聨云九霄雨露宜髙下六月風雷送往還青嶂曉光浮藻梲銀河夜氣濕松關本於兩詩佳句胡應麟曰杜七言句壯而閎大者二儀清濁還髙下三伏炎蒸定有無壯而髙拔者藍水逺從千澗落玊山髙並兩峰寒壯而豪宕者五更鼓角聲悲壯三峽星河影動搖壯而沉婉者三年笛裡關山月萬國兵前草木風壯而飛動者舍風翠壁孤雲細背日丹楓萬木稠壯而整嚴者江間波浪兼天湧塞上風雲接地陰壯而典碩者紫氣關臨天地濶黃金臺貯俊賢多壯而穠麗者香飄合殿春風轉花覆千宫淑氣移壯而竒峭者窗含西嶺千秋雪門泊東吳萬里船壯而精深者織女機絲虛夜月石鯨鱗甲動秋風壯而瘦徑者萬里悲秋常作客百年多病獨登臺壯而古淡者百年地僻柴門逈五月江深草閣寒壯而感愴者錦江春色來天地玉壘浮雲變古今壯而悲哀者雪嶺獨看西日落劎門猶阻北人來結語之壯者關塞極天惟鳥道江湖滿地一漁翁疊語之壯者髙江急峽雷霆鬬古木蒼藤日月昏拗字之壯者側身天地更懷古回首風塵甘息機雙字之壯者江天漠漠烏飛去風雨時時龍一吟以上諸句古今作者無出其範圍也秋日荆南述懷三十韻昔承推奬分音問愧匪挺生材遲暮宫臣黍艱危衮職陪揚鑣樊作鞭隨日馭折檻出雲臺罪戾寬猶活干戈塞先則切未開首敘授官去位之故奉推奬謂房琯薦引職趙曰公拜拾遺時掌供諌諍故云宫臣衮隨日謂赴行在折攬指救房相罪戾寬張鎬救而得免干戈塞安史之亂未平劉峻辨命論孔墨之挺生江淹擬陸機詩矯跡厠宫臣前詩衮職有闕曰嵇康詩揚鑣踟蹰朱雲折檻别見左傳趙孟老夫罪戾是懼星霜𤣥鳥變身世白駒催伏枕因超忽扁舟任往來九鑽巴噀蘇困切火三蟄楚祠雷望帝傳應平聲實昭王問不回蛟螭深作橫去聲豺虎亂雄猜素業行已矣浮名安在哉此記漂泊蜀䕫之迹雷超忽句承上星霜身世往來句起下巴火楚望帝昭王又承巴楚遺事蛟螭豺虎比悍將羣盜素業浮名歎已志莫伸也黃希曰公以乾元入蜀於大厯二年下峽是九鑽火自大厯元年秋至雲安於大厯三年春下峽是三蟄雷也月令二月𤣥鳥至八月𤣥鳥歸史記魏豹謂酈生曰人生一世間如白駒過隙耳即超忽言時光倐忽謝靈運詩虛舟有超忽九鑽句鑽燧改火意兼用欒巴噀酒為雨滅火成都事前月令八月雷乃收聲故曰蟄望帝化為杜䳌注見左傳昭王南征而不復君其問諸水濱湘中記益陽有昭潭其下無底湘水最深處或謂昭王沒於此潭因以為名晉書陸納怒兄子俶曰穢我素業琴烏曲怨憤庭鶴舞摧頽秋水一作雨漫湘竹一作水陰風過嶺梅苦搖求食尾常曝報恩鯉結舌防讒柄探腸有禍胎蒼茫步兵哭展轉仲宣哀饑藉家家米愁徴處處杯此敘流寓江陵之事食琴怨鶴摧乃興意秋水陰風切時景求言逆旅之艱報恩言知已未酬結舌二句言世路險阻途窮故哭遭亂故哀客况無聊故借米尋杯吳論報思應前推奬之事慶琴録琴曲有烏夜啼吳競解題烏夜啼宋臨川王義造也義慶為江州刺史文帝徵之家人大懼妓妾夜聞烏啼憂思而成曲翼韓非子師曠援琴奏流徵有𤣥鶴二八延頸而鳴舒而舞舞鶴賦振迅騰摧湘妃斑竹注見前百大庾嶺多梅人號為梅嶺求司馬遷書猛虎在深山獸震恐及在檻穽搖尾而食辛氏三秦記魚集龍門下登者化為龍不登者㸃額曝腮而退三輔决録昆明池人釣魚綸絶而去夢於漢武帝求去其鈎明日帝游於池見大魚銜索帝取而去之後三日池邊得明珠一雙帝曰魚之報也前漢李尋傳知者結舌邪僞並進粲庾信詩探腸見膽無所惜乘傳禍生有胎王有七哀詩翰曰哀漢亂也枚藉借也如字讀不必轉作籍休為貧士歎任受衆人咍音台得喪去聲初難識榮枯劃易音異該差此兹切池分組冕合沓起蒿萊不必伊周地皆登吳作知屈宋才漢庭和異域晉史坼一作拆中台霸業尋常體宗臣忌諱災此乃慨歎時事二貧士二句承上文得喪句起下文萊杜臆劃易該言劃然之間榮枯易見如組冕起自蒿崛起者得官矣伊周不皆屈宋樞要皆武夫矣師氏曰是時官資濫進宿德元勳多擯棄不用數語蓋以諷也胡震亨曰和異域言回紇和親坼中台言房琯道卒房霸業句言和親乃漢道雜霸非國體之正宗臣句言琯建諸王分鎮之議觸肅宗忌諱而得禍何雲曰廣德元年房琯病卒於閬州其年六月回紇登里可汗歸蕃皆代宗初元事故牽連書之楚辭注楚人謂相啁笑曰咍信漢茍奴傳髙帝出白登圍使劉敬結和親之約庾傷王褒詩豈意中台坼君當風燭前晉書中台星坼張華被誅業諸葛武侯傳霸業可成史記晉文公初立欲修霸前漢李尋傳開大明除忌諱後漢郎顗疏稟性愚戅不識忌諱魏志魏顗傳犯顔色觸忌諱羣公紛戮力聖慮窅樊作睿徘徊數色角切見銘鐘鼎真宜法斗魁願聞鋒鏑鑄莫使棟梁摧磐石圭多剪凶門轂少推垂旒資穆穆祝網但恢恢赤雀翻然至黃龍詎一作不假媒此望朝政更新也言今者羣臣協力聖主焦思在諸將雖勒名鐘鼎尚宜法斗魁以衛宸極願聞以下乃進䇿也銷鋒鏑生民可以休息選棟梁相臣毋用凡材多剪圭同姓自此蟠固少推轂藩鎮免於跋扈且垂旒而法無為祝網以寬文法則赤雀黃龍嘉祥自致而天下可治平矣庾博議此段自屬泛論不必復主房琯窅深目也信集功烈則鐘鼎俱銘星晉天文志北斗七星在太微北魁四星為璿璣杓三為玉衡杓南三星及魁第一星西三星皆曰三公主宣德化調七政和陰陽之官也二始皇本紀秦收天下兵聚之咸陽銷鋒鏑鑄金人十以弱天下之兵謂衛玠卒謝琨哭之曰棟梁折不覺哀晋陸抗拜司空賓客曰以我為三公是天下無人矣索酒著柱間祝曰當今之才以爾為柱石之臣莫傾人棟梁書髙祖封王子弟地犬牙相制所謂磬石之宗也漢史記成王封康叔剪桐葉為圭設明衣剪指爪鑿凶門而出淮南子大將受命已則馮唐傳上古王者之遣將也跪而推轂穆說文旒垂玉也記衮冕王十二旒網詩天子穆穆又穆皇皇宜君宜王古史成湯祝有老子天網恢恢疏而不漏候春秋考異郵黃帝將起黃雀赤頭立日旁尚書中赤雀銜丹書入豐止於昌前而瑞應圖黃龍四龍之長王者不漉地而漁則應和氣游於池沼尚書中候舜沉壁於河榮光休至黃龍負卷舒圖出入壇畔媒漢郊祀歌天馬來龍之賢非夢傅野隱類鑿顔壞普回切自古江湖客冥心若死灰末歎窮老飄零也說公知世不見用故非傅而類顔闔心若死灰不當復問天下事矣夢此章八句起四句結中四段各十二句古史髙宗得說於傅巖之野先淮南子魯君欲相顔闔使人以幣焉鑿壞而遁之壞屋後牆也秋日荆南送石首薛明府辭滿告别奉寄薛尚書頌德敘懷裴然之作三十韻鶴注當是大厯三年秋至荆南作公與薛尚書有舊契此因明府以寄之詩意全重在尚書中後分頌德敘懷兩段斐然之作猶云文思勃然而有作部舊書吐蕃傳大厯二年十一月和蕃使撿挍戶尚書薛景仙自吐蕃使還首領論泣陵隨景仙入朝此詩云聞道和親入又云跋涉體何如則薛尚書必景仙也薛明府尚書之弟南征為客久西候别君初歲滿歸鳬舄秋來把雁書荆門留美化姜被就離居聞道去聲和親入垂名報國餘連枝不日並八座幾時除送别奉寄兩意兼提石客久自謂别君送薛鳬舄切首令雁書寄薛尚書留美化别後遺愛就離居歸晤其兄和親入尚書使吐蕃而還其名足垂後世連枝言兄弟聚首八座期明府升陟也征隋尹式詩西候追孫楚南津送陸機朱云孫子荆有西官屬送於陟陽候詩注陟陽亭名候亭也西候謂此唐人每用之趙次公作斗杓建西之候謂秋日鳬舄雁書注皆别見唐蕭詵屯軍荆門號荆門軍在夷陵序志士思垂名於身後姜被注見前見陸機豪士賦楊賜傳纍世寵無以報國身蘇武詩况我連枝樹與子同一唐書劉泊疏八座比於文昌往者胡星孛恭惟漢網疏風塵相􅐓胡孔切洞天地一丘墟殿瓦鴛鴦坼宫簾翡翠虛鈎陳摧徼道槍櫐力軌切失儲胥文物陪巡狩親賢病拮据此敘祿山陷京事謂祿山稱亂由朝廷過寵故曰漢網疏風塵兵戈遍地丘墟謂城郭一空瓦坼謂天子出奔簾虛謂妃嬪皆走鈎陳指侍衛摧徼道巡徼皆散矣槍櫐指守禦失儲胥庫藏盡亡矣陪巡謂衣冠扈從拮据謂宗室憂勞禁洙曰星指旄頭其光四出孛孛然也漢書循吏傳網疏濶洞簫賦風􅐓洞而不絶瓦王粲詩崤函一丘墟王鄴中記鄴城銅雀臺皆鴛鴦舊注魏文帝問晉宣曰吾夢殿屋兩瓦墜地化為鴛鴦對曰後宫當有暴死者簾洞冥記漢武帝甘泉宫起招仙閣編翠羽麟毫以為西京雜記有翡翠簾列西都賦周以鈎陳之位衛以嚴更之署又周廬千徼道綺錯漢書注遊徼循禁備盜賊徼道徼循之道櫐揚雄長楊賦木擁槍櫐以為儲胥注槍櫐作木槍相為栅也儲胥言儲蓄以待所須杜臆漢武帝作儲胥館故李義山詩風雲長為護儲胥宋子京詩密疏叩儲胥又秋色遍儲胥俱作皇居用之任昉齊景陵行狀地尊禮絶親賢莫二詩豫手拮据公時呵䝟音軋乙黠切貐戈渚切首唱却鯨魚勢愜宗蕭相去聲材非一范睢尸填太行音杭道血走浚儀渠滏口師仍㑹函關憤已攄紫微臨大角皇極正乘輿賞從去聲頻峩冕殊恩再直廬豈惟髙衛霍曽音層是接應平聲徐降集翻翔鳯追攀絶衆狙侍臣雙宋玊戰䇿兩穰苴此為薛尚書頌德盧前十句功在兩京後八句才兼文武注薛景仙為陳倉令殺楊國忠妻子及虢國大人是呵䝟貐也既克復扶風又擊破賊兵是却鯨魚也時軍中乏餉景仙控禦賊衝故江淮之粟得自襄陽達於扶風其功與蕭何之轉輸關中相埒不但如范雎之攻拔城邑也舊注以蕭相比郭令公以范睢比諸將未合時太行乃思明之冦浚儀乃慶緒之兵滏口即安陽河王師共㑹於此函谷關在陜州東京復而舊憤可攄也從紫微臨帝星復明也皇極正肅宗還京也賞從謂扈有功原注再直廬者薛舊執金吾新授羽林軍前後二將軍也宫衛霍比戰功應徐比文學朱注薛為太子賓客官在􅒼故方之應徐徐降集二句言其才品超出非衆人可及雙宋玉承應兩穰苴承衛霍誠齊詩話猶云三王不足四五帝不足六朱注句法與居然雙捕虜相似次公以降集四句為兼美兄弟非也爾雅䝟貐類貙虎摩牙食人述異記䝟貐獸中最大者龍頭馬尾長四百尺善走以人為食傅亮傳首唱大義興復王室左傳取其鯨鯢以為京觀蕩水經注禹塞滎澤淫水於滎陽下引河通淮泗名浪渠一名浚儀渠舊唐書浚儀縣屬汴州山元和郡縣志滏水出磁州滏陽縣西北四十五里鼓亦曰滏山泉源奮湧若滏水故以滏名之太行八陘第四曰滏口陘對鄴西山嶺髙深實為險絶之祿山破東京先至函關後入潼關隋志紫微大帝座也又大角一星在攝提天王座也又名天棟亡書建用皇極舊注云乘輿反正左傳晉侯賞從者史記衛令曰周廬設卒甚謹漢書音義直宿曰廬去病漢武名將應德璉徐公幹魏太子賓客衛青霍通鑑廣德二年正月吐蕃陷京師既去以太子賓客薛景仙為南山五谷防禦使賈誼賦鳯凰翔於千仞兮列子智籠衆狙齊風賦序楚襄王遊於蘭臺之宫宋玉景差侍史記威王追論古司馬兵法附穰苴於其中號曰司馬穰苴兵法鑒徹勞懸鏡荒蕪已荷去聲鋤嚮來披述作重平聲此憶吹噓白髮甘凋喪去聲青雲亦卷舒經綸功不朽跋涉體何如應平聲訝耽湖橘常餐占去聲野蔬十年嬰藥餌萬里狎樵漁揚子淹投閣鄒生惜曵裾但驚飛熠耀不記改蟾蜍煙雨封巫峽江淮略孟諸此與薛尚書敘懷前八句敘薛交情後十句自敘旅况中言尚書有知人之鍳惜已之荒蕪不足有為也述作見其吹噓所謂鍳徹也白頭無意於青雲所謂荒蕪也經綸指薛能戡亂跋涉謂薛曾和蕃湖橘四語述貧病流離之狀淹投閣久於蜀惜曵裾不干人熠耀飛而歲忽換故可驚蟾蜍改而月頻移故不記也自峽至荆又將渡江淮過孟諸而北歸矣潛朱注懸鏡如氷鏡之懸也秦嘉詩明鏡可鍳形陶詩眷言終荷鋤魏文帝與吳質書斐然有述作意君原注石首處見公新文一通以史記范雎傳須賈曰能自致青雲之上易君子經綸詩大夫跋涉車潭州有橘洲四詩熠耀宵行注螢火也孟張載詩下如昨日蟾蜍五圓禹貢導荷澤被諸爾雅十藪宋有孟諸郭璞注在睢陽縣東北湯池雖險固遼海尚填淤努力輸肝膽休煩獨起豫以朂勉尚書作結北金湯指長安遼海在河時幽薊尚有不順命者故勸其努力報君不必專以起豫為念起豫依杜臆照上吹噓說舊解謂休作詩以起豫是泥論語子夏起豫耳十八句末段四句收此章前二段各十句中二段各齊書文宣常望并州城曰此何等城唐雍曰金城湯池滔通鑑大厯三年六月幽州兵馬使朱希彩與朱泚朱共殺節度使李懷仙自稱留後朝廷不能制故云遼海尚填淤前漢溝洫志填淤反壤之害師古注填淤謂壅泥也史記蒯通曰臣願披腹心輸肝膽言沈約詩起豫聖衷此借起廢也朱鶴齡曰新舊書皆不立薛景仙傳逆臣傳載代宗討史朝義右金吾大將軍薛景仙請以勇士三萬摧鋒死賊觀此詩滏口數語則收東京時景仙嘗㑹師滏陽立功河北矣舊書至德元載十二月秦州都督郭英乂代景仙為鳯翔太守而不言景仙遷轉何官此詩云殊恩再直廬豈景仙自鳯翔入即厯金吾羽林之職耶史家闕軼甚多可據此補之又通鑑廣德南二年正月吐蕃陷京師既去以太子賓客薛景仙為山五谷防禦使景仙嘗官宫􅒼或以應徐比之也公與景仙俱扈從還京景仙獨承恩侍直官躋八座賞從以下雖云頌美流落淹遲之感實寓其中出杜詩排律其前後段落必多寡勻稱未有長短錯者此詩諸家分截亦尚未清細玩始見其整齊也杜詩詳注卷二十一
