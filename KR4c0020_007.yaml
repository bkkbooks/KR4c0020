body:
  text: 杜詩詳註巻七翰林院編修仇兆鰲撰新安吏原注收京後作雖收兩京賊猶充斥二按此下六詩多言相州師潰事乃乾元年自東都回華州時經歴道途有感而作説者以為自華州之東都時誤矣師氏曰從新安吏以下至無家别葢紀當時鄴師之敗朝廷調兵益急雖秦之謫戌無以加也唐書新安隋縣貞觀二年屬河南府九域志縣有兩鄉擬黄生曰諸篇自製詩題有千古自命意六朝人樂府無實事而撰浮詞皆妄語不情客行新安道喧呼聞㸃兵借問新安吏縣小㪅無丁府帖一作符昨夜一作日下去聲次選中男行中男絶短小何以守王城從㸃兵後記一時問答之詞句客行公自謂杜臆借問二句公問詞府帖二吏答詞中男二句公歎詞詩通鑑北魏髙歡使張華原以簿歴營㸃兵樂府木蘭昨夜見軍帖可汗大㸃兵杜臆更無丁言豈無餘丁可遣乎夜帖早行守城急也追東宫兵帖上臺宿衛通鑑注兵帖軍籍朱注隋書盧注相州之役正丁戰死因及次丁考之周禮凢起徒役無過家一人以其餘為羡惟田與追胥竭作大故致餘子守王城大故也以為不可太宗紀上遣使㸃兵竝㸃中男魏徴固執顧炎武曰通鑑建中元年楊炎作兩稅人無丁中以貧富為差按唐制人有丁中黄小之分注云天寶二載令民十八以上為中男二十三以上成丁杜詩府帖昨夜下次選中男行即此也唐之東都即周之王城今為河南府肥男有母送痩男獨伶音零俜普兵切白水暮東流青山猶一作聞哭聲莫自使眼枯收汝淚縱平聲横眼枯即一作却見骨天地終無情此於臨行時作悲憫之語他白水流比行者青山哭指居者杜臆就中男内看或痩或肥有母無母及同行送行之人一齊俱哭而以哭聲二字括之何等筆力下不言朝廷而言天地諱之也肥男痩男用後漢趙孝語詳見八巻賦古樂府猛虎行少年惶且怖伶俜到他鄉潘岳寡婦少伶俜而偏孤劉楨詩汎汎東流水於阮籍詩北望青山阿之眼枯淚竭也韓非子卞和哭楚山之下泣盡而繼以血晉書郭文曰情由憶生不憶故無情我軍取一作至一作收相去聲州日夕望其平豈意賊難料平聲歸軍星散營就糧近故壘練卒依舊京掘壕不到水牧一作看馬役亦輕况乃王師順撫養甚分明送行勿泣血一作垂泣僕射如字不音夜如父兄此為送行者作寛慰之語前軍潰散後軍繼行恐人心惶懼曰就糧見有食也曰練卒非臨陣也曰掘壕牧馬見役無險也且師順則可制勝撫養則能優恤俱説得愷至動情中杜臆此不言軍敗而云歸軍亦諱之也子儀時已進書令而仍稱舊官葢功著於僕射而御士素寛此就其易曉者以安之也璇此章前二段各八句後段十二句收春秋運斗樞樞星散而通鑑九節度圍鄴城自冬涉春慶緒食盡克在朝夕諸軍既無統帥城久不下上下解體思明自魏州引兵趨鄴毎營選精騎五百日於城下抄掠諸軍樵采甚難乏食思潰三月戰於安陽河北大風晝晦官軍潰而南賊潰而北子儀以朔方軍斷河陽橋保東京築南北兩城而守之盧注時子儀尚有軍糧六七萬石故曰就糧京魏明帝詩飲觀故壘處舊吳越春秋揀練士卒舊謂東都陶潛詩平生去京壕城下池也博易泣血漣如者漢志百官表僕射秦官自侍中尚書士郎皆有古重武官有射以督課之應劭曰僕主也為通典唐左右二僕射本副尚書令自尚書令廢僕射宰相開元元年改為左右丞相從二品天寶元年復舊弟淮南子兵畧上視下如子則下視上如父上視下如則下視上如兄王應麟曰毛詩雖則如燬父母孔邇此云僕射如父兄意正近之張綖曰凡公此等詩不專是刺葢兵者凶器聖人不得巳而用之故可巳而不巳者則刺之不得巳而用者則慰之哀之若兵車行前後出塞之類皆刺也此可已而不已者也若夫新安吏之類則慰也石壕吏之類則哀也此不得巳而用之者也然天子有道守在四夷則所以慰哀之者是亦刺也陸時雍曰少陵五古材力作用本之漢魏居多第出手稍鈍苦雕細琢降為唐音夫一往而至者情也必然必不然者意也意死而情活意迹而情神意近而情逺意偽而情真情意之分古今所由為矣少陵精矣刻矣高矣卓矣然而未齊於古人者以意勝也假令以古詩十九首與少陵作便是首首皆意假令以新安石壕諸什與古人作便首首皆有神往神來不知而自至之妙潼闗吏此因相州大敗故修潼闗以備寇里雍録潼闗在華州華陰縣東比闗西一有潼水因以為名士卒何草草築城潼闗道大城鐵不如小城萬丈餘此敘修築潼闗高鐡不如言其堅萬丈餘言其高小城跨山故尤見其也詩勞人草草注草草勞苦貌世説若湯池鐵城無可攻之勢借問潼闗吏修闗一作築城還備胡要一遥切我下去聲馬行為去聲我指山隅連雲列戰格飛鳥不能踰胡來但自守豈復扶又切憂西都丈一作大人視要處窄一作穿狹容單車艱難奮長㦸萬吴作于古用一夫此備言闗勢險要修闗仍欲備胡事此句亦屬問詞要我二句吏指形勝連雲以下吏答之詞史記項羽紀乃令騎皆下馬步行庾信詩愁氣連雲書戰格即戰柵所以捍敵者厲易飛鳥遺之音李陵足下以單車之使漢書長㦸勁弩之械蜀都賦一夫守隘萬夫莫向哀哉桃林戰百萬化為魚請囑防闗將去聲慎勿一作莫學哥舒末乃答吏之語見守闗貴乎得人也此章首尾各四句中段十二句注書武成注桃林在華山左傳晉使詹嘉守桃林之塞今潼闗是也三秦記桃林塞在長安東四百里元和郡國志桃林塞自靈寶縣以西至潼闗皆是魚光武紀赤眉在河東但决水灌之百萬之衆可使為為哥舒翰傳翰率兵出闗次靈寶縣之西原賊所乗自相踐蹂墜黄河死者數萬人盧元昌曰禄山初反哥舒翰守潼闗相持半載餘賊兵衝突襄鄧間卒不敢窺闗則守之明效也時李郭亦力持此議禄山苦之謂嚴莊曰今守潼闗兵不能進是守闗而賊可坐困向使國忠之奏不行中使之命不促堅壁固守長安可保無恙此詩眼目在胡來但自守一句其云修闗還備胡是歎焦頭爛額後為曲突徙薪計也不王嗣奭杜臆曰潼闗之敗由楊國忠促戰所致罪在哥舒當時只少一死耳公特借翰以戒後人非專歸獄於哥舒也石壕吏王應麟曰石壕葢陜州陜縣之石壕鎮也地志云石壕鎮本崤縣後魏置貞觀十四年改名硤石縣一統志石壕在今陜州城東七十里暮投石壕邨叶音春有吏夜捉人老翁踰牆走老婦出看平聲門蘇潤公本作出看門叶音民一作門看海鹽劉氏本作門首首敘征役驅迫之苦此詩各四句轉韻邨人與門叶古入真韻白樂天北邨詩晨遊紫峰閣暮宿山下邨邨老見予喜為予開一樽邨叶七倫切樽叶踪倫切國風出自北門憂心殷殷荀卿賦篇往來惽憊通於大神出入其極莫知其門門俱叶眉貧切劉氏作出門首是邨與人叶走與首叶也以下文例之不宜兩句換韻舊本作出門看與人字相叶人讀如延切本劉向列女頌看讀丘䖍切本吳邁逺長相思詩依此則人看可叶而邨字未合與下文亦不相符謝靈運詩暝投剡中宿而陶潛詩區區諸老翁面戰國策曾子之母投杼踰牆走又老婦必唾其王羲之帖但思今婦必門首有出門樂府東門行投劔出門去看守門也吏呼一何怒上聲婦啼一何苦聽婦前致詞三男鄴城戍叶上聲一男附書至一作到二男新戰死存一作在者且一作是偷生死者長已矣二段備述老婦訴吏之詞公葢宿於其家也動三男以下言行者之慘梁昭明太子疏吏一呼門為民蠧孫子吏怒者倦也州陌上桑羅敷前致詞乾舊書武徳元年以魏郡置相天寶元年改為鄴郡元元年復為相州二年又為鄴城陵新戰死指鄴城之敗史記平原君傳李同戰死李書陵豈偷生之士蔡琰曲死當埋骨兮長已矣室中更無人惟文粹作所有乳下孫有孫陳浩然本作孫有母未去出入一作更無完裙一云孫母未便出見吏無完裙老嫗力雖衰請從吏夜歸急應河陽役猶得備晨炊室中以下言居者之苦新安吏驅民守東都石壕吏驅民守河陽也邯賈克詩室中是阿誰易閴其無人史記李同曰鄲之民褐衣不完縣又高帝紀有一老嫗夜哭説文嫗母也河唐書河陽屬孟州今改為孟縣按春秋天王狩於陽即此地周武王㑹諸侯於孟津亦即其地弼子儀兵既潰用都虞候張用濟策守河陽七月李光代史記亭長妻晨炊蓐食夜久語聲絶如聞泣幽咽入聲天明登前途獨與老翁别末結老翁潛歸之狀其婦随吏訴官故其媳泣聲吏驅婦夜去故夫曉回前途别乃公與之别非婦與翁别也久此章首尾各四句中二段各八句梁簡文燭賦夜唯煩鋏古歌鳴聲幽咽史記李廣傳至天明自便陶潛詩歸子念前途補註第二條至音止與死相叶衰音催與歸相叶陸時雍曰其事何長其言何簡吏呼二語便當數十言文章家所云要㑹以去形而得情去情而得神故也脱王嗣奭曰夜促夜去何其急也此婦倉卒之際既其夫仍免其身具此智謀膽畧真可謂女中丈夫而公詩詳述之已洞知其意中曲折矣且又云前後六詩一韻到底俱用沈韻惟此章換韻用古韻老按古者有兄弟始遣一人從軍今驅盡壯丁及於弱詩云三男戌二男死孫方乳媳無裙翁踰牆婦夜往一家之中父子兄弟祖孫姑媳慘酷至此民不聊生極矣當時唐祚亦岌岌乎哉新婚别真徳秀曰先王之政新有婚者期不役政此其所怨盡其常分而能不越禮義詩宴爾新婚起黄生注此下三題相似獨新婚之婦難設辭故特用比興發端兔絲附蓬麻引蔓故一作固不長嫁女與征夫不如棄路傍杜臆通篇作新人語起用比意逼真古樂府是三百篇興體爾雅唐蒙女蘿兔絲釋曰唐也蒙也女蘿也兔絲也一物而四名朱注按諸家本草兔絲竝無女蘿之名惟松蘿一名女蘿陸機詩疏兔絲蔓生草上黄赤如金松蘿蔓延松上生枝正青陸佃埤雅在水為女蘿在草為兔絲可証二者同類而有别古詩與君為新㛰兔絲附女蘿李善注古今方俗名草不同然是異草故曰附此解甚明荀子蓬生麻中不扶而直史記秦楚娶婦嫁女長為兄弟之國路詩征夫止劉公幹詩從者盈傍結髪為妻子樊作君妻席不煖君牀暮婚晨告别無乃太匆忙君行雖一作既不逺守邊赴一作戍河陽妾身未分明何以拜姑嫜此敘初婚惜别語意含羞人蘇武詩結髪為夫婦恩愛兩不疑李善注結髪始成也謂男年二十女年十五取笄冠之義也有顧炎武日知録曰俗稱妻為妻子此不典之言然亦所自韓非子鄭縣人卜子使其妻為袴曰象吾故袴妻子因毁新令如故袴杜詩本此白文子孔無席煖世説武王式商容之閭席不暇煖虎通昬時行禮故曰㛰詩陸機詩序悼心告别征張華詩無乃違其情曰沈約知君行之未極詩夫不逺史記蒙恬臣將三十萬衆以守邊廣謝朓詩况乃妾身輕忽獨曲歌分明不可得漢書川王傳背尊章嫖以師古曰尊章謂舅姑也章與嫜通陳琳詩善事新姑嫜然夢弼曰婦人嫁三日告廟上墳謂之成婚婚禮既明後稱姑嫜今嫁未成婚而别故曰未分明云云陸時雍曰妾身二句建安中亦無此深至語父母養我時日一作月夜令平聲我藏生女有所歸雞狗一作犬亦得一作相將君今生死地杜臆作生死地陳浩然作死生地一作今往死地一作生往死地沉痛迫中腸誓欲隨君去一作往形勢反蒼黄此臆前後情事詞㫖惨切分詩父兮生我母兮鞠我義又乃生女子梁禮運男有女有歸史記婦人之謂嫁曰歸穀傳雞狗之聲相聞淮南子令雞司晨令狗守夜按嫁時將雞狗以往欲為室家乆長計也古樂府有鳯將雛漢書注顔師古曰將謂領帥其羣孫杜臆君今生死地妙有餘思或作往死地語便直致子生死之地謝靈運詩沉痛結中腸色史記范睢傳形勢不能有也洛陽伽藍記雜蒼黄北山移文蒼黄反覆勿為去聲一作改新婚念弩力事戎行音杭婦人在軍中兵氣恐不揚自嗟貧家女久致一作致此羅襦裳羅襦不復扶又切施對君洗紅妝上二段夫婦分離愁緒萬端此發乎人情者也此一段既勉其夫且復自勵乃止乎禮義者也李蘇武詩努力愛春華鼓左傳下臣不幸屬當戎行子陵傳我士氣少衰而不起者何也軍中豈有女乎搜得皆斬之女後漢方術傳京師當有兵氣襦史記貧人女與富人㑹績周禮羅氏蜡則作羅注襦細宻之羅當作繻滑稽傳羅襦襟解微聞薌澤説文襦短衣也何遜詩輕扇掩紅妝杜臆洗紅妝加對君二字可涕仰視百鳥飛大小必雙翔人事一作生多錯迕與君永相望平聲結末用比意收終望夫婦之相聚也百此章起各四句中三段各八句陸機詩鳥互相和然左傳施氏婦曰鳥獸猶不失儷交闗尹子人事錯錯宋玉風賦迴穴錯迕注錯雜迕也蔡琰笳曲我與兒兮各一方日東月西兮徒相望陳琳飲馬長城窟行設為問答此三吏三别諸篇所自來也而新婚一章敘室家離别之情及夫婦始終之分全祖樂府遺意而沉痛更為過之别此詩君字凢七見君妻君牀聚之暫也君行君往之速也随君情之切也對君意之傷也與君永望志之貞且堅也頻頻呼君幾於一聲一淚盧元昌曰嗚呼亂不廢禮禮必順情先王之制也况民生有欲莫大於婚既棄其禮又怫其情至於暮婚晨别是何等時事東山零雨篇云其新孔嘉其舊如之何先王曲體人情如此詠公此詩益念范氏人道使民之説王嗣奭曰此代為婦人語而揣摩以發其隐情暮婚晨告别是詩柄篇中有極細心語如妾身未分明二句婦人在軍中二句是也有極大綱常語如勿為新婚念二句羅襦不復施三句是也真三百篇嫡裔羅大經曰國風豈無膏沐誰適為容葢古之婦人夫不在家則不為容飾此逺嫌防微之意也杜詩羅襦不復施對君洗紅妝尤可悲矣國風之後唯杜陵不可及者此類是也黄生曰新安吏以下述當時征戍之苦其源出于變風變雅而植體于蘇李曹劉之間垂老别蔡邕房楨碑享年垂老四郊未寧静垂老一作死不得安子孫陣亡盡焉於䖍切用身獨完通篇皆作老人語首為垂老從戎而歎也五記四郊多壘注四郊者王城之外四面近郊十里逺郊百里静吳志顧雍討除寇賊郡界寧詩子孫千億投杖出門去同行為去聲辛酸幸有牙齒存一作好所悲骨髓一作肉乾音干男兒既介胄長揖别上官此敘出門時慷慨前往之狀乃答同行者記子夏投其杖而拜阮籍詩驅車出門去動詩携手同行秦阮詩悽愴懐辛酸入魏文帝詩狂顧牙齒史記父兄怨此三人痛骨髓氣陳琳詩男兒寧當格鬬死曰介胄長揖猶帶倔强意漢周亞夫傳亞夫持兵揖介胄之士不拜又酈食其傳長揖不拜官嵇康書揖拜上老妻卧路啼歲暮衣裳單孰知是死别且復去聲傷其寒此去必不歸還聞勸加餐此敘臨别時夫婦繾綣之情乃對其妻者令夫傷妻寒妻勸夫餐皆永訣之詞吳越春秋越王壯者無娶老妻張協詩歲暮懐百憂人沈約詩惟見恩義重豈覺衣裳單傳焦仲卿妻詩生作死别恨恨那可論史記范雎須賈曰范叔一寒如此哉捐又吳起傳其母死起終不歸古樂府棄不復道努力加餐飯土門壁甚堅杏園度亦難勢異鄴城下縱死時猶晉作獨寛人生有離合豈擇衰老一作盛端憶昔少去聲壯日遲迴竟長嘆平聲下此慰妻而兼為自解之詞注上四言此行不至死亡四言離合莫非定數盧鄴城之役賊為主我為客土門杏園之守我為主賊為客也勞逸不同故曰勢異逺注離合之端豈因衰老而免特身非少壯不覺遲迴耳志唐書鎮州獲鹿縣有土門闗即舊井陘闗元和郡縣恒州有井陘縣井陘口今名土門口在獲鹿縣西南十里即太行入陘之第五陘也安禄山傳李光弼出土門救常山郡九域志衛州汲縣有杏園鎮舊唐書郭子儀自杏園渡河圍衛州故朱注時子儀光弼相繼守河陽土門杏園皆在河北湏嚴備舊注謬極壯楚辭固人命兮有當孰離合兮可為注列子其在少則血氣飄溢鮑照詩臨路獨遲迴張銑曰遲迴不行貌一蘇武詩握手長歎萬國盡征戍一云東征烽火被岡巒積屍草木腥流血川原丹何鄉為樂音洛土安敢尚盤桓棄絶蓬室居塌然摧肺肝此傷亂而激為奮身之語毅言與其遭亂而死不如討賊而亡然有敵愾勤王之義以前云遲迴之歎尚以年邁自憐此云安敢盤桓不復身家為念矣此章四句起前二段各六句後二段各八句詩闗山征戍何時極孝經得萬國之歡心間陳後主史李牧傳謹烽火多諜蜀都賦岡巒糾紛成漢書梅福傳積屍暴骨篇史記白起北坑馬服流血川沸聲若雷張華遊獵流血丹中原釋洪偃詩川原多舊跡盤曹植詩門有萬里客問是何鄉人詩適彼樂土易桓利居貞注盤桓難進之貌室列子北宫子庇其蓬室若廣厦之陰曹植詩顧念蓬士尹伯竒履霜操孤息别離兮摧肺肝曹植詩哀哉傷肺肝盧元昌曰周禮鄉大夫之職辯其所任者其老者皆舍勾踐伐吳有父母耆老無毘弟者皆遣歸魏公子無忌救趙亦令獨子無兄弟者皆歸養子孫亡盡老者從戎如垂老别者亦可傷矣胡夏客曰新安石壕新婚垂老諸詩述軍興之調發寫民情之怨哀詳矣然作者之意又不止此國家不幸多事猶幸有繕兵中興之主上能用其民下能應其命至殺身棄家不顧以成一時恢復之功故娓娓言之義合風雅不為誹謗耳若勢極危亡一人束手四海離心則不可道巳無家别詩樂子之無家黄生注詩言内顧無妻也言永痛無母也母亡妻去曲盡無家之慘寂寞天寶後園廬但蒿藜我里百一作萬餘家世亂各東西存者無消息死者為一作委塵泥賤子因陣敗歸來尋舊一作故蹊通章代為征人之語首言亂後歸鄉景情竝敘謝朓詩寂寞市朝變前漢郊祀志嘉禾不生蓬蒿藜莠茂焉息謝朓牋岐路東西或以嗚悒薛道衡詩一去無消鮑照詩賤子歌一言敗歸謂鄴城之敗久行見空巷一作室日痩氣慘悽但對狐與狸豎毛怒我啼四隣何所有一二老寡妻宿鳥戀本枝安辭且窮棲方春獨荷去聲鋤日暮還灌畦縣吏一作令知我至召令平聲習鼓鞞此段敘事言歸而無家也旋上六説故里荒凉之狀下六説暫歸役之苦日瘦謂日色無光氣象慘悽光楚辭霜露惨悽而交下前漢劉向傳寒日青無本草狐形似狸而黄善能為魅婦記修其班制以與四鄰交行漢書元后傳漢家老寡旦暮且死潘岳闗中記夫妻寡洙曰人情之戀故鄉猶鳥之戀本枝雖窮棲且安辭矣之獨曲歌宿鳥縱横飛江淹詩雖有荷鋤倦顔延陶徴士誄灌畦鬻蔬為供魚菽之祭説文田五十畝為畦鞞記君子聽鼓鼙則思將帥之臣說文鼓騎鼓也鼙與同雖從本州役内顧無所擕近行止一身逺去終轉迷家鄉既盪盡逺近理亦齊永痛長病母五年委溝谿生我不得力終身兩酸嘶人生無家别何以為蒸黎此段敘情言無家又别也出上六傷隻身之莫依下六痛親亡之不見上章結報國之忠此章結出思親之孝俱有闗於大倫無杜詩有數句疊用開闔者如云從役本州幸之也内所携傷之也隻身近行非比逺去又以本州為幸矣家鄉既盡逺近齊等即在本州亦傷矣語意輾轉悲痛無所擕無與離别者終轉迷言往無定所兩酸嘶謂母子飲恨為蒸黎不得比於人數也譽此章八句起後兩段各十二句盧諶詩豈謂鄉曲謬充本州役運左思詩内顧無斗儲天宋袁淑議勢必携離謝靈詩家鄉皆掃盡自寶十四載至乾元元年亂經五年矣勞爾雅水注川曰谿注谿曰谷注谷曰溝詩生我劬陸厥詩酸嘶度揚越詩天生蒸民毛萇曰蒸衆也裴秀詩穆穆我后矜兹蒸黎朱子詩傳黎黒也猶秦言黔首盧元昌曰先王以六族安萬民使民有室家之樂今新安無丁石壕遣嫗新婚有怨曠之夫婦垂老痛陣亡之子孫至戰敗逃歸者又復不免河北生靈幾於靡有孑遺矣唐之危而不亡者頼太宗徳澤在人而思明自殞於蕭牆耳焉唐人作詩多言遣戍從軍之苦而宋元以下無聞葢唐用府兵兵即取之於民故有别離室家逺罹鋒鏑及親朋送行歴歴悲慘之情宋明之師或用召募或用屯軍出征臨戰皆其身所習熟而分所當為者故詩人亦不復為哀苦之吟矣王嗣奭曰上數章詩非親見不能作他人雖親見亦不能作公往來東都目撃成詩若有神使之遂下千年之淚又曰新安憫中男也其詞如慈母保赤石壕作老婦語新婚作新婦語垂老無家其苦自知而不能自達一一刻畫宛然同工異曲随物賦形真造化手也夏日歎此乾元二年夏在華州作市舊唐書乾元二年四月癸亥以久旱徙雩祭祈雨通鑑時天下饑饉九節度圍鄴城諸軍乏食人思自潰與詩中上蒼久無雷及流冗豺虎等語正合夏日出東北陵天經晉作經天陵中一作東街朱光徹厚地鬱蒸何由開此詩憂旱而作也首敘夏日炎威午杜臆夏日出寅入戍寅東北方也中街亭也楚辭陽杲杲其朱光翰曰朱光日也蒸詩謂地葢厚應劭曰處凉臺而有鬱之煩上蒼久無雷無乃號令乖雨降不濡物良田起黄埃飛鳥苦熱死池魚涸其泥此有感時政而歎久旱為災後雷比政令雨比恩澤魚鳥言萬物皆枯漢郎顗傳易傳曰當雷不雷陽徳弱也雷者號令其徳生養行抱朴子良田之晚播愈於卒歲之荒蕪鮑照苦熱身熱頭且痛鳥墜魂來歸為淮南子宋君亡其主池中魚之殫萬人尚流冗舉目惟蒿萊至今大河北化一作盡作虎與豺浩蕩想幽薊王師安在哉此又慨時事而嘆兵民交困漢亂後凶荒民將為盗王師久戍艱於饋餉矣書谷永疏流㪚冗食餒死於道成帝詔水旱為災闗東流冗者衆與何遜詩舉目想煎熬阮瑜詩出壙望故鄉但見蒿萊江表傳郭典為鉅鹿太守時人語曰郭君圍塹董將不許幾令狐狸化為豺虎唐書幽州范陽郡薊州漁陽郡俱屬河北道對食不能餐我心殊未諧𦕈然貞觀去聲初難與數子偕末乃傷今思古歎朝無賢相也不此章起結各四句中二段各六句詩使我能餐兮揚雄傳𦕈然以思唐虞之風令師氏曰太宗貞觀時任房杜王魏諸臣諌行言聼號無乖膏澤流布斗来三錢行旅不齎糧今欲與數子偕不可得矣嵇康詩良時遘數子補注佳灰二韻用泥字見應瑒建章臺詩盧元昌曰李輔國專掌禁兵事無大小制勅皆其所為詩云號令乖指此宰相李峴言輔國專權亂政輔國忌而罷之若李揆執子弟禮於輔國呼為五父吕諲第五琦率皆碌碌庸臣此所以思貞觀諸賢也夏夜歎與上篇同時之作永日不可暮炎蒸毒我一作中腸安得萬里風飄颻吹我裳日暮思風引起夜景月書日永星火劉公幹詩永日行遊戲庾信詩五炎蒸氣洙曰毒我腸熱自中起也相如琴歌室邇人遐毒我腸陸士衡歌長風萬里舉昊天出華月茂林延疎光仲夏苦夜短開軒納微凉虛明見纎毫羽蟲亦飛揚物情無巨細自適固其常此夜凉之景詩物情各適起下文征人昊天曰明江淹詩華月照芳池夜蘭亭序茂林修竹臨謝靈運詩不怨秋夕長恒苦熱短阮籍詩開軒四野陶潛詩夜景湛虚明羽拾遺記小則入於纎毫之中熠燿宵行注宵行蟲也阮籍詩羽翼自飛揚詩淮南子巨細或殊情理同致莊子非自適其適念彼荷去聲戈士窮年守邊疆何由一洗濯執熱互相望平聲竟夕撃刁斗喧聲連萬方青紫雖被去聲體不如早還鄉此夜熱之感詩荷戈守邊指相州之衆何戈與祋何荷通之江賦尋風波以窮年便鍾惺曰考亭解執熱作執持執今人以水濯手豈能執持熱物乎葢熱曰執熱猶云熱不可解此古文用字奥處濯即洗濯之濯浴可解熱也杜詩屢用執熱字皆作實用是一証據李廣傳程不識正部曲行伍營陣擊刁斗至明軍不得自便注以銅作鐎受一斗晝炊飯食夜撃持行名曰刁斗通前漢夏侯勝傳經術既明取青紫如俯拾地芥耳鑑至徳二載郭子儀敗於清渠復以官爵收散卒由是應募入軍者一切衣金紫北城悲笳發鸛鶴號平聲且翔况復扶又切一作懐煩促倦激烈思時康此乃曉觸所聞而傷歎世事也此章起結各四句中二段各八句于垤北城指華州每崔融詩夜夜聞悲笳正詩鸛鳴張華詩煩促有餘蘇武詩長歌激烈沈君攸詩行樂為時康王嗣奭曰二歎俱以旱熱起興而所以歎在河北之賊未平葢憫旱憂時之作也立秋後題此乾元二年立秋次日所作輔鶴注唐書本傳甫為華州司功屬闗饑棄官客秦州此詩葢欲棄官時作日月不相饒節序昨夜隔𤣥蟬無停號平聲秋燕已如客平生獨往願惆悵年半百罷官亦由人何事拘形役前四秋後之景後四所題之意鶴盧注秋燕公自喻言將去華如燕離故云如客注是年公四十八今云半百舉成數而言也莊鮑照詩日月流邁不相饒天江淹詩凄凄節序高子江海之士山谷之人輕地細萬物而獨往也奚歸去來辭既自以心為形役惆悵而獨悲王嗣奭曰張綖謂公詩苦乏大藥資山林跡如掃又詩往與惠詢軰中年滄洲期皆生平獨往之願也余謂此詩乃公轉念以後一味有高蹈志矣貽阮隠居名昉間作此乾元二年自華州之秦秋冬生注唐詩人有此高士賴公詩以傳陳留風俗衰人物世不數所主切塞上得阮生迥繼先父祖首敘阮氏家世其鶴注陳留乃汴州塞上謂秦隴阮昉居塞上陳留祖父所出也晉書阮籍陳留尉氏人父瑀魏丞相椽子渾姪咸咸子瞻瞻弟孚咸從子修孚族弟放放弟裕皆知名當世推為人物第一世説王平子嘗經陳留郡界語太守曰舊名此邦有風俗新唐書藝文志有陳留風俗傳三巻朱注古今注塞者所以壅塞夷狄也公秦州䕫州詩毎用塞上字葢秦界羌夷䕫界五溪蠻二州皆有闗隘之設貧知静者性白一作自益毛髪古車馬入鄰家蓬蒿翳環堵此言其安貧自得蓬黄注貧知二句見古心古貌堵髙士傳張仲蔚所居蒿没人韓詩外傳原憲居環之室茨以蒿萊清詩近道要識子一作字謂昉善篆隸也用心苦尋我草逕微褰裳踏寒雨此言其好學多情多傳咸詩人之好我贈我清詩蔡注唐人綺麗惟昉詩有理趣紫微王夫人詩道要既巳足可以解人憂妹隋元行恭詩草深斜徑没詩褰裳涉溱鮑照與書吾自發寒雨更議居逺邨避喧甘猛虎足明箕潁客榮貴如糞土末見隐居有避世高風甘杜臆蓬蒿環堵而先以車馬隣家議居逺邨而繼以近猛虎静者性如是方是真隐文此章四段各四句之沈約詩避世非避喧宿晉書郭少愛山水歴華陰崖時猛獸為暴文獨十餘年卒無患害潁謝靈運擬徐幹詩序幹少無宦情有箕潁之志箕山水許由巢父隐處晉語云玉帛酒食猶糞土也本黄注喧指車馬陶詩遣興去聲三首此乾元二年秋在秦州作詩中言馬邑州鄴中事秋雨足知其為此時也下去聲馬古戰塲四顧但茫然風悲浮雲去黄葉墜一作墮我前朽骨穴螻蟻又為蔓草纒故老行歎息今人尚開邊漢虜互勝負樊作失約封疆不常全安得廉頗一作恥非將去聲三軍同晏眠此經戰塲而譏邊將之要功者上六敘景下六論事風悲二句仰而見者朽骨二句俯而見者廉頗安邊而不生事歎天寶諸將之不然也塲史記張儀傳梁之地勢固戰塲也蘇武詩行役在戰谷古詩四顧何茫茫葉秦嘉詩浮雲起髙山悲風激深吳均詩仲冬黄下劉向新序文王得朽骨以喻其意木斂魂陸機挽歌豐肌饗螻蟻書恨賦蔓草縈骨拱西征賦訊諸故老漢嚴助傳武帝開置邉郡詩鮑照詩漢虜方未和莊子一勝一負兵家常事陶潛似若無勝負孟子域民不以封疆之界史記亷頗者趙之良將也高秋登寒一作塞山南望馬邑州降平聲虜東擊胡壯健盡不留穹廬莽牢落上有行雲愁老弱哭道路願聞甲兵休鄴中事反覆方服切一云何蕭條死人積如丘諸將去聲巳茅土載驅誰與謀次章望馬邑諷諸將之敗軍也上八歎降夷東征下四傷鄴城師潰朱注降虜謂秦隴間屬夷調發討賊者舊注指回紇非九黄希曰諸將不指李郭如封朔方大將軍孫守亮等人為異姓王李商臣等十三人為同姓王是也州鶴曰舊注謂馬邑州屬代州葢引前漢書而唐志代雁門郡却不言按唐地理志羈縻州内有馬邑州屬隸秦州開元十七年置在秦成二州山谷間寶應元年徙於成之鹽井故城此詩作於乾元二年則在秦成間朱注故城隸秦州都督府何遜詩追兵赴馬邑前漢書贊日殫出於降虜故漢書匈奴傳同穹廬卧顔注穹廬遊帳也其形穹隆曰穹廬東觀漢記第五倫自度仕宦牢落邢子才詩愁雲聚復開障史記匈奴傳貴壯健賤老弱殺賈捐之傳女子乗亭孤兒號道路陰符經人發機天地反覆詩載馳載驅申涵光曰杜詩諸將巳茅土載驅誰與謀髙適亦云豈無安邊策諸將已承恩皆言㤙寵太過將驕不可用也豐年孰一作既一作亦云遲甘澤不在早耕田秋雨足禾黍已映道春苖九月交顔色同日老勸汝衡門士勿悲尚枯槁時來展才力先後無醜好但訝鹿皮翁忘機對芝一作芳一作叢草三章覩秋成感賢士之晚遇也上六句興起下意秋禾晚登猶士之晚遇遲速何足計乎今既不能遇當如鹿皮翁之遯世矣多杜臆遣興本意在此章曹植詩良田無晚歲膏澤豐年荆楚歲時記六月必有三時雨田家以為甘澤陸機賦甘澤霶霈撃壤歌耕田而食古詩禾黍油油兮同日老即日至皆熟意莊詩衡門之下可以棲遲注横木為門貧者之居也子枯槁之士宿名魏志太祖才力過人翁列子賢愚好醜成敗是非無不銷滅山列仙傳鹿皮淄川人也少為府小吏舉手成器岑上有神泉人不能到小吏白府君請木工斧斤三十人作轉輪懸閣數十日梯道成上巔作祠屋留止其旁食芝草飲神泉七十餘年淄水來山下呼宗族家室令上山半水出盡溧一郡没者萬計小吏辭遣宗族下山著鹿皮公去復上閣後百餘年下賣藥齊市髙士傳葉幹忘機胡夏客曰杜公古詩近體在長安時才力未為造極秦州以後古詩則卓錬精深䕫州以後又縱情雜亂不及前矣律詩則老而愈細四韻固多佳篇長律尤盡其妙留花門此當是乾元二年秋適秦州後作理杜臆題曰留花門言不當留也唐地志甘州删丹縣北渡張液河西北行出合黎山峽口傍河東北行千里有寧寇軍軍東北有居延海又北三百里有花門堡又東北千里至回紇衙帳舊書肅宗還西京葉䕶辭歸奏曰回紇戰兵留在沙苑今且歸靈夏取馬更為陛下收范陽餘孽花門一作北門一作北方天驕子飽肉氣勇决高秋馬肥健挾矢射音石漢月首敘花門氣習見其强梁可畏衣天驕子見前漢書外國傳又云咸食畜肉其皮革司馬遷書恥辱者勇之決也恐漢書趙充國曰秋高馬肥變必起矣顔注秋馬肥健其為冦也詩既挾我矢則漢書邊外舉事常随月盛壯以攻戰月虧退兵徐陵詩天雲如地陣漢月帶胡秋自古以為患詩人厭薄伐修徳使其來羈縻固不絶胡為傾國至出入暗金闕中原有驅除隠忍用此物此言馭邊有方不宜借兵召侮講曰隠忍明知其有害不得巳而用之也伐王褒四子徳論詩人所歌自古患之如此詩薄玁狁國語先王之制戎翟荒服者有不王則修徳劭漢書傳贊其慕義而貢獻則接之禮讓羈縻不絶應曰馬曰羈牛曰縻言四夷如牛馬之受羈縻也除樂府曲戲金闕遊紫庭漢書王莽傳贊聖人之驅云爾注言王莽驅逐蠲除以待聖人也活司馬遷書所以隠忍茍公主歌黄鵠君王指白日連雲屯徒昆切左輔百里見積雪長㦸鳥休飛哀笳曙一作曉幽咽田家最恐懼麥倒桑枝折此言締婚之舉適足騷擾畿輔公羊傳天子至尊嫁女不自主婚使同姓主之故曰公主孫漢西域傳元封中以江東王建女細君為公主妻烏昆莫昆莫年老言語不通公主悲愁作歌曰居常土思兮心内傷願為黄鵠兮歸故鄉天子聞而憐之文苑辯証鄭愔送金城公主適西蕃詩貴主想黄鶴陸徳明云鵠又作鶴鵠鶴可通用舊唐書乾元元年七月上以幼女寕國公主妻回紇可汗送至咸陽磁門驛公主辭訣曰國家事重死且無恨國語與君王哉詩謂予不信有如皎日注言指白日以為盟約也沙劉表傳雲屯冀馬潘岳秋興賦高閣連雲左輔謂苑三輔黄圖左輔都尉治髙陵必樓鑰曰讀者謂積雪止言其多上句言雲屯足矣何復贅此語惟知回紇之俗衣冠皆白然後少陵之意渙然朱注舊唐書郭子儀收西京時遇賊新店軍却回紇望見踰山西嶺上曳白旗趨擊之賊大敗按此則回紇旗幟用白百里積雪當謂此耳一陸機詩仰憑積雪巖杜臆連雲積雪顛倒作對亦句法闗史記樗里子傳長㦸居前疆弩在後桑庾信詩哀笳塞曲古歌鳴聲幽咽東漢童謠無附枝麥有兩岐沙苑臨清渭泉香草豐潔渡河不用船千騎去聲常撇烈一云滅没正異作撇捩胡塵踰太行音杭雜種上聲抵京室花門既須留原野轉蕭瑟末言養馬苑中不能𠞰賊而反以妨民乘馬以渡故不用船撇烈擺躍之狀踰太行指思明抵京室謂囘紇也馮此章四句起下三段各八句黄希曰沙苑在同州翊縣南十七里唐志同州雖不言渭水而同與華隣華陰有漕渠自苑西引渭水可見其下臨清渭周禮水泉必香桃葉歌桃葉復桃葉渡江不用楫古樂府欲渡河無船捩上林賦轉騰撇冽孟康曰撇冽相撇也漢臯詩話撇疾貌大食刀歌鬼物撇捩辭坑壕字意皆同自任昉牋胡塵罕嘗夕起述征記太行山首始河内河内至幽州凡有八陘州丘遲書無取雜種本舊唐書安禄山本名乾犖山營栁城雜種史思明名窣于營州寧夷州突厥雜種也王安禄山事蹟乾元二年正月思明於魏州自立為燕引兵救相州官軍敗績九月思明又收大梁陷洛陽王潘岳詩引領望京室並曹植詩原野何蕭條粲登樓賦風蕭瑟而典補註晉書贊蠢兹雜中唐汝詢曰肅宗以回紇兵收京久留不遣子美憂其為害而作是詩公主君王二語説得可憐可羞田家原野二語説得亦憂亦憤以范梈曰此中國何如時也讀胡為傾國至數語可鍳春秋書㑹戎盟戎之義矣謂子美為詩史豈不信哉乾按回紇留兵沙苑在至徳二年十月寧國下降在元元年七月回紇復遣驍騎三千助討安慶緒在元年八月郭子儀拔衛州圍鄴城在元年十月九節度之師潰於相州在二年三月史思明復取大梁陷洛陽在二年九月此詩述屯兵沙苑及公主下嫁之事當屬元年之秋其云踰太行抵京室又當屬二年秋末矣此必回紇敗歸思明猖獗之後追記前事耳言回紇千騎之撇烈如此而太行烟塵之侵逼又如彼然則花門之留亦何救於原野蕭瑟乎葢甚言借兵之無益也或云踰太行而至京邑即指回紇新來驍騎按回紇若取道太行路程反紆説亦未確胡應麟曰陳思王古詩獨擅然諸體各有師承惟陶之五言開千古平淡之宗杜之樂府掃六代沿洄之習真謂自啟堂奥别創門戸然終不以彼易此者陶之意調雖新源流匪逺杜之篇目雖變風格靡超故知三正迭興未若一中相授也佳人鶴注此當是乾元二年在秦州作以司馬相如長門賦夫何一佳人兮步逍遙自娛此為陳皇后見廢而作詩題正取之絶代有佳人幽居在空一作山谷自云良家子零落依草木闗中昔喪去聲亂一作敗兄弟遭殺戮官高何足論平聲不得收骨肉首言佳人遭亂致零落失依延自云二字并貫下段官高應良家子李年歌北方有佳人絶世而獨立唐人避太宗諱故改世為代黄石公素書得機而動則能成絶代之功論衡幽居静處恬澹自守家詩皎皎白駒在彼空谷惟史記外戚世家竇姬以良子入宫侍太后楚辭草木之零落兮注草曰零木曰落注漢書髙帝紀懐王與諸將約先入定闗中者王之顔自函谷闗以西總名闗中魏志衛顗傳闗中膏腴之地頃遭荒亂師詩天降喪亂唐書天寶十五載六月已亥禄山陷京詩逺父母兄弟莊子無殺戮之刑越抱朴子官高者其責重逐史記鄒陽傳意合則胡為昆弟不合則骨肉出不收世情惡去聲衰歇萬事隨轉燭夫壻輕薄兒新人美吳作已如玉合昬尚知時鴛鴦不獨宿但見新人笑那聞舊人哭次言兄弟既喪因見棄於夫宴上四慨世傷心下四託物興感新人疊言即衛風爾新婚如兄如弟宴爾新婚不我屑以之意銷纒子董無心曰無心鄙人也不識世情莊子萬事亡庾肩吾詩聊持轉風燭暫映廣陵琴傳樂府陌上桑東方千餘騎夫婿居上頭誤後漢宗室光武曰孝孫素謹善當是長安輕薄兒之耳孝孫順陽侯嘉字也沈約詩長安輕薄兒玉古詩長跪問故夫新人復何如詩彼其之子美如古詩燕趙多佳人美者顔如玉槿陸倕刻漏銘蓂莢朝開合昬暮巻周處風土記合昏也華晨舒而昏合本草合歡即夜合也人家多植庭除間一名合昏不古今注鴛鴦鳬類雌雄未嘗相離江總詩池上鴛鴦獨宿王僧孺詩新人含笑近故人含淚隠陶潛詩市朝棲舊人在山泉水清出山泉水濁侍婢賣珠迴牽蘿補茅屋摘花不挿髪一作髻一作鬢采柏動盈掬一作握天寒翠袖薄日暮倚修竹末言婦雖見棄終能貞節自操上四應幽居在空谷下四應零落依草木補此段賦中有比山泉比守潔不汚採柏比貞心不改茅屋室之陋也不揷髪容之悴也翠袖倚竹寂寞無聊也貞此章三段各八句詩相彼泉水載清載濁此謂守清而改節濁也或以新人舊人為清濁或以前華後憔為清濁或以在家棄外為清濁皆未當漢書游俠傳陳孟公過寡婦家留宿為侍婢扶臥居東方朔傳董偃與母以賣珠為事牽蘿補屋甚言不庇身猶楚辭製茭荷以為衣集芙蓉以為裳或疑蘿不能蔽風雨太泥一説藤蘿蔓屋其空缺處牽蘿補之使青翠滿屋即對門藤葢瓦之意乃山居幽致此説亦通梁昭明詩牽蘿下石磴攀桂陟松梁韓非子不食於茅屋之下僧湯濟詩摘花還自挿終古詩馬啖柏葉人啖柏脂不可長飽聊可遏飢詩朝采緑不盈一掬毛萇曰兩手為掬枚古樂府海水知天寒夾王粲詩日暮愁我心乘莵園賦修竹檀欒池水薛綜曰修長也按天寶亂後當是實有是人故形容曲盡其情舊謂託棄婦以比逐臣傷新進猖狂老成凋謝而作恐懸空撰意不能淋漓愷至如此句楊億詩獨自憑闌干衣襟生暮寒本杜天寒翠袖而低昻自見彼何以不服杜耶夢李白二首梁權道依舊次編在乾元二年秦州詩中盧注考白年譜乾元元年流夜郎二年半道承恩放還白寄王明府詩云去年左遷夜郎道今年敕放巫山陽其自巫山下漢陽過江夏而復遊潯陽等處葢在二年公客秦州正其時也觀詩中闗塞江南等字可見曾鞏李白集序白臥廬山永王璘迫致之璘敗白坐繫潯陽獄得釋乾元元年終以汙璘事長流夜郎死别已吞聲生别常惻惻江南瘴癘地逐一作逺客無消息首敘致夢之由卿瘴地而無消息恐死生難定故心常惻惻焦仲妻詩生人作死别恨恨那可論後漢宦者傳羣公卿士杜口吞聲注蘇武詩淚為生别滋歐陽建詩惻惻心中酸趙潯陽今之江州也屬江南東路癘孫萬壽詩江南瘴癘地從來多逐臣魏都賦封疆瘴廣州記夏謂青草瘴秋謂黄茅癘李斯書臣聞吏議逐客竊以為過矣虞羲詩君去無消息故人入我夢明我長一作常相憶君今在羅網何以一作似有羽翼君今二句舊在闗塞黒之下今從黄生本移在此處于兩段語氣方順恐非平生魂路逺一作述不可測此述夢中相接之情啟白繫潯陽故云羅網恐非平生疑其死於獄也郝曰讀此段千載之下恍若夢中真傳神之筆樂魏文帝詩眼中無故人孔楊素詩入夢訪幽人得古府下有長相憶説苑子曰君子慎所從不其人則有羅網之患意蔡琰笳曲焉得羽翼兮將汝歸任昉詩還敘平生古詩路逺莫致之沈約詩夢中不識路何以慰相思魂來楓林一作葉青魂一作夢返闗塞黑落月滿屋梁猶疑照一作見顔色水深波浪濶無使蛟龍得末記覺後相思之意又恐死於溺也楓林白所在闗塞公所居水深浪濶楊慎曰夢中見之而覺其猶在即所謂夢中魂魄猶言是覺後精神尚未回也同此章次序當依黄氏更定分明一頭兩脚體與下篇格楚辭招魂湛湛江水兮上有楓林目極千里兮傷春心魂兮歸來哀江南伏知道詩落月與雲齊宋玉神女賦其始來也耀乎若白日初出照屋梁其少進也皎若明月舒其光魏甄后詩想見君顔色傅𤣥詩山高水深路無由齊虞茂詩三山波浪高人淮南子蛟龍水居吳均續諧記漢建武中長沙歐回見一人自稱三閭大夫曰吾嘗見祭甚盛然為蛟龍所苦此拈逐客無消息故有路逺之憂水深之慮次章拈情親見君意故寫局促之情憔悴之態章法照應按太白本傳白喜縱横術撃劍為任俠杜公向贈詩云飛揚跋扈為誰雄葢恐其負才任氣至於僨事也後來永王璘起兵迫致不能自脱觀其作東巡歌云永王正月東出師天子遙分龍虎旗又云二帝巡遊俱未迴五陵松柏使人哀又云南風一掃胡塵静西入長安到日邊尚以勤王望永王意中實未嘗忘朝廷也及璘敗而白遂繫獄殆所遭時勢之不幸耳少陵惓惓係念亦曲諒其苦心而深為之悲痛耳胡應麟曰明月照高樓想見餘光輝李陵逸詩也子建明月照高樓流光正徘徊全用此語而不用其意遂為建安絶倡少陵落月滿屋梁猶疑照顔色正用其意而少變其句亦為唐句峥嶸今學者第知曹杜二句之妙而不知其出於漢也浮雲終日行遊子久不至三夜頻夢君情親見君意首從頻夢敘起雲情意皆屬李情就夢時言意就平日言蔽太白詩浮遊子意此章起首即用其語古語浮雲白日遊子不復返説傅𤣥詩夢君結同心得鮑照詩惆悵憶情親世潘岳答樂廣曰要湏君意告歸常局促苦道來不易去聲江湖多風波一云秋多風舟楫恐失墜出門搔白首若一作苦負平生志此代述夢中心事曲盡倉皇悲憤情狀平告歸四句夢聞其言出門二句夢見其形不上章以生魂起下此章以平生志起下前漢直疑傳同舍有告歸道仲長統詩何為局促制晉僧張奴歌樂所少人往苦若翻囊賈誼傳經不定是猶渡江湖亡維楫中流而遇風波船必覆矣生詩搔首踟蹰潘岳詩白首同所歸謝惠連詩平無志意冠葢滿京華斯人獨顦顇孰云網恢恢將老身一作才反累千秋萬歲名寂寞身後事此傷其遭遇坎軻深致不平之意身累名傳其屈伸亦足相慰但惻惻交情説到痛心酸鼻不是信將來還是悼目前也此章四句起下二段各六句魏國策冠葢相望顔郭璞詩京華遊俠窟網嵇康詩何時見斯人楚辭色憔悴道徳經天恢恢蔡邕古歌不獲已人將老子寂寞無為阮籍詩千秋萬歲後榮名安所之當莊晉書文苑傳張翰任心自適不求世或謂之曰卿乃可縱適一時獨不為身後名耶答曰使我有身後名不如即時一盃酒庾信詩眼前一盃酒誰論身後名此因頻夢而作故詩語更進一層前云明我憶是白知公此云見君意是公知白前云波浪蛟龍是公為白憂此云江湖舟楫是白又自為慮前章説夢處多涉疑詞此章説夢處宛如目撃形愈疎而情愈篤千古交情惟此為至然非公至性不能有此至情非公至文亦不能寫此至性陸時雍曰是魂是人是夢是真都覺恍惚無定親情苦意無不備極矣吳山民曰子美天末懐李白詩其尾聨云應共寃魂語投詩贈汨羅今上篇云水深波浪濶無使蛟龍得此又云江湖多風波舟楫恐失墜疑是時必有妄傳太白墮水死者故子美云云後世遂有沉江騎鯨之説葢因公詩附㑹耳太白卒於當塗李陽冰家塟於謝家青山二史可考安有沉江事乎有懐台州鄭十八司戸鶴注至徳二載䖍貶台州司戸公有詩送行明年又有春深逐客一詩此詩又在其後當是乾元二年秦華間作末云相望無所成乾坤莽回互葢在棄官以後耶天台隔三江一云江海風浪無晨暮鄭公縱得歸老病不識路鄭貶台州痛其歸期無日也天台山名今在台州府三江長江浙江曹娥江舊引爾雅注岷江浙江松江非適台之路居安邑老病家貧後漢書太原閔仲叔客沈約詩夢中不識路昔如水一作江晉作天上鷗今為樊作為一作如置中兔性命由他人悲辛但狂顧山鬼獨一脚蝮蛇長如樹呼號平聲傍去聲孤城歲月誰與度此遥憶天台景事昔前四恐為人所嫉後四恐為物所傷鮑照詩如韝上鷹今如檻中猿何遜詩可憐雙白鷗朝夕水上浮今詩肅肅兔置辭吳越春秋予胥謂漁父曰性命由天屬丈人楚狂顧南行足楚辭九歌有山鬼篇述異記山鬼嶺南所在有之獨反踵嚴助傳越地林中多蝮蛇猛獸山海經蝮蛇色如綬紋大者百餘斤一名反鼻蛇傳陳孟公晝夜呼號任昉啟孤城窮守前漢游俠誰與度獨居無侣也從來禦魑魅多為一作被才名悞夫子嵇阮流㪅被一作遭時俗惡烏故切海隅微小吏眼暗髪垂素鳩杖近趙作鳩杖近一作黄帽映青袍非供折腰具此又敘謫台始末四上四歎其負才招忌下憐其屈身一官才左傳投諸四裔以禦魑魅舍江淹傳㓜禀器譽夙燿名世説周顗曰何敢近明公逺希嵇阮而晉書嵇康至汲郡山中見孫登康臨去登曰君性烈才儁其能免乎後鍾㑹譖康欲助母丘儉文帝遂害之晳嵇康書阮嗣宗為禮法之士所繩故疾之為讎束𤣥居釋偶鄭老於海隅又知醉時歌用鄭老所本者秋興賦素髪颯以垂領老後漢禮儀志漢民年七十授玉杖以鳩鳥為飾欲人如鳩不噎也隋書禮儀志都下及外州人年七十以下賜鳩杖黄帽折腰見下遣興詩注平生一杯酒見我故人遇相望無所成乾坤莽回互末結懐想之情尋故人杯酒前事難相望無成今皆寥落乾坤莽莽中何時得重聚首耶仍應老病難歸意此章前後各四句中二段各八句沈約詩平生少年日分手易前期勿言一樽酒明日難重持海賦乖蠻隔夷回互萬里王嗣奭曰此詩想像鄭公孤危之狀如親見亦如身歴説到離别之傷死生之痛從肺腑交情流露出來幾於一字一淚遣興去聲五首黄鶴編在乾元二年秦州作蟄龍三冬卧老鶴萬里心昔時賢俊人未遇猶視今嵇康不得死一云且不死孔明有知音又如壠坻一作壠底松用舍上聲在所尋大哉霜雪幹歲久為枯林此詩見賢者在世貴逢知已後四章皆發端於此同在六句分截上言抱志欲伸今古皆然下言遭遇不榮辱遂異用此意作起結章法甚古叔夜孔明不宜専承臥龍亦不當分頂龍鶴起語乃託興葢自傷不得志而發歟易龍蛇之蟄以存身也舞鶴賦結長悲於萬里今後漢周燮傳開東閣延賢俊京房傳臣恐後之視猶今之視昔也晉書鍾㑹以舊憾言於文帝曰嵇康臥龍也不可起公無憂天下顧以康為慮耳因譖康欲助母丘儉殺之蜀志諸葛亮躬耕壠畝徐庶言於先主曰孔明臥龍也將軍宜枉駕過之先主遂詣亮陶潛詩知音茍不存蔡邕漢津賦上控隴坻下接江湖老王績詠松詩何時畏斧斤幾度經霜雪補黄生注鶴指嵇康世説人言嵇延祖如野鶴之在雞羣王戎曰君未見其父耳昔者一作在昔龎徳公未曾音層入州府襄陽耆舊間處止聲士節獨一作猶苦豈無濟時策一作術終竟畏羅罟一作終歲畏罪罟林茂鳥有歸水深魚知聚舉家隠一作依鹿門劉表焉于䖍切得取此言不能如孔明之救時則當如龎公之高隠上四敘述其事下四推見其心杜臆豈無濟時策公自寓也表後漢書龎徳公居峴山南未嘗入城府荆州刺史劉就候之謂曰夫保全一身孰若保全天下乎龎公笑曰鴻鵠巢于高林暮而得所棲黿鼉穴於深淵夕而得所宿夫趣舍行止亦人之巢穴也且各得其棲而已因釋耕隴上表嘆息而去後遂擕妻子登鹿門山採藥不返晉習鑿齒撰襄陽耆舊記鮑照詩投心障苦節隠迹避榮年深淮南子水深則魚聚木茂而鳥樂曹植離思賦水重而魚悦林修茂而鳥喜陶潛避俗翁未必能達道觀其著詩集頗亦恨枯槁達生豈是足黙識音志葢不早有子賢與愚何其掛懐抱彭澤高節可追鹿門詩若有微詞者葢借陶集而翻其意故為曠達以自遣耳初非譏刺先賢也晉書陶潛字元亮博學善屬文嘗著五栁先生傳以自况以親老家貧為鎮軍建威參軍謂親朋曰聊欲絃歌以為三逕之資可乎執事者聞之以為彭澤令在縣公田悉種秫穀妻子固請五十畝種秔郡遣督郵至縣吏白應束帶見之潛歎曰吾不能為五斗米折腰拳拳事鄉里小兒耶義熙三年解印去縣乃賦歸去來辭墨子未必達吾道一陶有飲酒詩顔淵故為仁長飢至於老雖留身後名生亦枯槁莊子達生之情者傀注傀大也謝靈運詩萬事難並歡達生幸可託白孔融薦禰衡表𢎞羊潛計安世黙識陶有責子詩髮垂兩鬢肌膚不復實雖有五男兒總不好紙筆又命子詩云夙興夜寐願爾斯才爾之不才亦已焉哉黄庭堅曰子美困於山川為不知者詬病以為拙於生事又往往譏議宗文宗武失學故寄之淵明以解嘲耳詩名曰遣興可解也賀公雅吳語在位常清狂上上聲疏去聲乞骸骨黄冠歸故鄉爽氣不可致斯人今則亡山陰一茅宇江一作淮海日清一作凄凉賀孟二公皆當時人物論古而并及此者以故交零落竝為遣興之詞也吳語清狂寫其語言意態乞身歸里記其出處大節鑑湖一曲茅宇在焉撫遺跡而仰流風也上四生前下四殁後舊唐書賀知章為禮部侍郎取舍非允門廕子弟喧訴盈庭於是以梯登牆首出决事時人咸嗤之晚年尤加縱誕自號四明狂客又稱秘書外監天寶三載因病恍惚乃上疏請度為道士求還鄉里仍捨本鄉宅為觀上許之唯世説劉真長見王丞相出人問云何答曰未見他異聞作吳語耳漢書昌邑王賀傳賀清狂不慧左思魏都賦僕黨清狂冠記郊特牲野夫黄冠劉刪詩名山本鬱盤道士貴黄世説王徽之以手板拄頰云西山朝來致有爽氣耳古論語今也則亡聲山陰越州也在㑹稽山北故名今樂録莊周引歌巖巖之石幽而清涼隨山陰西有浙江東有曹娥江兩江近海潮出入故有江海淒凉之句補註史記范増願請骸骨歸吾憐孟浩然裋郭作短褐即長夜賦詩何必多往往凌鮑謝清江空舊魚一作舊魚美一作舊美魚春雨餘甘蔗每望東南雲令平聲人幾悲吒吒陟駕切終高岑王孟竝馳聲天寳間孟獨布衣身早年謝世乃處士之最可悲者清江以下望襄陽而感歎空餘二字見物在人亡杜臆浩然之窮公亦似之憐孟正以自憐也孟浩然初名浩後以字行舊書浩然隠鹿門山以詩自適年四十遊京師應進士不第還襄陽卒南史范蔚宗在獄中題扇曰即長夜之悠悠詩鶴注賦詩何必多往往凌鮑謝乃孟詩也公就舉其以稱之夢弼曰鮑謂明逺謝謂三謝乃靈運惠連𤣥暉也温子昇傳王暉業嘗云江左文人宋有顔延之謝靈運梁有沈約任眆我子昇足以凌顔轢謝含任吐沈垂襄陽耆舊傳漢水中鯿魚甚美即槎頭鯿浩然詩試竹竿釣果見槎頭鯿蔗王士源浩然集序灌園藝圃以全高張載詩江南郡醴液豐沛三巴黄甘𤓰州素柰則襄陽舊有蔗也在郭璞詩撫心獨悲吒吒怒也南夢弼曰襄陽秦州東南公寓秦州故望東之雲而悲吒遣興去聲二首此詩黄鶴編在乾元二年秦州詩内今姑仍之天用莫如龍有時繫扶桑頓轡海徒湧神人身㪅長性命茍不存英雄徒自强吞聲勿復扶又切道去聲真宰意茫茫朱注此詩深警安史之徒也轡龍乃君象人臣而欲竊據天位勢必不行故曰頓扶桑在東海比安史之地神人更長謂朝有名將性命不存言積惡自斃臨殁吞聲不敢復言天意𣺌茫見報應之不爽也杜臆謂末二乃十字成句如馬人用莫如龜史記平凖書天用莫如龍地用莫劉向九歎維六龍於扶桑十洲記扶桑在碧海中樹長數千丈一千餘圍兩兩同根更相依倚故曰扶桑淮南子日登於扶桑之上是謂朏明爰止羲和爰息六螭是謂懸車注六螭即六龍也日乗車駕以六龍羲和御之曹植與吳質書思抑六龍之首頓羲和之轡千神異經西北海外有人焉長二千里兩脚中間相去里腹圍一千五百里曹操樂府飄颻八極與神人俱不東觀漢記仲長統曰永保性命之期陶詩知音茍存後漢張奐書匈奴若非其罪何肯吞聲恨賦莫不飲恨而吞聲其老子真宰足以制萬物莊子若有真宰存焉而不得朕也陸機歎逝賦何視天之芒芒地用莫如馬無良復扶又切誰記此日千里鳴追風可君意君看渥洼種上聲態與駑駘異不雜一作在蹄齧間逍遥有能事此章冀朝廷專用李郭也者朱注渥洼之種逈異駑駘所謂追風可君意當時惟郭子儀李光弼足以語此肅宗不能専任公詩葢以諷之固馬比汗馬之臣駑駘蹄齧此其無良者如哥舒翰僕懐恩軰是也千里渥洼有馴良之徳者如李郭之赤心報國百戰不疲是也曰不雜欲朝廷分别而用之曰逍遥謂其從容制勝能立大功也非也謝瞻詩蹇步愧無良舊注以無良為世無王良陽縉詩躡影追風本絶羣夏漢書馬生渥洼水中注楚辭策駑駘而取路之周禮官廋人掌教駣攻駒攻駒騬其蹄齧者閑詩河上乎逍遥遣興去聲五首此詩梁權道編在乾元二年秦州詩内今姑仍之朔風飄胡雁慘澹帶砂礫長林何蕭蕭秋草萋㪅碧北里富薫天高樓夜吹笛焉音烟知南隣客九月猶絺綌此章歎富家宴樂之盛鮑上四深秋之景下四炎凉之况巳南隣客公自謂照詩北風驅雁帯胡霜又胡雁矯翼又疾風衝塞起沙礫自飄揚首二句本此詩江逌詩長林悲素秋楚辭風颯颯兮木蕭蕭古秋草萋已緑何左思詩南隣撃鐘磬北里吹笙竽高樓一峻向秀思舊賦隣人有吹笛者陸機詩詩九月授衣其隋書袁充少時冬初尚衣葛客戲之曰絺兮綌兮凄以風充曰惟絺惟綌服之無斁公詩花時甘緼袍此云九月猶絺綌見貧人衣服失寒暑之宜長陵鋭頭兒出獵待明發騂一作觪弓金爪鏑白馬蹴微雪未知所馳逐但見暮光滅歸來懸兩狼門戸有旌節此章歎少年射獵之事後上四早獵之景下四夜歸之興前曰長陵鋭頭兒曰門戸有旌節盖指勲戚豪勢之家乃追憶長安事也曰漢高祖𦵏長陵在長安四十里春秋後語平原君澠池之㑹臣觀武安君小頭而鋭瞳子黒白分明瞻視不常難與争鋒惟廉頗足以當之蘇武傳單于出獵詩明發不寐明發曉光初發也如又騂騂角弓注騂騂調利也梁金爪鏑言箭鏃之鏑金爪然史記博戲馳逐簡文帝詩絲條轉暮光唐詩竝驅從兩狼兮賜周禮秋官小行人道路用旌節書百官志節度使雙旌雙節行則建節樹六纛車服志大將出賜旌以専賞節以専殺旌以絳帛五丈粉畫虎有銅龍一首纒緋幡紫縑為袋油囊為表節懸畫木盤三相去數寸隅垂尺麻餘與旌同漆有用而割膏以明自煎蘭摧白露下桂折秋風前府中羅舊尹沙道尚依然赫赫蕭京兆今為時所憐此章慨趨炎附勢之徒盧借物託興言盛衰倐忽凢事皆然如蕭京兆可鑒矣注府中指丞相府蕭炅黨於林甫為其所網羅故曰羅舊尹用莊子山木自宼也膏火自煎也桂可食故伐之漆可故割之漢書龔勝卒有一老父相弔哭甚哀既而曰嗟乎薰以香自燒膏以明自消龔生竟夭天年非吾徒也世説寧為蘭摧玉折不作蕭敷艾榮班古詩陌上桑冉冉府中趨至唐國史補凢宰相禮絶行府縣載沙填路自私第於城東街號曰沙路故詩赫赫師尹為漢書成帝時童謡為人所羡今人所憐朱注夢弼引于競大唐傳天寶三年因蕭京兆炅奏於要路築甬道載沙實之屬於朝堂此詩蕭京兆承上沙道言之其為炅發無疑猛虎憑其威往往遭急縛雷吼徒咆哮枝撑已在脚忽看平聲皮寢處無復扶又切睛閃爍人有甚於斯足以勸一作戒元惡此章戒當時憑威肆虐者㸃上四借虎作比所謂强梁者不得其死也末正意史記不避猛虎之害得後漢吕布傳曹操縳吕布布曰縳太急操曰縳虎不不急庾信詩六國始咆哮咆哮虎聲其吼如雷據枝撑木柱縛虎於此也魯靈光殿賦枝撐杈枒而斜左傳譬如禽獸臣食其肉而寢處其皮矣書杜臆勸元惡勸之使反於善也希書元惡大憝以唐吉温傳李林甫久當國温與羅奭鍜獄相勉虐號羅鉗吉綱公卿見者莫敢耦語後貶端溪尉俄遣使殺温朝逢一作送富家塟前後皆一作見輝光共指親戚大緦麻百夫行叶音杭送者各有死不湏羨其强君看束縛一作練去亦得歸山岡吳注末章言富貴貧賤同歸於盡以終前四章之義公見富家之塟送者極盛因歎送者亦各有死又何足羡乎彼桐棺葦索亦得束縛而歸土何必歎戚於其間哉王十朋指馬嵬驛傍貴妃埋身者恐未然四輝光指送塟儀衛之盛詩陶潛詩親戚或餘悲記世而緦麻服之窮也百夫之特舊梁吳均齊諧記桓𤣥誅死芒繩束縛其屍沉諸江中注孫峻殺諸葛恪以葦席裹身篾束其腰投石子岡蔽阮籍詩丘墓山岡唐汝詢曰遣興詩章法簡淨屬詞平直不露才情有建安風骨雜詩六首之遺韻也譬之宫室三吏三别前後出塞堂殿之壯者也遣興各五首曲室之精者也秦州雜詩二十首乾元二年秋至秦州後作十唐書秦州在京師西七百八里今屬陜西鞏昌府水寰宇記秦州本秦隴西郡漢武帝分隴西置天郡王莽末隗囂據其地後漢更天水為漢陽郡地道記云漢陽有大坂名曰隴坻亦曰隴山是也魏初中分隴右為秦州唐武徳二年仍置秦州天寶元年改天水郡乾元元年復為秦州陶淵明集有雜詩題滿目悲生事因人作逺遊遲迴度隴怯浩蕩及一作入闗愁水落魚龍夜山空一作通鳥䑕秋西征問烽火心折此淹留首章説初至秦事末首聯赴秦之由次聯入秦之難三聮到秦風景聯客秦心事大段在四句分截而顧注闗輔大饑生事艱難故依人逺遊非謂因房琯致此逺遊公必不以一謫怨及故人吳論度隴而怯山之長也及闗而愁地之濶也問魚龍川鳥䑕谷秦州地名水落山空秋日淒涼之况烽火憂吐蕃也秦在長安之西故云西征趙注謂公更欲西遊者非是心折淹留意不欲久客於秦矣鮑照詩紛紛悲滿目事北史馮偉不治生事遊平原君傳公等碌碌因人成郭璞詩迅足羨逺鮑照詩臨路獨遲迴三秦記隴坂九迴不知髙幾里欲上者七日乃得越陳後主詩笳吟度隴咽笛囀出闗鳴謝朓詩浩蕩别親知及趙至與嵇茂齊書李叟入秦及闗而嘆劉峻詩空軫闗嘆唐書安戎闗在隴山祖孫登詩岸高知水落流水經注汧水出汧縣西山世謂之小隴山其水東北歴澗注以成淵潭漲不測出五色魚俗以為龍而莫敢採捕因謂魚龍水亦通謂之魚龍川黄希曰舊書太宗貞觀四年十月幸隴州十三日校獵於龍川即此地一西溪叢語魚龍本水名又水經言魚龍以秋日為夜句中合用兩事陳後主詩天逈浮雲細山空明月深雅水經渭谷亭南鳥䑕山禹貢所謂渭出鳥䑕者也尾爾鳥鼠同穴其鳥為鵌其䑕為注如人家䑕而短鵌似鵽而小黄黒色穴入地三四尺鼠在内鳥在外今在隴西首陽縣鳥䑕同穴山中岑參詩魚龍川北磐溪雨鳥鼠山西洮水雲正與公同邊西征賦潘子憑軾西征自京徂秦張協詩烽火列亭别賦心折骨驚兮楚辭攀桂枝聊淹留秦州城一作山北寺勝跡一云傳是隗囂宫苔蘚山門古一作故丹青野殿空月明垂葉露雲逐度溪風清渭無情極愁時獨向東二章咏城北寺也言上四記敘古迹下四對景傷情山門古舊寺猶存野殿空見故宫久没古字空字眼在句尾露方垂葉月照則明雲之度溪随風而逐明字逐字眼在腰中步月看雲有感異地羇孤五六便含愁字意隴元和郡國志秦州伏羌縣本秦冀縣也後漢隗囂據西天水郡稱西伯都此寺即其故基杜臆地志州東北山上有崇寧寺乃隗囂故居梁王冏詩美景多勝迹方輿勝覽雕窠谷在秦州麥積山之北舊有隗囂避暑宫張正見樂府逺入隗囂宫傍侵酒泉路裴子野華林園賦草石苔蘚駁牢叢撮改宋竟陵王子良詩山門一已絶蕭傅亮修張良廟教構棟宇修飾丹青張率詩秋條露葉垂所陰鏗詩山逐下溪風寺後漢志隴西郡首陽山渭水安出趙注渭水在秦州枕秦山下接渭水東流於長州圖領同谷驛道出流沙降平聲虜兼千帳居人有萬家馬驕一作蹻朱一作珠汗落胡舞白題一作蹄斜年少去聲臨洮子一作至西來亦自誇三章咏降戎也往州領同谷驛出流沙見為吐蕃來之衝今降戎多而居民少勢可危矣馬驕胡舞申降虜之强年少亦誇恐居人之弱趙汸注千少於萬曰兼千帳則降人多矣萬多於千曰有萬家則居民少矣末以邊郡單弱而歎之顧注亦自誇乃諷詞舊注謂臨洮人足以守禦者非是秦唐書秦州都督府督領天水隴西同谷三郡州圖州之圖志驛道秦州西出吐蕃之道夏書導弱水至於合黎餘波入於流沙唐六典隴右道東接秦州西逾流沙流沙在沙州以北連延數千里班固漢書贊日磾出於降虜氏夢弼曰唐吐蕃貴人處於大氊帳杜預水災疏漢居人衆多秦國策張儀説楚效萬家之都傅庾信俠客行汗濕馬全驕又馬射賦云選朱汗之馬𤣥乘馬賦流汗如珠語林邯鄲淳初詣臨菑侯曹植大喜延入坐侯遂科頭解袒胡舞北齊魏收傳收既輕疾好聲樂善胡舞漢灌嬰傳斬胡白題將一人薛夢符曰題者額也其俗以白塗堊其額因得名舞則首偏故曰白題斜白題如黒齒雕題之類姓朱注按服䖍漢書注白題胡名也西域傳白題國王支名史稽毅其先匈奴之别種也備考杜臆代醉編云李叔元在京戎騎入城有胡人風吹氊笠墮地後騎云落下白題乃知是氊笠之名臨洮在秦州西秦漢曰隴西唐曰臨洮鶴注臨洮人勇勁可以備戎如大厯二年李抱玉使右軍都將臨洮李晟撃吐蕃將千人至臨洮屠定秦堡亦一証也鼓角縁夷然切邊郡川原欲夜時秋聽平聲殷義從上聲讀用平聲地發風散入雲悲抱葉寒蟬静歸山一作來獨鳥遲萬方一作年聲一概吾道竟何之四章咏鼓角也夜邊郡而聞鼓角又當秋天欲之時何等悽慄殷地入雲承鼔角蟬静鳥遲承夜時末因邊郡而及萬方則所慨於身世者深矣殷地發鼓聲震動入雲悲角吹凄凉隗後漢公孫瓚傳梯衝舞吾樓上鼔角鳴於地中又囂傳縁邊之郡江海之瀕逺注縁邊謂沿邊之郡散釋洪偃詩川原多舊跡鳴詩殷其雷雁梁元帝詩風水文長曹植愁思賦蟬抱木兮南飛歌張孟陽詩寒蟬無餘音量何遜詩獨鳥赴行楂洙九同糅玉石兮一概而相孔子云吾道非耶曰時方以武事為急吾道將何所施乎莊子茫乎何之西張逺作西舊作南使去聲宜天馬由來萬匹强浮雲連陣没秋草徧一作滿山長聞説真龍種上聲仍殘一作空餘老驌驦哀鳴思戰鬭迥立向蒼蒼五章借天馬以喻意潰良馬陣没秋草徒長傷鄴城軍今者龍種在軍而驌驦空老其哀鳴向天者何不用之以收後效耶此葢為郭子儀而發與朱注通鑑是年春三月九節度之師潰於鄴城戰馬萬匹惟存三千此詩浮雲連陣没正其事也秦州乃出西域之道故感天馬事而賦之是盧注時趙王适為元帥比之龍種郭子儀召還京師空老驌驦也博物志西使佩以自随漢書張騫使西域初天子卜曰神馬當從西北來騫還得烏孫天馬謝靈運詩由來事不同秦國策車千乘馬萬匹浮强多也馬西京雜記文帝自代還有良馬九匹一曰雲赭白賦籋浮雲梁元帝詩溪雲連陣合隋孔徳紹詩秋草思邊馬餘北史隋煬帝紀置馬牧於青海渚中以求龍種殘也左傳成公如楚有兩驌驦馬亦作肅爽君毌丘儉詩哀鳴有所思訴左傳怒有戰鬬蒼蒼比蔡琰笳曲泣血仰頭兮蒼蒼蔡夢弼以南使為沙苑别名未知何據考沙苑畜馬多至三四十萬何止萬匹且當時禄山驅健馬以歸范陽非至此始陣没也張逺改作西使誠為有見冢朱注或曰寰宇記秦州清水縣有馬池水源出嶓山開山圖云隴西神馬山有淵池龍馬所生水經注馬池水出上邽西南六十里謂之龍淵水公葢指此為賦次公謂以老驌驦自比則鑿矣城上胡笳奏山邊漢節歸防河赴滄海奉詔發金微一作徽士苦形骸黒林吳作旌疏鳥獸稀那堪呉作聞往來戍恨解鄴城圍六章咏防河戌卒也今使節歸來葢為防守河北而發金微之兵軍士逺涉適當林木風凋尚堪此往來征戍乎所恨鄴城圍解以致復有遣戌之役也此亦在驛道所見者李陵答蘇武書胡笳互動牧馬悲鳴至劉刪詩山邊歌落日河江總詩辛苦持漢節通鑑徳二載以李銑為防招討使朱注唐河北道滄景等州皆古渤海郡地黄河於此入海漢蒲歌昔蹈滄海徐陵詩奉詔戌臯蘭後漢書竇憲遣左校尉耿䕫出居延塞圍北單于於金微山唐地志羈縻州有金微都督府𨽻安北都䕶府吳越春秋人疲士苦吾陶潛詩形骸久已化詩吳均詩林疏風至少庾肩詩林長鳥更稀張華燎獵野獸稀杜審言詩那堪盡此夜庾信詩今年不解圍顧宸曰安史之亂大敗者有三哥舒翰潼闗之輕出以楊國忠懼禍𤣥宗信讒遣使趣戰而敗房琯陳濤斜之車戰以肅宗入賀蘭進明之謗中使邢延恩等促戰而敗鄴城九節度之大潰以中使魚朝恩統兵軍無主帥久而致敗少陵恨解鄴城圍一語實有慨於唐之興亡成敗與莽莽萬重平聲山孤城石一作山谷間無風雲出塞不夜月臨闗屬國歸何晚樓蘭斬未還煙塵一一作獨長望衰颯正摧一作催顔七章咏使臣未還也而山多故無風而雲常出塞城迥故不夜月先臨闗二句寫出陰雲慘淡月色凄凉景象下則有感於時事也往屬國者未歸豈為欲斬樓蘭乎故西望而憂形於色耳説苑蒼蒼莽莽孤劉繪詩出没萬重山之漢耿恭傳耿恭以單兵固守城趙國策况山谷便乎隋李巨仁詩無風波自動不夜月恒明無風不夜二字一讀邵氏聞見録無風塞不夜城西夏有其地王韶經畧西邊親至其處趙次公云秦州有無風塞不夜城乃後人因杜詩而為之名耳漢書蘇武出使歸拜為典屬國侯又傅介子持節至樓蘭斬其王持首還詔封為義陽唐解謂五六指李之芳出使吐蕃留而未還按之芳出使在大厯間不在乾元時太子蔡琰曲烟塵蔽野兮范雲詩長望竟何極昭明詩爾登陟兮一長望聞道去聲尋源使去聲從天此路迴牽牛去幾許宛平聲馬至今來一望幽燕平聲隔何時郡國開東征健兒盡羌笛暮吹哀八章借漢使以慨時事隔上四思古下四傷今城去幾許去今已逺幽燕河北仍陷健兒盡鄴方潰也通趙汸注因秦州為西域驛道歎漢以一使窮河源且大宛如此其易今以天下之力不能戡定幽燕至令壯士幾盡一何難耶是可哀也南宗懔歲時記漢武帝令張騫尋河源乗槎而去淮子若從地出若從天下物漢天馬歌殷勤此路臚所來清乘槎至牽牛渚出博志詳見十七巻古詩河漢且淺相去復幾許征宛馬注别見十賈誼傳乘傳而行郡國師詩周公東唐書天寶四載冬以安禄山反京募兵十萬號天武健兒賀徹詩羌笛含流咽今日明人眼臨池好驛亭叢篁低地碧高栁半天青稠疊多幽事喧呼閱使去聲星老夫如有此不異在郊坰九章咏秦州驛亭也往叢篁高柳此寫驛亭好景惜乎稠疊幽致徒供使客來若使旅人得此雖處喧地而不異郊居葢深羨此亭之幽勝矣言杜臆時吐蕃為患遣使欲與通好故有使官經閲下使客向河源皆志此事亭此章結語尚嫌直率郵岑敬之詩色映臨池竹此郵見前漢薛宣傳顔注行書之舍如今之驛據則驛亭之名起於唐時也名地者底也其體底下宋之問詩叢篁夾路迷張正見詩高柳横遙塞釋庾信詩𤣥圃半天高後謝靈運詩巖峭嶺稠疊二劉孝成詩喧呼驚里閈漢李郃傳和帝遣使者人到益部郃曰有二使星入蜀分野晉天文志流星天使也子爾雅邑外為郊郊外為野野外為林林外為坰抱朴射勇於郊坰雲氣接崑崙涔涔塞雨繁羌童看平聲渭水使去聲一作估客向一作尚河源煙火軍中幕牛羊嶺上邨所居秋草静正閉小蓬門十章咏秦州雨景也事雲氣瀰漫故雨勢淫溢羌童二句雨中之烟火二句雨中之景秋日閉門自傷雨後岑寂也酒黄河賦雲氣浩漫逺接崑崙括地志崑崙山在肅州泉縣西南八十里杜佑曰長慶中劉元鼎為盟㑹使言河之上流由洪濟西行二千里水益狹冬春可涉夏秋乃勝舟其南三百里三山中高四下曰歴山直大羊同國古所謂崑崙者也夷曰悶歴黎山東距長安五千里河源其間流澄緩下稍合衆流色赤行益逺他水并注則濁河源東北直莫賀延磧尾隠測其地葢在劍南之西潘尼苦雨賦聽長霤之涔涔唐邵注渭水在秦州其源出臨洮故羌童得以觀也書鄯州鄯城縣有河源軍屬隴右道謝朓詩弭節赴河源園江淹詩歸人望烟火塞詩羊牛下括謝莊懐引青苔無名路宿草蓬門蕭蕭古塞冷漠漠秋雲一作風低黄鵠翅垂雨蒼鷹飢啄泥薊門誰自北漢將去聲獨征西不意書生耳一作眼臨衰厭一作見鼓鞞十一章對雨而傷寇亂也無上四寫景下四感時鵠垂翅傷奮飛路鷹啄泥慨一飽難期且燕薊為梗誰成北伐之功吐蕃在邊尚遣征西之將故聽鼓鞞而心厭耳荆卿歌風蕭蕭兮易水寒晚氣張纘秋雨賦油雲興而漠漠徊庾信詩秋雲低古詩黄鵠一逺别千里顧徘李陵詩熠熠似蒼鷹詩劉峻詩薊門秋氣清字虞羲詩擁旄為漢將曹植出自薊北門自北二本此後漢岑彭為征西將軍征西二字本此濟南史沈慶之曰今欲伐國而書與白面書生謀事何由楊炯詩寧為百夫長勝作一生聽裴子野詩方鼓鼙聲山頭南一作東郭寺水號北流泉老樹空庭得清渠一邑傳秋花危石底晚景臥鐘邊一作前俛仰悲身世溪風為去聲颯一作肅然十二章咏秦州南郭寺也寺言寺兼山水之勝庭得老樹而生色承邑藉清渠之傳注承水花掩危石影落臥鐘以况已之窮老故下有俛仰身世之感茅山父老歌各在一山頭秦州記天水縣界有水一𣲖北流入長道縣詩滮池北流清鮑照詩空庭慙樹萱據九域志縣名清水是邑以水渠而傳名據秦州記一𣲖北流是清渠傳注一邑也後説意本湏溪水經注清水導源東北隴山逕清水縣故城東與秦水合東南注渭縣張華詩抱杖臨清渠注王僧孺詩曉露拂秋花江總詩危石聳前洲邵晚景向晚之影庾信詩凄凉臨晚景卧者蘭亭序俛仰之間巳為陳跡臥鐘廢鐘之仆鮑照詩身世兩相棄其前漢書神君至風颯然楊徳周曰秦州詩滿肚憂憤悱惻都非文人伎倆即歸山獨鳥遲老樹空庭得二語亦令人閣筆傳道去聲東柯谷深藏數十家對門藤葢瓦映竹水穿沙痩地翻宜粟顧作栗悮陽坡可種瓜船人近相一作相近報但恐失桃花十三章遊東柯谷也至趙汸注起用傳道二字則此下景物皆是未谷中而先述所聞東柯佳勝如此故囑舟人相近即報惟恐失却桃源也譜司馬遷報任少卿書深藏巖穴杜田曰毛文錫茶宣州宣城縣有䲧如山其東為朝日所燭號曰陽坡阮籍詩昔日東陵𤓰今在青門外五色曜朝日子母相鈎帶可見種𤓰宜於陽地新序船人固桑進對萬古仇池穴潛通小有天神魚今一作人一作久不見福地語真傳近接西南境長懐十九泉何時一作當一茅屋送老白雲邊十四章咏仇池穴也述池穴通天見其靈異神魚福地據所聞而稱之名泉近接而曰長懐總屬遥想之詞送老雲邊公將有終焉之志矣經觀末章讀記憶仇池則前六句皆是引記中語水注仇池絶壁峭峙孤險登髙望之形若覆壺其髙二十餘里羊腸蟠道三十六迴上有平田百頃煑土成鹽因以百頃為號山上豐水泉所謂清泉湧沸潤氣上流者也舊志仇池山上有田百頃泉九十九眼此云十九泉乃詩家省字之法鮑曰唐志成州同谷縣有仇池與秦城接壌一統志仇池山屬鞏昌成縣水經注地道潛通太平御覽名山記王屋山有洞周迴萬里名曰小有清虚之天舊注世傳仇池穴出神魚食之者仙曹植詩河伯獻神魚城薛注道書有三十六洞天七十二福地西南即秦也上林賦悠逺長懐梁簡文帝詩栖神紫臺上縱意白雲邊未暇泛滄海悠悠兵馬間塞一作寒門風落木一作塞風寒落木客舍雨連山阮籍行多興去聲龎公隠不還東柯遂疎懶一作放休鑷鬢毛斑十五章在秦而羨東柯也阮上四客居之况下四避地之思籍龎公借以自方無心出仕故鬢斑不須鑷矣漢詩驅馬悠悠秦州常有吐蕃之警故云兵馬間後馮異傳夜勒兵馬申令軍中潘岑之敬詩塞門交度葉旅顔延之詩側聞風落木岳議客舍灑掃以待征蔡夢弼曰阮籍縱情物外時率意獨駕不由徑路車跡所窮輒慟哭而返龎徳公携妻子登鹿門採藥不返左思白髪賦星星白髪生於鬢垂將拔將鑷好爵是縻南史鬰林王年五歲戲高帝傍帝令左右鑷白髪問王我是誰耶答曰太翁帝笑曰豈有為人作曾祖而拔白髪乎即擲鏡鑷東柯好崖谷不與衆峰羣落日邀雙鳥晴天巻吳作養片雲野人矜趙汸作矜一作吟絶險水竹㑹平分採藥吾將老兒童一作童兒未遣聞十六章欲卜居東谷也皆上四東柯之景下四卜居之意歸雙鳥晴帯片雲見與衆峯獨異邀字巻字乃句眼險野人勿矜險絶水竹㑹須平分羨其可避世也一云處行吟以觀水竹之佳勝曰頭陀寺碑崖谷共清風泉相渙邵注山穴曰岫山邊崖崖之髙者曰巖上秀者曰峯泉出流川曰谷山之空坎幽隠者亦曰谷赤沈佺期詩不與衆山羣王褒詩連巖異衆峯江淹虹賦碧雲巻半又盧照隣詩風巻去來雲腐申涵光曰卷片雲可想晴空景色吳季海作養雲便前章言映竹水穿沙即水竹平分之意杜臆半水半竹為平分何遜詩卉木㑹平分採藥二句即晚唐詩山下問童子言師採藥去所本裘左傳使營菟吾將老焉邊秋陰易音異夕一作久不復扶又切辯晨光簷雨亂淋幔山雲低度牆鸕鷀窺淺井蚯蚓上去聲深一作高堂車馬何蕭索門前百草長十七章咏山居苦雨也景曰夕曰晨見曉夜皆雨中四寫雨中物亂淋則驟低度則濃窺井求食上堂避濕也車馬蕭索益増旅中愁悶矣杜臆有幔有牆有井有堂此見即次後詩也歸去來辭恨晨光之希微水淮南子山雲蒸柱礎潤本革衍義陶隠居云鸕鷀鳥不卵生口吐其雛今人謂之水老鵶女古今注蚯蚓一名蜿蟺善長吟於地中江湖謂之歌趙注張仲蔚所居蓬蒿滿門寂無車馬地僻秋將盡山高客一作夜未歸塞雲多㫁續邊日少光輝警急烽常報傳聞一作聲檄屢飛西戎外甥國何得迕一作近天威十八章客秦而憂吐蕃也蕃上四記邊秋苦景下四言邊警可危吐外甥之國何得迕犯天威葢反言以見和親之無益主客未歸乃自歎流離陸機詩塞雲起飛沙陳後詩浮雲斷還續急蔡琰曲愁為子兮日無光輝曰曹植樂府邊城多警賈誼傳斥候望烽燧文潁邊方備寇作髙土櫓櫓上作桔橰頭兜零以薪草置其中常低之有寇即火然舉之以相告曰烽公羊傳所傳聞又異詞説文檄以木簡為書長二尺以徴軍也魏武奏事曰若有急則挿以雞羽謂之羽檄唐書景龍四年以金城公主下嫁吐蕃乾元元年肅宗以㓜女寧國公主下降回紇吐蕃傳開元十年贊普請和上表曰外甥是先皇帝舊宿親千歲萬歲外甥終不敢先違盟誓顧炎武日知録冊府元龜載吐蕃書皆自稱外甥稱上為皇帝舅開元二十一年從公主言樹碑於赤嶺維大唐開元二十一年歲次壬申舅甥修其舊好同為一家左傳齊侯曰天威不違顔咫尺鳯林戈未息魚海路常難候火雲峰一作烽峻懸軍幕一作暮井乾音干風連西極動月過北庭寒故老思飛將去聲何時一作人議築壇十九章憂亂而思良將也謂時邊境未寧故尚須逺戍風連欲動吐蕃西競月過加寒謂北庭無將此借秋景以慨時事又是年子儀召還故望築壇而任飛將黄注候火承戈懸軍承路末舊注風連二句寫邊秋景色今依盧注另為之解於句思飛將意却有闗合水經河水又東歴鳯林北秦州記枹罕原北名風林川舊唐書鳯林縣屬河州本漢白石縣地屬金城郡一統志鳯林闗在今臨洮府蘭州國唐書天寶元年河西節度使王倕克吐蕃魚海又李臣傳以折衝從收魚海三城謝靈運詩平明望雲峰雲峰喻候火之熾而高也鄧蜀志鄭度説劉璋曰左將軍懸軍襲我軍無輜重又艾伐蜀懸軍深入曰周禮挈壺氏掌挈壺以令軍井易井收勿幕注井口收勿遮幕之盧注凢軍旅所在必資井泉漢時耿恭整衣拜井水泉湧出曰幕井乾水竭可知傳上林賦左蒼梧右西極楚辭余夕至乎西極班彪南匈奴掩破北庭月盧注李嗣業初為北庭節度乾元二年同圍鄴城正卒於軍中朱注是年七月郭子儀以魚朝恩之譖罷閒京師右故老自謂後漢胡廣疏諮之於故老前漢李廣為北平太守號曰漢之飛將軍劉峻詩飛將出長城韓高帝紀漢王齋戒設壇塲拜信為大將軍唐堯真自聖野老復扶又切何知曬藥能無婦應蔡讀於陵切門亦一作幸有兒藏書聞禹穴讀記憶一作悟仇池為去聲報鴛行戸朗切舊鷦鷯在一作寄一枝末章慨世不見用而羇棲異地也自聖見讜言不能入何知見朝政不忍聞故欲挈妻子而偕隠禹穴在蜀中仇池在同谷時未有定居故兩地皆欲借棲十月公往同谷季冬遂赴成都末章葢已自計行跡矣封禪文君莫盛於唐堯書大傳堯以唐侯升為天子下周書僕臣諛厥后自聖此諷肅宗也在列子堯治天五十年不知天下治歟不治歟問之朝在朝不知問之在野在野不知此暗用其意書陳情表無應門五尺之童莊子子路曰夫子欲藏則試往因焉吳越春秋禹登委宛之山發石得金簡玉字之書山中有一穴深不見底謂之禹穴杜臆舊注引吳越春秋以証大禹藏書之所但吳越所記乃在㑹稽而公所聞乃蜀之石紐禹生處也知公適秦之初已有入蜀之意蕭慤詩讀記知州所觀圖見岳形則仇池記云仇池百頃周迴九千四十步東西二門土岡阜低昂泉流交灌公之惓惓於仇池者葢為是也英雄記許靖過仇池樹下有碑靖駐馬一覽無遺鴛行侣指同朝舊友古詩厠迹鴛鷺行鷯莊子鷦鷯巢於深林不過一枝詩疏桃䖝今鷦㣲小黄雀也左思詩巢林栖一枝劉克莊曰唐人遊邊之作數十篇中間有三數篇一篇間有一二聯可采若此二十篇山川城郭之異土地風氣所宜開巻一覽盡在是矣網山送蘄師云杜陵詩巻是圖經信然以入秦起以去秦終中皆言客秦景事月夜憶舍弟鶴注詩云戌鼓斷人行邊秋一雁聲當是乾元二年秦州作是年九月史思明陷東京及齊汝鄭滑四州宜戍鼓之未休二弟一在許一在齊皆在河南故憶之戍鼓斷人行邊秋一作秋邊一雁聲露從今夜白月是故鄉明有弟皆分散一作羈旅無家問死生寄書長不達一作避况乃未休兵上四月夜之景下四憶弟之情故鄉句對月思家乃上下闗紐杜臆聞雁聲而思弟乃感物傷心公今夜白又逢白露節候也故鄉明猶是故鄉月色也携家至秦而云無家者弟兄離散東都無家也樓周注傷心斷腸之語令人讀不能終篇赤庾信詩戍鳴夕鼓劉孝綽詩隔山聞戌鼓漢書眉燒長安宫室城中無人行令張正見詩對月想邊秋道又終無一雁帶書飛月仲秋之月白露降薛衡詩今夜寒車出使蘇武詩故鄉夢中近詩左傳寡人有弟不能和協而餬其口於四方陶潛分散逐風轉雲詩樂子之無家音又死生契濶史魏文帝詩寄書浮往不還陸機詩書長不達記莫如按甲休兵王彦輔曰子美善用故事及常語多顛倒用之語峻而體健如露從今夜白月是故鄉明之類是也天末懐李白按趙子櫟曰白於至徳二載坐永王璘事而謫夜郎公在秦州懐之而作是也邵寶謂白已死公在䕫州作葢誤認寃魂為白魂耳涼風起天末君子意如何鴻雁幾時到江湖秋水多文章憎命達魑魅喜人過應平聲共寃魂語投詩贈汨羅風起天末感秋託興鴻雁想其音信江湖慮其風波四句對景懐人下則因其放逐而重為悲憫之詞葢文章不遇魑魅見侵夜郎一竄幾與汨羅同寃説到流離生死千里闗情真堪聲淚交下此懐人之最慘怛者文人多遭困躓似憎命達山鬼擇人而食故喜人過寃魂指屈原投詩謂李白西京雜記趙飛燕歸風送逺操涼風起兮天隕霜懐君子兮𣺌難望周書時訓立秋之日涼風至天末天之窮處陸機詩遊子𣺌天末還期不可尋歸石崇思歸引秋風厲兮鴻雁征徐孝嗣詩行雲傳響鴻寄書曹植詩之子在萬里江湖逈且深黄注憎命達猶云詩能窮人喜人過即招魂中甘人意幽左傳魑魅魍魎莫能逢之後漢審配書寃魂痛於㝠注楚辭二八接武投詩賦只山水經注湘水又北汩水之汩水東出豫章艾縣恒西經羅縣北謂之羅水汩水又西為屈潭即羅淵也屈原懐沙自沉於此一統志汨羅在長沙湘隂縣北葉夢得曰杜詩寄髙詹事云天上多鴻雁池中足鯉魚鴻雁二物也鯉者魚之一種疑不可以對鴻雁然懐李白云鴻雁幾時到江湖秋水多以鴻雁對江湖為正對矣得舍弟消息云浪傳烏鵲喜深負鶺鴒詩烏鵲二物疑不可以對鶺鴒然偶題云音書恨烏鵲號怒怪熊羆以烏鵲對熊羆為正對矣寄李白云幾年遭鵩鳥獨泣向麒麟鵩鳥乃鳥之名鵩者疑不可以對麒麟然哭韋之晉云鵩鳥長沙諱犀牛蜀郡憐以鵩鳥對犀牛為正對矣寄賈嚴兩閣老云貔虎孄金甲麒麟受玉鞭以貔虎對麒麟為正對矣子美豈不知對屬之偏正邪葢其縱横出入無不合耳宿贊公房原注贊京師大雲寺主謫此安置當鶴注詩云隴月向人又言菊荒蓮倒是乾元二年晚秋在秦州作杖錫何來此一作久秋風已颯然雨荒深院菊霜倒半池蓮放逐寧違一作虧性虛空不離去聲禪相逢成夜宿隴月向人圓從謫遷敘起菊荒雨後蓮倒霜前此僧房秋景承次句身雖放逐心本空虚此稱美贊公承首句隴月團圓是傷異地相逢結處㸃宿字杖趙汸注起作問詞歎方外之人亦被遷謫也邵注錫禪家以錫為杖也經云又名智杖又名徳杖釋氏稱遊行僧為飛錫安住僧為掛錫晉廬山道人遊石門詩序因詠山水遂杖錫而遊翁風賦楚襄王遊於蘭臺之宫有風颯然而至陸放詩霜凋兩岸栁水浸一天星意本杜句傳庾信詩閣影入池蓮齊王儉詩萍開欲半池禪賈誼被讒放逐楞嚴經虚空寂然洙注釋經以宗為空門此何遜詩山鸎空曙響隴月自秋暉用華嚴經如來於四天下中或名圓滿月一説此暗釋氏月印萬川處處皆圓意趙汸曰杜公與房琯為布衣交及房琯罷相公上疏爭之亦幾獲罪由此齟齬流落贊亦房相之客時被謫秦州公故與之欵曲如此赤谷西崦人家地理志秦州有崦嵫山在赤谷之西故曰西崦曹操與劉先主戰於此谷川水為之丹因號赤谷一統志赤谷在秦州里西南七十里中有赤谷川崦嵫山在秦州西五十躋險不自安荆作宣一作喧出郊已清目溪迴日氣煖逕轉山田熟鳥雀依茅茨藩籬帶松菊如行武陵暮欲問桃源一作花宿此宿赤谷山家而題詩以誌其勝也通首寫逺近幽景如一幅桃花源記綖注三四説西崦五六説人家武陵暮説西崦桃源宿説人家還謝靈運詩躋險築幽居又空庭來鳥雀江淹詩望岨山田去墨子茅茨不剪歸來辭松菊猶存張綖曰公棄官之秦州留宿赤谷西崦人家而有此作又公詩云晨發赤谷亭險艱方自兹深山苦多風落日童稚飢悄然邨墟迴烟火何由追亦言其地僻而人稀耳當斯境也忽得茆茨松菊人家一宿豈不猶武陵之桃源耶静鳥雀依茅茨藩籬帶松菊説山家景物甚幽貧知者性自益毛髪古説隐居品格特髙西枝邨尋置草堂地夜宿贊公土室二首鶴注公乾元二年七月自華至秦意欲居此故尋置草堂地西枝邨在秦近郭有巖竇之勝杉漆之利贊公嘗稱之公以闗輔饑棄之同谷當是其年秋晚冬初作故詩有天寒日短之句出郭眄莫甸切細岑披榛得微路溪行一流水曲折方屢渡贊公湯休徒好去聲静心跡素昨枉霞上作盛論巖中趣此章往西邨尋地而作幽首段過訪贊公欲問西枝之勝也杜臆公欲得僻無人之境故望細岑涉流水以求之溪止一水以左右往來故須屢渡步劉曰眄斜視也宋之問詩細岑互攢倚趙至書澤求蹊披榛覔路折郭璞流寓賦修焦丘之微路湯王褒四子講徳論曲不失節洙注惠休上人姓謝靈運詩心跡雙寂寞寄晏曰素謂質素也雲霞上作謂身伴雲霞而作書相夢弼謂才思挺出霞之外此另一説江淹詩鑠鑠霞上景懵懵雲外山劉繪詩灼爍在雲間氤氲出霞上張正見詩凌雲霞上起洙注後漢書旌車之招相望於巖中怡然共擕手恣意同逺步捫蘿澁先登陟巘眩反顧要求陽岡煖苦涉晉作步一作陟陰嶺沍惆悵老大藤沉吟屈蟠樹次言共遊邨中欲卜草堂之地也求澁先登山高足倦反顧回頭恐墜陽涉陰自北至南老藤蟠樹景狀竒古故徘徊憇息於其下詩擕手同行西京賦恣意所幸范雲詩捫蘿正憶我折桂方思君精説苑二子先登顔延之詩陽岡團氣陰谷洩烟寒詩陟則在巘師氏曰山南向陽故煖山北背陰故寒沍屈郭璞詩沉吟立夕陽盧世南琵琶賦蟠犀嶺卜居意未展杖策迴且暮層巔一作天餘落日草蔓已多露末乃未得佳地而迴宿於土室也隠此章前二段各八句後段四句收詩左思詩杖策招士謝靈運詩築觀基層巔盧子諒凝露霑蔓草天寒鳥已歸月出山晉作山一作人㪅一作已静土室延白光松門耿疎影躋攀倦日短語樂音洛寄夜永明燃林中薪暗汲石底一作泉井此章宿贊公土室而作以首段敘暮夜景事杜臆起四句可入畫公足力巳倦而猶永夜晤語興趣自不可及鳥燃薪代燭汲井烹茶此山居清况鮑照詩天寒幽歸謝靈運詩牽葉入松門恣趙注天寒在冬故日短夜永書日短星昴天台賦語樂以終日江淹詩夜永起懐思大師京國舊徳業天機秉從來支許遊興去聲趣江湖迥數竒音箕謫闗塞道廣存箕潁何知戎馬間復扶又切接塵事屏音丙迹此誌贊公高風并及離合之感揚塵事屏言與屏塵事之人相接也王粲誄表京國晉書文立傳雅有徳業為法師許詢為都講洙注支遁字道林講維摩經遁史記李廣數竒孟康曰竒隻不耦也范筠詩數竒不可偶性直誰能紆有後漢許劭曰太丘道廣廣則難周謝靈運云徐幹箕潁之心國語范文子立於戎馬之前㝠陶潛詩閒居三十載遂與塵事幽尋豈一路逺色有諸嶺晨光稍朦朧㪅越西南頂末欲來朝尋勝以遂草堂之願此與上章同格支景福殿賦晨光内照遁詩朦朧望幽人寄贊上人鶴注此當是乾元二年秦州作一摩訶般若經何名上人佛言若菩薩心行阿耨菩提心不散亂是名上人増一經云處世有過能改者為上人一昨陪錫杖卜隣南山幽年侵腰脚衰未便陰崖秋重平聲岡北面起竟日陽光留茅屋買一作置兼土斯焉心所求此承上章亦與贊公商卜居也上云更越西南頂故此章遂提西南兩段首段欲卜居南山杜臆卜居先卜隣公之惓惓於西枝邨為贊公在耳詩未便陰崖秋猶前詩苦陟陰嶺沍竟日陽光留猶前要求陽岡煖照希曰梵云阿若羅此云錫杖鮑詩陰崖積夏雪陽谷散秋雲左傳唯鄰是卜易林火盛陽光逺注屋兼買土謂欲得山中帶土之地可居亦可耕也舊作兼買其地豈有買屋無地者近聞西枝西有谷杉桼音漆字他本作黍非稠亭午頗和暖石一作沙田又足收當期塞一作寒雨乾音干宿昔齒疾瘳徘徊虎穴上面勢龍泓頭次言欲卜居西谷日杉漆石田見物産可資但亭午暫煖不如竟留光耳盧注西枝西曰有谷定指同谷近聞必指同谷邑宰書公至同谷界詩邑有賢主人來書語絶妙此可相証同谷七歌中南有龍兮在山湫後發同谷縣詩停驂龍潭雲回首虎崖石詩云虎穴龍泓指此無疑天台賦羲和亭午太平御覽日初出曰旭曰晰曰晞在午曰亭午在未曰昳所左傳吳將伐齊于胥曰夫得志於齊猶獲石田也無用之飭陜西通志虎穴在成縣城西勢考工記審曲面勢以五材注察五材曲直方面形之宜龍泓一在飛龍峽一在天井山方輿勝覽飛龍峽在仇池山下白馬氐揚飛龍據仇池故名其東杜甫避亂居此有詩云云柴荆具茶茗逕一作遙路通林丘與子成二老來往亦風流末計定居後情事仍歸結卜隣意世此亦與上章同格謝靈運詩促裝返柴荆説此為茶為茗覺有異色神農食經茶茗久服令人有力早收曰茶廣晚收曰茗謝安詩寄傲林丘二老本孟子晉書樂傳天下言風流者以王樂為稱首王嗣奭曰此章乃真實商量本尺牘而韻以為詩耳虎穴龍泓其地幽勝徑通林丘與贊公近今志書所載有杜公故宅豈於此曾暫住耶太平寺泉眼鶴注太平寺在秦州詩云北風起寒文當是乾元二年秋冬之交作招提慿高岡疎散連草莽莫補切出泉枯柳根汲引歲月古首從寺泉敘起不招提佛寺名詳見一巻草宋武帝教或疎散山林闗進達景帝紀廣薦莽草稠曰薦深曰莽汲易象山下出泉江賦引沮漳石間一作門見海眼天畔縈水府廣深丈尺間宴息敢輕侮青白二小蛇幽姿可時覩如絲氣或上時掌切爛熳為雲雨此形容泉眼之神異而海眼水府見其穴小泉多只此丈尺之間人不敢忽者以中有神物故能興雲致雨也成都記距石筍二三尺毎夏月大雨陷作土穴泓水湛然以繩繫石投其下愈投而愈無窮凡三五日忽然不見故曰海眼此寺泉從石中而出亦如海眼也南天畔言其髙府楚辭鑿山楹以為室下披衣於水府征賦曾潭水水經注漢水又東合洛谷其地有神蛇戍左右山溪多五色蛇性馴良不為毒殆即此類朱注二蛇乃龍類謝靈運詩潛虬媚幽姿沈約詩爛熳蜃雲舒山頭到山下鑿井不盡土取供十方僧香美勝牛乳北風起寒文弱藻舒一作勝翠縷明涵客衣淨細蕩林影趣此記其味美而色清寒山不盡土則井水難得故此泉特為可貴文翠縷水中實景涵衣蕩影水上虚景虚莊子鑿井而飲法楞嚴經如一井空空生一井十方空亦復如是華經十方佛土中唯有一乗法牛維摩經阿難白佛言憶念昔時世尊身小有疾當用乳乳泉泉之白而甘者庾信詩山月落客衣單何當宅下流餘潤通藥圃三春濕黄精一食生毛羽此羨山泉而仍動卜居之興也此杜臆唯乳泉香美故引潤黄精而一服可仙章起結各四句中二段各八句久博物志太陽之草名黄精餌之長生本草黄精陽草服輕身延年拾遺記昭王夢有人衣服皆毛羽因名羽人東樓通志東樓跨府城上形製尚古元鶴注詩云驛使葢使吐蕃者經此當是乾二年秦州作萬里流沙道西行吳作征西一作西征過此一作北門但添新一作征戰骨不返舊征一作死生魂樓角凌風迥城陰帶水一作雨昬傳聲看平聲驛使去聲送節向河源此咏秦州東樓也上四痛已往將士下四憐現在使臣無樓當驛道故征西者皆過此門戰骨征魂言其有去還樓角城陰寫出高寒隂慘景色故驛使至此不禁觸目傷心道鶴注流沙在西之極吐蕃所居之城中國往吐蕃者出於此老子西涉流沙不返漢晉有征西將軍公詩有漢將獨征西即此征西也征西起下戰骨征魂但征字未免重出傳聲看驛使聞驛使傳呼之聲而往看也尋趙曰時遣使和好吐蕃故用張騫河源事雨晴王洙注一作秋聲塞鶴注當是乾元二年秦州作杜臆詩云柳乃邊上之栁知此詩作於秦州矣顧注樓上即東樓與前首同時天外舊作水非容齋作永一云際秋雲薄從西萬里風今朝好晴景久雨不妨農塞一云岸栁行趙音杭疎翠山梨結小紅胡笳樓上發一雁入高空此喜邊塞初晴也上四雨後新晴下四晴時景物上是一氣説下是四散説物西風起則秋氣晴不妨農可收穫也栁疎梨結深秋候或翠或紅雨後色新末二當分合看笳遇晴而倍響雁因晴而向空此分説也雁在塞外習聽胡笳今忽聞笳發而翔入空中此合説也晉鼓吹曲流光溢天外嘶梁簡文帝詩一雁聲何處歸寓目鶴注詩云闗雲塞水羌女胡兒當是乾元二年在秦州作左傳得臣與寓目焉梁元帝答張纘文寓目寫心因事而作一縣葡萄熟秋山苜蓿多闗雲常帶雨塞水不成河羌女輕一作揺烽燧胡兒掣山谷作掣諸本作制駱駞自傷遲暮眼喪去聲亂飽經過平聲㸃寓目動邊愁也上六皆目中所見者末眼字以醒題首聯物産之異次聯地氣之殊三聯人性之悍漸説到邊塞可憂處故有左喪亂經過之慨謂不堪再逢亂離也史記大宛傳宛右以葡萄為酒富人藏至萬餘石久者數十歲不敗俗嗜酒馬嗜苜蓿漢使取其實來於是天子始種之離宫别館其永徽圖經蒲萄生隴西五原燉煌山谷今處處有之實有紫白二種西京雜記樂遊苑多苜蓿一名懐風烟史記周幽王為烽燧大皷正義曰晝日為烽以望火夜舉燧以望火光掣牽挽也駱駝立掣而後伏伏而後興外國圖大秦國人長一丈五尺好騎駱駝塞外地高四下荒涼無阻故不成河陶潛詩脱有經過便朱鶴齡曰此詩當與州圖領同谷一首參看闗塞無阻羌胡雜居乃世變之深可慮者公故感而歎之未幾秦隴果為吐蕃所陷楓楊徳周曰闗雲常帯雨塞水不成河谷暗非闗雨丹不為霜皆字字可思山寺鶴注此詩乾元二年在秦州作野寺殘僧少山園細路高麝香眠石竹鸚鵡啄金桃亂水一作石通人過懸崖置屋牢上方重平聲閣晚百里見秋一作纎毫山寺記勝遊也首二總提石竹金桃此山園之物麝香自眠鸚鵡來啄可見殘僧之少矣牢屋重閣乃野寺之房涉水登崖上方逺見又知細路之髙矣此詩分承互應脉理精宻如此趙汸云鸚鵡二句本狀寺之荒蕪以秦隴所産禽獸花木言之語反精麗圖經閣道縈旋上下千餘丈者即山園細路髙也其山下水縱横可涉者即亂水通人過也又玉堂閒話云麥積山梯空架險而上其間千房萬室懸空躡虛者即懸崖置屋牢也又云高檻可以眺望虚窗可以來風即百里見纎毫也殘僧少言餘僧無幾也殘與少有别禰衡鸚鵡賦命虞人於隴坻知鸚鵡為隴右所産者嵇康養生論麝食柏而香本草麝香形似麞常食柏葉得香者酉陽雜俎衛公云蜀中石竹有碧花入唐西域傳康一曰薩末鞬亦曰颯末建貞觀時歲貢金桃銀桃詔令植苑中鶴注崇仁饒焯景仲與余言嘗見武林有金桃色如杏七八月熟因知東都事畧所記外國進金桃銀桃種即此也水爾雅釋水正絶流曰亂詩涉渭為亂鮑照詩懸裝亂區陶潛桃花源序捨船從口入初極狹纔通人頂何遜詩懸崖抱竒崛方邵注上方謂僧之方丈在山也維摩詰經昇於上漢書翼奉傳上方之情樂也孟康注上方謂北與東也葢陽氣所萌生故曰上方崔湜詩昇攀重閣逈即事鶴注詩云人憐漢公主生得渡河歸謂寧國公主乾元二年八月丙辰自回紇歸當是其年作謝靈運詩即事怨暌擕陶潛詩即事多所欣聞道去聲花門破和親事却非人憐漢公主生得渡河歸秋思去聲抛雲髻一作鬢腰支賸音剰一作勝寶衣羣凶猶索色責切戰回首意多違此詩諷時事也和親事却非謂一事而三失具焉初與回紇結㛰本欲借兵以平北寇孰知滏水潰軍花門同破此一失也且可汗既死公主𠢐面而歸抛髻賸衣忍恥含羞之狀見矣此二失也是時思明濟河索戰而回紇之好已絶與和親本意始終違悖此三失也公詩云聖心頗虛佇時議氣欲奪老成謀國之言真如燭照而數計矣下舊唐書乾元二年三月回紇從郭子儀戰於相州城不利奔西京四月可汗死其牙官都督等欲以寧國公主殉塟公主以中國禮拒之然猶依本國法𠢐面大哭竟以無子得歸八月詔百官於鳴鳯門外迎之新書寧國公主先嫁鄭巽又嫁薛康衡乾元元年降回紇毗伽闕可汗二年八月歸朝都朱注是年九月史思明分兵四道濟河李光弼棄東守河陽羣凶句正指其事漢書髙帝使婁敬和親漢書贊和親無益已然之明騐也肩繁欽有秋思賦曹植詩紅顔韡韡雲髻峩峩庾吾詩非闗能結束本是細腰支寶六韜武王伐紂䝉寶衣投火而死陸倕石闕銘棄彼衣傅𤣥正都賦將以威天下而禦羣凶遣懐鶴注詩云寒城塞日皆指秦州而言是乾元二年作趙汸曰時客秦州欲於東柯谷西枝邨尋置草堂而未遂末託意於棲鴉所遣之懐在此顧注愁眼二字便見所懐八句皆言愁中景物聊借詩以排遣之耳愁眼看平聲霜露寒城菊自花天風隨㫁柳客淚墮清一作晴非笳水静樓一作城陰直山昏塞日斜夜來歸鳥盡啼殺後棲鴉此邊塞凄涼觸景傷懐而借詩以遣之句句是咏景句句是言情説到酸心滲骨處讀之令人欲涕上趙汸注天風句下因上客淚句上因下水静句下因山昏句上因下顧注結聨即上林無限樹不借一枝棲之意葢歎卜居無地也隨記霜露既降風謝朓詩寒城一以眺劉楨詩輕葉風轉此云天隨斷柳劉刪詩邊聲隕客淚此云客淚墮清笳皆用古人語而句法倒裝耳蔡邕詩枯桑知天風謝朓詩淫淫客淚垂樓又寥戾清笳轉山莊子水静則明梁元帝詩水静㵼船孔徳紹詩昏五里霧張正見詩昏昏塞日沉鳥潘岳楊仲武誄歸頡頏趙汸曰天地間景物非有所厚薄於人惟人當適意時則情與景㑹而景物之美若為我設一有不慊則景物與我漠不相干故公詩多用一自字如寒城菊自花故園花自發風月自清夜之類甚多天河鶴注此當是乾元二年七月在秦州作故有伴月落邊城之句王柏曰天河從北極分為兩頭至於南極隨天而轉入地下過水之氣也廣雅雲漢星漢河漢銀漢銀河絳河天津漢津皆天河名常時任顯晦秋至轉從趙本一作最吳作輒分明縱被微雲掩終能一作當一作輸永夜清含星動雙闕伴月落邊城牛女年年渡何曾音層風浪生此客秦而詠天河也秋至分明提醒處天河三四見其夜夜分明五六見其處分明七八見其歲歲分明此直詠天河而寓意在言外篇中微雲掩風浪生似為小人讒妬而發雙闕指京師邊城指秦州詩陶潛傳贊顯晦殊途謝沈約詩秋至愍衰草劉泓的的最分明世説景重曰意謂不如微雲㸃綴古鮑照蒿里行馳波催永夜櫓周禮注象魏宫門雙闕詩雙闕百餘丈國策樓不施而邊城降周王褒啟邊城無草月吳筠續齊諧記桂陽城武丁有仙道忽謂其弟曰七七日織女當渡河諸仙悉還宫吾已被召弟問曰織女何事渡河答曰織女暫詣牽牛明日失武丁杜審言詩年年今夜盡南齊書沈攸之攻郢城夜常風浪張綖曰首二見君子之節因時而顯三四言小人掩蔽無損其先五句近而有耀誠則形也六句在逺彌彰徳不孤也末聯謂從容静俟則風波自息矣洪仲曰天河初月二詩皆暗寫題意不露題字初月詩有古塞闗山之語當是乾元二年在秦州作光細一云常弦初陳作欲一作豈上影斜輪未安微升古塞一作堞外已隐暮雲端河漢不改色關山空自寒庭前有白露暗滿菊花圑英華作欄狀此在秦州詠初月也光細景斜初月之乍升旋隐初月之時下四皆承月隱説河漢闗山言逺景庭露菊花言近景總是夜色朦朧之象洪仲注光影就明處言弦輪就暗處言暗河漢色明見月影忽沉闗山自寒見月光全没末㸃字總見無月可窺矣張逺注此詩句句有一初字意細玩自見望左傳注月體無光待日照而光生半則為弦全乃成周王褒詩上弦如半壁庾信詩桂滿獨輪斜李隅賦波水蕩而月輪斜不王褒啟塞外饒沙古詩河漢清且淺樂府陵霜改色王褒詩闗山夜月明白或曰毛詩零露漙兮説文漙徒官切露多貌庭前有露暗滿菊花團疑是漙字朱注韻㑹團或作専周禮其民専而長是也漙集韻或作專通作専以古多混用謝靈運詩火雲團朝露謝朓詩猶霑餘露團謝惠連詩團團滿葉露江淹詩簷前露已團庾信詩惟有團階露承睫苦霑衣薛道衡詩高秋白露團舊本俱作團菊記季秋之月有黄華山谷詩話王原叔説此詩為肅宗而作今按此詩若依舊説亦當上下分截上四隐諷時事下四自歎羇棲光細見徳有虧影斜見心不正升古塞初即位於靈武也隐暮雲旋受蔽於輔國良姊也河漢不改謂山河如故闗山自寒謂隴外凄涼露暗花團傷逺人不䝉光被也擣衣鶴注是時安史未息又備吐蕃當屬乾元二年作謝靈運有𢷬衣詩題亦知戍不返秋至拭清砧已近苦一作暮寒月况經一作驚長别心寧辭擣衣一作熨倦一寄塞垣深用盡閨中力君聽平聲空去聲外音𢷬衣代戍婦言情也戍不返搗衣之故拭清砧擣衣之事三四承首句五六承次句七承五六仍應拭清砧八承三四仍應戍不返分之則各有條緒合之則一氣貫通此杜律所以獨至也但逺注王灣擣衣詩風響傳聞不到君即此詩末句意藴藉不如耳詩傳戍屯兵守也江淹詩秋至擣羅紈國玉篇砧搗石也劉希夷詩盻青砧兮悵盤桓無趙充傳土地苦寒漢馬不耐冬鮑照詩長别逺雙宋武帝傳江山起别心衣謝朓詩南隣搗衣急丹鉛録字林直舂曰搗古人搗兩女子對立執一杵如舂米然今易作臥杵對坐搗之取其便也塞蔡邕疏秦築長城漢築塞垣所以别内外置殊俗注垣長城也宋之問詩空外有飛烟通雅空外猶單外也漢書張禹傳請鄧太后還宫以為冬處單外朱子詩經集傳多順文解義詞簡意明唐汝詢解唐詩亦用此法但恐敷衍多而斷制少耳今註杜詩間用順解欲使語意貫穿融洽此章趙汸注云此因聞砧而託為搗衣戍婦之詞曰我亦知夫之逺戍不得遽歸方秋至而拂拭衣砧者葢以苦寒之月近長别之情悲亦安得辭搗衣之勞而不一寄塞垣之逺是以竭我閨中之力而不自惜也今夕空外之音君其聽之否耶音字含一詩之意唐仲言極稱斯注今標此以發順解之例歸燕鶴注舊編在乾元二年秦州詩内下四章並同魏文帝詩歸燕翩兮徘徊不獨避霜雪其如儔侣稀四時無失序八月自知歸春色豈相訪一作誤衆雛還識機故巢儻未毁㑹傍去聲主人飛歸燕傷羇旅也人上四咏燕歸下四咏燕來方去而冀其復來乃詩忠厚之意春色二句作望燕之詞故巢二句代燕作答詞鮑杜臆末乃自寓巳意雖棄官而去非果於忘世也照雙燕詩豈但避霜雪當儆野人機身嵇康詩邕邕和鳴顧盻儔侣與杜臆四時二句具見分隐然有時止時行意易四時合其序𤣥傅咸燕賦信進止之有序滿月令二月𤣥鳥至八月鳥歸陰鏗詩上林春色鸚鵡賦憫衆雛之無知還又才聰明以識機故晉書朔馬謡燕雀何徘徊意欲故巢陶潛詩先巢尚在相將還舊居漢樂府長歌行來到主人門盧元昌曰嘗讀谷風棄婦始曰無逝我梁無發我笱何其厚也至曰我躬不閲遑恤我後又歎其决絶之甚公曰故巢倘未毁㑹傍主人飛明知故巢巳毁猶拳拳冀主人勿棄身雖棄官心還戀主也促織黄希曰爾雅釋蟋蟀一名蛬今促織也陸璣疏云似蝗而小正黒有光澤一名蛬一名蜻􅖹楚人謂之王孫幽州人謂之趣織里語云趣織鳴懶婦驚是也古今注促織一名梭機莎雞一名絡緯促織甚微細哀音一作聲何動人草根吟一作泠不穩牀下意一作夜相親久客得無淚故吳作放妻難及晨悲絲一作絃與急管感激異天真促織感客思也皆哀音動人領起通章草根牀下其哀音久客故妻此其動人者末言䖝鳴出自天真故其感人獨至絲管屬借形班固典引不遺微細阮籍詩鶗鴂發哀音蟋沈約詩草根積霜露賦王褒傳蟋蟀秋吟妻詩十月蟀入我牀下鸚鵡逐臣為之屢歎棄為之歔欷鮑照詩棄妻望掩淚逐臣對撫心此五六所本夜後漢書温序曰久客思鄉里湯惠休秋風詞蟋蟀鳴㫁人腸長夜思君心飛揚買顧注故妻指棄婦孀婦言朱買臣傳故妻與夫家見臣飢寒呼飯之陸機詩欲鳴當及晨絃急管為君舞宋武帝詩深心屬悲絃低鮑照詩催蔡邕琴賦感激絃歌一一昂琴操伏羲作琴修身理性返其天真詩到結尾借物相形抑彼而伸此謂之尊題格如咏促織而末引絲管咏孤雁而末引野鵶是也螢火爾雅螢火一名即照崔豹古今注螢火一名暉夜一名景天一名燐一名丹良一名丹鳥一名夜光一名宵燭吕氏本草螢火一名夜照一名熠燿一名救火一名據火一名挾火幸因腐草出敢近去聲太陽飛未足臨書巻時能㸃客衣隨風隔幔小帶雨傍去聲林微十月清霜重飄零何處歸螢火刺閹宦也明首言種之賤次言性之陰三四近看見其多暗而少五六逺看見其潛形而匿迹末言時過將銷此軰直置身無地矣草鶴注謂指李輔國軰以宦者近君而撓政也今按腐喻腐刑之人太陽乃人君之象比義顯然説月令腐草化為螢爾雅釋腐草得暑濕之氣為螢文日實也太陽之精沈旋螢詩陽昇反奪照又云當朝陽於戢景兮不臨書巻用車𦙍囊螢讀書事傅嘉運螢詩夜風吹滅張正見詩隔幔似重鈎夜沈旋螢詩雨墜弗虧光飄湛方生弔鶴文負清霜而鳴謝惠連雪賦從風零朱超詩此夜逆風何處歸蒹葭詩兼葭蒼蒼爾雅釋葭一名葦即蘆也茅之未成者一名蒹似萑而細高數尺摧折不自守一作與秋風吹若何暫時花戴一作載一作帶雪幾處一作墮水葉沉波體弱春苗一作風一作甲早叢長夜露多江湖後搖落亦一作只恐歲蹉跎蒹葭傷賢人之失志者秋暫時花發葉已沉波申上風摧折春苗夜露遡其前江湖揺落要其後也在北方風氣早寒故蒹葭望秋先零南方地氣多煖故江湖者後落末秋風摧折如彼而逺託江湖者亦復蹉跎於歲晚乎二句隐然有自傷意顧注此咏秋日蒹葭而兼及四時苖早言春露多言夏後落又涉冬矣思中山王文木賦華葉分披枝條摧折陸倕詩體弱自强而杜臆以戴對沉高下相稱載以字近而訛帶以音近訛楚辭蕭瑟兮草木摇落而變衰阮籍詩願為三春遊朝陽忽蹉跎苦竹齊民要術竹之醜者有四曰青苦白苦紫苦黄苦語林張廌隐居頥志家有苦竹數十頃青㝠亦自守軟弱强區兩切扶持味苦夏蟲避叢卑春鳥疑軒墀曾音層不重剪伐欲一云亦無辭幸近幽人屋霜根結在兹苦竹嘉君子之避地者非一二表其清操三四傷其見棄五六見廊廟分七八言林麓堪依節軟弱强扶持包許多小心謹畏堅忍寧耐意何杜臆苦則人不能親地卑則人不相信剪伐無辭等謙厚結根在兹欲全晚節也烟幽人屋亦自寓有欲與偕隐之志鮑照詩青㝠摇樹劉琨詩咨余軟弱弗克負荷周王褒詩軟弱自芬芳信莊子夏蟲不可語氷劉孝綽詩復值懐春鳥庾新樂表軒墀𢎞敞軒墀乃富貴家㕔事竹詩勿剪勿伐古詩冉冉孤生結根泰山阿王嗣奭曰前章不自守言遭時之窮此章亦自守見保身之哲讀二詩知公去就之間善於審處也鍾惺曰少陵如苦竹蒹葭胡馬病馬鸂鶒孤雁促織螢火歸燕歸雁鸚鵡自小猿雞麂諸詩於諸物有讚羨者有悲憫者有痛惜者有懐思者有慰藉者有嗔怪者有嘲笑者有勸戒者有計議者有用我語詰問者有代彼語對答者蠢者靈細者巨恒者竒黙者辯詠物至此神佛聖賢帝王豪傑具此難著手矣杜詩詳註巻七
