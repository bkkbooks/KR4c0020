body:
  text: 杜詩詳註卷二十三翰林院編修仇兆鰲撰湖中一作南送敬十使君適廣陵鶴注當是大厯四年潭州作唐書揚州廣陵郡屬淮南道君公追酬髙蜀州人日詩序有昭州敬使超先當即其人相見各頭白其如離别何幾年一㑹面今日復扶又切悲歌首叙送別之情適後漢書范丹别王奐曰今子逺千里㑹面無期少去聲壯樂音洛難得嵗寒心匪他湯河切氣纒霜匣滿冰置玉壺多遭亂實漂泊濟時曾音層琢磨形容吾較老膽力爾誰過此叙彼此心緒嵗寒句承各頭白霜匣玉壺比敬之氣豪而識積遭亂濟時言己之厯世而才練皆所謂心匪他也下二亦用分承劍盧諶詩綢繆委心自同匪他上西京雜記髙帝斬蛇琉璃為匣十二年一磨瑩刀常如霜雪開匣拔鞘光彩射人冰樂府清如玉壺秋晚嶽增翠風髙湖湧波鶱騰訪知巳淮海莫蹉跎末叙送别景事臆上二湖南秋景下二廣陵之事杜本言淮海訪知巳鶱騰莫蹉跎只互換兩字不惟調恊亦且句新波此章首尾各四句中間八句浮淮賦驚風泛湧駭晚秋長沙蔡五侍御飲筵送殷六參軍歸澧音里一作灃誤覲省鶴注當是大厯四年冬作灃州屬岳州府佳士欣相識慈顔望逺遊甘從投轄飲肯作致従杜臆舊作置書郵髙鳥黄雲暮寒蟬碧樹秋湖南冬不雪吾病得淹留首二殷六省覲三四蔡筵送行五六别時秋景七八别後旅情黄生注公前有送侍御四舅之澧朗詩疑即致書於此人五羡殷六悲巳景中却有寓意用潘岳閑居賦壽觴舉慈顔和望逺逰謂親望子歸論語逺逰字轄前漢陳孟公嗜酒毎大飲賓客滿座輒闗門取客車投井中雖有急不得去世說殷羨為豫章太守將附書百許函悉擲水中曰沉者自沉浮者自浮殷洪喬不能作致書郵古樂府黄雲暮四合髙鳥各分飛寄語逺逰子月圓胡不歸嘒潘岳秋興賦庭樹摵以灑落兮勁風戾而吹衣蟬嘒而寒吟兮雁飄飄而南飛寒江淹詩碧樹先秋落而得淹留聊避也楚辭九辨蹇淹留無成新安黄生白山曰公欲託殷寄書詩故歸重於殷蔡侍御則安頓在投轄句中與他筵送客詳主畧賓者不同此古文叙事輕重法也别張十三建封鶴注當是大厯四年潭州作薦舊唐書大厯初道州刺史裴虬建封於湖南觀察使韋之晉辟署參謀授左清道兵曹參軍不樂職輒去後為徐泗濠節度使杜臆觀詩意張葢應韋之辟不樂就職而去公與之别也嘗讀唐實録國家草昧初劉裴首建議龍見音現尚躊躇秦王撥亂姿一劍總兵符汾晉為豐沛暴隋竟滌除首叙開國勲臣為下文張本辨此以裵為賓劉為主文前漢司馬遷傳贊善序事理而不華質而不俚其直其事核不虚美不隱惡故曰實録唐藝文志髙祖實録二十巻敬播撰房𤣥齡監修太宗實録二十巻敬播顔𦙍撰房𤣥齡監修為易天造草昧謂草雜暗昧之初靜劉文靜傳大業末晉陽令輿晉陽宫監裴寂善文見太宗謂寂曰唐公子非常人也因與定議起兵通鑑大業中髙祖鎮太原時劉大靜為晉陽令裴寂為晉陽宮監見天下盗起知隋必亡首建議舉大事帝猶未允頼秦王贊之遂起兵汾晉蔡邕光武清陽宮碑龍見白水人躊躇髙祖志未决也書漢髙帝紀撥亂世反之正持三尺劍取天下晉雷焕送一劍於張華一劍自佩故史記魏公子傳兵符常在王卧内與汾晉為唐公鄉猶漢之豐沛漢武帝紀滌除之更始宗臣則廟食後祀何疎蕪彭城英雄種上聲宜膺將去聲相去聲圖爾惟外曾孫倜儻汗血駒次記張氏淵源見毓種有自此以劉為賓張為主仕劉文靜傳文靜自言系出彭城世居京兆武功父韶隋戰死贈儀同三司漢東方朔傳賛倜儻博物眼中萬少去聲年用意盡崎嶇相逢長沙亭乍問緒業餘乃吾故人子童丱聯居諸此遡往日交情洽少年﨑嶇言不如舊交欵緒業謂世緒家業逰米注公父為兖州司馬當是趨庭之日與張玠同而建封相從也故人指玠童丱指建封建封以貞元十六年終年六十有六公開元末逰兖是時建封纔六七嵗耳舊注謂公幼時與建封友善謬矣舊唐書建封兖州人父玠少豪俠安祿山反令偽將李庭偉率蕃兵脅下城邑玠率鄉豪集兵殺之太守韓擇木方遣使奏聞玠蕩江南不言其功惜司馬遷傳頼先人緒業詩日居月諸昌黎詩為爾居諸亦將虚字作實用揮手灑衰淚仰看八尺軀内外名家流風神蕩江湖范雲堪結友一作晚交嵇紹自不孤此喜知巳可憑為内家為玠之子外家文靖外孫皆名流也人杜臆范雲嵇紹一聮既欲託身又欲託子非真重其必不作此語儀禮注姑之子外兄弟也舅之子内兄弟也魏𡊮淮正論中外之親近於同姓後漢方術傳餘亦斑斑名家焉劉孝威傳風神灑落容止汪洋王梁書范雲好節尚奇專趣人之急少時與領軍長史畡善畡亡於官舍貧無居宅雲乃迎喪還家躬營唅殯南史何遜弱冠舉秀才范雲見其對策大相稱賞結為㤀年友晉書嵇康與山濤結神交康臨誅謂其子紹曰巨源在汝不孤矣擇材征南幕潮一作湖落回鯨魚載感賈生慟復扶又切聞樂毅書主憂急盗賊師老荒京都舊邱豈一作復稅駕大厦傾宜扶此送其辭幕歸京晉擇材征南昔在韋之幕巾潮落鯨回韋卒而張北歸也賈生慟有慨時事樂毅書不忘舊帥主憂師老指吐蕃屢冦此時豈可息駕舊邱宜思扶危定傾也涕晉杜預為征南大將軍王賈誼治安䇿可為痛哭流史記樂毅降趙燕惠遺毅書且謝之毅亦作書報焉夏侯湛見其書以為知幾合道以禮終始君臣各有分音問管葛本時須雖當霰雪嚴未覺栝柏枯髙議一作義在雲臺嘶鳴望天衢羽人掃舊作掃當作歸義明而聲恊碧海功業竟何如末則勉其憂國濟時也起才如管葛皆待時而出今嵗寒正可有為矣將來振朝堂功業上追文靜何必效羽人之入海乎諷朱注史言建封不樂吏職疑其人盖有志神仙者故之云彼羽人掃跡海外以視功業濟世者竟何如耶注掃碧海趙氏以為澄清天下之比就指功業言與朱不同此章前後三段各八句中間三段各六句仙趙注楚辭仰羽人於丹邱言人飛騰如有羽毛焉盧世淮曰送魏佑王砅張建封乃滿肚國史實録無處發付特借彼題目寫我文章即與本人分上頗覺迂逺亦不暇顧要之建封自奇士只風神蕩江湖誰能當此五字耶送盧十四弟侍御䕶韋尚書靈櫬歸上都二十四韻鶴注當是大厯四年冬潭州作其韋尚書即之晉公之祖母盧氏十四表弟也素幙度江逺朱幡登陸微悲鳴駟馬顧失涕萬人揮參佐哭辭畢門闌誰送歸從公伏事久之子俊才稀長路更執紼此心猶倒衣感恩義不小懐舊禮無違墓待龍驤詔臺迎獬豸威深衷一作哀見士則雅論在兵機叙侍御送韋見死生不朁之情驤上四韋公靈櫬中八盧公䕶䘮下四結上起下龍承韋言殁後贈典獬豸氶盧言宿望還都深衷指送喪論兵感世亂者韋櫬從水程而往故素幕之涉江者逺朱幡之登陸少也趙次公以朱幡為丹旐本於文選注旐引柩幡也王原叔引朱轓兩輪轓與幡異黄鶴引衛青傳注每軍一校則别為幡謂部曲侯送之旗幡佐四皓歌駟馬髙葢衣陸機詩揮淚廣川隂參佐謂吏參軍詩顛倒裳晉王濬為龍驤將軍卒塟柏谷中大營塋域一獬豸獸名知人曲直而觸不直者舊書輿服志法冠名獬豸冠以鐡為柱其上施珠兩枚為獬豸之形左右御史臺服之何遜詩深衷外有規世說陳仲舉言為士則行為士範有李乂詩河塞兵機戎狄乗妖氣塵沙落禁闈往年朝音潮謁斷他日掃去聲除非但促一作整銅壺箭休添玉帳旂動詢黄閣老肯慮白登圍萬姓瘡痍合羣兇刋作雄嗜慾肥刺規多諌諍端拱自光輝儉約前王體風流後代希宋本誤作稀對敡同揚期特達衰朽再芳菲此慨嘆時事望侍御歸朝入告戎狄乗謂吐蕃䧟京落禁闈謂侵犯宮闕朝謁斷指代宗幸陜掃除非謂禦戎無策銅壺二句言天子當早朝勤政毋事添兵苑中黄閣二句言廟堂當謀及老成不㤀外侮之憂瘡痍謂生民困於兵賦嗜慾謂降將恣為驕侈刺規以下勉侍御面折廷諍以圖治安而儉約愛民尤為當今切務故當抗章特違不可委靡令我衰朽之人亦與有榮施也意米注休添玉帳旂即公詩由來貔虎士不滿鳯凰城今按儉約前王體即公詩不過行儉德威加四海深意漢後漢陳蕃傳大丈夫處世當掃除天下史司馬彪績書孔壺為漏浮箭為刻陸倕漏刻銘銅司刻金徒抱箭七漢書髙帝至平城胃頓縱積兵三十萬圍帝於白登日孔融書羣兇破珍趙壹疾邪賦肆嗜慾於目前導希言當希法前王璋書對揚天子之休命世說王謂顧和曰此子圭特達機警有鋒空裏愁書字山中疾采薇撥杯要平聲忽罷抱被宿何依眼冷看平聲征葢兒扶立釣磯清霜洞庭葉故就别時飛末敘送别之情而把杯同宿不可復得從此征葢逺行唯立磯遥望已霜凋木葉對秋增悲也此章前二段各十六句後段八句收酒杜臆撥杯抛杯不飲也冇撥棄潭州可證蘇大侍御訪江浦賦八韻記異鶴注當是大厯四年潭州作原題乃詩之序合題曰蘇大侍御訪江浦賦八韻記異詩止七韻而題云八韻用韻取耦不取奇也蘇大侍御渙靜者也旅於江側一本有凡是二字或作乃是俱羨不交州府之客人事都絶久矣肩輿江浦忽訪老夫舟檝已而閻若璩曰當作巳而誤刋而已茶酒内余請誦近詩肯吟數首才力素壯辭句動人接對明日憶其湧思雷出書篋几杖之外殷殷留金石聲賦八韻記異亦見老夫傾倒於蘇至矣杜臆渙本盗俠讀其變律詩自推作家肩輿忽訪能具隻眼故就此一節取之而隱衷則微見於記異二字言其出於意外也涣南部新書渙有變律詩十九首上廣帥李公唐人謂詩長於諷刺得陳拾遺一鱗半甲龎公不浪出蘇氏今有之再聞誦新作突過黄初詩乾坤幾一作泊反覆荒服切揚馬宜同時今晨清鏡中白閒生一作添黑絲此句舊在却變下余髮喜却變勝食齋房芝此句舊在鏡中下昨一作永夜舟火滅黄作天接一作接天湘娥簾外悲百靈未敢一作水夜散風破一作浪一作波寒江遲詩題記異意凡四層閉門不出一異也詩過前人二異也喜變顏色三異也感動神靈四異也世黄初七子魏文帝時詩人乾坤幾反覆言兩漢至魏凡幾變揚馬宜同時葢以蘇匹已也凊食芝可以返老誦詩而變黑髪是勝於茹芝矣舊本鐃下便接齋房芝解者取其倒插不如結食芝於下句意味較長遲杜臆本言其詩泣鬼神却說到湘娥悲百靈集江風如海市蜃樓恍惚中變怪百出知杜老胸中真神靈窟宅也封後漢龎徳公居峴山之南未嘗入城府漢武帝元二年芝生甘泉齋房歌齋房産草九莖蓮葉曹謝朓詩凊鏡悲曉髪古詩長歌行白髮復變黒植樂府湘娥拊琴瑟風宋書宗慤曰願乗長破萬里浪盧世㴶曰杜先請蘇涣誦詩又賦詩贈涣真傾倒於蘇至矣及考蘇之為人起手結句幾於龍蛇起陸又慨然作變律詩想見其無聊無忌子美既目為靜者又目為白起繩尺原自井井然其不交州府而獨肩輿訪杜其人固卓詭而具心眼者子美所以記異也洪容齋隨筆曰子美贈蘇涣詩序云渙靜者也吟詩殷殷留金石聲詩中云再聞誦新作突過黄初詩又有一篇寄裴道州寄呈蘇渙云附書與裴因示蘇此生已愧須人抉致君堯舜付公等早據要路思捐軀其褒重之如此唐藝文志有涣詩一巻云渙少喜剽盗善用白弩巴蜀商人苦之稱白跖以比莊蹻後折節讀書進士及第湖南崔瓘辟從事繼走交廣與哥舒晃反伏誅然則非所謂靜隱者也渙在廣州作變律詩十九首上廣帥其一曰養蠶為素絲葉盡蠶亦老傾筐對空床此意自誰道一女不得織萬夫受其寒一夬不得意四海行路難禍亦不在大福亦不在先世路險孟門吾儕當勉旃其二曰毒蜂一成窠髙挂惡木枝行人百步外目斷魂為飛長安大道邊挾彈誰家兒手持黄金丸引滿無所疑一中紛下來勢若風雨隨身如萬箭攅宛轉迷所之徒有疾惡心奈何不知幾讀此二詩可以知其人矣杜贈渙詩名為記異語意不與他等厥有㫖哉暮秋枉裴道州手札率爾遣興去聲寄逓呈蘇渙侍御鶴注此當是大厯四年潭州作時公與蘇同在潭州也久客多枉友朋書素書一月凡一束虛名但䝉寒暄一作温問泛愛不救溝壑辱齒落未是無心人舌存恥作窮途哭道州手札適復扶又切至紙長要自三過平聲讀盈把那須滄海珠入懐本倚崑山玉撥棄潭州百斛酒蕪沒瀟一作湘岸千株菊使我晝立煩兒孫令平聲我夜坐費燈燭從道州手札叙起故上六借形下八指裴之朱注道州之書寳如珠玉無心飲酒對菊而讀晝夜忘倦賜煩兒孫立久須扶也王古詩中有尺素書操梅福書以一束之帛晉書獻之嘗與兄徽之之請謝安二兄多言俗事獻之寒温而巳既出安曰吉人辭寡王符自叙髮白齒落日月逾邁史記張儀為楚相笞掠謂其妻曰視吾舌尚在否妻笑曰在儀曰足矣王筠傳筠於書三過五抄狄仁傑傳閻立本謂曰君可謂滄海遺珠矣𤣥古詩置書懐袖中三嵗字不滅世說毛曽與夏侯並坐時人謂蒹葭倚玉樹崑山片玉用晉郄詵語有世説阮步兵厨中貯酒數百斛荆州記長沙郡酃縣酃湖周迴三里取湖水為酒極甘美元和郡國志晉武帝平呉薦酃酒於太廟憶子初尉永嘉去紅顔白面花映肉軍符侯印取豈遲紫燕騄耳行甚速聖朝音潮尚飛戰鬬塵濟世宜引英俊人黎元愁痛會蘇息戎狄跋扈徒逡巡授鉞築壇聞意㫖頽綱漏網期彌綸郭欽上時掌切書見大計劉毅答詔驚羣臣他日更平聲僕語不淺明公論平聲兵氣益振平聲往此厯叙裴公位望軍上四憶其既下十冀其將來符侯印乃刺史所用者紫燕騄耳喻其得位之速提綱而息黎元見大足經邦授鉞而驅戎狄見武能戡亂郭欽上書為吐蕃冦邊而發劉毅答詔為代宗好貨而發末二句用倒結謂聽其平日語言長於論兵故知之也公前有送裴二尉水嘉詩魏紫燕漢文帝良馬騄耳周穆王八駿之一晉書漢故事遣將出征符節郎授節鉞於明堂六築壇見韓信傳子賈誼傳皆聞意㫖故陸機諸侯論臣犯其弱綱七衝其漏網易傳能彌綸天地之道平晉書侍御史郭欽上疏曰戎狄强獷厯世為患宜及呉之威漸徙内郡雜虜於邊地峻四夷出入之防明先王荒服之制何又武帝嘗問劉毅曰朕可方漢何主對曰桓靈帝曰至於此對曰桓靈賣官錢入官庫陛下賣官錢入私門以此言之殆不如也帝大笑曰桓靈之世不聞此言記儒行孔子對魯哀公曰遽數之不能終其物悉數之乃留更僕未可終也注僕太僕也君燕朝則正位掌儐相更之者為久將倦故使之更代也鴻後漢書皇甫嵩答董卓曰昔與明公俱為鵠左思詩酒酣氣益振傾壺簫管動荆作動一作理一作黒白髮儛劒霜雪吹青春宴筵曽音層語蘇季子後來傑出雲孫比茅齋定王城郭門藥物楚老漁商市市北肩輿每聨袂郭南抱甕亦隠去聲几無數將軍西第成早作丞相去聲東山起鳥雀苦肥秋粟菽蛟龍欲蟄寒沙水天下皷角何時休陣前部曲終日死此記蘇渙情事劍上八述其客潭之迹下六惜其抱才不用述傾壺儛指前此湘江之宴此時蘇方在潭而曾稱之也盧注蘇卜齋定王郭門公賣藥魚商市上蘇訪公於市北則肩輿頻至公訪蘇於郭南則隱几蕭然此叙彼此往來之誼也公昔進三大禮賦表中有賣藥都市句知此處藥物楚老當屬自謂西第東山指當時濫叨將相者張逺注鳥雀苦肥蛟龍欲蟄即所謂侏儒飽欲死臣朔飢欲死也皷角未休部曲死戰見多事之秋非鳥雀庸才所能勝任而蛟龍奮起必不終困寒沙也趙注將此二句作起下之詞據上段更僕論兵二語巳結裴公則此段鼔角部曲二語宜結蘇君孫霜雪指劍光商徐穉傳角立傑出爾雅七世曰雲定王城漁市皆在潭州賢謝靈運詩楚老憎蘭芳出又漁商豈安流楚國先傳諸阮居市北而富毎肩與數十連袂牽裾飲酣自若西抱甕見前汲井嵗搰搰謝後漢馬融傳融為大將軍第頌頗為正直所羞安傳髙崧戲之曰卿累違朝㫖髙卧東山附書與裴因示蘇此生巳愧須人扶致君堯舜付公等早據要路思捐軀末段交勉裴蘇結出寄呈之意杜臆裴本端人借此引蘇欲使亂世奸雄轉為治世能臣也必致身方能致君故以捐軀告之未幾蘇以附叛見誅有負公之明訓矣裴此章前三段各十四句末段四句結上二段分叙蘇故此處一語雙闗但直云與裴并示蘇似詩注不是詩句頗嫌直率表須人扶謂扶持國家平原君傳公等碌碌曹植憂國㤀家捐軀濟難此詩用意錯綜有換意不换韻處有换韻不换意處公長篇古風往往變化莫測奉贈李八丈曛判官鶴注當是大厯四年秋在潭州作我丈特一作時英特宗枝神堯後珊瑚市則無騄驥人得有早年見標格秀氣衝一作通星一作牛斗事業富清機官曹貞一作正獨守首段稱美李大是贈言言珊瑚騄驥比其貴重難得標格秀氣其才品不凡清機獨守贊其有為有守聰魏志司馬懿少聰達多大畧崔琰謂其兄朗曰君弟亮明允剛斷英特非子所及珊神堯唐髙祖也騏述異記鬱林郡有珊瑚市海客市瑚處也騄耳驥穆天子駿馬曹攄詩精義測神奥清機發妙理頃來樹佳一作嘉政皆巳傳衆口艱難體貴安冗長去聲吾敢取此茍切區區猶厯試炯炯更持久此承官曹貞獨守厯艱難之時安靜而無繁冗此言其識治體區區一判試而心久持此言其有定力陸機文賦固無取乎冗長趙曰凡物之剰者為冗長東方朔答客難曠日持久討論平聲實解頤操割紛應手篋書積諷諌宫闕限奔走入幕未展才一作懐秉鈞孰為偶此承清機富事業諌解頤謂博通典故應手謂練達時務志存諷而身屈幕僚惜其大才小用也割也匡衡傳匡說詩解人頤手左傳未能操割而使莊子得之子心應之于詩子曰有奔走世説郄公可謂入幕之賓詩秉國之鈞所親問淹泊泛愛惜衰朽垂白辭呉作辭英華作慕一作亂南翁委身希北叟真成窮轍鮒或似喪去聲家狗秋枯洞庭石風颯長沙柳髙興去聲激荆衡知音為去聲回首末敘贈李之意轍所親指李泛愛槩言辭南希北公將北歸窮二句自傷淹泊秋枯二句借比衰朽髙歌聲激即指此詩論此章八句起十句結中二段各六句趙注泛愛出語殷仲文詩廣筵散泛愛遂以為朋友之呼矣人史記南公曰楚雖三户亡秦必楚真隱傳南公為楚而居國南鄙因公為號著書言隂陽事幽委身謂脫身其馬融傳得北叟之後福趙注班固通賦北叟頗識倚伏指塞上之翁為北叟也家隋煬帝詩真成遭箇春水窮轍鮒見莊子枯孔子世累累如䘮家狗趙注落石出所以為魏文帝與吳質書伯牙絶弦於鍾期痛知音之難遇奉送魏六丈佑少去聲府之交廣黄鶴編在大厯三年岳州今從朱氏編入四年冬潭州詩内後舊唐書武德五年改隋交趾郡為交州總管府改安南都䕶府武徳四年置廣州總管府後改中都督府賢豪贊經綸功成空名一作名空垂子孫不振耀一云沒不振厯代皆有之鄭公四葉孫長大常苦饑衆中見毛骨猶是麒麟兒磊落貞觀去聲事致君樸直詞家聲葢六合行色何其微從魏氏先世叙起功上四感盛衰靡常下八憐鄭公之後老子成名遂魏徵傳貞觀七年進左光禄大夫鄭國公恐易林長大成就此世説王右軍道祖士少風領毛骨沒世不復見如人麒麟兒注見十巻六新唐書徵犯顔正諫議者謂雖賁育不能過莊子合之内論而不議梁元帝纂要天地四方曰六合色莊子車馬有行遇我蒼梧隂一作野忽驚㑹面稀議論有餘地公侯來未遲虚思黄金遺去聲一作責自笑青雲期長子兩切卿久病渇武帝元同時季子黑貂敝得無妻嫂欺尚為諸侯客獨屈州縣卑南㳺炎海甸浩蕩從此辭窮途仗神道世亂輕土宜解帆嵗云暮可與春風歸此承上行色微餘上十傷其懐才落魄下八憐其胃險出逰議論有可以上繼直詞公侯未遲可以重振家聲乃長卿不過是青雲無期矣季子空囊是黄金莫遺矣且卑官作客中路又復蕭條仗神以庇輕去上鄉亦不得巳而南逰耳冬往春歸葢暫行而非宦迹也誤消渴貂敝諸侯賓客他章皆自謂此則指魏佑舊注涉自巳於上下文氣不接得朱注正之㑹鶴注蒼梧山在道州蒼梧隂則潭岳也古詩主稱面難莊子其於㳺刃為有餘地當塗者升青雲魏志王粲曰人人欲為公侯善解嘲司馬相如傳武帝讀子虛賦之曰朕獨不得與此人同時哉妻國策蘇秦說秦王不行黒貂之裘敝大困而歸至家不下機嫂不為炊後漢隗囂傳方望曰所謂神道設教求助人神者也吳越春秋相五土之宜出入朱門家華屋刻蛟螭玉食亞王者樂張遊子悲侍婢艶傾城綃綺輕一作烟霧霏掌郭作堂中琥珀鍾行酒雙逶迤新歡繼明燭梁棟星辰飛兩情顧盻合珠碧贈于斯上貴見去聲肝膽下貴不相一作見疑心事披寫間氣酣達一作逺所為錯揮鐵如意莫避珊瑚枝此承上遊炎海意上十廣南宴㑹之盛下八少府氣之豪宫室飲食聲樂服飾寳器珍玩備言貴族之奢華張綖云交廣逺於中國故其風俗如此自陸賈使南粤時巳然矣深見肝膽則哀情盡露不相疑乃形迹無間兩者微有淺故分上下違所為一發其胸中磊落之氣也杜臆上文言思黄金笑青雲可見此行所望於地主者不小故縱談其所想望而終致規諷焉十洲記藏養生而侍朱門食世說司馬徳操曰坐則華屋行則肥馬傾書維辟玉莊子黄帝張咸池之樂古詩一笑人城賓國洛神賦曳霧綃之輕裾漢書注佐酒助行酒也陳藏器曰琥珀出罽雙逶迤指送酒佳人謝惠連雪賦燎薫爐兮炳明燭事星辰指梁上之燈古詩顧盻生光輝謝朓詩心俱巳矣蔡邕傳輸寫肝膽罕晉石崇傳武帝嘗以珊瑚樹賜王愷髙二尺許世所比愷示崇崇便以鐵如意撃之應手而碎愷既惋惜崇曰不足恨乃命左右悉取珊瑚樹髙三四尺者六七株碧珠珊瑚皆交廣所出始兼一作無逸邁興去聲終慎賓主儀戎馬闇天宇嗚呼生别離末復丁寜致戒殷勤惜别之情並見於斯矣此趙注擊碎珊瑚雖興之豪邁然賓主威儀不可不慎又勗之以義耳盧注魏此行將有新知之樂公送時則懐生别之悲此章十二句起四句結中間二段各十八句詩敬慎威儀生楚辭悲莫悲兮别離北風黄鶴編在大厯三年今從朱氏編在四年秋潭州作趙注自天寳十五年至此巳十二年矣此云十年舉其大數耳北風破南極朱鳳日威一作低垂洞庭秋欲雪鴻雁將安歸十年殺氣盛六合人烟稀吾慕漢楚老時清猶茹芝上四比興下四叙情致朱鳯低垂鴻雁無歸喻已之流離失所此因亂離所故有殺盛人稀之感四皓採芝時清猶隠今亂後將馬適耶語意緊與上截相應臆此係古風故不用沈韻劉楨詩鳳凰集南嶽杜公朱鳳行瀟湘之山衡山髙山巔朱鳳聲嗷嗷天趙汸注威垂無氣象也司馬相如傳六合之内注地四方謂之六合胡應麟曰此詩首尾俱四支韻中間兩用五微葢古體通用非出韻也律詩出韻者玉山詩出芹字雨晴詩出農字排律出韻者贈王侍御契出勤字葢撿㸃少疎即作家或未能免耳幽人朱注詩末有五湖浩蕩語必居湖南時作草堂本編入潭州詩内今從之易幽人貞吉陸機詩幽人在空谷孤雲亦羣游神物有一作識所歸靈蔡作靈一作麟鳳在赤霄何當一作嘗一來儀首段託物比興起下一段鳳朱注雲得龍而自歸况幽人之類聚翔霄而不下况幽人之髙舉龍孤雲乃初起者羣游則四集矣雲歸神物即易雲從之義陶潛詩孤雲獨無依蔡邕書勢象鴻鶴羣㳺此易天生神物則米注趙次公引南史寳誌見徐陵曰天上石麒麟麟亦可言在赤霄然不可云來儀當依夢弼作靈鳳為是鳯靈鳥仁瑞也抱朴子靈鳳巻翮以幽戢毛萇詩傳張協七命掛歸翮於赤霄之表書鳳凰來儀往與惠詢一作旬軰中年滄洲期天髙無消息棄我忽若遺内懼非道流幽人見一作在瑕疵此想幽人而不可見應上靈鳳何來儀道有期約而未果豈真人昇天遂棄我乎祗恐身非有不免見摘於幽人耳綺朱注公有送惠二過東溪詩云空谷滯斯人又云黄未稱臣與此詩中年滄洲期句合詢或其名也杜臆惠詢必非惠逺許詢惠詢亦不相配也忽詩將安將樂棄于如遺郭泰機詩衣工秉刀尺棄我若遺北山移文覈元元於道流左傳不女瑕疵洪濤隠笑語從樊本一作語笑鼔枻蓬萊池崔嵬扶桑日照耀珊瑚枝風帆倚翠葢一作巘暮把東皇衣此寫幽人遊仙之樂應上神物有所歸人涉洪濤泛蓬萊至扶桑翠葢之下手把仙衣幽意者在是耶舟曹植詩泛舟越洪濤曰謝安傳笑語移日海孫楚賦人鼔枻而揚波張楫枻柁也音洩山經大荒之中暘谷上有扶桑十日所浴九日居下枝一日居上枝皆載烏梁元帝詩照耀珊瑚鞭韋誕景福殿賦龍舟兮翳翠葢一屈平九歌有東皇太嚥潄元和津所思煙霞一作霧微知名未足稱局趣音促商山芝五湖復扶又切浩蕩嵗暮有餘悲末嘆不得與之為侣也商欲效潄津之法託迹烟霞但為知名所誤故望山而局促耳今者嵗暮湖濱能無念幽人而悲感乎和此章四句起下三段各六句黄庭經口為玉池太官潄嚥靈液災不干口中液水為玉津中黄經但服元和除五榖必獲寥天得真籙服元和謂嚥津液漢武帝曰局促效轅下駒暮張恊詩嵗懷百憂鍾惺曰此絶妙逰仙詩非唯無丹藥瓢笠氣亦并無雲霞山澤氣覺太白語出之猶濫而易盧元昌曰此章大意是寓言起口四句况巳如孤雲寡偶少徒又如靈鳳非出其時也天髙無消息君門九重也棄予忽如遺退若墜淵也内懼非道流幽人見瑕疵信見疑忠見謗也洪濤隠笑語鼔枻蓬萊池憂讒畏譏思與人共濟也崔嵬扶桑日照耀珊瑚枝遊神於蓬萊宫闕青𤨏朝冠也風帆倚翠葢暮把東皇衣猶望翠華重過美人一晤也嚥潄元和津所思烟霞微若將屏一切凝萬慮翼閶闔之或通也知名未足稱局促商山芝自悼修名不立進不能離尢退不能修初服也公為扈從臣亦商山羽翼之流五湖復浩蕩嵗暮有餘悲既不能為採芝四皓又不能為泛湖少伯曰有餘悲情見乎詞矣留青日札詮蓬萊如可到衰白問羣仙謂公戀戀不㤀朝廷冀衰老而猶得見君今於此篇亦然江漢舊編在䕫州今依蔡氏入在湖南詩内與下首江漢山重阻為同時之作葢大厯四年秋也江漢思歸客乾坤一腐儒片雲天共逺永夜月同孤落日心猶壯秋風病欲蘇一作疎古來存老馬不必取長途此身滯江漢而有感也上四言所處之窮下四言才猶可用思歸之旅客乃當世一腐儒自嘲亦復自負天共逺承江漢客月同孤承一腐儒心壯病蘇見腐儒之智可用故以老馬自方周甸曰不必取長途取其智而不取其力巳逺注全首是老驥伏櫪志在千里烈士暮年壯心未意易林久客無牀思歸故鄉史記黥布傳髙帝謂隨何為腐儒為天下安用腐儒黄生注世不見用而心常憂國乾坤之内此腐儒能有幾人杜臆楚邱先生對孟嘗君曰决嫌疑定猶豫吾始壯矣何老之有即所云日暮而心猶壯也老馬之智可用出韓非子注巳别見陸冲詩命駕遂長途趙汸曰中四句情景混合入化雲天月夜落日秋風景也與天共逺與月同孤心視落日而猶壯病過秋風而欲蘇情也他詩多以景對景情對情其以情對景者巳鮮若此之虛實一貫不可分别效之者尤鮮近惟汪古逸有句云年爭飛鳥疾雲共此生浮近此四句意按東坡自嶺外歸次江晦叔詩云浮雲時事改孤月此心明語意髙妙亦是善摹杜句者詩家作法雖多要在摹情寫景各極其勝杜詩五律有景到之語如落雁浮寒水飢烏集戊樓星垂平野濶月湧大江流是也有情到之語如勝絶驚身老情㤀發興奇一時今夕㑹萬里故鄉情是也有景中含情者如感時花濺涙恨别鳥驚心岸花飛送客檣燕語留人是也有情中寓景者如影著啼猿樹魂飄結蜃樓正愁聞塞笛獨立見江船是也有情景相融不能區别者如水流心不競雲在意俱遲片雲天共逺永夜月同孤是也有一句說景一句説情者如悠悠照邊塞悄悄憶京華是也有一句說情一句說景者如白首多年病秋天昨夜凉是也有一景一情兩層叠敘者如野寺江天豁山扉花竹幽詩應有神助吾得及春遊徑石相縈帶川雲自去留禪䃽宿衆鳥漂轉暮歸愁是也其雋語名句不勝枚舉名家詩集中未冇如此之獨勝者古今詩話云楊大年不喜杜詩謂之村夫子有鄉人以杜詩强大年大年不服因曰公試為我續江漢思歸客一句大年亦為屬對鄉人曰乾坤一腐儒大年似少屈張潛曰大年所屈尚非杜佳句黄生曰前輩有病此詩日月並見者不知落日乃借喻暮齒本屬詠懐何病之有地隅詩云年年非故物葢大厯三年出峽四年又往潭衡也又云處處是窮途即上水遣興詩所謂異縣虚往也蔡氏編入湖南詩中近之江漢山重平聲阻風雲地一隅年年非故物處處是窮途喪去聲亂秦公子悲凉一作秋楚大夫平生心巳折行路日荒蕪此亦羈留江漢而作也上四客逰之迹下四漂泊之情山重阻家不可見地一隅身不能歸非故物遷流無定是窮途生計日艱此因䘮亂之餘以致悲凉若此心折傷已往荒蕪慨將來也鸚鵡賦崎嶇重阻粲古詩各在天一隅孫謝靈運擬魏公子鄴中詩序王家本秦川貴公子遭亂流寓自傷情多荀恱漢論郡國豪傑處處皆有三顔延之詩原隰多悲凉屈原為閭大夫杜詩用江漢有二處未出峽以前所謂江漢者乃西漢之水注於涪江如江漢忽同流無由出江漢是也既出峽以後所謂江漢者乃東漢之水入于長江如江漢思歸客江漢山重阻是也楊慎丹鉛録引祝穆云天下之大川以漢名者二班固謂之西漢東漢而黎州之漢水源於飛越嶺者不輿馬固之所謂東漢則禹貢之導漾入江者是也西漢則蘇代所謂漢中之甲輕舟出於巴乗夏水下漢四日而至五渚者其源出于西和州徼外逕階沔與嘉陵水合俗謂之西漢又逕大安利劒果合與涪水合入于江是也舟中夜雪有懐盧十四侍御弟鶴注當是大厯四年冬作葢盧送韋大夫歸塟公對雪而懐之也朔風吹桂水大一作朔雪夜紛紛暗度南樓月寒深北渚雲燭斜初近見舟重竟無聞不識山隂道聽平聲雞更憶君黄生注此詩對雪懐人以雪起以人終中首紀地次㸃題三四逺景言岸上五六近景切舟山隂應雪聽雞應夜全詩句句入細時月之暗雪暗之也雲之寒雪寒之也燭斜初見在坐舟重無聞在卧時詩北風其凉雨雪其雱邵謝大傅聨句白雪紛紛何所似撒鹽空中差可擬注謂南樓在武昌顧注謂南樓在岳陽盧注據柳子厚長沙驛前南樓感舊詩為證是南樓即在潭州楚辭帝子降兮北渚乃湘江之北渚亦屬潭州憶舟重雪厚也生郭璞詩夜夢江山逺聞雞更憶君更還憶也黄注七用王子猷訪戴事八取鄭風雞鳴風雨意而皆反之用事忌熟惟翻案則無不可用之事矣黄生曰三四不摹雪之狀而寫雪之神如初月則曰河漢不改色闗山空自寒喜雨則曰野徑雲俱黒江船火獨明此皆意到筆隨時來神助者也云今按詠雪則云燭斜初近見舟重竟無聞咏雨則隨風潛入夜潤物細無聲此畫工所不能繪直是化工之筆葉夢得詩話詩禁體物語此學詩者類能言之歐陽文忠公守汝隂嘗與客賦雪於聚星堂舉此令往往皆閣筆不能下然此亦定法若能者則出入縱横何可拘礙鄭谷詩亂飄僧舍茶烟濕密灑歌樓酒力微非不去體物語而氣格如此其卑蘇子膽云凍合玉樓寒起粟光摇銀海眩生花超然飛動何害其言玉樓銀海韓退之兩篇力欲去此弊雖冥搜竒譎亦不免有縞帶銀杯之句杜子美暗度南樓月寒生北渚雲初不避雲月宇若隨風且聞葉帶雨不成花則退之兩篇工殆無以愈也對雪此當與上章先後作詩曰長沙則在潭州矣北雪犯長沙胡雲冷萬家隨風且閒去聲一作開葉帶雨不成花金錯囊垂一作從一作徒罄銀壺酒易音異賒無人竭浮蟻有待至昏鴉上四雪中景下四雪中情隨南方少雪故逺自北方而來雪飛葉落風雜舞故曰閒雪有六花帶雨而濕故不成有酒無朋此對雪凄凉之况鮑照詩胡風吹朔雪千里度龍山藝苑雌黄云張衡四愁詩美人贈我金錯刀金錯刀王莽所鑄錢名莽變漢制以周錢有子母相權於是更造大錢徑寸二分重十二銖文曰大錢五十又造契刀其環如大錢身形如刀長二寸文曰契刀五百錯刀以黄金錯其文曰一刀直五千輿五銖錢凡四品並行杜詩金錯囊徒罄銀壺酒易賒韓退之詩聞道松醪賤何須恡錯刀皆謂是也髙後漢劉盆子傳吕母釀醉酒少來酤者皆賒與之又祖紀貰酒注賒酒也庾信詩浮蟻對春開按朱注舊本公自註何遜詩城隂度塹黒昏鴉接翅歸二語今何記室集不載公復愁詩釣艇收緍盡昏鴉接翅歸不應直用成句且昏鴉亦常語何獨於此釋之必出後人假託今流俗本所云公自註者多此類也冬晚送長子兩切孫漸舍人歸州梁權道編在大厯四年之冬參卿休坐幄蕩子不歸一作還鄉南客瀟湘外西戎鄠杜旁從自敘說起參西戎旅冦故南客未還我晉書孫楚為石苞驃騎軍初至長揖曰天子命參卿軍事因此嫌隙遂成公初為參謀今巳罷去故曰休坐幄鄠古詩云蕩子行不歸空牀難獨守漢宣帝紀尤樂杜之間顔注鄠屬扶風杜屬京兆衰年傾葢晚費日繫音計舟長㑹面思來札銷魂逐去檣雲晴鷗更舞風逆雁無行音杭匣裏雌雄劍吹毛任選將此叙送别情事傷來札期後日去檣惜臨岐鷗雁自孤踪流落選劍欲舍人及鋒而試也然此章上四句下八句而鄒陽傳傾益如故别賦黯銷魂列子鷗鳥舞不下詩兩驂雁行者吹毛可斷言劍鋒之利將佩之而行也暮冬送蘇四郎徯兵曹適桂州鶴注大厯四年十二月桂州人朱濟反當是此時作則鶴注通典漢司隷屬官有兵曹從事葢有軍事置唐三都督府上中下州皆有之飄飄蘇季子六印佩何遲早作諸侯客兼工古體詩爾賢埋照久余病長年悲此惜蘇之遇蹇悲賢而久埋與已之病棄者同矣史記蘇秦為從約長佩六國相印蔡邕釋誨連衡者六印磊落顏延之詩沉醉似埋照盧綰須征日樓蘭要斬時嵗陽初盛動王化久磷緇為入蒼梧廟看平聲雲哭九疑望其平桂州之亂也不盧綰比叛將樓蘭比諸蠻磷錙歎朝令行哭廟傷聖化不作不此章上下各六句使漢書髙祖使使徵盧綰綰稱病行上怒曰綰果反樊噲擊之斬樓蘭注見七巻格趙注十二月二陽生而盛矣蒼有苗來此舜平定南方之事故末及梧廟盧元昌曰蘇季子厯說諸侯合從伐秦佩六國相印公欲兵曹連結諸經畧節度并力討賊如季子合従故起有六印句其後容管使王翊藤州刺史李曉庭義州刺史陳仁瓘結盟討賊賊遂平客從鶴注當是大厯四年作唐史是年三月遣御史稅商錢詩故託珠以諷見徴斂及於商賈也客從南溟來遺去聲我泉客珠珠中有隠字欲辨不成書緘之篋笥久以俟公家須開視化為血哀今徵斂去聲無此詩為當時民困徵斂而作通首寓言末句露意出師氏曰此寓意公家苛斂而索其無有之物詩云俾童羖是也隠趙注必用泉客珠言其珠從眼泣所出今杜臆珠中字比民隠莫知上之所征皆小民之血併無之痛不忍言矣物古詩客從南方來遺我雙鯉魚廢南潩見莊子愽志南海外有鮫人水居如魚不織績其眼能泣珠述異記鮫人即泉先也又名泉客吴都賦劉淵林注俗傳鮫人從水中出曾寄寓人家積日賣綃臨去從主人索器泣而出珠滿盤以與主人酉陽雜俎摩尼珠中有金字偈盧世㴶曰留花門塞蘆子三吏三别二歎暨客從南潩來白馬東北來紆慮老謀補偏救弊其情酸味厚歌短泣長而一唱三歎藴藉優柔三百篇十九首蘇李曹植陶潛上下同流先後一揆矣蠶榖行大厯三年商州兵馬使劉洽反幽州兵馬使朱希彩反四年廣州人馮崇道桂州人來濟時反又連年吐蕃入冦所謂無有一城無甲兵也今依朱氏編在四年為是天下郡國向萬城無有一城無甲兵焉于䖍切得鑄甲作農器一寸荒田牛得耕牛盡耕一有田字蠶亦成不勞烈士淚滂沱男榖女絲行復扶又切歌當時賦役繁而農桑廢此蠶榖行所為作也然必銷兵之後民始復業末云烈士見當時征戍之士即農民耳杜臆上言甲兵下文變鑄兵為鑄甲此用字錯綜處題兼蠶榖篇中只帶言蠶亦成此序事詳畧法黄庭經寸田尺宅可治生劉庭芝詩荒田古逕多白鳬行此詩黄鶴編在大厯二年䕫州作以詩言終日忍饑西復東謂自瀼西遷東屯也其説西東固泥且是秋方有收穫安得云忍饑今按詩云天寒嵗暮波濤中應是四年潭州作若三年秋冬尚在公安山館也從朱氏編次為是爾雅釋鳬水鳥也李巡曰野曰鳬家曰鶩君不見黄鵠髙于五尺童化為白鳬似一作象老翁故畦遺穗已蕩盡天寒嵗一作日暮波濤中鱗介腥膻素不食終日忍饑西復扶又切東魯門鶢鶋亦蹭蹬聞道去聲于一作如今猶避風白鳬行自傷遲暮漂流也穗黄童化為老叟此黄鵠白鳬之喻也遺蕩盡陸無糧矣腥膻不食水又饑矣此自蜀至楚之喻鶢鶋避風傷北歸亦無安身之地也國語海鳥曰鶢鶋止于魯東門之外三日展禽曰今兹海其有災乎夫廣川之鳥獸常知而避其災也是嵗海多大風董斯張曰屈原卜居將泛泛若水中之鳬乎將與黄鶴比翼乎公借以自况言作賦摩空猶昔之黄鵠也今且行踪飄蕩泛泛若鳬而素心了不為變任其波濤嵗暮腥膻者終不可以食我也落句魯門爰居隠然有不饗太牢不樂鐘鼔之態此老倔强百折不囘矣朱鳳行朱氏編在大厯四年潭州作今玩此詩詞意與白鳬行相似葢同時之作無疑君不見瀟湘之山衡山髙山巔一作巖朱鳳聲一作鳴嗷嗷側身長顧求其曹從英華一作羣翅垂口噤心勞勞一作甚勞下愍百鳥在羅網黄雀最小猶難逃願分竹實及螻蟻盡盡音儘一作忍使鴟梟相怒號平聲氏朱鳯行自傷孤棲失志也師曰鳳喻君子公困於荆衡不得其志欲引同志以進澤及下民恐為小人所疾也朱鳳求曹呼引同志也翅垂口噤欲言不敢也百鳥羅網民困誅求也黄雀難逃無一得所也願分螻蟻愛物之意無窮鴟梟怒號欲去小人之為害者樂府飛鵠行吾欲銜汝去口噤不能言朱鶴齡曰劉楨詩鳳凰集南嶽徘徊孤竹根豈不長勤苦羞與黄雀羣公詩似取其意而反之羞羣黄雀者鳯采之髙翔下愍黄雀者鳯徳之廣覆也所食竹賓願分之以及螻蟻而鴟鴞則一聽其怒號此即驅出六合梟鸞分意也詩㫖包藴甚廣黄鶴云為衡州刺史陽濟討臧玠而作以側身求曹為連合三州刺史謬矣追酬故髙蜀州人日見寄并序開文書帙中檢所遺㤀因得故髙常侍適往居在成都時高任蜀州刺史人日相憶見寄詩淚灑行音杭間讀終篇末自枉詩巳十餘年莫記存沒又六七年矣老病懐舊生意可知今海内忘形故人獨漢中王樊作郡王瑀與昭州敬使去聲君超先在愛而不見情見乎辭大厯五年正月二十一日却追酬髙公此作因寄王及敬弟舊唐書昭州樂平郡屬嶺南道以昭岡潭為名自䝉一作枉蜀州人日作不意清詩久零落今晨㪚帙眼忽開一作明迸淚幽吟事如昨首記開帙得詩詩㪚帙問所知謝靈運搜神記獨坐愁苦兩淚迸灑又駱賓王詩迸淚下雙流何遜詩念别猶如昨嗚呼壯士多慷慨合㳫髙明動寥廓歎我悽悽求友篇感君鬱鬱匡時他本作君略此叙蜀州生前向多慷慨素負氣節動寥廓名震天壤求友篇公以詩寄髙匡時畧適嘗䇿永王無成及上疏論三城戍皆是君我二字起下一段辭賈誼旱雲賦遂積聚而合沓兮相紛薄而慷慨楚上寥廓而無天宗詩相彼鳥矣猶求友聲唐太詩提劍鬱匡時錦里春光空爛熳瑶墀侍臣已㝠寞瀟湘水國傍去聲黿鼉鄠音扈杜秋天失鵰鶚此憶蜀州亡後瀟適寄詩在草堂故云錦里後入為常侍故曰侍臣湘公泊潭州鄠杜髙殞長安杜臆鄠杜二縣相連在長安城南適好直言故方之鵰鶚公前詩嘗云蒼隼出風塵列子周宣王牧正有役人梁鴦者能養野禽獸雖虎狼鵰鶚之類無不馴柔者東西南北更誰一作堪論平聲白首扁舟病獨存遥一作猶拱北辰纒冦盗欲傾東海洗乾坤邉塞西羗一作猶最充斥衣冠南渡多崩奔此追酬髙詩而兼慨身世事髙詩東西南北一語公衍為四句以該當時亂離之冦盗指叛將外夷西羌謂羌戎吐蕃衣冠南渡雖用晉元帝渡江事然唐書謂至徳之後中原多故襄鄧百姓兩京衣冠盡投江湖荆南井邑十倍於初亦指實事言矣不東西南北四語本楚辭招魂章法内晉王濬傳兵纒解左傳冦盗充斥晉書時海大亂獨江東差安中國士民避亂者多南渡奔謝靈運詩珢岸屢崩奔此言避亂渉險經山崩水之處也皷瑟至今悲帝子曳裾何處覔王門文章曹植波瀾濶服食劉安徳業尊長笛隣家一作誰能亂愁思去聲昭州詞翰與招魂末寄漢中王及敬使君也皆悲帝子身在湘潭覓王門與王逺隔曹植劉安借帝胃以比之又言已之思蜀州如向秀之思嵇紹今欲得敬使君詩以招蜀州如宋玉之招屈原也此章前三叚各四句後二叚各六句出楚辭使湘靈皷瑟兮令海若舞馮夷作魏志曹植傳言為論下筆成章楊修稱其操筆造若成誦在心借書于手篇古今注淮南子服食求仙遍禮方士樂府淮南王淮南王自言尊向秀思舊賦序鄰人有吹笛者發聲寥亮追思曩昔逰宴之好感音而嘆故作賦云王儉褚淵碑萋萋辭翰與招魂言與之同招魂也洪容齋随筆曰古人酬和詩非若今人為次韻所局也髙詩云愧爾東西南北人杜則云東西南北更堪論適前詩又云草𤣥今已畢此外更何言杜則云草𤣥吾豈敢賦或似相如鐘磬在簴叩之則應徃来反覆有餘味人日寄杜二拾遺附髙適詩短趙注肅宗時適為李輔國所下除太子詹事未幾蜀亂出為彭州刺史又遷蜀州鶴注上元元年人日杜公未有草堂殆是二年人日所寄也人日題詩寄草堂遥憐故人思故鄉栁條弄色不忍見梅花滿枝堪一作空斷腸身在南一作逺蕃無所預心懐百憂復扶又切千慮今年人日空相憶明年此一作人日知何處一卧東山三一作二十春豈知書劍老一作與風塵龍鍾還一作逺忝二千石愧爾東西南北人首二總提次四思故鄉下六憐故人山梅柳人日之景南蕃蜀在西南憂慮長安經亂卧東以謝安比杜二千石髙時為刺史也七八意轉而韻不轉九十韻轉而意不轉杜集多用此法髙詩亦然董勛問禮俗正月七日為人日梁元帝詩故人懷故鄉空燕歌行柳條拂地數千條之蔡琰胡笳不得相隨兮斷腸晉藤並表握戎馬要委南蕃之重詩逢此百憂相史記廣武君曰智者千慮誰能對此空憶晉書謝安髙卧東山蕭子顯詩史記項籍紀學書不成去學劒者劉孝標論亭亭髙竦不雜風塵新序孫卿曰觸之隴種而退耳漢書百官表郡守秦官秩二千石揚雄解嘲起家至二千石人漢昭帝詩愧爾嘉祥記孔子曰丘也東西南北之也杜嘗自言甫也東西南北人送重平聲表姪王砅力制切一作珠評事使去聲南海據舊書李勉傳其為嶺南節度在四年則評事之南海應在次年之春朱注編在五年為是重表葢有兩重表親也實慈水姜氏曰南北朝最重表親盧懐仁撰中表録二十巻髙諒造表親譜録四十巻此風至唐猶存詩楊徳周曰水深至心曰砅即深則厲厲字也我之曾老一作祖姑爾之髙祖母爾祖未顯時歸為尚書婦此詩前後各十九韻前敘王氏淵源後敘評事親誼首四溯兩家重表之由未顯記其前尚書要其後鍾惺曰此志傳序事體入詩奇作起語尤奇舊新書王珪為禮部尚書兼魏王泰師在貞觀十一年注謂十七年者誤十三年珪已卒矣隋朝音潮大業末房杜俱交友長子兩切者來在門荒年自餬口家貧無供給客位但箕箒俄頃羞頗珍一作頗羞珍寂寥人散後入怪鬢髮空吁嗟為之久自陳剪髻鬟市鬻充杯一作沽酒此叙君臣遇合之緣太復齋漫錄房杜舊不與宗相識太宗起兵𤣥齡仗䇿謁軍門乃薦如晦珪則建成亡後始得見召以史傳參考詩為誤也自髙祖起兵至代宗大厯五年共一百六十餘年公祖審言仕武后中宗之世其曾祖姑應生於太宗季年不應生於隋文之代以年數世次考之則杜為珪妻尚疑太平此條記事㫁屬差誤唐書珪母李嘗語珪曰而必貴但不知所與遊者何如人而試與偕來㑹𤣥齡如晦過其家李窺大驚敕具酒食歡盡日喜曰二客公輔才汝貴不疑珪隠居時與房𤣥齡杜如晦善結大業十三年隋亡書左傳餬其口於四方沈約集樆以紆箕箒晉陶侃傳侃早孤貧為縣吏鄱陽孝亷范逵嘗過侃侃時倉卒無以待賓其母乃截髮得雙髮以易酒餚樂飲極歡雖僕従亦過所望及按范逵偶遇故侃母可截髮以供酒食若太原公子房杜並至豈剪髮所能供客乎此特借用恐非實事上云天下亂宜與英俊厚向竊窺數公經綸亦俱有次問最少去聲年虬髯十八九子等成大名皆因此人手下云風雲合龍虎一吟吼願展丈夫雄得辭兒女醜此記夫人先見之明宗上良相識真主建功業只在此數言决之太虬髯恐非十八九嵗所有此亦傳訛也雲上云下云本古詩上言下言十後漢馮異傳今英俊集唐書太宗起義兵時年八王褒傳虎嘯而風生龍興而致雲秦王時在坐真氣驚户牖及乎貞觀去聲初尚平聲書踐台斗夫人常肩輿上上聲殿稱萬夀六宫師柔順法則化妃后至尊均嫂叔盛事垂不朽此記朝廷恩眷之隆始杜臆秦王在座兩語乃上文最少年註脚見馬援傳知帝王自有真也許彦周曰太宗相工之謂其龍鳳之姿天日之表此云真氣驚户牖可謂工而盡矣真氣謂真人氣象庾信詩朱陵真氣來唐書貞觀四年二月珪以黄門侍郎遷侍中參預朝政官洙曰夫人以命婦預朝㑹也鶴注唐命婦之制文武一品國公母妻為國夫人三品以上妻為郡夫人王珪貞觀中為侍中正二品則其妻為郡夫人也唐㑹要命婦謁並不得乗擔子其尊屬年髙特敕賜擔子者不在此例三周禮王后以隂禮教六宫前一後五五者后一宫夫人一宫九嬪一官二十七世婦一宮八十一御妾一宮凡百三十人晉中宫歌金章體柔順率禮蹈謙祗淑鶴注唐因隋制皇后之下有貴妃妃徳妃賢妃記嫂叔不通問鳳雛無凡毛五色非爾曹往者胡作逆乾坤沸嗷嗷吾客左一作在馮音憑翊爾家同遁逃爭奪至徒步塊獨委蓬蒿逗留熱爾腸十里却呼號平聲自下去聲所騎馬右持腰間刀左牽紫逰韁飛走使我髙茍活到今日寸心銘佩牢此評事患難相顧之情鳯雛二句從髙母說至砅身乃全篇轉捩處亂米注馮翊同州也天寳末公避冦至同州杜臆避逃生而捨巳之馬以活四世表叔且前走十里乃退却而呼號之尤為難事王砅髙行固應拈出南史帝謂謝莊曰超宗殊有鳯毛五山海經南禺之山有鳯凰鵷雛又云丹穴之山有鳥色而文名曰鳯非爾曹言鳯種非爾軰而誰為作逆謂禄山陷京刀楚辭塊獨守此無澤兮堂古詩焦仲卿妻左手持尺右手執紱羅鄴中謡青青御路楊白馬紫逰韁蒿髙字指韻或疑句稚不知此正寫真處公方徒步蓬欲行不前忽飛馬髙騎可以脫險故不勝喜幸亂離又聚散宿昔恨滔滔水花笑白首春草隨青袍廷評近要津節制收英髦北驅漢陽傳去聲南汎上上聲瀧鄭音雙舠音刀家聲肯墜地利器當秋毫番鋪官切禺元俱切親賢領籌運神功操大夫出盧宋樊作宗非寳貝休脂膏洞主降户江切接武海胡舶千艘此評事往使南海之事又聚散方遇旋别也白首自謂青袍謂王廷評節制王李並提北驅四句言王砅承上廷評畨禺六句言李勉承上節制賢自漢陽上瀧評事自北而南也李勉乃宗室故曰親前以京兆尹兼御史大夫故曰大夫接武言洞蠻頻降千艘言海估湊集尉古詩青袍似眷草後趙注漢宣帝地節三年初于廷置左右評員四人漢光武省右評惟有左評事唐天寳中緣邊禦冦之地置八節度使得以專制軍節制之名始此朱注節制謂廣南節度使馬漢書乘傳詣洛陽顔注古者以車謂之傳車其後置謂之驛騎水經注武溪水又南入重山謂之瀧中懸湍囘注崩浪震天謂之瀧水瀧水又南出峽謂之瀧口又南經曲江縣東韓昌黎瀧吏詩南行逾六旬始下昌樂瀧家釋名船三百斛曰舠漢太史公書李陵既生降頽其聲家聲承王珪後虞詡曰不逢錯節盤根何以别利器都當秋毫言能應機立斷舊如淳漢書注畨禺尉佗所顔師古曰即今之廣州唐書南海縣即漢畨禺縣地以番山禺山得名開漢書運籌帷幄之中出盧宋言出於其上舊書自元四十年廣府節度使清白者四裴伷先李朝隠宋璟盧奐又曰奐為南海太守南海利兼水陸瓌寳山積劉巨鱗彭杲相繼為太守五府節度皆坐贓死乃授奐任貪吏斂跡人用安之海賦積太巔之寳貝東觀漢記孔奮守姑臧七年治有絶跡或嘲其處脂膏中不能自潤而奮不改其操廣南有溪洞蠻其長曰洞主記堂上接武至舶大船也艘總數舶國史補南國舶外國船也每嵗安南廣州師子國最大梯而上下皆積寳貝有蕃長為主領市船緣劉向曰舶深五十餘肘西域以肘為度我欲就丹砂跋涉覺身勞安能陷糞土有志乗鯨鼇或驂鸞騰天聊樊作不作鶴鳴臯此公有志南海之逰也意丹砂交廣所出不能乗鼇驂鸞但作嗚鶴以吐耳此章四句起六句收前二段各十二句後二段各十六句中段十句相間司馬遷書隠忍茍活函糞土之中别賦駕鶴上漢驂鸞騰天杜詩鶴鳴于九臯聲聞于天臆鳴臯謂贈詩洪邁容齋隨筆曰蔡絛詩話引唐列女傳珪母盧氏識房杜必貴質之此詩則珪母乃杜氏也洞江詩話不特不姓盧乃珪之妻非母也子按唐列女傳元無此事珪傳末只云始隠居時與房𤣥齡杜如晦善三人過其家母李窺之知其必貴蔡說妄云有傳又誤以李為盧皆不足辯但唐髙祖在位日太子建成與秦王不睦以權相傾珪為太子中允說建成曰秦王功葢天下中外歸心殿下但以長年位居東宮無大功以鎮服海内今劉黑闥散亡之餘宜自收之以取功名建成乃請行其後楊文幹之事起髙祖責以兄弟不睦歸罪珪等而流之太宗即位乃召用之一日宴近臣於丹霄殿長孫無忌曰王珪魏徵昔為仇讐不謂今日得同此宴上曰珪徵盡心所事吾故用之然則珪與太宗非素交明矣唐書載李氏事亦采之小說恐未必然而杜公稱其祖姑事不應不實且太宗時宰相别無姓王者真不可曉也葛常之曰詩云爾祖未顯時歸為尚書婦珪嘗為禮部尚書則尚書婦乃珪之妻非珪母也詩又云及乎貞觀初尚書踐台斗夫人嘗肩輿上殿稱萬夀皆謂珪妻也人徒見詩中用剪髻事有同陶母故謂珪母耳審爾豈不與尚書婦句相牴牾哉據今按此詩所載事迹明與唐書紀傳不合蔡氏欲此以為詩史未免信杜太過矣大抵人情好為夸大每有子孫而自誣其祖宗者此詩亦據王氏傳聞之說一時沿訛失考耳鍾惺曰前段不過敘中表戚耳忽具一部開國大掌故自往者以下祇是亂離相依飲食僕馬細故却無端委轉折可尋胸中潦倒筆下淋漓非獨詩法之奇即作一篇極奇文字看亦可申涵光曰此詩似傳似記聲律中有此奇觀更足空人眼界黄生曰送行詩前半篇寛敘一大段似乎頭重但因題中重表姪二字追敘其由且以一婦人具如許眼力塵埃中辨出天子宰相古今所罕特借此詩傳之意中實以此事為主送行之意反輕所以章法如此寥今按此䕫州以後之詩揮灑任意而出之者如寂人散後入怪鬢髮空乃隔句呼應右持腰間刀左牽紫逰韁乃隔聮斜對與秦蜀諸詩謹嚴融洽者固不同也清明鶴注詩言長沙及湘西寺當是大厯五年春在潭州作著涉畧切處繁華一作花矜從正異一作務是日長沙千人萬人出渡頭翠柳艶明眉爭道朱蹄驕齧膝此都好去聲逰湘西寺諸將去聲亦一作遽一作方自軍中至馬援征行在眼前葛强親近同心事此記節日逰人之盛而諷諸將之逍遥者柳映眉指逰女馬齧膝指逰人所謂繁華也宜杜臆亦自軍中至見其不應至也諸將出征在邇正同心戮力乃佚逰如此不以軍國為念矣馬援比大將葛强比部將上曹植詩繁華將茂秋霜瘁之翠梁元帝詩柳葉生眉珠璫搖鬢垂唐太宗柳詩半幾睂開偏霍光傳後兩家奴爭道頌莊子乘駁馬而偏朱蹄注者一蹄偏赤也王褒及至駕齧膝驂乘旦應劭曰馬怒有餘氣常齧膝而行也孟康曰良馬低頭口至膝故曰齧膝張晏曰齧膝乗旦皆良馬名此詩以朱蹄齧膝並言正謂駿馬各爭道也者湘西寺即岳麓道林二寺史記髙帝紀諸將過此多魏志曹真每征行與士卒同勞苦葛强山簡愛將金鐙都磴切下去聲山紅日蔡云一作粉非晚牙檣捩音列柁青樓逺古時喪去聲亂皆可知人世悲歡暫相遣弟姪雖存不得書干戈未息苦離一作難居逢迎少去聲壯非吾道况乃今朝更祓除此記逰人晚歸之景而慨身世之亂離也可逰者從寺下山向青樓而逺去因歎古來䘮亂其故知皆因人臣以國事為戯耳若人世歡娛暫遣悲愁一過而凄凉如故矣上句應諸將下句應繁華今弟姪飄零干戈阻絶此皆䘮亂所致而老非少壯時際祓除又未免悲歡錯出矣章少壯指當日同逰之輩祓除不祥非可行樂也此二段各八句鐙馬鞁踏廣韻鞍鐙也師檣在舟前柁在舟後埤蒼云檣帆柱也檣尾銳如牙氏曰轉施曰捩青樓乃祓除之處齊書武帝興光樓上施青漆謂之青樓古樂府大路起青樓已周禮女巫掌嵗時祓除盥浴鄭注如今三月三日上往水上之類韓詩外傳鄭國上巳於溱洧二水上祓除不祥晉書武帝嘗問摯虞三日曲水之義虞對曰漢章帝時平原徐肇以三月初生三女至三日俱亡村人為怪乃招携之水濱洗祓遂因水以泛觴其義起此帝曰必如所談便非好事晳進曰虞小臣不足以知昔周公城洛邑因流水以汎酒故逸詩云羽觴隨波又秦昭王以三日置酒河曲見金人奉水心之劍曰令君制有西夏乃霸諸侯因此立為曲水二漢相緣皆為盛集杜臆此詩主摯虞之說而不取束晳趙曰以唐史氣朔考之大厯五年三月三日清明則清明正值上巳故有今朝是祓除句風雨看舟前落花戲為新句鶴注公在潭只船居觀蘇渙肩輿忽訪老夫舟檝語可驗其看舟前落花乃是大厯五年潭州作江上人家桃樹一作李枝春寒郭作風細雨出疎籬影遭碧水潛勾引風妬紅花却倒吹此詩依韻分為三段首詠風雨落花杜臆春寒細雨出疎籬便是畫景落常理薄命篇艷花勾引吹花困懶一作癲傍去聲舟楫水光風力俱相怯赤憎輕薄遮之奢切入一作人懐珍重分明不來接一作折輕次看舟前落花不傍舟委落有似憎平日之薄遮懷而珍重肯近人者此摹瀉困懶情態也當公詩曾以留連屬細草悵望屬殘花知赤憎珍重亦就花說江淹詩階前水光裂莊子風之積也不厚則其負大翼也無力淮南子風力壯猛鶴注公嘗云生憎柳絮白於綿赤憎猶云生憎皆方言也薛梁武帝春歌階上香入懐宣傳得為公分明之濕久飛遲半欲一作日髙縈沙惹草細於毛蜜蜂蝴蝶生情性一作住偷眼蜻蜓避伯勞末對落花而有感疎蜂蝶素戀花香今見墮於沙草則性情頓覺生蜻蜓偶過花間有似偷眼旁觀者一遇伯勞却又倉卒避去以見花當零落之餘終為物情所棄此舉目前所見而詞寓感慨此章三段各四句漢生情性乃生熟之生謝朓詩逺樹曖芊芊生烟紛漢謝靈運撰征賦披宿莽以迷徑覩生烟而知墟此可互證好爾雅鵙伯勞也物理論伯勞惡鳥故衆鳥畏之性獨杜臆伯勞即鶗鳺鳴則衆芳歇王嗣奭曰此詩摸寫物情一一從舟中靜看得之都是虚景都是設懋都是巧語本大家所不屑為者故云戲為新句而纖濃綺麗遂為後來詞曲之祖幻按此詩戲為新句皆從無情中看出有情詩思之當與昌黎毛穎傳叅觀盧世㴶曰句不新則詩朽句徒新則詩亡茍非有日新之學問日新之識見而惟務新其皮膚反致面目青黄此又與於陳腐之甚者題中下一戲字有無限防閑在楊徳周曰杜云石出倒聽楓葉下包何云波影倒江風杜云黄門飛鞚不動塵而東坡云走馬來看不動塵杜云影遭碧水潛勾引而孟郊云南浦花飛亞水紅得諸家闡明益見杜詩之妙奉贈蕭十二使去聲君鶴注當是大厯五年春作詩云迴雁五湖春可見玩詩意蕭葢先為郎官後出為縣令在嚴武幕中復為郎官後在湖南又為刺史矣昔在嚴公幕俱為蜀使去聲臣艱危參大府前後間去聲清塵起草嗚先路乗槎動要津王鳬聊暫出蕭雉只相馴首憶幕府往事起嚴武兩鎭蜀必蕭先在幕而公繼入是前後相間也草應幕府乗槎應使臣王鳬用縣令事蕭雉用郎官事蕭葢先為郎而後貶為令也所朱注次公引唐志凡詔令皆舎人起草固是然此詩云起草則以郎官言之於盧諶贈劉琨詩自奉清塵今五載終始任平聲安義荒蕪孟母隣聨翩匍匐禮意氣死生親張老存家事嵇康有故人食恩慙鹵莽鏤骨抱酸辛此記蕭君古誼聨任安比使君孟母比嚴母翩匍匐謂經紀两喪意氣死生謂存亡一視張老之于趙武嵇康之託山濤稱蕭能保家而恤孤食恩二句公自謙不如也名原注嚴公既沒老母在堂使君温凊之間甘脆之禮數若巳之庭闈馬及太夫人頃逝喪事又首諸孫主典撫孤之情不减骨肉則膠漆之契可知矣故漢書霍去病為驃騎將軍禄秩與大將軍衛青等青人門下多去事去病輒得官爵唯任安不去朗詩凡民有喪匍匐救之蔡邕陳留太守碑意氣精翟公云一死一生乃見女情張老晉大夫張孟晉語趙文子冠見張老而語之徳左傳楚子問趙孟曰范武子之何如對曰夫子之家事治辛嵇康故人注見本巻前阮嗣宗詩悽愴抱酸鏤骨猶言刺骨巢許山林志䕫龍廊廟珍鵬圖仍矯翼熊軾且移輪磊落衣冠地蒼茫土木身記彼此出處之殊巢䕫龍謂蕭能濟世起下鸚圖熊軾許謂已終隠遯起下蒼茫土木曰書䕫典樂龍納言南莊子北溟有魚化而為鳥其名鸚海運則將徙於溟趙注蕭為大守故憑熊軾以移輪晉書嵇康土木形骸塤箎鳴自合金石瑩去聲逾新重平聲憶羅江外同遊錦水濱結歡隨過隙懐舊益霑巾記彼此文契之久起塤箎言聲氣初投起下羅江錦水金石言信義益堅下結歡懐舊詩伯氏吹塤仲氏吹箎廣絶交論志婉戀於塤箎綿阮籍詩如何金石友一旦更離傷舊書羅江縣屬州任昉詩結歡三十載生死一交情懐莊子人生一世如白駒過隙潘岳舊賦涕泣流而霑巾曠絶含香舍稽留伏枕辰停驂雙闕早迴雁五湖春不達長子兩切卿病從來原憲貧監平聲河受貸粟一起轍中鱗末乃自叙有望於蕭也停驂尚早承曠絶回雁當春承稽留四句寫出貧病之狀使君倘能貸粟窮途庶鱗得以頓起也不達謂蕭君未之知耳註家謂因不顯達而致病對下句不合此章前後三段各八句中二段各六句含香伏枕注皆別見河謝朓詩停驂我悵望而莊子莊周家貧往貸粟於監侯曰昨周來有中道呼者顧視車轍中有鮒魚馬周問之曰我東海之波臣也君豈有升斗之水而活我哉王嗣奭曰此詩以排律叙事融化古今條達流利所謂不煩繩削而自合者奉送二十三舅録事崔偉之攝柳丑森切州鶴注當是大厯五年春作違邵注唐制諸州設録事參軍掌正失蒞符印郴州今𨽻湖廣道賢良歸盛族吾舅盡知名徐庶髙交當作交髙友劉牢出外甥泥塗豈珠玉環堵但柴荆衰老悲人世驅馳厭甲兵此稱舅氏而兼自傷離盡知名崔族多才出外甥感恩在舅下四歎窮老亂陳訴甚悲周禮以三徳教國子二曰友行以尊賢良徳舊注徐庶字元直其所交者諸葛孔明龎士元司馬操諸公蜀志徐庶與崔州平友善王晉書桓𤣥曰何無忌劉牢之之甥酷似其舅形世說武子衛玠之舅見玠輒歎曰珠玉在側覺我穢堵記儒有環之室氣春江上别淚血渭陽情丹一作舟鷁排風影林烏反哺聲永嘉多北至勾漏且南征必見公侯復終聞盗賊平此因送别而作慰辭母江上指相江排風謂風帆烏反哺崔有也北至南征記其行迹公侯必復言當終貴盗賊指嶺南之冦舊注誤云臧玠之亂春時玠尚未反也謝朓詩江上徒離憂東晳補亡詩嗷嗷林烏受哺於子葛晉書永嘉之亂元帝渡江衣冠多自北至勾漏引洪相方楚辭洎吾南征必左傳公侯之子孫復其始郴州頗凉冷橘井尚凄清從事一作何蠻貊居官志在行此徃攝郴州勉其盡職也母逺注橘井不特切郴州兼切奉同行之意山此章前二段各八句後段四句收井神仙傳蘇耽於下鑿井種橘救鄉里之疾病者橘在郴州城東蘇耽之故宅今為觀希曰井水每酌則有金星云丹影如是嘗在郴州目覩其實論語雖蠻貊之邦行矣尉左傳當官而行何强之有通鑑晉司𨽻校李喜元志在公當官而行可謂邦之司直送魏二十四司直充嶺南掌選崔郎中判官兼寄韋韶州鶴注前韋迢湘潭寄杜員外詩云湘潭一葉黄葢大厯四年秋矣此詩云為報韶州牧新詩時寄將葢是五年春作得唐書高宗上元三年以嶺南五管黔中都督府任工人而官或非才乃選郎中御史為選補使謂之南選唐㑹要開元八年八月移嶺南選補使於桂州選去聲曹分五嶺使去聲者厯三湘才美膺推薦君行佐紀綱佳聲斯一作期共樊作不逺雅節在周防明白山濤鑒嫌疑陸賈裝魏往嶺南稱其才品山選曹使者謂崔郎中才美紀綱謂魏判官濤鑒承佳聲頌崔也陸賈裝豕雅節規魏也前北史周宇文深傳深在選曹頗有時譽五嶺注見寰宇記湘潭湘鄉湘源是為三湘顔延之詩三湘淪洞庭山左傳紀綱之僕甄杜預左傳序􅊶周身之防晉書濤典選十餘年拔人物各為題目時稱山公啟事佗記决嫌疑裝漢書髙祖使陸賈賜尉佗印為南越王賜賈槖中直千金他送亦千金故人湖外少春日嶺南長憑報韶州牧新詩昨寄一作夜將此送魏而兼寄韋也詩此章上八句下四句將送也逺于將之送趙十七明府之縣詩有南翁句故黄鶴編在大厯五年湖南詩内連城為寳重茂宰得才新山雉迎舟楫江花報邑人論平聲交翻恨晚卧病却愁春惠愛南翁恱餘波及老身上四送趙之縣下四叙述交情是史記趙惠王得楚和氏璧秦昭王請以十五城易之重在寳也此借趙事以方趙令盧諶詩連城既偽往荆玉亦虚還恭謝朓和伏武昌詩雄圖悵若兹茂宰深遐睠漢魯為中牟令童子化之雉有雛不忍捕朱晉潘岳為河陽令植桃李花人號曰河陽一縣花注趙必官衡潭間故有落句同豆盧峯貽主客李員外賢子棐知字韻舊次在大厯五年潭州作逺注豆盧峯有貽李員外子詩公和之而作同和也唐書世系表豆盧姓慕容氏北人謂歸義為豆盧因賜為氏居昌黎棘城朝唐志主客郎中員外郎各一人掌二王後諸藩見之事屬禮部煉一作鍊金歐冶子噴玉大宛平聲兒符彩髙無敵聰明達所為夢蘭他日應折桂早年知爛熳通經術光芒刷羽儀此稱美員外父子智鍊金噴玉唯員外能有此子符彩聰明言棐負才夢蘭折桂言生質不凡經術羽儀言學堪用世鍊吳越春秋干將與歐冶子採五山之精合六金之英而為劍杜定功曰穆天子東遊黄澤使官樂謡曰黄之澤其馬噴王皇人壽榖歕噴同燭大宛兒大宛馬駒即汗血馬也曹植七啟符采照符采猶云光彩左思蜀都賦符采彪炳傅𤣥輿馬賦符采横發左傳鄭文公有賤妾曰燕姞夢天使與已蘭既而文公見之與之蘭而御之辭曰妾不才幸而有子將不信敢徵蘭乎公曰諾生穆公名之曰籣晉郗詵學博多才武帝問曰郷才何如對曰猶桂林一枝崑山片玉沈約詩刷羽同揺漾易鴻漸于陸其羽可用為儀吉謝庭瞻不逺潘省㑹于斯唱和去聲將雛曲田翁號鹿皮此結出和詩賓主四人俱見而吳論謝庭指李員外潘省指豆盧家倡和峯作詩公和之將雛謂員外携子而來鹿皮公自比遯世老人見此章上八句下四句玉樹生於庭除引謝𤣥語詳二巻潘岳秋興賦序余以太尉掾寓直於散騎之省梁晉書樂志吳歌雜曲一名鳯將雛朱注此曲自漢至有歌今不傳鹿皮翁注見二十巻歸雁二首鶴注當是大厯五年潭州作萬里衡陽雁今年又北歸雙雙瞻客上上聲一一背音佩人飛雲裏相呼疾沙邊自宿稀繫音計書元俗本作無浪語愁寂一作絶故山薇首章見歸雁而切故鄉之思而衡雁又歸在潭兩春矣雁去既不能留繫書又不可得所以有故山之慨回黄希曰公在南而雁北歸故曰背人蔡曰衡陽有雁峯雁至此不過遇春而回應㻛詩言我塞門來將就衡陽棲止㑹稽典録虞國少有孝行為日南太守嘗有雙雁宿聽上每出行縣輒飛逐車鳬江淹横吹賦河中之雁一一而學飛死李少卿詩雙相背飛顧注蘇武傳匈奴詐言武常惠教漢使者詭言漢天子射雁上林得武帛書乃歸武則雁足繫書後人承訛襲謬耳謝靈運詩故山日巳逺風波豈還時欲雪違胡地先花别楚雲却過清渭影髙起洞庭羣塞北春隂暮江南日色熏從杜臆舊作曛傷弓流落羽行户剛切斷不堪聞次章傷歸雁而興飄泊之感來違胡地去秋雁來別楚雲今春雁去别清渭時所經起洞庭去時所厯塞北江南承上起下言當此春日而猶有傷弓落羽行斷聲哀者皆窮途旅客所不忍聞也謝靈運詩季秋邊朔苦旅雁違霜雪而月令八九月鴻雁來正月候雁北更嬴引弓虚發下雁出國䇿詳見十三巻史引虚弓而雁落人問之曰此雁傷弓也江南逢李龜年朱注題曰江南必潭州作也舊編在大厯三年荆南詩内非是雲溪友議明皇幸岷山百官皆竄辱李龜年奔泊江潭杜甫以詩贈之岐王宅裏尋常見崔九堂前幾度聞正是友議作值江南好風景落花時節又逢君此詩撫今思昔世境之離亂人情之聚散皆寓於其中明皇雜録天寳中上命官中女子數百人為梨園弟子皆居宜春院北上案曉音律時有馬仙期李龜年賀懷智皆洞知律度安禄山亦獻白玉簫管數百事皆陳於梨園自是音響殆不類人間而龜年特承恩遇其後流落江南每遇良辰勝景常為人歌數闋座上聞之莫不掩泣罷酒蔡曰雲溪友議李龜年奔江潭曾於湖南採訪使筵上唱紅豆生南國秋來發幾枝贈公多採摘此物最相思又云清風明月苦相思蕩子從戎十載餘征人去日殷懃囑歸雁來時數附書此詞皆王維所作也元舊唐書岐王範睿宗子好學工書雅愛文章之士開十四年病薨弟原注崔九即殿中監崔滌中書令湜之弟舊書崔湜滌與𤣥宗歎密用為秘書監出入禁中後賜名澄開元十四年卒景世說過江諸人新亭飲宴周顗中座而歎曰風不殊正自有山河之異黄鶴云開元十四年公止十五嵗其時未有梨園弟子公見李龜年必在天寳十載後詩云岐王當指嗣岐王珍據此則所云崔九堂前者亦當指崔氏舊堂耳不然岐王崔九並卒於開元十四年安得與龜年同逰耶黄生曰此詩輿劍器行同意今昔盛衰之感言外黯然欲絶見風韻於行間寓感慨於字裏即使龍標供奉操筆亦無以過乃知公於此體非不能為正聲直不屑耳有目公七言絶句為别調者亦可持此解嘲矣小寒食舟中作鶴注公在潭率舟居此當是大厯五年作杜臆小寒食注謂寒食前一日誤葢寒食次日也嵗時記冬至後一百五日為寒食據厯在清明前二日廣義注禁火三日謂至後一百四日五日六日乃知小寒食是六日總在三日内故云佳辰次日清明始有新火故食猶寒禁火則酒亦寒故云强飲詩意甚明舊注引小至為證不知小至亦至之次日添線飛灰舒柳放梅皆至後景物也佳辰强豈兩切飲一作飯食猶寒隠去聲几蕭條戴鶡冠春水船如天上坐老年花似霧中看平聲娟娟戲蝶過平聲閒一作開非幔片片輕鷗下去聲急湍雲白山青萬餘里愁看平聲直北是長安上四寒食舟景下四即景感懐盈朱瀚曰領聮分承上二時逢寒食故春水江老景蕭條故看花目暗須於了無蹊徑處尋其草蛇灰線之妙腹聨興起下二戲蝶輕鷗往來自在而雲山萬里空望長安所以對景而生愁也首尾又暗相照應與幾年逢熟食萬里逼清明參看篇中看字兩見亦無他字可代叔莊子南郭子綦隠几而坐虎趙注鶡冠隠者之冠袁真隠傳有鶡冠子舊注引賁武騎之鶡冠誤矣舟孫權與曹操牋春水方生公宜速去花陳釋惠標詩如空裏泛人似鏡中行沈約詩落雰似霧何遜詩新月霧中生蝶鮑照詩娟娟似蛾睂注娟娟明媚貎梁元帝詩戲時飄粉五六以閒對急本不可易朱瀚曰公父名閑故注家改閑為開畢竟未妥閑閒同音異字何必避忌大學閒居孟子閒暇曲禮少閒與閑無犯摯枯樹賦片片真花於鮑照野鵜賦翔海澤之輕鷗虞觀魚賦忽浪達急湍蔡琰胡笳雲山萬重兮歸路遐古詩相去萬餘里黄魯直曰船如天上坐人似鏡中行船如天上坐魚似鏡中懸此沈雲卿詩也雲郷得意於此故屢用之老杜春水船如天上坐乃祖述佺期語繼之以老年花似霧中看葢觸類而長之也苕溪胡元任曰沈雲卿之詩原於王逸少鏡湖詩所謂山隂路上行如在鏡中遊之句然李太白入青溪山詩云人行明鏡中鳥度屏風裏雖有所襲語益工也句林時對曰春水二句非襲用前人句也此用前人而以巳意損益之也又有全用前人一句而以已意貼之者如沈雲卿詩雲白山青千萬里幾時重謁聖明君杜云雲白山青萬餘里愁看直北是長安是也范元實謂老杜不免蹈襲斯言過矣燕子來舟中作鶴注大厯四年正月公自岳陽之潭州五年春猶在潭州時率舟居故於舟中兩見燕子曰杜臆出峽巳三春而客湖南則兩春也宋瀚孤舟漂泊惟有燕來命題感慨湖南為客動經春燕子銜泥兩度新舊入故園嘗一作常識主如今社日逺看平聲人可憐處處巢居一作君室何異飄飄託此身暫語船檣還起去穿花貼范德機云善本作貼一作落水益霑巾上四客舟逢燕下四對燕自傷室顧注識主看人世不憐公而燕獨相憐巢託身公方憐燕而旋復自憐矣傷暫語還去燕若辭人穿花貼水仍不忍别對此霑淚人情之不如也古詩思為雙飛燕銜泥巢君室拈文曷雜録燕以春社來秋社去謂之社燕朱瀚曰一新字便生下舊今兩字君室雖有所本但此處當從居室為順傅成詩長驅及居室沈炯詩處處此傷情陸機詩苦哉逺征人飄飄窮四遐萬何遜詩燕戲還簷際花飛落桃前楊里詩燕子無端貼水飛本於杜句盧世㴶曰此子美晩嵗客湖南時作七言律詩以此收巻五十六字内比物連類似複似繁茫茫有身世無窮之感却人一字不說出讀之但覺滿紙是淚世之相後也一千嵗矣而其詩能動人如此朱瀚曰毛詩燕燕于飛下上其音瞻望弗及佇立以泣為送别而作也兹則對燕傷心形影相弔至於泣下霑巾又何其蒼茫厯亂耶篇中曰銜曰巢曰起曰去俱就燕言曰識曰看曰語曰貼皆與自巳相闗分合錯綜無不匠心入妙落盧元昌曰公詠雁則云傷弓落羽詠燕則云穿花水流落飄零之感俱情見乎詞贈韋七贊善詩云洞庭春色當是大厯五年在潭州作鶴注唐東宫官有左右贊善大夫各五人掌傳令諷過失贊禮儀韋贊善必韋見素之後見素位至宰相贈司空故詩云爾家最近魁三象見素與公皆京兆人故又云鄉里衣冠不乏賢若韋思謙父子乃鄭州人鄉里衣冠不乏賢杜陵韋曲未央前爾家最近魁三象時論同歸一作因侵尺五天北走闗山一作河開雨雪南遊花柳塞悉則切雲一作風煙洞庭春色悲公子蝦呉作鮭菜忘歸范蠡一作萬里船上四敘韋杜家世下則送韋而自慨也京魁三象韋世為三公尺五天杜同在帝衣冠舊契如此今南北去留不同故臨别傷心悲公子韋北還而不得見范蠡船公在南而不得歸也用開塞二字景象便有慘舒之别至後漢郭泰傳林宗名震京師後歸鄉里衣冠諸儒送河上朱瀚曰唐宰相世系表杜氏宰相十一人如晦淹元穎審權讓能黄裳佑悰正倫鴻漸暹韋氏宰相十四人保衡𢎞敏方質貫之處厚待價巨源見素溫執誼思謙嗣立貽範昭度餘見史傳者不具載可見其盛洙曰漢未央殿基在長安去原注斗魁下兩兩相比為三台海俚語曰城南韋杜天尺五蕪城賦南馳蒼梧漲北走紫塞雁門演陳子昂詩雨雪闗山啼思薛道衡詩城闕生雲烟卿義春色指花柳楚辭公子兮未敢言馬永懶真子曰嘗見浙人呼海錯為蝦菜每食不可缺公詩風俗當園蔬即此意也杜預水災疏當食魚菜蝦蜯述異記洞庭湖中有釣舟昔范蠡乘扁舟至此遇風釣於湖上刻石記焉有一陂陂有范蠡魚奉酬冦十侍御錫見寄四韻復寄冦鶴注詩云故泊洞庭船當是大厯五年潭州作其云春深把臂前葢指去年之春往别郇瑕地于今四十年來簪御府筆故泊洞庭船詩憶傷心處春深把臂前南瞻按百越黄帽待君偏上四散而復聚喜洞庭相見下四聚而復散傷百越逺行指冦君所寄者黄帽指舟人謂相候於水邊也詩憶顧注郇瑕晉地在平陽府猗氏縣詩云郇伯勞之葢其國也魏畧殿中侍御史簪白筆側陛而坐帝問左右此何官辛毗曰此謂御史舊時簪筆以奏不法今直備位但珥筆耳漢書注簪筆者插筆於首邵注御史所居之署謂之御史府金楚辭目極千里傷心處今廣絶交論自昔把臂之英蘭之友漢百越地即廣東廣西刺趙曰漢書鄧通以擢船人為黄頭郎注云土勝水故船之人皆著黄帽顧氏以黄帽為公自稱引前發劉郎浦詩黄帽青鞋歸去來為證謂待其再至也今按公在湖南急於北歸豈能久留以待其再至黄常明詩話南方人謂水為黄帽謂雲為砲車非遐征逺涉不能知也此又一說朱鶴齡曰公哭韋之晉詩云悽愴郇瑕邑差池弱冠年此詩云往别郇瑕地于今四十年則公十八九嵗時嘗至晉州而年譜俱失書黄鶴謂公適郇瑕在逰齊趙時大謬入衡州鶴注大厯四年春公自岳陽至潭州如衡州以畏熱復歸潭五年夏臧玠兵亂故再入衡州攝盧注公避亂入衡且欲由衡過郴以舅氐崔偉郴州也舊書大厯四年七月以澧州刺史崔瓘為潭州刺史湖南都團練觀察使五年四月瓘為兵馬使臧玠所殺據潭為亂湖南將王國良因之而反兵革自久逺興衰看帝王漢儀甚照耀胡馬何猖狂老將去聲一失律清邊生戰場君臣忍瑕垢河岳空金湯重鎮如割據經權絶紀綱軍州體不一寛猛性所將此嘆天寳亂後叛將接踵儀興衰之運亦視帝王舉動何如耳此呼起下二句漢言唐法胡馬言安史失律謂潼闗不守清邊謂四方俱擾忍瑕垢謂主憂臣辱空金湯謂兩京俱陷重鎮指河北叛將經權慨制御無術體不一各自為政性所將不禀朝命也儀軍州大州之地必有統軍漢光武紀復見漢官威易師卦失律凶左傳瑾瑜匿瑕國君含垢國䇿權輕於鴻毛嗟彼苦節士素於圓鑿方寡妻從為郡兀者安堵一作短牆凋弊惜邦本哀矜存事常旌麾非其任府庫實過防恕刋作怒巳獨在此多憂增内傷偏禆限酒肉卒伍單衣裳元惡迷是似聚謀一作諜洩康莊竟流帳下血大降湖南殃烈火發中夜一作中夜發髙烟燋上蒼至今分粟帛殺氣吹沅湘福善理顛倒明徵天莽茫此慨崔瓘之賢死於兵亂崔上十二記崔瓘下十句刺臧玠趙注苦節指元惡指臧圓鑿方言其知經而不知權寡妻四句見崔能愛民旌麾六句言不能恤軍寡妻從郡謂瓘無姬妾之好兀者安堵能使殘疾者得所此言其約已裕民以防府庫謂吝賜予恕巳而不量人致將卒洶洶故崔此為憂述是似借缺餉以感衆聽洩康莊洩憤於衢路也顛倒謂崔不應死莽茫謂玠不應存舊唐書瓘以士行聞蒞職清謹遷潭州刺史政在簡肅恭守禮法將吏自經時艱久不奉法多不便之五年四月㑹月給糧儲兵馬使臧玠與判官違奚覯忿爭覯曰今幸無事玠曰有事何逃厲色而去是夜玠遂搆亂犯州城以殺覯為名瓘遑遽走逢玠兵至遂遇害其易節卦苦節不可貞自楚辭圓鑿而方柄兮吾固知鉏鋙而難入趙注崔為郡之後寡婦亦得其所如兀足者安於堵牆之下不復驚動也此另一解按寡妻有兩說詩刑于寡妻此在位之妻潘岳詩夫行妻寡此民間寡婦如莊子王駘兀者也兀刖足漢髙帝紀史民皆安堵故書民惟邦本哀矜見論語爾易弗過防之康三略良將之統軍也恕己而治人雅五達謂之六達謂之莊九歌令沅湘兮無波書劉峻瓣命論福善禍淫徒虚語耳聖有謨訓明徵定保銷魂避飛鏑累上聲足穿豺狼隠忍枳棘刺遷延胝張尼切趼吉典切瘡逺歸兒侍側猶乳女在旁久客幸脫免暮年慙激昂蕭條向水陸汩沒隨魚商報主身巳老入朝音潮病見妨悠悠委薄俗鬱鬱回剛腸參錯走洲渚春容轉林篁片帆左一作在郴丑林切岸通郭前衡陽華表雲鳥陣蔡作陣舊作埤郭弭切名園花草香旗亭壯邑屋烽櫓蟠杜田作卧城隍此敘倉卒避亂再入衡州也陽上十句脫亂軍而入舟次下十二阻北歸而往衡杜臆逃難而兼携妻孥尤見其苦而以得免為幸遙曰慙激昻恨不討賊曰囘剛腸含憤而行華表以下望衡州之風景人民甲兵城郭也郴岸衡陽二句又㐲下兩段棘漢書累足脅息翹司馬遷傳隠忍茍活邱陵歌枳充路張衡賦遥遷延䠥􅍷蹁踡王章傳今疾病困阨不自激昻謝宋之問詩漁商汗成雨嵇康絶交書剛腸疾惡靈運詩臨圻阻參錯衡九城志郴州西北至衡州界一百三十七里則郴在之東南故云左郴岸唐書衡州倚郭為衡陽縣說文亭郵表徐曰表雙立為桓今郵亭立木交於其端或謂之華表朱注韻㑹埤増也厚也於雲鳥難通公詩共說總戎雲鳥陣作陣字是言華表之旁皆列雲鳥之陣西京賦旗亭五里俯察百隧注旗亭市樓沈佺期詩邑屋遺民在逺注櫓城上守望樓中有古刺史盛才冠去聲巖廊扶顛待柱石獨坐飛風霜昨者間去聲瓊樹髙談隨羽觴無論再繾綣已是安蒼黄劇孟七國畏馬卿四賦良門闌蘇生在勇銳白起强問罪富形勢覬歌懸否音鄙臧氛埃期必掃蚊蚋焉於䖍切能當此記衡州刺史而并及蘇涣喜禦冦得人也上四敘陽濟才望昨者四句敘到衡惰事劇孟四句敘蘇渙才幹下四欲連兵以討賊朱注陽濟為衡州刺史兼御史中丞故以獨坐稱之次公謂崔侍御潩者非弩閒瓊樹公與刺史閒坐也蘇渙少喜剽盗善用白巴蜀號為白跖故以劇孟白起比之又公稱其詩云再聞誦新作突過黄初時故以馬卿四賦比之舊注以劇馬孟卿比刺史非也陽濟身為重臣可云劇孟乎能時涣亦自潭州奔衡公望當事收而用之及陽濟不用故又走交廣而罹罪耳刺朱注唐書時澧州刺史楊子琳道州刺史裴虬衡州史陽濟各出兵討玠故曰問罪富形勢楊慎曰問罪富形勢凱歌懸否臧二語當一部兵志繁漢武帝制曰舜遊巖廊之上文穎注殿下小屋也演録舜遊巖廊李試義訓曰屋垂謂之宇宇下謂之廡步檐謂之廊峻廊謂之巖廊漢霍光傳將軍為國柱石師古曰柱者梁下之柱石承柱之礎言大臣負國重任如屋之柱及石也光武改御史長史復為中丞與尚書令司𨽻校尉朝位皆專席而坐京師號三獨坐饑趙注風霜御史之任古詩安得瓊樹枝以解長渇孔融詩髙談滿四座波東晳傳周公成洛邑因流水泛酒故逸詩云羽觴隨余注羽觴之輕如鳥羽之飛也得漢書劇孟以俠顯七國反時條候乘傳東將至河南之隠若一敵國司馬相如傳載子虚上林哀二世及大人四賦用史記張儀願為門闌之厮為史記白起者都人也善兵事秦昭王攻楚拔郢遷武安君坑趙降卒四十萬人凶管子形勢器械具四者備治矣易師出以律否臧此言臧否懸絶故知能奏凱也橘一作繘井舊地宅仙山引舟航此行怨一作厭暑雨厥土聞清凉諸舅剖符近開緘書札光頻繁黄作蘋蘩命屢及磊落字百行户杠切江總外家養謝安乘興去聲長下流匪珠玉擇木羞鸞凰我師嵇叔夜世賢張子房原注彼掾張勸柴荆寄樂音洛土鵬路觀翺翔此思郴州舅氏而并及張勸欲往依親友也上四想郴州風土諸舅四句謂崔偉見招江總四句感崔而傷巳末四則兼美張崔厥土指郴州剖符近崔攝州也外家養感舅徳也乘興長將赴郴也下流謂身居卑賤擇木愧不能見幾嵇叔夜自言疎放張子房此勸多才路翺翔崔張將有事功矣再逺注末句舊指衡州守非是衡州守前段巳結不應言此詩是五排亦似五古公集中每有此種葢巳倣齊梁人體也六此章首段十二句中二段各二十二句後二段各十句後漢地志注郴縣南數里有馬嶺山山有仙人蘇耽壇元和郡國志馬嶺山在縣東北五里蘇耽舊宅在郴州東半里餘迹猶存事書暑雨而怨咨蔡詩以速諸舅公有送二十三舅録偉攝郴州詩邕表牧守宣藩剖符數郡氏庾信詩故人倘書札侯陳書江總七嵗而孤依於外聰敏有至性舅呉平蕭勵名重當時尤所鍾愛晉書謝安寓居㑹稽出則漁弋山水入則言詠屬文無處世意司馬遷傳貧下未易居下流多謗議楚辭鸞凰孔鳯中晉書嵇康性懶疎放有不堪者七思通鑑德宗建中以張勸為陜虢節度使王逸九鷦鵬開路兮往上林賦翺翔來許彦昭曰杜詩悠悠委薄俗鬱鬱囘剛腸此語甚悲昔蒯通讀樂毅傳而涕泣後之人亦當有味此而泣下者逃難末云涕盡湘江岸當是避臧玠之亂而作後漢劉平傳奔走逃難五十白頭翁南北逃世難去聲疎布纒枯骨奔走苦不暖叶去聲節此憶從前之難花杜臆上元二年公年五十時東川度使叚子璋反敬定斬之兵不戢而大掠公率妻子以逃始則自京逃蜀既而在蜀人逃故曰南北逃世難巳衰病方入四海一塗炭乾坤萬里内莫見容身畔妻孥復扶又切隨我回首共悲歎此記目前之難亂大厯五年公年五十九臧玠殺崔壦據州為此暮年衰病又挈妻子而逃也曰四海曰萬里見隨地皆亂矣回首悲歎起下故國鄰里故國莽邱墟鄰里各分散歸路從此迷涕盡湘江岸此為無家可歸而嘆也六此章首尾各四句中間句室班彪北征賦舊滅以邱墟兮白馬朱注編在大厯五年為臧玠之亂而作也白馬東北來空鞍貫雙箭可憐馬上郎意氣今誰見近時主將去聲戮中夜傷一作商於戰喪去聲亂死多門嗚呼淚如霰此為潭州之亂死於戰鬭者記其事以哀之將馬帶箭而來則馬上者見害矣蔡興宗曰主謂崔瓘時為臧玠所殺也死喪亂死多門一語極慘或死於冦賊或死於官兵或於賦役或死於饑餒或死於奔竄流離或死於寒暑暴露唯身厯患難始知其情狀楚辭九歌涕淫淫其如霰黄鶴曰商於即張儀欺楚之地唐為商州上洛郡史云大厯三年三月商州兵馬使劉洽殺防禦使殷仲卿此為仲卿而作商朱鶴齡云鶴說似有據但三年春公自峽之江陵於在江陵西北不當云白馬東北來考九域志衡州北至潭州三百九十里公自潭如衡則所見之白馬為自東北來明矣臧玠與違奚覯忿爭是夜以兵殺瓘所謂中夜傷於戰也夢弼次公皆主此說舟中苦熱遣懐奉呈陽中丞通簡臺省諸公鶴注此亦避亂之衡州時作兼中丞即陽濟時為衡州刺史臺省諸公官裴虬楊子琳李勉媿為湖外客看此戎馬亂中夜混黎甿脫身亦奔竄平生方寸心反當從正異舊作掌帳下難去聲嗚呼殺賢良不叱白刃散吾非丈夫一作人特沒齒埋冰炭此潭州逃難而為憤亂之詞湖外客衡在洞庭之外戎馬亂指臧玠之兵方寸心謂疾惡之念帳下難禍起於部將賢良指崔瓘冰戾喻不平之氣殺蜀志徐庶曰方寸亂矣刃後漢書韓遂為其帳下所相如喻巴蜀檄觸白冒流矢漢書蕭望之傳注沒齒終身也炭淮南子膠漆相賊冰炭相息何承天詩冰結六府憂虞纒胸中恥以風病辭胡然泊湘岸入舟雖苦熱垢膩可溉灌痛彼道邊人形骸改昏旦此舟中苦熱而為自遣之語中恥風疾不如姜肱逺遯也道邊人指夜見殺者姜肱傳桓帝嘗徵不至乃下彭城使畫工圖其形狀肱卧於幽間以被韜面言感眩疾不欲出風工竟不得見之私告其友曰今政在閹豎夫何為哉逺遁海濱賣卜給食中丞連帥職封内權得按身當問罪先縣實諸侯半士卒既輯睦啟行促精悍此嘉陽中丞興師討罪也敵權重足以按罪縣大足以出兵輯睦精悍又足以殱制勝言此舉在所必克矣服記十國以為連連有帥表淮南王安書古者封内甸封外侯服庾信平鄴入商郊而問罪左傳卒乗韓睦事不奸矣詩爰方啟行似聞上游兵稍逼長沙館隣好去聲彼克修天機自明斷丁亂切南圖巻雲水北拱戴一作載霄漢美名光史臣長策何壯觀去聲討也此喜裴道州助兵㑹道州在潭之西南乃湘水上流隣好稱裴之義明斷稱裴之勇南圖北拱言南靖湖湘北尊天子也項羽傳古之帝王地方千里必居上㳺軍傅咸樂府聰鑒盡下情明明綜天機世說王右稱揚朗曰世彦器識理致才隠明斷驅馳數公子咸願同伐叛聲節哀有餘夫平聲何激衰懦奴亂切偏禆表三上時掌切鹵莽同一貫始謀誰其間去聲回首增憤惋此惜楊澧州黨惡而沮兵也楊驅馳謂中丞遣使連兵數公子指裴虬李勉子琳上㳺叙地端公叙性於楊則隠諱其詞而歸罪於偏禆然曰鹵莽同一貫則楊當並分其過矣曰始謀誰其間則當時縱惡之罪楊亦無所逃矣之通鑑謂楊子琳起兵討玠取賂而還此咎其信偏禆說釋兵不問也戰國有四公子能連兵救難故用數公子衰劉琨勸進表伐叛以刑文心雕龍聲節哀急激懦言懦夫猶當激動毁任昉表譽一貫宗英李端公守職甚昭煥變通迫脅地謀畫焉於䖍切得算王室不肯微凶徒畧無憚此流須卒子聿切斬神器資强幹扣寂豁煩襟皇天照嗟嘆終以靖亂之事望諸李端公也能守土之臣為偏禆迫脅事每牽制李公官方素著必變通出奇其所謀盡豈同凡算斷不使王室終微賊徒恣横也一杜臆勉本宗室故有資强幹之語葢盧注扣寂賦詩豁頻襟長歎之詞皇天寳鑒臨之呼天以誅賊也中此章首尾各十句前二段各六句後二段各八句自丞以下四人各為一段舊注未見分明退漢書敘贊河間為漢宗英梁邵陵王表臣進非民譽異宗英李端公舊注皆云李勉時在廣州招討馮崇道朱濟時之亂遣兵赴難史不及書未云考史勉鎮嶺南巳兼御史大夫不當更稱端公優孟歌奉法守職兮抱朴子識變通於常事之外孝楚辭外迫脅於機臂陳琳檄時人迫脅梁武帝思賦凶徒疑駭相引離散賦詩國既卒斬上道徳經天下神器不可為也西都强幹弱枝隆都而觀萬國文賦叩寂寞而求音長周書皇天無親惟德是輔詩序言之不足故嗟歎之江閣對雨有懐行營裴二端公鶴注當是大厯五年初夏衡州作裴時為道州刺史與討臧玠之亂故冇行營端邵注通典唐侍御史凡四員内供二員號為臺他人稱曰端公南紀一作極風濤壯隂晴屢不分野流行地日江入度山雲層閣憑雷殷上聲長空面水一作水面文一作紋雨來銅柱北應平聲一作意洗伏波軍首聨為冮雨發端行地之日流光在野隂忽晴矣度山之雲飄入江中晴復隂矣憑閣而隠隠雷動面空而㸃㸃波文隂且雨矣末用伏波軍乃借形語此銅柱在衡陽不在交阯也謂田氏曰南紀分野名廣天文志循嶺儌違甌閩中是南紀所以限蠻夷也舊引毛詩南國之紀非顔延之詩春江壯風濤水唐太宗詩隂晴衆壑殊雷釋惠標詩丹霞拂層閣碧泛蓬萊詩殷其雷言聲隠隠也送曹植霖潦賦聽長空之淋淋見梁元帝詩風水文長洗兵雨出說苑注六巻胡夏客曰篇中言江閣言對雨言懐裴言行營凡題所當發者詩皆一一拈出可想詩家作法黄生曰詩眼貴亮而用線貴藏如何氏山林之五滄江碣石風笋雨梅銀甲金魚皆散錢也而以一興字穿之是線在結也如秦州遣懐霜露菊花斷栁清笳水棲山日歸鳥棲鴉亦散錢也而以愁眼二字聨之是線在起也此詩地日山雲雷殷水文亦散錢也而以隂晴二字冠之雨來二字收之是線在起結也楊萬里曰杜句有偶似古人者亦有述古人語者如武侯廟詩映階碧草自春色隔葉黄鸝空好音此本何遜行孫氏陵山鶯空樹響巄月自秋暉也杜云薄雲巖際宿孤月浪中翻此本何遜白雲巖際出清月波中上也比出上二字勝矣杜云月明垂葉露雲逐度溪風又云水流行地日江入度山雲此一聮更勝庾信云永韜三尺劍長巻一戎衣杜云風塵三尺劍社稷一戎衣亦勝於庾矣題衡山縣文宣王廟新學堂呈陸宰鶴注當是大厯五年之衡山時作孔唐書禮樂志貞觀四年韶州縣學皆作子廟開元二十七年謚文宣王旄頭彗紫微無復扶又切俎豆事金甲相排蕩青衿一憔悴嗚呼巳十年儒服敝於地征夫不遑息學者淪素志從學校荒廢叙起為杜臆自安史亂後人皆棄文就武公詩嘗云壯士恥儒又云儒衣山鳥怪此云儒服敝於地儒之賤已極矣星晉天文志昂十星天之耳也又為旄頭星旄頭妖紫微帝宫彗掃也俎豆事出論語孔詩序青青子衿刺學校廢也詩記儒行哀公問於子曰夫子之服其儒服與征夫遑止我行洞庭野歘得文翁肆侁侁胄子行户郎切若舞風雩至周室宜中竹仲切興孔門未應平聲棄是以資雅才煥一作渙非然立新意衡山雖小邑首唱恢大義因見縣尹心根源舊宫閟記衡山孔廟而歸功陸宰留上四言樂育人才中四言有闗國運下四言意斯文文翁指宰周室比唐恢大義謂恢廓文廟根源舊宫謂宰從官牆而出能追念本源也謝桃詩行道儒肆招魂往來侁侁注侁侁衆多貌者書疏冑子天子元子以下至卿大夫子論語疏雩祈雨祭名使童男女舞之因謂其處為舞雩舞雩之處有壇墠樹木可以休息故曰風乎舞雩北史文苑傳髙視當世連衡孔門前漢書杜鄴子林清靜好古有雅才乖劉歆移太常書夫子沒而微言絶七十子終而大義此詩正指建學為大義傅亮表首倡大義興復王室此特備用之朱注以討臧玠為唱義非也若果如其說則當大書特書不應只一語輕㸃言詩闕宮有侐注閟閉也無事而閉講堂非曩構大屋加塗塈下可容萬一作百人牆隅亦深䆳何必三千徒始壓戎馬氣林木在庭户密幹疊蒼翠有井朱夏時轆轤凍階戺音士耳聞讀書聲殺伐災髣髴方未切被諸生記新修學堂而化上六見堂宇寛深下六見堂前幽勝伐三千徒與讀書聲相應言文德宜足銷亂而聲帶殺者時經臧玠之亂也杜臆下二句暗用子路鼔瑟有北鄙殺伐之音經後漢翟酺疏光武初興起太學博士舍内外講堂水注文翁為蜀守立講堂作石室於南城永平後學堂過火後守更增二石室書唯其塗塈茨注塗塈泥飾也書序三千之徒並受其義簡江淹賦繚繞蒼翠轤廣韻轆轤圓轉木用以汲水梁文帝詩銀床繫轆顧命夾兩階戺論衡子路聞誦讀之聲厲微末以象殺伐之氣子路鼔瑟出家語孔子曰亢盧注髣髴謂在若有若無之間長楊賦從者髣髴骫屬而還故國延歸望衰顔減愁思去聲南紀改一作收波瀾西河共風味采詩倦跋涉載筆尚可記一作嘗紀異一云紀奇異髙歌激宇宙凡百慎失墜此題詩以誌盛事免延歸望長安漸近可旅向之愁矣改波瀾逺於潭亂共風味親抱講壇也修吳論采詩雖無其人而載筆尚堪記事佽勸後人之舉不墜耳舊注謂備國史失墜非也西此章首尾各八句中二段各十二句史記子夏居河教授為魏文侯師索隠西河在河東郡之西界蓋近龍門世說王尚之西河之風不墜晉劉遺民書企懐風味鏡心象迹前漢藝文志古有采詩之官思記史載筆士載言徳周曰此句隠然有文獻之即詩史二字之始楊詩凡百君子敬而聽之聶耒陽以僕阻水書致酒肉療饑荒江詩得代懐興去聲盡本韻至縣呈聶令陸路去方田驛四十里舟行一日時屬音祝江漲泊於方田唐書耒陽縣屬衡州元和郡國志因耒水在縣東為名西北至衡州一百六十八里鶴注郴州與耒陽皆在衡州東南衡至郴四百餘里郴水入衡公初欲往郴依舅氏卒不遂其至方田也葢沂郴水而上故詩云方行郴岸靜耒陽馳尺素見訪荒江渺一作眇義士烈女家風流吾賢紹昨見狄相去聲孫許公人倫表前朝音潮蔡作朝一作期翰林後屈跡縣邑小此接聶令書稱其家世才望傳陸機文賦承綿邈於尺素史記刺客聶政殺韓相俠累而自死其姊罌伏尸哭極哀死政之傍晉楚齊衛聞之皆曰非獨政能也乃其姊亦烈女也狄相孫謂人傑孫兼父南史孔休源人倫儀表當師事之趙注聶之粗必嘗任翰林之職故有前朝句知我礙湍濤半旬獲浩溔玉篇以沼切孤舟増鬱鬱僻路殊悄悄側驚猿猱捷仰羡鸛鶴矯禮過宰肥羊愁當置清醥普沼切下五句此阻水泊舟感其酒肉餽遺際知我二字貫上林賦浩溔潢漾皆水無貌張衡詩鬱鬱不得志而詩憂心悄悄宰蜀都賦猿狖騰希而競捷矯矯翼飛也過子羊則知舊傳致牛肉白酒者為是宜曹植詩烹羊宰肥牛啟酒清曰醥曹植酒賦其味有城醪醴蒼梧醥清七乃有春清醥酒康狄所營麾下殺元戎湖邊有飛旐二句舊在浩溔之下方行郴岸靜未話長沙擾二句舊在坑趙之下人非西諭蜀興去聲在北坑趙崔師乞已至澧音里卒用矜少問罪消息真開顔憩亭沼此以討賊除亂遣懐作結徒湖邊旐崔瓘之喪長沙擾臧玠未平朱注臧玠之非可檄諭必盡坑之乃快耳時楊子琳巳受臧玠之賂故其卒矜少各憩舟亭畔待捷音也亭沼指方田驛此章上二段八句末段十句結帥漢書唐䝉通夜即徵發巴蜀吏卒因軍興法誅其渠巴蜀大驚上使相如作檄以責唐䝉因喻巴蜀人非上本意也侍史記秦白起破趙坑其降卒四十萬人原注聞崔御潩乞師於洪府師已至袁州北楊中丞琳問罪將士自澧上達長沙矜少矜惜而兵少胡夏客曰詩云湖邊有飛旐此語遂成詩䜟公大厯五年沒於耒陽四十年後公之孫嗣業能自豫至楚迎櫬歸偃師首陽山前求宰相元稹為墓誌此其家不衰校李白僅二孫女為農家婦者愈矣新唐書本傳甫沂沿湘流㳺衡山寓居耒陽嘗遊岳廟為暴水所阻旬日不得食耒陽聶令知之自棹舟迎甫而還明皇雜録杜甫客耒陽遊岳祠大水遽至涉旬不得食縣令具舟迎之令嘗饋牛炙白酒後漂寓湘潭間羈旅憔悴於衡州耒陽縣頗為令長所厭甫投詩於宰宰遂致牛炙白酒以遺甫甫飲過多一夕而卒集中猶有贈聶耒陽詩也載王彦輔塵史世言子羮卒於衡之耒陽寰宇記亦其墳在縣北二里唐書稱耒陽令遺白酒黄牛一夕而死子觀子美僑寄巴峽三嵗大豗三年二月始下峽流寓荆南徙洎公安久之方次岳陽即四年冬末也既過洞庭入長沙乃五年之春四月遇臧玠之亂倉皇往衡陽至耒陽舟中伏㭠又畏瘴復沿湘而下故有回櫂之作又登舟將適漢陽云秋帆催客歸葢回櫂在夏末此篇已入秋矣又繼之以暮秋將歸秦留别湖南幕府親友詩則子美北還之迹見此三篇安得卒於耒陽耶以元㣲之墓誌及呂汲公詩譜考之其卒當在潭岳之交秋冬之際但詩譜云是年夏卒則非也鶴曰謝聶令詩云興盡木韻又且宿留驛亭若果以飫死豈能為是長篇又復㳺憩山亭以詩證之其誣明矣一又唐人李觀作杜傳補遺謂公往耒陽聶令不禮日過江上洲中醉宿酒家是夕江水暴漲為驚湍漂沒其尸不知落於何處泊𤣥宗還南内思子美詔天下求之聶令乃積空土於江上曰子美為牛肉白酒脹飫而死塟於此矣此欲雪牛酒飫死之寃而反加以水淹身溺之慘子美何不幸罹此奇禍且考泰陵升遐以及少陵逰世其間相去十載補傳顛倒先後是全不見杜詩年次者元賓博雅人豈肯為此不根之說乎此必後人偽託耳迴棹此詩舊編在大厯五年黄鶴疑詩中不言臧玠之亂當是四年至衡州畏熱將廽棹欲歸襄陽不果而竟留於潭也今按杜詩凡紀行之作其次第皆厯然分明不當以欲行禾果之事載之詩集考臧玠之亂在四月公往衡山過耒陽俱在夏日此云火雲垢膩殆耒陽迴棹而作詞不及憂亂者前後諸詩巳詳不必每章叠見也還依舊編為當宿昔試一作世安命自私猶畏天勞生繫一物為客費多年衡岳江湖大蒸池疫癘偏散才嬰薄一作舊俗有跡負前賢巾拂那闗眼瓶罍易去聲滿船火雲滋垢膩凍音東雨裛沉一作塵綿强其兩切飯蓴添滑端居茗細煎此厭衡山之熱而欲迴棹也以上四作自咎語平時安命雖専巳自私猶知畏天今謀生之故而頻作客逰深愧不能安命矣且衡岳間地氣人情如是且前賢所絶跡不至者乃浪迹於此是負前賢矣無几案故巾拂不用多飲酒故瓶罍滿船火雲凍雨晴雨皆帶鬱蒸蓴羮性寒續茗解熱也前詠懐詩云衣食相拘閡即所云勞生繫一物趙注謂勞生之人不免繫著一物是也故試嘗也蒸漢地理志承陽縣屬長沙國在承水之陽名讀若元和郡國志衡陽城東傍湘冮北背蒸水寰宇記衡州衡陽縣蒸水源出縣西名蒸水者其氣如蒸也舞鶴賦巾拂兩停九劍雙止凍詩瓶之罄矣維罍之恥也淮南子旱雲烟火爾雅雨乃夏日暴雨裛霑沉綿病也擷薛夢符田茶録潭邵之間渠江中有茶鄉人每年採其色如鐵芳香異常黄希曰昔嘗官郴見其風土唯尚煎茶客至繼以六七則知茗續煎者湖南多如此清思漢水上凉憶峴山巔順浪翻堪倚迴帆又省牽吾家碑不昧王氏井依然几杖將衰齒茅茨寄短椽灌園曾音層取適逰寺可終焉遂性同漁父成名一作功異魯連篙師煩爾送朱夏及寒泉此欲託迹襄陽終以安命自處也而凊凉之地可以避暑且自衡迴潭舟行下水故順浪省牽杜碑王井皆襄陽遺蹟几秋茅茨思卜居其地灌園四句甘為遯世篙師二句結出迴棹灌園遊寺暗使故事漁父魯連明用古人受趙曰滄浪漁父隠不求名仲連却秦軍下燕城雖不封猶為取名者故云異魯連此章二段各十四句萬晉書杜預平吳後刻二碑紀績一立萬山之上一沈山下潭中曰焉知此後不為陵谷乎王粲井注見九巻邵髙士傳陳仲子辭楚相與其妻逃去為人灌園晉書績灌園鬻菜以供衣食石勒嘆曰此真髙人矣林南史梁劉慧嘗㳺匡山遂有終焉之志因不仕居東寺於山北構園一所號離垢園易寒泉之食過洞庭湖潘子真詩話元豐中有人得此詩刻於洞庭湖中不載名氏以示山谷山谷曰此子美作也今蜀本收入同大厯四年夏公在潭州此當是五年夏自衡州棹重過洞庭湖而作今據鄭卭編次為正卒或疑公卒於耒陽不應又作此詩不知耒陽之原未可憑而此詩之精練非公斷不能作蛟室圍青草龍堆隠一作擁白沙䕶堤一作江盤古木迎櫂直教切舞神鴉破浪南風正回檣一作收帆或作歸舟畏日斜湖光與天逺直欲泛仙槎一作雲山千萬叠低處上星槎上四洞庭之景下四舟過湖中青草湖白沙驛皆地名青草包於蛟室之外故曰圍龍堆藏於白沙之中故曰隠呉論䕶堤承沙迎櫂承湖已夏則南風司命而日色可畏天逺無涯乘風之興未也洞庭記楊子洲常苦蛟患昔佽飛入水斬蛟而去名勝志洞庭君山有八景一曰射蛟浦相傳漢武帝登是射蛟因名一統志金沙洲在洞庭湖中一名龍堆延袤數里撥白沙驛注見前曰君山多古木水草巴字書櫂舟傍水者短曰檝長櫂岳陽風土記陵鴉甚多土人謂之神鴉無敢弋者木唐張裕送韋整尉長沙詩風帆彭蠡疾雲水洞庭寛客提蔬東江烏接飯丸可見神烏接丸非特宫庭湖也熊孺登董監廟詩神烏慣得商人食飛趁征帆過蠡湖吳江周篆曰神烏在岳州南三十里肇鳥飛舞舟上或撒以碎肉或撒以荳粒食葷者接肉食素者接荳無不巧中如不投以食則隨舟數十里衆烏以翼沾泥水汚船而去此其神也左傳趙衰冬日之日趙盾夏日之口注夏日可畏冬日可愛詩言破浪囘檣巳是放舟湖中矣故落句云湖光天共逺直欲泛仙槎言水濶無際也若云雲山千萬叠低處上星槎句雖雄壯却似初下船語與上文氣不接新安黄白山却以後語為佳也登舟將適漢陽此詩王彦輔鄭昻魯嘗皆謂作於大厯五年之秋黄鶴謂四年之秋欲登舟而不果行者無據置元和郡國志武徳四年分沔陽都於漢陽縣沔州及漢陽縣春宅棄汝去秋帆催客歸庭蔬尚在眼浦浪巳吹衣首敘登舟景事承春宅秋帆就潭州言庭蔬宅浦泿承帆生理飄蕩叶他郎切拙有心遲暮違中原戎馬盛逺道素書稀塞雁與時集檣烏終嵗飛鹿門自此往永息漢隂機不能北歸而思漢陽也鹿公寓宅潭州欲歸兩亰門在襄陽漢隂近漢陽葢將自潭州至漢陽轉㐮陽度洛陽而返西京也此章上四句下八句古詩中有尺素書有鹿門龎公隠居處事者必機心息機㤀機也莊子漢隂大人曰有機寰宇記漢隂城在殺城縣北暮秋將歸秦留别湖南幕府親友朱注此詩王彦輔黄鶴皆以為作於五年故有公卒於潭岳間之說水濶蒼梧野樊作晚天髙白帝秋途窮那免哭身老不禁平聲愁大府才能㑹諸公德業優北歸衝雨雪誰一作俱憫敝貂裘上四暮秋將歸下四留别親友直黄生注一見地二見時三四輕接起聨五六趨尾聮故俱不甚用力用力在一起一接極其精猛蒼顧注舊解謂蒼捂白帝皆公經厯之地公實未嘗至梧也此言湘江之水甚濶直接蒼梧潭州圖經謂其地有舜之遺風白帝司秋葢言暮秋時令如望嶽詩云髙尋白帝問真源用黄生注途窮在水濶之處身老如暮秋之景二句亦暗承有才如少陵使其窮老江湖雨雪敝裘落落寡偶大府諸公亦不得辭其責矣然語却含蓄蘊藉謝朓詩雲去蒼梧野水還江漢流顔延之詩途窮能無慟師酷吏傳郅都郡中不拾遺旁十餘郡守畏都如大府古曰言猶如統屬之也通鑑注唐時巡屬諸州以節度使府為大府亦謂之㑹府絶倫晉書文立傳程瓊雅有徳業班固奏記才能詩雨雪霏霏長沙送李十一銜州此詩黄鶴編在大厯五年西康即同谷縣公以乾元二年冬寓同谷至大厯五年為十二秋此亦五年秋自衡歸潭之一證也與讀平聲子避地西康州洞庭相逢十二秋逺讀於員切愧尚方曾音層賜履竞非吾土倦登樓久讀堅溪切存膠漆應平聲難並一讀伊真切辱泥塗遂晩收李杜齊名真忝竊朔雲寒菊倍離憂上四敘别後情事下乃感李而惜别也樓郎官遥受不如賜履入朝南楚浪逰有似登寄慨此十二年來行迹也膠漆難並謂氣誼過人泥塗晚收謂窮老莫振二句賓主對舉故下用李杜雙承朱瀚曰雲菊離憂别景别情一語盡之美尚方賜履用王喬事詳見四巻王粲登樓賦雖信而非吾土兮曽何足以少留雷後漢陳重雷義交誼至篤時人語曰膠漆雖堅不如陳左傳趙孟謝綘縣老人曰使吾子辱在泥塗久矣膺顧注晚收謂從此收拾也亦後漢黨銅傳杜密與李俱坐而名行相次故時人稱李杜焉注前有李固杜喬故言亦也蹀荀朂表非臣駑闇所宜忝竊赭白馬賦望朔雲而足庾信詩菊寒花正合離謝燮詩望望空離憂憂離别生憂也洪容齋隨筆漢太尉李固杜喬皆以為相守並為梁翼所殺故掾楊生上書乞李杜二公骸骨使得歸葬梁冀之誅權歸宦官白馬令李雲上書有帝欲不諦之語桓帝宸怒逮雲下獄𢎞農五官掾杜衆上書救願與同死帝愈怒下廷尉皆死獄中其後襄楷上言亦稱為李杜又李膺杜密范滂母謂滂曰汝得與李杜齊名又李白杜甫韓文公稱曰李杜文章在光芒萬丈長凡四李杜云胡應麟曰李白杜甫外杜審言李嶠結友前朝李商隠杜牧之齊名晚季咸稱李杜是唐有三李杜也又杜贈李銜有李杜齊名真忝竊之句銜亦當能詩耶律詩忌平頭謂各句第一二字不宜同聲相犯須平仄間用方合於法此詩八句皆用仄聲字起亦犯平頭但思少陵詩家之祖應無此病及考古韻與逺久一四字俱可叶平聲則八句中亦錯見四平四仄矣作家固有變通也風疾舟中伏枕書懐三十六韻奉呈湖南親友此當是大厯五年冬作月按本傳及年譜但云公卒於耒陽而不載其時今以是詩考之葢卒於五年之冬矣觀此詩嵗隂冬炎語可見詩譜謂公卒於夏减却少陵半年之夀為可恨也軒轅休製律虞舜罷彈琴尚錯雄鳴管猶傷半死心從風疾敘起心承琴身疾而氣失調故難製律彈琴錯管承律傷漢律厯志黄帝使伶倫取竹於嶰谷斷兩節間而吹之以為黄鍾之宫製十二筩以聽鳯鳴其雄鳴六雌鳴亦六此黄鍾之宫而皆可以生之是為律本至治之世天地之氣合以生風天地之風氣正十二律定記舜作五弦之琴以歌南風之詩而天下冶桓譚新論神農始削桐為琴生七發龍門之桐高百尺而無枝其根半死半半死心借琴以喻已聖賢名古邈音莫羈旅病年侵舟泊常依震湖平早一作平見參如聞馬融笛若倚仲宣襟故國悲寒望羣雲慘嵗隂水鄉霾白屋一作蜃楓岸疊一作壘青岑鬱鬱冬炎瘴濛濛雨滯淫皷迎非一作方祭鬼彈去聲落似鴞禽以下四段皆㐲枕書懐此記湖中景物將聖賢承軒虞旅起舟泊依震欲向東北見參東方明也馬融王粲皆異地思鄉者寒望嵗隂言冬令水鄉楓岸言山水炎瘴滯淫言氣侯之殊祭鬼落鴞言土俗之異陸機詩後途隨年侵杜臆漢陽在潭岳東北公將適漢陽故瞻依在震震東北方之卦也舊指震澤於洞庭逺隔矣鮑照詩曉星正參落杜臆馬融長笛賦序有洛客舍逆旅吹笛融去京師踰年暫閒甚悲公去京師久故云王粲登樓賦憑軒檻以遥望兮向北風而開襟公病畏熱故用其語嵗顔延之詩故國多喬木空城凝寒雲謝惠連雪賦將暮時既昏寒風積愁雲繁風賀徹詩苕蕘擅水鄉月陶潛詩鬱鬱荒山秀岳陽土記岳州地極熱十猶單衣或摇扇震雷暴雨如中州六七月間滯呉均詩濛濛秋雨映張載詩初為三載别於今久淫風土記荆湖民俗嵗時㑹集或禱祠多擊鼔令男女踏歌謂之歌塲莊子見彈而思鴞炙興去聲盡纔無悶愁來遽不禁平聲生涯相汩沒時物正一作自蕭森疑或樽中弩淹留冠上簪牽裾驚魏帝投閣為去聲劉歆狂走終奚適微才謝所欽吾安藜不糝汝刋作女貴玉為琛烏几重重平聲縛鶉衣寸寸針此因漂泊而遡往事也中興盡又承上愁來又起下樽弩身多病冠上簪帶官職也牽裾投閣指救房琯事此公奔走竄逐之由所欽謂湖南親友汝貴承所欽見其榮顯吾安起几衣自敘旅窮也物世說王子猷興盡而返森易遯世無悶又唯其時也張協詩荒林鬱蕭弩風俗通應彬為汲令請主簿杜宣飲酒北壁上掛赤照於杯中影如虼宣惡之及飲得疾後彬知之延宣於舊處設酒因謂宣曰此乃弩影耳宣病遂瘳與樂廣同冠上簪謂朝簪牵裾用魏辛毗事注見九巻子雲被收本為劉歆子棻獄辭連及今云為劉歆借用以趂韻耳易林狂走蹶走陸機贈兄詩寤寐靡安豫願言思所欽見莊子孔子藜羮不糝為晉書太守馬岌造宋纎不得銘於壁口其人如玉國之琛烏几注見十三巻衣孫卿子子夏貧常懸鶉於壁哀傷同庾信述作異陳琳十署岷山葛三霜楚户砧叨陪錦帳坐久放上聲白頭吟反樸時難遇一作過非忘機陸易音異沉應平聲過平聲數粒食得近四知金此蜀楚浪逰之迹暑同庾信謂均遭喪亂異陳琳謂不草書檄十三霜通計行踪錦帳郎官所坐放吟倣古而吟時凊難遇隠似陸沉歎身世也分米贈金葢親友所恵者庾信哀江南賦序信年始二毛即逢喪亂藐是流離至於暮齒賦云天意人事可為悽愴傷心者矣魏文帝與吳質書裴然有述作意魏志曹公疾發卧讀陳琳所作翕然而起曰此愈我病沈佺期詩三霜弄溟島史記楚雖三户洙曰郎官有錦帳見漢百官志屑淮南子巳雕巳琢還反於樸莊子與世違而心不與之俱是陸沉者也史記東方朔坐席中酒酣據地歌曰陸沉於俗懐鷦鷯賦巢林不過一枝毎食不過數粒後漢王密金遺楊震曰暮夜無知者震曰天知地知子知我知何謂無知遂不受四知金言金之亷潔春草封歸恨源花費獨尋轉蓬憂悄悄行藥病涔涔瘞音異夭追潘岳持危覓鄧林蹉跎翻學步感激在知音却假蘇張舌髙誇周宋鐔音尋飄此衰年留滯之感前歸計不能桃源難訪唯蓬飲藥而巳此應羈旅病侵瘞夭痛兒女之亡鄧林謂老行須杖翻學步不能隨俗而趨感知音窮途幸逢親友也蘇張二句謂諸公謬加奬譽劉安招隠王孫逰兮不歸春草生兮萋萋服封猶增也鮑照有行藥至城東橋詩五臣注因病藥行以宣導之飲漢書外戚傳霍尤夫人顯使女醫淳于衍投毒藥以許后有頃曰我頭涔涔也藥得無有毒乎潘岳西征賦夭赤子於新安坎路側而瘞之黄鶴以瘞夭為葬宗文山海經夸父與日逐走道渴死棄其杖化為鄧林耳莊子壽陵餘子學行於邯鄲失其故步直匍匐而歸魏文帝與呉質書伯牙絶弦于鍾期痛知音之難遇否史蘇秦傳今子舍本而事口舌張儀傳視吾舌尚在莊子天子之劍以燕谿石城為鋒齊岱為鍔晉衛為春周宋為鐔韓魏為鋏說文鐔劍鼻也納流迷浩汗峻趾一作址得嶔音欽崟音吟城府開清旭松筠一作篁起碧潯披顔爭倩倩逸足競駸駸朗鑒存愚直皇天實照臨此稱美幕府親友也杜臆納流言廣而難遍峻趾言髙而難攀所在披顔逸足言歸往者多朱注城府松筠言幕府逺注朗鑒二句感親友待巳之厚納而不流世説謝萬經曲阿後湖曰故當淵注渟著孫楚書三江五湖浩汗無涯魏都賦藐藐標危亭亭峻址楊魯靈光殿賦嶔崟離樓晉張載傳伏死嶔崟之下師道詩聨翩度碧潯倩倩笑容詩巧笑倩兮載徐幹中論馬雖有逸足而不閑輿則不為良駿詩驟駸駸陸機詩朗鑒豈虚假取之在傾冠傳存是存問之存此論語古之愚也直左皇天后土實聞言詩照臨下土公孫仍恃險侯景未生擒書信中原濶干戈北斗深畏人千里井問俗九州箴戰血流依舊軍聲動至今此慨歎亂離時事也公孫侯景指當時叛將中原指洛陽北斗指長安畏人問俗言到處可憂戰血軍聲傷南北兵亂公孫恃險應指蜀中事永泰元年崔旰殺郭英乂據成都大厯四年楊子琳殺䕫州别駕張忠據其城侯景未擒臧玠失討也南史侯景與慕容紹宗戰敗渡准紹宗追之景使人謂之曰景若就擒公復何用紹宗乃縱之臧玠殺崔瓘三州刺史合兵討之楊子琳受賂而還與紹宗之縱侯景無異故曰木生擒玉臺新詠劉勲妻王氏詩千里不唾井况乃昔所奉金陵記南朝計吏止於傳舍將去以剉馬革瀉井中謂無再過之期矣不久復至汲水遞飲遂為昔時之剉刺喉而死故後人戒曰千里井不瀉剉諺云千里不反唾唾乃剉字之訛記入國而問俗左傳虞人之箴曰芒芒禹跡畫為九州揚雄傳贊箴莫善於虞箴故作州箴唐書大厯四年冬十一月吐番復冦靈州又馮崇道朱濟時反廣南故有干戈北斗戰血軍聲等句韓信傳兵固有先聲而後實者葛洪尸定解許靖力難一作還任平聲家事丹砂訣無成涕作霖末敘窮老無聊之况内尸定解將死道路力難任不復逺行丹砂未成則顧無策結語葢待濟於諸公矣後此章起結各四句前兩段各十四句中兩段各十句兩段各八句排律整齊集中類然晉中興書葛洪止羅浮山中煉丹在山積年忽與廣州刺史鄧岱書云當欲逺行岱得書狼狽而往洪巳亡時年八十一顔色如平生體亦軟弱舉屍入棺其輕如空衣時咸以為尸解得仙後漢方技傳注尸解者言將登仙假託為尸以解化也十許靖汝南人依吳郡走交州後入蜀為太傅年踰七丹訣謂㸃化黄白之術後漢丁鴻傳不以家事廢王事此詩作於耒陽阻水之後其不殞於牛肉白酒明矣但云葛洪尸定解葢亦自知不久將沒也編年者當以此章為絶筆為黄鶴曰元稹墓誌云嗣子宗武病不充葬則宗文平世矣考大厯二年熟食日有詩示宗文宗武是明年出峽二子尚無恙也意是年春自潭之衡時乃喪宗文公在衡畏熱舟復回潭故下句又用渇死事公與聶令有舊當是瘞宗文於耒陽後人遂誤以為公墳耳今按宗文若卒於湖南應有哭子詩集中未嘗見亦黄氏意擬之詞耳年考綿竹縣志宗文十代孫凖世居青城宋皇祐五為綿竹今此據嘉靖辛丑氏族譜所載近年王御史謙言宰綿竹時採入新志宗文曾留蜀是亦一證此事有關少陵世系今補録於斯杜詩詳註巻二十三
